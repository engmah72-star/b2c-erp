<script type="module">

import { app, auth, db } from "./core/firebase-init.js";
import { setText } from "./core/dom-utils.js";
// ══ SIDEBAR - Final Solution ══
async function buildDynamicSidebar(uid, currentPage) {
  const nav = document.getElementById('nav-scroll-dynamic') || document.querySelector('.nav-scroll');
  if (!nav) return;
  
  try {
    const usnap = await getDoc(doc(db,'users',uid));
    const ud = usnap.exists() ? usnap.data() : {};
    const role = ud.role || 'admin';
    const perms = ud.permissions || {};
    const userPages = perms.pages || [];
    const isAdm = ['admin','operation_manager'].includes(role);
    
    const ROLE_DASH = {
      admin:'accounts.html', operation_manager:'ops-dashboard.html',
      customer_service:'cs-dashboard.html',
      graphic_designer:'designer-dashboard.html',
      design_operator:'designer-dashboard.html',
      production_agent:'production-dashboard.html',
      shipping_officer:'shipping-dashboard.html',
      wallet_manager:'accounts.html',
    };
    
    const ALL = [
      {f:'clients.html',         l:'العملاء',       i:'👤', p:'clients'},
      {f:'design.html',          l:'التصميم',       i:'✏️', p:'design'},
      {f:'print.html',           l:'الطباعة',       i:'🖨️', p:'print'},
      {f:'production.html',      l:'التنفيذ',       i:'🏭', p:'production'},
      {f:'shipping.html',        l:'الشحن',         i:'🚚', p:'shipping'},
      {f:'shipping-accounts.html',l:'حسابات الشحن',i:'📦', p:'shipping-accounts'},
      {f:'archive.html',         l:'الأرشيف',       i:'📁', p:'archive'},
      {f:'accounts.html',        l:'الحسابات',      i:'💰', p:'accounts'},
      {f:'approvals.html',       l:'الاعتمادات',    i:'🔐', p:'approvals'},
      {f:'suppliers.html',       l:'الموردين',      i:'▣',  p:'suppliers'},
      {f:'products.html',        l:'المنتجات',      i:'◈',  p:'products'},
      {f:'employees.html',       l:'الموظفين',      i:'👥', p:'employees', adminOnly:true},
      {f:'reports.html',         l:'التقارير',      i:'📊', p:'reports'},
      {f:'design-workspace.html', l:'مساحة التصميم', i:'🖥️', p:'design'},
      {f:'gallery.html', l:'المعرض', i:'🖼️', public:true},
      {f:'settings.html',        l:'الإعدادات',     i:'⚙️', p:'settings', adminOnly:true},
    ];
    
    const dash = ROLE_DASH[role] || 'accounts.html';
    const dashLabel = isAdm ? 'الحسابات' : 'داشبوردي';
    
    let html = `<a class="nav-link${currentPage===dash?' active':''}" href="${dash}">
      <span class="nav-ico">⬡</span> ${dashLabel}
    </a>`;
    
    for (const pg of ALL) {
      if (pg.adminOnly && !isAdm) continue;
      const ok = pg.public || isAdm || userPages.includes('*') || userPages.includes(pg.p);
      if (!ok) continue;
      html += `<a class="nav-link${currentPage===pg.f?' active':''}" href="${pg.f}">
        <span class="nav-ico">${pg.i}</span> ${pg.l}
      </a>`;
    }
    html+=`<div class="nav-group">التواصل</div><a class="nav-link${currentPage==='inbox.html'?' active':''}" href="inbox.html"><span class="nav-ico">💬</span> المحادثات</a>`;

    nav.innerHTML = html;
  } catch(e) {
    // fallback - show basic links
    nav.innerHTML = `
      <a class="nav-link" href="accounts.html"><span class="nav-ico">⬡</span> الرئيسية</a>
      <a class="nav-link" href="clients.html"><span class="nav-ico">👤</span> العملاء</a>
      <a class="nav-link" href="design.html"><span class="nav-ico">✏️</span> التصميم</a>
    `;
    console.warn('sidebar fallback:', e.message);
  }
}
// ═══════════════════════════════

// ── Global Error Handler ──
window.addEventListener('unhandledrejection',e=>{
  const msg=e.reason?.message||'';
  if(msg.includes('permission-denied')||msg.includes('Missing or insufficient')){
    console.warn('🔒 Permission denied — راجع الأدمن');
  } else if(msg&&!msg.includes('AbortError')){
    console.error('Error:',msg);
  }
  e.preventDefault();
});

// ══ Sidebar — موحَّد عبر sidebar.js ══
const SIDEBAR_PAGES = window.SIDEBAR_PAGES;
const ROLE_HOME_MAP = window.ROLE_HOME;
// buildSidebar / guardPage / initSidebar توفّرها sidebar.js كـ window globals
// ══════════════════════
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, doc, onSnapshot, getDoc, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { employeeActions } from "./employee-actions.js";
// ══ STATE ══
let myOrders=[], myTasks=[], myAttendance=[], myEmployee={};
let currentUser=null, userName='', uid='';
let activeTab='active', todayAtt=null;
let myGoal=null, myLastEval=null, myPayments=[], myEmpId='';

const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const now=new Date();
const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const DAYS=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

function greetMsg(){
  const h=new Date().getHours();
  if(h<12)return'صباح الخير';
  if(h<17)return'مساء الخير';
  return'مساء النور';
}
function isThisMonth(ts){if(!ts?.toDate)return false;const d=ts.toDate();return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}
function todayStr(){return now.toISOString().slice(0,10);}
function monthKey(){return now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');}
function daysUntil(dl){if(!dl)return null;const d=new Date(dl);const diff=Math.ceil((d-new Date())/(864e5));return diff;}
function toast(msg,t=''){const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}
function nowStr(){return new Date().toLocaleDateString('ar-EG')+' '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});}

window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};

// ── Live Clock ──
function startClock(){
  const el=document.getElementById('live-clock');if(!el)return;
  setInterval(()=>{el.textContent=new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit',second:'2-digit'});},1000);
}

// ── AUTH ──
let __listenersStarted=false;
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  if(__listenersStarted)return;
  __listenersStarted=true;
  currentUser=u; uid=u.uid;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(!snap.exists()){window.location.href='login.html';return;}
  buildDynamicSidebar(u.uid, 'designer-dashboard.html');
  const d=snap.data();
  if(!['graphic_designer','design_operator','admin','operation_manager'].includes(d.role)){
    const home={customer_service:'cs-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'}[d.role]||'login.html';
    window.location.href=home;return;
  }
  userName=d.name||u.email;
  setText('nav-name',userName);
  document.getElementById('nav-av').textContent=userName[0].toUpperCase();

  // جيب بيانات الموظف
  onSnapshot(query(collection(db,'employees'),limit(200)),snap=>{
    const emp=snap.docs.map(d=>({...d.data(),_id:d.id})).find(e=>e.authUid===uid||e.email===u.email);
    myEmployee=emp||{baseSalary:0,commissionPct:0};
    myEmpId=emp?._id||'';
    if(myEmpId){
      // أهداف الشهر
      onSnapshot(query(collection(db,'employee_goals'),where('employeeId','==',myEmpId),where('month','==',monthKey()),limit(5)),snap=>{
        myGoal=snap.docs.length?snap.docs[0].data():null;
        render();
      });
      // آخر تقييم
      onSnapshot(query(collection(db,'employee_evaluations'),where('employeeId','==',myEmpId),limit(60)),snap=>{
        const evals=snap.docs.map(d=>d.data()).sort((a,b)=>(b.month||'').localeCompare(a.month||''));
        myLastEval=evals[0]||null;
        render();
      });
      // الدخل الفعلي المدفوع (RULE 1)
      onSnapshot(query(collection(db,'employee_payments'),where('employeeId','==',myEmpId),limit(500)),snap=>{
        myPayments=snap.docs.map(d=>({...d.data(),_id:d.id}));
        render();
      });
    }
    render();
  });

  // الأوردرات — query محددة للمصمم
  // 1. أوردرات مكلّف بيها (designerId = uid) في مرحلة التصميم فقط — لا يجب أن يرى المؤرشف/الملغي
  onSnapshot(query(collection(db,'orders'),where('designerId','==',uid),where('stage','==','design'),limit(200)),snap=>{
    const assigned=snap.docs.map(d=>({...d.data(),_id:d.id}));
    window.__myUid=uid;
    // 2. أوردرات stage=design بدون مصمم (متاحة للكل)
    const unassigned=(window.__allDesignOrders||[]).filter(o=>!o.designerId);
    myOrders=[...assigned,...unassigned];
    render();
  });
  // أوردرات التصميم الكلية (للـ unassigned)
  // C7: limit(500) — stage=design عادة <100، لكن نحمي من بقايا متراكمة.
  onSnapshot(query(collection(db,'orders'),where('stage','==','design'),orderBy('createdAt','desc'),limit(500)),snap=>{
    window.__allDesignOrders=snap.docs.map(d=>({...d.data(),_id:d.id}));
    const assigned=myOrders.filter(o=>o.designerId===uid||o.designerId===myEmpId);
    const unassigned=window.__allDesignOrders.filter(o=>!o.designerId);
    // دمج بدون تكرار
    const ids=new Set(assigned.map(o=>o._id));
    myOrders=[...assigned,...unassigned.filter(o=>!ids.has(o._id))];
    render();
  });

  // المهام
  onSnapshot(query(collection(db,'tasks'),where('assignedTo','==',uid),limit(100)),snap=>{
    myTasks=snap.docs.map(d=>({...d.data(),_id:d.id})).filter(t=>t.status==='pending')
      .sort((a,b)=>{const p={urgent:0,normal:1,low:2};return(p[a.priority]||1)-(p[b.priority]||1);});
    render();
  });

  // الحضور
  onSnapshot(query(collection(db,'attendance'),where('employeeUid','==',uid),limit(365)),snap=>{
    const atts=snap.docs.map(d=>({...d.data(),_id:d.id}));
    todayAtt=atts.find(a=>a.date===todayStr());
    myAttendance=atts;
    render();
  });
});

// ══ RENDER ══
function render(){
  const el=document.getElementById('main-content');if(!el)return;

  // حسابات
  const monthly=myOrders.filter(o=>isThisMonth(o.createdAt));
  const activeDesigns=myOrders.filter(o=>o.stage==='design');
  const printed=monthly.filter(o=>['printing','production','shipping','archived'].includes(o.stage));
  const rate=monthly.length>0?Math.round(printed.length/monthly.length*100):0;
  // RULE 1: الدخل الفعلي من employee_payments (ما دُفع فعلاً)
  const paidThisMonth=myPayments.filter(p=>{if(!p.createdAt?.toDate)return false;const d=p.createdAt.toDate();return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()&&!p.isDeduction;}).reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  // عمولة مكتسبة (للعرض المعلوماتي فقط)
  const earnedCommission=printed.reduce((s,o)=>s+((parseFloat(o.salePrice)||0)*(parseFloat(myEmployee.commissionPct)||0)/100),0);
  const base=parseFloat(myEmployee.baseSalary)||0;
  const totalIncome=paidThisMonth||base;

  // الحضور هذا الشهر
  const presentDays=myAttendance.filter(a=>a.date?.startsWith(monthKey())).length;
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const workDays=Math.round(daysInMonth*5/7);

  // أهم مهمة الآن
  const urgentOrder=activeDesigns.sort((a,b)=>{
    const da=a.deadline?new Date(a.deadline):new Date('2099-01-01');
    const db2=b.deadline?new Date(b.deadline):new Date('2099-01-01');
    return da-db2;
  })[0];

  // حالة الحضور
  let attState='none', attText='', attDetail='', attBtnText='', attBtnClass='in';
  if(!todayAtt){
    attState='none'; attText='لم تسجّل حضورك بعد';
    attDetail='سجّل الحضور لتبدأ يومك';
    attBtnText='✅ تسجيل الحضور'; attBtnClass='in';
  } else if(!todayAtt.checkOut){
    attState='in'; attText='حاضر منذ '+todayAtt.checkInStr;
    attDetail='اضغط عند الانتهاء لتسجيل الانصراف';
    attBtnText='🔚 تسجيل الانصراف'; attBtnClass='out';
  } else {
    attState='done'; attText=todayAtt.checkInStr+' → '+todayAtt.checkOutStr;
    attDetail='✅ سجّلت '+todayAtt.hoursWorked+' ساعة اليوم';
    attBtnText='تم التسجيل'; attBtnClass='done-btn';
  }

  el.innerHTML=`
  <div class="desktop-grid">

    <!-- COL 1 -->
    <div class="col">

      <!-- HERO -->
      <div class="hero full">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="hero-greeting">${greetMsg()}، ${userName.split(' ')[0]} 👋</div>
            <div class="hero-date">${DAYS[now.getDay()]} · ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}</div>
          </div>
          <span class="live-clock" id="live-clock">—</span>
        </div>

        <!-- ATT CARD -->
        <div class="att-card ${attState==='none'?'not-in':attState==='in'?'checked-in':'done'}">
          <div>
            <div style="font-size:var(--fs-xs);font-weight:var(--fw-bold);color:var(--dim2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">⏰ الحضور</div>
            <div class="att-time" style="color:${attState==='in'?'var(--g)':attState==='done'?'var(--b)':'var(--snow)'}">${attText}</div>
            <div style="font-size:var(--fs-sm);color:var(--dim2);margin-top:2px">${attDetail}</div>
          </div>
          <button type="button" class="att-cta ${attBtnClass}" onclick="doAtt()" ${attState==='done'?'disabled':''}>
            ${attBtnText}
          </button>
        </div>
      </div>

      <!-- AWAITING ACCEPTANCE BANNER -->
      ${(()=>{const myUid=window.__myUid||'';const pending=activeDesigns.filter(o=>o.designerId===myUid&&!o.designerAcceptedAt);if(!pending.length)return '';return `
      <div onclick="location.href='design.html'" style="background:linear-gradient(135deg,rgba(240,160,32,.15),rgba(240,160,32,.05));border:1px dashed var(--y);border-radius:14px;padding:14px 16px;margin-bottom:14px;cursor:pointer;display:flex;align-items:center;gap:var(--space-md);transition:all .2s">
        <div style="font-size:var(--fs-4xl)">🔔</div>
        <div style="flex:1">
          <div style="font-size:var(--fs-md);font-weight:var(--fw-extra);color:var(--y)">عندك ${pending.length} ${pending.length===1?'أوردر':'أوردرات'} بانتظار تأكيد استلامك</div>
          <div style="font-size:var(--fs-sm);color:var(--dim2);margin-top:2px">افتح صفحة التصميم وأكّد الاستلام لتبدأ العمل</div>
        </div>
        <div style="font-size:var(--fs-base);color:var(--y);font-weight:var(--fw-extra)">←</div>
      </div>`;})()}

      <!-- PRIORITY CARD -->
      ${urgentOrder?`
      <div class="priority-card" onclick="location.href='design.html'">
        <div class="priority-label">🔥 الأهم الآن</div>
        <div class="priority-title">${urgentOrder.clientName||'—'}</div>
        <div class="priority-meta">
          ${(urgentOrder.products||[]).map(p=>p.name+'×'+p.qty).join(' · ')||urgentOrder.product||'—'}
          ${urgentOrder.deadline?` · 📅 ${urgentOrder.deadline}`:''}
        </div>
        <div style="margin-top:12px;display:flex;align-items:center;justify-content:space-between">
          ${urgentOrder.deadline&&daysUntil(urgentOrder.deadline)<0
            ?`<span style="font-size:var(--fs-base);color:var(--r);font-weight:var(--fw-bold)">⚠️ متأخر ${Math.abs(daysUntil(urgentOrder.deadline))} يوم</span>`
            :urgentOrder.deadline&&daysUntil(urgentOrder.deadline)===0
            ?`<span style="font-size:var(--fs-base);color:var(--y);font-weight:var(--fw-bold)">⚡ موعد التسليم اليوم</span>`
            :`<span class="txt-meta-base">في انتظار التنفيذ</span>`}
          <span style="font-size:var(--fs-base);color:var(--r);font-weight:var(--fw-bold)">افتح التصميم ←</span>
        </div>
      </div>`:`
      <div style="background:rgba(0,217,126,.06);border:1px solid rgba(0,217,126,.15);border-radius:var(--rad2);padding:var(--space-xl);text-align:center;margin-bottom:14px">
        <div style="font-size:var(--fs-4xl);margin-bottom:8px">🎉</div>
        <div style="font-size:var(--fs-lg);font-weight:var(--fw-extra);color:var(--g)">لا توجد تصاميم معلقة</div>
        <div style="font-size:var(--fs-base);color:var(--dim2);margin-top:4px">أنجزت كل شيء!</div>
      </div>`}

      <!-- PROGRESS -->
      <div class="progress-section">
        <div style="font-size:var(--fs-base);font-weight:var(--fw-extra);margin-bottom:14px">📊 تقدمك — ${MONTHS[now.getMonth()]}</div>
        <div class="progress-row">
          <div class="progress-label">
            <span class="progress-label-text">🎨 التصاميم</span>
            <span class="progress-label-val">${printed.length} من ${monthly.length} وصلوا للطباعة</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${rate}%;background:linear-gradient(90deg,var(--p),#c4b5fd)"></div>
          </div>
        </div>
        <div class="progress-row">
          <div class="progress-label">
            <span class="progress-label-text">⏰ الحضور</span>
            <span class="progress-label-val">${presentDays} من ${workDays} يوم عمل</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${workDays>0?Math.min(presentDays/workDays*100,100):0}%;background:linear-gradient(90deg,var(--b),#6bb5ff)"></div>
          </div>
        </div>
        <div class="progress-row">
          <div class="progress-label">
            <span class="progress-label-text">📈 نسبة النجاح</span>
            <span class="progress-label-val">${rate}% من التصاميم للطباعة</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${rate}%;background:linear-gradient(90deg,${rate>=80?'var(--g)':rate>=60?'var(--y)':'var(--r)'},${rate>=80?'#3bd68c':rate>=60?'#ffcc44':'#ff6b8a'})"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- COL 2 -->
    <div class="col">

      <!-- INCOME -->
      <div class="income-card">
        <div style="font-size:var(--fs-sm);color:var(--dim2);text-transform:uppercase;letter-spacing:.5px">💰 ${paidThisMonth>0?'مدفوع':'مرتب أساسي'} — ${MONTHS[now.getMonth()]}</div>
        <div class="income-val">${fn(totalIncome)} <span style="font-size:var(--fs-xl);font-weight:var(--fw-normal)">ج</span></div>
        <div class="income-breakdown">
          ${paidThisMonth>0?`<div class="income-item">محوّل للحساب <strong style="color:var(--g)">${fn(paidThisMonth)}</strong> ج</div>`:`<div class="income-item">مرتب أساسي <strong>${fn(base)}</strong> ج</div>`}
          ${earnedCommission>0?`<div class="income-item">عمولة مكتسبة <strong style="color:var(--p)">${fn(earnedCommission)}</strong> ج</div>`:''}
        </div>
      </div>

      <!-- GOAL PROGRESS -->
      ${myGoal?`<div class="progress-section" style="margin-bottom:14px">
        <div style="font-size:var(--fs-base);font-weight:var(--fw-extra);margin-bottom:12px">🎯 أهداف ${MONTHS[now.getMonth()]}</div>
        ${myGoal.targetOrdersMonthly>0?`<div class="progress-row">
          <div class="progress-label">
            <span class="progress-label-text">📦 الأوردرات</span>
            <span class="progress-label-val">${printed.length} من ${myGoal.targetOrdersMonthly}</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,Math.round(printed.length/myGoal.targetOrdersMonthly*100))}%;background:linear-gradient(90deg,var(--p),#c4b5fd)"></div></div>
        </div>`:''}
        ${myGoal.targetAttendancePct>0?`<div class="progress-row">
          <div class="progress-label">
            <span class="progress-label-text">⏰ الحضور</span>
            <span class="progress-label-val">${presentDays} يوم (هدف ${myGoal.targetAttendancePct}%)</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,Math.round(presentDays/Math.max(1,workDays)*100/myGoal.targetAttendancePct*100))}%;background:linear-gradient(90deg,var(--b),#6bb5ff)"></div></div>
        </div>`:''}
        ${myLastEval?`<div style="font-size:var(--fs-sm);color:var(--dim2);border-top:1px solid var(--line);padding-top:8px;margin-top:4px">آخر تقييم (${myLastEval.month}): <strong style="color:${myLastEval.totalScore>=85?'var(--g)':myLastEval.totalScore>=70?'var(--b)':'var(--y)'}">${myLastEval.totalScore||0} نقطة</strong></div>`:''}
      </div>`:''}

      <!-- KPIs ROW -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-sm);margin-bottom:14px">
        <div style="background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:var(--space-md);text-align:center">
          <div style="font-size:var(--fs-3xl);font-weight:var(--fw-heavy);color:var(--b)">${activeDesigns.length}</div>
          <div style="font-size:var(--fs-xs);color:var(--dim2);font-weight:var(--fw-bold);margin-top:2px">جاري</div>
        </div>
        <div style="background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:var(--space-md);text-align:center">
          <div style="font-size:var(--fs-3xl);font-weight:var(--fw-heavy);color:var(--g)">${printed.length}</div>
          <div style="font-size:var(--fs-xs);color:var(--dim2);font-weight:var(--fw-bold);margin-top:2px">طباعة ✅</div>
        </div>
        <div style="background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:var(--space-md);text-align:center">
          <div style="font-size:var(--fs-3xl);font-weight:var(--fw-heavy);color:var(--y)">${rate}%</div>
          <div style="font-size:var(--fs-xs);color:var(--dim2);font-weight:var(--fw-bold);margin-top:2px">نسبة النجاح</div>
        </div>
      </div>

      <!-- QUEUE -->
      <div>
        <div class="queue-header">
          <div class="queue-title">📋 قائمة شغلي</div>
          <div style="display:flex;gap:6px;align-items:center">
            ${myTasks.length>0?`<span class="queue-count">${myTasks.length} مهمة</span>`:''}
            <span class="queue-count">${activeDesigns.length} تصميم</span>
          </div>
        </div>

        <!-- TABS -->
        <div class="tab-bar">
          <button type="button" class="tab-item ${activeTab==='active'?'active':''}" onclick="switchTab('active')">جاري (${activeDesigns.length})</button>
          <button type="button" class="tab-item ${activeTab==='tasks'?'active':''}" onclick="switchTab('tasks')">مهام (${myTasks.length})</button>
          <button type="button" class="tab-item ${activeTab==='done'?'active':''}" onclick="switchTab('done')">مكتمل</button>
        </div>

        <div id="queue-list">
          ${renderQueue(activeDesigns,myTasks,printed,activeTab)}
        </div>
      </div>

    </div>
  </div>`;

  startClock();
}

// ══ QUEUE RENDER ══
function renderQueue(activeDesigns,myTasks,printed,tab){
  if(tab==='active'){
    const items=[...activeDesigns].sort((a,b)=>{
      const da=a.deadline?new Date(a.deadline):new Date('2099-01-01');
      const db2=b.deadline?new Date(b.deadline):new Date('2099-01-01');
      return da-db2;
    });
    if(!items.length)return`<div class="empty-state"><div class="empty-state-ico">✅</div><div class="empty-state-text">لا توجد تصاميم جارية</div><div class="empty-state-sub">استمتع بوقتك!</div></div>`;
    return items.map(o=>{
      const days=daysUntil(o.deadline);
      const isLate=days!==null&&days<0;
      const isToday=days===0;
      const urgency=isLate?'urgent':isToday?'urgent':'normal';
      const prods=(o.products||[]).map(p=>p.name+'×'+p.qty).join(' + ')||o.product||'—';
      let daysBadge='';
      if(days===null)daysBadge=`<span class="days-badge days-normal">لم يُحدد</span>`;
      else if(days<0)daysBadge=`<span class="days-badge days-late">⚠️ ${Math.abs(days)} يوم تأخير</span>`;
      else if(days===0)daysBadge=`<span class="days-badge days-today">⚡ اليوم</span>`;
      else if(days<=3)daysBadge=`<span class="days-badge days-soon">📅 ${days} أيام</span>`;
      else daysBadge=`<span class="days-badge days-normal">📅 ${days} يوم</span>`;
      return`<div class="work-card ${urgency}" onclick="location.href='design.html'">
        <div class="urgency-dot" style="background:${isLate||isToday?'var(--r)':days<=3?'var(--y)':'var(--b)'}"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:var(--fs-lg);font-weight:var(--fw-extra);margin-bottom:2px">${o.clientName||'—'}</div>
          <div class="txt-meta-sm">${prods}</div>
        </div>
        ${daysBadge}
      </div>`;
    }).join('');
  }

  if(tab==='tasks'){
    if(!myTasks.length)return`<div class="empty-state"><div class="empty-state-ico">✅</div><div class="empty-state-text">لا توجد مهام معلقة</div></div>`;
    const PRI={urgent:{col:'var(--r)',lbl:'⚡'},normal:{col:'var(--b)',lbl:'📌'},low:{col:'var(--dim2)',lbl:'📎'}};
    return myTasks.map(t=>{
      const p=PRI[t.priority]||PRI.normal;
      const days=t.dueDate?daysUntil(t.dueDate):null;
      return`<div class="work-card ${t.priority}" onclick="completeTask('${t._id}')">
        <div class="urgency-dot" style="background:${p.col}"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:var(--fs-lg);font-weight:var(--fw-extra);margin-bottom:2px">${t.title}</div>
          ${t.description?`<div class="txt-meta-sm">${t.description}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:var(--space-xs)">
          <span style="font-size:var(--fs-base)">${p.lbl}</span>
          ${days!==null?`<span style="font-size:var(--fs-xs);color:${days<0?'var(--r)':'var(--dim2)'}">${days<0?'متأخر':days===0?'اليوم':days+' يوم'}</span>`:''}
        </div>
      </div>`;
    }).join('');
  }

  if(tab==='done'){
    const doneOrders=printed.slice(0,10);
    if(!doneOrders.length)return`<div class="empty-state"><div class="empty-state-ico">🎨</div><div class="empty-state-text">لم تكتمل تصاميم هذا الشهر بعد</div></div>`;
    return doneOrders.map(o=>{
      const prods=(o.products||[]).map(p=>p.name).join(' + ')||o.product||'—';
      return`<div class="work-card done-card">
        <div class="urgency-dot" style="background:var(--g)"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:var(--fs-lg);font-weight:var(--fw-bold);text-decoration:line-through;color:var(--dim2)">${o.clientName||'—'}</div>
          <div class="txt-meta-sm">${prods}</div>
        </div>
        <span style="font-size:var(--fs-xl)">✅</span>
      </div>`;
    }).join('');
  }
  return '';
}

// ══ ACTIONS ══
window.switchTab=function(tab){
  activeTab=tab;
  const monthly=myOrders.filter(o=>isThisMonth(o.createdAt));
  const activeDesigns=myOrders.filter(o=>o.stage==='design');
  const printed=monthly.filter(o=>['printing','production','shipping','archived'].includes(o.stage));
  const el=document.getElementById('queue-list');
  if(el)el.innerHTML=renderQueue(activeDesigns,myTasks,printed,tab);
  // تحديث الـ tabs
  document.querySelectorAll('.tab-item').forEach((btn,i)=>{
    const tabs=['active','tasks','done'];
    btn.classList.toggle('active',tabs[i]===tab);
  });
};

window.doAtt=async function(){
  if(!currentUser)return;
  const today=todayStr();
  const timeStr=new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
  const btn=document.querySelector('.att-cta');if(btn)btn.disabled=true;
  if(!todayAtt){
    const r=await employeeActions.recordAttendanceCheckIn({db,employeeId:uid,employeeUid:uid,employeeName:userName,date:today,lateMinutes:0,recordedBy:uid,recordedByName:userName});
    if(!r.ok){toast('❌ '+(r.errors||[]).join(' · '),'err');if(btn)btn.disabled=false;return;}
    toast('✅ تم تسجيل الحضور — '+timeStr,'ok');
  } else if(!todayAtt.checkOut){
    const r=await employeeActions.recordAttendanceCheckOut({db,attendanceId:todayAtt._id});
    if(!r.ok){toast('❌ '+(r.errors||[]).join(' · '),'err');if(btn)btn.disabled=false;return;}
    const inTime=todayAtt.checkIn?.toDate?.();
    const hours=inTime?((new Date()-inTime)/(1000*60*60)).toFixed(1):0;
    toast('✅ تم تسجيل الانصراف — '+hours+' ساعة','ok');
  }
};

window.completeTask=async function(id){
  const r=await employeeActions.setTaskStatus({db,taskId:id,status:'done'});
  if(!r.ok)return toast('❌ '+(r.errors||[]).join(' · '),'err');
  toast('✅ تم إنجاز المهمة','ok');
};
</script>
