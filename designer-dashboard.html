<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#a78bfa">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="B2C — مصمم">
<link rel="apple-touch-icon" href="icon-192.png">
<title>B2C — داشبورد المصمم</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;border-top:3px solid var(--kc)}
.kpi-val{font-size:24px;font-weight:900;color:var(--kc);margin-bottom:2px}
.kpi-lbl{font-size:10px;color:var(--dim2);font-weight:700}
.income-box{background:linear-gradient(135deg,rgba(167,139,250,.12),rgba(0,217,126,.08));border:1px solid rgba(167,139,250,.25);border-radius:var(--rad2);padding:20px;text-align:center;margin-bottom:18px}
.ocard{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;margin-bottom:8px;cursor:pointer;transition:var(--trans)}
.ocard:hover{border-color:var(--p);transform:translateX(-2px)}
.badge-stage{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px}
.late-badge{background:rgba(255,61,110,.15);color:var(--r);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
@media(max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge" style="color:var(--p)">مصمم</div></div></div>
  <div class="nav-scroll">
    <a class="nav-link active" href="designer-dashboard.html"><span class="nav-ico">⬡</span> داشبوردي</a>
    <a class="nav-link" href="design.html"><span class="nav-ico">✏️</span> التصاميم</a>
  </div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">د</div><div><div class="nav-user-name" id="nav-name">مصمم</div><div class="nav-user-role">تسجيل خروج</div></div></div></div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div>
        <h1>🎨 <span id="greeting">أهلاً</span></h1>
        <p id="sub">جاري التحميل...</p>
      </div>
    </div>
    <div class="topbar-right">
      <div style="text-align:left;font-size:11px;color:var(--dim2)">
        <div id="today-date"></div>
        <div id="month-label" style="font-weight:700;color:var(--p)"></div>
      </div>
    </div>
  </div>
  <div class="content">

    <!-- إجمالي الدخل -->
    <div class="income-box">
      <div style="font-size:11px;color:var(--dim2);margin-bottom:6px">💰 إجمالي الدخل هذا الشهر</div>
      <div style="font-size:36px;font-weight:900;color:var(--g)" id="total-income">—</div>
      <div style="font-size:12px;color:var(--dim2);margin-top:4px">ج.م</div>
      <div style="display:flex;justify-content:center;gap:20px;margin-top:12px;font-size:11px">
        <span style="color:var(--dim2)">مرتب: <strong style="color:var(--snow)" id="salary-val">—</strong> ج</span>
        <span style="color:var(--dim2)">عمولة: <strong style="color:var(--p)" id="commission-val">—</strong> ج</span>
      </div>
    </div>

    <!-- KPIs -->
    <div class="kpi-row">
      <div class="kpi" style="--kc:var(--b)">
        <div class="kpi-val" id="k-assigned">—</div>
        <div class="kpi-lbl">كُلّفت هذا الشهر</div>
      </div>
      <div class="kpi" style="--kc:var(--g)">
        <div class="kpi-val" id="k-printed">—</div>
        <div class="kpi-lbl">وصلوا للطباعة ✅</div>
      </div>
      <div class="kpi" style="--kc:var(--r)">
        <div class="kpi-val" id="k-rejected">—</div>
        <div class="kpi-lbl">مرفوض ❌</div>
      </div>
      <div class="kpi" style="--kc:var(--y)">
        <div class="kpi-val" id="k-rate">—</div>
        <div class="kpi-lbl">نسبة النجاح</div>
      </div>
    </div>

    <!-- Tabs -->
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="btn btn-p btn-sm" id="tab-active" onclick="switchTab('active')">🎨 جاري التصميم</button>
      <button class="btn btn-ghost btn-sm" id="tab-done" onclick="switchTab('done')">✅ منتهية الشهر</button>
      <button class="btn btn-ghost btn-sm" id="tab-all" onclick="switchTab('all')">📋 الكل</button>
    </div>
    <div id="orders-list"><div class="loader"><div class="spinner"></div></div></div>

  </div>
</div>
</div>

<nav class="mob-nav"><div class="mob-nav-items">
  <a class="mob-nav-item active" href="designer-dashboard.html"><div class="mob-nav-ico">⬡</div><div class="mob-nav-lbl">داشبوردي</div></a>
  <a class="mob-nav-item" href="design.html"><div class="mob-nav-ico">✏️</div><div class="mob-nav-lbl">التصاميم</div></a>
</div></nav>
<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div class="toasts" id="toasts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"});
const auth=getAuth(app); const db=getFirestore(app);

const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const setText=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};

let myOrders=[], myEmployee={}, currentUser=null, activeTab='active';

window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};

// التاريخ
const now=new Date();
const months=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
setText('today-date',now.toLocaleDateString('ar-EG',{weekday:'long',day:'numeric'}));
setText('month-label',months[now.getMonth()]+' '+now.getFullYear());

function isThisMonth(ts){
  if(!ts?.toDate)return false;
  const d=ts.toDate();
  return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
}

function delay(dl){
  if(!dl)return 0;
  const d=new Date(dl);
  return d<now?Math.floor((now-d)/(864e5)):0;
}

onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  currentUser=u;
  
  // جيب بيانات الموظف
  const userSnap=await getDoc(doc(db,'users',u.uid));
  if(!userSnap.exists()){window.location.href='login.html';return;}
  
  const userData=userSnap.data();
  const role=userData.role||'graphic_designer';
  const name=userData.name||u.email;
  
  // تحقق من الدور
  if(!['graphic_designer','design_operator','admin','operation_manager'].includes(role)){
    window.location.href='login.html'; return;
  }
  
  setText('nav-name',name);
  setText('greeting','أهلاً '+name.split(' ')[0]);
  document.getElementById('nav-av').textContent=name[0].toUpperCase();
  
  // جيب بيانات من employees collection
  const empSnap=await new Promise(res=>{
    const q=query(collection(db,'employees'));
    const unsub=onSnapshot(q,snap=>{
      const emp=snap.docs.map(d=>({...d.data(),_id:d.id})).find(e=>e.authUid===u.uid||e.email===u.email);
      myEmployee=emp||{baseSalary:0,commissionPct:0};
      unsub();res();
    });
  });
  
  setText('salary-val',fn(myEmployee.baseSalary||0));
  
  // أوردرات التصميم الخاصة بيه
  // Admin/Ops يشوفوا كل حاجة، المصمم يشوف بتاعته بس
  const isAdmin=['admin','operation_manager'].includes(role);
  
  let ordersQuery;
  if(isAdmin){
    ordersQuery=query(collection(db,'orders'),where('stage','==','design'));
  } else {
    ordersQuery=query(collection(db,'orders'),
      where('stage','==','design'),
      where('designerId','==',u.uid)
    );
  }
  
  // كل أوردرات التصميم اللي مر عليها
  onSnapshot(collection(db,'orders'),snap=>{
    const all=snap.docs.map(d=>({...d.data(),_id:d.id}));
    
    if(isAdmin){
      myOrders=all.filter(o=>o.stage==='design'||o.designerId);
    } else {
      myOrders=all.filter(o=>o.designerId===u.uid||o.createdBy===u.uid&&o.stage==='design');
    }
    
    updateKPIs();
    renderOrders();
    setText('sub',myOrders.filter(o=>o.stage==='design').length+' تصميم جاري');
  });
});

function updateKPIs(){
  const monthly=myOrders.filter(o=>isThisMonth(o.createdAt));
  const assigned=monthly.length;
  const printed=monthly.filter(o=>['printing','production','shipping','archived'].includes(o.stage)).length;
  const rejected=monthly.filter(o=>o.designStatus==='rejected').length;
  const rate=assigned>0?Math.round(printed/assigned*100):0;
  
  const commissionEarned=monthly
    .filter(o=>['printing','production','shipping','archived'].includes(o.stage))
    .reduce((s,o)=>s+((parseFloat(o.salePrice)||0)*(myEmployee.commissionPct||0)/100),0);
  const totalIncome=(parseFloat(myEmployee.baseSalary)||0)+commissionEarned;
  
  setText('k-assigned',assigned);
  setText('k-printed',printed);
  setText('k-rejected',rejected);
  setText('k-rate',rate+'%');
  setText('commission-val',fn(commissionEarned));
  setText('total-income',fn(totalIncome));
}

window.switchTab=function(tab){
  activeTab=tab;
  ['active','done','all'].forEach(t=>{
    const btn=document.getElementById('tab-'+t);
    if(btn)btn.className=t===tab?'btn btn-p btn-sm':'btn btn-ghost btn-sm';
  });
  renderOrders();
};

function renderOrders(){
  const el=document.getElementById('orders-list');if(!el)return;
  let data=[];
  if(activeTab==='active') data=myOrders.filter(o=>o.stage==='design');
  else if(activeTab==='done') data=myOrders.filter(o=>
    ['printing','production','shipping','archived'].includes(o.stage)&&isThisMonth(o.createdAt)
  );
  else data=myOrders;
  
  data=data.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  
  if(!data.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🎨</div><div class="empty-text">${activeTab==='active'?'لا توجد تصاميم جارية':'لا توجد نتائج'}</div></div>`;
    return;
  }
  
  const STAGE={design:'✏️ تصميم',printing:'🖨️ طباعة',production:'🏭 تنفيذ',shipping:'🚚 شحن',archived:'✅ مكتمل'};
  const STAGE_COL={design:'var(--p)',printing:'var(--b)',production:'var(--r)',shipping:'var(--c)',archived:'var(--g)'};
  
  el.innerHTML=data.map(o=>{
    const d=delay(o.deadline);
    const stageCol=STAGE_COL[o.stage]||'var(--dim2)';
    // المصمم لا يشوف الأسعار
    return`<div class="ocard" onclick="location.href='design.html'">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <div style="font-size:10px;color:var(--dim2)">${o.orderId||o._id.slice(-6)} · ${o.createdDate||'—'}</div>
          <div style="font-size:15px;font-weight:800">${o.clientName||'—'}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span class="badge-stage" style="background:${stageCol}15;color:${stageCol}">${STAGE[o.stage]||o.stage}</span>
          ${d>0?`<span class="late-badge">⚠️ ${d} يوم</span>`:''}
        </div>
      </div>
      <div style="font-size:12px;color:var(--dim2);margin-bottom:8px">${(o.products||[]).map(p=>p.name+'×'+p.qty).join(' + ')||o.product||'—'}</div>
      ${o.notes?`<div style="font-size:11px;background:var(--bg3);border-radius:6px;padding:8px;color:var(--dim2)">📝 ${o.notes}</div>`:''}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--line)">
        <span style="font-size:11px;color:var(--dim2)">📅 ${o.deadline||'لم يُحدد الموعد'}</span>
        ${o.stage==='design'?`<a href="design.html" class="btn btn-p btn-xs" onclick="event.stopPropagation()">افتح التصميم</a>`:''}
      </div>
    </div>`;
  }).join('');
}
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}</script>
</body>
</html>
