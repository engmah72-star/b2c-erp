<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f1c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="B2C Design">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Business2Card — مصمم</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
/* ══ HERO ══ */
.hero{background:linear-gradient(135deg,#0d0f1c 0%,#13162a 100%);border:1px solid var(--line);border-radius:20px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;left:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(167,139,250,.12),transparent 70%);pointer-events:none}
.hero-greeting{font-size:22px;font-weight:900;margin-bottom:4px}
.hero-date{font-size:12px;color:var(--dim2);margin-bottom:16px}

/* ══ ATT CARD ══ */
.att-card{border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:all .2s}
.att-card.not-in{background:rgba(0,217,126,.07);border:1px solid rgba(0,217,126,.2)}
.att-card.checked-in{background:rgba(59,158,255,.07);border:1px solid rgba(59,158,255,.2)}
.att-card.done{background:var(--bg3);border:1px solid var(--line)}
.att-time{font-size:18px;font-weight:900}
.att-cta{padding:10px 18px;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;transition:all .2s}
.att-cta.in{background:linear-gradient(135deg,#00d97e,#3bd68c);color:#fff}
.att-cta.out{background:linear-gradient(135deg,#3b9eff,#6bb5ff);color:#fff}
.att-cta.done-btn{background:var(--bg4);color:var(--dim2);cursor:default}

/* ══ PRIORITY ══ */
.priority-card{background:linear-gradient(135deg,rgba(255,61,110,.08),rgba(255,170,0,.04));border:1px solid rgba(255,61,110,.2);border-radius:16px;padding:16px;margin-bottom:14px;cursor:pointer;transition:all .2s}
.priority-card:hover{transform:translateY(-2px);border-color:rgba(255,61,110,.4)}
.priority-label{font-size:10px;font-weight:800;color:var(--r);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.priority-title{font-size:16px;font-weight:800;margin-bottom:4px}
.priority-meta{font-size:12px;color:var(--dim2)}

/* ══ PROGRESS ══ */
.progress-section{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
.progress-row{margin-bottom:12px}
.progress-row:last-child{margin:0}
.progress-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px}
.progress-label-text{font-weight:700}
.progress-label-val{color:var(--dim2)}
.progress-bar{height:8px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* ══ INCOME ══ */
.income-card{background:linear-gradient(135deg,rgba(0,217,126,.08),rgba(167,139,250,.06));border:1px solid rgba(0,217,126,.15);border-radius:16px;padding:16px;margin-bottom:14px;text-align:center}
.income-val{font-size:36px;font-weight:900;color:var(--g);line-height:1;margin:8px 0}
.income-breakdown{display:flex;justify-content:center;gap:20px;margin-top:10px}
.income-item{font-size:11px;color:var(--dim2)}
.income-item strong{color:var(--snow);font-weight:700}

/* ══ QUEUE ══ */
.queue-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.queue-title{font-size:14px;font-weight:800}
.queue-count{background:var(--bg3);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;color:var(--dim2)}
.work-card{border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all .2s;border:1px solid var(--line);display:flex;align-items:center;gap:12px;background:var(--bg2)}
.work-card:hover{transform:translateX(-3px);border-color:var(--line2)}
.work-card.urgent{border-right:3px solid var(--r);background:rgba(255,61,110,.03)}
.work-card.normal{border-right:3px solid var(--b)}
.work-card.low{border-right:3px solid var(--dim)}
.work-card.done-card{opacity:.45;cursor:default}
.work-card.done-card:hover{transform:none}
.urgency-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.days-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.days-late{background:rgba(255,61,110,.15);color:var(--r)}
.days-today{background:rgba(255,170,0,.15);color:var(--y)}
.days-soon{background:rgba(0,217,126,.12);color:var(--g)}
.days-normal{background:var(--bg3);color:var(--dim2)}

/* ══ TABS ══ */
.tab-bar{display:flex;gap:6px;margin-bottom:14px;background:var(--bg2);border-radius:12px;padding:4px;border:1px solid var(--line)}
.tab-item{flex:1;padding:8px;border:none;border-radius:10px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--dim2);background:transparent;text-align:center}
.tab-item.active{background:var(--bg3);color:var(--snow);box-shadow:0 2px 8px rgba(0,0,0,.3)}

/* ══ EMPTY STATE ══ */
.empty-state{text-align:center;padding:32px 20px;color:var(--dim2)}
.empty-state-ico{font-size:40px;margin-bottom:10px}
.empty-state-text{font-size:14px;font-weight:700;color:var(--snow);margin-bottom:4px}
.empty-state-sub{font-size:12px}

/* ══ RESPONSIVE ══ */
@media(min-width:768px){
  .desktop-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
  .desktop-grid .full{grid-column:1/-1}
  .hero-greeting{font-size:26px}
}
@media(max-width:767px){
  .desktop-grid .col{}
}

/* ══ CLOCK ══ */
.live-clock{font-size:13px;font-weight:700;color:var(--dim2);font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div class="app-shell" style="background:var(--bg)">

<!-- SIDEBAR -->
<aside class="sidenav">
  <div class="nav-brand">
    <div class="nav-logo">🎨</div>
    <div>
      <div class="nav-brand-name">Business2Card</div>
      <div class="nav-brand-role" id="role-badge">ERP</div>
    </div>
  </div>
  <div class="nav-scroll" id="nav-links">
    <div style="padding:20px;text-align:center;color:var(--dim2);font-size:12px">جاري التحميل...</div>
  </div>
  <div class="nav-foot">
    <div class="nav-user" onclick="doLogout()">
      <div class="nav-avatar" id="nav-av">A</div>
      <div>
        <div class="nav-user-name" id="nav-name">User</div>
        <div class="nav-user-role">تسجيل خروج</div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="content" style="padding-top:12px" id="main-content">
    <div class="loader"><div class="spinner"></div></div>
  </div>
</div>
</div>

<nav class="mob-nav"><div class="mob-nav-items">
  <a class="mob-nav-item active" href="designer-dashboard.html"><div class="mob-nav-ico">⬡</div><div class="mob-nav-lbl">لوحتي</div></a>
  <a class="mob-nav-item" href="design.html" data-page="design"><div class="mob-nav-ico">✏️</div><div class="mob-nav-lbl">التصاميم</div></a>
</div></nav>
<div class="nav-overlay" id="nav-ov" onclick="document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show')"></div>
<div class="toasts" id="toasts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, getDoc, query, where, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { initSidebar } from './sidebar-manager.js';

const FB={apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"};
const app=initializeApp(FB);
const auth=getAuth(app), db=getFirestore(app);

// ══ STATE ══
let myOrders=[], myTasks=[], myAttendance=[], myEmployee={};
let currentUser=null, userName='', uid='';
let activeTab='active', todayAtt=null;

const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const setText=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
const now=new Date();
const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const DAYS=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

function greetMsg(){
  const h=new Date().getHours();
  if(h<12)return'صباح الخير';
  if(h<17)return'مساء الخير';
  return'مساء النور';
}
function isThisMonth(ts){if(!ts?.toDate)return false;const d=ts.toDate();return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}
function todayStr(){return now.toISOString().slice(0,10);}
function monthKey(){return now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');}
function daysUntil(dl){if(!dl)return null;const d=new Date(dl);const diff=Math.ceil((d-new Date())/(864e5));return diff;}
function toast(msg,t=''){const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}
function nowStr(){return new Date().toLocaleDateString('ar-EG')+' '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});}

window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};

// ── Live Clock ──
function startClock(){
  const el=document.getElementById('live-clock');if(!el)return;
  setInterval(()=>{el.textContent=new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit',second:'2-digit'});},1000);
}

// ── AUTH ──
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  currentUser=u; uid=u.uid;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(!snap.exists()){window.location.href='login.html';return;}
  const d=snap.data();
  if(!['graphic_designer','design_operator','admin','operation_manager'].includes(d.role)){
    const home={customer_service:'cs-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'}[d.role]||'login.html';
    window.location.href=home;return;
  }
  userName=d.name||u.email;
  setText('nav-name',userName);
  document.getElementById('nav-av').textContent=userName[0].toUpperCase();

  // جيب بيانات الموظف
  onSnapshot(collection(db,'employees'),snap=>{
    const emp=snap.docs.map(d=>({...d.data(),_id:d.id})).find(e=>e.authUid===uid||e.email===u.email);
    myEmployee=emp||{baseSalary:0,commissionPct:0};
    myEmpId=emp?._id||'';  // احفظ الـ employee doc ID
  });

  // الأوردرات — query محددة للمصمم
  let myEmpId='';
  // 1. أوردرات مكلّف بيها (designerId = uid)
  onSnapshot(query(collection(db,'orders'),where('designerId','==',uid)),snap=>{
    const assigned=snap.docs.map(d=>({...d.data(),_id:d.id}));
    // 2. أوردرات stage=design بدون مصمم (متاحة للكل)
    const unassigned=(window.__allDesignOrders||[]).filter(o=>!o.designerId);
    myOrders=[...assigned,...unassigned];
    render();
  });
  // أوردرات التصميم الكلية (للـ unassigned)
  onSnapshot(query(collection(db,'orders'),where('stage','==','design')),snap=>{
    window.__allDesignOrders=snap.docs.map(d=>({...d.data(),_id:d.id}));
    const assigned=myOrders.filter(o=>o.designerId===uid||o.designerId===myEmpId);
    const unassigned=window.__allDesignOrders.filter(o=>!o.designerId);
    // دمج بدون تكرار
    const ids=new Set(assigned.map(o=>o._id));
    myOrders=[...assigned,...unassigned.filter(o=>!ids.has(o._id))];
    render();
  });

  // المهام
  onSnapshot(query(collection(db,'tasks'),where('assignedTo','==',uid)),snap=>{
    myTasks=snap.docs.map(d=>({...d.data(),_id:d.id})).filter(t=>t.status==='pending')
      .sort((a,b)=>{const p={urgent:0,normal:1,low:2};return(p[a.priority]||1)-(p[b.priority]||1);});
    render();
  });

  // الحضور
  onSnapshot(query(collection(db,'attendance'),where('employeeUid','==',uid)),snap=>{
    const atts=snap.docs.map(d=>({...d.data(),_id:d.id}));
    todayAtt=atts.find(a=>a.date===todayStr());
    myAttendance=atts;
    render();
  });
});

// ══ RENDER ══
function render(){
  const el=document.getElementById('main-content');if(!el)return;

  // حسابات
  const monthly=myOrders.filter(o=>isThisMonth(o.createdAt));
  const activeDesigns=myOrders.filter(o=>o.stage==='design');
  const printed=monthly.filter(o=>['printing','production','shipping','archived'].includes(o.stage));
  const rate=monthly.length>0?Math.round(printed.length/monthly.length*100):0;
  const commission=printed.reduce((s,o)=>s+((parseFloat(o.salePrice)||0)*(parseFloat(myEmployee.commissionPct)||0)/100),0);
  const base=parseFloat(myEmployee.baseSalary)||0;
  const totalIncome=base+commission;

  // الحضور هذا الشهر
  const presentDays=myAttendance.filter(a=>a.date?.startsWith(monthKey())).length;
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const workDays=Math.round(daysInMonth*5/7);

  // أهم مهمة الآن
  const urgentOrder=activeDesigns.sort((a,b)=>{
    const da=a.deadline?new Date(a.deadline):new Date('2099-01-01');
    const db2=b.deadline?new Date(b.deadline):new Date('2099-01-01');
    return da-db2;
  })[0];

  // حالة الحضور
  let attState='none', attText='', attDetail='', attBtnText='', attBtnClass='in';
  if(!todayAtt){
    attState='none'; attText='لم تسجّل حضورك بعد';
    attDetail='سجّل الحضور لتبدأ يومك';
    attBtnText='✅ تسجيل الحضور'; attBtnClass='in';
  } else if(!todayAtt.checkOut){
    attState='in'; attText='حاضر منذ '+todayAtt.checkInStr;
    attDetail='اضغط عند الانتهاء لتسجيل الانصراف';
    attBtnText='🔚 تسجيل الانصراف'; attBtnClass='out';
  } else {
    attState='done'; attText=todayAtt.checkInStr+' → '+todayAtt.checkOutStr;
    attDetail='✅ سجّلت '+todayAtt.hoursWorked+' ساعة اليوم';
    attBtnText='تم التسجيل'; attBtnClass='done-btn';
  }

  el.innerHTML=`
  <div class="desktop-grid">

    <!-- COL 1 -->
    <div class="col">

      <!-- HERO -->
      <div class="hero full">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="hero-greeting">${greetMsg()}، ${userName.split(' ')[0]} 👋</div>
            <div class="hero-date">${DAYS[now.getDay()]} · ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}</div>
          </div>
          <span class="live-clock" id="live-clock">—</span>
        </div>

        <!-- ATT CARD -->
        <div class="att-card ${attState==='none'?'not-in':attState==='in'?'checked-in':'done'}">
          <div>
            <div style="font-size:10px;font-weight:700;color:var(--dim2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">⏰ الحضور</div>
            <div class="att-time" style="color:${attState==='in'?'var(--g)':attState==='done'?'var(--b)':'var(--snow)'}">${attText}</div>
            <div style="font-size:11px;color:var(--dim2);margin-top:2px">${attDetail}</div>
          </div>
          <button class="att-cta ${attBtnClass}" onclick="doAtt()" ${attState==='done'?'disabled':''}>
            ${attBtnText}
          </button>
        </div>
      </div>

      <!-- PRIORITY CARD -->
      ${urgentOrder?`
      <div class="priority-card" onclick="location.href='design.html'">
        <div class="priority-label">🔥 الأهم الآن</div>
        <div class="priority-title">${urgentOrder.clientName||'—'}</div>
        <div class="priority-meta">
          ${(urgentOrder.products||[]).map(p=>p.name+'×'+p.qty).join(' · ')||urgentOrder.product||'—'}
          ${urgentOrder.deadline?` · 📅 ${urgentOrder.deadline}`:''}
        </div>
        <div style="margin-top:12px;display:flex;align-items:center;justify-content:space-between">
          ${urgentOrder.deadline&&daysUntil(urgentOrder.deadline)<0
            ?`<span style="font-size:12px;color:var(--r);font-weight:700">⚠️ متأخر ${Math.abs(daysUntil(urgentOrder.deadline))} يوم</span>`
            :urgentOrder.deadline&&daysUntil(urgentOrder.deadline)===0
            ?`<span style="font-size:12px;color:var(--y);font-weight:700">⚡ موعد التسليم اليوم</span>`
            :`<span style="font-size:12px;color:var(--dim2)">في انتظار التنفيذ</span>`}
          <span style="font-size:12px;color:var(--r);font-weight:700">افتح التصميم ←</span>
        </div>
      </div>`:`
      <div style="background:rgba(0,217,126,.06);border:1px solid rgba(0,217,126,.15);border-radius:16px;padding:20px;text-align:center;margin-bottom:14px">
        <div style="font-size:28px;margin-bottom:8px">🎉</div>
        <div style="font-size:14px;font-weight:800;color:var(--g)">لا توجد تصاميم معلقة</div>
        <div style="font-size:12px;color:var(--dim2);margin-top:4px">أنجزت كل شيء!</div>
      </div>`}

      <!-- PROGRESS -->
      <div class="progress-section">
        <div style="font-size:12px;font-weight:800;margin-bottom:14px">📊 تقدمك — ${MONTHS[now.getMonth()]}</div>
        <div class="progress-row">
          <div class="progress-label">
            <span class="progress-label-text">🎨 التصاميم</span>
            <span class="progress-label-val">${printed.length} من ${monthly.length} وصلوا للطباعة</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${rate}%;background:linear-gradient(90deg,var(--p),#c4b5fd)"></div>
          </div>
        </div>
        <div class="progress-row">
          <div class="progress-label">
            <span class="progress-label-text">⏰ الحضور</span>
            <span class="progress-label-val">${presentDays} من ${workDays} يوم عمل</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${workDays>0?Math.min(presentDays/workDays*100,100):0}%;background:linear-gradient(90deg,var(--b),#6bb5ff)"></div>
          </div>
        </div>
        <div class="progress-row">
          <div class="progress-label">
            <span class="progress-label-text">📈 نسبة النجاح</span>
            <span class="progress-label-val">${rate}% من التصاميم للطباعة</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${rate}%;background:linear-gradient(90deg,${rate>=80?'var(--g)':rate>=60?'var(--y)':'var(--r)'},${rate>=80?'#3bd68c':rate>=60?'#ffcc44':'#ff6b8a'})"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- COL 2 -->
    <div class="col">

      <!-- INCOME -->
      <div class="income-card">
        <div style="font-size:11px;color:var(--dim2);text-transform:uppercase;letter-spacing:.5px">💰 إجمالي الدخل — ${MONTHS[now.getMonth()]}</div>
        <div class="income-val">${fn(totalIncome)} <span style="font-size:16px;font-weight:400">ج</span></div>
        <div class="income-breakdown">
          <div class="income-item">مرتب <strong>${fn(base)}</strong> ج</div>
          ${commission>0?`<div class="income-item">عمولة <strong style="color:var(--p)">${fn(commission)}</strong> ج</div>`:''}
        </div>
      </div>

      <!-- KPIs ROW -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
        <div style="background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center">
          <div style="font-size:22px;font-weight:900;color:var(--b)">${activeDesigns.length}</div>
          <div style="font-size:10px;color:var(--dim2);font-weight:700;margin-top:2px">جاري</div>
        </div>
        <div style="background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center">
          <div style="font-size:22px;font-weight:900;color:var(--g)">${printed.length}</div>
          <div style="font-size:10px;color:var(--dim2);font-weight:700;margin-top:2px">طباعة ✅</div>
        </div>
        <div style="background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center">
          <div style="font-size:22px;font-weight:900;color:var(--y)">${rate}%</div>
          <div style="font-size:10px;color:var(--dim2);font-weight:700;margin-top:2px">نسبة النجاح</div>
        </div>
      </div>

      <!-- QUEUE -->
      <div>
        <div class="queue-header">
          <div class="queue-title">📋 قائمة شغلي</div>
          <div style="display:flex;gap:6px;align-items:center">
            ${myTasks.length>0?`<span class="queue-count">${myTasks.length} مهمة</span>`:''}
            <span class="queue-count">${activeDesigns.length} تصميم</span>
          </div>
        </div>

        <!-- TABS -->
        <div class="tab-bar">
          <button class="tab-item ${activeTab==='active'?'active':''}" onclick="switchTab('active')">جاري (${activeDesigns.length})</button>
          <button class="tab-item ${activeTab==='tasks'?'active':''}" onclick="switchTab('tasks')">مهام (${myTasks.length})</button>
          <button class="tab-item ${activeTab==='done'?'active':''}" onclick="switchTab('done')">مكتمل</button>
        </div>

        <div id="queue-list">
          ${renderQueue(activeDesigns,myTasks,printed,activeTab)}
        </div>
      </div>

    </div>
  </div>`;

  startClock();
}

// ══ QUEUE RENDER ══
function renderQueue(activeDesigns,myTasks,printed,tab){
  if(tab==='active'){
    const items=[...activeDesigns].sort((a,b)=>{
      const da=a.deadline?new Date(a.deadline):new Date('2099-01-01');
      const db2=b.deadline?new Date(b.deadline):new Date('2099-01-01');
      return da-db2;
    });
    if(!items.length)return`<div class="empty-state"><div class="empty-state-ico">✅</div><div class="empty-state-text">لا توجد تصاميم جارية</div><div class="empty-state-sub">استمتع بوقتك!</div></div>`;
    return items.map(o=>{
      const days=daysUntil(o.deadline);
      const isLate=days!==null&&days<0;
      const isToday=days===0;
      const urgency=isLate?'urgent':isToday?'urgent':'normal';
      const prods=(o.products||[]).map(p=>p.name+'×'+p.qty).join(' + ')||o.product||'—';
      let daysBadge='';
      if(days===null)daysBadge=`<span class="days-badge days-normal">لم يُحدد</span>`;
      else if(days<0)daysBadge=`<span class="days-badge days-late">⚠️ ${Math.abs(days)} يوم تأخير</span>`;
      else if(days===0)daysBadge=`<span class="days-badge days-today">⚡ اليوم</span>`;
      else if(days<=3)daysBadge=`<span class="days-badge days-soon">📅 ${days} أيام</span>`;
      else daysBadge=`<span class="days-badge days-normal">📅 ${days} يوم</span>`;
      return`<div class="work-card ${urgency}" onclick="location.href='design.html'">
        <div class="urgency-dot" style="background:${isLate||isToday?'var(--r)':days<=3?'var(--y)':'var(--b)'}"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:800;margin-bottom:2px">${o.clientName||'—'}</div>
          <div style="font-size:11px;color:var(--dim2)">${prods}</div>
        </div>
        ${daysBadge}
      </div>`;
    }).join('');
  }

  if(tab==='tasks'){
    if(!myTasks.length)return`<div class="empty-state"><div class="empty-state-ico">✅</div><div class="empty-state-text">لا توجد مهام معلقة</div></div>`;
    const PRI={urgent:{col:'var(--r)',lbl:'⚡'},normal:{col:'var(--b)',lbl:'📌'},low:{col:'var(--dim2)',lbl:'📎'}};
    return myTasks.map(t=>{
      const p=PRI[t.priority]||PRI.normal;
      const days=t.dueDate?daysUntil(t.dueDate):null;
      return`<div class="work-card ${t.priority}" onclick="completeTask('${t._id}')">
        <div class="urgency-dot" style="background:${p.col}"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:800;margin-bottom:2px">${t.title}</div>
          ${t.description?`<div style="font-size:11px;color:var(--dim2)">${t.description}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span style="font-size:12px">${p.lbl}</span>
          ${days!==null?`<span style="font-size:10px;color:${days<0?'var(--r)':'var(--dim2)'}">${days<0?'متأخر':days===0?'اليوم':days+' يوم'}</span>`:''}
        </div>
      </div>`;
    }).join('');
  }

  if(tab==='done'){
    const doneOrders=printed.slice(0,10);
    if(!doneOrders.length)return`<div class="empty-state"><div class="empty-state-ico">🎨</div><div class="empty-state-text">لم تكتمل تصاميم هذا الشهر بعد</div></div>`;
    return doneOrders.map(o=>{
      const prods=(o.products||[]).map(p=>p.name).join(' + ')||o.product||'—';
      return`<div class="work-card done-card">
        <div class="urgency-dot" style="background:var(--g)"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700;text-decoration:line-through;color:var(--dim2)">${o.clientName||'—'}</div>
          <div style="font-size:11px;color:var(--dim2)">${prods}</div>
        </div>
        <span style="font-size:16px">✅</span>
      </div>`;
    }).join('');
  }
  return '';
}

// ══ ACTIONS ══
window.switchTab=function(tab){
  activeTab=tab;
  const monthly=myOrders.filter(o=>isThisMonth(o.createdAt));
  const activeDesigns=myOrders.filter(o=>o.stage==='design');
  const printed=monthly.filter(o=>['printing','production','shipping','archived'].includes(o.stage));
  const el=document.getElementById('queue-list');
  if(el)el.innerHTML=renderQueue(activeDesigns,myTasks,printed,tab);
  // تحديث الـ tabs
  document.querySelectorAll('.tab-item').forEach((btn,i)=>{
    const tabs=['active','tasks','done'];
    btn.classList.toggle('active',tabs[i]===tab);
  });
};

window.doAtt=async function(){
  if(!currentUser)return;
  const today=todayStr();
  const timeStr=new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
  const btn=document.querySelector('.att-cta');if(btn)btn.disabled=true;
  try{
    if(!todayAtt){
      await addDoc(collection(db,'attendance'),{
        employeeUid:uid,employeeName:userName,date:today,
        checkIn:serverTimestamp(),checkInStr:timeStr,
        checkOut:null,hoursWorked:0,createdAt:serverTimestamp()
      });
      toast('✅ تم تسجيل الحضور — '+timeStr,'ok');
    } else if(!todayAtt.checkOut){
      const inTime=todayAtt.checkIn?.toDate?.();
      const hours=inTime?((new Date()-inTime)/(1000*60*60)).toFixed(1):0;
      await updateDoc(doc(db,'attendance',todayAtt._id),{
        checkOut:serverTimestamp(),checkOutStr:timeStr,hoursWorked:parseFloat(hours)
      });
      toast('✅ تم تسجيل الانصراف — '+hours+' ساعة','ok');
    }
  }catch(e){toast('❌ '+e.message,'err');if(btn)btn.disabled=false;}
};

window.completeTask=async function(id){
  try{
    await updateDoc(doc(db,'tasks',id),{status:'done',doneAt:serverTimestamp()});
    toast('✅ تم إنجاز المهمة','ok');
  }catch(e){toast('❌ '+e.message,'err');}
};
