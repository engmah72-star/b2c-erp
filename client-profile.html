<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Business2Card — ملف العميل</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="stylesheet" href="shared.css?v=45">
<style>
/* RULE U1 — التوكنز من shared.css. هنا تنسيق خاص بالصفحة فقط. */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-ar);background:var(--bg);color:var(--snow);
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:var(--space-xl);
  background-image:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(167,139,250,.1),transparent);}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:20px;
  padding:32px 28px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.6);margin:24px 0;}
.logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--p),var(--b));
  display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px;}
h1{font-size:var(--fs-2xl);font-weight:var(--fw-heavy);text-align:center;margin-bottom:4px;}
.sub{font-size:var(--fs-md);color:var(--dim2);text-align:center;margin-bottom:8px;line-height:1.6;}
.acct{font-size:var(--fs-sm);color:var(--dim2);text-align:center;margin-bottom:22px;}
.acct b{color:var(--snow);}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:var(--fs-base);font-weight:var(--fw-bold);color:var(--dim2);margin-bottom:6px;}
.fg .req{color:var(--r);}
.inp{width:100%;padding:11px 13px;background:var(--bg3);border:1px solid var(--line);
  border-radius:var(--rad);color:var(--snow);font-family:inherit;font-size:var(--fs-lg);outline:none;
  transition:border-color .2s;}
.inp:focus{border-color:var(--p);}
.inp:disabled,.inp[readonly]{opacity:.65;cursor:not-allowed;}
.inp::placeholder{color:var(--dim2);}
textarea.inp{resize:vertical;min-height:64px;}
.row{display:flex;gap:12px;}
.row .fg{flex:1;}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--p),var(--b));
  border:none;border-radius:var(--rad);color:#fff;font-family:inherit;font-size:15px;
  font-weight:var(--fw-extra);cursor:pointer;transition:opacity .2s;margin-top:6px;}
.btn:hover{opacity:.88;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-ghost{width:100%;padding:11px;background:var(--bg3);border:1px solid var(--line);
  border-radius:var(--rad);color:var(--snow);font-family:inherit;font-size:var(--fs-md);
  font-weight:var(--fw-bold);cursor:pointer;transition:border-color .2s;margin-top:10px;}
.btn-ghost:hover{border-color:var(--p);}
.err{background:rgba(255,61,110,.1);border:1px solid rgba(255,61,110,.3);
  border-radius:var(--rad);padding:11px 14px;font-size:var(--fs-md);color:var(--r);
  margin-top:14px;display:none;white-space:pre-line;}
.err.show{display:block;}
.ok-msg{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);
  border-radius:var(--rad);padding:11px 14px;font-size:var(--fs-md);color:var(--g,#34d399);
  margin-top:14px;display:none;white-space:pre-line;}
.ok-msg.show{display:block;}
.loader{display:none;text-align:center;color:var(--dim2);font-size:var(--fs-md);margin-top:12px;}
.loader.show{display:block;}
.logout{display:block;text-align:center;margin-top:18px;font-size:var(--fs-sm);
  color:var(--dim2);background:none;border:none;cursor:pointer;width:100%;font-family:inherit;text-decoration:underline;}
#gate{text-align:center;color:var(--dim2);padding:40px 0;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🎨</div>
  <h1>ملف العميل</h1>
  <p class="sub">أكمِل بياناتك لنبدأ خدمتك بشكل أفضل</p>
  <p class="acct" id="acct"></p>

  <div id="gate">⟳ جاري التحقق من تسجيل الدخول...</div>

  <form id="profile-form" style="display:none" onsubmit="return false">
    <div class="fg">
      <label>الاسم بالكامل <span class="req">*</span></label>
      <input class="inp" id="f-name" placeholder="محمد أحمد" autocomplete="name">
    </div>

    <div class="row">
      <div class="fg">
        <label>📱 الهاتف الأساسي <span class="req">*</span></label>
        <input class="inp" id="f-phone1" type="tel" dir="ltr" placeholder="01XXXXXXXXX" inputmode="numeric" autocomplete="tel">
      </div>
      <div class="fg">
        <label>📱 هاتف آخر</label>
        <input class="inp" id="f-phone2" type="tel" dir="ltr" placeholder="اختياري" inputmode="numeric">
      </div>
    </div>

    <div class="fg">
      <label>📧 البريد الإلكتروني</label>
      <input class="inp" id="f-email" type="email" dir="ltr" readonly>
    </div>

    <div class="row">
      <div class="fg">
        <label>المحافظة</label>
        <input class="inp" id="f-gov" placeholder="القاهرة">
      </div>
      <div class="fg">
        <label>المدينة / المنطقة</label>
        <input class="inp" id="f-city" placeholder="مدينة نصر">
      </div>
    </div>

    <div class="fg">
      <label>الوظيفة / النشاط</label>
      <input class="inp" id="f-job" placeholder="مثال: صاحب مطعم">
    </div>

    <div class="fg">
      <label>ملاحظات</label>
      <textarea class="inp" id="f-notes" placeholder="أي تفاصيل تحب نعرفها"></textarea>
    </div>

    <button type="button" class="btn" id="btn-save" onclick="saveProfile()">💾 حفظ بياناتي</button>
    <button type="button" class="btn-ghost" id="btn-orders" onclick="goToOrders()">📦 متابعة أوردراتي</button>

    <div class="loader" id="loader">⟳ جاري الحفظ...</div>
    <div class="err" id="err-msg"></div>
    <div class="ok-msg" id="ok-msg"></div>

    <button type="button" class="logout" onclick="doLogout()">تسجيل الخروج</button>
  </form>
</div>

<script type="module">
import { auth, db } from "./core/firebase-init.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, getDocs, collection, query, where, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { clientActions } from "./client-actions.js";

let currentUser = null;
let clientPhone = '';

const $ = id => document.getElementById(id);
function showErr(m){ const e=$('err-msg'); e.textContent=m; e.classList.add('show'); $('ok-msg').classList.remove('show'); }
function hideErr(){ $('err-msg').classList.remove('show'); }
function showOk(m){ const e=$('ok-msg'); e.textContent=m; e.classList.add('show'); hideErr(); }
function setLoading(on){ $('loader').classList.toggle('show', on); $('btn-save').disabled=on; $('btn-orders').disabled=on; }

// ── Auth gate ──
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.replace('client-login.html'); return; }
  currentUser = user;
  $('acct').innerHTML = 'الحساب: <b>' + (user.email || user.displayName || '') + '</b>';
  $('f-email').value = (user.email || '').toLowerCase();
  await loadExisting(user.uid);
  $('gate').style.display = 'none';
  $('profile-form').style.display = 'block';
  if (!$('f-name').value) $('f-name').focus();
});

// ── Load existing self record (clients/{uid}) ──
async function loadExisting(uid) {
  try {
    const snap = await getDoc(doc(db, 'clients', uid));
    if (snap.exists()) {
      const c = snap.data();
      $('f-name').value   = c.name || currentUser.displayName || '';
      $('f-phone1').value = c.phone1 || '';
      $('f-phone2').value = c.phone2 || '';
      $('f-gov').value    = c.governorate || c.gov || '';
      $('f-city').value   = c.city || '';
      $('f-job').value    = c.job || '';
      $('f-notes').value  = c.notes || '';
      clientPhone = c.phone1 || '';
    } else if (currentUser.displayName) {
      $('f-name').value = currentUser.displayName;
    }
  } catch (e) {
    // قبل الإنشاء قد لا تتوفر صلاحية القراءة — نبدأ بفورم فارغ
    if (currentUser.displayName) $('f-name').value = currentUser.displayName;
  }
}

// ── Save profile (via central action — H1.1) ──
window.saveProfile = async function () {
  hideErr();
  const data = {
    name:        $('f-name').value.trim(),
    phone1:      $('f-phone1').value.trim(),
    phone2:      $('f-phone2').value.trim(),
    governorate: $('f-gov').value.trim(),
    city:        $('f-city').value.trim(),
    job:         $('f-job').value.trim(),
    notes:       $('f-notes').value.trim(),
    source:      'self_registration',
  };
  setLoading(true);
  try {
    const res = await clientActions.upsertClientSelf({
      authUid:   currentUser.uid,
      authEmail: currentUser.email,
      authName:  currentUser.displayName || data.name,
      data,
    });
    if (!res.ok) { showErr((res.errors || ['تعذّر الحفظ']).join('\n')); return; }
    clientPhone = data.phone1;
    showOk('✅ تم حفظ بياناتك بنجاح.\nيمكنك الآن متابعة أوردراتك أو إغلاق الصفحة.');
  } catch (e) {
    showErr('❌ خطأ: ' + (e.message || ''));
  } finally {
    setLoading(false);
  }
};

// ── Go to my orders (match by phone → latest order → portal) ──
window.goToOrders = async function () {
  hideErr();
  const phone = (clientPhone || $('f-phone1').value).trim();
  if (!phone) { showErr('⚠️ احفظ رقم هاتفك أولاً لمتابعة الأوردرات'); return; }
  setLoading(true);
  try {
    const snap = await getDocs(query(collection(db, 'orders'), where('clientPhone', '==', phone), limit(50)));
    let orders = snap.docs.map(d => ({ ...d.data(), _id: d.id })).filter(o => !o.isDeleted);
    if (!orders.length) { showOk('ℹ️ لا توجد أوردرات مرتبطة برقمك بعد. سنتواصل معك قريباً.'); return; }
    const ts = o => (o.createdAt?.seconds ?? (o.createdAt?.toMillis ? o.createdAt.toMillis()/1000 : 0)) || 0;
    orders.sort((a,b) => ts(b) - ts(a));
    const order = orders[0];
    localStorage.setItem('clientSession', JSON.stringify({
      orderDocId: order._id,
      orderCode: order.orderId || order._id,
      phone,
      clientName: order.clientName || $('f-name').value.trim(),
      clientId: order.clientId || currentUser.uid,
      authEmail: (currentUser.email || '').toLowerCase(),
      savedAt: Date.now(),
    }));
    window.location.href = 'client-portal.html';
  } catch (e) {
    showErr('❌ تعذّر جلب الأوردرات: ' + (e.message || ''));
  } finally {
    setLoading(false);
  }
};

window.doLogout = async function () {
  try { await signOut(auth); } catch (_) {}
  window.location.replace('client-login.html');
};

['f-name','f-phone1','f-phone2'].forEach(id => $(id)?.addEventListener('input', hideErr));
</script>
</body>
</html>
