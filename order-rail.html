<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<title>Business2Card — سجل الأوردرات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://www.gstatic.com">
<link rel="dns-prefetch" href="https://firestore.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css?v=45">
<script src="theme.js?v=4"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal','IBM Plex Sans Arabic',sans-serif;background:var(--bg1,#0e0e16);color:var(--snow,#e8eaf0);min-height:100dvh}

/* ══ Top bar ══ */
.top{position:sticky;top:0;z-index:50;background:var(--bg2,#1a1a2e);border-bottom:1px solid var(--line,#2a2a3e);padding:10px 16px;display:flex;align-items:center;gap:10px}
.top h1{font-size:var(--fs-lg,17px);font-weight:800;flex:1;min-width:0}
.top-sub{font-size:var(--fs-sm,12px);color:var(--dim2,#7878a0);font-weight:600}
.top-btn{background:none;border:1px solid var(--line);color:var(--snow);border-radius:8px;padding:6px 10px;cursor:pointer;font-family:inherit;font-size:var(--fs-sm);font-weight:700;display:flex;align-items:center;gap:4px;white-space:nowrap}
.top-btn:hover{border-color:var(--p,#a78bfa);color:var(--p)}

/* ══ Content ══ */
.wrap{max-width:960px;margin:0 auto;padding:14px 12px 80px}
.rail-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.rail-count{font-size:var(--fs-sm,13px);color:var(--dim2);font-weight:700;margin-inline-start:auto}

/* ══ Railway card ══ */
.rail-card{background:var(--bg2,#1a1a2e);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px;cursor:pointer;transition:.15s}
.rail-card:hover{border-color:var(--b,#4a8ef5);transform:translateY(-1px)}
.rail-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.rail-id{font-size:11px;color:var(--dim2);font-weight:700}
.rail-client{font-size:16px;font-weight:800}
.rail-badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px}
.rail-spacer{margin-inline-start:auto}
.rail-alert{font-size:11px;font-weight:700;color:var(--r,#ff3d6e);background:rgba(255,61,110,.12);padding:3px 10px;border-radius:99px}
.rail-product{font-size:13px;color:var(--dim,#a8b4cc);margin:-6px 0 12px;display:flex;align-items:center;gap:6px}
.rail-product b{font-weight:700;color:var(--snow)}

/* ══ Railway track ══ */
.rail{position:relative;display:flex;justify-content:space-between;gap:4px;padding-top:10px;overflow-x:auto}
.rail::before{content:'';position:absolute;top:32px;right:5%;left:5%;height:3px;background:var(--line);border-radius:9px}
.station{position:relative;z-index:1;flex:1 0 auto;min-width:80px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
.st-train{position:absolute;top:-12px;font-size:15px;animation:railmove 1.8s ease-in-out infinite}
.st-dot{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-size:15px;font-weight:800;background:var(--bg3,#222236);border:2px solid var(--line);color:var(--dim2)}
.station.done .st-dot{background:rgba(0,217,126,.15);border-color:var(--g,#00d97e);color:var(--g)}
.station.current .st-dot{background:rgba(74,142,245,.18);border-color:var(--b);color:var(--b);box-shadow:0 0 0 4px rgba(74,142,245,.15)}
.station.late .st-dot{background:rgba(255,61,110,.15);border-color:var(--r);color:var(--r)}
.station.cancelled .st-dot{background:rgba(120,120,160,.12);border-style:dashed}
.st-label{font-size:11px;font-weight:700}
.st-sub{font-size:10px;color:var(--dim2);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.st-date{font-size:9px;color:var(--dim2)}
@keyframes railmove{0%,100%{transform:translateX(0)}50%{transform:translateX(-5px)}}

/* ══ Detail panel ══ */
.panel-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.2s;z-index:90}
.panel-ov.open{opacity:1;pointer-events:auto}
.panel{position:fixed;top:0;bottom:0;inset-inline-end:0;width:min(560px,94vw);background:var(--bg1);border-inline-start:1px solid var(--line);transform:translateX(100%);transition:.25s;overflow-y:auto;z-index:91;display:flex;flex-direction:column}
.panel-ov.open .panel{transform:translateX(0)}
.panel-head{position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--line);padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;z-index:2}
.panel-body{padding:16px}
.pn-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:16px}
.pn-kpi{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 6px;text-align:center}
.pn-kpi-val{font-size:16px;font-weight:800}
.pn-kpi-lbl{font-size:10px;color:var(--dim2);margin-top:2px}
.pn-sec{margin-bottom:16px}
.pn-sec-h{font-size:13px;font-weight:800;color:var(--dim2);margin-bottom:8px}
.pn-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
.pn-row:last-child{border-bottom:none}
.pn-stage{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;margin-bottom:6px}
.pn-stage-ico{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:var(--bg3);flex:none}
.pn-stage.done .pn-stage-ico{background:rgba(0,217,126,.15);color:var(--g)}
.pn-stage.current .pn-stage-ico{background:rgba(74,142,245,.18);color:var(--b)}
.pn-stage.late{border-color:var(--r)}
.pn-stage-body{flex:1;min-width:0}
.pn-stage-top{display:flex;justify-content:space-between;gap:8px;font-weight:700;font-size:13px}
.pn-stage-sub{font-size:11px;color:var(--dim2);margin-top:2px}
.close-x{background:none;border:none;color:var(--dim2);font-size:22px;cursor:pointer;padding:4px 8px;border-radius:6px;line-height:1}
.close-x:hover{color:var(--snow);background:var(--bg3)}

/* ══ Incident modal ══ */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;place-items:center}
.modal-ov.open{display:grid}
.modal-box{background:var(--bg2);border:1px solid var(--line);border-radius:14px;width:min(420px,92vw);max-height:90vh;overflow-y:auto}
.modal-h{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-b{padding:16px}
.modal-f{padding:12px 16px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--dim2);margin-bottom:4px}

/* ══ Toast ══ */
.toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:6px;align-items:center}
.toast{background:var(--bg2);border:1px solid var(--line);padding:8px 18px;border-radius:10px;font-size:13px;font-weight:600;animation:fadein .2s}
.toast.ok{border-color:var(--g);color:var(--g)}
.toast.err{border-color:var(--r);color:var(--r)}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ══ Skeleton ══ */
.skel{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:12px;min-height:120px;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:.3}}

/* ══ Empty ══ */
.empty{text-align:center;padding:60px 20px;color:var(--dim2)}
.empty-ico{font-size:48px;margin-bottom:12px}
.empty-title{font-size:18px;font-weight:800;margin-bottom:6px;color:var(--snow)}

@media(max-width:600px){
  .pn-kpis{grid-template-columns:repeat(2,1fr)}
  .station{min-width:64px}
  .st-dot{width:30px;height:30px;font-size:13px}
}
</style>
</head>
<body>

<div class="top">
  <h1>🚂 سجل الأوردرات</h1>
  <span class="top-sub" id="sub">جاري التحميل...</span>
  <button type="button" class="top-btn" id="btn-home">🏠 الرئيسية</button>
  <button type="button" class="top-btn" onclick="doLogout()">⏻</button>
</div>

<div class="wrap">
  <div class="rail-filters">
    <div class="sw"><span class="sw-ico">🔍</span><input class="inp" id="q" placeholder="بحث: اسم العميل · تليفون · رقم الأوردر · المنتج" oninput="renderList()" style="min-width:240px"></div>
    <select class="inp" id="f-stage" onchange="renderList()" style="width:150px">
      <option value="active">المراحل النشطة</option>
      <option value="all">كل المراحل</option>
      <option value="design">تصميم</option>
      <option value="printing">طباعة</option>
      <option value="production">تنفيذ</option>
      <option value="shipping">شحن</option>
      <option value="archived">أرشيف</option>
      <option value="cancelled">ملغي</option>
      <option value="late">المتأخرة فقط</option>
    </select>
    <span class="rail-count" id="count">—</span>
  </div>
  <div id="list"></div>
</div>

<!-- Detail panel -->
<div class="panel-ov" id="panel-ov" onclick="if(event.target===this)closePanel()">
  <div class="panel">
    <div class="panel-head" id="panel-head"></div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>

<!-- Incident modal -->
<div class="modal-ov" id="ov-incident">
  <div class="modal-box">
    <div class="modal-h"><span style="font-weight:800">⚠️ تسجيل إخفاق</span><button type="button" class="close-x" onclick="closeIncidentModal()">✕</button></div>
    <div class="modal-b">
      <div style="display:flex;gap:12px;margin-bottom:14px;padding:10px;background:var(--bg3);border-radius:10px;border:1px solid var(--line)">
        <div style="font-size:12px;font-weight:700;color:var(--dim2)">👤 <b style="color:var(--snow)" id="inc-emp-name">—</b></div>
        <div style="font-size:12px;font-weight:700;color:var(--dim2)">📋 <b style="color:var(--snow);direction:ltr;font-family:monospace" id="inc-order-id">—</b></div>
      </div>
      <div class="fg"><label>سبب الإخفاق *</label><select class="inp" id="inc-reason"></select></div>
      <div class="fg"><label>درجة الخطورة</label><select class="inp" id="inc-severity"><option value="low">منخفضة</option><option value="medium">متوسطة</option><option value="high">مرتفعة</option></select></div>
      <div class="fg"><label>وصف / ملاحظات</label><textarea class="inp" id="inc-desc" rows="3" placeholder="تفاصيل إضافية..."></textarea></div>
    </div>
    <div class="modal-f"><button type="button" class="btn btn-ghost" onclick="closeIncidentModal()">إلغاء</button><button type="button" class="btn btn-r" onclick="submitIncident()">⚠️ تسجيل</button></div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script type="module">
import { auth, db } from "./core/firebase-init.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { doc, getDoc, onSnapshot, collection, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { STAGES, getStageResponsibilities, getOrderDates, getOrderAlerts, productStatusBadge, fn, STAGE_OWNERSHIP } from "./orders.js";
import { ROLE_CAN_SEE_COST } from "./core/permissions-matrix.js";
import { orderActions } from "./order-actions.js";
import { ensureOrderThread } from "./inbox-actions.js";
import { addIncident } from "./employee-actions.js";
import { DEFAULT_INCIDENT_REASONS, REASON_TYPE_META } from "./core/incident-reasons.js";
import { getSettings } from './core/static-store.js';
import { dataCache, cachedQuery } from './core/data-cache.js';
import { toast } from './shared.js';
import { esc } from './core/dom-utils.js';

const $ = id => document.getElementById(id);

let orders = [], slaTable = null, currentRole = '', currentUser = null, userName = '';

const ROLE_HOME = {
  admin:'accounts.html', operation_manager:'ops-dashboard.html',
  customer_service:'cs-dashboard.html', graphic_designer:'designer-dashboard.html',
  design_operator:'designer-dashboard.html', production_agent:'production-dashboard.html',
  shipping_officer:'shipping-dashboard.html', wallet_manager:'accounts.html',
};

$('list').innerHTML = '<div class="skel"></div><div class="skel"></div><div class="skel"></div>';

function maskPh(p) {
  if (!p) return '';
  if (['admin','operation_manager','customer_service','shipping_officer'].includes(currentRole)) return p;
  const s = String(p).replace(/\D/g,'');
  return s.length >= 6 ? s.slice(0,3)+'****'+s.slice(-3) : '****';
}

onAuthStateChanged(auth, async u => {
  if (!u) { location.href = 'login.html'; return; }
  currentUser = u;
  userName = u.displayName || u.email || 'مستخدم';
  try {
    const us = await getDoc(doc(db,'users',u.uid));
    if (us.exists()) {
      const d = us.data();
      currentRole = d.role || '';
      if (d.name) userName = d.name;
    }
  } catch (_) {}

  $('btn-home').onclick = () => { location.href = ROLE_HOME[currentRole] || 'accounts.html'; };

  getSettings(data => {
    slaTable = data?.stageSla || null;
    renderList();
  });

  dataCache.subscribe(
    cachedQuery('orders').orderBy('createdAt','desc').limit(500).build(),
    (docs) => {
      orders = docs;
      $('sub').textContent = orders.length + ' أوردر';
      renderList();
    }
  );
});

function stationsFor(o) {
  const rows = getStageResponsibilities(o, slaTable);
  const od = getOrderDates(o);
  const cur = o.stage || 'design';
  const sts = [];
  const intake = rows.find(r => r.kind === 'intake') || {};
  sts.push({ico:'📝',label:'إدخال',status:intake.status==='done'?'done':'pending',name:intake.responsibleName||'',date:intake.enteredAt||'',current:false});
  for (const r of rows.filter(r => r.kind === 'stage')) {
    sts.push({ico:(STAGES[r.stage]||{}).ico||'•',label:r.label,status:r.status,late:r.overdue,current:r.isCurrent,name:r.responsibleName||'',date:r.status==='done'?(r.completedAt||r.enteredAt):(r.status==='ongoing'?r.enteredAt:'')});
  }
  sts.push({ico:'📁',label:'أرشيف',status:cur==='archived'?'done':'pending',name:'',date:od.archived?od.archived.text:'',current:cur==='archived'});
  return sts;
}

function cardHTML(o) {
  const cur = o.stage || 'design';
  const sc = STAGES[cur] || {label:cur,ico:'📋',col:'#7878a0'};
  const cancelled = cur === 'cancelled';
  const alerts = getOrderAlerts(o, slaTable);
  const sts = stationsFor(o);

  const stationsHtml = sts.map(s => {
    let cls = s.status==='done'?'done':(s.current?'current':'pending');
    if (s.late) cls += ' late';
    if (cancelled) cls += ' cancelled';
    return `<div class="station ${cls}">
      ${s.current && !cancelled ? '<div class="st-train">🚂</div>' : ''}
      <div class="st-dot">${s.status==='done'?'✓':esc(s.ico)}</div>
      <div class="st-label">${esc(s.label)}</div>
      <div class="st-sub">${s.name?'👤 '+esc(s.name):'—'}</div>
      <div class="st-date">${esc(s.date||'')}</div>
    </div>`;
  }).join('');

  const prodTxt = (o.products||[]).map(p=>`${p.name||'—'} ×${p.qty||1}`).join(' + ') || o.product || '—';

  return `<div class="rail-card" onclick="openPanel('${esc(o._id)}')">
    <div class="rail-head">
      <span class="rail-id">${esc(o.orderId||o._id.slice(-6))}</span>
      <span class="rail-client">${esc(o.clientName||'—')}</span>
      <span class="rail-badge" style="background:${sc.col}1f;color:${sc.col}">${esc(sc.ico)} ${esc(sc.label)}</span>
      <span class="rail-spacer"></span>
      ${cancelled?'<span class="rail-alert" style="color:var(--dim2);background:rgba(120,120,160,.12)">✕ ملغي</span>':''}
      ${alerts.count>0?`<span class="rail-alert">⚠️ ${alerts.currentOverdue?'متأخر: '+esc(alerts.worst):'تأخّر سابق ('+alerts.count+')'}</span>`:''}
    </div>
    <div class="rail-product">📦 <b>${esc(prodTxt)}</b></div>
    <div class="rail">${stationsHtml}</div>
  </div>`;
}

window.renderList = function() {
  const q = ($('q')?.value||'').trim().toLowerCase();
  const f = $('f-stage')?.value||'active';
  let list = orders.slice();

  if (f==='active') list = list.filter(o => !['archived','cancelled'].includes(o.stage));
  else if (f==='late') list = list.filter(o => getOrderAlerts(o,slaTable).count>0);
  else if (f!=='all') list = list.filter(o => (o.stage||'design')===f);

  if (q) list = list.filter(o => {
    const hay = [o.clientName,o.clientPhone,o.orderId,o._id,o.product,o.clientBusiness,o.job]
      .concat((o.products||[]).map(p=>p.name)).filter(Boolean).join(' ').toLowerCase();
    return hay.includes(q);
  });

  $('count').textContent = list.length+' أوردر';
  $('list').innerHTML = list.length
    ? list.map(cardHTML).join('')
    : '<div class="empty"><div class="empty-ico">🚂</div><div class="empty-title">لا توجد أوردرات</div><div>جرّب فلتر مختلف</div></div>';
};

window.openPanel = function(id) {
  const o = orders.find(x=>x._id===id);
  if (!o) return;
  renderPanel(o);
  $('panel-ov').classList.add('open');
};
window.closePanel = function() { $('panel-ov').classList.remove('open'); };
window.openOrder = function(id) { location.href = 'order.html?id='+id; };

function renderPanel(o) {
  const cur = o.stage||'design';
  const sc = STAGES[cur]||{label:cur,ico:'📋',col:'#7878a0'};
  const alerts = getOrderAlerts(o, slaTable);
  const sale = parseFloat(o.salePrice)||0;
  const paid = parseFloat(o.totalPaid)||parseFloat(o.paid)||0;
  const rem = (o.remaining!=null)?(parseFloat(o.remaining)||0):Math.max(0,sale-paid);
  const cost = (o.costItems||[]).reduce((s,c)=>s+(parseFloat(c.total)||0),0);

  $('panel-head').innerHTML = `
    <div style="min-width:0">
      <div style="font-size:11px;color:var(--dim2);font-weight:700">${esc(o.orderId||o._id.slice(-6))}</div>
      <div style="font-size:17px;font-weight:800">${esc(o.clientName||'—')}</div>
      ${o.clientPhone?`<div style="font-size:12px;color:var(--dim2);direction:ltr;text-align:start">${esc(maskPh(o.clientPhone))}</div>`:''}
      <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        <span class="rail-badge" style="background:${sc.col}1f;color:${sc.col}">${esc(sc.ico)} ${esc(sc.label)}</span>
        ${alerts.count>0?`<span class="rail-alert">⚠️ ${alerts.currentOverdue?'متأخر: '+esc(alerts.worst):'تأخّر سابق ('+alerts.count+')'}</span>`:''}
      </div>
    </div>
    <button type="button" class="close-x" onclick="closePanel()">✕</button>`;

  const showCost = ROLE_CAN_SEE_COST.has(currentRole);
  let html = `<div class="pn-kpis">
    <div class="pn-kpi"><div class="pn-kpi-val" style="color:var(--p,#a78bfa)">${fn(sale)}</div><div class="pn-kpi-lbl">💰 السعر</div></div>
    <div class="pn-kpi"><div class="pn-kpi-val" style="color:var(--g)">${fn(paid)}</div><div class="pn-kpi-lbl">✅ محصّل</div></div>
    <div class="pn-kpi"><div class="pn-kpi-val" style="color:var(--r)">${fn(rem)}</div><div class="pn-kpi-lbl">⏳ متبقّي</div></div>
    ${showCost?`<div class="pn-kpi"><div class="pn-kpi-val" style="color:var(--y)">${fn(cost)}</div><div class="pn-kpi-lbl">🏭 تكلفة</div></div>`:''}
  </div>`;

  const prods = o.products||[];
  html += `<div class="pn-sec"><div class="pn-sec-h">📦 المنتجات (${prods.length||(o.product?1:0)})</div>`;
  if (prods.length) {
    html += prods.map(p=>`<div class="pn-row"><span><b>${esc(p.name||'—')}</b> <span style="color:var(--dim2)">× ${esc(p.qty||1)}</span>${p.printType?` <span style="color:var(--dim2);font-size:11px">· ${esc(p.printType==='offset'?'أوفست':'ديجيتال')}</span>`:''}</span>${productStatusBadge(p.productStatus||p.execStatus||'pending')}</div>`).join('');
  } else {
    html += `<div class="pn-row"><span>${esc(o.product||'—')}</span></div>`;
  }
  html += `</div>`;

  const rows = getStageResponsibilities(o, slaTable);
  html += `<div class="pn-sec"><div class="pn-sec-h">⏱️ المراحل</div>`;
  rows.forEach(r => {
    const isIntake = r.kind==='intake';
    let cls = r.status==='done'?'done':(r.isCurrent?'current':'');
    if (r.overdue) cls += ' late';
    const ico = isIntake?'📝':((STAGES[r.stage]||{}).ico||'•');
    let chip = '';
    if (isIntake) chip='📝';
    else if (r.status==='pending') chip='<span style="color:var(--dim2)">—</span>';
    else if (r.rating==='late') chip='<span style="color:var(--r)">⚠️ متأخر</span>';
    else if (r.rating==='ongoing') chip='<span style="color:var(--b)">🔄 جارٍ</span>';
    else chip='<span style="color:var(--g)">✅ '+esc(r.durationText)+'</span>';
    const dates=[];
    if (r.enteredAt) dates.push('دخل: '+esc(r.enteredAt));
    if (r.completedAt&&r.status==='done') dates.push('خرج: '+esc(r.completedAt));
    if (r.deadline&&!isIntake) dates.push((r.overdue?'⚠️ ':'🎯 ')+esc(r.deadline));
    html+=`<div class="pn-stage ${cls}"><div class="pn-stage-ico">${ico}</div><div class="pn-stage-body"><div class="pn-stage-top"><span>${esc(r.label)}${r.isCurrent?' <span style="color:var(--b);font-size:10px">(الحالية)</span>':''}</span><span>${chip}</span></div><div class="pn-stage-sub">${r.responsibleName?'👤 '+esc(r.responsibleName):'غير محدد'}${dates.length?' · '+dates.join(' · '):''}</div></div></div>`;
  });
  html += `</div>`;

  const tl = [...(o.timeline||[])].slice(-12).reverse();
  if (tl.length) {
    html += `<div class="pn-sec"><div class="pn-sec-h">🗒 السجل (${(o.timeline||[]).length})</div>`;
    html += tl.map(t=>`<div class="pn-row"><span style="flex:1">${esc(t.action||'—')}</span><span style="color:var(--dim2);font-size:11px;white-space:nowrap">${esc(t.by||'')}${t.by&&t.date?' · ':''}${esc(t.date||'')}</span></div>`).join('');
    html += `</div>`;
  }

  const stageOwner = STAGE_OWNERSHIP[cur];
  const empId = stageOwner?(o[stageOwner]||''):'';
  const empNameMap = {designerId:'designerName',printerId:'printerName',productionAgent:'productionAgentName',shippingOfficerId:'shippingOfficerName'};
  const empName = stageOwner?(o[empNameMap[stageOwner]]||''):'';
  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)">
    <button type="button" class="btn btn-ghost" style="flex:1" onclick="quickConversation('${esc(o._id)}')">💬 محادثة</button>
    <button type="button" class="btn btn-ghost" style="flex:1" onclick="quickNote('${esc(o._id)}')">📝 ملاحظة</button>
    ${empId?`<button type="button" class="btn btn-ghost" style="flex:1;color:var(--r)" onclick="quickIncident('${esc(o._id)}','${esc(empId)}','${esc(empName)}','${esc(o.clientName||'')}')">⚠️ إخفاق</button>`:''}
  </div>`;
  html += `<button type="button" class="btn btn-b w-full" style="margin-top:6px" onclick="openOrder('${esc(o._id)}')">↗ فتح صفحة الأوردر</button>`;

  $('panel-body').innerHTML = html;
}


window.quickConversation = async function(id) {
  const o = orders.find(x=>x._id===id);
  if (!o) return toast('لم يتم العثور على الأوردر','err');
  try {
    toast('جاري فتح المحادثة...','');
    await ensureOrderThread({db,order:o,currentUserId:currentUser?.uid||'',extraParticipants:[]});
    location.href = 'inbox.html?conv='+encodeURIComponent('order_'+id);
  } catch(e) { toast('خطأ: '+(e.message||''),'err'); }
};

window.quickNote = async function(id) {
  const note = prompt('أضف ملاحظة على الأوردر:','');
  if (note===null) return;
  if (!note.trim()) return toast('الملاحظة فارغة','err');
  try {
    const r = await orderActions.updateOrderNotes({db,orderId:id,notes:note.trim(),userId:currentUser?.uid||'',userName});
    if (!r.ok) return toast((r.errors||[]).join(' · ')||'فشل الحفظ','err');
    toast('تم حفظ الملاحظة','ok');
  } catch(e) { toast('خطأ: '+(e.message||''),'err'); }
};

let _incCtx = null;
window.quickIncident = function(orderId,empId,empName,clientName) {
  _incCtx = {orderId,empId,empName,clientName};
  $('inc-emp-name').textContent = empName||'—';
  $('inc-order-id').textContent = orderId?.slice(-8)||'';
  const sel = $('inc-reason');
  if (sel) {
    const grouped={};
    DEFAULT_INCIDENT_REASONS.forEach(r=>{const g=REASON_TYPE_META[r.type]?.lbl||r.type;if(!grouped[g])grouped[g]=[];grouped[g].push(r);});
    sel.innerHTML='<option value="">— اختر السبب —</option>'+Object.entries(grouped).map(([g,items])=>'<optgroup label="'+esc(g)+'">'+items.map(r=>'<option value="'+esc(r.code)+'">'+esc(r.label)+'</option>').join('')+'</optgroup>').join('');
  }
  $('inc-severity').value='low';
  $('inc-desc').value='';
  $('ov-incident').classList.add('open');
};
window.closeIncidentModal = function(){ $('ov-incident')?.classList.remove('open'); _incCtx=null; };
window.submitIncident = async function() {
  if (!_incCtx) return;
  const reasonCode=$('inc-reason')?.value||'';
  const severity=$('inc-severity')?.value||'low';
  const desc=$('inc-desc')?.value?.trim()||'';
  if (!reasonCode) return toast('اختر سبب الإخفاق','err');
  const reason = DEFAULT_INCIDENT_REASONS.find(r=>r.code===reasonCode);
  const typeMeta = reason?REASON_TYPE_META[reason.type]:null;
  try {
    const r = await addIncident({
      db,employeeId:_incCtx.empId,employeeName:_incCtx.empName,
      authUid:currentUser?.uid||'',date:new Date().toISOString().slice(0,10),
      type:reason?.type||'other',severity,reasonCode,reasonLabel:reason?.label||reasonCode,
      title:(typeMeta?.lbl||'إخفاق')+' — أوردر '+(_incCtx.orderId?.slice(-8)||''),
      description:desc,orderId:_incCtx.orderId,clientName:_incCtx.clientName||'',
      userId:currentUser?.uid||'',userName,
    });
    if (!r.ok) return toast((r.errors||[]).join(' · ')||'فشل التسجيل','err');
    toast('تم تسجيل الإخفاق'+(r.escalated?' ⚠️ تصعيد':''),'ok');
    closeIncidentModal();
  } catch(e) { toast('خطأ: '+(e.message||''),'err'); }
};

window.doLogout = async function() {
  try { await signOut(auth); } catch(_) {}
  location.href = 'login.html';
};
</script>
