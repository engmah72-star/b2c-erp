<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f1b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="B2C ERP">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<title>Business2Card — أوامر التشغيل</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="sync-monitor.js"></script>
<script type="module" src="inbox-badge.js"></script>
<style>
/* ── JOB CARD ── */
.jc{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:16px;transition:var(--trans);position:relative;overflow:hidden;cursor:pointer;border-right:3px solid var(--jc-color,var(--b));}
.jc:hover{border-color:var(--jc-color,var(--b));transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,.35);}
.jc:active{transform:translateY(0) scale(.99);}
.jc-ref{font-size:10px;font-weight:800;color:var(--dim2);letter-spacing:.5px;margin-bottom:4px;}
.jc-client{font-size:15px;font-weight:900;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.jc-product{font-size:12px;color:var(--dim2);margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.jc-due{font-size:11px;color:var(--dim2);display:flex;align-items:center;gap:4px;margin-bottom:12px;}
.jc-due.overdue{color:var(--r);}

/* Priority badges */
.pri-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800;white-space:nowrap;}
.pri-urgent{background:rgba(240,54,96,.15);color:var(--r);}
.pri-high{background:rgba(240,160,32,.15);color:var(--y);}
.pri-normal{background:rgba(0,200,122,.15);color:var(--g);}
.pri-low{background:rgba(100,114,152,.15);color:var(--dim2);}

/* Status badges */
.jstatus{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:800;}
.jstatus::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.js-new{background:rgba(139,122,248,.15);color:var(--p);}
.js-inprog{background:rgba(74,142,245,.15);color:var(--b);}
.js-done{background:rgba(0,200,122,.15);color:var(--g);}
.js-hold{background:rgba(240,160,32,.15);color:var(--y);}

/* Stage progress bar */
.stage-bar{display:flex;gap:4px;align-items:center;margin:10px 0;}
.stage-dot{flex:1;height:6px;border-radius:3px;position:relative;transition:var(--trans);}
.stage-dot.sd-pending{background:var(--bg4);}
.stage-dot.sd-inprog{background:var(--b);animation:pulse-stage 1.5s ease-in-out infinite;}
.stage-dot.sd-done{background:var(--g);}
.stage-dot.sd-skipped{background:var(--y);opacity:.6;}
@keyframes pulse-stage{0%,100%{opacity:1;}50%{opacity:.6;}}

/* Stage pill labels */
.stage-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;}
.stage-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.sp-pending{background:rgba(78,86,114,.15);color:var(--dim2);}
.sp-inprog{background:rgba(74,142,245,.15);color:var(--b);}
.sp-done{background:rgba(0,200,122,.15);color:var(--g);}
.sp-skipped{background:rgba(240,160,32,.12);color:var(--y);}

/* Jobs grid */
.jobs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}

/* Detail Modal — timeline */
.stage-timeline{display:flex;flex-direction:column;gap:0;}
.stage-item{display:flex;gap:0;position:relative;}
.stage-item:not(:last-child)::after{content:'';position:absolute;right:19px;top:42px;width:2px;bottom:-4px;background:var(--line);z-index:0;}
.stage-icon-wrap{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:2px solid var(--line);background:var(--bg3);position:relative;z-index:1;}
.si-pending .stage-icon-wrap{border-color:var(--line);background:var(--bg3);opacity:.6;}
.si-inprog .stage-icon-wrap{border-color:var(--b);background:rgba(74,142,245,.12);box-shadow:0 0 0 4px rgba(74,142,245,.1);}
.si-done .stage-icon-wrap{border-color:var(--g);background:rgba(0,200,122,.12);}
.si-skipped .stage-icon-wrap{border-color:var(--y);background:rgba(240,160,32,.1);}
.stage-content{flex:1;padding:0 0 20px 0;margin-right:12px;}
.stage-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;padding-top:8px;}
.stage-name{font-size:14px;font-weight:800;}
.stage-detail{background:var(--bg3);border-radius:var(--rad);padding:12px;margin-top:6px;border:1px solid var(--line);}
.stage-meta-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--dim2);margin-bottom:4px;}
.stage-meta-row:last-child{margin-bottom:0;}

/* Stage action buttons */
.stage-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.sa-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--rad);border:1px solid var(--line);background:var(--bg3);color:var(--dim2);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:var(--trans);}
.sa-btn:hover{border-color:var(--b);color:var(--b);background:rgba(74,142,245,.08);}
.sa-btn.sa-start{border-color:rgba(74,142,245,.4);color:var(--b);background:rgba(74,142,245,.08);}
.sa-btn.sa-start:hover{background:rgba(74,142,245,.18);}
.sa-btn.sa-done{border-color:rgba(0,200,122,.4);color:var(--g);background:rgba(0,200,122,.08);}
.sa-btn.sa-done:hover{background:rgba(0,200,122,.18);}
.sa-btn.sa-skip{border-color:rgba(240,160,32,.3);color:var(--y);background:rgba(240,160,32,.08);}
.sa-btn.sa-skip:hover{background:rgba(240,160,32,.18);}
.sa-btn.sa-undo{border-color:rgba(240,54,96,.3);color:var(--r);background:rgba(240,54,96,.06);}

/* Inline mini-form */
.stage-mini-form{background:var(--bg4);border-radius:var(--rad);padding:12px;margin-top:8px;border:1px solid var(--line);display:none;animation:fadeUp .2s ease;}
.stage-mini-form.open{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* Delay indicator */
.delay-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;background:rgba(240,54,96,.12);color:var(--r);font-size:10px;font-weight:800;}

/* Filter tabs */
.filter-tabs{display:flex;gap:4px;background:var(--bg3);border-radius:var(--rad2);padding:4px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;}
.filter-tabs::-webkit-scrollbar{display:none;}
.ftab-btn{padding:8px 18px;border-radius:var(--rad);border:none;background:transparent;color:var(--dim2);cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;transition:var(--trans);white-space:nowrap;flex-shrink:0;}
.ftab-btn.on{background:var(--bg2);color:var(--snow);box-shadow:0 2px 10px rgba(0,0,0,.3);}
.ftab-btn .count{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--bg4);font-size:10px;font-weight:800;margin-right:5px;}
.ftab-btn.on .count{background:rgba(74,142,245,.2);color:var(--b);}

/* Stats row */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:18px;}

/* Skeleton */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,var(--bg2) 0%,var(--bg3) 50%,var(--bg2) 100%);background-size:200% 100%;animation:shimmer 1.5s linear infinite;border-radius:var(--rad);}

/* Progress ring in job header */
.job-progress{font-size:11px;font-weight:800;color:var(--dim2);display:flex;align-items:center;gap:5px;}
.jp-bar-wrap{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;min-width:50px;}
.jp-bar-fill{height:100%;background:linear-gradient(90deg,var(--b),var(--g));border-radius:2px;transition:width .5s;}

/* Cost chip */
.cost-chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;background:rgba(240,160,32,.1);color:var(--y);font-size:10px;font-weight:800;}

/* Modal full detail */
.jd-section{padding:16px 20px;border-bottom:1px solid var(--line);}
.jd-section:last-child{border-bottom:none;}
.jd-sec-title{font-size:10px;font-weight:800;color:var(--dim2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}

/* Add modal order select card */
.ord-pick-card{background:var(--bg3);border:1.5px solid var(--line);border-radius:var(--rad);padding:11px 14px;cursor:pointer;transition:var(--trans);margin-bottom:6px;}
.ord-pick-card:hover{border-color:var(--b);}
.ord-pick-card.selected{border-color:var(--b);background:rgba(74,142,245,.08);}
.ord-pick-ref{font-size:10px;font-weight:700;color:var(--b);margin-bottom:2px;}
.ord-pick-client{font-size:13px;font-weight:800;}
.ord-pick-product{font-size:11px;color:var(--dim2);}

/* Search box in add modal */
.mod-search{position:relative;margin-bottom:10px;}
.mod-search input{width:100%;padding:9px 36px 9px 12px;border-radius:var(--rad);border:1px solid var(--line);background:var(--bg3);color:var(--snow);font-size:13px;font-family:inherit;outline:none;}
.mod-search input:focus{border-color:var(--b);}
.mod-search .si{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--dim2);font-size:14px;pointer-events:none;}
.ord-pick-list{max-height:260px;overflow-y:auto;border:1px solid var(--line);border-radius:var(--rad);padding:6px;}

/* Route option */
.route-opt{padding:10px 12px;border-radius:var(--rad);border:1.5px solid var(--line);background:var(--bg3);cursor:pointer;margin-bottom:6px;transition:var(--trans);}
.route-opt:hover{border-color:var(--b);}
.route-opt.selected{border-color:var(--b);background:rgba(74,142,245,.08);}
.route-opt-name{font-size:13px;font-weight:800;}
.route-opt-stages{font-size:11px;color:var(--dim2);margin-top:3px;}

@media(max-width:768px){
  .jobs-grid{grid-template-columns:1fr;}
  .modal{border-radius:18px 18px 0 0;max-height:93vh;}
  .overlay{align-items:flex-end;padding:0;}
}
</style>
</head>
<body>
<div class="app-shell">

<aside class="sidenav">
  <div class="nav-brand">
    <div class="nav-logo">🎨</div>
    <div>
      <div class="nav-brand-name">Business2Card</div>
      <div class="nav-brand-role" id="role-badge">ERP</div>
    </div>
  </div>
  <div class="nav-scroll" id="nav-scroll-dynamic">
    <div style="padding:20px;text-align:center;color:var(--dim2)">⏳</div>
  </div>
  <div class="nav-foot">
    <div class="nav-user" onclick="doLogout()">
      <div class="nav-avatar" id="nav-av">J</div>
      <div>
        <div class="nav-user-name" id="nav-name">User</div>
        <div class="nav-user-role">تسجيل خروج</div>
      </div>
    </div>
  </div>
</aside>
<div class="nav-ov" id="nav-ov" onclick="closeNav()"></div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div>
        <h1>⚙️ أوامر التشغيل</h1>
        <p id="sub-title" style="font-size:12px;color:var(--dim2)">جاري التحميل...</p>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-b" onclick="openAddJob()">＋ أمر تشغيل</button>
    </div>
  </div>

  <div class="content">
    <!-- KPI row -->
    <div class="kpi-row" id="kpi-row">
      <div class="stat" style="--sc:var(--b)"><div class="stat-icon">⚙️</div><div class="stat-val" id="k-total">—</div><div class="stat-lbl">إجمالي الأوامر</div></div>
      <div class="stat" style="--sc:var(--y)"><div class="stat-icon">▶</div><div class="stat-val" id="k-inprog">—</div><div class="stat-lbl">جاري التنفيذ</div></div>
      <div class="stat" style="--sc:var(--r)"><div class="stat-icon">🔥</div><div class="stat-val" id="k-urgent">—</div><div class="stat-lbl">عاجل</div></div>
      <div class="stat" style="--sc:var(--g)"><div class="stat-icon">✅</div><div class="stat-val" id="k-done">—</div><div class="stat-lbl">منتهية</div></div>
      <div class="stat" style="--sc:var(--r)"><div class="stat-icon">⚠️</div><div class="stat-val" id="k-overdue">—</div><div class="stat-lbl">متأخرة</div></div>
    </div>

    <!-- Filter tabs -->
    <div class="filter-tabs" id="filter-tabs">
      <button class="ftab-btn on" data-f="all" onclick="setFilter('all',this)">الكل <span class="count" id="cnt-all">0</span></button>
      <button class="ftab-btn" data-f="in-progress" onclick="setFilter('in-progress',this)">جاري <span class="count" id="cnt-inprog">0</span></button>
      <button class="ftab-btn" data-f="urgent" onclick="setFilter('urgent',this)">عاجل <span class="count" id="cnt-urgent">0</span></button>
      <button class="ftab-btn" data-f="new" onclick="setFilter('new',this)">جديد <span class="count" id="cnt-new">0</span></button>
      <button class="ftab-btn" data-f="on-hold" onclick="setFilter('on-hold',this)">موقوف <span class="count" id="cnt-hold">0</span></button>
      <button class="ftab-btn" data-f="done" onclick="setFilter('done',this)">منتهي <span class="count" id="cnt-done">0</span></button>
    </div>

    <!-- Search -->
    <div class="filters" style="margin-bottom:16px">
      <div class="sw" style="flex:1;min-width:200px">
        <span class="sw-ico">🔍</span>
        <input class="inp" id="search-inp" placeholder="بحث باسم العميل أو رقم الأمر…" oninput="renderJobs()">
      </div>
      <select class="inp" id="priority-filter" onchange="renderJobs()" style="max-width:160px">
        <option value="">كل الأولويات</option>
        <option value="urgent">عاجل</option>
        <option value="high">عالي</option>
        <option value="normal">عادي</option>
        <option value="low">منخفض</option>
      </select>
    </div>

    <!-- Jobs grid -->
    <div class="jobs-grid" id="jobs-grid">
      <div style="grid-column:1/-1" class="loader"><div class="spinner"></div></div>
    </div>
    <div id="empty-state" class="empty" style="display:none">
      <div class="empty-icon">⚙️</div>
      <div class="empty-text">لا توجد أوامر تشغيل</div>
      <div class="empty-sub">أضف أمر تشغيل جديد لمتابعة مراحل الإنتاج</div>
    </div>
  </div>
</div>
</div>

<!-- TOAST -->
<div class="toasts" id="toasts"></div>

<!-- ══════════════════════════════════════
     MODAL: Detail
═══════════════════════════════════════ -->
<div class="overlay" id="ov-detail" onclick="handleOverlayClick(event,'ov-detail')">
  <div class="modal" style="max-width:600px" onclick="event.stopPropagation()">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="d-title">تفاصيل أمر التشغيل</div>
        <div style="font-size:11px;color:var(--dim2);margin-top:2px" id="d-subtitle"></div>
      </div>
      <button class="modal-x" onclick="closeModal('ov-detail')">✕</button>
    </div>
    <div class="modal-body" id="d-body" style="padding:0;">
      <!-- filled by JS -->
    </div>
    <div class="modal-foot" id="d-foot">
      <select class="inp" id="d-status-sel" onchange="changeJobStatus()" style="max-width:170px">
        <option value="new">جديد</option>
        <option value="in-progress">جاري</option>
        <option value="on-hold">موقوف</option>
        <option value="done">منتهي</option>
      </select>
      <button class="btn btn-ghost" onclick="closeModal('ov-detail')">إغلاق</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     MODAL: Add Job Order
═══════════════════════════════════════ -->
<div class="overlay" id="ov-add" onclick="handleOverlayClick(event,'ov-add')">
  <div class="modal" style="max-width:540px" onclick="event.stopPropagation()">
    <div class="modal-head">
      <span class="modal-title">＋ أمر تشغيل جديد</span>
      <button class="modal-x" onclick="closeModal('ov-add')">✕</button>
    </div>
    <div class="modal-body">
      <!-- Step 1: pick order or manual -->
      <div id="add-step-1">
        <div class="fg">
          <label>نوع الإدخال</label>
          <div style="display:flex;gap:8px">
            <button class="btn btn-b btn-sm" id="mode-ord-btn" onclick="setAddMode('order')" style="flex:1">من أوردر موجود</button>
            <button class="btn btn-ghost btn-sm" id="mode-man-btn" onclick="setAddMode('manual')" style="flex:1">إدخال يدوي</button>
          </div>
        </div>

        <!-- From order -->
        <div id="from-order-block">
          <div class="mod-search">
            <span class="si">🔍</span>
            <input id="ord-search" placeholder="بحث بالأوردر أو العميل..." oninput="filterOrderPicks()">
          </div>
          <div class="ord-pick-list" id="ord-pick-list">
            <div class="loader"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Manual -->
        <div id="manual-block" style="display:none">
          <div class="g2">
            <div class="fg"><label>رقم الأمر (يدوي)</label><input class="inp" id="m-ref" placeholder="JO-001"></div>
            <div class="fg"><label>اسم العميل</label><input class="inp" id="m-client" placeholder="اسم العميل"></div>
          </div>
          <div class="fg"><label>المنتج / الطلب</label><input class="inp" id="m-product" placeholder="كارت أوفست × 1000"></div>
          <div class="fg">
            <label>التكلفة الإجمالية</label>
            <input class="inp" id="m-cost" type="number" placeholder="0" min="0">
          </div>
        </div>
      </div>

      <!-- Step 2: Route + dates -->
      <div class="divider"><div class="div-line"></div><div class="div-text">مسار الإنتاج</div><div class="div-line"></div></div>

      <div class="fg">
        <label>اختر مسار الإنتاج</label>
        <div id="route-list" style="max-height:220px;overflow-y:auto;">
          <div class="loader"><div class="spinner"></div></div>
        </div>
      </div>

      <div class="g2">
        <div class="fg"><label>تاريخ التسليم</label><input class="inp" id="add-due" type="date"></div>
        <div class="fg">
          <label>الأولوية</label>
          <select class="inp" id="add-priority">
            <option value="urgent">🔴 عاجل</option>
            <option value="high">🟡 عالي</option>
            <option value="normal" selected>🟢 عادي</option>
            <option value="low">⚪ منخفض</option>
          </select>
        </div>
      </div>
      <div class="fg"><label>ملاحظات</label><textarea class="inp" id="add-notes" placeholder="ملاحظات إضافية..." rows="2"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('ov-add')">إلغاء</button>
      <button class="btn btn-b" id="add-save-btn" onclick="createJob()">＋ إنشاء الأمر</button>
    </div>
  </div>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getAuth,onAuthStateChanged,signOut} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {getFirestore,collection,doc,addDoc,updateDoc,onSnapshot,query,where,serverTimestamp,getDoc,getDocs,orderBy} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const auth=getAuth(app);

// ── Helpers ──
function toast(msg,type='ok'){const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;document.getElementById('toasts').appendChild(t);setTimeout(()=>t.remove(),3200);}
function fmt(n){return new Intl.NumberFormat('ar-EG').format(n||0);}
function fmtDate(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('ar-EG',{year:'numeric',month:'short',day:'numeric'});}catch{return d;}}
function isOverdue(job){if(!job.dueDate||job.status==='done')return false;return new Date(job.dueDate)<new Date();}
function stageClass(status){return{pending:'sd-pending','in-progress':'sd-inprog',done:'sd-done',skipped:'sd-skipped'}[status]||'sd-pending';}
function stagePillClass(status){return{pending:'sp-pending','in-progress':'sp-inprog',done:'sp-done',skipped:'sp-skipped'}[status]||'sp-pending';}
function stageLabel(status){return{pending:'معلق','in-progress':'جاري',done:'منتهي',skipped:'متخطى'}[status]||status;}
function priorityBadge(p){const m={urgent:{cls:'pri-urgent',lbl:'🔴 عاجل'},high:{cls:'pri-high',lbl:'🟡 عالي'},normal:{cls:'pri-normal',lbl:'🟢 عادي'},low:{cls:'pri-low',lbl:'⚪ منخفض'}};const x=m[p]||m.normal;return`<span class="pri-badge ${x.cls}">${x.lbl}</span>`;}
function statusBadge(s){const m={new:{cls:'js-new',lbl:'جديد'},'in-progress':{cls:'js-inprog',lbl:'جاري'},'done':{cls:'js-done',lbl:'منتهي'},'on-hold':{cls:'js-hold',lbl:'موقوف'}};const x=m[s]||m.new;return`<span class="jstatus ${x.cls}">${x.lbl}</span>`;}
function jobColor(j){if(j.priority==='urgent')return'var(--r)';if(j.status==='done')return'var(--g)';if(j.status==='on-hold')return'var(--y)';if(j.status==='in-progress')return'var(--b)';return'var(--dim)';}
function calcProgress(stages){if(!stages?.length)return{done:0,total:0,pct:0};const total=stages.filter(s=>s.status!=='skipped').length;const done=stages.filter(s=>s.status==='done').length;return{done,total,pct:total?Math.round(done/total*100):0};}

// ── Load Everything ──
function loadAll(){
  // Job orders realtime
  const q=query(collection(db,'job_orders'),where('isDeleted','==',false),orderBy('createdAt','desc'));
  onSnapshot(q,snap=>{
    jobs=snap.docs.map(d=>({_id:d.id,...d.data()}));
    updateKPIs();
    updateCounts();
    renderJobs();
  },err=>{console.error(err);toast('خطأ في تحميل الأوامر','err');});

  // Suppliers realtime
  onSnapshot(query(collection(db,'suppliers_v2'),where('isActive','!=',false)),snap=>{
    suppliers=snap.docs.map(d=>({_id:d.id,...d.data()}));
  });

  // Production orders (for add modal)
  onSnapshot(query(collection(db,'orders'),where('stage','==','production')),snap=>{
    prodOrders=snap.docs.map(d=>({_id:d.id,...d.data()}));
  });

  // Routes
  getDoc(doc(db,'master_lists','print_routes')).then(snap=>{
    if(snap.exists()){routes=snap.data().routes||[];}
    renderRouteList();
  }).catch(()=>{
    // fallback default routes
    routes=[
      {id:'card-offset',name:'كارت شخصي أوفست',stages:[{id:'design',name:'تصميم',icon:'✏️',order:1},{id:'plates',name:'الزنكات',icon:'🔵',order:2},{id:'paper',name:'الورق',icon:'📄',order:3},{id:'print',name:'الطباعة',icon:'🖨️',order:4},{id:'cut',name:'القص',icon:'✂️',order:5},{id:'finish',name:'التشطيبات',icon:'✨',order:6},{id:'delivery',name:'التسليم',icon:'📦',order:7}]},
      {id:'banner',name:'بانر لارج فورمات',stages:[{id:'design',name:'تصميم',icon:'✏️',order:1},{id:'print',name:'الطباعة',icon:'🖨️',order:2},{id:'finish',name:'التشطيبات',icon:'✨',order:3},{id:'delivery',name:'التسليم',icon:'📦',order:4}]},
      {id:'folder',name:'ملف كرتوني',stages:[{id:'design',name:'تصميم',icon:'✏️',order:1},{id:'plates',name:'الزنكات',icon:'🔵',order:2},{id:'paper',name:'الورق',icon:'📄',order:3},{id:'print',name:'الطباعة',icon:'🖨️',order:4},{id:'cut',name:'القص',icon:'✂️',order:5},{id:'fold',name:'الثني',icon:'📐',order:6},{id:'glue',name:'اللصق',icon:'🔧',order:7},{id:'delivery',name:'التسليم',icon:'📦',order:8}]},
      {id:'sticker',name:'ستيكر',stages:[{id:'design',name:'تصميم',icon:'✏️',order:1},{id:'print',name:'الطباعة',icon:'🖨️',order:2},{id:'cut',name:'القص',icon:'✂️',order:3},{id:'delivery',name:'التسليم',icon:'📦',order:4}]},
    ];
    renderRouteList();
  });
}

// ── KPI ──
function updateKPIs(){
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('k-total').textContent=jobs.length;
  document.getElementById('k-inprog').textContent=jobs.filter(j=>j.status==='in-progress').length;
  document.getElementById('k-urgent').textContent=jobs.filter(j=>j.priority==='urgent').length;
  document.getElementById('k-done').textContent=jobs.filter(j=>j.status==='done').length;
  document.getElementById('k-overdue').textContent=jobs.filter(j=>isOverdue(j)).length;
}

function updateCounts(){
  document.getElementById('cnt-all').textContent=jobs.length;
  document.getElementById('cnt-inprog').textContent=jobs.filter(j=>j.status==='in-progress').length;
  document.getElementById('cnt-urgent').textContent=jobs.filter(j=>j.priority==='urgent').length;
  document.getElementById('cnt-new').textContent=jobs.filter(j=>j.status==='new').length;
  document.getElementById('cnt-hold').textContent=jobs.filter(j=>j.status==='on-hold').length;
  document.getElementById('cnt-done').textContent=jobs.filter(j=>j.status==='done').length;
  document.getElementById('sub-title').textContent=`${jobs.length} أمر تشغيل`;
}

// ── Filter ──
window.setFilter=(f,btn)=>{
  currentFilter=f;
  document.querySelectorAll('.ftab-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderJobs();
};

function getFiltered(){
  let list=[...jobs];
  const q=document.getElementById('search-inp').value.trim().toLowerCase();
  const pri=document.getElementById('priority-filter').value;
  if(q)list=list.filter(j=>(j.clientName||'').toLowerCase().includes(q)||(j.orderRef||'').toLowerCase().includes(q)||(j.productName||'').toLowerCase().includes(q));
  if(pri)list=list.filter(j=>j.priority===pri);
  if(currentFilter==='urgent')list=list.filter(j=>j.priority==='urgent');
  else if(currentFilter!=='all')list=list.filter(j=>j.status===currentFilter);
  return list;
}

// ── Render Cards ──
window.renderJobs=()=>{
  const list=getFiltered();
  const grid=document.getElementById('jobs-grid');
  const empty=document.getElementById('empty-state');
  if(!list.length){grid.innerHTML='';empty.style.display='flex';return;}
  empty.style.display='none';
  grid.innerHTML=list.map(j=>renderJobCard(j)).join('');
};

function renderJobCard(j){
  const stages=j.stages||[];
  const prog=calcProgress(stages);
  const color=jobColor(j);
  const overdue=isOverdue(j);
  const stageBar=stages.map(s=>`<div class="stage-dot ${stageClass(s.status)}" title="${s.name}: ${stageLabel(s.status)}"></div>`).join('');
  const currentStage=stages.find(s=>s.status==='in-progress')||stages.find(s=>s.status==='pending');
  return`<div class="jc" style="--jc-color:${color}" onclick="openDetail('${j._id}')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px">
      <div style="min-width:0;flex:1">
        <div class="jc-ref">⚙️ ${j.orderRef||'—'}</div>
        <div class="jc-client">${j.clientName||'عميل غير محدد'}</div>
        <div class="jc-product">${j.productName||'منتج غير محدد'}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">
        ${priorityBadge(j.priority||'normal')}
        ${statusBadge(j.status||'new')}
      </div>
    </div>
    ${j.dueDate?`<div class="jc-due ${overdue?'overdue':''}">📅 ${overdue?'⚠️ ':''}${fmtDate(j.dueDate)}${overdue?' — متأخر':''}</div>`:''}
    <!-- Stage bar -->
    <div class="stage-bar">${stageBar}</div>
    <!-- Progress -->
    <div class="job-progress" style="margin-bottom:10px">
      <span>${prog.done}/${prog.total}</span>
      <div class="jp-bar-wrap"><div class="jp-bar-fill" style="width:${prog.pct}%"></div></div>
      <span>${prog.pct}%</span>
    </div>
    ${currentStage&&currentStage.status!=='done'?`<div style="font-size:11px;color:var(--dim2)">📍 الآن: <span style="color:var(--snow);font-weight:700">${currentStage.icon||''} ${currentStage.name}</span></div>`:''}
    ${j.totalCost?`<div style="margin-top:8px"><span class="cost-chip">💰 ${fmt(j.totalCost)} ج</span></div>`:''}
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--line);display:flex;justify-content:flex-end">
      <button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();openDetail('${j._id}')">📋 تفاصيل</button>
    </div>
  </div>`;
}

  document.getElementById('d-title').textContent=`${j.orderRef||'أمر تشغيل'} — ${j.clientName||''}`;
  document.getElementById('d-subtitle').textContent=j.productName||'';
  document.getElementById('d-status-sel').value=j.status||'new';
  renderDetailBody(j);
  document.getElementById('ov-detail').classList.add('open');
};

        <div style="font-size:10px;color:var(--dim2);margin-bottom:3px">التقدم</div>

        <div class="stage-header">

            <div class="stage-name">${stage.name}</div>

window.toggleMiniForm=(id)=>{
  const el=document.getElementById(id);
  if(el)el.classList.toggle('open');
};

window.saveMiniForm=async(jobId,idx)=>{
  const j=jobs.find(x=>x._id===jobId);
  if(!j)return;
  const stages=[...j.stages];
  const supSel=document.getElementById(`mf-sup-${idx}`);
  const sup=suppliers.find(s=>s._id===supSel.value);
  stages[idx]={...stages[idx],
    assignedTo:document.getElementById(`mf-assigned-${idx}`).value.trim()||stages[idx].assignedTo,
    cost:parseFloat(document.getElementById(`mf-cost-${idx}`).value)||stages[idx].cost||0,
    supplierId:supSel.value||'',
    supplierName:sup?.name||'',
    notes:document.getElementById(`mf-notes-${idx}`).value.trim(),
  };
  try{
    await updateDoc(doc(db,'job_orders',jobId),{stages,updatedAt:serverTimestamp()});
    toast('✅ تم حفظ تفاصيل المرحلة','ok');
    document.getElementById(`mini-form-${idx}`).classList.remove('open');
  }catch(e){toast('❌ '+e.message,'err');}
};

window.advanceStage=async(jobId,stageIdx,newStatus)=>{
  const j=jobs.find(x=>x._id===jobId);
  if(!j)return;
  const stages=[...j.stages];
  const today=new Date().toISOString().slice(0,10);
  stages[stageIdx]={...stages[stageIdx],status:newStatus};
  if(newStatus==='in-progress'&&!stages[stageIdx].startDate)stages[stageIdx].startDate=today;
  if(newStatus==='done'&&!stages[stageIdx].endDate)stages[stageIdx].endDate=today;
  // Auto-update job status
  let jobStatus=j.status;
  const allDoneOrSkip=stages.every(s=>s.status==='done'||s.status==='skipped');
  const anyInProg=stages.some(s=>s.status==='in-progress');
  if(allDoneOrSkip)jobStatus='done';
  else if(anyInProg)jobStatus='in-progress';
  try{
    await updateDoc(doc(db,'job_orders',jobId),{stages,status:jobStatus,updatedAt:serverTimestamp()});
    toast(newStatus==='done'?'✅ مرحلة مكتملة':newStatus==='in-progress'?'▶ بدأت المرحلة':'⏭ تم تخطي المرحلة','ok');
    // Re-render detail
    const updated={...j,stages,status:jobStatus};
    renderDetailBody(updated);
    document.getElementById('d-status-sel').value=jobStatus;
  }catch(e){toast('❌ '+e.message,'err');}
};

window.changeJobStatus=async()=>{
  if(!currentJobId)return;
  const newStatus=document.getElementById('d-status-sel').value;
  try{
    await updateDoc(doc(db,'job_orders',currentJobId),{status:newStatus,updatedAt:serverTimestamp()});
    toast('✅ تم تحديث الحالة','ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

  document.getElementById('ov-add').classList.add('open');
};

window.setAddMode=(mode)=>{
  addMode=mode;
  const ordBtn=document.getElementById('mode-ord-btn');
  const manBtn=document.getElementById('mode-man-btn');
  const ordBlock=document.getElementById('from-order-block');
  const manBlock=document.getElementById('manual-block');
  if(mode==='order'){
    ordBtn.classList.remove('btn-ghost');ordBtn.classList.add('btn-b');
    manBtn.classList.add('btn-ghost');manBtn.classList.remove('btn-b');
    ordBlock.style.display='block';manBlock.style.display='none';
  }else{
    manBtn.classList.remove('btn-ghost');manBtn.classList.add('btn-b');
    ordBtn.classList.add('btn-ghost');ordBtn.classList.remove('btn-b');
    ordBlock.style.display='none';manBlock.style.display='block';
  }
};

window.filterOrderPicks=()=>{
  const q=document.getElementById('ord-search').value.toLowerCase();
  renderOrderPicks(q);
};

function renderOrderPicks(q){
  const list=prodOrders.filter(o=>!q||(o.clientName||'').toLowerCase().includes(q)||(o._id||'').toLowerCase().includes(q));
  if(!list.length){document.getElementById('ord-pick-list').innerHTML=`<div style="padding:16px;text-align:center;color:var(--dim2);font-size:12px">لا توجد أوردرات في مرحلة التنفيذ</div>`;return;}
  document.getElementById('ord-pick-list').innerHTML=list.slice(0,20).map(o=>`
    <div class="ord-pick-card ${selectedOrderId===o._id?'selected':''}" onclick="selectOrder('${o._id}')">
      <div class="ord-pick-ref">${o._id}</div>
      <div class="ord-pick-client">${o.clientName||'—'}</div>
      <div class="ord-pick-product">${(o.products||[]).map(p=>p.name||'').join(' · ')||o.title||'—'}</div>
    </div>`).join('');
}

window.selectOrder=(id)=>{
  selectedOrderId=id;
  renderOrderPicks(document.getElementById('ord-search').value.toLowerCase());
};

function renderRouteList(){
  if(!routes.length){document.getElementById('route-list').innerHTML=`<div style="padding:12px;text-align:center;color:var(--dim2);font-size:12px">لا توجد مسارات</div>`;return;}
  document.getElementById('route-list').innerHTML=routes.map(r=>`
    <div class="route-opt ${selectedRouteId===r.id?'selected':''}" onclick="selectRoute('${r.id}')">
      <div class="route-opt-name">🗺️ ${r.name}</div>
      <div class="route-opt-stages">${(r.stages||[]).map(s=>`${s.icon||''}${s.name}`).join(' → ')}</div>
    </div>`).join('');
}

window.selectRoute=(id)=>{
  selectedRouteId=id;
  renderRouteList();
};

window.createJob=async()=>{
  const btn=document.getElementById('add-save-btn');
  if(!selectedRouteId){toast('اختر مسار الإنتاج أولاً','warn');return;}
  const route=routes.find(r=>r.id===selectedRouteId);
  if(!route){toast('مسار غير موجود','err');return;}
  const dueDate=document.getElementById('add-due').value;
  const priority=document.getElementById('add-priority').value;
  const notes=document.getElementById('add-notes').value.trim();
  let orderRef='',clientName='',productName='',totalCost=0,orderId='';
  if(addMode==='order'){
    if(!selectedOrderId){toast('اختر أوردر أولاً','warn');return;}
    const ord=prodOrders.find(o=>o._id===selectedOrderId);
    if(!ord){toast('أوردر غير موجود','err');return;}
    orderId=ord._id;orderRef=ord._id;
    clientName=ord.clientName||'';
    productName=(ord.products||[]).map(p=>p.name||'').join(' · ')||ord.title||'';
    totalCost=ord.totalAmount||0;
  }else{
    orderRef=document.getElementById('m-ref').value.trim()||`JO-${Date.now()}`;
    clientName=document.getElementById('m-client').value.trim();
    productName=document.getElementById('m-product').value.trim();
    totalCost=parseFloat(document.getElementById('m-cost').value)||0;
    if(!clientName||!productName){toast('أدخل اسم العميل والمنتج','warn');return;}
  }
  const stages=(route.stages||[]).map(s=>({...s,status:'pending',assignedTo:'',supplierId:'',supplierName:'',cost:0,startDate:'',endDate:'',delay:0,notes:''}));
  btn.classList.add('btn-loading');
  try{
    await addDoc(collection(db,'job_orders'),{
      orderId,orderRef,clientName,productName,
      routeId:route.id,routeName:route.name,
      totalCost,status:'new',priority,dueDate,
      startDate:new Date().toISOString().slice(0,10),
      stages,notes,
      createdAt:serverTimestamp(),updatedAt:serverTimestamp(),
      isDeleted:false,
    });
    toast('✅ تم إنشاء أمر التشغيل','ok');
    closeModal('ov-add');
  }catch(e){toast('❌ '+e.message,'err');}
  btn.classList.remove('btn-loading');
};

// ── Modal helpers ──
window.closeModal=(id)=>{document.getElementById(id).classList.remove('open');};
window.handleOverlayClick=(e,id)=>{if(e.target.id===id)closeModal(id);};
</script>
</body>
