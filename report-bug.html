<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f1b">
<title>تقارير الأخطاء — Business2Card</title>
<link rel="stylesheet" href="shared.css?v=38">
<link rel="stylesheet" href="design-system/components.css?v=1">
<script src="sidebar-config.js"></script>
<script src="sidebar.js"></script>
<script src="viewas.js?v=1" defer></script>
<script type="module" src="inbox-badge.js"></script>
<link rel="stylesheet" href="report-bug.css?v=1">
</head>
<body>
<div class="app-shell">
<aside class="sidenav"><div class="nav-brand"><div class="nav-logo">🎨</div><div>
  <div class="nav-brand-name">Business2Card</div>
  <div class="nav-brand-role">تقارير الأخطاء</div></div></div>
  <div class="nav-scroll" id="nav-scroll-dynamic"></div></aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button type="button" class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div><h1>🐛 تقارير الأخطاء</h1><p style="font-size:var(--fs-base);color:var(--dim2)" id="er-sub">جاري التحميل...</p></div>
    </div>
  </div>
  <div class="content">
    <div class="er-tabs">
      <button type="button" class="er-tab on" data-status="new" onclick="setTab('new', this)">🔴 جديد <span id="cnt-new" class="er-count">0</span></button>
      <button type="button" class="er-tab" data-status="investigating" onclick="setTab('investigating', this)">🟡 قيد الفحص <span id="cnt-investigating" class="er-count">0</span></button>
      <button type="button" class="er-tab" data-status="resolved" onclick="setTab('resolved', this)">🟢 محلولة</button>
      <button type="button" class="er-tab" data-status="all" onclick="setTab('all', this)">📋 الكل</button>
    </div>

    <div class="er-toolbar">
      <label class="txt-meta-sm">نوع:</label>
      <select id="f-type" onchange="render()">
        <option value="">الكل</option>
        <option value="uncaught_exception">Uncaught exception</option>
        <option value="promise_rejection">Promise rejection</option>
        <option value="console_error">Console error</option>
        <option value="user_report">User report</option>
      </select>
      <label class="txt-meta-sm">severity:</label>
      <select id="f-sev" onchange="render()">
        <option value="">الكل</option>
        <option value="high">🔴 high</option>
        <option value="med">🟡 med</option>
        <option value="low">🟢 low</option>
        <option value="auto">⚪ auto</option>
      </select>
      <label class="txt-meta-sm">دور المستخدم:</label>
      <select id="f-role" onchange="render()">
        <option value="">الكل</option>
        <option value="admin">admin</option>
        <option value="operation_manager">operation_manager</option>
        <option value="customer_service">customer_service</option>
        <option value="graphic_designer">graphic_designer</option>
        <option value="design_operator">design_operator</option>
        <option value="production_agent">production_agent</option>
        <option value="shipping_officer">shipping_officer</option>
        <option value="wallet_manager">wallet_manager</option>
      </select>
    </div>

    <div id="reports-list"></div>
  </div>
</div>
</div><!-- /.app-shell -->
<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div class="toasts" id="toasts"></div>

<script type="module">
import { app, auth, db } from "./core/firebase-init.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, doc, onSnapshot, getDoc, query, orderBy, limit }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { reportActions } from "./core/report-actions.js";

let allReports = [];
let activeTab = 'new';
let currentUid='', currentRole='';

window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);location.href='login.html';};

window.setTab = (status, btn) => {
  activeTab = status;
  document.querySelectorAll('.er-tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
};

window.updateStatus = async (id, newStatus) => {
  const r = await reportActions.updateReportStatus({ db, reportId: id, status: newStatus, userId: currentUid });
  if (r.ok) toast('✅ تم تحديث الحالة', 'ok');
  else toast('❌ ' + (r.errors?.[0] || 'فشل التحديث'), 'err');
};

window.deleteReport = async (id) => {
  if (!confirm('حذف هذا التقرير؟ (لن يكون قابل للاسترداد)')) return;
  const r = await reportActions.deleteReport({ db, reportId: id });
  if (r.ok) toast('✅ تم الحذف', 'ok');
  else toast('❌ ' + (r.errors?.[0] || 'فشل الحذف'), 'err');
};

function fmtDate(ts) {
  if (!ts?.toDate) return '—';
  const d = ts.toDate();
  return d.toLocaleString('ar-EG', { dateStyle: 'short', timeStyle: 'short' });
}
function escHtml(s){return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function render() {
  const fType = document.getElementById('f-type').value;
  const fSev  = document.getElementById('f-sev').value;
  const fRole = document.getElementById('f-role').value;

  let filtered = allReports.filter(r => {
    if (activeTab !== 'all' && (r.status || 'new') !== activeTab) return false;
    if (fType && r.type !== fType) return false;
    if (fSev && r.severity !== fSev) return false;
    if (fRole && r.userRole !== fRole) return false;
    return true;
  });

  document.getElementById('cnt-new').textContent = allReports.filter(r => (r.status||'new') === 'new').length;
  document.getElementById('cnt-investigating').textContent = allReports.filter(r => r.status === 'investigating').length;

  const el = document.getElementById('reports-list');
  if (filtered.length === 0) {
    el.innerHTML = `<div class="er-empty"><div class="ic">✨</div><div style="font-weight:var(--fw-extra);font-size:var(--fs-md)">لا توجد تقارير في هذا التبويب</div></div>`;
    return;
  }

  el.innerHTML = filtered.map(r => {
    const sevClass = (r.severity || 'auto') === 'high' ? 'high' : (r.severity || 'auto') === 'low' ? 'low' : 'med';
    const statusBadge = `<span class="er-badge status-${r.status||'new'}">${r.status||'new'}</span>`;
    const typeBadge = `<span class="er-badge type">${r.type}</span>`;
    const sevBadge = `<span class="er-badge" style="background:var(--bg3);color:var(--snow)">${r.severity || 'auto'}</span>`;
    const countBadge = (r.count && r.count > 1) ? `<span class="er-count">×${r.count}</span>` : '';

    return `<div class="er-card ${sevClass}">
      <div class="er-head">
        <div class="er-title">${escHtml(r.message).slice(0, 200)}${countBadge}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">${statusBadge}${typeBadge}${sevBadge}</div>
      </div>
      <div class="er-meta">
        🕐 ${fmtDate(r.createdAt)} ${r.lastSeenAt ? '· آخر ظهور ' + fmtDate(r.lastSeenAt) : ''} ·
        👤 ${escHtml(r.userName || r.userId || '—')} (${escHtml(r.userRole || '—')}) ·
        📄 ${escHtml((r.url || '').split('/').pop() || '—')}
      </div>
      ${r.description ? `<div class="er-section">
        <div class="er-section-label">ملاحظات</div>
        <div class="er-section-body">${escHtml(r.description)}</div>
      </div>` : ''}
      ${r.expectedBehavior ? `<div class="er-section">
        <div class="er-section-label">المتوقَّع</div>
        <div class="er-section-body">${escHtml(r.expectedBehavior)}</div>
      </div>` : ''}
      ${r.actualBehavior ? `<div class="er-section">
        <div class="er-section-label">الفعلي</div>
        <div class="er-section-body">${escHtml(r.actualBehavior)}</div>
      </div>` : ''}
      ${r.stack ? `<details class="er-section">
        <summary style="cursor:pointer;font-size:var(--fs-xs);color:var(--dim2);font-weight:var(--fw-bold)">📚 stack trace</summary>
        <div class="er-section-body" style="margin-top:var(--space-xs);font-size:var(--fs-xs)">${escHtml(r.stack)}</div>
      </details>` : ''}
      <div class="er-actions">
        ${(r.status||'new') === 'new' ? `<button type="button" onclick="updateStatus('${r._id}','investigating')">🔍 ابدأ الفحص</button>` : ''}
        ${(r.status||'new') !== 'resolved' ? `<button type="button" onclick="updateStatus('${r._id}','resolved')">✅ محلول</button>` : ''}
        ${(r.status||'new') !== 'wontfix' ? `<button type="button" onclick="updateStatus('${r._id}','wontfix')">🚫 لن يُعالَج</button>` : ''}
        ${(r.status||'new') !== 'new' ? `<button type="button" onclick="updateStatus('${r._id}','new')">↩️ إعادة فتح</button>` : ''}
        <button type="button" onclick="deleteReport('${r._id}')" style="margin-right:auto;background:var(--tint-r-soft);color:var(--r);border-color:var(--tint-r-line)">🗑️ حذف</button>
      </div>
    </div>`;
  }).join('');
}

function toast(msg, t='') {
  const c = document.getElementById('toasts');
  if (!c) return;
  const el = document.createElement('div');
  el.className = 'toast ' + t;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// Auth
onAuthStateChanged(auth, async (user) => {
  if (!user) { location.href = 'login.html'; return; }
  currentUid = user.uid;
  const snap = await getDoc(doc(db, 'users', user.uid));
  if (!snap.exists()) { alert('حساب غير موجود'); return; }
  const ud = snap.data();
  currentRole = ud.role || '';
  if (!['admin', 'operation_manager'].includes(currentRole)) {
    alert('هذه الصفحة للأدمن أو مدير التشغيل فقط');
    location.href = 'login.html';
    return;
  }
  document.getElementById('er-sub').textContent = `أهلاً ${ud.name || ''} — كل التقارير من المستخدمين والـ console`;
  if (window.B2CSidebar) B2CSidebar.build(ud, 'report-bug.html');

  // Listen to reports
  const q = query(collection(db, 'error_reports'), orderBy('createdAt', 'desc'), limit(500));
  onSnapshot(q, (snap) => {
    allReports = snap.docs.map(d => ({ ...d.data(), _id: d.id }));
    render();
  }, err => {
    console.warn('[reports] subscription error:', err);
    toast('⚠️ فشل تحميل التقارير: ' + err.message, 'err');
  });
});
</script>
<script src="sw-register.js"></script>
</body>
</html>
