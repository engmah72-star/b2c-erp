<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f1b">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Business2Card — Runtime</title>
<link rel="stylesheet" href="runtime-shell.css?v=1">
<script src="theme.js?v=4"></script>
</head>
<body class="rt-body">
<div class="rt-shell">
  <!-- ── Layer 1: Global Rail (56px desktop / bottom on mobile) ── -->
  <aside id="rt-rail-host" class="rt-rail-host"></aside>

  <!-- ── Layer 2: Context Sidebar (260px / fullscreen sheet on mobile) ── -->
  <aside id="rt-ctx-host" class="rt-ctx-host" aria-label="Domain context"></aside>

  <!-- ── Layer 3: Active Workspace ── -->
  <main class="rt-workspace" aria-label="Workspace">
    <header class="rt-topbar">
      <button type="button" class="rt-mob-toggle" aria-label="فتح القائمة"
              onclick="window.B2CShell&&window.B2CShell.toggleSidebar()">☰</button>
      <h1 class="rt-workspace-title" id="rt-workspace-title">Runtime</h1>
    </header>
    <div id="rt-workspace-host" class="rt-workspace-host"></div>
  </main>

  <!-- ── Backdrop — closes mobile drawer on tap (always present، hidden by default) ── -->
  <div id="rt-backdrop" class="rt-backdrop" hidden aria-hidden="true"></div>

  <!-- ── Mobile FAB (Phase 7) — context-aware primary action ── -->
  <div id="rt-fab-host" class="rt-fab-host"></div>
</div>

<script type="module">
import { auth, db } from './core/firebase-init.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import * as rail from './core/runtime-shell/rail.js?v=2';
import * as ctx  from './core/runtime-shell/context-sidebar.js?v=1';
import * as ws   from './core/runtime-shell/workspace-host.js?v=1';
import * as signals from './core/runtime-shell/signals.js?v=2';
import * as aggregator from './core/runtime-shell/signals-aggregator.js?v=1';
import * as fab from './core/runtime-shell/fab.js?v=1';
import { DOMAINS, isValidDomain } from './core/runtime-shell/domain-registry.js?v=1';
import { getAllowedDomains, canSeeDomain, getDefaultDomain } from './core/runtime-shell/domain-permissions.js?v=1';

// ── Domain modules (auto-register on import) ──
import './core/domains/clients/sidebar.js?v=1';
import './core/domains/design/sidebar.js?v=1';
import './core/domains/production/sidebar.js?v=1';
import './core/domains/shipping/sidebar.js?v=1';
import './core/domains/accounts/sidebar.js?v=1';
import './core/domains/reports/sidebar.js?v=1';
import './core/domains/inbox/sidebar.js?v=1';
import './core/domains/admin/sidebar.js?v=1';

const railHost = document.getElementById('rt-rail-host');
const ctxHost  = document.getElementById('rt-ctx-host');
const wsHost   = document.getElementById('rt-workspace-host');
const titleEl  = document.getElementById('rt-workspace-title');
const fabHost  = document.getElementById('rt-fab-host');

// ── State ──
let currentUser = null;
let userData = null;
let allowedDomains = null;   // populated after auth
let defaultDomain = 'accounts';

// ── URL routing helpers ──
function getDomainFromUrl() {
  const id = new URLSearchParams(location.search).get('d') || '';
  if (!isValidDomain(id)) return defaultDomain;
  // permission gate: لو الـ domain موجود في الـ URL لكن المستخدم ما يقدرش يشوفه
  if (allowedDomains && !allowedDomains.includes(id)) return defaultDomain;
  return id;
}

function setDomainInUrl(domainId, replace = false) {
  const url = new URL(location.href);
  url.searchParams.set('d', domainId);
  const stateObj = { domain: domainId };
  if (replace) history.replaceState(stateObj, '', url.toString());
  else         history.pushState(stateObj,    '', url.toString());
}

// ── Activate a domain (atomic switch) ──
function activate(domainId, pushHistory = true) {
  if (!isValidDomain(domainId)) domainId = defaultDomain;
  // permission gate
  if (allowedDomains && !allowedDomains.includes(domainId)) domainId = defaultDomain;
  rail.setActive(domainId);
  ctx.showDomain(domainId);
  ws.showDomain(domainId);
  document.body.classList.remove('rt-mob-open');
  if (pushHistory) setDomainInUrl(domainId, false);
}

// ── Boot layers (rail will be configured after auth) ──
rail.init({
  container: railHost,
  onSelect: (id) => activate(id, true),
});

ctx.init({ container: ctxHost });

ws.init({
  container: wsHost,
  titleElement: titleEl,
});

fab.init({ container: fabHost });

// ── Signals → Rail notification dots ──
// Listen to domain totals (sum of all signals per domain)
signals.onDomainChange((domainId, total) => rail.setSignalCount(domainId, total));

// ── Public API ──
window.B2CShell = {
  activate,
  toggleSidebar: () => {
    if (document.body.classList.contains('rt-mob-open')) _closeMobileDrawer();
    else _openMobileDrawer();
  },
  openSidebar:  _openMobileDrawer,
  closeSidebar: _closeMobileDrawer,
  openInWorkspace: (url) => ws.navigate(url),
  signals,
  logout: async () => { try { await signOut(auth); } catch(_) {} location.href = 'login.html'; },
  getUser: () => currentUser ? { ...currentUser, ...userData } : null,
  registerDomain: async (domainId, renderer) => {
    const reg = await import('./core/runtime-shell/domain-registry.js?v=1');
    return reg.register(domainId, renderer);
  },
};

// ── Browser back/forward ──
window.addEventListener('popstate', () => activate(getDomainFromUrl(), false));

// ── Mobile drawer open/close (class-based، multiple close paths) ──
const backdropEl = document.getElementById('rt-backdrop');

function _closeMobileDrawer() {
  document.body.classList.remove('rt-mob-open');
  if (backdropEl) {
    backdropEl.classList.remove('rt-backdrop-open');
    backdropEl.removeAttribute('hidden');  // CSS controls visibility via class
  }
}
function _openMobileDrawer() {
  document.body.classList.add('rt-mob-open');
  if (backdropEl) {
    backdropEl.removeAttribute('hidden');
    backdropEl.classList.add('rt-backdrop-open');
  }
}

// Backdrop click → close (both click + pointerdown for maximum compatibility)
if (backdropEl) {
  backdropEl.addEventListener('click', _closeMobileDrawer);
  backdropEl.addEventListener('pointerdown', _closeMobileDrawer);
}

// Capture-phase click anywhere: if outside drawer when open → close
document.addEventListener('click', (e) => {
  if (!document.body.classList.contains('rt-mob-open')) return;
  if (e.target.closest('.rt-ctx-host')) return;     // inside drawer → ignore
  if (e.target.closest('.rt-rail-host')) return;    // tapping rail to switch
  _closeMobileDrawer();
}, true);

// Escape key closes drawer
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.body.classList.contains('rt-mob-open')) {
    _closeMobileDrawer();
  }
});

// ── Auth gate ──
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    // مش مسجل دخول → login
    location.href = 'login.html';
    return;
  }
  currentUser = user;

  // Load user role + permissions from Firestore
  try {
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    userData = userDoc.exists() ? userDoc.data() : { role: 'customer_service' };
  } catch (e) {
    console.warn('[shell] failed to load user data', e);
    userData = { role: 'customer_service' };
  }

  // Determine allowed domains + default
  allowedDomains = getAllowedDomains(userData.role, userData.permissions);
  defaultDomain = getDefaultDomain(userData.role);
  if (!allowedDomains.includes(defaultDomain)) {
    defaultDomain = allowedDomains[0] || 'inbox';
  }

  // Update rail to show only allowed domains
  rail.setAllowedDomains(allowedDomains);

  // Boot: activate initial domain from URL (with permission gate)
  const initialDomain = getDomainFromUrl();
  setDomainInUrl(initialDomain, true);
  activate(initialDomain, false);

  // Start signal aggregator (Phase 4 — live Firestore counts)
  try { aggregator.start(); }
  catch (e) { console.warn('[shell] aggregator start failed', e); }
});

window.addEventListener('beforeunload', () => {
  try { aggregator.stop(); } catch (_) {}
});
</script>
</body>
</html>
