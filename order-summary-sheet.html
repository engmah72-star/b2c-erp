<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<title>ملخص الطلب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Tajawal',sans-serif;
  background:#f0f3fa;
  color:#1a1a2e;
  direction:rtl;
  min-height:100vh;
}

/* ── Action Bar (print-hidden) ─────────────────────────────────── */
.action-bar{
  display:flex;gap:10px;padding:12px 20px;
  background:#16213e;
  align-items:center;justify-content:center;flex-wrap:wrap;
  position:sticky;top:0;z-index:100;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.action-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:10px 22px;border-radius:10px;border:none;
  cursor:pointer;font-family:'Tajawal',sans-serif;
  font-size:14px;font-weight:700;text-decoration:none;
  white-space:nowrap;transition:opacity .15s;
}
.action-btn:hover{opacity:.88}
.btn-print{background:#4a8ef5;color:#fff}
.btn-wa{background:#25D366;color:#fff}
.btn-close{background:rgba(255,255,255,.1);color:#c8d4f0;border:1px solid rgba(255,255,255,.15)}
.bar-label{font-size:13px;color:rgba(255,255,255,.4);margin-left:auto;white-space:nowrap}

/* ── Sheet Wrapper ─────────────────────────────────────────────── */
.sheet-wrapper{max-width:820px;margin:24px auto;padding:0 16px 50px}

.sheet{
  background:#fff;
  border-radius:14px;
  box-shadow:0 4px 32px rgba(0,0,20,.13);
  overflow:hidden;
}

/* ── Sheet Header ──────────────────────────────────────────────── */
.sh-hdr{padding:26px 30px;color:#fff}
.sh-hdr.prod{background:linear-gradient(135deg,#1a1a2e 0%,#1e3a5f 100%)}
.sh-hdr.delivery{background:linear-gradient(135deg,#0d3b2e 0%,#1a5c42 100%)}

.sh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.sh-brand{display:flex;align-items:center;gap:10px}
.sh-brand-ico{
  width:46px;height:46px;border-radius:11px;
  background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.sh-brand-name{font-size:16px;font-weight:800;color:#fff}
.sh-brand-sub{font-size:12px;color:rgba(255,255,255,.55);margin-top:1px}
.sh-type-badge{
  padding:6px 18px;border-radius:20px;font-size:13px;font-weight:700;
  white-space:nowrap;flex-shrink:0;
}
.badge-prod{background:rgba(100,180,255,.18);color:#9ecfff;border:1px solid rgba(100,180,255,.3)}
.badge-delivery{background:rgba(0,230,130,.18);color:#7aefb7;border:1px solid rgba(0,230,130,.3)}

.sh-order{font-size:34px;font-weight:900;letter-spacing:.5px;margin-bottom:5px}
.sh-client{font-size:17px;color:rgba(255,255,255,.8);margin-bottom:4px}
.sh-meta{display:flex;gap:16px;flex-wrap:wrap}
.sh-meta-item{font-size:12px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:4px}

/* ── Sheet Body ────────────────────────────────────────────────── */
.sh-body{padding:26px 30px}

.sec{margin-bottom:24px}
.sec-title{
  font-size:11px;font-weight:800;color:#8897b8;
  text-transform:uppercase;letter-spacing:1.2px;
  padding-bottom:8px;border-bottom:2px solid #edf0f8;margin-bottom:14px;
}

/* Design images */
.design-single img{
  width:100%;max-height:280px;object-fit:contain;
  border-radius:10px;border:1px solid #e8ecf5;
  background:#f8faff;display:block;
}
.design-multi{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.design-multi img{
  width:100%;aspect-ratio:1;object-fit:cover;
  border-radius:8px;border:1px solid #e8ecf5;background:#f8faff;
}
.design-empty{
  background:#f8faff;border:2px dashed #dce4f5;
  border-radius:10px;padding:36px 20px;text-align:center;color:#9babcc;
}
.design-empty .ico{font-size:36px;margin-bottom:8px}
.design-empty .txt{font-size:13px}

/* Info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:500px){.info-grid{grid-template-columns:1fr}}
.info-item{
  background:#f8faff;border-radius:9px;padding:11px 15px;
  border:1px solid #e8ecf5;
}
.info-item.full{grid-column:1/-1}
.info-lbl{font-size:11px;color:#8897b8;font-weight:600;margin-bottom:4px}
.info-val{font-size:14px;font-weight:700;color:#1a1a2e;line-height:1.4}
.info-val.xl{font-size:20px;font-weight:900}
.info-val.phone{font-size:18px;font-weight:900;letter-spacing:.5px;direction:ltr;text-align:right}
.info-val.green{color:#00875a}
.info-val.red{color:#c0392b}
.info-val.muted{color:#6175a0;font-weight:600}

/* Products table */
.prod-table{width:100%;border-collapse:collapse}
.prod-table th{
  background:#f0f4fc;padding:9px 14px;
  text-align:right;font-size:12px;font-weight:700;color:#7080a0;
}
.prod-table th:first-child{border-radius:8px 0 0 0}
.prod-table th:last-child{border-radius:0 8px 0 0}
.prod-table td{
  padding:10px 14px;border-bottom:1px solid #f0f3fa;
  font-size:13px;color:#1a1a2e;vertical-align:top;
}
.prod-table tr:last-child td{border-bottom:none}
.prod-table td:first-child{font-weight:700}
.prod-tag{
  display:inline-block;padding:1px 7px;border-radius:10px;
  font-size:11px;font-weight:700;margin:1px 2px;
}
.prod-tag.lam{background:rgba(100,100,200,.1);color:#6060c0;border:1px solid rgba(100,100,200,.2)}
.prod-tag.extra{background:rgba(0,180,100,.1);color:#00875a;border:1px solid rgba(0,180,100,.2)}

/* Notes */
.notes-box{
  background:#fffceb;border:1px solid #ffe082;
  border-radius:9px;padding:13px 16px;
  font-size:13px;color:#6b5000;line-height:1.7;
}
.notes-box+.notes-box{margin-top:8px}

/* Financial block */
.fin-block{
  background:linear-gradient(135deg,#f3f6ff 0%,#f8faff 100%);
  border-radius:11px;padding:18px 22px;border:1px solid #dce6ff;
}
.fin-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;font-size:14px;
}
.fin-row .lbl{color:#7080a0;font-weight:600}
.fin-row .val{font-weight:800;color:#1a1a2e}
.fin-row.divider{border-top:2px solid #e0e8ff;margin-top:8px;padding-top:10px}
.fin-row.big .lbl{font-size:15px;font-weight:700;color:#1a1a2e}
.fin-row.big .val{font-size:20px;color:#c0392b}
.fin-row.paid-row .val{color:#00875a}

/* Collection status */
.coll-badge{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 24px;border-radius:20px;font-size:14px;font-weight:700;
  margin-top:14px;
}
.coll-none{background:#fff3cd;color:#8a6000;border:1px solid #ffce00}
.coll-part{background:#e8f4ff;color:#1060c0;border:1px solid #90c4ff}
.coll-full{background:#d4f7e7;color:#00613a;border:1px solid #40c87a}

/* ── Sheet Footer ──────────────────────────────────────────────── */
.sh-footer{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 30px;background:#f8faff;border-top:1px solid #edf0f8;
  font-size:12px;flex-wrap:wrap;gap:6px;
}
.sf-brand{color:#8897b8;font-weight:600}
.sf-ts{color:#b0bdd4}

/* ── Loading / Error ───────────────────────────────────────────── */
.center-msg{text-align:center;padding:70px 20px}
.center-msg .ico{font-size:40px;margin-bottom:12px}
.center-msg .txt{font-size:15px;color:#7080a0}

/* ── PRINT ─────────────────────────────────────────────────────── */
/* ── Multi-order separator ───────────────────────────────────────── */
.order-sep{
  display:flex;align-items:center;gap:12px;
  margin:28px 0;color:#8897b8;font-size:13px;font-weight:600;
}
.order-sep::before,.order-sep::after{content:'';flex:1;height:1px;background:#dce4f5}

.multi-header{
  background:#16213e;border-radius:12px;padding:18px 24px;
  margin-bottom:24px;color:#fff;
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.multi-header .mh-title{font-size:18px;font-weight:800}
.multi-header .mh-count{
  background:rgba(74,142,245,.3);color:#9ecfff;
  border:1px solid rgba(74,142,245,.4);
  padding:4px 14px;border-radius:16px;font-size:13px;font-weight:700;
}

@media print{
  .action-bar{display:none!important}
  body{background:#fff}
  .sheet-wrapper{margin:0;padding:0;max-width:100%}
  .sheet{box-shadow:none;border-radius:0}
  .multi-header{display:none!important}
  .sh-hdr,.info-item,.fin-block,.prod-table th{
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }
  .design-single img,.design-multi img{max-height:220px}
  /* فاصل صفحة بين الطلبات عند الطباعة */
  .order-sep{page-break-after:always;margin:0;border:none;height:0;display:block}
  .order-sep span,.order-sep::before,.order-sep::after{display:none}
}
</style>
</head>
<body>

<div class="action-bar" id="action-bar">
  <button class="action-btn btn-print" onclick="window.print()">🖨️ طباعة / PDF</button>
  <a class="action-btn btn-wa" id="wa-btn" href="#" target="_blank" rel="noopener">💬 إرسال واتساب</a>
  <button class="action-btn btn-close" onclick="window.close()">✕ إغلاق</button>
  <span class="bar-label" id="bar-label">جارٍ التحميل...</span>
</div>

<div class="sheet-wrapper">
  <div id="sheet-root">
    <div class="center-msg">
      <div class="ico">⏳</div>
      <div class="txt">جارٍ تحميل بيانات الطلب...</div>
    </div>
  </div>
</div>

<script type="module">
import { app, auth, db } from './core/firebase-init.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

const params = new URLSearchParams(window.location.search);
const orderId = params.get('orderId') || '';
const idsParam = params.get('ids') || '';
const sheetType = params.get('type') === 'delivery' ? 'delivery' : 'production';
// قائمة IDs: إما ids (متعددة) أو orderId (واحد) أو لا شيء
const orderIds = idsParam
  ? idsParam.split(',').map(s=>s.trim()).filter(Boolean)
  : orderId ? [orderId] : [];

// ── helpers ────────────────────────────────────────────────────────
function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtNum(n){
  const v=parseFloat(n);
  return isFinite(v)?v.toLocaleString('ar-EG'):'0';
}

function getNet(o){
  const sale=parseFloat(o.salePrice)||0;
  const disc=parseFloat(o.discount)||0;
  const ship=o.priceIncludesShipping?0:(parseFloat(o.customerShipFee)||0);
  return Math.max(0,sale+ship-disc);
}

function getPaid(o){
  return Math.max(0,parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0);
}

function getRem(o){return Math.max(0,getNet(o)-getPaid(o));}

function nowStr(){
  return new Date().toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'})+
    ' — '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
}

function getAllDesignImages(o){
  const seen=new Set(), imgs=[];
  const push=u=>{if(u&&!seen.has(u)){seen.add(u);imgs.push(u);}};
  for(const p of (o.products||[])){
    if(Array.isArray(p.designImages)) p.designImages.filter(Boolean).forEach(push);
    if(p.designImageUrl) push(p.designImageUrl);
  }
  if(o.printFinalUrl) push(o.printFinalUrl);
  if(o.designImageUrl) push(o.designImageUrl);
  return imgs.slice(0,8);
}

// ── Production Sheet ───────────────────────────────────────────────
function buildProductionSheet(o){
  const imgs=getAllDesignImages(o);
  const products=o.products||[];

  // design images block
  let imgHtml;
  if(!imgs.length){
    imgHtml=`<div class="design-empty"><div class="ico">🖼️</div><div class="txt">لا توجد صورة تصميم</div></div>`;
  }else if(imgs.length===1){
    imgHtml=`<div class="design-single"><img src="${esc(imgs[0])}" loading="lazy" alt="التصميم"></div>`;
  }else{
    imgHtml=`<div class="design-multi">${imgs.map(u=>`<img src="${esc(u)}" loading="lazy" alt="تصميم">`).join('')}</div>`;
  }

  // products table
  let prodsHtml='';
  if(products.length){
    const rows=products.map(p=>{
      const lam=p.lamination&&p.lamination!=='بلا'?`<span class="prod-tag lam">${esc(p.lamination)}</span>`:'';
      const extras=(p.extras||[]).map(e=>`<span class="prod-tag extra">✓ ${esc(e)}</span>`).join('');
      const paper=p.paper?`${esc(p.paper)}${p.weight&&p.weight>0?' <span style="color:#9aabcc;font-size:11px">'+p.weight+'جم</span>':''}`:''
      return`<tr>
        <td>${esc(p.name||'—')}</td>
        <td>${esc(String(p.qty||1))} ق</td>
        <td>${esc(p.size||p.printSize||'—')}</td>
        <td>${paper||'—'}</td>
        <td>${lam||'—'}</td>
        <td>${extras||'—'}</td>
      </tr>`;
    }).join('');
    prodsHtml=`
      <div class="sec">
        <div class="sec-title">📦 تفاصيل المنتجات</div>
        <table class="prod-table">
          <thead><tr>
            <th>المنتج</th><th>الكمية</th><th>المقاس</th>
            <th>نوع الورق</th><th>السلوفان</th><th>تشطيبات</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }else if(o.product){
    prodsHtml=`
      <div class="sec">
        <div class="sec-title">📦 تفاصيل الطلب</div>
        <div class="info-grid">
          <div class="info-item"><div class="info-lbl">المنتج</div><div class="info-val">${esc(o.product)}</div></div>
          ${o.qty?`<div class="info-item"><div class="info-lbl">الكمية</div><div class="info-val">${esc(String(o.qty))} قطعة</div></div>`:''}
        </div>
      </div>`;
  }

  // notes
  const notesHtml=(o.printNotes||o.designNote||o.briefNotes)?`
    <div class="sec">
      <div class="sec-title">📝 الملاحظات</div>
      ${o.printNotes?`<div class="notes-box">${esc(o.printNotes)}</div>`:''}
      ${o.designNote?`<div class="notes-box">${esc(o.designNote)}</div>`:''}
      ${o.briefNotes&&!o.printNotes&&!o.designNote?`<div class="notes-box">${esc(o.briefNotes)}</div>`:''}
    </div>`:' ';

  return `
    <div class="sheet">
      <div class="sh-hdr prod">
        <div class="sh-top">
          <div class="sh-brand">
            <div class="sh-brand-ico">🎨</div>
            <div><div class="sh-brand-name">Business2Card</div><div class="sh-brand-sub">ملخص التنفيذ</div></div>
          </div>
          <div class="sh-type-badge badge-prod">🖨️ ورقة إنتاج</div>
        </div>
        <div class="sh-order">${esc(o.orderId||(o._id||'').slice(-6))}</div>
        <div class="sh-client">👤 ${esc(o.clientName||'—')}</div>
        <div class="sh-meta">
          ${o.deadline?`<div class="sh-meta-item">📅 موعد التسليم: ${esc(o.deadline)}</div>`:''}
          ${o.createdDate?`<div class="sh-meta-item">🗓️ تاريخ الإنشاء: ${esc(o.createdDate)}</div>`:''}
        </div>
      </div>

      <div class="sh-body">
        <div class="sec">
          <div class="sec-title">🖼️ صورة التصميم</div>
          ${imgHtml}
        </div>
        ${prodsHtml}
        ${notesHtml}
      </div>

      <div class="sh-footer">
        <div class="sf-brand">Business2Card ERP · ملخص التنفيذ · للاستخدام الداخلي فقط</div>
        <div class="sf-ts">طُبع: ${nowStr()}</div>
      </div>
    </div>`;
}

// ── Delivery Sheet ─────────────────────────────────────────────────
function buildDeliverySheet(o){
  const sale=getNet(o);
  const paid=getPaid(o);
  const rem=getRem(o);
  const addr=o.deliveryAddress||{};
  const phone=o.customerPhoneShip||o.clientPhone||'—';

  const shipLabels={'company':'شركة شحن','pickup':'استلام من المطبعة','courier':'مندوب داخلي'};
  const shipLabel=shipLabels[o.shipMethod]||o.shipMethod||'—';

  // Collection status
  let collClass,collLabel;
  if(rem<=0){collClass='coll-full';collLabel='✅ مكتمل التحصيل';}
  else if(paid>0){collClass='coll-part';collLabel='⏳ تحصيل جزئي';}
  else{collClass='coll-none';collLabel='💰 يستلزم التحصيل';}

  // Products compact rows
  const products=o.products||[];
  const prodRows=products.length
    ?products.map(p=>`<tr><td>${esc(p.name||'—')}</td><td>${esc(String(p.qty||1))} قطعة</td></tr>`).join('')
    :`<tr><td>${esc(o.product||'—')}</td><td>${esc(String(o.qty||'—'))} قطعة</td></tr>`;

  // Payment method label
  const payMethodMap={cash:'نقدي',wallet:'محفظة إلكترونية',bank_transfer:'تحويل بنكي',card:'بطاقة',online:'أونلاين'};
  const payMethod=o.paymentType||o.paymentMethod||o.collectionMethod||'';
  const payMethodLabel=payMethodMap[payMethod]||payMethod;

  return `
    <div class="sheet">
      <div class="sh-hdr delivery">
        <div class="sh-top">
          <div class="sh-brand">
            <div class="sh-brand-ico">🎨</div>
            <div><div class="sh-brand-name">Business2Card</div><div class="sh-brand-sub">ملخص الشحن والتسليم</div></div>
          </div>
          <div class="sh-type-badge badge-delivery">🚚 ورقة تسليم</div>
        </div>
        <div class="sh-order">${esc(o.orderId||(o._id||'').slice(-6))}</div>
        <div class="sh-client">👤 ${esc(o.clientName||'—')}</div>
        <div class="sh-meta">
          ${o.deadline?`<div class="sh-meta-item">📅 موعد التسليم: ${esc(o.deadline)}</div>`:''}
          ${shipLabel!=='—'?`<div class="sh-meta-item">🚚 ${esc(shipLabel)}</div>`:''}
        </div>
      </div>

      <div class="sh-body">

        <!-- بيانات التسليم -->
        <div class="sec">
          <div class="sec-title">📍 بيانات التسليم</div>
          <div class="info-grid">
            <div class="info-item">
              <div class="info-lbl">📞 رقم الهاتف</div>
              <div class="info-val phone">${esc(phone)}</div>
            </div>
            <div class="info-item">
              <div class="info-lbl">🚚 طريقة الشحن</div>
              <div class="info-val">${esc(shipLabel)}</div>
            </div>
            ${addr.gov?`<div class="info-item"><div class="info-lbl">🗺️ المحافظة</div><div class="info-val">${esc(addr.gov)}</div></div>`:''}
            ${addr.city?`<div class="info-item"><div class="info-lbl">🏙️ المدينة / المنطقة</div><div class="info-val">${esc(addr.city)}</div></div>`:''}
            ${o.shipCompanyName?`<div class="info-item"><div class="info-lbl">🏢 شركة الشحن</div><div class="info-val">${esc(o.shipCompanyName)}</div></div>`:''}
            ${payMethodLabel?`<div class="info-item"><div class="info-lbl">💳 طريقة الدفع</div><div class="info-val">${esc(payMethodLabel)}</div></div>`:''}
            ${addr.street?`<div class="info-item full"><div class="info-lbl">🏠 العنوان التفصيلي</div><div class="info-val">${esc(addr.street)}</div></div>`:''}
          </div>
        </div>

        <!-- المنتجات -->
        <div class="sec">
          <div class="sec-title">📦 المنتجات</div>
          <table class="prod-table">
            <thead><tr><th>المنتج</th><th>الكمية</th></tr></thead>
            <tbody>${prodRows}</tbody>
          </table>
        </div>

        <!-- المالية -->
        ${sale>0?`
        <div class="sec">
          <div class="sec-title">💰 التسوية المالية</div>
          <div class="fin-block">
            ${o.salePrice?`<div class="fin-row"><span class="lbl">سعر الطلب الأساسي</span><span class="val">${fmtNum(o.salePrice)} ج</span></div>`:''}
            ${parseFloat(o.discount)>0?`<div class="fin-row"><span class="lbl">خصم</span><span class="val" style="color:#c06000">— ${fmtNum(o.discount)} ج</span></div>`:''}
            ${!o.priceIncludesShipping&&parseFloat(o.customerShipFee)>0?`<div class="fin-row"><span class="lbl">رسوم شحن على العميل</span><span class="val">+ ${fmtNum(o.customerShipFee)} ج</span></div>`:''}
            <div class="fin-row divider"><span class="lbl">الإجمالي المستحق</span><span class="val">${fmtNum(sale)} ج</span></div>
            <div class="fin-row paid-row"><span class="lbl">المدفوع مسبقاً</span><span class="val">${fmtNum(paid)} ج</span></div>
            ${rem>0?`<div class="fin-row big"><span class="lbl">المتبقي للتحصيل</span><span class="val">${fmtNum(rem)} ج</span></div>`:`<div class="fin-row big"><span class="lbl">حالة التحصيل</span><span class="val" style="color:#00875a">✅ مكتمل</span></div>`}
          </div>
          <div style="text-align:center">
            <span class="coll-badge ${collClass}">${collLabel}</span>
          </div>
        </div>`:''}

      </div>

      <div class="sh-footer">
        <div class="sf-brand">Business2Card ERP · ملخص الشحن والتسليم</div>
        <div class="sf-ts">طُبع: ${nowStr()}</div>
      </div>
    </div>`;
}

// ── WhatsApp message builder ───────────────────────────────────────
function buildWAText(o,type){
  const id=o.orderId||(o._id||'').slice(-6);
  if(type==='production'){
    const products=(o.products||[]);
    const lines=products.length
      ?products.map(p=>`• ${p.name||''}${p.qty?' × '+p.qty:''}${p.size?' | '+p.size:''}${p.paper?' | '+p.paper:''}${p.lamination&&p.lamination!=='بلا'?' | '+p.lamination:''}`).join('\n')
      :(o.product||'—');
    return (
      `🖨️ *ورقة تنفيذ — ${id}*\n`+
      `👤 العميل: ${o.clientName||'—'}\n`+
      (o.deadline?`📅 موعد التسليم: ${o.deadline}\n`:'')+
      `\n📦 المنتجات:\n${lines}\n`+
      (o.printNotes?`\n📝 ملاحظات:\n${o.printNotes}`:'')
    );
  }else{
    const sale=getNet(o),paid=getPaid(o),rem=getRem(o);
    const addr=o.deliveryAddress||{};
    const phone=o.customerPhoneShip||o.clientPhone||'—';
    return (
      `🚚 *ورقة تسليم — ${id}*\n`+
      `👤 العميل: ${o.clientName||'—'}\n`+
      `📞 الهاتف: ${phone}\n`+
      (addr.gov?`📍 ${addr.gov}${addr.city?' — '+addr.city:''}\n`:'')+
      (addr.street?`🏠 ${addr.street}\n`:'')+
      (o.deadline?`📅 موعد التسليم: ${o.deadline}\n`:'')+
      `\n💰 المالية:\n`+
      `• الإجمالي: ${fmtNum(sale)} ج\n`+
      `• المدفوع: ${fmtNum(paid)} ج\n`+
      (rem>0?`• المتبقي: *${fmtNum(rem)} ج*`:'• ✅ مكتمل التحصيل')
    );
  }
}

function normalizePhone(raw){
  const d=String(raw||'').replace(/\D/g,'');
  if(!d) return '';
  if(d.startsWith('20')) return d;
  if(d.startsWith('0')) return '20'+d.slice(1);
  return '20'+d;
}

// ── Combined WA message (multi-order) ─────────────────────────────
function buildCombinedWAText(orders,type){
  const typeLabel=type==='production'?'🖨️ ملخص التنفيذ المجمع':'🚚 ملخص الشحن المجمع';
  const header=`${typeLabel} (${orders.length} طلبات)\n${'─'.repeat(32)}\n`;
  const lines=orders.map((o,i)=>{
    const id=o.orderId||o._id?.slice(-6)||'—';
    if(type==='production'){
      const products=(o.products||[]);
      const prodsLine=products.length
        ?products.map(p=>`  • ${p.name||''}${p.qty?' × '+p.qty:''}${p.size?' | '+p.size:''}${p.paper?' | '+p.paper:''}`).join('\n')
        :`  • ${o.product||'—'}`;
      return (
        `${i+1}. *${id}* — ${o.clientName||'—'}\n`+
        (o.deadline?`   📅 ${o.deadline}\n`:'')+
        `${prodsLine}\n`+
        (o.printNotes?`   📝 ${o.printNotes}\n`:'')
      );
    }else{
      const sale=getNet(o),paid=getPaid(o),rem=getRem(o);
      const addr=o.deliveryAddress||{};
      const phone=o.customerPhoneShip||o.clientPhone||'—';
      return (
        `${i+1}. *${id}* — ${o.clientName||'—'}\n`+
        `   📞 ${phone}\n`+
        (addr.gov||addr.city?`   📍 ${[addr.gov,addr.city].filter(Boolean).join(' — ')}\n`:'')+
        (addr.street?`   🏠 ${addr.street}\n`:'')+
        (sale>0?`   💰 الإجمالي ${fmtNum(sale)} ج | مدفوع ${fmtNum(paid)} ج${rem>0?' | *باقي '+fmtNum(rem)+' ج*':' ✅'}\n`:'')
      );
    }
  });
  return header+lines.join('─'.repeat(24)+'\n');
}

// ── Render multiple orders ─────────────────────────────────────────
function renderMultipleOrders(orders,type){
  const typeLabel=type==='production'?'ملخصات التنفيذ':'ملخصات الشحن والتسليم';
  const header=`
    <div class="multi-header">
      <div class="mh-title">📄 ${typeLabel}</div>
      <div class="mh-count">${orders.length} طلبات</div>
    </div>`;
  const sheets=orders.map((o,i)=>{
    const sheet=type==='production'?buildProductionSheet(o):buildDeliverySheet(o);
    // فاصل مرئي+طباعي بين الطلبات (عدا الأخير)
    const sep=i<orders.length-1
      ?`<div class="order-sep"><span>طلب ${i+2} من ${orders.length}</span></div>`
      :'';
    return sheet+sep;
  });
  return header+sheets.join('');
}

// ── Main ───────────────────────────────────────────────────────────
function showError(msg){
  document.getElementById('sheet-root').innerHTML=`
    <div class="center-msg">
      <div class="ico">❌</div>
      <div class="txt">${esc(msg)}</div>
    </div>`;
}

if(!orderIds.length){
  showError('لا توجد طلبات محددة في الرابط');
}else{
  onAuthStateChanged(auth,async user=>{
    if(!user){
      window.location.href='login.html?redirect='+encodeURIComponent(window.location.href);
      return;
    }
    try{
      // تحميل كل الطلبات بالتوازي
      const snaps=await Promise.all(orderIds.map(id=>getDoc(doc(db,'orders',id))));
      const loaded=snaps.filter(s=>s.exists()).map(s=>({...s.data(),_id:s.id}));

      if(!loaded.length){showError('لم يُعثر على أي طلب من المحددة');return;}

      const isBulk=loaded.length>1;
      const typeLabel=sheetType==='production'?'تنفيذ':'شحن';

      // Title
      document.title=isBulk
        ?`ملخص ${typeLabel} مجمع (${loaded.length} طلبات)`
        :(sheetType==='production'?'ورقة تنفيذ':'ورقة تسليم')+' — '+(loaded[0].orderId||loaded[0]._id.slice(-6));

      // Bar label
      const lbl=document.getElementById('bar-label');
      if(lbl) lbl.textContent=isBulk
        ?`${loaded.length} طلبات — ملخص ${typeLabel}`
        :(loaded[0].orderId||loaded[0]._id.slice(-6))+' · '+(loaded[0].clientName||'');

      // Render
      document.getElementById('sheet-root').innerHTML=isBulk
        ? renderMultipleOrders(loaded,sheetType)
        : (sheetType==='production' ? buildProductionSheet(loaded[0]) : buildDeliverySheet(loaded[0]));

      // WhatsApp button
      let waHref;
      if(isBulk){
        const txt=buildCombinedWAText(loaded,sheetType);
        waHref=`https://wa.me/?text=${encodeURIComponent(txt)}`;
      }else{
        const o=loaded[0];
        const txt=buildWAText(o,sheetType);
        const phone=sheetType==='delivery'?normalizePhone(o.customerPhoneShip||o.clientPhone):'';
        waHref=phone?`https://wa.me/${phone}?text=${encodeURIComponent(txt)}`:`https://wa.me/?text=${encodeURIComponent(txt)}`;
      }
      const waBtn=document.getElementById('wa-btn');
      if(waBtn) waBtn.href=waHref;

    }catch(err){
      console.error('[order-summary-sheet]',err);
      showError('فشل تحميل الطلبات: '+(err.message||String(err)));
    }
  });
}
