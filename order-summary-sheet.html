<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<title>ملخص الطلب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Tajawal',sans-serif;
  background:#eef2f9;
  color:#1a1a2e;
  direction:rtl;
  min-height:100vh;
}

/* ── Action Bar (print-hidden) ─────────────────────────────────── */
.action-bar{
  display:flex;gap:10px;padding:14px 24px;
  background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
  align-items:center;justify-content:center;flex-wrap:wrap;
  position:sticky;top:0;z-index:100;
  border-bottom:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(12px);
}
.action-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 24px;border-radius:12px;border:none;
  cursor:pointer;font-family:'Tajawal',sans-serif;
  font-size:14px;font-weight:700;text-decoration:none;
  white-space:nowrap;transition:all .2s ease;
}
.action-btn:hover{opacity:.88;transform:translateY(-1px)}
.action-btn:active{transform:translateY(0)}
.btn-print{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 2px 12px rgba(59,130,246,.3)}
.btn-wa{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;box-shadow:0 2px 12px rgba(37,211,102,.3)}
.btn-screenshot{background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;box-shadow:0 2px 12px rgba(168,85,247,.3)}
.btn-close{background:rgba(255,255,255,.08);color:#94a3b8;border:1px solid rgba(255,255,255,.12)}
.bar-label{font-size:12px;color:rgba(255,255,255,.35);margin-left:auto;white-space:nowrap;letter-spacing:.2px}

/* ── Sheet Wrapper ─────────────────────────────────────────────── */
.sheet-wrapper{max-width:820px;margin:28px auto;padding:0 16px 50px}

.sheet{
  background:#fff;
  border-radius:18px;
  box-shadow:0 8px 40px rgba(0,0,30,.1),0 1px 3px rgba(0,0,30,.06);
  overflow:hidden;
}

/* ── Sheet Header ──────────────────────────────────────────────── */
.sh-hdr{padding:30px 34px 28px;color:#fff;position:relative;overflow:hidden}
.sh-hdr::before{content:'';position:absolute;top:-60%;left:-20%;width:70%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 70%);pointer-events:none}
.sh-hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent)}
.sh-hdr.prod{background:linear-gradient(145deg,#0f172a 0%,#1e3a5f 50%,#1a365d 100%)}
.sh-hdr.delivery{background:linear-gradient(145deg,#052e16 0%,#14532d 50%,#166534 100%)}

.sh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:14px;flex-wrap:wrap;position:relative;z-index:1}
.sh-brand{display:flex;align-items:center;gap:12px}
.sh-brand-ico{
  width:50px;height:50px;border-radius:14px;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;
}
.sh-brand-name{font-size:17px;font-weight:900;color:#fff;letter-spacing:.3px}
.sh-brand-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px;font-weight:600}
.sh-type-badge{
  padding:7px 20px;border-radius:24px;font-size:13px;font-weight:800;
  white-space:nowrap;flex-shrink:0;letter-spacing:.3px;
  backdrop-filter:blur(8px);
}
.badge-prod{background:rgba(59,130,246,.2);color:#93c5fd;border:1px solid rgba(59,130,246,.35)}
.badge-delivery{background:rgba(34,197,94,.2);color:#86efac;border:1px solid rgba(34,197,94,.35)}

.sh-order{font-size:38px;font-weight:900;letter-spacing:.5px;margin-bottom:6px;position:relative;z-index:1}
.sh-client{font-size:18px;color:rgba(255,255,255,.75);margin-bottom:6px;font-weight:600;position:relative;z-index:1}
.sh-meta{display:flex;gap:18px;flex-wrap:wrap;position:relative;z-index:1}
.sh-meta-item{
  font-size:12px;color:rgba(255,255,255,.45);display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.06);padding:4px 12px;border-radius:20px;
  border:1px solid rgba(255,255,255,.08);font-weight:600;
}

/* ── Sheet Body ────────────────────────────────────────────────── */
.sh-body{padding:30px 34px}

.sec{margin-bottom:28px}
.sec:last-child{margin-bottom:0}
.sec-title{
  font-size:11px;font-weight:800;color:#64748b;
  text-transform:uppercase;letter-spacing:1.5px;
  padding-bottom:10px;border-bottom:2px solid #e2e8f0;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}

/* Design images */
.design-single{position:relative;border-radius:14px;overflow:hidden;border:1px solid #e2e8f0}
.design-single img{
  width:100%;max-height:300px;object-fit:contain;
  background:#f8fafc;display:block;
}
.design-multi{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
.design-multi img{
  width:100%;aspect-ratio:1;object-fit:cover;
  border-radius:12px;border:1px solid #e2e8f0;background:#f8fafc;
  transition:transform .2s;
}
.design-multi img:hover{transform:scale(1.02)}
.design-empty{
  background:linear-gradient(135deg,#f8fafc,#f1f5f9);
  border:2px dashed #cbd5e1;
  border-radius:14px;padding:44px 20px;text-align:center;color:#94a3b8;
}
.design-empty .ico{font-size:42px;margin-bottom:10px}
.design-empty .txt{font-size:14px;font-weight:600}

/* Info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.info-grid{grid-template-columns:1fr}}
.info-item{
  background:linear-gradient(135deg,#f8fafc,#f1f5f9);
  border-radius:12px;padding:14px 18px;
  border:1px solid #e2e8f0;
  transition:border-color .2s;
}
.info-item:hover{border-color:#cbd5e1}
.info-item.full{grid-column:1/-1}
.info-lbl{font-size:11px;color:#94a3b8;font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.info-val{font-size:15px;font-weight:700;color:#1e293b;line-height:1.5}
.info-val.xl{font-size:22px;font-weight:900}
.info-val.phone{font-size:19px;font-weight:900;letter-spacing:.8px;direction:ltr;text-align:right;font-family:'Inter','Tajawal',sans-serif}
.info-val.green{color:#059669}
.info-val.red{color:#dc2626}
.info-val.muted{color:#64748b;font-weight:600}

/* Products table */
.prod-table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden}
.prod-table th{
  background:linear-gradient(180deg,#f1f5f9,#e8edf5);padding:12px 16px;
  text-align:right;font-size:11px;font-weight:800;color:#64748b;
  text-transform:uppercase;letter-spacing:.5px;
  border-bottom:2px solid #e2e8f0;
}
.prod-table td{
  padding:12px 16px;border-bottom:1px solid #f1f5f9;
  font-size:14px;color:#1e293b;vertical-align:top;
}
.prod-table tr:last-child td{border-bottom:none}
.prod-table tr:hover td{background:#f8fafc}
.prod-table td:first-child{font-weight:700}
.prod-tag{
  display:inline-block;padding:3px 10px;border-radius:8px;
  font-size:11px;font-weight:700;margin:2px 3px;
}
.prod-tag.lam{background:rgba(99,102,241,.08);color:#6366f1;border:1px solid rgba(99,102,241,.2)}
.prod-tag.extra{background:rgba(16,185,129,.08);color:#059669;border:1px solid rgba(16,185,129,.2)}

/* Notes */
.notes-box{
  background:linear-gradient(135deg,#fffbeb,#fef3c7);
  border:1px solid #fcd34d;
  border-right:4px solid #f59e0b;
  border-radius:12px;padding:16px 20px;
  font-size:14px;color:#92400e;line-height:1.8;
  font-weight:600;
}
.notes-box+.notes-box{margin-top:10px}

/* Financial block */
.fin-block{
  background:linear-gradient(135deg,#f0f4ff 0%,#e8eeff 100%);
  border-radius:14px;padding:22px 26px;border:1px solid #c7d2fe;
}
.fin-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;font-size:15px;
}
.fin-row .lbl{color:#6366f1;font-weight:600}
.fin-row .val{font-weight:800;color:#1e293b}
.fin-row.divider{border-top:2px solid #c7d2fe;margin-top:10px;padding-top:12px}
.fin-row.big .lbl{font-size:16px;font-weight:700;color:#1e293b}
.fin-row.big .val{font-size:22px;color:#dc2626}
.fin-row.paid-row .val{color:#059669}

/* Collection status */
.coll-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 28px;border-radius:24px;font-size:14px;font-weight:700;
  margin-top:16px;
}
.coll-none{background:linear-gradient(135deg,#fefce8,#fef9c3);color:#a16207;border:1px solid #fbbf24}
.coll-part{background:linear-gradient(135deg,#eff6ff,#dbeafe);color:#1d4ed8;border:1px solid #60a5fa}
.coll-full{background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#047857;border:1px solid #34d399}

/* ── Sheet Footer ──────────────────────────────────────────────── */
.sh-footer{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 34px;background:linear-gradient(135deg,#f8fafc,#f1f5f9);
  border-top:1px solid #e2e8f0;
  font-size:12px;flex-wrap:wrap;gap:8px;
}
.sf-brand{color:#94a3b8;font-weight:700;letter-spacing:.2px}
.sf-ts{color:#cbd5e1;font-weight:600}

/* ── Loading / Error ───────────────────────────────────────────── */
.center-msg{text-align:center;padding:80px 20px}
.center-msg .ico{font-size:48px;margin-bottom:14px}
.center-msg .txt{font-size:16px;color:#64748b;font-weight:600}

/* ── PRINT ─────────────────────────────────────────────────────── */
/* ── Multi-order separator ───────────────────────────────────────── */
.order-sep{
  display:flex;align-items:center;gap:14px;
  margin:32px 0;color:#94a3b8;font-size:13px;font-weight:700;
}
.order-sep::before,.order-sep::after{content:'';flex:1;height:1px;background:#e2e8f0}

.multi-header{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  border-radius:16px;padding:20px 28px;
  margin-bottom:28px;color:#fff;
  display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
  box-shadow:0 4px 20px rgba(0,0,30,.1);
}
.multi-header .mh-title{font-size:19px;font-weight:900;letter-spacing:.3px}
.multi-header .mh-count{
  background:rgba(59,130,246,.25);color:#93c5fd;
  border:1px solid rgba(59,130,246,.4);
  padding:6px 18px;border-radius:20px;font-size:13px;font-weight:800;
}

@media print{
  .action-bar{display:none!important}
  body{background:#fff}
  .sheet-wrapper{margin:0;padding:0;max-width:100%}
  .sheet{box-shadow:none;border-radius:0}
  .multi-header{display:none!important}
  .sh-hdr,.sh-hdr::before,.info-item,.fin-block,.prod-table th,.notes-box,.coll-badge,.sh-meta-item,.badge-prod,.badge-delivery{
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }
  .design-single img,.design-multi img{max-height:220px}
  .order-sep{page-break-after:always;margin:0;border:none;height:0;display:block}
  .order-sep span,.order-sep::before,.order-sep::after{display:none}
}
</style>
</head>
<body>

<div class="action-bar" id="action-bar">
  <button class="action-btn btn-print" onclick="window.print()">🖨️ طباعة / PDF</button>
  <button class="action-btn btn-screenshot" id="screenshot-btn" onclick="captureScreenshot()">📸 تصوير</button>
  <a class="action-btn btn-wa" id="wa-btn" href="#" target="_blank" rel="noopener">💬 إرسال واتساب</a>
  <button class="action-btn btn-close" onclick="window.close()">✕ إغلاق</button>
  <span class="bar-label" id="bar-label">جارٍ التحميل...</span>
</div>

<div class="sheet-wrapper">
  <div id="sheet-root">
    <div class="center-msg">
      <div class="ico">⏳</div>
      <div class="txt">جارٍ تحميل بيانات الطلب...</div>
    </div>
  </div>
</div>

<script>
let _h2cLoaded=false,_h2cPromise=null;
function _loadH2C(){
  if(_h2cLoaded) return Promise.resolve();
  if(_h2cPromise) return _h2cPromise;
  _h2cPromise=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    s.onload=()=>{_h2cLoaded=true;res();};
    s.onerror=()=>{_h2cPromise=null;rej(new Error('فشل تحميل مكتبة التصوير'));};
    document.head.appendChild(s);
  });
  return _h2cPromise;
}
_loadH2C().catch(()=>{});
function _showToast(msg,ok){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-family:Tajawal,sans-serif;font-size:14px;font-weight:700;color:#fff;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:opacity .3s;'
    +(ok?'background:#059669':'background:#dc2626');
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},2500);
}
// captureScreenshot is defined in the module script below (needs Firebase access for images)
</script>
<script type="module">
import { app, auth, db, storage } from './core/firebase-init.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

let _captureOrders=[];

const params = new URLSearchParams(window.location.search);
const orderId = params.get('orderId') || '';
const idsParam = params.get('ids') || '';
const sheetType = params.get('type') === 'delivery' ? 'delivery' : 'production';
// قائمة IDs: إما ids (متعددة) أو orderId (واحد) أو لا شيء
const orderIds = idsParam
  ? idsParam.split(',').map(s=>s.trim()).filter(Boolean)
  : orderId ? [orderId] : [];

// ── helpers ────────────────────────────────────────────────────────
function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtNum(n){
  const v=parseFloat(n);
  return isFinite(v)?v.toLocaleString('ar-EG'):'0';
}

function getNet(o){
  const sale=parseFloat(o.salePrice)||0;
  const disc=parseFloat(o.discount)||0;
  const ship=o.priceIncludesShipping?0:(parseFloat(o.customerShipFee)||0);
  return Math.max(0,sale+ship-disc);
}

function getPaid(o){
  return Math.max(0,parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0);
}

function getRem(o){return Math.max(0,getNet(o)-getPaid(o));}

function nowStr(){
  return new Date().toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'})+
    ' — '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
}

function getAllDesignImages(o){
  const seen=new Set(), imgs=[];
  const push=u=>{if(u&&!seen.has(u)){seen.add(u);imgs.push(u);}};
  for(const p of (o.products||[])){
    if(Array.isArray(p.designImages)) p.designImages.filter(Boolean).forEach(push);
    if(p.designImageUrl) push(p.designImageUrl);
  }
  if(o.printFinalUrl) push(o.printFinalUrl);
  if(o.designImageUrl) push(o.designImageUrl);
  return imgs.slice(0,8);
}

// ── Production Sheet ───────────────────────────────────────────────
function buildProductionSheet(o){
  const imgs=getAllDesignImages(o);
  const products=o.products||[];

  // design images block
  let imgHtml;
  if(!imgs.length){
    imgHtml=`<div class="design-empty"><div class="ico">🖼️</div><div class="txt">لا توجد صورة تصميم</div></div>`;
  }else if(imgs.length===1){
    imgHtml=`<div class="design-single"><img src="${esc(imgs[0])}" loading="lazy" alt="التصميم"></div>`;
  }else{
    imgHtml=`<div class="design-multi">${imgs.map(u=>`<img src="${esc(u)}" loading="lazy" alt="تصميم">`).join('')}</div>`;
  }

  // products table
  let prodsHtml='';
  if(products.length){
    const rows=products.map(p=>{
      const lam=p.lamination&&p.lamination!=='بلا'?`<span class="prod-tag lam">${esc(p.lamination)}</span>`:'';
      const extras=(p.extras||[]).map(e=>`<span class="prod-tag extra">✓ ${esc(e)}</span>`).join('');
      const paper=p.paper?`${esc(p.paper)}${p.weight&&p.weight>0?' <span style="color:#94a3b8;font-size:11px">'+p.weight+'جم</span>':''}`:''
      const isOff=(p.printType||'').includes('offset');
      const isDig=(p.printType||'').includes('digital');
      const ptLabel=isOff&&isDig?'مختلط':isOff?'أوفست':isDig?'ديجيتال':'';
      const ptBadge=ptLabel?`<span class="prod-tag lam">${esc(ptLabel)}</span>`:'';
      return`<tr>
        <td>${esc(p.name||'—')} ${ptBadge}</td>
        <td>${esc(String(p.qty||1))} ق</td>
        <td>${esc(p.size||p.printSize||'—')}</td>
        <td>${paper||'—'}</td>
        <td>${lam||'—'}</td>
        <td>${extras||'—'}</td>
      </tr>`;
    }).join('');
    prodsHtml=`
      <div class="sec">
        <div class="sec-title">📦 تفاصيل المنتجات (${products.length})</div>
        <table class="prod-table">
          <thead><tr>
            <th>المنتج</th><th>الكمية</th><th>المقاس</th>
            <th>نوع الورق</th><th>السلوفان</th><th>تشطيبات</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }else if(o.product){
    prodsHtml=`
      <div class="sec">
        <div class="sec-title">📦 تفاصيل الطلب</div>
        <div class="info-grid">
          <div class="info-item"><div class="info-lbl">المنتج</div><div class="info-val">${esc(o.product)}</div></div>
          ${o.qty?`<div class="info-item"><div class="info-lbl">الكمية</div><div class="info-val">${esc(String(o.qty))} قطعة</div></div>`:''}
        </div>
      </div>`;
  }

  // notes
  const notesHtml=(o.printNotes||o.designNote||o.briefNotes)?`
    <div class="sec">
      <div class="sec-title">📝 الملاحظات</div>
      ${o.printNotes?`<div class="notes-box">${esc(o.printNotes)}</div>`:''}
      ${o.designNote?`<div class="notes-box">${esc(o.designNote)}</div>`:''}
      ${o.briefNotes&&!o.printNotes&&!o.designNote?`<div class="notes-box">${esc(o.briefNotes)}</div>`:''}
    </div>`:' ';

  const totalQty=products.reduce((s,p)=>s+(parseInt(p.qty)||1),0);
  const printTypes=[...new Set(products.map(p=>p.printType).filter(Boolean))];
  const ptSummary=printTypes.map(t=>t.includes('offset')?'أوفست':t.includes('digital')?'ديجيتال':t).join(' + ');

  return `
    <div class="sheet">
      <div class="sh-hdr prod">
        <div class="sh-top">
          <div class="sh-brand">
            <div class="sh-brand-ico">🎨</div>
            <div><div class="sh-brand-name">Business2Card</div><div class="sh-brand-sub">ملخص التنفيذ</div></div>
          </div>
          <div class="sh-type-badge badge-prod">🖨️ ورقة إنتاج</div>
        </div>
        <div class="sh-order">${esc(o.orderId||(o._id||'').slice(-6))}</div>
        <div class="sh-client">👤 ${esc(o.clientName||'—')}</div>
        <div class="sh-meta">
          ${o.deadline?`<div class="sh-meta-item">📅 موعد التسليم: ${esc(o.deadline)}</div>`:''}
          ${o.createdDate?`<div class="sh-meta-item">🗓️ تاريخ الإنشاء: ${esc(o.createdDate)}</div>`:''}
          ${products.length?`<div class="sh-meta-item">📦 ${products.length} منتجات · ${totalQty} قطعة</div>`:''}
          ${ptSummary?`<div class="sh-meta-item">🖨️ ${esc(ptSummary)}</div>`:''}
        </div>
      </div>

      <div class="sh-body">
        <div class="sec">
          <div class="sec-title">🖼️ صورة التصميم</div>
          ${imgHtml}
        </div>
        ${prodsHtml}
        ${notesHtml}
      </div>

      <div class="sh-footer">
        <div class="sf-brand">Business2Card ERP · ملخص التنفيذ · للاستخدام الداخلي فقط</div>
        <div class="sf-ts">طُبع: ${nowStr()}</div>
      </div>

// ── WhatsApp message builder ───────────────────────────────────────
function buildWAText(o,type){
  const id=o.orderId||(o._id||'').slice(-6);
  if(type==='production'){
    const products=(o.products||[]);
    const lines=products.length
      ?products.map(p=>`• ${p.name||''}${p.qty?' × '+p.qty:''}${p.size?' | '+p.size:''}${p.paper?' | '+p.paper:''}${p.lamination&&p.lamination!=='بلا'?' | '+p.lamination:''}`).join('\n')
      :(o.product||'—');
    return (
      `🖨️ *ورقة تنفيذ — ${id}*\n`+
      `👤 العميل: ${o.clientName||'—'}\n`+
      (o.deadline?`📅 موعد التسليم: ${o.deadline}\n`:'')+
      `\n📦 المنتجات:\n${lines}\n`+
      (o.printNotes?`\n📝 ملاحظات:\n${o.printNotes}`:'')
    );
  }else{
    const sale=getNet(o),paid=getPaid(o),rem=getRem(o);
    const addr=o.deliveryAddress||{};
    const phone=o.customerPhoneShip||o.clientPhone||'—';
    return (
      `🚚 *ورقة تسليم — ${id}*\n`+
      `👤 العميل: ${o.clientName||'—'}\n`+
      `📞 الهاتف: ${phone}\n`+
      (addr.gov?`📍 ${addr.gov}${addr.city?' — '+addr.city:''}\n`:'')+
      (addr.street?`🏠 ${addr.street}\n`:'')+
      (o.deadline?`📅 موعد التسليم: ${o.deadline}\n`:'')+
      `\n💰 المالية:\n`+
      `• الإجمالي: ${fmtNum(sale)} ج\n`+
      `• المدفوع: ${fmtNum(paid)} ج\n`+
      (rem>0?`• المتبقي: *${fmtNum(rem)} ج*`:'• ✅ مكتمل التحصيل')
    );
  }
}

function normalizePhone(raw){
  const d=String(raw||'').replace(/\D/g,'');
  if(!d) return '';
  if(d.startsWith('20')) return d;
  if(d.startsWith('0')) return '20'+d.slice(1);
  return '20'+d;
}

// ── Combined WA message (multi-order) ─────────────────────────────
function buildCombinedWAText(orders,type){
  const typeLabel=type==='production'?'🖨️ ملخص التنفيذ المجمع':'🚚 ملخص الشحن المجمع';
  const header=`${typeLabel} (${orders.length} طلبات)\n${'─'.repeat(32)}\n`;
  const lines=orders.map((o,i)=>{
    const id=o.orderId||o._id?.slice(-6)||'—';
    if(type==='production'){
      const products=(o.products||[]);
      const prodsLine=products.length
        ?products.map(p=>`  • ${p.name||''}${p.qty?' × '+p.qty:''}${p.size?' | '+p.size:''}${p.paper?' | '+p.paper:''}`).join('\n')
        :`  • ${o.product||'—'}`;
      return (
        `${i+1}. *${id}* — ${o.clientName||'—'}\n`+
        (o.deadline?`   📅 ${o.deadline}\n`:'')+
        `${prodsLine}\n`+
        (o.printNotes?`   📝 ${o.printNotes}\n`:'')
      );
    }else{
      const sale=getNet(o),paid=getPaid(o),rem=getRem(o);
      const addr=o.deliveryAddress||{};
      const phone=o.customerPhoneShip||o.clientPhone||'—';
      return (
        `${i+1}. *${id}* — ${o.clientName||'—'}\n`+
        `   📞 ${phone}\n`+
        (addr.gov||addr.city?`   📍 ${[addr.gov,addr.city].filter(Boolean).join(' — ')}\n`:'')+
        (addr.street?`   🏠 ${addr.street}\n`:'')+
        (sale>0?`   💰 الإجمالي ${fmtNum(sale)} ج | مدفوع ${fmtNum(paid)} ج${rem>0?' | *باقي '+fmtNum(rem)+' ج*':' ✅'}\n`:'')
      );
    }
  });
  return header+lines.join('─'.repeat(24)+'\n');
}

// ── Render multiple orders ─────────────────────────────────────────
function renderMultipleOrders(orders,type){
  const typeLabel=type==='production'?'ملخصات التنفيذ':'ملخصات الشحن والتسليم';
  const header=`
    <div class="multi-header">
      <div class="mh-title">📄 ${typeLabel}</div>
      <div class="mh-count">${orders.length} طلبات</div>
    </div>`;
  const sheets=orders.map((o,i)=>{
    const sheet=type==='production'?buildProductionSheet(o):buildDeliverySheet(o);
    // فاصل مرئي+طباعي بين الطلبات (عدا الأخير)
    const sep=i<orders.length-1
      ?`<div class="order-sep"><span>طلب ${i+2} من ${orders.length}</span></div>`
      :'';
    return sheet+sep;
  });
  return header+sheets.join('');
}

function _blobToDataUrl(b){return new Promise(r=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.onerror=()=>r('');rd.readAsDataURL(b);});}
function _withTimeout(p,ms){return Promise.race([p,new Promise(r=>setTimeout(()=>r(''),ms))]);}
async function _imgToBase64(url){
  if(!url||url.startsWith('data:'))return url||'';
  try{const r=await _withTimeout(fetch(url,{mode:'cors'}).then(r=>r.ok?r.blob():null),4000);if(r)return await _blobToDataUrl(r);}catch{}
  try{
    const m=url.match(/\/o\/([^?]+)/);
    if(m){
      const p=decodeURIComponent(m[1]);
      const{ref:sRef,getBlob:gBlob}=await import('https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js');
      const b=await _withTimeout(gBlob(sRef(storage,p)),5000);
      if(b)return await _blobToDataUrl(b);
    }
  }catch{}
  try{
    return await _withTimeout(new Promise(res=>{
      const img=new Image();img.crossOrigin='anonymous';
      img.onload=()=>{try{const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;c.getContext('2d').drawImage(img,0,0);res(c.toDataURL('image/jpeg',0.85));}catch{res('');}};
      img.onerror=()=>res('');img.src=url;
    }),4000);
  }catch{}
  return '';
}

    const fileName=prefix+'-'+(o.orderId||'').replace(/[^a-zA-Z0-9]/g,'-')+'.jpg';
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=fileName;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    _showToast('تم حفظ الصورة ✅',true);
  }catch(e){
    console.error('Screenshot error:',e);
    _showToast('فشل التصوير — حاول مرة أخرى',false);
  }finally{btn.disabled=false;btn.textContent=origText;}
};
</script>
</body>
</html>
