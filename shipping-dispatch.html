<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff3d6e">
<title>B2C — إسناد الشحنات</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="sidebar-config.js"></script>
<script src="sync-monitor.js"></script>
<script src="smart-sidebar.js?v=1" defer></script>
<style>
.layout{display:grid;grid-template-columns:1fr 380px;gap:14px}
@media(max-width:980px){.layout{grid-template-columns:1fr}}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:12px;border-top:3px solid var(--kc)}
.kpi-val{font-size:22px;font-weight:900;color:var(--kc)}
.kpi-lbl{font-size:10px;color:var(--dim2);font-weight:700}
.ship-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:12px;margin-bottom:8px;border-right:3px solid var(--c);cursor:pointer;transition:.2s}
.ship-card:hover{border-color:var(--c)}
.ship-card.selected{background:var(--bg);border-color:var(--c);box-shadow:0 0 0 2px var(--c)}
.state-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:800}
.partner-suggest{background:var(--bg);padding:10px;border-radius:8px;margin-bottom:6px;cursor:pointer;transition:.2s;border:1px solid var(--line)}
.partner-suggest:hover{border-color:var(--c)}
.partner-suggest.best{border-color:var(--g);background:rgba(0,217,126,.05)}
.tab-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab-bar .btn-ghost{opacity:.7}
.tab-bar .btn-c,.tab-bar .btn-r,.tab-bar .btn-g,.tab-bar .btn-y{opacity:1}
.bid-row{display:flex;justify-content:space-between;align-items:center;padding:8px;background:var(--bg);border-radius:6px;margin-bottom:4px;font-size:13px}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav"></aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><button class="mob-menu-btn" onclick="toggleNav()">☰</button><div><h1>🎯 إسناد الشحنات</h1><p>لوحة الـ Dispatcher — توزيع الشحنات على شبكة الشركاء</p></div></div>
    <div class="topbar-right">
      <button class="btn btn-c btn-sm" onclick="location.href='shipping-partners.html'">🤝 الشركاء</button>
    </div>
  </div>
  <div class="content">
    <!-- KPIs -->
    <div class="kpi-row">
      <div class="kpi" style="--kc:var(--y)"><div class="kpi-val" id="k-pending">—</div><div class="kpi-lbl">شحنات تنتظر إسناد</div></div>
      <div class="kpi" style="--kc:var(--b)"><div class="kpi-val" id="k-bidding">—</div><div class="kpi-lbl">في وضع العروض</div></div>
      <div class="kpi" style="--kc:var(--c)"><div class="kpi-val" id="k-transit">—</div><div class="kpi-lbl">في الطريق</div></div>
      <div class="kpi" style="--kc:var(--g)"><div class="kpi-val" id="k-today">—</div><div class="kpi-lbl">سُلِّمت اليوم</div></div>
    </div>

    <div class="layout">
      <!-- Left: shipments queue -->
      <div>
        <div class="tab-bar">
          <button class="btn btn-y btn-sm" id="tab-pending" onclick="switchTab('pending')">⏳ تنتظر إسناد</button>
          <button class="btn btn-ghost btn-sm" id="tab-active" onclick="switchTab('active')">🚚 نشطة</button>
          <button class="btn btn-ghost btn-sm" id="tab-bidding" onclick="switchTab('bidding')">🎯 عروض مفتوحة</button>
          <button class="btn btn-ghost btn-sm" id="tab-done" onclick="switchTab('done')">✅ منتهية</button>
        </div>
        <div id="shipments-list"><div class="loader"><div class="spinner"></div></div></div>
      </div>

      <!-- Right: dispatch panel -->
      <div>
        <div style="background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;position:sticky;top:14px">
          <h3 style="margin:0 0 12px;font-size:14px">🎯 لوحة الإسناد</h3>
          <div id="dispatch-panel">
            <div style="text-align:center;padding:30px 10px;color:var(--dim2);font-size:13px">
              اختر شحنة من القائمة لبدء الإسناد
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- Create Shipment Modal -->
<div class="overlay" id="ov-create">
  <div class="modal" style="max-width:600px">
    <div class="modal-head"><h3>📦 إنشاء شحنة جديدة لأوردر</h3><button class="btn-x" onclick="closeCreateModal()">✕</button></div>
    <div class="modal-body">
      <div style="margin-bottom:10px"><label style="font-size:12px;color:var(--dim2)">اختر الأوردر</label>
        <select id="cr-order" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:6px"></select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div><label style="font-size:12px;color:var(--dim2)">المحافظة</label>
          <select id="cr-gov" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:6px">
            <option value="">— اختر —</option>
          </select>
        </div>
        <div><label style="font-size:12px;color:var(--dim2)">الوزن (كجم)</label>
          <input type="number" id="cr-weight" value="1" min="0.1" step="0.1" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:6px">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div><label style="font-size:12px;color:var(--dim2)">طريقة الدفع</label>
          <select id="cr-paymethod" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:6px">
            <option value="prepaid">مدفوع مسبقاً</option>
            <option value="cod">عند الاستلام (COD)</option>
          </select>
        </div>
        <div><label style="font-size:12px;color:var(--dim2)">مبلغ COD (لو COD)</label>
          <input type="number" id="cr-cod" value="0" min="0" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:6px">
        </div>
      </div>
      <div style="margin-bottom:10px"><label style="font-size:12px;color:var(--dim2)">نوع الإسناد</label>
        <select id="cr-mode" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:6px">
          <option value="manual">يدوي (Dispatcher يختار)</option>
          <option value="auto_route">تلقائي (أفضل شريك)</option>
          <option value="bid">طرح للعروض (Marketplace)</option>
        </select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeCreateModal()">إلغاء</button>
      <button class="btn btn-g" onclick="createShipment()">📦 إنشاء الشحنة</button>
    </div>
  </div>
</div>

<script type="module">
import { auth, db, AppState, initAuth, logout, toast } from './shared.js?v=1';
import {
  collection, doc, onSnapshot, query, orderBy, where, getDocs, getDoc, limit
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { dispatchShippingNetworkEvent, SN_COLLECTIONS, SHIPMENT_STATE, calculateShippingPrice } from './shipping-network-engine.js?v=1';

window.toggleNav = ()=> document.querySelector('.sidenav')?.classList.toggle('mob-open');

const GOV_LABELS = {
  cairo:'القاهرة', giza:'الجيزة', alex:'الإسكندرية', dakahlia:'الدقهلية',
  sharqia:'الشرقية', gharbia:'الغربية', monufia:'المنوفية', qalyubia:'القليوبية',
  beheira:'البحيرة', kafr_elsheikh:'كفر الشيخ', damietta:'دمياط', port_said:'بور سعيد',
  ismailia:'الإسماعيلية', suez:'السويس', fayoum:'الفيوم', beni_suef:'بني سويف',
  minya:'المنيا', assiut:'أسيوط', sohag:'سوهاج', qena:'قنا', luxor:'الأقصر',
  aswan:'أسوان', red_sea:'البحر الأحمر', new_valley:'الوادي الجديد', matrouh:'مطروح',
};

let allShipments = [], allPartners = [], allOrders = [];
let activeTab = 'pending';
let selectedShipmentId = null;
let currentBids = [];

initAuth(async (state) => {
  if (!['admin','operation_manager','shipping_dispatcher','shipping_officer'].includes(state.currentRole)) {
    document.body.innerHTML = '<div style="padding:40px;text-align:center"><h2>⛔ غير مصرح</h2><a href="index.html" class="btn">عودة</a></div>';
    return;
  }

  // Populate governorates in create modal
  const govSel = document.getElementById('cr-gov');
  Object.entries(GOV_LABELS).forEach(([k,v]) => {
    const o = document.createElement('option'); o.value=k; o.textContent=v; govSel.appendChild(o);
  });

  // Shipments live
  onSnapshot(query(collection(db, SN_COLLECTIONS.SHIPMENTS), orderBy('createdAt','desc'), limit(200)), snap => {
    allShipments = snap.docs.map(d => ({...d.data(), _id:d.id}));
    renderKpis(); renderShipments();
    if (selectedShipmentId && !allShipments.find(s => s._id === selectedShipmentId)) {
      selectedShipmentId = null; renderDispatchPanel();
    } else if (selectedShipmentId) renderDispatchPanel();
  });

  // Partners (for assignment)
  onSnapshot(query(collection(db, SN_COLLECTIONS.PARTNERS), where('status','==','active')), snap => {
    allPartners = snap.docs.map(d => ({...d.data(), _id:d.id}));
    if (selectedShipmentId) renderDispatchPanel();
  });

  // Orders (for "create shipment" picker)
  onSnapshot(query(collection(db, 'orders'), orderBy('createdAt','desc'), limit(100)), snap => {
    allOrders = snap.docs.map(d => ({...d.data(), _id:d.id}));
    const sel = document.getElementById('cr-order');
    // only orders that don't have a shipment yet
    const eligible = allOrders.filter(o => !o.shipmentRef && o.stage !== 'archived' && o.stage !== 'cancelled');
    sel.innerHTML = '<option value="">— اختر أوردر —</option>' + eligible.map(o =>
      `<option value="${o._id}">${o.id||o._id} — ${o.clientName||'—'} — ${o.salePrice||0}ج</option>`
    ).join('');
  });
}, () => location.href='login.html');

function renderKpis() {
  const pending = allShipments.filter(s => ['created','assigned'].includes(s.state)).length;
  const bidding = allShipments.filter(s => s.state==='bidding').length;
  const transit = allShipments.filter(s => ['picked_up','in_transit','out_for_delivery'].includes(s.state)).length;
  const today = allShipments.filter(s => {
    if (s.state !== 'delivered' || !s.deliveredAt) return false;
    const d = s.deliveredAt.toDate?.() || new Date(s.deliveredAt);
    const t = new Date();
    return d.toDateString() === t.toDateString();
  }).length;
  document.getElementById('k-pending').textContent = pending;
  document.getElementById('k-bidding').textContent = bidding;
  document.getElementById('k-transit').textContent = transit;
  document.getElementById('k-today').textContent = today;
}

window.switchTab = (tab) => {
  activeTab = tab;
  ['pending','active','bidding','done'].forEach(t => {
    const btn = document.getElementById('tab-'+t);
    btn.classList.remove('btn-y','btn-c','btn-r','btn-g'); btn.classList.add('btn-ghost');
  });
  const colorMap = { pending:'btn-y', active:'btn-c', bidding:'btn-r', done:'btn-g' };
  const btn = document.getElementById('tab-'+tab);
  btn.classList.remove('btn-ghost'); btn.classList.add(colorMap[tab]);
  renderShipments();
};

function renderShipments() {
  let filtered = [];
  if (activeTab === 'pending')      filtered = allShipments.filter(s => ['created','assigned','accepted'].includes(s.state));
  else if (activeTab === 'active')  filtered = allShipments.filter(s => ['picked_up','in_transit','out_for_delivery','delivery_failed'].includes(s.state));
  else if (activeTab === 'bidding') filtered = allShipments.filter(s => s.state==='bidding');
  else                               filtered = allShipments.filter(s => ['delivered','settled','cancelled','returned'].includes(s.state));

  const list = document.getElementById('shipments-list');
  if (!filtered.length) {
    list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--dim2)">
      لا شحنات في هذا التبويب<br><br>
      <button class="btn btn-g btn-sm" onclick="openCreateModal()">➕ إنشاء شحنة جديدة</button>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(s => {
    const order = allOrders.find(o => o._id === s.orderId);
    const stateMeta = STATE_META[s.state] || {label:s.state, col:'#4e5672', ico:'❓'};
    const isSelected = s._id === selectedShipmentId;
    const partnerLine = s.partnerName ? `🤝 ${s.partnerName}` : '<span style="color:var(--y)">لم يُسند بعد</span>';
    const codBadge = s.paymentMethod==='cod' ? `<span style="background:rgba(255,170,0,.1);color:#ffaa00;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:800">COD ${s.codAmount||0}ج</span>` : '';
    return `<div class="ship-card ${isSelected?'selected':''}" style="--c:${stateMeta.col}" onclick="selectShipment('${s._id}')">
      <div style="display:flex;justify-content:space-between;align-items:start;gap:8px">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            <span class="state-badge" style="background:${stateMeta.col}18;color:${stateMeta.col}">${stateMeta.ico} ${stateMeta.label}</span>
            ${codBadge}
            <span style="font-size:11px;color:var(--dim2)">#${order?.id || s._id.slice(0,8)}</span>
          </div>
          <div style="font-weight:700;font-size:13px;margin-bottom:2px">${order?.clientName || '—'}</div>
          <div style="font-size:11px;color:var(--dim2)">
            📍 ${GOV_LABELS[s.delivery?.zoneId]||s.delivery?.address||'—'} • ${partnerLine}
          </div>
        </div>
        <div style="text-align:left">
          <div style="font-weight:900;font-size:14px">${(s.pricing?.customerFee||0).toFixed(0)}ج</div>
          <div style="font-size:10px;color:var(--dim2)">شحن</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

const STATE_META = {
  created:          {label:'مُنشأة',         ico:'📋', col:'#4e5672'},
  bidding:          {label:'فتح عروض',        ico:'🎯', col:'#a78bfa'},
  assigned:         {label:'مُسندة',          ico:'📨', col:'#3b9eff'},
  accepted:         {label:'قُبِلت',           ico:'✅', col:'#00d97e'},
  picked_up:        {label:'استلام',          ico:'📦', col:'#22d3ee'},
  in_transit:       {label:'في الطريق',       ico:'🚚', col:'#ffaa00'},
  out_for_delivery: {label:'للتسليم',         ico:'📍', col:'#ff3d6e'},
  delivered:        {label:'تم التسليم',      ico:'🎉', col:'#00d97e'},
  delivery_failed:  {label:'فشل التسليم',     ico:'⚠️', col:'#ffaa00'},
  returned:         {label:'مرتجعة',          ico:'↩️', col:'#ff3d6e'},
  settled:          {label:'تمت التسوية',     ico:'💰', col:'#00d97e'},
  cancelled:        {label:'ملغاة',           ico:'✕',  col:'#4e5672'},
  disputed:         {label:'نزاع',            ico:'⚖️', col:'#ff3d6e'},
};

window.selectShipment = (id) => {
  selectedShipmentId = id;
  renderShipments();
  renderDispatchPanel();
};

async function renderDispatchPanel() {
  const panel = document.getElementById('dispatch-panel');
  if (!selectedShipmentId) {
    panel.innerHTML = '<div style="text-align:center;padding:30px 10px;color:var(--dim2);font-size:13px">اختر شحنة من القائمة</div>';
    return;
  }
  const s = allShipments.find(x => x._id === selectedShipmentId);
  if (!s) { panel.innerHTML = ''; return; }
  const order = allOrders.find(o => o._id === s.orderId);

  // ========== UN-ASSIGNED → show partner suggestions ==========
  if (['created'].includes(s.state)) {
    // Score partners: by governorate match, rating, on-time%, price
    const targetGov = s.delivery?.zoneId;
    const ranked = [...allPartners]
      .filter(p => p.kycStatus === 'approved')
      .map(p => {
        const govMatch = p.governorateId === targetGov ? 30 : (p.coverageGovernorates?.includes(targetGov) ? 20 : 0);
        const ratingScore = (p.ratingAvg || 0) * 6; // max 30
        const onTimeScore = (p.onTimePct || 0) * 0.3; // max 30
        const priceScore = Math.max(0, 30 - (p.basePricing?.flatRate || 0)/10);
        const score = govMatch + ratingScore + onTimeScore + priceScore;
        const price = calculateShippingPrice({ partner: p, weightKg: s.pricing?.weightKg || 1 });
        return { ...p, _score: score, _price: price };
      })
      .sort((a,b) => b._score - a._score);

    panel.innerHTML = `
      <div style="font-size:13px;margin-bottom:8px">
        <div style="font-weight:800;margin-bottom:2px">${order?.clientName || '—'}</div>
        <div style="font-size:11px;color:var(--dim2)">📍 ${GOV_LABELS[targetGov] || '—'}</div>
      </div>
      <h4 style="margin:10px 0 8px;font-size:12px;color:var(--dim2)">🏆 الشركاء المُرشَّحون (مرتَّب)</h4>
      ${ranked.slice(0,5).map((p, i) => `
        <div class="partner-suggest ${i===0?'best':''}" onclick="assignTo('${selectedShipmentId}','${p._id}','${p.name.replace(/'/g, "\\'")}')">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <div style="font-weight:800;font-size:13px">${i===0?'🥇 ':''}${p.name}</div>
            <div style="font-weight:900;color:var(--g)">${p._price.customerFee.toFixed(0)}ج</div>
          </div>
          <div style="font-size:11px;color:var(--dim2)">
            ${(p.ratingAvg||0).toFixed(1)}★ • ${p.onTimePct||0}% في الموعد • ${p.totalShipments||0} شحنة
          </div>
        </div>
      `).join('') || '<div style="color:var(--dim2);text-align:center;padding:20px;font-size:12px">لا شركاء معتمدين متاحين</div>'}
      <button class="btn btn-r btn-sm" style="width:100%;margin-top:10px" onclick="openBidding('${selectedShipmentId}')">🎯 طرح للعروض (Marketplace)</button>
    `;
    return;
  }

  // ========== ASSIGNED/ACCEPTED → action buttons for state transition ==========
  if (['assigned','accepted','picked_up','in_transit','out_for_delivery','delivery_failed'].includes(s.state)) {
    const actions = [];
    if (s.state === 'assigned')          actions.push(['SHIPMENT_ACCEPTED', '✅ تأكيد القبول']);
    if (['assigned','accepted'].includes(s.state)) actions.push(['SHIPMENT_PICKED_UP', '📦 استلمها الشريك']);
    if (s.state === 'picked_up')         actions.push(['SHIPMENT_IN_TRANSIT', '🚚 في الطريق']);
    if (s.state === 'in_transit')        actions.push(['SHIPMENT_OUT_FOR_DELIVERY', '📍 للتسليم']);
    if (['out_for_delivery','delivery_failed'].includes(s.state)) {
      actions.push(['MARK_DELIVERED', '🎉 تم التسليم']);
      actions.push(['SHIPMENT_DELIVERY_FAILED', '⚠️ فشل (إعادة محاولة)']);
    }
    actions.push(['SHIPMENT_CANCELLED', '✕ إلغاء الشحنة']);

    panel.innerHTML = `
      <div style="font-size:13px;margin-bottom:10px">
        <div style="font-weight:800">${order?.clientName||'—'}</div>
        <div style="font-size:11px;color:var(--dim2)">🤝 ${s.partnerName || '—'}</div>
      </div>
      <div style="background:var(--bg);padding:10px;border-radius:8px;margin-bottom:10px;font-size:12px">
        <div>💰 تكلفة الشريك: <b>${(s.pricing?.partnerCost||0).toFixed(2)}ج</b></div>
        <div>🏛️ عمولة المنصة: <b>${(s.pricing?.platformCommission||0).toFixed(2)}ج</b></div>
        <div>📊 إجمالي العميل: <b>${(s.pricing?.customerFee||0).toFixed(2)}ج</b></div>
      </div>
      <h4 style="margin:10px 0 8px;font-size:12px;color:var(--dim2)">الإجراءات</h4>
      ${actions.map(([evt, label]) => `
        <button class="btn btn-c btn-sm" style="width:100%;margin-bottom:4px" onclick="dispatchAction('${selectedShipmentId}','${evt}')">${label}</button>
      `).join('')}
    `;
    return;
  }

  // ========== BIDDING → show current bids ==========
  if (s.state === 'bidding') {
    const bidsSnap = await getDocs(query(collection(db, SN_COLLECTIONS.SHIPMENT_BIDS), where('shipmentId','==', selectedShipmentId)));
    currentBids = bidsSnap.docs.map(d => ({...d.data(), _id:d.id})).sort((a,b) => a.bidAmount - b.bidAmount);
    panel.innerHTML = `
      <div style="font-size:13px;margin-bottom:10px">
        <div style="font-weight:800">${order?.clientName||'—'}</div>
        <div style="font-size:11px;color:var(--dim2)">📍 ${GOV_LABELS[s.delivery?.zoneId]||'—'}</div>
      </div>
      <h4 style="margin:10px 0 8px;font-size:12px;color:var(--dim2)">🎯 العروض المُقدَّمة (${currentBids.length})</h4>
      ${currentBids.length === 0 ?
        '<div style="text-align:center;color:var(--dim2);padding:20px;font-size:12px">لم تصل عروض بعد...</div>' :
        currentBids.map(b => `
          <div class="bid-row">
            <div>
              <b>${b.partnerName}</b>
              <div style="font-size:10px;color:var(--dim2)">${b.proposedDeliveryHours||0} ساعة</div>
            </div>
            <div style="text-align:left">
              <div style="font-weight:900">${b.bidAmount.toFixed(0)}ج</div>
              <button class="btn btn-g" style="font-size:10px;padding:2px 6px" onclick="acceptBid('${b._id}')">قبول</button>
            </div>
          </div>
        `).join('')
      }
      <button class="btn btn-r btn-sm" style="width:100%;margin-top:10px" onclick="dispatchAction('${selectedShipmentId}','SHIPMENT_CANCELLED')">✕ إلغاء العروض</button>
    `;
    return;
  }

  // ========== TERMINAL ==========
  panel.innerHTML = `
    <div style="font-size:13px;margin-bottom:10px">
      <div style="font-weight:800">${order?.clientName||'—'}</div>
      <div style="font-size:11px;color:var(--dim2)">🤝 ${s.partnerName || '—'}</div>
    </div>
    <div style="background:var(--bg);padding:14px;border-radius:8px;text-align:center">
      <div style="font-size:24px;margin-bottom:8px">${STATE_META[s.state]?.ico||'✅'}</div>
      <div style="font-weight:800">${STATE_META[s.state]?.label||s.state}</div>
      ${s.deliveredAt ? `<div style="font-size:11px;color:var(--dim2);margin-top:4px">${new Date(s.deliveredAt.toDate?.()||s.deliveredAt).toLocaleString('ar-EG')}</div>` : ''}
    </div>
  `;
}

window.assignTo = async function(shipmentId, partnerId, partnerName) {
  if (!confirm(`إسناد لـ ${partnerName}؟`)) return;
  try {
    await dispatchShippingNetworkEvent(db, 'SHIPMENT_ASSIGNED', {
      shipmentId, partnerId, partnerName,
      assignmentMethod: 'manual',
      userId: auth.currentUser.uid, userName: AppState.userName,
    });
    toast('✅ تم الإسناد', 'ok');
  } catch (e) { toast('❌ ' + e.message, 'err'); }
};

window.dispatchAction = async function(shipmentId, evt) {
  if (evt === 'MARK_DELIVERED') {
    const recipient = prompt('اسم المستلم:');
    if (recipient === null) return;
    try {
      await dispatchShippingNetworkEvent(db, 'SHIPMENT_DELIVERED', {
        shipmentId, recipientName: recipient,
        userId: auth.currentUser.uid, userName: AppState.userName,
      });
      toast('🎉 تم التسليم', 'ok');
    } catch (e) { toast('❌ '+e.message, 'err'); }
    return;
  }
  if (evt === 'SHIPMENT_CANCELLED') {
    const reason = prompt('سبب الإلغاء:');
    if (reason === null) return;
    try {
      await dispatchShippingNetworkEvent(db, evt, {
        shipmentId, reason,
        userId: auth.currentUser.uid, userName: AppState.userName,
      });
      toast('تم الإلغاء', 'ok');
    } catch (e) { toast('❌ '+e.message, 'err'); }
    return;
  }
  try {
    await dispatchShippingNetworkEvent(db, evt, {
      shipmentId,
      userId: auth.currentUser.uid, userName: AppState.userName,
    });
    toast('✅ تم التحديث', 'ok');
  } catch (e) { toast('❌ '+e.message, 'err'); }
};

window.openBidding = async function(shipmentId) {
  if (!confirm('فتح وضع العروض على هذه الشحنة؟ كل الشركاء المعتمدين هيقدروا يقدموا عروضهم.')) return;
  try {
    // Simply mark as bidding state via SHIPMENT_ASSIGNED with null partner... actually use a state transition directly.
    // The state machine doesn't have a direct "open bidding" event yet — for now, we just update the state field.
    const { updateDoc, doc, serverTimestamp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    await updateDoc(doc(db, SN_COLLECTIONS.SHIPMENTS, shipmentId), {
      state: 'bidding',
      biddingOpenedAt: serverTimestamp(),
      updatedAt: serverTimestamp(),
    });
    toast('🎯 تم فتح العروض', 'ok');
  } catch (e) { toast('❌ '+e.message, 'err'); }
};

window.acceptBid = async function(bidId) {
  if (!confirm('قبول هذا العرض؟')) return;
  try {
    await dispatchShippingNetworkEvent(db, 'BID_ACCEPTED', {
      bidId,
      userId: auth.currentUser.uid, userName: AppState.userName,
    });
    toast('✅ تم قبول العرض', 'ok');
  } catch (e) { toast('❌ '+e.message, 'err'); }
};

window.openCreateModal = () => document.getElementById('ov-create').classList.add('open');
window.closeCreateModal = () => document.getElementById('ov-create').classList.remove('open');

window.createShipment = async function() {
  const orderId = document.getElementById('cr-order').value;
  if (!orderId) { toast('اختر أوردر', 'err'); return; }
  const gov = document.getElementById('cr-gov').value;
  const order = allOrders.find(o => o._id === orderId);

  try {
    const result = await dispatchShippingNetworkEvent(db, 'SHIPMENT_CREATED', {
      orderId,
      pickup: {
        address: 'المركز الرئيسي',
        zoneId: 'cairo',
        contactName: 'الفرع',
        contactPhone: '',
      },
      delivery: {
        address: order?.address || '',
        zoneId: gov,
        contactName: order?.clientName || '',
        contactPhone: order?.clientPhone || '',
      },
      weightKg: parseFloat(document.getElementById('cr-weight').value)||1,
      paymentMethod: document.getElementById('cr-paymethod').value,
      codAmount: parseFloat(document.getElementById('cr-cod').value)||0,
      assignmentMethod: document.getElementById('cr-mode').value,
      userId: auth.currentUser.uid, userName: AppState.userName,
    });
    toast('📦 الشحنة أُنشئت', 'ok');
    closeCreateModal();
  } catch (e) { toast('❌ '+e.message, 'err'); }
};

document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});
</script>
</body>
</html>
