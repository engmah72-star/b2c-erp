<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22d3ee">
<title>B2C — مركز الشحن</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css?v=3">
<script src="sidebar-config.js"></script>
<script src="sync-monitor.js"></script>
<script type="module" src="inbox-badge.js"></script>
<style>
/* ═══════════════════════════════════════════════
   SHIPPING CENTER — Unified Redesign (RULE U1)
   ═══════════════════════════════════════════════ */

/* Tab Navigation */
.ship-tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:4px;margin-bottom:14px;overflow-x:auto;flex-wrap:wrap}
.ship-tab{flex:1;min-width:130px;padding:11px 12px;background:transparent;border:1px solid transparent;border-radius:var(--rad);color:var(--dim2);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;white-space:nowrap}
.ship-tab:hover{background:var(--bg3);color:inherit}
.ship-tab.active{background:var(--bg3);border-color:var(--line);color:var(--c);box-shadow:0 -2px 0 var(--c) inset}
.ship-tab-count{display:inline-flex;min-width:22px;height:20px;align-items:center;justify-content:center;padding:0 6px;border-radius:99px;background:var(--bg);color:var(--c);font-size:11px;font-weight:800}
.ship-tab.active .ship-tab-count{background:var(--c);color:#000}
.ship-tab-count.warn{background:rgba(255,170,0,.2);color:var(--y)}
.ship-tab-count.alert{background:rgba(255,61,110,.2);color:var(--r)}
.ship-tab.active .ship-tab-count.warn{background:var(--y);color:#000}
.ship-tab.active .ship-tab-count.alert{background:var(--r);color:#fff}

/* KPI Row */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:12px 14px;border-top:3px solid var(--kc)}
.kpi-val{font-size:24px;font-weight:900;color:var(--kc);line-height:1.1}
.kpi-lbl{font-size:10.5px;color:var(--dim2);font-weight:700;margin-top:3px}
.kpi-sub{font-size:10px;color:var(--dim2);margin-top:4px}

/* Filters Bar */
.filters{display:flex;gap:8px;flex-wrap:wrap;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:10px 12px;margin-bottom:12px;align-items:center}
.filters select,.filters input{background:var(--bg3);border:1px solid var(--line);color:inherit;padding:8px 12px;border-radius:var(--rad);font-family:inherit;font-size:13px;font-weight:600;min-width:140px}
.filters input{flex:1;min-width:200px}
.filters label{font-size:11px;color:var(--dim2);font-weight:700;display:flex;align-items:center;gap:6px}

/* Table */
.tbl-wrap{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);overflow:visible}
.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px}
.tbl th{position:sticky;top:0;z-index:10;background:var(--bg3);text-align:right;padding:11px 10px;font-size:11px;font-weight:800;color:var(--dim2);border-bottom:2px solid var(--line);white-space:nowrap}
.tbl td{padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.tbl tr:last-child td{border-bottom:0}
.cell-name{font-weight:800}
.cell-order{font-family:monospace;color:var(--dim2);font-size:11.5px}
.cell-money{font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
.money-pos{color:var(--g)}
.money-neg{color:var(--r)}
.money-zero{color:var(--dim2)}
.cell-sub{font-size:10.5px;color:var(--dim2);margin-top:2px}

/* Status Badges */
.ship-bdg{display:inline-block;font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:99px;white-space:nowrap}

/* Row Actions */
.row-actions{display:flex;gap:5px;flex-wrap:nowrap}
.row-actions .btn{padding:5px 9px;font-size:10.5px;font-weight:800}

/* Empty State */
.empty{padding:50px 20px;text-align:center;color:var(--dim2)}
.empty-ico{font-size:48px;margin-bottom:10px}
.empty-msg{font-size:14px;font-weight:700;color:var(--dim2)}
.empty-sub{font-size:11.5px;color:var(--dim2);margin-top:5px}

/* Delay Row Highlight */
.row-delay-warning td{background:rgba(255,170,0,.06)}
.row-delay-critical td{background:rgba(255,61,110,.08)}
.row-delay-critical{border-right:3px solid var(--r) !important}
.row-delay-warning{border-right:3px solid var(--y) !important}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:9999;padding:16px}
.modal.on{display:flex}
.modal-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);width:100%;max-width:560px;max-height:92vh;overflow:auto;padding:22px}
.modal-card h3{margin:0 0 14px 0;font-size:17px;font-weight:800}
.modal-card .row{display:flex;flex-direction:column;gap:5px;margin-bottom:11px}
.modal-card label{font-size:11px;font-weight:700;color:var(--dim2)}
.modal-card input,.modal-card select,.modal-card textarea{background:var(--bg3);border:1px solid var(--line);color:inherit;padding:10px 12px;border-radius:var(--rad);font-family:inherit;font-size:13px;font-weight:600}
.modal-card .actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.modal-info{background:var(--bg3);border-radius:var(--rad);padding:12px 14px;margin-bottom:14px;font-size:12.5px}
.modal-info-row{display:flex;justify-content:space-between;padding:3px 0}
.modal-info-row span:first-child{color:var(--dim2)}
.modal-info-row span:last-child{font-weight:800}

/* Live Calc Panel */
.calc-panel{background:linear-gradient(135deg,rgba(34,211,238,.06),rgba(167,139,250,.06));border:1px solid rgba(34,211,238,.25);border-radius:var(--rad);padding:12px 14px;margin:10px 0 12px;font-size:12.5px}
.calc-panel-title{font-size:10.5px;font-weight:800;color:var(--c);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.calc-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-variant-numeric:tabular-nums}
.calc-row span:first-child{color:var(--dim2);font-size:11.5px;font-weight:600}
.calc-row span:last-child{font-weight:800;font-size:13px}
.calc-sep{border-top:1px dashed var(--line);margin:6px 0;padding-top:5px}
.calc-result{font-size:13.5px;font-weight:900;margin-top:7px;padding:8px 10px;border-radius:6px;text-align:center;letter-spacing:.3px}
.calc-result.ok{background:rgba(34,217,126,.13);color:var(--g);border:1px solid rgba(34,217,126,.3)}
.calc-result.warn{background:rgba(255,170,0,.13);color:var(--y);border:1px solid rgba(255,170,0,.3)}
.calc-result.err{background:rgba(255,61,110,.13);color:var(--r);border:1px solid rgba(255,61,110,.3)}
.calc-result.info{background:rgba(34,211,238,.13);color:var(--c);border:1px solid rgba(34,211,238,.3)}

/* Reconciliation Table (Accounts Tab) */
.recon-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);overflow:hidden;margin-bottom:14px}
.recon-head{padding:14px 16px;background:var(--bg3);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.recon-name{font-size:15px;font-weight:800}
.recon-stats{display:flex;gap:18px;font-size:11.5px;color:var(--dim2);font-weight:700}
.recon-stat{display:flex;flex-direction:column}
.recon-stat span:last-child{font-size:14px;color:var(--c);font-weight:900;font-variant-numeric:tabular-nums}
.recon-stat .pos{color:var(--g)}
.recon-stat .neg{color:var(--r)}

/* Dashboard Tab */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.dash-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:16px}
.dash-card h4{margin:0 0 10px 0;font-size:12.5px;font-weight:800;color:var(--dim2);text-transform:uppercase;letter-spacing:.5px}
.dash-num{font-size:32px;font-weight:900;color:var(--c);line-height:1.1}
.dash-sub{font-size:11px;color:var(--dim2);margin-top:6px;font-weight:600}

/* Delay Alert Banner */
.delay-banner{background:linear-gradient(135deg,rgba(255,61,110,.08),rgba(255,170,0,.08));border:1px solid rgba(255,61,110,.3);border-radius:var(--rad2);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.delay-banner-title{font-size:13.5px;font-weight:800;color:var(--r);display:flex;align-items:center;gap:8px}
.delay-banner-msg{font-size:11.5px;color:var(--dim2);margin-top:4px;font-weight:600}

/* Responsive */
@media (max-width:768px){
  .ship-tab{font-size:11px;padding:9px 8px;min-width:auto}
  .ship-tab-count{min-width:18px;height:17px;font-size:10px}
  .kpi-val{font-size:20px}
  .modal-card{padding:16px}
}
</style>
</head>
<body>
<aside class="sidenav"></aside>
<main class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="mob-menu-btn" onclick="toggleMobMenu()">☰</button>
      <div>
        <h1>🚛 مركز الشحن</h1>
        <p id="user-info" style="font-size:11px;color:var(--dim2);margin-top:2px"></p>
      </div>
    </div>
    <div class="topbar-right">
      <span id="nav-name" style="display:none"></span>
    </div>
  </header>

  <div class="content">

    <!-- Delay Alert Banner (shown only if delays exist) -->
    <div id="delay-banner" class="delay-banner" style="display:none">
      <div>
        <div class="delay-banner-title">⏰ <span id="delay-count">0</span> طلب متأخر يحتاج متابعة</div>
        <div class="delay-banner-msg" id="delay-detail">اضغط على تاب "المتأخرات" للمراجعة</div>
      </div>
      <button class="btn btn-sm btn-y" onclick="switchTab('delays')">عرض المتأخرات</button>
    </div>

    <!-- KPI Row -->
    <div class="kpi-row" id="kpi-row"></div>

    <!-- Tabs Navigation -->
    <div class="ship-tabs" id="ship-tabs">
      <button class="ship-tab active" data-tab="ready"            onclick="switchTab('ready')">📦 الجاهزة <span class="ship-tab-count" id="cnt-ready">0</span></button>
      <button class="ship-tab"        data-tab="transit"          onclick="switchTab('transit')">🚚 جاري التوصيل <span class="ship-tab-count" id="cnt-transit">0</span></button>
      <button class="ship-tab"        data-tab="collect"          onclick="switchTab('collect')">💰 للتحصيل <span class="ship-tab-count" id="cnt-collect">0</span></button>
      <button class="ship-tab"        data-tab="settle"           onclick="switchTab('settle')">📋 للتسوية <span class="ship-tab-count" id="cnt-settle">0</span></button>
      <button class="ship-tab"        data-tab="accounts"         onclick="switchTab('accounts')">🏢 حسابات الشركات</button>
      <button class="ship-tab"        data-tab="delays"           onclick="switchTab('delays')">⏰ المتأخرات <span class="ship-tab-count alert" id="cnt-delays">0</span></button>
      <button class="ship-tab"        data-tab="returns"          onclick="switchTab('returns')">↩️ المرتجعات <span class="ship-tab-count" id="cnt-returns">0</span></button>
      <button class="ship-tab"        data-tab="dashboard"        onclick="switchTab('dashboard')">📊 لوحة المؤشرات</button>
    </div>

    <!-- Filters (per-tab visibility controlled in JS) -->
    <div class="filters" id="filters">
      <label>🔍 بحث <input type="text" id="f-search" placeholder="رقم الطلب / اسم العميل / تليفون"></label>
      <select id="f-company"><option value="">كل الشركات</option></select>
      <select id="f-method">
        <option value="">كل طرق الشحن</option>
        <option value="company">شركة شحن</option>
        <option value="pickup">استلام من المطبعة</option>
        <option value="courier">مندوب داخلي</option>
      </select>
    </div>

    <!-- Tab Content Containers -->
    <div id="tab-content"></div>

  </div>
</main>

<!-- ═══════════════════════════════════════════
     MODALS — Reused across tabs
     ═══════════════════════════════════════════ -->

<!-- DISPATCH MODAL -->
<div class="modal" id="m-dispatch">
  <div class="modal-card">
    <h3>🚚 تسليم الطلب لشركة شحن</h3>
    <div class="modal-info" id="m-dispatch-info"></div>
    <div class="row">
      <label>طريقة الشحن</label>
      <select id="m-dispatch-method" onchange="onDispatchMethodChange()">
        <option value="company">🚚 شركة شحن</option>
        <option value="pickup">🏬 استلام من المطبعة</option>
        <option value="courier">🛵 مندوب داخلي</option>
      </select>
    </div>
    <div class="row" id="m-dispatch-company-row">
      <label>شركة الشحن</label>
      <select id="m-dispatch-company"></select>
    </div>
    <div class="row" id="m-dispatch-cost-row">
      <label>تكلفة الشحن علينا (ج)</label>
      <input type="number" id="m-dispatch-cost" min="0" step="0.01" placeholder="0" oninput="updateDispatchCalc()">
    </div>
    <div class="row" id="m-dispatch-wallet-row">
      <label>محفظة الخصم</label>
      <select id="m-dispatch-wallet"></select>
    </div>
    <div class="row">
      <label>ملاحظات (اختياري)</label>
      <textarea id="m-dispatch-note" rows="2"></textarea>
    </div>
    <div class="calc-panel" id="m-dispatch-calc-panel" style="display:none">
      <div class="calc-panel-title">📊 الحسابات</div>
      <div id="m-dispatch-calc-content"></div>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" onclick="closeMod('m-dispatch')">إلغاء</button>
      <button class="btn btn-g" id="btn-dispatch-confirm" onclick="confirmDispatch()">✅ تسليم</button>
    </div>
  </div>
</div>

<!-- COLLECT MODAL -->
<div class="modal" id="m-collect">
  <div class="modal-card">
    <h3>💰 تحصيل من العميل</h3>
    <div class="modal-info" id="m-collect-info"></div>
    <div class="row">
      <label>المبلغ المُحصَّل (ج)</label>
      <input type="number" id="m-collect-amount" min="0" step="0.01" placeholder="0" oninput="updateCollectCalc()">
    </div>
    <div class="row" id="m-collect-wallet-row">
      <label>المحفظة (للتحصيل المباشر)</label>
      <select id="m-collect-wallet"></select>
    </div>
    <div class="row">
      <label>ملاحظات (اختياري)</label>
      <textarea id="m-collect-note" rows="2"></textarea>
    </div>
    <div class="calc-panel" id="m-collect-calc-panel" style="display:none">
      <div class="calc-panel-title">📊 ملخص التحصيل</div>
      <div id="m-collect-calc-content"></div>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" onclick="closeMod('m-collect')">إلغاء</button>
      <button class="btn btn-g" id="btn-collect-confirm" onclick="confirmCollect()">✅ تأكيد التحصيل</button>
    </div>
  </div>
</div>

<!-- SETTLE MODAL -->
<div class="modal" id="m-settle">
  <div class="modal-card">
    <h3>📋 تسوية مع شركة الشحن</h3>
    <div class="modal-info" id="m-settle-info"></div>
    <div class="row">
      <label>المبلغ الفعلي المستلَم (ج)</label>
      <input type="number" id="m-settle-amount" min="0" step="0.01" placeholder="0" oninput="updateSettleCalc()">
    </div>
    <div class="row">
      <label>المحفظة المُودَع فيها</label>
      <select id="m-settle-wallet"></select>
    </div>
    <div class="row" id="m-settle-diff-row" style="display:none">
      <label>سبب الفرق</label>
      <select id="m-settle-diff-reason">
        <option value="">— اختر —</option>
        <option value="weight">فرق وزن</option>
        <option value="city">فرق مدينة</option>
        <option value="undelivered">شحنة لم تُسلَّم</option>
        <option value="discount">خصم/عمولة</option>
        <option value="other">أخرى</option>
      </select>
    </div>
    <div class="row">
      <label>ملاحظات</label>
      <textarea id="m-settle-note" rows="2"></textarea>
    </div>
    <div class="calc-panel" id="m-settle-calc-panel">
      <div class="calc-panel-title">📊 ملخص التسوية</div>
      <div id="m-settle-calc-content"></div>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" onclick="closeMod('m-settle')">إلغاء</button>
      <button class="btn btn-g" id="btn-settle-confirm" onclick="confirmSettle()">✅ تأكيد التسوية</button>
    </div>
  </div>
</div>

<!-- RETURN MODAL -->
<div class="modal" id="m-return">
  <div class="modal-card">
    <h3>↩️ تسجيل مرتجع</h3>
    <div class="modal-info" id="m-return-info"></div>
    <div class="row">
      <label>سبب المرتجع</label>
      <select id="m-return-reason">
        <option value="">— اختر —</option>
        <option value="damaged">تلف</option>
        <option value="wrong_design">خطأ تصميم</option>
        <option value="wrong_item">منتج خاطئ</option>
        <option value="late">تأخير في التوصيل</option>
        <option value="refused">العميل رفض الاستلام</option>
        <option value="other">أخرى</option>
      </select>
    </div>
    <div class="row">
      <label>من يتحمل الخسارة؟</label>
      <select id="m-return-party">
        <option value="">— اختر —</option>
        <option value="client">العميل</option>
        <option value="company">الشركة (نحن)</option>
        <option value="shipper">شركة الشحن</option>
      </select>
    </div>
    <div class="row">
      <label>تكلفة الخسارة (ج)</label>
      <input type="number" id="m-return-cost" min="0" step="0.01" placeholder="0">
    </div>
    <div class="row" id="m-return-wallet-row">
      <label>محفظة الخصم (لو الخسارة علينا)</label>
      <select id="m-return-wallet"></select>
    </div>
    <div class="row">
      <label>ملاحظات</label>
      <textarea id="m-return-note" rows="2"></textarea>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" onclick="closeMod('m-return')">إلغاء</button>
      <button class="btn btn-r" id="btn-return-confirm" onclick="confirmReturn()">✅ تسجيل المرتجع</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     MODULE SCRIPT
     ═══════════════════════════════════════════ -->
<script type="module">
import {
  db, auth, AppState, initAuth, renderSidebar, initMobileMenu,
  startListeners, toast, canSee, maskPhone, fn,
} from './shared.js';
import {
  onSnapshot, query, collection, where, orderBy, limit, doc, getDoc,
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { shippingActions } from './shipping-actions.js';
import {
  getOrdersReadyToDispatch, getOrdersInTransit, getOrdersWaitingCollection,
  getOrdersPendingSettlement, getOrdersSettled, getOrdersReturned,
  getDelayedOrders, getCompanyReconciliation, getShippingKPIs,
  shipStageBadgeHTML, fmtMoney, fmtDays, SHIP_STAGE_LABELS,
} from './shipping-service.js';

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let me = null, myRole = '', myUserName = '';
let orders = [], shippers = [], wallets = [];
let currentTab = 'ready';
let pendingOrder = null;   // for modals
let pendingOrders = [];    // for bulk settle
let settlements = [];      // shipping_settlements for reverse list

const $ = id => document.getElementById(id);

// ══════════════════════════════════════════
// AUTH + LISTENERS
// ══════════════════════════════════════════
initAuth(async (state) => {
  me = state.currentUser;
  myRole = state.currentRole;
  myUserName = state.userName || me.email;

  $('user-info').textContent = `${myUserName} · ${myRole}`;
  $('nav-name').textContent = myUserName;

  initMobileMenu();
  renderSidebar('shipping');

  startListeners({
    onOrders: (list) => { orders = list || []; refreshAll(); },
    onWallets: (list) => { wallets = list || []; populateWalletDropdowns(); },
  }, { orderLimit: 500, skip: ['clients', 'products'] });

  // Shippers v2 (shipping companies registry)
  onSnapshot(query(collection(db, 'shippers_v2'), limit(200)), (snap) => {
    shippers = snap.docs.map(d => ({ ...d.data(), _id: d.id }));
    populateCompanyDropdowns();
    refreshAll();
  });

  // Recent settlements for reversal action
  onSnapshot(
    query(collection(db, 'shipping_settlements'), orderBy('createdAt', 'desc'), limit(50)),
    (snap) => { settlements = snap.docs.map(d => ({ ...d.data(), _id: d.id })); }
  );

// FILTERS + SEARCH
// ══════════════════════════════════════════
$('f-search').addEventListener('input', () => refreshAll());
$('f-company').addEventListener('change', () => refreshAll());
$('f-method').addEventListener('change', () => refreshAll());

function applyFilters(list) {
  const q = ($('f-search').value || '').toLowerCase().trim();
  const fc = $('f-company').value;
  const fm = $('f-method').value;

  return list.filter(o => {
    if (fc && o.shipCompanyId !== fc) return false;
    if (fm && o.shipMethod !== fm) return false;
    if (q) {
      const hay = `${o.orderNumber || ''} ${o.clientName || ''} ${o._id} ${o.clientPhone || ''} ${o.shipGov || o.clientGov || ''} ${o.shipAddress || ''}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

// ══════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════
window.switchTab = (tab) => {
  currentTab = tab;
  document.querySelectorAll('.ship-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });

  // Hide filters for some tabs
  const noFilterTabs = ['accounts', 'dashboard'];
  $('filters').style.display = noFilterTabs.includes(tab) ? 'none' : '';

  refreshAll();
};

// ══════════════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════════════
function refreshAll() {
  renderKPIs();
  renderTabCounts();
  renderDelayBanner();
  renderTabContent();
}

function renderKPIs() {
  const k = getShippingKPIs(orders);
  const colors = {
    ready: '#22d3ee', transit: '#ffaa00', collect: '#a78bfa',
    settle: '#00d97e', delays: '#ff3d6e',
  };
  $('kpi-row').innerHTML = `
    <div class="kpi" style="--kc:${colors.ready}">
      <div class="kpi-val">${k.ready}</div>
      <div class="kpi-lbl">جاهز للشحن</div>
    </div>
    <div class="kpi" style="--kc:${colors.transit}">
      <div class="kpi-val">${k.inTransit}</div>
      <div class="kpi-lbl">جاري التوصيل</div>
    </div>
    <div class="kpi" style="--kc:${colors.collect}">
      <div class="kpi-val">${k.waitCollect}</div>
      <div class="kpi-lbl">بانتظار التحصيل</div>
    </div>
    <div class="kpi" style="--kc:${colors.settle}">
      <div class="kpi-val">${k.pendingSettle}</div>
      <div class="kpi-lbl">للتسوية</div>

    </div>
    <div class="kpi" style="--kc:${colors.delays}">

function renderTabCounts() {
  $('cnt-ready').textContent = getOrdersReadyToDispatch(orders).length;
  $('cnt-transit').textContent = getOrdersInTransit(orders).length;
  $('cnt-collect').textContent = getOrdersWaitingCollection(orders).length;
  $('cnt-settle').textContent = getOrdersPendingSettlement(orders).length;
  $('cnt-delays').textContent = getDelayedOrders(orders).length;
  $('cnt-returns').textContent = getOrdersReturned(orders).length;
}

function renderDelayBanner() {
  const delays = getDelayedOrders(orders);
  if (!delays.length || currentTab === 'delays') {
    $('delay-banner').style.display = 'none';
    return;
  }
  const critical = delays.filter(d => d.severity === 'critical').length;
  $('delay-banner').style.display = 'flex';
  $('delay-count').textContent = delays.length;
  $('delay-detail').textContent = critical > 0
    ? `منهم ${critical} حالة حرجة (تأخر > الضعف). اضغط للمراجعة.`
    : 'اضغط على تاب "المتأخرات" للمراجعة';
}

function renderTabContent() {
  const c = $('tab-content');
  switch (currentTab) {
    case 'ready':     c.innerHTML = renderOrdersTable(applyFilters(getOrdersReadyToDispatch(orders)), 'ready'); break;
    case 'transit':   c.innerHTML = renderOrdersTable(applyFilters(getOrdersInTransit(orders)), 'transit'); break;
    case 'collect':   c.innerHTML = renderOrdersTable(applyFilters(getOrdersWaitingCollection(orders)), 'collect'); break;
    case 'settle':    c.innerHTML = renderOrdersTable(applyFilters(getOrdersPendingSettlement(orders)), 'settle'); break;
    case 'returns':   c.innerHTML = renderOrdersTable(applyFilters(getOrdersReturned(orders)), 'returns'); break;
    case 'delays':    c.innerHTML = renderDelaysTable(); break;
    case 'accounts':  c.innerHTML = renderAccountsTab(); break;
    case 'dashboard': c.innerHTML = renderDashboardTab(); break;
    default:          c.innerHTML = '';
  }
}

// ══════════════════════════════════════════
// ORDERS TABLE (per tab)
// ══════════════════════════════════════════
function renderOrdersTable(list, tab) {
  if (!list.length) {
    return `
      <div class="empty">
        <div class="empty-ico">📭</div>
        <div class="empty-msg">لا توجد طلبات في هذا التاب</div>
        <div class="empty-sub">${getEmptyHint(tab)}</div>
      </div>`;
  }
  return `
    <div class="tbl-wrap">
      <table class="tbl">
        <thead>
          <tr>
            <th>الطلب</th>
            <th>العميل</th>
            <th>عنوان التسليم</th>
            <th>الشركة</th>
            <th>المالي</th>
            <th>الحالة</th>
            <th>المسؤول</th>
            <th style="width:200px">الإجراءات</th>
          </tr>
        </thead>
        <tbody>${list.map(o => renderRow(o, tab)).join('')}</tbody>
      </table>
    </div>`;
}

function getEmptyHint(tab) {
  return ({
    ready: 'الطلبات الجاهزة للشحن ستظهر هنا. تأتي من قسم التنفيذ بعد اكتمال المنتجات.',
    transit: 'الطلبات التي تم تسليمها لشركة شحن ولم تصل بعد للعميل.',
    collect: 'الطلبات التي وصلت للعميل وبانتظار التحصيل.',
    settle: 'الطلبات المُحصَّلة عبر شركات الشحن وتنتظر التسوية.',
    returns: 'المرتجعات المسجَّلة في النظام.',
  })[tab] || '';
}

function getDeliveryAddress(o) {
  // العنوان الرسمي يأتي من shipGov + shipAddress (fallback إلى clientGov لو غير مُسجَّل)
  const gov = o.shipGov || o.clientGov || '';
  const addr = o.shipAddress || '';
  return { gov, addr, full: [gov, addr].filter(Boolean).join(' — ') };
}

function renderRow(o, tab) {
  const id = o._id;
  const num = o.orderNumber || id.slice(0, 6);
  const phone = canSee('client_phone', AppState.userPerms, myRole)
    ? (o.clientPhone || '')
    : maskPhone(o.clientPhone, myRole);
  const addr = getDeliveryAddress(o);

  const sale = parseFloat(o.salePrice) || 0;
  const cust = parseFloat(o.customerShipFee) || 0;
  const disc = parseFloat(o.discount) || 0;
  const paid = parseFloat(o.totalPaid) || 0;
  const rem = Math.max(0, sale + cust - disc - paid);

  return `
    <tr data-id="${id}">
      <td>
        <div class="cell-order">#${num}</div>
        <div class="cell-sub">${o.shipDispatchedAt ? `سُلِّم: ${fmtTimestamp(o.shipDispatchedAt)}` : ''}</div>
      </td>
      <td>
        <div class="cell-name">${o.clientName || '—'}</div>
        <div class="cell-sub">${phone}</div>
      </td>
      <td>
        ${addr.gov
          ? `<div style="font-weight:700">📍 ${escAttr(addr.gov)}</div>${addr.addr ? `<div class="cell-sub" style="white-space:normal;line-height:1.45;max-width:260px">${escAttr(addr.addr)}</div>` : ''}`
          : '<span class="cell-sub">— لا يوجد عنوان —</span>'}
      </td>
      <td>
        <div>${o.shipCompanyName || '—'}</div>
        <div class="cell-sub">${shipMethodLabel(o.shipMethod)}</div>
      </td>
      <td class="cell-money">
        ${rem > 0 ? `<span class="money-neg">متبقي: ${fmtMoney(rem)}</span>` : `<span class="money-pos">مدفوع</span>`}
        <div class="cell-sub">إجمالي: ${fmtMoney(sale + cust - disc)} ج</div>
      </td>
      <td>${shipStageBadgeHTML(o.shipStage || '')}</td>
      <td>${o.shippingOfficerName || o.shipDispatchedBy || '—'}</td>
      <td>${rowActions(o, tab)}</td>
    </tr>`;
}

function escAttr(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function shipMethodLabel(m) {
  return ({ company: '🚚 شركة شحن', pickup: '🏬 استلام من المطبعة', courier: '🛵 مندوب', internal: '🛵 مندوب' })[m] || '—';
}

function fmtTimestamp(ts) {
  if (!ts) return '—';
  const d = ts.toDate?.() || (typeof ts === 'string' ? new Date(ts) : ts);
  if (!(d instanceof Date) || isNaN(d.getTime())) return '—';
  return d.toLocaleDateString('ar-EG');
}

function rowActions(o, tab) {
  const actions = [];
  const id = o._id;
  switch (tab) {
    case 'ready':
      actions.push(`<button class="btn btn-sm btn-g" onclick="openDispatch('${id}')">🚚 تسليم</button>`);
      actions.push(`<button class="btn btn-sm btn-ghost" onclick="quickPickup('${id}')">🏬 استلام محلي</button>`);
      break;
    case 'transit':
      actions.push(`<button class="btn btn-sm btn-b" onclick="markDelivered('${id}')">✅ تم التسليم</button>`);
      actions.push(`<button class="btn btn-sm btn-ghost" onclick="openReturn('${id}')">↩️ مرتجع</button>`);
      break;
    case 'collect':
      actions.push(`<button class="btn btn-sm btn-g" onclick="openCollect('${id}')">💰 تحصيل</button>`);
      actions.push(`<button class="btn btn-sm btn-ghost" onclick="openReturn('${id}')">↩️ مرتجع</button>`);
      break;
    case 'settle':
      actions.push(`<button class="btn btn-sm btn-g" onclick="openSettleSingle('${id}')">📋 تسوية</button>`);
      break;
    case 'returns':
      actions.push(`<span class="cell-sub">${o.returnReasonLabel || o.returnReason || '—'}</span>`);
      break;
  }
  return `<div class="row-actions">${actions.join('')}</div>`;
}

// DELAYS TAB
// ══════════════════════════════════════════
function renderDelaysTable() {
  const delays = getDelayedOrders(orders);
  if (!delays.length) {
    return `
      <div class="empty">
        <div class="empty-ico">✅</div>
        <div class="empty-msg">لا توجد متأخرات</div>
        <div class="empty-sub">كل الطلبات ضمن الحدود الزمنية المتوقعة.</div>
      </div>`;
  }
  return `
    <div class="tbl-wrap">
      <table class="tbl">
        <thead>
          <tr>
            <th>الطلب</th>
            <th>العميل</th>
            <th>الشركة</th>
            <th>الحالة</th>
            <th>أيام التأخر</th>
            <th>الإجراء المقترح</th>
          </tr>
        </thead>
        <tbody>${delays.map(d => renderDelayRow(d)).join('')}</tbody>
      </table>
    </div>`;
}

function renderDelayRow(d) {
  const o = d.order;
  const id = o._id;
  const num = o.orderNumber || id.slice(0, 6);
  const cls = d.severity === 'critical' ? 'row-delay-critical' : 'row-delay-warning';
  const phone = canSee('client_phone', AppState.userPerms, myRole)
    ? (o.clientPhone || '')
    : maskPhone(o.clientPhone, myRole);

  const suggestedAction = ({
    ready: `<button class="btn btn-sm btn-g" onclick="openDispatch('${id}')">🚚 سلّم الآن</button>`,
    wait_delivery: `<button class="btn btn-sm btn-b" onclick="markDelivered('${id}')">✅ سُلِّم</button> <button class="btn btn-sm btn-ghost" onclick="openReturn('${id}')">↩️</button>`,
    wait_collection: `<button class="btn btn-sm btn-g" onclick="openCollect('${id}')">💰 حصِّل</button>`,
    collected: `<button class="btn btn-sm btn-g" onclick="openSettleSingle('${id}')">📋 سوِّ</button>`,
  })[d.shipStage] || '—';

  const addr = getDeliveryAddress(o);

  return `
    <tr class="${cls}">
      <td>
        <div class="cell-order">#${num}</div>
        <div class="cell-sub">${o.shipDispatchedAt ? 'سُلِّم: ' + fmtTimestamp(o.shipDispatchedAt) : ''}</div>
      </td>
      <td>
        <div class="cell-name">${o.clientName || '—'}</div>
        <div class="cell-sub">${phone}</div>
        ${addr.gov ? `<div class="cell-sub" style="margin-top:3px;white-space:normal;line-height:1.4;max-width:240px">📍 ${escAttr(addr.gov)}${addr.addr ? ' — ' + escAttr(addr.addr) : ''}</div>` : ''}
      </td>
      <td>${o.shipCompanyName || shipMethodLabel(o.shipMethod)}</td>
      <td>${shipStageBadgeHTML(o.shipStage)}</td>
      <td>
        <div class="cell-money ${d.severity === 'critical' ? 'money-neg' : ''}">${d.days} يوم</div>
        <div class="cell-sub">حد: ${d.threshold} يوم · تأخر: +${d.overdue}</div>
      </td>
      <td>${suggestedAction}</td>
    </tr>`;
}

// ACCOUNTS TAB (Reconciliation)
// ══════════════════════════════════════════
function renderAccountsTab() {
  const recon = getCompanyReconciliation(orders, shippers);
  const active = recon.filter(r => r.isActive && (r.pendingOrders + r.settledOrders + r.inTransit + r.returned) > 0);

  if (!active.length) {
    return `<div class="empty">
      <div class="empty-ico">🏢</div>
      <div class="empty-msg">لا توجد حركة على شركات الشحن حالياً</div>
    </div>`;
  }

  return active.map(r => `
    <div class="recon-card">
      <div class="recon-head">
        <div>
          <div class="recon-name">🏢 ${r.companyName}</div>
          <div style="font-size:11px;color:var(--dim2);margin-top:4px">
            ${r.inTransit > 0 ? `🚚 ${r.inTransit} في الطريق · ` : ''}
            ${r.pendingOrders > 0 ? `⏳ ${r.pendingOrders} للتسوية · ` : ''}
            ${r.settledOrders > 0 ? `✓ ${r.settledOrders} مسوّى · ` : ''}
            ${r.returned > 0 ? `↩️ ${r.returned} مرتجع` : ''}
          </div>
        </div>
        <div class="recon-stats">
          <div class="recon-stat">
            <span>محصَّل من العملاء</span>
            <span class="pos">${fmtMoney(r.pendingCollected)} ج</span>
          </div>
          <div class="recon-stat">
            <span>تكلفة الشحن</span>
            <span class="neg">${fmtMoney(r.pendingCost)} ج</span>
          </div>
          <div class="recon-stat">
            <span>المستحق لنا</span>
            <span class="pos" style="font-size:16px">${fmtMoney(r.pendingExpected)} ج</span>
          </div>
        </div>
      </div>
      <div style="padding:12px 16px;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">
        ${r.pendingOrders > 0 ? `<button class="btn btn-sm btn-g" onclick="openSettleByCompany('${r.companyId}')">📋 تسوية الكل (${r.pendingOrders})</button>` : ''}
        <button class="btn btn-sm btn-ghost" onclick="filterByCompany('${r.companyId}')">عرض الطلبات</button>
      </div>
    </div>
  `).join('');
}

window.filterByCompany = (id) => {
  $('f-company').value = id;
  switchTab('settle');
};

window.openSettleByCompany = (cid) => {
  const list = getOrdersPendingSettlement(orders).filter(o => o.shipCompanyId === cid);
  if (!list.length) { toast('لا توجد طلبات للتسوية', 'err'); return; }
  pendingOrders = list;
  pendingOrder = null;
  const company = shippers.find(s => s._id === cid);
  const sumCollected = list.reduce((s, o) => s + (parseFloat(o.shipCollected) || 0), 0);
  const sumCost = list.reduce((s, o) => s + (parseFloat(o.shippingCost) || 0), 0);
  const expected = Math.max(0, sumCollected - sumCost);
  $('m-settle-info').innerHTML = `
    <div class="modal-info-row"><span>الشركة</span><span>${company?.name || '—'}</span></div>
    <div class="modal-info-row"><span>عدد الشحنات</span><span>${list.length}</span></div>
    <div class="modal-info-row"><span>إجمالي المُحصَّل</span><span>${fmtMoney(sumCollected)} ج</span></div>
    <div class="modal-info-row"><span>إجمالي التكلفة</span><span>${fmtMoney(sumCost)} ج</span></div>
    <div class="modal-info-row" style="border-top:1px dashed var(--line);margin-top:6px;padding-top:6px;color:var(--g)"><span>المستحق</span><span>${fmtMoney(expected)} ج</span></div>
  `;
  $('m-settle-amount').value = expected;
  $('m-settle-wallet').value = '';
  $('m-settle-note').value = '';
  $('m-settle-diff-reason').value = '';
  updateSettleCalc();
  openMod('m-settle');
};

function closeMod(id) { $(id).classList.remove('on'); }

window.openDispatch = (orderId) => {
  const o = orders.find(x => x._id === orderId);
  if (!o) return;
  pendingOrder = o;
  $('m-dispatch-info').innerHTML = `
    <div class="modal-info-row"><span>الطلب</span><span>#${o.orderNumber || o._id.slice(0, 6)}</span></div>
    <div class="modal-info-row"><span>العميل</span><span>${o.clientName || '—'}</span></div>
    ${(function(){
      const a = getDeliveryAddress(o);
      return a.gov
        ? `<div class="modal-info-row" style="align-items:flex-start"><span>📍 العنوان</span><span style="text-align:left;max-width:65%;line-height:1.5">${escAttr(a.gov)}${a.addr ? '<br><span style="color:var(--dim2);font-weight:600;font-size:11.5px">' + escAttr(a.addr) + '</span>' : ''}</span></div>`
        : `<div class="modal-info-row"><span>📍 العنوان</span><span style="color:var(--y)">— لا يوجد عنوان مُسجَّل —</span></div>`;
    })()}
  `;
  $('m-dispatch-method').value = 'company';
  $('m-dispatch-company').value = '';
  $('m-dispatch-cost').value = '';
  $('m-dispatch-wallet').value = '';
  $('m-dispatch-note').value = '';
  onDispatchMethodChange();
  openMod('m-dispatch');
};

window.onDispatchMethodChange = () => {
  const m = $('m-dispatch-method').value;
  $('m-dispatch-company-row').style.display = m === 'pickup' ? 'none' : '';
  $('m-dispatch-cost-row').style.display = m === 'pickup' ? 'none' : '';
  $('m-dispatch-wallet-row').style.display = m === 'pickup' ? 'none' : '';
  updateDispatchCalc();
};

window.updateDispatchCalc = () => {
  const m = $('m-dispatch-method').value;
  const cost = parseFloat($('m-dispatch-cost').value) || 0;
  const walletId = $('m-dispatch-wallet').value;
  const panel = $('m-dispatch-calc-panel');
  const content = $('m-dispatch-calc-content');

  if (m === 'pickup' || cost <= 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';
  const wallet = wallets.find(w => w._id === walletId);
  const wb = parseFloat(wallet?.balance) || 0;
  const newBalance = wb - cost;
  const insufficient = walletId && newBalance < 0;
  content.innerHTML = `
    <div class="calc-row"><span>تكلفة الشحن</span><span class="money-neg">-${fmtMoney(cost)} ج</span></div>
    ${walletId ? `
      <div class="calc-row"><span>رصيد المحفظة قبل</span><span>${fmtMoney(wb)} ج</span></div>
      <div class="calc-sep"></div>
      <div class="calc-row"><span>الرصيد بعد</span><span class="${newBalance >= 0 ? 'money-pos' : 'money-neg'}">${fmtMoney(newBalance)} ج</span></div>
      ${insufficient ? '<div class="calc-result err">⚠️ رصيد المحفظة غير كافٍ!</div>' : '<div class="calc-result ok">✅ التكلفة تُسجَّل في المحفظة كمصروف</div>'}
    ` : '<div class="calc-result warn">⚠️ بدون محفظة — التكلفة لن تُسجَّل كمصروف الآن</div>'}
  `;
};

window.confirmDispatch = async () => {
  if (!pendingOrder) return;
  const method = $('m-dispatch-method').value;
  const companyId = $('m-dispatch-company').value;
  const cost = parseFloat($('m-dispatch-cost').value) || 0;
  const walletId = $('m-dispatch-wallet').value;
  const note = $('m-dispatch-note').value.trim();
  const company = shippers.find(s => s._id === companyId);
  const wallet = wallets.find(w => w._id === walletId);

  const btn = $('btn-dispatch-confirm');
  btn.disabled = true; btn.textContent = '⏳ جارٍ...';

  const result = await shippingActions.dispatchOrder({
    db, orderId: pendingOrder._id,
    companyId, companyName: company?.name || '',
    method, cost, walletId, walletName: wallet?.name || '',
    note, role: myRole, userId: me.uid, userName: myUserName,
  });

  btn.disabled = false; btn.textContent = '✅ تسليم';
  if (!result.ok) { toast(result.errors[0] || 'فشل التسليم', 'err'); return; }
  toast('✅ تم تسليم الطلب');
  closeMod('m-dispatch');
  pendingOrder = null;
};

window.quickPickup = async (orderId) => {
  const o = orders.find(x => x._id === orderId);
  if (!o) return;
  if (!confirm(`🏬 تسجيل #${o.orderNumber || o._id.slice(0, 6)} كـ "استلام من المطبعة"؟\n\nبدون شركة شحن وبدون تكلفة.`)) return;
  const result = await shippingActions.quickPickupDispatch({
    db, orderId, role: myRole, userId: me.uid, userName: myUserName,
  });
  if (!result.ok) { toast(result.errors[0] || 'فشل التسجيل', 'err'); return; }
  toast('✅ جاهز للاستلام من المطبعة');
};

window.markDelivered = async (orderId) => {
  if (!confirm('✅ تأكيد التسليم للعميل؟')) return;
  const result = await shippingActions.markDelivered({
    db, orderId, role: myRole, userId: me.uid, userName: myUserName,
  });
  if (!result.ok) { toast(result.errors[0] || 'فشل', 'err'); return; }
  toast('✅ تم تسجيل التسليم');
};

// ══════════════════════════════════════════
// COLLECT
// ══════════════════════════════════════════
window.openCollect = (orderId) => {
  const o = orders.find(x => x._id === orderId);
  if (!o) return;
  pendingOrder = o;
  const sale = parseFloat(o.salePrice) || 0;
  const cust = parseFloat(o.customerShipFee) || 0;
  const disc = parseFloat(o.discount) || 0;
  const paid = parseFloat(o.totalPaid) || 0;
  const remaining = Math.max(0, sale + cust - disc - paid);
  const walletMode = o.shipMethod === 'pickup' || o.shipMethod === 'courier' || o.shipMethod === 'internal';

  $('m-collect-info').innerHTML = `
    <div class="modal-info-row"><span>الطلب</span><span>#${o.orderNumber || o._id.slice(0, 6)}</span></div>
    <div class="modal-info-row"><span>العميل</span><span>${o.clientName || '—'}</span></div>
    <div class="modal-info-row"><span>الشركة</span><span>${o.shipCompanyName || shipMethodLabel(o.shipMethod)}</span></div>
    <div class="modal-info-row"><span>المتبقي للعميل</span><span class="money-neg">${fmtMoney(remaining)} ج</span></div>
    ${walletMode
      ? `<div class="modal-info-row" style="color:var(--g)"><span>الوضع</span><span>💵 تحصيل مباشر — يدخل المحفظة فوراً</span></div>`
      : `<div class="modal-info-row" style="color:var(--c)"><span>الوضع</span><span>📦 تأكيد تحصيل عبر الشركة — يُسوَّى لاحقاً</span></div>`}
  `;
  $('m-collect-amount').value = remaining;
  $('m-collect-note').value = '';
  $('m-collect-wallet-row').style.display = walletMode ? '' : 'none';
  $('m-collect-wallet').value = '';
  updateCollectCalc();
  openMod('m-collect');
};

window.updateCollectCalc = () => {
  const o = pendingOrder;
  if (!o) return;
  const amt = parseFloat($('m-collect-amount').value) || 0;
  const sale = parseFloat(o.salePrice) || 0;
  const cust = parseFloat(o.customerShipFee) || 0;
  const disc = parseFloat(o.discount) || 0;
  const paid = parseFloat(o.totalPaid) || 0;
  const total = Math.max(0, sale + cust - disc);
  const remaining = Math.max(0, total - paid);
  const newRem = Math.max(0, remaining - amt);
  const content = $('m-collect-calc-content');
  $('m-collect-calc-panel').style.display = 'block';
  content.innerHTML = `
    <div class="calc-row"><span>إجمالي الطلب</span><span>${fmtMoney(total)} ج</span></div>
    <div class="calc-row"><span>المدفوع سابقاً</span><span>${fmtMoney(paid)} ج</span></div>
    <div class="calc-row"><span>المتبقي قبل التحصيل</span><span class="money-neg">${fmtMoney(remaining)} ج</span></div>
    <div class="calc-sep"></div>
    <div class="calc-row"><span>المُحصَّل الآن</span><span class="money-pos">+${fmtMoney(amt)} ج</span></div>
    <div class="calc-row"><span>المتبقي بعد</span><span class="${newRem <= 0 ? 'money-pos' : 'money-neg'}">${fmtMoney(newRem)} ج</span></div>
    ${newRem <= 0 && amt > 0 ? '<div class="calc-result ok">✅ الطلب سيُحصَّل بالكامل</div>' : amt > remaining ? '<div class="calc-result warn">⚠️ المبلغ أكبر من المتبقي</div>' : ''}
  `;
};

window.confirmCollect = async () => {
  if (!pendingOrder) return;
  const o = pendingOrder;
  const amount = parseFloat($('m-collect-amount').value) || 0;
  const note = $('m-collect-note').value.trim();
  const walletMode = o.shipMethod === 'pickup' || o.shipMethod === 'courier' || o.shipMethod === 'internal';
  const btn = $('btn-collect-confirm');
  btn.disabled = true; btn.textContent = '⏳ جارٍ...';

  let result;
  if (walletMode) {
    const walletId = $('m-collect-wallet').value;
    const wallet = wallets.find(w => w._id === walletId);
    if (!walletId) { toast('اختر المحفظة', 'err'); btn.disabled = false; btn.textContent = '✅ تأكيد التحصيل'; return; }
    result = await shippingActions.collectFromCustomer({
      db, orderId: o._id, amount, walletId, walletName: wallet?.name || '',
      note, role: myRole, userId: me.uid, userName: myUserName,
    });
  } else {
    result = await shippingActions.markCompanyCollected({
      db, orderId: o._id, amount, note,
      role: myRole, userId: me.uid, userName: myUserName,
      bypassWarnings: false,
    });
    if (result.needsConfirmation && result.warnings?.length) {
      if (confirm(result.warnings.join('\n\n') + '\n\nالمتابعة؟')) {
        result = await shippingActions.markCompanyCollected({
          db, orderId: o._id, amount, note,
          role: myRole, userId: me.uid, userName: myUserName,
          bypassWarnings: true,
        });
      } else {
        btn.disabled = false; btn.textContent = '✅ تأكيد التحصيل';
        return;
      }
    }
  }

  btn.disabled = false; btn.textContent = '✅ تأكيد التحصيل';
  if (!result.ok) { toast(result.errors[0] || 'فشل التحصيل', 'err'); return; }
  toast(walletMode ? '✅ تم التحصيل ودخل المحفظة' : '✅ تم تأكيد التحصيل — بانتظار التسوية');
  closeMod('m-collect');
  pendingOrder = null;
};

// ══════════════════════════════════════════
// SETTLE
// ══════════════════════════════════════════
window.openSettleSingle = (orderId) => {
  const o = orders.find(x => x._id === orderId);
  if (!o) return;
  pendingOrders = [o];
  pendingOrder = null;
  const collected = parseFloat(o.shipCollected) || 0;
  const cost = parseFloat(o.shippingCost) || 0;
  const expected = Math.max(0, collected - cost);
  $('m-settle-info').innerHTML = `
    <div class="modal-info-row"><span>الطلب</span><span>#${o.orderNumber || o._id.slice(0, 6)}</span></div>
    <div class="modal-info-row"><span>العميل</span><span>${o.clientName || '—'}</span></div>
    <div class="modal-info-row"><span>الشركة</span><span>${o.shipCompanyName || '—'}</span></div>
    <div class="modal-info-row"><span>المُحصَّل من العميل</span><span>${fmtMoney(collected)} ج</span></div>
    <div class="modal-info-row"><span>تكلفة الشحن</span><span>${fmtMoney(cost)} ج</span></div>
    <div class="modal-info-row" style="border-top:1px dashed var(--line);margin-top:6px;padding-top:6px;color:var(--g)"><span>المستحق لنا</span><span>${fmtMoney(expected)} ج</span></div>
  `;
  $('m-settle-amount').value = expected;
  $('m-settle-wallet').value = '';
  $('m-settle-note').value = '';
  $('m-settle-diff-reason').value = '';
  updateSettleCalc();
  openMod('m-settle');
};

window.updateSettleCalc = () => {
  if (!pendingOrders.length) return;
  const amt = parseFloat($('m-settle-amount').value) || 0;
  const sumCollected = pendingOrders.reduce((s, o) => s + (parseFloat(o.shipCollected) || 0), 0);
  const sumCost = pendingOrders.reduce((s, o) => s + (parseFloat(o.shippingCost) || 0), 0);
  const expected = Math.max(0, sumCollected - sumCost);
  const diff = amt - expected;
  const hasDiff = Math.abs(diff) > 0.01;
  const content = $('m-settle-calc-content');
  content.innerHTML = `
    <div class="calc-row"><span>إجمالي محصَّل من العملاء</span><span>${fmtMoney(sumCollected)} ج</span></div>
    <div class="calc-row"><span>إجمالي تكلفة الشحن</span><span class="money-neg">-${fmtMoney(sumCost)} ج</span></div>
    <div class="calc-sep"></div>
    <div class="calc-row"><span>المستحق المتوقع</span><span>${fmtMoney(expected)} ج</span></div>
    <div class="calc-row"><span>المبلغ الفعلي</span><span class="money-pos">${fmtMoney(amt)} ج</span></div>
    ${hasDiff ? `<div class="calc-result warn">⚠️ فرق: ${diff > 0 ? '+' : ''}${fmtMoney(diff)} ج — حدد السبب</div>` : '<div class="calc-result ok">✅ المبلغ يطابق المتوقع</div>'}
  `;
  $('m-settle-diff-row').style.display = hasDiff ? '' : 'none';
};

window.confirmSettle = async () => {
  if (!pendingOrders.length) return;
  const amount = parseFloat($('m-settle-amount').value) || 0;
  const walletId = $('m-settle-wallet').value;
  const wallet = wallets.find(w => w._id === walletId);
  const diffReason = $('m-settle-diff-reason').value;
  const note = $('m-settle-note').value.trim();
  const companyName = pendingOrders[0]?.shipCompanyName || '';

  const DIFF_LABELS = { weight: 'فرق وزن', city: 'فرق مدينة', undelivered: 'شحنة لم تُسلَّم', discount: 'خصم/عمولة', other: 'أخرى' };

  const btn = $('btn-settle-confirm');
  btn.disabled = true; btn.textContent = '⏳ جارٍ...';

  let result = await shippingActions.settleWithCompany({
    db, orderIds: pendingOrders.map(o => o._id),
    amount, walletId, walletName: wallet?.name || '',
    companyName,
    diffReason, diffReasonLabel: DIFF_LABELS[diffReason] || '',
    diffNote: note, note,
    role: myRole, userId: me.uid, userName: myUserName,
    bypassWarnings: false,
  });

  if (result.needsConfirmation && result.warnings?.length) {
    if (confirm(result.warnings.join('\n\n') + '\n\nالمتابعة؟')) {
      result = await shippingActions.settleWithCompany({
        db, orderIds: pendingOrders.map(o => o._id),
        amount, walletId, walletName: wallet?.name || '',
        companyName,
        diffReason, diffReasonLabel: DIFF_LABELS[diffReason] || '',
        diffNote: note, note,
        role: myRole, userId: me.uid, userName: myUserName,
        bypassWarnings: true,
      });
    } else {
      btn.disabled = false; btn.textContent = '✅ تأكيد التسوية';
      return;
    }
  }

  btn.disabled = false; btn.textContent = '✅ تأكيد التسوية';
  if (!result.ok) { toast(result.errors[0] || 'فشل التسوية', 'err'); return; }
  toast(`✅ تمت التسوية — ${pendingOrders.length} طلب`);
  closeMod('m-settle');
  pendingOrders = [];
};

// ══════════════════════════════════════════
// RETURN
// ══════════════════════════════════════════
window.openReturn = (orderId) => {
  const o = orders.find(x => x._id === orderId);
  if (!o) return;
  pendingOrder = o;
  $('m-return-info').innerHTML = `
    <div class="modal-info-row"><span>الطلب</span><span>#${o.orderNumber || o._id.slice(0, 6)}</span></div>
    <div class="modal-info-row"><span>العميل</span><span>${o.clientName || '—'}</span></div>
    <div class="modal-info-row"><span>الشركة</span><span>${o.shipCompanyName || '—'}</span></div>
  `;
  $('m-return-reason').value = '';
  $('m-return-party').value = '';
  $('m-return-cost').value = '';
  $('m-return-wallet').value = '';
  $('m-return-note').value = '';
  openMod('m-return');
};

window.confirmReturn = async () => {
  if (!pendingOrder) return;
  const reason = $('m-return-reason').value;
  const party = $('m-return-party').value;
  const cost = parseFloat($('m-return-cost').value) || 0;
  const walletId = $('m-return-wallet').value;
  const wallet = wallets.find(w => w._id === walletId);
  const note = $('m-return-note').value.trim();

  const btn = $('btn-return-confirm');
  btn.disabled = true; btn.textContent = '⏳ جارٍ...';

  const result = await shippingActions.registerReturn({
    db, orderId: pendingOrder._id,
    reason, lossParty: party, cost, returnType: 'full', note,
    walletId, walletName: wallet?.name || '',
    role: myRole, userId: me.uid, userName: myUserName,
  });

  btn.disabled = false; btn.textContent = '✅ تسجيل المرتجع';
  if (!result.ok) { toast(result.errors[0] || 'فشل', 'err'); return; }
  toast('✅ تم تسجيل المرتجع');
  closeMod('m-return');
  pendingOrder = null;
};

// ══════════════════════════════════════════
// MODAL CLOSE — click backdrop / ESC
// ══════════════════════════════════════════
document.querySelectorAll('.modal').forEach(m => {
  m.addEventListener('click', e => {
    if (e.target === m) m.classList.remove('on');
  });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal.on').forEach(m => m.classList.remove('on'));
  }
});

// Expose for debugging
window.__shippingDebug = { orders, shippers, wallets, shippingActions };

</script>
</body>
</html>
