<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business2Card — الشحن</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.order-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;margin-bottom:10px;cursor:pointer;transition:var(--trans);border-right:3px solid var(--c);}
.order-card:hover{transform:translateX(-2px);box-shadow:0 4px 20px rgba(0,0,0,.3);}
.oc-id{font-size:10px;font-weight:700;color:var(--c);margin-bottom:4px;}
.oc-client{font-size:14px;font-weight:800;margin-bottom:4px;}
.oc-footer{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--line);}
.prod-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);gap:8px;}
.prod-row:last-child{border:none;}
.tl-item{display:flex;gap:12px;padding:8px 0;}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.col-btn{padding:10px 14px;border-radius:var(--rad);border:1px solid var(--line);background:var(--bg3);cursor:pointer;font-size:12px;font-weight:700;color:var(--dim2);transition:var(--trans);}
.col-btn.on{background:rgba(0,217,126,.12);border-color:rgba(0,217,126,.3);color:var(--g);}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">Shipping</div></div></div>
  <div class="nav-scroll">
    <a class="nav-link" href="index.html"><span class="nav-ico">⬡</span> لوحة التحكم</a>
    <a class="nav-link" href="clients.html"><span class="nav-ico">👤</span> العملاء</a>
    <a class="nav-link" href="design.html"><span class="nav-ico">✏️</span> التصميم</a>
    <a class="nav-link" href="print.html"><span class="nav-ico">🖨️</span> الطباعة</a>
    <a class="nav-link" href="production.html"><span class="nav-ico">🏭</span> التنفيذ</a>
    <a class="nav-link active" href="shipping.html"><span class="nav-ico">🚚</span> الشحن</a>
    <a class="nav-link" href="archive.html"><span class="nav-ico">📁</span> الأرشيف</a>
    <a class="nav-link" href="accounts.html"><span class="nav-ico">💰</span> الحسابات</a>
    <a class="nav-link" href="settings.html"><span class="nav-ico">⚙️</span> الإعدادات</a>
  </div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">A</div><div><div class="nav-user-name" id="nav-name">User</div><div class="nav-user-role">خروج</div></div></div></div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><button class="mob-menu-btn" onclick="toggleNav()">☰</button><div><h1>🚚 الشحن</h1><p id="page-sub">جاري التحميل...</p></div></div>
  </div>
  <div class="content">
    <div class="stats" style="margin-bottom:16px">
      <div class="stat" style="--sc:var(--c)"><div class="stat-icon">🚚</div><div class="stat-val" id="st-total">—</div><div class="stat-lbl">في الشحن</div></div>
      <div class="stat" style="--sc:var(--r)"><div class="stat-icon">💰</div><div class="stat-val" id="st-rem">—</div><div class="stat-lbl">باقي للتحصيل</div></div>
    </div>
    <div class="filters"><div class="sw"><span class="sw-ico">🔍</span><input class="inp" id="q" placeholder="بحث..." oninput="renderList()"></div></div>
    <div id="orders-list"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</div>
</div>
<div class="panel-ov" id="panel-ov" onclick="closePanel()">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-head"><div id="pn-hdr"></div><div style="display:flex;gap:8px"><button class="btn btn-g btn-sm" id="pn-deliver" onclick="doDeliver()" style="display:none">✅ تسجيل تسليم</button><button class="modal-x" onclick="closePanel()">✕</button></div></div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>
<div class="overlay" id="ov-deliver">
  <div class="modal">
    <div class="modal-head"><span class="modal-title">✅ تسجيل تسليم</span><button class="modal-x" onclick="cM('deliver')">✕</button></div>
    <div class="modal-body">
      <div style="margin-bottom:12px;font-size:13px">العميل: <strong id="del-name">—</strong> &nbsp; الباقي: <strong id="del-rem" style="color:var(--r)">—</strong></div>
      <div class="fg"><label>تاريخ التسليم *</label><input class="inp" id="del-date" type="date"></div>
      <div class="fg"><label>محصّل عند التسليم</label><input class="inp" id="del-amt" type="number" placeholder="0"></div>
      <div class="fg"><label>المحفظة</label><div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px" id="del-wallets"></div><input type="hidden" id="del-wallet-id"></div>
      <div class="fg"><label>ملاحظة</label><input class="inp" id="del-note" placeholder="..."></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="cM('deliver')">إلغاء</button><button class="btn btn-g" onclick="saveDeliver()">✅ تأكيد</button></div>
  </div>
</div>
<nav class="mob-nav"><div class="mob-nav-items">
  <a class="mob-nav-item" href="index.html"><div class="mob-nav-ico">⬡</div><div class="mob-nav-lbl">الرئيسية</div></a>
  <a class="mob-nav-item" href="print.html"><div class="mob-nav-ico">🖨️</div><div class="mob-nav-lbl">طباعة</div></a>
  <a class="mob-nav-item" href="production.html"><div class="mob-nav-ico">🏭</div><div class="mob-nav-lbl">تنفيذ</div></a>
  <a class="mob-nav-item active" href="shipping.html"><div class="mob-nav-ico">🚚</div><div class="mob-nav-lbl">شحن</div></a>
  <a class="mob-nav-item" href="archive.html"><div class="mob-nav-ico">📁</div><div class="mob-nav-lbl">أرشيف</div></a>
</div></nav>
<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div class="toasts" id="toasts"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,collection,doc,onSnapshot,addDoc,updateDoc,getDoc,arrayUnion,query,orderBy,serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { STAGES,ROLES,STAGE_PERMISSIONS,fn,nowStr } from './orders.js';
const FB={apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"};
const app=initializeApp(FB);const auth=getAuth(app);const db=getFirestore(app);
let orders=[],wallets=[],currentUser=null,currentRole='admin',currentUserName='',activeId=null,deliverId=null;
const gv=id=>document.getElementById(id)?.value||'';
const sv=(id,v)=>{const e=document.getElementById(id);if(e)e.value=v;};
const setText=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
const oM=id=>document.getElementById('ov-'+id)?.classList.add('open');
const cM=id=>document.getElementById('ov-'+id)?.classList.remove('open');
window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};
function toast(msg,t=''){const c=document.getElementById('toasts');const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  currentUser=u;
  const s=await getDoc(doc(db,'users',u.uid));
  if(s.exists()){const d=s.data();currentRole=d.role||'admin';currentUserName=d.name||u.email;const r=ROLES[currentRole]||ROLES.admin;setText('nav-name',currentUserName);document.getElementById('nav-av').textContent=currentUserName[0].toUpperCase();document.getElementById('nav-av').style.cssText='background:'+r.col+'20;color:'+r.col;document.getElementById('role-badge').textContent=r.label;document.getElementById('role-badge').style.cssText='background:'+r.col+'18;color:'+r.col;}
  startListeners();
});
function startListeners(){
  onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc')),snap=>{
    orders=snap.docs.map(d=>({...d.data(),_id:d.id})).filter(o=>o.status==='shipping');
    renderList();updateStats();
  });
  onSnapshot(query(collection(db,'wallets'),orderBy('name','asc')),snap=>{wallets=snap.docs.map(d=>({...d.data(),_id:d.id}));});
}
function updateStats(){
  setText('st-total',orders.length);
  setText('st-rem',fn(orders.reduce((s,o)=>s+(o.remaining||0),0))+' ج');
  setText('page-sub',orders.length+' أوردر في الشحن');
}
window.renderList=function(){
  const q=gv('q').toLowerCase();
  const data=orders.filter(o=>!q||(o.clientName||'').toLowerCase().includes(q)||(o.id||'').toLowerCase().includes(q));
  const el=document.getElementById('orders-list');
  if(!data.length){el.innerHTML='<div class="empty"><div class="empty-icon">🚚</div><div class="empty-text">'+(orders.length?'لا نتائج':'لا توجد أوردرات في الشحن')+'</div></div>';return;}
  el.innerHTML=data.map(o=>{
    const prods=(o.products||[]).map(p=>p.name+'x'+p.qty).join(' . ');
    return '<div class="order-card" onclick="openOrder(\''+o._id+'\')">'
      +'<div class="oc-id">🚚 '+(o.id||'—')+'</div>'
      +'<div class="oc-client">'+(o.clientName||'—')+'</div>'
      +'<div style="font-size:11px;color:var(--dim2);margin-bottom:6px">'+prods+'</div>'
      +'<div class="oc-footer"><span style="color:var(--c);font-size:11px">🚚 في الطريق</span>'
      +(o.remaining>0?'<span style="color:var(--r);font-size:11px">باقي: '+fn(o.remaining)+' ج</span>':'<span class="badge bg-g">✅ مكتمل</span>')
      +'</div></div>';
  }).join('');
};
window.openOrder=function(id){
  activeId=id;
  const o=orders.find(x=>x._id===id);if(!o)return;
  document.getElementById('panel-ov').classList.add('open');
  const can=STAGE_PERMISSIONS.shipping?.includes(currentRole);
  document.getElementById('pn-deliver').style.display=can?'':'none';
  document.getElementById('pn-hdr').innerHTML='<div><div style="font-size:10px;color:var(--c);font-weight:700">🚚 '+(o.id||'—')+'</div><div style="font-size:16px;font-weight:800">'+(o.clientName||'—')+'</div><div style="font-size:11px;color:var(--dim2)">'+(o.clientPhone||'')+'</div></div>';
  let prods=(o.products||[]).map(p=>'<div class="prod-row"><span style="flex:1;font-weight:700">'+p.name+'</span><span style="color:var(--dim2)">x '+p.qty+'</span><span style="color:var(--g);font-weight:700">'+fn(p.totalPrice)+' ج</span></div>').join('');
  let timeline=(o.timeline||[]).map(t=>'<div class="tl-item"><div class="tl-dot" style="background:'+(STAGES[t.stage]?.col||'var(--dim2)')+'"></div><div><div style="font-size:13px;font-weight:600">'+t.label+'</div><div style="font-size:10px;color:var(--dim2)">'+t.date+(t.by?' . '+t.by:'')+'</div></div></div>').join('');
  document.getElementById('panel-body').innerHTML=
    '<div class="section"><div class="section-title" style="margin-bottom:10px"><div class="section-ico" style="background:rgba(34,211,238,.12);color:var(--c)">📦</div>المنتجات</div>'+prods
    +(o.remaining>0?'<div style="margin-top:8px;padding:8px;background:rgba(255,61,110,.08);border-radius:var(--rad);font-size:12px;display:flex;justify-content:space-between"><span style="color:var(--dim2)">باقي</span><span style="color:var(--r);font-weight:700">'+fn(o.remaining)+' ج</span></div>':'<div style="margin-top:8px;padding:8px;background:rgba(0,217,126,.08);border-radius:var(--rad);font-size:12px;text-align:center;color:var(--g)">✅ مكتمل التحصيل</div>')
    +'</div>'
    +(can?'<div class="section"><div class="section-title" style="margin-bottom:8px"><div class="section-ico" style="background:rgba(0,217,126,.12);color:var(--g)">✅</div>تسجيل التسليم</div><button class="btn btn-g btn-full" onclick="prepDeliver(\''+o._id+'\')">✅ سجّل التسليم</button></div>':'')
    +'<div class="section"><div class="section-title" style="margin-bottom:8px"><div class="section-ico" style="background:rgba(59,158,255,.12);color:var(--b)">🕐</div>سجل الأوردر</div>'+timeline+'</div>';
};
window.closePanel=()=>{document.getElementById('panel-ov').classList.remove('open');activeId=null;};
window.doDeliver=function(){const o=orders.find(x=>x._id===activeId);if(o)prepDeliver(o._id);};
window.prepDeliver=function(id){
  deliverId=id;
  const o=orders.find(x=>x._id===id);if(!o)return;
  setText('del-name',o.clientName||'—');setText('del-rem',fn(o.remaining)+' ج');
  sv('del-date',new Date().toISOString().slice(0,10));sv('del-amt',o.remaining||'');sv('del-wallet-id','');sv('del-note','');
  document.getElementById('del-wallets').innerHTML=wallets.map(w=>'<div class="col-btn" id="dw-'+w._id+'" onclick="selW(\''+w._id+'\')">💳 '+w.name+'</div>').join('');
  oM('deliver');
};
window.selW=function(id){document.querySelectorAll('.col-btn').forEach(b=>b.classList.remove('on'));document.getElementById('dw-'+id)?.classList.add('on');sv('del-wallet-id',id);};
window.saveDeliver=async function(){
  const date=gv('del-date');if(!date)return toast('أدخل تاريخ التسليم','err');
  const o=orders.find(x=>x._id===deliverId);if(!o)return;
  const amt=parseFloat(gv('del-amt'))||0;
  const walletId=gv('del-wallet-id');
  const note=gv('del-note');
  const newPaid=(o.totalPaid||0)+amt;
  const newRem=Math.max(0,(o.remaining||0)-amt);
  try{
    await updateDoc(doc(db,'orders',deliverId),{status:'delivered',totalPaid:newPaid,remaining:newRem,'shipment.deliveryDate':date,updatedAt:nowStr(),timeline:arrayUnion({stage:'delivered',label:'تم التسليم'+(amt?' وتحصيل '+fn(amt)+' ج':''),date:nowStr(),by:currentUserName,byId:currentUser.uid})});
    if(amt>0&&walletId){const w=wallets.find(x=>x._id===walletId);if(w){const bal=parseFloat(w.balance)||0;await updateDoc(doc(db,'wallets',walletId),{balance:bal+amt});await addDoc(collection(db,'transactions_v2'),{walletId,type:'in',amount:amt,fees:0,description:'تحصيل عند التسليم - '+o.clientName+' - '+o.id,category:'collection',ref:deliverId,balanceBefore:bal,balanceAfter:bal+amt,date:nowStr(),createdBy:currentUser.uid,createdByName:currentUserName,createdAt:serverTimestamp()});}}
    cM('deliver');closePanel();toast('✅ تم تسجيل التسليم','ok');
  }catch(e){toast('❌ '+e.message,'err');}
};
</script>
</body>
</html>
