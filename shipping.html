<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22d3ee">
<title>B2C — مركز الشحن</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css?v=3">
<link rel="stylesheet" href="design-system/components.css?v=1">
<script src="sidebar-config.js"></script>
<script src="sync-monitor.js"></script>
<script type="module" src="inbox-badge.js"></script>
<style>
/* ═══════════════════════════════════════════════
   SHIPPING CENTER — Unified Redesign (RULE U1)
   ═══════════════════════════════════════════════ */

/* Tab Navigation */
.ship-tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:4px;margin-bottom:14px;overflow-x:auto;flex-wrap:wrap}
.ship-tab{flex:1;min-width:130px;padding:11px 12px;background:transparent;border:1px solid transparent;border-radius:var(--rad);color:var(--dim2);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;white-space:nowrap}
.ship-tab:hover{background:var(--bg3);color:inherit}
.ship-tab.active{background:var(--bg3);border-color:var(--line);color:var(--c);box-shadow:0 -2px 0 var(--c) inset}
.ship-tab-count{display:inline-flex;min-width:22px;height:20px;align-items:center;justify-content:center;padding:0 6px;border-radius:99px;background:var(--bg);color:var(--c);font-size:var(--fs-sm);font-weight:800}
.ship-tab.active .ship-tab-count{background:var(--c);color:#000}
.ship-tab-count.warn{background:rgba(255,170,0,.2);color:var(--y)}
.ship-tab-count.alert{background:rgba(255,61,110,.2);color:var(--r)}
.ship-tab.active .ship-tab-count.warn{background:var(--y);color:#000}
.ship-tab.active .ship-tab-count.alert{background:var(--r);color:#fff}

/* KPI Row */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:12px 14px;border-top:3px solid var(--kc)}
.kpi-val{font-size:24px;font-weight:900;color:var(--kc);line-height:1.1}
.kpi-lbl{font-size:10.5px;color:var(--dim2);font-weight:700;margin-top:3px}
.kpi-sub{font-size:var(--fs-xs);color:var(--dim2);margin-top:4px}

/* Filters Bar */
.filters{display:flex;gap:8px;flex-wrap:wrap;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:10px 12px;margin-bottom:12px;align-items:center}
.filters select,.filters input{background:var(--bg3);border:1px solid var(--line);color:inherit;padding:8px 12px;border-radius:var(--rad);font-family:inherit;font-size:var(--fs-md);font-weight:600;min-width:140px}
.filters input{flex:1;min-width:200px}
.filters label{font-size:var(--fs-sm);color:var(--dim2);font-weight:700;display:flex;align-items:center;gap:6px}

/* Table */
.tbl-wrap{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);overflow:visible}
.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px}
.tbl th{position:sticky;top:0;z-index:10;background:var(--bg3);text-align:right;padding:11px 10px;font-size:var(--fs-sm);font-weight:800;color:var(--dim2);border-bottom:2px solid var(--line);white-space:nowrap}
.tbl td{padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.tbl tr:last-child td{border-bottom:0}
.cell-name{font-weight:800}
.cell-order{font-family:monospace;color:var(--dim2);font-size:11.5px}
.cell-money{font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
.money-pos{color:var(--g)}
.money-neg{color:var(--r)}
.money-zero{color:var(--dim2)}
.cell-sub{font-size:10.5px;color:var(--dim2);margin-top:2px}

/* Status Badges */
.ship-bdg{display:inline-block;font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:99px;white-space:nowrap}

/* Smart Badges (customer/order context) */
.smart-bdg{display:inline-block;font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:5px;margin-inline-start:4px;letter-spacing:.2px}
.smart-bdg-new{background:rgba(34,217,126,.15);color:var(--g);border:1px solid rgba(34,217,126,.3)}
.smart-bdg-loyal{background:rgba(167,139,250,.15);color:var(--p);border:1px solid rgba(167,139,250,.3)}
.smart-bdg-today{background:rgba(34,211,238,.15);color:var(--c);border:1px solid rgba(34,211,238,.3)}
.smart-bdg-urgent{background:rgba(255,61,110,.15);color:var(--r);border:1px solid rgba(255,61,110,.3);animation:pulse 2s ease-in-out infinite}
.smart-bdg-multi{background:rgba(255,170,0,.15);color:var(--y);border:1px solid rgba(255,170,0,.3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

/* Expand toggle */
.expand-btn{background:transparent;border:0;color:var(--dim2);cursor:pointer;font-size:var(--fs-lg);padding:4px 7px;border-radius:6px;transition:all .15s}
.expand-btn:hover{background:var(--bg3);color:var(--c)}
.expand-btn.on{color:var(--c);transform:rotate(180deg)}
.row-expanded > td{background:var(--bg3) !important;border-bottom:0 !important}
.row-detail > td{padding:0 !important;background:var(--bg3) !important}
.row-detail-inner{padding:14px 18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.detail-block{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.detail-block h4{margin:0 0 8px 0;font-size:var(--fs-sm);font-weight:800;color:var(--dim2);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.detail-block .dline{font-size:12.5px;padding:3px 0;display:flex;justify-content:space-between;gap:8px}
.detail-block .dline span:first-child{color:var(--dim2);font-weight:600}
.detail-block .dline span:last-child{font-weight:700;font-variant-numeric:tabular-nums}

/* Product items */
.prod-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:6px}
.prod-item{display:flex;align-items:center;gap:8px;padding:6px;background:var(--bg3);border-radius:8px}
.prod-thumb{width:44px;height:44px;border-radius:6px;object-fit:cover;border:1px solid var(--line);background:var(--bg2);flex-shrink:0;cursor:pointer;transition:transform .15s}
.prod-thumb:hover{transform:scale(1.06)}
.prod-thumb-empty{width:44px;height:44px;border-radius:6px;border:1px dashed var(--line);background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--dim2);font-size:var(--fs-2xl);flex-shrink:0}
.prod-info{flex:1;min-width:0}
.prod-name{font-size:12.5px;font-weight:700;color:inherit}
.prod-meta{font-size:10.5px;color:var(--dim2);margin-top:2px}

/* Timeline */
.tl-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto}
.tl-item{display:flex;gap:8px;padding:4px 0;border-bottom:1px dashed var(--line);font-size:11.5px;line-height:1.45}
.tl-item:last-child{border-bottom:0}
.tl-date{color:var(--dim2);font-variant-numeric:tabular-nums;flex-shrink:0;font-size:10.5px}
.tl-action{flex:1}

/* Quick action chips */
.qa-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.qa-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:99px;background:var(--bg2);border:1px solid var(--line);color:inherit;font-size:var(--fs-sm);font-weight:700;text-decoration:none;cursor:pointer;transition:all .15s;font-family:inherit}
.qa-chip:hover{background:var(--bg3);border-color:var(--c);color:var(--c);transform:translateY(-1px)}
.qa-chip-wa{color:#25d366;border-color:rgba(37,211,102,.3)}
.qa-chip-wa:hover{background:rgba(37,211,102,.1);border-color:#25d366;color:#25d366}
.qa-chip-call{color:var(--b);border-color:rgba(74,142,245,.3)}
.qa-chip-call:hover{background:rgba(74,142,245,.1);border-color:var(--b);color:var(--b)}

/* Lightbox for images */
.lb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:10000;padding:20px;cursor:zoom-out}
.lb-overlay.on{display:flex}
.lb-overlay img{max-width:100%;max-height:100%;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.5)}

/* Row Actions */
.row-actions{display:flex;gap:5px;flex-wrap:nowrap;align-items:center}
.row-actions .btn{padding:5px 9px;font-size:10.5px;font-weight:800}

/* Empty State */
.empty{padding:50px 20px;text-align:center;color:var(--dim2)}
.empty-ico{font-size:48px;margin-bottom:10px}
.empty-msg{font-size:var(--fs-lg);font-weight:700;color:var(--dim2)}
.empty-sub{font-size:11.5px;color:var(--dim2);margin-top:5px}

/* Delay Row Highlight */
.row-delay-warning td{background:rgba(255,170,0,.06)}
.row-delay-critical td{background:rgba(255,61,110,.08)}
.row-delay-critical{border-right:3px solid var(--r) !important}
.row-delay-warning{border-right:3px solid var(--y) !important}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:9999;padding:16px}
.modal.on{display:flex}
.modal-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);width:100%;max-width:560px;max-height:92vh;overflow:auto;padding:22px}
.modal-card h3{margin:0 0 14px 0;font-size:17px;font-weight:800}
.modal-card .row{display:flex;flex-direction:column;gap:5px;margin-bottom:11px}
.modal-card label{font-size:var(--fs-sm);font-weight:700;color:var(--dim2)}
.modal-card input,.modal-card select,.modal-card textarea{background:var(--bg3);border:1px solid var(--line);color:inherit;padding:10px 12px;border-radius:var(--rad);font-family:inherit;font-size:var(--fs-md);font-weight:600}
.modal-card .actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.modal-info{background:var(--bg3);border-radius:var(--rad);padding:12px 14px;margin-bottom:14px;font-size:12.5px}
.modal-info-row{display:flex;justify-content:space-between;padding:3px 0}
.modal-info-row span:first-child{color:var(--dim2)}
.modal-info-row span:last-child{font-weight:800}

/* Live Calc Panel */
.calc-panel{background:linear-gradient(135deg,rgba(34,211,238,.06),rgba(167,139,250,.06));border:1px solid rgba(34,211,238,.25);border-radius:var(--rad);padding:12px 14px;margin:10px 0 12px;font-size:12.5px}
.calc-panel-title{font-size:10.5px;font-weight:800;color:var(--c);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.calc-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-variant-numeric:tabular-nums}
.calc-row span:first-child{color:var(--dim2);font-size:11.5px;font-weight:600}
.calc-row span:last-child{font-weight:800;font-size:var(--fs-md)}
.calc-sep{border-top:1px dashed var(--line);margin:6px 0;padding-top:5px}
.calc-result{font-size:13.5px;font-weight:900;margin-top:7px;padding:8px 10px;border-radius:6px;text-align:center;letter-spacing:.3px}
.calc-result.ok{background:rgba(34,217,126,.13);color:var(--g);border:1px solid rgba(34,217,126,.3)}
.calc-result.warn{background:rgba(255,170,0,.13);color:var(--y);border:1px solid rgba(255,170,0,.3)}
.calc-result.err{background:rgba(255,61,110,.13);color:var(--r);border:1px solid rgba(255,61,110,.3)}
.calc-result.info{background:rgba(34,211,238,.13);color:var(--c);border:1px solid rgba(34,211,238,.3)}

/* Reconciliation Table (Accounts Tab) */
.recon-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);overflow:hidden;margin-bottom:14px}
.recon-head{padding:14px 16px;background:var(--bg3);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.recon-name{font-size:15px;font-weight:800}
.recon-stats{display:flex;gap:18px;font-size:11.5px;color:var(--dim2);font-weight:700}
.recon-stat{display:flex;flex-direction:column}
.recon-stat span:last-child{font-size:var(--fs-lg);color:var(--c);font-weight:900;font-variant-numeric:tabular-nums}
.recon-stat .pos{color:var(--g)}
.recon-stat .neg{color:var(--r)}

/* Dashboard Tab */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.dash-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:16px}
.dash-card h4{margin:0 0 10px 0;font-size:12.5px;font-weight:800;color:var(--dim2);text-transform:uppercase;letter-spacing:.5px}
.dash-num{font-size:32px;font-weight:900;color:var(--c);line-height:1.1}
.dash-sub{font-size:var(--fs-sm);color:var(--dim2);margin-top:6px;font-weight:600}

/* Delay Alert Banner */
.delay-banner{background:linear-gradient(135deg,rgba(255,61,110,.08),rgba(255,170,0,.08));border:1px solid rgba(255,61,110,.3);border-radius:var(--rad2);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.delay-banner-title{font-size:13.5px;font-weight:800;color:var(--r);display:flex;align-items:center;gap:8px}
.delay-banner-msg{font-size:11.5px;color:var(--dim2);margin-top:4px;font-weight:600}

/* ════════════════════════════════════════
   CARDS GALLERY — العرض الجديد الأساسي
   ════════════════════════════════════════ */
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card-order{background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative;display:flex;flex-direction:column}
.card-order:hover{transform:translateY(-3px);border-color:var(--c);box-shadow:0 8px 24px rgba(0,0,0,.18)}
.card-order.urgent{border-color:rgba(255,61,110,.4)}
.card-order.urgent:hover{border-color:var(--r);box-shadow:0 8px 24px rgba(255,61,110,.18)}

/* Card cover image */
.card-cover{position:relative;width:100%;height:170px;background:linear-gradient(135deg,var(--bg3),var(--bg4));overflow:hidden}
.card-cover img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.card-order:hover .card-cover img{transform:scale(1.04)}
.card-cover-empty{display:flex;align-items:center;justify-content:center;height:100%;font-size:42px;opacity:.4}

/* Status badge overlay (top-right) */
.card-status{position:absolute;top:10px;left:10px;padding:5px 11px;border-radius:99px;font-size:var(--fs-sm);font-weight:800;backdrop-filter:blur(6px);background:rgba(0,0,0,.55);color:#fff;letter-spacing:.2px;z-index:2}

/* Smart badges (top-right corner) */
.card-smart-badges{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:4px;align-items:flex-end;z-index:2}
.card-smart-badges .smart-bdg{margin:0;backdrop-filter:blur(6px)}

/* Card body */
.card-body{padding:12px 14px;display:flex;flex-direction:column;gap:6px;flex:1}
.card-num{display:flex;justify-content:space-between;align-items:center;font-size:11.5px}
.card-num-id{font-family:monospace;color:var(--dim2);font-weight:700}
.card-num-date{color:var(--dim2);font-size:10.5px}
.card-name{font-size:14.5px;font-weight:800;line-height:1.3;color:inherit}
.card-meta{display:flex;flex-direction:column;gap:3px;font-size:11.5px;color:var(--dim2);line-height:1.4}
.card-meta-row{display:flex;align-items:center;gap:5px}
.card-meta-row.full{white-space:normal;line-height:1.4}
.card-price{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg3);border-radius:8px;margin-top:4px}
.card-price-lbl{font-size:10.5px;color:var(--dim2);font-weight:700}
.card-price-val{font-size:var(--fs-lg);font-weight:900;font-variant-numeric:tabular-nums}

/* Card action bar */
.card-actions{display:flex;gap:6px;padding:10px 12px;border-top:1px solid var(--line);background:var(--bg3)}
.card-actions .btn{flex:1;padding:7px 8px;font-size:11.5px;font-weight:800;text-align:center}
.card-icon-btn{flex:0 0 auto !important;width:34px;padding:7px !important;display:flex;align-items:center;justify-content:center}

/* Mobile cards — single column on small screens */
@media (max-width:768px){
  .gallery{grid-template-columns:1fr;gap:12px}
  .card-cover{height:180px}
  .card-name{font-size:var(--fs-lg)}
  .card-actions .btn{font-size:var(--fs-sm);padding:8px 6px}
}

/* Cover image gradient overlay for legibility */
.card-cover::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.35) 0%,transparent 35%,transparent 70%,rgba(0,0,0,.15) 100%);pointer-events:none}


/* Mobile card view labels (hidden on desktop, shown inside @media on mobile) */
.m-lbl{display:none}

/* Officer column visible only on desktop — financial+status combined on mobile */
.d-only-desktop{}

/* ════════════════════════════════════════
   Responsive — Mobile First Approach
   ════════════════════════════════════════ */
@media (max-width:768px){

  /* ── Tabs: horizontal scroll بدون wrap ── */
  .ship-tabs{flex-wrap:nowrap;overflow-x:auto;scroll-snap-type:x mandatory;padding:5px;-webkit-overflow-scrolling:touch}
  .ship-tabs::-webkit-scrollbar{height:3px}
  .ship-tab{flex:0 0 auto;min-width:auto;font-size:11.5px;padding:9px 11px;scroll-snap-align:start}
  .ship-tab-count{min-width:18px;height:17px;font-size:var(--fs-xs)}

  /* ── KPIs: 2 أعمدة ── */
  .kpi-row{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
  .kpi{padding:10px 12px}
  .kpi-val{font-size:21px}
  .kpi-lbl{font-size:var(--fs-xs)}
  .kpi-sub{font-size:9.5px}

  /* ── Filters: عمودي + كامل العرض ── */
  .filters{padding:8px;gap:6px}
  .filters input,.filters select{min-width:0;width:100%;font-size:12.5px;padding:9px 11px}
  .filters label{flex:1 1 100%}

  /* ── Delay banner أصغر ── */
  .delay-banner{padding:11px 12px}
  .delay-banner-title{font-size:12.5px}
  .delay-banner-msg{font-size:var(--fs-sm)}

  /* ── الجدول كـ Cards على الموبايل ── */
  .tbl-wrap{background:transparent;border:0;padding:0}
  .tbl{display:block}
  .tbl thead{display:none}
  .tbl tbody{display:block}
  .tbl tr{display:block;background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px;position:relative}
  .tbl tr:hover td{background:transparent}
  .tbl td{display:block;padding:5px 0;border-bottom:0;border-top:1px dashed var(--line);position:relative;padding-inline-start:0}
  .tbl td:first-child{border-top:0;padding-top:0;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .tbl td.m-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 0}
  .m-lbl{display:inline-block;font-size:var(--fs-xs);font-weight:800;color:var(--dim2);text-transform:uppercase;letter-spacing:.3px;margin-inline-end:5px}
  .row-actions{flex-wrap:wrap;gap:6px;padding-top:6px}
  .row-actions .btn{flex:1;min-width:auto;padding:8px 6px;font-size:var(--fs-sm);text-align:center}

  /* ── الـ expand button أكبر للـ touch ── */
  .expand-btn{font-size:var(--fs-2xl);padding:6px 10px}

  /* ── Row Expanded styles عند الموبايل ── */
  .row-expanded{border-color:var(--c) !important;box-shadow:0 0 0 1px var(--c)}
  .row-detail{background:transparent !important}
  .row-detail-inner{padding:10px 0 0 0;grid-template-columns:1fr;gap:10px}
  .detail-block{padding:11px 13px}

  /* ── Smart badges تنزل لسطر تاني ── */
  .smart-bdg{font-size:var(--fs-tiny);padding:1.5px 5px}

  /* ── إخفاء عمود المسؤول على الموبايل (مدمج بالحالة) ── */
  .d-only-desktop{display:none !important}

  /* ── Modal كـ Bottom Sheet ── */
  .modal{align-items:flex-end;padding:0}
  .modal-card{max-width:100%;width:100%;max-height:90vh;border-radius:18px 18px 0 0;padding:18px 16px;animation:slideUp .25s ease-out}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-card h3{font-size:15px}
  .modal-card input,.modal-card select,.modal-card textarea{font-size:var(--fs-lg);padding:11px 12px}
  .modal-card .actions{flex-direction:column-reverse;gap:6px}
  .modal-card .actions .btn{width:100%;padding:12px;font-size:var(--fs-md)}

  /* ── Reconciliation cards على الموبايل ── */
  .recon-head{flex-direction:column;align-items:stretch;gap:10px;padding:12px}
  .recon-stats{flex-direction:row;justify-content:space-between;gap:8px;flex-wrap:wrap}

  .recon-stat span:last-child{font-size:var(--fs-md)}

  /* ── Dashboard cards على الموبايل ── */
  .dash-grid{grid-template-columns:1fr;gap:10px}
  .dash-num{font-size:26px}

  /* ── Quick action chips أكبر للـ touch ── */
  .qa-chip{padding:8px 13px;font-size:var(--fs-base)}
  .qa-chips{gap:8px}

  /* ── Product thumbnails أكبر ── */

  /* ── Timeline أصغر ── */

<aside class="sidenav"></aside>
<main class="main">

  <div class="content">

      <button class="ship-tab"        data-tab="transit"          onclick="switchTab('transit')">🚚 جاري التوصيل <span class="ship-tab-count" id="cnt-transit">0</span></button>
      <button class="ship-tab"        data-tab="collect"          onclick="switchTab('collect')">💰 للتحصيل <span class="ship-tab-count" id="cnt-collect">0</span></button>

      <button class="ship-tab"        data-tab="returns"          onclick="switchTab('returns')">↩️ المرتجعات <span class="ship-tab-count" id="cnt-returns">0</span></button>
      <button class="ship-tab"        data-tab="dashboard"        onclick="switchTab('dashboard')">📊 لوحة المؤشرات</button>

    <!-- Filters (per-tab visibility controlled in JS) -->

        <option value="">كل طرق الشحن</option>

        <option value="pickup">استلام من المطبعة</option>
        <option value="courier">مندوب داخلي</option>

    <!-- Tab Content Containers -->

  </div>
</main>

<!-- ═══════════════════════════════════════════

     ═══════════════════════════════════════════ -->

<!-- ═══════════════════════════════════════════
     MODULE SCRIPT
     ═══════════════════════════════════════════ -->
<script type="module">
import {
  db, auth, AppState, initAuth, renderSidebar, initMobileMenu,
  startListeners, toast, canSee, maskPhone, fn,
} from './shared.js';
import {
  onSnapshot, query, collection, where, orderBy, limit, doc, getDoc,
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { shippingActions } from './shipping-actions.js';
// PR-1 helpers (scalable-drifting-ember): central method/stage labels.
import { getShipMethodLabel, getShipStageLabel, normalizeShipStage } from './orders.js';
import {
  getOrdersReadyToDispatch, getOrdersInTransit, getOrdersWaitingCollection,
  getOrdersPendingSettlement, getOrdersSettled, getOrdersReturned,
  getDelayedOrders, getCompanyReconciliation, getShippingKPIs,
  shipStageBadgeHTML, fmtMoney, fmtDays, SHIP_STAGE_LABELS,
} from './shipping-service.js';

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let me = null, myRole = '', myUserName = '';
let orders = [], shippers = [], wallets = [];
let currentTab = 'ready';
let pendingOrder = null;   // for modals
let pendingOrders = [];    // for bulk settle
let settlements = [];      // shipping_settlements for reverse list
const expandedRows = new Set();  // orderIds currently expanded inline

const $ = id => document.getElementById(id);

// ══════════════════════════════════════════
// AUTH + LISTENERS
// ══════════════════════════════════════════
initAuth(async (state) => {
  me = state.currentUser;
  myRole = state.currentRole;
  myUserName = state.userName || me.email;

  $('user-info').textContent = `${myUserName} · ${myRole}`;
  $('nav-name').textContent = myUserName;

  initMobileMenu();
  renderSidebar('shipping');

  startListeners({
    onOrders: (list) => { orders = list || []; refreshAll(); },
    onWallets: (list) => { wallets = list || []; populateWalletDropdowns(); },
  }, { orderLimit: 500, skip: ['clients', 'products'] });

  // Shippers v2 (shipping companies registry)
  onSnapshot(query(collection(db, 'shippers_v2'), limit(200)), (snap) => {
    shippers = snap.docs.map(d => ({ ...d.data(), _id: d.id }));
    populateCompanyDropdowns();
    refreshAll();
  });

  // Recent settlements for reversal action
  // PR-7-salvage G2: append-only — exclude reversed entries.
  onSnapshot(
    query(collection(db, 'shipping_settlements'), orderBy('createdAt', 'desc'), limit(50)),
    (snap) => { settlements = snap.docs.map(d => ({ ...d.data(), _id: d.id })).filter(s => s.reversed !== true); }
  );
}, () => { window.location.href = 'login.html'; });

// ══════════════════════════════════════════
// DROPDOWNS
// ══════════════════════════════════════════
function populateCompanyDropdowns() {
  const opts = '<option value="">— اختر شركة —</option>' +
    shippers.map(s => `<option value="${s._id}">${s.name || 'بدون اسم'}</option>`).join('');
  const fc = $('f-company');
  if (fc) fc.innerHTML = '<option value="">كل الشركات</option>' +
    shippers.map(s => `<option value="${s._id}">${s.name}</option>`).join('');
  const dc = $('m-dispatch-company');
  if (dc) dc.innerHTML = opts;
}

function populateWalletDropdowns() {
  const opts = '<option value="">— اختر محفظة —</option>' +
    wallets.map(w => `<option value="${w._id}">${w.name} (${fmtMoney(w.balance)} ج)</option>`).join('');
  ['m-dispatch-wallet', 'm-collect-wallet', 'm-settle-wallet', 'm-return-wallet'].forEach(id => {
    const el = $(id);
    if (el) el.innerHTML = opts;
  });
}

// ══════════════════════════════════════════
// FILTERS + SEARCH
// ══════════════════════════════════════════
$('f-search').addEventListener('input', () => refreshAll());
$('f-company').addEventListener('change', () => refreshAll());
$('f-method').addEventListener('change', () => refreshAll());

function applyFilters(list) {
  const q = ($('f-search').value || '').toLowerCase().trim();
  const fc = $('f-company').value;
  const fm = $('f-method').value;

  return list.filter(o => {
    if (fc && o.shipCompanyId !== fc) return false;
    if (fm && o.shipMethod !== fm) return false;
    if (q) {
      const hay = `${o.orderNumber || ''} ${o.clientName || ''} ${o._id} ${o.clientPhone || ''} ${o.shipGov || o.clientGov || ''} ${o.shipAddress || ''}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

// ══════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════
window.switchTab = (tab) => {
  currentTab = tab;
  document.querySelectorAll('.ship-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });

  // Hide filters for some tabs
  const noFilterTabs = ['accounts', 'dashboard'];
  $('filters').style.display = noFilterTabs.includes(tab) ? 'none' : '';

  refreshAll();
};

// ══════════════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════════════
function refreshAll() {
  renderKPIs();
  renderTabCounts();
  renderDelayBanner();
  renderTabContent();
}

function renderKPIs() {
  const k = getShippingKPIs(orders);
  const colors = {
    ready: '#22d3ee', transit: 'var(--y)', collect: 'var(--p)',
    settle: 'var(--g)', delays: 'var(--r)',
  };
  $('kpi-row').innerHTML = `
    <div class="kpi" style="--kc:${colors.ready}">
      <div class="kpi-val">${k.ready}</div>
      <div class="kpi-lbl">جاهز للشحن</div>
    </div>
    <div class="kpi" style="--kc:${colors.transit}">
      <div class="kpi-val">${k.inTransit}</div>
      <div class="kpi-lbl">جاري التوصيل</div>
    </div>
    <div class="kpi" style="--kc:${colors.collect}">
      <div class="kpi-val">${k.waitCollect}</div>
      <div class="kpi-lbl">بانتظار التحصيل</div>
    </div>
    <div class="kpi" style="--kc:${colors.settle}">
      <div class="kpi-val">${k.pendingSettle}</div>
      <div class="kpi-lbl">للتسوية</div>
      <div class="kpi-sub">المستحق: ${fmtMoney(k.totalExpectedFromCompanies)} ج</div>
    </div>
    <div class="kpi" style="--kc:${colors.delays}">
      <div class="kpi-val">${k.delayed}</div>
      <div class="kpi-lbl">متأخرات</div>
    </div>
  `;
}

function renderTabCounts() {
  $('cnt-ready').textContent = getOrdersReadyToDispatch(orders).length;
  $('cnt-transit').textContent = getOrdersInTransit(orders).length;
  $('cnt-collect').textContent = getOrdersWaitingCollection(orders).length;
  $('cnt-settle').textContent = getOrdersPendingSettlement(orders).length;
  $('cnt-delays').textContent = getDelayedOrders(orders).length;
  $('cnt-returns').textContent = getOrdersReturned(orders).length;
}

function renderDelayBanner() {
  const delays = getDelayedOrders(orders);
  if (!delays.length || currentTab === 'delays') {
    $('delay-banner').style.display = 'none';
    return;
  }
  const critical = delays.filter(d => d.severity === 'critical').length;
  $('delay-banner').style.display = 'flex';
  $('delay-count').textContent = delays.length;
  $('delay-detail').textContent = critical > 0
    ? `منهم ${critical} حالة حرجة (تأخر > الضعف). اضغط للمراجعة.`
    : 'اضغط على تاب "المتأخرات" للمراجعة';
}

function renderTabContent() {
  const c = $('tab-content');
  switch (currentTab) {
    case 'ready':     c.innerHTML = renderOrdersGallery(applyFilters(getOrdersReadyToDispatch(orders)), 'ready'); break;
    case 'transit':   c.innerHTML = renderOrdersGallery(applyFilters(getOrdersInTransit(orders)), 'transit'); break;
    case 'collect':   c.innerHTML = renderOrdersGallery(applyFilters(getOrdersWaitingCollection(orders)), 'collect'); break;
    case 'settle':    c.innerHTML = renderOrdersGallery(applyFilters(getOrdersPendingSettlement(orders)), 'settle'); break;
    case 'returns':   c.innerHTML = renderOrdersGallery(applyFilters(getOrdersReturned(orders)), 'returns'); break;
    case 'delays':    c.innerHTML = renderDelaysTable(); break;
    case 'accounts':  c.innerHTML = renderAccountsTab(); break;
    case 'dashboard': c.innerHTML = renderDashboardTab(); break;
    default:          c.innerHTML = '';
  }
}

// ══════════════════════════════════════════
// ORDERS TABLE (per tab)
// ══════════════════════════════════════════
function renderOrdersGallery(list, tab) {
  if (!list.length) {
    return `
      <div class="empty">
        <div class="empty-ico">📭</div>
        <div class="empty-msg">لا توجد طلبات في هذا التاب</div>
        <div class="empty-sub">${getEmptyHint(tab)}</div>
      </div>`;
  }
  return `<div class="gallery">${list.map(o => renderCard(o, tab)).join('')}</div>`;
}

// ── Card rendering — Gallery view (RULE U1 + W1.5)
function renderCard(o, tab) {
  const id = o._id;
  const num = o.orderNumber || id.slice(0, 6);
  const addr = getDeliveryAddress(o);
  const sale = parseFloat(o.salePrice) || 0;
  const cust = parseFloat(o.customerShipFee) || 0;
  const disc = parseFloat(o.discount) || 0;
  const paid = parseFloat(o.totalPaid) || 0;
  const total = Math.max(0, sale + cust - disc);
  const rem = Math.max(0, total - paid);

  // Cover image: finalImageUrl (highest priority — actual product photo)
  // → product designImages → product designImageUrl → o.designImageUrl
  const allImgs = getOrderImages(o);
  const cover = (o.finalImageUrl && isImageUrl(o.finalImageUrl) ? o.finalImageUrl : (allImgs[0]?.url || ''));

  const stage = SHIP_STAGE_LABELS[o.shipStage || ''] || SHIP_STAGE_LABELS[''];
  const isUrgent = isUrgentOrder(o);
  const badges = renderSmartBadges(o);

  // Primary action per tab
  const primaryAction = ({
    ready: { lbl: '🚚 تسليم', cls: 'btn-g', fn: 'openDispatch' },
    transit: { lbl: '✅ سُلِّم', cls: 'btn-b', fn: 'markDelivered' },
    collect: { lbl: '💰 تحصيل', cls: 'btn-g', fn: 'openCollect' },
    settle: { lbl: '📋 تسوية', cls: 'btn-g', fn: 'openSettleSingle' },
    returns: null,
  })[tab];

  const canSeePhone = canSee('client_phone', AppState.userPerms, myRole);
  const rawPhone = o.clientPhone || '';
  const waPhone = cleanPhone(rawPhone);

  return `
    <div class="card-order ${isUrgent ? 'urgent' : ''}" onclick="openOrderDetail('${id}')">
      <div class="card-cover">
        ${cover

function getDeliveryAddress(o) {

// ── Smart context helpers ─────────────────────────────────────
function isCreatedToday(ts) {
  if (!ts) return false;
  const d = ts.toDate?.() || (typeof ts === 'string' ? new Date(ts) : ts);
  if (!(d instanceof Date) || isNaN(d.getTime())) return false;
  const t = new Date();
  return d.getDate() === t.getDate() && d.getMonth() === t.getMonth() && d.getFullYear() === t.getFullYear();
}

function getCustomerContext(o) {
  if (!o.clientId) return { count: 1, isNew: true, isLoyal: false, activeCount: 0 };
  const all = orders.filter(x => x.clientId === o.clientId);
  const active = all.filter(x => x.stage !== 'archived' && x.stage !== 'cancelled');
  return {
    count: all.length,
    isNew: all.length === 1,
    isLoyal: all.length >= 5,
    activeCount: active.length,
    multipleActive: active.length >= 2,
  };
}

function isUrgentOrder(o) {
  // عاجل = متأخر بالفعل في حالة الشحن
  if (o.stage !== 'shipping' || o.shipStage === 'returned') return false;
  const ref = o.shipDispatchedAt || o.shipDate || o.updatedAt;
  if (!ref) return false;
  const d = ref.toDate?.() || new Date(ref);
  if (isNaN(d.getTime())) return false;
  const days = (Date.now() - d.getTime()) / (1000 * 60 * 60 * 24);
  const ss = o.shipStage || 'ready';
  const thr = { ready: 2, wait_delivery: 7, wait_collection: 3, collected: 5 }[ss];
  return thr && days >= thr;
}

function renderSmartBadges(o) {
  const ctx = getCustomerContext(o);
  const out = [];
  if (isCreatedToday(o.createdAt)) out.push('<span class="smart-bdg smart-bdg-today">📅 اليوم</span>');
  if (ctx.isNew) out.push('<span class="smart-bdg smart-bdg-new">🆕 عميل جديد</span>');
  else if (ctx.isLoyal) out.push(`<span class="smart-bdg smart-bdg-loyal">🔁 ${ctx.count} طلبات</span>`);
  if (ctx.multipleActive) out.push(`<span class="smart-bdg smart-bdg-multi">⊞ ${ctx.activeCount} طلب نشط</span>`);
  if (isUrgentOrder(o)) out.push('<span class="smart-bdg smart-bdg-urgent">⚡ عاجل</span>');
  return out.join('');
}

// ── Product images + thumbnails ───────────────────────────────
// المصدر الكامل لصور الأوردر (يطابق archive.html / design.html / reports.html):
//   1. منتجات: p.designImages[] (مصفوفة) أو p.designImageUrl (مفرد)
//   2. أوردر:  o.designImageUrl (تصميم)
//   3. أوردر:  o.finalImageUrl  (صورة المنتج النهائي من مرحلة التنفيذ — الأهم للشحن)
//   ⚠️ printFinalUrl و designFileUrl غالباً PDF/AI — لا نعرضهم كصور (لكن كـ روابط ملفات)

function isImageUrl(url) {
  if (!url) return false;
  const path = String(url).split('?')[0].toLowerCase();
  if (/\.(jpe?g|png|gif|webp|svg|bmp|heic|heif)$/i.test(path)) return true;
  if (/image%2[fF]/.test(url)) return true;
  if (/\.(pdf|ai|eps|psd|indd|cdr|zip)$/i.test(path)) return false;
  return true;  // غير معروف — الـ <img onerror> سيتعامل مع الفشل
}

function getProductImage(p) {
  if (!p) return '';
  if (Array.isArray(p.designImages) && p.designImages.length) {
    const first = p.designImages.find(Boolean);
    if (first) return first;
  }
  return p.designImageUrl || p.imageUrl || '';
}

function getOrderImages(o) {
  const imgs = [];
  // 1. كل منتج وصوره
  (o.products || []).forEach(p => {
    if (Array.isArray(p.designImages)) {
      p.designImages.filter(Boolean).forEach((url, i) => {
        if (isImageUrl(url)) imgs.push({ url, name: `${p.name || 'منتج'}${p.designImages.length > 1 ? ' ' + (i + 1) : ''}` });
      });
    } else if (p.designImageUrl && isImageUrl(p.designImageUrl)) {
      imgs.push({ url: p.designImageUrl, name: p.name || 'منتج' });
    }
  });
  // 2. صورة التصميم على الأوردر (fallback لو لا توجد صور منتجات)
  if (!imgs.length && o.designImageUrl && isImageUrl(o.designImageUrl)) {
    imgs.push({ url: o.designImageUrl, name: 'التصميم' });
  }
  // 3. صورة المنتج النهائي (من مرحلة التنفيذ) — مهمة جداً للشحن
  if (o.finalImageUrl && isImageUrl(o.finalImageUrl) && !imgs.some(i => i.url === o.finalImageUrl)) {
    imgs.push({ url: o.finalImageUrl, name: '📸 الصورة النهائية' });
  }
  return imgs;
}

// روابط الملفات (PDF/AI) المرتبطة بالأوردر — تُعرَض كأزرار تحميل
function getOrderFiles(o) {
  const files = [];
  if (o.printFinalUrl) files.push({ url: o.printFinalUrl, name: '📄 ملف الطباعة' });
  if (o.designFileUrl && o.designFileUrl !== o.printFinalUrl) {
    files.push({ url: o.designFileUrl, name: '🎨 ملف التصميم' });
  }
  (o.designFiles || []).forEach((f, i) => {
    if (f && f.url && !files.some(x => x.url === f.url)) {
      files.push({ url: f.url, name: f.name || `ملف ${i + 1}` });
    }
  });
  return files;
}

// ── Phone / WhatsApp helpers ──────────────────────────────────
function cleanPhone(p) {
  if (!p) return '';
  let s = String(p).replace(/[^\d+]/g, '');
  // Egypt: 01xxxxxxxxx → +2 prefix for wa.me
  if (s.startsWith('01') && s.length === 11) s = '2' + s;
  else if (s.startsWith('+')) s = s.slice(1);
  return s;
}

  const total = Math.max(0, sale + cust - disc);
  const rem = Math.max(0, total - paid);
  const collected = parseFloat(o.shipCollected) || 0;
  const shipCost = parseFloat(o.shippingCost) || 0;
  const expectedFromCompany = Math.max(0, collected - shipCost);

  const imgs = getOrderImages(o);
  const products = (o.products && o.products.length ? o.products : []);
  const tl = (o.timeline || []).slice(-6).reverse();
  const canSeePhone = canSee('client_phone', AppState.userPerms, myRole);
  const rawPhone = o.clientPhone || '';
  const waPhone = cleanPhone(rawPhone);
  const noteText = (o.shipCollectNote || o.notes || o.csNote || '').trim();
  const addr = getDeliveryAddress(o);

  return `
    <tr class="row-detail" data-detail-of="${o._id}">
      <td colspan="7">
        <div class="row-detail-inner">

          <!-- ── المنتجات والصور ── -->
          <div class="detail-block">
            <h4>🛒 المنتجات (${products.length || 0})</h4>
            ${products.length
              ? `<ul class="prod-list">${products.map(p => {
                  const img = getProductImage(p);
                  const safeImg = escAttr(img);
                  return `<li class="prod-item">
                    ${img
                      ? `<img class="prod-thumb" src="${safeImg}" alt="${escAttr(p.name || '')}" loading="lazy" onclick="openLightbox('${safeImg}')" onerror="this.outerHTML='<div class=&quot;prod-thumb-empty&quot;>🖼️</div>'">`
                      : `<div class="prod-thumb-empty">🖼️</div>`}
                    <div class="prod-info">
                      <div class="prod-name">${escAttr(p.name || '—')}</div>
                      <div class="prod-meta">${p.qty ? `الكمية: ${p.qty}` : ''}${p.salePrice ? ` · ${fmtMoney(p.salePrice)} ج` : ''}</div>
                    </div>
                  </li>`;
                }).join('')}</ul>`
              : `<div style="color:var(--dim2);font-size:var(--fs-base);padding:6px 0">لا توجد منتجات مسجَّلة</div>`}
            ${imgs.length === 0 && products.length > 0 ? `<div style="color:var(--y);font-size:var(--fs-sm);margin-top:8px;padding:6px 8px;background:rgba(255,170,0,.08);border-radius:6px">⚠️ لا توجد صور مرفوعة — راجع الأوردر في مرحلة التصميم/التنفيذ</div>` : ''}

            ${o.finalImageUrl && isImageUrl(o.finalImageUrl) ? `
              <div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)">
                <div style="font-size:10.5px;color:var(--dim2);font-weight:800;margin-bottom:6px">📸 الصورة النهائية (من التنفيذ)</div>
                <img src="${escAttr(o.finalImageUrl)}" loading="lazy" onclick="openLightbox('${escAttr(o.finalImageUrl)}')" onerror="this.style.display='none'" style="width:100%;max-height:160px;object-fit:contain;background:var(--bg3);border:1px solid var(--line);border-radius:8px;cursor:zoom-in">
              </div>
            ` : ''}

            ${(function(){
              const files = getOrderFiles(o);
              return files.length
                ? `<div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);display:flex;flex-wrap:wrap;gap:6px">${files.map(f => `<a href="${escAttr(f.url)}" target="_blank" class="qa-chip">${escAttr(f.name)}</a>`).join('')}</div>`
                : '';
            })()}
          </div>

          <!-- ── المالية التفصيلية ── -->
          <div class="detail-block">
            <h4>💰 التفاصيل المالية</h4>
            <div class="dline"><span>سعر البيع</span><span>${fmtMoney(sale)} ج</span></div>
            ${cust > 0 ? `<div class="dline"><span>شحن العميل</span><span>+${fmtMoney(cust)} ج</span></div>` : ''}
            ${disc > 0 ? `<div class="dline"><span>الخصم</span><span class="money-neg">-${fmtMoney(disc)} ج</span></div>` : ''}
            <div class="dline" style="border-top:1px dashed var(--line);margin-top:4px;padding-top:6px"><span>الإجمالي</span><span>${fmtMoney(total)} ج</span></div>
            <div class="dline"><span>المدفوع</span><span class="money-pos">${fmtMoney(paid)} ج</span></div>
            <div class="dline"><span>المتبقي</span><span class="${rem > 0 ? 'money-neg' : 'money-pos'}">${fmtMoney(rem)} ج</span></div>
            ${o.shipMethod === 'company' && collected > 0 ? `
              <div class="dline" style="border-top:1px dashed var(--line);margin-top:6px;padding-top:6px"><span>محصَّل عبر الشركة</span><span>${fmtMoney(collected)} ج</span></div>
              ${shipCost > 0 ? `<div class="dline"><span>تكلفة الشحن</span><span class="money-neg">-${fmtMoney(shipCost)} ج</span></div>` : ''}
              <div class="dline"><span>المستحق من الشركة</span><span class="money-pos">${fmtMoney(expectedFromCompany)} ج</span></div>
            ` : ''}
            ${o.shipSettled ? `<div class="dline" style="color:var(--g);font-weight:800;margin-top:4px"><span>✓ تمت التسوية</span><span>${fmtMoney(o.shipSettledAmount || 0)} ج</span></div>` : ''}
          </div>

          <!-- ── timeline الشحن ── -->
          <div class="detail-block">
            <h4>📜 آخر الأحداث</h4>
            ${tl.length
              ? `<ul class="tl-list">${tl.map(t => `
                  <li class="tl-item">
                    <span class="tl-date">${escAttr(t.date || '')}</span>
                    <span class="tl-action">${escAttr(t.action || '')}${t.by ? ` <span style="color:var(--dim2);font-size:10.5px">— ${escAttr(t.by)}</span>` : ''}</span>
                  </li>`).join('')}</ul>`
              : `<div style="color:var(--dim2);font-size:var(--fs-base);padding:6px 0">لا يوجد سجل</div>`}
            ${noteText ? `<div style="margin-top:10px;padding:8px 10px;background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.2);border-radius:8px;font-size:11.5px;line-height:1.5"><strong style="color:var(--y)">📝 ملاحظة:</strong> ${escAttr(noteText)}</div>` : ''}
          </div>

        </div>

        <!-- ── أزرار الإجراءات السريعة ── -->
        <div style="padding:0 18px 16px;display:flex;gap:7px;flex-wrap:wrap;align-items:center">
          ${canSeePhone && waPhone ? `<a href="https://wa.me/${waPhone}" target="_blank" class="qa-chip qa-chip-wa">💬 واتساب</a>` : ''}
          ${canSeePhone && rawPhone ? `<a href="tel:${escAttr(rawPhone)}" class="qa-chip qa-chip-call">📞 اتصال</a>` : ''}
          <a href="waybill.html?id=${escAttr(o._id)}" target="_blank" class="qa-chip">🧾 طباعة بوليصة</a>
          ${addr.full ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr.full + ' Egypt')}" target="_blank" class="qa-chip">🗺️ خريطة</a>` : ''}

          <span style="color:var(--dim2);font-size:10.5px">طلب رقم: ${escAttr(o._id)}</span>

      </td>
    </tr>`;
}

function shipMethodLabel(m) {
  // PR-4: source of truth now in orders.js (getShipMethodLabel).
  // Legacy 'internal' alias preserved for older orders.
  if (m === 'internal') m = 'courier';
  const lbl = getShipMethodLabel({ shipMethod: m });
  return lbl.raw ? `${lbl.ico} ${lbl.text}` : '—';
}

function fmtTimestamp(ts) {
  if (!ts) return '—';
  const d = ts.toDate?.() || (typeof ts === 'string' ? new Date(ts) : ts);
  if (!(d instanceof Date) || isNaN(d.getTime())) return '—';
  return d.toLocaleDateString('ar-EG');
}

function rowActions(o, tab) {
  const actions = [];
  const id = o._id;
  switch (tab) {
    case 'ready':
      actions.push(`<button class="btn btn-sm btn-g" onclick="openDispatch('${id}')">🚚 تسليم</button>`);
      actions.push(`<button class="btn btn-sm btn-ghost" onclick="quickPickup('${id}')">🏬 استلام محلي</button>`);
      break;
    case 'transit':
      actions.push(`<button class="btn btn-sm btn-b" onclick="markDelivered('${id}')">✅ تم التسليم</button>`);
      actions.push(`<button class="btn btn-sm btn-ghost" onclick="openReturn('${id}')">↩️ مرتجع</button>`);
      break;
    case 'collect':
      actions.push(`<button class="btn btn-sm btn-g" onclick="openCollect('${id}')">💰 تحصيل</button>`);
      actions.push(`<button class="btn btn-sm btn-ghost" onclick="openReturn('${id}')">↩️ مرتجع</button>`);
      break;
    case 'settle':
      actions.push(`<button class="btn btn-sm btn-g" onclick="openSettleSingle('${id}')">📋 تسوية</button>`);
      break;
    case 'returns':
      actions.push(`<span class="cell-sub">${o.returnReasonLabel || o.returnReason || '—'}</span>`);
      break;
  }
  return `<div class="row-actions">${actions.join('')}</div>`;
}

            <th>الشركة</th>
            <th>الحالة</th>

function renderDelayRow(d) {
  const o = d.order;
  const id = o._id;
  const num = o.orderNumber || id.slice(0, 6);
  const cls = d.severity === 'critical' ? 'row-delay-critical' : 'row-delay-warning';
  const phone = canSee('client_phone', AppState.userPerms, myRole)
    ? (o.clientPhone || '')
    : maskPhone(o.clientPhone, myRole);

  const suggestedAction = ({
    ready: `<button class="btn btn-sm btn-g" onclick="openDispatch('${id}')">🚚 سلّم الآن</button>`,
    wait_delivery: `<button class="btn btn-sm btn-b" onclick="markDelivered('${id}')">✅ سُلِّم</button> <button class="btn btn-sm btn-ghost" onclick="openReturn('${id}')">↩️</button>`,
    wait_collection: `<button class="btn btn-sm btn-g" onclick="openCollect('${id}')">💰 حصِّل</button>`,
    collected: `<button class="btn btn-sm btn-g" onclick="openSettleSingle('${id}')">📋 سوِّ</button>`,
  })[d.shipStage] || '—';

  const addr = getDeliveryAddress(o);

  return `
    <tr class="${cls}">
      <td>
        <div>
          <span class="cell-order">#${num}</span>
          ${o.shipDispatchedAt ? `<span class="cell-sub" style="display:inline-block;margin-inline-start:6px">· سُلِّم ${fmtTimestamp(o.shipDispatchedAt)}</span>` : ''}
        </div>
      </td>
      <td>
        <span class="m-lbl">العميل</span>
        <div class="cell-name">${o.clientName || '—'}</div>
        <div class="cell-sub">${phone}</div>
        ${addr.gov ? `<div class="cell-sub" style="margin-top:3px;white-space:normal;line-height:1.4">📍 ${escAttr(addr.gov)}${addr.addr ? ' — ' + escAttr(addr.addr) : ''}</div>` : ''}
      </td>
      <td>
        <span class="m-lbl">الشركة</span>
        ${o.shipCompanyName || shipMethodLabel(o.shipMethod)}
      </td>
      <td>
        <span class="m-lbl">الحالة</span>
        ${shipStageBadgeHTML(o.shipStage)}
      </td>
      <td>
        <span class="m-lbl">التأخر</span>
        <div class="cell-money ${d.severity === 'critical' ? 'money-neg' : ''}">${d.days} يوم</div>
        <div class="cell-sub">حد: ${d.threshold} يوم · تأخر: +${d.overdue}</div>
      </td>
      <td>${suggestedAction}</td>
    </tr>`;
}

window.filterByCompany = (id) => {
  $('f-company').value = id;
  switchTab('settle');
};

window.openSettleByCompany = (cid) => {
  const list = getOrdersPendingSettlement(orders).filter(o => o.shipCompanyId === cid);
  if (!list.length) { toast('لا توجد طلبات للتسوية', 'err'); return; }
  pendingOrders = list;
  pendingOrder = null;
  const company = shippers.find(s => s._id === cid);
  const sumCollected = list.reduce((s, o) => s + (parseFloat(o.shipCollected) || 0), 0);
  const sumCost = list.reduce((s, o) => s + (parseFloat(o.shippingCost) || 0), 0);
  const expected = Math.max(0, sumCollected - sumCost);
  $('m-settle-info').innerHTML = `
    <div class="modal-info-row"><span>الشركة</span><span>${company?.name || '—'}</span></div>
    <div class="modal-info-row"><span>عدد الشحنات</span><span>${list.length}</span></div>
    <div class="modal-info-row"><span>إجمالي المُحصَّل</span><span>${fmtMoney(sumCollected)} ج</span></div>
    <div class="modal-info-row"><span>إجمالي التكلفة</span><span>${fmtMoney(sumCost)} ج</span></div>
    <div class="modal-info-row" style="border-top:1px dashed var(--line);margin-top:6px;padding-top:6px;color:var(--g)"><span>المستحق</span><span>${fmtMoney(expected)} ج</span></div>
  `;
  $('m-settle-amount').value = expected;
  $('m-settle-wallet').value = '';
  $('m-settle-note').value = '';
  $('m-settle-diff-reason').value = '';
  updateSettleCalc();
  openMod('m-settle');
};

window.openDispatch = (orderId) => {
  const o = orders.find(x => x._id === orderId);
  if (!o) return;
  pendingOrder = o;
  $('m-dispatch-info').innerHTML = `
    <div class="modal-info-row"><span>الطلب</span><span>#${o.orderNumber || o._id.slice(0, 6)}</span></div>
    <div class="modal-info-row"><span>العميل</span><span>${o.clientName || '—'}</span></div>
    ${(function(){
      const a = getDeliveryAddress(o);
      return a.gov
        ? `<div class="modal-info-row" style="align-items:flex-start"><span>📍 العنوان</span><span style="text-align:left;max-width:65%;line-height:1.5">${escAttr(a.gov)}${a.addr ? '<br><span style="color:var(--dim2);font-weight:600;font-size:11.5px">' + escAttr(a.addr) + '</span>' : ''}</span></div>`
        : `<div class="modal-info-row"><span>📍 العنوان</span><span style="color:var(--y)">— لا يوجد عنوان مُسجَّل —</span></div>`;
    })()}
  `;
  $('m-dispatch-method').value = 'company';
  $('m-dispatch-company').value = '';
  $('m-dispatch-cost').value = '';
  $('m-dispatch-wallet').value = '';
  $('m-dispatch-note').value = '';
  onDispatchMethodChange();
  openMod('m-dispatch');
};

window.onDispatchMethodChange = () => {
  const m = $('m-dispatch-method').value;
  $('m-dispatch-company-row').style.display = m === 'pickup' ? 'none' : '';
  $('m-dispatch-cost-row').style.display = m === 'pickup' ? 'none' : '';
  $('m-dispatch-wallet-row').style.display = m === 'pickup' ? 'none' : '';
  updateDispatchCalc();
};

window.updateDispatchCalc = () => {
  const m = $('m-dispatch-method').value;
  const cost = parseFloat($('m-dispatch-cost').value) || 0;
  const walletId = $('m-dispatch-wallet').value;
  const panel = $('m-dispatch-calc-panel');
  const content = $('m-dispatch-calc-content');

  if (m === 'pickup' || cost <= 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';
  const wallet = wallets.find(w => w._id === walletId);
  const wb = parseFloat(wallet?.balance) || 0;
  const newBalance = wb - cost;
  const insufficient = walletId && newBalance < 0;
  content.innerHTML = `
    <div class="calc-row"><span>تكلفة الشحن</span><span class="money-neg">-${fmtMoney(cost)} ج</span></div>
    ${walletId ? `
      <div class="calc-row"><span>رصيد المحفظة قبل</span><span>${fmtMoney(wb)} ج</span></div>
      <div class="calc-sep"></div>
      <div class="calc-row"><span>الرصيد بعد</span><span class="${newBalance >= 0 ? 'money-pos' : 'money-neg'}">${fmtMoney(newBalance)} ج</span></div>
      ${insufficient ? '<div class="calc-result err">⚠️ رصيد المحفظة غير كافٍ!</div>' : '<div class="calc-result ok">✅ التكلفة تُسجَّل في المحفظة كمصروف</div>'}
    ` : '<div class="calc-result warn">⚠️ بدون محفظة — التكلفة لن تُسجَّل كمصروف الآن</div>'}
  `;
};

window.confirmDispatch = async () => {
  if (!pendingOrder) return;
  const method = $('m-dispatch-method').value;
  const companyId = $('m-dispatch-company').value;
  const cost = parseFloat($('m-dispatch-cost').value) || 0;
  const walletId = $('m-dispatch-wallet').value;
  const note = $('m-dispatch-note').value.trim();
  const company = shippers.find(s => s._id === companyId);
  const wallet = wallets.find(w => w._id === walletId);

  const btn = $('btn-dispatch-confirm');
  btn.disabled = true; btn.textContent = '⏳ جارٍ...';

  const result = await shippingActions.confirmShipped({
    db, orderId: pendingOrder._id,
    companyId, companyName: company?.name || '',
    method, cost, walletId, walletName: wallet?.name || '',
    note, role: myRole, userId: me.uid, userName: myUserName,
  });

  btn.disabled = false; btn.textContent = '✅ تسليم';
  if (!result.ok) { toast(result.errors[0] || 'فشل التسليم', 'err'); return; }
  toast('✅ تم تسليم الطلب');
  closeMod('m-dispatch');
  pendingOrder = null;
};

window.quickPickup = async (orderId) => {
  const o = orders.find(x => x._id === orderId);
  if (!o) return;
  if (!confirm(`🏬 تسجيل #${o.orderNumber || o._id.slice(0, 6)} كـ "استلام من المطبعة"؟\n\nبدون شركة شحن وبدون تكلفة.`)) return;
  const result = await shippingActions.quickPickupDispatch({
    db, orderId, role: myRole, userId: me.uid, userName: myUserName,
  });
  if (!result.ok) { toast(result.errors[0] || 'فشل التسجيل', 'err'); return; }
  toast('✅ جاهز للاستلام من المطبعة');
};

window.markDelivered = async (orderId) => {
  if (!confirm('✅ تأكيد التسليم للعميل؟')) return;
  const result = await shippingActions.confirmDelivered({
    db, orderId, role: myRole, userId: me.uid, userName: myUserName,
  });
  if (!result.ok) { toast(result.errors[0] || 'فشل', 'err'); return; }
  toast('✅ تم تسجيل التسليم');
};

// ══════════════════════════════════════════
// COLLECT
// ══════════════════════════════════════════
window.openCollect = (orderId) => {
  const o = orders.find(x => x._id === orderId);
  if (!o) return;
  pendingOrder = o;
  const sale = parseFloat(o.salePrice) || 0;
  const cust = parseFloat(o.customerShipFee) || 0;
  const disc = parseFloat(o.discount) || 0;
  const paid = parseFloat(o.totalPaid) || 0;
  const remaining = Math.max(0, sale + cust - disc - paid);
  const walletMode = o.shipMethod === 'pickup' || o.shipMethod === 'courier' || o.shipMethod === 'internal';

  $('m-collect-info').innerHTML = `
    <div class="modal-info-row"><span>الطلب</span><span>#${o.orderNumber || o._id.slice(0, 6)}</span></div>
    <div class="modal-info-row"><span>العميل</span><span>${o.clientName || '—'}</span></div>
    <div class="modal-info-row"><span>الشركة</span><span>${o.shipCompanyName || shipMethodLabel(o.shipMethod)}</span></div>
    <div class="modal-info-row"><span>المتبقي للعميل</span><span class="money-neg">${fmtMoney(remaining)} ج</span></div>
    ${walletMode
      ? `<div class="modal-info-row" style="color:var(--g)"><span>الوضع</span><span>💵 تحصيل مباشر — يدخل المحفظة فوراً</span></div>`
      : `<div class="modal-info-row" style="color:var(--c)"><span>الوضع</span><span>📦 تأكيد تحصيل عبر الشركة — يُسوَّى لاحقاً</span></div>`}
  `;
  $('m-collect-amount').value = remaining;
  $('m-collect-note').value = '';
  $('m-collect-wallet-row').style.display = walletMode ? '' : 'none';
  $('m-collect-wallet').value = '';
  updateCollectCalc();
  openMod('m-collect');
};

window.updateCollectCalc = () => {
  const o = pendingOrder;
  if (!o) return;
  const amt = parseFloat($('m-collect-amount').value) || 0;
  const sale = parseFloat(o.salePrice) || 0;
  const cust = parseFloat(o.customerShipFee) || 0;
  const disc = parseFloat(o.discount) || 0;
  const paid = parseFloat(o.totalPaid) || 0;
  const total = Math.max(0, sale + cust - disc);
  const remaining = Math.max(0, total - paid);
  const newRem = Math.max(0, remaining - amt);
  const content = $('m-collect-calc-content');
  $('m-collect-calc-panel').style.display = 'block';
  content.innerHTML = `
    <div class="calc-row"><span>إجمالي الطلب</span><span>${fmtMoney(total)} ج</span></div>
    <div class="calc-row"><span>المدفوع سابقاً</span><span>${fmtMoney(paid)} ج</span></div>
    <div class="calc-row"><span>المتبقي قبل التحصيل</span><span class="money-neg">${fmtMoney(remaining)} ج</span></div>
    <div class="calc-sep"></div>
    <div class="calc-row"><span>المُحصَّل الآن</span><span class="money-pos">+${fmtMoney(amt)} ج</span></div>
    <div class="calc-row"><span>المتبقي بعد</span><span class="${newRem <= 0 ? 'money-pos' : 'money-neg'}">${fmtMoney(newRem)} ج</span></div>
    ${newRem <= 0 && amt > 0 ? '<div class="calc-result ok">✅ الطلب سيُحصَّل بالكامل</div>' : amt > remaining ? '<div class="calc-result warn">⚠️ المبلغ أكبر من المتبقي</div>' : ''}
  `;
};

window.confirmCollect = async () => {
  if (!pendingOrder) return;
  const o = pendingOrder;
  const amount = parseFloat($('m-collect-amount').value) || 0;
  const note = $('m-collect-note').value.trim();
  const walletMode = o.shipMethod === 'pickup' || o.shipMethod === 'courier' || o.shipMethod === 'internal';
  const btn = $('btn-collect-confirm');
  btn.disabled = true; btn.textContent = '⏳ جارٍ...';

  let result;
  if (walletMode) {
    const walletId = $('m-collect-wallet').value;
    const wallet = wallets.find(w => w._id === walletId);
    if (!walletId) { toast('اختر المحفظة', 'err'); btn.disabled = false; btn.textContent = '✅ تأكيد التحصيل'; return; }
    result = await shippingActions.collectFromCustomer({
      db, orderId: o._id, amount, walletId, walletName: wallet?.name || '',
      note, role: myRole, userId: me.uid, userName: myUserName,
    });
  } else {
    result = await shippingActions.markUnderCollection({
      db, orderId: o._id, amount, note,
      role: myRole, userId: me.uid, userName: myUserName,
      bypassWarnings: false,
    });
    if (result.needsConfirmation && result.warnings?.length) {
      if (confirm(result.warnings.join('\n\n') + '\n\nالمتابعة؟')) {
        result = await shippingActions.markUnderCollection({
          db, orderId: o._id, amount, note,
          role: myRole, userId: me.uid, userName: myUserName,
          bypassWarnings: true,
        });
      } else {
        btn.disabled = false; btn.textContent = '✅ تأكيد التحصيل';
        return;
      }
    }
  }

  btn.disabled = false; btn.textContent = '✅ تأكيد التحصيل';
  if (!result.ok) { toast(result.errors[0] || 'فشل التحصيل', 'err'); return; }
  if (walletMode && result.autoCollected) {
    toast(result.archived?.ok ? '✅ تم التحصيل ودخل المحفظة — تم نقل الأوردر للأرشيف' : '✅ تم التحصيل ودخل المحفظة');
  } else if (walletMode) {
    toast('✅ تم التحصيل ودخل المحفظة');
  } else {
    toast('✅ تم تأكيد التحصيل — بانتظار التسوية');
  }
  closeMod('m-collect');
  pendingOrder = null;
};

// ══════════════════════════════════════════
// SETTLE
// ══════════════════════════════════════════
window.openSettleSingle = (orderId) => {
  const o = orders.find(x => x._id === orderId);
  if (!o) return;
  pendingOrders = [o];
  pendingOrder = null;
  const collected = parseFloat(o.shipCollected) || 0;
  const cost = parseFloat(o.shippingCost) || 0;
  const expected = Math.max(0, collected - cost);
  $('m-settle-info').innerHTML = `
    <div class="modal-info-row"><span>الطلب</span><span>#${o.orderNumber || o._id.slice(0, 6)}</span></div>
    <div class="modal-info-row"><span>العميل</span><span>${o.clientName || '—'}</span></div>
    <div class="modal-info-row"><span>الشركة</span><span>${o.shipCompanyName || '—'}</span></div>
    <div class="modal-info-row"><span>المُحصَّل من العميل</span><span>${fmtMoney(collected)} ج</span></div>
    <div class="modal-info-row"><span>تكلفة الشحن</span><span>${fmtMoney(cost)} ج</span></div>
    <div class="modal-info-row" style="border-top:1px dashed var(--line);margin-top:6px;padding-top:6px;color:var(--g)"><span>المستحق لنا</span><span>${fmtMoney(expected)} ج</span></div>
  `;
  $('m-settle-amount').value = expected;
  $('m-settle-wallet').value = '';
  $('m-settle-note').value = '';
  $('m-settle-diff-reason').value = '';
  updateSettleCalc();
  openMod('m-settle');
};

window.updateSettleCalc = () => {
  if (!pendingOrders.length) return;
  const amt = parseFloat($('m-settle-amount').value) || 0;
  const sumCollected = pendingOrders.reduce((s, o) => s + (parseFloat(o.shipCollected) || 0), 0);
  const sumCost = pendingOrders.reduce((s, o) => s + (parseFloat(o.shippingCost) || 0), 0);
  const expected = Math.max(0, sumCollected - sumCost);
  const diff = amt - expected;
  const hasDiff = Math.abs(diff) > 0.01;
  const content = $('m-settle-calc-content');
  content.innerHTML = `
    <div class="calc-row"><span>إجمالي محصَّل من العملاء</span><span>${fmtMoney(sumCollected)} ج</span></div>
    <div class="calc-row"><span>إجمالي تكلفة الشحن</span><span class="money-neg">-${fmtMoney(sumCost)} ج</span></div>
    <div class="calc-sep"></div>
    <div class="calc-row"><span>المستحق المتوقع</span><span>${fmtMoney(expected)} ج</span></div>
    <div class="calc-row"><span>المبلغ الفعلي</span><span class="money-pos">${fmtMoney(amt)} ج</span></div>
    ${hasDiff ? `<div class="calc-result warn">⚠️ فرق: ${diff > 0 ? '+' : ''}${fmtMoney(diff)} ج — حدد السبب</div>` : '<div class="calc-result ok">✅ المبلغ يطابق المتوقع</div>'}
  `;
  $('m-settle-diff-row').style.display = hasDiff ? '' : 'none';
};

window.confirmSettle = async () => {
  if (!pendingOrders.length) return;
  const amount = parseFloat($('m-settle-amount').value) || 0;
  const walletId = $('m-settle-wallet').value;
  const wallet = wallets.find(w => w._id === walletId);
  const diffReason = $('m-settle-diff-reason').value;
  const note = $('m-settle-note').value.trim();
  const companyName = pendingOrders[0]?.shipCompanyName || '';

  const DIFF_LABELS = { weight: 'فرق وزن', city: 'فرق مدينة', undelivered: 'شحنة لم تُسلَّم', discount: 'خصم/عمولة', other: 'أخرى' };

  const btn = $('btn-settle-confirm');
  btn.disabled = true; btn.textContent = '⏳ جارٍ...';

  let result = await shippingActions.settleFromCompany({
    db, orderIds: pendingOrders.map(o => o._id),
    amount, walletId, walletName: wallet?.name || '',
    companyName,
    diffReason, diffReasonLabel: DIFF_LABELS[diffReason] || '',
    diffNote: note, note,
    role: myRole, userId: me.uid, userName: myUserName,
    bypassWarnings: false,
  });

  if (result.needsConfirmation && result.warnings?.length) {
    if (confirm(result.warnings.join('\n\n') + '\n\nالمتابعة؟')) {
      result = await shippingActions.settleFromCompany({
        db, orderIds: pendingOrders.map(o => o._id),
        amount, walletId, walletName: wallet?.name || '',
        companyName,
        diffReason, diffReasonLabel: DIFF_LABELS[diffReason] || '',
        diffNote: note, note,
        role: myRole, userId: me.uid, userName: myUserName,
        bypassWarnings: true,
      });
    } else {
      btn.disabled = false; btn.textContent = '✅ تأكيد التسوية';
      return;
    }
  }

  btn.disabled = false; btn.textContent = '✅ تأكيد التسوية';
  if (!result.ok) { toast(result.errors[0] || 'فشل التسوية', 'err'); return; }
  const archivedCount = (result.archived || []).filter(a => a.ok).length;
  toast(`✅ تمت التسوية — ${pendingOrders.length} طلب${archivedCount ? ` · نُقلوا للأرشيف` : ''}`);
  closeMod('m-settle');
  pendingOrders = [];
};

// ══════════════════════════════════════════
// RETURN
// ══════════════════════════════════════════
window.openReturn = (orderId) => {
  const o = orders.find(x => x._id === orderId);
  if (!o) return;
  pendingOrder = o;
  $('m-return-info').innerHTML = `
    <div class="modal-info-row"><span>الطلب</span><span>#${o.orderNumber || o._id.slice(0, 6)}</span></div>
    <div class="modal-info-row"><span>العميل</span><span>${o.clientName || '—'}</span></div>
    <div class="modal-info-row"><span>الشركة</span><span>${o.shipCompanyName || '—'}</span></div>
  `;
  $('m-return-reason').value = '';
  $('m-return-party').value = '';
  $('m-return-cost').value = '';
  $('m-return-wallet').value = '';
  $('m-return-note').value = '';
  openMod('m-return');
};

window.confirmReturn = async () => {
  if (!pendingOrder) return;
  const reason = $('m-return-reason').value;
  const party = $('m-return-party').value;
  const cost = parseFloat($('m-return-cost').value) || 0;
  const walletId = $('m-return-wallet').value;
  const wallet = wallets.find(w => w._id === walletId);
  const note = $('m-return-note').value.trim();

  const btn = $('btn-return-confirm');
  btn.disabled = true; btn.textContent = '⏳ جارٍ...';

  const result = await shippingActions.markFullReturn({
    db, orderId: pendingOrder._id,
    reason, lossParty: party, cost, note,
    walletId, walletName: wallet?.name || '',
    role: myRole, userId: me.uid, userName: myUserName,
  });

  btn.disabled = false; btn.textContent = '✅ تسجيل المرتجع';
  if (!result.ok) { toast(result.errors[0] || 'فشل', 'err'); return; }
  toast('✅ تم تسجيل المرتجع');
  closeMod('m-return');
  pendingOrder = null;
};

// ══════════════════════════════════════════
// MODAL CLOSE — click backdrop / ESC
// ══════════════════════════════════════════
document.querySelectorAll('.modal').forEach(m => {
  m.addEventListener('click', e => {
    if (e.target === m) m.classList.remove('on');
  });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal.on').forEach(m => m.classList.remove('on'));
  }
});

// Expose for debugging
window.__shippingDebug = { orders, shippers, wallets, shippingActions };

</script>
</body>
</html>
