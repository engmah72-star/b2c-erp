<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>B2C Test</title>
<style>body{font-family:Arial;padding:20px;background:#0d0f1c;color:#fff;direction:rtl}</style>
</head>
<body>
<h2>🧪 Test Page</h2>
<div id="status">جاري الاتصال...</div>
<div id="orders" style="margin-top:20px"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",
  authDomain:"business2card-c041b.firebaseapp.com",
  projectId:"business2card-c041b",
  storageBucket:"business2card-c041b.firebasestorage.app",
  messagingSenderId:"235622448899",
  appId:"1:235622448899:web:d8652ff71082f7d003f336"
});

const auth = getAuth(app);
const db = getFirestore(app);

const status = document.getElementById('status');
const ordersDiv = document.getElementById('orders');

onAuthStateChanged(auth, async user => {
  if (!user) {
    status.innerHTML = '❌ غير مسجل دخول — <a href="login.html" style="color:cyan">اضغط هنا</a>';
    return;
  }
  
  status.innerHTML = '✅ مسجل دخول: ' + user.email;
  
  try {
    const snap = await getDocs(collection(db, 'orders'));
    ordersDiv.innerHTML = '<h3>✅ الأوردرات: ' + snap.size + '</h3>' + 
      snap.docs.slice(0,5).map(d => '<div style="background:#1a1d2e;padding:10px;margin:5px;border-radius:8px">' + 
        (d.data().clientName || 'بدون اسم') + ' — ' + (d.data().stage || '?') + 
      '</div>').join('');
  } catch(e) {
    ordersDiv.innerHTML = '<div style="color:red">❌ خطأ: ' + e.message + '</div>';
  }
});
</script>
</body>
</html>
