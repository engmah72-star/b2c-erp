<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3b9eff">
<title>متابعة الشحن — Business2Card</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.fl-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px}
.fl-kpi{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center;cursor:pointer;transition:.15s;border-top:3px solid var(--c)}
.fl-kpi:hover{transform:translateY(-2px)}
.fl-kpi.on{background:rgba(59,158,255,.06);border-color:var(--b)}
.fl-kpi-val{font-size:20px;font-weight:900}
.fl-kpi-lbl{font-size:9px;color:var(--dim2);font-weight:700;margin-top:3px;line-height:1.3}
.fl-bar{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
.fl-bar input,.fl-bar select{padding:8px 10px;background:var(--bg3);border:1px solid var(--line);border-radius:8px;color:var(--snow);font-family:inherit;font-size:12px;font-weight:600}
.fl-card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.fl-card-info{min-width:0}
.fl-card-title{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px}
.fl-card-meta{font-size:11px;color:var(--dim2);line-height:1.5}
.fl-card-status{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.st-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800;border:1px solid}
.st-deliv-wait{background:rgba(34,211,238,.08);color:var(--c);border-color:rgba(34,211,238,.3)}
.st-deliv-done{background:rgba(0,217,126,.08);color:var(--g);border-color:rgba(0,217,126,.3)}
.st-deliv-not{background:rgba(255,170,0,.08);color:var(--y);border-color:rgba(255,170,0,.3)}
.st-coll-pend{background:rgba(255,61,110,.08);color:var(--r);border-color:rgba(255,61,110,.3)}
.st-coll-part{background:rgba(255,170,0,.08);color:var(--y);border-color:rgba(255,170,0,.3)}
.st-coll-paid{background:rgba(0,217,126,.08);color:var(--g);border-color:rgba(0,217,126,.3)}
.st-closed{background:rgba(167,139,250,.1);color:var(--p);border-color:rgba(167,139,250,.4)}
.st-ret{background:rgba(255,61,110,.12);color:var(--r);border-color:rgba(255,61,110,.4)}
.fl-actions{display:flex;flex-direction:column;gap:5px;flex-shrink:0;align-items:flex-end}
.fl-rem{font-size:14px;font-weight:900;text-align:left;white-space:nowrap}
.fl-act-btns{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.fl-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--line2);background:var(--bg3);color:var(--snow);font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.fl-btn:hover{background:rgba(255,255,255,.05)}
.fl-btn-collect{border-color:rgba(0,217,126,.4);background:rgba(0,217,126,.12);color:var(--g)}
.fl-btn-deliv{border-color:rgba(34,211,238,.4);background:rgba(34,211,238,.12);color:var(--c)}
.fl-btn-wb{border-color:rgba(59,158,255,.4);background:rgba(59,158,255,.08);color:var(--b)}
.fl-btn-edit{border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.1);color:var(--p)}
.fl-btn-ret{border-color:rgba(255,61,110,.4);background:rgba(255,61,110,.08);color:var(--r)}
.fl-empty{padding:60px 20px;text-align:center;color:var(--dim2);background:var(--bg2);border-radius:12px;border:1px dashed var(--line)}
@media(max-width:600px){
  .fl-card{grid-template-columns:1fr}
  .fl-actions{align-items:stretch}
  .fl-act-btns{justify-content:flex-start}
  .fl-rem{text-align:right;font-size:16px}
}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">ERP</div></div></div>
  <div class="nav-scroll" id="nav-scroll-dynamic"></div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">A</div><div><div class="nav-user-name" id="nav-name">User</div><div class="nav-user-role">تسجيل خروج</div></div></div></div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><button class="mob-menu-btn" onclick="toggleNav()">☰</button><div><h1>📋 متابعة الشحن</h1><p id="sub" style="font-size:11px;color:var(--dim2)">جاري التحميل...</p></div></div>
  </div>
  <div class="content">

    <!-- KPI strip -->
    <div class="fl-kpis">
      <div class="fl-kpi" style="border-top-color:var(--b)" onclick="setFilter('all',this)" id="kf-all"><div class="fl-kpi-val" id="k-all" style="color:var(--b)">—</div><div class="fl-kpi-lbl">📦 الكل</div></div>
      <div class="fl-kpi" style="border-top-color:var(--c)" onclick="setFilter('transit',this)"><div class="fl-kpi-val" id="k-transit" style="color:var(--c)">—</div><div class="fl-kpi-lbl">🚚 في الطريق</div></div>
      <div class="fl-kpi" style="border-top-color:var(--g)" onclick="setFilter('delivered',this)"><div class="fl-kpi-val" id="k-deliv" style="color:var(--g)">—</div><div class="fl-kpi-lbl">✅ مُسلَّم</div></div>
      <div class="fl-kpi" style="border-top-color:var(--r)" onclick="setFilter('unpaid',this)"><div class="fl-kpi-val" id="k-unpaid" style="color:var(--r)">—</div><div class="fl-kpi-lbl">⏳ غير محصّل</div></div>
      <div class="fl-kpi" style="border-top-color:var(--p)" onclick="setFilter('ready',this)"><div class="fl-kpi-val" id="k-ready" style="color:var(--p)">—</div><div class="fl-kpi-lbl">🟢 جاهز للأرشفة</div></div>
      <div class="fl-kpi" style="border-top-color:var(--y)" onclick="setFilter('late',this)"><div class="fl-kpi-val" id="k-late" style="color:var(--y)">—</div><div class="fl-kpi-lbl">⚠️ متأخر</div></div>
    </div>

    <!-- Filters -->
    <div class="fl-bar">
      <input id="f-q" placeholder="🔍 بحث (اسم/تليفون/أوردر)..." oninput="render()">
      <select id="f-co" onchange="render()"><option value="">كل الشركات</option></select>
      <select id="f-method" onchange="render()">
        <option value="">كل الطرق</option>
        <option value="pickup">🏠 استلام بالمحل</option>
        <option value="courier">🏍️ مندوب</option>
        <option value="company">📦 شركة شحن</option>
      </select>
    </div>

    <!-- Orders list -->
    <div id="orders-list"><div class="fl-empty">جاري التحميل...</div></div>

  </div>
</div>
</div>

<!-- ══ Collect Modal (re-used from shipping-accounts pattern) ══ -->
<div class="overlay" id="ov-collect-fl">
  <div class="modal" style="max-width:420px">
    <div class="modal-head">
      <span class="modal-title">💰 تحصيل من العميل</span>
      <button class="modal-x" onclick="document.getElementById('ov-collect-fl').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body">
      <div id="cf-summary" style="background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px"></div>
      <div class="fg" style="margin-bottom:10px">
        <label style="font-size:12px;font-weight:800">المبلغ المحصّل (ج) *</label>
        <input class="inp" id="cf-amt" type="number" min="0" placeholder="0" oninput="updateCfPreview()" style="font-size:22px;font-weight:900;text-align:center;padding:14px">
      </div>
      <div id="cf-preview" style="display:none;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:800;text-align:center;margin-bottom:14px"></div>
      <div style="font-size:11px;font-weight:800;color:var(--dim2);margin-bottom:8px">طريقة الدفع *</div>
      <div id="cf-wallets" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px"></div>
      <input type="hidden" id="cf-wid"><input type="hidden" id="cf-wname">
      <div class="fg"><label>رقم التحويل / الإيصال (اختياري)</label><input class="inp" id="cf-ref" placeholder="اختياري"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="document.getElementById('ov-collect-fl').classList.remove('open')">إلغاء</button>
      <button class="btn btn-g" id="btn-save-cf" onclick="saveCollectFl()">✅ تأكيد التحصيل</button>
    </div>
  </div>
</div>

<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div class="toasts" id="toasts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, query, where, onSnapshot, updateDoc, writeBatch, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { addLedgerToBatch, FE, approvalFields } from "./financial-sync-engine.js";

const FB={apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"};
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);

// ── State ──
let orders=[],wallets=[],currentUser=null,userName='',userRole='';
let currentFilter='all', __cfOrderId='';

// ── Helpers ──
const $ = id => document.getElementById(id);
const setText = (id,v) => {const e=$(id);if(e)e.textContent=v;};
const fn = n => (parseFloat(n)||0).toLocaleString('ar-EG');
const sv = (id,v) => {const e=$(id);if(e)e.value=v||'';};
const gv = id => $(id)?.value||'';
const escHtml = s => String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const nowStr=()=>new Date().toLocaleDateString('ar-EG')+' '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
function toast(msg,t=''){const c=$('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3500);}

// Order calculations (canonical)
const calcPaid=o=>parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0;
const calcTotalDue=o=>(parseFloat(o.salePrice)||0)+(parseFloat(o.customerShipFee)||0)-(parseFloat(o.discount)||0);
const calcRem=o=>{
  if(o.paymentStatus==='returned'||o.shipStage==='returned')return 0;
  return Math.max(0,calcTotalDue(o)-calcPaid(o));
};

// Status derivation (two-axis)
function getDeliveryStatus(o){
  const ss=o.shipStage||'ready';
  if(ss==='returned')return{key:'returned',label:'↩️ مرتجع',cls:'st-ret'};
  if(['wait_collection','collected','archived'].includes(ss))return{key:'delivered',label:'✅ مُسلَّم',cls:'st-deliv-done'};
  if(ss==='wait_delivery')return{key:'transit',label:'🚚 في الطريق',cls:'st-deliv-wait'};
  return{key:'not_shipped',label:'⏸ مش متشحن',cls:'st-deliv-not'};
}
function getCollectionStatus(o){
  if(o.paymentStatus==='returned'||o.shipStage==='returned')return{key:'returned',label:'↩️ مرتجع',cls:'st-ret'};
  const paid=calcPaid(o);
  const rem=calcRem(o);
  if(rem<=0.01 && paid>0)return{key:'paid',label:'✅ محصّل بالكامل',cls:'st-coll-paid'};
  if(paid>0)return{key:'partial',label:'🟡 جزئي',cls:'st-coll-part'};
  return{key:'pending',label:'⏳ غير محصّل',cls:'st-coll-pend'};
}
function isReadyToClose(o){
  return getDeliveryStatus(o).key==='delivered' && getCollectionStatus(o).key==='paid' && o.stage!=='archived';
}
function isLate(o){
  if(o.shipStage==='returned'||o.stage==='archived')return false;
  if(getDeliveryStatus(o).key==='delivered' && getCollectionStatus(o).key==='paid')return false;
  const ts=(o.createdAt?.seconds||o.updatedAt?.seconds||0)*1000;
  return ts>0 && (Date.now()-ts) > 5*86400000;
}

window.toggleNav=()=>{document.querySelector('.sidenav')?.classList.toggle('mob-open');$('nav-ov')?.classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav')?.classList.remove('mob-open');$('nav-ov')?.classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);location.href='login.html';};

// ── Sidebar ──
const SBPAGES=[
  {f:'index.html',l:'لوحة التحكم',i:'⬡',admin:true},
  {f:'clients.html',l:'العملاء',i:'👤',p:'clients'},
  {f:'design.html',l:'التصميم',i:'✏️',p:'design'},
  {f:'print.html',l:'الطباعة',i:'🖨️',p:'print'},
  {f:'production.html',l:'التنفيذ',i:'🏭',p:'production'},
  {f:'shipping.html',l:'الشحن',i:'🚚',p:'shipping'},
  {f:'shipping-followup.html',l:'متابعة الشحن',i:'📋',p:'shipping'},
  {f:'shipping-accounts.html',l:'حسابات الشحن',i:'📦',p:'shipping-accounts'},
  {f:'archive.html',l:'الأرشيف',i:'📁',p:'archive'},
  {f:'accounts.html',l:'الحسابات',i:'💰',p:'accounts'},
  {f:'ledger.html',l:'السجل المالي',i:'📊',p:'accounts'},
  {f:'reports.html',l:'التقارير',i:'📊',p:'reports'},
  {f:'employees.html',l:'الموظفين',i:'👥',admin:true},
  {f:'settings.html',l:'الإعدادات',i:'⚙️',admin:true},
];
function buildSidebar(ud){
  const role=ud?.role||'';
  const pages=(ud?.permissions?.pages)||[];
  const isAdm=['admin','operation_manager'].includes(role);
  const nav=$('nav-scroll-dynamic');
  if(!nav)return;
  const cur='shipping-followup.html';
  let h='';
  for(const p of SBPAGES){
    const ok=isAdm||(p.admin?false:pages.includes('*')||pages.includes(p.p||''));
    if(!ok)continue;
    h+=`<a class="nav-link${p.f===cur?' active':''}" href="${p.f}"><span class="nav-ico">${p.i}</span> ${p.l}</a>`;
  }
  nav.innerHTML=h;
}

// ── Auth ──
let _started=false;
onAuthStateChanged(auth,async u=>{
  if(!u){location.href='login.html';return;}
  if(_started)return;_started=true;
  currentUser=u;
  try{
    const userSnap=await getDoc(doc(db,'users',u.uid));
    if(!userSnap.exists()){location.href='login.html';return;}
    const ud=userSnap.data();
    userRole=ud.role||'';
    userName=ud.name||u.email;
    setText('nav-name',userName);
    $('nav-av').textContent=(userName[0]||'A').toUpperCase();
    setText('role-badge',userRole==='admin'?'Admin':userRole==='shipping_officer'?'شحن':userRole);
    buildSidebar(ud);
    // Permission gate
    const perms=ud.permissions||{};
    const pages=perms.pages||[];
    const isAdm=['admin','operation_manager'].includes(userRole);
    const isShipping=userRole==='shipping_officer';
    if(!isAdm && !isShipping && !pages.includes('*') && !pages.includes('shipping')){
      $('orders-list').innerHTML='<div class="fl-empty">⛔ ليس لديك صلاحية على متابعة الشحن</div>';
      return;
    }
    startListeners();
  }catch(e){
    console.error(e);
    toast('❌ '+(e.message||e),'err');
  }
});

function startListeners(){
  onSnapshot(query(collection(db,'orders'),where('stage','==','shipping')),snap=>{
    orders=snap.docs.map(d=>({...d.data(),_id:d.id}))
      .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    fillCompanies();
    updateKpis();
    render();
  },err=>{
    console.error(err);
    $('orders-list').innerHTML='<div class="fl-empty">⛔ '+escHtml(err.message||err)+'</div>';
  });
  onSnapshot(collection(db,'wallets'),snap=>{
    wallets=snap.docs.map(d=>({...d.data(),_id:d.id}));
  });
}

function fillCompanies(){
  const sel=$('f-co');if(!sel)return;
  const cur=sel.value;
  const cos=[...new Set(orders.map(o=>o.shipCompanyName).filter(Boolean))].sort();
  sel.innerHTML='<option value="">كل الشركات</option>'+cos.map(c=>`<option value="${escHtml(c)}">${escHtml(c)}</option>`).join('');
  if(cur)sel.value=cur;
}

function updateKpis(){
  const total=orders.length;
  const transit=orders.filter(o=>getDeliveryStatus(o).key==='transit').length;
  const delivered=orders.filter(o=>getDeliveryStatus(o).key==='delivered').length;
  const unpaid=orders.filter(o=>getCollectionStatus(o).key!=='paid' && o.shipStage!=='returned').length;
  const ready=orders.filter(isReadyToClose).length;
  const late=orders.filter(isLate).length;
  setText('k-all',total);
  setText('k-transit',transit);
  setText('k-deliv',delivered);
  setText('k-unpaid',unpaid);
  setText('k-ready',ready);
  setText('k-late',late);
  setText('sub',total+' أوردر · '+ready+' جاهز للأرشفة · '+late+' متأخر');
}

window.setFilter=function(f,btn){
  currentFilter=f;
  document.querySelectorAll('.fl-kpi').forEach(b=>b.classList.remove('on'));
  btn?.classList.add('on');
  render();
};

function matchFilter(o){
  if(currentFilter==='all')return true;
  if(currentFilter==='transit')return getDeliveryStatus(o).key==='transit';
  if(currentFilter==='delivered')return getDeliveryStatus(o).key==='delivered';
  if(currentFilter==='unpaid')return getCollectionStatus(o).key!=='paid' && o.shipStage!=='returned';
  if(currentFilter==='ready')return isReadyToClose(o);
  if(currentFilter==='late')return isLate(o);
  return true;
}

window.render=function(){
  const q=gv('f-q').toLowerCase().trim();
  const fco=gv('f-co');
  const fm=gv('f-method');
  const data=orders.filter(o=>{
    if(q){
      const hay=((o.clientName||'')+(o.clientPhone||'')+(o.orderId||'')).toLowerCase();
      if(!hay.includes(q))return false;
    }
    if(fco && (o.shipCompanyName||'')!==fco)return false;
    if(fm && (o.shipMethod||'')!==fm)return false;
    return matchFilter(o);
  });
  const el=$('orders-list');if(!el)return;
  if(!data.length){el.innerHTML='<div class="fl-empty">لا توجد أوردرات بهذا الفلتر</div>';return;}
  el.innerHTML=data.map(o=>buildCard(o)).join('');
};

function buildCard(o){
  const dStat=getDeliveryStatus(o);
  const cStat=getCollectionStatus(o);
  const ready=isReadyToClose(o);
  const late=isLate(o);
  const paid=calcPaid(o);
  const totalDue=calcTotalDue(o);
  const rem=calcRem(o);
  const prods=(o.products||[]).map(p=>p.name+(p.qty?'×'+p.qty:'')).join(' · ')||o.product||'—';
  const methodLabel={pickup:'🏠 استلام',courier:'🏍️ مندوب',company:'📦 '+(o.shipCompanyName||'شركة')}[o.shipMethod]||'⏸ غير محدد';
  const canMarkDelivered=(o.shipStage||'ready')==='wait_delivery';
  const isReturned=o.shipStage==='returned';
  return `<div class="fl-card">
    <div class="fl-card-info">
      <div class="fl-card-title">
        ${late?'<span style="font-size:10px;color:var(--r);font-weight:800">⚠️ متأخر</span>':''}
        ${ready?'<span class="st-pill st-closed">🟢 جاهز للأرشفة</span>':''}
        ${escHtml(o.clientName||'—')}
        <span style="font-size:10px;color:var(--dim2)">${escHtml(o.orderId||(o._id||'').slice(-6))}</span>
      </div>
      <div class="fl-card-meta">📞 ${escHtml(o.clientPhone||'—')} · ${escHtml(prods)}</div>
      <div class="fl-card-meta">${methodLabel}${o.shipGov?' · 📍 '+escHtml(o.shipGov):''}</div>
      <div class="fl-card-status">
        <span class="st-pill ${dStat.cls}">${dStat.label}</span>
        <span class="st-pill ${cStat.cls}">${cStat.label}</span>
        ${paid>0?`<span style="font-size:10px;color:var(--g);font-weight:700">محصّل ${fn(paid)} ج</span>`:''}
        ${parseFloat(o.customerShipFee)>0?`<span style="font-size:10px;color:var(--c);font-weight:700">+ شحن ${fn(parseFloat(o.customerShipFee))} ج</span>`:''}
      </div>
    </div>
    <div class="fl-actions">
      <div class="fl-rem" style="color:${rem>0?'var(--r)':'var(--g)'}">
        ${rem>0?fn(rem)+' ج':'✅ صفر'}
        <div style="font-size:9px;color:var(--dim2);font-weight:600">من ${fn(totalDue)} ج</div>
      </div>
      <div class="fl-act-btns">
        ${!isReturned && rem>0?`<button class="fl-btn fl-btn-collect" onclick="openCollectFl('${o._id}')" title="تحصيل من العميل">💰 تحصيل</button>`:''}
        ${!isReturned && canMarkDelivered?`<button class="fl-btn fl-btn-deliv" onclick="markDelivered('${o._id}')" title="تأكيد التسليم — يقدّم الأوردر إلى انتظار التحصيل">✅ تم التسليم</button>`:''}
        <a class="fl-btn fl-btn-wb" href="waybill.html?id=${o._id}" target="_blank">🧾 بوليصة</a>
        <a class="fl-btn fl-btn-edit" href="${o.shipMethod==='company'?'shipping-accounts.html?company='+encodeURIComponent(o.shipCompanyName||''):'shipping.html?orderId='+o._id}" title="فتح الأوردر للتعديل">✏️ فتح</a>
        ${!isReturned?`<a class="fl-btn fl-btn-ret" href="shipping.html?orderId=${o._id}" title="افتح الأوردر لتسجيل مرتجع">↩️ مرتجع</a>`:''}
      </div>
    </div>
  </div>`;
}

// ══ Mark Delivered (advance shipStage from wait_delivery → wait_collection) ══
window.markDelivered=async function(orderId){
  const o=orders.find(x=>x._id===orderId);
  if(!o)return toast('⚠️ الأوردر غير موجود','err');
  if(o.stage==='archived')return toast('⛔ مؤرشف','err');
  if(o.shipStage==='returned')return toast('⛔ مرتجع','err');
  if((o.shipStage||'ready')!=='wait_delivery')return toast('⚠️ الأوردر ليس في حالة "في الطريق"','');
  if(!confirm(`تأكيد تسليم "${o.clientName||'—'}"؟\nالأوردر هينقل لـ "انتظار التحصيل".`))return;
  try{
    await updateDoc(doc(db,'orders',orderId),{
      shipStage:'wait_collection',
      deliveredAt:nowStr(),
      deliveredBy:userName,
      timeline:[...(o.timeline||[]),{date:nowStr(),action:'✅ تم التسليم — انتظار التحصيل',by:userName}],
      updatedAt:serverTimestamp(),
    });
    toast('✅ تم تسجيل التسليم — الأوردر جاهز للتحصيل','ok');
  }catch(e){
    toast('❌ '+(e.message||e),'err');
  }
};

// ══ Collect (atomic batch — same pattern as openCollectAcc) ══
window.openCollectFl=function(orderId){
  const o=orders.find(x=>x._id===orderId);
  if(!o)return toast('⚠️ الأوردر غير موجود','err');
  if(o.stage==='archived')return toast('⛔ مؤرشف','err');
  if(o.shipStage==='returned')return toast('⛔ مرتجع','err');
  const rem=calcRem(o);
  if(rem<=0)return toast('✅ المبلغ محصّل بالكامل','ok');
  __cfOrderId=orderId;
  const sale=parseFloat(o.salePrice)||0;
  const cust=parseFloat(o.customerShipFee)||0;
  const totalDue=calcTotalDue(o);
  const paid=calcPaid(o);
  $('cf-summary').innerHTML=`
    <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="font-weight:700">${escHtml(o.clientName||'—')}</span><span style="font-size:10px;color:var(--dim2)">${escHtml(o.orderId||(o._id||'').slice(-6))}</span></div>
    <div style="line-height:1.9;font-size:11px">
      <div style="display:flex;justify-content:space-between"><span style="color:var(--dim2)">📦 سعر المنتجات</span><span>${fn(sale)} ج</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:var(--dim2)">+ 🚛 رسوم الشحن</span><span style="color:var(--c)">${fn(cust)} ج</span></div>
      ${parseFloat(o.discount)>0?`<div style="display:flex;justify-content:space-between"><span style="color:var(--dim2)">− خصم</span><span style="color:var(--y)">${fn(parseFloat(o.discount))} ج</span></div>`:''}
      <div style="display:flex;justify-content:space-between;border-top:1px dashed var(--line);padding-top:4px;margin-top:3px"><span style="font-weight:800">⚖️ إجمالي على العميل</span><span style="font-weight:900;color:var(--b)">${fn(totalDue)} ج</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:var(--dim2)">− ✅ المحصّل</span><span style="color:var(--g)">${fn(paid)} ج</span></div>
      <div style="display:flex;justify-content:space-between;border-top:1px solid var(--line);padding-top:4px;margin-top:3px"><span style="color:var(--r);font-weight:800">⏳ المتبقي</span><span style="font-weight:900;color:var(--r);font-size:13px">${fn(rem)} ج</span></div>
    </div>`;
  sv('cf-amt',rem);sv('cf-ref','');sv('cf-wid','');sv('cf-wname','');
  $('cf-preview').style.display='none';
  const lastWid=localStorage.getItem('b2c_lastWalletId')||'';
  $('cf-wallets').innerHTML=wallets.map(w=>`
    <div class="w-btn" id="cfw-${w._id}" onclick="selCfW('${w._id}','${(w.name||'').replace(/'/g,"\\'")}')" style="padding:8px 10px;border-radius:8px;border:1px solid var(--line);background:var(--bg3);cursor:pointer;text-align:center;min-width:90px">
      <div style="font-size:18px">${w.type==='cash'?'💵':w.type==='bank'?'🏦':'💳'}</div>
      <div style="font-size:11px;font-weight:700">${escHtml(w.name||'محفظة')}</div>
      <div style="font-size:9px;color:var(--dim2)">${fn(w.balance||0)} ج</div>
    </div>`).join('');
  const defW=wallets.find(w=>w._id===lastWid)||wallets.find(w=>w.type==='cash')||wallets[0];
  if(defW)selCfW(defW._id,defW.name||'');
  updateCfPreview();
  $('ov-collect-fl').classList.add('open');
};

window.selCfW=function(id,name){
  sv('cf-wid',id);sv('cf-wname',name);
  document.querySelectorAll('#cf-wallets .w-btn').forEach(b=>{b.style.background='var(--bg3)';b.style.borderColor='var(--line)';});
  const sel=$('cfw-'+id);
  if(sel){sel.style.background='rgba(0,217,126,.12)';sel.style.borderColor='var(--g)';}
};

window.updateCfPreview=function(){
  const o=orders.find(x=>x._id===__cfOrderId);if(!o)return;
  const amt=parseFloat(gv('cf-amt'))||0;
  const rem=calcRem(o);
  const after=Math.max(0,rem-amt);
  const prev=$('cf-preview');if(!prev)return;
  if(!amt){prev.style.display='none';return;}
  prev.style.display='block';
  if(amt>rem+0.01){prev.style.background='rgba(255,61,110,.12)';prev.style.color='var(--r)';prev.textContent=`⚠️ المبلغ أكبر من المتبقي (${fn(rem)} ج)`;}
  else if(after<=0){prev.style.background='rgba(0,217,126,.12)';prev.style.color='var(--g)';prev.textContent='✅ سيتم التحصيل كاملاً — لو الأوردر مُسلَّم ينتقل تلقائياً لـ "محصّل"';}
  else{prev.style.background='rgba(255,170,0,.12)';prev.style.color='var(--y)';prev.textContent=`بعد التحصيل يبقى: ${fn(after)} ج`;}
};

window.saveCollectFl=async function(){
  const o=orders.find(x=>x._id===__cfOrderId);
  if(!o)return toast('⚠️ الأوردر غير موجود','err');
  if(o.stage==='archived'||o.shipStage==='returned')return toast('⛔ الأوردر مغلق','err');
  const amt=parseFloat(gv('cf-amt'))||0;
  if(!amt||amt<=0)return toast('⚠️ أدخل المبلغ','err');
  const wId=gv('cf-wid');const wName=gv('cf-wname');
  if(!wId)return toast('⚠️ اختر طريقة الدفع','err');
  const rem=calcRem(o);
  if(amt>rem+0.01)return toast(`⚠️ المبلغ (${fn(amt)} ج) أكبر من المتبقي (${fn(rem)} ج)`,'err');
  const w=wallets.find(x=>x._id===wId);
  if(!w)return toast('❌ المحفظة غير موجودة','err');
  const bb=parseFloat(w.balance)||0;
  const oldPaid=calcPaid(o);
  const newPaid=oldPaid+amt;
  const newRem=Math.max(0,calcTotalDue(o)-newPaid);
  const transferRef=gv('cf-ref');
  const curSS=o.shipStage||'ready';
  // Auto-advance to 'collected' لو المتبقي صفر والمرحلة wait_collection (مُسلَّم)
  const autoCollected=newRem<=0 && curSS==='wait_collection';
  const btn=$('btn-save-cf');btn.disabled=true;btn.textContent='...';
  try{
    const batch=writeBatch(db);
    batch.update(doc(db,'wallets',wId),{balance:increment(amt)});
    const colRef=doc(collection(db,'transactions_v2'));
    batch.set(colRef,{
      walletId:wId,walletName:w.name||wName,type:'in',amount:amt,
      description:`تحصيل (متابعة) — ${o.clientName||''} — ${o.orderId||''}`,
      category:'collection',orderId:__cfOrderId,clientName:o.clientName||'',
      transferRef,balanceBefore:bb,balanceAfter:bb+amt,
      date:nowStr(),createdBy:currentUser?.uid||'',createdByName:userName,
      createdAt:serverTimestamp(),...approvalFields()
    });
    batch.update(doc(db,'orders',__cfOrderId),{
      totalPaid:newPaid,remaining:newRem,
      paymentStatus:newRem<=0?'paid':newPaid>0?'partial':'pending',
      ...(autoCollected?{shipStage:'collected'}:{}),
      timeline:[...(o.timeline||[]),{date:nowStr(),action:`💰 تحصيل (متابعة) ${fn(amt)} ج عبر ${w.name||wName}${autoCollected?' — ✅ محصّل بالكامل':''}${transferRef?' ('+transferRef+')':''}`,by:userName}],
      updatedAt:serverTimestamp(),
    });
    addLedgerToBatch(batch,db,FE.CUSTOMER_PAYMENT,{
      amount:amt,walletId:wId,walletName:w.name||wName,
      orderId:__cfOrderId,clientId:o.clientId||'',clientName:o.clientName||'',
      notes:`تحصيل (متابعة) — ${o.clientName||''} — ${o.orderId||''}`,
      userId:currentUser?.uid||'',userName,
    });
    await batch.commit();
    localStorage.setItem('b2c_lastWalletId',wId);
    $('ov-collect-fl').classList.remove('open');
    toast(`✅ تم تحصيل ${fn(amt)} ج${autoCollected?' · الأوردر جاهز للأرشفة 🟢':''}`,'ok');
  }catch(e){
    toast('❌ '+(e.message||e),'err');
  }finally{
    btn.disabled=false;btn.textContent='✅ تأكيد التحصيل';
  }
};
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}</script>
