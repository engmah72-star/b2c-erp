<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Business2Card — تتبع الأوردر</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="shared.css?v=4">
<script type="module" src="inbox-badge.js"></script>
<style>
:root{--bg:#0a0a18;--bg2:#10101f;--bg3:#17172d;--bg4:#1e1e38;
  --snow:#e8e8f5;--text:#e8e8f5;--dim:#9090b8;--dim2:#7878a0;
  --p:var(--p);--b:#3b9aff;--c:#22d3ee;--g:var(--g);--r:var(--r);--y:#f0a020;
  --line:rgba(255,255,255,.08);--rad:10px;--rad2:16px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.head{background:var(--bg2);border-bottom:1px solid var(--line);padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.brand{display:flex;align-items:center;gap:10px;}
.logo{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--p),var(--b));
  display:flex;align-items:center;justify-content:center;font-size:var(--fs-2xl);}
.title{font-size:15px;font-weight:800;}
.sub{font-size:var(--fs-sm);color:var(--dim2);margin-top:1px;}
.btn-back{padding:7px 14px;border-radius:20px;border:1px solid var(--line);
  background:transparent;color:var(--dim);font-size:var(--fs-base);font-weight:700;
  cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.btn-back:hover{border-color:var(--p);color:var(--p);}
.wrap{max-width:880px;margin:0 auto;padding:24px 16px 60px;}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:18px 20px;margin-bottom:16px;}
.card-h{font-size:var(--fs-md);font-weight:800;color:var(--dim2);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);}
.row:last-child{border-bottom:0;}
.row-l{font-size:var(--fs-base);color:var(--dim2);}
.row-r{font-size:var(--fs-md);font-weight:700;}
.stage-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:var(--fs-sm);font-weight:800;}
.assignee{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);}
.assignee:last-child{border-bottom:0;}
.av{width:32px;height:32px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:var(--fs-lg);font-weight:800;color:var(--p);flex-shrink:0;}
.assignee-info{flex:1;min-width:0;}
.assignee-name{font-size:var(--fs-md);font-weight:700;}
.assignee-stage{font-size:var(--fs-xs);color:var(--dim2);margin-top:1px;}
.tl-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
.tl-item:last-child{border-bottom:0;}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--p);margin-top:5px;flex-shrink:0;}
.tl-body{flex:1;min-width:0;}
.tl-action{font-size:var(--fs-md);font-weight:600;}
.tl-meta{font-size:var(--fs-xs);color:var(--dim2);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;}
.fin-item{display:grid;grid-template-columns:auto 1fr auto;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);align-items:center;}
.fin-item:last-child{border-bottom:0;}
.fin-ico{font-size:var(--fs-2xl);}
.fin-info{min-width:0;}
.fin-label{font-size:var(--fs-md);font-weight:700;}
.fin-meta{font-size:var(--fs-xs);color:var(--dim2);margin-top:2px;}
.fin-amount{font-size:var(--fs-md);font-weight:900;}
.fin-in{color:var(--g);}.fin-out{color:var(--r);}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.kpi{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad);padding:12px 8px;text-align:center;}
.kpi-val{font-size:var(--fs-xl);font-weight:900;}
.kpi-lbl{font-size:var(--fs-xs);color:var(--dim2);margin-top:2px;}
.loading{text-align:center;padding:60px 20px;color:var(--dim2);}
.empty{text-align:center;padding:30px 20px;color:var(--dim2);font-size:var(--fs-base);}
.error-card{background:rgba(255,61,110,.08);border:1px solid rgba(255,61,110,.3);border-radius:var(--rad2);padding:18px 20px;color:var(--r);}
@media(max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr);}}
</style>
<script src="financial-guard.js"></script>
<script src="theme.js?v=4"></script>
  <script src="viewas.js?v=1" defer></script>
</head>
<body>

<header class="head">
  <div class="brand">
    <div class="logo">📋</div>
    <div>
      <div class="title">تتبع الأوردر</div>
      <div class="sub" id="head-sub">جاري التحميل...</div>
    </div>
  </div>
  <a class="btn-back" href="javascript:history.back()">↩ رجوع</a>
</header>

<div class="wrap" id="wrap"></div>
<script type="module">
import { app, auth, db } from "./core/firebase-init.js";
  import { skeletonCards as __sc } from "./orders.js";
  const __w = document.getElementById('wrap');
  if (__w) __w.innerHTML = __sc(3);
</script>

<script type="module">
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, onSnapshot, collection, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { STAGES, getStageAge, stageSlaBadge, stageProgressBar, skeletonCards, productStatusBadge, fn } from "./orders.js";
const params = new URLSearchParams(location.search);
const orderDocId = params.get('id');

if (!orderDocId) {
  document.getElementById('wrap').innerHTML = '<div class="error-card">⚠️ معرّف الأوردر مفقود — افتح الصفحة من خلال أوردر محدد</div>';
}

let order = null;
let ledger = [];
let isAdmin = false;
let currentRole = '';

// RULE 8 — قناع الرقم
function _maskPh(p){
  if(!p) return '';
  const canSee=['admin','operation_manager','customer_service','shipping_officer'].includes(currentRole);
  if(canSee) return p;
  const s=String(p).replace(/\D/g,'');
  return s.length>=6 ? s.slice(0,3)+'****'+s.slice(-3) : '****';
}

onAuthStateChanged(auth, async u => {
  if (!u) { location.href = 'login.html'; return; }
  if (!orderDocId) return;
  // اقرأ دور المستخدم لتحديد رؤية السجل (السجل للأدمن/مدير العمليات فقط)
  try {
    const uSnap = await getDoc(doc(db, 'users', u.uid));
    if (uSnap.exists()) {
      const role = uSnap.data().role || '';
      currentRole = role;
      isAdmin = ['admin','operation_manager'].includes(role);
    }
  } catch(_) {}
  // اشترك في الأوردر
  onSnapshot(doc(db, 'orders', orderDocId), snap => {
    if (!snap.exists()) {
      document.getElementById('wrap').innerHTML = '<div class="error-card">❌ الأوردر غير موجود</div>';
      return;
    }
    order = { ...snap.data(), _id: snap.id };
    render();
  });
  // اشترك في القيود المالية المرتبطة
  onSnapshot(query(collection(db, 'financial_ledger'), where('orderId', '==', orderDocId), limit(200)), snap => {
    ledger = snap.docs.map(d => ({ ...d.data(), _id: d.id }))
      .filter(x => !x.isDeleted)
      .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
    render();
  });
});

function render() {
  if (!order) return;
  const o = order;
  const stage = o.stage || 'design';
  const stageConf = STAGES[stage] || { label: stage, ico: '📋', col: '#7878a0' };
  document.getElementById('head-sub').textContent = `${o.orderId || o._id.slice(-6)} · ${o.clientName || '—'}`;

  const sale = parseFloat(o.salePrice) || 0;
  const paid = parseFloat(o.totalPaid) || parseFloat(o.paid) || 0;
  const rem = Math.max(0, sale - paid);
  const totalCost = (o.costItems || []).reduce((s, c) => s + (parseFloat(c.total) || 0), 0);

  // ── Stage Progress Visualizer
  let html = stageProgressBar(o);

  // ── KPIs
  html += `
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-val" style="color:var(--p)">${fn(sale)}</div><div class="kpi-lbl">💰 السعر</div></div>
      <div class="kpi"><div class="kpi-val" style="color:var(--g)">${fn(paid)}</div><div class="kpi-lbl">✅ محصّل</div></div>
      <div class="kpi"><div class="kpi-val" style="color:var(--r)">${fn(rem)}</div><div class="kpi-lbl">⏳ متبقي</div></div>
      <div class="kpi"><div class="kpi-val" style="color:var(--y)">${fn(totalCost)}</div><div class="kpi-lbl">🏭 تكلفة</div></div>
    </div>
  `;

  // ── Order info
  const ageHours = getStageAge(o);
  const ageStr = ageHours < 1 ? `${Math.round(ageHours*60)} دقيقة`
                : ageHours < 24 ? `${Math.round(ageHours)} ساعة`
                : `${Math.round(ageHours/24)} يوم`;
  // ── parent/child banner
  if (o.parentOrderId) {
    html += `<div class="card" style="background:rgba(167,139,250,.06);border-color:rgba(167,139,250,.3)">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-size:var(--fs-md);font-weight:800;color:var(--p)">🔀 أوردر فرعي</div>
          <div style="font-size:var(--fs-sm);color:var(--dim2);margin-top:3px">منفصل من الأوردر الأصلي — المالية كلها على الأصلي</div>
        </div>
        <a href="order-tracking.html?id=${o.parentOrderId}" class="empty-state-btn" style="margin:0;padding:8px 16px">↗ افتح الأوردر الأصلي</a>
      </div>
    </div>`;
  }
  if (o.childOrderIds && o.childOrderIds.length) {
    html += `<div class="card" style="background:rgba(74,142,245,.06);border-color:rgba(74,142,245,.3)">
      <div style="font-size:var(--fs-md);font-weight:800;color:var(--b);margin-bottom:8px">📎 أوردرات فرعية مرتبطة (${o.childOrderIds.length})</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${o.childOrderIds.map(cid => `<a href="order-tracking.html?id=${cid}" style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg3);border-radius:8px;text-decoration:none;color:var(--snow);font-size:var(--fs-base);font-weight:700">↗ ${cid.slice(-8)}<span style="color:var(--b)">عرض ←</span></a>`).join('')}
      </div>
    </div>`;
  }
  html += `
    <div class="card">
      <div class="card-h">📦 بيانات الأوردر</div>
      <div class="row"><span class="row-l">المرحلة الحالية</span>
        <span class="stage-pill" style="background:${stageConf.col}18;color:${stageConf.col}">${stageConf.ico} ${stageConf.label} ${stageSlaBadge(o)}</span></div>
      <div class="row"><span class="row-l">في المرحلة منذ</span><span class="row-r">${ageStr}</span></div>
      <div class="row"><span class="row-l">العميل</span><span class="row-r">${o.clientName || '—'}${o.clientPhone?` · ${_maskPh(o.clientPhone)}`:''}</span></div>
      <div class="row"><span class="row-l">المنتج</span><span class="row-r">${(o.products||[]).map(p=>p.name+'×'+p.qty).join(' + ') || o.product || '—'}</span></div>
      ${(o.products||[]).length?`<div class="row" style="flex-direction:column;align-items:stretch;gap:6px;padding:10px 0">
        <span class="row-l">حالة كل منتج</span>
        <div style="display:flex;flex-direction:column;gap:5px">
          ${o.products.map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--bg3);border-radius:8px"><span style="font-size:var(--fs-base);font-weight:700">${p.name} <span style="color:var(--dim2);font-weight:600">× ${p.qty}</span></span>${productStatusBadge(p.productStatus||'pending')}</div>`).join('')}
        </div>
      </div>`:''}
      <div class="row"><span class="row-l">تاريخ الإنشاء</span><span class="row-r">${o.createdDate || '—'} · ${o.createdByName || '—'}</span></div>
      ${o.deadline?`<div class="row"><span class="row-l">الموعد النهائي</span><span class="row-r" style="color:var(--y)">${o.deadline}</span></div>`:''}
    </div>
  `;

  // ── Assignees per stage
  const assignees = [
    { stage: 'design',     id: o.designerId,         name: o.designerName,         icon: '✏️', label: 'تصميم' },
    { stage: 'printing',   id: o.printerId,          name: o.printerName,          icon: '🖨️', label: 'طباعة' },
    { stage: 'production', id: o.productionAgent,    name: o.productionAgentName,  icon: '🏭', label: 'تنفيذ' },
    { stage: 'shipping',   id: o.shippingOfficerId,  name: o.shippingOfficerName,  icon: '🚚', label: 'شحن' },
  ];
  html += `<div class="card"><div class="card-h">👥 المسؤولون</div>`;
  assignees.forEach(a => {
    const has = !!a.id;
    const enteredAt = o.stageEnteredAt?.[a.stage];
    html += `
      <div class="assignee">
        <div class="av" style="${has?'':'opacity:.4'}">${a.icon}</div>
        <div class="assignee-info">
          <div class="assignee-name" style="${has?'':'color:var(--dim2)'}">${has ? a.name || '—' : 'غير معيَّن'}</div>
          <div class="assignee-stage">${a.label}${enteredAt?` · دخل في ${enteredAt}`:''}</div>
        </div>
      </div>`;
  });
  html += `</div>`;

  // ── Stage timestamps
  const enteredAt = o.stageEnteredAt || {};
  if (Object.keys(enteredAt).length) {
    html += `<div class="card"><div class="card-h">⏱ مدد المراحل</div>`;
    ['design','printing','production','shipping','archived'].forEach(st => {
      if (enteredAt[st]) {
        const sc = STAGES[st] || {};
        html += `<div class="row"><span class="row-l">${sc.ico||''} ${sc.label||st}</span><span class="row-r" style="font-size:var(--fs-sm);color:var(--dim)">${enteredAt[st]}</span></div>`;
      }
    });
    html += `</div>`;
  }

  // ── Timeline — للأدمن/مدير العمليات فقط
  if (isAdmin) {
    const tl = [...(o.timeline || [])].reverse();
    html += `<div class="card"><div class="card-h">🗒 السجل الزمني (${tl.length})</div>`;
    if (!tl.length) {
      html += `<div class="empty">لا يوجد سجل</div>`;
    } else {
      tl.forEach(t => {
        const sc = STAGES[t.stage] || {};
        html += `
          <div class="tl-item">
            <div class="tl-dot" style="${sc.col?`background:${sc.col}`:''}"></div>
            <div class="tl-body">
              <div class="tl-action">${t.action || ''}</div>
              <div class="tl-meta">
                <span>📅 ${t.date || ''}</span>
                ${t.by?`<span>👤 ${t.by}</span>`:''}
                ${t.assigneeName?`<span>↪ ${t.assigneeName}</span>`:''}
              </div>
            </div>
          </div>`;
      });
    }
    html += `</div>`;
  }

  // ── Financial events
  html += `<div class="card"><div class="card-h">💰 الحركات المالية (${ledger.length})</div>`;
  if (!ledger.length) {
    html += `<div class="empty">لا توجد حركات مالية مرتبطة</div>`;
  } else {
    ledger.forEach(l => {
      const isIn = l.direction === 'in';
      html += `
        <div class="fin-item">
          <div class="fin-ico">${l.icon || (isIn?'💰':'💸')}</div>
          <div class="fin-info">
            <div class="fin-label">${l.label || l.eventType || ''}</div>
            <div class="fin-meta">${l.notes || ''} ${l.walletName?` · 💼 ${l.walletName}`:''} ${l.vendorName?` · 🏭 ${l.vendorName}`:''}</div>
          </div>
          <div class="fin-amount ${isIn?'fin-in':'fin-out'}">${isIn?'+':'-'}${fn(l.amount)} ج</div>
        </div>`;
    });
  }
  html += `</div>`;

  // ── Cost items (if any)
  if ((o.costItems||[]).length) {
    html += `<div class="card"><div class="card-h">🏭 بنود التكلفة (${o.costItems.length})</div>`;
    o.costItems.forEach(c => {
      html += `
        <div class="row">
          <span class="row-l">${c.type || '—'}${c.supplierName?` · ${c.supplierName}`:''}${c.note?` · ${c.note}`:''}</span>
          <span class="row-r" style="color:var(--y)">${fn(c.total)} ج</span>
        </div>`;
    });
    html += `</div>`;
  }

  document.getElementById('wrap').innerHTML = html;
}
</script>
</body>
</html>
