<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business2Card — معرض التصاميم</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" href="icon-192.png" type="image/png">
<style>
:root{
  --bg:#0a0a18;--bg2:#10101f;--bg3:#17172d;--bg4:#1e1e38;
  --text:#e8e8f5;--dim2:#7878a0;
  --p:#a78bfa;--b:#3b9aff;--g:#00d97e;--r:#ff3d6e;--y:#f0a020;
  --line:rgba(255,255,255,.08);--rad:10px;--rad2:16px;
  --trans:all .18s ease;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── Header ── */
.gal-header{
  background:rgba(10,10,24,.85);border-bottom:1px solid var(--line);
  padding:16px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);
}
.gal-brand{display:flex;align-items:center;gap:12px;}
.gal-logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--p),var(--b));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.gal-brand-name{font-size:17px;font-weight:900;letter-spacing:-.5px;}
.gal-brand-sub{font-size:10px;color:var(--dim2);margin-top:1px;}
.gal-count{font-size:11px;color:var(--dim2);background:var(--bg3);padding:5px 14px;border-radius:20px;border:1px solid var(--line);white-space:nowrap;}

/* ── Hero ── */
.gal-hero{
  text-align:center;padding:54px 24px 36px;
  background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(167,139,250,.12),transparent);
}
.gal-hero h1{font-size:clamp(26px,5vw,46px);font-weight:900;letter-spacing:-1px;margin-bottom:10px;}
.gal-hero h1 span{background:linear-gradient(135deg,var(--p),var(--b));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.gal-hero p{font-size:14px;color:var(--dim2);max-width:400px;margin:0 auto;}

/* ── Search + Filters ── */
.gal-toolbar{padding:0 24px 20px;max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:12px;}
.gal-search-row{display:flex;gap:10px;align-items:center;}
.gal-search{
  flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:12px;
  padding:9px 14px;color:var(--text);font-family:inherit;font-size:13px;outline:none;
  transition:var(--trans);
}
.gal-search:focus{border-color:rgba(167,139,250,.5);}
.cat-filters{display:flex;flex-wrap:wrap;gap:7px;}
.cat-btn{
  padding:6px 15px;border-radius:20px;border:1px solid var(--line);
  background:var(--bg2);color:var(--dim2);font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:var(--trans);white-space:nowrap;
}
.cat-btn:hover{border-color:var(--p);color:var(--p);}
.cat-btn.active{background:rgba(167,139,250,.15);border-color:var(--p);color:var(--p);}

/* ── Gallery Grid (masonry via CSS columns) ── */
.gal-wrap{padding:0 24px 60px;max-width:1200px;margin:0 auto;}
.gal-grid{column-count:4;column-gap:14px;}
@media(max-width:1024px){.gal-grid{column-count:3;}}
@media(max-width:640px){.gal-grid{column-count:2;column-gap:10px;}.gal-wrap{padding:0 12px 40px;}.gal-toolbar{padding:0 12px 16px;}}
@media(max-width:380px){.gal-grid{column-count:1;}}

.gal-card{
  break-inside:avoid;margin-bottom:14px;
  background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);
  overflow:hidden;cursor:zoom-in;transition:var(--trans);
  animation:fadeUp .35s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.gal-card:hover{border-color:rgba(167,139,250,.35);transform:translateY(-3px);box-shadow:0 10px 36px rgba(0,0,0,.45);}
.gal-card img{width:100%;display:block;object-fit:cover;background:var(--bg3);}
.gal-card-info{padding:10px 12px 12px;}
.gal-card-cat{
  display:inline-flex;align-items:center;padding:2px 9px;border-radius:12px;
  font-size:9px;font-weight:800;background:rgba(167,139,250,.15);color:var(--p);
  border:1px solid rgba(167,139,250,.2);margin-bottom:6px;
}
.gal-card-title{font-size:12px;font-weight:800;margin-bottom:4px;line-height:1.4;}
.gal-card-desc{font-size:10px;color:var(--dim2);line-height:1.5;margin-bottom:5px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.gal-card-designer{font-size:10px;color:var(--dim2);margin-top:5px;display:flex;align-items:center;gap:4px;}
.gal-card-designer span{color:var(--p);font-weight:700;}

/* ── States ── */
.gal-loading{text-align:center;padding:80px 24px;color:var(--dim2);}
.gal-spinner{font-size:30px;animation:spin 1.2s linear infinite;display:inline-block;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.gal-empty{text-align:center;padding:80px 24px;}
.gal-empty-ico{font-size:46px;margin-bottom:14px;opacity:.4;}
.gal-empty-txt{font-size:14px;color:var(--dim2);}

/* ── Lightbox ── */
.lightbox{
  display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.94);backdrop-filter:blur(8px);
  flex-direction:column;align-items:center;justify-content:center;padding:20px;
}
.lightbox.open{display:flex;}
.lb-img{max-width:min(90vw,800px);max-height:80vh;border-radius:var(--rad2);box-shadow:0 20px 80px rgba(0,0,0,.8);object-fit:contain;}
.lb-close{
  position:fixed;top:18px;left:18px;width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:var(--trans);
}
.lb-close:hover{background:rgba(255,255,255,.2);}
.lb-info{
  margin-top:14px;background:rgba(16,16,31,.95);border:1px solid var(--line);
  border-radius:14px;padding:10px 20px;text-align:center;max-width:500px;
}
.lb-title{font-size:13px;font-weight:800;margin-bottom:3px;}
.lb-meta{font-size:11px;color:var(--dim2);}
.lb-desc{font-size:11px;color:var(--dim2);margin-top:4px;line-height:1.5;}
</style>
<script type="module" src="inbox-badge.js"></script>
</head>
<body>

<!-- Header -->
<header class="gal-header">
  <div class="gal-brand">
    <div class="gal-logo">🎨</div>
    <div>
      <div class="gal-brand-name">Business2Card</div>
      <div class="gal-brand-sub">معرض التصاميم</div>
    </div>
  </div>
  <div class="gal-count" id="gal-count">جاري التحميل...</div>
</header>

<!-- Hero -->
<section class="gal-hero">
  <h1>معرض <span>تصاميمنا</span></h1>
  <p>أعمال فريق التصميم — بطاقات، هويات بصرية، وأكثر</p>
</section>

<!-- Toolbar: Search + Category Filters -->
<div class="gal-toolbar">
  <div class="gal-search-row">
    <input class="gal-search" id="gal-search" placeholder="🔍 بحث في التصاميم..." oninput="renderGallery()">
  </div>
  <div class="cat-filters" id="cat-filters">
    <button class="cat-btn active" data-cat="all" onclick="filterByCat('all',this)">كل التصاميم</button>
  </div>
</div>

<!-- Gallery -->
<div class="gal-wrap">
  <div class="gal-loading" id="gal-loading">
    <div class="gal-spinner">⬡</div>
    <div>جاري تحميل التصاميم...</div>
  </div>
  <div class="gal-grid" id="gal-grid" style="display:none"></div>
  <div class="gal-empty" id="gal-empty" style="display:none">
    <div class="gal-empty-ico">🎨</div>
    <div class="gal-empty-txt">لا توجد تصاميم في هذا التصنيف</div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img class="lb-img" id="lb-img" src="" alt="" onclick="event.stopPropagation()">
  <div class="lb-info" onclick="event.stopPropagation()">
    <div class="lb-title" id="lb-title"></div>
    <div class="lb-meta" id="lb-meta"></div>
    <div class="lb-desc" id="lb-desc"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",
  authDomain:"business2card-c041b.firebaseapp.com",
  projectId:"business2card-c041b",
  storageBucket:"business2card-c041b.firebasestorage.app",
  messagingSenderId:"235622448899",
  appId:"1:235622448899:web:d8652ff71082f7d003f336"
});
const db = getFirestore(app);

let allItems = [];
let activeCat = 'all';

async function loadGallery() {
  try {
    const snap = await getDocs(query(
      collection(db, 'gallery'),
      where('isVisible', '==', true)
    ));
    allItems = snap.docs
      .map(d => ({ ...d.data(), _id: d.id }))
      .sort((a, b) => {
        const at = a.publishedAt?.seconds || 0;
        const bt = b.publishedAt?.seconds || 0;
        return bt - at;
      });
    buildCategoryFilters();
    renderGallery();
  } catch(e) {
    document.getElementById('gal-loading').innerHTML =
      `<div style="color:var(--r)">⚠️ تعذر تحميل المعرض<br><span style="font-size:11px">${e.message}</span></div>`;
  }
}

function buildCategoryFilters() {
  const cats = [...new Set(allItems.map(i => i.productType).filter(Boolean))].sort();
  const cfEl = document.getElementById('cat-filters');
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.onclick = () => filterByCat(cat, btn);
    cfEl.appendChild(btn);
  });
}

window.filterByCat = function(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery();
};

window.renderGallery = function() {
  const q = (document.getElementById('gal-search')?.value || '').toLowerCase().trim();
  let items = allItems;

  if (activeCat !== 'all') items = items.filter(i => i.productType === activeCat);
  if (q) items = items.filter(i => {
    const hay = [i.title || '', i.productType || '', i.designerName || '', i.description || ''].join(' ').toLowerCase();
    return hay.includes(q);
  });

  document.getElementById('gal-loading').style.display = 'none';
  const grid = document.getElementById('gal-grid');
  const empty = document.getElementById('gal-empty');

  document.getElementById('gal-count').textContent = `${items.length} تصميم`;

  if (!items.length) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  grid.style.display = '';
  empty.style.display = 'none';

  grid.innerHTML = items.map((item, idx) => {
    const cat = item.productType || 'تصميم';
    const designer = item.publishedByName || item.designerName || '';
    const safeUrl = (item.imageUrl || '').replace(/'/g, '%27');
    const safeTitle = (item.title || '').replace(/'/g, '');
    const safeCat = cat.replace(/'/g, '');
    const safeDesc = (item.description || '').replace(/'/g, '');
    const safeDesigner = designer.replace(/'/g, '');

    return `<div class="gal-card" style="animation-delay:${Math.min(idx * .04, .5)}s"
        onclick="openLightbox('${safeUrl}','${safeTitle}','${safeCat}','${safeDesc}','${safeDesigner}')">
      <img src="${item.imageUrl || ''}" alt="${item.title || cat}" loading="lazy">
      <div class="gal-card-info">
        <div class="gal-card-cat">${cat}</div>
        ${item.title ? `<div class="gal-card-title">${item.title}</div>` : ''}
        ${item.description ? `<div class="gal-card-desc">${item.description}</div>` : ''}
        ${designer ? `<div class="gal-card-designer">🎨 <span>${designer}</span></div>` : ''}
      </div>
    </div>`;
  }).join('');
};

window.openLightbox = function(url, title, cat, desc, designer) {
  document.getElementById('lb-img').src = decodeURIComponent(url);
  document.getElementById('lb-title').textContent = decodeURIComponent(title) || decodeURIComponent(cat);
  const metaParts = [];
  if (cat) metaParts.push(decodeURIComponent(cat));
  if (designer) metaParts.push('🎨 ' + decodeURIComponent(designer));
  document.getElementById('lb-meta').textContent = metaParts.join(' · ');
  const descEl = document.getElementById('lb-desc');
  const d = decodeURIComponent(desc);
  descEl.textContent = d;
  descEl.style.display = d ? '' : 'none';
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
};

window.closeLightbox = function() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
};

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

loadGallery();
</script>
</body>
</html>
