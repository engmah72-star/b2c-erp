<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business2Card — معرض التصاميم</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" href="icon-192.png" type="image/png">
<style>
:root{
  --bg:#0a0a18;--bg2:#10101f;--bg3:#17172d;--bg4:#1e1e38;
  --text:#e8e8f5;--dim2:#7878a0;
  --p:#a78bfa;--b:#3b9aff;--g:#00d97e;--r:#ff3d6e;--y:#f0a020;
  --line:rgba(255,255,255,.08);--rad:10px;--rad2:16px;
  --trans:all .18s ease;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── Header ── */
.gal-header{
  background:var(--bg2);border-bottom:1px solid var(--line);
  padding:18px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);
}
.gal-brand{display:flex;align-items:center;gap:12px;}
.gal-logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--p),var(--b));display:flex;align-items:center;justify-content:center;font-size:20px;}
.gal-brand-name{font-size:18px;font-weight:900;letter-spacing:-.5px;}
.gal-brand-sub{font-size:11px;color:var(--dim2);margin-top:1px;}
.gal-count{font-size:12px;color:var(--dim2);background:var(--bg3);padding:5px 14px;border-radius:20px;border:1px solid var(--line);}

/* ── Hero ── */
.gal-hero{
  text-align:center;padding:60px 24px 40px;
  background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(167,139,250,.12),transparent);
}
.gal-hero h1{font-size:clamp(28px,5vw,48px);font-weight:900;letter-spacing:-1px;margin-bottom:10px;}
.gal-hero h1 span{background:linear-gradient(135deg,var(--p),var(--b));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.gal-hero p{font-size:15px;color:var(--dim2);max-width:420px;margin:0 auto;}

/* ── Filters ── */
.gal-filters{padding:0 24px 20px;max-width:1200px;margin:0 auto;}
.filter-label{font-size:11px;font-weight:700;color:var(--dim2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;}
.cat-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.cat-btn{
  padding:7px 16px;border-radius:20px;border:1px solid var(--line);
  background:var(--bg2);color:var(--dim2);font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:var(--trans);white-space:nowrap;
}
.cat-btn:hover{border-color:var(--p);color:var(--p);}
.cat-btn.active{background:rgba(167,139,250,.15);border-color:var(--p);color:var(--p);}
.color-filters{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.color-swatch{
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  border:2.5px solid transparent;transition:var(--trans);
  box-shadow:0 1px 6px rgba(0,0,0,.5);flex-shrink:0;
}
.color-swatch:hover{transform:scale(1.15);}
.color-swatch.active{border-color:#fff;transform:scale(1.2);}
.filter-sep{width:1px;height:24px;background:var(--line);margin:0 4px;}
.clear-btn{
  padding:5px 12px;border-radius:12px;border:1px solid var(--line);
  background:transparent;color:var(--dim2);font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:var(--trans);
}
.clear-btn:hover{border-color:var(--r);color:var(--r);}

/* ── Gallery Grid (masonry via CSS columns) ── */
.gal-wrap{padding:0 24px 60px;max-width:1200px;margin:0 auto;}
.gal-grid{
  column-count:4;column-gap:16px;
}
@media(max-width:1024px){.gal-grid{column-count:3;}}
@media(max-width:640px){.gal-grid{column-count:2;column-gap:10px;}.gal-wrap{padding:0 12px 40px;}.gal-filters{padding:0 12px 16px;}}
@media(max-width:380px){.gal-grid{column-count:1;}}

.gal-card{
  break-inside:avoid;margin-bottom:16px;
  background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);
  overflow:hidden;cursor:zoom-in;transition:var(--trans);
  animation:fadeUp .4s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.gal-card:hover{border-color:rgba(167,139,250,.3);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4);}
.gal-card img{width:100%;display:block;object-fit:cover;}
.gal-card-info{padding:10px 12px;}
.gal-card-cat{
  display:inline-flex;align-items:center;padding:2px 10px;border-radius:12px;
  font-size:10px;font-weight:800;background:rgba(167,139,250,.15);color:var(--p);
  border:1px solid rgba(167,139,250,.2);margin-bottom:5px;
}
.gal-card-title{font-size:12px;font-weight:700;margin-bottom:4px;line-height:1.4;}
.gal-card-colors{display:flex;gap:5px;flex-wrap:wrap;}
.gal-card-dot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(255,255,255,.15);}
.gal-card-designer{font-size:10px;color:var(--dim2);margin-top:5px;}

/* ── States ── */
.gal-loading{text-align:center;padding:80px 24px;color:var(--dim2);}
.gal-spinner{font-size:32px;animation:spin 1.2s linear infinite;display:inline-block;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.gal-empty{text-align:center;padding:80px 24px;}
.gal-empty-ico{font-size:48px;margin-bottom:14px;opacity:.4;}
.gal-empty-txt{font-size:15px;color:var(--dim2);}

/* ── Lightbox ── */
.lightbox{
  display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.92);backdrop-filter:blur(6px);
  align-items:center;justify-content:center;padding:20px;
}
.lightbox.open{display:flex;}
.lb-img{max-width:90vw;max-height:90vh;border-radius:var(--rad2);box-shadow:0 20px 80px rgba(0,0,0,.8);}
.lb-close{position:fixed;top:20px;left:20px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--trans);}
.lb-close:hover{background:rgba(255,255,255,.2);}
.lb-info{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(10,10,24,.9);border:1px solid var(--line);border-radius:20px;padding:8px 20px;font-size:12px;color:var(--dim2);text-align:center;white-space:nowrap;}
</style>
</head>
<body>

<!-- Header -->
<header class="gal-header">
  <div class="gal-brand">
    <div class="gal-logo">🎨</div>
    <div>
      <div class="gal-brand-name">Business2Card</div>
      <div class="gal-brand-sub">معرض التصاميم</div>
    </div>
  </div>
  <div class="gal-count" id="gal-count">جاري التحميل...</div>
</header>

<!-- Hero -->
<section class="gal-hero">
  <h1>معرض <span>تصاميمنا</span></h1>
  <p>أعمال فريق التصميم — بطاقات، هويات بصرية، وأكثر</p>
</section>

<!-- Filters -->
<div class="gal-filters">
  <div class="filter-label">التصنيف</div>
  <div class="cat-filters" id="cat-filters">
    <button class="cat-btn active" data-cat="all" onclick="filterByCat('all',this)">كل التصاميم</button>
  </div>
  <div class="filter-label">الألوان</div>
  <div class="color-filters" id="color-filters"></div>
</div>

<!-- Gallery -->
<div class="gal-wrap">
  <div class="gal-loading" id="gal-loading">
    <div class="gal-spinner">⬡</div>
    <div>جاري تحميل التصاميم...</div>
  </div>
  <div class="gal-grid" id="gal-grid" style="display:none"></div>
  <div class="gal-empty" id="gal-empty" style="display:none">
    <div class="gal-empty-ico">🎨</div>
    <div class="gal-empty-txt">لا توجد تصاميم في هذا التصنيف</div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img class="lb-img" id="lb-img" src="" alt="">
  <div class="lb-info" id="lb-info"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({
  apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",
  authDomain:"business2card-c041b.firebaseapp.com",
  projectId:"business2card-c041b",
  storageBucket:"business2card-c041b.firebasestorage.app",
  messagingSenderId:"235622448899",
  appId:"1:235622448899:web:d8652ff71082f7d003f336"
});
const db=getFirestore(app);

let allItems=[];
let activeCat='all';
let activeColors=[];

const GAL_COLORS=[
  {name:'أسود',hex:'#111111'},{name:'أبيض',hex:'#f0f0f0'},{name:'ذهبي',hex:'#d4a017'},
  {name:'فضي',hex:'#9ca3af'},{name:'أحمر',hex:'#ef4444'},{name:'برتقالي',hex:'#f97316'},
  {name:'أصفر',hex:'#fbbf24'},{name:'أخضر',hex:'#22c55e'},{name:'أزرق',hex:'#3b82f6'},
  {name:'بنفسجي',hex:'#a78bfa'},{name:'وردي',hex:'#f472b6'},{name:'بني',hex:'#92400e'},
];

async function loadGallery(){
  try{
    const snap=await getDocs(query(
      collection(db,'design_gallery'),
      where('isPublic','==',true),
      orderBy('createdAt','desc')
    ));
    allItems=snap.docs.map(d=>({...d.data(),_id:d.id}));
    buildFilters();
    renderGallery();
  }catch(e){
    document.getElementById('gal-loading').innerHTML=`<div style="color:var(--r)">⚠️ تعذر تحميل المعرض<br><span style="font-size:11px">${e.message}</span></div>`;
  }
}

function buildFilters(){
  // Category buttons
  const cats=[...new Set(allItems.map(i=>i.category).filter(Boolean))];
  const cfEl=document.getElementById('cat-filters');
  cats.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='cat-btn';
    btn.dataset.cat=cat;
    btn.textContent=cat;
    btn.onclick=()=>filterByCat(cat,btn);
    cfEl.appendChild(btn);
  });

  // Color swatches — only colors that appear in the data
  const usedHexes=new Set();
  allItems.forEach(i=>(i.colors||[]).forEach(c=>usedHexes.add(c.hex)));
  const colorEl=document.getElementById('color-filters');
  const usedColors=GAL_COLORS.filter(c=>usedHexes.has(c.hex));
  if(usedColors.length){
    usedColors.forEach(c=>{
      const sw=document.createElement('div');
      sw.className='color-swatch';
      sw.style.background=c.hex;
      sw.title=c.name;
      sw.dataset.hex=c.hex;
      sw.onclick=()=>toggleColorFilter(c.hex,sw);
      colorEl.appendChild(sw);
    });
    const sep=document.createElement('div');sep.className='filter-sep';colorEl.appendChild(sep);
    const clr=document.createElement('button');
    clr.className='clear-btn';clr.textContent='مسح الكل';
    clr.onclick=clearFilters;
    colorEl.appendChild(clr);
  }
}

window.filterByCat=function(cat,btn){
  activeCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery();
};

function toggleColorFilter(hex,el){
  const i=activeColors.indexOf(hex);
  if(i>-1){activeColors.splice(i,1);el.classList.remove('active');}
  else{activeColors.push(hex);el.classList.add('active');}
  renderGallery();
}

function clearFilters(){
  activeColors=[];
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));
  renderGallery();
}

function renderGallery(){
  let items=allItems;
  if(activeCat!=='all') items=items.filter(i=>i.category===activeCat);
  if(activeColors.length){
    items=items.filter(i=>{
      const iColors=(i.colors||[]).map(c=>c.hex);
      return activeColors.some(h=>iColors.includes(h));
    });
  }

  document.getElementById('gal-loading').style.display='none';
  const grid=document.getElementById('gal-grid');
  const empty=document.getElementById('gal-empty');

  document.getElementById('gal-count').textContent=`${items.length} تصميم`;

  if(!items.length){
    grid.style.display='none';empty.style.display='block';return;
  }
  grid.style.display='';empty.style.display='none';

  grid.innerHTML=items.map((item,idx)=>{
    const colorDots=(item.colors||[]).map(c=>`<div class="gal-card-dot" style="background:${c.hex}" title="${c.name}"></div>`).join('');
    return`<div class="gal-card" style="animation-delay:${Math.min(idx*.04,0.5)}s" onclick="openLightbox('${item.imageUrl.replace(/'/g,'%27')}','${(item.title||'').replace(/'/g,'')}','${(item.category||'').replace(/'/g,'')}')">
      <img src="${item.imageUrl}" alt="${item.title||item.category||''}" loading="lazy">
      <div class="gal-card-info">
        <div class="gal-card-cat">${item.category||'تصميم'}</div>
        ${item.title&&item.title!==item.category?`<div class="gal-card-title">${item.title}</div>`:''}
        ${colorDots?`<div class="gal-card-colors">${colorDots}</div>`:''}
        ${item.designerName?`<div class="gal-card-designer">🎨 ${item.designerName}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

window.openLightbox=function(url,title,cat){
  document.getElementById('lb-img').src=decodeURIComponent(url);
  document.getElementById('lb-info').textContent=(title?title+' · ':'')+cat;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
};
window.closeLightbox=function(){
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow='';
};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});

loadGallery();
</script>
</body>
</html>
