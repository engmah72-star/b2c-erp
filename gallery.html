<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#08090f">
<title>Business2Card — معرض التصاميم</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" href="icon-192.png" type="image/png">
<style>
:root{
  --bg:#08090f;--bg2:#0d0f1b;--bg3:#121520;--bg4:#171a28;--bg5:#1c2030;
  --snow:#dce5f5;--dim:#3e4a66;--dim2:#647298;
  --p:#8b7af8;--b:#4a8ef5;--g:#00c87a;--r:#f03660;--y:#f0a020;--c:#10c4de;--o:#f47048;
  --line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.13);
  --rad:10px;--rad2:14px;--rad3:18px;
  --trans:all .22s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{scroll-behavior:smooth;}
body{
  font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--snow);
  min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-text-size-adjust:100%;
}
::selection{background:rgba(139,122,248,.35);color:#fff;}

/* ── Background Aurora ── */
.aurora{
  position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;
}
.aurora::before,.aurora::after{
  content:'';position:absolute;width:55vw;height:55vw;border-radius:50%;
  filter:blur(110px);opacity:.32;animation:drift 22s ease-in-out infinite alternate;
}
.aurora::before{
  top:-20vw;right:-15vw;
  background:radial-gradient(circle,rgba(139,122,248,.55),transparent 70%);
}
.aurora::after{
  bottom:-25vw;left:-15vw;
  background:radial-gradient(circle,rgba(74,142,245,.45),transparent 70%);
  animation-delay:-11s;
}
@keyframes drift{
  0%{transform:translate(0,0) scale(1);}
  50%{transform:translate(20px,-30px) scale(1.05);}
  100%{transform:translate(-30px,20px) scale(.95);}
}

/* ── Header ── */
.gal-header{
  background:rgba(8,9,15,.75);border-bottom:1px solid var(--line);
  padding:14px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
}
.gal-brand{display:flex;align-items:center;gap:12px;}
.gal-logo{
  width:40px;height:40px;border-radius:11px;
  background:linear-gradient(135deg,var(--p),var(--b));
  display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;
  box-shadow:0 6px 20px rgba(139,122,248,.35);
  position:relative;overflow:hidden;
}
.gal-logo::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent,rgba(255,255,255,.25),transparent);
  transform:translateX(-100%);animation:shimmer 3s ease-in-out infinite;
}
@keyframes shimmer{50%,100%{transform:translateX(100%);}}
.gal-brand-name{font-size:17px;font-weight:900;letter-spacing:-.5px;}
.gal-brand-sub{font-size:10px;color:var(--dim2);margin-top:1px;font-weight:600;}
.gal-count{
  font-size:11px;color:var(--snow);background:var(--bg3);
  padding:6px 14px;border-radius:20px;border:1px solid var(--line);
  white-space:nowrap;font-weight:700;display:flex;align-items:center;gap:6px;
}
.gal-count::before{
  content:'';width:6px;height:6px;border-radius:50%;background:var(--g);
  box-shadow:0 0 8px var(--g);animation:pulse 1.6s ease-in-out infinite;
}
@keyframes pulse{50%{opacity:.4;}}

/* ── Hero ── */
.gal-hero{
  text-align:center;padding:60px 24px 28px;
  position:relative;overflow:hidden;
}
.gal-hero h1{
  font-size:clamp(30px,6vw,54px);font-weight:900;letter-spacing:-1.5px;
  margin-bottom:12px;line-height:1.05;
}
.gal-hero h1 span{
  background:linear-gradient(120deg,var(--p) 0%,var(--c) 50%,var(--b) 100%);
  background-size:200% 200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:hue 6s ease-in-out infinite;
}
@keyframes hue{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
.gal-hero p{font-size:14px;color:var(--dim2);max-width:440px;margin:0 auto;line-height:1.6;}

/* ── Stats Strip ── */
.gal-stats{
  display:flex;justify-content:center;gap:14px;margin:22px auto 0;
  max-width:540px;flex-wrap:wrap;padding:0 16px;
}
.gal-stat{
  background:rgba(13,15,27,.6);border:1px solid var(--line);
  border-radius:14px;padding:10px 18px;backdrop-filter:blur(10px);
  display:flex;align-items:center;gap:10px;min-width:120px;
  transition:var(--trans);
}
.gal-stat:hover{border-color:var(--line2);transform:translateY(-2px);}
.gal-stat-ico{font-size:18px;}
.gal-stat-val{font-size:18px;font-weight:900;line-height:1;}
.gal-stat-lbl{font-size:10px;color:var(--dim2);font-weight:600;margin-top:2px;}

/* ── Toolbar ── */
.gal-toolbar{
  padding:24px 24px 18px;max-width:1280px;margin:0 auto;
  display:flex;flex-direction:column;gap:14px;
}
.gal-search-row{display:flex;gap:10px;align-items:center;}
.gal-search-wrap{
  flex:1;position:relative;
}
.gal-search-wrap::before{
  content:'🔍';position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-size:13px;opacity:.55;pointer-events:none;
}
.gal-search{
  width:100%;background:rgba(13,15,27,.7);border:1px solid var(--line);
  border-radius:13px;padding:11px 38px 11px 14px;
  color:var(--snow);font-family:inherit;font-size:13px;outline:none;
  transition:var(--trans);backdrop-filter:blur(8px);
}
.gal-search:focus{
  border-color:rgba(139,122,248,.55);
  background:var(--bg3);
  box-shadow:0 0 0 4px rgba(139,122,248,.12);
}
.gal-search::placeholder{color:var(--dim);}
.sort-btn{
  background:rgba(13,15,27,.7);border:1px solid var(--line);
  border-radius:13px;padding:0 14px;color:var(--snow);
  font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:var(--trans);
  height:42px;flex-shrink:0;
}
.sort-btn:hover{border-color:var(--p);color:var(--p);}

.cat-filters{
  display:flex;flex-wrap:wrap;gap:8px;
}
.cat-btn{
  padding:7px 14px;border-radius:20px;border:1px solid var(--line);
  background:rgba(13,15,27,.5);color:var(--dim2);font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:var(--trans);white-space:nowrap;
  display:inline-flex;align-items:center;gap:6px;backdrop-filter:blur(6px);
}
.cat-btn:hover{border-color:rgba(139,122,248,.45);color:var(--snow);transform:translateY(-1px);}
.cat-btn.active{
  background:linear-gradient(135deg,rgba(139,122,248,.22),rgba(74,142,245,.18));
  border-color:rgba(139,122,248,.55);color:#fff;
  box-shadow:0 4px 14px rgba(139,122,248,.2);
}
.cat-btn-count{
  font-size:10px;font-weight:800;background:rgba(255,255,255,.08);
  padding:1px 7px;border-radius:10px;color:var(--snow);
}
.cat-btn.active .cat-btn-count{background:rgba(255,255,255,.18);}

/* ── Gallery Grid ── */
.gal-wrap{padding:0 24px 80px;max-width:1280px;margin:0 auto;}
.gal-grid{column-count:4;column-gap:14px;}
@media(max-width:1100px){.gal-grid{column-count:3;}}
@media(max-width:720px){.gal-grid{column-count:2;column-gap:10px;}.gal-wrap{padding:0 14px 60px;}.gal-toolbar{padding:18px 14px 14px;}}
@media(max-width:380px){.gal-grid{column-count:1;}}

.gal-card{
  break-inside:avoid;margin-bottom:14px;
  background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad3);
  overflow:hidden;cursor:zoom-in;transition:var(--trans);
  animation:fadeUp .45s cubic-bezier(.2,.8,.2,1) both;
  position:relative;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.gal-card:hover{
  border-color:rgba(139,122,248,.4);transform:translateY(-4px);
  box-shadow:0 14px 44px rgba(0,0,0,.55),0 0 0 1px rgba(139,122,248,.15);
}
.gal-card-img-wrap{
  position:relative;overflow:hidden;background:var(--bg3);
}
.gal-card-img-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,.35) 100%);
  opacity:0;transition:opacity .25s ease;pointer-events:none;
}
.gal-card:hover .gal-card-img-wrap::after{opacity:1;}
.gal-card img{
  width:100%;display:block;object-fit:cover;
  transition:transform .55s cubic-bezier(.2,.8,.2,1);
}
.gal-card:hover img{transform:scale(1.04);}
.gal-card-zoom{
  position:absolute;top:10px;left:10px;width:30px;height:30px;border-radius:50%;
  background:rgba(0,0,0,.55);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;font-size:13px;
  opacity:0;transform:translateY(-6px);transition:var(--trans);z-index:2;
}
.gal-card:hover .gal-card-zoom{opacity:1;transform:translateY(0);}
.gal-card-info{padding:11px 13px 13px;}
.gal-card-cat{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:12px;
  font-size:9px;font-weight:800;
  background:rgba(139,122,248,.14);color:var(--p);
  border:1px solid rgba(139,122,248,.22);margin-bottom:7px;
  text-transform:uppercase;letter-spacing:.4px;
}
.gal-card-title{font-size:13px;font-weight:800;margin-bottom:5px;line-height:1.4;color:var(--snow);}
.gal-card-desc{
  font-size:11px;color:var(--dim2);line-height:1.55;margin-bottom:6px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.gal-card-designer{
  font-size:10px;color:var(--dim2);margin-top:8px;
  display:flex;align-items:center;gap:5px;
  padding-top:8px;border-top:1px solid var(--line);
}
.gal-card-designer span{color:var(--p);font-weight:700;}

/* ── Skeleton Loader ── */
.gal-skel{
  break-inside:avoid;margin-bottom:14px;
  background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad3);
  overflow:hidden;
}
.skel-img{width:100%;background:linear-gradient(110deg,var(--bg3) 30%,var(--bg4) 50%,var(--bg3) 70%);
  background-size:200% 100%;animation:skel 1.4s linear infinite;}
.skel-line{height:10px;border-radius:4px;background:var(--bg3);margin:8px 12px;
  background:linear-gradient(110deg,var(--bg3) 30%,var(--bg4) 50%,var(--bg3) 70%);
  background-size:200% 100%;animation:skel 1.4s linear infinite;}
.skel-line.short{width:40%;}
@keyframes skel{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* ── States ── */
.gal-empty{text-align:center;padding:90px 24px;}
.gal-empty-ico{font-size:54px;margin-bottom:16px;opacity:.35;}
.gal-empty-txt{font-size:15px;color:var(--dim2);font-weight:600;}
.gal-empty-sub{font-size:12px;color:var(--dim);margin-top:6px;}

.gal-error{
  text-align:center;padding:80px 24px;color:var(--r);
}
.gal-error-ico{font-size:46px;margin-bottom:14px;}
.gal-error-msg{font-size:13px;color:var(--dim2);margin-top:8px;}

/* ── Lightbox ── */
.lightbox{
  display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(3,4,8,.96);backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  flex-direction:column;align-items:center;justify-content:center;padding:20px;
  animation:lbFade .25s ease;
}
@keyframes lbFade{from{opacity:0;}to{opacity:1;}}
.lightbox.open{display:flex;}
.lb-img-wrap{
  position:relative;max-width:min(92vw,900px);max-height:78vh;
  display:flex;align-items:center;justify-content:center;
}
.lb-img{
  max-width:100%;max-height:78vh;border-radius:var(--rad3);
  box-shadow:0 24px 80px rgba(0,0,0,.85);object-fit:contain;
  animation:lbZoom .35s cubic-bezier(.2,.8,.2,1);
}
@keyframes lbZoom{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}

.lb-close{
  position:fixed;top:18px;left:18px;width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
  color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:var(--trans);backdrop-filter:blur(8px);z-index:10;
}
.lb-close:hover{background:rgba(255,255,255,.18);transform:rotate(90deg);}

.lb-nav{
  position:fixed;top:50%;transform:translateY(-50%);
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
  color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:var(--trans);backdrop-filter:blur(8px);z-index:10;
  font-weight:700;
}
.lb-nav:hover{background:rgba(255,255,255,.18);}
.lb-nav.prev{right:18px;}
.lb-nav.next{left:18px;}
.lb-nav:disabled{opacity:.25;cursor:not-allowed;}

.lb-counter{
  position:fixed;top:22px;right:50%;transform:translateX(50%);
  font-size:12px;color:var(--snow);font-weight:700;
  background:rgba(255,255,255,.06);padding:6px 14px;border-radius:20px;
  border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(8px);
  z-index:10;
}

.lb-info{
  margin-top:18px;background:rgba(13,15,27,.85);border:1px solid var(--line);
  border-radius:14px;padding:12px 22px;text-align:center;max-width:560px;
  backdrop-filter:blur(10px);
}
.lb-title{font-size:14px;font-weight:800;margin-bottom:4px;color:var(--snow);}
.lb-meta{font-size:11px;color:var(--dim2);}
.lb-meta b{color:var(--p);}
.lb-desc{font-size:11px;color:var(--dim2);margin-top:6px;line-height:1.6;}

@media(max-width:720px){
  .lb-nav{width:40px;height:40px;font-size:17px;}
  .lb-nav.prev{right:10px;}
  .lb-nav.next{left:10px;}
  .lb-close{top:12px;left:12px;width:36px;height:36px;}
  .lb-counter{top:14px;}
}

/* ── Scroll-to-top ── */
.to-top{
  position:fixed;bottom:24px;left:24px;width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,var(--p),var(--b));
  border:none;color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 26px rgba(139,122,248,.4);
  transition:var(--trans);z-index:90;
  opacity:0;pointer-events:none;transform:translateY(10px);
}
.to-top.show{opacity:1;pointer-events:auto;transform:translateY(0);}
.to-top:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(139,122,248,.55);}
</style>
<script type="module" src="inbox-badge.js"></script>
<script src="wa-launcher.js?v=1" defer></script>
<script type="module" src="ai-launcher.js?v=1" defer></script>
</head>
<body>

<div class="aurora"></div>

<!-- Header -->
<header class="gal-header">
  <div class="gal-brand">
    <div class="gal-logo">🎨</div>
    <div>
      <div class="gal-brand-name">Business2Card</div>
      <div class="gal-brand-sub">معرض التصاميم</div>
    </div>
  </div>
  <div class="gal-count" id="gal-count">جاري التحميل...</div>
</header>

<!-- Hero -->
<section class="gal-hero">
  <h1>معرض <span>تصاميمنا</span></h1>
  <p>أعمال فريق التصميم — بطاقات، هويات بصرية، وأكثر من إبداعات مصمّمينا</p>

  <div class="gal-stats" id="gal-stats" style="display:none">
    <div class="gal-stat">
      <div class="gal-stat-ico">🖼️</div>
      <div>
        <div class="gal-stat-val" id="stat-designs">0</div>
        <div class="gal-stat-lbl">تصميم منشور</div>
      </div>
    </div>
    <div class="gal-stat">
      <div class="gal-stat-ico">📂</div>
      <div>
        <div class="gal-stat-val" id="stat-cats">0</div>
        <div class="gal-stat-lbl">تصنيف</div>
      </div>
    </div>
    <div class="gal-stat">
      <div class="gal-stat-ico">👨‍🎨</div>
      <div>
        <div class="gal-stat-val" id="stat-designers">0</div>
        <div class="gal-stat-lbl">مصمّم</div>
      </div>
    </div>
  </div>
</section>

<!-- Toolbar -->
<div class="gal-toolbar">
  <div class="gal-search-row">
    <div class="gal-search-wrap">
      <input class="gal-search" id="gal-search" placeholder="ابحث في التصاميم بالاسم أو التصنيف أو المصمم..." oninput="renderGallery()">
    </div>
    <button class="sort-btn" id="sort-btn" onclick="toggleSort()" title="ترتيب">
      <span id="sort-ico">🆕</span>
      <span id="sort-lbl">الأحدث</span>
    </button>
  </div>
  <div class="cat-filters" id="cat-filters">
    <button class="cat-btn active" data-cat="all" onclick="filterByCat('all',this)">
      كل التصاميم
    </button>
  </div>
</div>

<!-- Gallery -->
<div class="gal-wrap">
  <div class="gal-grid" id="gal-skeleton">
    <!-- skeleton cards injected by JS -->
  </div>
  <div class="gal-grid" id="gal-grid" style="display:none"></div>
  <div class="gal-empty" id="gal-empty" style="display:none">
    <div class="gal-empty-ico">🎨</div>
    <div class="gal-empty-txt">لا توجد تصاميم في هذا التصنيف</div>
    <div class="gal-empty-sub">جرّب تصنيفاً آخر أو امسح خانة البحث</div>
  </div>
  <div class="gal-error" id="gal-error" style="display:none">
    <div class="gal-error-ico">⚠️</div>
    <div>تعذّر تحميل المعرض</div>
    <div class="gal-error-msg" id="gal-error-msg"></div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="event.stopPropagation();closeLightbox()" title="إغلاق (Esc)">✕</button>
  <div class="lb-counter" id="lb-counter">1 / 1</div>
  <button class="lb-nav prev" onclick="event.stopPropagation();navLightbox(-1)" title="السابق">›</button>
  <button class="lb-nav next" onclick="event.stopPropagation();navLightbox(1)" title="التالي">‹</button>
  <div class="lb-img-wrap" onclick="event.stopPropagation()">
    <img class="lb-img" id="lb-img" src="" alt="">
  </div>
  <div class="lb-info" onclick="event.stopPropagation()">
    <div class="lb-title" id="lb-title"></div>
    <div class="lb-meta" id="lb-meta"></div>
    <div class="lb-desc" id="lb-desc"></div>
  </div>
</div>

<!-- Scroll to top -->
<button class="to-top" id="to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="للأعلى">↑</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",
  authDomain:"business2card-c041b.firebaseapp.com",
  projectId:"business2card-c041b",
  storageBucket:"business2card-c041b.firebasestorage.app",
  messagingSenderId:"235622448899",
  appId:"1:235622448899:web:d8652ff71082f7d003f336"
});
const db = getFirestore(app);

let allItems = [];
let visibleItems = [];
let activeCat = 'all';
let sortMode = 'newest'; // 'newest' | 'oldest' | 'name'
let lbIndex = 0;

// Inject skeletons
(function injectSkeletons(){
  const sk = document.getElementById('gal-skeleton');
  const heights = [180,260,210,300,160,240,200,280,170,250,190,230];
  sk.innerHTML = heights.map(h => `
    <div class="gal-skel">
      <div class="skel-img" style="height:${h}px"></div>
      <div class="skel-line short"></div>
      <div class="skel-line"></div>
      <div class="skel-line short" style="margin-bottom:14px"></div>
    </div>`).join('');
})();

async function loadGallery() {
  try {
    const snap = await getDocs(query(
      collection(db, 'gallery'),
      where('isVisible', '==', true)
    ));
    allItems = snap.docs.map(d => ({ ...d.data(), _id: d.id }));
    document.getElementById('gal-skeleton').style.display = 'none';
    if (!allItems.length) {
      document.getElementById('gal-empty').style.display = 'block';
      document.getElementById('gal-count').textContent = '0 تصميم';
      return;
    }
    updateStats();
    buildCategoryFilters();
    renderGallery();
  } catch(e) {
    document.getElementById('gal-skeleton').style.display = 'none';
    document.getElementById('gal-error').style.display = 'block';
    document.getElementById('gal-error-msg').textContent = e.message || '';
  }
}

function updateStats(){
  const cats = new Set(allItems.map(i => i.productType).filter(Boolean));
  const designers = new Set(allItems.map(i => i.publishedByName || i.designerName).filter(Boolean));
  document.getElementById('stat-designs').textContent = allItems.length;
  document.getElementById('stat-cats').textContent = cats.size;
  document.getElementById('stat-designers').textContent = designers.size;
  document.getElementById('gal-stats').style.display = 'flex';
}

function buildCategoryFilters() {
  const counts = {};
  allItems.forEach(i => {
    const c = i.productType || 'بدون تصنيف';
    counts[c] = (counts[c] || 0) + 1;
  });
  const cats = Object.keys(counts).sort((a,b) => counts[b] - counts[a]);
  const cfEl = document.getElementById('cat-filters');
  // update "all" button with count
  const allBtn = cfEl.querySelector('[data-cat="all"]');
  allBtn.innerHTML = `كل التصاميم <span class="cat-btn-count">${allItems.length}</span>`;
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = cat;
    btn.innerHTML = `${cat} <span class="cat-btn-count">${counts[cat]}</span>`;
    btn.onclick = () => filterByCat(cat, btn);
    cfEl.appendChild(btn);
  });
}

window.filterByCat = function(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery();
};

window.toggleSort = function() {
  const order = ['newest','oldest','name'];
  const labels = {newest:['🆕','الأحدث'], oldest:['📅','الأقدم'], name:['🔤','الاسم']};
  sortMode = order[(order.indexOf(sortMode) + 1) % order.length];
  document.getElementById('sort-ico').textContent = labels[sortMode][0];
  document.getElementById('sort-lbl').textContent = labels[sortMode][1];
  renderGallery();
};

function sortItems(items){
  const sorted = [...items];
  if (sortMode === 'newest') {
    sorted.sort((a,b) => (b.publishedAt?.seconds || 0) - (a.publishedAt?.seconds || 0));
  } else if (sortMode === 'oldest') {
    sorted.sort((a,b) => (a.publishedAt?.seconds || 0) - (b.publishedAt?.seconds || 0));
  } else if (sortMode === 'name') {
    sorted.sort((a,b) => (a.title || '').localeCompare(b.title || '', 'ar'));
  }
  return sorted;
}

window.renderGallery = function() {
  const q = (document.getElementById('gal-search')?.value || '').toLowerCase().trim();
  let items = allItems;

  if (activeCat !== 'all') {
    items = items.filter(i => (i.productType || 'بدون تصنيف') === activeCat);
  }
  if (q) {
    items = items.filter(i => {
      const hay = [i.title || '', i.productType || '', i.designerName || '', i.publishedByName || '', i.description || ''].join(' ').toLowerCase();
      return hay.includes(q);
    });
  }

  items = sortItems(items);
  visibleItems = items;

  const grid = document.getElementById('gal-grid');
  const empty = document.getElementById('gal-empty');

  document.getElementById('gal-count').textContent = `${items.length} تصميم`;

  if (!items.length) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  grid.style.display = '';
  empty.style.display = 'none';

  grid.innerHTML = items.map((item, idx) => {
    const cat = item.productType || 'تصميم';
    const designer = item.publishedByName || item.designerName || '';
    const delay = Math.min(idx * .035, .45);
    return `<div class="gal-card" style="animation-delay:${delay}s" onclick="openLightbox(${idx})">
      <div class="gal-card-img-wrap">
        <img src="${escapeAttr(item.imageUrl || '')}" alt="${escapeAttr(item.title || cat)}" loading="lazy">
        <div class="gal-card-zoom">🔍</div>
      </div>
      <div class="gal-card-info">
        <div class="gal-card-cat">${escapeHtml(cat)}</div>
        ${item.title ? `<div class="gal-card-title">${escapeHtml(item.title)}</div>` : ''}
        ${item.description ? `<div class="gal-card-desc">${escapeHtml(item.description)}</div>` : ''}
        ${designer ? `<div class="gal-card-designer">🎨 <span>${escapeHtml(designer)}</span></div>` : ''}
      </div>
    </div>`;
  }).join('');
};

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(s){return escapeHtml(s);}

window.openLightbox = function(idx) {
  lbIndex = idx;
  showLightboxItem();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
};

function showLightboxItem(){
  const item = visibleItems[lbIndex];
  if (!item) return;
  const cat = item.productType || 'تصميم';
  const designer = item.publishedByName || item.designerName || '';
  document.getElementById('lb-img').src = item.imageUrl || '';
  document.getElementById('lb-img').alt = item.title || cat;
  document.getElementById('lb-title').textContent = item.title || cat;
  const metaParts = [];
  metaParts.push(`<b>${escapeHtml(cat)}</b>`);
  if (designer) metaParts.push(`🎨 ${escapeHtml(designer)}`);
  document.getElementById('lb-meta').innerHTML = metaParts.join(' · ');
  const descEl = document.getElementById('lb-desc');
  descEl.textContent = item.description || '';
  descEl.style.display = item.description ? '' : 'none';
  document.getElementById('lb-counter').textContent = `${lbIndex + 1} / ${visibleItems.length}`;
  document.querySelector('.lb-nav.prev').disabled = lbIndex === 0;
  document.querySelector('.lb-nav.next').disabled = lbIndex === visibleItems.length - 1;
}

window.navLightbox = function(dir) {
  const next = lbIndex + dir;
  if (next < 0 || next >= visibleItems.length) return;
  lbIndex = next;
  showLightboxItem();
};

window.closeLightbox = function() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
};

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  // RTL: ArrowLeft = next, ArrowRight = prev
  else if (e.key === 'ArrowLeft') navLightbox(1);
  else if (e.key === 'ArrowRight') navLightbox(-1);
});

// Scroll-to-top button
const toTop = document.getElementById('to-top');
window.addEventListener('scroll', () => {
  toTop.classList.toggle('show', window.scrollY > 600);
}, { passive:true });

loadGallery();
</script>
</body>
</html>
