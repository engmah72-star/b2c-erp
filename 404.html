<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Business2Card ERP — تحويل…</title>
<!-- GitHub Pages catch-all: أي مسار قديم على .io يتحوّل للإنتاج الرسمي على .app.
     على .app (Firebase) صفحة الـ 404 دي مش بتتقدّم لمسارات حقيقية، فمفيش loop. -->
<script>
(function(){
  try{
    var h = location.hostname;
    if (h.indexOf('github.io') !== -1){
      location.replace('https://business2card-c041b.web.app'
        + location.pathname.replace(/^\/b2c-erp/, '')
        + location.search + location.hash);
      return;
    }
  }catch(_){}
  // fallback لو فتحت 404 على الرسمي مباشرة
  location.replace('/login.html');
})();
</script>
</head>
<body style="background:#08090f;color:#dce5f5;font-family:'Tajawal','IBM Plex Sans Arabic',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0">
  <div class="text-center">
    <div style="font-size:32px;margin-bottom:12px">🔄</div>
    <div>جارٍ التحويل للنسخة الرسمية…</div>
    <div style="margin-top:16px"><a href="https://business2card-c041b.web.app/login.html" style="color:#4a8ef5">اضغط هنا لو ما اتحوّلتش تلقائياً</a></div>
  </div>
</body>
</html>
