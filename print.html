<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0f1c">
<title>Business2Card — الطباعة</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="sync-monitor.js"></script>
<script src="finance-core.js"></script>
<style>
/* ══ Cards ══ */
.ocard{
  background:var(--bg2);border:1px solid var(--line);
  border-radius:var(--rad2);padding:14px;margin-bottom:10px;
  cursor:pointer;transition:var(--trans);
  border-right:3px solid var(--y);position:relative;
  -webkit-tap-highlight-color:transparent;
}
.ocard:active{transform:scale(.98)}
.ocard.late{border-right-color:var(--r)}

/* ══ KPIs ══ */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
.stat-val{font-size:22px;font-weight:900;line-height:1.1}
.stat-lbl{font-size:10px;color:var(--dim2);font-weight:700;margin-top:4px}

/* ══ Panel Mobile — Bottom Sheet ══ */
.panel-ov{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  display:none;align-items:flex-end;justify-content:center;
}
.panel-ov.open{display:flex}
.panel{
  width:100%;max-width:480px;height:92vh;
  background:var(--bg1);border-radius:20px 20px 0 0;
  border-top:1px solid var(--line);
  overflow:hidden;display:flex;flex-direction:column;
}
.panel-drag{width:44px;height:4px;background:var(--line2);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.panel-head{
  padding:12px 16px;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  flex-shrink:0;flex-wrap:wrap;
}
.panel-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel-footer{
  padding:12px 16px;border-top:1px solid var(--line);
  background:var(--bg1);flex-shrink:0;
  display:flex;gap:8px;
}

/* ══ Sections in Panel ══ */
.section{padding:14px 16px;border-bottom:1px solid var(--line)}
.section-title{font-size:11px;font-weight:800;color:var(--dim2);margin-bottom:10px;letter-spacing:.3px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px;border-bottom:1px solid var(--line)}
.prow:last-child{border-bottom:none}
.prow-lbl{color:var(--dim2);font-size:12px}
.prow-val{font-weight:700}

/* ══ Upload ══ */
.upload-zone{
  border:2px dashed var(--line);border-radius:12px;
  padding:20px;text-align:center;cursor:pointer;
  background:var(--bg2);-webkit-tap-highlight-color:transparent;
}
.upload-zone:active{border-color:var(--b)}

/* ══ Mobile adjustments ══ */
@media(max-width:768px){
  .content{padding:12px}
  .ocard{padding:12px}
  .topbar h1{font-size:16px}
}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">ERP</div></div></div>
  <div class="nav-scroll" id="nav-scroll-dynamic"></div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">A</div><div><div class="nav-user-name" id="nav-name">—</div><div class="nav-user-role">تسجيل خروج</div></div></div></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div><h1>🖨️ الطباعة</h1><p id="sub" style="font-size:12px;color:var(--dim2)">جاري التحميل...</p></div>
    </div>
  </div>
  <div class="content">
    <!-- بحث -->
    <div style="position:relative;margin-bottom:14px">
      <input class="inp" id="print-search" placeholder="🔍 بحث..." oninput="filterPrintList(this.value)" style="background:var(--bg2)">
    </div>
    <!-- KPIs -->
    <div class="stats">
      <div class="stat" style="border-top:3px solid var(--b)"><div class="stat-val" id="s-total" style="color:var(--b)">—</div><div class="stat-lbl">🖨️ الأوردرات</div></div>
      <div class="stat" style="border-top:3px solid var(--r)"><div class="stat-val" id="s-late" style="color:var(--r)">—</div><div class="stat-lbl">⚠️ متأخرة</div></div>
      <div class="stat" style="border-top:3px solid var(--g)"><div class="stat-val" id="s-rev" style="color:var(--g);font-size:16px">—</div><div class="stat-lbl">💰 إيرادات ج</div></div>
      <div class="stat" style="border-top:3px solid var(--y)"><div class="stat-val" id="s-rem" style="color:var(--y);font-size:16px">—</div><div class="stat-lbl">💳 باقي ج</div></div>
    </div>
    <!-- القائمة -->
    <div id="list"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- Panel -->
<div class="panel-ov" id="panel-ov" onclick="if(event.target===this)closePanel()">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-drag"></div>
    <div class="panel-head">
      <div id="pn-hdr" style="flex:1;min-width:0"></div>
      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
        <a id="pn-wa-btn" href="#" target="_blank" style="display:none;padding:6px 12px;border-radius:8px;background:rgba(37,211,102,.12);border:1px solid rgba(37,211,102,.3);color:#25D366;font-size:13px;font-weight:700;text-decoration:none">💬</a>
        <button class="btn btn-b btn-sm" onclick="moveTo('production')">🏭 للتنفيذ</button>
        <button class="btn btn-c btn-sm" id="pn-ship" onclick="moveTo('shipping')" style="display:none">🚚</button>
        <button class="modal-x" onclick="closePanel()">✕</button>
      </div>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>

<!-- Modal: تعديل منتج -->
<div class="overlay" id="ov-edit-prod">
  <div class="modal" style="max-width:460px">
    <div class="modal-head"><span class="modal-title" id="ep-title">✏️ تعديل منتج</span><button class="modal-x" onclick="cM('edit-prod')">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label>اسم المنتج</label><div id="ep-prod-name" style="font-size:13px;font-weight:800;padding:8px;background:var(--bg3);border-radius:8px">—</div></div>
      <div class="fg"><label>صورة المنتج</label>
        <div id="ep-img-preview-wrap" onclick="document.getElementById('ep-img-inp').click()" class="upload-zone">
          <div style="font-size:28px;margin-bottom:6px">🖼️</div>
          <div style="font-size:12px;color:var(--dim2)">ارفع صورة أو اسحب هنا</div>
        </div>
        <input type="file" id="ep-img-inp" accept="image/*" style="display:none" onchange="uploadEpImage(this)">
      </div>
      <div class="fg"><label>إضافات</label>
        <div id="ep-addons-presets" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px"></div>
        <div id="ep-addons-selected" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="cM('edit-prod')">إلغاء</button><button class="btn btn-b" onclick="saveEditProd()">✓ حفظ</button></div>
  </div>
</div>

<!-- Modal: تحصيل دفعة -->
<div class="overlay" id="ov-collect">
  <div class="modal" style="max-width:400px">
    <div class="modal-head"><span class="modal-title">💰 تحصيل دفعة</span><button class="modal-x" onclick="cM('collect')">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label>المبلغ (ج)</label><input class="inp" id="col-preview" type="number" placeholder="0" oninput="updateColPreview()"></div>
      <div class="fg"><label>طريقة الدفع</label><div id="col-wallets" style="display:flex;gap:8px;flex-wrap:wrap"></div><input type="hidden" id="col-wid"><input type="hidden" id="col-wname"></div>
      <div id="col-transfer-row" style="display:none" class="fg"><label>إيصال التحويل</label>
        <div id="col-img-preview-wrap" onclick="document.getElementById('col-img-inp').click()" class="upload-zone">
          <div style="font-size:22px">📸</div><div style="font-size:11px;color:var(--dim2)">ارفع الإيصال</div>
        </div>
        <input type="file" id="col-img-inp" accept="image/*" style="display:none">
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="cM('collect')">إلغاء</button><button class="btn btn-g" onclick="saveCollect()">✓ تأكيد</button></div>
  </div>
</div>

<!-- Modal: دفعة متقدمة -->
<div class="overlay" id="ov-advpay">
  <div class="modal" style="max-width:420px">
    <div class="modal-head"><span class="modal-title">💳 دفعة متقدمة</span><button class="modal-x" onclick="cM('advpay')">✕</button></div>
    <div class="modal-body">
      <div id="adv-sale-info" style="background:var(--bg3);border-radius:10px;padding:10px;margin-bottom:12px;font-size:12px"></div>
      <div class="fg"><label>المحفظة</label><div id="adv-wallets" style="display:flex;gap:8px;flex-wrap:wrap"></div><input type="hidden" id="adv-wid"><input type="hidden" id="adv-wname"></div>
      <div class="fg"><label>المبلغ (ج)</label><input class="inp" id="adv-preview" type="number" placeholder="0"></div>
      <div id="adv-transfer-row" style="display:none" class="fg"><label>إيصال التحويل</label><div style="font-size:12px;color:var(--dim2)">ارفع الإيصال</div></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="cM('advpay')">إلغاء</button><button class="btn btn-g" onclick="saveAdvPay()">✓ تأكيد</button></div>
  </div>
</div>

<!-- Modal: رفض -->
<div class="overlay" id="ov-reject">
  <div class="modal" style="max-width:380px">
    <div class="modal-head"><span class="modal-title">❌ رفض التصميم</span><button class="modal-x" onclick="cM('reject')">✕</button></div>
    <div class="modal-body"><div class="fg"><label>سبب الرفض</label><textarea class="inp" id="reject-reason" rows="3" placeholder="سبب الرفض..."></textarea></div></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="cM('reject')">إلغاء</button><button class="btn btn-r" onclick="confirmReject()">❌ تأكيد الرفض</button></div>
  </div>
</div>

<!-- Upload overlays -->
<div id="print-prog-wrap" style="display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 16px;z-index:500;min-width:200px;text-align:center">
  <div style="font-size:12px;color:var(--dim2);margin-bottom:6px" id="print-prog-txt">0%</div>
  <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden"><div id="print-prog-bar" style="height:100%;background:var(--p);border-radius:3px;width:0%;transition:width .3s"></div></div>
</div>
<input type="file" id="print-final-inp" accept="image/*,application/pdf" style="display:none" onchange="uploadPrintFinal(this)">

<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div id="toasts" class="toasts"></div>

<script type="module">
import {initializeApp} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getAuth,onAuthStateChanged,signOut} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {getFirestore,collection,doc,onSnapshot,addDoc,updateDoc,getDoc,query,where,serverTimestamp} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {getStorage,ref,uploadBytesResumable,getDownloadURL} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const FB={apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"};
const app=initializeApp(FB);
const auth=getAuth(app),db=getFirestore(app),storage=getStorage(app);

// ══ Sidebar ══
const SBPAGES=[{file:'index.html',label:'لوحة التحكم',ico:'⬡',adminOnly:true},{file:'clients.html',label:'العملاء',ico:'👤',perm:'clients'},{file:'design.html',label:'التصميم',ico:'✏️',perm:'design'},{file:'print.html',label:'الطباعة',ico:'🖨️',perm:'print'},{file:'production.html',label:'التنفيذ',ico:'🏭',perm:'production'},{file:'shipping.html',label:'الشحن',ico:'🚚',perm:'shipping'},{file:'shipping-accounts.html',label:'حسابات الشحن',ico:'📦',perm:'shipping-accounts'},{file:'archive.html',label:'الأرشيف',ico:'📁',perm:'archive'},{file:'accounts.html',label:'الحسابات',ico:'💰',perm:'accounts'},{file:'suppliers.html',label:'الموردين',ico:'▣',perm:'suppliers'},{file:'employees.html',label:'الموظفين',ico:'👥',adminOnly:true},{file:'reports.html',label:'التقارير',ico:'📊',perm:'reports'},{file:'settings.html',label:'الإعدادات',ico:'⚙️',adminOnly:true}];
function buildSidebar(ud,cur){const role=ud?.role||'customer_service';const pages=(ud?.permissions?.pages)||[];const isAdm=['admin','operation_manager'].includes(role);const nav=document.getElementById('nav-scroll-dynamic');if(!nav)return;let html='';for(const p of SBPAGES){const ok=isAdm||(p.adminOnly?false:pages.includes('*')||pages.includes(p.perm||''));if(!ok)continue;html+=`<a class="nav-link${cur===p.file?' active':''}" href="${p.file}"><span class="nav-ico">${p.ico}</span> ${p.label}</a>`;}nav.innerHTML=html;}

// ══ State ══
let orders=[],wallets=[],settings={},currentUser=null,userName='',currentRole='admin',activeId=null;
let isAdmin=true;

// ══ Helpers ══
const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const gv=id=>document.getElementById(id)?.value||'';
const sv=(id,v)=>{const e=document.getElementById(id);if(e)e.value=v;};
const setText=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
const cM=id=>document.getElementById('ov-'+id)?.classList.remove('open');
const oM=id=>document.getElementById('ov-'+id)?.classList.add('open');
window.cM=cM;window.oM=oM;
const nowStr=()=>new Date().toLocaleDateString('ar-EG')+' '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
const toast=(msg,t='')=>{const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);};
const delay=dl=>{if(!dl)return 0;const d=new Date(dl);return d<new Date()?Math.floor((new Date()-d)/864e5):0;};

window.toggleNav=()=>{document.querySelector('.sidenav')?.classList.toggle('mob-open');document.getElementById('nav-ov')?.classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav')?.classList.remove('mob-open');document.getElementById('nav-ov')?.classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};

// ══ Auth ══
let __started=false;
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  if(__started)return;__started=true;
  currentUser=u;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(snap.exists()){
    const d=snap.data();
    userName=d.name||u.email;
    currentRole=d.role||'admin';
    isAdmin=['admin','operation_manager','customer_service'].includes(currentRole);
    setText('nav-name',userName);
    document.getElementById('nav-av').textContent=(userName[0]||'A').toUpperCase();
    document.getElementById('role-badge').textContent=currentRole;
    buildSidebar(d,'print.html');
  }
  startListeners();
});

function startListeners(){
  onSnapshot(query(collection(db,'orders'),where('stage','==','printing')),snap=>{
    window.markSynced&&window.markSynced();
    orders=snap.docs.map(d=>({...d.data(),_id:d.id})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    updateKPIs();renderList();
    if(activeId){const o=orders.find(x=>x._id===activeId);if(o)renderPanel(o);}
  });
  onSnapshot(collection(db,'wallets'),snap=>{
    wallets=snap.docs.map(d=>({...d.data(),_id:d.id}));
  });
  onSnapshot(collection(db,'settings').doc('main'),snap=>{
    if(snap.exists())settings=snap.data();
  });
}

// ══ KPIs ══
function updateKPIs(){
  const late=orders.filter(o=>delay(o.deadline)>0).length;
  const rev=orders.reduce((s,o)=>s+(parseFloat(o.salePrice)||0),0);
  const rem=orders.reduce((s,o)=>s+(parseFloat(o.remaining)||Math.max(0,(parseFloat(o.salePrice)||0)-(parseFloat(o.totalPaid)||parseFloat(o.paid)||0))),0);
  setText('s-total',orders.length);
  setText('s-late',late||'—');
  setText('s-rev',fn(rev)+' ج');
  setText('s-rem',fn(rem)+' ج');
  setText('sub',orders.length+' أوردر طباعة');
}

// ══ Filter ══
window.filterPrintList=function(q){
  const s=(q||'').toLowerCase().trim();
  document.querySelectorAll('.ocard').forEach(card=>{
    const t=(card.dataset.client||'').toLowerCase()+(card.dataset.id||'').toLowerCase();
    card.style.display=!s||t.includes(s)?'':'none';
  });
};

// ══ Render List ══
window.renderList=function(){
  const el=document.getElementById('list');if(!el)return;
  if(!orders.length){el.innerHTML='<div class="empty"><div class="empty-icon">🖨️</div><div class="empty-text">لا توجد أوردرات طباعة</div></div>';return;}
  el.innerHTML=orders.map(o=>{
    const d=delay(o.deadline);
    const prods=(o.products||[]).map(p=>p.name+'×'+p.qty).join(' · ')||o.product||'—';
    const paid=parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0;
    const rem=parseFloat(o.remaining)||Math.max(0,(parseFloat(o.salePrice)||0)-paid);
    return`<div class="ocard ${d>0?'late':''}" data-client="${o.clientName||''}" data-id="${o.orderId||o._id}" onclick="openOrder('${o._id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px">
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:900">${o.clientName||'—'} ${d>0?`<span style="color:var(--r);font-size:11px">⚠️${d}يوم</span>`:''}</div>
          <div style="font-size:11px;color:var(--dim2);margin-top:3px">${prods}</div>
          <div style="font-size:10px;color:var(--dim2);margin-top:2px">${o.orderId||o._id.slice(-6)} · ${o.createdDate||'—'}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <span style="font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(59,158,255,.12);color:var(--b);font-weight:700">${o.printType||'⏳ لم يُحدد'}</span>
          ${parseFloat(o.salePrice)>0?`<span style="font-size:12px;font-weight:900;color:var(--b)">${fn(parseFloat(o.salePrice))} ج</span>`:''}
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--line)">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          ${o.printFinalUrl?'<span style="font-size:11px;color:var(--g);font-weight:700">📁 ملف مرفق ✅</span>':'<span style="font-size:11px;color:var(--dim2)">⏳ لا يوجد ملف</span>'}
          ${o.qty?`<span style="font-size:11px;color:var(--dim2)">📦${o.qty} قطعة</span>`:''}
        </div>
        ${rem>0?`<span style="font-size:11px;font-weight:800;color:var(--r)">باقي ${fn(rem)} ج</span>`:''}
      </div>
    </div>`;
  }).join('');
};

// ══ Open Order ══
window.openOrder=function(id){
  activeId=id;
  const o=orders.find(x=>x._id===id);if(!o)return;
  document.getElementById('pn-hdr').innerHTML=`
    <div>
      <div style="font-size:10px;color:var(--y);font-weight:700">🖨️ طباعة · ${o.orderId||id.slice(-6)}</div>
      <div style="font-size:16px;font-weight:800">${o.clientName||'—'}</div>
      <div style="font-size:12px;color:var(--dim2)">${o.clientPhone||'—'}</div>
    </div>`;
  // واتساب
  const waBtn=document.getElementById('pn-wa-btn');
  if(waBtn&&o.clientPhone){waBtn.href='https://wa.me/2'+(o.clientPhone||'').replace(/^0/,'');waBtn.style.display='inline-flex';}
  else if(waBtn)waBtn.style.display='none';
  // ship btn
  const shipBtn=document.getElementById('pn-ship');
  const paid=parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0;
  const rem=parseFloat(o.remaining)||Math.max(0,(parseFloat(o.salePrice)||0)-paid);
  if(shipBtn)shipBtn.style.display=(rem===0&&parseFloat(o.salePrice)>0)?'':'none';
  document.getElementById('panel-ov').classList.add('open');
  renderPanel(o);
};

window.closePanel=function(){
  document.getElementById('panel-ov').classList.remove('open');
  activeId=null;
};

// ══ Render Panel ══
function renderPanel(o){
  const paid=parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0;
  const sale=parseFloat(o.salePrice)||0;
  const rem=parseFloat(o.remaining)||Math.max(0,sale-paid);
  const pct=sale>0?Math.min(paid/sale*100,100):0;
  const prods=(o.products||[]).map(p=>p.name+'×'+p.qty).join(' · ')||o.product||'—';
  document.getElementById('panel-body').innerHTML=`
    <!-- بيانات الأوردر -->
    <div class="section">
      <div class="section-title">📋 بيانات الأوردر</div>
      ${pRow('الأوردر',o.orderId||o._id.slice(-6))}
      ${pRow('التاريخ',o.createdDate||'—')}
      ${pRow('المنتجات',prods)}
      ${o.qty?pRow('الكمية',fn(o.qty||0)+' قطعة'):''}
      ${pRow('نوع الطباعة',o.printType||'—')}
      ${o.deadline?pRow('موعد التسليم',`<span style="color:${delay(o.deadline)>0?'var(--r)':'inherit'}">${o.deadline}${delay(o.deadline)>0?' ⚠️':''}</span>`):''}
      ${o.salePrice?pRow('السعر الكلي',fn(sale)+' ج'):''}
      ${rem>0?pRow('الباقي',`<span style="color:var(--r);font-weight:900">${fn(rem)} ج</span>`):''}
    </div>

    <!-- التصميم المرجعي -->
    ${o.refFileUrl||o.designNote?`<div class="section">
      <div class="section-title">🎨 بيانات التصميم</div>
      ${o.designNote?`<div style="padding:8px;background:var(--bg3);border-radius:8px;font-size:12px;color:var(--dim2);margin-bottom:8px">${o.designNote}</div>`:''}
      ${o.refFileUrl?`<a href="${o.refFileUrl}" target="_blank" style="display:flex;align-items:center;gap:8px;padding:10px;background:rgba(59,158,255,.08);border:1px solid rgba(59,158,255,.2);border-radius:10px;color:var(--b);text-decoration:none;font-weight:700;font-size:12px">📎 الملف المرجعي</a>`:''}
    </div>`:''}

    <!-- صورة التصميم -->
    ${o.designImageUrl||((o.products||[]).some(p=>p.designImageUrl))?`<div class="section">
      <div class="section-title">🖼️ صورة التصميم النهائية للطبع</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px">
        ${[...(o.products||[]).filter(p=>p.designImageUrl).map(p=>({url:p.designImageUrl,name:p.name})),
           ...(o.designImageUrl&&!(o.products||[]).some(p=>p.designImageUrl)?[{url:o.designImageUrl,name:'التصميم'}]:[])
        ].map(img=>`<div onclick="window.open('${img.url}','_blank')" style="cursor:zoom-in;border-radius:10px;overflow:hidden;background:var(--bg3);border:1px solid var(--line)">
          <img src="${img.url}" loading="lazy" style="width:100%;height:90px;object-fit:contain;display:block">
          <div style="font-size:9px;color:var(--dim2);padding:3px 6px;text-align:center">${img.name}</div>
        </div>`).join('')}
      </div>
    </div>`:''}

    <!-- رفع الملف النهائي للمطبعة -->
    <div class="section">
      <div class="section-title">📁 الملف النهائي للمطبعة</div>
      ${o.printFinalUrl?`
        <div style="margin-bottom:10px">
          ${o.printFinalType?.includes('pdf')?
            `<a href="${o.printFinalUrl}" target="_blank" style="display:flex;align-items:center;gap:8px;padding:12px;background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);border-radius:10px;color:var(--p);text-decoration:none;font-weight:700">📄 فتح الملف النهائي (PDF)</a>`:
            `<img src="${o.printFinalUrl}" onclick="window.open('${o.printFinalUrl}','_blank')" style="width:100%;border-radius:10px;border:1px solid var(--line);cursor:zoom-in;max-height:180px;object-fit:contain;background:var(--bg3)">`}
        </div>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('print-final-inp').click()">🔄 تغيير الملف</button>
      `:`
        <div class="upload-zone" onclick="document.getElementById('print-final-inp').click()">
          <div style="font-size:28px;margin-bottom:8px">📁</div>
          <div style="font-size:13px;font-weight:700">ارفع الملف النهائي للمطبعة</div>
          <div style="font-size:11px;color:var(--dim2);margin-top:4px">صورة أو PDF · Ctrl+V للصق</div>
        </div>
      `}
      <div id="print-prog-wrap" style="display:none;margin-top:8px">
        <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden">
          <div id="print-prog-bar" style="height:100%;background:var(--p);border-radius:3px;width:0%;transition:width .3s"></div>
        </div>
        <div id="print-prog-txt" style="font-size:11px;color:var(--dim2);text-align:center;margin-top:4px">0%</div>
      </div>
    </div>

    <!-- المالية -->
    ${sale>0?`<div class="section">
      <div class="section-title">💰 المالية</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px">
        <div style="text-align:center;background:var(--bg3);border-radius:8px;padding:8px">
          <div style="font-size:14px;font-weight:900;color:var(--b)">${fn(sale)} ج</div>
          <div style="font-size:10px;color:var(--dim2)">الإجمالي</div>
        </div>
        <div style="text-align:center;background:var(--bg3);border-radius:8px;padding:8px">
          <div style="font-size:14px;font-weight:900;color:var(--g)">${fn(paid)} ج</div>
          <div style="font-size:10px;color:var(--dim2)">محصّل</div>
        </div>
        <div style="text-align:center;background:${rem>0?'rgba(255,61,110,.08)':'var(--bg3)'};border-radius:8px;padding:8px">
          <div style="font-size:14px;font-weight:900;color:${rem>0?'var(--r)':'var(--g)'}">
            ${rem>0?fn(rem)+' ج':'✅'}
          </div>
          <div style="font-size:10px;color:var(--dim2)">باقي</div>
        </div>
      </div>
      ${sale>0?`<div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${pct>=100?'var(--g)':pct>50?'var(--b)':'var(--y)'};border-radius:3px;transition:width .4s"></div>
      </div><div style="font-size:10px;color:var(--dim2);text-align:left;margin-top:3px">${Math.round(pct)}% محصّل</div>`:''}
    </div>`:''}

    <!-- السجل -->
    <div class="section" style="border-bottom:none">
      <div class="section-title">📋 السجل</div>
      ${(o.timeline||[]).slice().reverse().slice(0,8).map(t=>`
        <div style="font-size:11px;color:var(--dim2);padding:5px 0;border-bottom:1px solid var(--line);line-height:1.4">
          <span style="color:var(--b);font-weight:700">${t.date}</span> — ${t.action}
        </div>`).join('')||'<div style="color:var(--dim2);font-size:12px">لا يوجد سجل</div>'}
    </div>
  `;
}

function pRow(l,v){return`<div class="prow"><span class="prow-lbl">${l}</span><span class="prow-val">${v}</span></div>`;}

// ══ Move to Production ══
window.moveTo=async function(stage){
  if(!activeId)return;
  if(!confirm(`تحويل للمرحلة التالية؟`))return;
  const o=orders.find(x=>x._id===activeId);if(!o)return;
  try{
    await updateDoc(doc(db,'orders',activeId),{
      stage,
      timeline:[...(o.timeline||[]),{date:nowStr(),action:`🏭 انتقل من الطباعة → ${stage==='production'?'التنفيذ':'الشحن'}`,by:userName}],
      updatedAt:serverTimestamp()
    });
    closePanel();
    toast(`✅ انتقل للمرحلة التالية`,'ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

// ══ Upload Print Final ══
window.uploadPrintFinal=async function(inp){
  const file=inp?.files?.[0];if(!file)return;
  await _uploadPrintFile(file);
};

document.addEventListener('paste',function(e){
  const panel=document.getElementById('panel-ov');
  if(!panel?.classList.contains('open'))return;
  const items=e.clipboardData?.items;if(!items)return;
  for(const item of items){
    if(item.type.startsWith('image/')){const f=item.getAsFile();if(f)_uploadPrintFile(f);break;}
  }
});

async function _uploadPrintFile(file){
  if(!activeId)return;
  const o=orders.find(x=>x._id===activeId);if(!o)return;
  const pw=document.getElementById('print-prog-wrap');
  const pb=document.getElementById('print-prog-bar');
  const pt=document.getElementById('print-prog-txt');
  if(pw)pw.style.display='block';
  try{
    // ضغط الصورة
    let uploadFile=file;
    if(file.type.startsWith('image/')){
      uploadFile=await new Promise(res=>{
        const img=new Image();
        const url=URL.createObjectURL(file);
        img.onload=()=>{
          URL.revokeObjectURL(url);
          const canvas=document.createElement('canvas');
          let {width,height}=img;
          if(width>1200){height=Math.round(height*1200/width);width=1200;}
          canvas.width=width;canvas.height=height;
          canvas.getContext('2d').drawImage(img,0,0,width,height);
          canvas.toBlob(blob=>{res(new File([blob],file.name,{type:'image/jpeg'}));},'image/jpeg',0.8);
        };
        img.onerror=()=>res(file);
        img.src=url;
      });
    }
    const sRef=ref(storage,`print-finals/${activeId}_${Date.now()}`);
    const task=uploadBytesResumable(sRef,uploadFile);
    await new Promise((res,rej)=>{
      task.on('state_changed',
        s=>{const p=Math.round(s.bytesTransferred/s.totalBytes*100);if(pb)pb.style.width=p+'%';if(pt)pt.textContent=p+'%';},
        rej,
        async()=>{
          const url=await getDownloadURL(task.snapshot.ref);
          await updateDoc(doc(db,'orders',activeId),{
            printFinalUrl:url,printFinalType:file.type,
            timeline:[...(o.timeline||[]),{date:nowStr(),action:'📁 رُفع الملف النهائي للمطبعة',by:userName}],
            updatedAt:serverTimestamp()
          });
          if(pw)pw.style.display='none';
          toast('✅ تم رفع الملف','ok');
          // أعد رسم الـ panel
          const updated=orders.find(x=>x._id===activeId);
          if(updated)renderPanel({...updated,printFinalUrl:url,printFinalType:file.type});
          res();
        }
      );
    });
  }catch(e){if(pw)pw.style.display='none';toast('❌ '+e.message,'err');}
}
</script>
