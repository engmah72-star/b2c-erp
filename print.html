<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0f1c">
<title>Business2Card — الطباعة</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="sync-monitor.js"></script>
<script src="finance-core.js"></script>
<style>
/* ══ Cards ══ */
.ocard{
  background:var(--bg2);border:1px solid var(--line);
  border-radius:var(--rad2);padding:14px;margin-bottom:10px;
  cursor:pointer;transition:var(--trans);
  border-right:3px solid var(--y);position:relative;
  -webkit-tap-highlight-color:transparent;
}
.ocard:active{transform:scale(.98)}
.ocard.late{border-right-color:var(--r)}

/* ══ KPIs ══ */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
.stat-val{font-size:22px;font-weight:900;line-height:1.1}
.stat-lbl{font-size:10px;color:var(--dim2);font-weight:700;margin-top:4px}

/* ══ Panel Mobile — Bottom Sheet ══ */
.panel-ov{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  display:none;align-items:flex-end;justify-content:center;
}
.panel-ov.open{display:flex}
.panel{
  width:100%;max-width:480px;height:92vh;
  background:var(--bg1);border-radius:20px 20px 0 0;
  border-top:1px solid var(--line);
  overflow:hidden;display:flex;flex-direction:column;
}
.panel-drag{width:44px;height:4px;background:var(--line2);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.panel-head{
  padding:12px 16px;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  flex-shrink:0;flex-wrap:wrap;
}
.panel-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel-footer{
  padding:12px 16px;border-top:1px solid var(--line);
  background:var(--bg1);flex-shrink:0;
  display:flex;gap:8px;
}

/* ══ Sections in Panel ══ */
.section{padding:14px 16px;border-bottom:1px solid var(--line)}
.section-title{font-size:11px;font-weight:800;color:var(--dim2);margin-bottom:10px;letter-spacing:.3px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px;border-bottom:1px solid var(--line)}
.prow:last-child{border-bottom:none}
.prow-lbl{color:var(--dim2);font-size:12px}
.prow-val{font-weight:700}

/* ══ Upload ══ */
.upload-zone{
  border:2px dashed var(--line);border-radius:12px;
  padding:20px;text-align:center;cursor:pointer;
  background:var(--bg2);-webkit-tap-highlight-color:transparent;
}
.upload-zone:active{border-color:var(--b)}

/* ══ Mobile adjustments ══ */
@media(max-width:768px){
  .content{padding:12px}
  .ocard{padding:12px}
  .topbar h1{font-size:16px}
}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">ERP</div></div></div>
  <div class="nav-scroll" id="nav-scroll-dynamic"></div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">A</div><div><div class="nav-user-name" id="nav-name">—</div><div class="nav-user-role">تسجيل خروج</div></div></div></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div><h1>🖨️ الطباعة</h1><p id="sub" style="font-size:12px;color:var(--dim2)">جاري التحميل...</p></div>
    </div>
  </div>
  <div class="content">
    <!-- بحث -->
    <div style="position:relative;margin-bottom:14px">
      <input class="inp" id="print-search" placeholder="🔍 بحث..." oninput="filterPrintList(this.value)" style="background:var(--bg2)">
    </div>
    <!-- KPIs -->
    <div class="stats">
      <div class="stat" style="border-top:3px solid var(--b)"><div class="stat-val" id="s-total" style="color:var(--b)">—</div><div class="stat-lbl">🖨️ الأوردرات</div></div>
      <div class="stat" style="border-top:3px solid var(--r)"><div class="stat-val" id="s-late" style="color:var(--r)">—</div><div class="stat-lbl">⚠️ متأخرة</div></div>
      <div class="stat" style="border-top:3px solid var(--g)"><div class="stat-val" id="s-rev" style="color:var(--g);font-size:16px">—</div><div class="stat-lbl">💰 إيرادات ج</div></div>
      <div class="stat" style="border-top:3px solid var(--y)"><div class="stat-val" id="s-rem" style="color:var(--y);font-size:16px">—</div><div class="stat-lbl">💳 باقي ج</div></div>
    </div>
    <!-- القائمة -->
    <div id="list"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- Panel -->
<div class="panel-ov" id="panel-ov" onclick="if(event.target===this)closePanel()">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-drag"></div>
    <div class="panel-head">
      <div id="pn-hdr" style="flex:1;min-width:0"></div>
      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
        <a id="pn-wa-btn" href="#" target="_blank" style="display:none;padding:6px 12px;border-radius:8px;background:rgba(37,211,102,.12);border:1px solid rgba(37,211,102,.3);color:#25D366;font-size:13px;font-weight:700;text-decoration:none">💬</a>
        <button class="btn btn-b btn-sm" onclick="moveTo('production')">🏭 للتنفيذ</button>
        <button class="btn btn-c btn-sm" id="pn-ship" onclick="moveTo('shipping')" style="display:none">🚚</button>
        <button class="modal-x" onclick="closePanel()">✕</button>
      </div>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>

<!-- Modal: تعديل منتج -->
<div class="overlay" id="ov-edit-prod">
  <div class="modal" style="max-width:460px">
    <div class="modal-head"><span class="modal-title" id="ep-title">✏️ تعديل منتج</span><button class="modal-x" onclick="cM('edit-prod')">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label>اسم المنتج</label><div id="ep-prod-name" style="font-size:13px;font-weight:800;padding:8px;background:var(--bg3);border-radius:8px">—</div></div>
      <div class="fg"><label>صورة المنتج</label>
        <div id="ep-img-preview-wrap" onclick="document.getElementById('ep-img-inp').click()" class="upload-zone">
          <div style="font-size:28px;margin-bottom:6px">🖼️</div>
          <div style="font-size:12px;color:var(--dim2)">ارفع صورة أو اسحب هنا</div>
        </div>
        <input type="file" id="ep-img-inp" accept="image/*" style="display:none" onchange="uploadEpImage(this)">
      </div>
      <div class="fg"><label>إضافات</label>
        <div id="ep-addons-presets" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px"></div>
        <div id="ep-addons-selected" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="cM('edit-prod')">إلغاء</button><button class="btn btn-b" onclick="saveEditProd()">✓ حفظ</button></div>
  </div>
</div>

<!-- Modal: تحصيل دفعة -->
<div class="overlay" id="ov-collect">
  <div class="modal" style="max-width:400px">
    <div class="modal-head"><span class="modal-title">💰 تحصيل دفعة</span><button class="modal-x" onclick="cM('collect')">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label>المبلغ (ج)</label><input class="inp" id="col-preview" type="number" placeholder="0" oninput="updateColPreview()"></div>
      <div class="fg"><label>طريقة الدفع</label><div id="col-wallets" style="display:flex;gap:8px;flex-wrap:wrap"></div><input type="hidden" id="col-wid"><input type="hidden" id="col-wname"></div>
      <div id="col-transfer-row" style="display:none" class="fg"><label>إيصال التحويل</label>
        <div id="col-img-preview-wrap" onclick="document.getElementById('col-img-inp').click()" class="upload-zone">
          <div style="font-size:22px">📸</div><div style="font-size:11px;color:var(--dim2)">ارفع الإيصال</div>
        </div>
        <input type="file" id="col-img-inp" accept="image/*" style="display:none">
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="cM('collect')">إلغاء</button><button class="btn btn-g" onclick="saveCollect()">✓ تأكيد</button></div>
  </div>
</div>

<!-- Modal: دفعة متقدمة -->
<div class="overlay" id="ov-advpay">
  <div class="modal" style="max-width:420px">
    <div class="modal-head"><span class="modal-title">💳 دفعة متقدمة</span><button class="modal-x" onclick="cM('advpay')">✕</button></div>
    <div class="modal-body">
      <div id="adv-sale-info" style="background:var(--bg3);border-radius:10px;padding:10px;margin-bottom:12px;font-size:12px"></div>
      <div class="fg"><label>المحفظة</label><div id="adv-wallets" style="display:flex;gap:8px;flex-wrap:wrap"></div><input type="hidden" id="adv-wid"><input type="hidden" id="adv-wname"></div>
      <div class="fg"><label>المبلغ (ج)</label><input class="inp" id="adv-preview" type="number" placeholder="0"></div>
      <div id="adv-transfer-row" style="display:none" class="fg"><label>إيصال التحويل</label><div style="font-size:12px;color:var(--dim2)">ارفع الإيصال</div></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="cM('advpay')">إلغاء</button><button class="btn btn-g" onclick="saveAdvPay()">✓ تأكيد</button></div>
  </div>
</div>

<!-- Modal: رفض -->
<div class="overlay" id="ov-reject">
  <div class="modal" style="max-width:380px">
    <div class="modal-head"><span class="modal-title">❌ رفض التصميم</span><button class="modal-x" onclick="cM('reject')">✕</button></div>
    <div class="modal-body"><div class="fg"><label>سبب الرفض</label><textarea class="inp" id="reject-reason" rows="3" placeholder="سبب الرفض..."></textarea></div></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="cM('reject')">إلغاء</button><button class="btn btn-r" onclick="confirmReject()">❌ تأكيد الرفض</button></div>
  </div>
</div>

<!-- Upload overlays -->
<div id="print-prog-wrap" style="display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 16px;z-index:500;min-width:200px;text-align:center">
  <div style="font-size:12px;color:var(--dim2);margin-bottom:6px" id="print-prog-txt">0%</div>
  <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden"><div id="print-prog-bar" style="height:100%;background:var(--p);border-radius:3px;width:0%;transition:width .3s"></div></div>
</div>
<input type="file" id="print-final-inp" accept="image/*,application/pdf" style="display:none" onchange="uploadPrintFinal(this)">

<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div id="toasts" class="toasts"></div>

<script type="module">
import {initializeApp} from\"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js\";\nimport {getAuth,onAuthStateChanged,signOut} from\"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js\";\nimport {getFirestore,collection,doc,onSnapshot,updateDoc,getDoc,query,where,serverTimestamp} from\"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js\";\nimport {getStorage,ref,uploadBytesResumable,getDownloadURL} from\"https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js\";\n\nconst app=initializeApp({apiKey:\"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk\",authDomain:\"business2card-c041b.firebaseapp.com\",projectId:\"business2card-c041b\",storageBucket:\"business2card-c041b.firebasestorage.app\",messagingSenderId:\"235622448899\",appId:\"1:235622448899:web:d8652ff71082f7d003f336\"});\nconst auth=getAuth(app),db=getFirestore(app),storage=getStorage(app);\n\nlet orders=[],suppliers=[],currentUser=null,userName='',activeId=null,currentFilter='all',currentSupFilter='';\nconst fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');\nconst gv=id=>document.getElementById(id)?.value||'';\nconst sv=(id,v)=>{const e=document.getElementById(id);if(e)e.value=v;};\nconst setText=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};\nconst oM=id=>document.getElementById('ov-'+id)?.classList.add('open');\nconst cM=id=>document.getElementById('ov-'+id)?.classList.remove('open');\nwindow.cM=cM;window.oM=oM;\nconst nowStr=()=>new Date().toLocaleDateString('ar-EG')+' '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});\n\nfunction toast(msg,t=''){const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}\nwindow.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};\nwindow.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};\nwindow.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};\n\nonAuthStateChanged(auth,async u=>{\n  if(!u){window.location.href='login.html';return;}\n  currentUser=u;\n  const snap=await getDoc(doc(db,'users',u.uid));\n  if(snap.exists()){const d=snap.data();userName=d.name||u.email;setText('nav-name',userName);document.getElementById('nav-av').textContent=userName[0]?.toUpperCase();buildSidebar(d,'production.html');}\n  onSnapshot(query(collection(db,'orders'),where('stage','==','production')),snap=>{\n    window.markSynced&&window.markSynced();\n    orders=snap.docs.map(d=>({...d.data(),_id:d.id})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));\n    setText('s-pending',orders.filter(o=>!o.prodStatus||o.prodStatus==='pending').length);\n    setText('s-wip',orders.filter(o=>['wip','received'].includes(o.prodStatus)).length);\n    setText('s-done',orders.filter(o=>o.prodStatus==='done').length);\n    setText('sub',orders.length+' \u0637\u0644\u0628 \u062a\u0646\u0641\u064a\u0630');\n    renderList();\n    if(activeId){const u=orders.find(x=>x._id===activeId);if(u)renderPanel(u);}\n  });\n  onSnapshot(collection(db,'suppliers_v2'),snap=>{\n    suppliers=snap.docs.map(d=>({...d.data(),_id:d.id}));\n    buildSupFilter();\n    const s=document.getElementById('ac-sup');if(!s)return;\n    s.innerHTML='<option value=\"\">\u2014 \u0627\u062e\u062a\u064a\u0627\u0631\u064a \u2014</option>'+suppliers.map(x=>`<option value=\"${x._id}\" data-name=\"${x.name}\" data-phone=\"${x.phone||x.whatsapp||''}\">${x.name}</option>`).join('');\n  });\n});\n\nwindow.setFilter=function(f,btn){currentFilter=f;document.querySelectorAll('#status-filter-bar .ftab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderList();};\nwindow.setSupFilter=function(id,btn){currentSupFilter=id;document.querySelectorAll('#sup-filter-bar .ftab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderList();};\n\nfunction buildSupFilter(){\n  const bar=document.getElementById('sup-filter-bar');if(!bar)return;\n  const used=new Set(orders.map(o=>o.supplierId).filter(Boolean));\n  const usedSups=suppliers.filter(s=>used.has(s._id));\n  bar.innerHTML=`<button class=\"ftab active\" onclick=\"setSupFilter('',this)\">\u0643\u0644 \u0627\u0644\u0645\u0637\u0627\u0628\u0639</button>`+usedSups.map(s=>`<button class=\"ftab\" onclick=\"setSupFilter('${s._id}',this)\">${s.name}</button>`).join('');\n}\n\nwindow.renderList=function(){\n  let data=orders;\n  if(currentFilter==='pending')data=orders.filter(o=>!o.prodStatus||o.prodStatus==='pending');\n  else if(currentFilter==='wip')data=orders.filter(o=>['wip','received'].includes(o.prodStatus));\n  else if(currentFilter==='done')data=orders.filter(o=>o.prodStatus==='done');\n  else if(currentFilter==='problem')data=orders.filter(o=>o.prodStatus==='problem');\n  if(currentSupFilter)data=data.filter(o=>o.supplierId===currentSupFilter);\n  const el=document.getElementById('list');if(!el)return;\n  if(!data.length){el.innerHTML=`<div class=\"empty\"><div class=\"empty-icon\">\ud83c\udfed</div><div class=\"empty-text\">\u0644\u0627 \u062a\u0648\u062c\u062f \u0637\u0644\u0628\u0627\u062a</div></div>`;return;}\n  const SM={pending:{cls:'sp-pending',lbl:'\u23f3 \u0627\u0646\u062a\u0638\u0627\u0631',cc:''},received:{cls:'sp-wip',lbl:'\ud83d\udce5 \u0627\u0633\u062a\u0644\u0645\u062a',cc:'card-wip'},wip:{cls:'sp-wip',lbl:'\ud83d\udd04 \u062c\u0627\u0631\u064a',cc:'card-wip'},done:{cls:'sp-done',lbl:'\u2705 \u062e\u0644\u0635\u062a',cc:'card-done'},problem:{cls:'sp-prob',lbl:'\u26a0\ufe0f \u0645\u0634\u0643\u0644\u0629',cc:'card-prob'}};\n  el.innerHTML=data.map(o=>{\n    const ps=o.prodStatus||'pending';const st=SM[ps]||SM.pending;\n    const prods=o.products||[];\n    const firstImg=prods.find(p=>p.designImageUrl)?.designImageUrl||o.designImageUrl||'';\n    const sup=o.supplierId?suppliers.find(s=>s._id===o.supplierId):null;\n    const ci=o.costItems||[];const tc=ci.reduce((s,c)=>s+(parseFloat(c.total)||0),0);\n    const prodNames=prods.map(p=>`${p.name}\u00d7${p.qty}`).join(' \u00b7 ')||o.product||'\u2014';\n    const days=o.createdAt?.seconds?Math.floor((Date.now()/1000-o.createdAt.seconds)/86400):0;\n    const urgent=days>2&&ps==='pending';\n    return`<div class=\"ord-card ${st.cc}${urgent?' card-urgent':''}\" onclick=\"openOrder('${o._id}')\">\n      <div class=\"ord-top\">\n        <div style=\"flex:1;min-width:0\">\n          <div class=\"ord-id\">${o.orderId||o._id.slice(-6)} \u00b7 ${o.createdDate||'\u2014'}</div>\n          <div class=\"ord-name\">${o.clientName||'\u2014'}</div>\n          <div class=\"ord-prods\">${prodNames}</div>\n        </div>\n        <div style=\"display:flex;flex-direction:column;align-items:flex-end;gap:6px\">\n          <span class=\"status-pill ${st.cls}\">${st.lbl}</span>\n          ${tc>0?`<span style=\"font-size:11px;color:var(--r);font-weight:700\">\ud83d\udcb0${fn(tc)}\u062c</span>`:''}\n        </div>\n      </div>\n      ${firstImg?`<img src=\"${firstImg}\" class=\"ord-img\" onclick=\"event.stopPropagation();window.open('${firstImg}','_blank')\">`:'' }\n      <div class=\"ord-foot\">\n        ${sup?`<span class=\"sup-tag\">\ud83c\udfed ${sup.name}</span>`:`<span class=\"sup-tag\" style=\"color:var(--r)\">\u26a0\ufe0f \u0628\u062f\u0648\u0646 \u0645\u0637\u0628\u0639\u0629</span>`}\n        ${urgent?`<span class=\"delay-tag\">\u0645\u0646\u0630 ${days} \u0623\u064a\u0627\u0645</span>`:''}\n        ${o.finalImageUrl?`<span class=\"sup-tag\" style=\"color:var(--g)\">\u2705 \u0635\u0648\u0631\u0629</span>`:''}\n      </div>\n    </div>`;\n  }).join('');\n};\n\nwindow.openOrder=function(id){\n  activeId=id;const o=orders.find(x=>x._id===id);if(!o)return;\n  setText('pn-name',o.clientName||'\u2014');\n  setText('pn-sub',(o.orderId||id.slice(-6))+' \u00b7 '+(o.clientPhone||''));\n  const pov=document.getElementById('panel-ov');pov.style.display='flex';\n  setTimeout(()=>pov.classList.add('open'),10);\n  renderPanel(o);\n};\nwindow.closePanel=function(){\n  const pov=document.getElementById('panel-ov');pov.classList.remove('open');\n  setTimeout(()=>pov.style.display='none',200);activeId=null;\n};\n\nfunction renderPanel(o){\n  const prods=o.products||[];const ci=o.costItems||[];const ps=o.prodStatus||'pending';\n  // 1. \u0627\u0644\u062a\u0635\u0645\u064a\u0645\n  const dEl=document.getElementById('design-imgs');\n  const imgs=prods.filter(p=>p.designImageUrl).map(p=>({url:p.designImageUrl,name:p.name}));\n  if(o.designImageUrl&&!imgs.length)imgs.push({url:o.designImageUrl,name:'\u0627\u0644\u062a\u0635\u0645\u064a\u0645'});\n  dEl.innerHTML=imgs.length?imgs.map(img=>`<div style=\"margin-bottom:8px\">${imgs.length>1?`<div style=\"font-size:11px;color:var(--dim2);margin-bottom:4px;font-weight:700\">${img.name}</div>`:''}<div class=\"design-img-wrap\"><img src=\"${img.url}\" class=\"design-img\" onclick=\"window.open('${img.url}','_blank')\"></div></div>`).join(''):`<div class=\"design-img-wrap\"><div class=\"design-placeholder\">\ud83d\udcf7<br>\u0644\u0627 \u062a\u0648\u062c\u062f \u0635\u0648\u0631\u0629 \u062a\u0635\u0645\u064a\u0645</div></div>`;\n  // 2. \u0627\u0644\u0645\u0637\u0628\u0639\u0629\n  const sEl=document.getElementById('sup-btns');\n  sEl.innerHTML=suppliers.map(s=>`<button class=\"sup-btn${o.supplierId===s._id?' selected':''}\" onclick=\"selectSupplier('${s._id}','${s.name}','${s.phone||s.whatsapp||''}')\"><div class=\"sup-btn-name\">${s.name}</div><div class=\"sup-btn-phone\">${s.phone||s.whatsapp||''}</div></button>`).join('');\n  const waBtn=document.getElementById('wa-btn');\n  if(o.supplierId){const sup=suppliers.find(s=>s._id===o.supplierId);waBtn.style.display='flex';waBtn.innerHTML=`<span>\ud83d\udcf1</span> \u0625\u0631\u0633\u0627\u0644 \u0644\u0640 ${sup?.name||'\u0627\u0644\u0645\u0637\u0628\u0639\u0629'} \u0648\u0627\u062a\u0633\u0627\u0628`;}\n  else{waBtn.style.display='none';}\n  // 3. \u0628\u0646\u0648\u062f \u0627\u0644\u062a\u0643\u0644\u0641\u0629\n  renderCosts(o);\n  // 4. \u062d\u0627\u0644\u0629\n  ['recv','wip','done','prob'].forEach(s=>{const b=document.getElementById('sbtn-'+s);if(b)b.className='status-btn';});\n  const smap={received:'recv',wip:'wip',done:'done',problem:'prob'};\n  const cur=smap[ps];if(cur){const b=document.getElementById('sbtn-'+cur);if(b)b.classList.add('act-'+cur);}\n  sv('prod-note',o.prodNote||'');\n  // 5. \u0627\u0644\u0646\u0647\u0627\u0626\u064a\n  const fw=document.getElementById('final-img-wrap');\n  fw.innerHTML=o.finalImageUrl?`<img src=\"${o.finalImageUrl}\" class=\"final-img\" onclick=\"window.open('${o.finalImageUrl}','_blank')\">`:'' ;\n  const sb=document.getElementById('ship-btn');\n  sb.disabled=!o.finalImageUrl;\n  sb.textContent=o.finalImageUrl?'\ud83d\ude9a \u062a\u062d\u0648\u064a\u0644 \u0644\u0644\u0634\u062d\u0646':'\ud83d\ude9a \u0627\u0631\u0641\u0639 \u0635\u0648\u0631\u0629 \u0627\u0644\u0645\u0646\u062a\u062c \u0623\u0648\u0644\u0627\u064b';\n  // \u0627\u0644\u0633\u062c\u0644\n  const tl=(o.timeline||[]).slice().reverse().slice(0,10);\n  document.getElementById('pn-timeline').innerHTML=tl.map(t=>`<div style=\"font-size:11px;color:var(--dim2);padding:5px 0;border-bottom:1px solid var(--line)\">${t.date} \u2014 ${t.action}</div>`).join('')||'<div style=\"color:var(--dim2);font-size:12px\">\u0644\u0627 \u064a\u0648\u062c\u062f \u0633\u062c\u0644</div>';\n}\n\nfunction renderCosts(o){\n  const prods=o.products||[];const ci=o.costItems||[];\n  const tc=ci.reduce((s,c)=>s+(parseFloat(c.total)||0),0);\n  const el=document.getElementById('costs-list');\n  function ciRow(item,globalIdx){\n    return`<div class=\"cost-item-row\"><div style=\"flex:1;min-width:0\"><div class=\"cost-item-name\">${item.type||'\u2014'}</div><div class=\"cost-item-sup\">${item.supplierName||'\u2014'}${item.note?' \u00b7 '+item.note:''}</div></div><div style=\"display:flex;align-items:center;gap:10px\"><span style=\"font-size:14px;font-weight:900;color:var(--r)\">${fn(item.total)} \u062c</span><button onclick=\"rmCost(${globalIdx})\" style=\"width:28px;height:28px;border-radius:8px;border:1px solid rgba(255,61,110,.3);background:rgba(255,61,110,.08);color:var(--r);cursor:pointer;font-size:14px\">\u2715</button></div></div>`;\n  }\n  if(!prods.length){\n    el.innerHTML=ci.map((item,i)=>ciRow(item,i)).join('')+`<button class=\"cost-add-btn\" onclick=\"openAddCost(-1)\">\uff0b \u0625\u0636\u0627\u0641\u0629 \u0628\u0646\u062f</button>`;\n  } else {\n    el.innerHTML=prods.map((p,pi)=>{\n      const prodCi=ci.map((c,i)=>({...c,gi:i})).filter(c=>c.prodIdx===pi||(c.prodIdx==null&&pi===prods.length-1));\n      return`<div class=\"cost-prod-block\"><div class=\"cost-prod-hdr\"><span class=\"cost-prod-name\">\ud83d\udce6 ${p.name}</span><span class=\"cost-prod-qty\">\u00d7${p.qty}</span></div>${prodCi.length?prodCi.map(c=>ciRow(c,c.gi)).join(''):'<div style=\"padding:10px 14px;font-size:12px;color:var(--dim2)\">\u0644\u0627 \u062a\u0648\u062c\u062f \u0628\u0646\u0648\u062f</div>'}<button class=\"cost-add-btn\" onclick=\"openAddCost(${pi})\">\uff0b \u0625\u0636\u0627\u0641\u0629 \u0628\u0646\u062f \u0644\u0640 ${p.name}</button></div>`;\n    }).join('');\n  }\n  setText('cost-total',fn(tc)+' \u062c');\n}\n\nwindow.selectSupplier=async function(id,name,phone){\n  const o=orders.find(x=>x._id===activeId);if(!o)return;\n  try{\n    await updateDoc(doc(db,'orders',activeId),{supplierId:id,supplierName:name,supplierPhone:phone,timeline:[...(o.timeline||[]),{date:nowStr(),action:`\ud83c\udfed \u0645\u0637\u0628\u0639\u0629: ${name}`,by:userName}],updatedAt:serverTimestamp()});\n    toast(`\u2705 ${name}`,'ok');\n    document.getElementById('wa-btn').style.display='flex';\n    document.getElementById('wa-btn').innerHTML=`<span>\ud83d\udcf1</span> \u0625\u0631\u0633\u0627\u0644 \u0644\u0640 ${name} \u0648\u0627\u062a\u0633\u0627\u0628`;\n    document.querySelectorAll('.sup-btn').forEach(b=>b.classList.remove('selected'));\n    event.target.closest('.sup-btn')?.classList.add('selected');\n  }catch(e){toast('\u274c '+e.message,'err');}\n};\n\nwindow.sendWhatsApp=function(){\n  const o=orders.find(x=>x._id===activeId);if(!o)return;\n  const sup=suppliers.find(s=>s._id===o.supplierId);if(!sup)return;\n  const phone=(sup.phone||sup.whatsapp||'').replace(/[^0-9]/g,'');\n  if(!phone){toast('\u26a0\ufe0f \u0627\u0644\u0645\u0637\u0628\u0639\u0629 \u0645\u0634 \u0639\u0646\u062f\u0647\u0627 \u0648\u0627\u062a\u0633\u0627\u0628','err');return;}\n  const prods=o.products||[];\n  const prodsText=prods.map(p=>`\u2022 ${p.name} \u00d7 ${p.qty}`).join('\\n');\n  const imgUrl=prods.find(p=>p.designImageUrl)?.designImageUrl||o.designImageUrl||'';\n  const msg=`\ud83d\udda8\ufe0f \u0637\u0644\u0628 \u0637\u0628\u0627\u0639\u0629\\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\\n\u0627\u0644\u0639\u0645\u064a\u0644: ${o.clientName||'\u2014'}\\n\u0627\u0644\u0645\u0646\u062a\u062c\u0627\u062a:\\n${prodsText||'\u2014'}\\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\\n${imgUrl?'\u0631\u0627\u0628\u0637 \u0627\u0644\u062a\u0635\u0645\u064a\u0645: '+imgUrl+'\\n':''}\u0627\u0644\u0631\u062c\u0627\u0621 \u0627\u0644\u062a\u0623\u0643\u064a\u062f \ud83d\ude4f`;\n  const waNum=phone.startsWith('0')?'2'+phone:phone.startsWith('2')?phone:'2'+phone;\n  window.open(`https://wa.me/${waNum}?text=${encodeURIComponent(msg)}`,'_blank');\n};\n\nwindow.setPrintStatus=async function(status){\n  const o=orders.find(x=>x._id===activeId);if(!o)return;\n  const labels={received:'\ud83d\udce5 \u0627\u0633\u062a\u0644\u0645\u062a',wip:'\ud83d\udd04 \u062c\u0627\u0631\u064a \u0627\u0644\u0637\u0628\u0627\u0639\u0629',done:'\u2705 \u062e\u0644\u0635\u062a \u0627\u0644\u0637\u0628\u0627\u0639\u0629',problem:'\u26a0\ufe0f \u0645\u0634\u0643\u0644\u0629'};\n  try{await updateDoc(doc(db,'orders',activeId),{prodStatus:status,timeline:[...(o.timeline||[]),{date:nowStr(),action:labels[status],by:userName}],updatedAt:serverTimestamp()});toast(labels[status],'ok');}\n  catch(e){toast('\u274c '+e.message,'err');}\n};\n\nwindow.saveNote=async function(){\n  if(!activeId)return;\n  try{await updateDoc(doc(db,'orders',activeId),{prodNote:gv('prod-note'),updatedAt:serverTimestamp()});}catch(e){}\n};\n\nlet addCostProdIdx=-1;\nwindow.openAddCost=function(pi){\n  addCostProdIdx=pi;\n  const o=orders.find(x=>x._id===activeId);\n  const prods=o?.products||[];\n  const sel=document.getElementById('cost-prod-idx');\n  sel.innerHTML='<option value=\"-1\">\u2014 \u0639\u0627\u0645 \u0644\u0644\u0623\u0648\u0631\u062f\u0631 \u2014</option>'+prods.map((p,i)=>`<option value=\"${i}\">${p.name} \u00d7 ${p.qty}</option>`).join('');\n  sel.value=pi;\n  if(o?.supplierId){const ac=document.getElementById('ac-sup');if(ac)ac.value=o.supplierId;}\n  sv('ac-total','');sv('ac-note','');\n  oM('cost');\n};\n\nwindow.saveCost=async function(){\n  const type=gv('ac-type');const total=parseFloat(gv('ac-total'))||0;\n  if(!type)return toast('\u26a0\ufe0f \u0627\u062e\u062a\u0631 \u0646\u0648\u0639 \u0627\u0644\u0628\u0646\u062f','err');\n  if(!total)return toast('\u26a0\ufe0f \u0623\u062f\u062e\u0644 \u0627\u0644\u062a\u0643\u0644\u0641\u0629','err');\n  const supSel=document.getElementById('ac-sup');\n  const supOpt=supSel?.options[supSel.selectedIndex];\n  const prodIdx=parseInt(document.getElementById('cost-prod-idx')?.value??-1);\n  const o=orders.find(x=>x._id===activeId);if(!o)return;\n  const item={type,supplierId:supOpt?.value||'',supplierName:supOpt?.dataset?.name||'',prodIdx:prodIdx>=0?prodIdx:null,total,note:gv('ac-note'),addedAt:nowStr()};\n  try{\n    await updateDoc(doc(db,'orders',activeId),{costItems:[...(o.costItems||[]),item],timeline:[...(o.timeline||[]),{date:nowStr(),action:`\ud83d\udcb0 ${type}: ${fn(total)} \u062c`,by:userName}],updatedAt:serverTimestamp()});\n    cM('cost');toast('\u2705 \u062a\u0645','ok');\n  }catch(e){toast('\u274c '+e.message,'err');}\n};\n\nwindow.rmCost=async function(idx){\n  if(!confirm('\u062d\u0630\u0641\u061f'))return;\n  const o=orders.find(x=>x._id===activeId);if(!o)return;\n  const ci=[...(o.costItems||[])];ci.splice(idx,1);\n  try{await updateDoc(doc(db,'orders',activeId),{costItems:ci,updatedAt:serverTimestamp()});toast('\u2705 \u062d\u064f\u0630\u0641','ok');}\n  catch(e){toast('\u274c '+e.message,'err');}\n};\n\nwindow.handleFinalImg=function(inp){const f=inp.files[0];if(f)uploadFinal(f);};\n\ndocument.addEventListener('paste',function(e){\n  if(!activeId)return;\n  const items=e.clipboardData?.items;if(!items)return;\n  for(const item of items){if(item.type.startsWith('image/')){const f=item.getAsFile();if(f)uploadFinal(f);break;}}\n});\n\nfunction uploadFinal(file){\n  const o=orders.find(x=>x._id===activeId);if(!o)return;\n  const pw=document.getElementById('prog-wrap');\n  const pb=document.getElementById('prog-fill');\n  const pt=document.getElementById('prog-txt');\n  pw.style.display='block';\n  const sRef=ref(storage,`production/${activeId}_final_${Date.now()}`);\n  const task=uploadBytesResumable(sRef,file);\n  task.on('state_changed',\n    snap=>{const p=Math.round(snap.bytesTransferred/snap.totalBytes*100);pb.style.width=p+'%';pt.textContent=p+'%';},\n    err=>{toast('\u274c '+err.message,'err');pw.style.display='none';},\n    async()=>{\n      const url=await getDownloadURL(task.snapshot.ref);\n      await updateDoc(doc(db,'orders',activeId),{finalImageUrl:url,timeline:[...(o.timeline||[]),{date:nowStr(),action:'\ud83d\udcf8 \u0635\u0648\u0631\u0629 \u0627\u0644\u0645\u0646\u062a\u062c \u0627\u0644\u0646\u0647\u0627\u0626\u064a',by:userName}],updatedAt:serverTimestamp()});\n      pw.style.display='none';\n      toast('\u2705 \u062a\u0645 \u0631\u0641\u0639 \u0627\u0644\u0635\u0648\u0631\u0629','ok');\n    }\n  );\n}\n\nwindow.moveToShipping=async function(){\n  if(!activeId)return;\n  const o=orders.find(x=>x._id===activeId);\n  if(!o.finalImageUrl){toast('\u26a0\ufe0f \u0627\u0631\u0641\u0639 \u0635\u0648\u0631\u0629 \u0627\u0644\u0645\u0646\u062a\u062c \u0623\u0648\u0644\u0627\u064b','err');return;}\n  if(!confirm('\u062a\u062d\u0648\u064a\u0644 \u0644\u0644\u0634\u062d\u0646\u061f'))return;\n  try{\n    await updateDoc(doc(db,'orders',activeId),{stage:'shipping',prodStatus:'done',prodDoneAt:nowStr(),timeline:[...(o.timeline||[]),{date:nowStr(),action:'\u2705 \u062a\u0646\u0641\u064a\u0630 \u0645\u0646\u062a\u0647\u064a \u2014 \u0627\u0646\u062a\u0642\u0644 \u0644\u0644\u0634\u062d\u0646 \ud83d\ude9a',by:userName}],updatedAt:serverTimestamp()});\n    closePanel();toast('\u2705 \u0627\u0646\u062a\u0642\u0644 \u0644\u0644\u0634\u062d\u0646 \ud83d\ude9a','ok');\n  }catch(e){toast('\u274c '+e.message,'err');}\n};\n
</script>
