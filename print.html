<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07080f">
<title>Business2Card — الطباعة</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="sync-monitor.js"></script>
<script src="finance-core.js"></script>
<style>
/* ══ KPIs ══ */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.kpi{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center;position:relative}
.kpi-top{height:3px;border-radius:2px;position:absolute;top:0;left:0;right:0}
.kpi-val{font-size:18px;font-weight:900;line-height:1.1;margin-top:6px}
.kpi-lbl{font-size:9px;color:var(--dim2);font-weight:700;margin-top:3px}

/* ══ Cards ══ */
.ocard{
  background:var(--bg2);border:1px solid var(--line);
  border-radius:14px;padding:14px;margin-bottom:10px;
  cursor:pointer;transition:transform .12s;
  border-right:3px solid var(--y);
  -webkit-tap-highlight-color:transparent;
}
.ocard:active{transform:scale(.98)}
.ocard.late{border-right-color:var(--r);background:rgba(255,61,110,.02)}
.ocard-footer{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--line)}

/* ══ Progress Bar ══ */
.fin-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:4px}
.fin-bar-fill{height:100%;border-radius:3px;transition:width .4s}

/* ══ Panel — Bottom Sheet ══ */
.panel-ov{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.65);backdrop-filter:blur(5px);
  display:none;align-items:flex-end;justify-content:center;
}
.panel-ov.open{display:flex}
.panel{
  width:100%;max-width:520px;height:94vh;
  background:var(--bg2);border-radius:22px 22px 0 0;
  border-top:1px solid var(--line2);
  overflow:hidden;display:flex;flex-direction:column;
}
.panel-drag{width:40px;height:4px;background:var(--line2);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.panel-head{
  padding:12px 16px 10px;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-shrink:0;
}
.panel-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel-footer{
  padding:12px 14px;border-top:1px solid var(--line);
  background:var(--bg2);flex-shrink:0;display:flex;gap:8px;
  padding-bottom:max(12px,env(safe-area-inset-bottom));
}

/* ══ Panel Sections ══ */
.psec{padding:14px 16px;border-bottom:1px solid var(--line)}
.psec:last-child{border-bottom:none}
.psec-ttl{font-size:10px;font-weight:800;color:var(--dim2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03)}
.prow:last-child{border-bottom:none}
.prow-lbl{color:var(--dim2)}
.prow-val{font-weight:700}

/* ══ Finance Grid ══ */
.fin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.fin-cell{background:var(--bg3);border-radius:10px;padding:10px;text-align:center}
.fin-cell-val{font-size:15px;font-weight:900;line-height:1}
.fin-cell-lbl{font-size:9px;color:var(--dim2);margin-top:3px;font-weight:700}

/* ══ Upload Zone ══ */
.upload-zone{
  border:2px dashed var(--line2);border-radius:12px;
  padding:20px 14px;text-align:center;cursor:pointer;
  background:var(--bg3);-webkit-tap-highlight-color:transparent;
}
.upload-zone:active{border-color:var(--b)}

/* ══ Timeline ══ */
.tl-item{font-size:11px;color:var(--dim2);padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03);line-height:1.5}
.tl-item:last-child{border-bottom:none}

/* ══ Prog ══ */
.prog-wrap{margin-top:8px;display:none}
.prog-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--p);border-radius:3px;width:0%;transition:width .3s}
.prog-txt{font-size:10px;color:var(--dim2);text-align:center;margin-top:3px}

/* ══ Responsive ══ */
@media(max-width:768px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .sidenav{display:none!important}
  .main{margin-right:0}
  .content{padding:12px}
  .mob-menu-btn{display:flex!important}
  .mob-nav-bar{display:block!important}
  .main{padding-bottom:70px}
}
@media(max-width:380px){
  .kpi-val{font-size:16px}
  .fin-cell-val{font-size:13px}
}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">ERP</div></div></div>
  <div class="nav-scroll" id="nav-links"></div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">A</div><div><div class="nav-user-name" id="nav-name">—</div><div class="nav-user-role">تسجيل خروج</div></div></div></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="mob-menu-btn" style="display:none" onclick="toggleNav()">☰</button>
      <div><h1 style="font-size:17px;font-weight:900">🖨️ الطباعة</h1><p id="sub" style="font-size:11px;color:var(--dim2)">جاري التحميل...</p></div>
    </div>
  </div>
  <div class="content">
    <div style="position:relative;margin-bottom:12px">
      <input class="inp" id="search" placeholder="🔍 بحث..." oninput="filterList(this.value)" style="background:var(--bg2)">
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-top" style="background:var(--b)"></div><div class="kpi-val" id="k-total" style="color:var(--b)">—</div><div class="kpi-lbl">🖨️ أوردرات</div></div>
      <div class="kpi"><div class="kpi-top" style="background:var(--r)"></div><div class="kpi-val" id="k-late" style="color:var(--r)">—</div><div class="kpi-lbl">⚠️ متأخرة</div></div>
      <div class="kpi"><div class="kpi-top" style="background:var(--g)"></div><div class="kpi-val" id="k-rev" style="color:var(--g);font-size:14px">—</div><div class="kpi-lbl">💰 إجمالي</div></div>
      <div class="kpi"><div class="kpi-top" style="background:var(--y)"></div><div class="kpi-val" id="k-rem" style="color:var(--y);font-size:14px">—</div><div class="kpi-lbl">⏳ باقي</div></div>
    </div>
    <div id="list"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</div>
</div>

<!-- PANEL -->
<div class="panel-ov" id="panel-ov" onclick="if(event.target===this)closePanel()">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-drag"></div>
    <div class="panel-head">
      <div style="flex:1;min-width:0">
        <div style="font-size:10px;color:var(--y);font-weight:800">🖨️ طباعة · <span id="pn-id">—</span></div>
        <div style="font-size:17px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="pn-name">—</div>
        <div style="font-size:12px;color:var(--dim2);margin-top:1px" id="pn-phone">—</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
        <a id="pn-wa" href="#" target="_blank" style="display:none;padding:6px 10px;border-radius:8px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);color:#25D366;font-size:14px;font-weight:700;text-decoration:none">💬</a>
        <button class="btn btn-ghost btn-sm" id="pn-reject-btn" onclick="openReject()" style="display:none;color:var(--r)">↩️ رفض</button>
        <button class="modal-x" onclick="closePanel()">✕</button>
      </div>
    </div>
    <div class="panel-body" id="panel-body"></div>
    <div class="panel-footer">
      <button class="btn btn-ghost btn-sm" id="pn-collect-btn" onclick="openCollect()" style="flex:1;display:none">💰 تحصيل</button>
      <button class="btn btn-b" id="pn-prod-btn" onclick="moveTo('production')" style="flex:2">🏭 → التنفيذ</button>
    </div>
  </div>
</div>

<!-- MODAL: تحصيل -->
<div class="overlay" id="ov-collect">
  <div class="modal" style="max-width:400px">
    <div class="modal-head"><span class="modal-title">💰 تحصيل دفعة</span><button class="modal-x" onclick="cM('collect')">✕</button></div>
    <div class="modal-body">
      <div id="col-summary" style="background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px"></div>
      <div class="fg">
        <label>المبلغ (ج)</label>
        <input class="inp" id="col-amount" type="number" placeholder="0" min="0" oninput="updateColPreview()">
        <div id="col-hint" style="font-size:11px;color:var(--dim2);margin-top:4px"></div>
      </div>
      <div class="fg">
        <label>طريقة الدفع</label>
        <div id="col-wallets" style="display:flex;gap:8px;flex-wrap:wrap"></div>
        <input type="hidden" id="col-wid"><input type="hidden" id="col-wname">
      </div>
      <div id="col-transfer-row" style="display:none" class="fg">
        <label>إيصال التحويل</label>
        <div class="upload-zone" onclick="document.getElementById('col-img-inp').click()">
          <div style="font-size:22px">📸</div><div style="font-size:11px;color:var(--dim2)">ارفع الإيصال</div>
        </div>
        <input type="file" id="col-img-inp" accept="image/*" style="display:none">
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="cM('collect')">إلغاء</button>
      <button class="btn btn-g" onclick="saveCollect()">✓ تأكيد</button>
    </div>
  </div>
</div>

<!-- MODAL: رفض -->
<div class="overlay" id="ov-reject">
  <div class="modal" style="max-width:380px">
    <div class="modal-head"><span class="modal-title">↩️ إعادة للتصميم</span><button class="modal-x" onclick="cM('reject')">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label>ملاحظة للمصمم</label><textarea class="inp" id="reject-reason" rows="3" placeholder="ما الذي يجب تعديله..."></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="cM('reject')">إلغاء</button>
      <button class="btn btn-r" onclick="confirmReject()">↩️ إعادة للتصميم</button>
    </div>
  </div>
</div>

<input type="file" id="print-final-inp" accept="image/*,application/pdf" style="display:none" onchange="uploadPrintFinal(this)">
<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div id="toasts" class="toasts"></div>

<!-- Mobile Nav -->
<nav style="display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--line);z-index:100;padding:6px 0 max(6px,env(safe-area-inset-bottom))" id="mob-nav-bar">
  <div style="display:flex;justify-content:space-around">
    <a href="index.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--dim2);text-decoration:none;padding:4px 10px;font-size:9px;font-weight:700"><span style="font-size:20px">⬡</span>الرئيسية</a>
    <a href="clients.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--dim2);text-decoration:none;padding:4px 10px;font-size:9px;font-weight:700"><span style="font-size:20px">👥</span>العملاء</a>
    <a href="design.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--dim2);text-decoration:none;padding:4px 10px;font-size:9px;font-weight:700"><span style="font-size:20px">✏️</span>تصميم</a>
    <a href="print.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--y);text-decoration:none;padding:4px 10px;font-size:9px;font-weight:700"><span style="font-size:20px">🖨️</span>طباعة</a>
    <a href="shipping.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--dim2);text-decoration:none;padding:4px 10px;font-size:9px;font-weight:700"><span style="font-size:20px">🚚</span>شحن</a>
  </div>
</nav>

<script type="module">
import {initializeApp} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getAuth,onAuthStateChanged,signOut} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {getFirestore,collection,doc,onSnapshot,updateDoc,getDoc,query,where,serverTimestamp,addDoc} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {getStorage,ref,uploadBytesResumable,getDownloadURL} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const FB={apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"};
const app=initializeApp(FB);
const auth=getAuth(app),db=getFirestore(app),storage=getStorage(app);

// Sidebar
const SBPAGES=[{f:'index.html',l:'لوحة التحكم',i:'⬡',admin:true},{f:'clients.html',l:'العملاء',i:'👤',p:'clients'},{f:'design.html',l:'التصميم',i:'✏️',p:'design'},{f:'print.html',l:'الطباعة',i:'🖨️',p:'print'},{f:'production.html',l:'التنفيذ',i:'🏭',p:'production'},{f:'shipping.html',l:'الشحن',i:'🚚',p:'shipping'},{f:'shipping-accounts.html',l:'حسابات الشحن',i:'📦',p:'shipping-accounts'},{f:'archive.html',l:'الأرشيف',i:'📁',p:'archive'},{f:'accounts.html',l:'الحسابات',i:'💰',p:'accounts'},{f:'suppliers.html',l:'الموردين',i:'▣',p:'suppliers'},{f:'employees.html',l:'الموظفين',i:'👥',admin:true},{f:'reports.html',l:'التقارير',i:'📊',p:'reports'},{f:'settings.html',l:'الإعدادات',i:'⚙️',admin:true}];
function buildSidebar(ud){const role=ud?.role||'cs';const pages=(ud?.permissions?.pages)||[];const isAdm=['admin','operation_manager'].includes(role);const nav=document.getElementById('nav-links');if(!nav)return;let h='';for(const p of SBPAGES){const ok=isAdm||(p.admin?false:pages.includes('*')||pages.includes(p.p||''));if(!ok)continue;h+=`<a class="nav-link${p.f==='print.html'?' active':''}" href="${p.f}"><span class="nav-ico">${p.i}</span>${p.l}</a>`;}nav.innerHTML=h;}

// Utils
const FC=window.FinanceCore||window.FC||null;
const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v};
const nowStr=()=>new Date().toLocaleDateString('ar-EG')+' '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
const toast=(m,t='')=>{const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+(t==='ok'?'ok':t==='err'?'err':'');el.textContent=m;c.appendChild(el);setTimeout(()=>el.remove(),3200);};
const delay=dl=>{if(!dl)return 0;const d=new Date(dl);return d<new Date()?Math.floor((new Date()-d)/864e5):0;};
const getPaid=o=>FC?FC.getPaid(o):(parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0);
const getNet=o=>FC?FC.getNet(o):(parseFloat(o.salePrice)||0);
const getRem=o=>FC?FC.getRemaining(o):Math.max(0,getNet(o)-getPaid(o));
window.cM=id=>document.getElementById('ov-'+id)?.classList.remove('open');
window.toggleNav=()=>{document.querySelector('.sidenav')?.classList.toggle('mob-open');document.getElementById('nav-ov')?.classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav')?.classList.remove('mob-open');document.getElementById('nav-ov')?.classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};

// Mobile nav
if(window.innerWidth<=768){const n=document.getElementById('mob-nav-bar');if(n)n.style.display='block';}

// State
let orders=[],wallets=[],activeId=null,activeOrder=null,userName='',currentRole='admin';

// Auth
let _s=false;
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  if(_s)return;_s=true;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(snap.exists()){const d=snap.data();userName=d.name||u.email;currentRole=d.role||'admin';set('nav-name',userName);const av=document.getElementById('nav-av');if(av)av.textContent=(userName[0]||'A').toUpperCase();set('role-badge',currentRole);buildSidebar(d);}
  startListeners();
});

function startListeners(){
  onSnapshot(query(collection(db,'orders'),where('stage','==','printing')),snap=>{
    orders=snap.docs.map(d=>({...d.data(),_id:d.id})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    updateKPIs();renderList();
    if(activeId){const o=orders.find(x=>x._id===activeId);if(o){activeOrder=o;renderPanel(o);}}
    if(window.markSynced)window.markSynced();
  });
  onSnapshot(collection(db,'wallets'),snap=>{wallets=snap.docs.map(d=>({...d.data(),_id:d.id}));});
  onSnapshot(doc(db,'settings','main'),snap=>{if(snap.exists()){}});
}

// KPIs
function updateKPIs(){
  const late=orders.filter(o=>delay(o.deadline)>0).length;
  const totalSale=orders.reduce((s,o)=>s+getNet(o),0);
  const totalRem=orders.reduce((s,o)=>s+getRem(o),0);
  set('k-total',orders.length);
  set('k-late',late||'—');
  set('k-rev',fn(totalSale)+' ج');
  set('k-rem',fn(totalRem)+' ج');
  set('sub',orders.length+' أوردر طباعة');
}

// Filter
window.filterList=function(q){const s=(q||'').toLowerCase().trim();document.querySelectorAll('.ocard').forEach(c=>{const t=(c.dataset.client||'').toLowerCase()+(c.dataset.id||'').toLowerCase();c.style.display=!s||t.includes(s)?'':'none';});};

// Render List
function renderList(){
  const el=document.getElementById('list');if(!el)return;
  if(!orders.length){el.innerHTML='<div class="empty"><div class="empty-icon">🖨️</div><div class="empty-text">لا توجد أوردرات في الطباعة</div></div>';return;}
  el.innerHTML=orders.map(o=>{
    const d=delay(o.deadline);
    const prods=(o.products||[]).map(p=>p.name+(p.qty?'×'+p.qty:'')).join(' · ')||o.product||'—';
    const paid=getPaid(o),sale=getNet(o),rem=getRem(o);
    const pct=sale>0?Math.min(paid/sale*100,100):0;
    const ptColor=o.printType?.includes('offset')?'var(--p)':o.printType?.includes('digital')?'var(--b)':'var(--dim)';
    return`<div class="ocard ${d>0?'late':''}" data-client="${o.clientName||''}" data-id="${o.orderId||o._id}" onclick="openOrder('${o._id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:900">${d>0?`<span style="color:var(--r);font-size:11px">⚠️${d}ي </span>`:''}${o.clientName||'—'}</div>
          <div style="font-size:11px;color:var(--dim2);margin-top:3px">${prods}</div>
          <div style="font-size:10px;color:var(--dim);margin-top:2px">${o.orderId||o._id.slice(-6)} · ${o.createdDate||'—'}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">
          <span style="font-size:10px;padding:2px 9px;border-radius:20px;background:${ptColor}18;color:${ptColor};font-weight:800">${o.printType||'⏳ غير محدد'}</span>
          ${sale>0?`<span style="font-size:13px;font-weight:900;color:var(--snow)">${fn(sale)} ج</span>`:''}
        </div>
      </div>
      ${sale>0?`<div style="margin-bottom:8px">
        <div class="fin-bar"><div class="fin-bar-fill" style="width:${pct}%;background:${pct>=100?'var(--g)':pct>50?'var(--b)':'var(--y)'}"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--dim2)">
          <span style="color:var(--g);font-weight:700">محصّل ${fn(paid)} ج</span>
          ${rem>0?`<span style="color:var(--r);font-weight:800">باقي ${fn(rem)} ج</span>`:`<span style="color:var(--g);font-weight:800">✅ مكتمل</span>`}
        </div>
      </div>`:''}
      <div class="ocard-footer">
        <div style="display:flex;gap:8px;align-items:center">
          ${o.printFinalUrl?'<span style="font-size:11px;color:var(--g);font-weight:700">📁 ملف ✅</span>':'<span style="font-size:11px;color:var(--dim2)">📁 لا يوجد ملف</span>'}
          ${o.qty?`<span style="font-size:10px;color:var(--dim2)">📦${o.qty}ق</span>`:''}
        </div>
        <span style="font-size:10px;font-weight:800;color:${pct>=100?'var(--g)':'var(--y)'}">${Math.round(pct)}%</span>
      </div>
    </div>`;
  }).join('');
}

// Open Order
window.openOrder=function(id){
  activeId=id;activeOrder=orders.find(x=>x._id===id);if(!activeOrder)return;
  const o=activeOrder;
  set('pn-id',o.orderId||id.slice(-6));set('pn-name',o.clientName||'—');set('pn-phone',o.clientPhone||'—');
  const wa=document.getElementById('pn-wa');if(wa&&o.clientPhone){wa.href='https://wa.me/2'+(o.clientPhone||'').replace(/^0/,'');wa.style.display='';}else if(wa)wa.style.display='none';
  const isAdm=['admin','operation_manager','customer_service'].includes(currentRole);
  const rBtn=document.getElementById('pn-reject-btn');if(rBtn)rBtn.style.display=isAdm?'':'none';
  const rem=getRem(o),sale=getNet(o);
  const colBtn=document.getElementById('pn-collect-btn');
  if(colBtn)colBtn.style.display=rem>0&&sale>0?'':'none';
  const prodBtn=document.getElementById('pn-prod-btn');
  if(prodBtn){const canMove=isAdm||o.printFinalUrl;prodBtn.disabled=!canMove;prodBtn.style.opacity=canMove?'1':'.45';prodBtn.title=canMove?'':'ارفع الملف النهائي أولاً';}
  document.getElementById('panel-ov').classList.add('open');
  renderPanel(o);
};

window.closePanel=function(){document.getElementById('panel-ov').classList.remove('open');activeId=null;activeOrder=null;};

// Render Panel
function renderPanel(o){
  const paid=getPaid(o),sale=getNet(o),rem=getRem(o);
  const pct=sale>0?Math.min(paid/sale*100,100):0;
  const prods=(o.products||[]).map(p=>p.name+(p.qty?'×'+p.qty:'')).join(' · ')||o.product||'—';
  const d=delay(o.deadline);
  const designImgs=[...(o.products||[]).filter(p=>p.designImageUrl).map(p=>({url:p.designImageUrl,name:p.name})),...(o.designImageUrl&&!(o.products||[]).some(p=>p.designImageUrl)?[{url:o.designImageUrl,name:'التصميم'}]:[])];

  document.getElementById('panel-body').innerHTML=`
    <div class="psec">
      <div class="psec-ttl">📋 بيانات الأوردر</div>
      <div class="prow"><span class="prow-lbl">الأوردر</span><span class="prow-val">${o.orderId||o._id.slice(-6)}</span></div>
      <div class="prow"><span class="prow-lbl">التاريخ</span><span class="prow-val">${o.createdDate||'—'}</span></div>
      <div class="prow"><span class="prow-lbl">المنتجات</span><span class="prow-val" style="font-size:11px;text-align:left">${prods}</span></div>
      ${o.printType?`<div class="prow"><span class="prow-lbl">الطباعة</span><span class="prow-val">${o.printType}</span></div>`:''}
      ${o.qty?`<div class="prow"><span class="prow-lbl">الكمية</span><span class="prow-val">${fn(o.qty)} قطعة</span></div>`:''}
      ${o.deadline?`<div class="prow"><span class="prow-lbl">موعد التسليم</span><span class="prow-val" style="color:${d>0?'var(--r)':'inherit'}">${o.deadline}${d>0?` ⚠️ ${d}ي`:' ✅'}</span></div>`:''}
    </div>

    ${sale>0?`<div class="psec">
      <div class="psec-ttl">💰 المالية</div>
      <div class="fin-grid">
        <div class="fin-cell"><div class="fin-cell-val" style="color:var(--b)">${fn(sale)}</div><div class="fin-cell-lbl">إجمالي ج</div></div>
        <div class="fin-cell"><div class="fin-cell-val" style="color:var(--g)">${fn(paid)}</div><div class="fin-cell-lbl">محصّل ج</div></div>
        <div class="fin-cell" style="${rem>0?'background:rgba(255,61,110,.08)':''}">
          <div class="fin-cell-val" style="color:${rem>0?'var(--r)':'var(--g)'}">${rem>0?fn(rem):'✅'}</div>
          <div class="fin-cell-lbl">${rem>0?'باقي ج':'مكتمل'}</div>
        </div>
      </div>
      <div class="fin-bar"><div class="fin-bar-fill" style="width:${pct}%;background:${pct>=100?'var(--g)':pct>50?'var(--b)':'var(--y)'}"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:3px;font-size:10px;color:var(--dim2)">
        <span>${Math.round(pct)}% محصّل</span>
        <span style="font-weight:800;color:${rem<=0?'var(--g)':getPaid(o)>0?'var(--y)':'var(--r)'}">${rem<=0?'✅ مكتمل':getPaid(o)>0?'⚡ جزئي':'⏳ معلق'}</span>
      </div>
      ${o.discount>0?`<div class="prow" style="margin-top:8px"><span class="prow-lbl">خصم</span><span class="prow-val" style="color:var(--r)">- ${fn(o.discount)} ج</span></div>`:''}
      ${o.deposit>0&&o.deposit!=o.totalPaid?`<div class="prow"><span class="prow-lbl">عربون</span><span class="prow-val" style="color:var(--g)">${fn(o.deposit)} ج</span></div>`:''}
    </div>`:''}

    ${o.refFileUrl||o.designNote?`<div class="psec">
      <div class="psec-ttl">🎨 التصميم المرجعي</div>
      ${o.designNote?`<div style="padding:8px 10px;background:var(--bg3);border-radius:8px;font-size:12px;color:var(--dim2);margin-bottom:8px;line-height:1.5">${o.designNote}</div>`:''}
      ${o.refFileUrl?`<a href="${o.refFileUrl}" target="_blank" style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(59,158,255,.07);border:1px solid rgba(59,158,255,.2);border-radius:10px;color:var(--b);text-decoration:none;font-weight:700;font-size:12px">📎 الملف المرجعي ←</a>`:''}
    </div>`:''}

    ${designImgs.length?`<div class="psec">
      <div class="psec-ttl">🖼️ صور التصميم للطبع</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px">
        ${designImgs.map(img=>`<div onclick="window.open('${img.url}','_blank')" style="cursor:zoom-in;border-radius:10px;overflow:hidden;background:var(--bg3);border:1px solid var(--line)">
          <img src="${img.url}" loading="lazy" style="width:100%;height:85px;object-fit:contain;display:block">
          <div style="font-size:9px;color:var(--dim2);padding:3px 6px;text-align:center">${img.name}</div>
        </div>`).join('')}
      </div>
    </div>`:''}

    <div class="psec">
      <div class="psec-ttl">📁 الملف النهائي للمطبعة</div>
      ${o.printFinalUrl?(o.printFinalType?.includes('pdf')
        ?`<a href="${o.printFinalUrl}" target="_blank" style="display:flex;align-items:center;gap:8px;padding:12px;background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.2);border-radius:10px;color:var(--p);text-decoration:none;font-weight:700;font-size:12px;margin-bottom:8px">📄 فتح الملف (PDF)</a>`
        :`<img src="${o.printFinalUrl}" onclick="window.open('${o.printFinalUrl}','_blank')" style="width:100%;border-radius:10px;border:1px solid var(--line);cursor:zoom-in;max-height:200px;object-fit:contain;background:var(--bg3);margin-bottom:8px">`)
      :''}
      <div class="upload-zone" onclick="document.getElementById('print-final-inp').click()" style="${o.printFinalUrl?'padding:10px':''}">
        <div style="font-size:${o.printFinalUrl?'18':'26'}px;margin-bottom:4px">📁</div>
        <div style="font-size:${o.printFinalUrl?'11':'13'}px;font-weight:700">${o.printFinalUrl?'🔄 تغيير الملف':'ارفع الملف النهائي للمطبعة'}</div>
        ${!o.printFinalUrl?`<div style="font-size:10px;color:var(--dim2);margin-top:3px">صورة أو PDF · أو الصق Ctrl+V</div>`:''}
      </div>
      <div class="prog-wrap" id="prog-wrap">
        <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
        <div class="prog-txt" id="prog-txt">0%</div>
      </div>
    </div>

    <div class="psec">
      <div class="psec-ttl">⚙️ إعدادات الطباعة</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
        ${['digital','offset','لاصق','فلكس','بنر','كتالوج'].map(t=>`
          <button onclick="setPrintType('${t}')"
            style="padding:5px 12px;border-radius:20px;border:1px solid ${o.printType===t?'var(--b)':'var(--line)'};background:${o.printType===t?'rgba(59,158,255,.12)':'var(--bg3)'};color:${o.printType===t?'var(--b)':'var(--dim2)'};font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">
            ${t}
          </button>`).join('')}
      </div>
      <textarea class="inp" id="print-notes-inp" rows="2" placeholder="ملاحظات للمطبعة...">${o.printNotes||''}</textarea>
      <button class="btn btn-ghost btn-sm" style="margin-top:6px;width:100%" onclick="savePrintNotes()">💾 حفظ الملاحظات</button>
    </div>

    <div class="psec">
      <div class="psec-ttl">📋 سجل الأوردر</div>
      ${(o.timeline||[]).slice().reverse().slice(0,8).map(t=>`
        <div class="tl-item"><span style="color:var(--b);font-weight:700">${t.date}</span> — ${t.action}${t.by?' · '+t.by:''}</div>`
      ).join('')||'<div style="color:var(--dim2);font-size:12px">لا يوجد سجل</div>'}
    </div>
  `;
}

// Set Print Type
window.setPrintType=async function(type){
  if(!activeId)return;
  try{await updateDoc(doc(db,'orders',activeId),{printType:type,updatedAt:serverTimestamp()});toast('✅ نوع الطباعة: '+type,'ok');}
  catch(e){toast('❌ '+e.message,'err');}
};

// Save Notes
window.savePrintNotes=async function(){
  if(!activeId)return;
  const notes=document.getElementById('print-notes-inp')?.value||'';
  try{await updateDoc(doc(db,'orders',activeId),{printNotes:notes,updatedAt:serverTimestamp()});toast('✅ تم الحفظ','ok');}
  catch(e){toast('❌ '+e.message,'err');}
};

// Move to Production
window.moveTo=async function(stage){
  if(!activeId||!activeOrder)return;
  const o=activeOrder;
  const isAdm=['admin','operation_manager','customer_service'].includes(currentRole);
  if(!isAdm&&!o.printFinalUrl){toast('⚠️ ارفع الملف النهائي أولاً','err');return;}
  if(!confirm('تحويل الأوردر للتنفيذ؟'))return;
  try{
    await updateDoc(doc(db,'orders',activeId),{
      stage,updatedAt:serverTimestamp(),
      timeline:[...(o.timeline||[]),{date:nowStr(),action:'🏭 انتقل الطباعة → التنفيذ',by:userName}]
    });
    closePanel();toast('✅ انتقل للتنفيذ','ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

// Reject
window.openReject=function(){document.getElementById('ov-reject')?.classList.add('open');};
window.confirmReject=async function(){
  if(!activeId||!activeOrder)return;
  const reason=document.getElementById('reject-reason')?.value||'';
  try{
    await updateDoc(doc(db,'orders',activeId),{
      stage:'design',designStage:'rejected',printRejectNote:reason,updatedAt:serverTimestamp(),
      timeline:[...(activeOrder.timeline||[]),{date:nowStr(),action:`↩️ رُدّ من الطباعة${reason?' — '+reason:''}`,by:userName}]
    });
    window.cM('reject');closePanel();toast('↩️ أُعيد للتصميم','ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

// Collect
window.openCollect=function(){
  if(!activeOrder)return;
  const o=activeOrder;
  const paid=getPaid(o),sale=getNet(o),rem=getRem(o);
  const sum=document.getElementById('col-summary');
  if(sum)sum.innerHTML=`
    <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--dim2)">الإجمالي</span><span style="font-weight:800">${fn(sale)} ج</span></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--dim2)">محصّل</span><span style="font-weight:800;color:var(--g)">${fn(paid)} ج</span></div>
    <div style="display:flex;justify-content:space-between;border-top:1px solid var(--line);padding-top:6px;margin-top:4px"><span style="color:var(--r);font-weight:800">الباقي</span><span style="font-weight:900;color:var(--r);font-size:15px">${fn(rem)} ج</span></div>`;
  const inp=document.getElementById('col-amount');if(inp){inp.max=rem;inp.value='';inp.placeholder=fn(rem)+' ج';}
  const hint=document.getElementById('col-hint');if(hint)hint.textContent=`الحد الأقصى: ${fn(rem)} ج`;
  renderWallets();
  document.getElementById('ov-collect')?.classList.add('open');
};

window.updateColPreview=function(){
  const amt=parseFloat(document.getElementById('col-amount')?.value)||0;
  if(!activeOrder)return;
  const rem=getRem(activeOrder);
  const hint=document.getElementById('col-hint');
  if(!hint)return;
  if(amt>rem){hint.style.color='var(--r)';hint.textContent=`⚠️ يتجاوز الباقي (${fn(rem)} ج)`;}
  else if(amt===rem){hint.style.color='var(--g)';hint.textContent='✅ سيُغلق الأوردر كمدفوع كاملاً';}
  else{hint.style.color='var(--dim2)';hint.textContent=`سيتبقى ${fn(rem-amt)} ج`;}
};

function renderWallets(){
  const el=document.getElementById('col-wallets');if(!el)return;
  el.innerHTML=wallets.map(w=>`<button onclick="selectWallet('${w._id}','${w.name||'محفظة'}')" id="cw-${w._id}" style="padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:var(--bg3);color:var(--dim2);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">${w.name||'محفظة'} · ${fn(w.balance)} ج</button>`).join('');
}
window.selectWallet=function(id,name){
  document.getElementById('col-wid').value=id;
  document.getElementById('col-wname').value=name;
  document.querySelectorAll('[id^="cw-"]').forEach(b=>{b.style.background='var(--bg3)';b.style.color='var(--dim2)';b.style.borderColor='var(--line)';});
  const b=document.getElementById('cw-'+id);if(b){b.style.background='rgba(59,158,255,.12)';b.style.color='var(--b)';b.style.borderColor='var(--b)';}
  const tr=document.getElementById('col-transfer-row');
  if(tr)tr.style.display=name.includes('كاش')||name.includes('نقد')?'none':'block';
};

window.saveCollect=async function(){
  if(!activeId||!activeOrder)return;
  const o=activeOrder;
  const amt=parseFloat(document.getElementById('col-amount')?.value)||0;
  const wid=document.getElementById('col-wid')?.value;
  const wname=document.getElementById('col-wname')?.value;
  if(!amt||amt<=0){toast('⚠️ أدخل مبلغاً','err');return;}
  if(!wid){toast('⚠️ اختر طريقة الدفع','err');return;}
  const rem=getRem(o);
  if(amt>rem+0.01){toast(`⚠️ يتجاوز الباقي (${fn(rem)} ج)`,'err');return;}
  const newPaid=getPaid(o)+amt;
  const newRem=Math.max(0,getNet(o)-newPaid);
  const status=newRem<=0?'paid':newPaid>0?'partial':'pending';
  try{
    await updateDoc(doc(db,'orders',activeId),{
      totalPaid:newPaid,paid:newPaid,remaining:newRem,paymentStatus:status,updatedAt:serverTimestamp(),
      timeline:[...(o.timeline||[]),{date:nowStr(),action:`💰 تحصيل ${fn(amt)} ج عبر ${wname}`,by:userName}]
    });
    await addDoc(collection(db,'transactions_v2'),{
      type:'in',amount:amt,walletId:wid,walletName:wname,
      orderId:activeId,orderRef:o.orderId||activeId.slice(-6),clientName:o.clientName||'—',
      note:`تحصيل — ${o.clientName||'—'}`,createdAt:serverTimestamp(),by:userName
    });
    const w=wallets.find(x=>x._id===wid);
    if(w)await updateDoc(doc(db,'wallets',wid),{balance:(parseFloat(w.balance)||0)+amt});
    window.cM('collect');toast(`✅ تم تحصيل ${fn(amt)} ج`,'ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

// Upload
window.uploadPrintFinal=async function(inp){const f=inp?.files?.[0];if(!f)return;await _uploadFile(f);inp.value='';};
document.addEventListener('paste',function(e){
  if(!document.getElementById('panel-ov')?.classList.contains('open'))return;
  const items=e.clipboardData?.items;if(!items)return;
  for(const item of items){if(item.type.startsWith('image/')){_uploadFile(item.getAsFile());break;}}
});

async function _uploadFile(file){
  if(!activeId||!activeOrder)return;
  const pw=document.getElementById('prog-wrap'),pb=document.getElementById('prog-fill'),pt=document.getElementById('prog-txt');
  if(pw)pw.style.display='block';
  try{
    let upload=file;
    if(file.type.startsWith('image/')){
      upload=await new Promise(res=>{
        const img=new Image(),url=URL.createObjectURL(file);
        img.onload=()=>{URL.revokeObjectURL(url);const c=document.createElement('canvas');let{width:w,height:h}=img;if(w>1400){h=Math.round(h*1400/w);w=1400;}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);c.toBlob(b=>res(new File([b],file.name,{type:'image/jpeg'})),'image/jpeg',.82);};
        img.onerror=()=>res(file);img.src=url;
      });
    }
    const sRef=ref(storage,`print-finals/${activeId}_${Date.now()}`);
    const task=uploadBytesResumable(sRef,upload);
    await new Promise((res,rej)=>{
      task.on('state_changed',
        s=>{const p=Math.round(s.bytesTransferred/s.totalBytes*100);if(pb)pb.style.width=p+'%';if(pt)pt.textContent=p+'%';},
        rej,
        async()=>{
          const url=await getDownloadURL(task.snapshot.ref);
          const o=activeOrder;
          await updateDoc(doc(db,'orders',activeId),{
            printFinalUrl:url,printFinalType:file.type,updatedAt:serverTimestamp(),
            timeline:[...(o.timeline||[]),{date:nowStr(),action:'📁 رُفع الملف النهائي للمطبعة',by:userName}]
          });
          if(pw)pw.style.display='none';
          const updated=orders.find(x=>x._id===activeId);
          if(updated)renderPanel({...updated,printFinalUrl:url,printFinalType:file.type});
          const prodBtn=document.getElementById('pn-prod-btn');
          if(prodBtn){prodBtn.disabled=false;prodBtn.style.opacity='1';}
          toast('✅ تم رفع الملف','ok');res();
        }
      );
    });
  }catch(e){if(pw)pw.style.display='none';toast('❌ '+e.message,'err');}
}
</script>
