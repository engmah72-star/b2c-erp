<head>

<style>
/* ══ Mobile First — Print Page ══ */

/* ── List Cards ── */
.pcard{
  background:var(--bg2);
  border:1px solid var(--line);
  border-right:4px solid var(--y);
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:transform .15s;
  position:relative;
}
.pcard:active{transform:scale(.98)}
.pcard.late{border-right-color:var(--r);background:rgba(255,61,110,.03)}
.pcard-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.pcard-name{font-size:15px;font-weight:900;line-height:1.2}
.pcard-prod{font-size:11px;color:var(--dim2);margin-top:3px;line-height:1.4}
.pcard-meta{font-size:10px;color:var(--dim2);margin-top:4px}
.pcard-badge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;background:rgba(59,158,255,.12);color:var(--b)}
.pcard-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--line)}
.late-badge{font-size:10px;background:rgba(255,61,110,.12);color:var(--r);padding:2px 7px;border-radius:20px;font-weight:800}

/* ── KPIs ── */
.kpi-grid-print{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.kpi-p{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center;position:relative;overflow:hidden}
.kpi-p-val{font-size:24px;font-weight:900;line-height:1.1}
.kpi-p-lbl{font-size:10px;color:var(--dim2);font-weight:700;margin-top:4px}

/* ── Search ── */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{padding-right:40px}
.search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--dim2);pointer-events:none}

/* ── Panel Mobile ── */
.panel-ov{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  display:none;align-items:flex-end;justify-content:center;
}
.panel-ov.open{display:flex}
.panel{
  width:100%;max-width:480px;
  height:92vh;
  background:var(--bg1);
  border-radius:20px 20px 0 0;
  border-top:1px solid var(--line);
  overflow:hidden;
  display:flex;flex-direction:column;
}
.panel-handle{width:44px;height:4px;background:var(--line2);border-radius:2px;margin:12px auto 0}
.panel-head{
  padding:12px 16px 12px;
  border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
  gap:8px;flex-shrink:0;
}
.panel-body{flex:1;overflow-y:auto;padding:0;-webkit-overflow-scrolling:touch}
.panel-name{font-size:16px;font-weight:900}
.panel-sub{font-size:11px;color:var(--dim2);margin-top:2px}

/* ── Panel Actions ── */
.panel-actions{
  padding:12px 16px;
  border-top:1px solid var(--line);
  display:flex;gap:8px;flex-shrink:0;
  background:var(--bg1);
}

/* ── Section in Panel ── */
.psec{padding:14px 16px;border-bottom:1px solid var(--line)}
.psec-title{font-size:11px;font-weight:800;color:var(--dim2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
.prow:last-child{border-bottom:none}
.prow-lbl{color:var(--dim2);font-size:12px}
.prow-val{font-weight:700}

/* ── Upload Zone ── */
.upload-zone{
  border:2px dashed var(--line);border-radius:14px;
  padding:24px;text-align:center;cursor:pointer;
  background:var(--bg2);transition:border-color .2s;
  -webkit-tap-highlight-color:transparent;
}
.upload-zone:active{border-color:var(--b);background:rgba(59,158,255,.05)}
.upload-preview{width:100%;border-radius:10px;max-height:200px;object-fit:contain;display:block;margin-top:8px;border:1px solid var(--line)}

/* ── Progress ── */
.prog-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--b),var(--p));border-radius:3px;transition:width .3s}

/* ── Timeline ── */
.tl-item{font-size:11px;color:var(--dim2);padding:6px 0;border-bottom:1px solid var(--line);line-height:1.4}
.tl-item:last-child{border-bottom:none}
</style>
</head>

<!-- Panel -->
<div class="panel-ov" id="panel-ov" onclick="if(event.target===this)closePanel()">

<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>

<script type="module">


// ══ SIDEBAR - Final Solution ══
async function buildDynamicSidebar(uid, currentPage) {
  const nav = document.getElementById('nav-scroll-dynamic') || document.querySelector('.nav-scroll');
  if (!nav) return;
  
  try {
    const usnap = await getDoc(doc(db,'users',uid));
    const ud = usnap.exists() ? usnap.data() : {};
    const role = ud.role || 'admin';
    const perms = ud.permissions || {};
    const userPages = perms.pages || [];
    const isAdm = ['admin','operation_manager'].includes(role);
    
    const ROLE_DASH = {
      admin:'index.html', operation_manager:'index.html',
      customer_service:'cs-dashboard.html',
      graphic_designer:'designer-dashboard.html',
      design_operator:'designer-dashboard.html',
      production_agent:'production-dashboard.html',
      shipping_officer:'shipping-dashboard.html',
      wallet_manager:'accounts.html',
    };
    
    const ALL = [
      {f:'clients.html',         l:'العملاء',       i:'👤', p:'clients'},
      {f:'design.html',          l:'التصميم',       i:'✏️', p:'design'},
      {f:'print.html',           l:'الطباعة',       i:'🖨️', p:'print'},
      {f:'production.html',      l:'التنفيذ',       i:'🏭', p:'production'},
      {f:'shipping.html',        l:'الشحن',         i:'🚚', p:'shipping'},
      {f:'shipping-accounts.html',l:'حسابات الشحن',i:'📦', p:'shipping-accounts'},
      {f:'archive.html',         l:'الأرشيف',       i:'📁', p:'archive'},
      {f:'accounts.html',        l:'الحسابات',      i:'💰', p:'accounts'},
      {f:'suppliers.html',       l:'الموردين',      i:'▣',  p:'suppliers'},
      {f:'products.html',        l:'المنتجات',      i:'◈',  p:'products'},
      {f:'employees.html',       l:'الموظفين',      i:'👥', p:'employees', adminOnly:true},
      {f:'reports.html',         l:'التقارير',      i:'📊', p:'reports'},
      {f:'settings.html',        l:'الإعدادات',     i:'⚙️', p:'settings', adminOnly:true},
    ];
    
    const dash = ROLE_DASH[role] || 'index.html';
    const dashLabel = isAdm ? 'لوحة التحكم' : 'داشبوردي';
    
    let html = `<a class="nav-link${currentPage===dash?' active':''}" href="${dash}">
      <span class="nav-ico">⬡</span> ${dashLabel}
    </a>`;
    
    for (const pg of ALL) {
      if (pg.adminOnly && !isAdm) continue;
      const ok = isAdm || userPages.includes('*') || userPages.includes(pg.p);
      if (!ok) continue;
      html += `<a class="nav-link${currentPage===pg.f?' active':''}" href="${pg.f}">
        <span class="nav-ico">${pg.i}</span> ${pg.l}
      </a>`;
    }
    
    nav.innerHTML = html;
  } catch(e) {
    // fallback - show basic links
    nav.innerHTML = `
      <a class="nav-link" href="index.html"><span class="nav-ico">⬡</span> الرئيسية</a>
      <a class="nav-link" href="clients.html"><span class="nav-ico">👤</span> العملاء</a>
      <a class="nav-link" href="design.html"><span class="nav-ico">✏️</span> التصميم</a>
    `;
    console.warn('sidebar fallback:', e.message);
  }
}
// ═══════════════════════════════

// ── Global Error Handler ──
window.addEventListener('unhandledrejection',e=>{
  const msg=e.reason?.message||'';
  if(msg.includes('permission-denied')||msg.includes('Missing or insufficient')){
    console.warn('🔒 Permission denied — run setup-permissions.html');
  } else if(msg&&!msg.includes('AbortError')){
    console.error('Error:',msg);
  }
  e.preventDefault();
});


// ══ Sidebar Manager ══
const SIDEBAR_PAGES=[
  {file:'index.html',label:'لوحة التحكم',ico:'⬡',group:'main',adminOnly:true},
  {file:'clients.html',label:'العملاء',ico:'👤',group:'orders',perm:'clients'},
  {file:'design.html',label:'التصميم',ico:'✏️',group:'orders',perm:'design'},
  {file:'print.html',label:'الطباعة',ico:'🖨️',group:'orders',perm:'print'},
  {file:'production.html',label:'التنفيذ',ico:'🏭',group:'orders',perm:'production'},
  {file:'shipping.html',label:'الشحن',ico:'🚚',group:'orders',perm:'shipping'},
  {file:'shipping-accounts.html',label:'حسابات الشحن',ico:'📦',group:'orders',perm:'shipping-accounts'},
  {file:'archive.html',label:'الأرشيف',ico:'📁',group:'orders',perm:'archive'},
  {file:'accounts.html',label:'الحسابات',ico:'💰',group:'admin',perm:'accounts'},
  {file:'suppliers.html',label:'الموردين',ico:'▣',group:'admin',perm:'suppliers'},
  {file:'products.html',label:'المنتجات',ico:'◈',group:'admin',perm:'products'},
  {file:'reports.html',label:'التقارير',ico:'📊',group:'admin',perm:'reports'},
  {file:'employees.html',label:'الموظفين',ico:'👥',group:'admin',adminOnly:true},
  {file:'settings.html',label:'الإعدادات',ico:'⚙️',group:'admin',adminOnly:true},
];
const ROLE_HOME_MAP={admin:'index.html',operation_manager:'index.html',customer_service:'cs-dashboard.html',graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'};
const DASH_LABELS_MAP={admin:'لوحة التحكم',operation_manager:'لوحة التحكم',customer_service:'داشبوردي',graphic_designer:'داشبوردي',design_operator:'داشبوردي',production_agent:'داشبوردي',shipping_officer:'داشبوردي',wallet_manager:'داشبوردي'};
const GROUP_LABELS_SB={main:'الرئيسية',orders:'الأوردرات',admin:'الإدارة'};

function buildSidebar(userData,currentPage){
  if(!userData)return;
  const role=userData.role||'customer_service';
  const perms=userData.permissions||{};
  const pages=perms.pages||[];
  const isAdm=['admin','operation_manager'].includes(role);
  const cur=(currentPage||window.location.pathname.split('/').pop()||'').replace(/\?.*/,'');
  const navEl=document.getElementById('nav-links');
  if(!navEl)return;
  const dashHome=ROLE_HOME_MAP[role]||'index.html';
  let html='',lastGrp='';
  html+=`<a class="nav-link${cur===dashHome?' active':''}" href="${dashHome}"><span class="nav-ico">⬡</span> ${DASH_LABELS_MAP[role]||'داشبوردي'}</a>`;
  for(const cfg of SIDEBAR_PAGES){
    if(cfg.file==='index.html')continue;
    const ok=isAdm||(cfg.adminOnly?false:(pages.includes('*')||pages.includes(cfg.perm||'')));
    if(!ok)continue;
    if(cfg.group!==lastGrp){html+=`<div class="nav-group">${GROUP_LABELS_SB[cfg.group]||cfg.group}</div>`;lastGrp=cfg.group;}
    html+=`<a class="nav-link${cur===cfg.file?' active':''}" href="${cfg.file}"><span class="nav-ico">${cfg.ico}</span> ${cfg.label}</a>`;
  }
  navEl.innerHTML=html;
}

function guardPage(userData,currentPage){
  if(!userData)return true;
  const role=userData.role||'customer_service';
  const isAdm=['admin','operation_manager'].includes(role);
  if(isAdm)return true;
  const perms=userData.permissions||{};
  const pages=perms.pages||[];
  const cur=(currentPage||window.location.pathname.split('/').pop()||'').replace(/\?.*/,'');
  const cfg=SIDEBAR_PAGES.find(p=>p.file===cur);
  if(!cfg)return true;
  if(cfg.adminOnly){window.location.href=ROLE_HOME_MAP[role]||'login.html';return false;}
  const perm=cfg.perm||cur.replace('.html','');
  if(!pages.includes('*')&&!pages.includes(perm)){window.location.href=ROLE_HOME_MAP[role]||'login.html';return false;}
  return true;
}

function initSidebar(userData,currentPage){
  if(!guardPage(userData,currentPage))return false;
  buildSidebar(userData,currentPage);
  return true;
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getStorage, ref, uploadBytes, getDownloadURL }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const FB={apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"};
const app=initializeApp(FB);
const auth=getAuth(app); const db=getFirestore(app); const storage=getStorage(app);

const ADDONS=['سلوفان مط','سلوفان لامع','كيرف UV','بطاقة إسقاط','جيب داخلي','كريز (طي)','ختم ذهبي','ختم فضي','نقشة (ريليف)','قص ليزر','فردة 350 جرام','فردة 250 جرام','حبة نول','تغليف نايلون','سوار حمل'];

let orders=[],wallets=[],currentUser=null,userName='',activeId=null,editProdIdx=null,tempAddons=[],currentRole='admin';
let isAdmin=true;

const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const gv=id=>document.getElementById(id)?.value||'';
const sv=(id,v)=>{const e=document.getElementById(id);if(e)e.value=v||'';};
const setText=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
const oM=id=>document.getElementById('ov-'+id)?.classList.add('open');
const cM=id=>document.getElementById('ov-'+id)?.classList.remove('open');
window.cM=cM;
const nowStr=()=>new Date().toLocaleDateString('ar-EG')+' '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
const delay=dl=>dl?Math.max(0,Math.floor((new Date()-new Date(dl))/(864e5))):0;
const ROLES={admin:{label:'Admin',col:'var(--p)'},operation_manager:{label:'Ops Mgr',col:'var(--b)'},customer_service:{label:'CS',col:'var(--c)'},graphic_designer:{label:'Designer',col:'var(--p)'},design_operator:{label:'Design Op',col:'var(--y)'},production_agent:{label:'Production',col:'var(--r)'},shipping_officer:{label:'Shipping',col:'var(--c)'},wallet_manager:{label:'Wallet',col:'var(--g)'}};

function calcOrderTotal(o){
  return (o.products||[]).reduce((s,p)=>s+(parseFloat(p.unitPrice)||0),0);
}

function toast(msg,t=''){const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}
window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};

// ══ Admin Order Management ══
function showAdminSection(o, isAdmin){
  const sec = document.getElementById('admin-mgmt-section');
  if(!sec) return;
  if(!isAdmin){ sec.style.display='none'; return; }
  sec.style.display='block';
  // ملء القيم الحالية
  document.getElementById('adm-sale-price').value = o.salePrice||0;
  document.getElementById('adm-paid').value = o.totalPaid||o.deposit||o.paid||0;
  document.getElementById('adm-discount').value = o.discount||0;
  calcAdmRemaining();
}

window.calcAdmRemaining=function(){
  const sale = parseFloat(document.getElementById('adm-sale-price')?.value)||0;
  const paid = parseFloat(document.getElementById('adm-paid')?.value)||0;
  const disc = parseFloat(document.getElementById('adm-discount')?.value)||0;
  const net  = Math.max(0, sale - disc);
  const rem  = Math.max(0, net - paid);
  const el   = document.getElementById('adm-remaining-preview');
  if(el) el.textContent = `الصافي: ${fn(net)} ج | الباقي: ${fn(rem)} ج`;
};

window.moveStage=async function(stage){
  if(!activeId) return;
  const labels={design:'تصميم',printing:'طباعة',production:'تنفيذ',shipping:'شحن',archived:'أرشيف'};
  if(!confirm(`نقل الأوردر إلى ${labels[stage]}؟`)) return;
  const o = orders.find(x=>x._id===activeId); if(!o) return;
  try{
    await updateDoc(doc(db,'orders',activeId),{
      stage,
      timeline:[...(o.timeline||[]),{date:nowStr(),action:`🔄 نُقل إلى ${labels[stage]} (أدمن)`,by:userName}],
      updatedAt:serverTimestamp()
    });
    closePanel();
    toast(`✅ انتقل إلى ${labels[stage]}`,'ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

window.saveAdminFinance=async function(){
  if(!activeId) return;
  const o = orders.find(x=>x._id===activeId); if(!o) return;
  const sale     = parseFloat(document.getElementById('adm-sale-price').value)||0;
  const paid     = parseFloat(document.getElementById('adm-paid').value)||0;
  const discount = parseFloat(document.getElementById('adm-discount').value)||0;
  const net      = Math.max(0, sale - discount);
  const remaining= Math.max(0, net - paid);
  try{
    await updateDoc(doc(db,'orders',activeId),{
      salePrice:sale, totalPaid:paid, paid,
      discount, remaining,
      paymentStatus: remaining===0?'paid':paid>0?'partial':'pending',
      timeline:[...(o.timeline||[]),{date:nowStr(),action:`✏️ تعديل مالي: سعر ${fn(sale)} ج | مدفوع ${fn(paid)} ج | خصم ${fn(discount)} ج`,by:userName}],
      updatedAt:serverTimestamp()
    });
    toast('✅ تم التعديل المالي','ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

window.deleteOrderFull=async function(){
  if(!activeId) return;
  const o = orders.find(x=>x._id===activeId); if(!o) return;
  if(!confirm(`⚠️ حذف أوردر "${o.clientName}" نهائياً؟\nلا يمكن التراجع عن هذا الإجراء.`)) return;
  if(!confirm('تأكيد الحذف النهائي؟')) return;
  try{
    const {deleteDoc:delDoc, getDocs, query:qry, where:whr} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    
    // حذف المعاملات المرتبطة
    const txSnap = await getDocs(qry(collection(db,'transactions_v2'),whr('orderId','==',activeId)));
    for(const tx of txSnap.docs){
      // رجّع رصيد المحفظة لو دفعة واردة
      if(tx.data().type==='in' && tx.data().walletId){
        const w = wallets?.find(x=>x._id===tx.data().walletId);
        if(w){
          const newBal = Math.max(0,(parseFloat(w.balance)||0)-(parseFloat(tx.data().amount)||0));
          await updateDoc(doc(db,'wallets',tx.data().walletId),{balance:newBal});
        }
      }
      await delDoc(tx.ref);
    }
    
    // حذف الأوردر
    await delDoc(doc(db,'orders',activeId));
    closePanel();
    toast('✅ تم حذف الأوردر نهائياً','ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

document.addEventListener('paste', function(e){
  // تحقق إن modal التعديل مفتوح
  const modal = document.getElementById('ov-edit-prod');
  if(!modal||!modal.classList.contains('open'))return;
  
  const items = e.clipboardData?.items;
  if(!items)return;
  
  for(const item of items){
    if(item.type.startsWith('image/')){
      const file = item.getAsFile();
      if(!file)continue;
      
      const reader = new FileReader();
      reader.onload = function(ev){
        const wrap = document.getElementById('ep-img-preview-wrap');
        if(wrap){
          wrap.innerHTML = `<img src="${ev.target.result}" style="width:100%;max-height:160px;object-fit:contain;border-radius:var(--rad)"><div style="font-size:11px;color:var(--g);margin-top:6px">✓ صورة ملصقة - جاهز للرفع</div>`;
        }
        // احفظ الـ file للرفع
        window.__pastedFile = file;
        toast('✅ تم لصق الصورة - اضغط حفظ للرفع','ok');
      };
      reader.readAsDataURL(file);
      break;
    }

window.saveProductDetails=async function(){
  const price=parseFloat(gv('ep-price'))||0;
  const newQty=parseInt(gv('ep-qty'))||1;
  const o=orders.find(x=>x._id===activeId);if(!o)return;
  const prods=[...(o.products||[])];
  const p={...prods[editProdIdx]};
  p.unitPrice=price;p.qty=newQty;p.addons=[...tempAddons];p.instructions=gv('ep-instructions');
  // رفع الصورة
  const imgInp=document.getElementById('ep-img-inp');
  if(imgInp.files[0]){
    toast('جاري رفع الصورة...','');
    try{const storageRef=ref(storage,`designs/${activeId}_p${editProdIdx}_${Date.now()}`);await uploadBytes(storageRef,imgInp.files[0]);p.designImageUrl=await getDownloadURL(storageRef);}
    catch(e){toast('❌ خطأ في رفع الصورة','err');return;}
  }
  prods[editProdIdx]=p;
  // إجمالي = مجموع unitPrice كل المنتجات
  const newTotal=prods.reduce((s,x)=>s+(parseFloat(x.unitPrice)||0),0);
  const totalPaid=parseFloat(o.paid)||0;
  const rem=Math.max(0,newTotal-totalPaid);
  try{
    await updateDoc(doc(db,'orders',activeId),{
      products:prods,salePrice:newTotal,remaining:rem,
      timeline:[...(o.timeline||[]),{date:nowStr(),action:`✏️ ${p.name}: ${fn(price)} ج — ${tempAddons.length} إضافة`,by:userName}],
      updatedAt:serverTimestamp()
    });
    cM('edit-prod');toast('✅ تم — إجمالي البيع: '+fn(newTotal)+' ج','ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

async function _uploadPrintFile(file){
  if(!activeId)return;
  const o=orders.find(x=>x._id===activeId);if(!o)return;
  const pw=document.getElementById('print-prog-wrap');
  const pb=document.getElementById('print-prog-bar');
  const pt=document.getElementById('print-prog-txt');
  if(pw)pw.style.display='block';
  try{
    const {getStorage,ref,uploadBytesResumable,getDownloadURL}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js");
    const storage=getStorage();
    const sRef=ref(storage,`print-finals/${activeId}_${Date.now()}`);
    const task=uploadBytesResumable(sRef,file);
    await new Promise((res,rej)=>{
      task.on('state_changed',
        s=>{const p=Math.round(s.bytesTransferred/s.totalBytes*100);if(pb)pb.style.width=p+'%';if(pt)pt.textContent=p+'%';},
        rej,
        async()=>{
          const url=await getDownloadURL(task.snapshot.ref);
          const nowS=new Date().toLocaleDateString('ar-EG')+' '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
          await db.collection('orders').doc(activeId).update({
            printFinalUrl:url,
            printFinalType:file.type,
            timeline:[...(o.timeline||[]),{date:nowS,action:'📁 رُفع الملف النهائي للمطبعة',by:userName}]
          });
          if(pw)pw.style.display='none';
          toast('✅ تم رفع الملف النهائي','ok');
          res();
        }
      );
    });
  }catch(e){
    if(pw)pw.style.display='none';
    toast('❌ '+e.message,'err');
  }
}
