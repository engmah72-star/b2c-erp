<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<title>Business2Card — سجل النشاط</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://www.gstatic.com">
<link rel="dns-prefetch" href="https://firestore.googleapis.com">
<link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css?v=45">
<script src="sidebar-config.js"></script>
<script src="sidebar.js"></script>
<script type="module" src="inbox-badge.js"></script>
<script src="smart-sidebar.js?v=1" defer></script>
<script src="viewas.js?v=1" defer></script>
<script src="pwa-install.js?v=1" defer></script>
<script src="theme.js?v=4"></script>
<style>
/* ══ سجل النشاط ══ */
.log-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.log-count{font-size:var(--fs-sm,13px);color:var(--dim2);font-weight:700;margin-inline-start:auto}

/* مجموعة الأوردر الواحد */
.log-group{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2,14px);margin-bottom:10px;overflow:hidden}
.log-group-header{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:10px 14px;
  border-bottom:1px solid var(--line);
  cursor:pointer;
  transition:.12s;
}
.log-group-header:hover{background:var(--bg3)}
.log-order-ref{font-size:var(--fs-xs,11px);color:var(--dim2);font-weight:800}
.log-client-name{font-size:var(--fs-base,14px);font-weight:800}
.log-stage-chip{font-size:var(--fs-xs,11px);font-weight:700;padding:2px 8px;border-radius:99px}
.log-entry-count{font-size:var(--fs-xs,11px);color:var(--dim2);font-weight:700;margin-inline-start:auto}

/* صف إدخال واحد */
.log-entry{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line);transition:.1s;cursor:pointer}
.log-entry:last-child{border-bottom:none}
.log-entry:hover{background:rgba(255,255,255,.03)}

.log-kind-dot{
  flex:none;width:28px;height:28px;border-radius:50%;
  display:grid;place-items:center;font-size:12px;margin-top:1px;
}
.kd-op      {background:rgba(74,142,245,.15);color:var(--b)}
.kd-edit    {background:rgba(255,170,0,.15);color:var(--y)}
.kd-system  {background:rgba(120,120,160,.15);color:var(--dim2)}
.kd-reversal{background:rgba(255,61,110,.15);color:var(--r)}
.kd-heal    {background:rgba(255,140,0,.15);color:#ff8c00}

.log-entry-body{flex:1;min-width:0}
.log-action{font-size:var(--fs-sm,13px);font-weight:600;line-height:1.4;word-break:break-word}
.log-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:4px;font-size:11px;color:var(--dim2)}

.log-kind-badge{padding:1px 6px;border-radius:99px;font-size:10px;font-weight:700}
.kb-op      {background:rgba(74,142,245,.12);color:var(--b)}
.kb-edit    {background:rgba(255,170,0,.12);color:var(--y)}
.kb-system  {background:rgba(120,120,160,.12);color:var(--dim2)}
.kb-reversal{background:rgba(255,61,110,.12);color:var(--r)}
.kb-heal    {background:rgba(255,140,0,.12);color:#ff8c00}

.log-action-stage{font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px}

.log-more-notice{text-align:center;padding:12px;color:var(--dim2);font-size:var(--fs-sm,13px)}
</style>
<script type="module" src="app-sidebar.js?v=3"></script>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand">
    <div class="nav-logo">📋</div>
    <div>
      <div class="nav-brand-name">Business2Card</div>
      <div class="nav-brand-role" id="role-badge">ERP</div>
    </div>
  </div>
  <div class="nav-scroll" id="nav-links"></div>
  <div class="nav-foot">
    <div class="nav-user" onclick="doLogout()">
      <div class="nav-avatar" id="nav-av">A</div>
      <div>
        <div class="nav-user-name" id="nav-name">User</div>
        <div class="nav-user-role">تسجيل خروج</div>
      </div>
    </div>
  </div>
</aside>
<app-sidebar active current="order-log.html"></app-sidebar>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button type="button" class="mob-menu-btn"
        onclick="document.querySelector('.sidenav')?.classList.toggle('mob-open');document.getElementById('nav-ov')?.classList.toggle('show')">☰</button>
      <div><h1>📋 سجل النشاط</h1><p id="sub">جاري التحميل...</p></div>
    </div>
  </div>

  <div class="content">
    <div class="log-filters">
      <div class="sw">
        <span class="sw-ico">🔍</span>
        <input class="inp" id="q" placeholder="اسم العميل · رقم الأوردر · اسم المنفّذ · نص العملية"
          oninput="renderFeed()" style="min-width:220px">
      </div>
      <select class="inp" id="f-kind" onchange="renderFeed()" style="width:130px">
        <option value="">كل الأنواع</option>
        <option value="op">🔧 عملية</option>
        <option value="edit">✏️ تعديل</option>
        <option value="system">🤖 نظام</option>
        <option value="reversal">↩️ عكس</option>
        <option value="self-heal">🔨 إصلاح</option>
      </select>
      <select class="inp" id="f-stage" onchange="renderFeed()" style="width:130px">
        <option value="">كل المراحل</option>
        <option value="design">✏️ تصميم</option>
        <option value="printing">🖨️ طباعة</option>
        <option value="production">🏭 تنفيذ</option>
        <option value="shipping">🚚 شحن</option>
        <option value="archived">📁 أرشيف</option>
        <option value="cancelled">✕ ملغي</option>
      </select>
      <span class="log-count" id="count">—</span>
    </div>

    <div id="feed"></div>
  </div>
</div>
</div>

<div class="nav-overlay" id="nav-ov"
  onclick="document.querySelector('.sidenav')?.classList.remove('mob-open');this.classList.remove('show')"></div>

<script type="module">
import { auth, db } from "./core/firebase-init.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, onSnapshot, collection, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { STAGES, skeletonCards, emptyState } from "./orders.js";

const $ = id => document.getElementById(id);
const esc = v => String(v == null ? '' : v).replace(/[&<>"]/g,
  c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));

let allOrders = [];

/* metadata لأنواع الإدخالات */
const KIND = {
  'op':        { lbl:'عملية',  ico:'🔧', dot:'kd-op',       badge:'kb-op' },
  'edit':      { lbl:'تعديل',  ico:'✏️', dot:'kd-edit',     badge:'kb-edit' },
  'system':    { lbl:'نظام',   ico:'🤖', dot:'kd-system',   badge:'kb-system' },
  'reversal':  { lbl:'عكس',    ico:'↩️', dot:'kd-reversal', badge:'kb-reversal' },
  'self-heal': { lbl:'إصلاح', ico:'🔨', dot:'kd-heal',     badge:'kb-heal' },
};

$('feed').innerHTML = skeletonCards(5);

onAuthStateChanged(auth, async u => {
  if (!u) { location.href = 'login.html'; return; }
  try {
    const us = await getDoc(doc(db, 'users', u.uid));
    if (us.exists()) {
      const d = us.data();
      const nm = $('nav-name'); if (nm) nm.textContent = d.name || u.email;
      const av = $('nav-av'); if (av) av.textContent = (d.name || 'A')[0].toUpperCase();
    }
  } catch (_) {}

  /* G3 — bounded snapshot, مرتَّب بالأحدث تحديثاً */
  onSnapshot(
    query(collection(db, 'orders'), orderBy('updatedAt', 'desc'), limit(300)),
    snap => {
      allOrders = snap.docs.map(d => ({ ...d.data(), _id: d.id }));
      $('sub').textContent = `${allOrders.length} أوردر`;
      renderFeed();
    },
    err => {
      console.warn('[order-log]', err);
      $('feed').innerHTML = '<div class="card">⚠️ تعذّر تحميل البيانات — تحقق من الصلاحيات أو الاتصال</div>';
    }
  );
});

/* ══ العرض ══ */
window.renderFeed = function () {
  const q     = ($('q')?.value     || '').trim().toLowerCase();
  const fKind = $('f-kind')?.value || '';
  const fStage = $('f-stage')?.value || '';

  /* فلترة الأوردرات أولاً (المرحلة الحالية) */
  let orders = fStage
    ? allOrders.filter(o => (o.stage || 'design') === fStage)
    : allOrders;

  /* بناء قائمة مسطّحة وفلترة الإدخالات */
  const groups = [];   // [{ order, entries[] }]
  let totalEntries = 0;

  for (const o of orders) {
    const tl = o.timeline || [];
    /* عكس الترتيب ← الأحدث أولاً */
    let entries = [...tl].reverse();

    /* فلترة النوع */
    if (fKind) entries = entries.filter(e => (e.kind || '') === fKind);

    /* فلترة النص (client + orderId + by + action) */
    if (q) {
      const cName = (o.clientName || '').toLowerCase();
      const oId   = (o.orderId   || o._id.slice(-6) || '').toLowerCase();
      entries = entries.filter(e =>
        cName.includes(q) ||
        oId.includes(q)   ||
        (e.by     || '').toLowerCase().includes(q) ||
        (e.action || '').toLowerCase().includes(q)
      );
    }

    if (!entries.length) continue;
    totalEntries += entries.length;
    groups.push({ order: o, entries });
  }

  const MAX_GROUPS   = 150;
  const MAX_PER_ORD  = 50;
  const shownGroups  = groups.slice(0, MAX_GROUPS);

  $('count').textContent =
    `${totalEntries} إدخال · ${groups.length} أوردر` +
    (groups.length > MAX_GROUPS ? ` (يُعرض أول ${MAX_GROUPS})` : '');

  if (!shownGroups.length) {
    $('feed').innerHTML = emptyState({ ico:'📋', title:'لا توجد إدخالات', sub:'جرّب بحثاً أو فلتراً مختلفاً' });
    return;
  }

  let html = '';
  for (const { order: o, entries } of shownGroups) {
    const cur = o.stage || 'design';
    const sc  = STAGES[cur] || { label: cur, ico:'📋', col:'#7878a0' };
    const displayId   = esc(o.orderId || o._id.slice(-6));
    const displayName = esc(o.clientName || '—');

    html += `<div class="log-group">`;

    /* ── رأس المجموعة ── */
    html += `<div class="log-group-header" onclick="openOrder('${esc(o._id)}')">
      <span class="log-order-ref">#${displayId}</span>
      <span class="log-client-name">${displayName}</span>
      <span class="log-stage-chip" style="background:${sc.col}1f;color:${sc.col}">${esc(sc.ico)} ${esc(sc.label)}</span>
      <span class="log-entry-count">${entries.length > MAX_PER_ORD ? MAX_PER_ORD + '+' : entries.length} إدخال</span>
    </div>`;

    /* ── إدخالات المجموعة ── */
    const shown = entries.slice(0, MAX_PER_ORD);
    for (const t of shown) {
      const km  = KIND[t.kind] || KIND['system'];
      const es  = STAGES[t.stage] || null;   /* مرحلة الإدخال (لو مختلفة عن الحالية) */

      html += `<div class="log-entry" onclick="openOrder('${esc(o._id)}')">
        <div class="log-kind-dot ${km.dot}">${km.ico}</div>
        <div class="log-entry-body">
          <div class="log-action">${esc(t.action || '—')}</div>
          <div class="log-meta">
            ${t.by ? `<span>👤 ${esc(t.by)}</span>` : ''}
            ${es && t.stage !== cur
              ? `<span class="log-action-stage" style="background:${es.col}1f;color:${es.col}">${esc(es.ico)} ${esc(es.label)}</span>`
              : ''}
            <span class="log-kind-badge ${km.badge}">${km.lbl}</span>
            ${t.date ? `<span>${esc(t.date)}</span>` : ''}
          </div>
        </div>
      </div>`;
    }

    if (entries.length > MAX_PER_ORD) {
      html += `<div style="padding:8px 14px;font-size:11px;color:var(--dim2)">
        ↗ <a onclick="event.stopPropagation();openOrder('${esc(o._id)}')" style="cursor:pointer;color:var(--b)">
        افتح الأوردر لرؤية كل الإدخالات (${entries.length - MAX_PER_ORD} مخفي)
        </a></div>`;
    }

    html += `</div>`;
  }

  if (groups.length > MAX_GROUPS) {
    html += `<div class="log-more-notice">يُعرض أول ${MAX_GROUPS} أوردر من ${groups.length} — استخدم البحث لتضييق النطاق</div>`;
  }

  $('feed').innerHTML = html;
};

window.openOrder = function (id) {
  if (typeof navigatePage === 'function') navigatePage('order.html?id=' + id);
  else location.href = 'order.html?id=' + id;
};

window.doLogout = async function () {
  try {
    const { signOut } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    await signOut(auth);
  } catch (_) {}
  location.href = 'login.html';
};
</script>
</body>
</html>
