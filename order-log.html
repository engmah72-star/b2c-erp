<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<title>Business2Card — منصة النشاط</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://www.gstatic.com">
<link rel="dns-prefetch" href="https://firestore.googleapis.com">
<link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="sidebar.js"></script>

<style>
/* ══ منصة النشاط ══════════════════════════════════════════ */

/* KPI Strip */
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
@media(max-width:640px){.kpi-strip{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2,14px);padding:14px 16px;transition:.15s}
.kpi-card.alert{border-color:rgba(255,61,110,.3);background:rgba(255,61,110,.04)}
.kpi-num{font-size:28px;font-weight:900;line-height:1}
.kpi-lbl{font-size:11px;color:var(--dim2);margin-top:4px;font-weight:600}
.kpi-sub{font-size:10px;color:var(--dim2);margin-top:2px}

/* Filters */
.filters-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.actor-filter-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:700;background:rgba(74,142,245,.12);color:var(--b);border:1px solid rgba(74,142,245,.3);cursor:pointer}
.actor-filter-chip span{opacity:.6;font-size:14px;line-height:1}
.log-count{font-size:var(--fs-sm,13px);color:var(--dim2);font-weight:700;margin-inline-start:auto}

/* Platform Grid */
.platform-grid{display:grid;grid-template-columns:1fr 260px;gap:14px;align-items:start}
@media(max-width:960px){.platform-grid{grid-template-columns:1fr}}
.platform-sidebar{display:flex;flex-direction:column;gap:12px}
@media(max-width:960px){.platform-sidebar{display:grid;grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.platform-sidebar{grid-template-columns:1fr}}

/* Sidebar Boxes */
.sb-box{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2,14px);overflow:hidden}
.sb-head{padding:10px 14px;font-size:var(--fs-sm,13px);font-weight:800;color:var(--dim2);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}

/* Actor Board */
.actor-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:.1s}
.actor-row:hover{background:var(--bg3)}
.actor-row:last-child{border-bottom:none}
.actor-row.active-actor{background:rgba(74,142,245,.08);border-inline-start:3px solid var(--b)}
.actor-rank{font-size:10px;color:var(--dim2);font-weight:800;width:14px;flex:none;text-align:center}
.actor-info{flex:1;min-width:0}
.actor-name{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.actor-bar-wrap{height:3px;background:var(--line);border-radius:2px;margin-top:3px}
.actor-bar{height:3px;background:var(--b);border-radius:2px;transition:.3s}
.actor-cnt{font-size:11px;color:var(--dim2);font-weight:700;flex:none}

/* Stuck/Alert Box */
.stuck-item{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:.1s;font-size:12px}
.stuck-item:hover{background:var(--bg3)}
.stuck-item:last-child{border-bottom:none}
.stuck-id{font-size:10px;color:var(--dim2);font-weight:800;flex:none}
.stuck-client{flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stuck-dur{font-size:10px;color:var(--r);font-weight:700;flex:none}

/* Feed */
.bucket-wrap{margin-bottom:10px}
.bucket-head{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:11px;font-weight:800;color:var(--dim2);background:var(--bg0,#0f0f17);border-radius:var(--rad,10px) var(--rad,10px) 0 0;border:1px solid var(--line);border-bottom:none}
.bucket-cnt{margin-inline-start:auto;font-weight:700;background:var(--bg3);padding:1px 7px;border-radius:99px;font-size:10px}
.bucket-entries{background:var(--bg2);border:1px solid var(--line);border-top:none;border-radius:0 0 var(--rad2,14px) var(--rad2,14px);overflow:hidden}

.feed-entry{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:.1s}
.feed-entry:last-child{border-bottom:none}
.feed-entry:hover{background:rgba(255,255,255,.025)}

.kd{flex:none;width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:11px;margin-top:1px}
.kd-op      {background:rgba(74,142,245,.15);color:var(--b)}
.kd-edit    {background:rgba(255,170,0,.15);color:var(--y)}
.kd-system  {background:rgba(120,120,160,.15);color:var(--dim2)}
.kd-reversal{background:rgba(255,61,110,.15);color:var(--r)}
.kd-heal    {background:rgba(255,140,0,.15);color:#ff8c00}

.entry-body{flex:1;min-width:0}
.entry-action{font-size:13px;font-weight:600;line-height:1.35;word-break:break-word}
.entry-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:3px;font-size:11px;color:var(--dim2)}
.entry-order{font-size:10px;font-weight:800;color:var(--b);padding:1px 6px;background:rgba(74,142,245,.1);border-radius:99px;white-space:nowrap}
.entry-actor{cursor:pointer;padding:1px 6px;border-radius:99px;background:var(--bg3);font-weight:700;color:var(--snow,#e8e8f0);font-size:11px}
.entry-actor:hover{background:rgba(74,142,245,.15);color:var(--b)}
.entry-actor.active-actor{background:rgba(74,142,245,.15);color:var(--b)}
.entry-stage{font-size:10px;font-weight:700;padding:1px 5px;border-radius:99px}
.kb{padding:1px 5px;border-radius:99px;font-size:10px;font-weight:700}
.kb-op      {background:rgba(74,142,245,.1);color:var(--b)}
.kb-edit    {background:rgba(255,170,0,.1);color:var(--y)}
.kb-system  {background:rgba(120,120,160,.1);color:var(--dim2)}
.kb-reversal{background:rgba(255,61,110,.1);color:var(--r)}
.kb-heal    {background:rgba(255,140,0,.1);color:#ff8c00}

.live-dot{width:7px;height:7px;border-radius:50%;background:var(--g);display:inline-block;margin-inline-end:5px;animation:live-pulse 2s infinite}
@keyframes live-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

.more-notice{text-align:center;padding:12px;color:var(--dim2);font-size:var(--fs-sm,13px);font-style:italic}

/* Reversal alert badge */
.reversal-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;background:rgba(255,61,110,.12);color:var(--r);margin-inline-start:auto}
</style>
<script type="module" src="app-sidebar.js?v=3"></script>
</head>

  <div class="nav-scroll" id="nav-links"></div>
  <div class="nav-foot">

<div class="main">

      </div>

  <div class="content">
    <!-- ══ KPI Strip ══ -->
    <div class="kpi-strip" id="kpi-strip">
      <div class="kpi-card"><div class="kpi-num">—</div><div class="kpi-lbl">📊 إجمالي الإدخالات</div></div>
      <div class="kpi-card"><div class="kpi-num">—</div><div class="kpi-lbl">📅 نشاط اليوم</div></div>
      <div class="kpi-card"><div class="kpi-num">—</div><div class="kpi-lbl">👥 المنفّذون</div></div>
      <div class="kpi-card"><div class="kpi-num">—</div><div class="kpi-lbl">⚠️ أوردرات متوقفة</div></div>

    <!-- ══ Filters ══ -->
    <div class="filters-row">

  onclick="document.querySelector('.sidenav')?.classList.remove('mob-open');this.classList.remove('show')"></div>

<script type="module">
import { auth, db } from "./core/firebase-init.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { doc, getDoc, onSnapshot, collection, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { STAGES, getOrderAlerts, skeletonCards, emptyState } from "./orders.js";

const $ = id => document.getElementById(id);
const esc = v => String(v == null ? '' : v).replace(/[&<>"]/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ── State ─────────────────────────────────────────── */
let allOrders  = [];
let flatLog    = [];        /* كل الإدخالات مُسطَّحة ومُرتَّبة */
let actorFilter = '';       /* فلتر المنفّذ (اسم) */
let renderTimer = null;

/* ── Metadata ──────────────────────────────────────── */
const KIND = {
  'op':        { lbl:'عملية',  ico:'🔧', dot:'kd-op',       kb:'kb-op'       },
  'edit':      { lbl:'تعديل',  ico:'✏️', dot:'kd-edit',     kb:'kb-edit'     },
  'system':    { lbl:'نظام',   ico:'🤖', dot:'kd-system',   kb:'kb-system'   },
  'reversal':  { lbl:'عكس',    ico:'↩️', dot:'kd-reversal', kb:'kb-reversal' },
  'self-heal': { lbl:'إصلاح', ico:'🔨', dot:'kd-heal',     kb:'kb-heal'     },
};

/* ── Time bucket helpers ───────────────────────────── */
const todayMidnight = (() => { const d = new Date(); d.setHours(0,0,0,0); return d.getTime()/1000; })();
const yesterdayMidnight = todayMidnight - 86400;
const DAYS_AR = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

function timeBucket(updSecs) {
  if (updSecs >= todayMidnight) {
    const diffH = (Date.now()/1000 - updSecs) / 3600;
    if (diffH < 1) return '⚡ منذ لحظات';
    return '📅 اليوم';
  }
  if (updSecs >= yesterdayMidnight) return '📅 أمس';
  const d = new Date(updSecs * 1000);
  const diffDays = Math.floor((Date.now()/1000 - updSecs) / 86400);
  if (diffDays < 7) return '📅 ' + DAYS_AR[d.getDay()];
  return '📦 أقدم';
}

function daysStuck(updSecs) {
  return Math.floor((Date.now()/1000 - updSecs) / 86400);
}

/* ── Skeleton on load ──────────────────────────────── */
$('feed').innerHTML = skeletonCards(5);

/* ── Auth ──────────────────────────────────────────── */
onAuthStateChanged(auth, async u => {
  if (!u) { location.href = 'login.html'; return; }
  try {
    const us = await getDoc(doc(db, 'users', u.uid));
    if (us.exists()) {
      const d = us.data();
      const nm = $('nav-name'); if (nm) nm.textContent = d.name || u.email;
      const av = $('nav-av'); if (av) av.textContent = (d.name || 'A')[0].toUpperCase();
    }
  } catch (_) {}

  /* G3 — bounded, newest first */
  onSnapshot(
    query(collection(db, 'orders'), orderBy('updatedAt','desc'), limit(300)),
    snap => {
      allOrders = snap.docs.map(d => ({ ...d.data(), _id: d.id }));
      $('sub').textContent = `${allOrders.length} أوردر — آخر تحديث الآن`;
      buildFlatLog();
      renderAll();
    },
    err => {
      console.warn('[order-log]', err);
      $('feed').innerHTML = '<div class="card">⚠️ تعذّر تحميل البيانات</div>';
    }
  );
});

/* ── Build flat log (once per snapshot) ────────────── */
function buildFlatLog() {
  flatLog = [];
  for (const o of allOrders) {
    const tl = o.timeline || [];
    const updSecs = o.updatedAt?.seconds || o.createdAt?.seconds || 0;
    tl.forEach((t, idx) => {
      flatLog.push({
        ...t,
        _docId:   o._id,
        _orderId: o.orderId || o._id.slice(-6),
        _client:  o.clientName || '—',
        _stage:   o.stage || 'design',
        _updSecs: updSecs,
        _idx:     idx,
        _bucket:  timeBucket(updSecs),
      });
    });
  }
  /* Sort: newest order first, newest entry within order first */
  flatLog.sort((a, b) => b._updSecs - a._updSecs || b._idx - a._idx);
}

/* ── Render everything ─────────────────────────────── */
function renderAll() {
  renderKPIs();
  renderActorBoard();
  renderAlerts();
  renderFeed();
}

/* ── KPIs ──────────────────────────────────────────── */
function renderKPIs() {
  const now = Date.now()/1000;
  const todayEntries = flatLog.filter(e => e._updSecs >= todayMidnight);
  const actors       = new Set(flatLog.filter(e => e.by && !e.byId?.startsWith('system:')).map(e => e.by));
  const stuck        = allOrders.filter(o =>
    !['archived','cancelled'].includes(o.stage||'design') &&
    (now - (o.updatedAt?.seconds || 0)) > 86400
  );

  $('kpi-strip').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-num" style="color:var(--p,#a78bfa)">${flatLog.length.toLocaleString('ar-EG')}</div>
      <div class="kpi-lbl">📊 إجمالي الإدخالات</div>
      <div class="kpi-sub">${allOrders.length} أوردر مُحمَّل</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-num" style="color:var(--g)">${todayEntries.length.toLocaleString('ar-EG')}</div>
      <div class="kpi-lbl">📅 نشاط اليوم</div>
      <div class="kpi-sub">في آخر ${Math.round((Date.now()/1000 - todayMidnight)/3600)} ساعة</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-num" style="color:var(--b)">${actors.size.toLocaleString('ar-EG')}</div>
      <div class="kpi-lbl">👥 المنفّذون</div>
      <div class="kpi-sub">أشخاص لديهم نشاط</div>
    </div>
    <div class="kpi-card${stuck.length > 0 ? ' alert' : ''}">
      <div class="kpi-num" style="color:${stuck.length > 0 ? 'var(--r)' : 'var(--dim2)'}">${stuck.length.toLocaleString('ar-EG')}</div>
      <div class="kpi-lbl">⚠️ أوردرات متوقفة</div>
      <div class="kpi-sub">بلا تحديث > 24 ساعة</div>
    </div>`;
}

/* ── Actor Board ───────────────────────────────────── */
function renderActorBoard() {
  const map = {};
  for (const e of flatLog) {
    if (!e.by || e.byId?.startsWith('system:')) continue;
    map[e.by] = (map[e.by] || 0) + 1;
  }
  const sorted = Object.entries(map).sort((a,b) => b[1]-a[1]).slice(0,8);
  const max    = sorted[0]?.[1] || 1;

  $('actor-total').textContent = `${sorted.length} شخص`;

  $('actor-rows').innerHTML = sorted.length ? sorted.map(([name, cnt], i) => `
    <div class="actor-row${actorFilter===name?' active-actor':''}" onclick="toggleActorFilter('${esc(name)}')">
      <div class="actor-rank">${i+1}</div>
      <div class="actor-info">
        <div class="actor-name">${esc(name)}</div>
        <div class="actor-bar-wrap">
          <div class="actor-bar" style="width:${Math.round(cnt/max*100)}%"></div>
        </div>
      </div>
      <div class="actor-cnt">${cnt}</div>
    </div>`).join('')
  : '<div style="padding:12px 14px;color:var(--dim2);font-size:12px">لا يوجد نشاط</div>';
}

/* ── Alerts: stuck + reversals ─────────────────────── */
function renderAlerts() {
  const now = Date.now()/1000;

  /* Stuck orders */
  const stuck = allOrders
    .filter(o => !['archived','cancelled'].includes(o.stage||'design') && (now-(o.updatedAt?.seconds||0))>86400)
    .slice(0, 10);

  if (stuck.length > 0) {
    $('stuck-cnt').textContent = stuck.length;
    $('stuck-rows').innerHTML = stuck.map(o => {
      const sc  = STAGES[o.stage||'design'] || { ico:'📋', col:'#7878a0' };
      const dur = daysStuck(o.updatedAt?.seconds||0);
      return `<div class="stuck-item" onclick="openOrder('${esc(o._id)}')">
        <div class="stuck-id">#${esc(o.orderId||o._id.slice(-6))}</div>
        <div class="stuck-client">${esc(o.clientName||'—')}</div>
        <span style="font-size:10px;padding:1px 5px;border-radius:99px;background:${sc.col}1f;color:${sc.col}">${sc.ico}</span>
        <div class="stuck-dur">${dur} يوم</div>
      </div>`;
    }).join('');
    $('stuck-box').style.display = '';
  } else {
    $('stuck-box').style.display = 'none';
  }

  /* Recent reversals (last 7 days) */
  const revOrders = allOrders.filter(o =>
    (o.timeline||[]).some(t => t.kind === 'reversal') &&
    (now - (o.updatedAt?.seconds||0)) < 604800
  ).slice(0, 6);

  if (revOrders.length > 0) {
    $('rev-cnt').textContent = revOrders.length;
    $('rev-rows').innerHTML = revOrders.map(o => {
      const revEntry = [...(o.timeline||[])].reverse().find(t => t.kind === 'reversal');
      return `<div class="stuck-item" onclick="openOrder('${esc(o._id)}')">
        <div class="stuck-id">#${esc(o.orderId||o._id.slice(-6))}</div>
        <div class="stuck-client">${esc(o.clientName||'—')}</div>
        <div class="stuck-dur" style="color:var(--r)">${esc(revEntry?.by||'—')}</div>
      </div>`;
    }).join('');
    $('rev-box').style.display = '';
  } else {
    $('rev-box').style.display = 'none';
  }
}

/* ── Feed ──────────────────────────────────────────── */
const MAX_ENTRIES = 600;

window.renderFeed = function () {
  const q      = ($('q')?.value||'').trim().toLowerCase();
  const fKind  = $('f-kind')?.value||'';
  const fStage = $('f-stage')?.value||'';

  /* actor chip */
  if (actorFilter) {
    $('actor-chip').style.display = '';
    $('actor-chip').innerHTML = `
      <div class="actor-filter-chip" onclick="toggleActorFilter('${esc(actorFilter)}')">
        👤 ${esc(actorFilter)} <span>×</span>
      </div>`;
  } else {
    $('actor-chip').style.display = 'none';
  }

  let list = flatLog;
  if (actorFilter) list = list.filter(e => (e.by||'') === actorFilter);
  if (fKind)       list = list.filter(e => (e.kind||'') === fKind);
  if (fStage)      list = list.filter(e => e._stage === fStage);
  if (q)           list = list.filter(e =>
    (e._client||'').toLowerCase().includes(q) ||
    (e._orderId||'').toLowerCase().includes(q) ||
    (e.by||'').toLowerCase().includes(q) ||
    (e.action||'').toLowerCase().includes(q)
  );

  const shown = list.slice(0, MAX_ENTRIES);
  $('count').textContent = `${shown.length}${list.length > MAX_ENTRIES ? '+' : ''} إدخال`;

  if (!shown.length) {
    $('feed').innerHTML = emptyState({ ico:'📋', title:'لا توجد إدخالات', sub:'جرّب بحثاً أو فلتراً مختلفاً' });
    return;
  }

  /* Group by time bucket (preserves sort order) */
  const groups = new Map();
  for (const e of shown) {
    if (!groups.has(e._bucket)) groups.set(e._bucket, []);
    groups.get(e._bucket).push(e);
  }

  const BUCKET_ORDER = ['⚡ منذ لحظات','📅 اليوم','📅 أمس',
    ...DAYS_AR.map(d => '📅 ' + d), '📦 أقدم'];

  let html = '';
  const bucketKeys = [...groups.keys()].sort((a,b) => {
    const ai = BUCKET_ORDER.indexOf(a); const bi = BUCKET_ORDER.indexOf(b);
    return (ai===-1?999:ai) - (bi===-1?999:bi);
  });

  for (const bucket of bucketKeys) {
    const entries = groups.get(bucket);
    html += `<div class="bucket-wrap">
      <div class="bucket-head">
        <span>${esc(bucket)}</span>
        <span class="bucket-cnt">${entries.length}</span>
      </div>
      <div class="bucket-entries">`;

    for (const e of entries) {
      const km = KIND[e.kind] || KIND['system'];
      const sc = STAGES[e._stage] || { ico:'📋', col:'#7878a0', label: e._stage };
      const es = STAGES[e.stage]  || null;   /* مرحلة وقت الإدخال (لو مختلفة) */

      html += `<div class="feed-entry" onclick="openOrder('${esc(e._docId)}')">
        <div class="kd ${km.dot}">${km.ico}</div>
        <div class="entry-body">
          <div class="entry-action">${esc(e.action||'—')}</div>
          <div class="entry-meta">
            <span class="entry-order" onclick="event.stopPropagation();openOrder('${esc(e._docId)}')">#${esc(e._orderId)} ${esc(e._client)}</span>
            ${e.by ? `<span class="entry-actor${actorFilter===e.by?' active-actor':''}"
              onclick="event.stopPropagation();toggleActorFilter('${esc(e.by)}')">👤 ${esc(e.by)}</span>` : ''}
            ${es && e.stage && e.stage !== e._stage
              ? `<span class="entry-stage" style="background:${es.col}1f;color:${es.col}">${esc(es.ico)} ${esc(es.label)}</span>`
              : `<span class="entry-stage" style="background:${sc.col}1f;color:${sc.col}">${esc(sc.ico)}</span>`}
            <span class="kb ${km.kb}">${km.lbl}</span>
            ${e.date ? `<span style="font-size:10px">${esc(e.date)}</span>` : ''}
          </div>
        </div>
      </div>`;
    }
    html += `</div></div>`;
  }

  if (list.length > MAX_ENTRIES) {
    html += `<div class="more-notice">يُعرض أول ${MAX_ENTRIES} إدخال من ${list.length} — استخدم الفلاتر لتضييق النطاق</div>`;
  }

  $('feed').innerHTML = html;
};

/* ── Debounced render ──────────────────────────────── */
window.scheduleRender = function () {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(renderFeed, 200);
};

/* ── Actor filter toggle ───────────────────────────── */
window.toggleActorFilter = function (name) {
  actorFilter = actorFilter === name ? '' : name;
  renderActorBoard();
  renderFeed();
};

/* ── Navigation ────────────────────────────────────── */
window.openOrder = function (id) {
  if (typeof navigatePage === 'function') navigatePage('order.html?id=' + id);
  else location.href = 'order.html?id=' + id;
};

window.doLogout = async function () {
  try {
    const { signOut } = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js");
    await signOut(auth);
  } catch (_) {}
  location.href = 'login.html';
};
</script>
</body>
</html>
