<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0f1e">
<title>تصميمات البوابة — Business2Card</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css?v=45">
<link rel="stylesheet" href="design-system/components.css?v=1">
<script src="sidebar-config.js"></script>
<script src="sidebar.js"></script>
<script src="smart-sidebar.js?v=1" defer></script>
<script src="viewas.js?v=1" defer></script>
<script type="module" src="inbox-badge.js"></script>
<!-- Unified sidebar (active على هذه الصفحة) — رجوع فوري بـ ?feat.sidebarV2=0 -->
<script type="module" src="app-sidebar.js?v=3"></script>
<style>
/* RULE U1 — التوكنز (ألوان/مسافات/خطوط) من shared.css. هنا تنسيق خاص بالصفحة فقط. */
.pd-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.pd-search{flex:1;min-width:180px;}
.pd-cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;}
.pd-cat{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:var(--bg3);
  color:var(--dim2);font-size:var(--fs-sm);font-weight:var(--fw-bold);cursor:pointer;font-family:inherit;transition:var(--trans);white-space:nowrap;}
.pd-cat:hover{border-color:var(--line2);color:var(--snow);}
.pd-cat.on{background:var(--tint-p-soft);border-color:var(--tint-p-line);color:var(--p);}
.pd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.pd-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2,16px);overflow:hidden;display:flex;flex-direction:column;transition:var(--trans);}
.pd-card.hidden-item{opacity:.62;}
.pd-card:hover{border-color:var(--line2);transform:translateY(-2px);}
.pd-img{aspect-ratio:4/3;background:var(--bg3);position:relative;overflow:hidden;cursor:zoom-in;}
.pd-img img{width:100%;height:100%;object-fit:cover;display:block;}
.pd-empty-img{display:flex;align-items:center;justify-content:center;height:100%;font-size:34px;opacity:.35;}
.pd-badge{position:absolute;top:8px;inset-inline-start:8px;padding:3px 9px;border-radius:20px;font-size:var(--fs-xs);
  font-weight:var(--fw-extra);backdrop-filter:blur(4px);}
.pd-badge.vis{background:rgba(0,217,126,.85);color:#04130c;}
.pd-badge.hid{background:rgba(120,120,160,.85);color:#fff;}
.pd-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:4px;}
.pd-title{font-size:var(--fs-md);font-weight:var(--fw-extra);color:var(--snow);line-height:var(--lh-snug);}
.pd-meta{font-size:var(--fs-xs);color:var(--dim2);}
.pd-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.pd-swatch{width:14px;height:14px;border-radius:50%;border:1px solid rgba(255,255,255,.25);}
.pd-actions{display:flex;gap:6px;padding:10px 14px;border-top:1px solid var(--line);flex-wrap:wrap;}
.pd-actions .btn{flex:1;min-width:0;}
.upload-area{border:2px dashed var(--line2);border-radius:var(--rad);padding:22px;text-align:center;cursor:pointer;
  transition:var(--trans);background:var(--bg3);}
.upload-area:hover{border-color:var(--p);}
.pd-colors{display:flex;gap:8px;flex-wrap:wrap;}
.pd-colorchip{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:var(--trans);}
.pd-empty{text-align:center;padding:60px 20px;color:var(--dim2);}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--dim2);margin-bottom:6px;}
.hide{display:none;}
/* Lightbox */
.lb{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);align-items:center;justify-content:center;padding:24px;}
.lb.open{display:flex;}
.lb img{max-width:95vw;max-height:95vh;border-radius:var(--rad2,16px);}
.lb-x{position:fixed;top:16px;inset-inline-start:16px;width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav"><div class="nav-brand"><div class="nav-logo">🎨</div><div>
  <div class="nav-brand-name">Business2Card</div>
  <div class="nav-brand-role">تصميمات البوابة</div></div></div>
  <div class="nav-scroll" id="nav-scroll-dynamic"></div></aside>
<!-- app-sidebar بعد الـ aside القديم عمداً (sidebar-mount يمسك القديم المخفي) -->
<app-sidebar active current="portal-designs.html"></app-sidebar>
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button type="button" class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div>
        <h1>🖼️ تصميمات البوابة</h1>
        <p style="font-size:var(--fs-base);color:var(--dim2)" id="pd-sub">المعرض العام الذي يظهر للعملاء في البوابة</p>
      </div>
    </div>
    <div class="topbar-right">
      <button type="button" class="btn btn-p" id="btn-new" onclick="openPublish()">＋ نشر تصميم جديد</button>
    </div>
  </div>
  <div class="content">

    <div class="pd-toolbar">
      <input class="inp pd-search" id="pd-q" type="search" placeholder="🔎 ابحث بالعنوان أو التصنيف أو المصمم..." oninput="render()">
      <select class="inp" id="pd-vis" onchange="render()" style="max-width:170px">
        <option value="all">كل الحالات</option>
        <option value="visible">👁 الظاهرة فقط</option>
        <option value="hidden">🚫 المخفية فقط</option>
      </select>
    </div>

    <div class="pd-cats" id="pd-cats"></div>

    <div id="pd-list">
      <div class="pd-empty">⟳ جاري تحميل تصميمات البوابة...</div>
    </div>

  </div>
</div>
</div>

<!-- ═══ Modal: نشر/تعديل ═══ -->
<div class="overlay" id="ov-edit">
  <div class="modal" style="max-width:500px">
    <div class="modal-head">
      <span class="modal-title" id="ed-title">🖼️ نشر تصميم جديد</span>
      <button type="button" class="modal-x" onclick="closeEdit()">✕</button>
    </div>
    <div class="modal-body">
      <!-- صورة (نشر فقط) -->
      <div class="fg" id="ed-img-fg">
        <label>🖼️ صورة الموك أب *</label>
        <div class="upload-area" onclick="document.getElementById('ed-img').click()">
          <div id="ed-img-preview">
            <div style="font-size:34px;margin-bottom:6px">🖼️</div>
            <div style="font-size:var(--fs-md);color:var(--dim2)">اضغط لاختيار صورة الموك أب</div>
          </div>
        </div>
        <input type="file" id="ed-img" accept="image/*" class="hide" onchange="previewImg(this)">
      </div>
      <div class="fg">
        <label>العنوان <span class="txt-meta-sm">(اختياري — الافتراضي = التصنيف)</span></label>
        <input class="inp" id="ed-title-inp" placeholder="مثال: هوية بصرية لمطعم...">
      </div>
      <div class="fg">
        <label>التصنيف / التخصص *</label>
        <input class="inp" id="ed-cat" placeholder="مثال: كارت شخصي، هوية بصرية، سوشيال ميديا، فلاير...">
      </div>
      <div class="fg">
        <label>ألوان مميزة <span class="txt-meta-sm">(اختياري)</span></label>
        <div class="pd-colors" id="ed-colors"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-ghost" onclick="closeEdit()">إلغاء</button>
      <button type="button" class="btn btn-p" id="ed-save" onclick="saveEdit()">🖼️ نشر في المعرض</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="closeLb()">
  <div class="lb-x" onclick="closeLb()">✕</div>
  <img id="lb-img" src="" alt="">
</div>

<script type="module">
import { db, auth } from "./core/firebase-init.js";
import { collection, query, limit, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { hasPage } from "./core/permissions-matrix.js";
import {
  publishGalleryItem, setGalleryVisibility, updateGalleryItem, deleteGalleryItem,
} from "./core/gallery-actions.js";

// ── palette (مطابق لباقي النظام) ──
const GAL_COLORS = [
  { hex:'#000000', name:'أسود' }, { hex:'#ffffff', name:'أبيض' }, { hex:'#ef4444', name:'أحمر' },
  { hex:'#f59e0b', name:'برتقالي' }, { hex:'#fbbf24', name:'أصفر' }, { hex:'#22c55e', name:'أخضر' },
  { hex:'#3b82f6', name:'أزرق' }, { hex:'#6366f1', name:'بنفسجي' }, { hex:'#ec4899', name:'وردي' },
  { hex:'#78716c', name:'بني' }, { hex:'#9ca3af', name:'رمادي' }, { hex:'#14b8a6', name:'تركواز' },
];

let gallery = [];
let role = '';
let actor = { userId: '', userName: '' };
let catFilter = 'all';
let editId = null;            // null = نشر جديد، غير ذلك = تعديل
let selColors = [];
const isAdmin = () => ['admin', 'operation_manager'].includes(role);

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

// ── toast بسيط ──
function toast(msg, kind = '') {
  let t = $('pd-toast');
  if (!t) {
    t = document.createElement('div'); t.id = 'pd-toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10000;padding:12px 20px;border-radius:10px;font-weight:700;font-family:inherit;box-shadow:0 8px 30px rgba(0,0,0,.4);max-width:90vw;text-align:center';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.background = kind === 'err' ? 'var(--r,#ef4444)' : kind === 'ok' ? 'var(--g,#00d97e)' : 'var(--bg4,#1e1e38)';
  t.style.color = kind ? '#fff' : 'var(--snow)';
  t.style.display = 'block';
  clearTimeout(t._h); t._h = setTimeout(() => { t.style.display = 'none'; }, 3200);
}

// ── auth + role ──
onAuthStateChanged(auth, async (u) => {
  if (!u) { window.location.href = 'login.html'; return; }
  try {
    const d = (await getDoc(doc(db, 'users', u.uid))).data() || {};
    role = d.role || '';
    actor = { userId: u.uid, userName: d.name || u.email || '' };
    // طبقة دفاع UI: الصفحة لقسم التصميم فقط (firestore.rules تفرض الكتابة أيضاً).
    const perms = d.permissions || null;
    if (!hasPage('design', role, perms)) {
      $('pd-list').innerHTML = '<div class="pd-empty">🚫 هذه الصفحة متاحة لفريق التصميم فقط.</div>';
      $('btn-new').style.display = 'none';
      return;
    }
  } catch (_) { /* تابع بالحد الأدنى */ }
  startListener();
});

function startListener() {
  // قراءة كل المعرض (الظاهر + المخفي) — RULE G3: حد أعلى 300.
  onSnapshot(
    query(collection(db, 'gallery'), limit(300)),
    (snap) => {
      gallery = snap.docs.map((dd) => ({ ...dd.data(), _id: dd.id }));
      const ts = (g) => g.publishedAt?.seconds ? g.publishedAt.seconds * 1000
        : (g.publishedAt ? new Date(g.publishedAt).getTime() : 0);
      gallery.sort((a, b) => ts(b) - ts(a));
      renderCats();
      render();
    },
    (err) => { $('pd-list').innerHTML = '<div class="pd-empty">تعذّر تحميل المعرض: ' + esc(err.message) + '</div>'; }
  );
}

// ── categories bar ──
function renderCats() {
  const set = new Set();
  gallery.forEach((g) => { const c = (g.productType || '').trim(); if (c) set.add(c); });
  const cats = ['all', ...[...set].sort()];
  $('pd-cats').innerHTML = cats.map((c) =>
    `<button type="button" class="pd-cat ${c === catFilter ? 'on' : ''}" data-cat="${esc(c)}">${c === 'all' ? '📂 الكل' : esc(c)}</button>`
  ).join('');
  $('pd-cats').querySelectorAll('.pd-cat').forEach((b) => {
    b.onclick = () => { catFilter = b.dataset.cat; renderCats(); render(); };
  });
}

// ── grid ──
window.render = function () {
  const q = ($('pd-q').value || '').trim().toLowerCase();
  const vis = $('pd-vis').value;
  let items = gallery.slice();
  if (catFilter !== 'all') items = items.filter((g) => (g.productType || '').trim() === catFilter);
  if (vis === 'visible') items = items.filter((g) => g.isVisible !== false);
  if (vis === 'hidden') items = items.filter((g) => g.isVisible === false);
  if (q) items = items.filter((g) =>
    (g.title || '').toLowerCase().includes(q) ||
    (g.productType || '').toLowerCase().includes(q) ||
    (g.designerName || '').toLowerCase().includes(q));

  $('pd-sub').textContent = `${gallery.length} تصميم · ${gallery.filter((g) => g.isVisible !== false).length} ظاهر للعملاء`;

  if (!items.length) {
    $('pd-list').innerHTML = `<div class="pd-empty">${gallery.length ? 'لا توجد نتائج مطابقة' : '📭 لا توجد تصميمات منشورة بعد — اضغط «نشر تصميم جديد»'}</div>`;
    return;
  }

  $('pd-list').innerHTML = '<div class="pd-grid">' + items.map((g) => {
    const visible = g.isVisible !== false;
    const tags = (Array.isArray(g.tags) ? g.tags : []).filter((t) => t && t.hex);
    return `
      <div class="pd-card ${visible ? '' : 'hidden-item'}">
        <div class="pd-img" onclick="openLb('${esc((g.imageUrl || '').replace(/'/g, '%27'))}')">
          ${g.imageUrl ? `<img src="${esc(g.imageUrl)}" alt="${esc(g.title)}" loading="lazy" decoding="async">` : '<div class="pd-empty-img">🎨</div>'}
          <span class="pd-badge ${visible ? 'vis' : 'hid'}">${visible ? '👁 ظاهر' : '🚫 مخفي'}</span>
        </div>
        <div class="pd-body">
          <div class="pd-title">${esc(g.title || '—')}</div>
          <div class="pd-meta">📂 ${esc(g.productType || '—')}</div>
          <div class="pd-meta">✏️ ${esc(g.designerName || '—')}</div>
          ${tags.length ? `<div class="pd-tags">${tags.map((t) => `<span class="pd-swatch" style="background:${esc(t.hex)}" title="${esc(t.name || '')}"></span>`).join('')}</div>` : ''}
        </div>
        <div class="pd-actions">
          <button type="button" class="btn btn-sm btn-ghost" onclick="toggleVis('${g._id}')">${visible ? '🚫 إخفاء' : '👁 إظهار'}</button>
          <button type="button" class="btn btn-sm btn-ghost" onclick="openEdit('${g._id}')">✏️ تعديل</button>
          ${isAdmin() ? `<button type="button" class="btn btn-sm btn-danger" onclick="removeItem('${g._id}')">🗑 حذف</button>` : ''}
        </div>
      </div>`;
  }).join('') + '</div>';
};

// ── color chips (modal) ──
function renderColorChips() {
  $('ed-colors').innerHTML = GAL_COLORS.map((c) =>
    `<div class="pd-colorchip" id="cc-${c.hex.slice(1)}" style="background:${c.hex};${selColors.some((x) => x.hex === c.hex) ? 'border-color:#fff;transform:scale(1.15)' : ''}" title="${c.name}" data-hex="${c.hex}" data-name="${c.name}"></div>`
  ).join('');
  $('ed-colors').querySelectorAll('.pd-colorchip').forEach((el) => {
    el.onclick = () => {
      const hex = el.dataset.hex, name = el.dataset.name;
      const i = selColors.findIndex((c) => c.hex === hex);
      if (i > -1) selColors.splice(i, 1); else selColors.push({ hex, name });
      renderColorChips();
    };
  });
}

// ── publish/edit modal ──
window.openPublish = function () {
  editId = null; selColors = [];
  $('ed-title').textContent = '🖼️ نشر تصميم جديد';
  $('ed-img-fg').style.display = '';
  $('ed-img-preview').innerHTML = '<div style="font-size:34px;margin-bottom:6px">🖼️</div><div style="font-size:var(--fs-md);color:var(--dim2)">اضغط لاختيار صورة الموك أب</div>';
  $('ed-img').value = '';
  $('ed-title-inp').value = '';
  $('ed-cat').value = '';
  $('ed-save').textContent = '🖼️ نشر في المعرض';
  renderColorChips();
  $('ov-edit').classList.add('open');
};

window.openEdit = function (id) {
  const g = gallery.find((x) => x._id === id); if (!g) return;
  editId = id;
  selColors = (Array.isArray(g.tags) ? g.tags : []).filter((t) => t && t.hex).map((t) => ({ hex: t.hex, name: t.name || '' }));
  $('ed-title').textContent = '✏️ تعديل بيانات التصميم';
  $('ed-img-fg').style.display = 'none';   // الصورة لا تُعدّل — أعد النشر لتغييرها
  $('ed-title-inp').value = g.title || '';
  $('ed-cat').value = g.productType || '';
  $('ed-save').textContent = '💾 حفظ التعديل';
  renderColorChips();
  $('ov-edit').classList.add('open');
};

window.closeEdit = function () { $('ov-edit').classList.remove('open'); };

window.previewImg = function (inp) {
  const f = inp.files?.[0]; if (!f) return;
  const r = new FileReader();
  r.onload = (e) => {
    $('ed-img-preview').innerHTML = `<img src="${e.target.result}" style="width:100%;max-height:200px;object-fit:contain;border-radius:8px" alt=""><div style="font-size:var(--fs-sm);color:var(--g);margin-top:6px">✓ جاهز للنشر</div>`;
  };
  r.readAsDataURL(f);
};

window.saveEdit = async function () {
  const title = $('ed-title-inp').value.trim();
  const cat = $('ed-cat').value.trim();
  if (!cat) return toast('⚠️ أدخل التصنيف', 'err');
  const btn = $('ed-save'); btn.disabled = true;
  try {
    let res;
    if (editId) {
      res = await updateGalleryItem({ id: editId, patch: { title, productType: cat, tags: selColors }, actor });
    } else {
      const file = $('ed-img').files?.[0];
      if (!file) { btn.disabled = false; return toast('⚠️ اختر صورة للموك أب', 'err'); }
      toast('⏳ جاري الرفع...');
      res = await publishGalleryItem({ file, title, productType: cat, tags: selColors, actor });
    }
    if (!res.ok) { toast('❌ ' + (res.errors?.[0] || 'فشل الحفظ'), 'err'); return; }
    closeEdit();
    toast((res.warnings?.[0] ? res.warnings[0] + ' · ' : '') + (editId ? '✅ تم حفظ التعديل' : '✅ تم النشر في المعرض'), 'ok');
  } catch (e) {
    toast('❌ ' + (e?.message || 'خطأ غير متوقع'), 'err');
  } finally {
    btn.disabled = false;
  }
};

window.toggleVis = async function (id) {
  const g = gallery.find((x) => x._id === id); if (!g) return;
  const res = await setGalleryVisibility({ id, isVisible: g.isVisible === false, actor });
  toast(res.ok ? (g.isVisible === false ? '👁 أصبح ظاهراً للعملاء' : '🚫 تم إخفاؤه من البوابة') : ('❌ ' + (res.errors?.[0] || 'فشل')), res.ok ? 'ok' : 'err');
};

window.removeItem = async function (id) {
  const g = gallery.find((x) => x._id === id); if (!g) return;
  if (!confirm(`حذف نهائي للتصميم "${g.title || g.productType || ''}"؟\nلا يمكن التراجع. (للإخفاء المؤقت استخدم زر «إخفاء»)`)) return;
  const res = await deleteGalleryItem({ id, storagePath: g.storagePath || null, actor });
  toast(res.ok ? '🗑 تم الحذف نهائياً' : ('❌ ' + (res.errors?.[0] || 'فشل الحذف')), res.ok ? 'ok' : 'err');
};

// ── lightbox ──
window.openLb = function (url) { if (!url) return; $('lb-img').src = url; $('lb').classList.add('open'); };
window.closeLb = function () { $('lb').classList.remove('open'); };
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeLb(); closeEdit(); } });
</script>
</body>
</html>
