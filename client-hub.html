<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Business2Card — ملف العميل الكامل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://www.gstatic.com">
<link rel="dns-prefetch" href="https://firestore.googleapis.com">
<link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="stylesheet" href="shared.css?v=45">
<link rel="stylesheet" href="client-theme.css?v=1">
<style>
/* RULE U1 — التوكنز من shared.css. تنسيق خاص بصفحة المركزية فقط. الكلاسات
   مسبوقة بـ ch- لتفادي أي تعارض مع shared.css (درس .panel السابق). */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-ar);background:var(--bg);color:var(--snow);min-height:100vh;
  background-image:radial-gradient(ellipse 70% 40% at 50% 0%,rgba(167,139,250,.10),transparent 70%);}
.ch-top{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:var(--bg2);border-bottom:1px solid var(--line);backdrop-filter:blur(8px);}
.ch-top .bk{background:none;border:1px solid var(--line);border-radius:var(--rad);color:var(--snow);
  padding:7px 11px;font-family:inherit;font-size:var(--fs-md);cursor:pointer;}
.ch-top .t{flex:1;font-weight:var(--fw-heavy);font-size:var(--fs-lg);}
.ch-wrap{max-width:920px;margin:0 auto;padding:18px;}
.ch-card{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.18);}
.ch-sec{display:flex;align-items:center;gap:8px;font-size:var(--fs-lg);font-weight:var(--fw-heavy);margin:0 0 12px;}
.ch-sec::before{content:"";width:4px;height:18px;border-radius:3px;background:linear-gradient(var(--p),var(--b));}
/* hero */
.ch-hero{display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
.ch-av{width:72px;height:72px;border-radius:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:30px;font-weight:var(--fw-heavy);color:#fff;background:linear-gradient(135deg,var(--p),var(--b));overflow:hidden;}
.ch-av img{width:100%;height:100%;object-fit:cover;}
.ch-hi{flex:1;min-width:180px;}
.ch-hi h1{font-size:var(--fs-2xl);font-weight:var(--fw-heavy);margin-bottom:4px;}
.ch-hi .sub{color:var(--dim2);font-size:var(--fs-md);}
.ch-tag{display:inline-block;padding:3px 10px;border-radius:999px;background:var(--bg3);border:1px solid var(--line);font-size:var(--fs-xs);margin-inline-start:6px;}
.ch-acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.ch-acts a,.ch-acts button{padding:9px 13px;border-radius:var(--rad);text-decoration:none;font-size:var(--fs-sm);
  font-weight:var(--fw-bold);font-family:inherit;cursor:pointer;border:1px solid var(--line);background:var(--bg3);color:var(--snow);display:inline-flex;align-items:center;gap:6px;}
.ch-acts a:hover{border-color:var(--p);}
.ch-acts .pri{background:linear-gradient(135deg,var(--p),var(--b));color:#fff;border-color:transparent;}
.ch-acts .wa{background:var(--cp-wa);color:var(--cp-wa-ink);border-color:transparent;}
/* KPIs */
.ch-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.ch-kpi{background:var(--bg3);border:1px solid var(--line);border-radius:12px;padding:13px;text-align:center;}
.ch-kpi .v{font-size:var(--fs-xl);font-weight:var(--fw-heavy);}
.ch-kpi .l{font-size:var(--fs-xs);color:var(--dim2);margin-top:2px;}
.ch-kpi.rem .v{color:var(--r);} .ch-kpi.paid .v{color:var(--cp-ok);}
/* cover/logo preview */
.ch-cover{height:120px;border-radius:12px;background:var(--bg3) center/cover;margin-bottom:10px;}
.ch-chips{display:flex;flex-wrap:wrap;gap:7px;}
.ch-chips span{background:var(--bg3);border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:var(--fs-sm);}
.ch-social{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
.ch-social a{width:42px;height:42px;border-radius:12px;background:var(--bg3);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:18px;text-decoration:none;}
/* orders */
.ch-ord{display:flex;align-items:center;gap:12px;padding:11px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;background:var(--bg3);}
.ch-ord .code{font-weight:var(--fw-extra);direction:ltr;}
.ch-ord .meta{flex:1;min-width:0;}
.ch-ord .fin{font-size:var(--fs-sm);color:var(--dim2);}
.ch-badge{padding:4px 10px;border-radius:999px;font-size:var(--fs-xs);font-weight:var(--fw-bold);background:var(--bg2);white-space:nowrap;}
.st-design{color:var(--cp-st-design);} .st-printing{color:var(--cp-st-printing);} .st-production{color:var(--cp-st-production);} .st-shipping{color:var(--cp-st-shipping);} .st-archived{color:var(--cp-st-archived);} .st-cancelled{color:var(--cp-st-cancelled);}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.ch-grid .w{border-radius:11px;overflow:hidden;background:var(--bg3);border:1px solid var(--line);}
.ch-grid img,.ch-grid video{width:100%;height:120px;object-fit:cover;display:block;}
.ch-grid a.pdf{display:flex;align-items:center;justify-content:center;height:120px;font-size:34px;text-decoration:none;}
.ch-conv{display:block;padding:11px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;background:var(--bg3);text-decoration:none;color:var(--snow);}
.ch-conv .nm{font-weight:var(--fw-bold);font-size:var(--fs-md);}
.ch-conv .pv{font-size:var(--fs-sm);color:var(--dim2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;}
.ch-fu{padding:10px;border:1px solid var(--line);border-radius:10px;margin-bottom:7px;background:var(--bg3);font-size:var(--fs-sm);}
.ch-muted{color:var(--dim2);font-size:var(--fs-sm);text-align:center;padding:14px;}
#ch-state{text-align:center;color:var(--dim2);padding:80px 16px;font-size:var(--fs-lg);}
@media(max-width:640px){ .ch-kpis{grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>
<div class="ch-top">
  <button class="bk" onclick="history.length>1?history.back():location.href='clients.html'">→ رجوع</button>
  <div class="t">🧭 ملف العميل الكامل</div>
</div>
<div id="ch-state">⟳ جاري تحميل ملف العميل…</div>
<main class="ch-wrap" id="ch-main" style="display:none"></main>

<script type="module">
import { auth, db } from "./core/firebase-init.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { doc, getDoc, getDocs, collection, query, where, limit } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { calcRem, orderGrossTotal } from "./core/order-math.js";

const $ = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s).replace(/[<>&"]/g, c => ({ '<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;' }[c]));
const money = n => (Math.round((+n || 0) * 100) / 100).toLocaleString('ar-EG');
const STAGE_AR = { design:'✏️ تصميم', printing:'🖨️ طباعة', production:'🏭 تنفيذ', shipping:'🚚 شحن', archived:'✅ مكتمل', cancelled:'✕ ملغي' };
const clientId = new URLSearchParams(location.search).get('id');

function fatal(msg){ $('ch-state').innerHTML = esc(msg); }

onAuthStateChanged(auth, async (u) => {
  if (!u) { location.replace('login.html'); return; }
  // staff فقط: لازم يكون له users doc
  try {
    const us = await getDoc(doc(db, 'users', u.uid));
    if (!us.exists()) { fatal('🔒 هذه الصفحة لطاقم العمل فقط.'); return; }
  } catch (_) { fatal('🔒 تعذّر التحقق من الصلاحية.'); return; }
  if (!clientId) { fatal('⚠️ لا يوجد معرّف عميل في الرابط (?id=).'); return; }
  try { await loadHub(); } catch (e) { fatal('تعذّر التحميل: ' + (e.message || e)); }
});

async function loadHub() {
  const cSnap = await getDoc(doc(db, 'clients', clientId));
  if (!cSnap.exists()) { fatal('🔍 العميل غير موجود.'); return; }
  const c = { ...cSnap.data(), _id: cSnap.id };

  // أوردرات العميل (بالـ id ثم احتياطياً بالهاتف)
  let orders = (await getDocs(query(collection(db, 'orders'), where('clientId', '==', clientId), limit(100))))
    .docs.map(d => ({ ...d.data(), _id: d.id }));
  if (!orders.length && c.phone1) {
    orders = (await getDocs(query(collection(db, 'orders'), where('clientPhone', '==', c.phone1), limit(100))))
      .docs.map(d => ({ ...d.data(), _id: d.id }));
  }
  orders = orders.filter(o => !o.isDeleted);
  const ts = o => (o.createdAt?.seconds ?? 0);
  orders.sort((a, b) => ts(b) - ts(a));

  // بيانات إضافية (best-effort)
  const [pubSnap, fuSnap] = await Promise.all([
    getDoc(doc(db, 'public_cards', clientId)).catch(() => null),
    getDocs(query(collection(db, 'client_followups'), where('clientId', '==', clientId), limit(20))).catch(() => null),
  ]);
  const publicCard = pubSnap?.exists() ? pubSnap.data() : null;
  const followups = fuSnap ? fuSnap.docs.map(d => ({ ...d.data(), _id: d.id })).filter(f => !f.isDeleted) : [];

  // المحادثات: thread لكل أوردر (clord_) + الدعم (csupport_)
  const convIds = orders.map(o => 'clord_' + o._id).concat(['csupport_' + clientId]);
  const convs = (await Promise.all(convIds.map(id =>
    getDoc(doc(db, 'conversations', id)).then(s => s.exists() ? { ...s.data(), _id: s.id } : null).catch(() => null)
  ))).filter(Boolean);

  render(c, orders, publicCard, followups, convs);
}

function render(c, orders, publicCard, followups, convs) {
  const bp = c.businessProfile || {};
  const name = bp.bizName || c.name || 'عميل';
  // مالية عبر الدوال المعتمدة (calcRem / orderGrossTotal — RULE 1)
  let tot = 0, rem = 0;
  orders.forEach(o => { tot += Math.max(0, orderGrossTotal(o)); rem += Math.max(0, calcRem(o)); });
  const paid = Math.max(0, tot - rem);
  const open = orders.filter(o => o.stage !== 'archived' && o.stage !== 'cancelled').length;

  const phone = c.phone1 || bp.whatsapp || '';
  const waNum = (bp.whatsapp || c.phone1 || '').replace(/[^\d]/g, '').replace(/^0/, '2');

  const social = bp.social || {};
  const socIco = { facebook:'📘', instagram:'📸', tiktok:'🎵', linkedin:'💼' };

  $('ch-main').innerHTML = `
    <!-- Hero -->
    <div class="ch-card">
      <div class="ch-hero">
        <div class="ch-av">${bp.logoUrl ? `<img src="${esc(bp.logoUrl)}" alt="">` : esc((name.trim()[0] || '👤'))}</div>
        <div class="ch-hi">
          <h1>${esc(name)}</h1>
          <div class="sub">${esc(c.name && bp.bizName && c.name !== bp.bizName ? c.name + ' · ' : '')}${esc(phone || '')}
            ${c.sector ? `<span class="ch-tag">${esc(c.sector)}</span>` : ''}
            ${c.status === 'self_registered' ? '<span class="ch-tag">🌐 تسجيل ذاتي</span>' : ''}
            ${c.status === 'legacy' ? '<span class="ch-tag">📦 قديم</span>' : ''}
          </div>
          <div class="ch-acts">
            ${phone ? `<a class="pri" href="tel:${esc(phone)}">📞 اتصال</a>` : ''}
            ${waNum ? `<a class="wa" href="https://wa.me/${esc(waNum)}" target="_blank">💬 واتساب</a>` : ''}
            <a href="clients.html?openClient=${esc(c._id)}">👤 إدارة العميل</a>
            <a href="card.html?id=${esc(c._id)}" target="_blank">🌐 الكارت العام</a>
            <a href="inbox.html" target="_blank">📨 الإنبوكس</a>
          </div>
        </div>
      </div>
    </div>

    <!-- Finance KPIs -->
    <div class="ch-card">
      <div class="ch-sec">💰 الملخص المالي والتشغيلي</div>
      <div class="ch-kpis">
        <div class="ch-kpi"><div class="v">${orders.length}</div><div class="l">إجمالي الطلبات</div></div>
        <div class="ch-kpi"><div class="v">${open}</div><div class="l">نشطة</div></div>
        <div class="ch-kpi paid"><div class="v">${money(paid)}</div><div class="l">مدفوع</div></div>
        <div class="ch-kpi rem"><div class="v">${money(rem)}</div><div class="l">متبقّي</div></div>
      </div>
    </div>

    <!-- Business profile -->
    ${(bp.bizName || bp.bio || (bp.services||[]).length || bp.logoUrl || bp.coverUrl) ? `
    <div class="ch-card">
      <div class="ch-sec">💼 بروفايل الأعمال (من البوابة)</div>
      ${bp.coverUrl ? `<div class="ch-cover" style="background-image:url('${esc(bp.coverUrl)}')"></div>` : ''}
      ${bp.bio ? `<p style="color:var(--dim2);line-height:1.8;margin-bottom:10px">${esc(bp.bio)}</p>` : ''}
      ${bp.website ? `<div style="margin-bottom:10px">🌐 <a href="${esc(bp.website)}" target="_blank" style="color:var(--p)">${esc(bp.website)}</a></div>` : ''}
      ${(bp.services||[]).length ? `<div class="ch-chips">${bp.services.map(s=>`<span>${esc(s)}</span>`).join('')}</div>` : ''}
      ${Object.keys(socIco).some(k=>social[k]) ? `<div class="ch-social">${Object.keys(socIco).filter(k=>social[k]).map(k=>`<a href="${esc(/^https?:/.test(social[k])?social[k]:'#')}" target="_blank" title="${k}">${socIco[k]}</a>`).join('')}</div>` : ''}
      ${publicCard ? `<div style="margin-top:12px;font-size:var(--fs-sm);color:var(--dim2)">✅ له صفحة أعمال عامة منشورة.</div>` : ''}
    </div>` : ''}

    <!-- Orders -->
    <div class="ch-card">
      <div class="ch-sec">📦 الأوردرات (${orders.length})</div>
      ${orders.length ? orders.map(o => {
        const r = Math.max(0, calcRem(o)); const g = Math.max(0, orderGrossTotal(o));
        return `<div class="ch-ord">
          <span class="ch-badge st-${esc(o.stage||'design')}">${STAGE_AR[o.stage]||esc(o.stage||'')}</span>
          <div class="meta"><div class="code">${esc(o.orderId||o._id.slice(-6))}</div>
            <div class="fin">إجمالي ${money(g)} · متبقّي ${money(r)}</div></div>
          <a class="ch-badge" href="order.html?id=${esc(o._id)}" target="_blank" style="text-decoration:none">فتح</a>
        </div>`;
      }).join('') : '<div class="ch-muted">لا توجد أوردرات.</div>'}
    </div>

    <!-- Works gallery -->
    ${(bp.works||[]).length ? `
    <div class="ch-card">
      <div class="ch-sec">🖼️ معرض أعمال العميل (${bp.works.length})</div>
      <div class="ch-grid">${bp.works.filter(w=>w&&w.url).map(w=>{
        if(w.type==='video') return `<div class="w"><video src="${esc(w.url)}" controls></video></div>`;
        if(w.type==='pdf') return `<div class="w"><a class="pdf" href="${esc(w.url)}" target="_blank">📄</a></div>`;
        return `<div class="w"><a href="${esc(w.url)}" target="_blank"><img src="${esc(w.url)}" alt=""></a></div>`;
      }).join('')}</div>
    </div>` : ''}

    <!-- Conversations -->
    <div class="ch-card">
      <div class="ch-sec">💬 المحادثات (${convs.length})</div>
      ${convs.length ? convs.map(cv => `
        <a class="ch-conv" href="inbox.html?conv=${esc(cv._id)}" target="_blank">
          <div class="nm">${esc(cv.name || cv._id)}</div>
          <div class="pv">${esc(cv.lastMessagePreview || '— لا رسائل بعد —')}</div>
        </a>`).join('') : '<div class="ch-muted">لا توجد محادثات مع هذا العميل بعد.</div>'}
    </div>

    <!-- Followups -->
    ${followups.length ? `
    <div class="ch-card">
      <div class="ch-sec">📞 المتابعات (${followups.length})</div>
      ${followups.map(f=>`<div class="ch-fu"><b>${esc(f.type||'متابعة')}</b> — ${esc(f.notes||f.outcome||'')} ${f.nextActionDate?`<span style="color:var(--dim2)">· ${esc(String(f.nextActionDate).slice(0,10))}</span>`:''}</div>`).join('')}
    </div>` : ''}
  `;

  $('ch-state').style.display = 'none';
  $('ch-main').style.display = 'block';
  document.title = name + ' — ملف العميل';
}
</script>
</body>
</html>
