<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Business2Card ERP — UI Kit</title>
<link rel="stylesheet" href="kit.css">
</head>
<body data-theme="dark">
<div id="root"></div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Pages.jsx"></script>

<script type="text/babel">
const { useState } = React;

const PAGE_META = {
  home:       { title: "صفحتي", sub: "مرحباً عمر — مساء الخير 👋" },
  orders:     { title: "الطلبات", sub: "كل الطلبات النشطة عبر مراحل التشغيل" },
  clients:    { title: "العملاء", sub: "قائمة العملاء وأرصدتهم" },
  inbox:      { title: "الرسائل", sub: "المحادثات والمتابعات" },
  design:     { title: "لوحة التصميم", sub: "الطلبات في مرحلة التصميم" },
  production: { title: "الإنتاج والطباعة", sub: "إدارة الطباعة والتنفيذ" },
  shipping:   { title: "الشحن", sub: "الطلبات الجاهزة وتسوية شركات الشحن" },
  approvals:  { title: "الاعتمادات", sub: "تصاميم بانتظار موافقة العميل" },
  accounts:   { title: "الحسابات", sub: "المحافظ والحركات المالية" },
  reports:    { title: "التقارير", sub: "أداء التشغيل والمالية" },
};

const STUB = {
  clients:   { ico: "users", title: "العملاء" },
  inbox:     { ico: "message-circle", title: "الرسائل" },
  design:    { ico: "pen-tool", title: "لوحة التصميم" },
  production:{ ico: "factory", title: "الإنتاج والطباعة" },
  shipping:  { ico: "truck", title: "الشحن" },
  approvals: { ico: "check-circle-2", title: "الاعتمادات" },
  accounts:  { ico: "wallet", title: "الحسابات" },
  reports:   { ico: "bar-chart-3", title: "التقارير" },
};

function App() {
  const [authed, setAuthed] = useState(false);
  const [page, setPage] = useState("home");
  const [openOrder, setOpenOrder] = useState(null);
  const [toast, setToast] = useState(null);

  function showToast(msg, kind) {
    setToast({ msg, kind });
    setTimeout(() => setToast(null), 2600);
  }

  function advance(order) {
    const next = B2C.STAGES[order.stage].next;
    const nx = B2C.STAGES[next];
    showToast(`${order.id} انتقل إلى ${nx.label}`, "ok");
    setOpenOrder(null);
  }

  if (!authed) return <Login onLogin={() => setAuthed(true)} />;

  const meta = PAGE_META[page] || { title: "" };
  let body;
  if (page === "home") body = <Dashboard onOpen={setOpenOrder} />;
  else if (page === "orders") body = <OrdersPage onOpen={setOpenOrder} />;
  else { const s = STUB[page]; body = <StubPage ico={s.ico} title={s.title} />; }

  return (
    <div className="app-shell">
      <Sidebar active={page} role="operation_manager"
               onNav={(p) => { setPage(p); setOpenOrder(null); }} />
      <div className="main">
        <Topbar title={meta.title} sub={meta.sub} onLogout={() => setAuthed(false)} />
        {body}
      </div>
      {openOrder && <OrderDrawer order={openOrder} onClose={() => setOpenOrder(null)} onAdvance={advance} />}
      {toast && (
        <div className="toasts"><div className="ds-toast toast-in"><Icon name="check-circle-2" size={16} color="var(--success)" /> {toast.msg}</div></div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
