<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b141a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Business2Card — المحادثات</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="sync-monitor.js"></script>
<style>
/* ── WhatsApp-inspired palette overrides for this page ── */
:root{
  --ws-green:#00a884;
  --ws-green-dark:#008069;
  --ws-bg:#0b141a;
  --ws-panel:#111b21;
  --ws-panel2:#202c33;
  --ws-bubble-out:#005c4b;
  --ws-bubble-in:#202c33;
  --ws-border:rgba(255,255,255,.06);
  --ws-divider:rgba(255,255,255,.08);
  --ws-text:#e9edef;
  --ws-text-dim:#8696a0;
  --ws-tick:#53bdeb;
}
body{background:var(--ws-bg);color:var(--ws-text)}
.main{background:var(--ws-bg)}
.topbar{background:var(--ws-panel);border-bottom:1px solid var(--ws-border);min-height:56px}
.content{padding:0!important;flex:1;display:flex;overflow:hidden;height:calc(100vh - 56px);height:calc(100dvh - 56px)}

/* ── Layout: split view ── */
.ib-wrap{display:flex;width:100%;height:100%;overflow:hidden}
.ib-list{width:340px;background:var(--ws-panel);border-left:1px solid var(--ws-border);display:flex;flex-direction:column;flex-shrink:0}
.ib-chat{flex:1;display:flex;flex-direction:column;background:var(--ws-bg);position:relative;min-width:0}
.ib-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ws-text-dim);padding:40px;text-align:center;background:var(--ws-bg);background-image:radial-gradient(circle at 20% 30%,rgba(0,168,132,.04) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(0,168,132,.04) 0%,transparent 50%)}
.ib-empty-ico{font-size:80px;margin-bottom:14px;opacity:.4}
.ib-empty-t{font-size:18px;font-weight:600;margin-bottom:6px}
.ib-empty-s{font-size:13px;line-height:1.7}

/* ── List header + search ── */
.ib-list-hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--ws-divider);min-height:60px}
.ib-list-hdr h2{font-size:16px;font-weight:700}
.ib-list-actions{display:flex;gap:4px}
.ib-iconbtn{width:38px;height:38px;border-radius:50%;border:none;background:transparent;color:var(--ws-text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:.15s;font-family:inherit}
.ib-iconbtn:hover{background:rgba(255,255,255,.06)}
.ib-iconbtn.danger{color:var(--r)}
.ib-iconbtn .badge{position:absolute;top:4px;right:4px;background:var(--r);color:#fff;font-size:9px;font-weight:800;border-radius:10px;padding:0 5px;min-width:16px;text-align:center}
.ib-search-wrap{padding:8px 12px;background:var(--ws-panel);border-bottom:1px solid var(--ws-divider)}
.ib-search{width:100%;padding:8px 14px;background:var(--ws-panel2);border:none;border-radius:8px;color:var(--ws-text);font-family:inherit;font-size:14px;outline:none}
.ib-search:focus{box-shadow:0 0 0 2px rgba(0,168,132,.3)}

/* ── Tabs (All / Archived) ── */
.ib-tabs{display:flex;gap:0;background:var(--ws-panel);border-bottom:1px solid var(--ws-divider)}
.ib-tab{flex:1;padding:10px 8px;border:none;background:transparent;color:var(--ws-text-dim);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;min-height:38px}
.ib-tab:hover{background:rgba(255,255,255,.04)}
.ib-tab.active{color:var(--ws-green);border-bottom-color:var(--ws-green)}
.ib-tab .cnt{background:var(--ws-panel2);padding:1px 7px;border-radius:10px;font-size:10px;margin-right:4px}

/* ── Chat list ── */
.ib-convs{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.ib-conv{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--ws-divider);transition:background .12s;position:relative;user-select:none;touch-action:pan-y}
.ib-conv:hover{background:rgba(255,255,255,.03)}
.ib-conv.active{background:var(--ws-panel2)}
.ib-conv.unread .ib-conv-last{color:var(--ws-text);font-weight:600}
.ib-conv.swiping{transition:transform .25s ease}
.ib-conv-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;position:relative}
.ib-conv-avatar .presence{position:absolute;bottom:1px;left:1px;width:12px;height:12px;border-radius:50%;background:var(--ws-text-dim);border:2px solid var(--ws-panel)}
.ib-conv-avatar .presence.online{background:#25d366}
.ib-conv-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;overflow:hidden}
.ib-conv-top{display:flex;justify-content:space-between;align-items:center;gap:6px}
.ib-conv-name{font-size:15px;font-weight:600;color:var(--ws-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.ib-conv-time{font-size:11px;color:var(--ws-text-dim);flex-shrink:0;font-weight:500}
.ib-conv.unread .ib-conv-time{color:var(--ws-green);font-weight:600}
.ib-conv-bot{display:flex;align-items:center;justify-content:space-between;gap:6px}
.ib-conv-last{font-size:13px;color:var(--ws-text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.ib-conv-meta{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ib-conv-tick{font-size:14px;color:var(--ws-text-dim)}
.ib-conv-tick.read{color:var(--ws-tick)}
.ib-conv-unread{background:var(--ws-green);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:11px;min-width:20px;text-align:center}
.ib-conv-mute{font-size:12px;color:var(--ws-text-dim)}

/* ── Chat header ── */
.ib-chat-hdr{display:flex;align-items:center;gap:12px;padding:8px 14px;background:var(--ws-panel);border-bottom:1px solid var(--ws-border);min-height:60px}
.ib-chat-back{display:none;background:none;border:none;color:var(--ws-text);font-size:24px;cursor:pointer;padding:6px;font-family:inherit;width:36px;height:36px;align-items:center;justify-content:center;border-radius:50%}
.ib-chat-back:hover{background:rgba(255,255,255,.06)}
.ib-chat-hdr-info{display:flex;align-items:center;gap:10px;flex:1;cursor:pointer;min-width:0}
.ib-chat-hdr-name{font-size:15px;font-weight:600;line-height:1.2}
.ib-chat-hdr-sub{font-size:11px;color:var(--ws-text-dim);line-height:1.2;margin-top:2px}
.ib-chat-hdr-sub.online{color:var(--ws-green)}
.ib-chat-hdr-actions{display:flex;align-items:center;gap:4px}

/* ── Messages area ── */
.ib-msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 7%;-webkit-overflow-scrolling:touch;background:var(--ws-bg);background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="1" fill="%23ffffff08"/></svg>');display:flex;flex-direction:column;gap:2px}
.ib-msgs::-webkit-scrollbar{width:6px}
.ib-msgs::-webkit-scrollbar-thumb{background:var(--ws-panel2);border-radius:3px}
.ib-date-sep{align-self:center;padding:5px 12px;background:var(--ws-panel2);color:var(--ws-text-dim);font-size:11px;font-weight:600;border-radius:8px;margin:14px 0 6px;box-shadow:0 1px 1px rgba(0,0,0,.13)}

/* ── Message bubble ── */
.ib-msg{display:flex;flex-direction:column;max-width:65%;margin-bottom:2px;animation:msgIn .18s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ib-msg.out{align-self:flex-end;align-items:flex-end}
.ib-msg.in{align-self:flex-start;align-items:flex-start}
.ib-msg .sender{font-size:11px;font-weight:600;color:var(--ws-green);padding:0 12px 1px;margin-top:2px}
.ib-msg.out .sender{display:none}
.ib-bubble{padding:6px 9px 6px 12px;border-radius:8px;font-size:14px;line-height:1.4;word-wrap:break-word;position:relative;box-shadow:0 1px .5px rgba(0,0,0,.13)}
.ib-msg.out .ib-bubble{background:var(--ws-bubble-out);border-bottom-right-radius:2px;color:#fff}
.ib-msg.in .ib-bubble{background:var(--ws-bubble-in);border-bottom-left-radius:2px;color:var(--ws-text)}
.ib-msg.consec.out .ib-bubble{border-bottom-right-radius:8px;border-top-right-radius:2px}
.ib-msg.consec.in .ib-bubble{border-bottom-left-radius:8px;border-top-left-radius:2px}
.ib-msg-text{white-space:pre-wrap;word-wrap:break-word}
.ib-msg-foot{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,.5);margin-right:6px;margin-top:1px;float:left;line-height:1}
.ib-msg.in .ib-msg-foot{color:var(--ws-text-dim)}
.ib-msg-tick{color:rgba(255,255,255,.5);font-size:13px;line-height:1}
.ib-msg-tick.read{color:var(--ws-tick)}
.ib-msg-edited{font-style:italic;opacity:.7}

/* Attachments */
.ib-msg-img{display:block;max-width:280px;max-height:280px;border-radius:6px;cursor:pointer;background:var(--ws-panel2)}
.ib-msg-file{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,.04);border-radius:6px;text-decoration:none;color:inherit;margin:2px 0}
.ib-msg-file-ico{font-size:24px;flex-shrink:0}
.ib-msg-file-info{flex:1;min-width:0}
.ib-msg-file-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ib-msg-file-size{font-size:11px;color:var(--ws-text-dim);margin-top:1px}
.ib-system-msg{align-self:center;background:rgba(255,229,127,.18);color:#ffe57f;font-size:11px;padding:5px 11px;border-radius:7px;margin:8px 0;text-align:center;max-width:80%}

/* Typing indicator */
.ib-typing{align-self:flex-start;background:var(--ws-bubble-in);padding:10px 14px;border-radius:8px;border-bottom-left-radius:2px;display:flex;gap:3px;animation:msgIn .18s ease}
.ib-typing span{width:6px;height:6px;border-radius:50%;background:var(--ws-text-dim);animation:typingDot 1.2s infinite ease-in-out}
.ib-typing span:nth-child(2){animation-delay:.15s}
.ib-typing span:nth-child(3){animation-delay:.3s}
@keyframes typingDot{0%,80%,100%{transform:scale(.6);opacity:.5}40%{transform:scale(1);opacity:1}}

/* ── Composer ── */
.ib-composer{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--ws-panel);border-top:1px solid var(--ws-border);position:relative}
.ib-input-wrap{flex:1;background:var(--ws-panel2);border-radius:8px;display:flex;align-items:center;padding:6px 12px;min-height:42px}
.ib-input{flex:1;background:none;border:none;color:var(--ws-text);font-family:inherit;font-size:14px;outline:none;resize:none;line-height:1.5;max-height:120px;padding:4px 0}
.ib-input::placeholder{color:var(--ws-text-dim)}
.ib-send{width:42px;height:42px;border-radius:50%;border:none;background:var(--ws-green);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;font-family:inherit;flex-shrink:0}
.ib-send:hover{background:var(--ws-green-dark)}
.ib-send:disabled{opacity:.4;cursor:not-allowed}
.ib-attach-menu{position:absolute;bottom:60px;right:10px;background:var(--ws-panel2);border-radius:14px;padding:10px;box-shadow:0 6px 24px rgba(0,0,0,.4);display:none;flex-direction:column;gap:8px;z-index:20}
.ib-attach-menu.show{display:flex}
.ib-attach-item{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:8px;cursor:pointer;color:var(--ws-text);font-size:13px;font-weight:600;background:transparent;border:none;font-family:inherit;text-align:right;width:100%}
.ib-attach-item:hover{background:rgba(255,255,255,.06)}
.ib-attach-ico{width:36px;height:36px;border-radius:50%;background:var(--c);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}

/* Emoji panel */
.ib-emoji-panel{position:absolute;bottom:60px;right:10px;background:var(--ws-panel2);border-radius:12px;padding:10px;box-shadow:0 6px 24px rgba(0,0,0,.4);display:none;width:280px;max-height:260px;overflow-y:auto;z-index:20;grid-template-columns:repeat(8,1fr);gap:2px}
.ib-emoji-panel.show{display:grid}
.ib-emoji-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:6px;border-radius:6px;transition:.1s;font-family:inherit}
.ib-emoji-btn:hover{background:rgba(255,255,255,.08)}

/* Lightbox */
.ib-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:20px}
.ib-lightbox.show{display:flex}
.ib-lightbox img{max-width:90vw;max-height:80vh;object-fit:contain;border-radius:8px}
.ib-lightbox-close{position:absolute;top:18px;right:18px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;border:none;font-size:22px;cursor:pointer;font-family:inherit}

/* New chat modal */
.ib-modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;display:none;align-items:center;justify-content:center;padding:16px}
.ib-modal-ov.show{display:flex}
.ib-modal{background:var(--ws-panel);border-radius:14px;max-width:420px;width:100%;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.ib-modal-hdr{padding:14px 18px;border-bottom:1px solid var(--ws-divider);display:flex;justify-content:space-between;align-items:center}
.ib-modal-hdr h3{font-size:15px;font-weight:700}
.ib-modal-body{padding:8px 0;overflow-y:auto;flex:1}
.ib-user-row{display:flex;align-items:center;gap:12px;padding:10px 18px;cursor:pointer;border-bottom:1px solid var(--ws-divider)}
.ib-user-row:hover{background:rgba(255,255,255,.04)}
.ib-user-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.ib-user-info{flex:1;min-width:0}
.ib-user-name{font-size:14px;font-weight:600}
.ib-user-role{font-size:11px;color:var(--ws-text-dim);margin-top:2px}

/* Mobile layout */
@media(max-width:768px){
  .ib-list{width:100%;display:flex}
  .ib-chat{display:none;width:100%;position:absolute;inset:0;z-index:5}
  .ib-wrap.show-chat .ib-list{display:none}
  .ib-wrap.show-chat .ib-chat{display:flex}
  .ib-chat-back{display:inline-flex}
  .ib-msg{max-width:80%}
  .ib-msg-img{max-width:220px}
  .ib-emoji-panel{width:calc(100vw - 20px)}
  .topbar{display:none}
  .content{height:100vh;height:100dvh}
}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">ERP</div></div></div>
  <div class="nav-scroll" id="nav-links"></div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">U</div><div><div class="nav-user-name" id="nav-name">User</div><div class="nav-user-role">تسجيل خروج</div></div></div></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div><h1 style="font-size:16px">💬 المحادثات</h1></div>
    </div>
  </div>

  <div class="content">
    <div class="ib-wrap" id="ib-wrap">
      <!-- LEFT: Conversation list -->
      <div class="ib-list">
        <div class="ib-list-hdr">
          <h2>المحادثات</h2>
          <div class="ib-list-actions">
            <button class="ib-iconbtn" onclick="openNewChat()" title="محادثة جديدة">✏️</button>
          </div>
        </div>
        <div class="ib-search-wrap">
          <input class="ib-search" id="ib-search" placeholder="🔍 بحث">
        </div>
        <div class="ib-tabs">
          <button class="ib-tab active" data-tab="all" onclick="switchListTab('all')">الكل <span class="cnt" id="cnt-all">0</span></button>
          <button class="ib-tab" data-tab="archived" onclick="switchListTab('archived')">📁 الأرشيف <span class="cnt" id="cnt-arc">0</span></button>
        </div>
        <div class="ib-convs" id="ib-convs"></div>
      </div>

      <!-- RIGHT: Active chat or empty state -->
      <div class="ib-chat" id="ib-chat">
        <div class="ib-empty" id="ib-empty">
          <div class="ib-empty-ico">💬</div>
          <div class="ib-empty-t">Business2Card Chat</div>
          <div class="ib-empty-s">اختر محادثة من القائمة، أو ابدأ محادثة جديدة.<br>كل رسائلك آمنة ومحفوظة على Firebase.</div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- New chat modal -->
<div class="ib-modal-ov" id="new-chat-ov">
  <div class="ib-modal">
    <div class="ib-modal-hdr">
      <h3>محادثة جديدة</h3>
      <button class="ib-iconbtn" onclick="closeNewChat()">✕</button>
    </div>
    <div style="padding:8px 14px">
      <input class="ib-search" id="user-search" placeholder="🔍 ابحث عن موظف">
    </div>
    <div class="ib-modal-body" id="user-list-body"></div>
  </div>
</div>

<!-- Lightbox -->
<div class="ib-lightbox" id="lb"><button class="ib-lightbox-close" onclick="closeLb()">✕</button><img id="lb-img" src="" alt=""></div>

<!-- Attach hidden input -->
<input type="file" id="file-in" style="display:none" accept="image/*,application/pdf">

<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div class="toasts" id="toasts"></div>

<script type="module">

// ── State ──
let currentUser=null, currentUid='', currentUserName='', currentRole='', currentUserData=null;

let activeConv=null;
let messages=[];
let presenceMap=new Map();  // uid → {online,lastSeen,typingIn}
let listTab='all';
let searchQuery='';
let unsubMessages=null;
let typingTimer=null;
let lastReadUpdate=0;

const $=id=>document.getElementById(id);
const fmtTime=ts=>{
  if(!ts?.toDate)return'';
  const d=ts.toDate();const now=new Date();
  const isToday=d.toDateString()===now.toDateString();
  if(isToday)return d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
  const y=new Date();y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString())return'أمس';
  return d.toLocaleDateString('ar-EG',{day:'2-digit',month:'2-digit'});
};
const fmtBytes=n=>{if(n<1024)return n+' B';if(n<1024*1024)return (n/1024).toFixed(1)+' KB';return (n/1048576).toFixed(1)+' MB';};
const esc=s=>(s||'').replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;","\"":"&quot;"}[c]));
const initAvatar=name=>(name||'?').trim()[0]?.toUpperCase()||'?';
const colorOf=role=>ROLE_COLOR[role]||'#4e5672';
const toast=(msg,t='')=>{const c=$('toasts');if(!c)return;const e=document.createElement('div');e.className='toast '+t;e.textContent=msg;c.appendChild(e);setTimeout(()=>e.remove(),3200);};

window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');$('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');$('nav-ov').classList.remove('show');};
window.doLogout=async()=>{await setOffline();await signOut(auth);location.href='login.html';};

// ── Presence (heartbeat every 25s, mark offline on unload) ──
let heartbeatInt=null;
async function setOnline(){
  if(!currentUid)return;
  try{
    await setDoc(doc(db,'presence',currentUid),{
      online:true,lastSeen:serverTimestamp(),
      name:currentUserName,role:currentRole,
    },{merge:true});
  }catch(_){}
}
async function setOffline(){
  if(!currentUid)return;
  try{
    await setDoc(doc(db,'presence',currentUid),{
      online:false,lastSeen:serverTimestamp(),typingIn:null,
    },{merge:true});
  }catch(_){}
}
function startHeartbeat(){
  setOnline();
  if(heartbeatInt)clearInterval(heartbeatInt);
  heartbeatInt=setInterval(setOnline,25000);
  window.addEventListener('beforeunload',()=>setOffline(),{once:true});
  window.addEventListener('pagehide',()=>setOffline(),{once:true});
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){setOffline();clearInterval(heartbeatInt);heartbeatInt=null;}
    else{startHeartbeat();}
  });
}

// ── Auto-create channel conversations (idempotent) ──
async function ensureChannels(){
  const myChannels=CHANNELS.filter(c=>c.roles==='*'||c.roles.includes(currentRole));
  // For each channel, ensure a conversation doc with stable id `channel_${key}` exists
  for(const ch of myChannels){
    const convId='channel_'+ch.key;
    const ref=doc(db,'conversations',convId);
    try{
      const snap=await getDoc(ref);
      if(!snap.exists()){
        // create with all matching role users
        const all=await getDocs(collection(db,'users'));
        const members=all.docs.filter(d=>{
          const ud=d.data();if(!ud.isActive&&ud.isActive!==undefined)return false;
          if(ch.roles==='*')return true;
          return ch.roles.includes(ud.role);
        }).map(d=>d.id);
        await setDoc(ref,{
          type:'channel',channelKey:ch.key,name:ch.name,ico:ch.ico,
          participants:members,
          archivedBy:[],
          createdAt:serverTimestamp(),
          lastMessageAt:serverTimestamp(),
          lastMessagePreview:'بدأت المحادثة',lastSenderName:'النظام',
        });
      } else {
        // make sure current user is a participant
        const cur=snap.data();
        if(!(cur.participants||[]).includes(currentUid)){
          await updateDoc(ref,{participants:arrayUnion(currentUid)});
        }
      }
    }catch(e){console.warn('channel ensure',ch.key,e.message);}
  }
}

// ── Conversations listener ──
function subscribeConversations(){
  const q=query(collection(db,'conversations'),where('participants','array-contains',currentUid));
  onSnapshot(q,snap=>{
    conversations=snap.docs.map(d=>({...d.data(),_id:d.id}));
    renderConvList();
  },err=>console.warn('convs sub:',err.message));
}

// ── Presence listener (for everyone we might chat with) ──
function subscribePresence(){
  onSnapshot(collection(db,'presence'),snap=>{
    presenceMap.clear();
    snap.docs.forEach(d=>presenceMap.set(d.id,d.data()));
    renderConvList();
    if(activeConv)renderChatHeader();
  });
}

// ── Users listener ──
function subscribeUsers(){
  onSnapshot(collection(db,'users'),snap=>{
    allUsers=snap.docs.map(d=>({...d.data(),_id:d.id})).filter(u=>u.isActive!==false&&!u.deleted&&u._id!==currentUid);
  });
}

// ── Render conv list ──
function renderConvList(){
  const list=$('ib-convs');if(!list)return;
  const q=(searchQuery||'').toLowerCase();
  let items=conversations.slice();
  // sort by lastMessageAt desc
  items.sort((a,b)=>(b.lastMessageAt?.seconds||0)-(a.lastMessageAt?.seconds||0));
  // tab filter
  if(listTab==='archived'){items=items.filter(c=>(c.archivedBy||[]).includes(currentUid));}
  else {items=items.filter(c=>!(c.archivedBy||[]).includes(currentUid));}
  // search filter
  if(q){items=items.filter(c=>{
    const n=convDisplayName(c).toLowerCase();
    return n.includes(q)||(c.lastMessagePreview||'').toLowerCase().includes(q);
  });}
  // counts
  $('cnt-all').textContent=conversations.filter(c=>!(c.archivedBy||[]).includes(currentUid)).length;
  $('cnt-arc').textContent=conversations.filter(c=>(c.archivedBy||[]).includes(currentUid)).length;
  if(!items.length){
    list.innerHTML=`<div style="padding:40px 20px;text-align:center;color:var(--ws-text-dim);font-size:13px">${searchQuery?'لا نتائج':listTab==='archived'?'لا توجد محادثات مؤرشفة':'ابدأ محادثة بالضغط على ✏️'}</div>`;
    return;
  }
  list.innerHTML=items.map(c=>{
    const isActive=c._id===activeConvId;
    const name=convDisplayName(c);
    const ico=convIcon(c);
    const col=convColor(c);
    const unread=(c.unreadCount?.[currentUid]||0);
    const isDM=c.type==='dm';
    const otherUid=isDM?(c.participants||[]).find(p=>p!==currentUid):null;
    const otherPresence=otherUid?presenceMap.get(otherUid):null;
    const isOnline=otherPresence&&isUserOnline(otherPresence);
    const lastTime=fmtTime(c.lastMessageAt);
    const lastSender=c.lastSenderId===currentUid?'أنت: ':(isDM?'':(c.lastSenderName?c.lastSenderName+': ':''));
    const tick=c.lastSenderId===currentUid?(c.lastReadByAll?'✓✓':'✓'):'';
    const tickClass=c.lastReadByAll?'read':'';
    return `<div class="ib-conv ${isActive?'active':''} ${unread?'unread':''}" data-id="${c._id}" onclick="openConv('${c._id}')">
      <div class="ib-conv-avatar" style="background:${col}">${ico}${isDM?`<span class="presence ${isOnline?'online':''}"></span>`:''}</div>
      <div class="ib-conv-body">
        <div class="ib-conv-top">
          <div class="ib-conv-name">${esc(name)}</div>
          <div class="ib-conv-time">${lastTime}</div>
        </div>
        <div class="ib-conv-bot">
          <div class="ib-conv-last">${tick?`<span class="ib-conv-tick ${tickClass}">${tick}</span> `:''}${esc(lastSender+(c.lastMessagePreview||''))}</div>
          <div class="ib-conv-meta">
            ${unread>0?`<span class="ib-conv-unread">${unread>99?'99+':unread}</span>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function convDisplayName(c){
  if(c.type==='channel')return c.name||'#قناة';
  if(c.type==='dm'){
    const otherUid=(c.participants||[]).find(p=>p!==currentUid);
    if(!otherUid)return 'محادثة';
    const u=allUsers.find(x=>x._id===otherUid);
    return u?.name||c.dmNames?.[otherUid]||'موظف';
  }
  return c.name||'محادثة';
}
function convIcon(c){
  if(c.type==='channel')return c.ico||'#';
  if(c.type==='dm'){
    const otherUid=(c.participants||[]).find(p=>p!==currentUid);
    const u=allUsers.find(x=>x._id===otherUid);
    return initAvatar(u?.name||c.dmNames?.[otherUid]||'?');
  }
  return c.name?.[0]||'?';
}
function convColor(c){
  if(c.type==='channel')return '#3b9eff';
  if(c.type==='dm'){
    const otherUid=(c.participants||[]).find(p=>p!==currentUid);
    const u=allUsers.find(x=>x._id===otherUid);
    return colorOf(u?.role);
  }
  return '#4e5672';
}
function isUserOnline(p){
  if(!p?.online)return false;
  const last=p.lastSeen?.seconds*1000||0;
  return (Date.now()-last)<90000;  // 90s threshold
}

// ── Open conversation ──
window.openConv=async function(id){
  if(activeConvId===id)return;
  activeConvId=id;
  activeConv=conversations.find(c=>c._id===id);
  if(!activeConv){return;}
  $('ib-wrap').classList.add('show-chat');
  // un-archive if was archived
  if((activeConv.archivedBy||[]).includes(currentUid)){
    try{await updateDoc(doc(db,'conversations',id),{archivedBy:arrayRemove(currentUid)});}catch(_){}
  }
  renderChat();
  // subscribe to messages
  if(unsubMessages)unsubMessages();
  const q=query(collection(db,'conversations',id,'messages'),orderBy('createdAt','asc'),limit(200));
  unsubMessages=onSnapshot(q,snap=>{
    messages=snap.docs.map(d=>({...d.data(),_id:d.id}));
    renderMessages();
    maybeMarkRead();
  });
  renderConvList();
};

window.closeChat=function(){
  $('ib-wrap').classList.remove('show-chat');
  activeConvId=null;activeConv=null;
  if(unsubMessages){unsubMessages();unsubMessages=null;}
  $('ib-chat').innerHTML=`<div class="ib-empty"><div class="ib-empty-ico">💬</div><div class="ib-empty-t">Business2Card Chat</div><div class="ib-empty-s">اختر محادثة من القائمة، أو ابدأ محادثة جديدة.</div></div>`;
  renderConvList();
};

function renderChat(){
  const wrap=$('ib-chat');if(!wrap||!activeConv)return;
  wrap.innerHTML=`
    <div class="ib-chat-hdr">
      <button class="ib-chat-back" onclick="closeChat()">←</button>
      <div class="ib-chat-hdr-info">
        <div class="ib-conv-avatar" style="background:${convColor(activeConv)};width:40px;height:40px;font-size:15px">${convIcon(activeConv)}</div>
        <div style="flex:1;min-width:0">
          <div class="ib-chat-hdr-name" id="chat-hdr-name">${esc(convDisplayName(activeConv))}</div>
          <div class="ib-chat-hdr-sub" id="chat-hdr-sub"></div>
        </div>
      </div>
      <div class="ib-chat-hdr-actions">
        <button class="ib-iconbtn" onclick="archiveConv()" title="أرشفة">📁</button>
      </div>
    </div>
    <div class="ib-msgs" id="ib-msgs"></div>
    <div class="ib-composer">
      <button class="ib-iconbtn" onclick="toggleEmoji()" title="إيموجي">😀</button>
      <button class="ib-iconbtn" onclick="pickFile()" title="مرفق">📎</button>
      <div class="ib-input-wrap">
        <textarea class="ib-input" id="ib-input" rows="1" placeholder="اكتب رسالة…" oninput="onTyping(this)" onkeydown="onComposerKey(event)"></textarea>
      </div>
      <button class="ib-send" id="ib-send" onclick="sendText()">▶</button>
      <div class="ib-emoji-panel" id="emoji-panel">${EMOJIS.map(e=>`<button class="ib-emoji-btn" onclick="insertEmoji('${e}')">${e}</button>`).join('')}</div>
    </div>`;
  renderMessages();
  renderChatHeader();
  $('ib-input')?.focus();
}

function renderChatHeader(){
  const sub=$('chat-hdr-sub');if(!sub||!activeConv)return;
  if(activeConv.type==='dm'){
    const otherUid=(activeConv.participants||[]).find(p=>p!==currentUid);
    const p=presenceMap.get(otherUid);
    const typing=p?.typingIn===activeConvId;
    if(typing){sub.textContent='يكتب الآن…';sub.className='ib-chat-hdr-sub online';}
    else if(isUserOnline(p)){sub.textContent='متصل';sub.className='ib-chat-hdr-sub online';}
    else if(p?.lastSeen){
      const last=p.lastSeen.toDate?.();
      sub.textContent='آخر ظهور '+(last?last.toLocaleString('ar-EG',{hour:'2-digit',minute:'2-digit'}):'—');
      sub.className='ib-chat-hdr-sub';
    } else { sub.textContent='—';sub.className='ib-chat-hdr-sub'; }
  } else if(activeConv.type==='channel'){
    const cnt=(activeConv.participants||[]).length;
    const onlineCnt=(activeConv.participants||[]).filter(uid=>isUserOnline(presenceMap.get(uid))).length;
    sub.textContent=`${cnt} عضو · ${onlineCnt} متصل`;
    sub.className='ib-chat-hdr-sub';
  }
}

function renderMessages(){
  const wrap=$('ib-msgs');if(!wrap)return;
  if(!messages.length){
    wrap.innerHTML=`<div style="margin:auto;text-align:center;color:var(--ws-text-dim);font-size:13px;padding:40px">ابدأ المحادثة برسالة 👋</div>`;
    return;
  }
  let html='';let lastDate='';let lastSender='';
  messages.forEach((m,i)=>{
    const ts=m.createdAt?.toDate?.();const dateStr=ts?ts.toLocaleDateString('ar-EG',{day:'numeric',month:'long',year:'numeric'}):'';
    if(dateStr!==lastDate){html+=`<div class="ib-date-sep">${dateStr}</div>`;lastDate=dateStr;lastSender='';}
    if(m.type==='system'){html+=`<div class="ib-system-msg">${esc(m.text||'')}</div>`;return;}
    const isOut=m.senderId===currentUid;
    const consec=lastSender===m.senderId&&i>0;
    lastSender=m.senderId;
    const time=ts?ts.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}):'';
    const readByOther=isOut&&activeConv?.type==='dm'&&Object.keys(m.readBy||{}).filter(u=>u!==currentUid).length>0;
    const tick=isOut?`<span class="ib-msg-tick ${readByOther?'read':''}">${readByOther?'✓✓':'✓'}</span>`:'';
    let body='';
    if(m.type==='image'&&m.attachments?.[0]){
      body=`<img class="ib-msg-img" src="${m.attachments[0].url}" onclick="openLb('${m.attachments[0].url}')" alt="">`;
    } else if(m.type==='file'&&m.attachments?.[0]){
      const a=m.attachments[0];
      body=`<a class="ib-msg-file" href="${a.url}" target="_blank" rel="noopener" download="${esc(a.name||'')}">
        <span class="ib-msg-file-ico">📄</span>
        <div class="ib-msg-file-info"><div class="ib-msg-file-name">${esc(a.name||'مستند')}</div><div class="ib-msg-file-size">${fmtBytes(a.size||0)}</div></div>
      </a>`;
    }
    const text=m.text?`<div class="ib-msg-text">${esc(m.text)}${m.editedAt?'<span class="ib-msg-edited"> (مُعدّلة)</span>':''}</div>`:'';
    const senderName=!isOut&&!consec&&activeConv?.type==='channel'?`<div class="sender">${esc(m.senderName||'')}</div>`:'';
    html+=`<div class="ib-msg ${isOut?'out':'in'} ${consec?'consec':''}">
      ${senderName}
      <div class="ib-bubble">${body}${text}<span class="ib-msg-foot">${time} ${tick}</span></div>
    </div>`;
  });
  wrap.innerHTML=html;
  // scroll to bottom
  requestAnimationFrame(()=>{wrap.scrollTop=wrap.scrollHeight;});
}

// ── Mark conv as read (throttled) ──
async function maybeMarkRead(){
  if(!activeConvId||!activeConv)return;
  const now=Date.now();if(now-lastReadUpdate<2000)return;
  lastReadUpdate=now;
  const unread=activeConv.unreadCount?.[currentUid]||0;
  if(unread>0){
    try{
      await updateDoc(doc(db,'conversations',activeConvId),{[`unreadCount.${currentUid}`]:0});
    }catch(_){}
  }
  // mark recent messages readBy[currentUid]
  const recent=messages.slice(-30).filter(m=>m.senderId!==currentUid&&!(m.readBy?.[currentUid]));
  if(recent.length>0){
    const batch=writeBatch(db);
    recent.forEach(m=>{
      batch.update(doc(db,'conversations',activeConvId,'messages',m._id),{[`readBy.${currentUid}`]:serverTimestamp()});
    });
    try{await batch.commit();}catch(_){}
  }
}

// ── Compose ──
window.onComposerKey=function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText();}
};
window.onTyping=async function(el){
  // auto-grow
  el.style.height='auto';el.style.height=Math.min(120,el.scrollHeight)+'px';
  // typing indicator
  if(typingTimer)clearTimeout(typingTimer);
  if(activeConvId){
    try{await updateDoc(doc(db,'presence',currentUid),{typingIn:activeConvId,lastSeen:serverTimestamp()});}catch(_){}
    typingTimer=setTimeout(async()=>{
      try{await updateDoc(doc(db,'presence',currentUid),{typingIn:null});}catch(_){}
    },3000);
  }
};
window.sendText=async function(){
  const inp=$('ib-input');if(!inp||!activeConvId)return;
  const text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='auto';
  await sendMessage({type:'text',text});
};
async function sendMessage(payload){
  if(!activeConvId)return;
  // build msg
  const msg={
    senderId:currentUid,
    senderName:currentUserName,
    createdAt:serverTimestamp(),
    readBy:{[currentUid]:serverTimestamp()},
    ...payload,
  };
  try{
    await addDoc(collection(db,'conversations',activeConvId,'messages'),msg);
    // update conv last + unread
    const preview=payload.type==='text'?payload.text:payload.type==='image'?'📷 صورة':payload.type==='file'?'📄 '+(payload.attachments?.[0]?.name||'مرفق'):'رسالة';
    const upd={
      lastMessageAt:serverTimestamp(),
      lastMessagePreview:preview.slice(0,80),
      lastSenderId:currentUid,
      lastSenderName:currentUserName,
      lastReadByAll:false,
    };
    // bump unread for other participants
    (activeConv.participants||[]).forEach(uid=>{
      if(uid!==currentUid)upd[`unreadCount.${uid}`]=increment(1);
    });
    // un-archive for participants who had it archived
    if((activeConv.archivedBy||[]).length>0){
      upd['archivedBy']=[];  // any new message un-archives everyone (matches WhatsApp)
    }
    await updateDoc(doc(db,'conversations',activeConvId),upd);
  }catch(e){toast('❌ '+e.message,'err');}
}

// ── File ──
window.pickFile=()=>$('file-in').click();
$('file-in').addEventListener('change',async e=>{
  const f=e.target.files?.[0];if(!f||!activeConvId)return;
  if(f.size>10*1024*1024){toast('⚠️ الحد الأقصى 10MB','err');return;}
  toast('جاري الرفع…','');
  try{
    const path=`chat/${activeConvId}/${Date.now()}_${f.name}`;
    const r=ref(storage,path);
    await uploadBytes(r,f);
    const url=await getDownloadURL(r);
    const isImg=f.type.startsWith('image/');
    await sendMessage({
      type:isImg?'image':'file',
      attachments:[{url,name:f.name,size:f.size,mime:f.type}],
    });
    toast('✅ تم الإرسال','ok');
  }catch(err){toast('❌ '+err.message,'err');}
  e.target.value='';
});

window.openNewChat=function(){
  $('new-chat-ov').classList.add('show');
  renderUserList();
  $('user-search').addEventListener('input',renderUserList,{once:false});
  setTimeout(()=>$('user-search')?.focus(),100);

window.closeNewChat=()=>$('new-chat-ov').classList.remove('show');
function renderUserList(){
  const body=$('user-list-body');if(!body)return;
  const q=($('user-search')?.value||'').toLowerCase();
  let list=allUsers.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||'','ar'));
  if(q)list=list.filter(u=>(u.name||'').toLowerCase().includes(q)||(ROLE_LABEL[u.role]||'').toLowerCase().includes(q));
  if(!list.length){body.innerHTML='<div style="padding:30px;text-align:center;color:var(--ws-text-dim);font-size:13px">لا نتائج</div>';return;}
  body.innerHTML=list.map(u=>{
    const p=presenceMap.get(u._id);
    const online=isUserOnline(p);
    return `<div class="ib-user-row" onclick="startDM('${u._id}','${esc((u.name||'').replace(/'/g,''))}')">
      <div class="ib-user-avatar" style="background:${colorOf(u.role)};position:relative">${initAvatar(u.name)}<span class="presence ${online?'online':''}" style="position:absolute;bottom:0;left:0;width:11px;height:11px;border-radius:50%;background:${online?'#25d366':'var(--ws-text-dim)'};border:2px solid var(--ws-panel)"></span></div>
      <div class="ib-user-info">
        <div class="ib-user-name">${esc(u.name||'موظف')}</div>
        <div class="ib-user-role">${ROLE_LABEL[u.role]||u.role||''} ${online?'· متصل':''}</div>
      </div>
    </div>`;
  }).join('');
}
window.startDM=async function(otherUid,otherName){
  // stable id: sort uids
  const ids=[currentUid,otherUid].sort();
  const convId='dm_'+ids.join('_');
  const ref=doc(db,'conversations',convId);
  try{
    const snap=await getDoc(ref);
    if(!snap.exists()){
      await setDoc(ref,{
        type:'dm',
        participants:ids,
        dmNames:{[currentUid]:currentUserName,[otherUid]:otherName},
        archivedBy:[],
        createdAt:serverTimestamp(),
        lastMessageAt:serverTimestamp(),
        lastMessagePreview:'بدأت المحادثة',
        unreadCount:{},
      });
    }
    closeNewChat();
    openConv(convId);
  }catch(e){toast('❌ '+e.message,'err');}
};

// ── Lightbox ──
window.openLb=url=>{$('lb-img').src=url;$('lb').classList.add('show');};
window.closeLb=()=>$('lb').classList.remove('show');
$('lb').addEventListener('click',e=>{if(e.target.id==='lb')closeLb();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});

// ── Auth ──
onAuthStateChanged(auth,async u=>{
  if(!u){location.href='login.html';return;}
  currentUser=u;currentUid=u.uid;
  try{
    const us=await getDoc(doc(db,'users',u.uid));
    if(us.exists()){
      currentUserData=us.data();
      currentRole=currentUserData.role||'';
      currentUserName=currentUserData.name||u.email;
      $('nav-name').textContent=currentUserName;
      $('nav-av').textContent=initAvatar(currentUserName);
      $('role-badge').textContent=ROLE_LABEL[currentRole]||currentRole;
    }
  }catch(_){}
  buildSidebar();
  startHeartbeat();
  await ensureChannels();
  subscribeConversations();
  subscribePresence();
  subscribeUsers();
});
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}</script>
