<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b141a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Business2Card — المحادثات</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="sync-monitor.js"></script>
<script type="module" src="inbox-badge.js"></script>
<style>
/* ── WhatsApp-inspired palette overrides for this page ── */
:root{
  --ws-green:#00a884;
  --ws-green-dark:#008069;
  --ws-bg:#0b141a;
  --ws-panel:#111b21;
  --ws-panel2:#202c33;
  --ws-bubble-out:#005c4b;
  --ws-bubble-in:#202c33;
  --ws-border:rgba(255,255,255,.06);
  --ws-divider:rgba(255,255,255,.08);
  --ws-text:#e9edef;
  --ws-text-dim:#8696a0;
  --ws-tick:#53bdeb;
}
body{background:var(--ws-bg);color:var(--ws-text)}
.main{background:var(--ws-bg)}
.topbar{background:var(--ws-panel);border-bottom:1px solid var(--ws-border);min-height:56px}
.content{padding:0!important;flex:1;display:flex;overflow:hidden;height:calc(100vh - 56px);height:calc(100dvh - 56px)}

/* ── Layout: split view ── */
.ib-wrap{display:flex;width:100%;height:100%;overflow:hidden}
.ib-list{width:340px;background:var(--ws-panel);border-left:1px solid var(--ws-border);display:flex;flex-direction:column;flex-shrink:0}
.ib-chat{flex:1;display:flex;flex-direction:column;background:var(--ws-bg);position:relative;min-width:0}
.ib-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ws-text-dim);padding:40px;text-align:center;background:var(--ws-bg);background-image:radial-gradient(circle at 20% 30%,rgba(0,168,132,.04) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(0,168,132,.04) 0%,transparent 50%)}
.ib-empty-ico{font-size:80px;margin-bottom:14px;opacity:.4}
.ib-empty-t{font-size:18px;font-weight:600;margin-bottom:6px}
.ib-empty-s{font-size:13px;line-height:1.7}

/* ── List header + search ── */
.ib-list-hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--ws-divider);min-height:60px}
.ib-list-hdr h2{font-size:16px;font-weight:700}
.ib-list-actions{display:flex;gap:4px}
.ib-iconbtn{width:38px;height:38px;border-radius:50%;border:none;background:transparent;color:var(--ws-text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:.15s;font-family:inherit}
.ib-iconbtn:hover{background:rgba(255,255,255,.06)}
.ib-iconbtn.danger{color:var(--r)}
.ib-iconbtn .badge{position:absolute;top:4px;right:4px;background:var(--r);color:#fff;font-size:9px;font-weight:800;border-radius:10px;padding:0 5px;min-width:16px;text-align:center}
.ib-search-wrap{padding:8px 12px;background:var(--ws-panel);border-bottom:1px solid var(--ws-divider)}
.ib-search{width:100%;padding:8px 14px;background:var(--ws-panel2);border:none;border-radius:8px;color:var(--ws-text);font-family:inherit;font-size:14px;outline:none}
.ib-search:focus{box-shadow:0 0 0 2px rgba(0,168,132,.3)}

/* ── Tabs (All / Archived) ── */
.ib-tabs{display:flex;gap:0;background:var(--ws-panel);border-bottom:1px solid var(--ws-divider)}
.ib-tab{flex:1;padding:10px 8px;border:none;background:transparent;color:var(--ws-text-dim);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;min-height:38px}
.ib-tab:hover{background:rgba(255,255,255,.04)}
.ib-tab.active{color:var(--ws-green);border-bottom-color:var(--ws-green)}
.ib-tab .cnt{background:var(--ws-panel2);padding:1px 7px;border-radius:10px;font-size:10px;margin-right:4px}

/* ── Chat list ── */
.ib-convs{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.ib-conv{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--ws-divider);transition:background .12s;position:relative;user-select:none;touch-action:pan-y}
.ib-conv:hover{background:rgba(255,255,255,.03)}
.ib-conv.active{background:var(--ws-panel2)}
.ib-conv.unread .ib-conv-last{color:var(--ws-text);font-weight:600}
.ib-conv.swiping{transition:transform .25s ease}
.ib-conv-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;position:relative}
.ib-conv-avatar .presence{position:absolute;bottom:1px;left:1px;width:12px;height:12px;border-radius:50%;background:var(--ws-text-dim);border:2px solid var(--ws-panel)}
.ib-conv-avatar .presence.online{background:#25d366}
.ib-conv-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;overflow:hidden}
.ib-conv-top{display:flex;justify-content:space-between;align-items:center;gap:6px}
.ib-conv-name{font-size:15px;font-weight:600;color:var(--ws-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.ib-conv-time{font-size:11px;color:var(--ws-text-dim);flex-shrink:0;font-weight:500}
.ib-conv.unread .ib-conv-time{color:var(--ws-green);font-weight:600}
.ib-conv-bot{display:flex;align-items:center;justify-content:space-between;gap:6px}
.ib-conv-last{font-size:13px;color:var(--ws-text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.ib-conv-meta{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ib-conv-tick{font-size:14px;color:var(--ws-text-dim)}
.ib-conv-tick.read{color:var(--ws-tick)}
.ib-conv-unread{background:var(--ws-green);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:11px;min-width:20px;text-align:center}
.ib-conv-mute{font-size:12px;color:var(--ws-text-dim)}

/* ── Chat header ── */
.ib-chat-hdr{display:flex;align-items:center;gap:12px;padding:8px 14px;background:var(--ws-panel);border-bottom:1px solid var(--ws-border);min-height:60px}
.ib-chat-back{display:none;background:none;border:none;color:var(--ws-text);font-size:24px;cursor:pointer;padding:6px;font-family:inherit;width:36px;height:36px;align-items:center;justify-content:center;border-radius:50%}
.ib-chat-back:hover{background:rgba(255,255,255,.06)}
.ib-chat-hdr-info{display:flex;align-items:center;gap:10px;flex:1;cursor:pointer;min-width:0}
.ib-chat-hdr-name{font-size:15px;font-weight:600;line-height:1.2}
.ib-chat-hdr-sub{font-size:11px;color:var(--ws-text-dim);line-height:1.2;margin-top:2px}
.ib-chat-hdr-sub.online{color:var(--ws-green)}
.ib-chat-hdr-actions{display:flex;align-items:center;gap:4px}

/* ── Messages area ── */
.ib-msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 7%;-webkit-overflow-scrolling:touch;background:var(--ws-bg);background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="1" fill="%23ffffff08"/></svg>');display:flex;flex-direction:column;gap:2px}
.ib-msgs::-webkit-scrollbar{width:6px}
.ib-msgs::-webkit-scrollbar-thumb{background:var(--ws-panel2);border-radius:3px}
.ib-date-sep{align-self:center;padding:5px 12px;background:var(--ws-panel2);color:var(--ws-text-dim);font-size:11px;font-weight:600;border-radius:8px;margin:14px 0 6px;box-shadow:0 1px 1px rgba(0,0,0,.13)}

/* ── Message bubble ── */
.ib-msg{display:flex;flex-direction:column;max-width:65%;margin-bottom:2px;animation:msgIn .18s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ib-msg.out{align-self:flex-end;align-items:flex-end}
.ib-msg.in{align-self:flex-start;align-items:flex-start}
.ib-msg .sender{font-size:11px;font-weight:600;color:var(--ws-green);padding:0 12px 1px;margin-top:2px}
.ib-msg.out .sender{display:none}
.ib-bubble{padding:6px 9px 6px 12px;border-radius:8px;font-size:14px;line-height:1.4;word-wrap:break-word;position:relative;box-shadow:0 1px .5px rgba(0,0,0,.13)}
.ib-msg.out .ib-bubble{background:var(--ws-bubble-out);border-bottom-right-radius:2px;color:#fff}
.ib-msg.in .ib-bubble{background:var(--ws-bubble-in);border-bottom-left-radius:2px;color:var(--ws-text)}
.ib-msg.consec.out .ib-bubble{border-bottom-right-radius:8px;border-top-right-radius:2px}
.ib-msg.consec.in .ib-bubble{border-bottom-left-radius:8px;border-top-left-radius:2px}
.ib-msg-text{white-space:pre-wrap;word-wrap:break-word}
.ib-msg-foot{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,.5);margin-right:6px;margin-top:1px;float:left;line-height:1}
.ib-msg.in .ib-msg-foot{color:var(--ws-text-dim)}
.ib-msg-tick{color:rgba(255,255,255,.5);font-size:13px;line-height:1}
.ib-msg-tick.read{color:var(--ws-tick)}
.ib-msg-edited{font-style:italic;opacity:.7}

/* Attachments */
.ib-msg-img{display:block;max-width:280px;max-height:280px;border-radius:6px;cursor:pointer;background:var(--ws-panel2)}
.ib-msg-file{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,.04);border-radius:6px;text-decoration:none;color:inherit;margin:2px 0}
.ib-msg-file-ico{font-size:24px;flex-shrink:0}
.ib-msg-file-info{flex:1;min-width:0}
.ib-msg-file-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ib-msg-file-size{font-size:11px;color:var(--ws-text-dim);margin-top:1px}
.ib-system-msg{align-self:center;background:rgba(255,229,127,.18);color:#ffe57f;font-size:11px;padding:5px 11px;border-radius:7px;margin:8px 0;text-align:center;max-width:80%}

/* Typing indicator */
.ib-typing{align-self:flex-start;background:var(--ws-bubble-in);padding:10px 14px;border-radius:8px;border-bottom-left-radius:2px;display:flex;gap:3px;animation:msgIn .18s ease}
.ib-typing span{width:6px;height:6px;border-radius:50%;background:var(--ws-text-dim);animation:typingDot 1.2s infinite ease-in-out}
.ib-typing span:nth-child(2){animation-delay:.15s}
.ib-typing span:nth-child(3){animation-delay:.3s}
@keyframes typingDot{0%,80%,100%{transform:scale(.6);opacity:.5}40%{transform:scale(1);opacity:1}}

/* ── Composer ── */
.ib-composer{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--ws-panel);border-top:1px solid var(--ws-border);position:relative}
.ib-input-wrap{flex:1;background:var(--ws-panel2);border-radius:8px;display:flex;align-items:center;padding:6px 12px;min-height:42px}
.ib-input{flex:1;background:none;border:none;color:var(--ws-text);font-family:inherit;font-size:14px;outline:none;resize:none;line-height:1.5;max-height:120px;padding:4px 0}
.ib-input::placeholder{color:var(--ws-text-dim)}
.ib-send{width:42px;height:42px;border-radius:50%;border:none;background:var(--ws-green);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;font-family:inherit;flex-shrink:0}
.ib-send:hover{background:var(--ws-green-dark)}
.ib-send:disabled{opacity:.4;cursor:not-allowed}
.ib-attach-menu{position:absolute;bottom:60px;right:10px;background:var(--ws-panel2);border-radius:14px;padding:10px;box-shadow:0 6px 24px rgba(0,0,0,.4);display:none;flex-direction:column;gap:8px;z-index:20}
.ib-attach-menu.show{display:flex}
.ib-attach-item{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:8px;cursor:pointer;color:var(--ws-text);font-size:13px;font-weight:600;background:transparent;border:none;font-family:inherit;text-align:right;width:100%}
.ib-attach-item:hover{background:rgba(255,255,255,.06)}
.ib-attach-ico{width:36px;height:36px;border-radius:50%;background:var(--c);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}

/* Emoji panel */
.ib-emoji-panel{position:absolute;bottom:60px;right:10px;background:var(--ws-panel2);border-radius:12px;padding:10px;box-shadow:0 6px 24px rgba(0,0,0,.4);display:none;width:280px;max-height:260px;overflow-y:auto;z-index:20;grid-template-columns:repeat(8,1fr);gap:2px}
.ib-emoji-panel.show{display:grid}
.ib-emoji-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:6px;border-radius:6px;transition:.1s;font-family:inherit}
.ib-emoji-btn:hover{background:rgba(255,255,255,.08)}

/* Lightbox */
.ib-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:20px}
.ib-lightbox.show{display:flex}
.ib-lightbox img{max-width:90vw;max-height:80vh;object-fit:contain;border-radius:8px}
.ib-lightbox-close{position:absolute;top:18px;right:18px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;border:none;font-size:22px;cursor:pointer;font-family:inherit}

/* New chat modal */
.ib-modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;display:none;align-items:center;justify-content:center;padding:16px}
.ib-modal-ov.show{display:flex}
.ib-modal{background:var(--ws-panel);border-radius:14px;max-width:420px;width:100%;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.ib-modal-hdr{padding:14px 18px;border-bottom:1px solid var(--ws-divider);display:flex;justify-content:space-between;align-items:center}
.ib-modal-hdr h3{font-size:15px;font-weight:700}
.ib-modal-body{padding:8px 0;overflow-y:auto;flex:1}
.ib-user-row{display:flex;align-items:center;gap:12px;padding:10px 18px;cursor:pointer;border-bottom:1px solid var(--ws-divider)}
.ib-user-row:hover{background:rgba(255,255,255,.04)}
.ib-user-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.ib-user-info{flex:1;min-width:0}
.ib-user-name{font-size:14px;font-weight:600}
.ib-user-role{font-size:11px;color:var(--ws-text-dim);margin-top:2px}

/* ── Reply preview in composer ── */
.ib-reply-strip{padding:8px 12px;background:var(--ws-panel2);border-right:3px solid var(--ws-green);border-radius:6px;margin:0 10px 8px;display:none;align-items:center;gap:8px}
.ib-reply-strip.show{display:flex}
.ib-reply-body{flex:1;min-width:0}
.ib-reply-name{font-size:11px;color:var(--ws-green);font-weight:700}
.ib-reply-text{font-size:12px;color:var(--ws-text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.ib-reply-close{background:none;border:none;color:var(--ws-text-dim);font-size:18px;cursor:pointer;padding:4px}
/* Quoted reply inside a bubble */
.ib-quote{background:rgba(255,255,255,.05);border-right:3px solid var(--ws-green);border-radius:5px;padding:5px 8px;margin-bottom:5px;cursor:pointer}
.ib-quote-name{font-size:11px;font-weight:700;color:var(--ws-green)}
.ib-quote-text{font-size:12px;color:rgba(255,255,255,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Reactions */
.ib-reactions{display:flex;gap:3px;margin-top:-6px;margin-bottom:4px;flex-wrap:wrap;position:relative;z-index:2}
.ib-msg.out .ib-reactions{justify-content:flex-end;padding-left:8px}
.ib-msg.in .ib-reactions{justify-content:flex-start;padding-right:8px}
.ib-react-chip{background:var(--ws-panel2);border:1px solid var(--ws-border);border-radius:14px;padding:1px 8px;font-size:13px;display:inline-flex;gap:3px;align-items:center;cursor:pointer;transition:.1s}
.ib-react-chip:hover{transform:scale(1.05)}
.ib-react-chip.mine{background:rgba(0,168,132,.25);border-color:var(--ws-green)}
.ib-react-chip .cnt{font-size:10px;color:var(--ws-text-dim);font-weight:600}
/* Action sheet */
.ib-actions-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9500;display:none;align-items:flex-end;justify-content:center;padding:20px}
.ib-actions-ov.show{display:flex;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ib-actions{background:var(--ws-panel);border-radius:14px;width:100%;max-width:360px;padding:10px;display:flex;flex-direction:column;gap:2px;animation:slideUpAS .2s cubic-bezier(.25,.8,.25,1);box-shadow:0 12px 40px rgba(0,0,0,.5)}
@keyframes slideUpAS{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.ib-act-btn{background:none;border:none;color:var(--ws-text);font-family:inherit;font-size:14px;font-weight:600;padding:12px 16px;border-radius:8px;cursor:pointer;text-align:right;transition:.1s}
.ib-act-btn:hover{background:rgba(255,255,255,.05)}
.ib-act-btn.ib-act-del{color:#ff6b6b}
.ib-react-row{display:flex;justify-content:space-around;padding:8px;border-bottom:1px solid var(--ws-divider);margin-bottom:6px;gap:4px;flex-wrap:wrap}
.ib-react-pick{font-size:26px;background:none;border:none;cursor:pointer;padding:6px;border-radius:50%;transition:.1s;font-family:inherit}
.ib-react-pick:hover{background:rgba(255,255,255,.08);transform:scale(1.2)}
/* Voice messages */
.ib-voice-record-ui{flex:1;display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--ws-panel2);border-radius:8px;color:var(--ws-text);font-size:13px}
.ib-voice-dot{width:10px;height:10px;border-radius:50%;background:#ff5a5a;animation:recordPulse 1s infinite}
@keyframes recordPulse{0%,100%{opacity:1}50%{opacity:.3}}
.ib-voice-time{font-family:ui-monospace,monospace;font-weight:700}
.ib-voice-cancel{margin-right:auto;background:none;border:none;color:#ff5a5a;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.ib-voice-bubble{display:flex;align-items:center;gap:10px;min-width:180px;max-width:280px;padding:4px}
.ib-voice-play{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;cursor:pointer;border:none;color:#fff;font-family:inherit}
.ib-voice-dur{font-size:11px;color:rgba(255,255,255,.6);font-family:ui-monospace,monospace;flex-shrink:0}
.ib-voice-progress{flex:1;height:3px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;cursor:pointer}
.ib-voice-progress-fill{height:100%;background:var(--ws-green);width:0%;transition:width .1s}
/* Order share card */
.ib-ordercard{background:rgba(0,168,132,.08);border:1px solid rgba(0,168,132,.3);border-radius:8px;padding:10px 12px;margin:2px 0;cursor:pointer;text-decoration:none;color:inherit;display:block;transition:.15s}
.ib-ordercard:hover{background:rgba(0,168,132,.15)}
.ib-ordercard-hdr{display:flex;align-items:center;gap:6px;color:var(--ws-green);font-size:11px;font-weight:700;margin-bottom:4px}
.ib-ordercard-client{font-size:14px;font-weight:700;color:var(--ws-text)}
.ib-ordercard-id{font-size:11px;color:var(--ws-text-dim);margin-top:2px}
.ib-ordercard-meta{display:flex;gap:6px;margin-top:6px;font-size:10px;flex-wrap:wrap}
.ib-ordercard-chip{background:rgba(255,255,255,.07);padding:2px 7px;border-radius:10px;color:var(--ws-text-dim);white-space:nowrap}

/* ── Chat menu (⋮) ── */
.ib-chat-menu{position:absolute;top:46px;left:0;background:var(--ws-panel);border:1px solid var(--ws-border);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.4);padding:4px;min-width:200px;display:none;z-index:50}
.ib-chat-menu.show{display:block}
.ib-cm-item{display:block;width:100%;background:none;border:none;padding:9px 12px;color:var(--ws-text);font-family:inherit;font-size:13px;font-weight:600;text-align:right;cursor:pointer;border-radius:6px;transition:.1s}
.ib-cm-item:hover{background:rgba(255,255,255,.05)}

/* ── Mention autocomplete dropdown ── */
.ib-mention-pop{position:absolute;bottom:60px;right:60px;background:var(--ws-panel);border:1px solid var(--ws-border);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.4);width:240px;max-height:220px;overflow-y:auto;display:none;z-index:30}
.ib-mention-pop.show{display:block}
.ib-mention-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--ws-divider)}
.ib-mention-item:hover,.ib-mention-item.active{background:rgba(0,168,132,.15)}
.ib-mention-item:last-child{border-bottom:none}

const fmtTime=ts=>{
  if(!ts?.toDate)return'';
  const d=ts.toDate();const now=new Date();
  const isToday=d.toDateString()===now.toDateString();
  if(isToday)return d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});

  if(d.toDateString()===y.toDateString())return'أمس';

// ── Presence (heartbeat every 25s, mark offline on unload) ──
let heartbeatInt=null;
async function setOnline(){
  if(!currentUid)return;
  try{
    await setDoc(doc(db,'presence',currentUid),{
      online:true,lastSeen:serverTimestamp(),
      name:currentUserName,role:currentRole,
    },{merge:true});
  }catch(_){}
}
async function setOffline(){
  if(!currentUid)return;
  try{
    await setDoc(doc(db,'presence',currentUid),{
      online:false,lastSeen:serverTimestamp(),typingIn:null,
    },{merge:true});
  }catch(_){}
}
function startHeartbeat(){
  setOnline();
  if(heartbeatInt)clearInterval(heartbeatInt);
  heartbeatInt=setInterval(setOnline,25000);
  window.addEventListener('beforeunload',()=>setOffline(),{once:true});
  window.addEventListener('pagehide',()=>setOffline(),{once:true});
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){setOffline();clearInterval(heartbeatInt);heartbeatInt=null;}
    else{startHeartbeat();}
  });
}

// ── Auto-create channel conversations (idempotent) ──
async function ensureChannels(){
  // إذا role غير محدد في users doc، اعتبره customer_service كافتراضي
  // (يضمن أن الموظف على الأقل ينضم إلى #عام + #خدمة-العملاء)
  const role=currentRole||'customer_service';
  const myChannels=CHANNELS.filter(c=>c.roles==='*'||c.roles.includes(role));
  console.log('[inbox] ensureChannels start — uid:',currentUid,'role:',role||'(empty)','channels:',myChannels.map(c=>c.key));
  let okCount=0,failCount=0;
  // For each channel, ensure a conversation doc with stable id `channel_${key}` exists
  for(const ch of myChannels){
    const convId='channel_'+ch.key;
    const ref=doc(db,'conversations',convId);
    try{
      const snap=await getDoc(ref);
      if(!snap.exists()){
        // create with all matching role users
        const all=await getDocs(collection(db,'users'));
        let members=all.docs.filter(d=>{
          const ud=d.data();if(!ud.isActive&&ud.isActive!==undefined)return false;
          if(ch.roles==='*')return true;
          return ch.roles.includes(ud.role);
        }).map(d=>d.id);
        // ضمان أن currentUid في الـ members (rule يتطلب creator يكون participant)
        if(!members.includes(currentUid))members.push(currentUid);
        await setDoc(ref,{
          type:'channel',channelKey:ch.key,name:ch.name,ico:ch.ico,
          participants:members,
          archivedBy:[],
          createdAt:serverTimestamp(),
          lastMessageAt:serverTimestamp(),
          lastMessagePreview:'بدأت المحادثة',lastSenderName:'النظام',
        });
        okCount++;
        console.log('[inbox]   ✓ created channel:',ch.key,'with',members.length,'members');
      } else {
        // make sure current user is a participant
        const cur=snap.data();
        if(!(cur.participants||[]).includes(currentUid)){
          await updateDoc(ref,{participants:arrayUnion(currentUid)});
          okCount++;
          console.log('[inbox]   ✓ joined existing channel:',ch.key);
        } else {
          okCount++;
        }
      }
    }catch(e){
      failCount++;
      console.error('[inbox]   ❌ channel ensure failed:',ch.key,{code:e.code,msg:e.message,uid:currentUid,role});
      if(typeof toast==='function')toast(`⚠️ تعذّر الانضمام إلى ${ch.name}: ${e.code||e.message}`,'err');
    }
  }
  console.log('[inbox] ensureChannels done — ok:',okCount,'fail:',failCount);
}

// ── Conversations listener ──
function subscribeConversations(){
  const q=query(collection(db,'conversations'),where('participants','array-contains',currentUid));
  onSnapshot(q,snap=>{
    conversations=snap.docs.map(d=>({...d.data(),_id:d.id}));
    console.log('[inbox] conversations updated:',conversations.length);
    renderConvList();
  },err=>{
    console.error('[inbox] conversations subscription FAILED:',{code:err.code,msg:err.message,uid:currentUid,role:currentRole});
    if(typeof toast==='function'){
      toast(err.code==='permission-denied'
        ?'⛔ خطأ صلاحيات في قراءة المحادثات — تواصل مع الأدمن'
        :`⚠️ تعذّر تحميل المحادثات: ${err.code||err.message}`,'err');
    }
    // عرض في قائمة المحادثات
    const list=$('ib-convs');

  });
}

// ── Presence listener (for everyone we might chat with) ──
function subscribePresence(){

    presenceMap.clear();

    renderConvList();
    if(activeConv)renderChatHeader();
  });
}

// ── Users listener ──
function subscribeUsers(){

    allUsers=snap.docs.map(d=>({...d.data(),_id:d.id})).filter(u=>u.isActive!==false&&!u.deleted&&u._id!==currentUid);

// Active orders for the 📦 order picker. Loaded only for users who need it

function subscribeOrders(){

      .filter(o=>!['archived','cancelled'].includes(o.stage))
      .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  },err=>console.warn('orders sub:',err.message));
}

// ── Render conv list ──
function renderConvList(){
  const list=$('ib-convs');if(!list)return;
  const q=(searchQuery||'').toLowerCase();
  let items=conversations.slice();
  // sort by lastMessageAt desc
  items.sort((a,b)=>(b.lastMessageAt?.seconds||0)-(a.lastMessageAt?.seconds||0));
  // tab filter
  if(listTab==='archived'){items=items.filter(c=>(c.archivedBy||[]).includes(currentUid));}
  else {items=items.filter(c=>!(c.archivedBy||[]).includes(currentUid));}
  // search filter
  if(q){items=items.filter(c=>{
    const n=convDisplayName(c).toLowerCase();
    return n.includes(q)||(c.lastMessagePreview||'').toLowerCase().includes(q);
  });}
  // counts
  $('cnt-all').textContent=conversations.filter(c=>!(c.archivedBy||[]).includes(currentUid)).length;
  $('cnt-arc').textContent=conversations.filter(c=>(c.archivedBy||[]).includes(currentUid)).length;
  if(!items.length){
    if(searchQuery){
      list.innerHTML=`<div style="padding:40px 20px;text-align:center;color:var(--ws-text-dim);font-size:13px">لا نتائج</div>`;
    } else if(listTab==='archived'){
      list.innerHTML=`<div style="padding:40px 20px;text-align:center;color:var(--ws-text-dim);font-size:13px">لا توجد محادثات مؤرشفة</div>`;
    } else if(conversations.length===0){
      // empty قبل أي تحميل أو بعد فشل ensureChannels — نعرض diagnostic
      list.innerHTML=`<div style="padding:28px 20px;text-align:center;color:var(--ws-text-dim);font-size:13px;line-height:1.9">
        <div style="font-size:42px;margin-bottom:10px;opacity:.5">💬</div>
        <strong style="color:var(--ws-text)">لا توجد محادثات بعد</strong><br>
        <span style="font-size:11px;color:var(--ws-text-dim)">role: ${currentRole||'غير محدد'} · uid: ${(currentUid||'').slice(0,6)}…</span><br>
        <button onclick="retryEnsureChannels()" style="margin-top:12px;padding:8px 16px;border-radius:10px;border:1px solid var(--ws-border);background:var(--ws-bg-elev);color:var(--ws-text);cursor:pointer;font-family:inherit;font-size:12px;font-weight:700">🔄 إعادة الإعداد</button>
        <button onclick="newDM()" style="margin-top:12px;margin-right:6px;padding:8px 16px;border-radius:10px;border:none;background:#00a884;color:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700">✏️ محادثة جديدة</button>
        <div style="font-size:10px;margin-top:10px;color:var(--ws-text-dim);opacity:.7">افتح Console (F12) لتفاصيل التشخيص</div>
      </div>`;
    } else {
      list.innerHTML=`<div style="padding:40px 20px;text-align:center;color:var(--ws-text-dim);font-size:13px">ابدأ محادثة بالضغط على ✏️</div>`;
    }
    return;
  }
  list.innerHTML=items.map(c=>{
    const isActive=c._id===activeConvId;
    const name=convDisplayName(c);
    const ico=convIcon(c);
    const col=convColor(c);
    const unread=(c.unreadCount?.[currentUid]||0);
    const isDM=c.type==='dm';
    const otherUid=isDM?(c.participants||[]).find(p=>p!==currentUid):null;
    const otherPresence=otherUid?presenceMap.get(otherUid):null;
    const isOnline=otherPresence&&isUserOnline(otherPresence);
    const lastTime=fmtTime(c.lastMessageAt);
    const lastSender=c.lastSenderId===currentUid?'أنت: ':(isDM?'':(c.lastSenderName?c.lastSenderName+': ':''));
    const tick=c.lastSenderId===currentUid?(c.lastReadByAll?'✓✓':'✓'):'';
    const tickClass=c.lastReadByAll?'read':'';
    return `<div class="ib-conv ${isActive?'active':''} ${unread?'unread':''}" data-id="${c._id}" onclick="openConv('${c._id}')">
      <div class="ib-conv-avatar" style="background:${col}">${ico}${isDM?`<span class="presence ${isOnline?'online':''}"></span>`:''}</div>
      <div class="ib-conv-body">
        <div class="ib-conv-top">
          <div class="ib-conv-name">${esc(name)}</div>
          <div class="ib-conv-time">${lastTime}</div>
        </div>
        <div class="ib-conv-bot">
          <div class="ib-conv-last">${tick?`<span class="ib-conv-tick ${tickClass}">${tick}</span> `:''}${esc(lastSender+(c.lastMessagePreview||''))}</div>
          <div class="ib-conv-meta">
            ${unread>0?`<span class="ib-conv-unread">${unread>99?'99+':unread}</span>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function convDisplayName(c){
  if(c.type==='channel')return c.name||'#قناة';
  if(c.type==='dm'){
    const otherUid=(c.participants||[]).find(p=>p!==currentUid);
    if(!otherUid)return 'محادثة';
    const u=allUsers.find(x=>x._id===otherUid);
    return u?.name||c.dmNames?.[otherUid]||'موظف';
  }
  return c.name||'محادثة';
}
function convIcon(c){
  if(c.type==='channel')return c.ico||'#';
  if(c.type==='dm'){
    const otherUid=(c.participants||[]).find(p=>p!==currentUid);
    const u=allUsers.find(x=>x._id===otherUid);
    return initAvatar(u?.name||c.dmNames?.[otherUid]||'?');
  }
  return c.name?.[0]||'?';
}
function convColor(c){
  if(c.type==='channel')return '#3b9eff';
  if(c.type==='dm'){
    const otherUid=(c.participants||[]).find(p=>p!==currentUid);
    const u=allUsers.find(x=>x._id===otherUid);
    return colorOf(u?.role);
  }
  return '#4e5672';
}
function isUserOnline(p){
  if(!p?.online)return false;
  const last=p.lastSeen?.seconds*1000||0;
  return (Date.now()-last)<90000;  // 90s threshold
}

// ── Open conversation ──
window.openConv=async function(id){
  if(activeConvId===id)return;
  activeConvId=id;
  activeConv=conversations.find(c=>c._id===id);
  if(!activeConv){return;}
  $('ib-wrap').classList.add('show-chat');
  // un-archive if was archived
  if((activeConv.archivedBy||[]).includes(currentUid)){
    try{await updateDoc(doc(db,'conversations',id),{archivedBy:arrayRemove(currentUid)});}catch(_){}
  }
  renderChat();
  updateMuteBtn();
  // apply wallpaper preference for this user
  const wpIdx=activeConv.wallpaperBy?.[currentUid]||0;
  applyWallpaper(wpIdx);
  // subscribe to messages
  if(unsubMessages)unsubMessages();
  const q=query(collection(db,'conversations',id,'messages'),orderBy('createdAt','asc'),limit(200));
  unsubMessages=onSnapshot(q,snap=>{
    let all=snap.docs.map(d=>({...d.data(),_id:d.id}));
    // "Clear for me" filter — hide messages older than my clearedAt
    const ca=activeConv.clearedAt?.[currentUid];
    const caMs=ca?.seconds?ca.seconds*1000:0;
    if(caMs){
      all=all.filter(m=>{
        const t=m.createdAt?.seconds?m.createdAt.seconds*1000:0;
        return t>caMs;
      });
    }
    messages=all;
    renderMessages();
    maybeMarkRead();
  });
  renderConvList();
};

  $('ib-wrap').classList.remove('show-chat');

function renderMessages(){
  const wrap=$('ib-msgs');if(!wrap)return;
  if(!messages.length){
    wrap.innerHTML=`<div style="margin:auto;text-align:center;color:var(--ws-text-dim);font-size:13px;padding:40px">ابدأ المحادثة برسالة 👋</div>`;
    return;
  }
  let html='';let lastDate='';let lastSender='';
  messages.forEach((m,i)=>{
    const ts=m.createdAt?.toDate?.();const dateStr=ts?ts.toLocaleDateString('ar-EG',{day:'numeric',month:'long',year:'numeric'}):'';
    if(dateStr!==lastDate){html+=`<div class="ib-date-sep">${dateStr}</div>`;lastDate=dateStr;lastSender='';}
    if(m.type==='system'){html+=`<div class="ib-system-msg">${esc(m.text||'')}</div>`;return;}
    if(m.deletedAt){
      const isOut=m.senderId===currentUid;
      html+=`<div class="ib-msg ${isOut?'out':'in'}"><div class="ib-bubble" style="opacity:.6;font-style:italic">🚫 رسالة محذوفة</div></div>`;
      lastSender=m.senderId;return;
    }
    const isOut=m.senderId===currentUid;
    const consec=lastSender===m.senderId&&i>0;
    lastSender=m.senderId;
    const time=ts?ts.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}):'';
    const readByOther=isOut&&activeConv?.type==='dm'&&Object.keys(m.readBy||{}).filter(u=>u!==currentUid).length>0;
    const tick=isOut?`<span class="ib-msg-tick ${readByOther?'read':''}">${readByOther?'✓✓':'✓'}</span>`:'';
    // quote (reply-to preview)
    let quote='';
    if(m.replyTo){
      quote=`<div class="ib-quote" onclick="jumpToMsg('${m.replyTo.msgId}')">
        <div class="ib-quote-name">${esc(m.replyTo.senderName||'')}</div>
        <div class="ib-quote-text">${esc(m.replyTo.preview||'')}</div>
      </div>`;
    }
    // body by type
    let body='';
    if(m.type==='image'&&m.attachments?.[0]){
      body=`<img class="ib-msg-img" src="${m.attachments[0].url}" onclick="openLb('${m.attachments[0].url}')" alt="">`;
    } else if(m.type==='file'&&m.attachments?.[0]){
      const a=m.attachments[0];
      body=`<a class="ib-msg-file" href="${a.url}" target="_blank" rel="noopener" download="${esc(a.name||'')}">
        <span class="ib-msg-file-ico">📄</span>
        <div class="ib-msg-file-info"><div class="ib-msg-file-name">${esc(a.name||'مستند')}</div><div class="ib-msg-file-size">${fmtBytes(a.size||0)}</div></div>
      </a>`;
    } else if(m.type==='voice'&&m.attachments?.[0]){
      const v=m.attachments[0];
      const dur=v.duration||0;
      const durStr=Math.floor(dur/60)+':'+String(Math.floor(dur%60)).padStart(2,'0');
      body=`<div class="ib-voice-bubble">
        <button class="ib-voice-play" onclick="toggleVoice(this,'${v.url}')">▶</button>
        <div class="ib-voice-progress" onclick="event.stopPropagation()"><div class="ib-voice-progress-fill"></div></div>
        <div class="ib-voice-dur">${durStr}</div>
      </div>`;
    } else if(m.type==='order_share'&&m.orderRef){
      const o=m.orderRef;
      body=`<a class="ib-ordercard" href="design.html?order=${o.orderId}">
        <div class="ib-ordercard-hdr">📦 أوردر</div>
        <div class="ib-ordercard-client">${esc(o.clientName||'—')}</div>
        <div class="ib-ordercard-id">#${esc(o.orderCode||o.orderId)}</div>
        <div class="ib-ordercard-meta">
          ${o.stage?`<span class="ib-ordercard-chip">${esc(o.stage)}</span>`:''}
          ${o.salePrice?`<span class="ib-ordercard-chip">${esc(String(o.salePrice))} ج</span>`:''}
          ${o.deadline?`<span class="ib-ordercard-chip">📅 ${esc(o.deadline)}</span>`:''}
        </div>
      </a>`;
    }
    const text=m.text?`<div class="ib-msg-text">${renderTextWithMentions(m.text)}${m.editedAt?'<span class="ib-msg-edited"> (مُعدّلة)</span>':''}</div>`:'';
    const senderName=!isOut&&!consec&&activeConv?.type==='channel'?`<div class="sender">${esc(m.senderName||'')}</div>`:'';
    // reactions chips
    const rxs=Object.entries(m.reactions||{}).filter(([_,arr])=>(arr||[]).length>0);
    const reactBlock=rxs.length?`<div class="ib-reactions">${rxs.map(([emo,uids])=>{
      const mine=(uids||[]).includes(currentUid);
      return `<button class="ib-react-chip ${mine?'mine':''}" onclick="toggleReact('${m._id}','${emo}')">${emo}<span class="cnt">${uids.length}</span></button>`;
    }).join('')}</div>`:'';
    html+=`<div class="ib-msg ${isOut?'out':'in'} ${consec?'consec':''}" data-mid="${m._id}" onclick="onMsgClick(event,'${m._id}')">
      ${senderName}
      <div class="ib-bubble">${quote}${body}${text}<span class="ib-msg-foot">${time} ${tick}</span></div>
      ${reactBlock}
    </div>`;
  });
  wrap.innerHTML=html;
  // attach long-press listeners
  wrap.querySelectorAll('.ib-msg').forEach(el=>attachLongPress(el));
  // scroll to bottom
  requestAnimationFrame(()=>{wrap.scrollTop=wrap.scrollHeight;});

  el.addEventListener('touchmove',()=>{moved=true;clearTimeout(pressTimer);},{passive:true});
  el.addEventListener('touchend',()=>{clearTimeout(pressTimer);});
  el.addEventListener('contextmenu',e=>{e.preventDefault();trigger();});
}

// ── Mark conv as read (throttled) ──
async function maybeMarkRead(){
  if(!activeConvId||!activeConv)return;
  const now=Date.now();if(now-lastReadUpdate<2000)return;
  lastReadUpdate=now;
  const unread=activeConv.unreadCount?.[currentUid]||0;
  if(unread>0){
    try{
      await updateDoc(doc(db,'conversations',activeConvId),{[`unreadCount.${currentUid}`]:0});
    }catch(_){}
  }
  // mark recent messages readBy[currentUid]
  const recent=messages.slice(-30).filter(m=>m.senderId!==currentUid&&!(m.readBy?.[currentUid]));
  if(recent.length>0){
    const batch=writeBatch(db);
    recent.forEach(m=>{
      batch.update(doc(db,'conversations',activeConvId,'messages',m._id),{[`readBy.${currentUid}`]:serverTimestamp()});
    });
    try{await batch.commit();}catch(_){}
  }
}

// ════════════════════════════════════════════════════════════════════
//  @mentions in the composer
// ════════════════════════════════════════════════════════════════════
// Listens to the input. When the user types `@`, we open a dropdown of
// participants matching the query after the `@`. Selecting one inserts
// the canonical "@الاسم " into the text and records the uid in
// `pendingMentions` so we can persist `mentions: [uid…]` on send.
let pendingMentions=[];

function getMentionableUsers(){
  if(!activeConv)return[];
  const list=[];
  (activeConv.participants||[]).filter(u=>u!==currentUid).forEach(uid=>{
    const u=allUsers.find(x=>x._id===uid)||{_id:uid,name:'موظف',role:''};
    list.push({uid,name:u.name||'موظف',role:u.role||''});
  });
  return list;
}

function detectMention(inp){
  // find an unfinished @… token before caret
  const pos=inp.selectionStart||0;
  const before=inp.value.slice(0,pos);
  const m=before.match(/@([^\s@]*)$/);
  if(!m){mentionState=null;hideMentionPop();return;}
  const query=(m[1]||'').toLowerCase();
  const items=getMentionableUsers().filter(u=>!query||(u.name||'').toLowerCase().includes(query));
  if(!items.length){hideMentionPop();return;}
  mentionState={start:pos-m[0].length,end:pos,query,items:items.slice(0,8),active:0};
  renderMentionPop();
}
function renderMentionPop(){
  const pop=$('mention-pop');if(!pop||!mentionState)return;
  pop.innerHTML=mentionState.items.map((u,i)=>`
    <div class="ib-mention-item ${i===mentionState.active?'active':''}" data-uid="${u.uid}" data-name="${esc((u.name||'').replace(/"/g,''))}" onclick="pickMention(this)">
      <div class="ib-mention-av" style="background:${colorOf(u.role)}">${initAvatar(u.name)}</div>
      <div style="flex:1;min-width:0">
        <div class="ib-mention-nm">${esc(u.name)}</div>
        <div class="ib-mention-role">${ROLE_LABEL[u.role]||''}</div>
      </div>
    </div>`).join('');
  pop.classList.add('show');
}
function hideMentionPop(){$('mention-pop')?.classList.remove('show');mentionState=null;}

window.pickMention=function(el){
  if(!mentionState)return;
  const inp=$('ib-input');if(!inp)return;
  const uid=el.dataset.uid;
  const name=el.dataset.name;
  const before=inp.value.slice(0,mentionState.start);
  const after=inp.value.slice(mentionState.end);
  const insert='@'+name+' ';
  inp.value=before+insert+after;
  const newPos=before.length+insert.length;
  inp.setSelectionRange(newPos,newPos);
  inp.focus();
  if(!pendingMentions.includes(uid))pendingMentions.push(uid);
  hideMentionPop();
  // trigger send/mic toggle
  onTyping(inp);
};

// Parse final text for @mentions and resolve UIDs from participant names
function extractMentions(text){
  if(!text)return[];
  const mentioned=new Set();
  const candidates=getMentionableUsers();
  // first include any uids picked from the dropdown
  pendingMentions.forEach(u=>mentioned.add(u));
  // also scan text for "@Name" patterns matching participants by exact name match
  candidates.forEach(u=>{
    const re=new RegExp('@'+(u.name||'').replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?=\\s|$)');
    if(re.test(text))mentioned.add(u.uid);
  });
  return [...mentioned];
}

// Render text with @mentions highlighted (you-highlighted if it's me)
function renderTextWithMentions(text){
  if(!text)return'';
  let html=esc(text);
  // highlight any "@Name" sequence that matches a known participant
  const cands=getMentionableUsers();
  cands.push({uid:currentUid,name:currentUserName,role:currentRole});
  cands.forEach(u=>{
    if(!u.name)return;
    const escName=u.name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const re=new RegExp('@'+escName+'(?=\\s|$|[،,.!?])','g');
    html=html.replace(re,m=>{
      const isMe=u.uid===currentUid;
      return `<span class="ib-mention ${isMe?'you':''}">${esc(m)}</span>`;
    });
  });
  return html;
}

window.sendText=async function(){
  const inp=$('ib-input');if(!inp||!activeConvId)return;
  const text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='auto';
  hideMentionPop();
  const mentions=extractMentions(text);
  pendingMentions=[];  // reset after extract
  // Edit path: if editingMsgId is set, update instead of sending new
  if(editingMsgId){
    try{
      await updateDoc(doc(db,'conversations',activeConvId,'messages',editingMsgId),{text,mentions,editedAt:serverTimestamp()});
      editingMsgId=null;
      cancelReply();
    }catch(e){toast('❌ '+e.message,'err');}
    return;
  }
  const payload={type:'text',text};
  if(mentions.length)payload.mentions=mentions;
  if(replyTo){payload.replyTo=replyTo;cancelReply();}
  await sendMessage(payload);
  // toggle send/mic back since input is empty
  const send=$('ib-send'),mic=$('ib-mic');if(send&&mic){send.style.display='none';mic.style.display='flex';}
};
async function sendMessage(payload){
  if(!activeConvId)return;
  return sendMessageTo(activeConvId,payload,activeConv);
}
// Generic sender — works for the active conv or any other (used by forward + share)
async function sendMessageTo(convId,payload,convData){
  if(!convId)return;
  const msg={
    senderId:currentUid,
    senderName:currentUserName,
    createdAt:serverTimestamp(),
    readBy:{[currentUid]:serverTimestamp()},
    ...payload,
  };
  try{
    await addDoc(collection(db,'conversations',convId,'messages'),msg);
    const preview=payload.type==='text'?payload.text
      :payload.type==='image'?'📷 صورة'
      :payload.type==='file'?'📄 '+(payload.attachments?.[0]?.name||'مرفق')
      :payload.type==='voice'?'🎤 رسالة صوتية'
      :payload.type==='order_share'?'📦 أوردر: '+(payload.orderRef?.clientName||'')
      :'رسالة';
    const upd={
      lastMessageAt:serverTimestamp(),
      lastMessagePreview:preview.slice(0,80),
      lastSenderId:currentUid,
      lastSenderName:currentUserName,
      lastReadByAll:false,
    };
    let conv=convData||conversations.find(c=>c._id===convId);
    if(!conv){
      const snap=await getDoc(doc(db,'conversations',convId));

window.startVoice=async function(){
  if(voiceRecorder)return;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    voiceChunks=[];
    voiceRecorder=new MediaRecorder(stream);
    voiceRecorder.ondataavailable=e=>{if(e.data.size>0)voiceChunks.push(e.data);};
    voiceRecorder.onstop=async()=>{
      const blob=new Blob(voiceChunks,{type:'audio/webm'});
      const duration=Math.floor((Date.now()-voiceStart)/1000);
      stream.getTracks().forEach(t=>t.stop());
      // restore composer UI
      restoreComposer();
      if(blob.size>0&&duration>=1){
        await uploadVoice(blob,duration);
      }
      voiceRecorder=null;
    };
    voiceStart=Date.now();
    voiceRecorder.start();
    showRecordingUI();
  }catch(e){
    toast('❌ تعذّر الوصول للميكروفون','err');
    voiceRecorder=null;
  }
};
window.stopVoice=function(){
  if(voiceRecorder&&voiceRecorder.state==='recording'){
    voiceRecorder.stop();
  }
};
window.cancelVoice=function(){
  if(voiceRecorder&&voiceRecorder.state==='recording'){
    voiceChunks=[];
    voiceRecorder.onstop=()=>{voiceRecorder=null;restoreComposer();};
    voiceRecorder.stop();
  }
};
function showRecordingUI(){
  const composer=$('composer');if(!composer)return;
  composer.dataset._origHtml=composer.innerHTML;
  composer.innerHTML=`
    <button class="ib-iconbtn" onclick="cancelVoice()">🗑</button>
    <div class="ib-voice-record-ui">
      <span class="ib-voice-dot"></span>
      <span class="ib-voice-time" id="rec-time">0:00</span>
      <span style="color:var(--ws-text-dim);font-size:12px">اضغط الميكروفون مرة أخرى لإرسال…</span>
    </div>
    <button class="ib-send" onclick="stopVoice()">▶</button>`;
  if(voiceTimerInt)clearInterval(voiceTimerInt);
  voiceTimerInt=setInterval(()=>{
    const s=Math.floor((Date.now()-voiceStart)/1000);
    const t=$('rec-time');if(t)t.textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  },500);
}
function restoreComposer(){
  if(voiceTimerInt){clearInterval(voiceTimerInt);voiceTimerInt=null;}
  const composer=$('composer');if(!composer)return;
  if(composer.dataset._origHtml){composer.innerHTML=composer.dataset._origHtml;delete composer.dataset._origHtml;}
}
async function uploadVoice(blob,duration){
  if(!activeConvId)return;
  toast('جاري رفع الرسالة الصوتية…','');
  try{
    const path=`chat/${activeConvId}/voice/${Date.now()}.webm`;
    const r=ref(storage,path);
    await uploadBytes(r,blob);
    const url=await getDownloadURL(r);
    await sendMessage({type:'voice',attachments:[{url,name:'voice.webm',size:blob.size,mime:'audio/webm',duration}]});
  }catch(e){toast('❌ '+e.message,'err');}
}

// Voice playback
let currentAudio=null;
window.toggleVoice=function(btn,url){
  if(currentAudio){
    currentAudio.pause();
    if(currentAudio._btn)currentAudio._btn.textContent='▶';
    if(currentAudio._fill)currentAudio._fill.style.width='0%';
    if(currentAudio.src===url){currentAudio=null;return;}
  }
  const a=new Audio(url);
  currentAudio=a;
  a._btn=btn;
  const fill=btn.parentElement.querySelector('.ib-voice-progress-fill');
  a._fill=fill;
  a.play().then(()=>{btn.textContent='⏸';}).catch(_=>{});
  a.ontimeupdate=()=>{if(fill&&a.duration)fill.style.width=(a.currentTime/a.duration*100)+'%';};
  a.onended=()=>{btn.textContent='▶';if(fill)fill.style.width='0%';currentAudio=null;};
};

    const prods=o.product||(o.products||[]).map(p=>p.name).join('، ')||'—';
    const code=esc(o.orderId||o._id.slice(-6));
    return `<div class="ib-user-row" onclick="pickOrderForChat('${o._id}')">
      <div class="ib-user-avatar" style="background:#00a884">📦</div>
      <div class="ib-user-info">
        <div class="ib-user-name">${esc(o.clientName||'—')}</div>
        <div class="ib-user-role">#${code} · ${esc(prods)} · ${STAGE_AR[o.stage]||o.stage||''}${o.deadline?' · '+esc(o.deadline):''}</div>
      </div>
    </div>`;
  }).join('');
}
window.pickOrderForChat=async function(orderDocId){
  const o=allOrders.find(x=>x._id===orderDocId);if(!o||!activeConvId)return;
  closeOrderPicker();
  const payload={
    type:'order_share',
    text:'📦 أوردر مشارَك',
    orderRef:{
      orderId:o._id,
      orderCode:o.orderId||o._id.slice(-6),
      clientName:o.clientName||'',
      salePrice:o.salePrice||0,
      stage:STAGE_AR[o.stage]||o.stage||'',
      deadline:o.deadline||'',
    },
  };
  await sendMessage(payload);
  toast('✅ تم إرسال الأوردر','ok');
};

// ── Search ──
$('ib-search').addEventListener('input',e=>{searchQuery=e.target.value;renderConvList();});

// ── Tabs ──
window.switchListTab=function(t){listTab=t;document.querySelectorAll('.ib-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));renderConvList();};

// ── New chat ──
window.openNewChat=function(){
  $('new-chat-ov').classList.add('show');
  renderUserList();
  $('user-search').addEventListener('input',renderUserList,{once:false});
  setTimeout(()=>$('user-search')?.focus(),100);
};
window.closeNewChat=()=>$('new-chat-ov').classList.remove('show');
function renderUserList(){
  const body=$('user-list-body');if(!body)return;
  const q=($('user-search')?.value||'').toLowerCase();
  let list=allUsers.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||'','ar'));
  if(q)list=list.filter(u=>(u.name||'').toLowerCase().includes(q)||(ROLE_LABEL[u.role]||'').toLowerCase().includes(q));
  if(!list.length){body.innerHTML='<div style="padding:30px;text-align:center;color:var(--ws-text-dim);font-size:13px">لا نتائج</div>';return;}
  body.innerHTML=list.map(u=>{
    const p=presenceMap.get(u._id);
    const online=isUserOnline(p);
    return `<div class="ib-user-row" onclick="startDM('${u._id}','${esc((u.name||'').replace(/'/g,''))}')">
      <div class="ib-user-avatar" style="background:${colorOf(u.role)};position:relative">${initAvatar(u.name)}<span class="presence ${online?'online':''}" style="position:absolute;bottom:0;left:0;width:11px;height:11px;border-radius:50%;background:${online?'#25d366':'var(--ws-text-dim)'};border:2px solid var(--ws-panel)"></span></div>
      <div class="ib-user-info">
        <div class="ib-user-name">${esc(u.name||'موظف')}</div>
        <div class="ib-user-role">${ROLE_LABEL[u.role]||u.role||''} ${online?'· متصل':''}</div>
      </div>
    </div>`;
  }).join('');
}
window.startDM=async function(otherUid,otherName){
  // stable id: sort uids
  const ids=[currentUid,otherUid].sort();
  const convId='dm_'+ids.join('_');
  const ref=doc(db,'conversations',convId);
  try{
    const snap=await getDoc(ref);
    if(!snap.exists()){
      await setDoc(ref,{
        type:'dm',
        participants:ids,
        dmNames:{[currentUid]:currentUserName,[otherUid]:otherName},
        archivedBy:[],
        createdAt:serverTimestamp(),
        lastMessageAt:serverTimestamp(),
        lastMessagePreview:'بدأت المحادثة',
        unreadCount:{},
      });
    }
    closeNewChat();
    openConv(convId);
  }catch(e){toast('❌ '+e.message,'err');}
};

// ── Lightbox ──
window.openLb=url=>{$('lb-img').src=url;$('lb').classList.add('show');};
window.closeLb=()=>$('lb').classList.remove('show');
$('lb').addEventListener('click',e=>{if(e.target.id==='lb')closeLb();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});

// ── Retry helper (called from empty state) ──
window.retryEnsureChannels=async function(){
  if(typeof toast==='function')toast('⏳ جاري إعادة الإعداد…','');
  try{
    await ensureChannels();
    if(typeof toast==='function')toast('✓ تم — انتظر تحديث القائمة','ok');
  }catch(e){
    if(typeof toast==='function')toast('❌ '+e.message,'err');
  }
};

// ── Auth ──
onAuthStateChanged(auth,async u=>{
  if(!u){location.href='login.html';return;}
  currentUser=u;currentUid=u.uid;
  try{
    const us=await getDoc(doc(db,'users',u.uid));
    if(us.exists()){
      currentUserData=us.data();
      currentRole=currentUserData.role||'';
      currentUserName=currentUserData.name||u.email;
      $('nav-name').textContent=currentUserName;
      $('nav-av').textContent=initAvatar(currentUserName);
      $('role-badge').textContent=ROLE_LABEL[currentRole]||currentRole;
      console.log('[inbox] auth ready — uid:',u.uid,'role:',currentRole||'(empty)','name:',currentUserName);
    } else {
      console.warn('[inbox] users/{uid} doc غير موجود — اتصل بالأدمن لإنشاء حسابك في users');
      if(typeof toast==='function')toast('⚠️ حسابك غير مكتمل (users doc مفقود) — تواصل مع الأدمن','err');
    }
  }catch(e){
    console.error('[inbox] فشل قراءة users/{uid}:',{code:e.code,msg:e.message,uid:u.uid});
    if(typeof toast==='function')toast(`⚠️ تعذّر قراءة حسابك: ${e.code||e.message}`,'err');
  }
  buildSidebar();
  startHeartbeat();
  await ensureChannels();
  subscribeConversations();
  subscribePresence();
  subscribeUsers();
  subscribeOrders();
  // If another page asked us to share an order, pop the picker now
  try{
    const pending=sessionStorage.getItem('inbox_share_order');
    if(pending){
      sessionStorage.removeItem('inbox_share_order');
      const order=JSON.parse(pending);
      setTimeout(()=>openShareOrder(order),300);
    }
    const openOrderComments=sessionStorage.getItem('inbox_open_order_thread');
    if(openOrderComments){
      sessionStorage.removeItem('inbox_open_order_thread');
      const order=JSON.parse(openOrderComments);
      setTimeout(()=>window.openOrderComments(order),300);
    }
  }catch(_){}
});
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}</script>
</body>
