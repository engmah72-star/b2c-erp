<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#08090f">
<title>Business2Card — خدمة العملاء</title>
<link rel="stylesheet" href="shared.css">
<script type="module" src="inbox-badge.js"></script>
<style>
/* ── Topbar attendance pill ── */
.att-pill{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:700;border:1px solid;transition:all .2s;}
.att-pill.none{background:rgba(0,200,122,.08);border-color:rgba(0,200,122,.25);color:var(--g);}
.att-pill.in  {background:rgba(74,142,245,.08);border-color:rgba(74,142,245,.25);color:var(--b);}
.att-pill.done{background:var(--bg3);border-color:var(--line);color:var(--dim2);}

/* ── "اليوم" action strip ── */
.today-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.today-btn{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;transition:transform .12s;-webkit-tap-highlight-color:transparent;text-decoration:none;display:block;}
.today-btn:active{transform:scale(.95);}
.today-btn-ico{font-size:22px;margin-bottom:5px;}
.today-btn-lbl{font-size:10px;font-weight:800;color:var(--snow);}
.today-btn-val{font-size:18px;font-weight:900;line-height:1;margin-bottom:3px;}
.today-btn-badge{display:inline-block;font-size:9px;font-weight:800;padding:1px 6px;border-radius:10px;margin-top:3px;}

/* ── Section title ── */
.cs-sec{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:4px;}
.cs-sec-title{font-size:12px;font-weight:800;color:var(--dim2);text-transform:uppercase;letter-spacing:.5px;}
.cs-sec-link{font-size:11px;color:var(--b);font-weight:700;text-decoration:none;}

/* ── Follow-up card ── */
.fu-card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;border-right:3px solid var(--fc,var(--line));}
.fu-card.priority-1{--fc:var(--r);background:rgba(240,54,96,.03);}
.fu-card.priority-2{--fc:var(--y);}
.fu-card.priority-3{--fc:var(--line);}
.fu-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:8px;}
.fu-client{font-size:16px;font-weight:900;line-height:1.2;}
.fu-order-id{font-size:10px;color:var(--dim2);margin-top:2px;font-weight:600;}
.fu-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.fu-badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;}
.fu-products{font-size:11px;color:var(--dim2);margin-bottom:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fu-actions{display:flex;gap:7px;}
.fu-wa{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:10px;background:rgba(0,200,122,.1);border:1px solid rgba(0,200,122,.25);color:var(--g);font-size:13px;font-weight:800;cursor:pointer;text-decoration:none;-webkit-tap-highlight-color:transparent;}
.fu-pay{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:10px;background:rgba(74,142,245,.1);border:1px solid rgba(74,142,245,.25);color:var(--b);font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:inherit;}
.fu-detail{padding:10px;border-radius:10px;background:var(--bg3);border:none;color:var(--dim2);font-size:13px;cursor:pointer;font-family:inherit;}

/* ── Payment sheet ── */
.pay-sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:400;display:none;align-items:flex-end;justify-content:center;}
.pay-sheet-ov.open{display:flex;}
.pay-sheet{background:var(--bg2);border-radius:22px 22px 0 0;border:1px solid var(--line2);border-bottom:none;width:100%;max-width:540px;padding:20px;padding-bottom:max(20px,env(safe-area-inset-bottom));}
.pay-sheet::before{content:'';display:block;width:36px;height:4px;background:var(--line2);border-radius:99px;margin:0 auto 16px;}

/* ── Order card (recent) ── */
.ocard{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:8px;cursor:pointer;transition:transform .12s;-webkit-tap-highlight-color:transparent;border-right:3px solid var(--oc,var(--line));}
.ocard:active{transform:scale(.99);}

/* ── Tabs ── */
.cs-tabs{display:flex;gap:4px;background:var(--bg3);padding:4px;border-radius:12px;margin-bottom:12px;}
.cs-tab{flex:1;padding:8px 6px;border:none;border-radius:9px;background:transparent;color:var(--dim2);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;}
.cs-tab.on{background:var(--bg2);color:var(--snow);box-shadow:0 2px 8px rgba(0,0,0,.3);}

/* ── Mobile nav ── */
.cs-mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--line);padding:6px 4px;padding-bottom:max(6px,env(safe-area-inset-bottom));z-index:100;}
.cs-mob-nav-items{display:flex;align-items:center;justify-content:space-around;height:52px;}
.cs-mob-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;text-decoration:none;color:var(--dim2);padding:4px;border-radius:10px;-webkit-tap-highlight-color:transparent;}
.cs-mob-nav-item.active{color:var(--b);}
.cs-mob-add{width:48px;height:48px;border-radius:50%;background:var(--b);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;flex-shrink:0;box-shadow:0 4px 16px rgba(74,142,245,.4);margin-top:-14px;}
.cs-mob-ico{font-size:20px;}
.cs-mob-lbl{font-size:9px;font-weight:700;}

/* ── Empty state ── */
.cs-empty{padding:28px;text-align:center;color:var(--dim2);}
.cs-empty-ico{font-size:36px;margin-bottom:8px;}
.cs-empty-txt{font-size:13px;font-weight:600;}
.cs-empty-sub{font-size:11px;margin-top:4px;}

/* ── Responsive ── */
@media(max-width:768px){
  .sidenav{transform:translateX(100%);}
  .main{margin-right:0!important;padding-bottom:calc(64px + env(safe-area-inset-bottom));}
  .cs-mob-nav{display:block;}
  .mob-menu-btn{display:flex!important;}
  .content{padding:12px;}
}
@media(max-width:480px){
  .today-strip{grid-template-columns:repeat(2,1fr);}
}
</style>
<script src="wa-launcher.js?v=1" defer></script>
</head>
<body>
<div class="app-shell">

<!-- SIDEBAR -->
<aside class="sidenav">
  <div class="nav-brand">
    <div class="nav-logo">🎨</div>
    <div>
      <div class="nav-brand-name">Business2Card</div>
      <div class="nav-brand-role" id="role-badge">خدمة عملاء</div>
    </div>
  </div>
  <div class="nav-scroll" id="nav-links"></div>
  <div class="nav-foot">
    <div class="nav-user" onclick="doLogout()">
      <div class="nav-avatar" id="nav-av">A</div>
      <div>
        <div class="nav-user-name" id="nav-name">—</div>
        <div class="nav-user-role">تسجيل خروج</div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="mob-menu-btn" style="display:none" onclick="toggleNav()">☰</button>
      <div>
        <div style="font-size:15px;font-weight:800" id="cs-greeting">أهلاً 👋</div>
        <div style="font-size:11px;color:var(--dim2)" id="cs-date"></div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="att-pill none" id="att-pill" onclick="doAtt()">
        <span id="att-pill-ico">✅</span>
        <span id="att-pill-txt">تسجيل حضور</span>
      </button>
    </div>
  </div>

  <div class="content">

    <!-- ── اليوم بالأرقام ── -->
    <div class="today-strip" id="today-strip">
      <div class="today-btn" style="grid-column:1/-1;padding:12px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--dim2);font-size:12px">
        <div class="spinner" style="width:18px;height:18px;border-width:2px"></div> جاري التحميل...
      </div>
    </div>

    <!-- ── قائمة المتابعة ── -->
    <div class="cs-sec">
      <span class="cs-sec-title">📋 قائمة المتابعة</span>
      <span id="fu-count" style="font-size:11px;font-weight:800;color:var(--r)"></span>
    </div>
    <div id="fu-list">
      <div style="padding:28px;text-align:center;color:var(--dim2);font-size:12px">جاري التحميل...</div>
    </div>

    <!-- ── الأوردرات ── -->
    <div class="cs-sec" style="margin-top:8px">
      <span class="cs-sec-title">🗂 أوردراتي</span>
      <a href="clients.html" class="cs-sec-link">كل الأوردرات ←</a>
    </div>
    <div class="cs-tabs" id="cs-tabs">
      <button class="cs-tab on" onclick="switchTab('active',this)">نشطة</button>
      <button class="cs-tab" onclick="switchTab('rem',this)">💰 باقي</button>
      <button class="cs-tab" onclick="switchTab('done',this)">✅ منجزة</button>
    </div>
    <div id="orders-list">
      <div style="padding:20px;text-align:center;color:var(--dim2);font-size:12px">جاري التحميل...</div>
    </div>

  </div>
</div>
</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="cs-mob-nav">
  <div class="cs-mob-nav-items">
    <a class="cs-mob-nav-item active" href="cs-dashboard.html">
      <div class="cs-mob-ico">⬡</div>
      <div class="cs-mob-lbl">لوحتي</div>
    </a>
    <a class="cs-mob-nav-item" href="clients.html">
      <div class="cs-mob-ico">👤</div>
      <div class="cs-mob-lbl">العملاء</div>
    </a>
    <a href="clients.html" onclick="event.preventDefault();openAddOrder()">
      <div class="cs-mob-add">＋</div>
    </a>
    <a class="cs-mob-nav-item" href="archive.html">
      <div class="cs-mob-ico">📁</div>
      <div class="cs-mob-lbl">الأرشيف</div>
    </a>
    <a class="cs-mob-nav-item" id="mob-follow-btn" href="#" onclick="event.preventDefault();scrollToFollowUp()">
      <div class="cs-mob-ico">📋</div>
      <div class="cs-mob-lbl">متابعة</div>
    </a>
  </div>
</nav>

<!-- PAYMENT SHEET -->
<div class="pay-sheet-ov" id="pay-ov" onclick="closePaySheet(event)">
  <div class="pay-sheet" onclick="event.stopPropagation()">
    <div style="font-size:15px;font-weight:800;margin-bottom:4px">💰 تسجيل دفعة</div>
    <div style="font-size:12px;color:var(--dim2);margin-bottom:16px" id="pay-order-lbl">—</div>
    <div class="fg">
      <label>المبلغ المستلم (ج)</label>
      <input class="inp" type="number" id="pay-amount" placeholder="0" inputmode="decimal" style="font-size:24px;font-weight:900;text-align:center">
    </div>
    <div class="fg">
      <label>المحفظة</label>
      <select class="inp" id="pay-wallet">
        <option value="">— اختر المحفظة —</option>
      </select>
    </div>
    <div class="fg">
      <label>ملاحظة (اختياري)</label>
      <input class="inp" type="text" id="pay-note" placeholder="نقدي / تحويل / ...">
    </div>
    <button class="btn btn-g btn-full btn-lg" id="pay-save-btn" onclick="savePayment()">✅ تأكيد الدفعة</button>
  </div>
</div>

<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div id="toasts" class="toasts"></div>

<script type="module">
import {initializeApp} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getAuth,onAuthStateChanged,signOut} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {getFirestore,collection,doc,onSnapshot,addDoc,updateDoc,getDoc,query,where,serverTimestamp,increment,writeBatch} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { addLedgerToBatch, FE } from "./financial-sync-engine.js";

const FB={apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"};
const app=initializeApp(FB);
const auth=getAuth(app),db=getFirestore(app);

// ── Utils ──
const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
const calcRem=o=>{if(o.paymentStatus==='returned'||o.shipStage==='returned')return 0;const f=parseFloat(o.customerShipFee)||0;return Math.max(0,(parseFloat(o.salePrice)||0)+f-(parseFloat(o.discount)||0)-(parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0));};
const delayDays=dl=>{if(!dl)return 0;const d=new Date(dl),n=new Date();return d<n?Math.floor((n-d)/864e5):0;};
const nowDate=new Date();
const todayStr=nowDate.toISOString().slice(0,10);
const monthKey=`${nowDate.getFullYear()}-${String(nowDate.getMonth()+1).padStart(2,'0')}`;
const isThisMonth=ts=>{if(!ts?.toDate)return false;const d=ts.toDate();return d.getMonth()===nowDate.getMonth()&&d.getFullYear()===nowDate.getFullYear();};
const DAYS=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const h=nowDate.getHours();
const greet=h<12?'صباح الخير':h<17?'مساء الخير':'مساء النور';
const STAGE_AR={design:'تصميم',printing:'طباعة',production:'تنفيذ',shipping:'شحن',delivered:'تسليم',archived:'أرشيف'};
const STAGE_COL={design:'var(--p)',printing:'var(--y)',production:'var(--o)',shipping:'var(--c)',delivered:'var(--g)',archived:'var(--dim)'};
const STAGE_PAGE={design:'design',printing:'print',production:'production',shipping:'shipping',archived:'archive'};

function toast(msg,t=''){const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}

// ── Sidebar (dynamic — respects user permissions) ──
async function buildSidebar(uid2){
  const nav=document.getElementById('nav-links');if(!nav)return;
  try{
    const usnap=await getDoc(doc(db,'users',uid2));
    const ud=usnap.exists()?usnap.data():{};
    const role2=ud.role||'customer_service';
    const perms2=ud.permissions||{};
    const userPages2=perms2.pages||[];
    const isAdm2=['admin','operation_manager'].includes(role2);
    const ROLE_DASH2={admin:'index.html',operation_manager:'ops-dashboard.html',customer_service:'cs-dashboard.html',graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'};
    const ALL2=[
      {f:'clients.html',l:'العملاء',i:'👤',p:'clients'},
      {f:'design.html',l:'التصميم',i:'✏️',p:'design'},
      {f:'print.html',l:'الطباعة',i:'🖨️',p:'print'},
      {f:'production.html',l:'التنفيذ',i:'🏭',p:'production'},
      {f:'shipping.html',l:'الشحن',i:'🚚',p:'shipping'},
      {f:'shipping-accounts.html',l:'حسابات الشحن',i:'📦',p:'shipping-accounts'},
      {f:'archive.html',l:'الأرشيف',i:'📁',p:'archive'},
      {f:'accounts.html',l:'الحسابات',i:'💰',p:'accounts'},{f:'approvals.html',l:'الاعتمادات',i:'🔐',p:'approvals'},
      {f:'my-requests.html',l:'طلباتي',i:'📋',public:true},
      {f:'suppliers.html',l:'الموردين',i:'▣',p:'suppliers'},
      {f:'products.html',l:'المنتجات',i:'◈',p:'products'},
      {f:'employees.html',l:'الموظفين',i:'👥',p:'employees',adminOnly:true},
      {f:'reports.html',l:'التقارير',i:'📊',p:'reports'},
      {f:'settings.html',l:'الإعدادات',i:'⚙️',p:'settings',adminOnly:true},
    ];
    const dash2=ROLE_DASH2[role2]||'cs-dashboard.html';
    let html=`<a class="nav-link active" href="${dash2}"><span class="nav-ico">⬡</span> ${isAdm2?'لوحة التحكم':'داشبوردي'}</a>`;
    html+=`<a class="nav-link${window.location.pathname.endsWith('my-profile.html')?' active':''}" href="my-profile.html"><span class="nav-ico">👤</span> ملفي</a>`;
    for(const pg of ALL2){
      if(pg.adminOnly&&!isAdm2)continue;
      const ok=pg.public||isAdm2||userPages2.includes('*')||userPages2.includes(pg.p||'');
      if(!ok)continue;
      html+=`<a class="nav-link${window.location.pathname.endsWith(pg.f)?' active':''}" href="${pg.f}"><span class="nav-ico">${pg.i}</span> ${pg.l}</a>`;
    }
    html+=`<a class="nav-link" href="inbox.html"><span class="nav-ico">💬</span> المحادثات</a>`;
    nav.innerHTML=html;
  }catch(e){
    nav.innerHTML=`<a class="nav-link active" href="cs-dashboard.html"><span class="nav-ico">⬡</span> داشبوردي</a><a class="nav-link" href="clients.html"><span class="nav-ico">👤</span> العملاء</a>`;
  }
}

// ── Nav helpers ──
window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);location.href='login.html';};

// ── Date display ──
set('cs-date',`${DAYS[nowDate.getDay()]} · ${nowDate.getDate()} ${MONTHS[nowDate.getMonth()]} ${nowDate.getFullYear()}`);

// ── Data ──
let myOrders=[],myClients=[],wallets=[],todayAtt=null;
let currentUser=null,userName='',uid='',activeTab='active';
let payOrderId=null,payOrderRef=null;

// ── Auth ──
let _started=false;
onAuthStateChanged(auth,async u=>{
  if(!u){location.href='login.html';return;}
  if(_started)return;_started=true;
  currentUser=u;uid=u.uid;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(!snap.exists()){location.href='login.html';return;}
  const d=snap.data();
  const role=d.role||'customer_service';
  const RDASH={graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html',admin:'index.html',operation_manager:'ops-dashboard.html'};
  if(role!=='admin'&&role!=='operation_manager'&&role!=='customer_service'){location.href=RDASH[role]||'login.html';return;}
  userName=d.name||u.email;
  set('nav-name',userName);set('role-badge',role==='admin'?'أدمن':role==='operation_manager'?'تشغيل':'خدمة عملاء');
  document.getElementById('nav-av').textContent=userName[0].toUpperCase();
  set('cs-greeting',`${greet}، ${userName.split(' ')[0]} 👋`);
  buildSidebar(uid);
  const isAdmin=['admin','operation_manager'].includes(role);

  // Orders listener
  onSnapshot(collection(db,'orders'),snap=>{
    const all=snap.docs.map(d=>({...d.data(),_id:d.id}));
    myOrders=isAdmin?all:all.filter(o=>o.createdBy===uid||!o.createdBy);
    render();
  });

  // Clients listener
  onSnapshot(collection(db,'clients'),snap=>{
    const all=snap.docs.map(d=>({...d.data(),_id:d.id}));
    myClients=isAdmin?all:all.filter(c=>c.createdBy===uid||!c.createdBy);
    render();
  });

  // Wallets listener
  onSnapshot(collection(db,'wallets'),snap=>{
    wallets=snap.docs.map(d=>({...d.data(),_id:d.id}));
    buildWalletSelect();
  });

  // Attendance listener
  onSnapshot(query(collection(db,'attendance'),where('employeeUid','==',uid)),snap=>{
    const atts=snap.docs.map(d=>({...d.data(),_id:d.id}));
    todayAtt=atts.find(a=>a.date===todayStr)||null;
    renderAttPill();
  });
});

// ── Attendance pill ──
function renderAttPill(){
  const pill=document.getElementById('att-pill');
  const ico=document.getElementById('att-pill-ico');
  const txt=document.getElementById('att-pill-txt');
  if(!pill)return;
  if(!todayAtt){
    pill.className='att-pill none';ico.textContent='✅';txt.textContent='تسجيل حضور';pill.disabled=false;
  } else if(!todayAtt.checkOut){
    pill.className='att-pill in';ico.textContent='🕐';txt.textContent='حضور منذ '+todayAtt.checkInStr;pill.disabled=false;
  } else {
    pill.className='att-pill done';ico.textContent='✓';txt.textContent=todayAtt.hoursWorked+' ساعة';pill.disabled=true;
  }
}

window.doAtt=async function(){
  if(!currentUser)return;
  const timeStr=new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
  try{
    if(!todayAtt){
      await addDoc(collection(db,'attendance'),{employeeUid:uid,employeeName:userName,date:todayStr,checkIn:serverTimestamp(),checkInStr:timeStr,checkOut:null,hoursWorked:0,createdAt:serverTimestamp()});
      toast('✅ تم تسجيل الحضور — '+timeStr,'ok');
    } else if(!todayAtt.checkOut){
      const hrs=todayAtt.checkIn?.toDate?((new Date()-todayAtt.checkIn.toDate())/(36e5)).toFixed(1):0;
      await updateDoc(doc(db,'attendance',todayAtt._id),{checkOut:serverTimestamp(),checkOutStr:timeStr,hoursWorked:parseFloat(hrs)});
      toast('✅ انصراف — '+hrs+' ساعة','ok');
    }
  }catch(e){toast('❌ '+e.message,'err');}
};

// ── Main render ──
function render(){
  const active=myOrders.filter(o=>!['archived','delivered'].includes(o.stage));
  const withRem=myOrders.filter(o=>calcRem(o)>0);
  const late=active.filter(o=>o.deadline&&delayDays(o.deadline)>0);
  const monthly=myOrders.filter(o=>isThisMonth(o.createdAt));
  const newClients=myClients.filter(c=>isThisMonth(c.createdAt));

  renderTodayStrip(active,withRem,late,newClients,monthly);
  renderFollowUp(active,withRem,late);
  renderOrders(activeTab);
}

// ── Today strip ──
function renderTodayStrip(active,withRem,late,newClients,monthly){
  const el=document.getElementById('today-strip');if(!el)return;
  const sales=monthly.reduce((s,o)=>s+(parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0),0);

  const btn=(ico,val,lbl,col,href,badge,badgeCol)=>`
    <a class="today-btn" href="${href||'#'}" ${href?'':'onclick="return false"'}>
      <div class="today-btn-ico">${ico}</div>
      <div class="today-btn-val" style="color:${col}">${val}</div>
      <div class="today-btn-lbl">${lbl}</div>
      ${badge?`<div class="today-btn-badge" style="background:${badgeCol||col}18;color:${badgeCol||col}">${badge}</div>`:''}
    </a>`;

  el.innerHTML=
    btn('📋',active.length,'أوردر نشط','var(--b)','clients.html',late.length>0?late.length+' متأخر':'','var(--r)')+
    btn('💰',withRem.length,'باقي تحصيل','var(--r)','#',withRem.length>0?fn(withRem.reduce((s,o)=>s+calcRem(o),0))+' ج':'','var(--r)')+
    btn('👤',newClients.length,'عميل جديد','var(--g)','clients.html','')+
    btn('📈',fn(sales)+' ج','مبيعات الشهر','var(--p)','accounts.html','');
}

// ── Follow-up list (المتابعة الذكية) ──
function renderFollowUp(active,withRem,late){
  const el=document.getElementById('fu-list');if(!el)return;

  // Build prioritized list
  const seen=new Set();
  const items=[];

  // Priority 1: متأخرة + عليها مستحقات
  myOrders.filter(o=>!seen.has(o._id)&&calcRem(o)>0&&o.deadline&&delayDays(o.deadline)>0)
    .sort((a,b)=>delayDays(b.deadline)-delayDays(a.deadline))
    .forEach(o=>{seen.add(o._id);items.push({o,pri:1,reason:`متأخر ${delayDays(o.deadline)} يوم + باقي ${fn(calcRem(o))} ج`});});

  // Priority 2: متأخرة بدون مستحقات
  active.filter(o=>!seen.has(o._id)&&o.deadline&&delayDays(o.deadline)>0)
    .forEach(o=>{seen.add(o._id);items.push({o,pri:1,reason:`متأخر ${delayDays(o.deadline)} يوم`});});

  // Priority 2: عليها مستحقات (غير متأخرة)
  withRem.filter(o=>!seen.has(o._id))
    .sort((a,b)=>calcRem(b)-calcRem(a))
    .slice(0,8)
    .forEach(o=>{seen.add(o._id);items.push({o,pri:2,reason:`باقي ${fn(calcRem(o))} ج`});});

  // Priority 3: منتظرة موافقة تصميم
  active.filter(o=>!seen.has(o._id)&&o.stage==='design'&&o.designStatus==='pending')
    .slice(0,4)
    .forEach(o=>{seen.add(o._id);items.push({o,pri:3,reason:'ينتظر التصميم'});});

  set('fu-count',items.length?items.length+' تحتاج متابعة':'');

  if(!items.length){
    el.innerHTML=`<div class="cs-empty"><div class="cs-empty-ico">🎉</div><div class="cs-empty-txt">لا توجد أوردرات تحتاج متابعة</div><div class="cs-empty-sub">كل الأوردرات على ما يرام!</div></div>`;
    return;
  }

  el.innerHTML=items.map(({o,pri,reason})=>{
    const rem=calcRem(o);
    const phone=(o.clientPhone||'').replace(/\D/g,'');
    const wa_phone=phone.startsWith('0')?'2'+phone:phone.startsWith('20')?phone:'20'+phone;
    const prods=(o.products||[]).map(p=>p.name+(p.qty>1?` ×${p.qty}`:'')).join(' + ')||o.product||'—';
    const stageLbl=STAGE_AR[o.stage]||o.stage;
    const stageCol=STAGE_COL[o.stage]||'var(--dim2)';
    const days=o.deadline?delayDays(o.deadline):0;

    // WhatsApp message
    const waMsg=encodeURIComponent(`أهلاً ${o.clientName||''}،\nبالنسبة لأوردر ${o.orderId||o._id.slice(-6)} (${prods})${rem>0?`\nالمبلغ المتبقي: ${fn(rem)} ج`:''}${days>0?`\nالأوردر متأخر ${days} يوم`:''}.\nشكراً 🙏`);
    const waHref=phone?`https://wa.me/${wa_phone}?text=${waMsg}`:'#';

    return`<div class="fu-card priority-${pri}">
      <div class="fu-header">
        <div style="min-width:0">
          <div class="fu-client">${o.clientName||'—'}</div>
          <div class="fu-order-id">${o.orderId||o._id.slice(-6)}</div>
        </div>
        <div style="text-align:left;flex-shrink:0">
          ${rem>0?`<div style="font-size:16px;font-weight:900;color:var(--r)">${fn(rem)} ج</div>`:
            days>0?`<div style="font-size:13px;font-weight:800;color:var(--r)">⏰ ${days} يوم</div>`:''}
        </div>
      </div>
      <div class="fu-badges">
        <span class="fu-badge" style="background:${stageCol}15;color:${stageCol}">${stageLbl}</span>
        <span class="fu-badge" style="background:${pri===1?'rgba(240,54,96,.12)':pri===2?'rgba(240,160,32,.12)':'var(--bg3)'};color:${pri===1?'var(--r)':pri===2?'var(--y)':'var(--dim2)'}">${reason}</span>
      </div>
      <div class="fu-products">${prods}</div>
      <div class="fu-actions">
        ${phone?`<a class="fu-wa" href="${waHref}" target="_blank">
          <span>📲</span> واتساب
        </a>`:`<button class="fu-detail" style="flex:1" onclick="alert('لا يوجد رقم هاتف')">📞 لا يوجد رقم</button>`}
        ${rem>0?`<button class="fu-pay" onclick="openPaySheet('${o._id}','${(o.clientName||'').replace(/'/g,"\\'")}','${o.orderId||o._id.slice(-6)}')">💰 دفعة</button>`:''}
        <button class="fu-detail" onclick="location.href='${STAGE_PAGE[o.stage]||'clients'}.html'">تفاصيل ›</button>
      </div>
    </div>`;
  }).join('');
}

// ── Orders tab ──
function renderOrders(tab){
  const el=document.getElementById('orders-list');if(!el)return;
  const active=myOrders.filter(o=>!['archived','delivered'].includes(o.stage));
  const withRem=myOrders.filter(o=>calcRem(o)>0);
  const done=myOrders.filter(o=>['archived','delivered'].includes(o.stage)&&isThisMonth(o.createdAt));
  const data=(tab==='active'?active:tab==='rem'?withRem:done)
    .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0))
    .slice(0,20);

  if(!data.length){
    el.innerHTML='<div class="cs-empty"><div class="cs-empty-ico">📭</div><div class="cs-empty-txt">لا توجد أوردرات</div></div>';
    return;
  }

  el.innerHTML=data.map(o=>{
    const rem=calcRem(o);
    const col=STAGE_COL[o.stage]||'var(--dim2)';
    const prods=(o.products||[]).map(p=>p.name).join(' + ')||o.product||'—';
    const days=o.deadline?delayDays(o.deadline):0;
    return`<div class="ocard" style="--oc:${col}" onclick="location.href='${STAGE_PAGE[o.stage]||'clients'}.html'">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px">
        <div>
          <div style="font-size:10px;color:var(--dim2);font-weight:600">${o.orderId||o._id.slice(-6)}</div>
          <div style="font-size:15px;font-weight:800">${days>0?'⚠️ ':''}${o.clientName||'—'}</div>
        </div>
        <span style="font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;background:${col}15;color:${col};flex-shrink:0">${STAGE_AR[o.stage]||o.stage}</span>
      </div>
      <div style="font-size:11px;color:var(--dim2);display:flex;justify-content:space-between;align-items:center">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${prods}</span>
        ${rem>0?`<span style="color:var(--r);font-weight:800;flex-shrink:0;margin-right:8px">${fn(rem)} ج</span>`:'<span style="color:var(--g);font-size:10px;font-weight:800;flex-shrink:0;margin-right:8px">✓ محصّل</span>'}
      </div>
    </div>`;
  }).join('');
}

window.switchTab=function(tab,btn){
  activeTab=tab;
  document.querySelectorAll('.cs-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderOrders(tab);
};

// ── Payment Sheet ──
function buildWalletSelect(){
  const sel=document.getElementById('pay-wallet');if(!sel)return;
  sel.innerHTML='<option value="">— اختر المحفظة —</option>'+
    wallets.map(w=>`<option value="${w._id}">${w.name} · ${fn(w.balance)} ج</option>`).join('');
}

window.openPaySheet=function(orderId,clientName,orderRef){
  payOrderId=orderId;
  payOrderRef={clientName,orderRef};
  set('pay-order-lbl',`${clientName} · ${orderRef}`);
  document.getElementById('pay-amount').value='';
  document.getElementById('pay-note').value='';
  document.getElementById('pay-ov').classList.add('open');
  setTimeout(()=>document.getElementById('pay-amount').focus(),200);
};

window.closePaySheet=function(e){
  if(e&&e.target!==document.getElementById('pay-ov'))return;
  document.getElementById('pay-ov').classList.remove('open');
  payOrderId=null;
};

window.savePayment=async function(){
  if(!payOrderId){return;}
  const amountEl=document.getElementById('pay-amount');
  const amount=parseFloat(amountEl.value)||0;
  const walletId=document.getElementById('pay-wallet').value;
  const note=document.getElementById('pay-note').value.trim();
  if(amount<=0){toast('أدخل المبلغ','err');amountEl.focus();return;}
  if(!walletId){toast('اختر المحفظة','err');return;}

  const btn=document.getElementById('pay-save-btn');
  btn.textContent='جاري الحفظ...';btn.disabled=true;

  const wallet=wallets.find(w=>w._id===walletId);
  const timeStr=new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
  const dateStr=nowDate.toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'});

  try{
    // Get current order to compute new totalPaid
    const oSnap=await getDoc(doc(db,'orders',payOrderId));
    if(!oSnap.exists()){toast('الأوردر غير موجود','err');return;}
    const oData=oSnap.data();
    const prevPaid=parseFloat(oData.totalPaid)||parseFloat(oData.paid)||parseFloat(oData.deposit)||0;
    const newPaid=prevPaid+amount;
    const shipFee=parseFloat(oData.customerShipFee)||0;
    const rem=Math.max(0,(parseFloat(oData.salePrice)||0)+shipFee-(parseFloat(oData.discount)||0)-newPaid);

    const batch=writeBatch(db);
    batch.update(doc(db,'orders',payOrderId),{
      totalPaid:newPaid,
      paymentStatus:rem<=0?'paid':newPaid>0?'partial':'pending',
      updatedAt:serverTimestamp(),
      timeline:[...(oData.timeline||[]),{date:dateStr+' '+timeStr,action:`💰 دفعة ${fn(amount)} ج — باقي ${fn(rem)} ج`,by:userName}]
    });
    const txRef=doc(collection(db,'transactions_v2'));
    batch.set(txRef,{
      type:'in',category:'collection',amount,
      walletId,walletName:wallet?.name||'',
      orderId:payOrderId,orderRef:payOrderRef?.orderRef||'',
      clientName:payOrderRef?.clientName||oData.clientName||'',
      note:note||'تحصيل',date:dateStr,
      createdBy:uid,createdByName:userName,createdAt:serverTimestamp()
    });
    if(wallet)batch.update(doc(db,'wallets',walletId),{balance:increment(amount)});
    addLedgerToBatch(batch,db,FE.CUSTOMER_PAYMENT,{
      amount,walletId,walletName:wallet?.name||'',
      orderId:payOrderId,clientName:payOrderRef?.clientName||oData.clientName||'',
      notes:note||`تحصيل — ${payOrderRef?.clientName||oData.clientName||''}`,
      userId:uid,userName,
    });
    await batch.commit();
    toast(`✅ تم تسجيل ${fn(amount)} ج`,'ok');
    document.getElementById('pay-ov').classList.remove('open');
    payOrderId=null;
  }catch(e){
    toast('❌ '+e.message,'err');
  }finally{
    btn.textContent='✅ تأكيد الدفعة';btn.disabled=false;
  }
};
