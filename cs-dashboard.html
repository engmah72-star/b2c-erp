<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f1c">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Business2Card — خدمة العملاء</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.hero{background:linear-gradient(135deg,#0d0f1c,#13162a);border:1px solid var(--line);border-radius:20px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;left:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(34,211,238,.10),transparent 70%);pointer-events:none}
.att-card{border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.att-card.not-in{background:rgba(0,217,126,.07);border:1px solid rgba(0,217,126,.2)}
.att-card.checked-in{background:rgba(59,158,255,.07);border:1px solid rgba(59,158,255,.2)}
.att-card.done{background:var(--bg3);border:1px solid var(--line)}
.att-cta{padding:10px 18px;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap}
.att-cta.in{background:linear-gradient(135deg,#00d97e,#3bd68c);color:#fff}
.att-cta.out{background:linear-gradient(135deg,#3b9eff,#6bb5ff);color:#fff}
.att-cta.done-btn{background:var(--bg4);color:var(--dim2);cursor:default}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.kpi-box{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center;border-top:3px solid var(--kc)}
.kpi-val{font-size:24px;font-weight:900;color:var(--kc)}
.kpi-lbl{font-size:10px;color:var(--dim2);font-weight:700;margin-top:3px}
.alert-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.ocard{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all .2s;border-right:3px solid var(--c)}
.ocard:hover{transform:translateX(-2px);border-color:var(--c)}
.tab-bar{display:flex;gap:6px;margin-bottom:14px;background:var(--bg2);border-radius:12px;padding:4px;border:1px solid var(--line)}
.tab-item{flex:1;padding:8px;border:none;border-radius:10px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--dim2);background:transparent;text-align:center}
.tab-item.active{background:var(--bg3);color:var(--snow);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.att-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.att-day{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.att-day.present{background:rgba(0,217,126,.2);color:var(--g)}
.att-day.absent{background:rgba(255,61,110,.12);color:var(--r)}
.att-day.off{background:var(--bg3);color:var(--dim)}
.att-day.today-day{box-shadow:0 0 0 2px var(--c)}
@media(min-width:768px){.desktop-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}}
@media(max-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" style="color:var(--c)">خدمة عملاء</div></div></div>
  <div class="nav-scroll">
    <a class="nav-link active" href="cs-dashboard.html"><span class="nav-ico">⬡</span> لوحتي</a>
    <a class="nav-link" href="clients.html"><span class="nav-ico">👤</span> العملاء</a>
    <a class="nav-link" href="design.html"><span class="nav-ico">✏️</span> التصميم</a>
  </div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av" style="background:rgba(34,211,238,.15);color:var(--c)">م</div><div><div class="nav-user-name" id="nav-name">موظف</div><div class="nav-user-role">تسجيل خروج</div></div></div></div>
</aside>
<div class="main">
  <div class="content" style="padding-top:12px" id="main-content">
    <div class="loader"><div class="spinner"></div></div>
  </div>
</div>
</div>
<nav class="mob-nav"><div class="mob-nav-items">
  <a class="mob-nav-item active" href="cs-dashboard.html"><div class="mob-nav-ico">⬡</div><div class="mob-nav-lbl">لوحتي</div></a>
  <a class="mob-nav-item" href="clients.html"><div class="mob-nav-ico">👤</div><div class="mob-nav-lbl">العملاء</div></a>
  <a class="mob-nav-item" href="design.html"><div class="mob-nav-ico">✏️</div><div class="mob-nav-lbl">تصميم</div></a>
</div></nav>
<div class="nav-overlay" id="nav-ov" onclick="document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show')"></div>
<div class="toasts" id="toasts"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, getDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const FB={apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"};
const app=initializeApp(FB);
const auth=getAuth(app),db=getFirestore(app);
let myOrders=[],myClients=[],myTasks=[],myAttendance=[],todayAtt=null;
let currentUser=null,userName='',uid='',activeTab='active';
const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const setText=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
const now=new Date();
const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const DAYS=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
function greet(){const h=new Date().getHours();return h<12?'صباح الخير':h<17?'مساء الخير':'مساء النور';}
function isThisMonth(ts){if(!ts?.toDate)return false;const d=ts.toDate();return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}
function todayStr(){return now.toISOString().slice(0,10);}
function monthKey(){return now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');}
function toast(msg,t=''){const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}
window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  currentUser=u;uid=u.uid;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(!snap.exists()){window.location.href='login.html';return;}
  const d=snap.data();
  const role=d.role||'customer_service';
  const ROLE_HOME={graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'};
  if(ROLE_HOME[role]){window.location.href=ROLE_HOME[role];return;}
  if(!['customer_service','admin','operation_manager'].includes(role)){window.location.href='login.html';return;}
  userName=d.name||u.email;
  setText('nav-name',userName);
  document.getElementById('nav-av').textContent=userName[0].toUpperCase();
  const isAdmin=['admin','operation_manager'].includes(role);
  onSnapshot(collection(db,'orders'),snap=>{
    const all=snap.docs.map(d=>({...d.data(),_id:d.id}));
    myOrders=isAdmin?all:all.filter(o=>o.createdBy===uid);
    render();
  });
  onSnapshot(collection(db,'clients'),snap=>{
    const all=snap.docs.map(d=>({...d.data(),_id:d.id}));
    myClients=isAdmin?all:all.filter(c=>c.createdBy===uid);
    render();
  });
  onSnapshot(query(collection(db,'tasks'),where('assignedTo','==',uid)),snap=>{
    myTasks=snap.docs.map(d=>({...d.data(),_id:d.id})).filter(t=>t.status==='pending')
      .sort((a,b)=>{const p={urgent:0,normal:1,low:2};return(p[a.priority]||1)-(p[b.priority]||1);});
    render();
  });
  onSnapshot(query(collection(db,'attendance'),where('employeeUid','==',uid)),snap=>{
    const atts=snap.docs.map(d=>({...d.data(),_id:d.id}));
    todayAtt=atts.find(a=>a.date===todayStr());
    myAttendance=atts;
    render();
  });
});
function render(){
  const el=document.getElementById('main-content');if(!el)return;
  const monthly=myOrders.filter(o=>isThisMonth(o.createdAt));
  const active=myOrders.filter(o=>o.stage!=='archived');
  const monthClients=myClients.filter(c=>isThisMonth(c.createdAt));
  const sales=monthly.reduce((s,o)=>s+(parseFloat(o.salePrice)||0),0);
  const closed=monthly.filter(o=>o.stage==='archived').length;
  const rate=monthly.length>0?Math.round(closed/monthly.length*100):0;
  const withRem=active.filter(o=>(parseFloat(o.remaining)||0)>0);
  const presentDays=myAttendance.filter(a=>a.date?.startsWith(monthKey())).length;
  const workDays=Math.round(new Date(now.getFullYear(),now.getMonth()+1,0).getDate()*5/7);
  let attState='none',attText='',attDetail='',attBtnText='',attBtnClass='in';
  if(!todayAtt){attState='none';attText='لم تسجّل حضورك بعد';attDetail='سجّل الحضور لتبدأ يومك';attBtnText='✅ تسجيل الحضور';attBtnClass='in';}
  else if(!todayAtt.checkOut){attState='in';attText='حاضر منذ '+todayAtt.checkInStr;attDetail='اضغط عند الانتهاء';attBtnText='🔚 تسجيل الانصراف';attBtnClass='out';}
  else{attState='done';attText=todayAtt.checkInStr+' → '+todayAtt.checkOutStr;attDetail='✅ '+todayAtt.hoursWorked+' ساعة';attBtnText='تم التسجيل';attBtnClass='done-btn';}
  // تقويم
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const firstDay=new Date(now.getFullYear(),now.getMonth(),1).getDay();
  let calHtml='';
  for(let i=0;i<firstDay;i++)calHtml+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=monthKey()+'-'+String(d).padStart(2,'0');
    const att=myAttendance.find(a=>a.date===ds);
    const dw=new Date(now.getFullYear(),now.getMonth(),d).getDay();
    const isW=dw===5||dw===6;
    const isF=d>now.getDate();
    const isT=d===now.getDate();
    let cls='att-day ';
    if(att)cls+='present';else if(isW||isF)cls+='off';else cls+='absent';
    calHtml+=`<div class="${cls}${isT?' today-day':''}">${d}</div>`;
  }
  el.innerHTML=`
  <div class="desktop-grid">
    <div class="col">
      <div class="hero">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
          <div>
            <div style="font-size:22px;font-weight:900;margin-bottom:4px">${greet()}، ${userName.split(' ')[0]} 👋</div>
            <div style="font-size:12px;color:var(--dim2)">${DAYS[now.getDay()]} · ${now.getDate()} ${MONTHS[now.getMonth()]}</div>
          </div>
          <div style="text-align:left">
            <div style="font-size:11px;color:var(--dim2)">${MONTHS[now.getMonth()]}</div>
            <div style="font-size:22px;font-weight:900;color:var(--c)">${active.length}</div>
            <div style="font-size:10px;color:var(--dim2)">أوردر نشط</div>
          </div>
        </div>
        <div class="att-card ${attState==='none'?'not-in':attState==='in'?'checked-in':'done'}">
          <div><div style="font-size:10px;font-weight:700;color:var(--dim2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">⏰ الحضور</div>
          <div style="font-size:16px;font-weight:800;color:${attState==='in'?'var(--g)':attState==='done'?'var(--b)':'var(--snow)'}">${attText}</div>
          <div style="font-size:11px;color:var(--dim2);margin-top:2px">${attDetail}</div></div>
          <button class="att-cta ${attBtnClass}" onclick="doAtt()" ${attState==='done'?'disabled':''}>
            ${attBtnText}
          </button>
        </div>
      </div>
      <!-- KPIs -->
      <div class="kpi-grid">
        <div class="kpi-box" style="--kc:var(--c)"><div class="kpi-val">${monthClients.length}</div><div class="kpi-lbl">عملاء جدد</div></div>
        <div class="kpi-box" style="--kc:var(--b)"><div class="kpi-val">${monthly.length}</div><div class="kpi-lbl">أوردرات</div></div>
        <div class="kpi-box" style="--kc:var(--g)"><div class="kpi-val">${fn(sales)}</div><div class="kpi-lbl">مبيعات ج</div></div>
        <div class="kpi-box" style="--kc:var(--y)"><div class="kpi-val">${rate}%</div><div class="kpi-lbl">نسبة الإغلاق</div></div>
      </div>
      <!-- تنبيهات -->
      ${withRem.length?`<div style="background:rgba(255,61,110,.05);border:1px solid rgba(255,61,110,.15);border-radius:16px;padding:14px;margin-bottom:14px">
        <div style="font-size:12px;font-weight:800;color:var(--r);margin-bottom:10px">💰 باقي تحصيل (${withRem.length})</div>
        ${withRem.slice(0,4).map(o=>`<div class="alert-item" onclick="location.href='design.html'">
          <span style="font-size:16px">💰</span>
          <div style="flex:1"><strong>${o.clientName||'—'}</strong> <span style="font-size:11px;color:var(--dim2)">${o.orderId||''}</span></div>
          <span style="color:var(--r);font-weight:700">${fn(o.remaining)} ج</span>
        </div>`).join('')}
      </div>`:''}
      <!-- حضور الشهر -->
      <div style="background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <div style="font-size:12px;font-weight:800">📅 حضور ${MONTHS[now.getMonth()]}</div>
          <div style="font-size:11px;color:var(--dim2)">${presentDays} من ${workDays} يوم عمل</div>
        </div>
        <div class="att-cal">${calHtml}</div>
        <div style="display:flex;gap:12px;margin-top:8px;font-size:10px">
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:rgba(0,217,126,.2);margin-left:4px"></span>حضر</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:rgba(255,61,110,.12);margin-left:4px"></span>غياب</span>
        </div>
      </div>
    </div>
    <!-- COL 2 -->
    <div class="col">
      <!-- مهام -->
      ${myTasks.length?`<div style="background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px">
        <div style="font-size:12px;font-weight:800;margin-bottom:10px">✅ مهامي (${myTasks.length})</div>
        ${myTasks.map(t=>{const p={urgent:'var(--r)',normal:'var(--b)',low:'var(--dim2)'}[t.priority]||'var(--b)';return`<div style="display:flex;gap:10px;padding:10px;background:var(--bg3);border-radius:10px;margin-bottom:6px;cursor:pointer" onclick="doneTask('${t._id}')">
          <div style="width:8px;height:8px;border-radius:50%;background:${p};margin-top:4px;flex-shrink:0"></div>
          <div style="flex:1"><div style="font-size:13px;font-weight:700">${t.title}</div>${t.dueDate?`<div style="font-size:10px;color:var(--dim2);margin-top:2px">📅 ${t.dueDate}</div>`:''}</div>
          <span style="font-size:16px;opacity:.4">✓</span>
        </div>`;}).join('')}
      </div>`:''}
      <!-- أوردراتي -->
      <div>
        <div class="tab-bar">
          <button class="tab-item ${activeTab==='active'?'active':''}" onclick="switchTab('active')">نشطة (${active.length})</button>
          <button class="tab-item ${activeTab==='pending'?'active':''}" onclick="switchTab('pending')">💰 باقي (${withRem.length})</button>
          <button class="tab-item ${activeTab==='done'?'active':''}" onclick="switchTab('done')">✅ مكتمل</button>
        </div>
        <div id="orders-list">${renderOrders(active,withRem,activeTab,monthly)}</div>
      </div>
    </div>
  </div>`;
}
function renderOrders(active,withRem,tab,monthly){
  let data=tab==='active'?active:tab==='pending'?withRem:monthly.filter(o=>o.stage==='archived');
  data=data.slice(0,15).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  if(!data.length)return'<div style="text-align:center;padding:24px;color:var(--dim2)">لا توجد أوردرات</div>';
  const SA={design:'✏️',printing:'🖨️',production:'🏭',shipping:'🚚',archived:'✅'};
  const SC={design:'var(--p)',printing:'var(--b)',production:'var(--r)',shipping:'var(--c)',archived:'var(--g)'};
  const SH={design:'design',printing:'print',production:'production',shipping:'shipping',archived:'archive'};
  return data.map(o=>{const rem=parseFloat(o.remaining)||0;const sc=SC[o.stage]||'var(--dim2)';return`<div class="ocard" onclick="location.href='${SH[o.stage]||'index'}.html'">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <div><div style="font-size:10px;color:var(--dim2)">${o.orderId||o._id.slice(-6)}</div><div style="font-size:15px;font-weight:800">${o.clientName||'—'}</div></div>
      <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:${sc}15;color:${sc};height:fit-content">${SA[o.stage]||o.stage}</span>
    </div>
    <div style="font-size:11px;color:var(--dim2);display:flex;justify-content:space-between">
      <span>${(o.products||[]).map(p=>p.name).join(' + ')||o.product||'—'}</span>
      ${rem>0?`<span style="color:var(--r);font-weight:700">باقي ${fn(rem)} ج</span>`:''}
    </div>
  </div>`;}).join('');
}
window.switchTab=function(t){activeTab=t;const active=myOrders.filter(o=>o.stage!=='archived');const withRem=active.filter(o=>(parseFloat(o.remaining)||0)>0);const monthly=myOrders.filter(o=>isThisMonth(o.createdAt));const el=document.getElementById('orders-list');if(el)el.innerHTML=renderOrders(active,withRem,t,monthly);document.querySelectorAll('.tab-item').forEach((btn,i)=>{btn.classList.toggle('active',['active','pending','done'][i]===t);});};
window.doAtt=async function(){if(!currentUser)return;const today=todayStr();const timeStr=new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});try{if(!todayAtt){await addDoc(collection(db,'attendance'),{employeeUid:uid,employeeName:userName,date:today,checkIn:serverTimestamp(),checkInStr:timeStr,checkOut:null,hoursWorked:0,createdAt:serverTimestamp()});toast('✅ تم تسجيل الحضور — '+timeStr,'ok');}else if(!todayAtt.checkOut){const inTime=todayAtt.checkIn?.toDate?.();const hours=inTime?((new Date()-inTime)/(1000*60*60)).toFixed(1):0;await updateDoc(doc(db,'attendance',todayAtt._id),{checkOut:serverTimestamp(),checkOutStr:timeStr,hoursWorked:parseFloat(hours)});toast('✅ تم الانصراف — '+hours+' ساعة','ok');}}catch(e){toast('❌ '+e.message,'err');}};
window.doneTask=async function(id){try{await updateDoc(doc(db,'tasks',id),{status:'done',doneAt:serverTimestamp()});toast('✅ تم إنجاز المهمة','ok');}catch(e){toast('❌ '+e.message,'err');}};
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}</script>
</body>
</html>
