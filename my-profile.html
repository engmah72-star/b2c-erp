<script type="module">
import { app, auth, db } from "./core/firebase-init.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, doc, onSnapshot, query, where, orderBy, limit, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { employeeActions } from "./employee-actions.js";
import { annotateRecurrence, isVoided, APPEAL_STATUS } from "./core/incident-reasons.js";
const ROLES={
  admin:{label:'Admin',col:'var(--r)',ico:'👑'},
  operation_manager:{label:'مدير عمليات',col:'var(--b-bright)',ico:'📋'},
  customer_service:{label:'خدمة عملاء',col:'var(--c-bright)',ico:'💬'},
  graphic_designer:{label:'مصمم',col:'var(--p)',ico:'🎨'},
  design_operator:{label:'مشغل تصميم',col:'var(--p)',ico:'⚙️'},
  production_agent:{label:'مندوب تنفيذ',col:'var(--y)',ico:'🏭'},
  shipping_officer:{label:'موظف شحن',col:'var(--g)',ico:'🚚'},
  wallet_manager:{label:'محاسب',col:'var(--y)',ico:'💰'},
};
const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const SAL_LBL={salary:'مرتب',advance:'سلفة',bonus:'مكافأة',deduction:'خصم',other:'أخرى'};
const SAL_COL={salary:'var(--g)',advance:'var(--y)',bonus:'var(--p)',deduction:'var(--r)',other:'var(--dim2)'};
const INC_TYPES={
  design_rejected:{lbl:'تصميم مرفوض',ico:'🎨'},
  order_late:{lbl:'أوردر متأخر',ico:'⏰'},
  customer_complaint:{lbl:'شكوى عميل',ico:'📢'},
  attendance:{lbl:'مخالفة حضور',ico:'💤'},
  quality:{lbl:'مشكلة جودة',ico:'⚠️'},
  other:{lbl:'أخرى',ico:'📌'},
};
const INC_SEV={low:{lbl:'منخفض',col:'var(--dim2)'},medium:{lbl:'متوسط',col:'var(--y)'},high:{lbl:'مرتفع',col:'var(--r)'}};

// ── State ──
let me=null, myEmpId='', myAuthUid='';
let myAttendance=[], myPayments=[], myIncidents=[], myEvaluations=[], myGoals=[], myOrders=[];
// RULE N1.3 — page tabs live in ?tab=, never in location.hash (shell reserves #ctx=).
// Backward-compat: also accept legacy #tab and migrate it to ?tab= on read.
const TAB_KEYS_MP=['overview','attendance','salary','feedback'];
let activeTab=(function(){
  const qp=new URLSearchParams(location.search).get('tab');
  if(qp&&TAB_KEYS_MP.includes(qp))return qp;
  const h=(location.hash||'').slice(1);
  if(h&&TAB_KEYS_MP.includes(h)){
    const u=new URL(location.href);u.searchParams.set('tab',h);u.hash='';
    history.replaceState(null,'',u.toString());
    return h;
  }
  return 'overview';
})();
const now=new Date();

const fn=n=>(n||0).toLocaleString('en-US');
const todayStr=()=>now.toISOString().slice(0,10);
const monthKey=()=>now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
const setText=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};

window.doLogout=async()=>{await signOut(auth);location.href='login.html';};
window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};

// Event wiring (replaces former inline on* handlers)
document.getElementById('nav-user-logout')?.addEventListener('click',()=>doLogout());
document.getElementById('mob-menu-btn')?.addEventListener('click',()=>toggleNav());
document.getElementById('nav-ov')?.addEventListener('click',()=>closeNav());
// Tabs are re-rendered inside #main-content; delegate from the stable container.
document.getElementById('main-content')?.addEventListener('click',e=>{
  const btn=e.target.closest('.tab[data-tab]');
  if(btn)setTab(btn.dataset.tab);
});

window.setTab=function(t){
  if(!TAB_KEYS_MP.includes(t))return;
  activeTab=t;
  const u=new URL(location.href);u.searchParams.set('tab',t);u.hash='';
  history.replaceState(null,'',u.toString());
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.querySelectorAll('.tab-pane').forEach(p=>p.style.display=p.id==='tab-'+t?'':'none');
  // ارسم محتوى التبويب الكسول عند التبديل إليه
  if(t==='attendance')renderAttendanceTab();
  else if(t==='salary')renderSalaryTab();
  else if(t==='feedback')renderFeedbackTab();
  document.getElementById('main-content')?.scrollIntoView({behavior:'smooth',block:'start'});
};

// تظلّم الموظف على ملاحظة/إخفاق — يكتب سبب الاعتراض ويُرسل للإدارة
window.openAppeal=async function(id){
  const reason=prompt('اكتب سبب تظلّمك على هذه الملاحظة (سيراجعها مديرك):','');
  if(reason===null)return; // ألغى
  if(!reason.trim()){alert('⚠️ من فضلك اكتب سبب التظلّم');return;}
  const r=await employeeActions.submitIncidentAppeal({db,incidentId:id,reason:reason.trim(),userId:myAuthUid,userName:me?.name||''});
  if(!r.ok){alert('❌ '+((r.errors||[]).join(' · ')||'تعذّر إرسال التظلّم'));return;}
  alert('✅ تم إرسال تظلّمك — سيراجعه مديرك المباشر');
  // onSnapshot يُحدّث العرض تلقائياً ليظهر «قيد المراجعة»
};

document.addEventListener('keydown',e=>{
  const tag=(e.target?.tagName||'').toUpperCase();
  if(['INPUT','TEXTAREA','SELECT'].includes(tag))return;
  if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'));
  if(['1','2','3','4'].includes(e.key)){
    e.preventDefault();
    setTab(['overview','attendance','salary','feedback'][+e.key-1]);
  }
});

// ── Schedule helpers ──
function isWorkDay(dateStr){
  const ws=me?.workSchedule;
  if(!ws?.days?.length)return new Date(dateStr).getDay()!==5&&new Date(dateStr).getDay()!==6;
  return ws.days.includes(new Date(dateStr).getDay());
}

// ── Score (mirrors employee-profile.calcScoreFor, simplified) ──
function calcScoreFor(mKey){
  if(!me||!mKey)return{score:0,grade:'—',col:'var(--dim2)',breakdown:{},meta:{}};
  const[ys,ms]=mKey.split('-').map(Number);
  const isCur=mKey===monthKey();
  const dim=new Date(ys,ms,0).getDate();
  const lastDay=isCur?now.getDate():dim;

  const att=myAttendance.filter(a=>(a.date||'').startsWith(mKey));
  const present=att.length;
  const lateMins=att.reduce((s,a)=>s+(parseInt(a.lateMinutes)||0),0);
  let workDays=0;
  for(let d=1;d<=lastDay;d++){
    const ds=mKey+'-'+String(d).padStart(2,'0');
    if(isWorkDay(ds))workDays++;
  }
  const attPct=workDays>0?Math.min(1,present/workDays):0.5;
  const latePenalty=Math.min(7,Math.floor(lateMins/60));
  const attScore=Math.max(0,Math.round(attPct*35)-latePenalty);

  // Productivity from orders (simplified — only roles that have signal)
  const uid=me.authUid||myEmpId;
  const myMonthOrds=myOrders.filter(o=>{
    const d=o.createdAt?.toDate?.();
    return d&&d.getMonth()===(ms-1)&&d.getFullYear()===ys;
  });
  let prodPct=0.65;
  if(myMonthOrds.length>0){
    if(me.role==='graphic_designer'||me.role==='design_operator'){
      const done=myMonthOrds.filter(o=>['printing','production','shipping','archived'].includes(o.stage)).length;
      prodPct=done/myMonthOrds.length;
    } else if(me.role==='production_agent'){
      const done=myMonthOrds.filter(o=>['shipping','archived'].includes(o.stage)).length;
      prodPct=done/myMonthOrds.length;
    } else if(me.role==='shipping_officer'){
      const done=myMonthOrds.filter(o=>o.stage==='archived').length;
      prodPct=done/myMonthOrds.length;
    } else { prodPct=Math.min(1,myMonthOrds.length/20); }
  }
  const goal=myGoals.find(g=>g.month===mKey);
  if(goal?.targetOrdersMonthly>0){
    const expected=isCur?goal.targetOrdersMonthly*(lastDay/dim):goal.targetOrdersMonthly;
    if(expected>0)prodPct=Math.min(1,myMonthOrds.length/expected);
  }
  const prodScore=Math.round(prodPct*40);

  let qualPct=0.8;
  if(myMonthOrds.length>0){
    if(me.role==='graphic_designer'||me.role==='design_operator'){
      const rej=myMonthOrds.filter(o=>o.designStatus==='rejected'||(o.timeline||[]).some(t=>(t.action||'').includes('رفض')||(t.action||'').includes('مراجعة'))).length;
      qualPct=Math.max(0,1-(rej/myMonthOrds.length));
    } else {
      const arch=myMonthOrds.filter(o=>['shipping','archived'].includes(o.stage)).length;
      qualPct=arch/myMonthOrds.length;
    }
  }
  // المُلغى أثره (تم قبول تظلّمه) لا يُحتسب في خصم الجودة
  const monthIncidents=myIncidents.filter(i=>(i.date||'').startsWith(mKey)&&!isVoided(i));
  const incPenalty=Math.min(0.6,monthIncidents.length*0.05);
  qualPct=Math.max(0,qualPct-incPenalty);
  const qualScore=Math.round(qualPct*25);

  const score=Math.min(100,attScore+prodScore+qualScore);
  const grade=score>=85?'ممتاز ⭐':score>=70?'جيد جداً':score>=50?'متوسط':'يحتاج تطوير';
  const col=score>=85?'var(--g)':score>=70?'var(--b)':score>=50?'var(--y)':'var(--r)';
  return{
    score,grade,col,
    breakdown:{
      att:{score:attScore,pct:Math.round(attPct*100),lateMins,latePenalty,present,workDays},
      prod:{score:prodScore,pct:Math.round(prodPct*100),total:myMonthOrds.length},
      qual:{score:qualScore,pct:Math.round(qualPct*100),incidents:monthIncidents.length},
    },
    meta:{lastDay,daysInMonth:dim,goal}
  };
}

// ── Render ──
function renderAll(){
  if(!me)return;
  const r=ROLES[me.role]||{label:me.role,col:'var(--dim-arch)',ico:'👤'};
  const cur=calcScoreFor(monthKey());
  const prevKey=(()=>{const d=new Date(now.getFullYear(),now.getMonth()-1,1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');})();
  const prev=calcScoreFor(prevKey);
  const delta=cur.score-prev.score;
  const dArrow=delta>0?'↑':delta<0?'↓':'→';
  const dCol=delta>0?'var(--g)':delta<0?'var(--r)':'var(--dim2)';
  const dLbl=delta===0?'بدون تغيير':`${dArrow} ${Math.abs(delta)} ${delta>0?'تحسّن':'تراجع'} عن ${MONTHS[(now.getMonth()-1+12)%12]}`;
  const circ=Math.round(2*Math.PI*36);
  const fill=Math.round(cur.score/100*circ);

  // Hour-aware greeting
  const h=now.getHours();
  const greet=h<12?'صباح الخير':h<17?'مساء الخير':'مساء الخير';
  setText('sub',`${greet}، ${(me.name||'').split(' ')[0]} · ${MONTHS[now.getMonth()]} ${now.getFullYear()}`);

  // Salaries this month (paid+pending)
  const mPays=myPayments.filter(p=>p.month===monthKey());
  const paidThisMonth=mPays.reduce((s,p)=>s+(p.isDeduction?-(parseFloat(p.amount)||0):(parseFloat(p.amount)||0)),0);
  const baseS=parseFloat(me.baseSalary)||0;

  // Open incidents this month
  const monthInc=myIncidents.filter(i=>(i.date||'').startsWith(monthKey())&&!isVoided(i)).length;

  document.getElementById('main-content').innerHTML=`
    <!-- HERO -->
    <div class="hero" style="--rc:${r.col}">
      <div class="hero-row">
        <div class="hero-av" style="background:${r.col}">${(me.name||'?')[0].toUpperCase()}</div>
        <div class="flex-1 min-w-0">
          <div class="hero-name">${me.name||'—'}</div>
          <div class="hero-role">${r.ico} ${r.label}</div>
          <div class="hero-greeting">${greet}، يوم سعيد 🌟</div>
        </div>
        <div class="score-ring" title="نقاط أدائك هذا الشهر">
          <svg width="84" height="84" viewBox="0 0 84 84">
            <circle class="bg" cx="42" cy="42" r="36"/>
            <circle class="fg" cx="42" cy="42" r="36" stroke="${cur.col}" stroke-dasharray="${circ}" stroke-dashoffset="${circ-fill}"/>
          </svg>
          <div class="num" style="color:${cur.col}">${cur.score}</div>
        </div>
      </div>
      <div class="mp-grade-row">
        <span class="mp-grade" style="color:${cur.col}">${cur.grade}</span>
        <span class="mp-delta" style="color:${dCol};background:${dCol}1f">${dLbl}</span>
      </div>
    </div>

    ${monthInc>0?`<!-- INCIDENTS ALERT BANNER (ظاهر دائماً عند وجود إخفاقات) -->
    <button type="button" class="mp-inc-banner" onclick="setTab('feedback')">
      <span class="mp-inc-banner-ico">⚠️</span>
      <span class="mp-inc-banner-txt">
        <strong>لديك ${monthInc} ${monthInc===1?'ملاحظة':'ملاحظات'} مسجّلة هذا الشهر</strong>
        <span class="mp-inc-banner-sub">اضغط للاطّلاع على التفاصيل — كل ملاحظة تؤثر على نقاط الجودة</span>
      </span>
      <span class="mp-inc-banner-go">عرض ←</span>
    </button>`:''}

    <!-- QUICK STATS -->
    <div class="qstats">
      <div class="qstat mp-acc-g">
        <div class="qstat-val">${cur.breakdown.att.present}/${cur.breakdown.att.workDays}</div>
        <div class="qstat-lbl">الحضور</div>
      </div>
      <div class="qstat mp-acc-y">
        <div class="qstat-val">${cur.breakdown.att.lateMins}</div>
        <div class="qstat-lbl">دقائق تأخير</div>
      </div>
      <div class="qstat mp-acc-b">
        <div class="qstat-val">${fn(paidThisMonth)}</div>
        <div class="qstat-lbl">مصروف ج</div>
      </div>
      <div class="qstat" style="--qc:${monthInc>0?'var(--r)':'var(--g)'}">
        <div class="qstat-val">${monthInc}</div>
        <div class="qstat-lbl">ملاحظات الشهر</div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs" id="tabs">
      <button type="button" class="tab${activeTab==='overview'?' active':''}" data-tab="overview">📊 نظرة عامة</button>
      <button type="button" class="tab${activeTab==='attendance'?' active':''}" data-tab="attendance">📅 حضوري</button>
      <button type="button" class="tab${activeTab==='salary'?' active':''}" data-tab="salary">💰 مرتباتي</button>
      <button type="button" class="tab${activeTab==='feedback'?' active':''}" data-tab="feedback">💬 ملاحظات${monthInc?` <span class="badge-c">${monthInc}</span>`:''}</button>
    </div>

    <!-- TAB: Overview -->
    <div class="tab-pane" id="tab-overview" style="${activeTab==='overview'?'':'display:none'}">
      <!-- Score breakdown -->
      <div class="section mp-mb-14">
        <div class="section-head mp-mb-10">
          <div class="section-title">📊 تفصيل أدائك</div>
          <span class="txt-meta-xs">${MONTHS[now.getMonth()]} ${now.getFullYear()}</span>
        </div>
        <div class="bd-row mp-acc-g">
          <div class="bd-icon">📅</div>
          <div class="flex-1 min-w-0">
            <div class="mp-lv-row gap-base"><span>الحضور</span><span>${cur.breakdown.att.score}/35</span></div>
            <div class="bd-bar"><div class="bd-fill" style="width:${cur.breakdown.att.pct}%"></div></div>
            <div class="mp-subnote">${cur.breakdown.att.present} يوم حضور${cur.breakdown.att.lateMins>0?` · ${cur.breakdown.att.lateMins}د تأخير (-${cur.breakdown.att.latePenalty})`:''}</div>
          </div>
        </div>
        <div class="bd-row mp-acc-b">
          <div class="bd-icon">📈</div>
          <div class="flex-1 min-w-0">
            <div class="mp-lv-row gap-base"><span>الإنتاجية</span><span>${cur.breakdown.prod.score}/40</span></div>
            <div class="bd-bar"><div class="bd-fill" style="width:${cur.breakdown.prod.pct}%"></div></div>
            <div class="mp-subnote">${cur.breakdown.prod.total} أوردر هذا الشهر${cur.meta.goal?.targetOrdersMonthly?` · هدف ${cur.meta.goal.targetOrdersMonthly}`:''}</div>
          </div>
        </div>
        <div class="bd-row mp-acc-p">
          <div class="bd-icon">⭐</div>
          <div class="flex-1 min-w-0">
            <div class="mp-lv-row gap-base"><span>الجودة</span><span>${cur.breakdown.qual.score}/25</span></div>
            <div class="bd-bar"><div class="bd-fill" style="width:${cur.breakdown.qual.pct}%"></div></div>
            <div class="mp-subnote">${cur.breakdown.qual.incidents>0?`${cur.breakdown.qual.incidents} ملاحظة هذا الشهر`:'لا توجد ملاحظات سلبية ✨'}</div>
          </div>
        </div>
      </div>

      <!-- Goal -->
      ${cur.meta.goal?`<div class="section mp-mb-14">
        <div class="section-head mp-mb-10">
          <div class="section-title">🎯 هدف الشهر</div>
        </div>
        <div class="mp-card">
          ${cur.meta.goal.targetOrdersMonthly?`<div class="mp-lv-row mb-6"><span class="txt-meta-base">📦 الأوردرات</span><span class="txt-bold-base">${cur.breakdown.prod.total} / ${cur.meta.goal.targetOrdersMonthly}</span></div>
          <div class="bd-bar"><div class="bd-fill mp-fill-b" style="width:${Math.min(100,cur.breakdown.prod.total/cur.meta.goal.targetOrdersMonthly*100)}%"></div></div>`:''}
        </div>
      </div>`:''}

      <!-- Tip -->
      <div class="tip">
        💡 <strong>كيف تتحسّن نقاطك؟</strong><br>
        الحضور 35 نقطة (يخصم 1 نقطة لكل ساعة تأخير) · الإنتاجية 40 نقطة · الجودة 25 نقطة (يخصم 5% لكل ملاحظة).
      </div>
    </div>

    <!-- TAB: Attendance -->
    <div class="tab-pane" id="tab-attendance" style="${activeTab==='attendance'?'':'display:none'}">
      <div id="att-section"></div>
    </div>

    <!-- TAB: Salary -->
    <div class="tab-pane" id="tab-salary" style="${activeTab==='salary'?'':'display:none'}">
      <div id="sal-section"></div>
    </div>

    <!-- TAB: Feedback -->
    <div class="tab-pane" id="tab-feedback" style="${activeTab==='feedback'?'':'display:none'}">
      <div id="fb-section"></div>
    </div>`;

  if(activeTab==='attendance')renderAttendanceTab();
  else if(activeTab==='salary')renderSalaryTab();
  else if(activeTab==='feedback')renderFeedbackTab();
}

function renderAttendanceTab(){
  const el=document.getElementById('att-section');if(!el)return;
  const mKey=monthKey();
  const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const fday=new Date(now.getFullYear(),now.getMonth(),1).getDay();
  const today=todayStr();
  let html='';
  for(let i=0;i<fday;i++)html+='<div></div>';
  for(let d=1;d<=dim;d++){
    const ds=mKey+'-'+String(d).padStart(2,'0');
    const att=myAttendance.find(a=>a.date===ds);
    const isOff=!isWorkDay(ds);
    const isTd=ds===today, isFut=ds>today;
    let cls='cal-d ';
    if(att)cls+='present';
    else if(isOff||isFut)cls+='off';
    else cls+='absent';
    const lateMin=parseInt(att?.lateMinutes)||0;
    const tip=att?`${ds}\n${att.checkInStr||''}${att.checkOutStr?' → '+att.checkOutStr:''}${lateMin?'\nمتأخر '+lateMin+'د':''}`:`${ds}`;
    html+=`<div class="${cls}${isTd?' today':''}" title="${tip}">${d}${lateMin>0?'<span class="late">⏰</span>':''}</div>`;
  }
  const present=myAttendance.filter(a=>(a.date||'').startsWith(mKey));
  const lateMins=present.reduce((s,a)=>s+(parseInt(a.lateMinutes)||0),0);
  const lateDays=present.filter(a=>(parseInt(a.lateMinutes)||0)>0).length;

  el.innerHTML=`
    <div class="section mp-mb-14">
      <div class="section-head mp-mb-10">
        <div class="section-title">📅 حضور ${MONTHS[now.getMonth()]}</div>
        <span class="txt-meta-sm">${present.length} يوم</span>
      </div>
      <div class="cal">${html}</div>
      <div class="mp-legend">
        <span><span class="mp-legend-dot present"></span>حضر</span>
        <span><span class="mp-legend-dot absent"></span>غياب</span>
        <span><span class="mp-legend-dot off"></span>عطلة/مستقبل</span>
        <span>⏰ تأخير</span>
      </div>
    </div>
    ${lateMins>0?`<div class="list-row warning">
      <div class="bd-icon mp-acc-y">⏰</div>
      <div class="flex-1">
        <div class="mp-rowtitle">دقائق التأخير هذا الشهر</div>
        <div class="txt-meta-sm">${lateMins} دقيقة موزّعة على ${lateDays} يوم — يخصم ${Math.min(7,Math.floor(lateMins/60))} نقطة من تقييم الحضور</div>
      </div>
    </div>`:`<div class="list-row success">
      <div class="bd-icon mp-acc-g">✨</div>
      <div class="flex-1">
        <div class="mp-rowtitle">صفر تأخير هذا الشهر</div>
        <div class="txt-meta-sm">ممتاز! استمر بنفس الالتزام واحصل على بدل الحضور الكامل في نهاية الشهر</div>
      </div>
    </div>`}
    ${me.workSchedule?`<div class="list-row mp-mt-10">
      <div class="bd-icon">🕐</div>
      <div class="flex-1">
        <div class="mp-rowtitle">جدول عملك</div>
        <div class="txt-meta-sm">بداية ${me.workSchedule.startTime||'—'} · نهاية ${me.workSchedule.endTime||'—'} · ${me.workSchedule.days?.length||0} أيام/أسبوع</div>
      </div>
    </div>`:''}`;
}

function renderSalaryTab(){
  const el=document.getElementById('sal-section');if(!el)return;
  const mKey=monthKey();
  const cur=calcScoreFor(mKey);
  const baseS=parseFloat(me.baseSalary)||0;
  const mPays=myPayments.filter(p=>p.month===mKey);
  const paidThisMonth=mPays.reduce((s,p)=>s+(p.isDeduction?-(parseFloat(p.amount)||0):(parseFloat(p.amount)||0)),0);

  // Compute suggested for THIS month, mirroring profile logic
  const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  let wDays=0;
  for(let d=1;d<=dim;d++){const ds=mKey+'-'+String(d).padStart(2,'0');if(isWorkDay(ds))wDays++;}
  if(wDays===0)wDays=26;
  const present=myAttendance.filter(a=>(a.date||'').startsWith(mKey));
  const daysAbs=Math.max(0,wDays-present.length);
  const dailyR=baseS/wDays;
  const absDed=Math.round(dailyR*daysAbs);
  let tardDays=0;
  present.forEach(a=>{
    const lm=parseInt(a.lateMinutes)||0;
    if(lm>240)tardDays+=1;
    else if(lm>120)tardDays+=0.5;
    else if(lm>30)tardDays+=0.25;
  });
  const tardDed=Math.round(dailyR*tardDays);
  const expSal=Math.max(0,baseS-absDed-tardDed);

  // Group payments by month
  const byMonth=new Map();
  myPayments.forEach(p=>{const k=p.month||'unknown';if(!byMonth.has(k))byMonth.set(k,[]);byMonth.get(k).push(p);});
  const months=[...byMonth.keys()].sort().reverse();

  el.innerHTML=`
    <!-- This month summary -->
    <div class="section mp-mb-14">
      <div class="section-head mp-mb-10">
        <div class="section-title">💰 مرتب ${MONTHS[now.getMonth()]} ${now.getFullYear()}</div>
      </div>
      <div class="mp-card-14">
        <div class="mp-lv-row mb-8"><span class="txt-meta-sm">المرتب الأساسي</span><strong class="text-snow">${fn(baseS)} ج</strong></div>
        ${absDed>0?`<div class="mp-lv-row mb-8"><span class="txt-meta-sm">- خصم غياب (${daysAbs} يوم)</span><strong class="text-r">${fn(absDed)} ج</strong></div>`:''}
        ${tardDed>0?`<div class="mp-lv-row mb-8"><span class="txt-meta-sm">- خصم تأخير (≈${tardDays} يوم)</span><strong class="text-y">${fn(tardDed)} ج</strong></div>`:''}
        <div class="mp-lv-row total"><span class="txt-bold-md">المتوقع</span><strong class="mp-exp-val">${fn(expSal)} ج</strong></div>
        ${paidThisMonth!==0?`<div class="mp-lv-row mt-8"><span class="txt-meta-sm">${paidThisMonth>0?'✅ مصروف':'تم خصم'}</span><strong style="color:${paidThisMonth>=0?'var(--g)':'var(--r)'}">${fn(paidThisMonth)} ج</strong></div>`:''}
      </div>
    </div>

    <!-- History -->
    <div class="section">
      <div class="section-head mp-mb-10">
        <div class="section-title">📜 سجل المرتبات</div>
        <span class="txt-meta-xs">${myPayments.length} عملية</span>
      </div>
      ${months.length===0?`<div class="empty">
        <div class="empty-i">💰</div>
        <div class="empty-t">لا توجد دفعات مسجّلة بعد</div>
        <div class="empty-h">عند صرف أول مرتب لك ستراه هنا مع كامل التفاصيل</div>
      </div>`:months.map(mk=>{
        const pays=byMonth.get(mk).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
        const total=pays.reduce((s,p)=>s+(p.isDeduction?-(parseFloat(p.amount)||0):(parseFloat(p.amount)||0)),0);
        const[y,m]=mk.split('-').map(Number);
        return `<div class="mp-mb-12">
          <div class="mp-month-head"><span>${MONTHS[m-1]} ${y}</span><span class="text-g">${fn(total)} ج</span></div>
          ${pays.map(p=>{
            const lbl=SAL_LBL[p.salaryType]||p.salaryType||'مرتب';
            const col=SAL_COL[p.salaryType]||'var(--dim2)';
            const sign=p.isDeduction?'-':'';
            const dt=p.createdAt?.toDate?.()?.toLocaleDateString('ar-EG',{day:'numeric',month:'short'})||'';
            return`<div class="list-row">
              <div class="bd-icon" style="--bdc:${col}">${p.isDeduction?'⚠️':'💵'}</div>
              <div class="flex-1 min-w-0">
                <div class="mp-lv-row gap-md"><span>${lbl}</span><span style="color:${col}">${sign}${fn(parseFloat(p.amount)||0)} ج</span></div>
                ${p.note?`<div class="txt-meta-xs">${p.note}</div>`:''}
                <div class="mp-meta-tiny">${dt} · ${p.walletName||''}${p.tardinessDeduction>0?` · خصم تأخير ${fn(p.tardinessDeduction)} ج`:''}${p.absenceDeduction>0?` · خصم غياب ${fn(p.absenceDeduction)} ج`:''}</div>
              </div>
            </div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>`;
}

function renderFeedbackTab(){
  const el=document.getElementById('fb-section');if(!el)return;
  const mKey=monthKey();
  const monthInc=myIncidents.filter(i=>(i.date||'').startsWith(mKey));
  const olderInc=myIncidents.filter(i=>!(i.date||'').startsWith(mKey)).slice(0,10);
  // تأمين الـ URL داخل attribute (href/src) + صورة المخالفة القابلة للتكبير
  const escA=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const incImg=i=>i.imageUrl?`<a href="${escA(i.imageUrl)}" target="_blank" rel="noopener" class="mp-inc-imglink" title="اضغط لتكبير صورة المخالفة"><img src="${escA(i.imageUrl)}" alt="صورة المخالفة" loading="lazy" class="mp-inc-img"></a>`:'';
  // حصر تكرار نفس السبب + شارة التظلّم وزر الاعتراض
  const recur=annotateRecurrence(myIncidents);
  const recurBadge=i=>{const rc=recur.get(i._id);return(rc&&rc.total>1)?`<span class="mp-inc-recur">🔁 المرة ${rc.ordinal} من ${rc.total}</span>`:'';};
  const appealBlock=i=>{
    const ap=i.appeal;
    if(isVoided(i))return`<div class="mp-appeal ok">${APPEAL_STATUS.accepted.lbl}</div>`;
    if(ap&&ap.status==='pending')return`<div class="mp-appeal pend">⏳ تظلّمك قيد المراجعة من الإدارة</div>`;
    if(ap&&ap.status==='rejected')return`<div class="mp-appeal rej">❌ تم رفض تظلّمك${ap.decisionNote?' — '+escA(ap.decisionNote):''}</div>`;
    return`<button type="button" class="mp-appeal-btn" onclick="openAppeal('${escA(i._id)}')">🛡️ تقديم تظلّم</button>`;
  };

  el.innerHTML=`
    <div class="section mp-mb-14">
      <div class="section-head mp-mb-10">
        <div class="section-title">⚠️ ملاحظات ${MONTHS[now.getMonth()]}</div>
        <span class="txt-meta-xs">${monthInc.length} هذا الشهر</span>
      </div>
      ${monthInc.length===0?`<div class="empty">
        <div class="empty-i">✨</div>
        <div class="empty-t">شهر نظيف بدون ملاحظات</div>
        <div class="empty-h">حافظ على هذا المستوى — كل ملاحظة تؤثر بـ 5% من نقاط الجودة</div>
      </div>`:monthInc.map(i=>{
        const t=INC_TYPES[i.type]||INC_TYPES.other;
        const s=INC_SEV[i.severity]||INC_SEV.low;
        return`<div class="list-row ${i.severity==='high'?'danger':i.severity==='medium'?'warning':''}"${isVoided(i)?' style="opacity:.6"':''}>
          <div class="bd-icon" style="--bdc:${s.col}">${t.ico}</div>
          <div class="flex-1 min-w-0">
            <div class="mp-inc-head">
              <strong class="mp-inc-title">${i.reasonLabel||i.title||t.lbl}</strong>
              <span class="mp-inc-sev" style="background:${s.col}1f;color:${s.col}">${s.lbl}</span>
              ${recurBadge(i)}
            </div>
            ${i.description?`<div class="mp-desc">${i.description}</div>`:''}
            ${incImg(i)}
            <div class="mp-meta-tiny3">${i.date||''}${i.clientName?' · '+i.clientName:''}</div>
            ${appealBlock(i)}
          </div>
        </div>`;
      }).join('')}
    </div>

    ${myEvaluations.length>0?`<div class="section mp-mb-14">
      <div class="section-head mp-mb-10">
        <div class="section-title">📋 التقييمات السابقة</div>
      </div>
      ${myEvaluations.slice(0,6).map(v=>{
        const sc=v.totalScore||v.score||0;
        const col=sc>=85?'var(--g)':sc>=70?'var(--b)':sc>=50?'var(--y)':'var(--r)';
        return`<div class="list-row">
          <div class="bd-icon" style="--bdc:${col}">${sc>=70?'⭐':sc>=50?'👍':'⚠️'}</div>
          <div class="flex-1 min-w-0">
            <div class="mp-lv-row gap-md">
              <span>${v.month||''}</span>
              <strong style="color:${col}">${sc}/100</strong>
            </div>
            ${v.note?`<div class="mp-desc">${v.note}</div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>`:''}

    ${olderInc.length>0?`<div class="section">
      <div class="section-head mp-mb-10">
        <div class="section-title">📂 ملاحظات سابقة</div>
        <span class="txt-meta-xs">${olderInc.length}</span>
      </div>
      ${olderInc.map(i=>{
        const t=INC_TYPES[i.type]||INC_TYPES.other;
        const s=INC_SEV[i.severity]||INC_SEV.low;
        return`<div class="list-row"${isVoided(i)?' style="opacity:.6"':''}>
          <div class="bd-icon" style="--bdc:${s.col}">${t.ico}</div>
          <div class="flex-1 min-w-0">
            <div class="mp-inc-head"><div class="txt-strong-base">${i.reasonLabel||i.title||t.lbl}</div>${recurBadge(i)}</div>
            ${incImg(i)}
            <div class="mp-meta-tiny">${i.date||''}</div>
            ${appealBlock(i)}
          </div>
        </div>`;
      }).join('')}
    </div>`:''}

    <div class="tip mp-mt-14">
      💡 إذا كانت لديك ملاحظات على أي بند مسجّل، تواصل مع مديرك المباشر للمراجعة.
    </div>`;
}


// ── Auth + Load ──
onAuthStateChanged(auth,async u=>{
  if(!u){location.href='login.html';return;}
  myAuthUid=u.uid;
  // Load user doc
  try{
    const usnap=await getDoc(doc(db,'users',u.uid));
    if(usnap.exists()){
      const d=usnap.data();
      const role=d.role||'customer_service';
      B2CSidebar.build(d, 'my-profile.html');
      setText('nav-name',d.name||u.email);
      const av=document.getElementById('nav-av');if(av)av.textContent=(d.name||u.email)[0].toUpperCase();
      setText('role-badge',ROLES[role]?.label||role);
    }
  }catch(e){console.warn('users fetch:',e.message);}

  // Find employee record by authUid
  try{
    const eq=query(collection(db,'employees'),where('authUid','==',u.uid));
    const esnap=await getDocs(eq);
    if(esnap.empty){
      document.getElementById('main-content').innerHTML=`<div class="empty"><div class="empty-i">❌</div><div class="empty-t">لم يُعثر على ملف موظف لحسابك</div><div class="empty-h">تواصل مع مديرك لربط حسابك بسجل موظف</div></div>`;
      return;
    }
    const d=esnap.docs[0];
    me={...d.data(),_id:d.id};
    myEmpId=d.id;
  }catch(e){
    document.getElementById('main-content').innerHTML=`<div class="empty"><div class="empty-i">⚠️</div><div class="empty-t">خطأ في التحميل</div><div class="empty-h">${e.message}</div></div>`;
    return;
  }

  // Subscribe to my data
  // Attendance: by employeeUid (covers staff dashboards) AND employeeId (covers profile)
  let __attA=new Map(),__attB=new Map();
  const __mergeA=()=>{
    const m=new Map([...__attA,...__attB]);
    myAttendance=[...m.values()];
    if(me)renderAll();
  };
  onSnapshot(query(collection(db,'attendance'),where('employeeUid','==',myAuthUid),limit(1000)),s=>{
    __attA=new Map(s.docs.map(d=>[d.id,{...d.data(),_id:d.id}]));__mergeA();
  },err=>console.warn('att-uid:',err.message));
  onSnapshot(query(collection(db,'attendance'),where('employeeId','==',myEmpId),limit(1000)),s=>{
    __attB=new Map(s.docs.map(d=>[d.id,{...d.data(),_id:d.id}]));__mergeA();
  },err=>console.warn('att-id:',err.message));

  onSnapshot(query(collection(db,'employee_payments'),where('employeeId','==',myEmpId),limit(500)),s=>{
    myPayments=s.docs.map(d=>({...d.data(),_id:d.id})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    renderAll();
  },err=>console.warn('pay:',err.message));

  onSnapshot(query(collection(db,'employee_incidents'),where('authUid','==',myAuthUid),limit(200)),s=>{
    myIncidents=s.docs.map(d=>({...d.data(),_id:d.id})).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    renderAll();
  },err=>console.warn('inc:',err.message));

  onSnapshot(query(collection(db,'employee_evaluations'),where('employeeId','==',myEmpId),limit(60)),s=>{
    myEvaluations=s.docs.map(d=>({...d.data(),_id:d.id})).sort((a,b)=>(b.month||'').localeCompare(a.month||''));
    renderAll();
  },err=>console.warn('eval:',err.message));

  onSnapshot(query(collection(db,'employee_goals'),where('employeeId','==',myEmpId),limit(60)),s=>{
    myGoals=s.docs.map(d=>({...d.data(),_id:d.id}));
    renderAll();
  },err=>console.warn('goal:',err.message));

  // Orders relevant to me — for productivity score (bounded, RULE G3).
  // Reads the most recent 3000 orders; productivity is current-quarter heavy.
  onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc'),limit(3000)),s=>{
    const all=s.docs.map(d=>({...d.data(),_id:d.id}));
    const uid=myAuthUid;
    myOrders=all.filter(o=>o.designerId===uid||o.productionAgent===uid||o.shippingOfficerId===uid||o.createdBy===uid||o.designerId===myEmpId||o.productionAgent===myEmpId||o.shippingOfficerId===myEmpId);
    renderAll();
  },err=>console.warn('orders:',err.message));
});
