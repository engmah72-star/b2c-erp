<style>
/* ── Hero ── */
.hero{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;right:0;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,var(--rc,var(--b))30 0%,transparent 70%);transform:translate(40%,-50%);pointer-events:none}
.hero-row{display:flex;gap:14px;align-items:center;position:relative;z-index:1}
.hero-av{width:74px;height:74px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:white;flex-shrink:0;box-shadow:0 6px 18px rgba(0,0,0,.3)}
.hero-name{font-size:18px;font-weight:900;margin-bottom:3px}
.hero-role{font-size:12px;color:var(--dim2);font-weight:700}
.hero-greeting{font-size:11px;color:var(--dim);margin-top:2px}

.score-ring{width:84px;height:84px;flex-shrink:0;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .bg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:7}
.score-ring .fg{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 1s ease}
.score-ring .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900}

/* ── Stats row ── */
.qstats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.qstat{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center;border-top:3px solid var(--qc,var(--b))}
.qstat-val{font-size:18px;font-weight:900;color:var(--qc,var(--b));line-height:1.1}
.qstat-lbl{font-size:9px;color:var(--dim2);font-weight:700;margin-top:3px;letter-spacing:.3px}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding:6px 0;margin-bottom:14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(8,9,15,.96);z-index:5;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 16px;border:none;background:transparent;color:var(--dim2);font-size:13px;font-weight:700;cursor:pointer;border-radius:10px 10px 0 0;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;min-height:42px;display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--snow);background:var(--bg2)}
.tab.active{color:var(--b);border-bottom-color:var(--b);background:rgba(59,158,255,.06)}
.badge-c{background:var(--bg3);color:var(--snow);font-size:10px;font-weight:800;padding:1px 7px;border-radius:10px;min-width:18px;text-align:center}
.tab.active .badge-c{background:var(--b);color:#fff}

/* ── Score breakdown ── */
.bd-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;margin-bottom:8px}
.bd-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--bdc,var(--b))22;color:var(--bdc,var(--b));flex-shrink:0}
.bd-bar{flex:1;height:6px;border-radius:3px;background:var(--bg3);overflow:hidden}
.bd-fill{height:100%;border-radius:3px;background:var(--bdc,var(--b));transition:width .8s}

/* ── Calendar ── */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:10px}
.cal-d{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;position:relative}
.cal-d.present{background:rgba(0,217,126,.18);color:var(--g)}
.cal-d.absent{background:rgba(255,61,110,.10);color:var(--r)}
.cal-d.leave{background:rgba(255,170,0,.16);color:var(--y)}
.cal-d.off{background:var(--bg3);color:var(--dim)}
.cal-d.today{box-shadow:0 0 0 2px var(--b)}
.cal-d .late{position:absolute;top:0;left:1px;font-size:9px;line-height:1}

/* ── List items ── */
.list-row{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px}
.list-row.warning{border-right:3px solid var(--y)}
.list-row.danger{border-right:3px solid var(--r)}
.list-row.success{border-right:3px solid var(--g)}

/* ── Empty ── */
.empty{padding:32px 16px;text-align:center;background:var(--bg2);border:1px dashed var(--line);border-radius:14px}
.empty-i{font-size:42px;margin-bottom:8px;opacity:.7}
.empty-t{font-size:13px;font-weight:700;color:var(--dim2)}
.empty-h{font-size:11px;color:var(--dim);margin-top:4px;line-height:1.6}

/* ── Mobile ── */
@media(max-width:600px){
  .qstats{grid-template-columns:repeat(2,1fr)}
  .hero-row{flex-direction:column;text-align:center}
  .score-ring{margin:0 auto}
  .tab{padding:9px 12px;font-size:12px}
}

/* ── Skeleton ── */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.sk{background:linear-gradient(90deg,var(--bg2) 0%,var(--bg3) 50%,var(--bg2) 100%);background-size:200% 100%;animation:shimmer 1.5s linear infinite;border-radius:8px;height:12px;margin-bottom:8px;will-change:background-position}
@media (prefers-reduced-motion: reduce){.sk{animation:none}}

/* Inline tip */
.tip{background:rgba(59,158,255,.06);border:1px solid rgba(59,158,255,.2);border-radius:12px;padding:10px 14px;font-size:12px;line-height:1.6;color:var(--b)}
.tip strong{color:var(--snow)}
</style>

      <div class="qstat"><div class="sk" style="width:50%;height:20px;margin:0 auto 6px"></div><div class="sk" style="width:60%;height:8px;margin:0 auto"></div></div>
      <div class="qstat"><div class="sk" style="width:50%;height:20px;margin:0 auto 6px"></div><div class="sk" style="width:60%;height:8px;margin:0 auto"></div></div>
      <div class="qstat"><div class="sk" style="width:50%;height:20px;margin:0 auto 6px"></div><div class="sk" style="width:60%;height:8px;margin:0 auto"></div></div>
      <div class="qstat"><div class="sk" style="width:50%;height:20px;margin:0 auto 6px"></div><div class="sk" style="width:60%;height:8px;margin:0 auto"></div></div>

<nav class="mob-nav"><div class="mob-nav-items">
  <a class="mob-nav-item active" href="my-profile.html"><div class="mob-nav-ico">👤</div><div class="mob-nav-lbl">ملفي</div></a>

<script type="module">
import { app, auth, db } from "./core/firebase-init.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, doc, onSnapshot, query, where, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const ROLES={
  admin:{label:'Admin',col:'#ff3d6e',ico:'👑'},
  operation_manager:{label:'مدير عمليات',col:'#3b9eff',ico:'📋'},
  customer_service:{label:'خدمة عملاء',col:'#22d3ee',ico:'💬'},
  graphic_designer:{label:'مصمم',col:'#a78bfa',ico:'🎨'},
  design_operator:{label:'مشغل تصميم',col:'#a78bfa',ico:'⚙️'},
  production_agent:{label:'مندوب تنفيذ',col:'#ffaa00',ico:'🏭'},
  shipping_officer:{label:'موظف شحن',col:'#00d97e',ico:'🚚'},
  wallet_manager:{label:'محاسب',col:'#ffaa00',ico:'💰'},
};
const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const SAL_LBL={salary:'مرتب',advance:'سلفة',bonus:'مكافأة',deduction:'خصم',other:'أخرى'};
const SAL_COL={salary:'var(--g)',advance:'var(--y)',bonus:'var(--p)',deduction:'var(--r)',other:'var(--dim2)'};
const INC_TYPES={
  design_rejected:{lbl:'تصميم مرفوض',ico:'🎨'},
  order_late:{lbl:'أوردر متأخر',ico:'⏰'},
  customer_complaint:{lbl:'شكوى عميل',ico:'📢'},
  attendance:{lbl:'مخالفة حضور',ico:'💤'},
  quality:{lbl:'مشكلة جودة',ico:'⚠️'},
  other:{lbl:'أخرى',ico:'📌'},
};
const INC_SEV={low:{lbl:'منخفض',col:'var(--dim2)'},medium:{lbl:'متوسط',col:'var(--y)'},high:{lbl:'مرتفع',col:'var(--r)'}};

// ── State ──
let me=null, myEmpId='', myAuthUid='';
let myAttendance=[], myPayments=[], myIncidents=[], myEvaluations=[], myGoals=[], myOrders=[];
let activeTab=(location.hash||'#overview').slice(1);
if(!['overview','attendance','salary','feedback'].includes(activeTab))activeTab='overview';
const now=new Date();

const fn=n=>(n||0).toLocaleString('en-US');
const todayStr=()=>now.toISOString().slice(0,10);
const monthKey=()=>now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
const setText=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};

window.doLogout=async()=>{await signOut(auth);location.href='login.html';};
window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};

window.setTab=function(t){
  if(!['overview','attendance','salary','feedback'].includes(t))return;
  activeTab=t;
  history.replaceState(null,'','#'+t);
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.querySelectorAll('.tab-pane').forEach(p=>p.style.display=p.id==='tab-'+t?'':'none');
  document.getElementById('main-content')?.scrollIntoView({behavior:'smooth',block:'start'});
};

document.addEventListener('keydown',e=>{
  const tag=(e.target?.tagName||'').toUpperCase();
  if(['INPUT','TEXTAREA','SELECT'].includes(tag))return;
  if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'));
  if(['1','2','3','4'].includes(e.key)){
    e.preventDefault();
    setTab(['overview','attendance','salary','feedback'][+e.key-1]);
  }
});

// ── Schedule helpers ──
function isWorkDay(dateStr){
  const ws=me?.workSchedule;
  if(!ws?.days?.length)return new Date(dateStr).getDay()!==5&&new Date(dateStr).getDay()!==6;
  return ws.days.includes(new Date(dateStr).getDay());
}

// ── Score (mirrors employee-profile.calcScoreFor, simplified) ──
function calcScoreFor(mKey){
  if(!me||!mKey)return{score:0,grade:'—',col:'var(--dim2)',breakdown:{},meta:{}};
  const[ys,ms]=mKey.split('-').map(Number);
  const isCur=mKey===monthKey();
  const dim=new Date(ys,ms,0).getDate();
  const lastDay=isCur?now.getDate():dim;

  const att=myAttendance.filter(a=>(a.date||'').startsWith(mKey));
  const present=att.length;
  const lateMins=att.reduce((s,a)=>s+(parseInt(a.lateMinutes)||0),0);
  let workDays=0;
  for(let d=1;d<=lastDay;d++){
    const ds=mKey+'-'+String(d).padStart(2,'0');
    if(isWorkDay(ds))workDays++;
  }
  const attPct=workDays>0?Math.min(1,present/workDays):0.5;
  const latePenalty=Math.min(7,Math.floor(lateMins/60));
  const attScore=Math.max(0,Math.round(attPct*35)-latePenalty);

  // Productivity from orders (simplified — only roles that have signal)
  const uid=me.authUid||myEmpId;
  const myMonthOrds=myOrders.filter(o=>{
    const d=o.createdAt?.toDate?.();
    return d&&d.getMonth()===(ms-1)&&d.getFullYear()===ys;
  });
  let prodPct=0.65;
  if(myMonthOrds.length>0){
    if(me.role==='graphic_designer'||me.role==='design_operator'){
      const done=myMonthOrds.filter(o=>['printing','production','shipping','archived'].includes(o.stage)).length;
      prodPct=done/myMonthOrds.length;
    } else if(me.role==='production_agent'){
      const done=myMonthOrds.filter(o=>['shipping','archived'].includes(o.stage)).length;
      prodPct=done/myMonthOrds.length;
    } else if(me.role==='shipping_officer'){
      const done=myMonthOrds.filter(o=>o.stage==='archived').length;
      prodPct=done/myMonthOrds.length;
    } else { prodPct=Math.min(1,myMonthOrds.length/20); }
  }
  const goal=myGoals.find(g=>g.month===mKey);
  if(goal?.targetOrdersMonthly>0){
    const expected=isCur?goal.targetOrdersMonthly*(lastDay/dim):goal.targetOrdersMonthly;
    if(expected>0)prodPct=Math.min(1,myMonthOrds.length/expected);
  }
  const prodScore=Math.round(prodPct*40);

  let qualPct=0.8;
  if(myMonthOrds.length>0){
    if(me.role==='graphic_designer'||me.role==='design_operator'){
      const rej=myMonthOrds.filter(o=>o.designStatus==='rejected'||(o.timeline||[]).some(t=>(t.action||'').includes('رفض')||(t.action||'').includes('مراجعة'))).length;
      qualPct=Math.max(0,1-(rej/myMonthOrds.length));
    } else {
      const arch=myMonthOrds.filter(o=>['shipping','archived'].includes(o.stage)).length;
      qualPct=arch/myMonthOrds.length;
    }
  }
  const monthIncidents=myIncidents.filter(i=>(i.date||'').startsWith(mKey));
  const incPenalty=Math.min(0.6,monthIncidents.length*0.05);
  qualPct=Math.max(0,qualPct-incPenalty);
  const qualScore=Math.round(qualPct*25);

  const score=Math.min(100,attScore+prodScore+qualScore);
  const grade=score>=85?'ممتاز ⭐':score>=70?'جيد جداً':score>=50?'متوسط':'يحتاج تطوير';
  const col=score>=85?'var(--g)':score>=70?'var(--b)':score>=50?'var(--y)':'var(--r)';
  return{
    score,grade,col,
    breakdown:{
      att:{score:attScore,pct:Math.round(attPct*100),lateMins,latePenalty,present,workDays},
      prod:{score:prodScore,pct:Math.round(prodPct*100),total:myMonthOrds.length},
      qual:{score:qualScore,pct:Math.round(qualPct*100),incidents:monthIncidents.length},
    },
    meta:{lastDay,daysInMonth:dim,goal}
  };
}

// ── Render ──
function renderAll(){
  if(!me)return;
  const r=ROLES[me.role]||{label:me.role,col:'#4e5672',ico:'👤'};
  const cur=calcScoreFor(monthKey());
  const prevKey=(()=>{const d=new Date(now.getFullYear(),now.getMonth()-1,1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');})();
  const prev=calcScoreFor(prevKey);
  const delta=cur.score-prev.score;
  const dArrow=delta>0?'↑':delta<0?'↓':'→';
  const dCol=delta>0?'var(--g)':delta<0?'var(--r)':'var(--dim2)';
  const dLbl=delta===0?'بدون تغيير':`${dArrow} ${Math.abs(delta)} ${delta>0?'تحسّن':'تراجع'} عن ${MONTHS[(now.getMonth()-1+12)%12]}`;
  const circ=Math.round(2*Math.PI*36);
  const fill=Math.round(cur.score/100*circ);

  // Hour-aware greeting
  const h=now.getHours();
  const greet=h<12?'صباح الخير':h<17?'مساء الخير':'مساء الخير';
  setText('sub',`${greet}، ${(me.name||'').split(' ')[0]} · ${MONTHS[now.getMonth()]} ${now.getFullYear()}`);

  // Salaries this month (paid+pending)
  const mPays=myPayments.filter(p=>p.month===monthKey());
  const paidThisMonth=mPays.reduce((s,p)=>s+(p.isDeduction?-(parseFloat(p.amount)||0):(parseFloat(p.amount)||0)),0);
  const baseS=parseFloat(me.baseSalary)||0;

  // Open incidents this month
  const monthInc=myIncidents.filter(i=>(i.date||'').startsWith(monthKey())).length;

  document.getElementById('main-content').innerHTML=`
    <!-- HERO -->
    <div class="hero" style="--rc:${r.col}">
      <div class="hero-row">
        <div class="hero-av" style="background:${r.col}">${(me.name||'?')[0].toUpperCase()}</div>
        <div style="flex:1;min-width:0">
          <div class="hero-name">${me.name||'—'}</div>
          <div class="hero-role">${r.ico} ${r.label}</div>
          <div class="hero-greeting">${greet}، يوم سعيد 🌟</div>
        </div>
        <div class="score-ring" title="نقاط أدائك هذا الشهر">
          <svg width="84" height="84" viewBox="0 0 84 84">
            <circle class="bg" cx="42" cy="42" r="36"/>
            <circle class="fg" cx="42" cy="42" r="36" stroke="${cur.col}" stroke-dasharray="${circ}" stroke-dashoffset="${circ-fill}"/>
          </svg>
          <div class="num" style="color:${cur.col}">${cur.score}</div>
        </div>
      </div>
      <div style="margin-top:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="font-size:13px;font-weight:900;color:${cur.col}">${cur.grade}</span>
        <span style="font-size:10px;font-weight:800;color:${dCol};background:${dCol}1f;padding:3px 10px;border-radius:10px">${dLbl}</span>
      </div>
    </div>

    <!-- QUICK STATS -->
    <div class="qstats">
      <div class="qstat" style="--qc:var(--g)">
        <div class="qstat-val">${cur.breakdown.att.present}/${cur.breakdown.att.workDays}</div>
        <div class="qstat-lbl">الحضور</div>
      </div>
      <div class="qstat" style="--qc:var(--y)">
        <div class="qstat-val">${cur.breakdown.att.lateMins}</div>
        <div class="qstat-lbl">دقائق تأخير</div>
      </div>
      <div class="qstat" style="--qc:var(--b)">
        <div class="qstat-val">${fn(paidThisMonth)}</div>
        <div class="qstat-lbl">مصروف ج</div>
      </div>
      <div class="qstat" style="--qc:${monthInc>0?'var(--r)':'var(--g)'}">
        <div class="qstat-val">${monthInc}</div>
        <div class="qstat-lbl">ملاحظات الشهر</div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab${activeTab==='overview'?' active':''}" data-tab="overview" onclick="setTab('overview')">📊 نظرة عامة</button>
      <button class="tab${activeTab==='attendance'?' active':''}" data-tab="attendance" onclick="setTab('attendance')">📅 حضوري</button>
      <button class="tab${activeTab==='salary'?' active':''}" data-tab="salary" onclick="setTab('salary')">💰 مرتباتي</button>
      <button class="tab${activeTab==='feedback'?' active':''}" data-tab="feedback" onclick="setTab('feedback')">💬 ملاحظات${monthInc?` <span class="badge-c">${monthInc}</span>`:''}</button>
    </div>

    <!-- TAB: Overview -->
    <div class="tab-pane" id="tab-overview" style="${activeTab==='overview'?'':'display:none'}">

function renderAttendanceTab(){
  const el=document.getElementById('att-section');if(!el)return;
  const mKey=monthKey();
  const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const fday=new Date(now.getFullYear(),now.getMonth(),1).getDay();
  const today=todayStr();
  let html='';
  for(let i=0;i<fday;i++)html+='<div></div>';
  for(let d=1;d<=dim;d++){
    const ds=mKey+'-'+String(d).padStart(2,'0');
    const att=myAttendance.find(a=>a.date===ds);
    const isOff=!isWorkDay(ds);
    const isTd=ds===today, isFut=ds>today;
    let cls='cal-d ';
    if(att)cls+='present';
    else if(isOff||isFut)cls+='off';
    else cls+='absent';
    const lateMin=parseInt(att?.lateMinutes)||0;
    const tip=att?`${ds}\n${att.checkInStr||''}${att.checkOutStr?' → '+att.checkOutStr:''}${lateMin?'\nمتأخر '+lateMin+'د':''}`:`${ds}`;
    html+=`<div class="${cls}${isTd?' today':''}" title="${tip}">${d}${lateMin>0?'<span class="late">⏰</span>':''}</div>`;
  }
  const present=myAttendance.filter(a=>(a.date||'').startsWith(mKey));
  const lateMins=present.reduce((s,a)=>s+(parseInt(a.lateMinutes)||0),0);
  const lateDays=present.filter(a=>(parseInt(a.lateMinutes)||0)>0).length;

  el.innerHTML=`
    <div class="section" style="margin-bottom:14px">
      <div class="section-head" style="margin-bottom:10px">
        <div class="section-title">📅 حضور ${MONTHS[now.getMonth()]}</div>
        <span style="font-size:11px;color:var(--dim2)">${present.length} يوم</span>
      </div>
      <div class="cal">${html}</div>
      <div style="display:flex;gap:14px;margin-top:10px;font-size:10px;flex-wrap:wrap;color:var(--dim2)">
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:rgba(0,217,126,.18);margin-left:4px"></span>حضر</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:rgba(255,61,110,.10);margin-left:4px"></span>غياب</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:var(--bg3);margin-left:4px"></span>عطلة/مستقبل</span>
        <span>⏰ تأخير</span>
      </div>
    </div>
    ${lateMins>0?`<div class="list-row warning">
      <div class="bd-icon" style="--bdc:var(--y)">⏰</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:800;margin-bottom:2px">دقائق التأخير هذا الشهر</div>
        <div style="font-size:11px;color:var(--dim2)">${lateMins} دقيقة موزّعة على ${lateDays} يوم — يخصم ${Math.min(7,Math.floor(lateMins/60))} نقطة من تقييم الحضور</div>
      </div>
    </div>`:`<div class="list-row success">
      <div class="bd-icon" style="--bdc:var(--g)">✨</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:800;margin-bottom:2px">صفر تأخير هذا الشهر</div>
        <div style="font-size:11px;color:var(--dim2)">ممتاز! استمر بنفس الالتزام واحصل على بدل الحضور الكامل في نهاية الشهر</div>
      </div>
    </div>`}
    ${me.workSchedule?`<div class="list-row" style="margin-top:10px">
      <div class="bd-icon">🕐</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:800;margin-bottom:2px">جدول عملك</div>
        <div style="font-size:11px;color:var(--dim2)">بداية ${me.workSchedule.startTime||'—'} · نهاية ${me.workSchedule.endTime||'—'} · ${me.workSchedule.days?.length||0} أيام/أسبوع</div>
      </div>
    </div>`:''}`;
}

function renderSalaryTab(){
  const el=document.getElementById('sal-section');if(!el)return;
  const mKey=monthKey();
  const cur=calcScoreFor(mKey);
  const baseS=parseFloat(me.baseSalary)||0;
  const mPays=myPayments.filter(p=>p.month===mKey);
  const paidThisMonth=mPays.reduce((s,p)=>s+(p.isDeduction?-(parseFloat(p.amount)||0):(parseFloat(p.amount)||0)),0);

  // Compute suggested for THIS month, mirroring profile logic
  const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  let wDays=0;
  for(let d=1;d<=dim;d++){const ds=mKey+'-'+String(d).padStart(2,'0');if(isWorkDay(ds))wDays++;}
  if(wDays===0)wDays=26;
  const present=myAttendance.filter(a=>(a.date||'').startsWith(mKey));
  const daysAbs=Math.max(0,wDays-present.length);
  const dailyR=baseS/wDays;
  const absDed=Math.round(dailyR*daysAbs);
  let tardDays=0;
  present.forEach(a=>{
    const lm=parseInt(a.lateMinutes)||0;
    if(lm>240)tardDays+=1;
    else if(lm>120)tardDays+=0.5;
    else if(lm>30)tardDays+=0.25;
  });
  const tardDed=Math.round(dailyR*tardDays);
  const expSal=Math.max(0,baseS-absDed-tardDed);

  // Group payments by month
  const byMonth=new Map();
  myPayments.forEach(p=>{const k=p.month||'unknown';if(!byMonth.has(k))byMonth.set(k,[]);byMonth.get(k).push(p);});
  const months=[...byMonth.keys()].sort().reverse();

  el.innerHTML=`
    <!-- This month summary -->
    <div class="section" style="margin-bottom:14px">
      <div class="section-head" style="margin-bottom:10px">
        <div class="section-title">💰 مرتب ${MONTHS[now.getMonth()]} ${now.getFullYear()}</div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:11px;color:var(--dim2)">المرتب الأساسي</span><strong style="color:var(--snow)">${fn(baseS)} ج</strong></div>
        ${absDed>0?`<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:11px;color:var(--dim2)">- خصم غياب (${daysAbs} يوم)</span><strong style="color:var(--r)">${fn(absDed)} ج</strong></div>`:''}
        ${tardDed>0?`<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:11px;color:var(--dim2)">- خصم تأخير (≈${tardDays} يوم)</span><strong style="color:var(--y)">${fn(tardDed)} ج</strong></div>`:''}
        <div style="display:flex;justify-content:space-between;border-top:1px solid var(--line);padding-top:10px;margin-top:6px"><span style="font-size:13px;font-weight:800">المتوقع</span><strong style="color:var(--g);font-size:16px">${fn(expSal)} ج</strong></div>
        ${paidThisMonth!==0?`<div style="display:flex;justify-content:space-between;margin-top:8px"><span style="font-size:11px;color:var(--dim2)">${paidThisMonth>0?'✅ مصروف':'تم خصم'}</span><strong style="color:${paidThisMonth>=0?'var(--g)':'var(--r)'}">${fn(paidThisMonth)} ج</strong></div>`:''}
      </div>
    </div>

    <!-- History -->
    <div class="section">
      <div class="section-head" style="margin-bottom:10px">
        <div class="section-title">📜 سجل المرتبات</div>
        <span style="font-size:10px;color:var(--dim2)">${myPayments.length} عملية</span>
      </div>
      ${months.length===0?`<div class="empty">
        <div class="empty-i">💰</div>
        <div class="empty-t">لا توجد دفعات مسجّلة بعد</div>
        <div class="empty-h">عند صرف أول مرتب لك ستراه هنا مع كامل التفاصيل</div>
      </div>`:months.map(mk=>{
        const pays=byMonth.get(mk).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
        const total=pays.reduce((s,p)=>s+(p.isDeduction?-(parseFloat(p.amount)||0):(parseFloat(p.amount)||0)),0);
        const[y,m]=mk.split('-').map(Number);
        return `<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--dim2);font-weight:700;margin-bottom:6px"><span>${MONTHS[m-1]} ${y}</span><span style="color:var(--g)">${fn(total)} ج</span></div>
          ${pays.map(p=>{
            const lbl=SAL_LBL[p.salaryType]||p.salaryType||'مرتب';
            const col=SAL_COL[p.salaryType]||'var(--dim2)';
            const sign=p.isDeduction?'-':'';
            const dt=p.createdAt?.toDate?.()?.toLocaleDateString('ar-EG',{day:'numeric',month:'short'})||'';
            return`<div class="list-row">
              <div class="bd-icon" style="--bdc:${col}">${p.isDeduction?'⚠️':'💵'}</div>
              <div style="flex:1;min-width:0">
                <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:2px"><span>${lbl}</span><span style="color:${col}">${sign}${fn(parseFloat(p.amount)||0)} ج</span></div>
                ${p.note?`<div style="font-size:10px;color:var(--dim2)">${p.note}</div>`:''}
                <div style="font-size:9px;color:var(--dim);margin-top:2px">${dt} · ${p.walletName||''}${p.tardinessDeduction>0?` · خصم تأخير ${fn(p.tardinessDeduction)} ج`:''}${p.absenceDeduction>0?` · خصم غياب ${fn(p.absenceDeduction)} ج`:''}</div>
              </div>
            </div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>`;
}

// ── Auth + Load ──
onAuthStateChanged(auth,async u=>{
  if(!u){location.href='login.html';return;}
  myAuthUid=u.uid;
  // Load user doc
  try{
    const usnap=await getDoc(doc(db,'users',u.uid));
    if(usnap.exists()){
      const d=usnap.data();
      const role=d.role||'customer_service';
      B2CSidebar.build(d, 'my-profile.html');
      setText('nav-name',d.name||u.email);
      const av=document.getElementById('nav-av');if(av)av.textContent=(d.name||u.email)[0].toUpperCase();
      setText('role-badge',ROLES[role]?.label||role);
    }
  }catch(e){console.warn('users fetch:',e.message);}

  // Find employee record by authUid
  try{
    const eq=query(collection(db,'employees'),where('authUid','==',u.uid));
    const esnap=await getDocs(eq);
    if(esnap.empty){
      document.getElementById('main-content').innerHTML=`<div class="empty"><div class="empty-i">❌</div><div class="empty-t">لم يُعثر على ملف موظف لحسابك</div><div class="empty-h">تواصل مع مديرك لربط حسابك بسجل موظف</div></div>`;
      return;
    }
    const d=esnap.docs[0];
    me={...d.data(),_id:d.id};
    myEmpId=d.id;
  }catch(e){
    document.getElementById('main-content').innerHTML=`<div class="empty"><div class="empty-i">⚠️</div><div class="empty-t">خطأ في التحميل</div><div class="empty-h">${e.message}</div></div>`;
    return;
  }

  // Subscribe to my data
  // Attendance: by employeeUid (covers staff dashboards) AND employeeId (covers profile)
  let __attA=new Map(),__attB=new Map();
  const __mergeA=()=>{
    const m=new Map([...__attA,...__attB]);
    myAttendance=[...m.values()];
    if(me)renderAll();
  };
  onSnapshot(query(collection(db,'attendance'),where('employeeUid','==',myAuthUid)),s=>{
    __attA=new Map(s.docs.map(d=>[d.id,{...d.data(),_id:d.id}]));__mergeA();
  },err=>console.warn('att-uid:',err.message));
  onSnapshot(query(collection(db,'attendance'),where('employeeId','==',myEmpId)),s=>{
    __attB=new Map(s.docs.map(d=>[d.id,{...d.data(),_id:d.id}]));__mergeA();
  },err=>console.warn('att-id:',err.message));

  onSnapshot(query(collection(db,'employee_payments'),where('employeeId','==',myEmpId)),s=>{
    myPayments=s.docs.map(d=>({...d.data(),_id:d.id})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    renderAll();
  },err=>console.warn('pay:',err.message));

  onSnapshot(query(collection(db,'employee_incidents'),where('authUid','==',myAuthUid)),s=>{
    myIncidents=s.docs.map(d=>({...d.data(),_id:d.id})).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    renderAll();
  },err=>console.warn('inc:',err.message));

  onSnapshot(query(collection(db,'employee_evaluations'),where('employeeId','==',myEmpId)),s=>{
    myEvaluations=s.docs.map(d=>({...d.data(),_id:d.id})).sort((a,b)=>(b.month||'').localeCompare(a.month||''));
    renderAll();
  },err=>console.warn('eval:',err.message));

  onSnapshot(query(collection(db,'employee_goals'),where('employeeId','==',myEmpId)),s=>{
    myGoals=s.docs.map(d=>({...d.data(),_id:d.id}));
    renderAll();
  },err=>console.warn('goal:',err.message));

  // Orders relevant to me — for productivity score
  onSnapshot(collection(db,'orders'),s=>{
    const all=s.docs.map(d=>({...d.data(),_id:d.id}));
    const uid=myAuthUid;
    myOrders=all.filter(o=>o.designerId===uid||o.productionAgent===uid||o.shippingOfficerId===uid||o.createdBy===uid||o.designerId===myEmpId||o.productionAgent===myEmpId||o.shippingOfficerId===myEmpId);
    renderAll();
  },err=>console.warn('orders:',err.message));
});
</script>
