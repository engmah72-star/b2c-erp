<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Business2Card — بوابة التصميم</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="stylesheet" href="client-portal.css?v=1">
</head>
<body>

<header class="portal-header">
  <div class="ph-brand">
    <div class="ph-logo">🎨</div>
    <div>
      <div class="ph-name" id="ph-client-name">—</div>
      <div class="ph-code" id="ph-order-code">—</div>
    </div>
  </div>
  <button type="button" class="btn-logout" onclick="doLogout()">خروج ↩</button>
</header>

<div class="portal-tabs">
  <button type="button" class="portal-tab active" id="tab-current" onclick="switchPortalTab('current')">📦 هذا الأوردر</button>
  <button type="button" class="portal-tab" id="tab-library" onclick="switchPortalTab('library')">📚 كل تصاميمي</button>
  <button type="button" class="portal-tab" id="tab-returns" onclick="switchPortalTab('returns')">↩️ طلب مرتجع</button>
</div>

<div class="portal-content" id="portal-content">
  <div class="loading" id="loading-state">⟳ جاري تحميل تصميمك...</div>
</div>

<div class="lb" id="lb" onclick="closeLb()">
  <div class="lb-x" onclick="closeLb()">✕</div>
  <img id="lb-img" src="" alt="" loading="lazy">
</div>

<script type="module">
import { app, db } from "./core/firebase-init.js";
import { collection, query, where, limit, getDocs, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
// Read session
const SESSION_TTL = 7 * 24 * 60 * 60 * 1000;
const session = JSON.parse(localStorage.getItem('clientSession') || 'null');
if (!session?.orderDocId || (session.savedAt && Date.now() - session.savedAt > SESSION_TTL)) {
  localStorage.removeItem('clientSession');
  window.location.href = 'client-login.html';
}

const { orderDocId, orderCode, clientName } = session;
document.getElementById('ph-client-name').textContent = clientName || 'عميل';
document.getElementById('ph-order-code').textContent = orderCode || orderDocId;

window.doLogout = function() {
  localStorage.removeItem('clientSession');
  window.location.href = 'client-login.html';
};

let items = [];
let submittedDecisions = JSON.parse(localStorage.getItem('clientDecisions_' + orderDocId) || '{}');

function saveDecisionLocally(itemId, decision) {
  submittedDecisions[itemId] = decision;
  localStorage.setItem('clientDecisions_' + orderDocId, JSON.stringify(submittedDecisions));
}

function getText(id) { return document.getElementById(id)?.value?.trim() || ''; }

window.openLb = function(url) {
  document.getElementById('lb-img').src = url;
  document.getElementById('lb').classList.add('open');
};
window.closeLb = function() { document.getElementById('lb').classList.remove('open'); };
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLb(); });

window.switchVer = function(itemId, vNum) {
  const item = items.find(i => i._id === itemId); if (!item) return;
  const ver = (item.versions || []).find(v => v.vNum === vNum); if (!ver) return;
  const imgEl = document.getElementById('main-img-' + itemId);
  if (imgEl) imgEl.src = ver.imageUrl;
  document.querySelectorAll(`.ver-thumb[data-item="${itemId}"]`).forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.vnum) === vNum);
  });
};

async function submitDecision(itemId, decision) {
  const comment = getText('comment-' + itemId);
  if (decision === 'revision' && !comment) {
    alert('من فضلك اكتب سبب التعديل المطلوب');
    return;
  }
  try {
    await addDoc(collection(db, 'client_decisions'), {
      orderDocId,
      orderCode,
      itemId,
      decision,
      comment,
      clientName,
      clientPhone: session.phone,
      createdAt: new Date().toISOString(),
      processed: false
    });
    saveDecisionLocally(itemId, { decision, comment, at: new Date().toISOString() });
    renderPortal();
  } catch(e) {
    alert('❌ فشل الإرسال: ' + e.message);
  }
}

window.approveItem = (itemId) => submitDecision(itemId, 'approved');
window.requestRevision = (itemId) => submitDecision(itemId, 'revision');

function itemStatusLabel(item) {
  const local = submittedDecisions[item._id];
  if (item.isPrintReady) return { label: '✅ جاهز للطباعة', cls: 'is-print' };
  if (item.isApproved) return { label: '✅ معتمد', cls: 'is-approved' };
  if (local?.decision === 'approved') return { label: '✓ أرسلت اعتمادك', cls: 'is-approved' };
  if (local?.decision === 'revision') return { label: '⟳ طلبت تعديل', cls: 'is-revision' };
  if (item.status === 'revision_requested') return { label: '🔄 قيد التعديل', cls: 'is-revision' };
  if ((item.versions || []).length === 0) return { label: '⏳ قيد التصميم', cls: 'is-pending' };
  return { label: '👁 في انتظار رأيك', cls: 'is-pending' };
}

function renderPortal() {
  const content = document.getElementById('portal-content');
  const approved = items.filter(i => i.isApproved || submittedDecisions[i._id]?.decision === 'approved').length;
  const pct = items.length ? Math.round(approved / items.length * 100) : 0;

  let html = `
    <div class="order-banner">
      <div class="ob-left">
        <h2>مرحباً ${clientName} 👋</h2>
        <p>تصميمك تحت الإنجاز — راجع كل بند واعتمده أو اطلب تعديل</p>
      </div>
      <div>
        <div style="font-size:var(--fs-sm);color:var(--dim2);margin-bottom:4px;text-align:left">${approved} من ${items.length} معتمدة</div>
        <div class="progress-bar" style="width:160px"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="font-size:var(--fs-base);font-weight:var(--fw-extra);color:var(--p);margin-top:4px;text-align:left">${pct}%</div>
      </div>
    </div>`;

  if (!items.length) {
    html += `<div style="text-align:center;padding:40px;color:var(--dim2)">⏳ المصمم يعمل على تصميمك — ستظهر البنود هنا عند رفع التصميم</div>`;
  } else {
    html += `<div class="section-title">📦 بنود أوردرك (${items.length})</div>`;
    items.forEach(item => {
      const versions = item.versions || [];
      const latestVer = versions[versions.length - 1];
      const { label: stLabel, cls: stCls } = itemStatusLabel(item);
      const local = submittedDecisions[item._id];
      const isDone = item.isApproved || item.isPrintReady || local?.decision === 'approved';

      html += `
        <div class="item-card">
          <div class="ic-head">
            <div>
              <div class="ic-name">📦 ${item.itemName}</div>
              <div class="ic-qty">الكمية: ${item.itemQty || 1} قطعة</div>
            </div>
            <span class="item-status ${stCls}">${stLabel}</span>
          </div>
          <div class="ic-body">`;

      if (latestVer) {
        html += `<img id="main-img-${item._id}" class="mockup-img" src="${latestVer.imageUrl}"
          alt="${item.itemName}" loading="lazy" decoding="async" onclick="openLb('${latestVer.imageUrl.replace(/'/g,'%27')}')">`;
        if (versions.length > 1) {
          html += `<div class="ver-strip">`;
          versions.forEach(v => {
            html += `<div style="flex-shrink:0;text-align:center">
              <img class="ver-thumb ${v.vNum===latestVer.vNum?'active':''}"
                data-item="${item._id}" data-vnum="${v.vNum}"
                src="${v.imageUrl}" loading="lazy" decoding="async" alt="v${v.vNum}" onclick="switchVer('${item._id}',${v.vNum})">
              <div class="ver-num">v${v.vNum}</div>
            </div>`;
          });
          html += `</div>`;
        }
      } else {
        html += `<div class="no-mockup">⏳ لم يُرفع التصميم بعد<br><span style="font-size:var(--fs-sm)">المصمم يعمل على هذا البند</span></div>`;
      }

      // Action area
      if (isDone) {
        const msg = item.isPrintReady ? '✅ هذا البند جاهز للطباعة' :
          local?.decision === 'approved' ? '✓ شكراً — تم استلام اعتمادك' :
          '✅ تم اعتماد هذا البند';
        html += `<div class="approved-banner">${msg}</div>`;
      } else if (latestVer) {
        if (local?.decision === 'revision') {
          html += `<div class="decision-done dd-revision">🔄 طلبت تعديل — سيتم العمل عليه قريباً<br>
            <span style="font-size:var(--fs-sm);opacity:.8">ملاحظتك: ${local.comment}</span></div>`;
        } else {
          html += `
            <div class="action-area">
              <div class="action-title">ما رأيك في هذا التصميم؟</div>
              <div class="action-btns">
                <button type="button" class="btn-approve" onclick="approveItem('${item._id}')">✅ اعتمد التصميم</button>
                <button type="button" class="btn-revision" onclick="requestRevision('${item._id}')">✏️ أريد تعديل</button>
              </div>
              <textarea class="inp" id="comment-${item._id}" placeholder="اكتب ملاحظتك أو سبب التعديل المطلوب..."></textarea>
            </div>`;
        }
      }

      html += `</div></div>`;
    });
  }

  content.innerHTML = html;
}

// ── Tab switching ──
let currentTab = 'current';
let allMyItems = [];  // all designs across all my orders
let clientId = session.clientId || '';

window.switchPortalTab = function(tab) {
  currentTab = tab;
  document.getElementById('tab-current').classList.toggle('active', tab === 'current');
  document.getElementById('tab-library').classList.toggle('active', tab === 'library');
  document.getElementById('tab-returns').classList.toggle('active', tab === 'returns');
  if (tab === 'library') renderLibrary();
  else if (tab === 'returns') renderReturnsTab();
  else renderPortal();
};

// ── Library tab — all designs across all my orders ──
function renderLibrary() {
  const content = document.getElementById('portal-content');
  if (!allMyItems.length) {
    content.innerHTML = `<div style="text-align:center;padding:40px;color:var(--dim2)">⏳ جاري تحميل تصاميمك...<br><span style="font-size:var(--fs-sm)">إذا لم تظهر، اطلب من فريقنا ربط حسابك</span></div>`;
    return;
  }
  // Group by order
  const byOrder = {};
  allMyItems.forEach(i => {
    const k = i.orderDocId || '_';
    if (!byOrder[k]) byOrder[k] = { code: i.orderId || k.slice(0,8), items: [] };
    byOrder[k].items.push(i);
  });
  const orders = Object.values(byOrder).sort((a,b) => {
    const aLatest = Math.max(...a.items.map(i => new Date((i.versions||[]).slice(-1)[0]?.uploadedAt || 0).getTime()));
    const bLatest = Math.max(...b.items.map(i => new Date((i.versions||[]).slice(-1)[0]?.uploadedAt || 0).getTime()));
    return bLatest - aLatest;
  });

  const totalDesigns = allMyItems.length;
  const totalApproved = allMyItems.filter(i => i.isApproved).length;

  let html = `
    <div class="order-banner">
      <div class="ob-left">
        <h2>📚 مكتبة تصاميمك</h2>
        <p>كل التصاميم اللي عملناها معاك في كل الأوردرات السابقة والحالية</p>
      </div>
      <div class="text-left">
        <div style="font-size:var(--fs-sm);color:var(--dim2);margin-bottom:2px">${totalDesigns} تصميم · ${totalApproved} معتمد</div>
        <div style="font-size:var(--fs-3xl);font-weight:var(--fw-heavy);color:var(--p)">${orders.length}</div>
        <div class="txt-meta-xs">أوردر</div>
      </div>
    </div>
  `;

  orders.forEach(o => {
    html += `<div class="section-title" style="margin-top:18px">📦 أوردر #${o.code} · ${o.items.length} بند</div>`;
    html += `<div class="lib-grid">`;
    o.items.forEach(item => {
      const v = (item.versions || []).slice().sort((a,b)=>(b.vNum||0)-(a.vNum||0))[0];
      const f = v?.files || {};
      const thumb = f.mockup?.url || v?.imageUrl || '';
      const verCount = (item.versions || []).length;
      const status = item.isPrintReady ? '✅ مطبوع' : item.isApproved ? '✅ معتمد' : (verCount ? '⏳ قيد العمل' : '⏳ لم يبدأ');
      html += `<div class="lib-card" onclick="${thumb?`openLb('${thumb.replace(/'/g,'%27')}')`:''}">
        <div class="lib-img">
          ${thumb ? `<img src="${thumb}" alt="" loading="lazy">` : `<div class="lib-empty">🎨</div>`}
          <span class="lib-status">${status}</span>
          ${verCount?`<span class="lib-vpill">v${v?.vNum||'?'} · ${verCount} نسخة</span>`:''}
        </div>
        <div class="lib-body">
          <div class="lib-name">${item.itemName || '—'}</div>
          <div class="lib-meta">الكمية ${item.itemQty || 1}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  content.innerHTML = html;
}

// Load design_items for THIS order (RULE G3 — single order rarely exceeds 50 items)
onSnapshot(
  query(collection(db, 'design_items'), where('orderDocId', '==', orderDocId), limit(200)),
  snap => {
    items = snap.docs.map(d => ({ ...d.data(), _id: d.id }))
      .sort((a, b) => (a.itemIndex || 0) - (b.itemIndex || 0));
    document.getElementById('loading-state')?.remove();
    // Backfill clientId from any item if missing
    if (!clientId && items[0]?.clientId) {
      clientId = items[0].clientId;
      session.clientId = clientId;
      localStorage.setItem('clientSession', JSON.stringify(session));
      subscribeAllMyDesigns();
    }
    if (currentTab === 'current') renderPortal();
  }
);

// Load ALL my designs across all my orders (for the library tab)
function subscribeAllMyDesigns() {
  if (!clientId) return;
  onSnapshot(
    query(collection(db, 'design_items'), where('clientId', '==', clientId), limit(500)),
    snap => {
      allMyItems = snap.docs.map(d => ({ ...d.data(), _id: d.id }))
        .sort((a, b) => {
          const av = (a.versions||[]).slice(-1)[0]?.uploadedAt || '';
          const bv = (b.versions||[]).slice(-1)[0]?.uploadedAt || '';
          return new Date(bv) - new Date(av);
        });
      if (currentTab === 'library') renderLibrary();
    }
  );
}
if (clientId) subscribeAllMyDesigns();

// ══════════════════════════════════════════════════════════════════
// ↩️ Returns tab — client-initiated return request
// ══════════════════════════════════════════════════════════════════
let myReturnTickets = [];

// listen for tickets on this order (rule allows read for client_portal tickets with phone match)
onSnapshot(
  query(collection(db,'returns_tickets'), where('orderId','==',orderDocId), limit(50)),
  snap=>{
    myReturnTickets = snap.docs.map(d=>({...d.data(), _id:d.id}));
    if(currentTab === 'returns') renderReturnsTab();
  },
  err => console.warn('[portal] returns listener:', err.message)
);

const RT_REASON_LABEL = {
  damaged:'🔨 منتج تالف',
  wrong_design:'🎨 تصميم غير مطابق',
  late_delivery:'⏰ تأخر التسليم',
  quality_low:'⭐ جودة ضعيفة',
  wrong_product:'📦 منتج خاطئ',
  customer_changed_mind:'🔄 تغيير رأي',
  other:'📝 سبب آخر',
};

const RT_STATUS_LABEL = {
  requested:'📋 طلب جديد',
  inspecting:'🔍 قيد المراجعة',
  approved:'✅ تمت الموافقة',
  refunded:'💸 تم الاسترداد',
  rejected:'❌ مرفوض',
  replacement_issued:'🔁 صدر بديل',
  cancelled:'🚫 ملغى',
  closed:'📦 منتهي',
};

function escHtml(s){return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderReturnsTab(){
  const content = document.getElementById('portal-content');
  const existing = myReturnTickets.filter(t => !t.isDeleted);
  // الـ tickets المغلقة ما تمنعش طلب جديد (لكن المفتوحة تمنع)
  const blocking = existing.find(t => !['cancelled','closed','rejected'].includes(t.status));

  let html = `
    <div style="padding:var(--space-lg);max-width:560px;margin:0 auto">
      <h2 style="font-size:var(--fs-2xl);margin-bottom:12px">↩️ طلب مرتجع</h2>
      <p style="color:var(--dim2);font-size:var(--fs-md);line-height:var(--lh-relaxed);margin-bottom:16px">
        لو الأوردر فيه مشكلة (تالف، تصميم غير مطابق، تأخر، إلخ)، تقدر تطلب مرتجع وفريقنا
        هيراجع الطلب ويتواصل معاك خلال 24 ساعة.
      </p>
  `;

  // Existing tickets list
  if(existing.length){
    html += `
      <div style="background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.25);border-radius:var(--rad);padding:var(--space-md);margin-bottom:14px">
        <div style="font-size:var(--fs-base);font-weight:var(--fw-extra);color:var(--p);margin-bottom:8px">📋 طلباتك السابقة على هذا الأوردر:</div>
        ${existing.map(t=>{
          const st = RT_STATUS_LABEL[t.status] || t.status;
          const dt = t.requestedAt?.seconds ? new Date(t.requestedAt.seconds*1000).toLocaleDateString('ar-EG') : '';
          return `
            <div style="padding:8px 10px;background:rgba(0,0,0,.2);border-radius:6px;margin-bottom:6px;font-size:var(--fs-base)">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <span><b>${escHtml(t.ticketNo||t._id.slice(-6))}</b> · ${st}</span>
                <span class="txt-meta-xs">${dt}</span>
              </div>
              <div style="font-size:var(--fs-sm);color:var(--dim);margin-top:3px">${escHtml(RT_REASON_LABEL[t.reason]||t.reason||'')}</div>
              ${t.status==='rejected' && t.rejectionReason ? `<div style="font-size:var(--fs-sm);color:var(--r);margin-top:4px">سبب الرفض: ${escHtml(t.rejectionReason)}</div>` : ''}
              ${t.status==='refunded' && t.refundAmount>0 ? `<div style="font-size:var(--fs-sm);color:var(--g);margin-top:4px">✅ مبلغ مسترد: ${t.refundAmount} ج</div>` : ''}
            </div>`;
        }).join('')}
      </div>
    `;
  }

  // Block new requests if there's an active ticket
  if(blocking){
    html += `
      <div style="background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.3);border-radius:var(--rad);padding:14px;color:var(--y);font-size:var(--fs-md);line-height:var(--lh-relaxed)">
        ⚠️ لديك طلب مرتجع نشط (${escHtml(blocking.ticketNo||'')}). انتظر مراجعته قبل تقديم طلب جديد.
        لو محتاج تواصل عاجل، كلّم خدمة العملاء.
      </div>
    </div>`;
    content.innerHTML = html;
    return;
  }

  // New request form
  html += `
      <div style="background:var(--row-hover);border:1px solid var(--line);border-radius:var(--rad);padding:14px">
        <div style="font-size:var(--fs-md);font-weight:var(--fw-extra);margin-bottom:10px">📝 طلب مرتجع جديد</div>

        <label style="display:block;font-size:var(--fs-sm);color:var(--dim2);margin-bottom:4px">السبب *</label>
        <select id="rt-reason" style="width:100%;padding:10px;background:rgba(0,0,0,.3);border:1px solid var(--line2);border-radius:8px;color:var(--snow);font-family:inherit;font-size:var(--fs-md);margin-bottom:10px">
          <option value="">— اختر السبب —</option>
          <option value="damaged">🔨 منتج تالف</option>
          <option value="wrong_design">🎨 تصميم غير مطابق</option>
          <option value="late_delivery">⏰ تأخر التسليم</option>
          <option value="quality_low">⭐ جودة ضعيفة</option>
          <option value="wrong_product">📦 منتج خاطئ</option>
          <option value="customer_changed_mind">🔄 تغيير رأي</option>
          <option value="other">📝 سبب آخر</option>
        </select>

        <label style="display:block;font-size:var(--fs-sm);color:var(--dim2);margin-bottom:4px">تفاصيل المشكلة (اختياري)</label>
        <textarea id="rt-details" rows="4" placeholder="اشرح المشكلة بالتفصيل — يساعدنا في معالجة طلبك بسرعة" style="width:100%;padding:10px;background:rgba(0,0,0,.3);border:1px solid var(--line2);border-radius:8px;color:var(--snow);font-family:inherit;font-size:var(--fs-md);resize:vertical;margin-bottom:12px"></textarea>

        <button type="button" onclick="submitClientReturn()" id="rt-submit-btn" style="width:100%;padding:var(--space-md);background:linear-gradient(135deg,var(--p),var(--b));border:none;border-radius:8px;color:#fff;font-family:inherit;font-size:var(--fs-lg);font-weight:var(--fw-extra);cursor:pointer">
          📤 إرسال طلب المرتجع
        </button>

        <div style="font-size:var(--fs-sm);color:var(--dim2);margin-top:10px;line-height:1.6;text-align:center">
          سيتم مراجعة طلبك خلال 24 ساعة وسنتواصل معك على رقم التليفون المسجّل.
        </div>
      </div>
    </div>`;
  content.innerHTML = html;
}

window.submitClientReturn = async function(){
  const reason = document.getElementById('rt-reason').value;
  if(!reason){ alert('⚠️ اختر سبب المرتجع'); return; }
  const details = document.getElementById('rt-details').value.trim();
  const btn = document.getElementById('rt-submit-btn');
  btn.disabled = true;
  btn.textContent = '⏳ جاري الإرسال...';
  try{
    // makeTicketNo logic مطابق لـ returns-core.js لكن inline (مستقل عن Firebase auth)
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth()+1).padStart(2,'0');
    const dd = String(now.getDate()).padStart(2,'0');
    // sequential-ish: hex من الـ timestamp + random
    const tail = (Date.now().toString(36) + Math.random().toString(36).slice(2,5)).slice(-6).toUpperCase();
    const ticketNo = `RT-${yyyy}${mm}${dd}-${tail}`;

    const slaInspectDeadline = new Date(now);
    slaInspectDeadline.setHours(slaInspectDeadline.getHours() + 24);

    await addDoc(collection(db, 'returns_tickets'), {
      ticketNo,
      tenantId:        'merchant_001',
      orderId:         orderDocId,
      orderRef:        orderCode || orderDocId.slice(-6),
      productIds:      [],
      returnType:      'full',
      clientId:        clientId || '',
      clientName:      clientName || '',
      clientPhone:     session.phone,
      reason,
      reasonDetails:   details,
      evidenceUrls:    [],
      blamedParty:     'unknown',
      status:          'requested',
      requestedBy:     'client_portal',
      requestedByName: clientName || '',
      requestedAt:     now.toISOString(),
      slaInspectDeadline: slaInspectDeadline.toISOString(),
      slaBreached:     false,
      decision:        null,
      refundAmount:    0,
      refundDest:      null,
      refundWalletId:  null,
      createdAt:       now.toISOString(),
      createdBy:       'client_portal',
      updatedAt:       now.toISOString(),
      isDeleted:       false,
      editHistory:     [],
      timeline:        [{ action:'🆕 طلب مرتجع من العميل', date: now.toISOString(), by: 'client_portal', byName: clientName || '', note: details }],
    });
    alert('✅ تم إرسال طلبك بنجاح! رقم الطلب: ' + ticketNo + '\n\nسيتواصل معك فريقنا خلال 24 ساعة.');
    // sleep a beat لـ snapshot يُحدِّث
    setTimeout(()=>renderReturnsTab(), 400);
  }catch(e){
    console.error('[portal] return submit:', e);
    alert('❌ حصل خطأ — تواصل مع خدمة العملاء: ' + e.message);
  }finally{
    btn.disabled = false;
    btn.textContent = '📤 إرسال طلب المرتجع';
  }
};
</script>
</body>
</html>
