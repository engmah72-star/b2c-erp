<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Business2Card — بوابة التصميم</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" href="icon-192.png" type="image/png">
<style>
:root{--bg:#0a0a18;--bg2:#10101f;--bg3:#17172d;--bg4:#1e1e38;
  --text:#e8e8f5;--dim2:#7878a0;--p:#a78bfa;--b:#3b9aff;--g:#00d97e;
  --r:#ff3d6e;--y:#f0a020;--line:rgba(255,255,255,.08);--rad:10px;--rad2:16px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.portal-header{background:var(--bg2);border-bottom:1px solid var(--line);padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.ph-brand{display:flex;align-items:center;gap:10px;}
.ph-logo{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--p),var(--b));
  display:flex;align-items:center;justify-content:center;font-size:18px;}
.ph-name{font-size:15px;font-weight:800;}
.ph-code{font-size:11px;color:var(--dim2);margin-top:1px;}
.btn-logout{padding:6px 14px;border-radius:20px;border:1px solid var(--line);
  background:transparent;color:var(--dim2);font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-logout:hover{border-color:var(--r);color:var(--r);}
.portal-content{max-width:720px;margin:0 auto;padding:24px 16px 60px;}
.order-banner{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);
  padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.ob-left h2{font-size:18px;font-weight:800;margin-bottom:4px;}
.ob-left p{font-size:12px;color:var(--dim2);}
.status-badge{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:800;}
.sb-progress{background:rgba(59,158,255,.15);color:var(--b);border:1px solid rgba(59,158,255,.3);}
.sb-done{background:rgba(0,217,126,.15);color:var(--g);border:1px solid rgba(0,217,126,.3);}
.sb-revision{background:rgba(240,160,32,.15);color:var(--y);border:1px solid rgba(240,160,32,.3);}
.section-title{font-size:13px;font-weight:800;color:var(--dim2);margin-bottom:14px;
  display:flex;align-items:center;gap:6px;}
.item-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);
  margin-bottom:16px;overflow:hidden;}
.ic-head{padding:14px 16px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;}
.ic-name{font-size:14px;font-weight:800;}
.ic-qty{font-size:11px;color:var(--dim2);}
.item-status{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:800;}
.is-pending{background:rgba(59,158,255,.15);color:var(--b);}
.is-approved{background:rgba(0,217,126,.15);color:var(--g);}
.is-revision{background:rgba(240,160,32,.15);color:var(--y);}
.is-print{background:rgba(167,139,250,.15);color:var(--p);}
.ic-body{padding:14px 16px;}
.mockup-img{width:100%;border-radius:var(--rad);cursor:zoom-in;display:block;
  max-height:340px;object-fit:contain;background:var(--bg3);margin-bottom:12px;}
.no-mockup{background:var(--bg3);border-radius:var(--rad);padding:32px;
  text-align:center;color:var(--dim2);font-size:13px;margin-bottom:12px;}
.ver-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;}
.ver-thumb{width:60px;height:60px;border-radius:8px;object-fit:cover;cursor:pointer;
  border:2px solid transparent;flex-shrink:0;transition:all .2s;}
.ver-thumb.active{border-color:var(--p);}
.ver-num{font-size:10px;color:var(--dim2);text-align:center;margin-top:3px;}
.action-area{background:var(--bg3);border-radius:var(--rad);padding:14px;}
.action-title{font-size:12px;font-weight:700;color:var(--dim2);margin-bottom:10px;}
.action-btns{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.btn-approve{padding:10px 18px;background:rgba(0,217,126,.15);border:1px solid rgba(0,217,126,.4);
  color:var(--g);border-radius:var(--rad);font-size:13px;font-weight:800;cursor:pointer;
  font-family:inherit;transition:all .2s;flex:1;}
.btn-approve:hover{background:rgba(0,217,126,.25);}
.btn-approve:disabled{opacity:.5;cursor:not-allowed;}
.btn-revision{padding:10px 18px;background:rgba(240,160,32,.12);border:1px solid rgba(240,160,32,.3);
  color:var(--y);border-radius:var(--rad);font-size:13px;font-weight:800;cursor:pointer;
  font-family:inherit;transition:all .2s;flex:1;}
.btn-revision:hover{background:rgba(240,160,32,.22);}
.btn-revision:disabled{opacity:.5;cursor:not-allowed;}
textarea.inp{width:100%;padding:10px 12px;background:var(--bg4);border:1px solid var(--line);
  border-radius:var(--rad);color:var(--text);font-family:inherit;font-size:13px;
  resize:vertical;min-height:70px;outline:none;transition:border-color .2s;}
textarea.inp:focus{border-color:var(--p);}
textarea.inp::placeholder{color:var(--dim2);}
.decision-done{padding:10px 14px;border-radius:var(--rad);font-size:13px;font-weight:700;margin-top:6px;}
.dd-approve{background:rgba(0,217,126,.1);color:var(--g);}
.dd-revision{background:rgba(240,160,32,.1);color:var(--y);}
.approved-banner{background:rgba(0,217,126,.06);border:1px solid rgba(0,217,126,.2);
  border-radius:var(--rad);padding:10px 14px;font-size:12px;color:var(--g);font-weight:700;}
.progress-bar{background:var(--bg3);border-radius:20px;height:8px;margin-top:8px;overflow:hidden;}
.progress-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--p),var(--b));transition:width .5s;}
.loading{text-align:center;padding:60px 20px;color:var(--dim2);}
/* Lightbox */
.lb{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);
  align-items:center;justify-content:center;padding:16px;}
.lb.open{display:flex;}
.lb img{max-width:95vw;max-height:95vh;border-radius:var(--rad2);}
.lb-x{position:fixed;top:16px;left:16px;width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>

<header class="portal-header">
  <div class="ph-brand">
    <div class="ph-logo">🎨</div>
    <div>
      <div class="ph-name" id="ph-client-name">—</div>
      <div class="ph-code" id="ph-order-code">—</div>
    </div>
  </div>
  <button class="btn-logout" onclick="doLogout()">خروج ↩</button>
</header>

<div class="portal-content" id="portal-content">
  <div class="loading" id="loading-state">⟳ جاري تحميل تصميمك...</div>
</div>

<div class="lb" id="lb" onclick="closeLb()">
  <div class="lb-x" onclick="closeLb()">✕</div>
  <img id="lb-img" src="" alt="">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",
  authDomain:"business2card-c041b.firebaseapp.com",
  projectId:"business2card-c041b",
  storageBucket:"business2card-c041b.firebasestorage.app",
  messagingSenderId:"235622448899",
  appId:"1:235622448899:web:d8652ff71082f7d003f336"
});
const db = getFirestore(app);

// Read session
const SESSION_TTL = 7 * 24 * 60 * 60 * 1000;
const session = JSON.parse(localStorage.getItem('clientSession') || 'null');
if (!session?.orderDocId || (session.savedAt && Date.now() - session.savedAt > SESSION_TTL)) {
  localStorage.removeItem('clientSession');
  window.location.href = 'client-login.html';
}

const { orderDocId, orderCode, clientName } = session;
document.getElementById('ph-client-name').textContent = clientName || 'عميل';
document.getElementById('ph-order-code').textContent = orderCode || orderDocId;

window.doLogout = function() {
  localStorage.removeItem('clientSession');
  window.location.href = 'client-login.html';
};

let items = [];
let submittedDecisions = JSON.parse(localStorage.getItem('clientDecisions_' + orderDocId) || '{}');

function saveDecisionLocally(itemId, decision) {
  submittedDecisions[itemId] = decision;
  localStorage.setItem('clientDecisions_' + orderDocId, JSON.stringify(submittedDecisions));
}

function getText(id) { return document.getElementById(id)?.value?.trim() || ''; }

window.openLb = function(url) {
  document.getElementById('lb-img').src = url;
  document.getElementById('lb').classList.add('open');
};
window.closeLb = function() { document.getElementById('lb').classList.remove('open'); };
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLb(); });

window.switchVer = function(itemId, vNum) {
  const item = items.find(i => i._id === itemId); if (!item) return;
  const ver = (item.versions || []).find(v => v.vNum === vNum); if (!ver) return;
  const imgEl = document.getElementById('main-img-' + itemId);
  if (imgEl) imgEl.src = ver.imageUrl;
  document.querySelectorAll(`.ver-thumb[data-item="${itemId}"]`).forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.vnum) === vNum);
  });
};

async function submitDecision(itemId, decision) {
  const comment = getText('comment-' + itemId);
  if (decision === 'revision' && !comment) {
    alert('من فضلك اكتب سبب التعديل المطلوب');
    return;
  }
  try {
    await addDoc(collection(db, 'client_decisions'), {
      orderDocId,
      orderCode,
      itemId,
      decision,
      comment,
      clientName,
      clientPhone: session.phone,
      createdAt: new Date().toISOString(),
      processed: false
    });
    saveDecisionLocally(itemId, { decision, comment, at: new Date().toISOString() });
    renderPortal();
  } catch(e) {
    alert('❌ فشل الإرسال: ' + e.message);
  }
}

window.approveItem = (itemId) => submitDecision(itemId, 'approved');
window.requestRevision = (itemId) => submitDecision(itemId, 'revision');

function itemStatusLabel(item) {
  const local = submittedDecisions[item._id];
  if (item.isPrintReady) return { label: '✅ جاهز للطباعة', cls: 'is-print' };
  if (item.isApproved) return { label: '✅ معتمد', cls: 'is-approved' };
  if (local?.decision === 'approved') return { label: '✓ أرسلت اعتمادك', cls: 'is-approved' };
  if (local?.decision === 'revision') return { label: '⟳ طلبت تعديل', cls: 'is-revision' };
  if (item.status === 'revision_requested') return { label: '🔄 قيد التعديل', cls: 'is-revision' };
  if ((item.versions || []).length === 0) return { label: '⏳ قيد التصميم', cls: 'is-pending' };
  return { label: '👁 في انتظار رأيك', cls: 'is-pending' };
}

function renderPortal() {
  const content = document.getElementById('portal-content');
  const approved = items.filter(i => i.isApproved || submittedDecisions[i._id]?.decision === 'approved').length;
  const pct = items.length ? Math.round(approved / items.length * 100) : 0;

  let html = `
    <div class="order-banner">
      <div class="ob-left">
        <h2>مرحباً ${clientName} 👋</h2>
        <p>تصميمك تحت الإنجاز — راجع كل بند واعتمده أو اطلب تعديل</p>
      </div>
      <div>
        <div style="font-size:11px;color:var(--dim2);margin-bottom:4px;text-align:left">${approved} من ${items.length} معتمدة</div>
        <div class="progress-bar" style="width:160px"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="font-size:12px;font-weight:800;color:var(--p);margin-top:4px;text-align:left">${pct}%</div>
      </div>
    </div>`;

  if (!items.length) {
    html += `<div style="text-align:center;padding:40px;color:var(--dim2)">⏳ المصمم يعمل على تصميمك — ستظهر البنود هنا عند رفع التصميم</div>`;
  } else {
    html += `<div class="section-title">📦 بنود أوردرك (${items.length})</div>`;
    items.forEach(item => {
      const versions = item.versions || [];
      const latestVer = versions[versions.length - 1];
      const { label: stLabel, cls: stCls } = itemStatusLabel(item);
      const local = submittedDecisions[item._id];
      const isDone = item.isApproved || item.isPrintReady || local?.decision === 'approved';

      html += `
        <div class="item-card">
          <div class="ic-head">
            <div>
              <div class="ic-name">📦 ${item.itemName}</div>
              <div class="ic-qty">الكمية: ${item.itemQty || 1} قطعة</div>
            </div>
            <span class="item-status ${stCls}">${stLabel}</span>
          </div>
          <div class="ic-body">`;

      if (latestVer) {
        html += `<img id="main-img-${item._id}" class="mockup-img" src="${latestVer.imageUrl}"
          alt="${item.itemName}" onclick="openLb('${latestVer.imageUrl.replace(/'/g,'%27')}')">`;
        if (versions.length > 1) {
          html += `<div class="ver-strip">`;
          versions.forEach(v => {
            html += `<div style="flex-shrink:0;text-align:center">
              <img class="ver-thumb ${v.vNum===latestVer.vNum?'active':''}"
                data-item="${item._id}" data-vnum="${v.vNum}"
                src="${v.imageUrl}" onclick="switchVer('${item._id}',${v.vNum})">
              <div class="ver-num">v${v.vNum}</div>
            </div>`;
          });
          html += `</div>`;
        }
      } else {
        html += `<div class="no-mockup">⏳ لم يُرفع التصميم بعد<br><span style="font-size:11px">المصمم يعمل على هذا البند</span></div>`;
      }

      // Action area
      if (isDone) {
        const msg = item.isPrintReady ? '✅ هذا البند جاهز للطباعة' :
          local?.decision === 'approved' ? '✓ شكراً — تم استلام اعتمادك' :
          '✅ تم اعتماد هذا البند';
        html += `<div class="approved-banner">${msg}</div>`;
      } else if (latestVer) {
        if (local?.decision === 'revision') {
          html += `<div class="decision-done dd-revision">🔄 طلبت تعديل — سيتم العمل عليه قريباً<br>
            <span style="font-size:11px;opacity:.8">ملاحظتك: ${local.comment}</span></div>`;
        } else {
          html += `
            <div class="action-area">
              <div class="action-title">ما رأيك في هذا التصميم؟</div>
              <div class="action-btns">
                <button class="btn-approve" onclick="approveItem('${item._id}')">✅ اعتمد التصميم</button>
                <button class="btn-revision" onclick="requestRevision('${item._id}')">✏️ أريد تعديل</button>
              </div>
              <textarea class="inp" id="comment-${item._id}" placeholder="اكتب ملاحظتك أو سبب التعديل المطلوب..."></textarea>
            </div>`;
        }
      }

      html += `</div></div>`;
    });
  }

  content.innerHTML = html;
}

// Load design_items for this order
onSnapshot(
  query(collection(db, 'design_items'), where('orderDocId', '==', orderDocId)),
  snap => {
    items = snap.docs.map(d => ({ ...d.data(), _id: d.id }))
      .sort((a, b) => (a.itemIndex || 0) - (b.itemIndex || 0));
    document.getElementById('loading-state')?.remove();
    renderPortal();
  }
);
</script>
</body>
</html>
