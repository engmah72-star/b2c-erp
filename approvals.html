<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<title>الاعتمادات المالية — Business2Card</title>
<link rel="stylesheet" href="shared.css?v=55">
<style>
  .tabs-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:8px}
  .tab{padding:8px 14px;border-radius:var(--rad);border:1px solid transparent;background:transparent;color:var(--dim2);cursor:pointer;font-weight:700;font-size:12px;font-family:inherit;display:flex;align-items:center;gap:6px;white-space:nowrap}
  .tab.on{background:var(--bg3);color:var(--snow);border-color:var(--line)}
  .tab .badge{background:var(--p);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:800;min-width:18px;text-align:center}
  .tab.on.requested .badge{background:#a78bfa}
  .tab.on.awaiting_receipt .badge{background:#3b9eff}
  .tab.on.pending .badge{background:#ffaa00}
  .tab.on.confirmed .badge{background:#3b9eff}
  .tab.on.approved .badge{background:#00d97e}
  .tab.on.rejected .badge{background:#ff3d6e}

  .dir-toggle{display:flex;gap:4px;margin-bottom:10px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad);padding:4px;width:fit-content}
  .dir-btn{padding:5px 14px;border-radius:6px;border:none;background:transparent;color:var(--dim2);cursor:pointer;font-weight:700;font-size:11px;font-family:inherit}
  .dir-btn.on{background:var(--bg3);color:var(--snow)}

  .approval-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;margin-bottom:10px;transition:all .15s}
  .approval-card:hover{border-color:var(--line2)}
  .ac-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .ac-title{font-weight:900;font-size:14px;color:var(--snow);margin-bottom:4px}
  .ac-meta{font-size:11px;color:var(--dim2)}
  .ac-amount{font-size:20px;font-weight:900;text-align:left}
  .ac-amount.in{color:var(--g)}
  .ac-amount.out{color:var(--r)}
  .ac-body{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
  .ac-field{font-size:11px;color:var(--dim2)}
  .ac-field b{color:var(--snow);display:block;margin-top:2px;font-size:12px}
  .ac-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .ac-actions button{flex:1;min-width:120px;padding:9px 14px;border-radius:8px;border:1px solid;font-weight:800;font-size:12px;cursor:pointer;font-family:inherit}
  .btn-execute{background:rgba(167,139,250,.15);color:#a78bfa;border-color:rgba(167,139,250,.4)}
  .btn-receive{background:rgba(59,158,255,.15);color:#3b9eff;border-color:rgba(59,158,255,.4)}
  .btn-confirm{background:rgba(59,158,255,.15);color:#3b9eff;border-color:rgba(59,158,255,.4)}
  .btn-approve{background:rgba(0,217,126,.15);color:#00d97e;border-color:rgba(0,217,126,.4)}
  .btn-reject{background:rgba(255,61,110,.1);color:#ff3d6e;border-color:rgba(255,61,110,.3)}
  .ac-status{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:14px;font-size:10px;font-weight:800;margin-top:4px}
  .st-requested{background:rgba(167,139,250,.15);color:#a78bfa}
  .st-awaiting_receipt{background:rgba(59,158,255,.15);color:#3b9eff}
  .st-pending{background:rgba(255,170,0,.15);color:#ffaa00}
  .st-confirmed{background:rgba(59,158,255,.15);color:#3b9eff}
  .st-approved{background:rgba(0,217,126,.15);color:#00d97e}
  .st-rejected{background:rgba(255,61,110,.15);color:#ff3d6e}
  .ac-trail{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);font-size:10px;color:var(--dim2)}
  .ac-trail span{display:inline-block;margin-left:14px}
  .empty-pl{text-align:center;padding:40px 20px;color:var(--dim2);font-size:13px}

  .req-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
  .req-type-btn{padding:14px 8px;border-radius:10px;border:2px solid var(--line);background:var(--bg3);color:var(--snow);cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s}
  .req-type-btn:hover{border-color:var(--p)}
  .req-type-btn.on{border-color:var(--p);background:rgba(167,139,250,.12)}
  .req-type-ico{font-size:24px}
  .req-type-lbl{font-size:11px;font-weight:800}

  .receipt-img{max-width:240px;max-height:200px;border-radius:8px;border:1px solid var(--line);cursor:zoom-in}
  .receipt-img:hover{border-color:var(--p)}
</style>
<script src="financial-guard.js"></script>
</head>
<body>
<aside class="sidenav" id="sidebar">
  <div class="nav-brand">
    <div class="nav-logo">🎨</div>
    <div>
      <div class="nav-brand-name">Business2Card</div>
      <div class="nav-brand-role" id="nav-role">—</div>
    </div>
  </div>
  <div class="nav-scroll" id="nav-links"></div>
</aside>
<header class="topbar">
  <button class="menu-btn" id="menu-btn">☰</button>
  <div>
    <div class="page-title">🔐 الاعتمادات المالية</div>
    <div class="page-sub">طلب → تنفيذ → استلام → تأكيد → اعتماد</div>
  </div>
  <div style="margin-right:auto;display:flex;align-items:center;gap:10px">
    <button onclick="openNewRequest()" style="padding:8px 14px;border-radius:8px;border:1px solid rgba(167,139,250,.4);background:rgba(167,139,250,.15);color:#a78bfa;cursor:pointer;font-family:inherit;font-size:12px;font-weight:800">➕ طلب جديد</button>
    <span id="nav-name" style="font-size:13px;color:var(--dim2)"></span>
    <button onclick="logoutBtn()" style="padding:7px 12px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);color:var(--snow);cursor:pointer;font-family:inherit;font-size:12px">خروج</button>
  </div>
</header>

<main class="main">
  <div class="container">
    <div class="tabs-bar">
      <button class="tab on requested" id="tab-requested" onclick="setTab('requested')">💸 طلبات للتنفيذ <span class="badge" id="cnt-requested">0</span></button>
      <button class="tab awaiting_receipt" id="tab-awaiting_receipt" onclick="setTab('awaiting_receipt')">📥 بانتظار الاستلام <span class="badge" id="cnt-awaiting_receipt">0</span></button>
      <button class="tab pending" id="tab-pending" onclick="setTab('pending')">⏳ بانتظار التأكيد <span class="badge" id="cnt-pending">0</span></button>
      <button class="tab confirmed" id="tab-confirmed" onclick="setTab('confirmed')">🔵 بانتظار الاعتماد <span class="badge" id="cnt-confirmed">0</span></button>
      <button class="tab approved" id="tab-approved" onclick="setTab('approved')">✅ مؤرشَفة <span class="badge" id="cnt-approved">0</span></button>
      <button class="tab rejected" id="tab-rejected" onclick="setTab('rejected')">❌ مرفوضة <span class="badge" id="cnt-rejected">0</span></button>
    </div>

    <div id="dir-filter-wrap" style="display:none">
      <div class="dir-toggle">
        <button class="dir-btn on" id="dir-all" onclick="setDir('all')">الكل</button>
        <button class="dir-btn" id="dir-in" onclick="setDir('in')">📥 داخل</button>
        <button class="dir-btn" id="dir-out" onclick="setDir('out')">📤 خارج</button>
      </div>
    </div>

    <div id="role-banner" style="background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.25);border-radius:var(--rad);padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--dim);line-height:1.7"></div>

    <div id="list-content"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</main>

<!-- Modal: طلب جديد -->
<div class="overlay" id="ov-new-req">
  <div class="modal" style="max-width:500px">
    <div class="modal-head"><span class="modal-title">➕ طلب جديد</span><button class="modal-x" onclick="cM('new-req')">✕</button></div>
    <div class="modal-body">
      <div style="font-size:11px;color:var(--dim2);margin-bottom:10px">اختر نوع الطلب:</div>
      <div class="req-type-grid" id="rq-type-grid">
        <!-- يُملأ ديناميكياً حسب الدور — راجع openNewRequest -->
      </div>

      <!-- حقول مشتركة -->
      <div class="fg"><label>المبلغ المطلوب (ج) *</label><input class="inp" id="rq-amount" type="number" placeholder="0"></div>

      <!-- حقول المورد -->
      <div id="fg-supplier" class="fg"><label>المورد *</label><select class="inp" id="rq-supplier"><option value="">— اختر —</option></select></div>

      <!-- حقول الموظف (مرتب/سلفة) -->
      <div id="fg-employee" class="fg" style="display:none"><label>الموظف *</label><select class="inp" id="rq-employee"><option value="">— اختر —</option></select></div>
      <div id="fg-salary-type" class="fg" style="display:none"><label>النوع *</label><select class="inp" id="rq-salary-type"><option value="salary">مرتب شهري</option><option value="advance">سلفة</option><option value="bonus">مكافأة</option></select></div>
      <div id="fg-month" class="fg" style="display:none"><label>الشهر</label><input class="inp" id="rq-month" type="month"></div>

      <!-- حقول العميل (استرداد عميل) -->
      <div id="fg-client" class="fg" style="display:none"><label>العميل *</label><select class="inp" id="rq-client"><option value="">— اختر —</option></select></div>

      <!-- ربط الأوردر (اختياري للمورد) -->
      <div id="fg-order" class="fg"><label>الأوردر المرتبط <span style="font-size:10px;color:var(--dim2)">(اختياري — يربط الطلب بأوردر معين)</span></label>
        <select class="inp" id="rq-order"><option value="">— بدون ربط —</option></select>
      </div>
      <div id="rq-order-info" style="display:none;font-size:11px;color:var(--dim2);background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.2);border-radius:8px;padding:8px 10px;margin-bottom:10px"></div>

      <!-- بند تكلفة من الأوردر — auto-fill المورد والمبلغ -->
      <div id="fg-cost-item" class="fg" style="display:none">
        <label>📋 بند التكلفة <span style="font-size:10px;color:var(--g);font-weight:500">— اختر للملء التلقائي</span></label>
        <select class="inp" id="rq-cost-item">
          <option value="">— اختر أو املأ يدوياً —</option>
        </select>
      </div>

      <div class="fg"><label>السبب / الملاحظة *</label><textarea class="inp" id="rq-reason" style="min-height:60px" placeholder="مثال: دفعة مقدم لطباعة 200 كارت — أحمد محمد"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="cM('new-req')">إلغاء</button>
      <button class="btn btn-g" onclick="saveRequest()">💾 إرسال الطلب</button>
    </div>
  </div>
</div>

<!-- Modal: تنفيذ الطلب (المحاسب) -->
<div class="overlay" id="ov-exec">
  <div class="modal" style="max-width:480px">
    <div class="modal-head"><span class="modal-title">💸 تنفيذ الطلب</span><button class="modal-x" onclick="cM('exec')">✕</button></div>
    <div class="modal-body">
      <div id="exec-summary" style="background:var(--bg3);border-radius:8px;padding:10px 12px;font-size:12px;margin-bottom:14px;line-height:1.7"></div>
      <div class="fg"><label>المحفظة المصدر *</label><select class="inp" id="exec-wallet"><option value="">— اختر —</option></select></div>
      <div class="fg"><label>📋 رقم/مرجع التحويل *</label><input class="inp" id="exec-transfer-ref" placeholder="مثال: 7821345 أو TXN-XXXX"></div>
      <div class="fg"><label>ملاحظة التنفيذ (اختياري)</label><input class="inp" id="exec-note" placeholder="مثال: حُوّل عبر فودافون كاش"></div>
      <div id="exec-fee-warn" style="display:none;font-size:11px;color:#ffaa00;background:rgba(255,170,0,.08);padding:8px 10px;border-radius:6px;margin-top:6px"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="cM('exec')">إلغاء</button>
      <button class="btn btn-g" onclick="executeRequest()">✓ تنفيذ التحويل</button>
    </div>
  </div>
</div>

<!-- Modal: استلام (رفع إيصال) -->
<div class="overlay" id="ov-receipt">
  <div class="modal" style="max-width:440px">
    <div class="modal-head"><span class="modal-title">📥 تأكيد الاستلام</span><button class="modal-x" onclick="cM('receipt')">✕</button></div>
    <div class="modal-body">
      <div style="font-size:12px;color:var(--dim);margin-bottom:10px">ارفع صورة الإيصال لتأكيد استلام التحويل من المورد/المستفيد:</div>
      <input type="file" id="receipt-file" accept="image/*" style="width:100%;padding:10px;background:var(--bg3);border:2px dashed var(--line);border-radius:8px;color:var(--snow);font-family:inherit">
      <div id="receipt-preview" style="margin-top:10px;text-align:center"></div>
      <div id="receipt-progress" style="display:none;margin-top:10px;font-size:11px;color:var(--dim2)"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="cM('receipt')">إلغاء</button>
      <button class="btn btn-g" onclick="uploadReceipt()" id="receipt-save-btn">📤 رفع وتأكيد</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, addDoc, onSnapshot, updateDoc, writeBatch, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref as sRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
import { addLedgerToBatch, FE, approvalFields, calcOrderPayment } from "./financial-sync-engine.js";

const app = initializeApp({apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"});
const auth = getAuth(app);
const db   = getFirestore(app);
const storage = getStorage(app);

let currentUid='', currentUserName='', currentRole='', currentPerms={};
let txs = [];
let allTxs = [];
let requests = [];      // payment_requests collection
let activeTab = 'requested';
let activeDir = 'all';
let walletsMap = new Map();
let walletsArr = [];
let ordersMap = new Map();
let suppliers = [];
let employees = [];
let activeReqType = 'supplier_payment';
let executingReq = null;
let receivingReq = null;

const fn = n => (parseFloat(n)||0).toLocaleString('ar-EG');
const ICONS = { client_payment:'💰', refund:'↩️', salary:'👤', bonus:'🎁', deduction:'✂️', printer_payment:'🏭', shipper_payment:'🚚', shipping_cost:'🚚', shipping_settlement:'📦', transfer:'🔄', opening_balance:'🏦', adjustment:'⚖️', expense:'💸' };
const CAT_AR = { client_payment:'دفعة عميل', refund:'استرداد عميل', salary:'راتب', bonus:'مكافأة', deduction:'خصم', printer_payment:'دفعة مطبعة', shipper_payment:'دفعة شركة شحن', shipping_cost:'تكلفة شحن', shipping_settlement:'تسوية شحن', transfer:'تحويل بين محافظ', opening_balance:'رصيد افتتاحي', adjustment:'تسوية رصيد', expense:'مصروف', admin_edit:'تعديل أدمن', transfer_fee:'رسوم تحويل', withdrawal:'سحب', withdrawal_fee:'رسوم سحب' };
const REQ_TYPE_LBL = { supplier_payment:'🏭 دفعة مورد', salary:'👤 مرتب', advance:'💵 سلفة', bonus:'🎁 مكافأة', general:'💸 مصروف عام', client_refund:'↩️ استرداد عميل' };

const ROLE_LABELS = { admin:'مدير عام', operation_manager:'مدير تشغيل', wallet_manager:'محاسب', customer_service:'خدمة عملاء', graphic_designer:'مصمم', design_operator:'مشغل تصميم', production_agent:'مندوب تنفيذ', shipping_officer:'مسؤول شحن' };

const SBPAGES = [
  {f:'index.html',l:'لوحة التحكم',i:'⬡',adminOnly:true},
  {f:'clients.html',l:'العملاء',i:'👤',p:'clients'},
  {f:'design.html',l:'التصميم',i:'✏️',p:'design'},
  {f:'print.html',l:'الطباعة',i:'🖨️',p:'print'},
  {f:'production.html',l:'التنفيذ',i:'🏭',p:'production'},
  {f:'shipping.html',l:'الشحن',i:'🚚',p:'shipping'},
  {f:'shipping-accounts.html',l:'حسابات الشحن',i:'📦',p:'shipping-accounts'},
  {f:'archive.html',l:'الأرشيف',i:'📁',p:'archive'},
  {f:'accounts.html',l:'الحسابات',i:'💰',p:'accounts'},
  {f:'approvals.html',l:'الاعتمادات',i:'🔐',p:'approvals'},
  {f:'suppliers.html',l:'الموردين',i:'▣',p:'suppliers'},
  {f:'reports.html',l:'التقارير',i:'📊',p:'reports'},
  {f:'employees.html',l:'الموظفين',i:'👥',adminOnly:true},
  {f:'settings.html',l:'الإعدادات',i:'⚙️',adminOnly:true},
];

function buildSidebar(){
  const isAdm = ['admin','operation_manager'].includes(currentRole);
  const pages = currentPerms?.pages || [];
  const navEl = document.getElementById('nav-links');
  if(!navEl) return;
  let html = '';
  for(const p of SBPAGES){
    const ok = isAdm || (p.adminOnly ? false : pages.includes('*') || pages.includes(p.p||''));
    if(!ok) continue;
    const active = p.f === 'approvals.html';
    html += `<a class="nav-link${active?' active':''}" href="${p.f}"><span class="nav-ico">${p.i}</span> ${p.l}</a>`;
  }
  navEl.innerHTML = html;
  document.getElementById('nav-role').textContent = ROLE_LABELS[currentRole] || currentRole;
  document.getElementById('nav-name').textContent = currentUserName;
}

document.getElementById('menu-btn')?.addEventListener('click', ()=>{
  document.getElementById('sidebar')?.classList.toggle('open');
});

window.logoutBtn = async function(){
  try{ await signOut(auth); }catch(e){}
  window.location.href = 'login.html';
};

window.cM = function(id){
  document.getElementById('ov-'+id)?.classList.remove('open');
};
window.oM = function(id){
  document.getElementById('ov-'+id)?.classList.add('open');
};

onAuthStateChanged(auth, async u=>{
  if(!u){ window.location.href='login.html'; return; }
  currentUid = u.uid;
  try{
    const userSnap = await getDoc(doc(db,'users',u.uid));
    if(!userSnap.exists()){
      document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#ff3d6e">⛔ بيانات المستخدم غير موجودة</div>';
      return;
    }
    const ud = userSnap.data();
    currentRole = ud.role || '';
    currentUserName = ud.name || u.email || '';
    currentPerms = ud.permissions || {};

    buildSidebar();
    updateRoleBanner();
    startListeners();
  }catch(e){
    console.error('[approvals] init error:', e);
    document.getElementById('list-content').innerHTML = `<div class="empty-pl" style="color:#ff3d6e">⛔ خطأ التحميل: ${e.message}</div>`;
  }
});

function updateRoleBanner(){
  const b = document.getElementById('role-banner');
  if(!b) return;
  const isAdm = currentRole === 'admin';
  const isOps = currentRole === 'operation_manager';
  const types = allowedRequestTypes();
  const typesLbl = types.map(t => REQ_TYPE_LBL[t] || t).join(' · ');
  let txt = `<strong>دورك:</strong> ${ROLE_LABELS[currentRole]||currentRole}`;
  if(isAdm) txt += ' — تستطيع تنفيذ + تأكيد + اعتماد + كل أنواع الطلبات';
  else if(isOps) txt += ' — تستطيع تنفيذ + تأكيد + كل أنواع الطلبات';
  else txt += ` — أنواع طلباتك: ${typesLbl}`;
  b.innerHTML = txt;
}

// التنفيذ: admin أو operation_manager فقط (لا محاسب منفصل)
function canExecute(){
  return ['admin','operation_manager'].includes(currentRole);
}

// أنواع الطلبات المسموحة لكل دور:
// السيناريو: مندوب التنفيذ يضع بند تكلفة في الأوردر، ثم يطلب تسديده للمورد.
// الطلب يُربط بالأوردر + بند التكلفة (auto-fill).
//   • admin/ops: كل الأنواع
//   • production_agent (التنفيذ): دفعة مورد + مرتب — الوحيد المتعامل مع الموردين
//   • customer_service: استرداد عميل + مرتب
//   • أي دور آخر (مصمم/طباعة/شحن/إلخ): مرتب فقط
function allowedRequestTypes(){
  const role = currentRole;
  if(['admin','operation_manager'].includes(role)){
    return ['supplier_payment','client_refund','salary','general'];
  }
  if(role === 'production_agent'){
    return ['supplier_payment','salary'];
  }
  if(role === 'customer_service'){
    return ['client_refund','salary'];
  }
  return ['salary']; // المصمم / البرنت / الشحن / الباقي: مرتب فقط
}

function computeWalletState(t){
  if(t.balanceBefore != null && t.balanceAfter != null){
    return { before: parseFloat(t.balanceBefore)||0, after: parseFloat(t.balanceAfter)||0 };
  }
  if(!t.walletId) return null;
  let after = 0;
  for(const x of allTxs){
    if(x.walletId !== t.walletId) continue;
    const amt = (parseFloat(x.amount)||0);
    const sign = (x.type === 'in' ? 1 : -1);
    after += sign * amt;
    if(x._id === t._id) break;
  }
  const sign = (t.type === 'in' ? 1 : -1);
  const before = after - sign * (parseFloat(t.amount)||0);
  return { before, after };
}

function updateCounts(){
  // counts للـ requests
  const reqCounts = { requested:0, awaiting_receipt:0 };
  requests.forEach(r=>{ if(reqCounts[r.status] !== undefined) reqCounts[r.status]++; });
  // counts للـ tx (المعتمدة + المرفوضة + pending + confirmed)
  const txCounts = { pending:0, confirmed:0, approved:0, rejected:0 };
  txs.forEach(t=>{ if(txCounts[t.approvalStatus] !== undefined) txCounts[t.approvalStatus]++; });
  // الـ requests المرفوضة + المعتمدة تنضم للـ tx counts للأرشيف
  requests.forEach(r=>{
    if(r.status === 'approved') txCounts.approved++;
    if(r.status === 'rejected') txCounts.rejected++;
  });
  ['requested','awaiting_receipt'].forEach(k=>{
    const el = document.getElementById('cnt-'+k);
    if(el) el.textContent = reqCounts[k]||0;
  });
  Object.entries(txCounts).forEach(([k,v])=>{
    const el = document.getElementById('cnt-'+k);
    if(el) el.textContent = v;
  });
}

function render(){
  const el = document.getElementById('list-content');
  if(!el) return;

  if(activeTab === 'requested' || activeTab === 'awaiting_receipt'){
    let filtered = requests.filter(r=>r.status === activeTab);
    // الطالب يرى طلباته فقط في awaiting_receipt (للاستلام)؛ المحاسب يرى الكل في requested
    if(activeTab === 'awaiting_receipt') filtered = filtered.filter(r => r.requestedBy === currentUid);
    if(!filtered.length){
      const msg = activeTab==='requested' ? '✨ لا توجد طلبات للتنفيذ' : '✨ لا توجد طلبات بانتظار استلامك';
      el.innerHTML = `<div class="empty-pl">${msg}</div>`;
      return;
    }
    el.innerHTML = filtered.map(r => renderRequestCard(r)).join('');
    return;
  }

  // تبويبات tx (pending/confirmed/approved/rejected)
  let filtered = txs.filter(t=>t.approvalStatus === activeTab);
  if(activeDir !== 'all') filtered = filtered.filter(t=>t.type === activeDir);

  // أضف الـ requests المعتمدة/المرفوضة لتبويب approved/rejected
  let extraRequests = [];
  if(activeTab === 'approved') extraRequests = requests.filter(r=>r.status==='approved');
  if(activeTab === 'rejected') extraRequests = requests.filter(r=>r.status==='rejected');

  if(!filtered.length && !extraRequests.length){
    const msg = activeTab==='pending' ? '✨ لا توجد عمليات بانتظار التأكيد' :
                activeTab==='confirmed' ? '✨ لا توجد عمليات بانتظار الاعتماد' :
                activeTab==='approved' ? '📁 لا توجد عمليات مؤرشَفة بعد' :
                '✨ لا توجد عمليات مرفوضة';
    el.innerHTML = `<div class="empty-pl">${msg}</div>`;
    return;
  }
  el.innerHTML = [
    ...extraRequests.map(r => renderRequestCard(r)),
    ...filtered.map(t => renderCard(t))
  ].join('');
}

function fmtDate(ts){
  if(!ts) return '—';
  if(ts.seconds) return new Date(ts.seconds*1000).toLocaleString('ar-EG',{dateStyle:'short',timeStyle:'short'});
  if(typeof ts === 'string') return ts;
  return '—';
}

// ══ تاريخ الكيان: كم دفعت له قبل كده + متى ══
function entityHistory(r){
  const hist = { count:0, total:0, recent:[] };
  if(!allTxs?.length) return hist;
  const matches = allTxs.filter(t => {
    if(t._id === r.txId) return false; // استبعد الـtx الحالية
    if(t.isReversal) return false;
    if(r.type === 'supplier_payment' && r.supplierId)
      return t.supplierId === r.supplierId && (t.type === 'out');
    if(r.type === 'salary' && r.employeeId)
      return t.employeeId === r.employeeId && t.category === 'salary';
    if(r.type === 'client_refund' && r.clientId)
      return t.clientId === r.clientId && t.category === 'refund';
    return false;
  });
  hist.count = matches.length;
  hist.total = matches.reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  hist.recent = matches.slice(-5).reverse(); // آخر 5
  return hist;
}

// ══ رصد المخاطر — تنبيهات للأدمن قبل الاعتماد ══
function detectRisks(r){
  const risks = [];
  // مبلغ كبير
  if(r.amount > 10000) risks.push({lvl:'high', txt:`💰 مبلغ كبير: ${fn(r.amount)} ج (> 10,000)`});
  else if(r.amount > 5000) risks.push({lvl:'med', txt:`⚠️ مبلغ متوسط: ${fn(r.amount)} ج (> 5,000)`});
  // طلبات مكررة بنفس المبلغ + المورد + اليوم
  const today = new Date().toDateString();
  const dupes = requests.filter(x => x._id !== r._id
    && x.amount === r.amount
    && x.supplierId === r.supplierId
    && x.employeeId === r.employeeId
    && x.requestedAt?.seconds && new Date(x.requestedAt.seconds*1000).toDateString() === today
    && !['rejected'].includes(x.status));
  if(dupes.length) risks.push({lvl:'high', txt:`🔁 طلب مماثل في نفس اليوم (×${dupes.length}) — تحقق من التكرار`});
  // المورد رُفض له طلب مؤخراً
  if(r.supplierId){
    const recentRej = requests.filter(x => x.supplierId === r.supplierId && x.status === 'rejected'
      && x.rejectedAt?.seconds && (Date.now() - x.rejectedAt.seconds*1000) < 7*24*60*60*1000);
    if(recentRej.length) risks.push({lvl:'med', txt:`⚠️ هذا المورد رُفض له طلب آخر خلال 7 أيام`});
  }
  // الأوردر مؤرشف
  if(r.orderId){
    const o = ordersMap.get(r.orderId);
    if(o && ['archived','cancelled'].includes(o.stage)) risks.push({lvl:'high', txt:`🚫 الأوردر ${o.stage==='archived'?'مؤرشَف':'ملغي'} — تحقق من السبب`});
  }
  // بند التكلفة مدفوع مسبقاً
  if(r.type === 'supplier_payment' && r.costItemIndex !== undefined && r.orderId){
    const o = ordersMap.get(r.orderId);
    if(o?.costItems?.[r.costItemIndex]?.paid){
      risks.push({lvl:'high', txt:`🔴 بند التكلفة المرتبط مدفوع بالفعل (paidTxId: ${o.costItems[r.costItemIndex].paidTxId?.slice(-8)||'—'})`});
    }
  }
  return risks;
}

        <span>${fn(c.total||0)} ج ${c.paid?'<span style="color:#00d97e;font-weight:800">✓ مدفوع</span>':'<span style="color:#ffaa00">⏳ غير مدفوع</span>'}</span>
      </div>`;
    }).join('');
    sectionOrder = `
      <div style="background:rgba(167,139,250,.05);border:1px solid rgba(167,139,250,.18);border-radius:8px;padding:10px 12px;margin-top:8px">
        <div style="font-size:10px;color:var(--dim2);font-weight:800;margin-bottom:6px">📦 الأوردر المرتبط</div>
        <div style="font-size:12px"><b style="font-family:monospace">${escapeHtml(order.orderId||order._id.slice(-8))}</b> — ${escapeHtml(order.clientName||'')}${order.clientPhone?` · <span style="color:var(--dim2);font-family:monospace">${escapeHtml(order.clientPhone)}</span>`:''}</div>
        <div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;font-size:10px">
          <span style="background:${STAGE_COL[order.stage]||'#888'}22;color:${STAGE_COL[order.stage]||'#888'};padding:2px 8px;border-radius:8px;font-weight:800">${STAGE_AR[order.stage]||order.stage}</span>
          <span style="color:var(--dim2)">السعر: <b style="color:var(--snow)">${fn(order.salePrice||0)}</b></span>
          <span style="color:var(--dim2)">المدفوع: <b style="color:#00d97e">${fn(order.totalPaid||order.paid||order.deposit||0)}</b></span>
        </div>
        ${(order.costItems||[]).length?`
          <div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)">
            <div style="font-size:10px;color:var(--dim2);margin-bottom:4px">بنود التكلفة (${(order.costItems||[]).length} بند · مدفوع ${fn(paidCost)}/${fn(totalCost)} ج):</div>
            ${items}
          </div>`:'<div style="font-size:10px;color:var(--dim2);margin-top:4px">لا توجد بنود تكلفة</div>'}
      </div>`;
  }

  // 6. القسم: تنبيهات المخاطر
  const risks = detectRisks(r);
  let sectionRisks = '';
  if(risks.length){
    sectionRisks = `
      <div style="background:rgba(255,61,110,.06);border:1px solid rgba(255,61,110,.3);border-radius:8px;padding:10px 12px;margin-top:8px">
        <div style="font-size:10px;color:#ff3d6e;font-weight:800;margin-bottom:6px">⚠️ تنبيهات (${risks.length})</div>
        ${risks.map(rsk=>`<div style="font-size:11px;color:${rsk.lvl==='high'?'#ff3d6e':'#ffaa00'};margin-top:2px">${rsk.txt}</div>`).join('')}
      </div>`;
  }

  // الأزرار حسب الدور والمرحلة
  let actions = '';
  if(r.status === 'requested' && canExecute()){
    actions = `<button class="btn-execute" onclick="openExecuteModal('${r._id}')">💸 تنفيذ</button>
               <button class="btn-reject" onclick="rejectRequest('${r._id}')">✕ رفض</button>`;
  } else if(r.status === 'awaiting_receipt' && r.requestedBy === currentUid){
    actions = `<button class="btn-receive" onclick="openReceiptModal('${r._id}')">📤 رفع الإيصال + استلام</button>`;
  } else if(r.status === 'awaiting_receipt'){
    actions = `<div style="font-size:11px;color:var(--dim2);padding:8px">⏳ بانتظار رفع الإيصال من ${escapeHtml(r.requestedByName||'الطالب')}</div>`;
  }

  return `
    <div class="approval-card">
      <div class="ac-head">
        <div style="flex:1;min-width:200px">
          <div class="ac-title">${typeLbl} — ${escapeHtml(beneficiary)}</div>
          <div class="ac-status ${stCls}">${stLbl}</div>
        </div>
        <div class="ac-amount out">− ${fn(r.amount)} ج</div>
      </div>
      ${sectionRisks}
      ${sectionRequester}
      ${sectionExec}
      ${sectionReceipt}
      ${sectionEntity}
      ${sectionOrder}
      ${r.rejectedByName?`<div style="background:rgba(255,61,110,.06);border:1px solid rgba(255,61,110,.3);border-radius:8px;padding:8px 12px;margin-top:8px;font-size:11px;color:#ff3d6e">❌ <b>رفض من ${escapeHtml(r.rejectedByName)}</b> · ${fmtDate(r.rejectedAt)}${r.rejectReason?' · '+escapeHtml(r.rejectReason):''}</div>`:''}
      ${actions?`<div class="ac-actions">${actions}</div>`:''}
    </div>
  `;
}

function renderCard(t){
  const cat = CAT_AR[t.category] || t.category || 'حركة';
  const icon = ICONS[t.category] || '📝';
  const wName = t.walletName || walletsMap.get(t.walletId) || t.walletId || '—';
  const isIn = t.type === 'in';
  const entityName = t.clientName || t.supplierName || t.employeeName || '—';

  let order = null;
  if(t.orderId){
    order = ordersMap.get(t.orderId);
    if(!order){
      for(const o of ordersMap.values()){ if(o.orderId === t.orderId){ order = o; break; } }
    }
  }

  let actions = '';
  if(t.approvalStatus === 'pending' && currentRole === 'operation_manager'){
    actions = `<button class="btn-confirm" onclick="confirmTx('${t._id}')">✓ تأكيد</button>
               <button class="btn-reject" onclick="rejectTx('${t._id}')">✕ رفض</button>`;
  } else if(t.approvalStatus === 'pending' && currentRole === 'admin'){
    actions = `<button class="btn-confirm" onclick="confirmTx('${t._id}')">✓ تأكيد</button>
               <button class="btn-approve" onclick="approveTx('${t._id}')">✅ اعتماد مباشر</button>
               <button class="btn-reject" onclick="rejectTx('${t._id}')">✕ رفض</button>`;
  } else if(t.approvalStatus === 'confirmed' && currentRole === 'admin'){
    actions = `<button class="btn-approve" onclick="approveTx('${t._id}')">✅ اعتماد + أرشفة</button>
               <button class="btn-reject" onclick="rejectTx('${t._id}')">✕ رفض</button>`;
  }

  let trail = '';
  if(t.confirmedByName) trail += `<span>🔵 أكّد: <b>${escapeHtml(t.confirmedByName)}</b> · ${fmtDate(t.confirmedAt)}</span>`;
  if(t.approvedByName)  trail += `<span>✅ اعتمد: <b>${escapeHtml(t.approvedByName)}</b> · ${fmtDate(t.approvedAt)}</span>`;
  if(t.rejectedByName)  trail += `<span style="color:#ff3d6e">❌ رفض: <b>${escapeHtml(t.rejectedByName)}</b>${t.rejectReason?' · '+escapeHtml(t.rejectReason):''}</span>`;

  const stCls = 'st-' + t.approvalStatus;
  const stLbl = {pending:'⏳ بانتظار التأكيد', confirmed:'🔵 مؤكَّدة', approved:'🔒 معتمدة', rejected:'❌ مرفوضة'}[t.approvalStatus] || t.approvalStatus;

  return `
    <div class="approval-card">
      <div class="ac-head">
        <div style="flex:1;min-width:200px">
          <div class="ac-title">${icon} ${cat}${entityName!=='—'?' — '+escapeHtml(entityName):''}</div>
          <div class="ac-meta">${escapeHtml(t.description || '—')}</div>
          <div class="ac-status ${stCls}">${stLbl}</div>
        </div>
        <div class="ac-amount ${isIn?'in':'out'}">${isIn?'+':'−'} ${fn(t.amount)} ج</div>
      </div>
      <div class="ac-body">
        <div class="ac-field">المحفظة <b>${escapeHtml(wName)}</b></div>
        <div class="ac-field">التاريخ <b>${escapeHtml(t.date) || fmtDate(t.createdAt)}</b></div>
        <div class="ac-field">أنشأها <b>${escapeHtml(t.createdByName || '—')}</b></div>
      </div>
      ${renderWalletState(t, wName, isIn)}
      ${order ? renderOrderDetails(order, true) : ''}
      ${trail?`<div class="ac-trail">${trail}</div>`:''}
      ${actions?`<div class="ac-actions">${actions}</div>`:''}
    </div>
  `;
}

function showToast(msg, type){
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-weight:700;font-size:13px;z-index:99998;background:${type==='ok'?'rgba(0,217,126,.95)':'rgba(255,61,110,.95)'};color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.4)`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

const REQ_TYPE_CARDS = {
  supplier_payment: { ico:'🏭', lbl:'دفعة مورد' },
  client_refund:    { ico:'↩️', lbl:'استرداد عميل' },
  salary:           { ico:'👤', lbl:'مرتب / سلفة' },
  general:          { ico:'💸', lbl:'مصروف عام' },
};

window.openNewRequest = function(){
  const allowed = allowedRequestTypes();
  if(!allowed.length){
    showToast('⚠️ ليس لديك صلاحية إنشاء طلبات','err');
    return;
  }
  // ملء أزرار الأنواع المسموحة فقط
  const grid = document.getElementById('rq-type-grid');
  grid.innerHTML = allowed.map((t,i) => {
    const c = REQ_TYPE_CARDS[t] || {ico:'📝',lbl:t};
    return `<button class="req-type-btn${i===0?' on':''}" data-type="${t}" onclick="setReqType('${t}')">
      <div class="req-type-ico">${c.ico}</div><div class="req-type-lbl">${c.lbl}</div>
    </button>`;
  }).join('');

  // امتلاء dropdowns
  const supSel = document.getElementById('rq-supplier');
  supSel.innerHTML = '<option value="">— اختر المورد —</option>' + suppliers.map(s=>`<option value="${s._id}" data-name="${escapeHtml(s.name||'')}" data-type="${s.supType||'printer'}">${escapeHtml(s.name||'')}</option>`).join('');

  const empSel = document.getElementById('rq-employee');
  // غير الـadmin/ops: الموظف يطلب لنفسه فقط — نقفل الاختيار على هويته
  if(canRequestForOthers()){
    empSel.innerHTML = '<option value="">— اختر الموظف —</option>' + employees.map(e=>`<option value="${e._id}" data-name="${escapeHtml(e.name||e.displayName||'')}">${escapeHtml(e.name||e.displayName||'—')}</option>`).join('');
    empSel.disabled = false;
  } else {
    // ابحث الموظف الذي يطابق uid الحالي
    const selfEmp = employees.find(e => e.authUid === currentUid || e._id === currentUid);
    if(selfEmp){
      empSel.innerHTML = `<option value="${selfEmp._id}" data-name="${escapeHtml(selfEmp.name||selfEmp.displayName||'')}" selected>${escapeHtml(selfEmp.name||selfEmp.displayName||currentUserName)} (أنت)</option>`;
    } else {
      empSel.innerHTML = `<option value="${currentUid}" data-name="${escapeHtml(currentUserName)}" selected>${escapeHtml(currentUserName)} (أنت)</option>`;
    }
    empSel.disabled = true;
  }

  // العملاء (للاسترداد)
  const cliSel = document.getElementById('rq-client');
  if(cliSel){
    // نحمل العملاء من ordersMap (لأن العملاء مرتبطون بأوردرات)
    const cliMap = new Map();
    ordersMap.forEach(o => { if(o.clientId && !cliMap.has(o.clientId)) cliMap.set(o.clientId, o.clientName||''); });
    cliSel.innerHTML = '<option value="">— اختر العميل —</option>' + [...cliMap.entries()].map(([id,name])=>`<option value="${id}" data-name="${escapeHtml(name)}">${escapeHtml(name||'—')}</option>`).join('');
  }

  const ordSel = document.getElementById('rq-order');
  const activeOrders = [...ordersMap.values()].filter(o=>!['archived','cancelled'].includes(o.stage));
  ordSel.innerHTML = '<option value="">— بدون ربط —</option>' + activeOrders.slice(0,200).map(o=>`<option value="${o._id}">${escapeHtml(o.orderId||o._id.slice(-6))} — ${escapeHtml(o.clientName||'—')} — ${escapeHtml(STAGE_AR[o.stage]||o.stage)}</option>`).join('');

  document.getElementById('rq-amount').value = '';
  document.getElementById('rq-reason').value = '';
  document.getElementById('rq-month').value = new Date().toISOString().slice(0,7);
  setReqType(allowed[0]);
  oM('new-req');
};

window.setReqType = function(type){
  activeReqType = type;
  document.querySelectorAll('.req-type-btn').forEach(b=>b.classList.toggle('on', b.dataset.type === type));
  const showSup    = type === 'supplier_payment';
  const showEmp    = type === 'salary';
  const showClient = type === 'client_refund';
  const showOrder  = ['supplier_payment','general','client_refund'].includes(type);
  document.getElementById('fg-supplier').style.display    = showSup    ? '' : 'none';
  document.getElementById('fg-employee').style.display    = showEmp    ? '' : 'none';
  document.getElementById('fg-salary-type').style.display = showEmp    ? '' : 'none';
  document.getElementById('fg-month').style.display       = showEmp    ? '' : 'none';
  const fgClient = document.getElementById('fg-client');
  if(fgClient) fgClient.style.display = showClient ? '' : 'none';
  document.getElementById('fg-order').style.display       = showOrder  ? '' : 'none';
};

document.getElementById('rq-order')?.addEventListener('change', e=>{
  const oid = e.target.value;
  const info = document.getElementById('rq-order-info');
  const fgCost = document.getElementById('fg-cost-item');
  const ciSel = document.getElementById('rq-cost-item');
  if(!oid){
    info.style.display='none';
    if(fgCost) fgCost.style.display='none';
    return;
  }
  const o = ordersMap.get(oid);
  if(!o){ info.style.display='none'; return; }
  const totalCost = (o.costItems||[]).reduce((s,c)=>s+(parseFloat(c.total)||0),0);
  info.style.display='block';
  info.innerHTML = `📦 <b>${escapeHtml(o.orderId||o._id.slice(-6))}</b> — ${escapeHtml(o.clientName||'')} — مرحلة: <b>${STAGE_AR[o.stage]||o.stage}</b><br>💰 تكلفة الأوردر التراكمية: <b style="color:#ffaa00">${fn(totalCost)} ج</b> (${(o.costItems||[]).length} بند)`;
  // بنود التكلفة (للـsupplier_payment فقط)
  if(activeReqType === 'supplier_payment' && (o.costItems||[]).length){
    fgCost.style.display = '';
    ciSel.innerHTML = '<option value="">— اختر بنداً للملء التلقائي —</option>' +
      (o.costItems||[]).map((c,idx)=>{
        const lbl = `${c.type||'بند'} — ${fn(c.total||0)} ج${c.supplierName?' — '+c.supplierName:''}`;
        return `<option value="${idx}" data-amount="${c.total||0}" data-supplier-id="${c.supplierId||''}" data-supplier-name="${escapeHtml(c.supplierName||'')}" data-type="${escapeHtml(c.type||'')}">${escapeHtml(lbl)}</option>`;
      }).join('');
  } else if(fgCost){
    fgCost.style.display = 'none';
  }
});

document.getElementById('rq-cost-item')?.addEventListener('change', e=>{
  const opt = e.target.selectedOptions[0];
  if(!opt || !opt.value) return;
  const amt = parseFloat(opt.dataset.amount)||0;
  const supId = opt.dataset.supplierId;
  const supName = opt.dataset.supplierName;
  // ملء المبلغ
  document.getElementById('rq-amount').value = amt;
  // ملء المورد
  if(supId){
    const supSel = document.getElementById('rq-supplier');
    // لو المورد موجود في الـ dropdown نختاره
    const matchOpt = [...supSel.options].find(o => o.value === supId);
    if(matchOpt) supSel.value = supId;
  }
  // ملء السبب
  const reasonEl = document.getElementById('rq-reason');
  if(!reasonEl.value.trim()){
    reasonEl.value = `سداد بند تكلفة: ${opt.dataset.type||''}${supName?' — '+supName:''}`;
  }
});

window.saveRequest = async function(){
  const amount = parseFloat(document.getElementById('rq-amount').value) || 0;
  const reason = document.getElementById('rq-reason').value.trim();
  if(!(amount > 0)) return showToast('⚠️ أدخل المبلغ','err');
  if(!reason) return showToast('⚠️ أدخل السبب','err');

  const reqData = {
    type: activeReqType,
    status: 'requested',
    amount, reason,
    requestedBy: currentUid,
    requestedByName: currentUserName,
    requesterRole: currentRole,
    requestedAt: serverTimestamp(),
  };

  // تحقق صلاحية النوع للدور الحالي (دفاع في العمق)
  if(!allowedRequestTypes().includes(activeReqType)){
    return showToast('⛔ ليس لديك صلاحية إنشاء هذا النوع من الطلبات','err');
  }

  if(activeReqType === 'supplier_payment'){
    const supId = document.getElementById('rq-supplier').value;
    const supOpt = document.getElementById('rq-supplier').selectedOptions[0];
    if(!supId) return showToast('⚠️ اختر المورد','err');
    reqData.supplierId = supId;
    reqData.supplierName = supOpt?.dataset?.name || '';
    reqData.supplierType = supOpt?.dataset?.type || 'printer';
  } else if(activeReqType === 'salary'){
    const empId = document.getElementById('rq-employee').value;
    const empOpt = document.getElementById('rq-employee').selectedOptions[0];
    if(!empId) return showToast('⚠️ اختر الموظف','err');
    // حماية: غير admin/ops لا يقدر يطلب لشخص غيره
    if(!canRequestForOthers()){
      const selfEmp = employees.find(e => e.authUid === currentUid || e._id === currentUid);
      const allowedEmpId = selfEmp?._id || currentUid;
      if(empId !== allowedEmpId){
        return showToast('⛔ يمكنك طلب مرتب/سلفة لنفسك فقط','err');
      }
    }
    reqData.employeeId = empId;
    reqData.employeeName = empOpt?.dataset?.name || '';
    reqData.salaryType = document.getElementById('rq-salary-type').value;
    reqData.salaryMonth = document.getElementById('rq-month').value || '';
  } else if(activeReqType === 'client_refund'){
    const cliId = document.getElementById('rq-client').value;
    const cliOpt = document.getElementById('rq-client').selectedOptions[0];
    if(!cliId) return showToast('⚠️ اختر العميل','err');
    reqData.clientId = cliId;
    reqData.clientName = cliOpt?.dataset?.name || '';
  }

  const orderId = document.getElementById('rq-order').value;
  if(orderId && ['supplier_payment','general'].includes(activeReqType)){
    const o = ordersMap.get(orderId);
    if(o){
      reqData.orderId = orderId;
      reqData.orderRefId = o.orderId || '';
      reqData.clientId = o.clientId || '';
      reqData.clientName = o.clientName || '';
      reqData.orderStage = o.stage || '';
      reqData.orderProducts = (o.products||[]).map(p=>({name:p.name||'',qty:p.qty||1}));
      reqData.orderCostItems = (o.costItems||[]).map(c=>({type:c.type||'',total:parseFloat(c.total)||0,supplierName:c.supplierName||''}));
      reqData.orderTotalCost = reqData.orderCostItems.reduce((s,c)=>s+c.total, 0);
    }
  }

  // لو اختار بند تكلفة، احفظ index لـعَلْم البند بـpaid عند التنفيذ
  const costItemIdx = document.getElementById('rq-cost-item')?.value;
  if(activeReqType === 'supplier_payment' && costItemIdx !== '' && costItemIdx != null){
    reqData.costItemIndex = parseInt(costItemIdx);
  }

  try{
    await addDoc(collection(db,'payment_requests'), reqData);
    showToast('✅ تم إرسال الطلب — بانتظار التنفيذ من المحاسب','ok');
    cM('new-req');
  }catch(e){
    const handled = window.financialGuard?.(e,{operation:'إنشاء طلب', amount});
    if(!handled) showToast('❌ '+e.message,'err');
  }
};

window.openExecuteModal = function(reqId){
  executingReq = requests.find(r=>r._id===reqId);
  if(!executingReq) return;
  const r = executingReq;
  const supEmpName = r.supplierName || r.employeeName || '—';
  document.getElementById('exec-summary').innerHTML = `
    <div><b>${REQ_TYPE_LBL[r.type]||r.type}</b> — ${escapeHtml(supEmpName)}</div>
    <div style="color:var(--dim2);font-size:11px;margin-top:4px">السبب: ${escapeHtml(r.reason||'')}</div>
    <div style="font-weight:900;color:#ffaa00;font-size:18px;margin-top:6px">المبلغ: ${fn(r.amount)} ج</div>
    ${r.orderRefId?`<div style="color:var(--dim2);font-size:11px;margin-top:4px">📦 أوردر: ${escapeHtml(r.orderRefId)} (${escapeHtml(r.clientName||'')})</div>`:''}
  `;
  const wSel = document.getElementById('exec-wallet');
  wSel.innerHTML = '<option value="">— اختر المحفظة —</option>' + walletsArr.map(w=>`<option value="${w._id}" data-name="${escapeHtml(w.name||'')}" data-bal="${w.balance||0}">${escapeHtml(w.name||'')} (رصيد: ${fn(w.balance||0)} ج)</option>`).join('');
  document.getElementById('exec-note').value = '';
  document.getElementById('exec-transfer-ref').value = '';
  oM('exec');
};

window.executeRequest = async function(){
  if(!executingReq) return;
  const r = executingReq;
  const wSel = document.getElementById('exec-wallet');
  const wId = wSel.value;
  if(!wId) return showToast('⚠️ اختر المحفظة المصدر','err');
  const wOpt = wSel.selectedOptions[0];
  const wName = wOpt.dataset.name;
  const wBal = parseFloat(wOpt.dataset.bal)||0;
  if(wBal < r.amount) return showToast(`⚠️ رصيد المحفظة غير كافٍ (${fn(wBal)} < ${fn(r.amount)})`,'err');
  const note = document.getElementById('exec-note').value.trim();
  const transferRef = document.getElementById('exec-transfer-ref').value.trim();
  if(!transferRef) return showToast('⚠️ أدخل رقم/مرجع التحويل','err');

  try{
    // pre-fetch الأوردر لو الطلب بيمسه (refund أو cost item)
    let orderDoc = null;
    if(r.orderId && (r.type === 'client_refund' || r.costItemIndex !== undefined)){
      const oSnap = await getDoc(doc(db,'orders',r.orderId));
      if(oSnap.exists()) orderDoc = {...oSnap.data(), _id:oSnap.id};
    }

    const batch = writeBatch(db);

    // 1. خصم رصيد المحفظة
    batch.update(doc(db,'wallets',wId),{balance:increment(-r.amount)});

    // 2. supplier_payments doc (للموردين) — يربط بصفحة الموردين
    let spRef = null;
    if(r.type === 'supplier_payment' && r.supplierId){
      spRef = doc(collection(db,'supplier_payments'));
      batch.set(spRef, {
        supplierId: r.supplierId,
        supplierName: r.supplierName,
        supplierType: r.supplierType||'printer',
        amount: r.amount,
        walletId: wId, walletName: wName,
        orderId: r.orderId||null,
        orderRefId: r.orderRefId||null,
        clientName: r.clientName||null,
        note: r.reason||note||'',
        transferRef,
        paymentRequestId: r._id,
        ...(r.costItemIndex !== undefined ? { costItemIndex: r.costItemIndex } : {}),
        date: new Date().toLocaleDateString('ar-EG'),
        createdAt: serverTimestamp(),
        createdBy: currentUid,
        createdByName: currentUserName,
      });
    }

    // 3. employee_payments doc (للمرتبات) — يربط بصفحة الموظف
    let epRef = null;
    if(r.type === 'salary' && r.employeeId){
      epRef = doc(collection(db,'employee_payments'));
      batch.set(epRef, {
        employeeId: r.employeeId,
        employeeName: r.employeeName,
        amount: r.amount,
        salaryType: r.salaryType||'salary',
        isDeduction: false,
        month: r.salaryMonth||'',
        walletId: wId, walletName: wName,
        note: r.reason||note||'',
        transferRef,
        paymentRequestId: r._id,
        date: new Date().toLocaleDateString('ar-EG'),
        createdAt: serverTimestamp(),
        createdBy: currentUid,
      });
    }

    // 4. إنشاء tx
    const txRef = doc(collection(db,'transactions_v2'));
    const desc = (r.supplierName ? `دفعة مورد — ${r.supplierName}` :
                  r.employeeName ? `${r.salaryType||'مرتب'} — ${r.employeeName}` :
                  r.type === 'client_refund' && r.clientName ? `استرداد عميل — ${r.clientName}` :
                  'مصروف عام') + (note ? ` — ${note}` : '');
    const cat = r.type === 'supplier_payment' ? (r.supplierType==='shipper'?'shipper_payment':'printer_payment') :
                r.type === 'salary'         ? 'salary' :
                r.type === 'client_refund'  ? 'refund' :
                'expense';
    batch.set(txRef, {
      walletId: wId, walletName: wName,
      type: 'out', amount: r.amount, fees: 0,
      description: desc, category: cat,
      supplierId: r.supplierId||null, supplierName: r.supplierName||null,
      employeeId: r.employeeId||null, employeeName: r.employeeName||null,
      orderId: r.orderId||null, clientId: r.clientId||null, clientName: r.clientName||null,
      paymentRequestId: r._id,
      ...(spRef ? { spId: spRef.id } : {}),
      ...(epRef ? { epId: epRef.id } : {}),
      transferRef,
      date: new Date().toLocaleDateString('ar-EG'),
      createdBy: currentUid, createdByName: currentUserName,
      createdAt: serverTimestamp(),
      ...approvalFields()
    });

    // 5. قيد ledger
    const evt = r.type === 'supplier_payment' ? FE.VENDOR_PAYMENT :
                r.type === 'salary'         ? FE.SALARY_PAYMENT :
                r.type === 'client_refund'  ? FE.CUSTOMER_REFUND :
                FE.GENERAL_EXPENSE;
    addLedgerToBatch(batch, db, evt, {
      amount: r.amount, walletId: wId, walletName: wName,
      vendorId: r.supplierId, vendorName: r.supplierName,
      employeeId: r.employeeId, employeeName: r.employeeName,
      orderId: r.orderId, clientId: r.clientId, clientName: r.clientName,
      notes: desc, refId: r._id,
      userId: currentUid, userName: currentUserName,
    });

    // 6. لو client_refund: تحديث orders.totalPaid (نقص) + remaining + paymentStatus
    let orderPaymentUpdate = null;
    if(r.type === 'client_refund' && r.orderId && orderDoc){
      orderPaymentUpdate = calcOrderPayment(orderDoc, -r.amount);
    }

    // 7. لو فيه costItemIndex: علّم البند paid:true
    let costItemsUpdate = null;
    if(r.type === 'supplier_payment' && r.costItemIndex !== undefined && r.orderId && orderDoc){
      const items = [...(orderDoc.costItems||[])];
      const idx = r.costItemIndex;
      if(items[idx]){
        items[idx] = {
          ...items[idx],
          paid: true,
          paidTxId: txRef.id,
          paidSpId: spRef?.id || null,
          paidAt: new Date().toISOString(),
          paidVia: wName,
          paidTransferRef: transferRef,
          paidByName: currentUserName,
          paymentRequestId: r._id,
        };
        costItemsUpdate = items;
      }
    }

    // 8. دمج كل تحديثات الأوردر في update واحد (لو موجود)
    if(orderPaymentUpdate || costItemsUpdate){
      const updateData = {
        ...(orderPaymentUpdate || {}),
        ...(costItemsUpdate ? { costItems: costItemsUpdate } : {}),
        ...(r.type === 'client_refund' ? { lastRefundDate: new Date().toLocaleDateString('ar-EG') } : {}),
        updatedAt: serverTimestamp(),
      };
      batch.update(doc(db,'orders',r.orderId), updateData);
    }

    // 9. تحديث الطلب نفسه
    batch.update(doc(db,'payment_requests',r._id), {
      status: 'awaiting_receipt',
      executedBy: currentUid,
      executedByName: currentUserName,
      executedAt: serverTimestamp(),
      sourceWalletId: wId,
      sourceWalletName: wName,
      txId: txRef.id,
      ...(spRef ? { supplierPaymentId: spRef.id } : {}),
      ...(epRef ? { employeePaymentId: epRef.id } : {}),
      transferRef,
      executeNote: note,
    });

    await batch.commit();
    const summary = [
      'tx + ledger',
      spRef ? 'supplier_payments' : null,
      epRef ? 'employee_payments' : null,
      orderPaymentUpdate ? 'orders.totalPaid' : null,
      costItemsUpdate ? 'costItem.paid' : null,
    ].filter(Boolean).join(' + ');
    showToast(`✅ نُفّذ — تم تسجيل: ${summary}`,'ok');
    cM('exec');
    executingReq = null;
  }catch(e){
    const handled = window.financialGuard?.(e,{operation:'تنفيذ طلب', amount:r.amount});
    if(!handled) showToast('❌ '+e.message,'err');
  }
};

// ══════════════ Modal: استلام (رفع إيصال) ══════════════
let __receiptFile = null;
window.openReceiptModal = function(reqId){
  receivingReq = requests.find(r=>r._id===reqId);
  if(!receivingReq) return;
  __receiptFile = null;
  document.getElementById('receipt-file').value = '';
  document.getElementById('receipt-preview').innerHTML = '';
  document.getElementById('receipt-progress').style.display = 'none';
  oM('receipt');
};

document.getElementById('receipt-file')?.addEventListener('change', e=>{
  const f = e.target.files[0];
  if(!f) return;
  __receiptFile = f;
  const url = URL.createObjectURL(f);
  document.getElementById('receipt-preview').innerHTML = `<img src="${url}" style="max-width:100%;max-height:200px;border-radius:8px;border:1px solid var(--line)">`;
});

window.uploadReceipt = async function(){
  if(!receivingReq) return;
  if(!__receiptFile) return showToast('⚠️ اختر صورة الإيصال','err');
  const btn = document.getElementById('receipt-save-btn');
  btn.disabled = true;
  btn.textContent = 'جاري الرفع...';
  const prog = document.getElementById('receipt-progress');
  prog.style.display = 'block';
  prog.textContent = 'جاري الرفع... 0%';
  try{
    const path = `receipts/${receivingReq._id}_${Date.now()}_${__receiptFile.name}`;
    const ref = sRef(storage, path);
    const task = uploadBytesResumable(ref, __receiptFile);
    await new Promise((res, rej)=>{
      task.on('state_changed',
        s=>{ const p = Math.round(s.bytesTransferred/s.totalBytes*100); prog.textContent = `جاري الرفع... ${p}%`; },
        rej,
        async ()=>{
          const url = await getDownloadURL(task.snapshot.ref);
          await updateDoc(doc(db,'payment_requests',receivingReq._id), {
            status: 'pending',
            receiptImageUrl: url,
            receiptImagePath: path,
            receivedBy: currentUid,
            receivedByName: currentUserName,
            receivedAt: serverTimestamp(),
          });
          // تحديث الـ tx المرتبطة كذلك (لتظهر في تاب pending)
          if(receivingReq.txId){
            try{
              await updateDoc(doc(db,'transactions_v2',receivingReq.txId), {
                receiptImageUrl: url,
              });
            }catch(_){}
          }
          res();
        }
      );
    });
    showToast('✅ تم الاستلام — بانتظار تأكيد ops manager','ok');
    cM('receipt');
    receivingReq = null;
    __receiptFile = null;
  }catch(e){
    showToast('❌ ' + (e.message || 'فشل الرفع'),'err');
  }finally{
    btn.disabled = false;
    btn.textContent = '📤 رفع وتأكيد';
  }
};

// ══════════════ Approval actions (existing tx flow) ══════════════
window.confirmTx = async function(txId){
  if(!confirm('تأكيد هذه العملية؟')) return;
  try{
    await updateDoc(doc(db,'transactions_v2',txId),{
      approvalStatus: 'confirmed',
      confirmedBy: currentUid, confirmedByName: currentUserName,
      confirmedAt: serverTimestamp(),
    });
    // لو كانت tx مرتبطة بـ request، حدّث الطلب أيضاً
    const tx = txs.find(x=>x._id===txId);
    if(tx?.paymentRequestId){
      try{ await updateDoc(doc(db,'payment_requests',tx.paymentRequestId),{ status:'confirmed', confirmedBy:currentUid, confirmedByName:currentUserName, confirmedAt:serverTimestamp() }); }catch(_){}
    }
    showToast('✅ تم التأكيد','ok');
  }catch(e){
    const handled = window.financialGuard?.(e,{operation:'تأكيد عملية', txId});
    if(!handled) showToast('❌ '+e.message,'err');
  }
};

window.approveTx = async function(txId){
  if(!confirm('اعتماد نهائي؟ سيتم قفل العملية.')) return;

    await updateDoc(doc(db,'transactions_v2',txId),{
      approvalStatus: 'approved',
      approvedBy: currentUid, approvedByName: currentUserName,

    const tx = txs.find(x=>x._id===txId);

      try{ await updateDoc(doc(db,'payment_requests',tx.paymentRequestId),{ status:'approved', approvedBy:currentUid, approvedByName:currentUserName, approvedAt:serverTimestamp() }); }catch(_){}

    showToast('🔒 تم الاعتماد والأرشفة','ok');

};
