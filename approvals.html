<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<title>الاعتمادات المالية — Business2Card</title>
<link rel="stylesheet" href="shared.css?v=48">
<style>
  .tabs-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:8px}
  .tab{padding:8px 16px;border-radius:var(--rad);border:1px solid transparent;background:transparent;color:var(--dim2);cursor:pointer;font-weight:700;font-size:13px;font-family:inherit;display:flex;align-items:center;gap:8px;white-space:nowrap}
  .tab.on{background:var(--bg3);color:var(--snow);border-color:var(--line)}
  .tab .badge{background:var(--p);color:#fff;border-radius:10px;padding:1px 8px;font-size:10px;font-weight:800;min-width:20px;text-align:center}
  .tab.on.pending .badge{background:#ffaa00}
  .tab.on.confirmed .badge{background:#3b9eff}
  .tab.on.approved .badge{background:#00d97e}
  .tab.on.rejected .badge{background:#ff3d6e}

  .approval-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;margin-bottom:10px;transition:all .15s}
  .approval-card:hover{border-color:var(--line2)}
  .ac-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .ac-title{font-weight:900;font-size:14px;color:var(--snow);margin-bottom:4px}
  .ac-meta{font-size:11px;color:var(--dim2)}
  .ac-amount{font-size:20px;font-weight:900;text-align:left}
  .ac-amount.in{color:var(--g)}
  .ac-amount.out{color:var(--r)}
  .ac-body{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
  .ac-field{font-size:11px;color:var(--dim2)}
  .ac-field b{color:var(--snow);display:block;margin-top:2px;font-size:12px}
  .ac-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .ac-actions button{flex:1;min-width:120px;padding:9px 14px;border-radius:8px;border:1px solid;font-weight:800;font-size:12px;cursor:pointer;font-family:inherit}
  .btn-confirm{background:rgba(59,158,255,.15);color:#3b9eff;border-color:rgba(59,158,255,.4)}
  .btn-approve{background:rgba(0,217,126,.15);color:#00d97e;border-color:rgba(0,217,126,.4)}
  .btn-reject{background:rgba(255,61,110,.1);color:#ff3d6e;border-color:rgba(255,61,110,.3)}
  .ac-status{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:14px;font-size:10px;font-weight:800;margin-top:4px}
  .st-pending{background:rgba(255,170,0,.15);color:#ffaa00}
  .st-confirmed{background:rgba(59,158,255,.15);color:#3b9eff}
  .st-approved{background:rgba(0,217,126,.15);color:#00d97e}
  .st-rejected{background:rgba(255,61,110,.15);color:#ff3d6e}
  .ac-trail{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);font-size:10px;color:var(--dim2)}
  .ac-trail span{display:inline-block;margin-left:14px}
  .empty-pl{text-align:center;padding:40px 20px;color:var(--dim2);font-size:13px}
</style>
<script src="financial-guard.js"></script>
</head>
<body>
<aside class="sidenav" id="sidebar">
  <div class="nav-brand">
    <div class="nav-logo">🎨</div>
    <div>
      <div class="nav-brand-name">Business2Card</div>
      <div class="nav-brand-role" id="nav-role">—</div>
    </div>
  </div>
  <div class="nav-scroll" id="nav-links"></div>
</aside>
<header class="topbar">
  <button class="menu-btn" id="menu-btn">☰</button>
  <div>
    <div class="page-title">🔐 الاعتمادات المالية</div>
    <div class="page-sub">تأكيد ops manager → اعتماد admin → أرشفة</div>
  </div>
  <div style="margin-right:auto;display:flex;align-items:center;gap:10px">
    <span id="nav-name" style="font-size:13px;color:var(--dim2)"></span>
    <button onclick="logoutBtn()" style="padding:7px 12px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);color:var(--snow);cursor:pointer;font-family:inherit;font-size:12px">خروج</button>
  </div>
</header>

<main class="main">
  <div class="container">
    <div class="tabs-bar">
      <button class="tab on pending" id="tab-pending" onclick="setTab('pending')">⏳ بانتظار التأكيد <span class="badge" id="cnt-pending">0</span></button>
      <button class="tab confirmed" id="tab-confirmed" onclick="setTab('confirmed')">🔵 بانتظار الاعتماد <span class="badge" id="cnt-confirmed">0</span></button>
      <button class="tab approved" id="tab-approved" onclick="setTab('approved')">✅ مؤرشَفة <span class="badge" id="cnt-approved">0</span></button>
      <button class="tab rejected" id="tab-rejected" onclick="setTab('rejected')">❌ مرفوضة <span class="badge" id="cnt-rejected">0</span></button>
    </div>

    <div id="role-banner" style="background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.25);border-radius:var(--rad);padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--dim);line-height:1.7"></div>

    <div id="list-content"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, onSnapshot, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"});
const auth = getAuth(app);
const db   = getFirestore(app);

let currentUid='', currentUserName='', currentRole='', currentPerms={};
let txs = []; // كل الـ tx مع approval fields
let activeTab = 'pending';
let walletsMap = new Map();

const fn = n => (parseFloat(n)||0).toLocaleString('ar-EG');
const ICONS = { client_payment:'💰', refund:'↩️', salary:'👤', bonus:'🎁', deduction:'✂️', printer_payment:'🏭', shipper_payment:'🚚', shipping_cost:'🚚', shipping_settlement:'📦', transfer:'🔄', opening_balance:'🏦', adjustment:'⚖️', expense:'💸', expense_reversal:'↩️', refund_reversal:'🔄' };
const CAT_AR = { client_payment:'دفعة عميل', refund:'استرداد عميل', salary:'راتب', bonus:'مكافأة', deduction:'خصم', printer_payment:'دفعة مطبعة', shipper_payment:'دفعة شركة شحن', shipping_cost:'تكلفة شحن', shipping_settlement:'تسوية شحن', transfer:'تحويل بين محافظ', opening_balance:'رصيد افتتاحي', adjustment:'تسوية رصيد', expense:'مصروف', admin_edit:'تعديل أدمن' };

const ROLE_LABELS = { admin:'مدير عام', operation_manager:'مدير تشغيل', wallet_manager:'محاسب', customer_service:'خدمة عملاء', graphic_designer:'مصمم', design_operator:'مشغل تصميم', production_agent:'مندوب تنفيذ', shipping_officer:'مسؤول شحن' };

const SBPAGES = [
  {f:'index.html',l:'لوحة التحكم',i:'⬡',adminOnly:true},
  {f:'clients.html',l:'العملاء',i:'👤',p:'clients'},
  {f:'design.html',l:'التصميم',i:'✏️',p:'design'},
  {f:'print.html',l:'الطباعة',i:'🖨️',p:'print'},
  {f:'production.html',l:'التنفيذ',i:'🏭',p:'production'},
  {f:'shipping.html',l:'الشحن',i:'🚚',p:'shipping'},
  {f:'shipping-accounts.html',l:'حسابات الشحن',i:'📦',p:'shipping-accounts'},
  {f:'archive.html',l:'الأرشيف',i:'📁',p:'archive'},
  {f:'accounts.html',l:'الحسابات',i:'💰',p:'accounts'},
  {f:'approvals.html',l:'الاعتمادات',i:'🔐',p:'approvals'},
  {f:'suppliers.html',l:'الموردين',i:'▣',p:'suppliers'},
  {f:'reports.html',l:'التقارير',i:'📊',p:'reports'},
  {f:'employees.html',l:'الموظفين',i:'👥',adminOnly:true},
  {f:'settings.html',l:'الإعدادات',i:'⚙️',adminOnly:true},
];

function buildSidebar(){
  const isAdm = ['admin','operation_manager'].includes(currentRole);
  const pages = currentPerms?.pages || [];
  const navEl = document.getElementById('nav-links');
  if(!navEl) return;
  let html = '';
  for(const p of SBPAGES){
    const ok = isAdm || (p.adminOnly ? false : pages.includes('*') || pages.includes(p.p||''));
    if(!ok) continue;
    const active = p.f === 'approvals.html';
    html += `<a class="nav-link${active?' active':''}" href="${p.f}"><span class="nav-ico">${p.i}</span> ${p.l}</a>`;
  }
  navEl.innerHTML = html;
  document.getElementById('nav-role').textContent = ROLE_LABELS[currentRole] || currentRole;
  document.getElementById('nav-name').textContent = currentUserName;
}

// Mobile menu
document.getElementById('menu-btn')?.addEventListener('click', ()=>{
  document.getElementById('sidebar')?.classList.toggle('open');
});

window.logoutBtn = async function(){
  try{ await signOut(auth); }catch(e){}
  window.location.href = 'login.html';
};

onAuthStateChanged(auth, async u=>{
  if(!u){ window.location.href='login.html'; return; }
  currentUid = u.uid;
  try{
    const userSnap = await getDoc(doc(db,'users',u.uid));
    if(!userSnap.exists()){
      document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#ff3d6e">⛔ بيانات المستخدم غير موجودة</div>';
      return;
    }
    const ud = userSnap.data();
    currentRole = ud.role || '';
    currentUserName = ud.name || u.email || '';
    currentPerms = ud.permissions || {};

    if(!['admin','operation_manager'].includes(currentRole)){
      document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#ff3d6e">⛔ هذه الصفحة لمدير التشغيل والأدمن فقط</div>';
      return;
    }

    buildSidebar();
    updateRoleBanner();
    startListeners();
  }catch(e){
    console.error('[approvals] init error:', e);
    document.getElementById('list-content').innerHTML = `<div class="empty-pl" style="color:#ff3d6e">⛔ خطأ التحميل: ${e.message}</div>`;
  }
});

function updateRoleBanner(){
  const b = document.getElementById('role-banner');
  if(!b) return;
  if(currentRole === 'operation_manager'){
    b.innerHTML = `<strong>🔵 دورك: مدير تشغيل</strong> — تستطيع <b>تأكيد</b> العمليات بانتظار التأكيد. الاعتماد النهائي للأدمن.`;
  } else if(currentRole === 'admin'){
    b.innerHTML = `<strong>✅ دورك: أدمن</strong> — تستطيع <b>اعتماد</b> العمليات المؤكَّدة. الاعتماد يقفل العملية ويأرشفها.`;
  }
}

function startListeners(){
  // المحافظ للأسماء
  onSnapshot(collection(db,'wallets'),
    snap=>{ walletsMap.clear(); snap.docs.forEach(d=>walletsMap.set(d.id, d.data().name||d.id)); },
    err=>{ console.error('[approvals] wallets error:', err); }
  );

  // كل الحركات الجديدة (التي بها approvalStatus)
  onSnapshot(collection(db,'transactions_v2'),
    snap=>{
      txs = snap.docs.map(d=>({...d.data(),_id:d.id}))
        .filter(t=>t.approvalStatus)
        .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      updateCounts();
      render();
    },
    err=>{
      console.error('[approvals] tx error:', err);
      document.getElementById('list-content').innerHTML = `<div class="empty-pl" style="color:#ff3d6e">⛔ ${err.message}</div>`;
    }
  );
}

function updateCounts(){
  const counts = { pending:0, confirmed:0, approved:0, rejected:0 };
  txs.forEach(t=>{ if(counts[t.approvalStatus] !== undefined) counts[t.approvalStatus]++; });
  Object.entries(counts).forEach(([k,v])=>{
    const el = document.getElementById('cnt-'+k);
    if(el) el.textContent = v;
  });
}

window.setTab = function(tab){
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+tab).classList.add('on');
  render();
};

function render(){
  const filtered = txs.filter(t=>t.approvalStatus===activeTab);
  const el = document.getElementById('list-content');
  if(!el) return;
  if(!filtered.length){
    const msg = activeTab==='pending' ? '✨ لا توجد عمليات بانتظار التأكيد' :
                activeTab==='confirmed' ? '✨ لا توجد عمليات بانتظار الاعتماد' :
                activeTab==='approved' ? '📁 لا توجد عمليات مؤرشَفة بعد' :
                '✨ لا توجد عمليات مرفوضة';
    el.innerHTML = `<div class="empty-pl">${msg}</div>`;
    return;
  }
  el.innerHTML = filtered.map(t => renderCard(t)).join('');
}

function fmtDate(ts){
  if(!ts) return '—';
  if(ts.seconds) return new Date(ts.seconds*1000).toLocaleString('ar-EG',{dateStyle:'short',timeStyle:'short'});
  if(typeof ts === 'string') return ts;
  return '—';
}

function renderCard(t){
  const cat = CAT_AR[t.category] || t.category || 'حركة';
  const icon = ICONS[t.category] || '📝';
  const wName = t.walletName || walletsMap.get(t.walletId) || t.walletId || '—';
  const isIn = t.type === 'in';
  const entityName = t.clientName || t.supplierName || t.employeeName || '—';

  // أزرار حسب الدور والمرحلة
  let actions = '';
  if(t.approvalStatus === 'pending' && currentRole === 'operation_manager'){
    actions = `
      <button class="btn-confirm" onclick="confirmTx('${t._id}')">✓ تأكيد</button>
      <button class="btn-reject" onclick="rejectTx('${t._id}')">✕ رفض</button>`;
  } else if(t.approvalStatus === 'pending' && currentRole === 'admin'){
    actions = `
      <button class="btn-confirm" onclick="confirmTx('${t._id}')" title="تأكيد بدلاً من ops manager">✓ تأكيد</button>
      <button class="btn-approve" onclick="approveTx('${t._id}')" title="اعتماد مباشر بدون تأكيد ops">✅ اعتماد مباشر</button>
      <button class="btn-reject" onclick="rejectTx('${t._id}')">✕ رفض</button>`;
  } else if(t.approvalStatus === 'confirmed' && currentRole === 'admin'){
    actions = `
      <button class="btn-approve" onclick="approveTx('${t._id}')">✅ اعتماد + أرشفة</button>
      <button class="btn-reject" onclick="rejectTx('${t._id}')">✕ رفض</button>`;
  } else if(t.approvalStatus === 'confirmed' && currentRole === 'operation_manager'){
    actions = `<div style="font-size:11px;color:var(--dim2);padding:8px">⏳ بانتظار اعتماد الأدمن</div>`;
  }

  let trail = '';
  if(t.confirmedByName) trail += `<span>🔵 أكّد: <b>${t.confirmedByName}</b> · ${fmtDate(t.confirmedAt)}</span>`;
  if(t.approvedByName)  trail += `<span>✅ اعتمد: <b>${t.approvedByName}</b> · ${fmtDate(t.approvedAt)}</span>`;
  if(t.rejectedByName)  trail += `<span style="color:#ff3d6e">❌ رفض: <b>${t.rejectedByName}</b> · ${fmtDate(t.rejectedAt)}${t.rejectReason?' · '+t.rejectReason:''}</span>`;

  const stCls = 'st-' + t.approvalStatus;
  const stLbl = {pending:'⏳ بانتظار التأكيد', confirmed:'🔵 مؤكَّدة (بانتظار الاعتماد)', approved:'🔒 معتمدة ومؤرشَفة', rejected:'❌ مرفوضة'}[t.approvalStatus] || t.approvalStatus;

  return `
    <div class="approval-card">
      <div class="ac-head">
        <div style="flex:1;min-width:200px">
          <div class="ac-title">${icon} ${cat}${entityName!=='—'?' — '+entityName:''}</div>
          <div class="ac-meta">${t.description || '—'}</div>
          <div class="ac-status ${stCls}">${stLbl}</div>
        </div>
        <div class="ac-amount ${isIn?'in':'out'}">${isIn?'+':'−'} ${fn(t.amount)} ج</div>
      </div>
      <div class="ac-body">
        <div class="ac-field">المحفظة <b>${wName}</b></div>
        <div class="ac-field">التاريخ <b>${t.date || fmtDate(t.createdAt)}</b></div>
        <div class="ac-field">أنشأها <b>${t.createdByName || '—'}</b></div>
        ${t.orderId?`<div class="ac-field">الأوردر <b style="font-family:monospace">${String(t.orderId).slice(-8)}</b></div>`:''}
      </div>
      ${trail?`<div class="ac-trail">${trail}</div>`:''}
      ${actions?`<div class="ac-actions">${actions}</div>`:''}
    </div>
  `;
}

function showToast(msg, type){
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-weight:700;font-size:13px;z-index:99998;background:${type==='ok'?'rgba(0,217,126,.95)':'rgba(255,61,110,.95)'};color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.4)`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

window.confirmTx = async function(txId){
  if(!confirm('تأكيد هذه العملية؟ سيتم نقلها لطابور اعتماد الأدمن.')) return;
  try{
    await updateDoc(doc(db,'transactions_v2',txId),{
      approvalStatus: 'confirmed',
      confirmedBy: currentUid,
      confirmedByName: currentUserName,
      confirmedAt: serverTimestamp(),
    });
    showToast('✅ تم التأكيد — بانتظار اعتماد الأدمن','ok');
  }catch(e){
    const handled = window.financialGuard?.(e,{operation:'تأكيد عملية', txId});
    if(!handled) showToast('❌ '+e.message,'err');
  }
};

window.approveTx = async function(txId){
  if(!confirm('اعتماد نهائي؟\nسيتم قفل العملية ولا يمكن تعديلها بعدها.')) return;
  try{
    await updateDoc(doc(db,'transactions_v2',txId),{
      approvalStatus: 'approved',
      approvedBy: currentUid,
      approvedByName: currentUserName,
      approvedAt: serverTimestamp(),
      isLocked: true,
    });
    showToast('🔒 تم الاعتماد والأرشفة','ok');
  }catch(e){
    const handled = window.financialGuard?.(e,{operation:'اعتماد عملية', txId});
    if(!handled) showToast('❌ '+e.message,'err');
  }
};

window.rejectTx = async function(txId){
  const reason = prompt('سبب الرفض (إجباري):');
  if(!reason || !reason.trim()) return;
  try{
    await updateDoc(doc(db,'transactions_v2',txId),{
      approvalStatus: 'rejected',
      rejectedBy: currentUid,
      rejectedByName: currentUserName,
      rejectedAt: serverTimestamp(),
      rejectReason: reason.trim(),
    });
    showToast('❌ تم الرفض','ok');
  }catch(e){
    const handled = window.financialGuard?.(e,{operation:'رفض عملية', txId});
    if(!handled) showToast('❌ '+e.message,'err');
  }
};
</script>
</body>
</html>
