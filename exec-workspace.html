<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Business2Card — مركز التنفيذ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css?v=45">
<script src="sidebar-config.js" defer></script>
<script src="sidebar.js"></script>
<script type="module" src="inbox-badge.js"></script>
<script src="smart-sidebar.js?v=1" defer></script>
<script src="theme.js?v=4"></script>
<script type="module" src="app-sidebar.js?v=3"></script>
<style>
/* ══ Layout ════════════════════════════════════════════════════════ */
.ws-wrap{display:flex;height:calc(100vh - 60px);overflow:hidden}
.ws-list{width:370px;flex-shrink:0;display:flex;flex-direction:column;border-inline-end:1px solid var(--line);overflow:hidden;background:var(--bg)}
.ws-detail{flex:1;overflow-y:auto;min-width:0;background:var(--bg)}

/* Custom scrollbars */
.wl-body::-webkit-scrollbar,.ws-detail::-webkit-scrollbar{width:5px}
.wl-body::-webkit-scrollbar-track,.ws-detail::-webkit-scrollbar-track{background:transparent}
.wl-body::-webkit-scrollbar-thumb,.ws-detail::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px}
.wl-body::-webkit-scrollbar-thumb:hover,.ws-detail::-webkit-scrollbar-thumb:hover{background:var(--dim)}
.wl-body{scrollbar-width:thin;scrollbar-color:var(--line) transparent}
.ws-detail{scrollbar-width:thin;scrollbar-color:var(--line) transparent}

@media(min-width:769px){
  .main{overflow:hidden!important}
}
@media(max-width:768px){
  .ws-wrap{height:auto;flex-direction:column;overflow:visible}
  .ws-list{width:100%;border-inline-end:none;height:auto;max-height:none}
  .wl-body{overflow-y:visible!important}
  body.detail-open .ws-list{display:none}
  body.detail-open .ws-detail{position:fixed;inset:0;z-index:80;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
  body.detail-open .ws-topbar{display:none}
  .hide-mobile{display:none!important}
}

/* ══ Topbar ════════════════════════════════════════════════════════ */
.ws-topbar{padding:14px 20px 12px;border-bottom:1px solid var(--line);background:var(--bg2)}
.ws-topbar-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.ws-title{font-size:var(--fs-xl);font-weight:var(--fw-heavy);color:var(--snow);letter-spacing:-0.01em}
.ws-sub{font-size:var(--fs-sm);color:var(--dim2);margin-top:2px}

/* KPI bar */
.kpi-bar{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;align-items:center}
.kpi-bar::-webkit-scrollbar{display:none}
.kp{flex-shrink:0;font-size:var(--fs-sm);font-weight:var(--fw-bold);padding:5px 14px;border-radius:var(--rad3);border:1px solid var(--line);background:var(--bg);color:var(--dim2);white-space:nowrap;transition:border-color .15s}
.kp b{color:var(--snow);font-weight:var(--fw-heavy);margin-inline-end:3px}
.kp.kp-b{border-color:var(--tint-b-line);color:var(--b);background:var(--tint-b-soft)}
.kp.kp-g{border-color:var(--tint-g-line);color:var(--g);background:var(--tint-g-soft)}
.kp.kp-r{border-color:var(--tint-r-line);color:var(--r);background:var(--tint-r-soft)}
.kp.kp-y{border-color:var(--tint-y-line);color:var(--y);background:var(--tint-y-soft)}

/* شريط الإنجاز اليومي */
.day-bar{display:flex;align-items:center;gap:10px;margin-top:8px;font-size:var(--fs-sm);color:var(--dim2)}
.day-prog{flex:1;max-width:220px;height:6px;border-radius:3px;background:var(--bg);overflow:hidden}
.day-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--g),var(--b));transition:width .4s}

/* ══ List Head ══════════════════════════════════════════════════════ */
.wl-head{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:8px;background:var(--bg)}
.wl-search{width:100%;padding:10px 14px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad3);color:var(--snow);font-size:var(--fs-sm);font-family:inherit;transition:border-color .15s,background .15s}
.wl-search::placeholder{color:var(--dim)}
.wl-search:focus{outline:none;border-color:var(--b);background:var(--bg);box-shadow:0 0 0 3px var(--ring-b)}
.wl-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.wl-mine{display:flex;border-radius:var(--rad3);border:1px solid var(--line);overflow:hidden;flex-shrink:0}
.wmb{padding:6px 14px;font-size:var(--fs-xs);font-weight:var(--fw-bold);background:transparent;border:none;color:var(--dim2);cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.wmb.on{background:var(--b);color:#fff}
.wl-sup-sel{flex:1;min-width:0;font-size:var(--fs-xs);padding:6px 10px;border-radius:var(--rad3);border:1px solid var(--line);background:var(--bg2);color:var(--snow);font-family:inherit}
.wl-sup-sel:focus{outline:none;border-color:var(--b)}
.wl-tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.wl-tabs::-webkit-scrollbar{display:none}
.wtab{flex-shrink:0;padding:5px 13px;font-size:var(--fs-xs);font-weight:var(--fw-bold);border-radius:var(--rad3);border:1px solid var(--line);background:transparent;color:var(--dim2);cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.wtab:hover{border-color:var(--dim);color:var(--snow)}
.wtab.on{background:var(--tint-b-soft);color:var(--b);border-color:var(--tint-b-line)}

/* أزرار الأفعال في header القائمة */
.wl-actions{display:flex;gap:6px;flex-wrap:wrap}
.wl-act{padding:5px 12px;font-size:var(--fs-xs);font-weight:var(--fw-bold);border-radius:var(--rad3);border:1px solid var(--line);background:var(--bg2);color:var(--dim2);cursor:pointer;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.wl-act:hover{color:var(--snow);border-color:var(--b);background:var(--tint-b-soft)}
.wl-act.active{background:var(--tint-b-soft);border-color:var(--tint-b-line);color:var(--b)}

/* ══ البطاقات ══════════════════════════════════════════════════════ */
.wl-body{flex:1;overflow-y:auto;padding:4px 0}
.wl-count{padding:6px 16px;font-size:var(--fs-xs);color:var(--dim);font-weight:var(--fw-bold);letter-spacing:.02em;text-transform:uppercase}
.wl-card{padding:14px 14px;margin:0 6px 4px;border-radius:var(--rad);border:1px solid transparent;cursor:pointer;transition:all .15s;position:relative;display:flex;gap:12px;align-items:flex-start}
.wl-card:hover{background:var(--hover);border-color:var(--line)}
.wl-card.active{background:var(--tint-b-soft);border-color:var(--tint-b-line)}
.wl-card.active::before{content:'';position:absolute;inset-inline-start:0;top:8px;bottom:8px;width:3px;background:var(--b);border-radius:0 3px 3px 0}
.wl-card.sel-mode .wl-check{display:flex}
.wl-check{display:none;width:20px;height:20px;border-radius:6px;border:2px solid var(--line);align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .15s}
.wl-check.checked{background:var(--b);border-color:var(--b)}
.wl-card-main{flex:1;min-width:0}
.wl-thumb{width:64px;height:64px;border-radius:var(--rad2);object-fit:cover;background:var(--bg2);flex-shrink:0;border:1px solid var(--line)}
.wl-thumb-ph{width:64px;height:64px;border-radius:var(--rad2);background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid var(--line)}
.wl-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
/* Hero: اسم المنتج الرئيسي */
.wl-order-hero{display:flex;align-items:baseline;gap:5px;min-width:0;flex:1}
.wl-name{font-size:var(--fs-lg);font-weight:var(--fw-heavy);color:var(--snow);line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wl-order-qty{font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--b);flex-shrink:0;white-space:nowrap}
/* إضافات المنتج */
.wl-extras{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0 3px}
.wl-extra-tag{font-size:9px;padding:2px 7px;border-radius:10px;background:var(--tint-y-soft);border:1px solid var(--tint-y-line);color:var(--y);white-space:nowrap}
/* السطر الثانوي: العميل + كود */
.wl-client-line{font-size:var(--fs-sm);color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin:6px 0 4px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.wl-client-name{color:var(--snow);font-weight:var(--fw-bold)}
.wl-foot{display:flex;gap:4px;flex-wrap:wrap;align-items:center}

/* منتجات إضافية مدمجة */
.wl-prods{display:flex;flex-direction:column;gap:3px;margin:4px 0 3px}
.wl-prod-row{display:flex;align-items:center;gap:6px;font-size:var(--fs-xs);min-width:0}
.wl-prod-name{color:var(--snow);font-weight:var(--fw-medium);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;opacity:.8}
.wl-prod-status{font-size:var(--fs-xs);flex-shrink:0}
.wl-cost-sum{font-size:var(--fs-xs);color:var(--y);flex-shrink:0;white-space:nowrap}
.wl-cost-sum.nocost{color:var(--dim);opacity:.6}
.wl-prod-more{color:var(--dim);font-size:var(--fs-xs)}

/* أزرار الحالة السريعة على البطاقة */
.wl-qbtns{display:flex;gap:4px;margin-top:6px}
.wqb{font-size:var(--fs-xs);padding:3px 9px;border-radius:var(--rad3);border:1px solid var(--line);background:transparent;color:var(--dim2);cursor:pointer;font-family:inherit;transition:all .15s}
.wqb:hover{border-color:var(--b);color:var(--snow);background:var(--hover)}
.wqb.on-wip{border-color:var(--tint-b-line);background:var(--tint-b-soft);color:var(--b)}
.wqb.on-done{border-color:var(--tint-g-line);background:var(--tint-g-soft);color:var(--g)}
.wqb.on-problem{border-color:var(--tint-r-line);background:var(--tint-r-soft);color:var(--r)}
.wqb.on-pending{border-color:var(--line2);background:var(--hover);color:var(--dim2)}

/* ══ Badges ════════════════════════════════════════════════════════ */
.bdg{display:inline-flex;align-items:center;font-size:10px;font-weight:var(--fw-bold);padding:2px 8px;border-radius:var(--rad3);white-space:nowrap;letter-spacing:.01em}
.bdg-pending{background:var(--hover);color:var(--dim2)}
.bdg-wip{background:var(--tint-b-soft);color:var(--b)}
.bdg-done{background:var(--tint-g-soft);color:var(--g)}
.bdg-problem{background:var(--tint-r-soft);color:var(--r)}
.bdg-cancelled{background:var(--tint-r-soft);color:var(--dim);text-decoration:line-through}
.bdg-warn{background:var(--tint-y-soft);color:var(--y);border:1px solid var(--tint-y-line)}
.bdg-danger{background:var(--tint-r-soft);color:var(--r);border:1px solid var(--tint-r-line)}
.bdg-blue{background:var(--tint-b-soft);color:var(--b);border:1px solid var(--tint-b-line)}

/* ══ Bulk action bar ═══════════════════════════════════════════════ */
.bulk-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);z-index:90;background:var(--bg2);border:1px solid var(--b);border-radius:var(--rad2);padding:12px 20px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-pop);transition:transform .25s cubic-bezier(.4,0,.2,1);white-space:nowrap;backdrop-filter:blur(12px)}
.bulk-bar.visible{transform:translateX(-50%) translateY(0)}
.bulk-info{font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--snow)}
.bulk-btn{padding:7px 16px;border-radius:var(--rad3);font-size:var(--fs-sm);font-weight:var(--fw-bold);font-family:inherit;cursor:pointer;border:1px solid;transition:all .15s}
.bulk-btn:hover{filter:brightness(1.1)}
.bulk-sup{background:var(--tint-b-soft);border-color:var(--tint-b-line);color:var(--b)}
.bulk-clr{background:transparent;border-color:var(--line);color:var(--dim2)}

/* ══ Supplier modal ═════════════════════════════════════════════════ */
.sup-modal-ov{position:fixed;inset:0;background:var(--overlay-bg-strong);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.sup-modal-ov.open{display:flex}
.sup-modal{background:var(--bg2);border-radius:var(--rad2) var(--rad2) 0 0;padding:24px 20px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;box-shadow:var(--shadow-modal)}
.sup-modal h3{font-size:var(--fs-lg);font-weight:var(--fw-heavy);color:var(--snow)}
.sup-modal select{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--line);border-radius:var(--rad);color:var(--snow);font-size:var(--fs-sm);font-family:inherit;transition:border-color .15s}
.sup-modal select:focus{outline:none;border-color:var(--b);box-shadow:0 0 0 3px var(--ring-b)}
.sup-modal-foot{display:flex;gap:10px;margin-top:4px}

/* ══ Detail panel ══════════════════════════════════════════════════ */
.wd-back-bar{display:none;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--bg2);align-items:center;gap:10px}
@media(max-width:768px){body.detail-open .wd-back-bar{display:flex}}
.wd-back-btn{padding:6px 16px;border-radius:var(--rad3);border:1px solid var(--line);background:var(--bg);color:var(--snow);font-size:var(--fs-sm);font-weight:var(--fw-bold);cursor:pointer;font-family:inherit;transition:all .15s}
.wd-back-btn:hover{border-color:var(--b);color:var(--b)}
.wd-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--dim2);padding:48px;text-align:center;min-height:300px}

/* Tabs in detail */
.wd-tabs{display:flex;border-bottom:2px solid var(--line);background:var(--bg2);padding:0 4px}
.wdt{flex:1;padding:12px 8px;font-size:var(--fs-sm);font-weight:var(--fw-bold);font-family:inherit;background:transparent;border:none;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.wdt:hover{color:var(--snow)}
.wdt.on{color:var(--b);border-bottom-color:var(--b);background:transparent}

.wd-hdr{padding:16px 20px;background:var(--bg2);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
.wd-client{font-size:var(--fs-base);font-weight:var(--fw-bold);color:var(--dim2);margin-bottom:2px}
.wd-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:var(--fs-xs);margin-top:4px}
.wd-links{display:flex;gap:6px;flex-wrap:wrap}
.wd-link{padding:6px 14px;border-radius:var(--rad3);border:1px solid var(--line);background:var(--bg);color:var(--dim2);font-size:var(--fs-xs);font-weight:var(--fw-bold);font-family:inherit;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.wd-link:hover{color:var(--b);border-color:var(--tint-b-line);background:var(--tint-b-soft)}

.wd{padding:18px 20px;display:flex;flex-direction:column;gap:16px}
.wd-sec{border:1px solid var(--line);border-radius:var(--rad);overflow:hidden;background:var(--bg2)}
.wd-sec-hdr{padding:11px 14px;background:var(--bg3);border-bottom:1px solid var(--line);font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--dim2);display:flex;align-items:center;justify-content:space-between;gap:8px}
.wd-sec-body{padding:12px;display:flex;flex-direction:column;gap:2px}

/* منتجات — بطاقات */
.prd-item{padding:14px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad);margin-bottom:8px;transition:border-color .15s}
.prd-item:last-child{margin-bottom:0}
.prd-item:hover{border-color:var(--line2)}
.prd-item.prd-cancelled{opacity:.4;border-style:dashed}
.prd-name{font-size:var(--fs-base);font-weight:var(--fw-heavy);color:var(--snow);margin-bottom:10px;display:flex;align-items:baseline;gap:6px}
.prd-status-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.psb{font-size:var(--fs-xs);padding:5px 12px;border-radius:var(--rad3);border:1px solid var(--line);background:transparent;color:var(--dim2);cursor:pointer;font-family:inherit;transition:all .15s}
.psb:hover{border-color:var(--b);background:var(--hover)}
.psb.on-pending{border-color:var(--line2);background:var(--hover);color:var(--dim2)}
.psb.on-wip{border-color:var(--tint-b-line);background:var(--tint-b-soft);color:var(--b)}
.psb.on-done{border-color:var(--tint-g-line);background:var(--tint-g-soft);color:var(--g)}
.psb.on-problem{border-color:var(--tint-r-line);background:var(--tint-r-soft);color:var(--r)}
.prd-sup-row{display:flex;align-items:center;gap:8px}
.prd-sup-lbl{font-size:var(--fs-xs);color:var(--dim2);flex-shrink:0}
.prd-sup-sel{flex:1;font-size:var(--fs-xs);padding:7px 10px;border-radius:var(--rad3);border:1px solid var(--line);background:var(--bg);color:var(--snow);font-family:inherit;min-width:0;transition:border-color .15s}
.prd-sup-sel:focus{outline:none;border-color:var(--b);box-shadow:0 0 0 3px var(--ring-b)}

/* ══ تكاليف — بطاقات منظمة ═══════════════════════════════════════ */
.cost-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad);padding:12px 14px;margin-bottom:8px;transition:all .15s}
.cost-card:last-child{margin-bottom:0}
.cost-card:hover{border-color:var(--line2)}
.cost-card.editing{border-color:var(--b);background:var(--tint-b-soft)}
.cost-card-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cost-card-type{font-size:var(--fs-sm);font-weight:var(--fw-heavy);color:var(--snow);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cost-card-prod{font-size:10px;padding:2px 8px;border-radius:var(--rad3);background:var(--tint-b-soft);border:1px solid var(--tint-b-line);color:var(--b);white-space:nowrap;flex-shrink:0}
.cost-card-mid{display:flex;gap:10px;flex-wrap:wrap;font-size:var(--fs-xs);color:var(--dim2);margin-bottom:6px}
.cost-card-mid:empty{display:none;margin:0}
.cost-card-sup,.cost-card-note{display:inline-flex;align-items:center;gap:4px}
.cost-card-bottom{display:flex;align-items:center;justify-content:space-between;gap:10px}
.cost-card-amount{font-size:var(--fs-lg);font-weight:var(--fw-heavy);color:var(--y);direction:ltr}
.cost-card-actions{display:flex;align-items:center;gap:6px}
.paid-pill{font-size:10px;padding:3px 10px;border-radius:var(--rad3);background:var(--tint-g-soft);color:var(--g);border:1px solid var(--tint-g-line);font-weight:var(--fw-bold)}
.unpaid-pill{font-size:10px;padding:3px 10px;border-radius:var(--rad3);background:var(--tint-y-soft);color:var(--y);border:1px solid var(--tint-y-line);font-weight:var(--fw-bold)}
.del-btn{font-size:var(--fs-xs);padding:4px 10px;border-radius:var(--rad3);border:1px solid var(--tint-r-line);background:var(--tint-r-soft);color:var(--r);cursor:pointer;font-family:inherit;transition:all .15s}
.del-btn:hover{background:var(--tint-r-med)}
.edit-btn{font-size:var(--fs-xs);padding:4px 10px;border-radius:var(--rad3);border:1px solid var(--line);background:transparent;color:var(--dim2);cursor:pointer;font-family:inherit;transition:all .15s}
.edit-btn:hover{border-color:var(--b);color:var(--b);background:var(--tint-b-soft)}

/* ملخص التكاليف — بطاقات مقاييس */
.cost-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:14px 16px;border-bottom:1px solid var(--line)}
.cost-metric{text-align:center;padding:10px 6px;background:var(--bg);border-radius:var(--rad);border:1px solid var(--line)}
.cost-metric-val{font-size:var(--fs-lg);font-weight:var(--fw-heavy);direction:ltr;line-height:1.2}
.cost-metric-lbl{font-size:var(--fs-xs);color:var(--dim2);margin-top:4px;font-weight:var(--fw-bold)}
.cost-metric.cm-total .cost-metric-val{color:var(--y)}
.cost-metric.cm-paid .cost-metric-val{color:var(--g)}
.cost-metric.cm-unpaid .cost-metric-val{color:var(--b)}
.cost-metric.cm-profit .cost-metric-val{color:var(--g)}
.cost-metric.cm-loss .cost-metric-val{color:var(--r)}
.cost-sup-summary{display:flex;flex-wrap:wrap;gap:6px;padding:8px 16px 10px;font-size:var(--fs-xs)}
.cost-sup-chip{padding:4px 10px;border-radius:var(--rad3);background:var(--bg);border:1px solid var(--line);color:var(--dim2);display:inline-flex;align-items:center;gap:5px}
.cost-sup-chip b{color:var(--y);direction:ltr;font-weight:var(--fw-heavy)}
.cost-card-audit{font-size:10px;color:var(--dim);margin-top:4px;display:flex;gap:10px}
.cost-progress{height:5px;border-radius:3px;background:var(--bg);margin:0 16px 8px;overflow:hidden}
.cost-progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--g),var(--b));transition:width .4s}

/* فورم التكلفة */
.cost-form{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cf-full{grid-column:1/-1}
.cf-lbl{font-size:var(--fs-xs);color:var(--dim2);margin-bottom:4px;font-weight:var(--fw-bold)}
.cf-inp{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--line);border-radius:var(--rad);color:var(--snow);font-size:var(--fs-sm);font-family:inherit;transition:border-color .15s}
.cf-inp:focus{outline:none;border-color:var(--b);box-shadow:0 0 0 3px var(--ring-b)}
.cost-form-wrap{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad);padding:14px;margin-top:10px}
.cost-form-title{font-size:var(--fs-sm);font-weight:var(--fw-heavy);color:var(--snow);margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* السجل / timeline */
.tl-item{padding:10px 4px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:3px}
.tl-item:last-child{border-bottom:none}
.tl-action{font-size:var(--fs-sm);color:var(--snow);font-weight:var(--fw-bold);line-height:1.4}
.tl-by{font-size:var(--fs-xs);color:var(--dim)}

/* ملاحظة */
.note-ta{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--line);border-radius:var(--rad);color:var(--snow);font-size:var(--fs-sm);font-family:inherit;resize:vertical;min-height:68px;transition:border-color .15s;line-height:1.5}
.note-ta:focus{outline:none;border-color:var(--b);box-shadow:0 0 0 3px var(--ring-b)}

/* مندوب */
.agent-sel{flex:1;padding:9px 12px;background:var(--bg);border:1px solid var(--line);border-radius:var(--rad);color:var(--snow);font-size:var(--fs-sm);font-family:inherit;transition:border-color .15s}
.agent-sel:focus{outline:none;border-color:var(--b);box-shadow:0 0 0 3px var(--ring-b)}

/* صورة */
.design-img{width:100%;max-height:200px;object-fit:contain;border-radius:var(--rad);background:var(--bg2);display:block}

/* أزرار عامة */
.act{padding:9px 16px;border-radius:var(--rad3);font-size:var(--fs-sm);font-weight:var(--fw-bold);font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:6px;border:1px solid;transition:all .15s}
.act:disabled{opacity:.35;cursor:not-allowed;filter:grayscale(.3)}
.act-ship{background:var(--tint-b-soft);border-color:var(--tint-b-line);color:var(--b)}
.act-ship:hover:not(:disabled){background:var(--tint-b-med)}
.act-ghost{background:transparent;border-color:var(--line);color:var(--dim2)}
.act-ghost:hover:not(:disabled){background:var(--hover);color:var(--snow);border-color:var(--line2)}
.act-save{background:var(--tint-g-soft);border-color:var(--tint-g-line);color:var(--g)}
.act-save:hover:not(:disabled){background:var(--tint-g-med)}
.act-add{background:var(--tint-p-soft);border-color:var(--tint-p-line);color:var(--p)}
.act-add:hover:not(:disabled){background:var(--tint-p-med)}
.act-full{width:100%;justify-content:center}

/* Toasts */
#toasts{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.ti{padding:10px 20px;border-radius:var(--rad);font-size:var(--fs-sm);font-weight:var(--fw-bold);box-shadow:var(--shadow-pop);max-width:92vw;text-align:center;animation:tIn .25s cubic-bezier(.4,0,.2,1)}
@keyframes tIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.t-ok{background:var(--tint-g-soft);border:1px solid var(--tint-g-line);color:var(--g)}
.t-err{background:var(--tint-r-soft);border:1px solid var(--tint-r-line);color:var(--r)}
.t-warn{background:var(--tint-y-soft);border:1px solid var(--tint-y-line);color:var(--y)}

/* ══ Journey Rail ══════════════════════════════════════════════════ */
.jrail{display:flex;align-items:flex-start;padding:14px 20px 12px;background:var(--bg2);border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none}
.jrail::-webkit-scrollbar{display:none}
.jstep{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;min-width:56px}
.jdot{width:14px;height:14px;border-radius:50%;border:2px solid var(--line);background:var(--bg);transition:all .25s}
.jline{flex:1;height:2px;background:var(--line);margin-top:6px;min-width:20px;max-width:44px;flex-shrink:1;border-radius:1px}
.jlbl{font-size:var(--fs-xs);color:var(--dim);white-space:nowrap;text-align:center;font-weight:var(--fw-bold)}
.jstep.done .jdot{background:var(--g);border-color:var(--g)}
.jstep.done .jlbl{color:var(--g)}
.jstep.active .jdot{background:var(--b);border-color:var(--b);box-shadow:0 0 0 4px var(--ring-b)}
.jstep.active .jlbl{color:var(--b);font-weight:var(--fw-extra)}
.jstep.problem .jdot{background:var(--r);border-color:var(--r);box-shadow:0 0 0 4px var(--tint-r-soft)}
.jstep.problem .jlbl{color:var(--r)}
.jline.done{background:var(--g)}
.jline.active{background:linear-gradient(90deg,var(--g),var(--b))}

/* ══ Alert bar ══════════════════════════════════════════════════════ */
.alert-bar{display:flex;gap:8px;padding:10px 20px;background:var(--bg);border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap}
.alert-bar::-webkit-scrollbar{display:none}
.alert-bar:empty{display:none}
.achip{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;font-size:var(--fs-xs);font-weight:var(--fw-bold);padding:5px 12px;border-radius:var(--rad3);border:1px solid;cursor:default}
.achip-r{background:var(--tint-r-soft);border-color:var(--tint-r-line);color:var(--r)}
.achip-y{background:var(--tint-y-soft);border-color:var(--tint-y-line);color:var(--y)}
.achip-b{background:var(--tint-b-soft);border-color:var(--tint-b-line);color:var(--b)}

/* legacy compat */
.cost-tmpl-box{background:var(--tint-p-soft);border:1px solid var(--tint-p-line);border-radius:var(--rad);padding:12px 14px;margin-bottom:10px}
.cost-tmpl-hdr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.cost-tmpl-label{font-size:10px;font-weight:var(--fw-heavy);padding:2px 8px;border-radius:var(--rad3);background:var(--tint-p-med);color:var(--p);flex-shrink:0}
.cost-tmpl-name{font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--snow);flex:1;min-width:0}
.cost-tmpl-total{font-size:var(--fs-sm);font-weight:var(--fw-heavy);color:var(--y);white-space:nowrap}
.cost-tmpl-prod{font-size:var(--fs-xs);color:var(--dim2);width:100%}
.cost-tmpl-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
/* مكتبة القوالب (fallback + browse) */
.cost-lib{border:1px solid var(--line);border-radius:var(--rad);overflow:hidden;margin-bottom:10px}
.cost-lib-hdr{padding:10px 14px;background:var(--bg2);font-size:var(--fs-xs);font-weight:var(--fw-bold);color:var(--dim2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;list-style:none;user-select:none}
.cost-lib-hdr:hover{color:var(--snow)}
.cost-lib summary{padding:10px 14px;background:var(--bg2);font-size:var(--fs-xs);font-weight:var(--fw-bold);color:var(--dim2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;list-style:none}
.cost-lib summary:hover{color:var(--snow)}
.cost-lib-item{padding:10px 14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.cost-lib-name{font-size:var(--fs-xs);font-weight:var(--fw-bold);color:var(--snow);flex:1;min-width:0}
.cost-lib-total{font-size:var(--fs-xs);color:var(--y);font-weight:var(--fw-heavy)}
.ctc{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--bg);border:1px solid var(--line);border-radius:var(--rad3);font-size:var(--fs-xs)}
.ctc-type{color:var(--snow);font-weight:var(--fw-bold)}
.ctc-sep{color:var(--dim)}
.ctc-sup{color:var(--dim2)}
.ctc-amt{color:var(--y);font-weight:var(--fw-heavy)}
/* ══ Contextual ship button ═════════════════════════════════════════ */
.ship-ready{background:var(--tint-g-soft);border-color:var(--tint-g-line);color:var(--g);font-size:var(--fs-base);padding:14px}
.ship-ready:hover:not(:disabled){background:var(--tint-g-med)}

/* ══ Shift dashboard ═══════════════════════════════════════════════ */
.shift-bar{display:flex;align-items:center;gap:12px;padding:8px 20px;background:var(--tint-p-soft);border-bottom:1px solid var(--tint-p-line);font-size:var(--fs-xs);color:var(--dim2);flex-wrap:wrap}
.shift-stat{display:flex;align-items:center;gap:4px;font-weight:var(--fw-bold)}
.shift-stat b{color:var(--snow)}

/* ══ Checklist ═════════════════════════════════════════════════════ */
.prod-cl{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.cl-item{display:flex;align-items:center;gap:4px;font-size:var(--fs-xs);padding:3px 10px;border-radius:var(--rad3);border:1px solid var(--line);background:transparent;color:var(--dim2);cursor:pointer;font-family:inherit;transition:all .15s}
.cl-item.checked{border-color:var(--tint-g-line);background:var(--tint-g-soft);color:var(--g);text-decoration:line-through}
.cl-item:hover{border-color:var(--b);background:var(--hover)}

/* ══ Per-product ship ══════════════════════════════════════════════ */
.prd-ship-btn{margin-top:8px;width:100%;padding:8px;border-radius:var(--rad);border:1px solid var(--tint-g-line);background:var(--tint-g-soft);color:var(--g);font-size:var(--fs-xs);font-weight:var(--fw-bold);font-family:inherit;cursor:pointer;transition:all .15s}
.prd-ship-btn:hover{background:var(--tint-g-med)}

/* ══ Photo upload ══════════════════════════════════════════════════ */
.photo-sec{margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.photo-thumb{width:44px;height:44px;border-radius:var(--rad);object-fit:cover;border:1px solid var(--line);cursor:pointer;transition:border-color .15s}
.photo-thumb:hover{border-color:var(--b)}
.photo-add{width:44px;height:44px;border-radius:var(--rad);border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--dim2);cursor:pointer;background:transparent;font-family:inherit;transition:all .15s}
.photo-add:hover{border-color:var(--b);color:var(--b);background:var(--tint-b-soft)}

/* ══ Quick entry chips ═════════════════════════════════════════════ */
.qe-strip{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.qe-chip{padding:4px 12px;border-radius:var(--rad3);border:1px solid var(--line);background:transparent;color:var(--dim2);font-size:var(--fs-xs);font-weight:var(--fw-bold);font-family:inherit;cursor:pointer;transition:all .15s}
.qe-chip:hover{border-color:var(--b);color:var(--b);background:var(--tint-b-soft)}
.qe-chip.recorded{border-color:var(--tint-g-line);background:var(--tint-g-soft);color:var(--g)}

/* ══ Completeness bar ══════════════════════════════════════════════ */
.compl-row{display:flex;align-items:center;gap:8px;font-size:var(--fs-xs);color:var(--dim2);margin-top:6px}
.compl-track{flex:1;max-width:90px;height:4px;border-radius:2px;background:var(--bg);overflow:hidden}
.compl-fill{height:100%;border-radius:2px;background:var(--g);transition:width .3s}

/* ══ Similar order suggestion ══════════════════════════════════════ */
.sim-card{background:var(--tint-p-soft);border:1px solid var(--tint-p-line);border-radius:var(--rad);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sim-info{flex:1;min-width:0;font-size:var(--fs-xs);color:var(--dim2)}
.sim-info b{color:var(--snow)}

/* ══ Supplier stats badge ══════════════════════════════════════════ */
.sup-stats{font-size:10px;color:var(--dim);margin-top:4px;display:flex;gap:10px}

/* ══ Pin button ════════════════════════════════════════════════════ */
.pin-btn{position:absolute;top:8px;inset-inline-end:8px;width:24px;height:24px;border-radius:50%;border:1px solid var(--line);background:var(--bg2);color:var(--dim2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s}
.wl-card:hover .pin-btn,.pin-btn.pinned{opacity:1}
.pin-btn:hover{border-color:var(--b);color:var(--b)}
.pin-btn.pinned{color:var(--y);border-color:var(--tint-y-line);background:var(--tint-y-soft)}

/* ══ Agent Expenses ══════════════════════════════════════════════════ */
.agent-cat-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.agent-cat-chip{padding:5px 12px;border-radius:var(--rad3);border:1px solid var(--line);background:transparent;color:var(--dim2);font-size:var(--fs-xs);font-weight:var(--fw-bold);cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.agent-cat-chip:hover{border-color:var(--b);color:var(--snow);background:var(--hover)}
.agent-cat-chip.sel{background:var(--b);color:#fff;border-color:var(--b)}
.agent-exp-row{display:flex;justify-content:space-between;align-items:center;padding:8px 4px;border-bottom:1px solid var(--line);font-size:var(--fs-xs)}
.agent-exp-row:last-child{border-bottom:none}
.agent-exp-total{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:2px solid var(--line);font-size:var(--fs-sm);font-weight:var(--fw-heavy)}

/* ══ Admin section ══════════════════════════════════════════════════ */
.adm-section{margin:16px 0;background:var(--tint-r-soft);border:1px solid var(--tint-r-line);border-radius:var(--rad);padding:16px}
.adm-title{font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--r);margin-bottom:12px}
.adm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.adm-field-lbl{font-size:var(--fs-xs);color:var(--dim2);margin-bottom:4px;font-weight:var(--fw-bold)}
.adm-inp{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:var(--rad);background:var(--bg2);color:var(--snow);font-size:var(--fs-sm);font-family:inherit;font-weight:var(--fw-bold);transition:border-color .15s}
.adm-inp:focus{outline:none;border-color:var(--b);box-shadow:0 0 0 3px var(--ring-b)}
.adm-preview{font-size:var(--fs-xs);color:var(--dim2);padding:8px 0;font-weight:var(--fw-bold)}
.adm-btn{width:100%;padding:10px;border-radius:var(--rad);border:1px solid;font-size:var(--fs-sm);font-weight:var(--fw-bold);cursor:pointer;font-family:inherit;margin-top:6px;transition:all .15s}
.adm-btn-save{background:var(--tint-y-soft);border-color:var(--tint-y-line);color:var(--y)}
.adm-btn-save:hover{background:var(--tint-y-med)}
.adm-btn-del{background:var(--tint-r-soft);border-color:var(--tint-r-line);color:var(--r)}
.adm-btn-del:hover{background:var(--tint-r-med)}

/* ══ Card progress bar (mini) ═════════════════════════════════════ */
.wl-card-prog{height:3px;border-radius:2px;background:var(--line);margin-top:6px;overflow:hidden}
.wl-card-prog-fill{height:100%;border-radius:2px;transition:width .3s}
.wl-card-prog-fill.prog-done{background:var(--g)}
.wl-card-prog-fill.prog-wip{background:linear-gradient(90deg,var(--b),var(--g))}
.wl-card-prog-fill.prog-problem{background:var(--r)}
.wl-card-prog-fill.prog-pending{background:var(--dim)}

/* ══ Skeleton loading ═════════════════════════════════════════════ */
@keyframes shimmer{0%{background-position:200% 0}to{background-position:-200% 0}}
.skel{border-radius:6px;background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3,var(--line)) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
.skel-card{padding:14px;margin:0 6px 2px;border-radius:var(--rad);display:flex;gap:10px;align-items:flex-start}
.skel-thumb{width:48px;height:48px;border-radius:var(--rad);flex-shrink:0}
.skel-lines{flex:1;display:flex;flex-direction:column;gap:8px}
.skel-line{height:12px;border-radius:4px}
.skel-line.w60{width:60%}.skel-line.w80{width:80%}.skel-line.w40{width:40%}

/* ══ Sticky detail header ═════════════════════════════════════════ */
.wd-sticky{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--line)}

/* ══ Detail fade-in ═══════════════════════════════════════════════ */
@keyframes fadeSlide{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.wd-animate{animation:fadeSlide .2s ease}

/* ══ Copy tooltip ═════════════════════════════════════════════════ */
.copy-btn{display:inline-flex;align-items:center;padding:0 4px;cursor:pointer;color:var(--dim);border:none;background:none;font-size:12px;font-family:inherit;transition:color .15s;vertical-align:middle}
.copy-btn:hover{color:var(--b)}
.copy-btn.copied{color:var(--g)}

/* ══ Keyboard shortcut hint ═══════════════════════════════════════ */
.kbd-hint{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:90;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad);padding:10px 16px;font-size:var(--fs-xs);color:var(--dim2);box-shadow:var(--shadow-pop);display:none;white-space:nowrap;gap:12px;align-items:center}
.kbd-hint.show{display:flex}
.kbd-hint kbd{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:20px;padding:0 5px;background:var(--bg);border:1px solid var(--line);border-radius:4px;font-size:10px;font-weight:var(--fw-bold);color:var(--snow);font-family:inherit}
@media(max-width:768px){.kbd-hint{display:none!important}}

/* ══ Accessibility ════════════════════════════════════════════════ */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
:focus-visible{outline:2px solid var(--b);outline-offset:2px}
.wl-card:focus-visible{background:var(--hover);border-color:var(--tint-b-line)}

/* ══ Extracted inline styles (from JS templates) ═════════════════ */
.wd-prod-title{font-size:var(--fs-xl);font-weight:var(--fw-heavy);color:var(--snow);margin-bottom:4px;line-height:1.3}
.wd-prod-sep{color:var(--dim);font-weight:var(--fw-normal)}
.wd-prod-qty{color:var(--b);font-size:var(--fs-sm);font-weight:var(--fw-bold)}
.wd-deadline-late{color:var(--r)}
.wd-deadline-ok{color:var(--dim2)}
.wd-order-img{width:100%;max-height:180px;object-fit:contain;border-radius:var(--rad);background:var(--bg2);border:1px solid var(--line)}
.prd-qty-tag{color:var(--b);font-weight:var(--fw-extra);font-size:12px}
.prd-design-grid{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.prd-design-img{object-fit:contain;border-radius:8px;border:1px solid var(--line);cursor:zoom-in;background:var(--bg3)}
.prd-design-single{width:100%;max-height:160px}
.prd-design-multi{width:calc(50% - 3px);max-height:100px}
.prd-cancel-msg{color:var(--r);font-size:var(--fs-xs);margin:4px 0}
.act-cancel-product{background:var(--tint-r-soft);border-color:var(--tint-r-line);color:var(--r);margin-top:8px}
.act-waybill{flex-shrink:0;padding:13px 16px;background:var(--tint-b-soft);border-color:var(--tint-b-line);color:var(--b)}
.empty-state{padding:48px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-icon{width:48px;height:48px;border-radius:50%;background:var(--bg2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:22px;opacity:.35}
.empty-title{font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--snow)}

<script type="module">
import { auth, db } from "./core/firebase-init.js";
import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { orderActions } from "./order-actions.js";
import { productionActions } from "./production-actions.js";
import { canSeeField } from "./core/permissions-matrix.js";
import { getCostTemplates, saveCostTemplate, migrateCostTemplates } from "./core/cost-template-actions.js";
import { getTmplMatches, scoreTmpl } from "./core/cost-template-matching.js";
import { getPriceTrend, getSupplierRanking } from "./core/cost-library-actions.js";
import { getFixedPrices, lookupFixedPrice, migrateFixedPrices } from "./core/fixed-prices-actions.js";
import { getExpectedCostTypes } from './core/product-taxonomy.js';
import { uploadOrderFile } from "./core/storage-helpers.js";
import { dataCache, cachedQuery } from './core/data-cache.js';
import { getMasterList } from './core/static-store.js';
import { warmImages, extractOrderImageUrls } from './core/image-cache.js';

// ── Constants ──────────────────────────────────────────────────────
const RMAP={admin:'accounts.html',operation_manager:'ops-dashboard.html',customer_service:'cs-dashboard.html',graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'};
const ROLE_LABEL={admin:'مدير النظام',operation_manager:'مدير العمليات',customer_service:'خدمة العملاء',graphic_designer:'مصمم جرافيك',design_operator:'مشغّل تصميم',production_agent:'مسؤول إنتاج',shipping_officer:'مسؤول شحن',wallet_manager:'أمين الخزنة'};
const EXEC=[
  {k:'pending',ico:'⏳',lbl:'انتظار',bc:'bdg-pending'},
  {k:'wip',    ico:'🔄',lbl:'جاري',  bc:'bdg-wip'},
  {k:'done',   ico:'✅',lbl:'تم',    bc:'bdg-done'},
  {k:'problem',ico:'⚠️',lbl:'مشكلة',bc:'bdg-problem'},
  {k:'cancelled',ico:'❌',lbl:'ملغي',bc:'bdg-cancelled'},
];
const TABS=[
  {k:'all',    lbl:'الكل'},
  {k:'pending',lbl:'⏳ انتظار'},
  {k:'wip',    lbl:'🔄 جاري'},
  {k:'done',   lbl:'✅ تم'},
  {k:'problem',lbl:'⚠️ مشكلة'},
  {k:'nosup',  lbl:'🏭 بدون مورد'},
  {k:'nocost', lbl:'💰 بدون تكلفة'},
];
const STATUS_LABELS={wip:'🔄 جاري',done:'✅ تم',problem:'⚠️ مشكلة',pending:'⏳ انتظار'};

// ── State ──────────────────────────────────────────────────────────
let me={uid:'',name:'',role:'',perms:null};
let orders=[], suppliers=[], prodAgents=[], costTemplates=[], masterCategories=[], wallets=[], fixedPrices=[];
let loaded=false, selectedId=null, detailTab='main', editCostIdx=-1, costFormProdIdx=0;
let filterK='all', mineOnly=false, searchQ='', supFilter='';
let selectMode=false, selected=new Set();
let __started=false;
let shiftStart=Date.now(), shiftDone=0, shiftCosts=0;
let _renderTimer=null;
function scheduleRender(){if(_renderTimer)return;_renderTimer=requestAnimationFrame(()=>{_renderTimer=null;_stGeneration++;try{renderList();renderKPIs();if(selectedId)renderDetail();}catch(err){console.error('[exec-ws] render error',err);toast('خطأ في العرض','err');}});}
let pinnedIds=new Set(JSON.parse(localStorage.getItem('exec-pinned')||'[]'));
let prodChecks={};
let _agentCat='نقل';
const isAdminRole=()=>['admin','operation_manager'].includes(me.role);

// ── Helpers ────────────────────────────────────────────────────────
const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG',{maximumFractionDigits:0});
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const oCode=o=>o.orderNumber||o.orderCode||o.code||('#'+String(o._id||'').slice(-5));
const _stCache=new WeakMap();
let _stGeneration=0;
const deriveSt=o=>{const cached=_stCache.get(o);if(cached&&cached.gen===_stGeneration)return cached.v;const ps=o.products||[];let v;if(!ps.length)v=o.prodStatus||'pending';else{const active=ps.filter(p=>p.execStatus!=='cancelled');if(!active.length)v='cancelled';else if(active.every(p=>p.execStatus==='done'))v='done';else if(active.some(p=>p.execStatus==='problem'))v='problem';else v=active.some(p=>(p.execStatus||'pending')!=='pending')?'wip':'pending';}_stCache.set(o,{v,gen:_stGeneration});return v;};
const orderCost=o=>(o.costItems||[]).reduce((s,c)=>s+(parseFloat(c.total)||0),0);
const hasNoSup=o=>(o.products||[]).some(p=>!p.supplierId);
const hasNoCost=o=>!(o.costItems||[]).length;
const canCost=()=>canSeeField('supplier_cost',me.role,me.perms);
const isMobile=()=>window.innerWidth<=768;
const designUrl=o=>{if(o.printFinalUrl)return o.printFinalUrl;for(const p of(o.products||[])){const a=Array.isArray(p.designImages)?p.designImages.filter(Boolean):[];if(a.length)return a[a.length-1];if(p.designImageUrl)return p.designImageUrl;}return o.designImageUrl||o.designFileUrl||(o.designFiles||[])[0]?.url||'';};

// urgency score (5 = late, 3 = no-sup, 1 = no-cost)
const urgency=o=>{let s=0;if(o.deadline&&new Date(o.deadline)<new Date())s+=5;if(hasNoSup(o))s+=3;if(hasNoCost(o))s+=1;return s;};
const savePins=()=>localStorage.setItem('exec-pinned',JSON.stringify([...pinnedIds]));

// ── #2 Similar orders (same product name with costs) ──────────────
const _normName=s=>(s||'').replace(/[٠-٩0-9×x]/g,'').replace(/\s+/g,' ').trim().toLowerCase();
const findSimilar=o=>{
  const names=new Set((o.products||[]).map(p=>_normName(p.name)));
  return orders.filter(x=>x._id!==o._id&&(x.costItems||[]).length>0&&
    (x.products||[]).some(p=>names.has(_normName(p.name)))).slice(0,3);
};

// ── #5 Expected cost types per product ────────────────────────────
const getExpectedTypes=prod=>getExpectedCostTypes(prod,masterCategories);
const getCompleteness=(costs,pi,prod)=>{
  const exp=getExpectedTypes(prod);
  const rec=new Set(costs.filter(c=>c.prodIdx===pi).map(c=>c.type));
  const done=exp.filter(t=>rec.has(t)).length;
  return{expected:exp,recorded:rec,pct:exp.length?Math.round(done/exp.length*100):0};
};

// ── #7 Derive production checklist ────────────────────────────────
const deriveChecklist=prod=>{
  const steps=[];
  steps.push(prod.printType==='digital'?'طباعة ديجيتال':prod.printType==='offset'?'طباعة أوفست':'طباعة');
  (prod.extras||[]).forEach(e=>steps.push(e));
  steps.push('مراجعة جودة');
  return steps;
};

// ── #8 Supplier stats from loaded orders ──────────────────────────
const getSupStats=sid=>{
  const so=orders.filter(o=>(o.products||[]).some(p=>p.supplierId===sid));
  return{active:so.length,done:so.filter(o=>deriveSt(o)==='done').length,
    prob:so.filter(o=>deriveSt(o)==='problem').length};
};

// ── Cost type select options (same source as exec-cost-entry: master_lists/supplier_categories) ──
function _buildTypeOptions(sel=''){
  const selAttr=v=>sel&&v===sel?' selected':'';
  if(masterCategories.length){
    const groups={};
    masterCategories.forEach(c=>{const g=c.group||'أخرى';if(!groups[g])groups[g]=[];groups[g].push(c.label);});
    let h='<option value="">— اختر النوع —</option>';
    for(const[g,labels]of Object.entries(groups)){h+=`<optgroup label="${esc(g)}">`;labels.forEach(l=>{h+=`<option value="${esc(l)}"${selAttr(l)}>${esc(l)}</option>`;});h+='</optgroup>';}
    return h;
  }
  const def=['طباعة','ورق','زنكات','سلفنة','قص','تجميع','تصميم','شحن','أخرى'];
  return '<option value="">— اختر النوع —</option>'+def.map(t=>`<option value="${esc(t)}"${selAttr(t)}>${esc(t)}</option>`).join('');
}

// ── Template matching — delegated to core/cost-template-matching.js ──
function _getTmplMatches(o){ return getTmplMatches(costTemplates, o); }

function _wsApplyFixedPrice(type){
  if(!type||!fixedPrices.length)return;
  const o=orders.find(x=>x._id===selectedId);if(!o)return;
  const prodIdx=parseInt(document.getElementById('cf-prod')?.value||'0');
  const prod=prodIdx>=0?(o.products||[])[prodIdx]:(o.products||[])[0];
  const fp=lookupFixedPrice(fixedPrices,type,prod?.printType||'');
  if(!fp)return;
  const inp=document.getElementById('cf-total');
  if(inp&&!inp.value){inp.value=fp.amount;}
  if(fp.supplierId){const sup=document.getElementById('cf-sup');if(sup&&!sup.value)sup.value=fp.supplierId;}
}

async function _loadSupplierInsights(o){
  const el=document.getElementById('ws-sup-insights');if(!el)return;
  const types=new Set((o.costItems||[]).map(c=>c.type).filter(Boolean));
  if(!types.size){el.innerHTML='';return;}
  const prodName=(o.products||[])[0]?.name||'';
  try{
    const results=[];
    for(const type of types){
      const ranking=await getSupplierRanking({db,type,productName:prodName,limitN:3});
      if(ranking.length>1)results.push({type,ranking});
    }
    if(!results.length){el.innerHTML='';return;}
    const trendIcon=d=>d==='up'?'<span class="trend-up">▲</span>':d==='down'?'<span class="trend-down">▼</span>':'<span class="trend-flat">●</span>';
    el.innerHTML=`<details class="cost-lib" style="margin-top:8px">
      <summary style="font-size:var(--fs-xs);font-weight:var(--fw-heavy);cursor:pointer">📊 مقارنة الموردين <span style="color:var(--b)">${results.length} نوع</span> ▾</summary>
      ${results.map(({type,ranking})=>{
        const cheapest=ranking[0];
        return`<div style="margin:8px 0 4px;font-size:var(--fs-xs);font-weight:var(--fw-heavy);color:var(--snow)">${esc(type)}</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">${ranking.map((s,i)=>{
          const trend=s.priceHistory?getPriceTrend(s.priceHistory):{direction:'stable'};
          return`<span style="font-size:11px;background:var(--card);border:1px solid ${i===0?'var(--g)':'var(--border)'};border-radius:8px;padding:3px 8px;display:inline-flex;align-items:center;gap:4px">
            ${i===0?'<span style="color:var(--g);font-weight:bold">✦</span>':''}
            ${esc(s.supplierName||'—')}
            <b>${fn(s.lastPrice||0)} ج</b>
            ${trendIcon(trend.direction)}
          </span>`;
        }).join('')}</div>`;
      }).join('')}
    </details>`;
  }catch(e){console.warn('supplier insights:',e);el.innerHTML='';}
}

function toast(msg,type='ok'){const c=document.getElementById('toasts');const el=document.createElement('div');el.className=`ti t-${type}`;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3500);}

// ── Agent expense helpers ──
window.selAgentCat=function(el,cat){_agentCat=cat;document.querySelectorAll('.agent-cat-chip').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');};
window.saveAgentExpense=async function(){
  if(!selectedId)return;

window.calcAdmRemaining=function(){
  const sale=parseFloat(document.getElementById('adm-sale-price')?.value)||0;
  const paid=parseFloat(document.getElementById('adm-paid')?.value)||0;
  const disc=parseFloat(document.getElementById('adm-discount')?.value)||0;
  const net=Math.max(0,sale-disc);
  const rem=Math.max(0,net-paid);
  const el=document.getElementById('adm-remaining-preview');
  if(el)el.textContent=`الصافي: ${fn(net)} ج | الباقي: ${fn(rem)} ج`;
};

onAuthStateChanged(auth,async u=>{
  if(!u){location.href='login.html';return;}
  if(__started)return; __started=true;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(snap.exists()){
    const d=snap.data();const role=d.role||'customer_service';const pages=(d.permissions?.pages)||[];
    const isAdm=['admin','operation_manager'].includes(role);
    if(!isAdm&&!pages.includes('*')&&!pages.includes('production')&&role!=='production_agent'){location.href=RMAP[role]||'login.html';return;}
    me={uid:u.uid,name:d.name||u.email||'مستخدم',role,perms:d.permissions||null};
    document.getElementById('nav-name').textContent=me.name;
    document.getElementById('nav-av').textContent=(me.name[0]||'U').toUpperCase();
    document.getElementById('role-badge').textContent=ROLE_LABEL[role]||role;
    if(typeof B2CSidebar!=='undefined') B2CSidebar.build(d,'exec-workspace.html');
    if(role==='production_agent'){mineOnly=true;syncMine();}
  }
  migrateCostTemplates(db).catch(()=>{});
  migrateFixedPrices(db).catch(()=>{});
  getCostTemplates(db).then(t=>{costTemplates=t;scheduleRender();}).catch(e=>console.warn('[exec-ws] templates',e));
  getFixedPrices(db).then(p=>{fixedPrices=p;}).catch(e=>console.warn('[exec-ws] fixed prices',e));
  getMasterList('supplier_categories',data=>{
    masterCategories=(data?.items||[]).filter(c=>c.isActive!==false&&c.isSupplierService!==false&&c.isCostItem!==false);
    scheduleRender();
  });
  if(canCost()){
    dataCache.subscribe(cachedQuery('wallets').limit(50).build(),docs=>{
      wallets=docs;
      scheduleRender();
    });
  }
  const urlId=new URLSearchParams(location.search).get('orderId')||'';let urlOpened=false;
  dataCache.subscribe(cachedQuery('orders').where('stage','==','production').limit(1000).build(),docs=>{
    orders=docs;loaded=true;
    if(urlId&&!urlOpened&&orders.find(o=>o._id===urlId)){urlOpened=true;selectedId=urlId;}
    warmImages(extractOrderImageUrls(orders));
    scheduleRender();
  });
  dataCache.subscribe(cachedQuery('suppliers_v2').limit(500).build(),docs=>{
    suppliers=docs;
    buildSupSel();buildBulkSupSel();
    scheduleRender();
  });
  dataCache.subscribe(cachedQuery('employees').where('role','==','production_agent').limit(100).build(),docs=>{
    prodAgents=docs;
    scheduleRender();
  });
});

// ── KPIs + شريط الإنجاز اليومي ────────────────────────────────────
function renderKPIs(){
  const t=orders.length,done=orders.filter(o=>deriveSt(o)==='done').length;
  const wip=orders.filter(o=>deriveSt(o)==='wip').length;
  const prob=orders.filter(o=>deriveSt(o)==='problem').length;
  const noSup=orders.filter(hasNoSup).length;
  document.getElementById('ws-kpis').innerHTML=
    `<div class="kp"><b>${fn(t)}</b> أوردر</div>`+
    `<div class="kp kp-b"><b>${fn(wip)}</b> جاري</div>`+
    `<div class="kp kp-g"><b>${fn(done)}</b> مكتمل</div>`+
    (prob?`<div class="kp kp-r"><b>${fn(prob)}</b> مشكلة</div>`:'')+
    (noSup?`<div class="kp kp-y"><b>${fn(noSup)}</b> بدون مورد</div>`:'')+
    '';
  document.getElementById('ws-sub').textContent=`${fn(t)} أوردر في مرحلة التنفيذ`;
  // شريط الإنجاز
  if(t>0){
    const pct=Math.round(done/t*100);
    document.getElementById('day-bar').style.display='flex';
    document.getElementById('day-txt').textContent=`مكتمل ${fn(done)} من ${fn(t)}`;
    document.getElementById('day-fill').style.width=pct+'%';
    document.getElementById('day-pct').textContent=pct+'%';
  }
  // #4 شريط الوردية
  const elapsed=Math.round((Date.now()-shiftStart)/60000);
  const hrs=Math.floor(elapsed/60),mins=elapsed%60;
  document.getElementById('shift-bar').innerHTML=
    `<span class="shift-stat">⏱ <b>${hrs?hrs+'س ':''}${mins}د</b></span>`+
    `<span class="shift-stat">✅ أنجزت <b>${shiftDone}</b></span>`+
    `<span class="shift-stat">💰 سجلت <b>${shiftCosts}</b> بند</span>`+
    (shiftDone&&elapsed?`<span class="shift-stat">⚡ <b>${Math.round(elapsed/shiftDone)}</b> د/أوردر</span>`:'');
  document.getElementById('shift-bar').style.display=shiftDone||shiftCosts?'flex':'none';
  updatePageTitle();
}

// ── Filtered list ──────────────────────────────────────────────────
function filtered(){
  let l=orders;
  if(mineOnly) l=l.filter(o=>o.productionAgent===me.uid);
  if(supFilter) l=l.filter(o=>(o.products||[]).some(p=>p.supplierId===supFilter));
  if(filterK==='nosup') l=l.filter(hasNoSup);
  else if(filterK==='nocost') l=l.filter(hasNoCost);
  else if(filterK!=='all') l=l.filter(o=>deriveSt(o)===filterK);
  if(searchQ) l=l.filter(o=>(o.clientName||'').toLowerCase().includes(searchQ)||(oCode(o)).toLowerCase().includes(searchQ));
  // #10 pinned first, then urgency, then deadline
  return l.slice().sort((a,b)=>{
    const pa=pinnedIds.has(a._id)?1:0,pb=pinnedIds.has(b._id)?1:0;
    if(pa!==pb)return pb-pa;
    const d=urgency(b)-urgency(a); if(d)return d;
    const da=a.deadline?new Date(a.deadline):new Date(9999,0);
    const db2=b.deadline?new Date(b.deadline):new Date(9999,0);
    return da-db2;
  });
}
const cntTab=k=>{if(k==='all')return orders.length;if(k==='nosup')return orders.filter(hasNoSup).length;if(k==='nocost')return orders.filter(hasNoCost).length;return orders.filter(o=>deriveSt(o)===k).length;};

// ── List render ────────────────────────────────────────────────────
function renderList(){
  if(!loaded) return;
  document.getElementById('wl-tabs').innerHTML=TABS.map(t=>`<button type="button" class="wtab${filterK===t.k?' on':''}" role="tab" aria-selected="${filterK===t.k}" onclick="setFilter('${t.k}')">${t.lbl} <span style="opacity:.55">${cntTab(t.k)}</span></button>`).join('');
  const list=filtered();
  document.getElementById('wl-count').textContent=`${fn(list.length)} أوردر`;
  if(!list.length){document.getElementById('wl-body').innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">لا توجد طلبات</div><div class="empty-hint">جرّب تغيير الفلتر أو البحث</div></div>`;return;}
  document.getElementById('wl-body').innerHTML=list.map(o=>{
    const st=deriveSt(o),ex=EXEC.find(e=>e.k===st)||EXEC[0];
    const _ap=(o.products||[]).filter(p=>p.execStatus!=='cancelled');const np=_ap.length,nd=_ap.filter(p=>p.execStatus==='done').length;
    const pct=np?Math.round(nd/np*100):0;
    const late=o.deadline&&new Date(o.deadline)<new Date();
    const ismine=o.productionAgent===me.uid;
    const imgSrc=designUrl(o);
    const isSel=selected.has(o._id);
    // بناء البطاقة — اسم المنتج هو العنصر الرئيسي
    const prods=o.products||[];
    const firstP=prods[0]||null;
    const restP=prods.slice(1);
    const execIcoMap={pending:'⏳',wip:'🔄',done:'✅',problem:'⚠️',cancelled:'❌'};
    // Hero: اسم المنتج الأول + الكمية
    const heroName=firstP?esc(firstP.name||'منتج'):'—';
    const heroQty=firstP?.qty?`<span class="wl-order-qty">× ${esc(firstP.qty)}</span>`:'';
    // إضافات المنتج الأول
    const firstExtras=firstP?.extras||[];
    const extrasHtml=firstExtras.length?`<div class="wl-extras">${firstExtras.map(e=>`<span class="wl-extra-tag">${esc(e)}</span>`).join('')}</div>`:'';
    // المنتجات الأخرى بشكل مضغوط
    const otherProdsHtml=restP.slice(0,2).map(p=>{
      const eIco=execIcoMap[p.execStatus||'pending']||'⏳';
      const pQty=p.qty?` <span style="opacity:.55">×${esc(p.qty)}</span>`:'';
      const pExtras=(p.extras||[]).length?` <span style="font-size:9px;color:var(--y);opacity:.8">${(p.extras||[]).join('·')}</span>`:'';
      return `<div class="wl-prod-row"><span class="wl-prod-status">${eIco}</span><span class="wl-prod-name">${esc(p.name||'منتج')}${pQty}</span>${pExtras}</div>`;
    }).join('');
    const moreCount=prods.length>3?`<span class="wl-prod-more">+ ${prods.length-3} أخرى</span>`:'';
    const prodsBlock=(otherProdsHtml||moreCount)?`<div class="wl-prods">${otherProdsHtml}${moreCount}</div>`:'';
    // ملخص التكاليف
    const totalBnds=(o.costItems||[]).length;
    const costSum=canCost()?(totalBnds?`<span class="wl-cost-sum">💰 ${totalBnds} بند</span>`:`<span class="wl-cost-sum nocost">بدون تكاليف</span>`):'';
    // السطر الثانوي: العميل + كود + مسؤول
    const agentStr=o.productionAgentName?` · 👷 ${esc(o.productionAgentName)}`:'';
    const mineStr=ismine&&!mineOnly?' · <span style="color:var(--b)">لي</span>':'';
    const lateTag=late?` <span class="bdg bdg-danger" style="font-size:8px">⏰ ${relTime(o.deadline)}</span>`:'';
    const clientLine=`<div class="wl-client-line">👤 <span class="wl-client-name">${esc(o.clientName||'—')}</span> · <span style="cursor:pointer" onclick="event.stopPropagation();copyCode(event,'${esc(oCode(o))}')">${esc(oCode(o))} <button type="button" class="copy-btn" onclick="copyCode(event,'${esc(oCode(o))}')">📋</button></span>${agentStr}${mineStr}${lateTag}${costSum?` · ${costSum}`:''}</div>`;
    const isPinned=pinnedIds.has(o._id);
    return `<div class="wl-card${selectedId===o._id?' active':''}${selectMode?' sel-mode':''}" data-id="${esc(o._id)}" tabindex="0" ${selectedId===o._id?'aria-current="true" ':''}onclick="handleCardClick(event,'${esc(o._id)}')">
      <button type="button" class="pin-btn${isPinned?' pinned':''}" onclick="event.stopPropagation();togglePin('${esc(o._id)}')" title="${isPinned?'إلغاء التثبيت':'تثبيت أعلى'}" aria-label="${isPinned?'إلغاء التثبيت':'تثبيت أعلى'}">${isPinned?'📌':'📍'}</button>
      <div class="wl-check${isSel?' checked':''}" data-check="${esc(o._id)}"></div>
      ${imgSrc?`<img class="wl-thumb" src="${esc(imgSrc)}" alt="" loading="lazy" onerror="this.style.display='none'">`:
               `<div class="wl-thumb-ph" style="color:var(--dim2);opacity:.4">🏭</div>`}
      <div class="wl-card-main">
        <div class="wl-top">
          <div class="wl-order-hero"><span class="wl-name">${heroName}</span>${heroQty}</div>
          <span class="bdg ${ex.bc}">${ex.ico} ${ex.lbl}</span>
        </div>
        ${extrasHtml}
        ${prodsBlock}
        ${clientLine}
        <!-- أزرار الحالة السريعة -->
        <div class="wl-qbtns" onclick="event.stopPropagation()">
          ${['wip','done','problem'].map(k=>{const e2=EXEC.find(e=>e.k===k);return `<button type="button" class="wqb${st===k?' on-'+k:''}" data-qact="${k}" data-oid="${esc(o._id)}">${e2.ico} ${e2.lbl}</button>`;}).join('')}
        </div>
        ${np>1?`<div class="wl-card-prog"><div class="wl-card-prog-fill prog-${st}" style="width:${pct}%"></div></div>`:''}
      </div>
    </div>`;
  }).join('');
}

window.applyBulkSupplier=async function(){
  const sel=document.getElementById('bulk-sup-sel');
  const supplierId=sel.value;
  if(!supplierId){toast('اختر مورداً أولاً','warn');return;}
  const supplierName=sel.options[sel.selectedIndex]?.dataset.name||'';
  const ids=[...selected];
  closeBulkModal();
  let ok=0,fail=0;
  for(const orderId of ids){
    const o=orders.find(x=>x._id===orderId);if(!o)continue;
    const prods=o.products||[];
    if(!prods.length){
      const r=await orderActions.setProductSupplier({db,orderId,prodIdx:0,supplierId,supplierName,userId:me.uid,userName:me.name}).catch(()=>({ok:false}));
      r?.ok?ok++:fail++;
    } else {
      for(let i=0;i<prods.length;i++){
        const r=await orderActions.setProductSupplier({db,orderId,prodIdx:i,supplierId,supplierName,userId:me.uid,userName:me.name}).catch(()=>({ok:false}));
        r?.ok?ok++:fail++;
      }
    }
  }
  toast(`تم تعيين المورد لـ ${ok} ${fail?'· فشل '+fail:''}`,'ok');
  clearSelection();
};

window.bulkShip=async function(){
  if(!selected.size){toast('حدد أوردر أولاً','warn');return;}
  const ids=[...selected];
  const noCost=ids.filter(id=>{const o=orders.find(x=>x._id===id);return o&&!(o.costItems||[]).length;}).length;
  const msg=noCost
    ?`سيتم تحريك ${ids.length} أوردر للشحن (${noCost} بدون تكاليف — يمكن تسجيلها لاحقاً). متأكد؟`
    :`سيتم تحريك ${ids.length} أوردر للشحن. متأكد؟`;
  if(!confirm(msg))return;
  let ok=0,fail=0;
  for(const orderId of ids){
    let r=await orderActions.submitToShipping({db,orderId,role:me.role,userId:me.uid,userName:me.name}).catch(err=>({ok:false,errors:[err.message]}));
    if(r&&!r.ok&&(r.warnings||[]).length&&!(r.errors||[]).length){
      r=await orderActions.submitToShipping({db,orderId,role:me.role,userId:me.uid,userName:me.name,bypassWarnings:true}).catch(err=>({ok:false,errors:[err.message]}));
    }
    r?.ok?ok++:fail++;
  }
  if(ok){shiftDone+=ok;renderKPIs();}
  toast(`✓ ${ok} أوردر تم تحريكه للشحن${fail?' · '+fail+' فشل':''}`,'ok');
  clearSelection();
};

window.applyCancelOrder=async function(){
  const reason=document.getElementById('cancel-reason-sel').value;
  const note=document.getElementById('cancel-note').value.trim();
  if(!reason){toast('اختر سبب الإلغاء','warn');return;}
  const ids=cancelIsBulk?[...selected]:[cancelSingleId].filter(Boolean);
  if(!ids.length){toast('لا يوجد أوردر','warn');return;}
  closeCancelModal();
  let ok=0,fail=0;
  for(const orderId of ids){
    const r=await orderActions.cancelOrder({db,orderId,reason,note,userId:me.uid,userName:me.name}).catch(err=>({ok:false,errors:[err.message]}));
    r?.ok?ok++:fail++;
  }
  toast(`✓ تم إلغاء ${ok} أوردر${fail?' · '+fail+' فشل':''}`,'ok');
  if(cancelIsBulk)clearSelection();
  if(!cancelIsBulk&&ok){selectedId=null;document.body.classList.remove('detail-open');renderList();}
};

function buildSupSel(){
  const usedIds=new Set(orders.flatMap(o=>(o.products||[]).map(p=>p.supplierId).filter(Boolean)));
  const used=suppliers.filter(s=>usedIds.has(s._id));
  const sel=document.getElementById('wl-sup-sel');
  if(!used.length){sel.style.display='none';return;}
  sel.style.display='';
  sel.innerHTML=`<option value="">🏭 كل المطابع</option>`+used.map(s=>`<option value="${esc(s._id)}" ${supFilter===s._id?'selected':''}>${esc(s.name||s._id)}</option>`).join('');
}
function buildBulkSupSel(){
  document.getElementById('bulk-sup-sel').innerHTML=`<option value="">— اختر المورد —</option>`+
    suppliers.map(s=>`<option value="${esc(s._id)}" data-name="${esc(s.name||'')}">${esc(s.name||s._id)}</option>`).join('');
}

// ── Select order ───────────────────────────────────────────────────
window.selectOrder=function(id){
  selectedId=id;editCostIdx=-1;costFormProdIdx=0;renderList();renderDetail();
  scrollToActive();
  if(isMobile()){
    document.body.classList.add('detail-open');
    const o=orders.find(x=>x._id===id);
    const fp=(o?.products||[])[0];
    document.getElementById('wd-back-title').textContent=fp?`${fp.name||'منتج'} ×${fp.qty||1}`:(o?.clientName||'');
    document.getElementById('ws-detail').scrollTop=0;
  }
};

// ── 1. Quick status from card ──────────────────────────────────────
document.getElementById('wl-body').addEventListener('click',async e=>{
  const qbtn=e.target.closest('[data-qact]');if(!qbtn)return;
  e.stopPropagation();
  const status=qbtn.dataset.qact, orderId=qbtn.dataset.oid;
  qbtn.disabled=true;
  const r=await orderActions.setProductionStatus({db,orderId,status,userId:me.uid,userName:me.name}).catch(err=>({ok:false,errors:[err.message]}));
  if(r?.ok) toast(STATUS_LABELS[status]+' ✓','ok');
  else toast((r?.errors||[])[0]||'تعذّر','err');
  qbtn.disabled=false;
});

// ── Detail render ──────────────────────────────────────────────────
window.switchDetailTab=function(tab){detailTab=tab;renderDetail();};

function renderDetail(){
  const o=orders.find(x=>x._id===selectedId);
  const panel=document.getElementById('ws-detail');
  if(!o){
    panel.innerHTML=`<div class="wd-back-bar"><button type="button" class="wd-back-btn" onclick="goBack()">← رجوع</button><span id="wd-back-title" class="wd-back-title"></span></div><div class="wd-empty"><div class="wd-empty-icon">📋</div><div class="wd-empty-title">اختر أوردر</div><div class="wd-empty-desc">اختر أوردر من القائمة لعرض التفاصيل</div></div>`;
    return;
  }
  const st=deriveSt(o), ex=EXEC.find(e=>e.k===st)||EXEC[0];
  const products=o.products||[], costs=o.costItems||[];
  const activeProds=products.filter(p=>p.execStatus!=='cancelled');
  const np=activeProds.length, nd=activeProds.filter(p=>p.execStatus==='done').length;
  const imgSrc=designUrl(o);

  // ── header (compact) ──
  const agentExps=o.agentExpenses||[];
  const tabsHTML=`<div class="wd-tabs" role="tablist" aria-label="تفاصيل الأوردر">
    <button type="button" class="wdt${detailTab==='main'?' on':''}" role="tab" aria-selected="${detailTab==='main'}" onclick="switchDetailTab('main')">🏭 التنفيذ</button>
    ${canCost()?`<button type="button" class="wdt${detailTab==='costs'?' on':''}" role="tab" aria-selected="${detailTab==='costs'}" onclick="switchDetailTab('costs')">💰 التكاليف${costs.length?' ('+costs.length+')':''}</button>`:''}
    <button type="button" class="wdt${detailTab==='agent'?' on':''}" role="tab" aria-selected="${detailTab==='agent'}" onclick="switchDetailTab('agent')">👷 المندوب${agentExps.length?' ('+agentExps.length+')':''}</button>
    <button type="button" class="wdt${detailTab==='timeline'?' on':''}" role="tab" aria-selected="${detailTab==='timeline'}" onclick="switchDetailTab('timeline')">📋 السجل (${(o.timeline||[]).length})</button>
  </div></div>`;

  const hdrHTML=`<div class="wd-sticky"><div class="wd-back-bar"><button type="button" class="wd-back-btn" onclick="goBack()">← رجوع</button><span id="wd-back-title" class="wd-back-title">${esc(o.clientName||'')}</span></div>
  <div class="wd-hdr">
    <div class="flex-fill">
      <div class="wd-prod-title">${products.map(p=>`${esc(p.name||'منتج')} <span class="wd-prod-qty">×${esc(p.qty||1)}</span>`).join(' <span class="wd-prod-sep">·</span> ')}</div>
      <div class="wd-client">${esc(o.clientName||'—')}</div>
      <div class="wd-meta">
        <span class="trend-flat">${esc(oCode(o))}</span>
        <span class="bdg ${ex.bc}">${ex.ico} ${ex.lbl}</span>
        ${o.deadline?`<span class="${new Date(o.deadline)<new Date()?'wd-deadline-late':'wd-deadline-ok'}">📅 ${new Date(o.deadline).toLocaleDateString('ar-EG')}${new Date(o.deadline)<new Date()?' ('+relTime(o.deadline)+')':''}</span>`:''}
      </div>
    </div>
    <a href="order.html?id=${esc(o._id)}" class="wd-link">📋 تتبع</a>
  </div>`;

  // ── Agent expenses tab ──
  if(detailTab==='agent'){
    const expTotal=agentExps.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    const expListHTML=agentExps.length
      ?agentExps.map(e=>`<div class="agent-exp-row"><span>${esc(e.type||'—')}${e.note?' · '+esc(e.note):''}</span><span class="agent-exp-amount">${fn(e.amount)} ج</span></div>`).join('')
      :`<div class="wd-no-data">لا توجد مصروفات بعد</div>`;
    const agentTabHTML=`<div class="wd wd-animate">
      <div class="wd-sec"><div class="wd-sec-hdr">👷 مصروفات المندوب</div><div class="wd-sec-body">
        ${expListHTML}
        ${agentExps.length?`<div class="agent-exp-total"><span>الإجمالي</span><span class="cost-total-accent">${fn(expTotal)} ج</span></div>`:''}
      </div></div>
      <div class="wd-sec"><div class="wd-sec-hdr">➕ تسجيل مصروف</div><div class="wd-sec-body wd-sec-gap">
        <div class="agent-cat-chips">${['نقل','وقود','تغليف','طباعة اضافية','متفرقات'].map(c=>`<button type="button" class="agent-cat-chip${_agentCat===c?' sel':''}" onclick="selAgentCat(this,'${esc(c)}')">${c==='نقل'?'🚗':c==='وقود'?'⛽':c==='تغليف'?'📦':c==='طباعة اضافية'?'🖨️':'📌'} ${esc(c)}</button>`).join('')}</div>
        <input type="number" class="adm-inp" id="agent-exp-amt" placeholder="المبلغ (ج)" min="0">
        <input type="text" class="adm-inp" id="agent-exp-note" placeholder="ملاحظة (اختياري)">
        <button type="button" class="act act-save act-full" onclick="saveAgentExpense()">💰 تسجيل المصروف</button>
      </div></div>
    </div>`;
    panel.innerHTML=hdrHTML+tabsHTML+agentTabHTML;
    return;
  }

  // ── Timeline tab ──
  if(detailTab==='timeline'){
    const tl=(o.timeline||[]).slice().reverse();
    const tlHTML=tl.length
      ?tl.map(e=>`<div class="tl-item"><div class="tl-action">${esc(e.action||'—')}</div><div class="tl-by">👤 ${esc(e.by||'—')} · ${esc(e.date||'')}</div></div>`).join('')
      :`<div class="wd-no-data" style="padding:12px 0">لا يوجد سجل بعد</div>`;
    panel.innerHTML=hdrHTML+tabsHTML+`<div class="wd wd-animate"><div class="wd-sec"><div class="wd-sec-hdr">📋 سجل العمليات</div><div class="wd-sec-body">${tlHTML}</div></div></div>`;
    return;
  }

  // ── Costs tab ──
  if(detailTab==='costs'&&canCost()){
    // ── Cost summary metrics ──
    const totalCostVal=orderCost(o);
    const paidVal=costs.filter(c=>c.walletId).reduce((s,c)=>s+(parseFloat(c.total)||0),0);
    const unpaidVal=totalCostVal-paidVal;
    const salePrice=parseFloat(o.salePrice)||0;
    const disc=parseFloat(o.discount)||0;
    const custShip=parseFloat(o.customerShippingFee||o.shippingFee)||0;
    const grossTotal=salePrice+custShip-disc;
    const profit=grossTotal-totalCostVal;
    const profitPct=grossTotal>0?Math.round((profit/grossTotal)*100):0;
    const isProfit=profit>=0;
    const metricsHTML=costs.length?`
      <div class="cost-metrics" style="grid-template-columns:1fr 1fr 1fr 1fr">
        <div class="cost-metric cm-total"><div class="cost-metric-val">${fn(totalCostVal)}</div><div class="cost-metric-lbl">التكاليف</div></div>
        <div class="cost-metric cm-paid"><div class="cost-metric-val">${fn(paidVal)}</div><div class="cost-metric-lbl">مدفوع</div></div>
        <div class="cost-metric cm-unpaid"><div class="cost-metric-val">${fn(unpaidVal)}</div><div class="cost-metric-lbl">متبقي</div></div>
        <div class="cost-metric ${isProfit?'cm-profit':'cm-loss'}"><div class="cost-metric-val">${isProfit?'':'-'}${fn(Math.abs(profit))}</div><div class="cost-metric-lbl">${isProfit?'ربح':'خسارة'} ${profitPct}%</div></div>
      </div>
      <div class="cost-progress"><div class="cost-progress-fill" style="width:${totalCostVal?Math.round(paidVal/totalCostVal*100):0}%"></div></div>`:'';
    // ── Supplier summary chips ──
    const supMap={};
    costs.forEach(c=>{const k=c.supplierName||'بدون مورد';supMap[k]=(supMap[k]||0)+(parseFloat(c.total)||0);});
    const supChipsHTML=Object.keys(supMap).length>1?`<div class="cost-sup-summary">${Object.entries(supMap).map(([name,total])=>`<span class="cost-sup-chip">🏭 ${esc(name)} <b>${fn(total)} ج</b></span>`).join('')}</div>`:'';

    // ── #2 Similar order suggestion ──
    const simOrders=!costs.length?findSimilar(o):[];
    const simHTML=simOrders.map(s=>{
      const sc=(s.costItems||[]).length,st2=orderCost(s);
      return`<div class="sim-card">
        <div class="sim-info">📋 <b>${esc(oCode(s))}</b> · ${esc(s.clientName||'—')} · <b>${sc}</b> بند · <b>${fn(st2)}</b> ج</div>
        <button type="button" class="act act-ghost" style="font-size:11px;padding:4px 10px;flex-shrink:0" data-act="copycosts" data-src="${esc(s._id)}">نسخ التكاليف</button>
      </div>`;
    }).join('');

    // ── Cost items grouped by product ──
    const _costCard=(c)=>{
      const idx=c._idx;
      const isPaid=!!c.walletId;
      const isEd=editCostIdx===idx;
      const prodName=c.prodIdx>=0&&c.prodIdx<products.length?products[c.prodIdx].name:'عام';
      return`<div class="cost-card${isEd?' editing':''}">
        <div class="cost-card-top">
          <span class="cost-card-type">${esc(c.type||'—')}</span>
          <span class="cost-card-prod">📦 ${esc(prodName)}</span>
        </div>
        <div class="cost-card-mid">
          ${c.supplierName?`<span class="cost-card-sup">🏭 ${esc(c.supplierName)}</span>`:''}
          ${c.note?`<span class="cost-card-note">📝 ${esc(c.note)}</span>`:''}
        </div>
        ${c.addedBy||c.date?`<div class="cost-card-audit">${c.addedBy?`<span>👤 ${esc(c.addedBy)}</span>`:''}${c.date||c.addedAt?`<span>📅 ${esc(c.date||c.addedAt)}</span>`:''}</div>`:''}
        <div class="cost-card-bottom">
          <span class="cost-card-amount">${fn(c.total)} ج</span>
          <div class="cost-card-actions">
            ${isPaid?`<span class="paid-pill">مدفوع</span>`:`<span class="unpaid-pill">غير مدفوع</span>`}
            <button type="button" class="edit-btn" data-act="editcost" data-cidx="${idx}">✏️</button>
            ${!isPaid?`<button type="button" class="del-btn" data-act="delcost" data-cidx="${idx}">🗑</button>`:''}
          </div>
        </div>
      </div>`;
    };
    const indexedCosts=costs.map((c,idx)=>({...c,_idx:idx}));
    let itemsHTML='';
    products.forEach((p,pi)=>{
      const pCosts=indexedCosts.filter(c=>c.prodIdx===pi);
      const pTotal=pCosts.reduce((s,c)=>s+(parseFloat(c.total)||0),0);
      const comp=getCompleteness(costs,pi,p);
      itemsHTML+=`<div class="cost-item-block">
        <div class="cost-item-hdr">
          <span style="display:flex;align-items:center;gap:5px">📦 ${esc(p.name||('منتج '+(pi+1)))} ${p.qty?`<span class="trend-flat" style="font-weight:var(--fw-extra)">×${esc(p.qty)}</span>`:''}</span>
          <span style="display:flex;align-items:center;gap:6px">
            ${pCosts.length?`<span style="font-size:10px;color:var(--y);font-weight:var(--fw-heavy)">${fn(pTotal)} ج · ${pCosts.length} بند</span>`:`<span style="font-size:10px;color:var(--dim2)">لا توجد بنود</span>`}
            <button type="button" class="edit-btn" style="color:var(--b);border-color:var(--tint-b-line)" data-act="addcostfor" data-pidx="${pi}" aria-label="إضافة بند تكلفة">➕</button>
          </span>
        </div>
        ${comp.expected.length?`<div class="compl-row"><span>${comp.pct}% مكتمل</span><div class="compl-track"><div class="compl-fill" style="width:${comp.pct}%"></div></div><span>${[...comp.expected].filter(t=>!comp.recorded.has(t)).slice(0,3).map(t=>'⬜ '+esc(t)).join(' · ')||'✅'}</span></div>`:''}
        ${pCosts.map(_costCard).join('')}
      </div>`;
    });
    const generalCosts=indexedCosts.filter(c=>c.prodIdx==null||c.prodIdx<0);
    if(generalCosts.length){
      itemsHTML+=`<div class="cost-item-block">
        <div class="cost-item-general">📋 عام</div>
        ${generalCosts.map(_costCard).join('')}
      </div>`;
    }
    const itemsSec=`<div class="wd-sec">
      <div class="wd-sec-hdr">📋 البنود <span class="bdg bdg-blue">${costs.length}</span></div>
      <div class="wd-sec-body">${itemsHTML}</div>
    </div>`;

    // ── #5 Quick entry strip ──
    const formProdForQE=costFormProdIdx>=0&&costFormProdIdx<products.length?products[costFormProdIdx]:products[0];
    const qeTypes=formProdForQE?getExpectedTypes(formProdForQE):[];
    const qeRecorded=new Set(costs.filter(c=>c.prodIdx===costFormProdIdx).map(c=>c.type));
    const qeHTML=qeTypes.length?`<div class="qe-strip">${qeTypes.map(t=>`<button type="button" class="qe-chip${qeRecorded.has(t)?' recorded':''}" data-act="qefill" data-type="${esc(t)}">${qeRecorded.has(t)?'✓ ':''}${esc(t)}</button>`).join('')}</div>`:'';

    // ── Add / Edit cost form ──
    const isEditing=editCostIdx>=0;
    const editItem=isEditing?costs[editCostIdx]:null;
    const formProd=isEditing?(editItem?.prodIdx??0):costFormProdIdx;
    const formProdName=formProd>=0&&formProd<products.length?products[formProd].name:'عام';
    const formHTML=`<div class="cost-form-wrap${isEditing?' editing':''}" id="cost-form-area">
      <div class="cost-form-title">${isEditing?'✏️ تعديل بند':`➕ إضافة بند — <span class="cost-total-accent">📦 ${esc(formProdName)}</span>`}</div>
      ${!isEditing?qeHTML:''}
      <div class="cost-form">
        <div><div class="cf-lbl">نوع التكلفة *</div><select class="cf-inp" id="cf-type">${_buildTypeOptions(editItem?.type||'')}</select></div>
