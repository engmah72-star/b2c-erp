<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Business2Card — مركز التنفيذ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css?v=45">
<script src="sidebar-config.js"></script>
<script src="sidebar.js"></script>
<script type="module" src="inbox-badge.js"></script>
<script src="smart-sidebar.js?v=1" defer></script>
<script src="theme.js?v=4"></script>
<script type="module" src="app-sidebar.js?v=3"></script>
<style>
/* ── Workspace Layout ── */
.ws-split{display:flex;height:calc(100vh - 60px);overflow:hidden}
.ws-list{width:360px;flex-shrink:0;display:flex;flex-direction:column;border-inline-end:1px solid var(--line);overflow:hidden}
.ws-detail{flex:1;overflow-y:auto;min-width:0}
@media(max-width:780px){
  .ws-split{flex-direction:column;height:auto;overflow:visible}
  .ws-list{width:100%;border-inline-end:none;border-bottom:1px solid var(--line);max-height:280px}
  .ws-detail{min-height:60vh}
}

/* ── List column ── */
.wl-head{padding:10px 12px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:8px;background:var(--bg1)}
.wl-search{width:100%;padding:8px 12px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--snow);font-size:var(--fs-sm);font-family:inherit}
.wl-search:focus{outline:none;border-color:var(--b)}
.wl-mine{display:flex;border-radius:8px;border:1px solid var(--line);overflow:hidden}
.wl-mine-btn{flex:1;padding:5px 0;font-size:var(--fs-xs);font-weight:var(--fw-extra);background:transparent;border:none;color:var(--dim2);cursor:pointer;font-family:inherit}
.wl-mine-btn.on{background:var(--bg2);color:var(--snow)}
.wl-tabs{display:flex;gap:4px;flex-wrap:wrap}
.wl-tab{padding:4px 10px;font-size:var(--fs-xs);font-weight:var(--fw-bold);border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--dim2);cursor:pointer;font-family:inherit}
.wl-tab.on{background:var(--bg2);color:var(--snow);border-color:var(--b)}
.wl-body{flex:1;overflow-y:auto}
.wl-count{padding:6px 12px;font-size:var(--fs-xs);color:var(--dim2)}

/* ── List cards ── */
.wl-card{padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s;position:relative}
.wl-card:hover{background:rgba(59,158,255,.04)}
.wl-card.active{background:rgba(59,158,255,.08);border-inline-start:3px solid var(--b)}
.wl-card-name{font-size:var(--fs-base);font-weight:var(--fw-extra);color:var(--snow);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wl-card-code{font-size:var(--fs-xs);color:var(--dim2);margin-bottom:6px}
.wl-card-foot{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
.wl-flag{font-size:10px;padding:2px 6px;border-radius:6px;border:1px solid}
.wl-flag-y{color:var(--y);border-color:rgba(255,193,7,.3);background:rgba(255,193,7,.07)}
.wl-flag-r{color:var(--r);border-color:rgba(255,61,110,.3);background:rgba(255,61,110,.07)}
.wl-mine-badge{font-size:10px;color:var(--b);background:rgba(59,158,255,.1);padding:2px 6px;border-radius:6px;border:1px solid rgba(59,158,255,.25)}

/* ── Status badges ── */
.sb{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:var(--fw-extra);padding:3px 8px;border-radius:8px}
.sb-pending{background:rgba(120,120,140,.1);color:var(--dim2)}
.sb-wip{background:rgba(59,158,255,.1);color:var(--b)}
.sb-done{background:rgba(0,217,126,.1);color:var(--g)}
.sb-problem{background:rgba(255,61,110,.1);color:var(--r)}

/* ── Detail column ── */
.wd-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--dim2);padding:40px;text-align:center}
.wd-empty-ico{font-size:48px;opacity:.3}
.wd{padding:20px 24px;display:flex;flex-direction:column;gap:16px}

/* ── Detail header ── */
.wd-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.wd-hdr-left{flex:1;min-width:0}
.wd-title{font-size:var(--fs-lg);font-weight:var(--fw-heavy);color:var(--snow);margin-bottom:4px}
.wd-meta{font-size:var(--fs-xs);color:var(--dim2);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.wd-hdr-right{display:flex;gap:6px;flex-wrap:wrap}

/* ── Sections ── */
.wd-sec{border:1px solid var(--line);border-radius:12px;overflow:hidden}
.wd-sec-hdr{padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--line);font-size:var(--fs-sm);font-weight:var(--fw-extra);color:var(--dim2);display:flex;align-items:center;justify-content:space-between}
.wd-sec-body{padding:12px 14px;display:flex;flex-direction:column;gap:10px}

/* ── Products ── */
.prd-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
.prd-row:last-child{border-bottom:none;padding-bottom:0}
.prd-info{flex:1;min-width:120px}
.prd-name{font-size:var(--fs-base);font-weight:var(--fw-bold);color:var(--snow);margin-bottom:3px}
.prd-sup-line{font-size:var(--fs-xs);color:var(--dim2)}
.prd-sup-sel{font-size:var(--fs-xs);padding:5px 8px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);color:var(--snow);font-family:inherit;max-width:180px;width:100%}
.prd-status-btns{display:flex;gap:4px}
.psb{font-size:12px;padding:4px 8px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);color:var(--dim2);cursor:pointer;font-family:inherit;transition:all .15s}
.psb.on.s-pending{border-color:rgba(120,120,140,.5);background:rgba(120,120,140,.15);color:var(--snow)}
.psb.on.s-wip{border-color:rgba(59,158,255,.5);background:rgba(59,158,255,.15);color:var(--b)}
.psb.on.s-done{border-color:rgba(0,217,126,.5);background:rgba(0,217,126,.15);color:var(--g)}
.psb.on.s-problem{border-color:rgba(255,61,110,.5);background:rgba(255,61,110,.15);color:var(--r)}

/* ── Cost items ── */
.cost-row{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:var(--fs-sm);padding:7px 0;border-bottom:1px solid var(--line)}
.cost-row:last-child{border-bottom:none}
.cost-type{color:var(--snow);font-weight:var(--fw-bold)}
.cost-meta{font-size:var(--fs-xs);color:var(--dim2)}
.cost-amt{font-size:var(--fs-base);font-weight:var(--fw-heavy);color:var(--y);white-space:nowrap;direction:ltr;display:flex;align-items:center;gap:6px}
.paid-badge{font-size:10px;padding:1px 6px;border-radius:6px;background:rgba(0,217,126,.1);color:var(--g);border:1px solid rgba(0,217,126,.25)}
.cost-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.cost-form-full{grid-column:1/-1}
.cf-lbl{font-size:var(--fs-xs);color:var(--dim2);margin-bottom:4px}
.cf-inp{width:100%;padding:7px 10px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--snow);font-size:var(--fs-sm);font-family:inherit}
.cf-inp:focus{outline:none;border-color:var(--b)}

/* ── Production note ── */
.note-ta{width:100%;padding:8px 10px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--snow);font-size:var(--fs-sm);font-family:inherit;resize:vertical;min-height:60px}
.note-ta:focus{outline:none;border-color:var(--b)}

/* ── Action bar ── */
.wd-actions{display:flex;gap:8px;flex-wrap:wrap;padding-top:4px}
.act-btn{padding:9px 16px;border-radius:10px;font-size:var(--fs-sm);font-weight:var(--fw-extra);font-family:inherit;cursor:pointer;border:none;display:flex;align-items:center;gap:6px;transition:opacity .15s}
.act-btn:disabled{opacity:.5;cursor:not-allowed}
.act-ship{background:rgba(59,158,255,.15);border:1px solid rgba(59,158,255,.3);color:var(--b)}
.act-ship:hover:not(:disabled){background:rgba(59,158,255,.25)}
.act-ghost{background:transparent;border:1px solid var(--line);color:var(--dim2)}
.act-ghost:hover:not(:disabled){background:var(--bg2);color:var(--snow)}
.act-save{background:rgba(0,217,126,.12);border:1px solid rgba(0,217,126,.25);color:var(--g)}
.act-save:hover:not(:disabled){background:rgba(0,217,126,.22)}
.act-add{background:rgba(99,99,255,.12);border:1px solid rgba(99,99,255,.25);color:#a5a6f6}
.act-add:hover:not(:disabled){background:rgba(99,99,255,.22)}

/* ── Design preview ── */
.design-preview{width:100%;max-height:200px;object-fit:contain;border-radius:8px;background:var(--bg2);display:block}

/* ── Topbar KPIs ── */
.kpi-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.kpi-chip{font-size:var(--fs-xs);padding:4px 10px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);color:var(--dim2);display:flex;gap:5px;align-items:center}
.kpi-chip b{color:var(--snow)}

/* ── Toasts ── */
#toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;align-items:center}
.toast-item{padding:9px 16px;border-radius:20px;font-size:var(--fs-sm);font-weight:var(--fw-bold);box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:90vw;text-align:center}
.toast-ok{background:rgba(0,217,126,.15);border:1px solid rgba(0,217,126,.35);color:var(--g)}
.toast-err{background:rgba(255,61,110,.15);border:1px solid rgba(255,61,110,.35);color:var(--r)}
.toast-warn{background:rgba(255,193,7,.12);border:1px solid rgba(255,193,7,.3);color:var(--y)}

/* ── Agent section ── */
.agent-row{display:flex;gap:8px;align-items:center}
.agent-sel{flex:1;padding:7px 10px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--snow);font-size:var(--fs-sm);font-family:inherit}
.agent-sel:focus{outline:none;border-color:var(--b)}

/* ── KPI topbar ── */
.topbar{padding:10px 16px 8px}
.topbar h1{font-size:var(--fs-xl);font-weight:var(--fw-heavy);color:var(--snow)}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">ERP</div></div></div>
  <div class="nav-scroll" id="nav-scroll-dynamic"><div style="padding:20px;text-align:center;color:var(--dim2);font-size:var(--fs-base)">⏳</div></div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">A</div><div><div class="nav-user-name" id="nav-name">User</div><div class="nav-user-role">تسجيل خروج</div></div></div></div>
</aside>
<app-sidebar active current="exec-workspace.html"></app-sidebar>
<div class="nav-ov" id="nav-ov" onclick="closeNav()"></div>

<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:10px">
        <button type="button" class="mob-menu-btn" onclick="toggleNav()">☰</button>
        <div>
          <h1>🏭 مركز التنفيذ</h1>
          <div id="ws-sub" style="font-size:var(--fs-xs);color:var(--dim2);margin-top:2px">جارٍ التحميل…</div>
        </div>
      </div>
      <div class="kpi-row" id="ws-kpis"></div>
    </div>
  </div>

  <div class="ws-split">
    <!-- ═══ قائمة الأوردرات ═══ -->
    <div class="ws-list">
      <div class="wl-head">
        <input type="search" class="wl-search" id="wl-search" placeholder="🔍 بحث بالاسم أو الكود…" oninput="onSearch(this.value)">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <div class="wl-mine">
            <button type="button" class="wl-mine-btn" id="btn-mine" onclick="setMine(true)">👤 موكلة لي</button>
            <button type="button" class="wl-mine-btn on" id="btn-all" onclick="setMine(false)">📋 الكل</button>
          </div>
          <div id="wl-sup-select" style="flex:1"></div>
        </div>
        <div class="wl-tabs" id="wl-tabs"></div>
      </div>
      <div class="wl-count" id="wl-count"></div>
      <div class="wl-body" id="wl-body">
        <div style="padding:30px;text-align:center;color:var(--dim2);font-size:var(--fs-sm)">⏳ جارٍ التحميل…</div>
      </div>
    </div>

    <!-- ═══ تفاصيل الأوردر ═══ -->
    <div class="ws-detail" id="ws-detail">
      <div class="wd-empty">
        <div class="wd-empty-ico">🏭</div>
        <div style="font-size:var(--fs-base);font-weight:var(--fw-extra)">اختر أوردر من القائمة</div>
        <div style="font-size:var(--fs-sm)">ستظهر هنا جميع التفاصيل والأدوات</div>
      </div>
    </div>
  </div>
</div>
</div>

<div id="toasts"></div>

<script type="module">
import { auth, db } from "./core/firebase-init.js";
import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, doc, onSnapshot, getDoc, query, where, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { orderActions } from "./order-actions.js";
import { canSeeField } from "./core/permissions-matrix.js";

// ── Constants ──────────────────────────────────────────────────────
const RMAP={admin:'accounts.html',operation_manager:'ops-dashboard.html',customer_service:'cs-dashboard.html',graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'};
const ROLE_LABEL={admin:'مدير النظام',operation_manager:'مدير العمليات',customer_service:'خدمة العملاء',graphic_designer:'مصمم جرافيك',design_operator:'مشغّل تصميم',production_agent:'مسؤول إنتاج',shipping_officer:'مسؤول شحن',wallet_manager:'أمين الخزنة'};
const EXEC_STATUSES=[
  {k:'pending', ico:'⏳', lbl:'انتظار', cls:'s-pending', badge:'sb-pending'},
  {k:'wip',     ico:'🔄', lbl:'جاري',   cls:'s-wip',     badge:'sb-wip'},
  {k:'done',    ico:'✅', lbl:'تم',      cls:'s-done',    badge:'sb-done'},
  {k:'problem', ico:'⚠️', lbl:'مشكلة',  cls:'s-problem', badge:'sb-problem'},
];
const STATUS_TABS=[
  {k:'all',     lbl:'الكل'},
  {k:'pending', lbl:'⏳ انتظار'},
  {k:'wip',     lbl:'🔄 جاري'},
  {k:'done',    lbl:'✅ تم'},
  {k:'problem', lbl:'⚠️ مشكلة'},
  {k:'nosup',   lbl:'🏭 بدون مورد'},
  {k:'nocost',  lbl:'💰 بدون تكلفة'},
];

// ── State ──────────────────────────────────────────────────────────
let me={uid:'',name:'',role:'',perms:null};
let orders=[], suppliers=[], prodAgents=[];
let loaded=false;
let selectedId=null, filterK='all', mineOnly=false, searchQ='', supFilter='';
let __started=false;

// ── Helpers ────────────────────────────────────────────────────────
const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG',{maximumFractionDigits:0});
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const orderCode=o=>o.orderNumber||o.orderCode||o.code||('#'+String(o._id||'').slice(-5));
const deriveProdStatus=ps=>{
  if(!ps||!ps.length)return 'pending';
  if(ps.every(p=>p.execStatus==='done'))return 'done';
  if(ps.some(p=>p.execStatus==='problem'))return 'problem';
  return ps.some(p=>(p.execStatus||'pending')!=='pending')?'wip':'pending';
};
const orderCost=o=>(o.costItems||[]).reduce((s,c)=>s+(parseFloat(c.total)||0),0);
const hasNoSup=o=>(o.products||[]).some(p=>!p.supplierId);
const hasNoCost=o=>!(o.costItems||[]).length;
const canSeeCost=()=>canSeeField('supplier_cost',me.role,me.perms);

function toast(msg,type='ok'){
  const c=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className=`toast-item toast-${type}`;
  el.textContent=msg;
  c.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);location.href='login.html';};

// ── Auth + Data ────────────────────────────────────────────────────
onAuthStateChanged(auth, async u=>{
  if(!u){location.href='login.html';return;}
  if(__started)return; __started=true;

  const snap=await getDoc(doc(db,'users',u.uid));
  if(snap.exists()){
    const d=snap.data();
    const role=d.role||'customer_service';
    const pages=(d.permissions?.pages)||[];
    const isAdm=['admin','operation_manager'].includes(role);
    if(!isAdm&&!pages.includes('*')&&!pages.includes('production')&&role!=='production_agent'){
      location.href=RMAP[role]||'login.html';return;
    }
    me={uid:u.uid,name:d.name||u.email||'مستخدم',role,perms:d.permissions||null};
    document.getElementById('nav-name').textContent=me.name;
    document.getElementById('nav-av').textContent=(me.name[0]||'U').toUpperCase();
    document.getElementById('role-badge').textContent=ROLE_LABEL[role]||role;
    if(typeof B2CSidebar!=='undefined') B2CSidebar.build(d,'exec-workspace.html');
    if(role==='production_agent'){mineOnly=true;syncMineButtons();}
  }

  // URL deep-link
  const urlOrderId=new URLSearchParams(location.search).get('orderId')||'';
  let urlOpened=false;

  onSnapshot(
    query(collection(db,'orders'),where('stage','==','production'),limit(1000)),
    s=>{
      orders=s.docs.map(x=>({...x.data(),_id:x.id}));
      loaded=true;
      if(urlOrderId&&!urlOpened&&orders.find(o=>o._id===urlOrderId)){
        urlOpened=true; selectedId=urlOrderId;
      }
      renderList();
      renderKPIs();
      if(selectedId) renderDetail();
    },
    e=>{console.warn('[exec-workspace] orders:',e.message);loaded=true;renderList();}
  );

  onSnapshot(
    query(collection(db,'suppliers_v2'),limit(500)),
    s=>{suppliers=s.docs.map(x=>({...x.data(),_id:x.id}));buildSupSelect();if(selectedId)renderDetail();},
    e=>console.warn('[exec-workspace] suppliers:',e.message)
  );

  onSnapshot(
    query(collection(db,'employees'),where('role','==','production_agent'),limit(100)),
    s=>{prodAgents=s.docs.map(x=>({...x.data(),_id:x.id}));if(selectedId)renderDetail();},
    e=>console.warn('[exec-workspace] agents:',e.message)
  );
});

// ── KPIs ──────────────────────────────────────────────────────────
function renderKPIs(){
  const total=orders.length;
  const done=orders.filter(o=>deriveProdStatus(o.products)==='done').length;
  const wip=orders.filter(o=>deriveProdStatus(o.products)==='wip').length;
  const prob=orders.filter(o=>deriveProdStatus(o.products)==='problem').length;
  const noSup=orders.filter(hasNoSup).length;
  document.getElementById('ws-kpis').innerHTML=
    `<div class="kpi-chip"><b>${fn(total)}</b> في التنفيذ</div>`+
    `<div class="kpi-chip" style="color:var(--b)"><b>${fn(wip)}</b> جاري</div>`+
    `<div class="kpi-chip" style="color:var(--g)"><b>${fn(done)}</b> مكتمل</div>`+
    (prob?`<div class="kpi-chip" style="color:var(--r)"><b>${fn(prob)}</b> مشكلة</div>`:'')+
    (noSup?`<div class="kpi-chip" style="color:var(--y)"><b>${fn(noSup)}</b> بدون مورد</div>`:'')+
    '';
  document.getElementById('ws-sub').textContent=`${fn(total)} أوردر في مرحلة التنفيذ`;
}

// ── Filter helpers ─────────────────────────────────────────────────
function filteredList(){
  let list=orders;
  if(mineOnly) list=list.filter(o=>o.productionAgent===me.uid);
  if(supFilter) list=list.filter(o=>(o.products||[]).some(p=>p.supplierId===supFilter));
  if(filterK==='nosup') list=list.filter(hasNoSup);
  else if(filterK==='nocost') list=list.filter(hasNoCost);
  else if(filterK!=='all') list=list.filter(o=>deriveProdStatus(o.products)===filterK);
  if(searchQ) list=list.filter(o=>{
    const q=searchQ;
    return (o.clientName||'').toLowerCase().includes(q)||(orderCode(o)).toLowerCase().includes(q);
  });
  return list.slice().sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
}

function countForTab(k){
  if(k==='all')return orders.length;
  if(k==='nosup')return orders.filter(hasNoSup).length;
  if(k==='nocost')return orders.filter(hasNoCost).length;
  return orders.filter(o=>deriveProdStatus(o.products)===k).length;
}

// ── List render ────────────────────────────────────────────────────
function renderList(){
  if(!loaded)return;
  // tabs
  document.getElementById('wl-tabs').innerHTML=STATUS_TABS.map(t=>{
    const n=countForTab(t.k);
    return `<button type="button" class="wl-tab${filterK===t.k?' on':''}" onclick="setFilter('${t.k}')">${t.lbl} <span style="opacity:.6">${n}</span></button>`;
  }).join('');

  const list=filteredList();
  document.getElementById('wl-count').textContent=`${fn(list.length)} أوردر`;

  if(!list.length){
    document.getElementById('wl-body').innerHTML=`<div style="padding:30px;text-align:center;color:var(--dim2);font-size:var(--fs-sm)">لا توجد طلبات</div>`;
    return;
  }

  document.getElementById('wl-body').innerHTML=list.map(o=>{
    const pst=deriveProdStatus(o.products);
    const ex=EXEC_STATUSES.find(e=>e.k===pst)||EXEC_STATUSES[0];
    const noSup=hasNoSup(o), noCost=hasNoCost(o);
    const late=o.deadline&&new Date(o.deadline)<new Date();
    const ismine=o.productionAgent===me.uid;
    const np=(o.products||[]).length;
    const nd=(o.products||[]).filter(p=>p.execStatus==='done').length;
    return `<div class="wl-card${selectedId===o._id?' active':''}" onclick="selectOrder('${esc(o._id)}')">
      <div class="wl-card-name">${esc(o.clientName||'—')}</div>
      <div class="wl-card-code">${esc(orderCode(o))}${o.productionAgentName?' · 👷 '+esc(o.productionAgentName):''}</div>
      <div class="wl-card-foot">
        <span class="sb ${ex.badge}">${ex.ico} ${ex.lbl}</span>
        <span style="font-size:var(--fs-xs);color:var(--dim2)">${nd}/${np} منتج</span>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          ${ismine&&!mineOnly?`<span class="wl-mine-badge">👤 لي</span>`:''}
          ${late?`<span class="wl-flag wl-flag-r">⏰ متأخر</span>`:''}
          ${noSup?`<span class="wl-flag wl-flag-y">بدون مورد</span>`:''}
          ${noCost?`<span class="wl-flag wl-flag-y">بدون تكلفة</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Supplier filter select ─────────────────────────────────────────
function buildSupSelect(){
  const usedIds=new Set(orders.flatMap(o=>(o.products||[]).map(p=>p.supplierId).filter(Boolean)));
  const used=suppliers.filter(s=>usedIds.has(s._id));
  const el=document.getElementById('wl-sup-select');
  if(!used.length){el.innerHTML='';return;}
  el.innerHTML=`<select style="font-size:var(--fs-xs);padding:5px 8px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);color:var(--snow);font-family:inherit;width:100%" onchange="setSupFilter(this.value)">
    <option value="">🏭 كل المطابع</option>
    ${used.map(s=>`<option value="${esc(s._id)}" ${supFilter===s._id?'selected':''}>${esc(s.name||s._id)}</option>`).join('')}
  </select>`;
}

// ── Controls (global for inline handlers) ──────────────────────────
window.setFilter=function(k){filterK=k;renderList();};
window.setMine=function(v){mineOnly=v;syncMineButtons();renderList();};
window.onSearch=function(v){searchQ=v.toLowerCase().trim();renderList();};
window.setSupFilter=function(v){supFilter=v;renderList();};
window.selectOrder=function(id){selectedId=id;renderList();renderDetail();};

function syncMineButtons(){
  document.getElementById('btn-mine').classList.toggle('on',mineOnly);
  document.getElementById('btn-all').classList.toggle('on',!mineOnly);
}

// ── Detail render ──────────────────────────────────────────────────
function renderDetail(){
  const o=orders.find(x=>x._id===selectedId);
  const panel=document.getElementById('ws-detail');
  if(!o){
    panel.innerHTML=`<div class="wd-empty"><div class="wd-empty-ico">🏭</div><div style="font-size:var(--fs-base);font-weight:var(--fw-extra)">اختر أوردر من القائمة</div></div>`;
    return;
  }

  const pst=deriveProdStatus(o.products);
  const ex=EXEC_STATUSES.find(e=>e.k===pst)||EXEC_STATUSES[0];
  const products=o.products||[];
  const costs=o.costItems||[];

  // ── Design image ──
  const designUrl=o.printFinalUrl||o.designFileUrl||(o.designFiles||[])[0]?.url;

  // ── Products section ──
  const prodsHTML=products.length
    ?products.map((p,i)=>{
      const cur=p.execStatus||'pending';
      return `<div class="prd-row">
        <div class="prd-info">
          <div class="prd-name">${esc(p.name||('منتج '+(i+1)))}${p.qty?` <span style="color:var(--dim2);font-weight:normal">×${esc(p.qty)}</span>`:''}</div>
          <div class="prd-sup-line">${p.supplierName?('🏭 '+esc(p.supplierName)):'<span style="color:var(--y)">⚠️ بدون مورد</span>'}</div>
          <select class="prd-sup-sel" data-act="setsup" data-pidx="${i}" style="margin-top:6px">
            <option value="">— اختر المورد —</option>
            ${suppliers.map(s=>`<option value="${esc(s._id)}" data-name="${esc(s.name||'')}" ${s._id===(p.supplierId||'')?'selected':''}>${esc(s.name||s._id)}</option>`).join('')}
          </select>
        </div>
        <div class="prd-status-btns">
          ${EXEC_STATUSES.map(e=>`<button type="button" class="psb ${cur===e.k?'on '+e.cls:''}" data-act="setexec" data-pidx="${i}" data-status="${e.k}" title="${e.lbl}">${e.ico}</button>`).join('')}
        </div>
      </div>`;
    }).join('')
    :'<div style="color:var(--dim2);font-size:var(--fs-sm)">لا توجد منتجات مُسجَّلة</div>';

  // ── Costs section ──
  let costsHTML='';
  if(canSeeCost()){
    const total=orderCost(o);
    const rows=costs.length
      ?costs.map((c,i)=>`<div class="cost-row">
          <div>
            <div class="cost-type">${esc(c.type||'—')}</div>
            <div class="cost-meta">${c.supplierName?esc(c.supplierName)+' · ':''} ${esc(c.note||'')}</div>
          </div>
          <div class="cost-amt">
            ${fn(c.total)} ج
            ${c.paid?`<span class="paid-badge">مدفوع</span>`:`<button type="button" class="act-btn act-ghost" style="padding:3px 8px;font-size:11px" data-act="delcost" data-idx="${i}" title="حذف">✕</button>`}
          </div>
        </div>`).join('')
      :'<div style="color:var(--dim2);font-size:var(--fs-sm)">لا توجد تكاليف مسجلة بعد</div>';
    costsHTML=`<div class="wd-sec">
      <div class="wd-sec-hdr">
        💰 بنود التكلفة
        <span style="font-size:var(--fs-base);font-weight:var(--fw-heavy);color:var(--y)">${fn(total)} ج</span>
      </div>
      <div class="wd-sec-body">
        ${rows}
        <div class="cost-form">
          <div>
            <div class="cf-lbl">نوع التكلفة</div>
            <input type="text" class="cf-inp" id="c-type" placeholder="مثال: ورق · طباعة · قص">
          </div>
          <div>
            <div class="cf-lbl">المبلغ (ج)</div>
            <input type="number" class="cf-inp" id="c-total" min="0" value="0">
          </div>
          <div class="cost-form-full">
            <div class="cf-lbl">المورد (اختياري)</div>
            <select class="cf-inp" id="c-supplier">
              <option value="">— بدون مورد —</option>
              ${suppliers.map(s=>`<option value="${esc(s._id)}" data-name="${esc(s.name||'')}">${esc(s.name||s._id)}</option>`).join('')}
            </select>
          </div>
          <div class="cost-form-full">
            <button type="button" class="act-btn act-add" style="width:100%;justify-content:center" data-act="addcost">➕ تسجيل تكلفة</button>
          </div>
        </div>
        <div style="text-align:center;margin-top:4px">
          <a href="exec-cost-entry.html?orderId=${esc(o._id)}" style="font-size:var(--fs-xs);color:var(--b)">📊 فتح في مركز التكاليف الكامل ↗</a>
        </div>
      </div>
    </div>`;
  }

  // ── Agent section ──
  const agentHTML=`<div class="wd-sec">
    <div class="wd-sec-hdr">👷 مندوب التنفيذ ${o.productionAgentName?`<span style="color:var(--snow);font-weight:var(--fw-heavy)">${esc(o.productionAgentName)}</span>`:''}</div>
    <div class="wd-sec-body">
      <div class="agent-row">
        <select class="agent-sel" id="agent-sel">
          <option value="">— اختر مندوب —</option>
          ${prodAgents.map(a=>`<option value="${esc(a._id)}" data-name="${esc(a.name||'')}" ${a._id===(o.productionAgent||'')?'selected':''}>${esc(a.name||a._id)}</option>`).join('')}
        </select>
        <button type="button" class="act-btn act-ghost" data-act="assignagent">✓ تعيين</button>
      </div>
      ${!o.productionAgent&&me.role==='production_agent'
        ?`<button type="button" class="act-btn act-ghost" style="width:100%;justify-content:center;margin-top:4px" data-act="pickup">📥 التقط الأوردر</button>`
        :''}
    </div>
  </div>`;

  // ── Note ──
  const noteHTML=`<div class="wd-sec">
    <div class="wd-sec-hdr">📝 ملاحظة الإنتاج</div>
    <div class="wd-sec-body">
      <textarea class="note-ta" id="prod-note" rows="3" placeholder="أي ملاحظات خاصة بهذا الأوردر…">${esc(o.prodNote||'')}</textarea>
      <button type="button" class="act-btn act-save" data-act="savenote">💾 حفظ الملاحظة</button>
    </div>
  </div>`;

  panel.innerHTML=`<div class="wd">
    <!-- ── Header ── -->
    <div class="wd-hdr">
      <div class="wd-hdr-left">
        <div class="wd-title">${esc(o.clientName||'—')}</div>
        <div class="wd-meta">
          <span>${esc(orderCode(o))}</span>
          <span class="sb ${ex.badge}">${ex.ico} ${ex.lbl}</span>
          ${o.deadline?`<span style="color:${new Date(o.deadline)<new Date()?'var(--r)':'var(--dim2)'}">📅 ${new Date(o.deadline).toLocaleDateString('ar-EG')}</span>`:''}
          ${o.productsCount?`<span>${o.productsCount} منتج</span>`:''}
        </div>
      </div>
      <div class="wd-hdr-right">
        <a href="order.html?id=${esc(o._id)}" class="act-btn act-ghost" style="font-size:var(--fs-xs)">📋 تتبع كامل</a>
        <a href="exec-cost-entry.html?orderId=${esc(o._id)}" class="act-btn act-ghost" style="font-size:var(--fs-xs)">💰 التكاليف</a>
      </div>
    </div>

    <!-- ── Design image ── -->
    ${designUrl?`<div class="wd-sec"><div class="wd-sec-hdr">🖼️ التصميم</div><div class="wd-sec-body"><img class="design-preview" src="${esc(designUrl)}" alt="تصميم" loading="lazy" onerror="this.parentElement.parentElement.style.display='none'"></div></div>`:''}

    <!-- ── Products ── -->
    <div class="wd-sec">
      <div class="wd-sec-hdr">📦 المنتجات وحالة التنفيذ <span style="color:var(--dim2)">${(o.products||[]).filter(p=>p.execStatus==='done').length}/${(o.products||[]).length} مكتمل</span></div>
      <div class="wd-sec-body">${prodsHTML}</div>
    </div>

    <!-- ── Costs ── -->
    ${costsHTML}

    <!-- ── Agent ── -->
    ${agentHTML}

    <!-- ── Note ── -->
    ${noteHTML}

    <!-- ── Main action ── -->
    <div class="wd-actions">
      <button type="button" class="act-btn act-ship" style="flex:1;justify-content:center" data-act="toShip">🚚 إرسال للشحن</button>
    </div>
  </div>`;
}

// ── Action handler ─────────────────────────────────────────────────
document.getElementById('ws-detail').addEventListener('click', async e=>{
  const btn=e.target.closest('[data-act]');if(!btn||!selectedId)return;
  const act=btn.dataset.act;
  const orderId=selectedId;
  const base={db,orderId,role:me.role,userId:me.uid,userName:me.name};

  btn.disabled=true;
  try{
    let r;
    if(act==='setexec'){
      const prodIdx=parseInt(btn.dataset.pidx,10); const status=btn.dataset.status;
      const o=orders.find(x=>x._id===orderId);if(!o){btn.disabled=false;return;}
      const np=(o.products||[]).map((p,i)=>i===prodIdx?{...p,execStatus:status}:p);
      const lbl=(EXEC_STATUSES.find(e=>e.k===status)||{}).lbl||status;
      r=await orderActions.setProductExecStatus({db,orderId,prodIdx,execStatus:status,derivedProdStatus:deriveProdStatus(np),statusLabel:lbl,userId:me.uid,userName:me.name});
    } else if(act==='addcost'){
      const type=document.getElementById('c-type')?.value.trim();
      const total=parseFloat(document.getElementById('c-total')?.value)||0;
      if(!type||total<=0){toast('اكتب نوع التكلفة والمبلغ','warn');btn.disabled=false;return;}
      const sup=document.getElementById('c-supplier');
      r=await orderActions.recordCostItem({...base,prodIdx:-1,payload:{type,total,supplierId:sup?.value||'',supplierName:sup?.value?(sup.options[sup.selectedIndex]?.dataset.name||''):'',note:''},wallets:[]});
    } else if(act==='delcost'){
      if(!confirm('حذف هذه التكلفة؟')){btn.disabled=false;return;}
      r=await orderActions.removeUnpaidCostItem({db,orderId,itemIndex:parseInt(btn.dataset.idx,10),userId:me.uid,userName:me.name});
    } else if(act==='toShip'){
      r=await orderActions.submitToShipping(base);
      if(r&&!r.ok&&(r.warnings||[]).length&&!(r.errors||[]).length){
        if(confirm('تنبيهات:\n- '+r.warnings.join('\n- ')+'\n\nإرسال رغم التنبيهات؟')){
          r=await orderActions.submitToShipping({...base,bypassWarnings:true});
        } else{btn.disabled=false;return;}
      }
    } else if(act==='assignagent'){
      const sel=document.getElementById('agent-sel');if(!sel?.value){toast('اختر مندوباً أولاً','warn');btn.disabled=false;return;}
      r=await orderActions.assignProductionAgent({db,orderId,agentId:sel.value,agentName:sel.options[sel.selectedIndex]?.dataset.name||sel.value,userId:me.uid,userName:me.name});
    } else if(act==='pickup'){
      r=await orderActions.assignProductionAgent({db,orderId,agentId:me.uid,agentName:me.name,userId:me.uid,userName:me.name,pickup:true});
    } else if(act==='savenote'){
      const note=(document.getElementById('prod-note')?.value||'').trim();
      r=await orderActions.updateProductionNote({db,orderId,note});
    }
    if(r?.ok){
      toast(r.warnings?.length?'تم ✓ ('+r.warnings.join(' · ')+')':'تم بنجاح ✓','ok');
      if(act==='toShip'){selectedId=null;renderList();}
    } else{ toast((r?.errors||[])[0]||'تعذّر تنفيذ العملية','err'); }
  }catch(err){console.warn('[exec-workspace]',act,err);toast(err.message||'خطأ غير متوقع','err');}
  btn.disabled=false;
});

// ── Supplier per product (select change) ───────────────────────────
document.getElementById('ws-detail').addEventListener('change', async e=>{
  const sel=e.target.closest('[data-act="setsup"]');if(!sel||!selectedId)return;
  const prodIdx=parseInt(sel.dataset.pidx,10);
  const supplierId=sel.value;
  const supplierName=sel.value?(sel.options[sel.selectedIndex]?.dataset.name||''):'';
  const r=await orderActions.setProductSupplier({db,orderId:selectedId,prodIdx,supplierId,supplierName,userId:me.uid,userName:me.name});
  if(r?.ok) toast('تم تحديث المورد ✓','ok');
  else toast((r?.errors||[])[0]||'تعذّر تحديث المورد','err');
});
</script>
