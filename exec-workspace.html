        <div><div class="cf-lbl">المنتج</div><select class="cf-inp" id="cf-prod">${products.map((p,i)=>`<option value="${i}" ${formProd===i?'selected':''}>${esc(p.name||('منتج '+(i+1)))}</option>`).join('')}<option value="-1" ${formProd==-1?'selected':''}>عام</option></select></div>
        ${!isEditing?`<div class="cf-full"><div class="cf-lbl">دفع فوري من محفظة</div><select class="cf-inp" id="cf-wallet"><option value="">— بدون دفع فوري —</option>${wallets.map(w=>`<option value="${esc(w._id)}">${esc(w.name||w._id)} (${fn(w.balance||0)} ج)</option>`).join('')}</select></div>`:''}
        <div class="cf-full"><div class="cf-lbl">ملاحظة</div><input type="text" class="cf-inp" id="cf-note" value="${esc(editItem?.note||'')}" placeholder="اختياري"></div>
        <div class="cf-full cost-form-row">
          <button type="button" class="act ${isEditing?'act-save':'act-add'} act-full" data-act="${isEditing?'updatecost':'addcost'}">${isEditing?'💾 حفظ التعديل':'➕ إضافة'}</button>
          ${isEditing?`<button type="button" class="act act-ghost" data-act="canceledit" style="flex-shrink:0">إلغاء</button>`:''}
        </div>
      </div>
    </div>`;

    // ── Templates (matching + library) ──
    const{matched,library}=_getTmplMatches(o);
    const multiProd=products.length>1;
    const _libItem=(r)=>{
      const t=r.template||r,total=(t.costItems||[]).reduce((s,c)=>s+(parseFloat(c.amount)||0),0);
      const pidx=r.prodIdx??0;
      const prodSel=multiProd?`<select class="cf-inp" id="lp-${esc(t.id)}" style="font-size:11px;padding:3px 8px;max-width:130px;height:auto"><option value="${pidx}">📦 ${esc((r.prod||products[pidx]||{}).name||'')}</option>${products.map((p,i)=>i===pidx?'':`<option value="${i}">${esc(p.name||('منتج '+(i+1)))}</option>`).join('')}</select>`:'';
      const reasonsHtml=r.reasons?.length?`<div style="font-size:9px;color:var(--b);margin-top:2px">${r.reasons.map(x=>`<span style="background:var(--tint-b-soft);padding:0 5px;border-radius:10px;margin-left:3px">${esc(x)}</span>`).join('')}</div>`:'';
      return`<div class="cost-lib-item">
        <div class="flex-fill">
          <div class="cost-lib-name">${esc(t.name)}${t.qty?` <span class="trend-flat">×${esc(t.qty)}</span>`:''} <span class="cost-lib-total">${fn(total)} ج</span></div>
          <div class="txt-info" style="font-size:10px;margin-top:2px">${(t.costItems||[]).map(c=>esc(c.type)).join(' · ')}</div>
          ${reasonsHtml}
        </div>
        <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
          ${prodSel}
          <button type="button" class="act act-ghost" style="font-size:11px;padding:4px 10px" data-act="applytmpl" data-tmpl-id="${esc(t.id)}" data-prod-idx="${pidx}"${multiProd?` data-pidx-sel="lp-${esc(t.id)}"`:''}>تطبيق</button>
        </div>
      </div>`;
    };
    const tmplHTML=matched.map(r=>{
      const t=r.template,total=(t.costItems||[]).reduce((s,c)=>s+(parseFloat(c.amount)||0),0);
      const lbl=r.score>=0.85?'تطابق قوي':'مقترح';
      return`<div class="cost-tmpl-box">
        <div class="cost-tmpl-hdr"><span class="cost-tmpl-label">${lbl}</span><span class="cost-tmpl-name">${esc(t.name)}${t.qty?` ×${esc(t.qty)}`:''}</span><span class="cost-tmpl-total">${fn(total)} ج</span><span class="cost-tmpl-prod">📦 ${esc(r.prod.name||'')}</span></div>
        <div class="cost-tmpl-chips">${(t.costItems||[]).map(c=>`<span class="ctc"><span class="ctc-type">${esc(c.type)}</span><span class="ctc-sep">·</span><span class="ctc-sup">${esc(c.supplierName||'—')}</span><span class="ctc-sep">·</span><strong class="ctc-amt">${fn(c.amount)} ج</strong></span>`).join('')}</div>
        <button type="button" class="act act-add act-full" data-act="applytmpl" data-tmpl-id="${esc(t.id)}" data-prod-idx="${r.prodIdx}">تطبيق الكل دفعة واحدة</button>
      </div>`;
    }).join('');
    let libHTML='';
    const libItems=library.length?library:(matched.length?[]:Object.values(
      costTemplates.reduce((acc,t)=>{const{score,reasons}=scoreTmpl(t,products[0]||{});if(!acc[t.id])acc[t.id]={template:t,prod:products[0]||{},prodIdx:0,score,reasons};return acc;},{})
    ).sort((a,b)=>b.score-a.score));
    if(libItems.length){
      libHTML=`<details class="cost-lib">
        <summary>📚 قوالب ذات صلة <span class="cost-total-accent">${libItems.length}</span> ▾</summary>
        ${libItems.map(_libItem).join('')}
      </details>`;
    }
    const saveTemplateHTML=costs.length?`<div class="cost-form-wrap" style="margin-top:6px">
      <div class="cost-form-title">حفظ بنود الأوردر كقالب جديد</div>
      <div style="font-size:11px;color:var(--dim2);margin-bottom:8px">سيُحفظ ${costs.filter(c=>c.supplierId&&c.type).length} بند${costs.some(c=>!c.supplierId)?` <span style="color:var(--y)">(${costs.filter(c=>!c.supplierId).length} بدون مورد — لن تُحفظ)</span>`:''}</div>
      <div class="cost-form">
        <div><div class="cf-lbl">اسم القالب *</div><input type="text" class="cf-inp" id="tmpl-name" value="${esc(products[0]?.name||'')}" placeholder="مثال: كارت شخصي ديجيتال"></div>
        <div><div class="cf-lbl">الكمية</div><input type="text" class="cf-inp" id="tmpl-qty" value="${esc(products[0]?.qty||'')}" placeholder="مثال: 500"></div>
        <div class="cf-full"><button type="button" class="act act-save act-full" data-act="savetmpl">حفظ في المكتبة</button></div>
      </div>
    </div>`:'';
    const supInsightsHTML=`<div id="ws-sup-insights" style="margin-top:8px"></div>`;
    const costCenterLink=`<a href="exec-cost-entry.html?id=${esc(o._id)}" class="act act-ghost act-full" style="margin-top:6px;text-decoration:none;justify-content:center">🧮 فتح مركز التكاليف المتقدم</a>`;
    panel.innerHTML=hdrHTML+tabsHTML+`<div class="wd wd-animate">${metricsHTML}${supChipsHTML}${simHTML}${itemsSec}${formHTML}${supInsightsHTML}${tmplHTML||libHTML?`<div style="margin-top:12px">${tmplHTML}${libHTML}</div>`:''}${saveTemplateHTML}${costCenterLink}</div>`;
    _loadSupplierInsights(o);
    return;
  }

  // ══════════════════════════════════════════════════════════════════
  // ── MAIN TAB — Product-centric execution ─────────────────────────
  // ══════════════════════════════════════════════════════════════════

  // ── Journey Rail ──
  const allHaveSup=products.length>0&&products.every(p=>p.supplierId);
  const someSup=products.some(p=>p.supplierId);
  const setupState=o.productionAgent&&allHaveSup?'done':o.productionAgent||someSup?'active':'pending';
  const execState=st==='done'?'done':st==='problem'?'problem':st==='wip'?'active':'pending';
  const costState=costs.length?'done':'pending';
  const jSteps=[
    {lbl:'استُلم',state:'done'},
    {lbl:'تجهيز',state:setupState},
    {lbl:'تنفيذ',state:execState},
    {lbl:'تكاليف',state:costState},
    {lbl:'شحن',state:'pending'},
  ];
  const jRail=`<div class="jrail">${jSteps.map((s,i)=>`
    ${i>0?`<div class="jline${s.state==='done'||jSteps[i-1].state==='done'?' done':s.state==='active'?' active':''}"></div>`:''}
    <div class="jstep ${s.state}"><div class="jdot"></div><div class="jlbl">${s.lbl}</div></div>
  `).join('')}</div>`;

  // ── #6 Smart Alert bar ──
  const alerts=[];
  if(o.deadline&&new Date(o.deadline)<new Date()){
    const daysLate=Math.ceil((Date.now()-new Date(o.deadline).getTime())/86400000);
    alerts.push(`<span class="achip achip-r">⏰ متأخر ${daysLate} يوم</span>`);
  }
  if(!o.productionAgent) alerts.push(`<span class="achip achip-b">👷 بدون مندوب تنفيذ</span>`);
  const noSupCount=products.filter(p=>!p.supplierId).length;
  if(noSupCount) alerts.push(`<span class="achip achip-y">🏭 ${noSupCount} منتج بدون مورد</span>`);
  if(canCost()&&!costs.length){
    const sim=findSimilar(o);
    alerts.push(`<span class="achip achip-y">💰 لم تُسجَّل تكاليف${sim.length?' — '+sim.length+' أوردر مشابه متاح للنسخ':''}</span>`);
  }
  if(canCost()&&costs.length){
    const avgCost=orders.filter(x=>x._id!==o._id&&(x.costItems||[]).length).reduce((acc,x)=>{acc.sum+=orderCost(x);acc.n++;return acc;},{sum:0,n:0});
    if(avgCost.n>2){const avg=avgCost.sum/avgCost.n;const cur=orderCost(o);if(cur>avg*1.4) alerts.push(`<span class="achip achip-y">📊 تكلفة أعلى من المتوسط بـ ${Math.round((cur/avg-1)*100)}%</span>`);}
  }
  const alertBar=alerts.length?`<div class="alert-bar">${alerts.join('')}</div>`:'';


  // ── Products — execution cards with #3 ship + #7 checklist + #8 sup stats + #9 photos ──
  const prodsHTML=products.length?products.map((p,i)=>{
    const cur=p.execStatus||'pending';
    const ck=deriveChecklist(p);
    const checkKey=o._id+'_'+i;
    if(!prodChecks[checkKey])prodChecks[checkKey]=new Set();
    const supSt=p.supplierId?getSupStats(p.supplierId):null;
    const photos=(o.productionPhotos||[]).filter(ph=>ph.prodIdx===i||ph.prodIdx==null);
    const pDesignImgs=(()=>{const a=Array.isArray(p.designImages)?p.designImages.filter(Boolean):[];if(a.length)return[...a].reverse();return p.designImageUrl?[p.designImageUrl]:[];})();
    return `<div class="prd-item${cur==='cancelled'?' prd-cancelled':''}">
      <div class="prd-name">${esc(p.name||('منتج '+(i+1)))} ${p.qty?`<span class="prd-qty-tag">×${esc(p.qty)}</span>`:''}</div>
      ${pDesignImgs.length?`<div class="prd-design-grid">${pDesignImgs.map(u=>`<img src="${esc(u)}" loading="lazy" class="prd-design-img ${pDesignImgs.length===1?'prd-design-single':'prd-design-multi'}" data-href="${esc(u)}" alt="">`).join('')}</div>`:''}
      ${cur==='cancelled'?`<div class="prd-cancel-msg">❌ هذا المنتج ملغي${p.execDoneBy?' — بواسطة '+esc(p.execDoneBy):''}</div>`:`<div class="prd-status-row">${EXEC.filter(e=>e.k!=='cancelled').map(e=>`<button type="button" class="psb${cur===e.k?' on-'+e.k:''}" data-act="setexec" data-pidx="${i}" data-status="${e.k}">${e.ico} ${e.lbl}</button>`).join('')}</div>`}
      <div class="prd-sup-row">
        <span class="prd-sup-lbl">🏭</span>
        <select class="prd-sup-sel" data-act="setsup" data-pidx="${i}">
          <option value="">— بدون مورد —</option>
          ${suppliers.map(s=>`<option value="${esc(s._id)}" data-name="${esc(s.name||'')}" ${s._id===(p.supplierId||'')?'selected':''}>${esc(s.name||s._id)}</option>`).join('')}
        </select>
      </div>
      ${supSt?`<div class="sup-stats">📊 ${supSt.active} نشط · ✅ ${supSt.done} مكتمل${supSt.prob?' · ⚠️ '+supSt.prob+' مشكلة':''}</div>`:''}
      <div class="prod-cl">${ck.map(s=>`<button type="button" class="cl-item${prodChecks[checkKey].has(s)?' checked':''}" data-act="togglecheck" data-ck="${esc(checkKey)}" data-step="${esc(s)}">${prodChecks[checkKey].has(s)?'✓':''} ${esc(s)}</button>`).join('')}</div>
      <div class="photo-sec">
        ${photos.map(ph=>`<img src="${esc(ph.url)}" class="photo-thumb" title="${esc(ph.fileName||'')}" data-href="${esc(ph.url)}">`).join('')}
        <label class="photo-add" title="رفع صورة إنتاج"><input type="file" accept="image/*" style="display:none" data-act="uploadphoto" data-pidx="${i}">📷</label>
      </div>
      ${cur==='done'&&products.length>1&&st!=='done'?`<button type="button" class="prd-ship-btn" data-act="shipproduct" data-pidx="${i}">📦 شحن هذا المنتج فقط</button>`:''}
      ${cur!=='cancelled'&&products.length>1?`<button type="button" class="prd-ship-btn act-cancel-product" data-act="cancelproduct" data-pidx="${i}">❌ إلغاء هذا المنتج</button>`:''}
    </div>`;
  }).join(''):'<div class="wd-no-data">لا توجد منتجات</div>';

  // ── Agent ──
  const agentHTML=`<div class="wd-sec${!o.productionAgent?' ':''}" id="sec-agent">
    <div class="wd-sec-hdr" style="${!o.productionAgent?'color:var(--b)':''}">👷 المندوب ${o.productionAgentName?`<span style="color:var(--snow)">${esc(o.productionAgentName)}</span>`:''}</div>
    <div class="wd-sec-body wd-sec-gap">
      <div class="cost-form-row" style="gap:8px">
        <select class="agent-sel" id="agent-sel"><option value="">— اختر مندوب —</option>${prodAgents.map(a=>`<option value="${esc(a._id)}" data-name="${esc(a.name||'')}" ${a._id===(o.productionAgent||'')?'selected':''}>${esc(a.name||a._id)}</option>`).join('')}</select>
        <button type="button" class="act act-ghost" data-act="assignagent">تعيين</button>
      </div>
      ${!o.productionAgent&&me.role==='production_agent'?`<button type="button" class="act act-ghost act-full" data-act="pickup">📥 التقط الأوردر</button>`:''}
    </div>
  </div>`;

  // ── Ship ──
  const isReadyToShip=st==='done'&&costs.length>0;
  const shipBtn=`<button type="button" class="act act-full${isReadyToShip?' ship-ready':' act-ship'}" style="font-size:var(--fs-base);padding:13px" data-act="toShip">${isReadyToShip?'جاهز — إرسال للشحن':'إرسال للشحن'}</button>`;

  // ── Note ──
  const noteHTML=`<div class="wd-sec"><div class="wd-sec-hdr">📝 ملاحظة</div><div class="wd-sec-body wd-sec-gap"><textarea class="note-ta" id="prod-note" rows="2" placeholder="ملاحظات خاصة…">${esc(o.prodNote||'')}</textarea><button type="button" class="act act-save act-full" data-act="savenote">حفظ</button></div></div>`;

  panel.innerHTML=hdrHTML+tabsHTML+jRail+alertBar+`<div class="wd wd-animate">
    ${imgSrc?`<img src="${esc(imgSrc)}" alt="" loading="lazy" class="wd-order-img" onerror="this.remove()">`:''}
    ${!o.productionAgent?agentHTML:''}
    ${prodsHTML}
    ${o.productionAgent?agentHTML:''}
    ${noteHTML}
    <div class="cost-form-row" style="margin-bottom:6px">
      ${shipBtn}
      <button type="button" class="act act-waybill" onclick="openWaybill()" aria-label="بوليصة الشحن">🧾</button>
    </div>
    ${canCost()&&costs.length?`<div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap">${products.map((p,i)=>p.productId?`<button type="button" class="act act-ghost" style="flex:1;justify-content:center;font-size:var(--fs-xs)" onclick="finalizeCosts(${i})">✅ حفظ تكاليف ${esc(p.name||('منتج '+(i+1)))} في السجل</button>`:'').join('')}</div>`:''}
    ${isAdminRole()?`<div class="adm-section">
      <div class="adm-title">⚙️ إدارة الأوردر (أدمن)</div>
      <div class="txt-info" style="margin-bottom:8px;font-weight:var(--fw-bold)">💰 تعديل مالي</div>
      <div class="adm-grid">
        <div><div class="adm-field-lbl">السعر (ج)</div><input class="adm-inp" id="adm-sale-price" type="number" value="${o.salePrice||0}" oninput="calcAdmRemaining()"></div>
        <div><div class="adm-field-lbl">المدفوع (ج)</div><input class="adm-inp" id="adm-paid" type="number" value="${o.totalPaid||o.deposit||o.paid||0}" disabled title="التعديل من صفحة الحسابات"></div>
      </div>
      <div style="margin-bottom:6px"><div class="adm-field-lbl">الخصم (ج)</div><input class="adm-inp" id="adm-discount" type="number" value="${o.discount||0}" oninput="calcAdmRemaining()"></div>
      <div class="adm-preview" id="adm-remaining-preview">الصافي: ${fn(Math.max(0,(o.salePrice||0)-(o.discount||0)))} ج | الباقي: ${fn(Math.max(0,(o.salePrice||0)-(o.discount||0)-(o.totalPaid||o.deposit||o.paid||0)))} ج</div>
      <button type="button" class="adm-btn adm-btn-save" onclick="saveAdminFinance()">✓ حفظ التعديل المالي</button>
      <button type="button" class="adm-btn adm-btn-del" onclick="deleteOrderFull()">🗑 حذف الأوردر نهائياً</button>
    </div>`:``}
    <button type="button" class="act act-full act-cancel-product" style="margin-top:4px" onclick="openCancelModal(false,'${esc(o._id)}')">❌ إلغاء الأوردر</button>
  </div>`;
}

// ── Actions (detail panel) ─────────────────────────────────────────
document.getElementById('ws-detail').addEventListener('click',async e=>{
  const btn=e.target.closest('[data-act]');if(!btn||!selectedId)return;
  const act=btn.dataset.act,orderId=selectedId;
  const base={db,orderId,role:me.role,userId:me.uid,userName:me.name};
  btn.disabled=true;
  try{
    let r;
    if(act==='setexec'){
      const o=orders.find(x=>x._id===orderId);if(!o){btn.disabled=false;return;}
      const prodIdx=parseInt(btn.dataset.pidx,10),status=btn.dataset.status;
      const np=(o.products||[]).map((p,i)=>i===prodIdx?{...p,execStatus:status}:p);
      r=await orderActions.setProductExecStatus({db,orderId,prodIdx,execStatus:status,derivedProdStatus:deriveSt({...o,products:np}),statusLabel:(EXEC.find(e=>e.k===status)||{}).lbl||status,userId:me.uid,userName:me.name});
    } else if(act==='applytmpl'){
      const templateId=btn.dataset.tmplId;
      // لو أكثر من منتج → اقرأ من الـ select المخصص
      const pidxSel=btn.dataset.pidxSel?document.getElementById(btn.dataset.pidxSel):null;
      const prodIdx=pidxSel?parseInt(pidxSel.value,10):parseInt(btn.dataset.prodIdx,10);
      const t=costTemplates.find(x=>x.id===templateId);
      if(!t||!t.costItems.length){toast('القالب فارغ','warn');btn.disabled=false;return;}
      let ok=0,fail=0;
      for(const item of t.costItems){
        const ri=await orderActions.recordCostItem({...base,prodIdx,payload:{type:item.type,total:parseFloat(item.amount)||0,supplierId:item.supplierId||'',supplierName:item.supplierName||'',note:item.note||''},wallets:[],allowedTypes:masterCategories.filter(c=>c.isCostItem!==false).map(c=>c.label)});
        if(ri?.ok)ok++;else fail++;
      }
      toast(ok?`✓ أُضيف ${ok} بند${fail?` (${fail} فشل)`:''}`:' تعذّر تطبيق القالب',ok?'ok':'err');
      btn.disabled=false;return;
    } else if(act==='toShip'){
      r=await orderActions.submitToShipping(base);
      if(r&&!r.ok&&(r.warnings||[]).length&&!(r.errors||[]).length){
        if(confirm('تنبيهات:\n- '+r.warnings.join('\n- ')+'\n\nإرسال رغم التنبيهات؟')){r=await orderActions.submitToShipping({...base,bypassWarnings:true});}
        else{btn.disabled=false;return;}
      }
    } else if(act==='assignagent'){
      const sel=document.getElementById('agent-sel');if(!sel?.value){toast('اختر مندوباً','warn');btn.disabled=false;return;}
      r=await orderActions.assignProductionAgent({db,orderId,agentId:sel.value,agentName:sel.options[sel.selectedIndex]?.dataset.name||sel.value,userId:me.uid,userName:me.name});
    } else if(act==='pickup'){
      r=await orderActions.assignProductionAgent({db,orderId,agentId:me.uid,agentName:me.name,userId:me.uid,userName:me.name,pickup:true});
    } else if(act==='savenote'){
      r=await orderActions.updateProductionNote({db,orderId,note:(document.getElementById('prod-note')?.value||'').trim()});
    } else if(act==='addcostfor'){
      costFormProdIdx=parseInt(btn.dataset.pidx,10);
      editCostIdx=-1;
      renderDetail();
      setTimeout(()=>{const f=document.getElementById('cost-form-area');if(f)f.scrollIntoView({behavior:'smooth',block:'center'});},80);
      btn.disabled=false;return;
    } else if(act==='editcost'){
      editCostIdx=parseInt(btn.dataset.cidx,10);
      renderDetail();btn.disabled=false;return;
    } else if(act==='canceledit'){
      editCostIdx=-1;
      renderDetail();btn.disabled=false;return;
    } else if(act==='addcost'||act==='updatecost'){
      const type=(document.getElementById('cf-type')?.value||'').trim();
      const total=parseFloat(document.getElementById('cf-total')?.value)||0;
      if(!type){toast('اختر نوع التكلفة','warn');btn.disabled=false;return;}
      if(!total||total<=0){toast('أدخل المبلغ','warn');btn.disabled=false;return;}
      const supSel=document.getElementById('cf-sup');
      const supplierId=supSel?.value||'';
      const supplierName=supplierId?(supSel.options[supSel.selectedIndex]?.dataset.name||''):'';
      const prodIdx=parseInt(document.getElementById('cf-prod')?.value||'0',10);
      const note=(document.getElementById('cf-note')?.value||'').trim();
      const walletSel=document.getElementById('cf-wallet');
      const walletId=walletSel?.value||'';
      const isEdit=act==='updatecost';
      const payload={type,total,supplierId,supplierName,note};
      if(walletId&&!isEdit) payload.walletId=walletId;
      r=await orderActions.recordCostItem({...base,prodIdx,payload,wallets:walletId?wallets:[],isEdit,editIdx:isEdit?editCostIdx:undefined,allowedTypes:masterCategories.filter(c=>c.isCostItem!==false).map(c=>c.label)});
      if(r?.ok){editCostIdx=-1;shiftCosts++;renderKPIs();}
    } else if(act==='qefill'){
      const type=btn.dataset.type;
      const sel=document.getElementById('cf-type');if(sel){sel.value=type;}
      _wsApplyFixedPrice(type);
      const inp=document.getElementById('cf-total');if(inp){inp.focus();inp.select();}
      btn.disabled=false;return;
    } else if(act==='copycosts'){
      const srcId=btn.dataset.src;
      const src=orders.find(x=>x._id===srcId);
      if(!src||!(src.costItems||[]).length){toast('لا توجد بنود للنسخ','warn');btn.disabled=false;return;}
      let ok=0,fail=0;
      for(const c of src.costItems){
        const ri=await orderActions.recordCostItem({...base,prodIdx:c.prodIdx??0,payload:{type:c.type,total:parseFloat(c.total)||0,supplierId:c.supplierId||'',supplierName:c.supplierName||'',note:c.note||''},wallets:[],allowedTypes:masterCategories.filter(x=>x.isCostItem!==false).map(x=>x.label)});
        if(ri?.ok){ok++;shiftCosts++;}else fail++;
      }
      renderKPIs();
      toast(ok?`✓ نُسخ ${ok} بند${fail?' ('+fail+' فشل)':''}`:' تعذّر النسخ',ok?'ok':'err');
      btn.disabled=false;return;
    } else if(act==='togglecheck'){
      const ck=btn.dataset.ck,step=btn.dataset.step;
      if(!prodChecks[ck])prodChecks[ck]=new Set();
      if(prodChecks[ck].has(step))prodChecks[ck].delete(step);else prodChecks[ck].add(step);
      renderDetail();btn.disabled=false;return;
    } else if(act==='shipproduct'){
      const pidx=parseInt(btn.dataset.pidx,10);
      if(!confirm(`شحن المنتج رقم ${pidx+1} فقط — باقي المنتجات ستبقى في الإنتاج. متأكد؟`)){btn.disabled=false;return;}
      r=await orderActions.submitToShipping(base).catch(err=>({ok:false,errors:[err.message]}));
      if(r&&!r.ok&&(r.warnings||[]).length&&!(r.errors||[]).length){
        r=await orderActions.submitToShipping({...base,bypassWarnings:true}).catch(err=>({ok:false,errors:[err.message]}));
      }
    } else if(act==='cancelproduct'){
      const pidx=parseInt(btn.dataset.pidx,10);
      const o=orders.find(x=>x._id===orderId);if(!o){btn.disabled=false;return;}
      const pName=(o.products||[])[pidx]?.name||('منتج '+(pidx+1));
      if(!confirm(`❌ إلغاء "${pName}" — هل أنت متأكد؟`)){btn.disabled=false;return;}
      const np=(o.products||[]).map((p,i)=>i===pidx?{...p,execStatus:'cancelled'}:p);
      const newDerived=deriveSt({...o,products:np});
      r=await orderActions.setProductExecStatus({db,orderId,prodIdx:pidx,execStatus:'cancelled',derivedProdStatus:newDerived,statusLabel:'ملغي',userId:me.uid,userName:me.name});
      if(r?.ok&&newDerived==='cancelled'){
        r=await orderActions.cancelOrder({db,orderId,reason:'كل المنتجات ملغية',note:'إلغاء تلقائي — كل المنتجات ألغيت فردياً',userId:me.uid,userName:me.name}).catch(err=>({ok:false,errors:[err.message]}));
        if(r?.ok){toast('❌ تم إلغاء الأوردر بالكامل (كل المنتجات ملغية)','ok');selectedId=null;document.body.classList.remove('detail-open');renderList();btn.disabled=false;return;}
      }
    } else if(act==='delcost'){
      const cidx=parseInt(btn.dataset.cidx,10);
      if(!confirm('حذف هذا البند؟')){btn.disabled=false;return;}
      r=await orderActions.removeUnpaidCostItem({...base,itemIndex:cidx});
    } else if(act==='savetmpl'){
      const name=(document.getElementById('tmpl-name')?.value||'').trim();
      const qty=(document.getElementById('tmpl-qty')?.value||'').trim();
      if(!name){toast('أدخل اسم القالب','warn');btn.disabled=false;return;}
      const o2=orders.find(x=>x._id===orderId);
      const items=(o2?.costItems||[]).filter(c=>c.supplierId&&c.type&&parseFloat(c.total)>0)
        .map(c=>({type:c.type,supplierId:c.supplierId,supplierName:c.supplierName||'',amount:parseFloat(c.total)||0}));
      if(!items.length){toast('لا توجد بنود صالحة — كل بند يحتاج مورداً','warn');btn.disabled=false;return;}
      const sr=await saveCostTemplate(db,{name,qty:qty||null,costItems:items},me.name);
      if(sr?.ok){
        costTemplates=await getCostTemplates(db);
        toast('تم الحفظ في المكتبة ✓','ok');
        btn.disabled=false;return;
      }
      toast((sr?.errors||[])[0]||'تعذر الحفظ','err');btn.disabled=false;return;
    }
    if(r?.ok){
      if(act==='toShip'||act==='shipproduct'){shiftDone++;renderKPIs();}
      toast(r.warnings?.length?'تم ✓ · '+r.warnings[0]:'تم ✓','ok');
      if(act==='toShip'){selectedId=null;document.body.classList.remove('detail-open');renderList();}
    }
    else toast((r?.errors||[])[0]||'تعذّر','err');
  }catch(err){console.warn('[exec-ws]',act,err);toast(err.message||'خطأ','err');}
  btn.disabled=false;
});

// ── Supplier per product + #9 Photo upload (change events) ────────
document.getElementById('ws-detail').addEventListener('change',async e=>{
  if(e.target.id==='cf-type'){_wsApplyFixedPrice(e.target.value);}
  const sel=e.target.closest('[data-act="setsup"]');
  if(sel&&selectedId){
    const prodIdx=parseInt(sel.dataset.pidx,10),supplierId=sel.value;
    const supplierName=sel.value?(sel.options[sel.selectedIndex]?.dataset.name||''):'';
    const r=await orderActions.setProductSupplier({db,orderId:selectedId,prodIdx,supplierId,supplierName,userId:me.uid,userName:me.name});
    if(r?.ok) toast('تم تحديث المورد ✓','ok');
    else toast((r?.errors||[])[0]||'تعذّر','err');
    return;
  }
  const fileIn=e.target.closest('[data-act="uploadphoto"]');
  if(fileIn&&selectedId&&fileIn.files?.length){
    const file=fileIn.files[0];
    if(!file.type.startsWith('image/')){toast('صور فقط','warn');return;}
    toast('جارٍ الرفع…','ok');
    try{
      const res=await uploadOrderFile({orderId:selectedId,file,kind:'production'});
      const o=orders.find(x=>x._id===selectedId);
      if(o){
        if(!o.productionPhotos)o.productionPhotos=[];
        o.productionPhotos.push({url:res.url,fileName:res.fileName,prodIdx:parseInt(fileIn.dataset.pidx,10),ts:Date.now()});
      }
      toast('تم رفع الصورة ✓','ok');
      renderDetail();
    }catch(err){toast('فشل الرفع: '+err.message,'err');}
  }
});

// ── Relative time helper ──────────────────────────────────────────
function relTime(dateStr){
  if(!dateStr)return'';
  const d=new Date(dateStr),now=Date.now(),diff=now-d.getTime();
  const mins=Math.floor(diff/60000),hrs=Math.floor(mins/60),days=Math.floor(hrs/24);
  if(diff<0){const fd=Math.ceil(-diff/86400000);return fd<=1?'غداً':`بعد ${fd} يوم`;}
  if(days>30)return d.toLocaleDateString('ar-EG');
  if(days>0)return `منذ ${days} يوم`;
  if(hrs>0)return `منذ ${hrs} ساعة`;
  if(mins>0)return `منذ ${mins} دقيقة`;
  return 'الآن';
}

// ── Copy to clipboard ─────────────────────────────────────────────
window.copyCode=function(e,text){
  e.stopPropagation();
  navigator.clipboard.writeText(text).then(()=>{
    const btn=e.currentTarget;btn.classList.add('copied');btn.textContent='✓';
    setTimeout(()=>{btn.classList.remove('copied');btn.textContent='📋';},1200);
  }).catch(()=>toast('تعذّر النسخ','warn'));
};

// ── Page title with live count ────────────────────────────────────
function updatePageTitle(){
  const t=orders.length;
  document.title=t?`(${t}) مركز التنفيذ`:'مركز التنفيذ';
}

// ── Skeleton loading ──────────────────────────────────────────────
function renderSkeleton(n=6){
  return Array.from({length:n},()=>`<div class="skel-card"><div class="skel skel-thumb"></div><div class="skel-lines"><div class="skel skel-line w80"></div><div class="skel skel-line w60"></div><div class="skel skel-line w40"></div></div></div>`).join('');
}

// ── Auto-scroll to active card ────────────────────────────────────
function scrollToActive(){
  requestAnimationFrame(()=>{
    const card=document.querySelector('.wl-card.active');
    if(card)card.scrollIntoView({block:'nearest',behavior:'smooth'});
  });
}

// ── Keyboard navigation ───────────────────────────────────────────
let kbdHintShown=localStorage.getItem('exec-kbd-hint')==='1';
if(!kbdHintShown&&!isMobile()){
  setTimeout(()=>{document.getElementById('kbd-hint')?.classList.add('show');},3000);
}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT'||e.target.isContentEditable)return;
  const list=filtered();
  const curIdx=list.findIndex(o=>o._id===selectedId);
  switch(e.key){
    case 'j':case 'ArrowDown':{
      e.preventDefault();
      const next=curIdx<list.length-1?curIdx+1:0;
      if(list[next])selectOrder(list[next]._id);
      scrollToActive();
      break;
    }
    case 'k':case 'ArrowUp':{
      e.preventDefault();
      const prev=curIdx>0?curIdx-1:list.length-1;
      if(list[prev])selectOrder(list[prev]._id);
      scrollToActive();
      break;
    }
    case 'Enter':{
      if(selectedId&&isMobile()&&!document.body.classList.contains('detail-open')){
        e.preventDefault();
        document.body.classList.add('detail-open');
        const o=orders.find(x=>x._id===selectedId);
        const fp=(o?.products||[])[0];
        document.getElementById('wd-back-title').textContent=fp?`${fp.name||'منتج'} ×${fp.qty||1}`:(o?.clientName||'');
        document.getElementById('ws-detail').scrollTop=0;
      }
      break;
    }
    case 'Escape':{
      e.preventDefault();
      const bulkOv=document.getElementById('sup-modal-ov');
      const cancelOv=document.getElementById('cancel-modal-ov');
      if(cancelOv?.classList.contains('open'))closeCancelModal();
      else if(bulkOv?.classList.contains('open'))closeBulkModal();
      else if(document.body.classList.contains('detail-open'))goBack();
      else if(selectMode)toggleSelectMode();
      break;
    }
    case '/':{
      e.preventDefault();
      document.getElementById('wl-search')?.focus();
      break;
    }
    case 's':case 'S':{
      if(!e.ctrlKey&&!e.metaKey){e.preventDefault();toggleSelectMode();}
      break;
    }
    case '?':{
      const hint=document.getElementById('kbd-hint');
      if(hint){hint.classList.toggle('show');localStorage.setItem('exec-kbd-hint','1');}
      break;
    }
  }
});
</script>
