<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Business2Card — مركز التنفيذ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css?v=45">
<script src="sidebar-config.js"></script>
<script src="sidebar.js"></script>
<script type="module" src="inbox-badge.js"></script>
<script src="smart-sidebar.js?v=1" defer></script>
<script src="theme.js?v=4"></script>
<script type="module" src="app-sidebar.js?v=3"></script>
<style>
/* ══ Layout ════════════════════════════════════════════════════════ */
.ws-wrap{display:flex;height:calc(100vh - 58px);overflow:hidden}
.ws-list{width:345px;flex-shrink:0;display:flex;flex-direction:column;border-inline-end:1px solid var(--line);overflow:hidden;background:var(--bg1)}
.ws-detail{flex:1;overflow-y:auto;min-width:0;background:var(--bg1)}

@media(min-width:769px){
  .main{overflow:hidden!important}
}
@media(max-width:768px){
  .ws-wrap{height:auto;flex-direction:column;overflow:visible}
  .ws-list{width:100%;border-inline-end:none;height:auto;max-height:none}
  .wl-body{overflow-y:visible!important}
  body.detail-open .ws-list{display:none}
  body.detail-open .ws-detail{position:fixed;inset:0;z-index:80;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
  body.detail-open .ws-topbar{display:none}
  .hide-mobile{display:none!important}
}

/* ══ Topbar ════════════════════════════════════════════════════════ */
.ws-topbar{padding:10px 16px 8px;border-bottom:1px solid var(--line);background:var(--bg1)}
.ws-topbar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.ws-title{font-size:var(--fs-xl);font-weight:var(--fw-heavy);color:var(--snow)}
.ws-sub{font-size:var(--fs-xs);color:var(--dim2)}

/* KPI bar */
.kpi-bar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;align-items:center}
.kpi-bar::-webkit-scrollbar{display:none}
.kp{flex-shrink:0;font-size:var(--fs-xs);font-weight:var(--fw-extra);padding:3px 10px;border-radius:20px;border:1px solid var(--line);background:var(--bg2);color:var(--dim2);white-space:nowrap}
.kp b{color:var(--snow)}.kp.kp-b{border-color:rgba(59,158,255,.3);color:var(--b)}.kp.kp-g{border-color:rgba(0,217,126,.3);color:var(--g)}.kp.kp-r{border-color:rgba(255,61,110,.3);color:var(--r)}.kp.kp-y{border-color:rgba(255,193,7,.3);color:var(--y)}

/* شريط الإنجاز اليومي */
.day-bar{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:var(--fs-xs);color:var(--dim2)}
.day-prog{flex:1;max-width:200px;height:4px;border-radius:2px;background:var(--line);overflow:hidden}
.day-fill{height:100%;border-radius:2px;background:var(--g);transition:width .4s}

/* ══ List Head ══════════════════════════════════════════════════════ */
.wl-head{padding:10px 12px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:7px;background:var(--bg1)}
.wl-search{width:100%;padding:8px 12px;background:var(--bg2);border:1px solid var(--line);border-radius:20px;color:var(--snow);font-size:var(--fs-sm);font-family:inherit}
.wl-search:focus{outline:none;border-color:var(--b);background:var(--bg1)}
.wl-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.wl-mine{display:flex;border-radius:20px;border:1px solid var(--line);overflow:hidden;flex-shrink:0}
.wmb{padding:5px 12px;font-size:var(--fs-xs);font-weight:var(--fw-extra);background:transparent;border:none;color:var(--dim2);cursor:pointer;font-family:inherit;white-space:nowrap}
.wmb.on{background:var(--b);color:#fff}
.wl-sup-sel{flex:1;min-width:0;font-size:var(--fs-xs);padding:5px 8px;border-radius:20px;border:1px solid var(--line);background:var(--bg2);color:var(--snow);font-family:inherit}
.wl-sup-sel:focus{outline:none;border-color:var(--b)}
.wl-tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.wl-tabs::-webkit-scrollbar{display:none}
.wtab{flex-shrink:0;padding:4px 11px;font-size:var(--fs-xs);font-weight:var(--fw-bold);border-radius:20px;border:1px solid var(--line);background:transparent;color:var(--dim2);cursor:pointer;font-family:inherit;white-space:nowrap}
.wtab.on{background:var(--bg2);color:var(--snow);border-color:rgba(59,158,255,.4)}

/* أزرار الأفعال في header القائمة */
.wl-actions{display:flex;gap:5px;flex-wrap:wrap}
.wl-act{padding:4px 10px;font-size:var(--fs-xs);font-weight:var(--fw-extra);border-radius:20px;border:1px solid var(--line);background:var(--bg2);color:var(--dim2);cursor:pointer;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.wl-act:hover{color:var(--snow);border-color:var(--b)}
.wl-act.active{background:rgba(59,158,255,.12);border-color:rgba(59,158,255,.4);color:var(--b)}

/* ══ البطاقات ══════════════════════════════════════════════════════ */
.wl-body{flex:1;overflow-y:auto}
.wl-count{padding:5px 14px;font-size:var(--fs-xs);color:var(--dim2)}
.wl-card{padding:10px 12px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s;position:relative;display:flex;gap:10px;align-items:flex-start}
.wl-card:active,.wl-card:hover{background:rgba(59,158,255,.05)}
.wl-card.active{background:rgba(59,158,255,.09)}
.wl-card.active::before{content:'';position:absolute;inset-inline-start:0;top:0;bottom:0;width:3px;background:var(--b);border-radius:0 3px 3px 0}
.wl-card.sel-mode .wl-check{display:flex}
.wl-check{display:none;width:18px;height:18px;border-radius:5px;border:2px solid var(--line);align-items:center;justify-content:center;flex-shrink:0;margin-top:3px;transition:all .15s}
.wl-check.checked{background:var(--b);border-color:var(--b)}
.wl-card-main{flex:1;min-width:0}
.wl-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--bg2);flex-shrink:0;border:1px solid var(--line)}
.wl-thumb-ph{width:44px;height:44px;border-radius:8px;background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--line)}
.wl-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:1px}
/* Hero: اسم المنتج الرئيسي */
.wl-order-hero{display:flex;align-items:baseline;gap:5px;min-width:0;flex:1}
.wl-name{font-size:var(--fs-base);font-weight:var(--fw-heavy);color:var(--snow);line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wl-order-qty{font-size:12px;font-weight:var(--fw-bold);color:var(--b);flex-shrink:0;white-space:nowrap}
/* إضافات المنتج */
.wl-extras{display:flex;flex-wrap:wrap;gap:3px;margin:3px 0 2px}
.wl-extra-tag{font-size:9px;padding:1px 6px;border-radius:10px;background:rgba(255,193,7,.1);border:1px solid rgba(255,193,7,.25);color:var(--y);white-space:nowrap}
/* السطر الثانوي: العميل + كود */
.wl-client-line{font-size:10px;color:var(--dim2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin:3px 0 2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.wl-foot{display:flex;gap:4px;flex-wrap:wrap;align-items:center}

/* منتجات إضافية مدمجة */
.wl-prods{display:flex;flex-direction:column;gap:2px;margin:3px 0 2px}
.wl-prod-row{display:flex;align-items:center;gap:5px;font-size:11px;min-width:0}
.wl-prod-name{color:var(--dim1,var(--snow));font-weight:var(--fw-extra);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;opacity:.85}
.wl-prod-status{font-size:11px;flex-shrink:0}
.wl-cost-sum{font-size:10px;color:var(--y);flex-shrink:0;white-space:nowrap}
.wl-cost-sum.nocost{color:var(--dim2);opacity:.6}
.wl-prod-more{color:var(--dim2);font-size:10px}

/* أزرار الحالة السريعة على البطاقة */
.wl-qbtns{display:flex;gap:3px;margin-top:5px}
.wqb{font-size:11px;padding:2px 7px;border-radius:20px;border:1px solid var(--line);background:transparent;color:var(--dim2);cursor:pointer;font-family:inherit}
.wqb:hover{border-color:var(--b);color:var(--snow)}
.wqb.on-wip{border-color:rgba(59,158,255,.5);background:rgba(59,158,255,.1);color:var(--b)}
.wqb.on-done{border-color:rgba(0,217,126,.5);background:rgba(0,217,126,.1);color:var(--g)}
.wqb.on-problem{border-color:rgba(255,61,110,.5);background:rgba(255,61,110,.1);color:var(--r)}
.wqb.on-pending{border-color:rgba(120,120,140,.4);background:rgba(120,120,140,.1);color:var(--dim2)}

/* ══ Badges ════════════════════════════════════════════════════════ */
.bdg{display:inline-flex;align-items:center;font-size:10px;font-weight:var(--fw-extra);padding:1px 7px;border-radius:20px;white-space:nowrap}
.bdg-pending{background:rgba(120,120,140,.1);color:var(--dim2)}
.bdg-wip{background:rgba(59,158,255,.1);color:var(--b)}
.bdg-done{background:rgba(0,217,126,.1);color:var(--g)}
.bdg-problem{background:rgba(255,61,110,.1);color:var(--r)}
.bdg-warn{background:rgba(255,193,7,.08);color:var(--y);border:1px solid rgba(255,193,7,.2)}
.bdg-danger{background:rgba(255,61,110,.08);color:var(--r);border:1px solid rgba(255,61,110,.2)}
.bdg-blue{background:rgba(59,158,255,.1);color:var(--b);border:1px solid rgba(59,158,255,.2)}

/* ══ Bulk action bar ═══════════════════════════════════════════════ */
.bulk-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);z-index:90;background:var(--bg2);border:1px solid var(--b);border-radius:16px;padding:10px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:transform .25s ease;white-space:nowrap}
.bulk-bar.visible{transform:translateX(-50%) translateY(0)}
.bulk-info{font-size:var(--fs-sm);font-weight:var(--fw-extra);color:var(--snow)}
.bulk-btn{padding:6px 14px;border-radius:20px;font-size:var(--fs-sm);font-weight:var(--fw-extra);font-family:inherit;cursor:pointer;border:1px solid}
.bulk-sup{background:rgba(59,158,255,.15);border-color:rgba(59,158,255,.4);color:var(--b)}
.bulk-clr{background:transparent;border-color:var(--line);color:var(--dim2)}

/* ══ Supplier modal ═════════════════════════════════════════════════ */
.sup-modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end;justify-content:center}
.sup-modal-ov.open{display:flex}
.sup-modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px}
.sup-modal h3{font-size:var(--fs-base);font-weight:var(--fw-heavy);color:var(--snow)}
.sup-modal select{width:100%;padding:10px 12px;background:var(--bg1);border:1px solid var(--line);border-radius:12px;color:var(--snow);font-size:var(--fs-sm);font-family:inherit}
.sup-modal select:focus{outline:none;border-color:var(--b)}
.sup-modal-foot{display:flex;gap:8px}

/* ══ Detail panel ══════════════════════════════════════════════════ */
.wd-back-bar{display:none;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--bg2);align-items:center;gap:10px}
@media(max-width:768px){body.detail-open .wd-back-bar{display:flex}}
.wd-back-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--line);background:var(--bg1);color:var(--snow);font-size:var(--fs-sm);font-weight:var(--fw-extra);cursor:pointer;font-family:inherit}
.wd-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--dim2);padding:40px;text-align:center;min-height:300px}

/* Tabs in detail */
.wd-tabs{display:flex;border-bottom:1px solid var(--line);background:var(--bg2)}
.wdt{flex:1;padding:10px;font-size:var(--fs-sm);font-weight:var(--fw-extra);font-family:inherit;background:transparent;border:none;color:var(--dim2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.wdt.on{color:var(--b);border-bottom-color:var(--b);background:var(--bg1)}

.wd-hdr{padding:14px 18px;background:var(--bg2);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.wd-client{font-size:var(--fs-lg);font-weight:var(--fw-heavy);color:var(--snow);margin-bottom:4px}
.wd-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:11px}
.wd-links{display:flex;gap:6px;flex-wrap:wrap}
.wd-link{padding:4px 11px;border-radius:20px;border:1px solid var(--line);background:var(--bg1);color:var(--dim2);font-size:var(--fs-xs);font-weight:var(--fw-extra);font-family:inherit;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.wd-link:hover{color:var(--b);border-color:rgba(59,158,255,.4)}

.wd{padding:16px 18px;display:flex;flex-direction:column;gap:13px}
.wd-sec{border:1px solid var(--line);border-radius:12px;overflow:hidden}
.wd-sec-hdr{padding:9px 13px;background:var(--bg2);border-bottom:1px solid var(--line);font-size:var(--fs-sm);font-weight:var(--fw-extra);color:var(--dim2);display:flex;align-items:center;justify-content:space-between;gap:8px}
.wd-sec-body{padding:10px;display:flex;flex-direction:column;gap:0}

/* منتجات — بطاقات */
.prd-item{padding:10px 12px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;margin-bottom:6px}
.prd-item:last-child{margin-bottom:0}
.prd-name{font-size:var(--fs-sm);font-weight:var(--fw-heavy);color:var(--snow);margin-bottom:7px;display:flex;align-items:baseline;gap:5px}
.prd-status-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.psb{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--line);background:transparent;color:var(--dim2);cursor:pointer;font-family:inherit;transition:all .15s}
.psb:hover{border-color:var(--b)}
.psb.on-pending{border-color:rgba(120,120,140,.5);background:rgba(120,120,140,.12);color:var(--dim2)}
.psb.on-wip{border-color:rgba(59,158,255,.5);background:rgba(59,158,255,.12);color:var(--b)}
.psb.on-done{border-color:rgba(0,217,126,.5);background:rgba(0,217,126,.12);color:var(--g)}
.psb.on-problem{border-color:rgba(255,61,110,.5);background:rgba(255,61,110,.12);color:var(--r)}
.prd-sup-row{display:flex;align-items:center;gap:6px}
.prd-sup-lbl{font-size:11px;color:var(--dim2);flex-shrink:0}
.prd-sup-sel{flex:1;font-size:11px;padding:5px 8px;border-radius:20px;border:1px solid var(--line);background:var(--bg1);color:var(--snow);font-family:inherit;min-width:0}
.prd-sup-sel:focus{outline:none;border-color:var(--b)}

/* ══ تكاليف — بطاقات منظمة ═══════════════════════════════════════ */
.cost-card{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:6px;transition:border-color .15s}
.cost-card:last-child{margin-bottom:0}
.cost-card.editing{border-color:var(--b);background:rgba(59,158,255,.04)}
.cost-card-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.cost-card-type{font-size:var(--fs-sm);font-weight:var(--fw-heavy);color:var(--snow);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cost-card-prod{font-size:10px;padding:1px 7px;border-radius:20px;background:rgba(59,158,255,.08);border:1px solid rgba(59,158,255,.18);color:var(--b);white-space:nowrap;flex-shrink:0}
.cost-card-mid{display:flex;gap:10px;flex-wrap:wrap;font-size:var(--fs-xs);color:var(--dim2);margin-bottom:6px}
.cost-card-mid:empty{display:none;margin:0}
.cost-card-sup,.cost-card-note{display:inline-flex;align-items:center;gap:3px}
.cost-card-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px}
.cost-card-amount{font-size:15px;font-weight:var(--fw-heavy);color:var(--y);direction:ltr}
.cost-card-actions{display:flex;align-items:center;gap:5px}
.paid-pill{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(0,217,126,.1);color:var(--g);border:1px solid rgba(0,217,126,.25);font-weight:var(--fw-extra)}
.unpaid-pill{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(255,193,7,.08);color:var(--y);border:1px solid rgba(255,193,7,.25);font-weight:var(--fw-extra)}
.del-btn{font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid rgba(255,61,110,.2);background:rgba(255,61,110,.07);color:var(--r);cursor:pointer;font-family:inherit}
.del-btn:hover{background:rgba(255,61,110,.15)}
.edit-btn{font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid var(--line);background:transparent;color:var(--dim2);cursor:pointer;font-family:inherit}
.edit-btn:hover{border-color:var(--b);color:var(--b)}

/* ملخص التكاليف — بطاقات مقاييس */
.cost-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:10px 14px;border-bottom:1px solid var(--line)}
.cost-metric{text-align:center;padding:8px 4px;background:var(--bg2);border-radius:8px;border:1px solid var(--line)}
.cost-metric-val{font-size:16px;font-weight:var(--fw-heavy);direction:ltr}
.cost-metric-lbl{font-size:10px;color:var(--dim2);margin-top:2px;font-weight:var(--fw-extra)}
.cost-metric.cm-total .cost-metric-val{color:var(--y)}
.cost-metric.cm-paid .cost-metric-val{color:var(--g)}
.cost-metric.cm-unpaid .cost-metric-val{color:var(--b)}
.cost-metric.cm-profit .cost-metric-val{color:var(--g)}
.cost-metric.cm-loss .cost-metric-val{color:var(--r)}
.cost-sup-summary{display:flex;flex-wrap:wrap;gap:5px;padding:4px 14px 8px;font-size:11px}
.cost-sup-chip{padding:3px 9px;border-radius:20px;background:var(--bg2);border:1px solid var(--line);color:var(--dim2);display:inline-flex;align-items:center;gap:4px}
.cost-sup-chip b{color:var(--y);direction:ltr;font-weight:var(--fw-heavy)}
.cost-card-audit{font-size:10px;color:var(--dim3);margin-top:2px;display:flex;gap:8px}
.cost-progress{height:4px;border-radius:2px;background:var(--line);margin:0 14px 6px;overflow:hidden}
.cost-progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--g),var(--b));transition:width .4s}

/* فورم التكلفة */
.cost-form{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cf-full{grid-column:1/-1}
.cf-lbl{font-size:var(--fs-xs);color:var(--dim2);margin-bottom:3px;font-weight:var(--fw-extra)}
.cf-inp{width:100%;padding:7px 10px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--snow);font-size:var(--fs-sm);font-family:inherit}
.cf-inp:focus{outline:none;border-color:var(--b)}
.cost-form-wrap{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:8px}
.cost-form-title{font-size:var(--fs-xs);font-weight:var(--fw-heavy);color:var(--snow);margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* السجل / timeline */
.tl-item{padding:8px 0;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:2px}
.tl-item:last-child{border-bottom:none}
.tl-action{font-size:var(--fs-sm);color:var(--snow);font-weight:var(--fw-bold)}
.tl-by{font-size:var(--fs-xs);color:var(--dim2)}

/* ملاحظة */
.note-ta{width:100%;padding:8px 10px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--snow);font-size:var(--fs-sm);font-family:inherit;resize:vertical;min-height:60px}
.note-ta:focus{outline:none;border-color:var(--b)}

/* مندوب */
.agent-sel{flex:1;padding:7px 10px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--snow);font-size:var(--fs-sm);font-family:inherit}
.agent-sel:focus{outline:none;border-color:var(--b)}

/* صورة */
.design-img{width:100%;max-height:200px;object-fit:contain;border-radius:8px;background:var(--bg2);display:block}

/* أزرار عامة */
.act{padding:8px 15px;border-radius:20px;font-size:var(--fs-sm);font-weight:var(--fw-extra);font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:6px;border:1px solid;transition:opacity .15s}
.act:disabled{opacity:.4;cursor:not-allowed}
.act-ship{background:rgba(59,158,255,.12);border-color:rgba(59,158,255,.35);color:var(--b)}
.act-ship:hover:not(:disabled){background:rgba(59,158,255,.22)}
.act-ghost{background:transparent;border-color:var(--line);color:var(--dim2)}
.act-ghost:hover:not(:disabled){background:var(--bg2);color:var(--snow)}
.act-save{background:rgba(0,217,126,.1);border-color:rgba(0,217,126,.3);color:var(--g)}
.act-add{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.3);color:#a78bfa}
.act-full{width:100%;justify-content:center}

/* Toasts */
#toasts{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.ti{padding:9px 18px;border-radius:20px;font-size:var(--fs-sm);font-weight:var(--fw-extra);box-shadow:0 6px 24px rgba(0,0,0,.5);max-width:92vw;text-align:center;animation:tIn .2s ease}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.t-ok{background:rgba(0,217,126,.15);border:1px solid rgba(0,217,126,.4);color:var(--g)}
.t-err{background:rgba(255,61,110,.15);border:1px solid rgba(255,61,110,.4);color:var(--r)}
.t-warn{background:rgba(255,193,7,.12);border:1px solid rgba(255,193,7,.35);color:var(--y)}

/* ══ Journey Rail ══════════════════════════════════════════════════ */
.jrail{display:flex;align-items:flex-start;padding:12px 18px 10px;background:var(--bg2);border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none}
.jrail::-webkit-scrollbar{display:none}
.jstep{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;min-width:52px}
.jdot{width:12px;height:12px;border-radius:50%;border:2px solid var(--line);background:var(--bg1);transition:all .2s}
.jline{flex:1;height:2px;background:var(--line);margin-top:5px;min-width:18px;max-width:40px;flex-shrink:1}
.jlbl{font-size:10px;color:var(--dim2);white-space:nowrap;text-align:center;font-weight:var(--fw-extra)}
.jstep.done .jdot{background:var(--g);border-color:var(--g)}
.jstep.done .jlbl{color:var(--g)}
.jstep.active .jdot{background:var(--b);border-color:var(--b);box-shadow:0 0 0 3px rgba(59,158,255,.2)}
.jstep.active .jlbl{color:var(--b)}
.jstep.problem .jdot{background:var(--r);border-color:var(--r)}
.jstep.problem .jlbl{color:var(--r)}
.jline.done{background:var(--g)}
.jline.active{background:linear-gradient(90deg,var(--g),var(--b))}

/* ══ Alert bar ══════════════════════════════════════════════════════ */
.alert-bar{display:flex;gap:6px;padding:8px 18px;background:var(--bg1);border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap}
.alert-bar::-webkit-scrollbar{display:none}
.alert-bar:empty{display:none}
.achip{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:var(--fw-extra);padding:3px 10px;border-radius:20px;border:1px solid;cursor:default}
.achip-r{background:rgba(255,61,110,.08);border-color:rgba(255,61,110,.3);color:var(--r)}
.achip-y{background:rgba(255,193,7,.08);border-color:rgba(255,193,7,.3);color:var(--y)}
.achip-b{background:rgba(59,158,255,.08);border-color:rgba(59,158,255,.3);color:var(--b)}

/* legacy compat */
.cost-tmpl-box{background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.22);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.cost-tmpl-hdr{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:7px}
.cost-tmpl-label{font-size:10px;font-weight:var(--fw-heavy);padding:1px 7px;border-radius:20px;background:rgba(139,92,246,.2);color:#a78bfa;flex-shrink:0}
.cost-tmpl-name{font-size:var(--fs-sm);font-weight:var(--fw-extra);color:var(--snow);flex:1;min-width:0}
.cost-tmpl-total{font-size:var(--fs-sm);font-weight:var(--fw-heavy);color:var(--y);white-space:nowrap}
.cost-tmpl-prod{font-size:var(--fs-xs);color:var(--dim2);width:100%}
.cost-tmpl-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
/* مكتبة القوالب (fallback + browse) */
.cost-lib{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:10px}
.cost-lib-hdr{padding:9px 12px;background:var(--bg2);font-size:var(--fs-xs);font-weight:var(--fw-extra);color:var(--dim2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;list-style:none;user-select:none}
.cost-lib-hdr:hover{color:var(--snow)}
.cost-lib summary{padding:9px 12px;background:var(--bg2);font-size:var(--fs-xs);font-weight:var(--fw-extra);color:var(--dim2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;list-style:none}
.cost-lib summary:hover{color:var(--snow)}
.cost-lib-item{padding:8px 12px;border-top:1px solid var(--line);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cost-lib-name{font-size:var(--fs-xs);font-weight:var(--fw-extra);color:var(--snow);flex:1;min-width:0}
.cost-lib-total{font-size:10px;color:var(--y);font-weight:var(--fw-heavy)}
.ctc{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--bg2);border:1px solid var(--line);border-radius:20px;font-size:11px}
.ctc-type{color:var(--snow);font-weight:var(--fw-extra)}
.ctc-sep{color:var(--dim2)}
.ctc-sup{color:var(--dim2)}
.ctc-amt{color:var(--y);font-weight:var(--fw-heavy)}
/* ══ Contextual ship button ═════════════════════════════════════════ */
.ship-ready{background:rgba(0,217,126,.12);border-color:rgba(0,217,126,.4);color:var(--g);font-size:var(--fs-base);padding:13px}
.ship-ready:hover:not(:disabled){background:rgba(0,217,126,.2)}

/* ══ Shift dashboard ═══════════════════════════════════════════════ */
.shift-bar{display:flex;align-items:center;gap:10px;padding:6px 16px;background:rgba(139,92,246,.06);border-bottom:1px solid rgba(139,92,246,.15);font-size:var(--fs-xs);color:var(--dim2);flex-wrap:wrap}
.shift-stat{display:flex;align-items:center;gap:3px;font-weight:var(--fw-extra)}
.shift-stat b{color:var(--snow)}

/* ══ Checklist ═════════════════════════════════════════════════════ */
.prod-cl{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.cl-item{display:flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid var(--line);background:transparent;color:var(--dim2);cursor:pointer;font-family:inherit;transition:all .12s}
.cl-item.checked{border-color:rgba(0,217,126,.4);background:rgba(0,217,126,.08);color:var(--g);text-decoration:line-through}
.cl-item:hover{border-color:var(--b)}

/* ══ Per-product ship ══════════════════════════════════════════════ */
.prd-ship-btn{margin-top:6px;width:100%;padding:6px;border-radius:8px;border:1px solid rgba(0,217,126,.3);background:rgba(0,217,126,.06);color:var(--g);font-size:var(--fs-xs);font-weight:var(--fw-extra);font-family:inherit;cursor:pointer;transition:background .15s}
.prd-ship-btn:hover{background:rgba(0,217,126,.15)}

/* ══ Photo upload ══════════════════════════════════════════════════ */
.photo-sec{margin-top:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.photo-thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;border:1px solid var(--line);cursor:pointer}
.photo-add{width:40px;height:40px;border-radius:6px;border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--dim2);cursor:pointer;background:transparent;font-family:inherit}
.photo-add:hover{border-color:var(--b);color:var(--b)}

/* ══ Quick entry chips ═════════════════════════════════════════════ */
.qe-strip{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.qe-chip{padding:3px 10px;border-radius:20px;border:1px solid var(--line);background:transparent;color:var(--dim2);font-size:11px;font-weight:var(--fw-extra);font-family:inherit;cursor:pointer;transition:all .12s}
.qe-chip:hover{border-color:var(--b);color:var(--b)}
.qe-chip.recorded{border-color:rgba(0,217,126,.3);background:rgba(0,217,126,.06);color:var(--g)}

/* ══ Completeness bar ══════════════════════════════════════════════ */
.compl-row{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--dim2);margin-top:4px}
.compl-track{flex:1;max-width:80px;height:3px;border-radius:2px;background:var(--line);overflow:hidden}
.compl-fill{height:100%;border-radius:2px;background:var(--g);transition:width .3s}

/* ══ Similar order suggestion ══════════════════════════════════════ */
.sim-card{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.2);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sim-info{flex:1;min-width:0;font-size:var(--fs-xs);color:var(--dim2)}
.sim-info b{color:var(--snow)}

/* ══ Supplier stats badge ══════════════════════════════════════════ */
.sup-stats{font-size:9px;color:var(--dim2);margin-top:2px;display:flex;gap:8px}

/* ══ Pin button ════════════════════════════════════════════════════ */
.pin-btn{position:absolute;top:6px;inset-inline-end:6px;width:22px;height:22px;border-radius:50%;border:1px solid var(--line);background:transparent;color:var(--dim2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.wl-card:hover .pin-btn,.pin-btn.pinned{opacity:1}
.pin-btn.pinned{color:var(--y);border-color:rgba(255,193,7,.4);background:rgba(255,193,7,.08)}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">ERP</div></div></div>
  <div class="nav-scroll" id="nav-scroll-dynamic"><div style="padding:20px;text-align:center;color:var(--dim2)">⏳</div></div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">A</div><div><div class="nav-user-name" id="nav-name">User</div><div class="nav-user-role">تسجيل خروج</div></div></div></div>
</aside>
<app-sidebar active current="exec-workspace.html"></app-sidebar>
<div class="nav-ov" id="nav-ov" onclick="closeNav()"></div>

<div class="main" style="display:flex;flex-direction:column;height:100vh">

  <!-- ══ Topbar ══════════════════════════════════════════════════ -->
  <div class="ws-topbar">
    <div class="ws-topbar-row">
      <button type="button" class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div style="flex:1;min-width:0">
        <div class="ws-title">🏭 مركز التنفيذ</div>
        <div class="ws-sub" id="ws-sub">جارٍ التحميل…</div>
      </div>
    </div>
    <div class="kpi-bar" id="ws-kpis"></div>
    <!-- شريط الإنجاز اليومي -->
    <div class="day-bar" id="day-bar" style="display:none">
      <span id="day-txt"></span>
      <div class="day-prog"><div class="day-fill" id="day-fill" style="width:0%"></div></div>
      <span id="day-pct" style="font-size:10px;font-weight:var(--fw-extra)"></span>
    </div>
    <!-- #4 شريط الوردية -->
    <div class="shift-bar" id="shift-bar" style="display:none"></div>
  </div>

  <div class="ws-wrap" style="flex:1;min-height:0">

    <!-- ══ قائمة الأوردرات ══════════════════════════════════════ -->
    <div class="ws-list">
      <div class="wl-head">
        <input type="search" class="wl-search" id="wl-search" placeholder="🔍 بحث بالاسم أو الكود…" oninput="onSearch(this.value)">
        <div class="wl-row">
          <div class="wl-mine">
            <button type="button" class="wmb" id="btn-mine" onclick="setMine(true)">👤 لي</button>
            <button type="button" class="wmb on" id="btn-all" onclick="setMine(false)">📋 الكل</button>
          </div>
          <select class="wl-sup-sel" id="wl-sup-sel" onchange="setSupFilter(this.value)" style="display:none">
            <option value="">🏭 كل المطابع</option>
          </select>
        </div>
        <div class="wl-tabs" id="wl-tabs"></div>
        <!-- أزرار الأفعال السريعة -->
        <div class="wl-actions">
          <button type="button" class="wl-act" onclick="pickNext()" title="التقط التالي أوردر بدون مندوب">📥 التقط التالي</button>
          <button type="button" class="wl-act" id="sel-mode-btn" onclick="toggleSelectMode()">☑️ تحديد متعدد</button>
        </div>
      </div>
      <div class="wl-count" id="wl-count"></div>
      <div class="wl-body" id="wl-body">
        <div style="padding:30px;text-align:center;color:var(--dim2)">⏳ جارٍ التحميل…</div>
      </div>
    </div>

    <!-- ══ لوحة التفاصيل ════════════════════════════════════════ -->
    <div class="ws-detail" id="ws-detail">
      <div class="wd-back-bar">
        <button type="button" class="wd-back-btn" onclick="goBack()">← رجوع</button>
        <span id="wd-back-title" style="font-size:var(--fs-sm);font-weight:var(--fw-extra);color:var(--snow);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      </div>
      <div class="wd-empty">
        <div style="font-size:52px;opacity:.2">🏭</div>
        <div style="font-size:var(--fs-base);font-weight:var(--fw-heavy);margin-bottom:4px">اختر أوردر من القائمة</div>
        <div style="font-size:var(--fs-sm)">ستظهر هنا المنتجات والتكاليف والسجل</div>
      </div>
    </div>

  </div>
</div>
</div>

<!-- Bulk supplier modal -->
<div class="sup-modal-ov" id="sup-modal-ov" onclick="if(event.target===this)closeBulkModal()">
  <div class="sup-modal">
    <h3>🏭 تعيين مورد للأوردرات المحددة</h3>
    <div id="bulk-modal-info" style="font-size:var(--fs-xs);color:var(--dim2)"></div>
    <select id="bulk-sup-sel">
      <option value="">— اختر المورد —</option>
    </select>
    <div class="sup-modal-foot">
      <button type="button" class="act act-ghost" onclick="closeBulkModal()" style="flex:1;justify-content:center">إلغاء</button>
      <button type="button" class="act act-ship" onclick="applyBulkSupplier()" style="flex:2;justify-content:center">✓ تطبيق على الكل</button>
    </div>
  </div>
</div>

<!-- Bulk action bar -->
<div class="bulk-bar" id="bulk-bar">
  <span class="bulk-info" id="bulk-info">0 محدد</span>
  <button type="button" class="bulk-btn bulk-sup" onclick="openBulkModal()">🏭 مورد</button>
  <button type="button" class="bulk-btn" style="background:rgba(0,217,126,.12);border-color:rgba(0,217,126,.35);color:var(--g)" onclick="bulkShip()">📦 شحن</button>
  <button type="button" class="bulk-btn" style="background:rgba(255,61,110,.1);border-color:rgba(255,61,110,.3);color:var(--r)" onclick="openCancelModal(true)">❌ إلغاء</button>
  <button type="button" class="bulk-btn bulk-clr" onclick="clearSelection()">✕</button>
</div>

<!-- Cancel modal -->
<div class="sup-modal-ov" id="cancel-modal-ov" onclick="if(event.target===this)closeCancelModal()">
  <div class="sup-modal">
    <h3>❌ إلغاء أوردر</h3>
    <div id="cancel-modal-info" style="font-size:var(--fs-xs);color:var(--dim2)"></div>
    <select id="cancel-reason-sel">
      <option value="">— اختر السبب —</option>
      <option value="العميل ألغى التنفيذ">العميل ألغى التنفيذ</option>
      <option value="مشكلة في التصميم">مشكلة في التصميم</option>
      <option value="مشكلة في الإنتاج">مشكلة في الإنتاج</option>
      <option value="أوردر مكرر">أوردر مكرر</option>
      <option value="خطأ في البيانات">خطأ في البيانات</option>
      <option value="تعذر التنفيذ">تعذر التنفيذ</option>
      <option value="سبب آخر">سبب آخر</option>
    </select>
    <input type="text" class="cf-inp" id="cancel-note" placeholder="ملاحظة إضافية (اختياري)" style="width:100%">
    <div class="sup-modal-foot">
      <button type="button" class="act act-ghost" onclick="closeCancelModal()" style="flex:1;justify-content:center">تراجع</button>
      <button type="button" class="act" style="flex:2;justify-content:center;background:rgba(255,61,110,.12);border-color:rgba(255,61,110,.4);color:var(--r)" onclick="applyCancelOrder()">❌ تأكيد الإلغاء</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script type="module">
import { auth, db } from "./core/firebase-init.js";
import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { collection, doc, onSnapshot, getDoc, query, where, limit } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { orderActions } from "./order-actions.js";
import { canSeeField } from "./core/permissions-matrix.js";
import { getCostTemplates, saveCostTemplate } from "./core/cost-template-actions.js";
import { uploadOrderFile } from "./core/storage-helpers.js";

// ── Constants ──────────────────────────────────────────────────────
const RMAP={admin:'accounts.html',operation_manager:'ops-dashboard.html',customer_service:'cs-dashboard.html',graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'};
const ROLE_LABEL={admin:'مدير النظام',operation_manager:'مدير العمليات',customer_service:'خدمة العملاء',graphic_designer:'مصمم جرافيك',design_operator:'مشغّل تصميم',production_agent:'مسؤول إنتاج',shipping_officer:'مسؤول شحن',wallet_manager:'أمين الخزنة'};
const EXEC=[
  {k:'pending',ico:'⏳',lbl:'انتظار',bc:'bdg-pending'},
  {k:'wip',    ico:'🔄',lbl:'جاري',  bc:'bdg-wip'},
  {k:'done',   ico:'✅',lbl:'تم',    bc:'bdg-done'},
  {k:'problem',ico:'⚠️',lbl:'مشكلة',bc:'bdg-problem'},
];
const TABS=[
  {k:'all',    lbl:'الكل'},
  {k:'pending',lbl:'⏳ انتظار'},
  {k:'wip',    lbl:'🔄 جاري'},
  {k:'done',   lbl:'✅ تم'},
  {k:'problem',lbl:'⚠️ مشكلة'},
  {k:'nosup',  lbl:'🏭 بدون مورد'},
  {k:'nocost', lbl:'💰 بدون تكلفة'},
];
const STATUS_LABELS={wip:'🔄 جاري',done:'✅ تم',problem:'⚠️ مشكلة',pending:'⏳ انتظار'};

// ── State ──────────────────────────────────────────────────────────
let me={uid:'',name:'',role:'',perms:null};
let orders=[], suppliers=[], prodAgents=[], costTemplates=[], masterCategories=[], wallets=[];
let loaded=false, selectedId=null, detailTab='main', editCostIdx=-1, costFormProdIdx=0;
let filterK='all', mineOnly=false, searchQ='', supFilter='';
let selectMode=false, selected=new Set();
let __started=false;
let shiftStart=Date.now(), shiftDone=0, shiftCosts=0;
let pinnedIds=new Set(JSON.parse(localStorage.getItem('exec-pinned')||'[]'));
let prodChecks={};

// ── Helpers ────────────────────────────────────────────────────────
const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG',{maximumFractionDigits:0});
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const oCode=o=>o.orderNumber||o.orderCode||o.code||('#'+String(o._id||'').slice(-5));
const deriveSt=o=>{const ps=o.products||[];if(!ps.length)return o.prodStatus||'pending';if(ps.every(p=>p.execStatus==='done'))return 'done';if(ps.some(p=>p.execStatus==='problem'))return 'problem';return ps.some(p=>(p.execStatus||'pending')!=='pending')?'wip':'pending';};
const orderCost=o=>(o.costItems||[]).reduce((s,c)=>s+(parseFloat(c.total)||0),0);
const hasNoSup=o=>(o.products||[]).some(p=>!p.supplierId);
const hasNoCost=o=>!(o.costItems||[]).length;
const canCost=()=>canSeeField('supplier_cost',me.role,me.perms);
const isMobile=()=>window.innerWidth<=768;
const designUrl=o=>o.printFinalUrl||o.designFileUrl||(o.designFiles||[])[0]?.url||'';

// urgency score (5 = late, 3 = no-sup, 1 = no-cost)

const getExpectedTypes=prod=>{

  return masterCategories
    .filter(c=>c.isCostItem!==false&&(!c.printTypes?.length||c.printTypes.some(t=>(t||'').toLowerCase().includes(pt)||pt.includes((t||'').toLowerCase()))))
    .map(c=>c.label);
};
const getCompleteness=(costs,pi,prod)=>{
  const exp=getExpectedTypes(prod);
  const rec=new Set(costs.filter(c=>c.prodIdx===pi).map(c=>c.type));
  const done=exp.filter(t=>rec.has(t)).length;
  return{expected:exp,recorded:rec,pct:exp.length?Math.round(done/exp.length*100):0};
};

// ── Template matching — Multi-signal intelligence ──────────────────
const _normAr=s=>(s||'')
  .replace(/[أإآ]/g,'ا').replace(/[ةه]/g,'ه').replace(/[يى]/g,'ي')
  .replace(/\s+/g,'').replace(/[٠-٩0-9]+/g,'').toLowerCase();
const _extractQty=p=>String(p.qty||'').replace(/[^0-9]/g,'')||'';

function _similarity(a,b){
  if(!a||!b)return 0;
  if(a===b)return 1;
  if(a.includes(b)||b.includes(a))return 0.9;
  const wa=a.match(/.{2,}/g)||[];const wb=b.match(/.{2,}/g)||[];
  const shared=wa.filter(w=>wb.some(x=>x.includes(w)||w.includes(x)));
  return wa.length?shared.length/Math.max(wa.length,wb.length):0;
}

// يحسب score + أسباب التوصية لقالب + منتج
function _scoreTmpl(t,p){
  let score=0;const reasons=[];
  // 1. اسم (40%)
  const ns=_similarity(_normAr(p.name),_normAr(t.name));
  score+=ns*0.4;
  if(ns>=0.85)reasons.push('اسم مطابق');
  else if(ns>=0.5)reasons.push('اسم مشابه');
  // 2. كمية (30%)
  const pQty=parseInt(_extractQty(p))||0;
  const tQty=parseInt(t.qty||0);
  if(pQty&&tQty){
    const r=Math.min(pQty,tQty)/Math.max(pQty,tQty);
    score+=r*0.3;
    if(r===1)reasons.push(`كمية ×${pQty} مطابقة`);
    else if(r>=0.6)reasons.push('كمية قريبة');
  }else if(!tQty){score+=0.12;}
  // 3. تغطية الإضافات (25%)
  const extras=(p.extras||[]);
  if(extras.length){
    const ctypes=(t.costItems||[]).map(c=>_normAr(c.type||''));
    const covered=extras.filter(e=>ctypes.some(ct=>ct.includes(_normAr(e))||_normAr(e).includes(ct)));
    score+=covered.length/extras.length*0.25;
    if(covered.length)reasons.push('يشمل '+covered.join('+'));
  }
  // 4. نوع الطباعة (5%)
  if(p.printType){
    const ptn=p.printType==='digital'?'ديجيتال':'اوفست';
    if((t.costItems||[]).some(c=>_normAr(c.type||'').includes(_normAr(ptn)))){
      score+=0.05;reasons.push(p.printType==='digital'?'ديجيتال':'أوفست');
    }
  }
  return{score,reasons};
}

// يعيد {matched:[],library:[]} مرتبة بالـ score
function _getTmplMatches(o){
  if(!costTemplates.length)return{matched:[],library:[]};
  const all=[];
  const seen=new Set();
  (o.products||[]).forEach((prod,prodIdx)=>{
    costTemplates.forEach(t=>{
      const key=t.id+'|'+prodIdx;
      if(seen.has(key))return; seen.add(key);
      const{score,reasons}=_scoreTmpl(t,prod);
      all.push({template:t,prod,prodIdx,score,reasons});
    });
  });
  // إزالة التكرار (أفضل score لكل قالب)
  const byId={};
  all.forEach(r=>{if(!byId[r.template.id]||r.score>byId[r.template.id].score)byId[r.template.id]=r;});
  const ranked=Object.values(byId).sort((a,b)=>b.score-a.score);
  return{
    matched:ranked.filter(r=>r.score>=0.55),   // اقتراح قوي
    library:ranked.filter(r=>r.score>=0.15&&r.score<0.55), // مكتبة ذات صلة
  };
}

// ── KPIs + شريط الإنجاز اليومي ────────────────────────────────────
function renderKPIs(){
  const t=orders.length,done=orders.filter(o=>deriveSt(o)==='done').length;
  const wip=orders.filter(o=>deriveSt(o)==='wip').length;
  const prob=orders.filter(o=>deriveSt(o)==='problem').length;
  const noSup=orders.filter(hasNoSup).length;
  document.getElementById('ws-kpis').innerHTML=
    `<div class="kp"><b>${fn(t)}</b> أوردر</div>`+
    `<div class="kp kp-b"><b>${fn(wip)}</b> جاري</div>`+
    `<div class="kp kp-g"><b>${fn(done)}</b> مكتمل</div>`+
    (prob?`<div class="kp kp-r"><b>${fn(prob)}</b> مشكلة</div>`:'')+
    (noSup?`<div class="kp kp-y"><b>${fn(noSup)}</b> بدون مورد</div>`:'')+
    '';
  document.getElementById('ws-sub').textContent=`${fn(t)} أوردر في مرحلة التنفيذ`;
  // شريط الإنجاز
  if(t>0){
    const pct=Math.round(done/t*100);
    document.getElementById('day-bar').style.display='flex';
    document.getElementById('day-txt').textContent=`مكتمل ${fn(done)} من ${fn(t)}`;
    document.getElementById('day-fill').style.width=pct+'%';
    document.getElementById('day-pct').textContent=pct+'%';
  }
  // #4 شريط الوردية
  const elapsed=Math.round((Date.now()-shiftStart)/60000);
  const hrs=Math.floor(elapsed/60),mins=elapsed%60;
  document.getElementById('shift-bar').innerHTML=
    `<span class="shift-stat">⏱ <b>${hrs?hrs+'س ':''}${mins}د</b></span>`+
    `<span class="shift-stat">✅ أنجزت <b>${shiftDone}</b></span>`+
    `<span class="shift-stat">💰 سجلت <b>${shiftCosts}</b> بند</span>`+
    (shiftDone&&elapsed?`<span class="shift-stat">⚡ <b>${Math.round(elapsed/shiftDone)}</b> د/أوردر</span>`:'');
  document.getElementById('shift-bar').style.display=shiftDone||shiftCosts?'flex':'none';
}

// ── Filtered list ──────────────────────────────────────────────────
function filtered(){
  let l=orders;
  if(mineOnly) l=l.filter(o=>o.productionAgent===me.uid);
  if(supFilter) l=l.filter(o=>(o.products||[]).some(p=>p.supplierId===supFilter));
  if(filterK==='nosup') l=l.filter(hasNoSup);
  else if(filterK==='nocost') l=l.filter(hasNoCost);
  else if(filterK!=='all') l=l.filter(o=>deriveSt(o)===filterK);
  if(searchQ) l=l.filter(o=>(o.clientName||'').toLowerCase().includes(searchQ)||(oCode(o)).toLowerCase().includes(searchQ));
  // #10 pinned first, then urgency, then deadline
  return l.slice().sort((a,b)=>{
    const pa=pinnedIds.has(a._id)?1:0,pb=pinnedIds.has(b._id)?1:0;
    if(pa!==pb)return pb-pa;
    const d=urgency(b)-urgency(a); if(d)return d;
    const da=a.deadline?new Date(a.deadline):new Date(9999,0);
    const db2=b.deadline?new Date(b.deadline):new Date(9999,0);
    return da-db2;
  });
}
const cntTab=k=>{if(k==='all')return orders.length;if(k==='nosup')return orders.filter(hasNoSup).length;if(k==='nocost')return orders.filter(hasNoCost).length;return orders.filter(o=>deriveSt(o)===k).length;};

function renderList(){

  document.getElementById('wl-count').textContent=`${fn(list.length)} أوردر`;
  if(!list.length){document.getElementById('wl-body').innerHTML=`<div style="padding:36px;text-align:center;color:var(--dim2)">لا توجد طلبات</div>`;return;}
  document.getElementById('wl-body').innerHTML=list.map(o=>{
    const st=deriveSt(o),ex=EXEC.find(e=>e.k===st)||EXEC[0];
    const np=(o.products||[]).length,nd=(o.products||[]).filter(p=>p.execStatus==='done').length;
    const pct=np?Math.round(nd/np*100):0;
    const late=o.deadline&&new Date(o.deadline)<new Date();
    const ismine=o.productionAgent===me.uid;
    const imgSrc=designUrl(o);
    const isSel=selected.has(o._id);
    // بناء البطاقة — اسم المنتج هو العنصر الرئيسي
    const prods=o.products||[];
    const firstP=prods[0]||null;
    const restP=prods.slice(1);
    const execIcoMap={pending:'⏳',wip:'🔄',done:'✅',problem:'⚠️'};
    // Hero: اسم المنتج الأول + الكمية
    const heroName=firstP?esc(firstP.name||'منتج'):'—';
    const heroQty=firstP?.qty?`<span class="wl-order-qty">× ${esc(firstP.qty)}</span>`:'';
    // إضافات المنتج الأول
    const firstExtras=firstP?.extras||[];
    const extrasHtml=firstExtras.length?`<div class="wl-extras">${firstExtras.map(e=>`<span class="wl-extra-tag">${esc(e)}</span>`).join('')}</div>`:'';
    // المنتجات الأخرى بشكل مضغوط
    const otherProdsHtml=restP.slice(0,2).map(p=>{
      const eIco=execIcoMap[p.execStatus||'pending']||'⏳';
      const pQty=p.qty?` <span style="opacity:.55">×${esc(p.qty)}</span>`:'';
      const pExtras=(p.extras||[]).length?` <span style="font-size:9px;color:var(--y);opacity:.8">${(p.extras||[]).join('·')}</span>`:'';
      return `<div class="wl-prod-row"><span class="wl-prod-status">${eIco}</span><span class="wl-prod-name">${esc(p.name||'منتج')}${pQty}</span>${pExtras}</div>`;
    }).join('');
    const moreCount=prods.length>3?`<span class="wl-prod-more">+ ${prods.length-3} أخرى</span>`:'';
    const prodsBlock=(otherProdsHtml||moreCount)?`<div class="wl-prods">${otherProdsHtml}${moreCount}</div>`:'';
    // ملخص التكاليف
    const totalBnds=(o.costItems||[]).length;
    const costSum=canCost()?(totalBnds?`<span class="wl-cost-sum">💰 ${totalBnds} بند</span>`:`<span class="wl-cost-sum nocost">بدون تكاليف</span>`):'';
    // السطر الثانوي: العميل + كود + مسؤول
    const agentStr=o.productionAgentName?` · 👷 ${esc(o.productionAgentName)}`:'';
    const mineStr=ismine&&!mineOnly?' · <span style="color:var(--b)">لي</span>':'';
    const lateTag=late?' <span class="bdg bdg-danger" style="font-size:8px">⏰</span>':'';
    const clientLine=`<div class="wl-client-line">👤 ${esc(o.clientName||'—')} · ${esc(oCode(o))}${agentStr}${mineStr}${lateTag}${costSum?` · ${costSum}`:''}</div>`;
    const isPinned=pinnedIds.has(o._id);
    return `<div class="wl-card${selectedId===o._id?' active':''}${selectMode?' sel-mode':''}" data-id="${esc(o._id)}" onclick="handleCardClick(event,'${esc(o._id)}')">
      <button type="button" class="pin-btn${isPinned?' pinned':''}" onclick="event.stopPropagation();togglePin('${esc(o._id)}')" title="${isPinned?'إلغاء التثبيت':'تثبيت أعلى'}">${isPinned?'📌':'📍'}</button>
      <div class="wl-check${isSel?' checked':''}" data-check="${esc(o._id)}"></div>

               `<div class="wl-thumb-ph" style="color:var(--dim2);opacity:.4">🏭</div>`}

        <div class="wl-top">
          <div class="wl-order-hero"><span class="wl-name">${heroName}</span>${heroQty}</div>
          <span class="bdg ${ex.bc}">${ex.ico} ${ex.lbl}</span>
        </div>
        ${extrasHtml}
        ${prodsBlock}
        ${clientLine}
        <!-- أزرار الحالة السريعة -->
        <div class="wl-qbtns" onclick="event.stopPropagation()">
          ${['wip','done','problem'].map(k=>{const e2=EXEC.find(e=>e.k===k);return `<button type="button" class="wqb${st===k?' on-'+k:''}" data-qact="${k}" data-oid="${esc(o._id)}">${e2.ico} ${e2.lbl}</button>`;}).join('')}

  }).join('');

  const noCost=ids.filter(id=>{const o=orders.find(x=>x._id===id);return o&&!(o.costItems||[]).length;}).length;
  const msg=noCost
    ?`سيتم تحريك ${ids.length} أوردر للشحن (${noCost} بدون تكاليف — يمكن تسجيلها لاحقاً). متأكد؟`
    :`سيتم تحريك ${ids.length} أوردر للشحن. متأكد؟`;
  if(!confirm(msg))return;
  let ok=0,fail=0;
  for(const orderId of ids){
    let r=await orderActions.submitToShipping({db,orderId,role:me.role,userId:me.uid,userName:me.name}).catch(err=>({ok:false,errors:[err.message]}));
    if(r&&!r.ok&&(r.warnings||[]).length&&!(r.errors||[]).length){
      r=await orderActions.submitToShipping({db,orderId,role:me.role,userId:me.uid,userName:me.name,bypassWarnings:true}).catch(err=>({ok:false,errors:[err.message]}));
    }
    r?.ok?ok++:fail++;
  }
  if(ok){shiftDone+=ok;renderKPIs();}
  toast(`✓ ${ok} أوردر تم تحريكه للشحن${fail?' · '+fail+' فشل':''}`,'ok');
  clearSelection();
};

// ── Cancel modal ──────────────────────────────────────────────────
let cancelIsBulk=false, cancelSingleId=null;
window.openCancelModal=function(bulk,singleId){
  cancelIsBulk=bulk;
  cancelSingleId=singleId||null;
  if(bulk&&!selected.size){toast('حدد أوردر أولاً','warn');return;}
  const n=bulk?selected.size:1;
  document.getElementById('cancel-modal-info').textContent=`سيتم إلغاء ${n} أوردر — هذا الإجراء لا يمكن التراجع عنه`;
  document.getElementById('cancel-reason-sel').value='';
  document.getElementById('cancel-note').value='';
  document.getElementById('cancel-modal-ov').classList.add('open');
};
window.closeCancelModal=function(){document.getElementById('cancel-modal-ov').classList.remove('open');};
window.applyCancelOrder=async function(){
  const reason=document.getElementById('cancel-reason-sel').value;
  const note=document.getElementById('cancel-note').value.trim();
  if(!reason){toast('اختر سبب الإلغاء','warn');return;}
  const ids=cancelIsBulk?[...selected]:[cancelSingleId].filter(Boolean);
  if(!ids.length){toast('لا يوجد أوردر','warn');return;}
  closeCancelModal();
  let ok=0,fail=0;
  for(const orderId of ids){
    const r=await orderActions.cancelOrder({db,orderId,reason,note,userId:me.uid,userName:me.name}).catch(err=>({ok:false,errors:[err.message]}));
    r?.ok?ok++:fail++;
  }
  toast(`✓ تم إلغاء ${ok} أوردر${fail?' · '+fail+' فشل':''}`,'ok');
  if(cancelIsBulk)clearSelection();
  if(!cancelIsBulk&&ok){selectedId=null;document.body.classList.remove('detail-open');renderList();}
};

function buildSupSel(){
  const usedIds=new Set(orders.flatMap(o=>(o.products||[]).map(p=>p.supplierId).filter(Boolean)));
  const used=suppliers.filter(s=>usedIds.has(s._id));
  const sel=document.getElementById('wl-sup-sel');
  if(!used.length){sel.style.display='none';return;}
  sel.style.display='';
  sel.innerHTML=`<option value="">🏭 كل المطابع</option>`+used.map(s=>`<option value="${esc(s._id)}" ${supFilter===s._id?'selected':''}>${esc(s.name||s._id)}</option>`).join('');
}
function buildBulkSupSel(){

document.getElementById('wl-body').addEventListener('click',async e=>{

      <div class="cost-form-title">حفظ بنود الأوردر كقالب جديد</div>
      <div style="font-size:11px;color:var(--dim2);margin-bottom:8px">سيُحفظ ${costs.filter(c=>c.supplierId&&c.type).length} بند${costs.some(c=>!c.supplierId)?` <span style="color:var(--y)">(${costs.filter(c=>!c.supplierId).length} بدون مورد — لن تُحفظ)</span>`:''}</div>
      <div class="cost-form">
        <div><div class="cf-lbl">اسم القالب *</div><input type="text" class="cf-inp" id="tmpl-name" value="${esc(products[0]?.name||'')}" placeholder="مثال: كارت شخصي ديجيتال"></div>
        <div><div class="cf-lbl">الكمية</div><input type="text" class="cf-inp" id="tmpl-qty" value="${esc(products[0]?.qty||'')}" placeholder="مثال: 500"></div>
        <div class="cf-full"><button type="button" class="act act-save act-full" data-act="savetmpl">حفظ في المكتبة</button></div>
      </div>
    </div>`:'';
    const costCenterLink=`<a href="exec-cost-entry.html?id=${esc(o._id)}" class="act act-ghost act-full" style="margin-top:6px;text-decoration:none;justify-content:center">🧮 فتح مركز التكاليف المتقدم</a>`;
    panel.innerHTML=hdrHTML+tabsHTML+`<div class="wd">${metricsHTML}${supChipsHTML}${simHTML}${itemsSec}${formHTML}${tmplHTML||libHTML?`<div style="margin-top:12px">${tmplHTML}${libHTML}</div>`:''}${saveTemplateHTML}${costCenterLink}</div>`;
    return;
  }

  // ══════════════════════════════════════════════════════════════════
  // ── MAIN TAB — Product-centric execution ─────────────────────────
  // ══════════════════════════════════════════════════════════════════

  // ── Journey Rail ──
  const allHaveSup=products.length>0&&products.every(p=>p.supplierId);
  const someSup=products.some(p=>p.supplierId);
  const setupState=o.productionAgent&&allHaveSup?'done':o.productionAgent||someSup?'active':'pending';
  const execState=st==='done'?'done':st==='problem'?'problem':st==='wip'?'active':'pending';
  const costState=costs.length?'done':'pending';
  const jSteps=[
    {lbl:'استُلم',state:'done'},
    {lbl:'تجهيز',state:setupState},
    {lbl:'تنفيذ',state:execState},
    {lbl:'تكاليف',state:costState},
    {lbl:'شحن',state:'pending'},
  ];
  const jRail=`<div class="jrail">${jSteps.map((s,i)=>`
    ${i>0?`<div class="jline${s.state==='done'||jSteps[i-1].state==='done'?' done':s.state==='active'?' active':''}"></div>`:''}
    <div class="jstep ${s.state}"><div class="jdot"></div><div class="jlbl">${s.lbl}</div></div>
  `).join('')}</div>`;

  // ── #6 Smart Alert bar ──
  const alerts=[];
  if(o.deadline&&new Date(o.deadline)<new Date()){
    const daysLate=Math.ceil((Date.now()-new Date(o.deadline).getTime())/86400000);
    alerts.push(`<span class="achip achip-r">⏰ متأخر ${daysLate} يوم</span>`);
  }
  if(!o.productionAgent) alerts.push(`<span class="achip achip-b">👷 بدون مندوب تنفيذ</span>`);
  const noSupCount=products.filter(p=>!p.supplierId).length;
  if(noSupCount) alerts.push(`<span class="achip achip-y">🏭 ${noSupCount} منتج بدون مورد</span>`);
  if(canCost()&&!costs.length){
    const sim=findSimilar(o);
    alerts.push(`<span class="achip achip-y">💰 لم تُسجَّل تكاليف${sim.length?' — '+sim.length+' أوردر مشابه متاح للنسخ':''}</span>`);
  }
  if(canCost()&&costs.length){
    const avgCost=orders.filter(x=>x._id!==o._id&&(x.costItems||[]).length).reduce((acc,x)=>{acc.sum+=orderCost(x);acc.n++;return acc;},{sum:0,n:0});
    if(avgCost.n>2){const avg=avgCost.sum/avgCost.n;const cur=orderCost(o);if(cur>avg*1.4) alerts.push(`<span class="achip achip-y">📊 تكلفة أعلى من المتوسط بـ ${Math.round((cur/avg-1)*100)}%</span>`);}
  }
  const alertBar=alerts.length?`<div class="alert-bar">${alerts.join('')}</div>`:'';


  // ── Products — execution cards with #3 ship + #7 checklist + #8 sup stats + #9 photos ──
  const prodsHTML=products.length?products.map((p,i)=>{
    const cur=p.execStatus||'pending';
    const ck=deriveChecklist(p);
    const checkKey=o._id+'_'+i;
    if(!prodChecks[checkKey])prodChecks[checkKey]=new Set();
    const supSt=p.supplierId?getSupStats(p.supplierId):null;
    const photos=(o.productionPhotos||[]).filter(ph=>ph.prodIdx===i||ph.prodIdx==null);
    return `<div class="prd-item">
      <div class="prd-name">${esc(p.name||('منتج '+(i+1)))} ${p.qty?`<span style="color:var(--b);font-weight:var(--fw-extra);font-size:12px">×${esc(p.qty)}</span>`:''}</div>
      <div class="prd-status-row">${EXEC.map(e=>`<button type="button" class="psb${cur===e.k?' on-'+e.k:''}" data-act="setexec" data-pidx="${i}" data-status="${e.k}">${e.ico} ${e.lbl}</button>`).join('')}</div>
      <div class="prd-sup-row">
        <span class="prd-sup-lbl">🏭</span>
        <select class="prd-sup-sel" data-act="setsup" data-pidx="${i}">
          <option value="">— بدون مورد —</option>
          ${suppliers.map(s=>`<option value="${esc(s._id)}" data-name="${esc(s.name||'')}" ${s._id===(p.supplierId||'')?'selected':''}>${esc(s.name||s._id)}</option>`).join('')}
        </select>
      </div>
      ${supSt?`<div class="sup-stats">📊 ${supSt.active} نشط · ✅ ${supSt.done} مكتمل${supSt.prob?' · ⚠️ '+supSt.prob+' مشكلة':''}</div>`:''}
      <div class="prod-cl">${ck.map(s=>`<button type="button" class="cl-item${prodChecks[checkKey].has(s)?' checked':''}" data-act="togglecheck" data-ck="${esc(checkKey)}" data-step="${esc(s)}">${prodChecks[checkKey].has(s)?'✓':''} ${esc(s)}</button>`).join('')}</div>
      <div class="photo-sec">
        ${photos.map(ph=>`<img src="${esc(ph.url)}" class="photo-thumb" title="${esc(ph.fileName||'')}" onclick="window.open('${esc(ph.url)}','_blank')">`).join('')}
        <label class="photo-add" title="رفع صورة إنتاج"><input type="file" accept="image/*" style="display:none" data-act="uploadphoto" data-pidx="${i}">📷</label>
      </div>
      ${cur==='done'&&products.length>1&&st!=='done'?`<button type="button" class="prd-ship-btn" data-act="shipproduct" data-pidx="${i}">📦 شحن هذا المنتج فقط</button>`:''}
    </div>`;
  }).join(''):'<div style="color:var(--dim2);font-size:var(--fs-sm);padding:8px 0">لا توجد منتجات</div>';

  // ── Agent ──
  const agentHTML=`<div class="wd-sec${!o.productionAgent?' ':''}" id="sec-agent">
    <div class="wd-sec-hdr" style="${!o.productionAgent?'color:var(--b)':''}">👷 المندوب ${o.productionAgentName?`<span style="color:var(--snow)">${esc(o.productionAgentName)}</span>`:''}</div>
    <div class="wd-sec-body" style="gap:8px">
      <div style="display:flex;gap:8px">
        <select class="agent-sel" id="agent-sel"><option value="">— اختر مندوب —</option>${prodAgents.map(a=>`<option value="${esc(a._id)}" data-name="${esc(a.name||'')}" ${a._id===(o.productionAgent||'')?'selected':''}>${esc(a.name||a._id)}</option>`).join('')}</select>
        <button type="button" class="act act-ghost" data-act="assignagent">تعيين</button>
      </div>
      ${!o.productionAgent&&me.role==='production_agent'?`<button type="button" class="act act-ghost act-full" data-act="pickup">📥 التقط الأوردر</button>`:''}
    </div>
  </div>`;

  // ── Ship ──
  const isReadyToShip=st==='done'&&costs.length>0;
  const shipBtn=`<button type="button" class="act act-full${isReadyToShip?' ship-ready':' act-ship'}" style="font-size:var(--fs-base);padding:13px" data-act="toShip">${isReadyToShip?'جاهز — إرسال للشحن':'إرسال للشحن'}</button>`;

  // ── Note ──
  const noteHTML=`<div class="wd-sec"><div class="wd-sec-hdr">📝 ملاحظة</div><div class="wd-sec-body" style="gap:8px"><textarea class="note-ta" id="prod-note" rows="2" placeholder="ملاحظات خاصة…">${esc(o.prodNote||'')}</textarea><button type="button" class="act act-save act-full" data-act="savenote">حفظ</button></div></div>`;

  panel.innerHTML=hdrHTML+tabsHTML+jRail+alertBar+`<div class="wd">
    ${imgSrc?`<img src="${esc(imgSrc)}" alt="" loading="lazy" style="width:100%;max-height:160px;object-fit:contain;border-radius:10px;background:var(--bg2);border:1px solid var(--line)" onerror="this.remove()">`:''}
    ${!o.productionAgent?agentHTML:''}
    ${prodsHTML}
    ${o.productionAgent?agentHTML:''}
    ${noteHTML}
    ${shipBtn}
    <button type="button" class="act act-full" style="background:rgba(255,61,110,.06);border-color:rgba(255,61,110,.2);color:var(--r);margin-top:4px" onclick="openCancelModal(false,'${esc(o._id)}')">❌ إلغاء الأوردر</button>
  </div>`;
}

// ── Actions (detail panel) ─────────────────────────────────────────
document.getElementById('ws-detail').addEventListener('click',async e=>{
  const btn=e.target.closest('[data-act]');if(!btn||!selectedId)return;
  const act=btn.dataset.act,orderId=selectedId;
  const base={db,orderId,role:me.role,userId:me.uid,userName:me.name};
  btn.disabled=true;
  try{
    let r;
    if(act==='setexec'){
      const o=orders.find(x=>x._id===orderId);if(!o){btn.disabled=false;return;}
      const prodIdx=parseInt(btn.dataset.pidx,10),status=btn.dataset.status;
      const np=(o.products||[]).map((p,i)=>i===prodIdx?{...p,execStatus:status}:p);
      r=await orderActions.setProductExecStatus({db,orderId,prodIdx,execStatus:status,derivedProdStatus:deriveSt({...o,products:np}),statusLabel:(EXEC.find(e=>e.k===status)||{}).lbl||status,userId:me.uid,userName:me.name});
    } else if(act==='applytmpl'){
      const templateId=btn.dataset.tmplId;
      // لو أكثر من منتج → اقرأ من الـ select المخصص
      const pidxSel=btn.dataset.pidxSel?document.getElementById(btn.dataset.pidxSel):null;
      const prodIdx=pidxSel?parseInt(pidxSel.value,10):parseInt(btn.dataset.prodIdx,10);
      const t=costTemplates.find(x=>x.id===templateId);
      if(!t||!t.costItems.length){toast('القالب فارغ','warn');btn.disabled=false;return;}
      let ok=0,fail=0;
      for(const item of t.costItems){
        const ri=await orderActions.recordCostItem({...base,prodIdx,payload:{type:item.type,total:parseFloat(item.amount)||0,supplierId:item.supplierId||'',supplierName:item.supplierName||'',note:item.note||''},wallets:[],allowedTypes:masterCategories.filter(c=>c.isCostItem!==false).map(c=>c.label)});
        if(ri?.ok)ok++;else fail++;
      }
      toast(ok?`✓ أُضيف ${ok} بند${fail?` (${fail} فشل)`:''}`:' تعذّر تطبيق القالب',ok?'ok':'err');
      btn.disabled=false;return;
    } else if(act==='toShip'){
      r=await orderActions.submitToShipping(base);
      if(r&&!r.ok&&(r.warnings||[]).length&&!(r.errors||[]).length){
        if(confirm('تنبيهات:\n- '+r.warnings.join('\n- ')+'\n\nإرسال رغم التنبيهات؟')){r=await orderActions.submitToShipping({...base,bypassWarnings:true});}
        else{btn.disabled=false;return;}
      }
    } else if(act==='assignagent'){
      const sel=document.getElementById('agent-sel');if(!sel?.value){toast('اختر مندوباً','warn');btn.disabled=false;return;}
      r=await orderActions.assignProductionAgent({db,orderId,agentId:sel.value,agentName:sel.options[sel.selectedIndex]?.dataset.name||sel.value,userId:me.uid,userName:me.name});
    } else if(act==='pickup'){
      r=await orderActions.assignProductionAgent({db,orderId,agentId:me.uid,agentName:me.name,userId:me.uid,userName:me.name,pickup:true});
    } else if(act==='savenote'){
      r=await orderActions.updateProductionNote({db,orderId,note:(document.getElementById('prod-note')?.value||'').trim()});
    } else if(act==='addcostfor'){
      costFormProdIdx=parseInt(btn.dataset.pidx,10);
      editCostIdx=-1;
      renderDetail();
      setTimeout(()=>{const f=document.getElementById('cost-form-area');if(f)f.scrollIntoView({behavior:'smooth',block:'center'});},80);
      btn.disabled=false;return;
    } else if(act==='editcost'){
      editCostIdx=parseInt(btn.dataset.cidx,10);
      renderDetail();btn.disabled=false;return;
    } else if(act==='canceledit'){
      editCostIdx=-1;
      renderDetail();btn.disabled=false;return;
    } else if(act==='addcost'||act==='updatecost'){
      const type=(document.getElementById('cf-type')?.value||'').trim();
      const total=parseFloat(document.getElementById('cf-total')?.value)||0;
      if(!type){toast('اختر نوع التكلفة','warn');btn.disabled=false;return;}
      if(!total||total<=0){toast('أدخل المبلغ','warn');btn.disabled=false;return;}
      const supSel=document.getElementById('cf-sup');
      const supplierId=supSel?.value||'';
      const supplierName=supplierId?(supSel.options[supSel.selectedIndex]?.dataset.name||''):'';
      const prodIdx=parseInt(document.getElementById('cf-prod')?.value||'0',10);
      const note=(document.getElementById('cf-note')?.value||'').trim();
      const walletSel=document.getElementById('cf-wallet');
      const walletId=walletSel?.value||'';
      const isEdit=act==='updatecost';
      const payload={type,total,supplierId,supplierName,note};
      if(walletId&&!isEdit) payload.walletId=walletId;
      r=await orderActions.recordCostItem({...base,prodIdx,payload,wallets:walletId?wallets:[],isEdit,editIdx:isEdit?editCostIdx:undefined,allowedTypes:masterCategories.filter(c=>c.isCostItem!==false).map(c=>c.label)});
      if(r?.ok){editCostIdx=-1;shiftCosts++;renderKPIs();}
    } else if(act==='qefill'){
      const type=btn.dataset.type;
      const sel=document.getElementById('cf-type');if(sel){sel.value=type;}
      const inp=document.getElementById('cf-total');if(inp){inp.focus();inp.select();}
      btn.disabled=false;return;
    } else if(act==='copycosts'){
      const srcId=btn.dataset.src;
      const src=orders.find(x=>x._id===srcId);
      if(!src||!(src.costItems||[]).length){toast('لا توجد بنود للنسخ','warn');btn.disabled=false;return;}
      let ok=0,fail=0;
      for(const c of src.costItems){
        const ri=await orderActions.recordCostItem({...base,prodIdx:c.prodIdx??0,payload:{type:c.type,total:parseFloat(c.total)||0,supplierId:c.supplierId||'',supplierName:c.supplierName||'',note:c.note||''},wallets:[],allowedTypes:masterCategories.filter(x=>x.isCostItem!==false).map(x=>x.label)});
        if(ri?.ok){ok++;shiftCosts++;}else fail++;
      }
      renderKPIs();
      toast(ok?`✓ نُسخ ${ok} بند${fail?' ('+fail+' فشل)':''}`:' تعذّر النسخ',ok?'ok':'err');
      btn.disabled=false;return;
    } else if(act==='togglecheck'){
      const ck=btn.dataset.ck,step=btn.dataset.step;
      if(!prodChecks[ck])prodChecks[ck]=new Set();
      if(prodChecks[ck].has(step))prodChecks[ck].delete(step);else prodChecks[ck].add(step);
      renderDetail();btn.disabled=false;return;
    } else if(act==='shipproduct'){
      const pidx=parseInt(btn.dataset.pidx,10);
      if(!confirm(`شحن المنتج رقم ${pidx+1} فقط — باقي المنتجات ستبقى في الإنتاج. متأكد؟`)){btn.disabled=false;return;}
      r=await orderActions.submitProductionToShipping?.({...base,prodIdx:pidx}).catch(()=>null);
      if(!r) r=await orderActions.submitToShipping({...base,bypassWarnings:true}).catch(err=>({ok:false,errors:[err.message]}));
    } else if(act==='delcost'){
      const cidx=parseInt(btn.dataset.cidx,10);
      if(!confirm('حذف هذا البند؟')){btn.disabled=false;return;}
      r=await orderActions.removeUnpaidCostItem({...base,itemIndex:cidx});
    } else if(act==='savetmpl'){
      const name=(document.getElementById('tmpl-name')?.value||'').trim();
      const qty=(document.getElementById('tmpl-qty')?.value||'').trim();
      if(!name){toast('أدخل اسم القالب','warn');btn.disabled=false;return;}
      const o2=orders.find(x=>x._id===orderId);
      const items=(o2?.costItems||[]).filter(c=>c.supplierId&&c.type&&parseFloat(c.total)>0)
        .map(c=>({type:c.type,supplierId:c.supplierId,supplierName:c.supplierName||'',amount:parseFloat(c.total)||0}));
      if(!items.length){toast('لا توجد بنود صالحة — كل بند يحتاج مورداً','warn');btn.disabled=false;return;}
      const sr=await saveCostTemplate(db,{name,qty:qty||null,costItems:items},me.name);
      if(sr?.ok){
        costTemplates=await getCostTemplates(db);
        toast('تم الحفظ في المكتبة ✓','ok');
        btn.disabled=false;return;
      }
      toast((sr?.errors||[])[0]||'تعذر الحفظ','err');btn.disabled=false;return;
    }
    if(r?.ok){
      if(act==='toShip'||act==='shipproduct'){shiftDone++;renderKPIs();}
      toast(r.warnings?.length?'تم ✓ · '+r.warnings[0]:'تم ✓','ok');
      if(act==='toShip'){selectedId=null;document.body.classList.remove('detail-open');renderList();}
    }
    else toast((r?.errors||[])[0]||'تعذّر','err');
  }catch(err){console.warn('[exec-ws]',act,err);toast(err.message||'خطأ','err');}
  btn.disabled=false;
});

// ── Supplier per product + #9 Photo upload (change events) ────────
document.getElementById('ws-detail').addEventListener('change',async e=>{
  const sel=e.target.closest('[data-act="setsup"]');
  if(sel&&selectedId){
    const prodIdx=parseInt(sel.dataset.pidx,10),supplierId=sel.value;
    const supplierName=sel.value?(sel.options[sel.selectedIndex]?.dataset.name||''):'';
    const r=await orderActions.setProductSupplier({db,orderId:selectedId,prodIdx,supplierId,supplierName,userId:me.uid,userName:me.name});
    if(r?.ok) toast('تم تحديث المورد ✓','ok');
    else toast((r?.errors||[])[0]||'تعذّر','err');
    return;
  }
  const fileIn=e.target.closest('[data-act="uploadphoto"]');
  if(fileIn&&selectedId&&fileIn.files?.length){
    const file=fileIn.files[0];
    if(!file.type.startsWith('image/')){toast('صور فقط','warn');return;}
    toast('جارٍ الرفع…','ok');
    try{
      const res=await uploadOrderFile({orderId:selectedId,file,kind:'production'});
      const o=orders.find(x=>x._id===selectedId);
      if(o){
        if(!o.productionPhotos)o.productionPhotos=[];
        o.productionPhotos.push({url:res.url,fileName:res.fileName,prodIdx:parseInt(fileIn.dataset.pidx,10),ts:Date.now()});
      }
      toast('تم رفع الصورة ✓','ok');
      renderDetail();
    }catch(err){toast('فشل الرفع: '+err.message,'err');}
  }
});
</script>
</body>
</html>
