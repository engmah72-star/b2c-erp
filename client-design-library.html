<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07080f">
<title>Business2Card — مكتبة تصاميم العملاء</title>
<link rel="stylesheet" href="shared.css">
<script type="module" src="inbox-badge.js"></script>
<style>
.cdl-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.cdl-toolbar .inp{padding:8px 12px}
.cdl-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.cdl-stat{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px;position:relative;overflow:hidden}
.cdl-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--sc,var(--b))}
.cdl-stat-val{font-size:22px;font-weight:900;line-height:1;color:var(--sc,var(--b))}
.cdl-stat-lbl{font-size:11px;color:var(--dim2);font-weight:700;margin-top:6px}
.cdl-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cdl-chip{padding:5px 12px;border-radius:18px;border:1px solid var(--line);background:var(--bg2);color:var(--dim2);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.cdl-chip.active{background:var(--b);border-color:var(--b);color:#fff}
.cdl-back{display:inline-flex;align-items:center;gap:5px;color:var(--dim2);font-size:12px;font-weight:700;text-decoration:none;margin-bottom:10px;padding:4px 10px;border-radius:8px}
.cdl-back:hover{background:var(--bg3);color:var(--snow)}
/* Client cards (mode 1) */
.cdl-clients{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.cdl-client{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.cdl-client:hover{border-color:var(--b);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.18)}
.cdl-client-name{font-size:14px;font-weight:900;color:var(--snow);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cdl-client-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;background:var(--b);flex-shrink:0}
.cdl-client-counts{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--dim2);font-weight:700}
.cdl-cc{background:var(--bg3);border-radius:8px;padding:3px 8px;display:inline-flex;align-items:center;gap:3px}
/* Design item cards (mode 2) */
.cdl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.cdl-card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:all .15s}
.cdl-card:hover{border-color:rgba(167,139,250,.5);box-shadow:0 4px 16px rgba(0,0,0,.18)}
.cdl-card-img{aspect-ratio:4/3;background:var(--bg3);overflow:hidden;cursor:pointer;position:relative}
.cdl-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .25s}
.cdl-card-img:hover img{transform:scale(1.05)}
.cdl-card-empty{display:flex;align-items:center;justify-content:center;height:100%;font-size:36px;color:var(--dim2);opacity:.4}
.cdl-card-pill{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;backdrop-filter:blur(4px)}
.cdl-card-status{position:absolute;top:6px;left:6px;font-size:14px;background:rgba(0,0,0,.6);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.cdl-card-body{padding:10px 12px;flex:1;display:flex;flex-direction:column;gap:4px}
.cdl-card-name{font-size:13px;font-weight:900;color:var(--snow);line-height:1.3}
.cdl-card-meta{font-size:10px;color:var(--dim2);font-weight:600;display:flex;flex-wrap:wrap;gap:6px}
.cdl-card-files{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:8px 10px;border-top:1px solid var(--line);background:rgba(0,0,0,.1)}
.cdl-fbtn{padding:6px 4px;text-align:center;background:var(--bg3);border:1px solid var(--line);border-radius:6px;color:var(--dim2);font-size:9px;font-weight:700;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .12s}
.cdl-fbtn.ok{background:rgba(0,217,126,.08);border-color:rgba(0,217,126,.3);color:var(--g);cursor:pointer}
.cdl-fbtn.ok:hover{background:rgba(0,217,126,.15)}
.cdl-fbtn:not(.ok){opacity:.4;cursor:not-allowed}
.cdl-fbtn-ico{font-size:14px;line-height:1}
.cdl-card-actions{display:flex;gap:4px;padding:6px 10px;border-top:1px solid var(--line)}
.cdl-empty{text-align:center;padding:60px 20px;color:var(--dim2)}
.cdl-empty-ico{font-size:48px;margin-bottom:12px;opacity:.4}
/* Bulk download bar */
.cdl-bulk{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:10px 12px;background:rgba(74,142,245,.05);border:1px solid rgba(74,142,245,.15);border-radius:10px;margin-bottom:12px}
.cdl-bulk:empty{display:none}
.cdl-bulk-label{font-size:11px;font-weight:700;color:var(--b);margin-left:4px}
.cdl-bulk-btn{padding:6px 12px;border:1px solid var(--line);background:var(--bg2);color:var(--snow);border-radius:18px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;transition:all .12s;white-space:nowrap}
.cdl-bulk-btn:hover:not(:disabled){background:var(--b);border-color:var(--b);color:#fff}
.cdl-bulk-btn.cdl-bulk-source{border-color:rgba(167,139,250,.4);color:#a78bfa}
.cdl-bulk-btn.cdl-bulk-source:hover:not(:disabled){background:#a78bfa;color:#fff}
.cdl-bulk-btn.cdl-bulk-all{border-color:var(--g);color:var(--g);font-weight:900}
.cdl-bulk-btn.cdl-bulk-all:hover:not(:disabled){background:var(--g);color:#fff}
.cdl-bulk-btn:disabled{opacity:.35;cursor:not-allowed}
/* Analytics panel */
.cdl-analytics{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}
.cdl-analytics:empty{display:none}
.cdl-an-title{font-size:12px;font-weight:800;color:var(--snow);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.cdl-an-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.cdl-an-card{background:var(--bg3);border-radius:8px;padding:10px}
.cdl-an-val{font-size:18px;font-weight:900;color:var(--snow);line-height:1}
.cdl-an-lbl{font-size:10px;color:var(--dim2);font-weight:700;margin-top:4px}
.cdl-an-sub{font-size:9px;color:var(--dim2);margin-top:2px;opacity:.8}
</style>
<script src="smart-sidebar.js?v=1" defer></script>
<script src="pwa-install.js?v=1" defer></script>
</head>
<body>
<div class="app-shell">

<aside class="sidenav">
  <div class="nav-head">
    <div class="nav-logo">B2C</div>
    <div class="nav-brand"><div class="nav-title">B2C ERP</div><div class="nav-sub">مكتبة التصاميم</div></div>
  </div>
  <div class="nav-scroll" id="nav-scroll"></div>
  <div class="nav-foot">
    <div class="nav-user" onclick="doLogout()">
      <div class="nav-avatar" id="nav-av">U</div>
      <div><div class="nav-user-name" id="nav-name">—</div><div class="nav-user-role">خروج</div></div>
    </div>
  </div>
</aside>
<div id="nav-ov" class="nav-ov" onclick="document.querySelector('.sidenav').classList.remove('mob-open');this.classList.remove('show')"></div>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="mob-menu-btn" onclick="document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show')">☰</button>
      <h1>🎨 مكتبة تصاميم العملاء</h1>
      <p id="cdl-sub">جاري التحميل...</p>
    </div>
  </div>

  <div class="content">
    <div id="cdl-back-wrap"></div>

    <div class="cdl-toolbar">
      <div class="sw" style="flex:1;min-width:220px"><span class="sw-ico">🔍</span><input class="inp" id="q" placeholder="بحث: اسم العميل / المنتج / كود الأوردر" oninput="render()"></div>
      <select class="inp" id="f-sort" onchange="render()" style="width:170px">
        <option value="recent">الأحدث أولاً</option>
        <option value="client">العميل أبجدياً</option>
        <option value="versions">الأكثر نسخاً</option>
      </select>
    </div>

    <div class="cdl-stats" id="cdl-stats"></div>

    <div class="cdl-bulk" id="cdl-bulk"></div>

    <div class="cdl-analytics" id="cdl-analytics"></div>

    <div class="cdl-chips" id="cdl-chips"></div>

    <div id="cdl-body">
      <div class="loader"><div class="spinner"></div></div>
    </div>
  </div>
</main>

</div>

<div class="toasts" id="toasts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB={apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"};
const app=initializeApp(FB), auth=getAuth(app), db=getFirestore(app);

// ── State ──
let allItems = [], allClients = [], allOrders = [];
let currentUid='', currentUserName='', currentRole='admin';
const params = new URLSearchParams(location.search);
let activeClientId = params.get('clientId') || '';
let activeFilter = '';   // ''|'with-source'|'approved'|'published'|'no-mockup'

// ── Utils ──
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fn=n=>Number(n||0).toLocaleString('en-US');
function toast(msg, kind=''){
  const t=document.createElement('div'); t.className='toast '+(kind==='err'?'err':kind==='ok'?'ok':'');
  t.textContent=msg; $('toasts').appendChild(t); setTimeout(()=>t.remove(),3000);
}
window.doLogout = ()=> signOut(auth).then(()=>location.href='login.html');

// ── Sidebar (simple, role-aware) ──
const SBPAGES = [
  {f:'index.html',l:'لوحة التحكم',i:'⬡',admin:true},
  {f:'inbox.html',l:'المحادثات',i:'💬',publicTo:'all'},
  {f:'clients.html',l:'العملاء',i:'👤',perm:'clients'},
  {f:'client-design-library.html',l:'مكتبة التصاميم',i:'🎨',publicTo:'all'},
  {f:'design.html',l:'التصميم',i:'✏️',perm:'design'},
  {f:'design-workspace.html',l:'مساحة التصميم',i:'🖥️',perm:'design'},
  {f:'gallery.html',l:'المعرض',i:'🖼️',publicTo:'all'},
  {f:'print.html',l:'الطباعة',i:'🖨️',perm:'print'},
  {f:'production.html',l:'التنفيذ',i:'🏭',perm:'production'},
  {f:'shipping.html',l:'الشحن',i:'🚚',perm:'shipping'},
  {f:'reports.html',l:'التقارير',i:'📊',perm:'reports'},
];
const ROLE_HOME={admin:'index.html',operation_manager:'ops-dashboard.html',customer_service:'cs-dashboard.html',graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'};

async function buildSidebar(uid){
  const usnap = await getDoc(doc(db,'users',uid));
  const ud = usnap.exists() ? usnap.data() : {};
  currentRole = ud.role||'admin';
  currentUserName = ud.name || ud.email || '';
  const isAdm = ['admin','operation_manager'].includes(currentRole);
  const pages = ud.permissions?.pages || [];
  $('nav-name').textContent = currentUserName || '—';
  $('nav-av').textContent = (currentUserName || '?')[0].toUpperCase();
  const dash = ROLE_HOME[currentRole]||'index.html';
  let html = `<a class="nav-link" href="${dash}"><span class="nav-ico">⬡</span> ${isAdm?'لوحة التحكم':'داشبوردي'}</a>`;
  for (const p of SBPAGES){
    if (p.f === dash) continue;
    const ok = isAdm || p.publicTo==='all' || pages.includes('*') || pages.includes(p.perm||'');
    if (!ok && !p.publicTo) continue;
    if (p.admin && !isAdm) continue;
    const active = p.f === 'client-design-library.html';
    html += `<a class="nav-link${active?' active':''}" href="${p.f}"><span class="nav-ico">${p.i}</span> ${p.l}</a>`;
  }
  $('nav-scroll').innerHTML = html;
}

// ── Data loading ──
function loadData(){
  // design_items (allow read:if true → safe for any auth user)
  onSnapshot(collection(db,'design_items'), snap => {
    allItems = snap.docs.map(d=>({_id:d.id, ...d.data()}));
    render();
  });
  // clients (for client cards mode)
  onSnapshot(collection(db,'clients'), snap => {
    allClients = snap.docs.map(d=>({_id:d.id, ...d.data()}));
    render();
  });
  // orders (for context: order code, status)
  onSnapshot(collection(db,'orders'), snap => {
    allOrders = snap.docs.map(d=>({_id:d.id, ...d.data()}));
    render();
  });
}

// ── File helpers ──
function getLatestVersion(item){
  const v = (item.versions||[]).slice().sort((a,b)=>(b.vNum||0)-(a.vNum||0))[0];
  return v || null;
}
function getFiles(version){
  if (!version) return { mockup:null, pdf:null, source:null };
  const f = version.files || {};
  return {
    mockup: f.mockup || (version.imageUrl ? { url: version.imageUrl, fileName: version.fileName||'' } : null),
    pdf:    f.pdf || null,
    source: f.source || null,
  };
}
function thumbUrl(item){
  const v = getLatestVersion(item);
  return v?.files?.mockup?.url || v?.imageUrl || '';
}
function getStatus(item){
  if (item.isPrintReady) return { label:'جاهز للطباعة', col:'var(--g)', ico:'🖨️' };
  if (item.isApproved) return { label:'معتمد', col:'var(--g)', ico:'✅' };
  if (item.status === 'revision_requested') return { label:'تعديل مطلوب', col:'var(--y)', ico:'🔄' };
  if (item.visibility === 'published') return { label:'منشور للعميل', col:'var(--b)', ico:'👁' };
  if ((item.versions||[]).length) return { label:'قيد العمل', col:'var(--dim2)', ico:'✏️' };
  return { label:'لم يبدأ', col:'var(--dim2)', ico:'📝' };
}

// ── Render ──
function applyFilter(items){
  const q = ($('q').value||'').trim().toLowerCase();
  let arr = items.slice();
  if (q) arr = arr.filter(i =>
    (i.clientName||'').toLowerCase().includes(q) ||
    (i.itemName||'').toLowerCase().includes(q) ||
    (i.orderCode||'').toLowerCase().includes(q)
  );
  if (activeFilter === 'with-source') arr = arr.filter(i => getFiles(getLatestVersion(i)).source);
  else if (activeFilter === 'approved') arr = arr.filter(i => i.isApproved);
  else if (activeFilter === 'published') arr = arr.filter(i => i.visibility === 'published');
  else if (activeFilter === 'no-mockup') arr = arr.filter(i => !thumbUrl(i));
  const sort = $('f-sort').value || 'recent';
  if (sort === 'recent') arr.sort((a,b)=>{
    const av = getLatestVersion(a), bv = getLatestVersion(b);
    const at = av?.uploadedAt || a.updatedAt?.seconds*1000 || 0;
    const bt = bv?.uploadedAt || b.updatedAt?.seconds*1000 || 0;
    return new Date(bt) - new Date(at);
  });
  else if (sort === 'client') arr.sort((a,b)=>(a.clientName||'').localeCompare(b.clientName||'','ar'));
  else if (sort === 'versions') arr.sort((a,b)=>((b.versions||[]).length-(a.versions||[]).length));
  return arr;
}

function render(){
  if (!allItems.length && !allClients.length) {
    $('cdl-body').innerHTML = '<div class="loader"><div class="spinner"></div></div>';
    return;
  }
  if (activeClientId) renderClientMode();
  else renderAllClientsMode();
}

// MODE 1: Overview of all clients
function renderAllClientsMode(){
  $('cdl-back-wrap').innerHTML = '';
  // Group items by clientId
  const byClient = new Map();
  allItems.forEach(it => {
    const cid = it.clientId || '_unknown';
    if (!byClient.has(cid)) byClient.set(cid, { items: [], name: it.clientName || '—' });
    byClient.get(cid).items.push(it);
  });

  // Stats
  const totalItems = allItems.length;
  const totalVersions = allItems.reduce((s,i)=>s+(i.versions||[]).length,0);
  const withSource = allItems.filter(i => getFiles(getLatestVersion(i)).source).length;
  const withPdf = allItems.filter(i => getFiles(getLatestVersion(i)).pdf).length;
  $('cdl-stats').innerHTML = `
    <div class="cdl-stat" style="--sc:var(--b)"><div class="cdl-stat-val">${fn(byClient.size)}</div><div class="cdl-stat-lbl">👥 عميل بتصاميم</div></div>
    <div class="cdl-stat" style="--sc:var(--p)"><div class="cdl-stat-val">${fn(totalItems)}</div><div class="cdl-stat-lbl">🎨 تصميم</div></div>
    <div class="cdl-stat" style="--sc:var(--g)"><div class="cdl-stat-val">${fn(totalVersions)}</div><div class="cdl-stat-lbl">📁 نسخة كلية</div></div>
    <div class="cdl-stat" style="--sc:var(--y)"><div class="cdl-stat-val">${fn(withSource)}/${fn(totalItems)}</div><div class="cdl-stat-lbl">📁 معاها ملف مصدر</div></div>
    <div class="cdl-stat" style="--sc:var(--r)"><div class="cdl-stat-val">${fn(withPdf)}/${fn(totalItems)}</div><div class="cdl-stat-lbl">📄 معاها PDF</div></div>
  `;

  // No chips/bulk/analytics in client list mode
  $('cdl-chips').innerHTML = '';
  $('cdl-bulk').innerHTML = '';
  $('cdl-analytics').innerHTML = '';

  // Filter clients by search
  const q = ($('q').value||'').trim().toLowerCase();
  let entries = [...byClient.entries()];
  if (q) entries = entries.filter(([cid, g]) => (g.name||'').toLowerCase().includes(q));
  entries.sort((a,b) => b[1].items.length - a[1].items.length);

  setText('cdl-sub', `${byClient.size} عميل · ${totalItems} تصميم`);

  if (!entries.length){
    $('cdl-body').innerHTML = `<div class="cdl-empty"><div class="cdl-empty-ico">🎨</div><div>لا توجد تصاميم بعد</div></div>`;
    return;
  }

  $('cdl-body').innerHTML = `<div class="cdl-clients">${entries.map(([cid, g]) => {
    const items = g.items;
    const versions = items.reduce((s,i)=>s+(i.versions||[]).length,0);
    const sources = items.filter(i => getFiles(getLatestVersion(i)).source).length;
    const pdfs = items.filter(i => getFiles(getLatestVersion(i)).pdf).length;
    const initial = (g.name||'?')[0].toUpperCase();
    return `<div class="cdl-client" onclick="setClient('${cid}')">
      <div class="cdl-client-name">
        <div class="cdl-client-avatar">${esc(initial)}</div>
        ${esc(g.name||'—')}
      </div>
      <div class="cdl-client-counts">
        <span class="cdl-cc">🎨 ${items.length} تصميم</span>
        <span class="cdl-cc">📁 ${versions} نسخة</span>
        ${sources?`<span class="cdl-cc" style="color:var(--g)">📁 ${sources} مصدر</span>`:''}
        ${pdfs?`<span class="cdl-cc" style="color:var(--b)">📄 ${pdfs} PDF</span>`:''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

// MODE 2: Single client view
function renderClientMode(){
  const items = allItems.filter(i => (i.clientId||'') === activeClientId);
  const clientName = items[0]?.clientName || allClients.find(c=>c._id===activeClientId)?.name || 'العميل';

  $('cdl-back-wrap').innerHTML = `<a class="cdl-back" href="client-design-library.html">← كل العملاء</a>`;
  setText('cdl-sub', `${clientName} · ${items.length} تصميم`);

  // Stats for this client
  const totalVersions = items.reduce((s,i)=>s+(i.versions||[]).length,0);
  const withSource = items.filter(i => getFiles(getLatestVersion(i)).source).length;
  const withPdf = items.filter(i => getFiles(getLatestVersion(i)).pdf).length;
  const approved = items.filter(i => i.isApproved).length;
  $('cdl-stats').innerHTML = `
    <div class="cdl-stat" style="--sc:var(--b)"><div class="cdl-stat-val">${fn(items.length)}</div><div class="cdl-stat-lbl">🎨 تصميم</div></div>
    <div class="cdl-stat" style="--sc:var(--p)"><div class="cdl-stat-val">${fn(totalVersions)}</div><div class="cdl-stat-lbl">📁 نسخة</div></div>
    <div class="cdl-stat" style="--sc:var(--g)"><div class="cdl-stat-val">${fn(approved)}</div><div class="cdl-stat-lbl">✅ معتمد</div></div>
    <div class="cdl-stat" style="--sc:var(--y)"><div class="cdl-stat-val">${fn(withSource)}</div><div class="cdl-stat-lbl">📁 معاها مصدر</div></div>
    <div class="cdl-stat" style="--sc:var(--r)"><div class="cdl-stat-val">${fn(withPdf)}</div><div class="cdl-stat-lbl">📄 معاها PDF</div></div>
  `;

  // ── Bulk ZIP download bar ──
  const safeClient = (clientName || 'client').replace(/[\\/:*?"<>|]/g, '_');
  document.getElementById('cdl-bulk').innerHTML = `
    <span class="cdl-bulk-label">📥 تحميل دفعة واحدة (ZIP):</span>
    <button class="cdl-bulk-btn" onclick="downloadBulk('${esc(safeClient)}','mockup',${withSource+withPdf+items.filter(i=>thumbUrl(i)).length})" ${items.length?'':'disabled'}>📸 كل الموك أبس</button>
    <button class="cdl-bulk-btn" onclick="downloadBulk('${esc(safeClient)}','pdf',${withPdf})" ${withPdf?'':'disabled'}>📄 كل PDFs (${withPdf})</button>
    <button class="cdl-bulk-btn cdl-bulk-source" onclick="downloadBulk('${esc(safeClient)}','source',${withSource})" ${withSource?'':'disabled'}>📁 كل المصادر (${withSource})</button>
    <button class="cdl-bulk-btn cdl-bulk-all" onclick="downloadBulk('${esc(safeClient)}','all',${withSource+withPdf+items.filter(i=>thumbUrl(i)).length})">📦 كل شيء</button>
  `;

  // ── Analytics panel ──
  document.getElementById('cdl-analytics').innerHTML = renderAnalytics(items);

  // Filter chips
  const chips = [
    { v: '',           lbl: 'الكل',          ico: '◈', n: items.length },
    { v: 'with-source',lbl: 'معاها مصدر',    ico: '📁', n: withSource },
    { v: 'approved',   lbl: 'معتمدة',        ico: '✅', n: approved },
    { v: 'published',  lbl: 'منشورة للعميل', ico: '👁', n: items.filter(i=>i.visibility==='published').length },
    { v: 'no-mockup',  lbl: 'بدون موك أب',   ico: '⚠️', n: items.filter(i=>!thumbUrl(i)).length },
  ];
  $('cdl-chips').innerHTML = chips.map(c => `<button class="cdl-chip ${activeFilter===c.v?'active':''}" onclick="setFilter('${c.v}')">${c.ico} ${c.lbl} <span style="opacity:.6">${c.n}</span></button>`).join('');

  const filtered = applyFilter(items);
  if (!filtered.length){
    $('cdl-body').innerHTML = `<div class="cdl-empty"><div class="cdl-empty-ico">🔍</div><div>لا نتائج بالفلاتر الحالية</div></div>`;
    return;
  }

  $('cdl-body').innerHTML = `<div class="cdl-grid">${filtered.map(item => renderItemCard(item)).join('')}</div>`;
}

function renderItemCard(item){
  const v = getLatestVersion(item);
  const files = getFiles(v);
  const thumb = thumbUrl(item);
  const order = allOrders.find(o => o._id === (item.orderDocId||''));
  const orderCode = order?.orderId || order?._id?.slice(0,6) || item.orderId?.slice?.(0,6) || '—';
  const status = getStatus(item);
  const fileBtn = (kind, ico, lbl, f) => f?.url
    ? `<a class="cdl-fbtn ok" href="${esc(f.url)}" target="_blank" rel="noopener" download="${esc(f.fileName||'')}" title="${esc(f.fileName||'')}"><span class="cdl-fbtn-ico">${ico}</span><span>${lbl}</span></a>`
    : `<div class="cdl-fbtn" title="غير متوفر"><span class="cdl-fbtn-ico">${ico}</span><span>${lbl}</span></div>`;
  return `<div class="cdl-card">
    <div class="cdl-card-img" onclick="openWorkspace('${esc(item.orderDocId||'')}','${esc(item._id)}')">
      ${thumb ? `<img src="${esc(thumb)}" loading="lazy" alt="">` : `<div class="cdl-card-empty">🎨</div>`}
      ${v?.vNum?`<span class="cdl-card-pill">v${v.vNum} · ${(item.versions||[]).length} نسخة</span>`:''}
      <span class="cdl-card-status" title="${esc(status.label)}" style="color:${status.col}">${status.ico}</span>
    </div>
    <div class="cdl-card-body">
      <div class="cdl-card-name">${esc(item.itemName||'—')}</div>
      <div class="cdl-card-meta">
        <span>📦 #${esc(orderCode)}</span>
        ${item.itemQty?`<span>· الكمية ${fn(item.itemQty)}</span>`:''}
        ${v?.uploadedByName?`<span>· ✍️ ${esc(v.uploadedByName)}</span>`:''}
      </div>
    </div>
    <div class="cdl-card-files">
      ${fileBtn('mockup','📸','موك أب',files.mockup)}
      ${fileBtn('pdf','📄','PDF',files.pdf)}
      ${fileBtn('source','📁','المصدر',files.source)}
    </div>
    <div class="cdl-card-actions">
      <button class="btn btn-ghost btn-xs" style="flex:1" onclick="openWorkspace('${esc(item.orderDocId||'')}','${esc(item._id)}')">🖥 فتح في الـ workspace</button>
    </div>
  </div>`;
}

window.setClient = function(cid){
  activeClientId = cid;
  activeFilter = '';
  const url = new URL(location.href);
  url.searchParams.set('clientId', cid);
  history.pushState({}, '', url);
  window.scrollTo(0, 0);
  render();
};
window.setFilter = function(v){
  activeFilter = v;
  render();
};
window.openWorkspace = function(orderId, itemId){
  if (!orderId) { toast('لا يوجد أوردر مرتبط','err'); return; }
  location.href = `design-workspace.html?order=${orderId}#item=${itemId}`;
};

window.addEventListener('popstate', () => {
  activeClientId = new URLSearchParams(location.search).get('clientId') || '';
  render();
});

function setText(id, txt){ const el = $(id); if (el) el.textContent = txt; }

// ════════════════════════════════════════════════════════════════════
//  📥 Bulk ZIP Download — JSZip via dynamic import
// ════════════════════════════════════════════════════════════════════
window.downloadBulk = async function(clientName, kind, count){
  if (!count) { toast('لا توجد ملفات من هذا النوع','err'); return; }
  if (!confirm(`تحميل ${count} ملف كـ ZIP؟ قد يستغرق وقتاً لو الملفات كبيرة.`)) return;

  const items = allItems.filter(i => (i.clientId||'') === activeClientId);
  const kinds = kind === 'all' ? ['mockup','pdf','source'] : [kind];

  toast(`📦 جاري تحضير الـ ZIP — تحميل الملفات...`, '');
  try {
    const JSZipMod = await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm');
    const JSZip = JSZipMod.default;
    const zip = new JSZip();
    const rootFolder = zip.folder(clientName);

    let ok = 0, failed = 0;
    for (const item of items) {
      const order = allOrders.find(o => o._id === (item.orderDocId||''));
      const orderCode = (order?.orderId || order?._id?.slice(0,8) || 'order').replace(/[\\/:*?"<>|]/g,'_');
      const itemName = (item.itemName || 'item').replace(/[\\/:*?"<>|]/g,'_');
      const itemFolder = rootFolder.folder(`${orderCode}_${itemName}`);
      for (const v of (item.versions || [])) {
        const files = v.files || (v.imageUrl ? { mockup: { url: v.imageUrl, fileName: v.fileName||`v${v.vNum}.jpg` } } : {});
        for (const k of kinds) {
          const f = files[k];
          if (!f?.url) continue;
          try {
            const resp = await fetch(f.url);
            if (!resp.ok) throw new Error('HTTP '+resp.status);
            const blob = await resp.blob();
            const ext = (f.fileName?.split('.').pop()) || (k === 'mockup' ? 'jpg' : k === 'pdf' ? 'pdf' : 'bin');
            const fname = `v${v.vNum}_${k}.${ext}`;
            itemFolder.file(fname, blob);
            ok++;
          } catch(e) {
            console.warn('Failed to fetch', f.url, e);
            failed++;
          }
        }
      }
    }

    if (!ok) { toast('❌ فشل تحميل كل الملفات','err'); return; }
    toast(`📦 جاري ضغط ${ok} ملف...`, '');
    const content = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } }, (meta) => {
      if (meta.percent > 0 && meta.percent % 25 < 1) {
        // optional progress could go here
      }
    });
    const url = URL.createObjectURL(content);
    const a = document.createElement('a');
    a.href = url;
    const stamp = new Date().toISOString().slice(0,10);
    a.download = `${clientName}_${kind}_${stamp}.zip`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    toast(`✅ تم — ${ok} ملف في الـ ZIP${failed?` (${failed} فشل)`:''}`, 'ok');
  } catch(e) {
    console.error('Bulk ZIP failed', e);
    toast('❌ فشل تجهيز الـ ZIP: ' + e.message, 'err');
  }
};

// ════════════════════════════════════════════════════════════════════
//  📊 Analytics — متوسط النسخ، معدل التعديل، أسرع مصمم
// ════════════════════════════════════════════════════════════════════
function renderAnalytics(items){
  if (!items.length) return '';
  const totalVersions = items.reduce((s,i)=>s+(i.versions||[]).length,0);
  const avgVersions = (totalVersions / items.length).toFixed(1);

  // Revisions: count items that ever had revision_requested (status now or in editHistory)
  const revItems = items.filter(i => {
    if (i.status === 'revision_requested') return true;
    const h = i.editHistory || [];
    return h.some(e => (e.action||'').includes('revision'));
  }).length;
  const revRate = items.length ? Math.round((revItems/items.length)*100) : 0;

  // Approval cycle time (days from creation to first approval)
  const cycleDays = [];
  items.forEach(i => {
    if (!i.isApproved) return;
    const created = i.createdAt?.seconds ? i.createdAt.seconds * 1000 : (i.createdAt ? new Date(i.createdAt).getTime() : 0);
    const approved = i.approvedAt?.seconds ? i.approvedAt.seconds * 1000 : (i.approvedAt ? new Date(i.approvedAt).getTime() : 0);
    if (created && approved && approved > created) {
      cycleDays.push((approved - created) / 86400000);
    }
  });
  const avgCycle = cycleDays.length ? (cycleDays.reduce((s,d)=>s+d,0) / cycleDays.length).toFixed(1) : '—';

  // Top designer for this client (most versions uploaded)
  const designerCount = {};
  items.forEach(i => (i.versions||[]).forEach(v => {
    const name = v.uploadedByName || '—';
    designerCount[name] = (designerCount[name] || 0) + 1;
  }));
  const topDesigner = Object.entries(designerCount).sort((a,b)=>b[1]-a[1])[0];

  // Source coverage = % of designs with source file
  const withSrc = items.filter(i => getFiles(getLatestVersion(i)).source).length;
  const srcCoverage = items.length ? Math.round((withSrc/items.length)*100) : 0;

  return `
    <div class="cdl-an-title">📊 إحصائيات العميل</div>
    <div class="cdl-an-grid">
      <div class="cdl-an-card">
        <div class="cdl-an-val">${avgVersions}</div>
        <div class="cdl-an-lbl">متوسط النسخ لكل تصميم</div>
        <div class="cdl-an-sub">${totalVersions} إجمالاً</div>
      </div>
      <div class="cdl-an-card">
        <div class="cdl-an-val" style="color:${revRate>30?'var(--r)':revRate>15?'var(--y)':'var(--g)'}">${revRate}%</div>
        <div class="cdl-an-lbl">معدل طلبات التعديل</div>
        <div class="cdl-an-sub">${revItems} من ${items.length} تصميم</div>
      </div>
      <div class="cdl-an-card">
        <div class="cdl-an-val">${avgCycle}${avgCycle!=='—'?' يوم':''}</div>
        <div class="cdl-an-lbl">متوسط وقت الاعتماد</div>
        <div class="cdl-an-sub">${cycleDays.length} تصميم محسوب</div>
      </div>
      <div class="cdl-an-card">
        <div class="cdl-an-val" style="color:${srcCoverage>=80?'var(--g)':srcCoverage>=50?'var(--y)':'var(--r)'}">${srcCoverage}%</div>
        <div class="cdl-an-lbl">تغطية ملفات المصدر</div>
        <div class="cdl-an-sub">${withSrc} من ${items.length} ملف مصدر</div>
      </div>
      ${topDesigner ? `<div class="cdl-an-card">
        <div class="cdl-an-val" style="font-size:14px">${esc(topDesigner[0])}</div>
        <div class="cdl-an-lbl">أكثر مصمم نشاطاً</div>
        <div class="cdl-an-sub">${topDesigner[1]} نسخة مرفوعة</div>
      </div>`:''}
    </div>`;
}

// ── Auth bootstrap ──
onAuthStateChanged(auth, async u => {
  if (!u) { location.href = 'login.html'; return; }
  currentUid = u.uid;
  await buildSidebar(u.uid);
  loadData();
});
