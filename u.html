<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>صفحة الأعمال — Business2Card</title>
<meta name="description" content="صفحة أعمال رقمية: الخدمات، الأعمال، ووسائل التواصل المباشر.">
<meta name="robots" content="index,follow">
<meta property="og:type" content="profile">
<meta property="og:title" content="صفحة الأعمال — Business2Card">
<meta property="og:description" content="صفحة أعمال رقمية قابلة للمشاركة.">
<link rel="canonical" id="canonical" href="">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="stylesheet" href="shared.css?v=45">
<link rel="stylesheet" href="client-theme.css?v=1">
<style>
/* RULE U1 — التوكنز من shared.css/client-theme.css. تنسيق خاص بالصفحة العامة. */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-ar);background:var(--bg);color:var(--snow);min-height:100vh;display:flex;justify-content:center;}
.page{width:100%;max-width:560px;background:var(--bg2);min-height:100vh;}
.cover{height:180px;background:var(--cp-grad);background-size:cover;background-position:center;position:relative;}
.logo{position:absolute;bottom:-46px;inset-inline-start:24px;width:96px;height:96px;border-radius:24px;
  background:var(--bg3);border:4px solid var(--bg2);overflow:hidden;display:flex;align-items:center;
  justify-content:center;font-size:38px;font-weight:var(--fw-heavy);color:var(--snow);}
.logo img{width:100%;height:100%;object-fit:cover;}
.body{padding:62px 22px 40px;}
h1{font-size:var(--fs-3xl);font-weight:var(--fw-heavy);margin-bottom:4px;}
.activity{color:var(--p);font-weight:var(--fw-extra);font-size:var(--fs-md);margin-bottom:10px;}
.bio{font-size:var(--fs-md);color:var(--dim2);line-height:1.8;margin-bottom:20px;}
.actions{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
.act{flex:1;min-width:120px;min-height:46px;padding:13px;border-radius:var(--rad);text-decoration:none;text-align:center;
  font-weight:var(--fw-extra);font-size:var(--fs-md);display:flex;align-items:center;justify-content:center;gap:8px;}
.act-call{background:var(--cp-grad);color:#fff;}
.act-wa{background:var(--cp-wa);color:var(--cp-wa-ink);}
.act-web{background:var(--bg3);color:var(--snow);border:1px solid var(--line);}
.sec{font-size:var(--fs-lg);font-weight:var(--fw-heavy);margin:24px 0 12px;display:flex;align-items:center;gap:8px;}
.sec::before{content:"";width:4px;height:18px;border-radius:3px;background:var(--cp-grad);}
.svc{display:flex;flex-direction:column;gap:10px;}
.svc .card{background:var(--bg3);border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;gap:12px;align-items:flex-start;}
.svc .card img{width:56px;height:56px;border-radius:10px;object-fit:cover;flex:0 0 auto;}
.svc .card .t{font-weight:var(--fw-heavy);font-size:var(--fs-md);}
.svc .card .d{color:var(--dim2);font-size:var(--fs-sm);margin-top:2px;line-height:1.6;}
.svc .card .p{color:var(--p);font-weight:var(--fw-extra);font-size:var(--fs-sm);margin-top:4px;}
.social{display:flex;gap:12px;flex-wrap:wrap;}
.social a{width:46px;height:46px;border-radius:13px;background:var(--bg3);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:20px;text-decoration:none;}
.works{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.works .w{border-radius:12px;overflow:hidden;background:var(--bg3);}
.works img,.works video{width:100%;height:150px;object-fit:cover;display:block;}
.works a.pdf{display:flex;align-items:center;justify-content:center;height:150px;font-size:40px;text-decoration:none;}
.share{margin:26px 0 8px;text-align:center;}
.share img{width:150px;height:150px;background:#fff;padding:8px;border-radius:14px;}
.share .btn{display:inline-block;margin-top:12px;min-height:46px;padding:12px 22px;border-radius:var(--rad);border:none;
  background:var(--cp-grad);color:#fff;font-family:inherit;font-weight:var(--fw-extra);font-size:var(--fs-md);cursor:pointer;}
.sec--center{justify-content:center;}
.foot{text-align:center;color:var(--dim2);font-size:var(--fs-xs);padding:20px;}
.foot a{color:var(--p);text-decoration:none;}
#state{padding:80px 24px;text-align:center;color:var(--dim2);font-size:var(--fs-lg);line-height:1.8;}
</style>
</head>
<body>
<main class="page">
  <div id="state">⟳ جاري التحميل…</div>
  <article id="content" hidden>
    <div class="cover" id="cover"><div class="logo" id="logo">★</div></div>
    <div class="body">
      <h1 id="bizName"></h1>
      <div class="activity" id="activity" hidden></div>
      <p class="bio" id="bio"></p>
      <div class="actions" id="actions"></div>
      <section id="svc-sec" hidden><h2 class="sec">الخدمات</h2><div class="svc" id="services"></div></section>
      <section id="social-sec" hidden><h2 class="sec">تابعنا</h2><div class="social" id="social"></div></section>
      <section id="works-sec" hidden><h2 class="sec">من أعمالنا</h2><div class="works" id="works"></div></section>
      <div class="share">
        <h2 class="sec sec--center">شارك الصفحة</h2>
        <img id="qr" alt="QR" loading="lazy">
        <br><button class="btn" id="shareBtn">📤 مشاركة</button>
        <button class="btn" id="dlBtn">⬇️ تنزيل QR</button>
      </div>
    </div>
    <div class="foot">صُنع عبر <a href="client-login.html">Business2Card</a></div>
  </article>
</main>

<script type="module">
import { db } from "./core/firebase-init.js";
import { doc, getDoc, collection, query, where, limit, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const $ = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s).replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
const normWa = n => { let s=(n||'').replace(/[^\d+]/g,''); if(s.startsWith('00'))s=s.slice(2); if(s.startsWith('0'))s='2'+s; return s; };

// تطبيع الخدمات (متوافق مع string[] القديمة و object[] الجديدة)
function normServices(list){
  if(!Array.isArray(list)) return [];
  return list.map((s,i)=> typeof s==='string'
    ? {name:s,desc:'',price:'',imageUrl:'',order:i,active:true}
    : {name:s.name||'',desc:s.desc||'',price:s.price||'',imageUrl:s.imageUrl||'',order:Number.isFinite(s.order)?s.order:i,active:s.active!==false})
    .filter(s=>s.active && s.name.trim()).sort((a,b)=>a.order-b.order);
}

// المُعرّف: من المسار /u/{username}، أو ?u=، أو ?id={uid}
function resolveTarget(){
  const m = location.pathname.match(/\/u\/([^/?#]+)/);
  const params = new URLSearchParams(location.search);
  const uname = m ? decodeURIComponent(m[1]) : (params.get('u') || '');
  const id = params.get('id') || '';
  return { uname: uname.trim().toLowerCase(), id };
}

async function fetchCard(){
  const { uname, id } = resolveTarget();
  if (uname){
    const snap = await getDocs(query(collection(db,'public_cards'), where('username','==',uname), limit(1)));
    if (!snap.empty) return snap.docs[0].data();
  }
  if (id){
    const s = await getDoc(doc(db,'public_cards',id));
    if (s.exists()) return s.data();
  }
  return null;
}

(async function load(){
  let c;
  try { c = await fetchCard(); }
  catch(e){ $('state').textContent = '❌ تعذّر التحميل: ' + (e.message||''); return; }
  if (!c){ $('state').innerHTML = '🔍 الصفحة غير موجودة أو لم تُنشر بعد.'; return; }

  // SEO ديناميكي
  document.title = (c.bizName || 'صفحة الأعمال') + ' — Business2Card';
  const desc = (c.bio || c.activity || c.bizName || 'صفحة أعمال رقمية').slice(0,160);
  document.querySelector('meta[name="description"]').setAttribute('content', desc);
  document.querySelector('meta[property="og:title"]').setAttribute('content', c.bizName || 'صفحة الأعمال');
  document.querySelector('meta[property="og:description"]').setAttribute('content', desc);
  $('canonical').setAttribute('href', location.href);

  if (c.coverUrl) $('cover').style.backgroundImage = `url("${c.coverUrl}")`;
  if (c.logoUrl) $('logo').innerHTML = `<img src="${esc(c.logoUrl)}" alt="${esc(c.bizName||'')}">`;
  else $('logo').textContent = (c.bizName || '★').trim()[0] || '★';
  $('bizName').textContent = c.bizName || '';
  if (c.activity){ $('activity').textContent = c.activity; $('activity').hidden = false; }
  $('bio').textContent = c.bio || '';

  let acts = '';
  if (c.phone)    acts += `<a class="act act-call" href="tel:${esc(c.phone)}">📞 اتصال</a>`;
  if (c.whatsapp) acts += `<a class="act act-wa" href="https://wa.me/${esc(normWa(c.whatsapp))}" target="_blank" rel="noopener">💬 واتساب</a>`;
  if (c.website)  acts += `<a class="act act-web" href="${esc(c.website)}" target="_blank" rel="noopener">🌐 الموقع</a>`;
  $('actions').innerHTML = acts;

  const svcs = normServices(c.services);
  if (svcs.length){
    $('svc-sec').hidden = false;
    $('services').innerHTML = svcs.map(s=>`<div class="card">
      ${s.imageUrl?`<img src="${esc(s.imageUrl)}" alt="" loading="lazy">`:''}
      <div><div class="t">${esc(s.name)}</div>
      ${s.desc?`<div class="d">${esc(s.desc)}</div>`:''}
      ${s.price?`<div class="p">💰 ${esc(String(s.price))}</div>`:''}</div></div>`).join('');
  }

  const so = c.social || {};
  const icons = { facebook:'📘', instagram:'📸', tiktok:'🎵', linkedin:'💼' };
  let social = '';
  for (const k of Object.keys(icons)){
    if (!so[k]) continue;
    let href = so[k];
    if (!/^https?:\/\//.test(href)){
      const u = href.replace(/^@/,'');
      href = k==='facebook'?'https://facebook.com/'+u : k==='instagram'?'https://instagram.com/'+u
           : k==='tiktok'?'https://tiktok.com/@'+u : 'https://'+href;
    }
    social += `<a href="${esc(href)}" target="_blank" rel="noopener" title="${k}">${icons[k]}</a>`;
  }
  if (social){ $('social-sec').hidden = false; $('social').innerHTML = social; }

  const works = (c.works || []).filter(w=>w && w.url);
  if (works.length){
    $('works-sec').hidden = false;
    $('works').innerHTML = works.map(w=>{
      if (w.type==='video') return `<div class="w"><video src="${esc(w.url)}" controls preload="none"></video></div>`;
      if (w.type==='pdf')   return `<div class="w"><a class="pdf" href="${esc(w.url)}" target="_blank" rel="noopener">📄</a></div>`;
      return `<div class="w"><img src="${esc(w.url)}" alt="" loading="lazy"></div>`;
    }).join('');
  }

  $('qr').src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=0&data=' + encodeURIComponent(location.href);
  $('shareBtn').addEventListener('click', async ()=>{
    if (navigator.share){ try{ await navigator.share({ title:c.bizName||'صفحة الأعمال', url:location.href }); }catch(_){} }
    else { try{ await navigator.clipboard.writeText(location.href); alert('✅ تم نسخ الرابط'); }catch(_){ prompt('انسخ الرابط:', location.href); } }
  });
  $('dlBtn').addEventListener('click', async ()=>{
    const big='https://api.qrserver.com/v1/create-qr-code/?size=600x600&margin=0&data='+encodeURIComponent(location.href);
    try{ const r=await fetch(big,{mode:'cors'}); const b=await r.blob(); const a=document.createElement('a');
      a.href=URL.createObjectURL(b); a.download=(c.username||c.bizName||'business2card')+'-qr.png';
      document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1500);
    }catch(_){ window.open(big,'_blank','noopener'); }
  });

  $('state').hidden = true;
  $('content').hidden = false;
})();
</script>
</body>
</html>
