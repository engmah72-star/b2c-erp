<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07080f">
<title>Business2Card — Designer Hub</title>
<link rel="stylesheet" href="shared.css?v=4">
<script type="module" src="inbox-badge.js"></script>
<style>
/* ════════════════════════════════════════════════════════════
   Designer Hub — Local styles (prefix: dh-)
   ════════════════════════════════════════════════════════════ */

/* Toolbar */
.dh-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.dh-search{padding:9px 14px;border:1px solid var(--line);background:var(--bg2);color:var(--snow);border-radius:10px;font-family:inherit;font-size:var(--fs-md);flex:1;min-width:220px}
.dh-sort-btn,.dh-back-btn{padding:8px 14px;border:1px solid var(--line);background:var(--bg2);color:var(--snow);border-radius:10px;cursor:pointer;font-family:inherit;font-size:var(--fs-base);font-weight:700;display:inline-flex;align-items:center;gap:6px}
.dh-sort-btn:hover,.dh-back-btn:hover{background:var(--bg3);border-color:var(--b)}

/* Stats */
.dh-gal-stats,.dh-lib-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:var(--space-lg)}
.dh-stat{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:var(--space-md);position:relative;overflow:hidden}
.dh-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--b)}
.dh-stat-val{font-size:var(--fs-3xl);font-weight:900;line-height:1;color:var(--snow)}
.dh-stat-lbl{font-size:var(--fs-sm);color:var(--dim2);font-weight:700;margin-top:6px}

/* Chips */
.dh-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:var(--space-md)}
.dh-chip{padding:6px 14px;border-radius:18px;border:1px solid var(--line);background:var(--bg2);color:var(--dim2);font-size:var(--fs-base);font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.dh-chip:hover{background:var(--bg3);color:var(--snow)}
.dh-chip.active{background:var(--b);border-color:var(--b);color:#fff}
.dh-chip-count{font-size:var(--fs-xs);opacity:.7;background:rgba(0,0,0,.2);padding:1px 6px;border-radius:8px}

.dh-sub{font-size:var(--fs-base);color:var(--dim2);font-weight:600;margin-bottom:10px}
.dh-count{font-size:var(--fs-sm);color:var(--snow);background:var(--bg3);padding:5px 12px;border-radius:14px;display:inline-block;margin-bottom:14px;font-weight:700;border:1px solid var(--line)}

/* Grid */
.dh-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.dh-clients{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:var(--space-md)}

/* Cards */
.dh-card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:all .15s;animation:dhFadeUp .25s ease-out backwards}
.dh-card:hover{border-color:rgba(167,139,250,.5);box-shadow:0 4px 16px rgba(0,0,0,.18);transform:translateY(-2px)}
@keyframes dhFadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.dh-card-img-wrap{aspect-ratio:4/3;background:var(--bg3);overflow:hidden;cursor:pointer;position:relative}
.dh-card-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .25s}
.dh-card-img-wrap:hover img{transform:scale(1.05)}
.dh-card-empty{display:flex;align-items:center;justify-content:center;height:100%;font-size:36px;color:var(--dim2);opacity:.4}
.dh-card-pill{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;font-size:var(--fs-xs);font-weight:700;padding:var(--space-2xs) var(--space-sm);border-radius:10px;backdrop-filter:blur(4px)}
.dh-card-status{position:absolute;top:6px;left:6px;font-size:var(--fs-lg);background:rgba(0,0,0,.6);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.dh-card-zoom{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;opacity:0;transition:opacity .2s}
.dh-card-img-wrap:hover .dh-card-zoom{opacity:1}
.dh-card-info{padding:10px 12px;flex:1;display:flex;flex-direction:column;gap:var(--space-xs)}
.dh-card-cat{font-size:var(--fs-xs);font-weight:800;color:var(--b);text-transform:uppercase;letter-spacing:.5px}
.dh-card-title{font-size:var(--fs-md);font-weight:900;color:var(--snow);line-height:1.3}
.dh-card-desc{font-size:var(--fs-sm);color:var(--dim2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.dh-card-designer{font-size:var(--fs-sm);color:var(--dim2);display:flex;align-items:center;gap:var(--space-xs);margin-top:auto}
.dh-card-meta{font-size:var(--fs-xs);color:var(--dim2);font-weight:600;display:flex;flex-wrap:wrap;gap:6px}

/* Client card */
.dh-card-client{padding:14px;cursor:pointer}
.dh-card-name{font-size:var(--fs-lg);font-weight:900;color:var(--snow);margin-bottom:var(--space-sm);display:flex;align-items:center;gap:var(--space-sm)}
.dh-card-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:var(--fs-md);background:linear-gradient(135deg,var(--b),var(--p));flex-shrink:0}
.dh-card-counts{display:flex;gap:6px;flex-wrap:wrap;font-size:var(--fs-sm);color:var(--dim2);font-weight:700}
.dh-cc{background:var(--bg3);border-radius:8px;padding:3px 8px;display:inline-flex;align-items:center;gap:3px}
.dh-cc.ok{color:var(--g)}
.dh-cc.info{color:var(--b)}

/* Order card */
.dh-order-card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:var(--space-md);cursor:pointer;transition:all .15s;margin-bottom:var(--space-sm)}
.dh-order-card:hover{border-color:var(--b);background:var(--bg3)}
.dh-order-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.dh-order-code{font-size:var(--fs-base);font-weight:900;color:var(--snow)}
.dh-order-stage{font-size:var(--fs-xs);padding:var(--space-2xs) var(--space-sm);border:1px solid;border-radius:8px;font-weight:700}
.dh-order-client{font-size:var(--fs-md);color:var(--snow);font-weight:700;margin-bottom:var(--space-xs)}
.dh-order-meta{font-size:var(--fs-sm);color:var(--dim2);display:flex;gap:6px;flex-wrap:wrap}

/* Work view */
.dh-work-split{display:grid;grid-template-columns:340px 1fr;gap:var(--space-lg);align-items:start}
@media(max-width:900px){.dh-work-split{grid-template-columns:1fr}}
.dh-work-side{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:var(--space-md);max-height:calc(100vh - 200px);overflow-y:auto;position:sticky;top:80px}
.dh-work-toolbar{margin-bottom:var(--space-md)}
.dh-work-orders{display:flex;flex-direction:column;gap:6px}
.dh-work-main{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:18px;min-height:400px}
.dh-work-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--line);flex-wrap:wrap;gap:10px}
.dh-work-title{font-size:var(--fs-xl);font-weight:900;color:var(--snow)}
.dh-work-sub{font-size:var(--fs-sm);color:var(--dim2);margin-top:3px}

/* Item row */
.dh-items-list{display:flex;flex-direction:column;gap:var(--space-md)}
.dh-item-row{display:grid;grid-template-columns:120px 1fr auto;gap:14px;padding:var(--space-md);background:var(--bg3);border:1px solid var(--line);border-radius:12px;align-items:center}
@media(max-width:700px){.dh-item-row{grid-template-columns:1fr}}
.dh-item-thumb{aspect-ratio:4/3;width:120px;background:var(--bg2);border-radius:8px;overflow:hidden;cursor:pointer;position:relative}
.dh-item-thumb img{width:100%;height:100%;object-fit:cover}
.dh-thumb-pill{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);color:#fff;font-size:var(--fs-tiny);padding:2px 6px;border-radius:6px;font-weight:700}
.dh-item-body{display:flex;flex-direction:column;gap:6px}
.dh-item-name{font-size:var(--fs-lg);font-weight:900;color:var(--snow);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.dh-item-meta{font-size:var(--fs-sm);color:var(--dim2);display:flex;gap:var(--space-sm);flex-wrap:wrap}
.dh-item-files{display:flex;gap:6px;flex-wrap:wrap;margin-top:var(--space-xs)}
.dh-fbadge{font-size:var(--fs-xs);padding:var(--space-xs) var(--space-sm);border-radius:8px;background:var(--bg2);border:1px solid var(--line);color:var(--dim2);font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:var(--space-xs);opacity:.5}
.dh-fbadge.ok{color:var(--g);border-color:rgba(0,200,122,.3);background:rgba(0,200,122,.06);opacity:1;cursor:pointer}
.dh-fbadge.ok:hover{background:rgba(0,200,122,.15)}
.dh-item-actions{display:flex;flex-direction:column;gap:6px;align-items:stretch;min-width:140px}
.dh-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);color:var(--snow);font-family:inherit;font-size:var(--fs-base);font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
.dh-btn:hover:not(:disabled){background:var(--bg3);border-color:var(--b)}
.dh-btn:disabled{opacity:.45;cursor:not-allowed}
.dh-btn-primary{background:var(--b);color:#fff;border-color:var(--b)}
.dh-btn-primary:hover:not(:disabled){background:#2d77e8}
.dh-btn-ghost{background:transparent}
.dh-pill{display:inline-block;font-size:var(--fs-xs);padding:var(--space-2xs) var(--space-sm);border-radius:8px;background:var(--bg2);border:1px solid var(--line);color:var(--dim2);font-weight:700}
.dh-pill.ok{color:var(--g);border-color:rgba(0,200,122,.4);background:rgba(0,200,122,.08)}
.dh-tag{display:inline-block;font-size:var(--fs-sm);padding:3px 9px;border-radius:8px;background:var(--bg3);border:1px solid var(--line);color:var(--dim2);font-weight:700}
.dh-tag.ok{color:var(--g);border-color:rgba(0,200,122,.3)}

/* Empty + loader */
.dh-empty{text-align:center;padding:60px 20px;color:var(--dim2)}
.dh-empty-ico{font-size:48px;margin-bottom:var(--space-md);opacity:.4}
.dh-loader{text-align:center;padding:40px}
.dh-spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--b);border-radius:50%;animation:dhSpin .8s linear infinite}
@keyframes dhSpin{to{transform:rotate(360deg)}}

/* Inline toast */
.dh-toast{position:fixed;top:80px;left:20px;z-index:9999;padding:10px 16px;border-radius:10px;background:var(--bg3);border:1px solid var(--line);color:var(--snow);font-weight:700;font-size:var(--fs-md);box-shadow:0 4px 14px rgba(0,0,0,.3);animation:dhSlide .3s ease-out}
.dh-toast.ok{border-color:var(--g);color:var(--g)}
.dh-toast.err{border-color:var(--r);color:var(--r)}
@keyframes dhSlide{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>

<!-- Sidebar config + shared scripts -->
<script src="sidebar-config.js?v=1"></script>
<script src="smart-sidebar.js?v=1" defer></script>
<script src="viewas.js?v=1" defer></script>
<script src="pwa-install.js?v=1" defer></script>
<script src="theme.js?v=4"></script>
</head>

  </div>

    </div>
  </div>
</aside>

    <div id="dh-content">
      <div class="dh-loader"><div class="dh-spinner"></div></div>
    </div>

</body>
</html>
