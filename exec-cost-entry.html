<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff3d6e">
<title>B2C — تسجيل التكاليف</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;border-top:3px solid var(--kc)}
.kpi-val{font-size:22px;font-weight:900;color:var(--kc);margin-bottom:2px}
.kpi-lbl{font-size:10px;color:var(--dim2);font-weight:700}
@media(max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.filter-bar::-webkit-scrollbar{display:none}
.ftab{padding:8px 16px;border-radius:20px;border:1.5px solid var(--line);background:var(--bg2);font-size:12px;font-weight:700;color:var(--dim2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:var(--trans);font-family:inherit}
.ftab.active{background:rgba(255,61,110,.12);color:var(--r);border-color:rgba(255,61,110,.3)}
.ord-card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;padding:14px 16px;transition:var(--trans);cursor:pointer}
.ord-card:hover{border-color:rgba(255,61,110,.3)}
.ord-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.ord-name{font-size:15px;font-weight:800;color:var(--snow)}
.ord-id{font-size:11px;color:var(--dim2);margin-top:2px}
.stage-chip{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:800;white-space:nowrap}
.st-design{background:rgba(167,139,250,.12);color:var(--p)}
.st-printing{background:rgba(59,158,255,.12);color:var(--b)}
.st-production{background:rgba(255,170,0,.12);color:var(--y)}
.st-shipping{background:rgba(34,211,238,.12);color:var(--c)}
.prod-tag{font-size:11px;padding:2px 8px;border-radius:8px;background:var(--bg3);border:1px solid var(--line);color:var(--dim2);font-weight:700;margin:2px 2px 0 0;display:inline-block}
.prod-tag-sup{background:rgba(0,217,126,.08);border-color:rgba(0,217,126,.25);color:var(--g)}
.day-chip{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:800}
.day-ok{background:rgba(0,217,126,.08);color:var(--g)}
.day-warn{background:rgba(255,193,7,.08);color:var(--y)}
.day-late{background:rgba(255,61,110,.1);color:var(--r)}
.add-cost-btn{margin-top:10px;width:100%;padding:11px;background:rgba(255,61,110,.08);border:1.5px dashed rgba(255,61,110,.35);border-radius:11px;color:var(--r);font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;transition:var(--trans)}
.add-cost-btn:hover{background:rgba(255,61,110,.14)}
.empty-state{text-align:center;padding:60px 20px;color:var(--dim2)}
.empty-ico{font-size:48px;margin-bottom:12px;opacity:.6}
.empty-title{font-size:16px;font-weight:800;color:var(--snow);margin-bottom:4px}
.empty-sub{font-size:12px}
.overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--bg1);border-radius:18px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;border:1px solid var(--line)}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:15px;font-weight:800;color:var(--snow)}
.modal-x{background:none;border:none;color:var(--dim2);font-size:20px;cursor:pointer}
.modal-body{padding:16px 18px}
.modal-foot{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:800;color:var(--dim2);margin-bottom:5px}
.inp{width:100%;padding:11px 12px;background:var(--bg2);border:1.5px solid var(--line);border-radius:10px;color:var(--snow);font-size:14px;font-family:inherit;direction:rtl}
.inp:focus{outline:none;border-color:rgba(255,61,110,.4)}
.btn{padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}
.btn-ghost{background:var(--bg2);color:var(--dim2);border:1px solid var(--line)}
.btn-r{background:linear-gradient(135deg,var(--r),#e02858);color:#fff}
.btn-r:hover{opacity:.9}
</style>
<script src="financial-guard.js"></script>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">ERP</div></div></div>
  <div class="nav-scroll" id="nav-scroll-dynamic"><div style="padding:20px;text-align:center;color:var(--dim2);font-size:12px">⏳</div></div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">م</div><div><div class="nav-user-name" id="nav-name">User</div><div class="nav-user-role">تسجيل خروج</div></div></div></div>
</aside>
<div class="nav-ov" id="nav-ov" onclick="closeNav()"></div>
<nav class="mob-nav"><div class="mob-nav-items" id="mob-nav-items"></div></nav>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div><h1>💰 تسجيل التكاليف</h1><p id="sub" style="font-size:12px;color:var(--dim2)">أوردرات بدون بنود تكلفة — مطلوب تسجيلها</p></div>
    </div>
  </div>
  <div class="content">
    <div class="kpi-row">
      <div class="kpi" style="--kc:var(--r)"><div class="kpi-val" id="k-total">—</div><div class="kpi-lbl">إجمالي بدون تكلفة</div></div>
      <div class="kpi" style="--kc:var(--y)"><div class="kpi-val" id="k-production">—</div><div class="kpi-lbl">في التنفيذ</div></div>
      <div class="kpi" style="--kc:var(--c)"><div class="kpi-val" id="k-shipping">—</div><div class="kpi-lbl">في الشحن</div></div>
      <div class="kpi" style="--kc:var(--b)"><div class="kpi-val" id="k-other">—</div><div class="kpi-lbl">قبل التنفيذ</div></div>
    </div>

    <div class="filter-bar" id="stage-filter-bar">
      <button class="ftab active" onclick="setFilter('all',this)" id="f-all">الكل (<span id="cnt-all">0</span>)</button>
      <button class="ftab" onclick="setFilter('production',this)">🏭 التنفيذ (<span id="cnt-production">0</span>)</button>
      <button class="ftab" onclick="setFilter('shipping',this)">🚚 الشحن (<span id="cnt-shipping">0</span>)</button>
      <button class="ftab" onclick="setFilter('printing',this)">🖨️ الطباعة (<span id="cnt-printing">0</span>)</button>
      <button class="ftab" onclick="setFilter('design',this)">✏️ التصميم (<span id="cnt-design">0</span>)</button>
    </div>

    <div id="list"></div>
  </div>
</div>
</div>

<!-- Modal: إضافة بند تكلفة -->
<div class="overlay" id="ov-cost">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="cost-modal-title">💰 إضافة بند تكلفة</span>
      <button class="modal-x" onclick="closeCostModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="cost-order-ref" style="background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px">
        <div style="font-size:11px;color:var(--dim2);font-weight:700;margin-bottom:3px">📦 الأوردر</div>
        <div id="cost-order-name" style="font-size:14px;font-weight:800">—</div>
        <div id="cost-order-id" style="font-size:11px;color:var(--dim2);margin-top:2px">—</div>
      </div>
      <div class="fg"><label>📦 المنتج</label>
        <select class="inp" id="cost-prod-idx"><option value="-1">— عام للأوردر —</option></select>
      </div>
      <div class="fg"><label>🏭 المطبعة / المورد (اختياري)</label>
        <select class="inp" id="ac-sup"><option value="">— داخلي / بدون مورد —</option></select>
      </div>
      <div class="fg"><label>💰 التكلفة (ج)</label>
        <input class="inp" id="ac-total" type="number" placeholder="0" inputmode="numeric">
      </div>
      <div class="fg"><label>📝 ملاحظة</label>
        <input class="inp" id="ac-note" type="text" placeholder="اختياري...">
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeCostModal()">إلغاء</button>
      <button class="btn btn-r" id="cost-save-btn" onclick="saveCost()">＋ إضافة</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script type="module">
const SBPAGES=[
  {file:'index.html',label:'لوحة التحكم',ico:'⬡',adminOnly:true},
  {file:'clients.html',label:'العملاء',ico:'👤',perm:'clients'},
  {file:'agent-pricing.html',label:'تسعير المندوب',ico:'💰',perm:'pricing'},
  {file:'design.html',label:'التصميم',ico:'✏️',perm:'design'},
  {file:'print.html',label:'الطباعة',ico:'🖨️',perm:'print'},
  {file:'production.html',label:'التنفيذ',ico:'🏭',perm:'production'},
  {file:'exec-cost-entry.html',label:'تسجيل التكاليف',ico:'💰',roles:['production_agent']},
  {file:'shipping.html',label:'الشحن',ico:'🚚',perm:'shipping'},
  {file:'shipping-accounts.html',label:'حسابات الشحن',ico:'📦',perm:'shipping-accounts'},
  {file:'archive.html',label:'الأرشيف',ico:'📁',perm:'archive'},
  {file:'accounts.html',label:'الحسابات',ico:'💰',perm:'accounts'},
  {file:'approvals.html',label:'الاعتمادات',ico:'🔐',perm:'approvals'},
  {file:'supplier-requests.html',label:'طلبات الموردين',ico:'🏭',roles:['production_agent']},
  {file:'my-requests.html',label:'طلباتي',ico:'📋',alwaysShow:true},
  {file:'suppliers.html',label:'الموردين',ico:'▣',perm:'suppliers'},
  {file:'products.html',label:'المنتجات',ico:'◈',perm:'products'},
  {file:'employees.html',label:'الموظفين',ico:'👥',adminOnly:true},
  {file:'reports.html',label:'التقارير',ico:'📊',perm:'reports'},
  {file:'settings.html',label:'الإعدادات',ico:'⚙️',adminOnly:true}
];
const RMAP={admin:'index.html',operation_manager:'ops-dashboard.html',customer_service:'cs-dashboard.html',graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'};
const MOB_NAV_CFG={production_agent:[{h:'production-dashboard.html',i:'⬡',l:'داشبوردي'},{h:'production.html',i:'🏭',l:'تنفيذ'},{h:'exec-cost-entry.html',i:'💰',l:'تكاليف'}],admin:[{h:'index.html',i:'⬡',l:'التحكم'},{h:'production.html',i:'🏭',l:'تنفيذ'},{h:'exec-cost-entry.html',i:'💰',l:'تكاليف'}],operation_manager:[{h:'ops-dashboard.html',i:'⬡',l:'داشبوردي'},{h:'production.html',i:'🏭',l:'تنفيذ'},{h:'exec-cost-entry.html',i:'💰',l:'تكاليف'}]};

function buildMobNav(role,cur){const el=document.getElementById('mob-nav-items');if(!el)return;const items=MOB_NAV_CFG[role]||MOB_NAV_CFG.admin;el.innerHTML=items.map(n=>`<a class="mob-nav-item${n.h===cur?' active':''}" href="${n.h}"><div class="mob-nav-ico">${n.i}</div><div class="mob-nav-lbl">${n.l}</div></a>`).join('');}
function buildSidebar(ud,cur){
  const role=ud?.role||'customer_service';
  const pages=(ud?.permissions?.pages)||[];
  const isAdm=['admin','operation_manager'].includes(role);
  const nav=document.getElementById('nav-scroll-dynamic');if(!nav)return;
  let html=`<a class="nav-link${cur===RMAP[role]?' active':''}" href="${RMAP[role]||'index.html'}"><span class="nav-ico">⬡</span> ${isAdm?'لوحة التحكم':'داشبوردي'}</a>`;
  for(const p of SBPAGES){
    if(p.file==='index.html')continue;
    const ok=isAdm||p.alwaysShow||(p.roles&&p.roles.includes(role))||(p.adminOnly?false:pages.includes('*')||pages.includes(p.perm||''));
    if(!ok)continue;
    html+=`<a class="nav-link${cur===p.file?' active':''}" href="${p.file}"><span class="nav-ico">${p.ico}</span> ${p.label}</a>`;
  }
  nav.innerHTML=html;
}

import {initializeApp} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getAuth,onAuthStateChanged,signOut} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {getFirestore,collection,doc,onSnapshot,getDoc,getDocs,serverTimestamp,writeBatch} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { addLedgerToBatch, FE } from "./financial-sync-engine.js";

const app=initializeApp({apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"});
const auth=getAuth(app),db=getFirestore(app);

let orders=[],suppliers=[],currentUser=null,userName='',currentRole='',activeId=null,currentFilter='all';
const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const gv=id=>document.getElementById(id)?.value||'';
const sv=(id,v)=>{const e=document.getElementById(id);if(e)e.value=v;};
const setText=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
const nowStr=()=>new Date().toLocaleString('ar-EG',{dateStyle:'short',timeStyle:'short'});

function toast(msg,t=''){const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+(t==='ok'?'toast-ok':t==='err'?'toast-err':'');el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}

window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav')?.classList.remove('mob-open');document.getElementById('nav-ov')?.classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};

onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  currentUser=u;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(!snap.exists()){window.location.href='login.html';return;}
  const ud=snap.data();
  const role=ud.role||'';
  if(!['production_agent','admin','operation_manager'].includes(role)){
    window.location.href=RMAP[role]||'login.html';return;
  }
  currentRole=role;
  userName=ud.name||u.email;
  buildSidebar(ud,'exec-cost-entry.html');
  buildMobNav(role,'exec-cost-entry.html');
  setText('nav-name',userName);
  document.getElementById('nav-av').textContent=userName[0]?.toUpperCase()||'م';
  document.getElementById('role-badge').textContent=role==='production_agent'?'مندوب تنفيذ':(role==='admin'?'أدمن':'مدير');

  // Suppliers
  onSnapshot(collection(db,'suppliers_v2'),snap=>{
    suppliers=snap.docs.map(d=>({...d.data(),_id:d.id}));
    refreshSupplierSelect();
  });

  // Orders
  onSnapshot(collection(db,'orders'),snap=>{
    orders=snap.docs.map(d=>({...d.data(),_id:d.id}));
    renderList();
  });
});

function getMissingCostOrders(){
  const isAdm=['admin','operation_manager'].includes(currentRole);
  const uid=currentUser?.uid||'';
  return orders.filter(o=>{
    if(o.stage==='archived')return false;
    if((o.costItems||[]).length)return false;
    if(isAdm)return true;
    // مندوب التنفيذ: أوردراته الموكلة + غير الموكلة في التنفيذ/الشحن
    if(o.productionAgent===uid)return true;
    if(!o.productionAgent && ['production','shipping'].includes(o.stage))return true;
    return false;
  });
}

function renderList(){
  const data=getMissingCostOrders();
  const byStage={design:0,printing:0,production:0,shipping:0,other:0};
  data.forEach(o=>{const s=o.stage||'other';if(byStage[s]!=null)byStage[s]++;else byStage.other++;});
  setText('k-total',data.length);
  setText('k-production',byStage.production||0);
  setText('k-shipping',byStage.shipping||0);
  setText('k-other',(byStage.design||0)+(byStage.printing||0));
  setText('cnt-all',data.length);
  setText('cnt-production',byStage.production||0);
  setText('cnt-shipping',byStage.shipping||0);
  setText('cnt-printing',byStage.printing||0);
  setText('cnt-design',byStage.design||0);

  let filtered=data;
  if(currentFilter!=='all')filtered=data.filter(o=>o.stage===currentFilter);

  const el=document.getElementById('list');
  if(!filtered.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-ico">🎉</div><div class="empty-title">لا يوجد أوردرات بدون تكلفة</div><div class="empty-sub">كل الأوردرات في النطاق الحالي مسجّل لها بنود تكلفة</div></div>`;
    return;
  }

  const SM={design:{cls:'st-design',lbl:'✏️ تصميم'},printing:{cls:'st-printing',lbl:'🖨️ طباعة'},production:{cls:'st-production',lbl:'🏭 تنفيذ'},shipping:{cls:'st-shipping',lbl:'🚚 شحن'}};
  el.innerHTML=filtered.map(o=>{
    const stg=SM[o.stage]||{cls:'st-design',lbl:o.stage||'—'};
    const prods=o.products||[];
    const days=o.createdAt?.seconds?Math.floor((Date.now()/1000-o.createdAt.seconds)/86400):0;
    const dayChip=days>0?`<span class="day-chip ${days<=2?'day-ok':days<=5?'day-warn':'day-late'}">منذ ${days}ي</span>`:'';
    const prodTags=prods.slice(0,3).map(p=>`<span class="prod-tag">${p.name}${p.qty?' × '+p.qty:''}</span>${p.supplierName?`<span class="prod-tag prod-tag-sup">🏭 ${p.supplierName}</span>`:''}`).join('');
    return `<div class="ord-card" onclick="openCostModal('${o._id}')">
      <div class="ord-card-top">
        <div style="flex:1;min-width:0">
          <div class="ord-name">${o.clientName||'—'}</div>
          <div class="ord-id">${o.orderId||o._id.slice(-6)} · ${o.createdDate||'—'} ${dayChip}</div>
          <div style="margin-top:6px">${prodTags||'<span class="prod-tag">بدون منتجات</span>'}${prods.length>3?`<span class="prod-tag">+${prods.length-3}</span>`:''}</div>
          ${o.productionAgentName?`<div style="font-size:11px;color:var(--dim2);margin-top:6px">👷 ${o.productionAgentName}</div>`:''}
        </div>
        <span class="stage-chip ${stg.cls}">${stg.lbl}</span>
      </div>
      <button class="add-cost-btn" onclick="event.stopPropagation();openCostModal('${o._id}')">➕ تسجيل بند تكلفة</button>
    </div>`;
  }).join('');
}

window.setFilter=function(f,btn){
  currentFilter=f;
  document.querySelectorAll('#stage-filter-bar .ftab').forEach(b=>b.classList.remove('active'));
  btn?.classList.add('active');
  renderList();
};

function refreshSupplierSelect(){
  const el=document.getElementById('ac-sup');if(!el)return;
  el.innerHTML='<option value="">— داخلي / بدون مورد —</option>'+suppliers.map(s=>`<option value="${s._id}" data-name="${s.name||''}" data-printtype="${s.printType||''}">${s.name||'—'}${s.printType?' · '+s.printType:''}</option>`).join('');
}

window.openCostModal=function(orderId){
  const o=orders.find(x=>x._id===orderId);if(!o)return;
  activeId=orderId;
  const prods=o.products||[];
  const sel=document.getElementById('cost-prod-idx');
  sel.innerHTML='<option value="-1">— عام للأوردر —</option>'+prods.map((p,i)=>`<option value="${i}">${p.name||'منتج'} × ${p.qty||1}</option>`).join('');
  sel.value='-1';
  setText('cost-order-name',o.clientName||'—');
  setText('cost-order-id',`${o.orderId||o._id.slice(-6)} · ${o.createdDate||'—'} · ${o.stage||'—'}`);
  sv('ac-total','');sv('ac-note','');
  const ac=document.getElementById('ac-sup');
  if(ac && o.supplierId)ac.value=o.supplierId;else if(ac)ac.value='';
  document.getElementById('ov-cost').classList.add('open');
};

window.closeCostModal=function(){
  document.getElementById('ov-cost').classList.remove('open');
  activeId=null;
};

function _typeFromPrintType(pt){
  pt=(pt||'').toLowerCase();
  const map=[
    ['طباعة',['طباع','فلكس','حريرية','uv','ريزو','لارج']],
    ['ورق',  ['ورق','كرتون','مواد خام']],
    ['زنكات',['زنكات','ألواح']],
    ['سلفنة',['سلفنة','تشطيب','تذهيب','نقر','كريز','تجليد','تقطيع']],
    ['قص',   ['قص']],
    ['تجميع',['تجميع']],
    ['تصميم',['تصميم','تصوير','موشن']],
  ];
  for(const [type,keys] of map){if(keys.some(k=>pt.includes(k)))return type;}
  return 'أخرى';
}

window.saveCost=async function(){
  if(!activeId)return;
  const total=parseFloat(gv('ac-total'))||0;
  if(!total)return toast('⚠️ أدخل التكلفة','err');
  const supSel=document.getElementById('ac-sup');
  const supOpt=supSel?.options[supSel.selectedIndex];
  const supplierId=supOpt?.value||'';
  const supplierName=supOpt?.dataset?.name||'';
  const supPrintType=supOpt?.dataset?.printtype||'';
  const type=supplierId?_typeFromPrintType(supPrintType):'متفرقات';
  const prodIdx=parseInt(document.getElementById('cost-prod-idx')?.value??-1);
  const o=orders.find(x=>x._id===activeId);if(!o)return;
  const note=gv('ac-note');
  const costItemId=Date.now().toString(36)+Math.random().toString(36).slice(2,7);
  const needSoRef=!!supplierId;
  const soRef=needSoRef?doc(collection(db,'supplier_orders')):null;
  const supplierOrderId=soRef?soRef.id:'';
  const item={
    costItemId,
    orderId:activeId,
    isExternal:!!supplierId,
    ...(supplierOrderId?{supplierOrderId}:{}),
    type,supplierId,supplierName,
    prodIdx:prodIdx>=0?prodIdx:null,
    total,note,
    addedAt:nowStr(),
    addedBy:userName
  };
  const ci=[...(o.costItems||[]),item];
  try{
    const batch=writeBatch(db);
    const tlEntry={date:nowStr(),action:`💰 ${type}: ${fn(total)} ج${note?' — '+note:''}`,by:userName};
    const updFields={
      costItems:ci,
      timeline:[...(o.timeline||[]),tlEntry],
      updatedAt:serverTimestamp()
    };
    // لو الأوردر مُسلَّم وفي انتظار مراجعة بنود التكلفة → أرشف تلقائياً
    if(o.awaitingFinalArchive){
      updFields.stage='archived';
      updFields['stageEnteredAt.archived']=nowStr();
      updFields.awaitingFinalArchive=false;
      tlEntry.action=`${tlEntry.action} — 📁 أُرشف تلقائياً بعد تسجيل بنود التكلفة`;
    }
    // لو مفيش مندوب تنفيذ موكل → التقطه
    if(!o.productionAgent && currentUser){
      updFields.productionAgent=currentUser.uid;
      updFields.productionAgentName=userName;
    }
    batch.update(doc(db,'orders',activeId),updFields);
    // RULE 5 — قيد محاسبي
    const ledgerEvent=supplierId?FE.VENDOR_PAYMENT:FE.GENERAL_EXPENSE;
    addLedgerToBatch(batch,db,ledgerEvent,{
      amount:total,orderId:activeId,clientName:o.clientName||'',
      vendorId:supplierId,vendorName:supplierName,
      notes:`تكلفة تنفيذ — ${type}${note?' — '+note:''} · ${o.clientName||''}`,
      userId:currentUser?.uid||'',userName
    });
    if(soRef){
      batch.set(soRef,{
        costItemId,orderId:activeId,
        orderRef:o.orderId||activeId.slice(-6),
        clientName:o.clientName||'',
        supplierId,supplierName,type,total,note:note||'',
        status:'pending',deliveryStatus:'awaiting',paidAmount:0,
        createdAt:serverTimestamp(),updatedAt:serverTimestamp(),
        createdBy:currentUser?.uid||'',createdByName:userName,
        isDeleted:false
      });
    }
    await batch.commit();
    toast('✅ تم تسجيل بند التكلفة','ok');
    closeCostModal();
  }catch(e){
    toast('❌ '+(e.message||'فشل الحفظ'),'err');
  }
};
</script>
