// ══ Global Error Handler ══
window.addEventListener('unhandledrejection', e=>{
  const msg = e.reason?.message || String(e.reason);
  if(msg.includes('permission-denied')||msg.includes('Missing or insufficient')){
    const t=document.getElementById('toasts');
    if(t){const el=document.createElement('div');el.className='toast err';
    el.textContent='🔒 ليس لديك صلاحية — راجع الأدمن';
    t.appendChild(el);setTimeout(()=>el.remove(),5000);}
  } else if(msg && !msg.includes('AbortError')){
    console.error('Unhandled:', msg);
  }
  e.preventDefault();
});

  // fail-closed على الحقول الحساسة لو الدور غير معروف
  const def = (_FIELD_DEFAULTS[currentRole]||{})[field];
  if(def!==undefined) return def;
  return !['client_phone','design_data'].includes(field);
}

function _maskPhone(p){
  if(!p) return '';
  const s = String(p).replace(/\D/g,'');
  if(s.length<6) return '****';
  return s.slice(0,3)+'****'+s.slice(-3);
}

// God-page decomp PR-8: stats computation moved to clients-data.js
// (window.computeClientStats). Wrapper does only the DOM writes.
function updateStats(){
  const stats=computeClientStats({
    clients, orders:allOrders, calcRem, ordersIndex:buildClientOrdersIndex(),
  });
  // Legacy (hidden) — keep populated for any drawer/code still reading these IDs
  setText('s-sales',fn(stats.totals.sales)+' ج');
  setText('s-rem',fn(stats.totals.rem)+' ج');
  setText('sub',stats.totals.clientCount+' عميل');

  // ── New runtime KPI strip ─────────────────────────────────────
  const T=stats.totals;
  // Compact money formatter: 2.45M / 350K / 1,247
  const fmtMoney=(n)=>{
    const v=Math.abs(parseFloat(n)||0);
    if(v>=1e6) return (v/1e6).toFixed(2).replace(/\.0+$/,'')+'M';
    if(v>=1e3) return (v/1e3).toFixed(0)+'K';
    return fn(v);
  };
  const fmtInt=(n)=>fn(Math.round(parseFloat(n)||0));
  setText('kpi-total-clients',fmtInt(T.clientCount));
  setText('kpi-active-clients',fmtInt(T.activeClientCount));
  setText('kpi-open-orders',fmtInt(T.openOrdersCount));
  // قيمة المبيعات → نعرض الـ sales (المحصّل فعلياً) بنفس الـ ID القديم
  const salesEl=document.getElementById('kpi-sales-amount');
  if(salesEl) salesEl.innerHTML=fmtMoney(T.sales)+' <span class="kpi-unit">ج</span>';
  // متوسط مدة التنفيذ
  const execEl=document.getElementById('kpi-avg-exec');
  if(execEl) execEl.innerHTML=(T.avgExecutionDays || '—')+' <span class="kpi-unit">يوم</span>';
  setText('kpi-late-orders',fmtInt(T.lateOrdersCount));
  // MoM delta على إجمالي العملاء (نفس الـ monthDelta المحسوبة)
  const deltaEl=document.getElementById('kpi-clients-delta');
  if(deltaEl){
    const {pct,direction}=stats.monthDelta;
    if(pct===null){ deltaEl.textContent=''; }
    else{
      const arrow=direction==='up'?'↗':'↘';
      const sign=pct>=0?'+':'';
      deltaEl.textContent=`${arrow} ${sign}${pct}% عن الشهر الماضي`;
      deltaEl.className='kpi-sub '+(pct>=0?'kpi-delta-up':'kpi-delta-down');
    }
  }
  // ──────────────────────────────────────────────────────────────

  const P=stats.periods;
  setText('tp-today-n',P.today.n);     setText('tp-today-r',fn(P.today.r)+' ج');
  setText('tp-yest-n',P.yesterday.n);  setText('tp-yest-r',fn(P.yesterday.r)+' ج');
  setText('tp-week-n',P.week.n);       setText('tp-week-r',fn(P.week.r)+' ج');
  setText('tp-month-n',P.month.n);     setText('tp-month-r',fn(P.month.r)+' ج');
  setText('tp-lm-n',P.lastMonth.n);    setText('tp-lm-r',fn(P.lastMonth.r)+' ج');
  // MoM delta
  const compEl=document.getElementById('tp-lm-c');
  if(compEl){
    const {pct,direction}=stats.monthDelta;
    if(pct===null){compEl.textContent='';}
    else{compEl.textContent=(direction==='up'?'↗ +':'↘ ')+pct+'%';compEl.className='tp-comp '+direction;}
  }
  // Quick-filter badges
  const setBadge=(id,n)=>{const e=document.getElementById(id);if(e)e.textContent=n>0?`(${n})`:'';};
  const Q=stats.quickFilters;
  setBadge('qf-all-n',Q.all);     setBadge('qf-vip-n',Q.vip);
  setBadge('qf-active-n',Q.active); setBadge('qf-rem-n',Q.rem);
  setBadge('qf-risk-n',Q.risk);   setBadge('qf-new-n',Q.new);
  setBadge('qf-sleep-n',Q.sleep);
}

// ── Runtime-shell view dispatcher (PR-1029 + Phase 1) ──
// Two entry points:
//   1. URL param ?filter=<chipId>     — direct/refresh navigation
//   2. postMessage 'b2c:runtime-state' — sidebar click (no reload)
// Both funnel into the same applyViewFilter() — no duplicated logic.
(function wireRuntimeView(){
  const VALID = new Set(['all','vip','active','rem','atrisk','new','sleeping']);

  function applyViewFilter(view){
    if (!view || !VALID.has(view) || typeof window.setQuickFilter !== 'function') return false;
    const chip = document.querySelector(`.f-chip[onclick*="setQuickFilter('${view}'"]`);
    if (!chip && view !== 'all') return false;  // chips not mounted yet — let caller retry
    window.setQuickFilter(view, chip);
    return true;
  }

  // Entry 1 — URL param on first paint (kept as fallback for direct URL access).
  function applyUrl(){
    const f = new URLSearchParams(location.search).get('filter');
    if (!f) return;
    if (!applyViewFilter(f)) setTimeout(applyUrl, 80);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyUrl, { once: true });
  } else {
    applyUrl();
  }

  // Entry 2 — runtime-state events from the shell (sidebar clicks).
  window.addEventListener('message', (e) => {
    const data = e?.data;
    if (!data || data.type !== 'b2c:runtime-state') return;
    const state = data.state || {};
    if (state.domain && state.domain !== 'clients') return;  // not our domain
    const view = state.view;
    if (!view) return;
    if (!applyViewFilter(view)) setTimeout(() => applyViewFilter(view), 80);
  });

  // Announce readiness so the shell replays current state.
  function announceReady(){
    if (window.parent && window.parent !== window) {
      try { window.parent.postMessage({ type: 'b2c:runtime-ready', domain: 'clients' }, '*'); }

function renderGrid(){

  // فنعتبر الرسم الأول قد تمّ — تُسمح بعده بتأجيل إعادات الرسم أثناء الـ modal.
  _firstPaintDone=true;

  // repeatedly — the helper short-circuits on already-bound roots.
  try {
    if (window.isControlCenterOn && window.isControlCenterOn() && window.attachLongPressHandlers) {
      window.attachLongPressHandlers(el);
    }
  } catch (_) { /* CC optional */ }
  const isLegacyTab = window.__statusTab==='legacy';
  // Stuck-spinner guard: any path out of renderGrid must replace the
  // spinner. If filter/card construction throws, fall through to a
  // visible error block instead of leaving the spinner forever.
  try {
    // God-page decomp PR-13: filter logic extracted to clients-data.js

    updateFilterBadge();

    el.style.display='grid';
    if(!data.length){
      // أثناء البحث في السيرفر عن عميل قديم — أظهِر مؤشّر بدل "لا نتائج".
      if(window.__remoteSearching && (gv('q')||'').trim().length>=2){

    if(typeof clientCardHTML !== 'function'){
      throw new Error('clients-render.js لم يحمّل بعد (clientCardHTML مفقود)');
    }
    const _nowMs=Date.now();
    const _nowSec=_nowMs/1000;

      getOrders: getClientOrders, calcRem, fn,
      countOpenReminders, getSegment: (id)=>clientSegments.get(id),

// ── Debounce updateStats + renderGrid to avoid triple-execution on snapshots ──
let _statsTimer=null, _gridTimer=null;
let _pendingRerender=false;
// أول رسم للشبكة يجب أن يحدث دائماً (حتى لو الـ modal مفتوح)، وإلا تبقى
// الصفحة عالقة على الـ spinner لو وصل أول snapshot والـ modal مفتوح
// (stuck-spinner race — بلاغ موظف خدمة العملاء بعد حفظ عميل).
let _firstPaintDone=false;
const _origUpdateStats=null;
function isClientModalOpen(){
  const m=document.getElementById('ov-client');
  return !!(m && m.classList.contains('open'));
}
let __clientsRafId=0;
function scheduleStatsAndGrid(){
  invalidateOrdersIndex();
  // While the add/edit client modal is open, snapshot-driven re-renders of
  // 2000-card grid + stats freeze the form. Mark dirty and let
  // closeClientModal() flush once when the user finishes typing.
  // EXCEPTION: never defer the very first paint — otherwise the grid stays
  // stuck on the spinner if the first snapshot lands while the modal is open
  // (recovery would depend solely on closeClientModal, so an X/backdrop close
  // leaves the page hung). First paint runs once regardless of modal state.
  if(isClientModalOpen() && _firstPaintDone){ _pendingRerender=true; return; }
  if(__clientsRafId) return;
  __clientsRafId=requestAnimationFrame(()=>{
    __clientsRafId=0;
    try{ updateStats(); }catch(e){console.warn('updateStats:',e);}
    try{ renderGrid(); }catch(e){console.warn('renderGrid:',e);}
  });
}

// بحث السيرفر — العثور على أي عميل خارج حد الـ CLIENTS_LIMIT
// ════════════════════════════════════════════════════════════════════
// الشبكة تحمّل أحدث 1000 عميل. لو كان العدد أكبر وعميل ما ظهرش،
// البحث النصي يستعلم Firestore مباشرةً فيضيفه. (read فقط · limit إلزامي · G3)

// يدمج نتائج البحث القديمة في قائمة الأساس بدون تكرار (dedup by _id).
function mergeSearchExtras(base){
  if(!searchExtras.length) return base;
  const ids=new Set(base.map(c=>c._id));
  return base.concat(searchExtras.filter(c=>!ids.has(c._id)));
}

let __rsTimer=null;            // debounce timer
let __rsToken=0;              // سباق: أحدث بحث يفوز
const __rsCache=new Map();    // memo داخل الجلسة: query → clients[]

// يُستدعى من خانة البحث (clients-shell.js · oninput).
window.onClientSearchInput=function(val){
  const q=(val||'').trim();
  // الفلترة المحلية فورية
  scheduleStatsAndGrid();
  clearTimeout(__rsTimer);
  if(q.length<2){ window.__remoteSearching=false; return; }
  window.__remoteSearching=true;
  __rsTimer=setTimeout(()=>remoteClientSearch(q),350);
};

// يستعلم Firestore عن العملاء المطابقين (prefix على الاسم أو الهاتف) ويدمجهم.
async function remoteClientSearch(rawQ){
  const q=(rawQ||'').trim();
  if(q.length<2){ window.__remoteSearching=false; return; }
  const myToken=++__rsToken;
  if(__rsCache.has(q)){
    mergeHits(__rsCache.get(q));
    window.__remoteSearching=false;
    return;
  }
  const isAdmin=['admin','operation_manager'].includes(currentRole);
  const uid=currentUser?.uid;
  const LIM=25;
  const end=q+'';
  const isPhone=/^[\d+]/.test(q);
  // prefix queries — single-field indexes (تلقائية، لا تحتاج composite index)
  const col=collection(db,'clients');
  const queries = isPhone
    ? [
        getDocs(query(col,orderBy('phone1'),startAt(q),endAt(end),limit(LIM))),
        getDocs(query(col,orderBy('phone2'),startAt(q),endAt(end),limit(LIM))),
        getDocs(query(col,orderBy('intlPhone'),startAt(q),endAt(end),limit(LIM))),
      ]
    : [
        getDocs(query(col,orderBy('name'),startAt(q),endAt(end),limit(LIM))),
      ];
  try{
    const snaps=await Promise.all(queries.map(p=>p.catch(()=>null)));
    if(myToken!==__rsToken) return;   // بحث أحدث ألغى هذا
    const seen=new Set(), hits=[];
    for(const s of snaps){
      if(!s) continue;
      for(const d of s.docs){
        if(seen.has(d.id)) continue; seen.add(d.id);
        const c={...d.data(),_id:d.id};
        if(c.isDeleted) continue;
        if(!isAdmin && c.createdBy!==uid) continue;  // RULE 8 — غير الأدمن يرى عملاءه فقط
        hits.push(c);
      }
    }
    __rsCache.set(q,hits);
    mergeHits(hits);
  }catch(e){ console.warn('remoteClientSearch:',e); }
  finally{ if(myToken===__rsToken) window.__remoteSearching=false; }
}

// يضيف العملاء الجدد إلى searchExtras + clients ثم يعيد الرسم.
function mergeHits(hits){
  if(!hits || !hits.length){ scheduleStatsAndGrid(); return; }
  const known=new Set(searchExtras.map(c=>c._id));
  let added=false;
  for(const c of hits){ if(!known.has(c._id)){ searchExtras.push(c); known.add(c._id); added=true; } }
  // دائماً أعِد دمج searchExtras في clients (حتى لو لم يُضَف عميل جديد)
  // — يضمن ظهور نتائج البحث السابقة بعد أي snapshot أو تحديث للـ cache.
  const present=new Set(clients.map(c=>c._id));
  const missing=searchExtras.filter(c=>!present.has(c._id));
  if(added || missing.length) clients=clients.concat(missing);
  scheduleStatsAndGrid();
}

// P1.3 — Thin orchestration over window.clientActions.saveFollowup.
window.saveFollowup=async function(){
  const btn=document.getElementById('save-followup-btn');
  if(!currentUser){toast('❌ يلزم تسجيل الدخول','err');return;}
  if(!window.clientActions){toast('⚠️ النظام يحمّل — حاول بعد لحظات','err');return;}
  if(btn){btn.disabled=true;const _o=btn.innerHTML;btn.dataset._orig=_o;btn.innerHTML='⏳ جاري...';}
  try{
    const clientId=gv('fu-client-id');
    const fId=gv('fu-id');
    const orderId=gv('fu-order');
    // Pure payload builder — features/clients/followup-form.js
    const data=window.__buildFollowupPayload({
      clientId,
      clientName:clients.find(x=>x._id===clientId)?.name||'',
      type:gv('fu-type'),
      outcome:gv('fu-outcome'),
      note:gv('fu-note'),
      orderId,
      linkedOrder:orderId?allOrders.find(x=>x._id===orderId):null,
      productRating:gv('fu-rating'),
      productReview:gv('fu-review'),
      nextActionDateRaw:gv('fu-next-date'),
      nextActionDone:document.getElementById('fu-done')?.checked||false,
      assignedTo:currentUser.uid,
      assignedToName:userName||'',
    });

    // Safety net: لو الـ network/Firestore هنغ لأي سبب، نوقف بعد 15s ونعطي
    // المستخدم رسالة واضحة بدل ما الزرار يفضل '⏳ جاري...' للأبد.
    const savePromise = window.clientActions.saveFollowup({
      fId: fId || '',
      data,
      userId: currentUser?.uid||'',
      userName: userName||'',
    });
    const timeoutPromise = new Promise((_, reject) =>
      setTimeout(()=>reject(new Error('انتهت مهلة الحفظ (15ث) — تحقق من الإنترنت وأعد المحاولة')), 15000)
    );
    const r = await Promise.race([savePromise, timeoutPromise]);
    if(!r.ok){
      console.warn('[clientActions] saveFollowup failed', r);
      const msg=(r.errors?.[0]||'فشل الحفظ');
      if(msg.includes('permission')||msg.includes('insufficient')||msg.includes('صلاحية')){
        toast('🔒 لا تملك صلاحية كتابة المتابعات — راجع الأدمن','err');
      }else{
        toast('❌ '+msg,'err');
      }
      return;
    }
    toast(fId?'✅ تم تحديث المتابعة':'✅ تم تسجيل المتابعة','ok');
    closeFollowupModal();
  }catch(e){
    console.warn('[clientActions] saveFollowup exception', e);
    toast('❌ '+(e?.message||'خطأ'),'err');
  }finally{if(btn){btn.disabled=false;if(btn.dataset._orig)btn.innerHTML=btn.dataset._orig;}}
};

window.reorderLastOrder=function(clientId){
  const cl=clients.find(x=>x._id===clientId);
  if(!cl){toast('⚠️ العميل غير موجود','err');return;}
  // Find last non-cancelled order for this client (use existing getClientOrders helper if available)
  const cOrds=allOrders.filter(o=>o.clientId===clientId||(cl.phone1&&o.clientPhone===cl.phone1)||(cl.name&&o.clientName===cl.name));
  const candidates=cOrds.filter(o=>o.stage!=='cancelled'&&!o.isDeleted).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  const last=candidates[0];
  if(!last){toast('⚠️ لا يوجد أوردر سابق لهذا العميل','err');return;}
  // Get the products list — handle both new schema (products array) and old (single product)
  const items=Array.isArray(last.products)&&last.products.length
    ? last.products.map(p=>({productId:p.productId||'',name:p.name||'',qty:parseInt(p.qty)||1,unitPrice:parseFloat(p.unitPrice)||0}))
    : (last.product?[{productId:'',name:last.product,qty:parseInt(last.qty)||1,unitPrice:parseFloat(last.salePrice)||0}]:[]);
  if(!items.length){toast('⚠️ الأوردر السابق بدون منتجات قابلة للنسخ','err');return;}
  // Ensure activeId is set so openNewOrder works
  activeId=clientId;
  pendingClientId=clientId;
  // Open the modal normally
  openNewOrder();
  // Pre-select stage to 'design' (Option B — fresh design)
  selectOrderType('design');
  // Wait one tick so DOM is ready, then replace product rows
  setTimeout(()=>{
    const container=document.getElementById('no-prod-rows');
    if(!container)return;
    container.innerHTML='';
    items.forEach(item=>{
      addNoProdRow();
      const row=container.lastElementChild;
      if(!row)return;
      const sel=row.querySelector('select');
      const qtyInput=row.querySelector('input[type="number"]');
      if(sel&&item.productId){
        // Try to select by productId
        const opt=sel.querySelector(`option[value="${item.productId}"]`);
        if(opt){sel.value=item.productId;}
        else{
          // Product not in catalog anymore — try by name
          const byName=Array.from(sel.options).find(o=>(o.dataset.name||'').trim()===(item.name||'').trim());
          if(byName)sel.value=byName.value;
        }
      }
      if(qtyInput)qtyInput.value=item.qty||1;
    });
    const code=last.orderId||last._id?.slice(-6)||'—';
    toast(`🔁 تم نسخ ${items.length} منتج من ${code} — راجع وعدّل ثم احفظ`,'ok');
  },50);
};

  const wId=gv('no-wallet');

  const receiptCount=(window.__noReceiptFiles||[]).length;

  // ─ Validation (centralized pure validator) ─
  const v=window.__validateNewOrderForm?.({stage,products:prods,salePrice,deposit:dep,walletId:wId,deadline,receiptCount})||{ok:true};
  if(!v.ok){
    toast(v.errors[0],'err');
    if(v.focusField)document.getElementById(v.focusField)?.focus();
    return;
  }

  let cl=clients.find(x=>x._id===pendingClientId);
  // العميل القديم قد يكون في searchExtras فقط — أعد الدمج مع clients
  if(!cl && searchExtras.length){
    cl=searchExtras.find(x=>x._id===pendingClientId);
    if(cl) clients=mergeSearchExtras(clients);
  }
  if(!cl){toast('❌ لم يتم العثور على بيانات العميل — أعِد فتح البطاقة وحاول مرة أخرى','err');return;}
  if(!currentUser){toast('❌ يلزم تسجيل الدخول','err');return;}
  const wEl=document.getElementById('no-wallet');
  const wName=wEl?.options[wEl?.selectedIndex]?.text||'';
  if(!window.orderActions){toast('⚠️ النظام يحمّل — حاول بعد لحظات','err');return;}

  const desSel=document.getElementById('no-designer');
  const designerId=desSel?.value||'';
  const designerName=designerId?(desSel?.options[desSel?.selectedIndex]?.text||''):'';
  const orderId=window.__generateOrderId?.()||('ORD-'+Date.now().toString().slice(-8));
  const productName=prods.map(p=>p.name).join(' + ');
  const btn=document.getElementById('no-save-btn');btn.disabled=true;btn.textContent='جاري...';
  const designNote=gv('no-design-note');

  // ─ File upload helper (compat Storage) — God-page decomp PR-19:
  //   compressImage + uploadDesignFiles extracted to clients-upload.js.
  //   This wrapper handles only the DOM progress UI + URL fallback.
  const uploadDesignFile=async()=>{
    const files=window.__noDesignFiles||[];
    const urlField=gv('no-design-url');
    if(!files.length)return{firstUrl:urlField||'',allFiles:urlField?[{url:urlField,name:'رابط مباشر',type:'url'}]:[]};
    const progWrap=document.getElementById('no-upload-progress');
    const progBar=document.getElementById('no-upload-bar');
    const progPct=document.getElementById('no-upload-pct');
    const progLbl=document.getElementById('no-upload-lbl');
    progWrap.style.display='block';
    progLbl.textContent=`رفع ${files.length} ملف...`;
    btn.textContent='جاري الرفع...';
    const result=await uploadDesignFiles({
      files, orderId,
      onProgress:(pct)=>{progBar.style.width=pct+'%';progPct.textContent=pct+'%';},
    });
    progWrap.style.display='none';
    return result;
  };

  // ─ Receipt upload helper (when deposit > 0) ─
  //   Uses same uploadDesignFiles but stores under receipts/ prefix so
  //   payment proofs are kept separate from design files in Storage.
  const uploadReceipts=async()=>{
    const files=window.__noReceiptFiles||[];
    if(!files.length || dep<=0) return {firstUrl:'', allFiles:[]};
    const progWrap=document.getElementById('no-upload-progress');
    const progBar=document.getElementById('no-upload-bar');
    const progPct=document.getElementById('no-upload-pct');
    const progLbl=document.getElementById('no-upload-lbl');
    progWrap.style.display='block';
    progLbl.textContent=`رفع ${files.length} إيصال...`;
    btn.textContent='جاري رفع الإيصال...';
    const result=await uploadDesignFiles({
      files, orderId, pathPrefix:'receipts/order_',
      onProgress:(pct)=>{progBar.style.width=pct+'%';progPct.textContent=pct+'%';},
    });
    progWrap.style.display='none';
    return result;
  };

  // ─ Upload first → call action with URLs ─
  // Upload-phase safety net: لو الرفع علّق لأي سبب (شبكة/Storage/ضغط الصورة)
  // الزر كان يفضل "جاري الرفع..." للأبد والأوردر "مش بيتحفظ". الـ timeout ده
  // يضمن إن المستخدم يقدر يعيد المحاولة بدل ما يعلّق. (مكمّل للـ 15s بتاع createOrder.)
  // المهلة 240ث (4 دقائق) تكفي لملف تصميم حتى 80 م.ب على اتصال متوسط؛ الحجم
  // مُتحقَّق منه مسبقاً عند الاختيار فالفشل هنا غالباً اتصال بطيء فعلاً.
  const uploadWithTimeout = Promise.race([
    Promise.all([uploadDesignFile(), uploadReceipts()]),
    new Promise((_, reject)=>setTimeout(
      ()=>reject(new Error('تعذّر رفع الملفات — الاتصال بطيء أو الملف كبير. حاول مرة أخرى.')), 240000)),
  ]);
  uploadWithTimeout.then(async ([
    {firstUrl:designFileUrl,allFiles:designFiles},
    {firstUrl:depositReceiptUrl,allFiles:depositReceiptFiles},
  ])=>{
    // phased feedback: uploads done → now saving the order doc
    btn.textContent='⏳ جاري حفظ الطلب...';
    // PR-846: 15s timeout safety net — نفس pattern PR #825/#827.
    // المستخدم كان شايف "جاري..." stuck حتى لما الأوردر اتسجّل فعلاً
    // (الـ batch.commit نجح، بس withIdempotency updateDoc علّق على flaky network).
    // الـ idempotency layer بتمنع double-write لو المستخدم retried.
    const actionPromise = window.orderActions.createOrder({
      clientId: pendingClientId,
      clientName: cl.name||'',
      clientPhone: cl.phone1||'',
      // عنوان التوصيل من كارت العميل (محافظة/مدينة) — يظهر جاهز في الشحن
      deliveryAddress: (cl.governorate||cl.gov)
        ? { gov: cl.governorate||cl.gov||'', city: cl.city||'', street: '' } : null,
      products: prods,
      stage,
      salePrice,
      deposit: dep,
      walletId: wId,
      walletName: wName,
      designerId, designerName,
      deadline: gv('no-deadline'),
      notes: gv('no-notes'),
      designNote,
      designFileUrl,
      designFiles,
      depositReceiptUrl,
      depositReceiptFiles,
      orderId,
      userId: currentUser.uid,
      userName: userName||'',
    });
    const timeoutPromise = new Promise((_, reject) =>
      setTimeout(()=>reject(new Error('انتهت مهلة الحفظ (15ث) — الأوردر قد يكون تسجّل بالفعل. أعد تحميل الصفحة للتأكد.')), 15000)
    );
    const r = await Promise.race([actionPromise, timeoutPromise]);
    if(!r.ok){
      console.warn('[orderActions] createOrder failed', r);
      const errMsg=r.errors?.[0]||'فشل إنشاء الأوردر';
      // Preserve financialGuard hook for ops_manager review flow
      const handled=window.financialGuard?.({code:'',message:errMsg},{operation:'إنشاء أوردر بعربون',amount:dep,walletName:wName,clientName:cl.name,orderId});
      if(!handled)toast('❌ '+errMsg,'err');
      btn.disabled=false;btn.textContent='✓ إنشاء الطلب';
      return;
    }
    closeOrderModal();
    toast('✅ تم إنشاء الطلب'+(dep>0?' مع العربون':''),'ok');
    setTimeout(()=>(typeof navigatePage==='function'?navigatePage:url=>location.href=url)(stage==='design'?'design.html':'print.html'),700);
  }).catch(e=>{
    console.warn('[orderActions] createOrder exception', e);
    // اخفِ شريط الرفع لو ظل ظاهراً بعد فشل/تعليق الرفع
    const pw=document.getElementById('no-upload-progress');if(pw)pw.style.display='none';
    const handled=window.financialGuard?.(e,{operation:'إنشاء أوردر بعربون',amount:dep,walletName:wName,clientName:cl.name,orderId});
    if(!handled)toast('❌ '+(e?.message||'خطأ'),'err');
    btn.disabled=false;btn.textContent='✓ إنشاء الطلب';
  });
}

function isValidEgPhone(v){ return /^01[0125][0-9]{8}$/.test((v||'').trim()); }

// كشف فوري لتكرار رقم على عميل موجود (هاتف 1/2)، باستثناء العميل الجاري تعديله.
function findClientByPhone(v){
  if(!v) return null;
  const arr=(typeof clients!=='undefined'&&Array.isArray(clients))?clients:[];
  return arr.find(c=>c._id!==editId&&(c.phone1===v||c.phone2===v))||null;
}

function checkPhone(inp){
  // تنظيف ذكي: أرقام فقط (لصق برموز/مسافات)
  const cleaned=(inp.value||'').replace(/[^\d]/g,'');
  if(cleaned!==inp.value) inp.value=cleaned;
  const v=inp.value;
  const hint=document.getElementById('hint-'+inp.id);
  if(hint){
    if(!v){hint.textContent='';inp.classList.remove('valid','invalid');}
    else if(isValidEgPhone(v)){
      inp.classList.add('valid');inp.classList.remove('invalid');
      const dup=inp.id==='c-phone1'?findClientByPhone(v):null; // كشف تكرار فوري لهاتف 1
      if(dup){
        hint.textContent='⚠️ الرقم مسجّل بالفعل لـ '+(dup.name||'عميل')+' — تحقق قبل الإضافة';
        hint.className='field-hint warn';
      }else{
        hint.textContent='✓ رقم صحيح';hint.className='field-hint ok';
      }
    } else {
      inp.classList.add('invalid');inp.classList.remove('valid');
      hint.textContent='رقم غير صحيح (11 رقم يبدأ بـ 010/011/012/015)';
      hint.className='field-hint err';
    }
  }
  updateClientSaveState();
}

// حفظ ذكي: عطّل زر الحفظ ما لم يكتمل الاسم وصحّة الهاتف (لو مُدخَل).
function updateClientSaveState(){
  const btn=document.getElementById('save-client-btn');
  if(!btn) return;
  const name=(document.getElementById('c-name')?.value||'').trim();
  const p1=(document.getElementById('c-phone1')?.value||'').trim();
  const phoneBad=p1.length>0&&!isValidEgPhone(p1);
  btn.disabled=!(name.length>=2&&!phoneBad);
}

function onClientNameInput(inp){
  const hint=document.getElementById('hint-name');
  if(hint){
    const v=(inp.value||'').trim();
    if(!inp.value){hint.textContent='';}
    else if(v.length<2){hint.textContent='الاسم قصير جداً';hint.className='field-hint err';}
    else{hint.textContent='';}
  }
  updateClientSaveState();
}

function checkIntlPhone(){
  const inp=document.getElementById('c-intl-phone');
  const cc=document.getElementById('c-intl-cc');
  const hint=document.getElementById('hint-intl');
  if(!inp||!hint)return;
  const v=(inp.value||'').replace(/[^\d]/g,'');
  if(!v){hint.textContent='';inp.classList.remove('valid','invalid');return;}
  if(!cc.value){
    inp.classList.add('invalid');inp.classList.remove('valid');
    hint.textContent='⚠️ اختر الدولة أولاً';hint.className='field-hint err';
    return;
  }
  if(v.length>=6&&v.length<=15){
    inp.classList.add('valid');inp.classList.remove('invalid');
    hint.textContent='✓ '+cc.value+' '+v;hint.className='field-hint ok';
  }else{
    inp.classList.add('invalid');inp.classList.remove('valid');
    hint.textContent='رقم غير صحيح (6 إلى 15 رقم)';hint.className='field-hint err';
  }
}

// P1.2 — Thin orchestration. كل validation + dedup + writes + audit عبر
// window.clientActions.addClient / editClient. الصفحة تجمع inputs فقط.
async function saveClient(){
  const btn=document.getElementById('save-client-btn');
  // تطبيع ذكي: شيل المسافات الزائدة من الاسم
  const nameEl=document.getElementById('c-name');
  if(nameEl) nameEl.value=nameEl.value.trim().replace(/\s+/g,' ');
  // Intl phone — pure validator في features/clients/client-form.js
  const intlV=window.__validateIntlPhone?.(gv('c-intl-cc'), gv('c-intl-phone')||'')||{ok:true,intlPhone:''};
  if(!intlV.ok){toast(intlV.errors[0],'err');return;}

  const isLegacy=window.__isLegacyMode||false;
  const prevClient=editId?clients.find(c=>c._id===editId):null;
  const internalNotes=(gv('c-internal-notes')||'').trim();
  const internalChanged=(prevClient?.internalNotes||'')!==internalNotes;
  const internalNotesLastEdit=internalChanged?{
    by:currentUser?.uid||'',byName:userName||'',
    at:serverTimestamp(),
  }:null;

  // Schema-faithful payload — pure builder
  const data=window.__buildClientPayload({
    form:{
      name:gv('c-name'),phone1:gv('c-phone1'),phone2:gv('c-phone2'),
      intlCountryCode:gv('c-intl-cc').trim(), intlPhone:intlV.intlPhone,
      email:gv('c-email'),job:gv('c-job'),notes:gv('c-notes'),
      birthday:gv('c-birthday'),anniversary:gv('c-anniversary'),
      internalNotes,
      source:gv('c-source'),sector:gv('c-sector'),
      governorate:gv('c-gov'),city:gv('c-city'),
      tags:[...document.querySelectorAll('.tag-btn.on')].map(b=>b.dataset.tag),
      legacyNotes:gv('c-legacy-notes'),
      legacySpent:gv('c-legacy-spent'),
      legacyLastOrder:gv('c-legacy-last-order'),
      legacyProjects:gv('c-legacy-projects'),
    },
    isLegacy,prevClient,internalNotesLastEdit,
  });

  if(!window.clientActions){
    toast('⚠️ النظام يحمّل — حاول بعد لحظات','err');
    return;
  }

  btn.disabled=true; btn.textContent='جاري...';
  try{
    // Safety net: 15s timeout ضد أي hang (نفس pattern PR #825 للـ followup)
    const actionPromise = editId
      ? window.clientActions.editClient({
          clientId: editId,
          changes: data,
          userId: currentUser?.uid||'',
          userName: userName||'',
        })
      : window.clientActions.addClient({
          data,
          userId: currentUser?.uid||'',
          userName: userName||'',
        });
    const timeoutPromise = new Promise((_, reject) =>
      setTimeout(()=>reject(new Error('انتهت مهلة الحفظ (15ث) — تحقق من الإنترنت وأعد المحاولة')), 15000)
    );
    const r = await Promise.race([actionPromise, timeoutPromise]);

    if(!r.ok){
      // Dedup path — action returns { ok:false, duplicate:{...} }
      if(r.duplicate){
        showDupModal(r.duplicate);
        btn.disabled=false; btn.textContent=editId?'✓ حفظ':'✓ إضافة';
        return;
      }
      console.warn('[clientActions] saveClient failed', r);
      toast('❌ '+(r.errors?.[0]||'فشل الحفظ'),'err');
      btn.disabled=false; btn.textContent=editId?'✓ حفظ':'✓ إضافة';
      return;
    }
    // تذكّر آخر مصدر/قطاع لتسريع الإدخال التالي
    try{
      localStorage.setItem('cl_last_source', gv('c-source')||'');
      localStorage.setItem('cl_last_sector', gv('c-sector')||'');
    }catch(e){}
    closeClientModal();
    toast(editId?'✅ تم تحديث بيانات العميل':'✅ تم إضافة العميل','ok');
    btn.disabled=false; btn.textContent=editId?'✓ حفظ':'✓ إضافة';
  }catch(e){
    console.warn('[clientActions] saveClient exception', e);
    toast('❌ '+(e?.message||'خطأ غير متوقع'),'err');
    btn.disabled=false; btn.textContent=editId?'✓ حفظ':'✓ إضافة';
  }
}

// P1.2 — Thin orchestration over window.clientActions.deleteClient.
async function deleteClient(id){
  if(!id)return;
  // لا نشترط وجود العميل في مصفوفة clients المحمّلة محلياً (نافذة الـ 14 يوم /
  // بحث / جلب مباشر). كان `if(!c)return` يجعل الزر «لا يستجيب» بصمت لو العميل
  // خارج القائمة المحمّلة. الأكشن يحتاج الـ id فقط — يجلب الوثيقة بنفسه.
  const c=clients.find(x=>x._id===id);
  const nm=c?.name||'هذا العميل';
  if(!confirm(`حذف ${nm}؟ سيتم إخفاؤه من القوائم مع حفظ التاريخ.`))return;
  if(!window.clientActions){
    toast('⚠️ النظام يحمّل — حاول بعد لحظات','err');
    return;
  }
  try{
    const r=await window.clientActions.deleteClient({
      clientId:id,
      userId:currentUser?.uid||'',

window.runMergeDuplicates=async function(gIdx){
  const groupEl=document.querySelector(`[data-merge-group="${gIdx}"]`);
  if(!groupEl)return;
  const checked=groupEl.querySelector('input[type=radio]:checked');
  if(!checked){toast('⚠️ اختار العميل الأساسي','err');return;}
  const primaryId=checked.value;
  // Picked dups = checked checkboxes (excluding the primary if accidentally checked)
  const pickedBoxes=[...groupEl.querySelectorAll('.dup-pick:checked')];
  const duplicateIds=pickedBoxes.map(b=>b.dataset.cid).filter(id=>id&&id!==primaryId);
  if(!duplicateIds.length){toast('⚠️ علّم عملاء بـ☑️ للدمج','err');return;}

  const primary=clients.find(c=>c._id===primaryId);
  const dupNames=duplicateIds.slice(0,3).map(id=>clients.find(c=>c._id===id)?.name||'(؟)').join(' · ');
  const more=duplicateIds.length>3?` +${duplicateIds.length-3} غيره`:'';
  if(!confirm(`دمج ${duplicateIds.length} عميل (${dupNames}${more}) في "${primary?.name||primaryId}"؟\n\nسيتم نقل كل الأوردرات والمتابعات والتصاميم والمرتجعات للأساسي، ثم حذف المحدّدين (soft delete).\n\nملاحظة: لو batch تخطّى 400 عملية، هترفض ولازم تقسّم.`))return;

  if(!window.clientActions?.mergeDuplicates){
    toast('⚠️ النظام يحمّل — حاول بعد لحظات','err');return;
  }
  const btn=groupEl.querySelector('.btn-merge');
  const origBtnText=btn?btn.textContent:'';
  if(btn){btn.disabled=true;btn.textContent=`جاري الدمج (${duplicateIds.length})...`;}
  console.log('[runMergeDuplicates] starting', { primaryId, duplicateIds });
  try{
    const r=await window.clientActions.mergeDuplicates({
      primaryId, duplicateIds,
      userId: currentUser?.uid||'',
      userName: userName||'',
    });
    console.log('[runMergeDuplicates] result', r);
    if(!r.ok){
      console.warn('[mergeDuplicates] failed', r);
      toast('❌ '+(r.errors?.[0]||'فشل الدمج'),'err');
      if(btn){btn.disabled=false;btn.textContent=origBtnText||'🔀 ادمج المحدّدين';}
      return;
    }
    const mc=r.movedCounts||{};
    const parts=[];
    if(mc.orders)         parts.push(`${mc.orders} أوردر`);
    if(mc.transactions)   parts.push(`${mc.transactions} مدفوعة`);
    if(mc.followups)      parts.push(`${mc.followups} متابعة`);
    if(mc.designItems)    parts.push(`${mc.designItems} تصميم`);
    if(mc.returnsTickets) parts.push(`${mc.returnsTickets} مرتجع`);
    toast(`✅ تم الدمج · نُقل ${parts.join(' · ')||'لا شيء'}`,'ok');
    // Refresh scan after Firestore listener catches up
    setTimeout(()=>{if(document.getElementById('ov-dup-scan')?.classList.contains('open'))window.openDupScan();},800);
  }catch(e){
    console.warn('[mergeDuplicates] exception', e);
    toast('❌ '+(e?.message||'خطأ غير متوقع'),'err');
    if(btn){btn.disabled=false;btn.textContent=origBtnText||'🔀 ادمج المحدّدين';}
  }
};

function updateFilterBadge(){
  let count=0;
  if(window.__clientFilter&&window.__clientFilter!=='all') count++;
  const tag=document.getElementById('f-tag');
  const seg=document.getElementById('f-segment');
  const gov=document.getElementById('f-gov');
  const q=document.getElementById('q');
  if(tag&&tag.value) count++;
  if(seg&&seg.value) count++;
  if(gov&&gov.value) count++;
  if(q&&q.value.trim()) count++;
  const pill=document.getElementById('filter-active-pill');
  const cnt=document.getElementById('filter-active-count');
  if(!pill)return;
  if(count>0){pill.classList.add('visible');if(cnt)cnt.textContent='('+count+')';}
  else{pill.classList.remove('visible');}
  // highlight active filters
  const sel=document.getElementById('flt-select');
  if(sel) sel.classList.toggle('flt-active', sel.value!=='all');
  if(tag) tag.classList.toggle('flt-active', !!tag.value);
  if(seg) seg.classList.toggle('flt-active', !!seg.value);
  if(gov) gov.classList.toggle('flt-active', !!gov.value);

  // Badge for the "⚙ فلاتر" mobile-toggle: count only the secondary
  // filters (dropdowns inside the collapsible panel). Search + quick
  // chips are always visible so they don't count here.
  let secCount=0;
  if(sel&&sel.value&&sel.value!=='all') secCount++;
  if(tag&&tag.value) secCount++;
  if(seg&&seg.value) secCount++;
  if(gov&&gov.value) secCount++;
  const secBadge=document.getElementById('cl-filters-active-count');
  if(secBadge){
    if(secCount>0){secBadge.textContent=String(secCount);secBadge.classList.remove('hide');}
    else{secBadge.textContent='';secBadge.classList.add('hide');}
  }
}

window.renderControlGrid=function(){
  if(window.__statusTab!=='cgrid') return;
  const data=cgridGetSorted(cgridGetFiltered());

  // God-page decomp PR-25: option helpers in clients-data.js.
  if(!__cgEmpPopulated){
    __cgEmpPopulated=true;
    const empSel=document.getElementById('cg-f-emp');
    if(empSel) cgridEmployeeOptions(allOrders).forEach(({uid,name})=>{
      const opt=document.createElement('option');opt.value=uid;opt.textContent=name;empSel.appendChild(opt);
    });
  }
  if(!__cgGovPopulated){

    const govSel=document.getElementById('cg-f-gov');
    if(govSel) cgridGovernorateOptions(allOrders).forEach(g=>{
      const opt=document.createElement('option');opt.value=g;opt.textContent=g;govSel.appendChild(opt);
    });
  }

  // God-page decomp PR-10: stats KPI markup extracted to clients-render.js
  // (window.controlGridStatsHTML). Wrapper computes via the pure builder.
  const statsEl=document.getElementById('cg-stats-row');
  if(statsEl) statsEl.innerHTML=controlGridStatsHTML({data,calcRem,fn,selectedCount:__cgSel.size});

  const tbody=document.getElementById('cgrid-body');

  const fmtDate=ts=>{
    if(!ts) return '—';
    const d=ts.toDate?ts.toDate():(ts.seconds?new Date(ts.seconds*1000):null);
    if(!d) return '—';
    return d.toLocaleDateString('ar-EG',{day:'2-digit',month:'2-digit',year:'2-digit'});
  };

  // God-page decomp PR-11: per-row HTML extracted to clients-render.js
  // (window.controlGridRowHTML). Wrapper computes per-row state then delegates.
  const rowCtx={
    designers, calcRem, fn, fmtDate,
    CGRID_STATUS_BG, CGRID_STATUS_CLR, CGRID_STATUS_MAP,
  };
  tbody.innerHTML=data.map(o=>{
    const txList=(txByOrder.get(o._id)||[])
      .filter(tx=>tx.type==='in'&&tx.amount>0)
      .sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
    return controlGridRowHTML(o,{
      ...rowCtx,
      isSel: __cgSel.has(o._id),
      isEdit: __cgEditRows.has(o._id),
      status: cgridGetDisplayStatus(o),
      txList,
    });

  const inp=document.createElement('input');
  inp.className='cg-inp';inp.type=type;
  inp.value=currentVal;
  td.innerHTML='';td.appendChild(inp);inp.focus();inp.select();
  const save=()=>{
    const nv=type==='number'?(parseFloat(inp.value)||0):inp.value.trim();
    if(nv.toString()===currentVal.toString()){td.innerHTML=orig;return;}
    cgridSaveField(orderId,field,nv,currentVal);
  };
  inp.onblur=save;
  inp.onkeydown=e=>{if(e.key==='Enter'){inp.blur();}if(e.key==='Escape'){td.innerHTML=orig;}};
};

  extra=extra||{};

// P1.6+P1.7 — Thin orchestration over window.orderActions.editOrderPayment.
// Locked-tx prompt + edit reason stay in the page (UX behavior). The page
// passes editReason to the action; action handles atomic batch + ledger.
window.cgridSaveFinancial=async function(orderId,field,newVal,oldVal,walletId){
  const o=allOrders.find(x=>x._id===orderId);if(!o)return;
  const FIELD_AR={salePrice:'السعر',totalPaid:'المدفوع',discount:'الخصم'};
  const fLabel=FIELD_AR[field]||field;

  // ══ Locked-tx warning + edit-reason prompt (UI behavior — stays here) ══
  let editReason = '';
  if(field==='totalPaid' || field==='salePrice' || field==='discount'){
    try{
      const txSnap = await getDocs(query(collection(db,'transactions_v2'),
        where('orderId','==',orderId)));
      const lockedTxs = txSnap.docs.map(d=>({...d.data(),_id:d.id}))
        .filter(t => t.isLocked === true && !t.isReversal);
      if(lockedTxs.length > 0){
        const totalLocked = lockedTxs.reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
        const txsList = lockedTxs.slice(0,5).map(t=>`• ${t.description||t.category||'حركة'} — ${fn(t.amount)} ج (${t.type==='in'?'دخل':'خرج'})`).join('\n');
        const more = lockedTxs.length > 5 ? `\n• +${lockedTxs.length-5} حركات أخرى` : '';
        const warn = `⚠️ هذا الأوردر فيه ${lockedTxs.length} معاملات معتمدة ومقفولة!\n\nمجموع المعاملات: ${fn(totalLocked)} ج\n\n${txsList}${more}\n\nالتعديل المباشر على ${fLabel} قد يخلق فجوة بين الأوردر والـ tx.\n\n⛔ التعديل يجب أن يتم عبر:\n1. طلب استرداد (لو totalPaid)\n2. أو عبر tx جديدة\n\nاضغط OK للمتابعة (سيُسجَّل التعديل في timeline + قيد ledger).`;
        if(!confirm(warn)) return;
        const reason = prompt('سبب التعديل (إجباري — سيُحفظ في timeline والـ ledger):');
        if(!reason || !reason.trim()) return;
        editReason = reason.trim();
      }
    }catch(e){
      console.warn('[cgridSaveFinancial] check locked tx error:', e?.message);
    }
  }

  if(!window.orderActions){toast('⚠️ النظام يحمّل','err');return;}

  const wEl=walletId?wallets.find(x=>x._id===walletId):null;
  const tlAction = editReason
    ? `💰 [أدمن] تعديل ${fLabel}: "${fn(oldVal)}" → "${fn(newVal)}" ج · سبب: ${editReason}`
    : `💰 [أدمن] تعديل ${fLabel}: "${fn(oldVal)}" → "${fn(newVal)}" ج`;

  try{
    const r = await window.orderActions.editOrderPayment({
      orderId,
      changes: { [field]: parseFloat(newVal)||0 },
      walletId: walletId||'',
      walletName: wEl?.name||'',
      changesLabel: tlAction,
      editReason,
      userId: currentUser?.uid||'',
      userName: userName||'admin',
    });
    if(!r.ok){
      console.warn('[orderActions] editOrderPayment failed', r);
      toast('❌ '+(r.errors?.[0]||'فشل الحفظ'),'err');
      return;
    }
    toast('✅ تم الحفظ وتحديث الحسابات','ok');
  }catch(e){
    console.warn('[orderActions] editOrderPayment exception', e);
    toast('❌ '+(e?.message||'خطأ'),'err');
  }
};

window.cgridSaveStatus=async function(orderId,newStatus,oldStatus){
  if(newStatus===oldStatus)return;
  const o=allOrders.find(x=>x._id===orderId);if(!o)return;
  const mapping=CGRID_STATUS_MAP[newStatus]||{};
  // الأرشفة تمر عبر buildArchiveSpec المركزي (RULE C1.3)
  if(mapping.stage==='archived'){
    // archive path — يستخدم orderActions.archiveOrder (pre-flight + central spec)
    const preview=window.buildArchiveSpec?window.buildArchiveSpec({order:o,role:currentRole,userId:currentUser?.uid||'',userName:userName||'admin',source:'status_change',reason:`تغيير الحالة: "${oldStatus}" → "${newStatus}"`}):null;
    if(preview?.errors?.length){toast('⛔ '+preview.errors.join(' · '),'err');return;}
    let bypass=false;
    if(preview?.needsConfirmation){
      if(!confirm('⚠️ '+(preview.warnings||[]).join(' · ')+'\n\nالمتابعة بالأرشفة؟'))return;
      bypass=true;
    }
    const r=await window.orderActions.archiveOrder({db,orderId,role:currentRole,userId:currentUser?.uid||'',userName:userName||'admin',source:'status_change',reason:`تغيير الحالة: "${oldStatus}" → "${newStatus}"`,bypassWarnings:bypass});
    if(!r.ok)return toast('⛔ '+(r.errors||[]).join(' · '),'err');
    toast('✅ الحالة: '+newStatus,'ok');
    return;
  }
  // الانتقالات الأخرى — generic field update
  const changes={...mapping,hasProblem:newStatus==='مشكلة'?true:(mapping.hasProblem||false)};
  const r=await window.orderActions.updateOrderField({db,orderId,changes,timelineAction:`🔄 [أدمن] تغيير الحالة: "${oldStatus}" → "${newStatus}"`,userId:currentUser?.uid||'',userName:userName||'admin'});
  if(!r.ok)return toast('❌ '+(r.errors||[]).join(' · '),'err');
  toast('✅ الحالة: '+newStatus,'ok');
};

window.cgridBulkAction=async function(action){
  if(__cgSel.size===0){toast('حدد أوردرات أولاً','err');return;}
  const ids=[...__cgSel];
  const ords=allOrders.filter(o=>ids.includes(o._id));

  if(action==='export'){cgridExportSelected(ords);return;}

  // P1.8 — كل العمليات الجماعية تمر عبر orderActions المركزي (RULE A1 + C1.3)
  if(!window.orderActions){toast('⏳ جاري تحميل الوحدات…','err');return;}
  const ctx={role:currentRole,userId:currentUser?.uid||'',userName:userName||'admin'};

  if(action==='archive'){
    if(!confirm(`أرشفة ${ids.length} أوردر؟`))return;
    const r=await window.orderActions.bulkArchive({orderIds:ids,...ctx});
    if(!r.ok){toast(r.errors?.[0]||'فشل الأرشفة','err');return;}
    logAudit('orders.bulk_archive',{count:r.count,blocked:r.blocked||0,orderIds:(r.orderIds||[]).slice(0,50)});
    toast(`✅ تم أرشفة ${r.count}${r.blocked?` (تخطّينا ${r.blocked})`:''}`,'ok');cgridSelNone();return;
  }

  if(action==='reopen'){
    if(!confirm(`إعادة فتح ${ids.length} أوردر؟`))return;
    const r=await window.orderActions.bulkReopen({orderIds:ids,...ctx});
    if(!r.ok){toast(r.errors?.[0]||'فشل إعادة الفتح','err');return;}
    logAudit('orders.bulk_reopen',{count:r.count,orderIds:(r.orderIds||[]).slice(0,50)});
    toast(`✅ إعادة فتح ${r.count} أوردر`,'ok');cgridSelNone();return;
  }

  if(action==='stage'){
    const choice=prompt(window.__buildBulkStagePrompt?.(CGRID_STATUS_MAP,ids.length)||'');
    if(!choice||!CGRID_STATUS_MAP[choice]){toast('الحالة غير صحيحة','err');return;}
    if(!confirm(`نقل ${ids.length} أوردر إلى "${choice}"؟`))return;
    const r=await window.orderActions.bulkStageMove({
      orderIds:ids, target:choice, mapping:CGRID_STATUS_MAP[choice], ...ctx,
    });
    if(!r.ok){toast(r.errors?.[0]||'فشل النقل','err');return;}
    logAudit('orders.bulk_stage_change',{count:r.count,target:choice,blocked:r.blocked||0,orderIds:(r.orderIds||[]).slice(0,50)});
    toast(`✅ ${r.count} → ${choice}${r.blocked?` (تخطّينا ${r.blocked})`:''}`,'ok');cgridSelNone();return;
  }

  if(action==='assign'){
    const nm=prompt(window.__buildBulkAssignPrompt?.(designers)||'');
    const emp=window.__findDesignerByName?.(nm,designers);
    if(!emp){toast('الموظف غير موجود','err');return;}
    if(!confirm(`تعيين "${emp.name||emp.displayName}" على ${ids.length} أوردر؟`))return;
    const r=await window.orderActions.bulkAssign({
      orderIds:ids,
      employeeId:emp._id||emp.uid||'',
      employeeName:emp.name||emp.displayName||'',
      ...ctx,
    });
    if(!r.ok){toast(r.errors?.[0]||'فشل التعيين','err');return;}
    toast(`✅ تم التعيين على ${r.count} أوردر`,'ok');cgridSelNone();return;
  }
};

// P1.7 — Thin orchestration over window.orderActions.editOrderPayment.
// Handles multi-field row edit including optional financial side-effect.
window.cgridSaveRowEdit=async function(orderId){
  const row=document.querySelector(`tr[data-id="${orderId}"]`);if(!row)return;
  const o=allOrders.find(x=>x._id===orderId);if(!o)return;

  const newName=(row.querySelector('[data-field="clientName"]')?.value||'').trim()||o.clientName||'';
  const newBiz=(row.querySelector('[data-field="clientBusiness"]')?.value||'').trim();
  const newSale=parseFloat(row.querySelector('[data-field="salePrice"]')?.value)||0;
  const newPaid=parseFloat(row.querySelector('[data-field="totalPaid"]')?.value)||0;
  const newEmpUid=row.querySelector('[data-field="assignedTo"]')?.value||'';

  const oldName=o.clientName||'';
  const oldBiz=o.clientBusiness||o.job||'';
  const oldSale=parseFloat(o.salePrice)||0;
  const oldPaid=parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0;
  const oldEmpUid=o.assignedTo||o.designerId||o.productionAgent||'';

  const changes=[];
  const changeFields={};
  if(newName!==oldName){ changes.push(`الاسم: "${oldName}"→"${newName}"`); changeFields.clientName=newName; }
  if(newBiz!==oldBiz){   changes.push(`الشركة: "${oldBiz}"→"${newBiz}"`); changeFields.clientBusiness=newBiz; }
  if(Math.abs(newSale-oldSale)>0.01){ changes.push(`السعر: ${fn(oldSale)}→${fn(newSale)} ج`); changeFields.salePrice=newSale; }
  if(Math.abs(newPaid-oldPaid)>0.01){ changes.push(`المدفوع: ${fn(oldPaid)}→${fn(newPaid)} ج`); changeFields.totalPaid=newPaid; }
  const emp=designers.find(e=>e._id===newEmpUid||e.uid===newEmpUid);
  if(newEmpUid&&newEmpUid!==oldEmpUid&&emp){
    changes.push('تغيير الموظف');
    changeFields.assignedTo=newEmpUid;
    changeFields.csName=emp.name||emp.displayName||'';
  }

  if(!changes.length){cgridCancelEdit(orderId);return;}
  if(!window.orderActions){toast('⚠️ النظام يحمّل','err');return;}

  const paidDiff=newPaid-oldPaid;
  const wId=o.depositWalletId||o.walletId||'';
  const w=wId?wallets.find(x=>x._id===wId):null;
  const tlLabel=`✏️ [أدمن] ${changes.join(' | ')}`;

  try{
    const r=await window.orderActions.editOrderPayment({
      orderId,
      changes: changeFields,
      walletId: Math.abs(paidDiff)>0.01 ? wId : '',
      walletName: w?.name||'',
      changesLabel: tlLabel,
      userId: currentUser?.uid||'',
      userName: userName||'admin',
    });
    if(!r.ok){
      console.warn('[orderActions] cgridSaveRowEdit failed', r);
      toast('❌ '+(r.errors?.[0]||'فشل الحفظ'),'err');
      return;
    }
    __cgEditRows.delete(orderId);
    toast('✅ تم الحفظ','ok');
  }catch(e){
    console.warn('[orderActions] cgridSaveRowEdit exception', e);
    toast('❌ '+(e?.message||'خطأ'),'err');
  }
};

window.cgridDeleteOrder=async function(orderId){
  const o=allOrders.find(x=>x._id===orderId);if(!o)return;
  if(!confirm(`⚠️ حذف أوردر "${o.clientName||''}" نهائياً؟\nسيُحذف من كل السجلات ولا يمكن التراجع.`))return;
  if(!confirm('تأكيد الحذف النهائي؟'))return;
  // H1.1 fix: المرّر عبر orderActions.deleteOrderWithRefund (atomic + idempotent + FSE ledger)
  const r=await window.orderActions.deleteOrderWithRefund({
    orderId,
    userId:currentUser?.uid||'',
    userName:userName||'admin',
  });
  if(!r.ok){
    const handled=window.financialGuard?.(new Error(r.errors?.[0]||'فشل الحذف'),{operation:'حذف أوردر مع استرداد',clientName:o.clientName,orderId});
    if(!handled)toast('❌ '+(r.errors||[]).join(' · '),'err');
    return;
  }
  if(r.idempotent&&!r.pending)return toast('ℹ️ الأوردر محذوف مسبقاً','ok');
  toast(`✅ تم الحذف النهائي${r.refundedAmount>0?` — استرداد ${fn(r.refundedAmount)} ج`:''}`,'ok');
};
