<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0f1c">
<title>Business2Card — لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="sync-monitor.js"></script>
<style>
/* ══ Mobile First Dashboard ══ */
.dash-hero{
  background:linear-gradient(135deg,rgba(255,61,110,.12) 0%,rgba(167,139,250,.08) 100%);
  border:1px solid rgba(255,61,110,.15);
  border-radius:20px;padding:20px;margin-bottom:16px;
  position:relative;overflow:hidden;
}
.dash-hero::before{
  content:'';position:absolute;top:-40px;left:-40px;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(255,61,110,.1),transparent 70%);
  pointer-events:none;
}
.dash-greeting{font-size:22px;font-weight:900;margin-bottom:4px}
.dash-date{font-size:12px;color:var(--dim2);font-weight:600}

/* ══ KPI Grid ══ */
.kpi-grid-dash{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.kpi-d{
  background:var(--bg2);border:1px solid var(--line);
  border-radius:16px;padding:14px;position:relative;overflow:hidden;
  cursor:pointer;transition:transform .15s;
  -webkit-tap-highlight-color:transparent;
}
.kpi-d:active{transform:scale(.97)}
.kpi-d.accent-r{border-top:3px solid var(--r)}
.kpi-d.accent-g{border-top:3px solid var(--g)}
.kpi-d.accent-b{border-top:3px solid var(--b)}
.kpi-d.accent-y{border-top:3px solid var(--y)}
.kpi-d.accent-p{border-top:3px solid var(--p)}
.kpi-d.wide{grid-column:span 2}
.kpi-d-ico{font-size:20px;margin-bottom:6px}
.kpi-d-val{font-size:24px;font-weight:900;line-height:1}
.kpi-d-lbl{font-size:10px;color:var(--dim2);font-weight:700;margin-top:4px}
.kpi-d-diff{font-size:10px;margin-top:4px;font-weight:700}

/* ══ Pipeline ══ */
.pipe-wrap{
  background:var(--bg2);border:1px solid var(--line);
  border-radius:16px;padding:14px;margin-bottom:16px;
}
.pipe-title{font-size:12px;font-weight:800;color:var(--dim2);margin-bottom:12px}
.pipe-steps{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.pipe-steps::-webkit-scrollbar{display:none}
.pipe-step{
  flex:0 0 auto;min-width:64px;text-align:center;cursor:pointer;
  padding:8px 6px;border-radius:10px;transition:background .15s;
  -webkit-tap-highlight-color:transparent;
  position:relative;
}
.pipe-step:active{background:var(--bg3)}
.pipe-step::after{
  content:'→';position:absolute;left:-8px;top:50%;transform:translateY(-50%);
  font-size:10px;color:var(--dim);
}
.pipe-step:first-child::after{display:none}
.pipe-ico{font-size:18px;margin-bottom:4px}
.pipe-lbl{font-size:9px;color:var(--dim2);font-weight:700;margin-bottom:4px}
.pipe-num{font-size:20px;font-weight:900}
.pipe-late{font-size:9px;color:var(--r);font-weight:700;min-height:14px}

/* ══ Quick Links ══ */
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.quick-card{
  background:var(--bg2);border:1px solid var(--line);
  border-radius:14px;padding:12px 8px;text-align:center;
  text-decoration:none;cursor:pointer;
  transition:transform .15s,border-color .15s;
  -webkit-tap-highlight-color:transparent;display:block;
}
.quick-card:active{transform:scale(.95)}
.qc-ico{font-size:22px;margin-bottom:4px}
.qc-name{font-size:11px;font-weight:800;color:var(--snow);white-space:nowrap}
.qc-badge{
  font-size:10px;font-weight:900;
  background:var(--r);color:#fff;
  border-radius:10px;padding:1px 6px;
  display:inline-block;margin-top:3px;
  min-width:18px;
}
.qc-badge.green{background:var(--g)}
.qc-badge.yellow{background:var(--y)}
.qc-badge.hide{visibility:hidden}

/* ══ Alerts ══ */
.alerts-wrap{
  background:var(--bg2);border:1px solid var(--line);
  border-radius:16px;overflow:hidden;margin-bottom:16px;
}
.alerts-head{
  padding:12px 16px;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
}
.alert-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;border-bottom:1px solid var(--line);
  cursor:pointer;transition:background .1s;
  -webkit-tap-highlight-color:transparent;
}
.alert-item:last-child{border-bottom:none}
.alert-item:active{background:var(--bg3)}
.alert-ico{font-size:18px;flex-shrink:0}
.alert-body{flex:1;min-width:0}
.alert-title{font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alert-sub{font-size:10px;color:var(--dim2);margin-top:1px}

/* ══ Active Orders ══ */
.orders-wrap{
  background:var(--bg2);border:1px solid var(--line);
  border-radius:16px;overflow:hidden;margin-bottom:16px;
}
.ord-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border-bottom:1px solid var(--line);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.ord-item:last-child{border-bottom:none}
.ord-item:active{background:var(--bg3)}
.ord-name{font-size:13px;font-weight:800}
.ord-prod{font-size:10px;color:var(--dim2);margin-top:2px}
.ord-stage{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--bg3)}

/* ══ Financial Strip ══ */
.fin-strip{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  margin-bottom:16px;
}
.fin-cell{
  background:var(--bg2);border:1px solid var(--line);
  border-radius:12px;padding:12px 14px;
}
.fin-lbl{font-size:10px;color:var(--dim2);font-weight:700;margin-bottom:4px}
.fin-val{font-size:16px;font-weight:900}

/* ══ Section Head ══ */
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-title{font-size:13px;font-weight:800}
.sec-link{font-size:11px;color:var(--b);font-weight:700;text-decoration:none}

/* ══ Progress Bar ══ */
.prog{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:3px}

/* ══ Mobile Bottom Nav ══ */
.mob-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--bg1);border-top:1px solid var(--line);
  padding:8px 0 max(8px,env(safe-area-inset-bottom));
  z-index:100;
}
@media(max-width:768px){
  /* ── Layout ── */
  .mob-nav{display:block}
  .main{padding-bottom:80px}
  .sidenav{display:none!important}
  .content{padding:12px}

  /* ── KPIs ── */
  .kpi-grid-dash{gap:8px}
  .kpi-d-val{font-size:20px}
  .kpi-d-lbl{font-size:11px}

  /* ── Pipeline ── */
  .pipe-num{font-size:18px}
  .pipe-lbl{font-size:10px}
  .pipe-ico{font-size:16px}
  .pipe-late{font-size:10px}

  /* ── Quick Links ── */
  .quick-grid{grid-template-columns:repeat(4,1fr);gap:6px}
  .qc-ico{font-size:20px}
  .qc-name{font-size:10px}

  /* ── Alerts ── */
  .alert-title{font-size:13px}
  .alert-sub{font-size:11px}

  /* ── Orders ── */
  .ord-name{font-size:13px}
  .ord-prod{font-size:11px}
  .ord-stage{font-size:11px}

  /* ── Financial ── */
  .fin-val{font-size:15px}
  .fin-lbl{font-size:11px}

  /* ── Topbar ── */
  .topbar{padding:10px 14px}
  .dash-greeting{font-size:18px}
  .dash-date{font-size:11px}
}

@media(max-width:380px){
  /* ── شاشات صغيرة جداً ── */
  .kpi-d-val{font-size:18px}
  .quick-grid{gap:4px}
  .qc-ico{font-size:18px}
  .qc-name{font-size:9px}
  .fin-strip{grid-template-columns:1fr 1fr}
  .fin-val{font-size:14px}
}
.mob-nav-items{display:flex;justify-content:space-around}
.mob-nav-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  text-decoration:none;padding:4px 10px;border-radius:10px;
  transition:background .15s;-webkit-tap-highlight-color:transparent;
  min-width:56px;
}
.mob-nav-item.active .mob-nav-ico{color:var(--r)}
.mob-nav-item.active .mob-nav-lbl{color:var(--r)}
.mob-nav-ico{font-size:20px;color:var(--dim2)}
.mob-nav-lbl{font-size:9px;color:var(--dim2);font-weight:700}

/* ══ Badge on nav ══ */
.nav-badge-wrap{position:relative;display:inline-block}
.nav-badge{
  position:absolute;top:-4px;left:-4px;
  background:var(--r);color:#fff;
  font-size:8px;font-weight:900;
  border-radius:8px;padding:1px 4px;min-width:14px;text-align:center;
}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand">
    <div class="nav-logo">🎨</div>
    <div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">ERP</div></div>
  </div>
  <div class="nav-scroll" id="nav-scroll-dynamic"></div>

<div class="main">

        <div class="dash-greeting" id="dash-greeting">أهلاً 👋</div>
        <div class="dash-date" id="dash-date"></div>
      </div>
    </div>
    <div class="topbar-right">

    </div>

  <div class="content">

    <!-- KPIs الرئيسية -->
    <div class="kpi-grid-dash" id="kpi-grid">

      <div class="kpi-d accent-g wide" onclick="location.href='accounts.html'" style="display:flex;align-items:center;justify-content:space-between">

        <div class="sec-title">🔄 Pipeline</div>

      <div class="pipe-steps">

          <div class="pipe-late" id="p-print-late"></div>

        <div class="pipe-step" onclick="location.href='production.html'" style="flex-direction:column;display:flex;align-items:center">

          <div class="pipe-late" id="p-prod-late"></div>

        <div class="pipe-step" onclick="location.href='shipping.html'" style="flex-direction:column;display:flex;align-items:center">

<script type="module">
import {initializeApp} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getAuth,onAuthStateChanged,signOut} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {getFirestore,collection,doc,onSnapshot,getDoc} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"});
const auth=getAuth(app),db=getFirestore(app);

// ══ Sidebar ══
const SBPAGES=[{file:'index.html',label:'لوحة التحكم',ico:'⬡',adminOnly:true},{file:'clients.html',label:'العملاء',ico:'👤',perm:'clients'},{file:'design.html',label:'التصميم',ico:'✏️',perm:'design'},{file:'print.html',label:'الطباعة',ico:'🖨️',perm:'print'},{file:'production.html',label:'التنفيذ',ico:'🏭',perm:'production'},{file:'shipping.html',label:'الشحن',ico:'🚚',perm:'shipping'},{file:'shipping-accounts.html',label:'حسابات الشحن',ico:'📦',perm:'shipping-accounts'},{file:'archive.html',label:'الأرشيف',ico:'📁',perm:'archive'},{file:'accounts.html',label:'الحسابات',ico:'💰',perm:'accounts'},{file:'suppliers.html',label:'الموردين',ico:'▣',perm:'suppliers'},{file:'products.html',label:'المنتجات',ico:'◈',perm:'products'},{file:'employees.html',label:'الموظفين',ico:'👥',adminOnly:true},{file:'reports.html',label:'التقارير',ico:'📊',perm:'reports'},{file:'settings.html',label:'الإعدادات',ico:'⚙️',adminOnly:true}];
function buildSidebar(ud,cur){const role=ud?.role||'customer_service';const pages=(ud?.permissions?.pages)||[];const isAdm=['admin','operation_manager'].includes(role);const nav=document.getElementById('nav-scroll-dynamic');if(!nav)return;let html=`<a class="nav-link active" href="index.html"><span class="nav-ico">⬡</span> لوحة التحكم</a>`;for(const p of SBPAGES){if(p.file==='index.html')continue;const ok=isAdm||(p.adminOnly?false:pages.includes('*')||pages.includes(p.perm||''));if(!ok)continue;html+=`<a class="nav-link${cur===p.file?' active':''}" href="${p.file}"><span class="nav-ico">${p.ico}</span> ${p.label}</a>`;}nav.innerHTML=html;}

const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const setText=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
const stageAr=s=>({design:'تصميم',printing:'طباعة',production:'تنفيذ',shipping:'شحن'}[s]||s);
const stageHref=s=>({printing:'print',production:'production',design:'design',shipping:'shipping'}[s]||s);
const delay=dl=>{if(!dl)return 0;const d=new Date(dl);const now=new Date();return d<now?Math.floor((now-d)/(864e5)):0;};

let allOrders=[],clients=[],wallets=[],transactions=[];
let currentRole='admin';

// ══ Date & Greeting ══
const now=new Date(),h=now.getHours();
const greet=h<12?'صباح الخير':h<17?'مساء النور':'مساء الخير';
const days=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
document.getElementById('dash-date').textContent=`${days[now.getDay()]} · ${now.toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'})}`;

// ══ Quick Links ══
const ALL_LINKS=[
  {ico:'👤',name:'العملاء',href:'clients.html',perm:'clients',col:'var(--b)',kpiId:'k-clients'},
  {ico:'✏️',name:'التصميم',href:'design.html',perm:'design',col:'var(--p)',kpiId:'p-design'},
  {ico:'🖨️',name:'الطباعة',href:'print.html',perm:'print',col:'var(--y)',kpiId:'p-print'},
  {ico:'🏭',name:'التنفيذ',href:'production.html',perm:'production',col:'var(--r)',kpiId:'p-prod'},
  {ico:'🚚',name:'الشحن',href:'shipping.html',perm:'shipping',col:'var(--c)',kpiId:'p-ship'},
  {ico:'💰',name:'الحسابات',href:'accounts.html',perm:'accounts',col:'var(--g)'},
  {ico:'▣',name:'الموردين',href:'suppliers.html',perm:'suppliers',col:'var(--y)'},
  {ico:'📊',name:'التقارير',href:'reports.html',perm:'reports',col:'var(--p)'},
];

function renderQuickLinks(ud){
  const role=ud?.role||'admin';
  const pages=ud?.permissions?.pages||[];
  const isAdm=['admin','operation_manager'].includes(role);
  const links=ALL_LINKS.filter(l=>isAdm||pages.includes('*')||pages.includes(l.perm));
  document.getElementById('quick-grid').innerHTML=links.slice(0,8).map(l=>`
    <a class="quick-card" href="${l.href}" style="border-top:2px solid ${l.col}20">
      <div class="qc-ico">${l.ico}</div>
      <div class="qc-name">${l.name}</div>
      <div class="qc-badge hide" id="qb-${l.href.replace('.html','')}">0</div>
    </a>`).join('');
}

// ══ Auth ══
let __started=false;
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  if(__started)return;__started=true;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(snap.exists()){
    const d=snap.data();
    currentRole=d.role||'admin';
    document.getElementById('nav-name').textContent=d.name||u.email;
    document.getElementById('nav-av').textContent=(d.name||'A')[0].toUpperCase();
    document.getElementById('role-badge').textContent=d.role||'admin';
    document.getElementById('dash-greeting').textContent=`${greet}، ${d.name?.split(' ')[0]||''} 👋`;
    buildSidebar(d,'index.html');
    renderQuickLinks(d);
    startListeners();
  }
});

function startListeners(){
  onSnapshot(collection(db,'orders'),snap=>{
    allOrders=snap.docs.map(d=>({...d.data(),_id:d.id}));
    updateKPIs();renderPipeline();renderAlerts();renderOrders();updateBadges();
  });
  onSnapshot(collection(db,'clients'),snap=>{
    clients=snap.docs.map(d=>({...d.data(),_id:d.id}));updateKPIs();
  });
  onSnapshot(collection(db,'wallets'),snap=>{
    wallets=snap.docs.map(d=>({...d.data(),_id:d.id}));renderFinStrip();
  });
  onSnapshot(collection(db,'transactions_v2'),snap=>{
    transactions=snap.docs.map(d=>({...d.data(),_id:d.id})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    renderFinStrip();
  });
}

// ══ KPIs ══
function updateKPIs(){
  const monthStart=new Date();monthStart.setDate(1);monthStart.setHours(0,0,0,0);
  const active=allOrders.filter(o=>o.stage!=='archived');
  const monthOrds=allOrders.filter(o=>o.createdAt?.toDate?.()>=monthStart||o.createdAt?.seconds*1000>=monthStart.getTime());

  // المحصّل فعلاً
  const revenue=monthOrds.reduce((s,o)=>s+(parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0),0);
  const contractVal=monthOrds.reduce((s,o)=>s+(parseFloat(o.salePrice)||0),0);
  const pct=contractVal>0?Math.min(revenue/contractVal*100,100):0;

  // الباقي
  const remaining=active.reduce((s,o)=>{
    const sale=parseFloat(o.salePrice)||0;
    const paid=parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0;
    return s+Math.max(0,sale-paid);
  },0);

  setText('k-clients',clients.length);
  setText('k-revenue',fn(revenue)+' ج');
  setText('k-remaining',fn(remaining)+' ج');
  setText('k-active',active.length);

  // progress bar للمحصّل
  const prog=document.getElementById('k-rev-prog');
  if(prog)prog.style.width=pct+'%';
}

// ══ Pipeline ══
function renderPipeline(){
  const stages={design:0,printing:0,production:0,shipping:0,archived:0};
  const late={design:0,printing:0,production:0,shipping:0};
  allOrders.forEach(o=>{
    if(stages[o.stage]!==undefined)stages[o.stage]++;
    if(o.stage!=='archived'&&o.deadline&&delay(o.deadline)>0&&late[o.stage]!==undefined)late[o.stage]++;
  });
  const active=allOrders.filter(o=>o.stage!=='archived').length;
  setText('pipe-total',active+' أوردر نشط');
  setText('p-design',stages.design);
  setText('p-print',stages.printing);
  setText('p-prod',stages.production);
  setText('p-ship',stages.shipping);
  setText('p-done',stages.archived);
  const lateEl=(id,n)=>{const e=document.getElementById(id);if(e)e.textContent=n>0?`⚠️ ${n} متأخر`:'';};
  lateEl('p-design-late',late.design);
  lateEl('p-print-late',late.printing);
  lateEl('p-prod-late',late.production);
  lateEl('p-ship-late',late.shipping);
}

// ══ Alerts ══
function renderAlerts(){
  const el=document.getElementById('alerts-list');
  const wrap=document.getElementById('alerts-wrap');
  if(!el)return;
  const alerts=[];
  const active=allOrders.filter(o=>o.stage!=='archived');
  active.filter(o=>o.deadline&&delay(o.deadline)>0).slice(0,5).forEach(o=>{
    alerts.push({ico:'⏰',col:'var(--r)',title:`متأخر — ${o.clientName||'—'}`,sub:`${delay(o.deadline)} يوم · ${stageAr(o.stage)}`,href:stageHref(o.stage)+'.html'});
  });
  active.filter(o=>{const p=parseFloat(o.totalPaid)||parseFloat(o.paid)||0;const r=Math.max(0,(parseFloat(o.salePrice)||0)-p);return r>1000;}).slice(0,3).forEach(o=>{
    const p=parseFloat(o.totalPaid)||parseFloat(o.paid)||0;
    const r=Math.max(0,(parseFloat(o.salePrice)||0)-p);
    alerts.push({ico:'💰',col:'var(--y)',title:`باقي — ${o.clientName||'—'}`,sub:`${fn(r)} ج · ${stageAr(o.stage)}`,href:stageHref(o.stage)+'.html'});
  });
  if(wrap)wrap.style.display=alerts.length?'block':'none';
  setText('alerts-count',alerts.length+' تنبيه');
  el.innerHTML=alerts.length?alerts.map(a=>`
    <div class="alert-item" onclick="location.href='${a.href}'">
      <div class="alert-ico">${a.ico}</div>
      <div class="alert-body">
        <div class="alert-title" style="color:${a.col}">${a.title}</div>
        <div class="alert-sub">${a.sub}</div>
      </div>
      <div style="color:var(--dim2);font-size:16px">›</div>
    </div>`).join(''):'';
}

// ══ Recent Orders ══
function renderOrders(){
  const el=document.getElementById('active-orders');if(!el)return;
  const COLS={design:'var(--p)',printing:'var(--b)',production:'var(--r)',shipping:'var(--c)',archived:'var(--g)'};
  const recent=allOrders.filter(o=>o.stage!=='archived')
    .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)).slice(0,10);
  if(!recent.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--dim2);font-size:12px">لا توجد أوردرات نشطة</div>';return;}
  el.innerHTML=recent.map(o=>{
    const sale=parseFloat(o.salePrice)||0;
    const paid=parseFloat(o.totalPaid)||parseFloat(o.paid)||0;
    const rem=Math.max(0,sale-paid);
    const isLate=o.deadline&&delay(o.deadline)>0;
    return`<div class="ord-item" onclick="location.href='${stageHref(o.stage)}.html'" style="${isLate?'background:rgba(255,61,110,.03)':''}">
      <div style="flex:1;min-width:0">
        <div class="ord-name">${o.clientName||'—'} ${isLate?'<span style="color:var(--r);font-size:10px">⚠️</span>':''}</div>
        <div class="ord-prod">${o.product||(o.products||[]).map(p=>p.name).join('+')||'—'}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
        <span class="ord-stage" style="color:${COLS[o.stage]||'var(--dim2)'}">${stageAr(o.stage)}</span>
        ${rem>0?`<span style="font-size:10px;color:var(--r);font-weight:800">${fn(rem)} ج</span>`:''}
      </div>
    </div>`;
  }).join('');
}

// ══ Financial Strip ══
function renderFinStrip(){
  const el=document.getElementById('fin-strip');if(!el)return;
  const totalBal=wallets.reduce((s,w)=>s+(parseFloat(w.balance)||0),0);
  const monthStart=new Date();monthStart.setDate(1);monthStart.setHours(0,0,0,0);
  const monthTx=transactions.filter(t=>t.createdAt?.seconds*1000>=monthStart.getTime());
  const mIn=monthTx.filter(t=>t.type==='in').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const mOut=monthTx.filter(t=>t.type==='out').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const net=mIn-mOut;
  el.innerHTML=`
    <div class="fin-cell" onclick="location.href='accounts.html'">
      <div class="fin-lbl">💼 إجمالي الأرصدة</div>
      <div class="fin-val" style="color:var(--g)">${fn(totalBal)} ج</div>
    </div>
    <div class="fin-cell" onclick="location.href='accounts.html'">
      <div class="fin-lbl">📥 دخل الشهر</div>
      <div class="fin-val" style="color:var(--b)">${fn(mIn)} ج</div>
    </div>
    <div class="fin-cell" onclick="location.href='accounts.html'">
      <div class="fin-lbl">📤 مصروف الشهر</div>
      <div class="fin-val" style="color:var(--r)">${fn(mOut)} ج</div>
    </div>
    <div class="fin-cell" onclick="location.href='accounts.html'">
      <div class="fin-lbl">📈 صافي الشهر</div>
      <div class="fin-val" style="color:${net>=0?'var(--g)':'var(--r)'}">${fn(Math.abs(net))} ج</div>
    </div>`;
}

// ══ Mobile Badges ══
function updateBadges(){
  const design=allOrders.filter(o=>o.stage==='design').length;
  const ship=allOrders.filter(o=>o.stage==='shipping').length;
  const showBadge=(id,n)=>{const e=document.getElementById(id);if(!e)return;e.textContent=n;e.style.display=n>0?'block':'none';};
  showBadge('mob-badge-design',design);
  showBadge('mob-badge-ship',ship);
  // Quick links badges
  const qDesign=document.getElementById('qb-design');if(qDesign){qDesign.textContent=design;qDesign.classList.toggle('hide',design===0);}
  const qShip=document.getElementById('qb-shipping');if(qShip){qShip.textContent=ship;qShip.classList.toggle('hide',ship===0);qShip.className='qc-badge'+(ship>0?' yellow':'');}
}

window.closeNav=()=>{document.querySelector('.sidenav')?.classList.remove('mob-open');document.getElementById('nav-ov')?.classList.remove('show');};
window.logout=async()=>{await signOut(auth);window.location.href='login.html';};
