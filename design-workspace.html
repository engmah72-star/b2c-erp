<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Workspace — Business2Card</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="sync-monitor.js"></script>
<style>
/* Performance strip */
.perf-strip{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:18px;}
@media(max-width:900px){.perf-strip{grid-template-columns:repeat(4,1fr);}}
@media(max-width:480px){.perf-strip{grid-template-columns:repeat(2,1fr);}}
.perf-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);
  padding:10px 12px;text-align:center;}
.pc-val{font-size:20px;font-weight:900;margin-bottom:2px;}
.pc-lbl{font-size:9px;color:var(--dim2);font-weight:700;line-height:1.3;}
/* Workspace layout */
.ws-layout{display:grid;grid-template-columns:320px 1fr;gap:14px;align-items:start;}
@media(max-width:768px){.ws-layout{grid-template-columns:1fr;}}
/* Order list */
.ord-list{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);overflow:hidden;}
.ol-head{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.ol-search{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--line);
  border-radius:var(--rad);color:var(--text);font-family:inherit;font-size:12px;outline:none;
  transition:border-color .2s;}
.ol-search:focus{border-color:var(--p);}
.ol-search::placeholder{color:var(--dim2);}
.ord-item{padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;
  transition:background .15s;border-right:3px solid transparent;}
.ord-item:hover{background:var(--bg3);}
.ord-item.active{background:rgba(167,139,250,.08);border-right-color:var(--p);}
.ord-item:last-child{border-bottom:none;}
.oi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.oi-client{font-size:13px;font-weight:800;}
.oi-code{font-size:10px;color:var(--dim2);}
.oi-products{font-size:11px;color:var(--dim2);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.oi-foot{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.pri-badge{font-size:9px;font-weight:800;padding:2px 8px;border-radius:10px;}
.pri-overdue{background:rgba(255,61,110,.2);color:var(--r);}
.pri-urgent{background:rgba(240,160,32,.2);color:var(--y);}
.pri-ok{background:rgba(0,217,126,.15);color:var(--g);}
.pri-none{background:var(--bg3);color:var(--dim2);}
.dec-dot{width:8px;height:8px;border-radius:50%;background:var(--y);animation:pulse .8s infinite alternate;}
@keyframes pulse{to{opacity:.3;}}
/* Workspace panel */
.ws-panel{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);overflow:hidden;}
.wp-empty{padding:60px;text-align:center;color:var(--dim2);}
.wp-head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.wp-title{font-size:16px;font-weight:800;}
.wp-sub{font-size:11px;color:var(--dim2);margin-top:2px;}
.wp-body{padding:14px 16px;}
/* Accordion sections */
.acc{border:1px solid var(--line);border-radius:var(--rad2);margin-bottom:10px;overflow:hidden;}
.acc-head{padding:11px 14px;background:var(--bg3);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.acc-head:hover{background:var(--bg4);}
.acc-title{font-size:12px;font-weight:800;display:flex;align-items:center;gap:7px;}
.acc-body{padding:12px 14px;display:none;}
.acc-body.open{display:block;}
/* Item tracking card */
.item-track{background:var(--bg3);border:1px solid var(--line);border-radius:var(--rad2);
  margin-bottom:10px;overflow:hidden;}
.it-head{padding:10px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.it-name{font-size:13px;font-weight:800;}
.it-qty{font-size:10px;color:var(--dim2);}
.it-body{padding:10px 12px;}
/* Version strip */
.ver-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;}
.ver-thumb-wrap{flex-shrink:0;text-align:center;}
.ver-thumb{width:56px;height:56px;border-radius:8px;object-fit:cover;cursor:pointer;
  border:2px solid transparent;transition:all .2s;display:block;}
.ver-thumb:hover{border-color:var(--p);}
.ver-num-lbl{font-size:9px;color:var(--dim2);margin-top:2px;}
.ver-add-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
.ver-add-btn{width:56px;height:56px;border-radius:8px;background:rgba(167,139,250,.1);
  border:2px dashed rgba(167,139,250,.3);color:var(--p);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;}
.ver-add-btn:hover{background:rgba(167,139,250,.2);}
.ver-upload-inp{display:none;}
/* Status chips */
.st-chip{font-size:9px;font-weight:800;padding:2px 8px;border-radius:10px;}
.st-in-progress{background:rgba(59,158,255,.15);color:var(--b);}
.st-approved{background:rgba(0,217,126,.15);color:var(--g);}
.st-revision{background:rgba(240,160,32,.15);color:var(--y);}
.st-print{background:rgba(167,139,250,.15);color:var(--p);}
.st-pending{background:var(--bg4);color:var(--dim2);}
/* Revision entry */
.rev-entry{background:var(--bg4);border-radius:var(--rad);padding:9px 11px;margin-bottom:7px;}
.rev-header{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.rev-num{font-size:10px;font-weight:800;background:rgba(34,211,238,.15);color:var(--c,#22d3ee);padding:2px 7px;border-radius:8px;}
.rev-by{font-size:10px;color:var(--dim2);}
.rev-reason{font-size:12px;font-weight:700;margin-bottom:3px;}
.rev-notes{font-size:11px;color:var(--dim2);}
.rev-date{font-size:10px;color:var(--dim2);margin-top:4px;}
/* Decision card */
.dec-card{background:rgba(240,160,32,.07);border:1px solid rgba(240,160,32,.2);
  border-radius:var(--rad);padding:10px 12px;margin-bottom:8px;}
.dc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.dc-item{font-size:11px;font-weight:800;}
.dc-comment{font-size:12px;color:var(--dim2);margin-bottom:8px;}
.dc-btns{display:flex;gap:6px;}
/* Rate display */
.rate-circle{width:80px;height:80px;border-radius:50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;border:3px solid;}
.rate-val{font-size:22px;font-weight:900;}
.rate-lbl{font-size:9px;color:var(--dim2);}
/* Portal link box */
.portal-box{background:var(--bg3);border:1px solid var(--line);border-radius:var(--rad);padding:12px;}
.portal-url{font-size:11px;word-break:break-all;color:var(--b);background:var(--bg4);
  padding:8px 10px;border-radius:6px;margin:8px 0;display:block;}
/* Stat rows */
.stat-row{display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid var(--line);}
.stat-row:last-child{border-bottom:none;}
.stat-lbl{font-size:12px;color:var(--dim2);}
.stat-val{font-size:12px;font-weight:800;}
/* Buttons */
.btn{padding:8px 16px;border-radius:var(--rad);font-size:12px;font-weight:800;cursor:pointer;
  font-family:inherit;border:none;transition:opacity .2s;}
.btn:hover{opacity:.8;}
.btn-p{background:rgba(167,139,250,.2);color:var(--p);border:1px solid rgba(167,139,250,.3);}
.btn-g{background:rgba(0,217,126,.15);color:var(--g);border:1px solid rgba(0,217,126,.3);}
.btn-b{background:rgba(59,158,255,.15);color:var(--b);border:1px solid rgba(59,158,255,.3);}
.btn-r{background:rgba(255,61,110,.12);color:var(--r);border:1px solid rgba(255,61,110,.3);}
.btn-ghost{background:transparent;color:var(--dim2);border:1px solid var(--line);}
.btn-y{background:rgba(240,160,32,.15);color:var(--y);border:1px solid rgba(240,160,32,.3);}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-xs{padding:3px 8px;font-size:10px;}
/* Form elements */
.inp-sm{width:100%;padding:8px 10px;background:var(--bg4);border:1px solid var(--line);
  border-radius:8px;color:var(--text);font-family:inherit;font-size:12px;outline:none;}
.inp-sm:focus{border-color:var(--p);}
.inp-sm::placeholder{color:var(--dim2);}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--dim2);margin-bottom:4px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
/* Admin filter */
.admin-filter{background:var(--bg3);border:1px solid rgba(240,160,32,.2);
  border-radius:var(--rad);padding:10px 12px;margin-bottom:14px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
/* Acceptance rate progress */
.rate-bar{background:var(--bg3);border-radius:20px;height:10px;margin-top:6px;overflow:hidden;}
.rate-fill{height:100%;border-radius:20px;transition:width .5s;}
/* Toast */
.toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.toast{background:var(--bg2);border:1px solid var(--line);border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;animation:toastIn .3s ease;pointer-events:auto;}
.toast.ok{border-color:rgba(0,217,126,.4);color:var(--g);}
.toast.err{border-color:rgba(255,61,110,.4);color:var(--r);}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand">
    <div class="nav-logo">🎨</div>
    <div>
      <div class="nav-brand-name">Business2Card</div>
      <div class="nav-brand-role" id="role-badge">ERP</div>
    </div>
  </div>
  <div class="nav-scroll" id="nav-scroll-dynamic"></div>
  <div class="nav-foot">
    <div class="nav-user" onclick="doLogout()">
      <div class="nav-avatar" id="nav-av">A</div>
      <div>
        <div class="nav-user-name" id="nav-name">User</div>
        <div class="nav-user-role">تسجيل خروج</div>
      </div>
    </div>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div>
        <h1>🖥️ Design Workspace</h1>
        <p id="ws-sub">جاري التحميل...</p>
      </div>
    </div>
    <div class="topbar-right" id="topbar-right"></div>
  </div>
  <div class="content">
    <!-- Admin filter -->
    <div id="admin-filter" style="display:none" class="admin-filter">
      <span style="font-size:11px;font-weight:800;color:var(--y)">👁 عرض الأدمن</span>
      <select class="inp-sm" id="designer-filter" style="max-width:200px" onchange="filterByDesigner()">
        <option value="">كل المصممين</option>
      </select>
    </div>
    <!-- Performance Strip (Section 9) -->
    <div class="perf-strip" id="perf-strip"></div>
    <!-- Main layout -->
    <div class="ws-layout">
      <!-- Order list -->
      <div class="ord-list">
        <div class="ol-head">
          <span style="font-size:12px;font-weight:800">📋 أوردراتي</span>
          <span class="badge bg-p" id="ord-count">0</span>
        </div>
        <div style="padding:8px;">
          <input class="ol-search" id="ord-search" placeholder="🔍 بحث..." oninput="filterOrders(this.value)">
        </div>
        <div id="ord-list-body"></div>
      </div>
      <!-- Workspace panel -->
      <div class="ws-panel" id="ws-panel">
        <div class="wp-empty">
          <div style="font-size:40px;margin-bottom:12px">🖥️</div>
          <div style="font-size:14px;font-weight:700">اختر أوردر من القائمة</div>
          <div style="font-size:12px;color:var(--dim2);margin-top:6px">اضغط على أي أوردر لفتح مساحة العمل</div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- Modals -->
<!-- Add Revision Modal -->
<div class="overlay" id="ov-revision">
  <div class="modal" style="max-width:440px">
    <div class="modal-head"><span class="modal-title">🔄 تسجيل تعديل</span><button class="modal-x" onclick="closeRevModal()">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label>من طلب التعديل؟</label>
        <select class="inp-sm" id="rev-requested-by" style="width:100%">
          <option value="client">👤 العميل</option>
          <option value="cs">💬 خدمة العملاء</option>
          <option value="admin">⚙️ الأدمن</option>
        </select>
      </div>
      <div class="fg"><label>سبب التعديل *</label>
        <input class="inp-sm" id="rev-reason" placeholder="مثال: تغيير اللون، تعديل النص...">
      </div>
      <div class="fg"><label>ملاحظات إضافية</label>
        <textarea class="inp-sm" id="rev-notes" placeholder="تفاصيل التعديل المطلوب..." style="min-height:70px;resize:vertical"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeRevModal()">إلغاء</button>
      <button class="btn btn-y" onclick="saveRevision()">✓ حفظ التعديل</button>
    </div>
  </div>
</div>

<!-- Edit Item Modal -->
<div class="overlay" id="ov-edit-item">
  <div class="modal" style="max-width:380px">
    <div class="modal-head"><span class="modal-title">✏️ تعديل البند</span><button class="modal-x" onclick="document.getElementById('ov-edit-item').classList.remove('open')">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label>اسم البند</label><input class="inp-sm" id="edit-item-name" style="width:100%"></div>
      <div class="fg"><label>الكمية</label><input class="inp-sm" id="edit-item-qty" type="number" min="1" style="width:100%"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="document.getElementById('ov-edit-item').classList.remove('open')">إلغاء</button>
      <button class="btn btn-p" onclick="saveEditItem()">✓ حفظ</button>
    </div>
  </div>
</div>

<nav class="mob-nav"><div class="mob-nav-items" id="mob-nav-items"></div></nav>
<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div class="toasts" id="toasts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot, getDocs, getDoc, setDoc, updateDoc,
  addDoc, query, where, orderBy, serverTimestamp, writeBatch, arrayUnion
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const app = initializeApp({
  apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",
  authDomain:"business2card-c041b.firebaseapp.com",
  projectId:"business2card-c041b",
  storageBucket:"business2card-c041b.firebasestorage.app",
  messagingSenderId:"235622448899",
  appId:"1:235622448899:web:d8652ff71082f7d003f336"
});
const auth = getAuth(app), db = getFirestore(app), storage = getStorage(app);

// ── State ──
let currentRole = '', currentUid = '', currentUserName = '';
let orders = [], allDesignItems = [], clientDecisions = [];
let currentOrderId = null, currentItems = [], revTargetItemId = null, editItemId = null;
let itemsUnsub = null, decisionsUnsub = null, ordersUnsub = null;
let designerFilterUid = '', allDesigners = [];

// ── Helpers ──
const fn = n => (parseFloat(n)||0).toLocaleString('ar-EG');
const gv = id => document.getElementById(id)?.value || '';
const sv = (id, v) => { const e = document.getElementById(id); if(e) e.value = v; };
const setText = (id, v) => { const e = document.getElementById(id); if(e) e.textContent = v; };
function toast(msg, t='') {
  const c = document.getElementById('toasts'); if(!c) return;
  const el = document.createElement('div'); el.className = 'toast ' + t; el.textContent = msg;
  c.appendChild(el); setTimeout(() => el.remove(), 3000);
}
window.toggleNav = () => { document.querySelector('.sidenav').classList.toggle('mob-open'); document.getElementById('nav-ov').classList.toggle('show'); };
window.closeNav = () => { document.querySelector('.sidenav').classList.remove('mob-open'); document.getElementById('nav-ov').classList.remove('show'); };
window.doLogout = async () => { await signOut(auth); window.location.href = 'login.html'; };

// Priority from deadline
function getPriority(deadline) {
  if (!deadline) return { label: '—', cls: 'pri-none', order: 99 };
  const days = Math.floor((new Date(deadline) - new Date()) / 86400000);
  if (days < 0) return { label: `🔴 متأخر ${-days}ي`, cls: 'pri-overdue', order: 0 };
  if (days === 0) return { label: '🟠 آخر يوم', cls: 'pri-urgent', order: 1 };
  if (days <= 2) return { label: `🟡 ${days} أيام`, cls: 'pri-urgent', order: 2 };
  return { label: `✓ ${days} يوم`, cls: 'pri-ok', order: 3 };
}

function stChip(status) {
  const m = {
    in_progress: { l: '🎨 جاري', c: 'st-in-progress' },
    revision_requested: { l: '🔄 تعديل', c: 'st-revision' },
    approved: { l: '✅ معتمد', c: 'st-approved' },
    print_ready: { l: '🖨️ للطباعة', c: 'st-print' }
  };
  const x = m[status] || { l: '⏳ انتظار', c: 'st-pending' };
  return `<span class="st-chip ${x.c}">${x.l}</span>`;
}

// ── Sidebar ──
async function buildSidebar(uid) {
  const nav = document.querySelector('.nav-scroll');
  try {
    const usnap = await getDoc(doc(db, 'users', uid));
    const ud = usnap.exists() ? usnap.data() : {};
    const role = ud.role || 'admin';
    const perms = ud.permissions || {};
    const userPages = perms.pages || [];
    const isAdm = ['admin','operation_manager'].includes(role);
    const ALL = [
      {f:'clients.html',l:'العملاء',i:'👤',p:'clients'},
      {f:'design.html',l:'التصميم',i:'✏️',p:'design'},
      {f:'design-workspace.html',l:'مساحة التصميم',i:'🖥️',p:'design'},
      {f:'gallery.html',l:'المعرض',i:'🖼️',public:true},
      {f:'print.html',l:'الطباعة',i:'🖨️',p:'print'},
      {f:'production.html',l:'التنفيذ',i:'🏭',p:'production'},
      {f:'shipping.html',l:'الشحن',i:'🚚',p:'shipping'},
      {f:'accounts.html',l:'الحسابات',i:'💰',p:'accounts'},
      {f:'reports.html',l:'التقارير',i:'📊',p:'reports'},
      {f:'employees.html',l:'الموظفين',i:'👥',p:'employees',adminOnly:true},
      {f:'settings.html',l:'الإعدادات',i:'⚙️',p:'settings',adminOnly:true},
    ];
    const ROLE_DASH = {
      admin:'index.html',operation_manager:'ops-dashboard.html',
      customer_service:'cs-dashboard.html',
      graphic_designer:'designer-dashboard.html',
      design_operator:'designer-dashboard.html',
      production_agent:'production-dashboard.html',
      shipping_officer:'shipping-dashboard.html',
      wallet_manager:'accounts.html',
    };
    const dash = ROLE_DASH[role] || 'index.html';
    const cur = 'design-workspace.html';
    let html = `<a class="nav-link" href="${dash}"><span class="nav-ico">⬡</span> داشبوردي</a>`;
    for (const pg of ALL) {
      if (pg.adminOnly && !isAdm) continue;
      const ok = pg.public || isAdm || userPages.includes('*') || userPages.includes(pg.p);
      if (!ok) continue;
      html += `<a class="nav-link${cur===pg.f?' active':''}" href="${pg.f}"><span class="nav-ico">${pg.i}</span> ${pg.l}</a>`;
    }
    nav.innerHTML = html;
    document.getElementById('role-badge').textContent = role;
  } catch(e) { nav.innerHTML = '<a class="nav-link active" href="design-workspace.html">🖥️ Workspace</a>'; }
}

// ── Auth ──
onAuthStateChanged(auth, async user => {
  if (!user) return (window.location.href = 'login.html');
  currentUid = user.uid;
  const usnap = await getDoc(doc(db, 'users', user.uid));
  const ud = usnap.exists() ? usnap.data() : {};
  currentRole = ud.role || 'admin';
  currentUserName = ud.name || user.email || '';
  document.getElementById('nav-name').textContent = currentUserName;
  document.getElementById('nav-av').textContent = currentUserName[0]?.toUpperCase() || 'A';
  buildSidebar(user.uid);
  startListeners();
  loadDesigners();
});

// ── Listeners ──
function startListeners() {
  const isAdm = ['admin','operation_manager'].includes(currentRole);

  // Unsubscribe previous
  if (ordersUnsub) ordersUnsub();
  if (decisionsUnsub) decisionsUnsub();

  if (isAdm) {
    document.getElementById('admin-filter').style.display = 'flex';
    ordersUnsub = onSnapshot(
      query(collection(db,'orders'), where('stage','==','design')),
      snap => { orders = snap.docs.map(d=>({...d.data(),_id:d.id})); onOrdersUpdated(); }
    );
  } else {
    ordersUnsub = onSnapshot(
      query(collection(db,'orders'), where('designerId','==',currentUid), where('stage','==','design')),
      snap => { orders = snap.docs.map(d=>({...d.data(),_id:d.id})); onOrdersUpdated(); }
    );
  }

  // Listen to all design_items for performance metrics
  const itemsQuery = isAdm
    ? query(collection(db,'design_items'))
    : query(collection(db,'design_items'), where('designerId','==',currentUid));
  onSnapshot(itemsQuery, snap => {
    allDesignItems = snap.docs.map(d=>({...d.data(),_id:d.id}));
    renderPerformance();
    if (currentOrderId) renderCurrentItems();
  });

  // Unprocessed client decisions
  decisionsUnsub = onSnapshot(
    query(collection(db,'client_decisions'), where('processed','==',false)),
    snap => {
      clientDecisions = snap.docs.map(d=>({...d.data(),_id:d.id}));
      renderOrderList();
      if (currentOrderId) renderPanel(orders.find(o=>o._id===currentOrderId));
    }
  );
}

function filteredOrders() {

}

window.filterOrders = function(q) {
  const search = (q || '').toLowerCase();
  document.querySelectorAll('.ord-item').forEach(el => {
    const txt = (el.dataset.search || '').toLowerCase();
    el.style.display = !search || txt.includes(search) ? '' : 'none';

// ── Open Order ──
window.openOrder = async function(orderId) {
  currentOrderId = orderId;
  // Update active state in list
  document.querySelectorAll('.ord-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick')?.includes(orderId));
  });
  const order = orders.find(o=>o._id===orderId);
  if (!order) return;
  // Init items if needed (creates design_items docs for each product)
  await initDesignItems(order);
  // Listen to items for this order
  if (itemsUnsub) itemsUnsub();
  const capturedOrderId = orderId;
  itemsUnsub = onSnapshot(
    query(collection(db,'design_items'), where('orderDocId','==',orderId)),
    snap => {
      if (currentOrderId !== capturedOrderId) return;
      currentItems = snap.docs.map(d=>({...d.data(),_id:d.id}))
        .sort((a,b)=>(a.itemIndex||0)-(b.itemIndex||0));
      renderPanel(order);
    }
  );
};

// ── Init Design Items ──
async function initDesignItems(order) {
  const products = order.products || [];
  if (!products.length) return;
  const refs = products.map((_, idx) => doc(db, 'design_items', `${order._id}_${idx}`));
  const snaps = await Promise.all(refs.map(r => getDoc(r)));
  const batch = writeBatch(db);
  let anyNew = false;
  snaps.forEach((snap, idx) => {
    if (!snap.exists()) {
      const p = products[idx];
      batch.set(snap.ref, {
        orderDocId: order._id,
        orderCode: order.orderId || '',
        clientId: order.clientId || '',
        clientName: order.clientName || '',
        clientPhone: order.clientPhone || '',
        designerId: order.designerId || currentUid,
        designerName: order.designerName || currentUserName,
        itemName: p.name || `بند ${idx+1}`,
        itemQty: p.qty || 1,
        itemIndex: idx,
        versions: [],
        revisions: [],
        status: 'in_progress',
        isApproved: false,
        isPrintReady: false,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp(),
        editHistory: []
      });
      anyNew = true;
    }
  });
  if (anyNew) await batch.commit();
}

// ── Item Actions ──
window.uploadVersion = async function(itemId, inp) {
  const file = inp.files[0]; if (!file) return;
  toast('جاري رفع الموك أب...', '');
  let imageUrl = null;
  const doFirestoreWrite = async (url) => {
    const item = currentItems.find(i=>i._id===itemId);
    const vNum = (item?.versions?.length||0) + 1;
    await updateDoc(doc(db,'design_items',itemId), {
      versions: arrayUnion({ vNum, imageUrl: url, fileName: file.name, uploadedAt: new Date().toISOString(), uploadedBy: currentUid, uploadedByName: currentUserName }),
      updatedAt: serverTimestamp(),
      editHistory: arrayUnion({ action: 'version_uploaded', vNum, by: currentUid, byName: currentUserName, at: new Date().toISOString() })
    });
    inp.value = '';
    toast('✅ تم رفع v' + vNum, 'ok');
  };
  try {
    const sRef = ref(storage, `design-items/${itemId}_v${Date.now()}`);
    await uploadBytes(sRef, file);
    imageUrl = await getDownloadURL(sRef);
    await doFirestoreWrite(imageUrl);
  } catch(e) {
    if (imageUrl) {
      try { await doFirestoreWrite(imageUrl); }
      catch(e2) {
        console.error('uploadVersion Firestore retry failed', { imageUrl, e2 });
        toast('❌ تعذّر التسجيل — الرابط محفوظ في Console للاسترداد', 'err');
      }
    } else { toast('❌ ' + e.message, 'err'); }
  }
};

window.markApproved = async function(itemId, current) {
  try {
    const newVal = !current;
    await updateDoc(doc(db,'design_items',itemId), {
      isApproved: newVal, status: newVal ? 'approved' : 'in_progress', updatedAt: serverTimestamp(),
      editHistory: arrayUnion({ action: newVal?'approved':'unapproved', by: currentUid, byName: currentUserName, at: new Date().toISOString() })
    });
    toast(newVal ? '✅ تم الاعتماد' : '↩ تم إلغاء الاعتماد', 'ok');
  } catch(e) { toast('❌ ' + e.message, 'err'); }
};

window.togglePrintReady = async function(itemId, current) {
  try {
    const newVal = !current;
    await updateDoc(doc(db,'design_items',itemId), {
      isPrintReady: newVal, status: newVal ? 'print_ready' : (current?'approved':'in_progress'), updatedAt: serverTimestamp(),
      editHistory: arrayUnion({ action: newVal?'marked_print_ready':'unmarked_print_ready', by: currentUid, byName: currentUserName, at: new Date().toISOString() })
    });
    toast(newVal ? '🖨️ جاهز للطباعة' : '↩ تم التراجع', 'ok');
  } catch(e) { toast('❌ ' + e.message, 'err'); }
};

// ── Revision Modal ──
window.openRevModal = function(itemId) {
  revTargetItemId = itemId;
  sv('rev-reason',''); sv('rev-notes','');
  document.getElementById('ov-revision').classList.add('open');
};
window.closeRevModal = () => document.getElementById('ov-revision').classList.remove('open');
window.saveRevision = async function() {
  const reason = gv('rev-reason').trim();
  if (!reason) return toast('⚠️ أدخل سبب التعديل', 'err');
  const item = currentItems.find(i=>i._id===revTargetItemId);
  const rNum = (item?.revisions?.length||0) + 1;
  const requestedBy = gv('rev-requested-by') || 'client';
  try {
    await updateDoc(doc(db,'design_items',revTargetItemId), {
      revisions: arrayUnion({ rNum, reason, requestedBy, requestedByName: currentUserName, notes: gv('rev-notes').trim(), createdAt: new Date().toISOString() }),
      status: 'revision_requested', updatedAt: serverTimestamp(),
      editHistory: arrayUnion({ action: 'revision_added', rNum, reason, by: currentUid, byName: currentUserName, at: new Date().toISOString() })
    });
    closeRevModal(); toast('✅ تم تسجيل التعديل #' + rNum, 'ok');
  } catch(e) { toast('❌ ' + e.message, 'err'); }
};

// ── Edit Item (Admin) ──
window.openEditItem = function(itemId, name, qty) {
  editItemId = itemId;
  sv('edit-item-name', name); sv('edit-item-qty', qty);
  document.getElementById('ov-edit-item').classList.add('open');
};
window.saveEditItem = async function() {
  const name = gv('edit-item-name').trim();
  const qty = parseInt(gv('edit-item-qty'))||1;
  if (!name) return toast('⚠️ أدخل اسم البند', 'err');
  const item = currentItems.find(i=>i._id===editItemId);
  try {
    await updateDoc(doc(db,'design_items',editItemId), {
      itemName: name, itemQty: qty, updatedAt: serverTimestamp(),
      editHistory: arrayUnion({ action: 'item_edited', oldName: item?.itemName, newName: name, oldQty: item?.itemQty, newQty: qty, by: currentUid, byName: currentUserName, at: new Date().toISOString() })
    });
    document.getElementById('ov-edit-item').classList.remove('open');
    toast('✅ تم التعديل', 'ok');
  } catch(e) { toast('❌ ' + e.message, 'err'); }
};

// ── Process Client Decision ──
window.processDecision = async function(decId, itemId, decision, apply) {
  try {
    const batch = writeBatch(db);
    // Mark decision as processed
    batch.update(doc(db,'client_decisions',decId), { processed: true, processedAt: serverTimestamp(), processedBy: currentUid });
    if (apply && itemId) {
      const updates = {
        updatedAt: serverTimestamp(),
        editHistory: arrayUnion({ action: `client_decision_${decision}`, by: currentUid, byName: currentUserName, at: new Date().toISOString() })
      };
      if (decision === 'approved') { updates.isApproved = true; updates.status = 'approved'; }
      else if (decision === 'revision') { updates.status = 'revision_requested'; }
      batch.update(doc(db,'design_items',itemId), updates);
    }
    await batch.commit();
    toast(apply ? '✅ تم تطبيق قرار العميل' : '🗑 تم تجاهل القرار', apply?'ok':'');
  } catch(e) { toast('❌ ' + e.message, 'err'); }
};

// ── Reset Items (Admin) ──
window.resetAllItems = async function(orderId) {
  if (!confirm('إعادة فتح كل البنود لهذا الأوردر؟')) return;
  try {
    const batch = writeBatch(db);
    currentItems.forEach(item => {
      batch.update(doc(db,'design_items',item._id), {
        isApproved: false, isPrintReady: false, status: 'in_progress', updatedAt: serverTimestamp(),
        editHistory: arrayUnion({ action: 'reset_by_admin', by: currentUid, byName: currentUserName, at: new Date().toISOString() })
      });
    });
    await batch.commit(); toast('↩ تم إعادة فتح البنود', 'ok');
  } catch(e) { toast('❌ ' + e.message, 'err'); }
};

// ── Reassign (Admin) ──
window.openReassign = function(orderId) {
  const sel = allDesigners.map(d=>`<option value="${d.authUid||d._id}|${d.name}">${d.name}</option>`).join('');
  const modal = document.createElement('div');
  modal.className = 'overlay open';
  modal.innerHTML = `<div class="modal" style="max-width:360px">
    <div class="modal-head"><span class="modal-title">🔄 إعادة إسناد المصمم</span><button class="modal-x" onclick="this.closest('.overlay').remove()">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label>اختر المصمم</label><select class="inp-sm" id="reassign-sel" style="width:100%">${sel}</select></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="this.closest('.overlay').remove()">إلغاء</button>
      <button class="btn btn-p" onclick="confirmReassign('${orderId}',this.closest('.overlay'))">✓ تأكيد</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
};
window.confirmReassign = async function(orderId, modalEl) {
  const val = document.getElementById('reassign-sel').value;
  const [uid, name] = val.split('|');
  if (!uid) return;
  try {
    await updateDoc(doc(db,'orders',orderId), { designerId: uid, designerName: name, updatedAt: serverTimestamp() });
    modalEl.remove(); toast('✅ تم الإسناد لـ ' + name, 'ok');
  } catch(e) { toast('❌ ' + e.message, 'err'); }
};

// ── Portal Link ──
window.copyPortalLink = function(url, code, phone) {
  const msg = `مرحباً 🎨\nتصميمك جاهز للمراجعة!\nافتح الرابط وأدخل بياناتك:\n🔗 ${url}\nكود الأوردر: ${code}\nرقم هاتفك: ${phone}`;
  navigator.clipboard.writeText(msg).then(()=>toast('✅ تم نسخ الرسالة','ok')).catch(()=>toast('⚠️ لم يتم النسخ','err'));
};

// ── Accordion ──
window.toggleAcc = function(head) {
  const body = head.nextElementSibling;
  body.classList.toggle('open');
};

window.renderCurrentItems = function() {
  const order = orders.find(o=>o._id===currentOrderId);
  if (order) renderPanel(order);
};
</script>
