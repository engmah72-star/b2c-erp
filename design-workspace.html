<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Workspace — Business2Card</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="sync-monitor.js"></script>
<style>
/* ═══ LAYOUT ═══ */
.ws-layout{display:grid;grid-template-columns:330px 1fr;gap:14px;align-items:start;}
@media(max-width:900px){.ws-layout{grid-template-columns:1fr;}}
.left-panel{display:flex;flex-direction:column;gap:12px;}

/* ═══ ORDER LIST ═══ */
.ord-list{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);overflow:hidden;}
.ol-head{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.ol-search{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--line);border-radius:var(--rad);color:var(--text);font-family:inherit;font-size:12px;outline:none;transition:border-color .2s;}
.ol-search:focus{border-color:var(--p);}
.ol-search::placeholder{color:var(--dim2);}
.ord-item{padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .15s;border-right:3px solid transparent;}
.ord-item:hover{background:var(--bg3);}
.ord-item.active{background:rgba(167,139,250,.08);border-right-color:var(--p);}
.ord-item:last-child{border-bottom:none;}
.oi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.oi-client{font-size:13px;font-weight:800;}
.oi-products{font-size:11px;color:var(--dim2);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.oi-prog{height:3px;background:var(--bg4);border-radius:2px;margin-bottom:5px;overflow:hidden;}
.oi-prog-fill{height:100%;border-radius:2px;background:var(--g);transition:width .5s;}
.oi-foot{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.pri-badge{font-size:9px;font-weight:800;padding:2px 8px;border-radius:10px;}
.pri-overdue{background:rgba(255,61,110,.2);color:var(--r);}
.pri-urgent{background:rgba(240,160,32,.2);color:var(--y);}
.pri-ok{background:rgba(0,217,126,.15);color:var(--g);}
.pri-none{background:var(--bg3);color:var(--dim2);}
@keyframes pulse{to{opacity:.3;}}
.dec-dot{width:7px;height:7px;border-radius:50%;background:var(--y);animation:pulse .8s infinite alternate;display:inline-block;}

/* ═══ MY STATS PANEL ═══ */
.my-stats{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;}
.ms-title{font-size:11px;font-weight:800;color:var(--dim2);margin-bottom:12px;}
.ms-rate{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.ms-circle{width:60px;height:60px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid;flex-shrink:0;}
.ms-circle-val{font-size:17px;font-weight:900;line-height:1;}
.ms-circle-lbl{font-size:8px;color:var(--dim2);font-weight:700;}
.ms-rows{flex:1;}
.ms-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--line);font-size:11px;}
.ms-row:last-child{border-bottom:none;}
.ms-row-val{font-weight:800;}

/* ═══ WORKSPACE PANEL ═══ */
.ws-panel{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);overflow:hidden;min-height:300px;}
.wp-empty{padding:80px 40px;text-align:center;color:var(--dim2);}
.wp-empty-ico{font-size:44px;opacity:.35;margin-bottom:14px;}
.wp-empty-title{font-size:15px;font-weight:800;margin-bottom:6px;}
.wp-empty-sub{font-size:12px;}

/* ═══ ORDER HEADER ═══ */
.order-header{padding:16px 18px 12px;border-bottom:1px solid var(--line);}
.oh-row1{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:8px;}
.oh-client{font-size:19px;font-weight:900;line-height:1.2;}
.oh-code{font-size:11px;color:var(--dim2);font-weight:700;margin-top:3px;}
.oh-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:3px;}
.oh-pipeline{overflow-x:auto;scrollbar-width:none;padding-top:8px;}
.oh-pipeline::-webkit-scrollbar{display:none;}

/* ═══ PIPELINE ═══ */
.pipeline{display:flex;align-items:center;gap:0;}
.pipe-step{display:flex;align-items:center;flex-shrink:0;}
.pipe-node{font-size:9px;font-weight:800;padding:4px 10px;border-radius:12px;background:var(--bg3);color:var(--dim2);white-space:nowrap;border:1px solid transparent;transition:all .3s;}
.pipe-node.done{background:rgba(0,217,126,.12);color:var(--g);border-color:rgba(0,217,126,.3);}
.pipe-node.current{background:rgba(59,158,255,.14);color:var(--b);border-color:rgba(59,158,255,.3);animation:pipePulse 2s ease-in-out infinite;}
@keyframes pipePulse{0%,100%{box-shadow:0 0 0 0 rgba(59,158,255,.25);}60%{box-shadow:0 0 0 5px rgba(59,158,255,.0);}}
.pipe-arrow{color:var(--dim2);font-size:10px;margin:0 3px;flex-shrink:0;}

/* ═══ ITEMS WRAPPER ═══ */
.items-wrapper{padding:14px 16px;}
.items-hdr{font-size:11px;font-weight:800;color:var(--dim2);margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* ═══ ITEM CARD ═══ */
.item-card{border:1px solid var(--line);border-right:4px solid var(--line);border-radius:var(--rad2);margin-bottom:18px;overflow:hidden;background:var(--bg3);}
.item-card.st-inprogress{border-right-color:var(--b);}
.item-card.st-revision{border-right-color:var(--y);}
.item-card.st-approved{border-right-color:var(--g);}
.item-card.st-print{border-right-color:var(--p);}

/* Item header */
.ic-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg4);border-bottom:1px solid var(--line);flex-wrap:wrap;gap:8px;}
.ic-title{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.ic-name{font-size:14px;font-weight:800;}
.ic-qty{font-size:10px;color:var(--dim2);background:var(--bg3);padding:2px 7px;border-radius:8px;}
.st-chip{font-size:9px;font-weight:800;padding:2px 8px;border-radius:10px;}
.st-in-progress{background:rgba(59,158,255,.15);color:var(--b);}
.st-approved{background:rgba(0,217,126,.15);color:var(--g);}
.st-revision{background:rgba(240,160,32,.15);color:var(--y);}
.st-print{background:rgba(167,139,250,.15);color:var(--p);}
.st-pending{background:var(--bg4);color:var(--dim2);}
.ic-badge-rev{font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;background:rgba(240,160,32,.12);color:var(--y);}
.ic-badge-gal{font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;background:rgba(167,139,250,.12);color:var(--p);}
.ic-btn-row{display:flex;gap:5px;flex-wrap:wrap;}

/* Item pipeline */
.ic-pipeline{padding:7px 14px;background:var(--bg2);border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none;}
.ic-pipeline::-webkit-scrollbar{display:none;}

/* Next action */
.next-action{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px dashed var(--line);}
.next-action.na-upload{background:rgba(167,139,250,.05);}
.next-action.na-publish{background:rgba(59,158,255,.04);}
.next-action.na-wait{background:var(--bg4);}
.next-action.na-revision{background:rgba(240,160,32,.05);}
.next-action.na-done{background:rgba(0,217,126,.04);}
.na-icon{font-size:17px;flex-shrink:0;}
.na-text{font-size:11px;font-weight:600;color:var(--dim2);line-height:1.5;}

/* Revision banner */
.rev-banner{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:rgba(240,160,32,.07);border-bottom:2px solid rgba(240,160,32,.22);}
.rb-icon{font-size:22px;flex-shrink:0;}
.rb-num{font-size:10px;font-weight:800;color:var(--y);margin-bottom:3px;}
.rb-reason{font-size:13px;font-weight:700;margin-bottom:3px;}
.rb-notes{font-size:11px;color:var(--dim2);margin-bottom:4px;}
.rb-meta{font-size:10px;color:var(--dim2);}

/* Upload zone */
.upload-zone{margin:12px 14px;border:2px dashed var(--line);border-radius:var(--rad2);cursor:pointer;transition:all .22s;position:relative;overflow:hidden;}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--p);background:rgba(167,139,250,.06);}
.uz-content{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px;}
.uz-content.compact{flex-direction:row;gap:10px;text-align:right;padding:10px 14px;}
.uz-content.full{padding:26px 14px;}
.uz-big-icon{font-size:34px;opacity:.4;}
.uz-sm-icon{font-size:20px;opacity:.5;}
.uz-title{font-size:13px;font-weight:800;}
.uz-sub{font-size:10px;color:var(--dim2);}
.ver-upload-inp{display:none;}

/* Version grid */
.ver-grid-head{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;font-size:11px;color:var(--dim2);font-weight:700;}
.ver-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:10px;padding:0 14px 14px;}
.ver-card{border:1px solid var(--line);border-radius:var(--rad2);overflow:hidden;background:var(--bg2);transition:border-color .2s,transform .15s,box-shadow .2s;}
.ver-card:hover{border-color:rgba(167,139,250,.45);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.12);}
.ver-card.vc-pub{border-color:var(--b);box-shadow:0 0 0 1px rgba(59,158,255,.2);}
.vc-img{position:relative;aspect-ratio:4/3;overflow:hidden;cursor:zoom-in;background:var(--bg4);}
.vc-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.vc-img:hover img{transform:scale(1.07);}
.vc-overlay{position:absolute;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.vc-img:hover .vc-overlay{opacity:1;}
.vc-zoom-lbl{color:#fff;font-size:11px;font-weight:800;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px;}
.vc-pub-badge{position:absolute;top:6px;right:6px;background:var(--b);color:#fff;font-size:8px;font-weight:800;padding:2px 7px;border-radius:6px;}
.vc-new-badge{position:absolute;top:6px;right:6px;background:var(--g);color:#fff;font-size:8px;font-weight:800;padding:2px 7px;border-radius:6px;}
.vc-rev-badge{position:absolute;bottom:5px;right:5px;background:rgba(240,160,32,.88);color:#fff;font-size:7px;font-weight:800;padding:2px 6px;border-radius:5px;}
.vc-info{padding:7px 9px;}
.vc-vnum{font-size:12px;font-weight:800;}
.vc-date{font-size:9px;color:var(--dim2);margin-top:1px;}
.vc-pub-info{font-size:9px;color:var(--b);margin-top:3px;}
.vc-rev-info{font-size:9px;color:var(--y);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Action bar */
.item-action-bar{padding:10px 14px 13px;border-top:1px solid var(--line);background:var(--bg4);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.iab-primary{display:flex;gap:6px;flex-wrap:wrap;}
.iab-secondary{display:flex;gap:5px;flex-wrap:wrap;margin-right:auto;}

/* ═══ COLLAPSIBLE SECTIONS ═══ */
.acc{border:1px solid var(--line);border-radius:var(--rad2);margin:0 16px 10px;overflow:hidden;}
.acc-head{padding:11px 14px;background:var(--bg3);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.acc-head:hover{background:var(--bg4);}
.acc-title{font-size:12px;font-weight:800;display:flex;align-items:center;gap:7px;}
.acc-body{padding:12px 14px;display:none;}
.acc-body.open{display:block;}
.acc-gap{height:14px;}

/* ═══ REVISION LOG ═══ */
.rev-entry{background:var(--bg4);border-radius:var(--rad);padding:9px 11px;margin-bottom:7px;}
.rev-header{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.rev-num{font-size:10px;font-weight:800;background:rgba(34,211,238,.15);color:#22d3ee;padding:2px 7px;border-radius:8px;}
.rev-by{font-size:10px;color:var(--dim2);}
.rev-reason{font-size:12px;font-weight:700;margin-bottom:3px;}
.rev-notes{font-size:11px;color:var(--dim2);}
.rev-date{font-size:10px;color:var(--dim2);margin-top:4px;}

/* ═══ CLIENT DECISIONS ═══ */
.dec-card{background:rgba(240,160,32,.07);border:1px solid rgba(240,160,32,.2);border-radius:var(--rad);padding:10px 12px;margin-bottom:8px;}
.dc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.dc-item{font-size:11px;font-weight:800;}
.dc-comment{font-size:12px;color:var(--dim2);margin-bottom:8px;}
.dc-btns{display:flex;gap:6px;}

/* ═══ PORTAL BOX ═══ */
.portal-box{background:var(--bg3);border:1px solid var(--line);border-radius:var(--rad);padding:12px;}
.portal-url{font-size:11px;word-break:break-all;color:var(--b);background:var(--bg4);padding:8px 10px;border-radius:6px;margin:8px 0;display:block;}

/* ═══ STAT ROWS ═══ */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--line);}
.stat-row:last-child{border-bottom:none;}
.stat-lbl{font-size:12px;color:var(--dim2);}
.stat-val{font-size:12px;font-weight:800;}

/* ═══ BUTTONS ═══ */
.btn{padding:8px 16px;border-radius:var(--rad);font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;border:none;transition:opacity .2s;}
.btn:hover{opacity:.8;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-p{background:rgba(167,139,250,.2);color:var(--p);border:1px solid rgba(167,139,250,.3);}
.btn-g{background:rgba(0,217,126,.15);color:var(--g);border:1px solid rgba(0,217,126,.3);}
.btn-b{background:rgba(59,158,255,.15);color:var(--b);border:1px solid rgba(59,158,255,.3);}
.btn-r{background:rgba(255,61,110,.12);color:var(--r);border:1px solid rgba(255,61,110,.3);}
.btn-ghost{background:transparent;color:var(--dim2);border:1px solid var(--line);}
.btn-y{background:rgba(240,160,32,.15);color:var(--y);border:1px solid rgba(240,160,32,.3);}
.btn-sm{padding:5px 12px;font-size:11px;}
.btn-xs{padding:3px 8px;font-size:10px;}

/* ═══ FORM ═══ */
.inp-sm{width:100%;padding:8px 10px;background:var(--bg4);border:1px solid var(--line);border-radius:8px;color:var(--text);font-family:inherit;font-size:12px;outline:none;}
.inp-sm:focus{border-color:var(--p);}
.inp-sm::placeholder{color:var(--dim2);}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--dim2);margin-bottom:4px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.admin-filter{background:var(--bg3);border:1px solid rgba(240,160,32,.2);border-radius:var(--rad);padding:10px 12px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

/* ═══ LIGHTBOX ═══ */
#lb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9998;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
#lb-overlay.open{display:flex;}
.lb-img-wrap{display:flex;align-items:center;justify-content:center;gap:14px;max-width:94vw;}
#lb-img{max-width:80vw;max-height:74vh;border-radius:10px;object-fit:contain;box-shadow:0 12px 50px rgba(0,0,0,.7);}
.lb-nav{background:rgba(255,255,255,.12);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:26px;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.lb-nav:hover{background:rgba(255,255,255,.25);}
#lb-close-btn{position:fixed;top:16px;left:16px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:16px;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lb-caption{color:rgba(255,255,255,.65);font-size:12px;margin-top:12px;text-align:center;}
.lb-foot{display:flex;gap:14px;margin-top:8px;align-items:center;}
.lb-counter{color:rgba(255,255,255,.4);font-size:11px;font-weight:800;}

/* ═══ TOAST ═══ */
.toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.toast{background:var(--bg2);border:1px solid var(--line);border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;animation:toastIn .3s ease;pointer-events:auto;}
.toast.ok{border-color:rgba(0,217,126,.4);color:var(--g);}
.toast.err{border-color:rgba(255,61,110,.4);color:var(--r);}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand">
    <div class="nav-logo">🎨</div>
    <div>
      <div class="nav-brand-name">Business2Card</div>
      <div class="nav-brand-role" id="role-badge">ERP</div>
    </div>
  </div>
  <div class="nav-scroll" id="nav-scroll-dynamic"></div>
  <div class="nav-foot">
    <div class="nav-user" onclick="doLogout()">
      <div class="nav-avatar" id="nav-av">A</div>
      <div>
        <div class="nav-user-name" id="nav-name">User</div>
        <div class="nav-user-role">تسجيل خروج</div>
      </div>
    </div>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div>
        <h1>🖥️ Design Workspace</h1>
        <p id="ws-sub">جاري التحميل...</p>
      </div>
    </div>
    <div class="topbar-right" id="topbar-right"></div>
  </div>
  <div class="content">
    <!-- Admin filter -->
    <div id="admin-filter" style="display:none" class="admin-filter">
      <span style="font-size:11px;font-weight:800;color:var(--y)">👁 عرض الأدمن</span>
      <select class="inp-sm" id="designer-filter" style="max-width:200px" onchange="filterByDesigner()">
        <option value="">كل المصممين</option>
      </select>
    </div>
    <!-- Main layout -->
    <div class="ws-layout">
      <!-- Left panel -->
      <div class="left-panel">
        <div class="ord-list">
          <div class="ol-head">
            <span style="font-size:12px;font-weight:800">📋 أوردراتي</span>
            <span class="badge bg-p" id="ord-count">0</span>
          </div>
          <div style="padding:8px">
            <input class="ol-search" id="ord-search" placeholder="🔍 بحث باسم العميل أو الكود..." oninput="filterOrders(this.value)">
          </div>
          <div id="ord-list-body"></div>
        </div>
        <div class="my-stats" id="my-stats"></div>
      </div>
      <!-- Workspace panel -->
      <div class="ws-panel" id="ws-panel">
        <div class="wp-empty">
          <div class="wp-empty-ico">🎨</div>
          <div class="wp-empty-title">اختر أوردر من القائمة</div>
          <div class="wp-empty-sub">اضغط على أي أوردر لفتح مساحة العمل</div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- Modals -->
<!-- Add Revision Modal -->
<div class="overlay" id="ov-revision">
  <div class="modal" style="max-width:440px">
    <div class="modal-head"><span class="modal-title">🔄 تسجيل تعديل</span><button class="modal-x" onclick="closeRevModal()">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label>من طلب التعديل؟</label>
        <select class="inp-sm" id="rev-requested-by" style="width:100%">
          <option value="client">👤 العميل</option>
          <option value="cs">💬 خدمة العملاء</option>
          <option value="admin">⚙️ الأدمن</option>
        </select>
      </div>
      <div class="fg"><label>سبب التعديل *</label>
        <input class="inp-sm" id="rev-reason" placeholder="مثال: تغيير اللون، تعديل النص...">
      </div>
      <div class="fg"><label>ملاحظات إضافية</label>
        <textarea class="inp-sm" id="rev-notes" placeholder="تفاصيل التعديل المطلوب..." style="min-height:70px;resize:vertical"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeRevModal()">إلغاء</button>
      <button class="btn btn-y" onclick="saveRevision()">✓ حفظ التعديل</button>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

const app = initializeApp({
  apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",
  authDomain:"business2card-c041b.firebaseapp.com",

  storageBucket:"business2card-c041b.firebasestorage.app",

});
const auth = getAuth(app), db = getFirestore(app), storage = getStorage(app);

// ── State ──
let currentRole = '', currentUid = '', currentUserName = '';
let orders = [], allDesignItems = [], clientDecisions = [];

let itemsUnsub = null, decisionsUnsub = null, ordersUnsub = null;
let designerFilterUid = '', allDesigners = [];

// ── Helpers ──
const fn = n => (parseFloat(n)||0).toLocaleString('ar-EG');

const sv = (id, v) => { const e = document.getElementById(id); if(e) e.value = v; };

function toast(msg, t='') {

  const el = document.createElement('div'); el.className = 'toast ' + t; el.textContent = msg;
  c.appendChild(el); setTimeout(() => el.remove(), 3000);

window.toggleNav = () => { document.querySelector('.sidenav').classList.toggle('mob-open'); document.getElementById('nav-ov').classList.toggle('show'); };
window.closeNav = () => { document.querySelector('.sidenav').classList.remove('mob-open'); document.getElementById('nav-ov').classList.remove('show'); };

// Priority from deadline
function getPriority(deadline) {
  if (!deadline) return { label: '—', cls: 'pri-none', order: 99 };
  const days = Math.floor((new Date(deadline) - new Date()) / 86400000);
  if (days < 0) return { label: `🔴 متأخر ${-days}ي`, cls: 'pri-overdue', order: 0 };
  if (days === 0) return { label: '🟠 آخر يوم', cls: 'pri-urgent', order: 1 };
  if (days <= 2) return { label: `🟡 ${days} أيام`, cls: 'pri-urgent', order: 2 };
  return { label: `✓ ${days} يوم`, cls: 'pri-ok', order: 3 };
}

function stChip(status) {
  const m = {
    in_progress: { l: '🎨 جاري', c: 'st-in-progress' },
    revision_requested: { l: '🔄 تعديل', c: 'st-revision' },
    approved: { l: '✅ معتمد', c: 'st-approved' },
    print_ready: { l: '🖨️ للطباعة', c: 'st-print' }
  };
  const x = m[status] || { l: '⏳ انتظار', c: 'st-pending' };
  return `<span class="st-chip ${x.c}">${x.l}</span>`;
}

// ── Sidebar ──
async function buildSidebar(uid) {
  const nav = document.querySelector('.nav-scroll');
  try {
    const usnap = await getDoc(doc(db, 'users', uid));
    const ud = usnap.exists() ? usnap.data() : {};
    const role = ud.role || 'admin';
    const perms = ud.permissions || {};
    const userPages = perms.pages || [];
    const isAdm = ['admin','operation_manager'].includes(role);
    const ALL = [
      {f:'clients.html',l:'العملاء',i:'👤',p:'clients'},
      {f:'design.html',l:'التصميم',i:'✏️',p:'design'},
      {f:'design-workspace.html',l:'مساحة التصميم',i:'🖥️',p:'design'},
      {f:'gallery.html',l:'المعرض',i:'🖼️',public:true},
      {f:'print.html',l:'الطباعة',i:'🖨️',p:'print'},
      {f:'production.html',l:'التنفيذ',i:'🏭',p:'production'},
      {f:'shipping.html',l:'الشحن',i:'🚚',p:'shipping'},
      {f:'accounts.html',l:'الحسابات',i:'💰',p:'accounts'},
      {f:'reports.html',l:'التقارير',i:'📊',p:'reports'},
      {f:'employees.html',l:'الموظفين',i:'👥',p:'employees',adminOnly:true},
      {f:'settings.html',l:'الإعدادات',i:'⚙️',p:'settings',adminOnly:true},
    ];
    const ROLE_DASH = {
      admin:'index.html',operation_manager:'ops-dashboard.html',
      customer_service:'cs-dashboard.html',
      graphic_designer:'designer-dashboard.html',
      design_operator:'designer-dashboard.html',
      production_agent:'production-dashboard.html',
      shipping_officer:'shipping-dashboard.html',
      wallet_manager:'accounts.html',
    };
    const dash = ROLE_DASH[role] || 'index.html';
    const cur = 'design-workspace.html';
    let html = `<a class="nav-link" href="${dash}"><span class="nav-ico">⬡</span> داشبوردي</a>`;
    for (const pg of ALL) {
      if (pg.adminOnly && !isAdm) continue;
      const ok = pg.public || isAdm || userPages.includes('*') || userPages.includes(pg.p);
      if (!ok) continue;
      html += `<a class="nav-link${cur===pg.f?' active':''}" href="${pg.f}"><span class="nav-ico">${pg.i}</span> ${pg.l}</a>`;

}

// ── Auth ──
onAuthStateChanged(auth, async user => {
  if (!user) return (window.location.href = 'login.html');
  currentUid = user.uid;
  const usnap = await getDoc(doc(db, 'users', user.uid));
  const ud = usnap.exists() ? usnap.data() : {};
  currentRole = ud.role || 'admin';
  currentUserName = ud.name || user.email || '';
  document.getElementById('nav-name').textContent = currentUserName;
  document.getElementById('nav-av').textContent = currentUserName[0]?.toUpperCase() || 'A';
  buildSidebar(user.uid);
  startListeners();
  loadDesigners();
});

// ── Listeners ──
function startListeners() {
  const isAdm = ['admin','operation_manager'].includes(currentRole);

  // Unsubscribe previous
  if (ordersUnsub) ordersUnsub();
  if (decisionsUnsub) decisionsUnsub();

  if (isAdm) {
    document.getElementById('admin-filter').style.display = 'flex';
    ordersUnsub = onSnapshot(
      query(collection(db,'orders'), where('stage','==','design')),
      snap => { orders = snap.docs.map(d=>({...d.data(),_id:d.id})); onOrdersUpdated(); }
    );
  } else {
    ordersUnsub = onSnapshot(
      query(collection(db,'orders'), where('designerId','==',currentUid), where('stage','==','design')),
      snap => { orders = snap.docs.map(d=>({...d.data(),_id:d.id})); onOrdersUpdated(); }
    );
  }

  // Listen to all design_items for performance metrics
  const itemsQuery = isAdm
    ? query(collection(db,'design_items'))
    : query(collection(db,'design_items'), where('designerId','==',currentUid));
  onSnapshot(itemsQuery, snap => {
    allDesignItems = snap.docs.map(d=>({...d.data(),_id:d.id}));
    renderPerformance();
    if (currentOrderId) renderCurrentItems();
  });

  // Unprocessed client decisions
  decisionsUnsub = onSnapshot(
    query(collection(db,'client_decisions'), where('processed','==',false)),
    snap => {
      clientDecisions = snap.docs.map(d=>({...d.data(),_id:d.id}));
      renderOrderList();
      if (currentOrderId) renderPanel(orders.find(o=>o._id===currentOrderId));
    }
  );
}

async function loadDesigners() {
  const snap = await getDocs(query(collection(db,'employees'), where('role','in',['graphic_designer','design_operator'])));
  allDesigners = snap.docs.map(d=>({...d.data(),_id:d.id}));
  const sel = document.getElementById('designer-filter');
  if (sel) {
    sel.innerHTML = '<option value="">كل المصممين</option>' +
      allDesigners.map(d=>`<option value="${d.authUid||d._id}">${d.name}</option>`).join('');
  }
}

function onOrdersUpdated() {
  const visOrders = filteredOrders();
  setText('ord-count', visOrders.length);
  setText('ws-sub', visOrders.length + ' أوردر ' + (['admin','operation_manager'].includes(currentRole) ? 'نشط' : 'مسند لي'));
  renderOrderList();
}

function filteredOrders() {
  let list = orders;
  if (designerFilterUid) list = list.filter(o => o.designerId === designerFilterUid);
  return list.sort((a,b) => getPriority(a.deadline).order - getPriority(b.deadline).order);
}

window.filterByDesigner = function() {
  designerFilterUid = gv('designer-filter');
  onOrdersUpdated();
};

window.filterOrders = function(q) {
  const search = (q || '').toLowerCase();
  document.querySelectorAll('.ord-item').forEach(el => {
    const txt = (el.dataset.search || '').toLowerCase();
    el.style.display = !search || txt.includes(search) ? '' : 'none';
  });
};

// ── Order List ──
function renderOrderList() {
  const list = filteredOrders();
  const el = document.getElementById('ord-list-body');
  if (!list.length) {
    el.innerHTML = `<div style="padding:24px;text-align:center;color:var(--dim2);font-size:12px">🎉 لا توجد أوردرات نشطة</div>`;
    return;
  }
  el.innerHTML = list.map(o => {
    const pri = getPriority(o.deadline);
    const prods = (o.products||[]).map(p=>p.name).join('، ') || o.product || '—';
    const oItems = allDesignItems.filter(i=>i.orderDocId===o._id);
    const pendingDec = clientDecisions.filter(d=>d.orderDocId===o._id).length;
    const approvedCount = oItems.filter(i=>i.isApproved).length;
    const revCount = oItems.filter(i=>i.status==='revision_requested').length;
    const prog = oItems.length ? Math.round(approvedCount/oItems.length*100) : 0;
    return `<div class="ord-item${currentOrderId===o._id?' active':''}"
        data-search="${(o.clientName||'')+(o.orderId||'')}"
        onclick="openOrder('${o._id}')">
      <div class="oi-top">
        <span class="oi-client">${o.clientName||'—'}</span>
        <span class="pri-badge ${pri.cls}">${pri.label}</span>
      </div>
      <div class="oi-products">${prods}</div>
      ${oItems.length ? `<div class="oi-prog"><div class="oi-prog-fill" style="width:${prog}%"></div></div>` : ''}
      <div class="oi-foot">
        <span style="font-size:10px;color:var(--dim2)">${o.orderId||o._id.slice(-6)}</span>
        ${oItems.length ? `<span style="font-size:10px;color:var(--dim2);font-weight:700">${approvedCount}/${oItems.length} ✓</span>` : ''}
        ${revCount ? `<span style="font-size:10px;color:var(--y);font-weight:800">🔄 ${revCount} تعديل</span>` : ''}
        ${pendingDec ? `<span style="font-size:10px;color:var(--y);font-weight:800"><span class="dec-dot"></span> ${pendingDec} قرار</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── Open Order ──
window.openOrder = async function(orderId) {
  currentOrderId = orderId;
  // Update active state in list
  document.querySelectorAll('.ord-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick')?.includes(orderId));
  });
  const order = orders.find(o=>o._id===orderId);
  if (!order) return;
  // Init items if needed (creates design_items docs for each product)
  await initDesignItems(order);
  // Listen to items for this order
  if (itemsUnsub) itemsUnsub();
  const capturedOrderId = orderId;
  itemsUnsub = onSnapshot(
    query(collection(db,'design_items'), where('orderDocId','==',orderId)),
    snap => {
      if (currentOrderId !== capturedOrderId) return;
      currentItems = snap.docs.map(d=>({...d.data(),_id:d.id}))
        .sort((a,b)=>(a.itemIndex||0)-(b.itemIndex||0));
      renderPanel(order);
    }
  );
};

// ── Init Design Items ──
async function initDesignItems(order) {
  const products = order.products || [];
  if (!products.length) return;
  const refs = products.map((_, idx) => doc(db, 'design_items', `${order._id}_${idx}`));
  const snaps = await Promise.all(refs.map(r => getDoc(r)));
  const batch = writeBatch(db);
  let anyNew = false;
  snaps.forEach((snap, idx) => {
    if (!snap.exists()) {
      const p = products[idx];
      batch.set(snap.ref, {
        orderDocId: order._id,
        orderCode: order.orderId || '',
        clientId: order.clientId || '',
        clientName: order.clientName || '',
        clientPhone: order.clientPhone || '',
        designerId: order.designerId || currentUid,
        designerName: order.designerName || currentUserName,
        itemName: p.name || `بند ${idx+1}`,
        itemQty: p.qty || 1,
        itemIndex: idx,
        versions: [],
        revisions: [],
        status: 'in_progress',
        isApproved: false,
        isPrintReady: false,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp(),
        editHistory: []
      });
      anyNew = true;
    }
  });
  if (anyNew) await batch.commit();
}

// ── Render Panel ──
function renderPanel(order) {
  if (!order) return;
  const wsPanel = document.getElementById('ws-panel');
  const openIndices = new Set(
    [...wsPanel.querySelectorAll('.acc-body')].map((el,i)=>el.classList.contains('open')?i:-1).filter(i=>i>=0)
  );
  const isAdm = ['admin','operation_manager'].includes(currentRole);
  const pendingDec = clientDecisions.filter(d=>d.orderDocId===order._id);
  const approved = currentItems.filter(i=>i.isApproved).length;
  const printReady = currentItems.filter(i=>i.isPrintReady).length;
  const totalRevs = currentItems.reduce((s,i)=>s+(i.revisions?.length||0),0);
  const pri = getPriority(order.deadline);
  const loginUrl = `${location.origin}${location.pathname.replace('design-workspace.html','')}client-login.html`;

  // Order-level pipeline (based on aggregate of all items)
  const anyVersions = currentItems.some(i=>(i.versions||[]).length>0);
  const anyPublished = currentItems.some(i=>(i.clientPublishHistory||[]).length>0);
  const allApproved = currentItems.length>0 && currentItems.every(i=>i.isApproved);
  const allPrintReady = currentItems.length>0 && currentItems.every(i=>i.isPrintReady);
  const allGallery = currentItems.length>0 && currentItems.every(i=>i.galleryId);
  const OPIPE = [
    { lbl:'🎨 تصميم', done: anyVersions, cur: !anyVersions },
    { lbl:'📤 نشر للعميل', done: anyPublished, cur: anyVersions && !anyPublished },
    { lbl:'💬 مراجعة', done: approved>0, cur: anyPublished && !approved },
    { lbl:'✅ اعتماد', done: allApproved, cur: approved>0 && !allApproved },
    { lbl:'🖨️ طباعة', done: allPrintReady, cur: allApproved && !allPrintReady },
    { lbl:'🌐 معرض', done: allGallery, cur: allPrintReady && !allGallery },
  ];
  const orderPipeline = `<div class="oh-pipeline"><div class="pipeline">${
    OPIPE.map((s,i)=>`<div class="pipe-step">
      <div class="pipe-node ${s.done?'done':s.cur?'current':''}">${s.lbl}</div>
      ${i<OPIPE.length-1?'<span class="pipe-arrow">›</span>':''}
    </div>`).join('')
  }</div></div>`;

  wsPanel.innerHTML = `
    <!-- Order Header -->
    <div class="order-header">
      <div class="oh-row1">
        <div>
          <div class="oh-client">${order.clientName||'—'}</div>
          <div class="oh-meta">
            <span class="pri-badge ${pri.cls}">${pri.label}</span>
            ${order.deadline?`<span style="font-size:10px;color:var(--dim2)">📅 ${order.deadline}</span>`:''}
            ${order.designerName?`<span style="font-size:10px;color:var(--dim2)">🎨 ${order.designerName}</span>`:''}
          </div>
          <div class="oh-code">أوردر: ${order.orderId||order._id.slice(-8)} · ${(order.products||[]).map(p=>p.name+'×'+p.qty).join(' + ')||order.product||'—'}</div>
        </div>
        <div style="display:flex;gap:5px;align-items:flex-start;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--dim2)">${approved}/${currentItems.length} اعتمد · ${printReady} طباعة · ${totalRevs} تعديل</span>
          ${isAdm?`<button class="btn btn-ghost btn-xs" onclick="openReassign('${order._id}')">🔄 إسناد</button>`:''}
        </div>
      </div>
      ${orderPipeline}
    </div>

    <!-- Client Decisions (prominent if pending) -->
    ${pendingDec.length ? `
    <div style="padding:10px 16px;background:rgba(240,160,32,.06);border-bottom:2px solid rgba(240,160,32,.2)">
      <div style="font-size:12px;font-weight:800;color:var(--y);margin-bottom:8px">💬 ${pendingDec.length} قرار جديد من العميل</div>
      ${pendingDec.map(d=>{
        const itm=currentItems.find(i=>i._id===d.itemId);
        return `<div class="dec-card">
          <div class="dc-top">
            <span class="dc-item">📦 ${itm?.itemName||d.itemId}</span>
            <span style="font-size:10px;font-weight:800;color:${d.decision==='approved'?'var(--g)':'var(--y)'}">
              ${d.decision==='approved'?'✅ اعتمد':'🔄 طلب تعديل'}
            </span>
          </div>
          ${d.comment?`<div class="dc-comment">💬 ${d.comment}</div>`:''}
          <div class="dc-btns">
            <button class="btn btn-g btn-xs" onclick="processDecision('${d._id}','${d.itemId}','${d.decision}',true)">✓ تطبيق</button>
            <button class="btn btn-ghost btn-xs" onclick="processDecision('${d._id}','${d.itemId}','${d.decision}',false)">تجاهل</button>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <!-- Items -->
    <div class="items-wrapper">
      <div class="items-hdr">📦 بنود التصميم <span style="background:rgba(59,158,255,.12);color:var(--b);padding:1px 8px;border-radius:8px;font-weight:900">${currentItems.length}</span></div>
      ${renderItemsSection(order, isAdm)}
    </div>

    <!-- Collapsible: Revisions Log -->
    <div class="acc">
      <div class="acc-head" onclick="toggleAcc(this)">
        <span class="acc-title">🔄 سجل التعديلات <span style="font-size:10px;background:rgba(240,160,32,.15);color:var(--y);padding:1px 7px;border-radius:8px">${totalRevs}</span></span>
        <span style="font-size:11px;color:var(--dim2)">▾</span>
      </div>
      <div class="acc-body">${renderRevisionsSection()}</div>
    </div>

    <!-- Collapsible: Client Portal -->
    <div class="acc">
      <div class="acc-head" onclick="toggleAcc(this)">
        <span class="acc-title">🔗 بوابة العميل</span>
        <span style="font-size:11px;color:var(--dim2)">▾</span>
      </div>
      <div class="acc-body">
        <div class="portal-box">
          <div style="font-size:12px;color:var(--dim2);margin-bottom:8px">أرسل هذا الرابط للعميل مع بياناته لفتح البوابة:</div>
          <span class="portal-url">${loginUrl}</span>
          <div style="font-size:11px;color:var(--dim2);margin-bottom:10px">
            كود الأوردر: <strong style="color:var(--text)">${order.orderId||order._id.slice(-8)}</strong>
            ${isAdm?`· الهاتف: <strong style="color:var(--text)">${order.clientPhone||'—'}</strong>`:''}
          </div>
          <button class="btn btn-b btn-sm" onclick="copyPortalLink('${loginUrl}','${order.orderId||order._id}','${order.clientPhone||''}')">📋 نسخ رسالة للعميل</button>
        </div>
      </div>
    </div>

    <!-- Collapsible: Order Info -->
    <div class="acc">
      <div class="acc-head" onclick="toggleAcc(this)">
        <span class="acc-title">📋 تفاصيل الأوردر</span>
        <span style="font-size:11px;color:var(--dim2)">▾</span>
      </div>
      <div class="acc-body">
        <div class="stat-row"><span class="stat-lbl">العميل</span><span class="stat-val">${order.clientName||'—'}</span></div>

function renderItemsSection(order, isAdm) {
  if (!currentItems.length) return `<div style="text-align:center;padding:24px;color:var(--dim2);font-size:12px">⏳ يتم تهيئة البنود...</div>`;
  const loginUrl = `${location.origin}${location.pathname.replace('design-workspace.html','')}client-login.html`;
  const REQ = { client:'العميل', cs:'خدمة العملاء', admin:'الأدمن' };

  return currentItems.map(item => {
    const versions = item.versions || [];
    const revisions = item.revisions || [];
    const lastPub = item.clientPublishHistory?.slice(-1)[0] || null;
    const hasGallery = !!item.galleryId;
    const hasVersions = versions.length > 0;
    const hasPublished = !!lastPub;
    const approved = item.isApproved;
    const printReady = item.isPrintReady;
    const status = item.status || 'in_progress';
    const latestRev = revisions[revisions.length - 1];

    // Item-level pipeline
    const PIPE = [
      { lbl:'🎨 تصميم', done: hasVersions, cur: !hasVersions },
      { lbl:'📤 نشر', done: hasPublished && (approved || revisions.length > 0), cur: hasVersions && !hasPublished },
      { lbl:'💬 مراجعة', done: revisions.length > 0 || approved, cur: hasPublished && !approved && !revisions.length },
      { lbl:'✅ اعتماد', done: approved, cur: !approved && revisions.length > 0 },
      { lbl:'🖨️ طباعة', done: printReady, cur: approved && !printReady },
      { lbl:'🌐 معرض', done: hasGallery, cur: printReady && !hasGallery },
    ];
    const pipeHtml = `<div class="ic-pipeline"><div class="pipeline">${
      PIPE.map((s,i)=>`<div class="pipe-step">
        <div class="pipe-node ${s.done?'done':s.cur?'current':''}">${s.lbl}</div>
        ${i<PIPE.length-1?'<span class="pipe-arrow">›</span>':''}
      </div>`).join('')
    }</div></div>`;

    // "What's next?" guidance
    let naClass = 'na-upload', naIcon = '📤', naText = 'ارفع أول موك أب — اسحب الملف وأفلته على منطقة الرفع';
    if (hasVersions && !hasPublished) { naClass='na-publish'; naIcon='👁'; naText='جهّز الموك أب وانشره للعميل للمراجعة عبر زر "📤 نشر للعميل"'; }
    else if (status==='revision_requested' && latestRev) { naClass='na-revision'; naIcon='🔄'; naText=`تعديل #${latestRev.rNum}: "${latestRev.reason}" — ارفع نسخة جديدة ثم انشرها`; }
    else if (hasPublished && !approved && !revisions.length) { naClass='na-wait'; naIcon='⏳'; naText='في انتظار قرار العميل — ستصلك إشعار عند اتخاذ القرار'; }
    else if (approved && !printReady) { naClass='na-publish'; naIcon='🖨️'; naText='تم الاعتماد — اضغط "للطباعة" عند جاهزية الملفات النهائية'; }
    else if (printReady && !hasGallery) { naClass='na-done'; naIcon='🌐'; naText='جاهز للطباعة — يمكنك نشر التصميم في المعرض العام'; }
    else if (hasGallery) { naClass='na-done'; naIcon='✅'; naText='مكتمل — التصميم معتمد ومنشور في المعرض'; }

    // Version cards
    const verCardsHtml = versions.map((v, vi) => {
      const isClientVer = lastPub && v.vNum === lastPub.vNum;
      const isLatest = vi === versions.length - 1;
      const revAfter = revisions.find(r => r.createdAt > (v.uploadedAt||''));
      return `<div class="ver-card ${isClientVer?'vc-pub':''}">
        <div class="vc-img" onclick="openLightboxItem('${item._id}',${vi})">
          <img src="${v.imageUrl}" alt="v${v.vNum}" loading="lazy">
          <div class="vc-overlay"><span class="vc-zoom-lbl">🔍 عرض كامل</span></div>
          ${isClientVer?`<div class="vc-pub-badge">👁 نُشر</div>`:isLatest?`<div class="vc-new-badge">جديد</div>`:''}
          ${revAfter?`<div class="vc-rev-badge">🔄 ${revAfter.reason?.slice(0,18)||'تعديل'}</div>`:''}
        </div>
        <div class="vc-info">
          <div class="vc-vnum">النسخة ${v.vNum}</div>
          <div class="vc-date">${(v.uploadedAt||'').slice(0,10)||'—'} · ${v.uploadedByName||''}</div>
          ${isClientVer?`<div class="vc-pub-info">📤 نُشر ${(lastPub.publishedAt||'').slice(0,10)}</div>`:''}
          ${revAfter?`<div class="vc-rev-info">🔄 ${revAfter.reason||''}</div>`:''}
        </div>
      </div>`;
    }).join('');

    // Upload zone
    const uploadZone = `<div class="upload-zone ${hasVersions?'':'no-versions'}" data-itemid="${item._id}"
      onclick="document.getElementById('ver-inp-${item._id}').click()">
      <input type="file" id="ver-inp-${item._id}" class="ver-upload-inp" accept="image/*,application/pdf,.ai,.psd,.eps"
        onchange="uploadVersion('${item._id}',this)">
      ${hasVersions ? `<div class="uz-content compact">
        <span class="uz-sm-icon">☁️</span>
        <div>
          <div class="uz-title" style="font-size:12px">رفع نسخة جديدة</div>
          <div class="uz-sub">اسحب وأفلت · أو اضغط للاختيار</div>
        </div>
      </div>` : `<div class="uz-content full">
        <div class="uz-big-icon">☁️</div>
        <div class="uz-title">اسحب وأفلت ملف الموك أب هنا</div>
        <div class="uz-sub">PNG · JPG · PDF · AI · PSD</div>
      </div>`}
    </div>`;

    // Revision banner
    const revBanner = (status==='revision_requested' && latestRev) ? `<div class="rev-banner">
      <div class="rb-icon">🔄</div>
      <div>
        <div class="rb-num">تعديل #${latestRev.rNum} مطلوب · من ${REQ[latestRev.requestedBy]||latestRev.requestedBy}</div>
        <div class="rb-reason">${latestRev.reason||'—'}</div>
        ${latestRev.notes?`<div class="rb-notes">${latestRev.notes}</div>`:''}
        <div class="rb-meta">${(latestRev.createdAt||'').slice(0,16).replace('T',' ')}</div>
      </div>
    </div>` : '';

    // Action bar
    const actionBar = `<div class="item-action-bar">
      <div class="iab-primary">
        ${hasVersions?`<button class="btn btn-b btn-sm" onclick="publishToClient('${item._id}')">📤 نشر للعميل</button>`:''}
        ${!approved?`<button class="btn btn-g btn-sm" onclick="markApproved('${item._id}',false)">✅ اعتمد</button>`:`<button class="btn btn-ghost btn-sm" onclick="markApproved('${item._id}',true)">↩ إلغاء الاعتماد</button>`}
        ${approved&&!printReady?`<button class="btn btn-p btn-sm" onclick="togglePrintReady('${item._id}',false)">🖨️ للطباعة</button>`:''}
        ${printReady?`<button class="btn btn-ghost btn-sm" onclick="togglePrintReady('${item._id}',true)">↩ إلغاء الطباعة</button>`:''}
      </div>
      <div class="iab-secondary">
        <button class="btn btn-y btn-xs" onclick="openRevModal('${item._id}')">🔄 تسجيل تعديل</button>
        ${approved&&hasVersions?`<button class="btn btn-ghost btn-xs" onclick="publishToGallery('${item._id}')">${hasGallery?'🔄 تحديث المعرض':'🌐 نشر للمعرض'}</button>`:''}
        ${lastPub?`<button class="btn btn-ghost btn-xs" onclick="copyClientMsg('${order.orderId||order._id}','${order.clientPhone||''}','${loginUrl}')">📋 إشعار العميل</button>`:''}
        ${isAdm?`<button class="btn btn-ghost btn-xs" onclick="openEditItem('${item._id}','${item.itemName}',${item.itemQty||1})">✏️ تعديل البند</button>`:''}
      </div>
    </div>`;

    const stClass = {in_progress:'st-inprogress',revision_requested:'st-revision',approved:'st-approved',print_ready:'st-print'}[status]||'';

    return `<div class="item-card ${stClass}" id="item-${item._id}">
      <div class="ic-head">
        <div class="ic-title">
          <span class="ic-name">📦 ${item.itemName}</span>
          ${stChip(status)}
          <span class="ic-qty">× ${item.itemQty||1}</span>
          ${revisions.length?`<span class="ic-badge-rev">${revisions.length} تعديل</span>`:''}
          ${hasGallery?`<span class="ic-badge-gal">🌐 معرض</span>`:''}
          ${lastPub?`<span style="font-size:9px;color:var(--b);font-weight:800">👁 v${lastPub.vNum} نُشر</span>`:''}
        </div>
      </div>
      ${pipeHtml}
      <div class="next-action ${naClass}">
        <span class="na-icon">${naIcon}</span>
        <span class="na-text">${naText}</span>
      </div>
      ${revBanner}
      ${uploadZone}
      ${hasVersions?`
        <div class="ver-grid-head">
          <span>📸 نسخ التصميم (${versions.length})</span>
          ${lastPub?`<span style="color:var(--b)">👁 النسخة المنشورة للعميل: v${lastPub.vNum}</span>`:''}
        </div>
        <div class="ver-grid">${verCardsHtml}</div>`:''}
      ${actionBar}
    </div>`;
  }).join('');
}

// ── Item Actions ──
window.uploadVersion = async function(itemId, inp) {
  const file = inp.files[0]; if (!file) return;
  toast('جاري رفع الموك أب...', '');
  let imageUrl = null;
  const doFirestoreWrite = async (url) => {
    const item = currentItems.find(i=>i._id===itemId);
    const vNum = (item?.versions?.length||0) + 1;
    await updateDoc(doc(db,'design_items',itemId), {
      versions: arrayUnion({ vNum, imageUrl: url, fileName: file.name, uploadedAt: new Date().toISOString(), uploadedBy: currentUid, uploadedByName: currentUserName }),
      updatedAt: serverTimestamp(),
      editHistory: arrayUnion({ action: 'version_uploaded', vNum, by: currentUid, byName: currentUserName, at: new Date().toISOString() })
    });
    inp.value = '';
    toast('✅ تم رفع v' + vNum, 'ok');
  };
  try {
    const sRef = ref(storage, `design-items/${itemId}_v${Date.now()}`);
    await uploadBytes(sRef, file);
    imageUrl = await getDownloadURL(sRef);
    await doFirestoreWrite(imageUrl);
  } catch(e) {
    if (imageUrl) {
      try { await doFirestoreWrite(imageUrl); }
      catch(e2) {
        console.error('uploadVersion Firestore retry failed', { imageUrl, e2 });
        toast('❌ تعذّر التسجيل — الرابط محفوظ في Console للاسترداد', 'err');
      }
    } else { toast('❌ ' + e.message, 'err'); }
  }
};

window.markApproved = async function(itemId, current) {

    await updateDoc(doc(db,'design_items',itemId), {

    });

};

// ── Process Client Decision ──
window.processDecision = async function(decId, itemId, decision, apply) {
  try {
    const batch = writeBatch(db);
    // Mark decision as processed
    batch.update(doc(db,'client_decisions',decId), { processed: true, processedAt: serverTimestamp(), processedBy: currentUid });
    if (apply && itemId) {
      const updates = {
        updatedAt: serverTimestamp(),
        editHistory: arrayUnion({ action: `client_decision_${decision}`, by: currentUid, byName: currentUserName, at: new Date().toISOString() })
      };
      if (decision === 'approved') { updates.isApproved = true; updates.status = 'approved'; }
      else if (decision === 'revision') { updates.status = 'revision_requested'; }
      batch.update(doc(db,'design_items',itemId), updates);
    }
    await batch.commit();
    toast(apply ? '✅ تم تطبيق قرار العميل' : '🗑 تم تجاهل القرار', apply?'ok':'');
  } catch(e) { toast('❌ ' + e.message, 'err'); }
};

window.renderCurrentItems = function() {
  const order = orders.find(o=>o._id===currentOrderId);
  if (order) renderPanel(order);
};

// ── Lightbox ──
let lbVersions = [], lbIndex = 0;
window.openLightboxItem = function(itemId, startIndex) {
  const item = currentItems.find(i => i._id === itemId);
  if (!item?.versions?.length) return;
  lbVersions = item.versions;
  lbIndex = Math.min(startIndex, lbVersions.length - 1);
  renderLb();
  document.getElementById('lb-overlay').classList.add('open');
};
function renderLb() {
  const v = lbVersions[lbIndex];
  document.getElementById('lb-img').src = v.imageUrl;
  document.getElementById('lb-caption').textContent =
    `v${v.vNum} · ${(v.uploadedAt||'').slice(0,10)||'—'} · ${v.uploadedByName||''}`;
  document.getElementById('lb-counter').textContent = `${lbIndex+1} / ${lbVersions.length}`;
  document.getElementById('lb-prev-btn').style.opacity = lbIndex > 0 ? '1' : '.3';
  document.getElementById('lb-next-btn').style.opacity = lbIndex < lbVersions.length-1 ? '1' : '.3';
  document.getElementById('lb-dl').href = v.imageUrl;
}
window.lbPrev = () => { if(lbIndex > 0) { lbIndex--; renderLb(); }};
window.lbNext = () => { if(lbIndex < lbVersions.length-1) { lbIndex++; renderLb(); }};
window.closeLightbox = () => document.getElementById('lb-overlay').classList.remove('open');
window.closeLightboxBg = e => { if(e.target.id==='lb-overlay') closeLightbox(); };
document.addEventListener('keydown', e => {
  if (!document.getElementById('lb-overlay').classList.contains('open')) return;
  if (e.key==='ArrowLeft'||e.key==='ArrowRight') e.key==='ArrowLeft' ? lbPrev() : lbNext();
  if (e.key==='Escape') closeLightbox();
});

// ── Drag & Drop ──
function setupDragDrop() {
  document.querySelectorAll('.upload-zone[data-itemid]').forEach(zone => {
    const itemId = zone.dataset.itemid;
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', e => { if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over'); });
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0]; if (!file) return;
      uploadVersion(itemId, { files: [file] });
    });
  });
}

// ── Publish to Client ──
window.publishToClient = async function(itemId) {
  const item = currentItems.find(i => i._id === itemId);
  if (!item) return;
  const versions = item.versions || [];
  if (!versions.length) return toast('⚠️ ارفع موك أب أولاً', 'err');
  const latest = versions[versions.length - 1];
  try {
    await updateDoc(doc(db,'design_items',itemId), {
      clientPublishHistory: arrayUnion({
        vNum: latest.vNum, imageUrl: latest.imageUrl,
        publishedAt: new Date().toISOString(),
        publishedBy: currentUid, publishedByName: currentUserName,
      }),
      lastPublishedVNum: latest.vNum, lastPublishedAt: serverTimestamp(),
      updatedAt: serverTimestamp(),
      editHistory: arrayUnion({ action:'published_to_client', vNum:latest.vNum, by:currentUid, byName:currentUserName, at:new Date().toISOString() }),
    });
    toast(`✅ v${latest.vNum} نُشر للعميل للمراجعة`, 'ok');
  } catch(e) { toast('❌ ' + e.message, 'err'); }
};

// ── Publish to Gallery ──
window.publishToGallery = async function(itemId) {
  const item = currentItems.find(i => i._id === itemId);
  if (!item) return;
  const order = orders.find(o => o._id === (item.orderDocId||currentOrderId));
  const versions = item.versions || [];
  if (!versions.length) return toast('⚠️ لا توجد نسخ', 'err');
  const latest = versions[versions.length - 1];
  if (!confirm(`نشر "${item.itemName}" في المعرض العام؟`)) return;
  try {
    const galleryRef = item.galleryId
      ? doc(db,'gallery',item.galleryId)
      : doc(collection(db,'gallery'));
    const batch = writeBatch(db);
    batch.set(galleryRef, {
      title: item.itemName,
      imageUrl: latest.imageUrl,
      clientName: item.clientName || order?.clientName || '',
      designerName: item.designerName || currentUserName,
      productType: order?.products?.[item.itemIndex]?.name || item.itemName,
      orderId: item.orderDocId || '',
      publishedAt: serverTimestamp(),
      publishedBy: currentUid, isVisible: true, tags: [],
    }, { merge: true });
    if (!item.galleryId) {
      batch.update(doc(db,'design_items',itemId), {
        galleryId: galleryRef.id, updatedAt: serverTimestamp(),
        editHistory: arrayUnion({ action:'published_to_gallery', galleryId:galleryRef.id, by:currentUid, byName:currentUserName, at:new Date().toISOString() }),
      });
    }
    await batch.commit();
    toast('🌐 تم النشر في المعرض العام', 'ok');
  } catch(e) { toast('❌ ' + e.message, 'err'); }
};

// ── Copy Client Notification ──
window.copyClientMsg = function(orderId, phone, loginUrl) {
  const msg = `مرحباً 🎨\nتصميمك جاهز للمراجعة!\nافتح الرابط وأدخل بياناتك:\n🔗 ${loginUrl}\nكود الأوردر: ${orderId}\nرقم هاتفك: ${phone}`;
  navigator.clipboard.writeText(msg)
    .then(() => toast('✅ تم نسخ رسالة الإشعار','ok'))
    .catch(() => toast('⚠️ لم يتم النسخ','err'));
};
</script>
