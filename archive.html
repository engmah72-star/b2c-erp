<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff3d6e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="B2C ERP">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
<title>Business2Card — الأرشيف</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.ocard{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;cursor:pointer;transition:var(--trans);border-right:3px solid var(--g)}
.ocard:hover{border-color:var(--g);transform:translateX(-2px)}
.oc-id{font-size:10px;color:var(--dim2);margin-bottom:3px}
.oc-client{font-size:14px;font-weight:800;margin-bottom:2px}
.oc-product{font-size:11px;color:var(--dim2);margin-bottom:7px}
.oc-foot{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--line)}
.irow{background:var(--bg3);border-radius:8px;padding:8px 10px}
.irow-l{font-size:10px;color:var(--dim2);margin-bottom:2px}
.irow-v{font-size:12px;font-weight:700}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand">
    <div class="nav-logo">🎨</div>
    <div>
      <div class="nav-brand-name">Business2Card</div>
      <div class="nav-brand-role" id="role-badge">ERP</div>
    </div>
  </div>
  <div class="nav-scroll" id="nav-links">
    <div style="padding:20px;text-align:center;color:var(--dim2);font-size:12px">جاري التحميل...</div>
  </div>
  <div class="nav-foot">
    <div class="nav-user" onclick="doLogout()">
      <div class="nav-avatar" id="nav-av">A</div>
      <div>
        <div class="nav-user-name" id="nav-name">User</div>
        <div class="nav-user-role">تسجيل خروج</div>
      </div>
    </div>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><button class="mob-menu-btn" onclick="toggleNav()">☰</button><div><h1>📁 الأرشيف</h1><p id="sub">جاري التحميل...</p></div></div>
    <div class="topbar-right"><button class="btn btn-ghost btn-sm" onclick="exportCSV()">↓ تصدير</button></div>
  </div>
  <div class="content">
    <div class="stats" style="margin-bottom:16px">
      <div class="stat" style="--sc:var(--g)"><div class="stat-icon">📦</div><div class="stat-val" id="s-total">0</div><div class="stat-lbl">مكتمل</div></div>
      <div class="stat" style="--sc:var(--b)"><div class="stat-icon">💰</div><div class="stat-val" id="s-rev">0</div><div class="stat-lbl">إيرادات ج</div></div>
      <div class="stat" style="--sc:var(--r)"><div class="stat-icon">🏭</div><div class="stat-val" id="s-cost">0</div><div class="stat-lbl">تكاليف ج</div></div>
      <div class="stat" style="--sc:var(--p)"><div class="stat-icon">💹</div><div class="stat-val" id="s-profit">0</div><div class="stat-lbl">صافي ربح ج</div></div>
    </div>
    <div class="filters" style="margin-bottom:14px">
      <div class="sw"><span class="sw-ico">🔍</span><input class="inp" id="q" placeholder="بحث..." oninput="renderList()" style="min-width:220px"></div>
      <select class="inp" id="f-month" onchange="renderList()" style="width:150px"><option value="">كل الأشهر</option></select>
    </div>
    <div id="list"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</div>
</div>

<!-- PANEL -->
<div class="panel-ov" id="panel-ov" onclick="closePanel()">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-head"><div id="pn-hdr"></div><button class="modal-x" onclick="closePanel()">✕</button></div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>

<nav class="mob-nav"><div class="mob-nav-items">
  <a class="mob-nav-item" href="index.html"><div class="mob-nav-ico">⬡</div><div class="mob-nav-lbl">الرئيسية</div></a>
  <a class="mob-nav-item" href="clients.html"><div class="mob-nav-ico">👤</div><div class="mob-nav-lbl">العملاء</div></a>
  <a class="mob-nav-item" href="print.html"><div class="mob-nav-ico">🖨️</div><div class="mob-nav-lbl">طباعة</div></a>
  <a class="mob-nav-item" href="reports.html"><div class="mob-nav-ico">📊</div><div class="mob-nav-lbl">تقارير</div></a>
  <a class="mob-nav-item active" href="archive.html"><div class="mob-nav-ico">📁</div><div class="mob-nav-lbl">أرشيف</div></a>
</div></nav>
<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div class="toasts" id="toasts"></div>

<script type="module">

// ── Global Error Handler ──
window.addEventListener('unhandledrejection',e=>{
  const msg=e.reason?.message||'';
  if(msg.includes('permission-denied')||msg.includes('Missing or insufficient')){
    console.warn('🔒 Permission denied — run setup-permissions.html');
  } else if(msg&&!msg.includes('AbortError')){
    console.error('Error:',msg);
  }
  e.preventDefault();
});

// ══ Sidebar Manager ══
const SIDEBAR_PAGES=[
  {file:'index.html',label:'لوحة التحكم',ico:'⬡',group:'main',adminOnly:true},
  {file:'clients.html',label:'العملاء',ico:'👤',group:'orders',perm:'clients'},
  {file:'design.html',label:'التصميم',ico:'✏️',group:'orders',perm:'design'},
  {file:'print.html',label:'الطباعة',ico:'🖨️',group:'orders',perm:'print'},
  {file:'production.html',label:'التنفيذ',ico:'🏭',group:'orders',perm:'production'},
  {file:'shipping.html',label:'الشحن',ico:'🚚',group:'orders',perm:'shipping'},
  {file:'shipping-accounts.html',label:'حسابات الشحن',ico:'📦',group:'orders',perm:'shipping-accounts'},
  {file:'archive.html',label:'الأرشيف',ico:'📁',group:'orders',perm:'archive'},
  {file:'accounts.html',label:'الحسابات',ico:'💰',group:'admin',perm:'accounts'},
  {file:'suppliers.html',label:'الموردين',ico:'▣',group:'admin',perm:'suppliers'},
  {file:'products.html',label:'المنتجات',ico:'◈',group:'admin',perm:'products'},
  {file:'reports.html',label:'التقارير',ico:'📊',group:'admin',perm:'reports'},
  {file:'employees.html',label:'الموظفين',ico:'👥',group:'admin',adminOnly:true},
  {file:'settings.html',label:'الإعدادات',ico:'⚙️',group:'admin',adminOnly:true},
];
const ROLE_HOME_MAP={admin:'index.html',operation_manager:'index.html',customer_service:'cs-dashboard.html',graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'};
const DASH_LABELS={admin:'لوحة التحكم',operation_manager:'لوحة التحكم',customer_service:'داشبوردي',graphic_designer:'داشبوردي',design_operator:'داشبوردي',production_agent:'داشبوردي',shipping_officer:'داشبوردي',wallet_manager:'داشبوردي'};
const GROUP_LABELS_SB={main:'الرئيسية',orders:'الأوردرات',admin:'الإدارة'};

function initSidebar(userData,currentPage){
  if(!userData)return true;
  const role=userData.role||'customer_service';
  const perms=userData.permissions||{};
  const pages=perms.pages||[];
  const isAdm=['admin','operation_manager'].includes(role);
  const cur=(currentPage||window.location.pathname.split('/').pop()||'').replace(/\?.*/,'');
  // Guard
  if(!isAdm&&cur){
    const cfg=SIDEBAR_PAGES.find(p=>p.file===cur);
    if(cfg){
      if(cfg.adminOnly){window.location.href=ROLE_HOME_MAP[role]||'login.html';return false;}
      const perm=cfg.perm||cur.replace('.html','');
      if(!pages.includes('*')&&!pages.includes(perm)){window.location.href=ROLE_HOME_MAP[role]||'login.html';return false;}
    }
  }
  // Build
  const navEl=document.getElementById('nav-links');
  if(!navEl)return true;
  const dashHome=ROLE_HOME_MAP[role]||'index.html';
  let html='';
  let lastGrp='';
  html+=`<a class="nav-link${cur===dashHome?' active':''}" href="${dashHome}"><span class="nav-ico">⬡</span> ${DASH_LABELS[role]||'داشبوردي'}</a>`;
  for(const cfg of SIDEBAR_PAGES){
    if(cfg.file==='index.html')continue;
    const allowed=isAdm||(cfg.adminOnly?false:pages.includes('*')||pages.includes(cfg.perm||''));
    if(!allowed)continue;
    if(cfg.group!==lastGrp){html+=`<div class="nav-group">${GROUP_LABELS_SB[cfg.group]||cfg.group}</div>`;lastGrp=cfg.group;}
    html+=`<a class="nav-link${cur===cfg.file?' active':''}" href="${cfg.file}"><span class="nav-ico">${cfg.ico}</span> ${cfg.label}</a>`;
  }
  navEl.innerHTML=html;
  return true;
}
// ══════════════════════
// archive.html — stage == 'archived' فقط
// نهاية دورة حياة الأوردر
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot, getDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"});
const auth=getAuth(app); const db=getFirestore(app);

let orders=[],currentUser=null,userName='',activeId=null;

const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const gv=id=>document.getElementById(id)?.value||'';
const setText=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
const ROLES={admin:{label:'Admin',col:'var(--p)'},operation_manager:{label:'Ops Mgr',col:'var(--b)'},customer_service:{label:'CS',col:'var(--c)'},graphic_designer:{label:'Designer',col:'var(--p)'},design_operator:{label:'Design Op',col:'var(--y)'},production_agent:{label:'Production',col:'var(--r)'},shipping_officer:{label:'Shipping',col:'var(--c)'},wallet_manager:{label:'Wallet',col:'var(--g)'}};

function toast(msg,t=''){const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}
window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};
window.doLogout=async()=>{const {signOut:so}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");await so(auth);window.location.href='login.html';};

onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  currentUser=u;
  const snap=await getDoc(doc(db,'users',u.uid));

  // ══ ROLE GUARD ══
  const _role2 = (snap.exists()?snap.data().role:null)||'';
  if(!['admin', 'operation_manager', 'wallet_manager'].includes(_role2)){
    const _home2 = {"admin":"index.html","operation_manager":"index.html","customer_service":"cs-dashboard.html","graphic_designer":"designer-dashboard.html","design_operator":"designer-dashboard.html","production_agent":"production-dashboard.html","shipping_officer":"shipping-dashboard.html","wallet_manager":"accounts.html"}[_role2]||'login.html';
    window.location.href=_home2; return;
  }
  // ════════════════
  if(snap.exists()){const d=snap.data();const r=ROLES[d.role||'admin']||ROLES.admin;userName=d.name||u.email;setText('nav-name',userName);document.getElementById('nav-av').textContent=userName[0].toUpperCase();document.getElementById('nav-av').style.cssText=`background:${r.col}20;color:${r.col}`;document.getElementById('role-badge').textContent=r.label;document.getElementById('role-badge').style.cssText=`background:${r.col}18;color:${r.col}`;}
  // ✅ stage == 'archived' فقط
  onSnapshot(
    query(collection(db,'orders'),where('stage','==','archived')),
    snap=>{
      orders=snap.docs.map(d=>({...d.data(),_id:d.id}))
        .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      renderList();
      const n=orders.length;
      const setText2=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
      setText2('sub',n+' طلب');
    }
  );
});

function updateStats(){
  const rev=orders.reduce((s,o)=>s+(parseFloat(o.salePrice)||0),0);
  const cost=orders.reduce((s,o)=>(o.costItems||[]).reduce((cs,c)=>cs+(parseFloat(c.total)||0),s),0);
  const profit=rev-cost;
  setText('s-total',orders.length);setText('s-rev',fn(rev)+' ج');setText('s-cost',fn(cost)+' ج');
  const pEl=document.getElementById('s-profit');if(pEl){pEl.textContent=fn(Math.abs(profit))+' ج';pEl.style.color=profit>=0?'var(--g)':'var(--r)';}
  setText('sub',orders.length+' طلب مكتمل');
}

function fillMonths(){
  const months=new Set();
  orders.forEach(o=>{const m=(o.deliveredDate||o.createdDate||'').slice(0,7);if(m)months.add(m);});
  const sel=document.getElementById('f-month');if(!sel)return;
  const cur=sel.value;
  sel.innerHTML='<option value="">كل الأشهر</option>'+[...months].sort().reverse().map(m=>`<option value="${m}"${m===cur?' selected':''}>${m}</option>`).join('');
}

window.renderList=function(){
  const q=gv('q').toLowerCase();const fm=gv('f-month');
  const data=orders.filter(o=>{
    const mq=!q||o.clientName?.toLowerCase().includes(q)||o.orderId?.includes(q)||(o.product||'').toLowerCase().includes(q);
    const mm=!fm||(o.deliveredDate||o.createdDate||'').startsWith(fm);
    return mq&&mm;
  });
  const el=document.getElementById('list');if(!el)return;
  if(!data.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📁</div><div class="empty-text">${orders.length?'لا توجد نتائج':'الأرشيف فارغ'}</div></div>`;return;}
  el.innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px">
    ${data.map(o=>{
      const sale=parseFloat(o.salePrice)||0;
      const cost=(o.costItems||[]).reduce((s,c)=>s+(parseFloat(c.total)||0),0);
      const profit=sale-cost;
      return`<div class="ocard" onclick="openOrder('${o._id}')">
        <div class="oc-id">${o.orderId||o._id.slice(-6)} · ${o.deliveredDate||o.createdDate||'—'}</div>
        <div class="oc-client">${o.clientName||'—'}</div>
        <div class="oc-product">${o.product||'—'} ${o.qty?'× '+o.qty:''}</div>
        <div style="display:flex;gap:10px;font-size:11px;margin-bottom:6px">
          <span style="color:var(--b)">💰 ${fn(sale)} ج</span>
          <span style="color:var(--r)">🏭 ${fn(cost)} ج</span>
        </div>
        <div class="oc-foot">
          <span class="badge bg-g">✅ مكتمل</span>
          <span style="font-size:11px;color:${profit>=0?'var(--g)':'var(--r)'}">ربح: ${profit>=0?'+':''}${fn(profit)} ج</span>
        </div>
      </div>`;
    }).join('')}
  </div>`;
};

window.openOrder=function(id){
  activeId=id;const o=orders.find(x=>x._id===id);if(!o)return;
  document.getElementById('pn-hdr').innerHTML=`<div><div style="font-size:10px;color:var(--g);font-weight:700">✅ مكتمل · ${o.orderId||id.slice(-6)}</div><div style="font-size:16px;font-weight:800">${o.clientName||'—'}</div><div style="font-size:12px;color:var(--dim2)">${o.clientPhone||''}</div></div>`;
  document.getElementById('panel-ov').classList.add('open');
  const sale=parseFloat(o.salePrice)||0;
  const cost=(o.costItems||[]).reduce((s,c)=>s+(parseFloat(c.total)||0),0);
  const profit=sale-cost;
  document.getElementById('panel-body').innerHTML=`
    <div style="background:rgba(0,217,126,.07);border:1px solid rgba(0,217,126,.2);border-radius:var(--rad2);padding:14px;margin-bottom:14px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center">
      <div><div style="font-size:10px;color:var(--dim2);margin-bottom:3px">المبيعات</div><div style="font-size:18px;font-weight:900;color:var(--b)">${fn(sale)} ج</div></div>
      <div><div style="font-size:10px;color:var(--dim2);margin-bottom:3px">التكاليف</div><div style="font-size:18px;font-weight:900;color:var(--r)">${fn(cost)} ج</div></div>
      <div><div style="font-size:10px;color:var(--dim2);margin-bottom:3px">الربح</div><div style="font-size:18px;font-weight:900;color:${profit>=0?'var(--g)':'var(--r)'}">${fn(Math.abs(profit))} ج</div></div>
    </div>
    <div class="section"><div class="section-title" style="margin-bottom:10px">📦 تفاصيل</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${iRow('المنتج',o.product||'—')}${iRow('الكمية',o.qty||'—')}
      ${iRow('العميل',o.clientName||'—')}${iRow('الهاتف',o.clientPhone||'—')}
      ${iRow('تاريخ الطلب',o.createdDate||'—')}${iRow('تاريخ التسليم',o.deliveredDate||'—')}
      ${iRow('سعر البيع',fn(sale)+' ج','var(--b)')}${iRow('المحصّل',fn(o.paid||0)+' ج','var(--g)')}
    </div></div>
    ${(o.costItems||[]).length?`<div class="section"><div class="section-title" style="margin-bottom:8px">💰 بنود التكلفة</div>
    ${o.costItems.map(c=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--line)"><span>${c.type||'—'} ${c.supplierName?'('+c.supplierName+')':''}</span><span style="color:var(--r);font-weight:700">${fn(c.total)} ج</span></div>`).join('')}
    </div>`:''}
    <div class="section"><div class="section-title" style="margin-bottom:8px">📋 السجل</div>${tlHtml(o.timeline)}</div>`;
};
window.closePanel=()=>{document.getElementById('panel-ov').classList.remove('open');activeId=null;};
function iRow(lbl,val,col=null){return`<div class="irow"><div class="irow-l">${lbl}</div><div class="irow-v"${col?` style="color:${col}"`:''}>${val}</div></div>`;}
function tlHtml(tl){return(tl||[]).slice().reverse().map(t=>`<div style="font-size:11px;color:var(--dim2);padding:4px 0;border-bottom:1px solid var(--line)">${t.date} — ${t.action}</div>`).join('')||'—';}

window.exportCSV=function(){
  const rows=[['رقم الطلب','العميل','المنتج','الكمية','البيع','التكلفة','الربح','التسليم']];
  orders.forEach(o=>{const s=parseFloat(o.salePrice)||0;const c=(o.costItems||[]).reduce((cs,x)=>cs+(parseFloat(x.total)||0),0);rows.push([o.orderId||o._id.slice(-6),o.clientName||'',o.product||'',o.qty||'',s,c,s-c,o.deliveredDate||'']);});
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download='أرشيف.csv';a.click();
};
</script>
  <script>
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>
</body>
