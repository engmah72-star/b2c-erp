<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business2Card — الأرشيف</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.order-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;margin-bottom:10px;cursor:pointer;transition:var(--trans);border-right:3px solid var(--g);}
.order-card:hover{transform:translateX(-2px);box-shadow:0 4px 20px rgba(0,0,0,.3);}
.tl-item{display:flex;gap:12px;padding:8px 0;}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.prod-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);gap:8px;}
.prod-row:last-child{border:none;}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">Archive</div></div></div>
  <div class="nav-scroll">
    <a class="nav-link" href="index.html"><span class="nav-ico">⬡</span> لوحة التحكم</a>
    <a class="nav-link" href="clients.html"><span class="nav-ico">👤</span> العملاء</a>
    <a class="nav-link" href="design.html"><span class="nav-ico">✏️</span> التصميم</a>
    <a class="nav-link" href="print.html"><span class="nav-ico">🖨️</span> الطباعة</a>
    <a class="nav-link" href="production.html"><span class="nav-ico">🏭</span> التنفيذ</a>
    <a class="nav-link" href="shipping.html"><span class="nav-ico">🚚</span> الشحن</a>
    <a class="nav-link active" href="archive.html"><span class="nav-ico">📁</span> الأرشيف</a>
    <a class="nav-link" href="accounts.html"><span class="nav-ico">💰</span> الحسابات</a>
    <a class="nav-link" href="settings.html"><span class="nav-ico">⚙️</span> الإعدادات</a>
  </div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">A</div><div><div class="nav-user-name" id="nav-name">User</div><div class="nav-user-role">خروج</div></div></div></div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><button class="mob-menu-btn" onclick="toggleNav()">☰</button><div><h1>📁 الأرشيف</h1><p id="page-sub">جاري التحميل...</p></div></div>
    <div class="topbar-right"><button class="btn btn-ghost btn-sm" onclick="exportCSV()">↓ تصدير</button></div>
  </div>
  <div class="content">
    <div class="stats" style="margin-bottom:16px">
      <div class="stat" style="--sc:var(--g)"><div class="stat-icon">✅</div><div class="stat-val" id="st-done">—</div><div class="stat-lbl">تم التسليم</div></div>
      <div class="stat" style="--sc:var(--y)"><div class="stat-icon">💰</div><div class="stat-val" id="st-revenue">—</div><div class="stat-lbl">إجمالي الإيرادات</div></div>
      <div class="stat" style="--sc:var(--p)"><div class="stat-icon">📊</div><div class="stat-val" id="st-margin">—</div><div class="stat-lbl">إجمالي الربح</div></div>
    </div>
    <div class="tabs" style="margin-bottom:12px">
      <button class="tab on" onclick="switchTab(this,'delivered')">✅ تم التسليم</button>
      <button class="tab" onclick="switchTab(this,'archived')">📁 مؤرشف</button>
      <button class="tab" onclick="switchTab(this,'cancelled')">✕ ملغي</button>
      <button class="tab" onclick="switchTab(this,'all')">📋 الكل</button>
    </div>
    <div class="filters"><div class="sw"><span class="sw-ico">🔍</span><input class="inp" id="q" placeholder="بحث..." oninput="renderList()"></div></div>
    <div id="orders-list"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</div>
</div>
<div class="panel-ov" id="panel-ov" onclick="closePanel()">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-head"><div id="pn-hdr"></div><button class="modal-x" onclick="closePanel()">✕</button></div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>
<nav class="mob-nav"><div class="mob-nav-items">
  <a class="mob-nav-item" href="index.html"><div class="mob-nav-ico">⬡</div><div class="mob-nav-lbl">الرئيسية</div></a>
  <a class="mob-nav-item" href="shipping.html"><div class="mob-nav-ico">🚚</div><div class="mob-nav-lbl">شحن</div></a>
  <a class="mob-nav-item active" href="archive.html"><div class="mob-nav-ico">📁</div><div class="mob-nav-lbl">أرشيف</div></a>
  <a class="mob-nav-item" href="reports.html"><div class="mob-nav-ico">📊</div><div class="mob-nav-lbl">تقارير</div></a>
  <a class="mob-nav-item" href="settings.html"><div class="mob-nav-ico">⚙️</div><div class="mob-nav-lbl">إعدادات</div></a>
</div></nav>
<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div class="toasts" id="toasts"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,collection,doc,onSnapshot,updateDoc,getDoc,arrayUnion,query,orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { STAGES,ROLES,fn,nowStr } from './orders.js';
const FB={apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"};
const app=initializeApp(FB);const auth=getAuth(app);const db=getFirestore(app);
let allOrders=[],currentUser=null,currentRole='admin',currentUserName='',activeId=null,currentTab='delivered';
const gv=id=>document.getElementById(id)?.value||'';
const setText=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
const oM=id=>document.getElementById('ov-'+id)?.classList.add('open');
const cM=id=>document.getElementById('ov-'+id)?.classList.remove('open');
window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};
function toast(msg,t=''){const c=document.getElementById('toasts');const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  currentUser=u;
  const s=await getDoc(doc(db,'users',u.uid));
  if(s.exists()){const d=s.data();currentRole=d.role||'admin';currentUserName=d.name||u.email;const r=ROLES[currentRole]||ROLES.admin;setText('nav-name',currentUserName);document.getElementById('nav-av').textContent=currentUserName[0].toUpperCase();document.getElementById('nav-av').style.cssText='background:'+r.col+'20;color:'+r.col;document.getElementById('role-badge').textContent=r.label;document.getElementById('role-badge').style.cssText='background:'+r.col+'18;color:'+r.col;}
  startListeners();
});
function startListeners(){
  onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc')),snap=>{
    allOrders=snap.docs.map(d=>({...d.data(),_id:d.id})).filter(o=>['delivered','archived','cancelled'].includes(o.status));
    renderList();updateStats();
  });
}
function updateStats(){
  const done=allOrders.filter(o=>o.status==='delivered');
  const revenue=done.reduce((s,o)=>s+(o.totalSale||0),0);
  const cost=done.reduce((s,o)=>(o.costs||[]).reduce((ss,c)=>ss+(c.totalCost||0),s),0);
  setText('st-done',done.length);
  setText('st-revenue',fn(revenue)+' ج');
  setText('st-margin',fn(revenue-cost)+' ج');
  setText('page-sub',allOrders.length+' أوردر مؤرشف');
}
window.switchTab=function(btn,tab){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');currentTab=tab;renderList();};
window.renderList=function(){
  const q=gv('q').toLowerCase();
  let data=allOrders.filter(o=>currentTab==='all'||o.status===currentTab);
  if(q)data=data.filter(o=>(o.clientName||'').toLowerCase().includes(q)||(o.id||'').toLowerCase().includes(q));
  const el=document.getElementById('orders-list');
  if(!data.length){el.innerHTML='<div class="empty"><div class="empty-icon">📁</div><div class="empty-text">لا توجد أوردرات</div></div>';return;}
  const cols={delivered:'var(--g)',archived:'var(--dim2)',cancelled:'var(--r)'};
  const icons={delivered:'✅',archived:'📁',cancelled:'✕'};
  el.innerHTML=data.map(o=>{
    const col=cols[o.status]||'var(--g)';
    const prods=(o.products||[]).map(p=>p.name+'x'+p.qty).join(' . ');
    const ts=o.totalSale||0;const tc=(o.costs||[]).reduce((s,c)=>s+(c.totalCost||0),0);
    return '<div class="order-card" style="border-right-color:'+col+'" onclick="openOrder(\''+o._id+'\')">'
      +'<div style="font-size:10px;font-weight:700;color:'+col+'">'+icons[o.status]+' '+o.id+'</div>'
      +'<div style="font-size:14px;font-weight:800;margin:4px 0">'+(o.clientName||'—')+'</div>'
      +'<div style="font-size:11px;color:var(--dim2);margin-bottom:6px">'+prods+'</div>'
      +'<div style="display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid var(--line)">'
      +'<span class="badge" style="background:'+col+'18;color:'+col+'">'+icons[o.status]+' '+(o.status==='delivered'?'تم التسليم':o.status==='cancelled'?'ملغي':'مؤرشف')+'</span>'
      +(ts?'<span style="font-size:12px;font-weight:700;color:var(--g)">'+fn(ts)+' ج</span>':'')
      +'</div></div>';
  }).join('');
};
window.openOrder=function(id){
  activeId=id;
  const o=allOrders.find(x=>x._id===id);if(!o)return;
  document.getElementById('panel-ov').classList.add('open');
  const ts=o.totalSale||0;const tc=(o.costs||[]).reduce((s,c)=>s+(c.totalCost||0),0);
  document.getElementById('pn-hdr').innerHTML='<div><div style="font-size:10px;color:var(--g);font-weight:700">📁 '+o.id+'</div><div style="font-size:16px;font-weight:800">'+(o.clientName||'—')+'</div><div style="font-size:11px;color:var(--dim2)">'+(o.clientPhone||'')+'</div></div>';
  let prods=(o.products||[]).map(p=>'<div class="prod-row"><span style="flex:1;font-weight:700">'+p.name+'</span><span style="color:var(--dim2)">x '+p.qty+'</span><span style="color:var(--g);font-weight:700">'+fn(p.totalPrice)+' ج</span></div>').join('');
  let timeline=(o.timeline||[]).map(t=>'<div class="tl-item"><div class="tl-dot" style="background:'+(STAGES[t.stage]?.col||'var(--dim2)')+'"></div><div><div style="font-size:13px;font-weight:600">'+t.label+'</div><div style="font-size:10px;color:var(--dim2)">'+t.date+(t.by?' . '+t.by:'')+'</div></div></div>').join('');
  document.getElementById('panel-body').innerHTML=
    '<div class="section"><div class="section-title" style="margin-bottom:10px"><div class="section-ico" style="background:rgba(0,217,126,.12);color:var(--g)">📦</div>المنتجات والمالية</div>'
    +prods
    +'<div style="background:var(--bg3);border-radius:var(--rad);padding:12px;margin-top:10px">'
    +'<div style="display:flex;justify-content:space-between;margin-bottom:4px;font-weight:800"><span>البيع</span><span style="color:var(--g)">'+fn(ts)+' ج</span></div>'
    +(tc?'<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--dim2)">التكاليف</span><span style="color:var(--r)">'+fn(tc)+' ج</span></div>':'')
    +(ts&&tc?'<div style="display:flex;justify-content:space-between;font-size:12px;border-top:1px solid var(--line);padding-top:4px"><span style="color:var(--dim2)">الربح</span><span style="color:'+(ts-tc>=0?'var(--g)':'var(--r)')+';font-weight:700">'+fn(ts-tc)+' ج</span></div>':'')
    +'<div style="display:flex;justify-content:space-between;font-size:12px;margin-top:4px"><span style="color:var(--dim2)">المحصّل</span><span style="color:var(--y)">'+fn(o.totalPaid||0)+' ج</span></div>'
    +'</div></div>'
    +'<div class="section"><div class="section-title" style="margin-bottom:8px"><div class="section-ico" style="background:rgba(59,158,255,.12);color:var(--b)">🕐</div>سجل الأوردر</div>'+timeline+'</div>'
    +(currentRole==='admin'&&o.status==='delivered'?'<div class="section"><button class="btn btn-ghost btn-sm" onclick="archiveOrder(\''+id+'\')">📁 نقل للأرشيف</button></div>':'');
};
window.closePanel=()=>{document.getElementById('panel-ov').classList.remove('open');activeId=null;};
window.archiveOrder=async function(id){
  try{
    await updateDoc(doc(db,'orders',id),{status:'archived',updatedAt:nowStr(),timeline:arrayUnion({stage:'archived',label:'تم الأرشفة',date:nowStr(),by:currentUserName,byId:currentUser.uid})});
    closePanel();toast('✅ تم الأرشفة','ok');
  }catch(e){toast('❌ '+e.message,'err');}
};
window.exportCSV=function(){
  const rows=[['رقم الأوردر','العميل','الهاتف','الحالة','المنتجات','البيع','التكاليف','الربح','المحصّل','الباقي']];
  allOrders.forEach(o=>{
    const prods=(o.products||[]).map(p=>p.name+'x'+p.qty).join('+');
    const ts=o.totalSale||0;const tc=(o.costs||[]).reduce((s,c)=>s+(c.totalCost||0),0);
    rows.push([o.id||'',o.clientName||'',o.clientPhone||'',o.status,prods,ts,tc,ts-tc,o.totalPaid||0,o.remaining||0]);
  });
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download='archive.csv';a.click();
};
</script>
</body>
</html>
