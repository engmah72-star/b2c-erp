<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff3d6e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="B2C ERP">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Business2Card — الأرشيف</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css?v=4">
<link rel="stylesheet" href="design-system/components.css?v=1">
<script src="sidebar-config.js"></script>
<script src="sidebar.js"></script>

<script type="module" src="inbox-badge.js"></script>
<style>
.ocard{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;cursor:pointer;transition:var(--trans);border-right:3px solid var(--g)}
.ocard:hover{border-color:var(--g);transform:translateX(-2px)}
.oc-id{font-size:var(--fs-xs);color:var(--dim2);margin-bottom:3px}
.oc-client{font-size:var(--fs-lg);font-weight:800;margin-bottom:2px}
.oc-product{font-size:var(--fs-sm);color:var(--dim2);margin-bottom:7px}
.oc-foot{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--line)}
.irow{background:var(--bg3);border-radius:8px;padding:8px 10px}
.irow-l{font-size:var(--fs-xs);color:var(--dim2);margin-bottom:2px}
.irow-v{font-size:var(--fs-base);font-weight:700}
.sec{margin-bottom:16px}
.sec-t{font-size:var(--fs-sm);font-weight:800;color:var(--dim2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center}
.kpi-box{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 6px}
.kpi-val{font-size:var(--fs-xl);font-weight:900;margin-bottom:2px}
.kpi-lbl{font-size:var(--fs-xs);color:var(--dim2)}
.anal-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:12px}
.anal-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line)}
.anal-row:last-child{border-bottom:none}
.anal-rank{font-size:var(--fs-2xl);font-weight:900;color:var(--dim2);min-width:22px;text-align:center}
.anal-bar{height:4px;border-radius:99px;background:var(--bg3);margin-top:4px;overflow:hidden}
.anal-bar-inner{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--p),var(--b))}
.reorder-products-table{width:100%;border-collapse:collapse;font-size:var(--fs-base)}
.reorder-products-table th{background:var(--bg3);padding:6px 8px;text-align:right;font-weight:700;font-size:var(--fs-sm);border-bottom:1px solid var(--line)}
.reorder-products-table td{padding:6px 8px;border-bottom:1px solid var(--line)}
.reorder-products-table input{background:var(--bg3);border:1px solid var(--line);border-radius:6px;padding:4px 6px;width:70px;color:var(--c);font-family:inherit;font-size:var(--fs-sm)}
</style>
<script src="smart-sidebar.js?v=1" defer></script>
<script src="viewas.js?v=1" defer></script>
<script src="pwa-install.js?v=1" defer></script>
<script type="module" src="ai-launcher.js?v=1" defer></script>
<script src="theme.js?v=4"></script>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand">
    <div class="nav-logo">🎨</div>
    <div>
      <div class="nav-brand-name">Business2Card</div>
      <div class="nav-brand-role" id="role-badge">ERP</div>
    </div>
  </div>
  <div class="nav-scroll" id="nav-links"></div>
  <div class="nav-foot">
    <div class="nav-user" onclick="doLogout()">
      <div class="nav-avatar" id="nav-av">A</div>
      <div>
        <div class="nav-user-name" id="nav-name">User</div>
        <div class="nav-user-role">تسجيل خروج</div>
      </div>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div><h1>📁 الأرشيف</h1><p id="sub">جاري التحميل...</p></div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()">↓ CSV</button>
    </div>
  </div>

  <div class="content">
    <!-- ── Dashboard Stats ── -->
    <div class="stats" style="margin-bottom:16px" id="dash-stats">
      <div class="stat" style="--sc:var(--g)"><div class="stat-icon">📦</div><div class="stat-val" id="s-total">0</div><div class="stat-lbl">أوردر مؤرشف</div></div>
      <div class="stat" style="--sc:var(--b)"><div class="stat-icon">💰</div><div class="stat-val" id="s-rev">—</div><div class="stat-lbl">إجمالي الإيرادات</div></div>
      <div class="stat" style="--sc:var(--g)"><div class="stat-icon">💹</div><div class="stat-val" id="s-profit">—</div><div class="stat-lbl">صافي الأرباح</div></div>
      <div class="stat" style="--sc:var(--p)"><div class="stat-icon">📈</div><div class="stat-val" id="s-margin">—</div><div class="stat-lbl">متوسط هامش الربح</div></div>
      <div class="stat" style="--sc:var(--y)"><div class="stat-icon">🧾</div><div class="stat-val" id="s-avg">—</div><div class="stat-lbl">متوسط قيمة الطلب</div></div>
      <div class="stat" style="--sc:var(--r)"><div class="stat-icon">↩️</div><div class="stat-val" id="s-ret">—</div><div class="stat-lbl">معدل المرتجع</div></div>
    </div>

    <!-- ── Analytics Row ── -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px" id="analytics-row">
      <div class="anal-card">
        <div class="sec-t">🏆 أفضل العملاء <span style="font-size:var(--fs-xs);color:var(--dim2);font-weight:400;margin-right:auto">(بالإيراد)</span></div>
        <div id="top-clients">—</div>
      </div>
      <div class="anal-card">
        <div class="sec-t">📦 أعلى المنتجات <span style="font-size:var(--fs-xs);color:var(--dim2);font-weight:400;margin-right:auto">(بالتكرار)</span></div>
        <div id="top-products">—</div>
      </div>
    </div>

    <!-- ── Filters ── -->
    <div class="filters" style="margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div class="sw"><span class="sw-ico">🔍</span><input class="inp" id="q" placeholder="اسم العميل · هاتف · رقم الأوردر · المنتج" oninput="renderList()" style="min-width:240px"></div>
      <select class="inp" id="f-month" onchange="renderList()" style="width:140px"><option value="">كل الأشهر</option></select>
      <select class="inp" id="f-product" onchange="renderList()" style="width:150px"><option value="">كل المنتجات</option></select>
    </div>

    <!-- ── Orders List ── -->
    <div id="list"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</div>
</div>

<!-- ═══════════ Detail Panel ═══════════ -->
<div class="panel-ov" id="panel-ov" onclick="closePanel()">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-head">
      <div id="pn-hdr"></div>
      <div style="display:flex;gap:8px;align-items:center">
        <button type="button" id="btn-reorder" onclick="openReorder()" class="btn btn-r btn-sm" style="font-size:var(--fs-sm)">🔁 إعادة الطلب</button>
        <button class="modal-x" onclick="closePanel()">✕</button>
      </div>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>

<!-- ═══════════ Reorder Modal ═══════════ -->
<div class="modal-ov" id="ov-reorder" onclick="closeReorder()">
  <div class="modal" onclick="event.stopPropagation()" style="max-width:560px">
    <div class="modal-head">
      <div class="modal-title">🔁 إعادة الطلب</div>
      <button class="modal-x" onclick="closeReorder()">✕</button>
    </div>
    <div class="modal-body" id="reorder-body" style="max-height:70vh;overflow-y:auto"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeReorder()">إلغاء</button>
      <button class="btn btn-r" id="btn-save-reorder" onclick="saveReorder()">✓ إنشاء الطلب</button>
    </div>
  </div>
</div>

<nav class="mob-nav"><div class="mob-nav-items" id="mob-nav-items"></div></nav>
<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div class="toasts" id="toasts"></div>

<script type="module">
import { app, auth, db } from "./core/firebase-init.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, doc, onSnapshot, getDoc, query, where, orderBy, limit, addDoc, updateDoc, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
let orders=[],currentUser=null,userName='',activeId=null,currentRole='';

// RULE 8 — قناع رقم العميل للأدوار غير المصرّحة
function _maskPh(p){
  if(!p) return '';
  const canSee=['admin','operation_manager','customer_service','shipping_officer'].includes(currentRole);
  if(canSee) return p;
  const s=String(p).replace(/\D/g,'');
  return s.length>=6 ? s.slice(0,3)+'****'+s.slice(-3) : '****';
}

const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const gv=id=>document.getElementById(id)?.value||'';
const setText=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
const nowStr=()=>new Date().toLocaleDateString('ar-EG')+' '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});

const ROLES_MAP={admin:{label:'Admin',col:'var(--p)'},operation_manager:{label:'Ops Mgr',col:'var(--b)'},customer_service:{label:'CS',col:'var(--c)'},graphic_designer:{label:'Designer',col:'var(--p)'},design_operator:{label:'Design Op',col:'var(--y)'},production_agent:{label:'Production',col:'var(--r)'},shipping_officer:{label:'Shipping',col:'var(--c)'},wallet_manager:{label:'Wallet',col:'var(--g)'}};

function toast(msg,t=''){const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3500);}
window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};
window.doLogout=async()=>{const {signOut}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");await signOut(auth);window.location.href='login.html';};

// ── Sidebar (موحَّد عبر sidebar.js) + Mobile Nav (خاص بالصفحة) ──
const SIDEBAR_PAGES = window.SIDEBAR_PAGES;
const ROLE_HOME = window.ROLE_HOME;
const MOB_NAV_CFG={shipping_officer:[{h:'shipping-dashboard.html',i:'⬡',l:'داشبوردي'},{h:'shipping.html',i:'🚚',l:'الشحن'},{h:'archive.html',i:'📁',l:'أرشيف'}],production_agent:[{h:'production-dashboard.html',i:'⬡',l:'داشبوردي'},{h:'production.html',i:'🏭',l:'تنفيذ'},{h:'archive.html',i:'📁',l:'أرشيف'}],customer_service:[{h:'cs-dashboard.html',i:'⬡',l:'داشبوردي'},{h:'clients.html',i:'👤',l:'العملاء'},{h:'archive.html',i:'📁',l:'أرشيف'}],graphic_designer:[{h:'designer-dashboard.html',i:'⬡',l:'داشبوردي'},{h:'design.html',i:'✏️',l:'تصميم'},{h:'archive.html',i:'📁',l:'أرشيف'}],design_operator:[{h:'designer-dashboard.html',i:'⬡',l:'داشبوردي'},{h:'design.html',i:'✏️',l:'تصميم'},{h:'archive.html',i:'📁',l:'أرشيف'}],wallet_manager:[{h:'accounts.html',i:'💰',l:'حسابات'},{h:'archive.html',i:'📁',l:'أرشيف'}],admin:[{h:'accounts.html',i:'💰',l:'حسابات'},{h:'clients.html',i:'👤',l:'عملاء'},{h:'print.html',i:'🖨️',l:'طباعة'},{h:'reports.html',i:'📊',l:'تقارير'},{h:'archive.html',i:'📁',l:'أرشيف'}],operation_manager:[{h:'ops-dashboard.html',i:'⬡',l:'داشبوردي'},{h:'clients.html',i:'👤',l:'عملاء'},{h:'print.html',i:'🖨️',l:'طباعة'},{h:'reports.html',i:'📊',l:'تقارير'},{h:'archive.html',i:'📁',l:'أرشيف'}]};

function buildSidebar(ud){
  B2CSidebar.build(ud, 'archive.html');
  const role=ud?.role||'customer_service';
  const mob=document.getElementById('mob-nav-items');
  if(mob){const cfg=MOB_NAV_CFG[role]||MOB_NAV_CFG.admin;mob.innerHTML=cfg.map(n=>`<a class="mob-nav-item${n.h==='archive.html'?' active':''}" href="${n.h}"><div class="mob-nav-ico">${n.i}</div><div class="mob-nav-lbl">${n.l}</div></a>`).join('');}
}

window.addEventListener('unhandledrejection',e=>{const m=e.reason?.message||'';if(!m.includes('AbortError'))console.warn(m);e.preventDefault();});

// ── Auth ──
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  currentUser=u;
  const snap=await getDoc(doc(db,'users',u.uid));
  const ud=snap.exists()?snap.data():{};
  const r=ROLES_MAP[ud.role||'admin']||ROLES_MAP.admin;
  userName=ud.name||u.email;
  currentRole=ud.role||'admin';
  const isAdm=['admin','operation_manager'].includes(currentRole);
  const permPages=(ud.permissions?.pages)||[];
  if(!isAdm&&!permPages.includes('*')&&!permPages.includes('archive')){const RMAP_A={customer_service:'cs-dashboard.html',graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'};window.location.href=RMAP_A[currentRole]||'login.html';return;}
  setText('nav-name',userName);
  const av=document.getElementById('nav-av');
  if(av){av.textContent=userName[0].toUpperCase();av.style.cssText=`background:${r.col}20;color:${r.col}`;}
  setText('role-badge',r.label);
  const rb=document.getElementById('role-badge');if(rb)rb.style.cssText=`background:${r.col}18;color:${r.col}`;
  buildSidebar(ud);
  // RULE G3: bounded archive view — recent 5000 archived orders. Older
  // archives are accessed through reports.html with date filters.
  onSnapshot(
    query(collection(db,'orders'),where('stage','==','archived'),orderBy('createdAt','desc'),limit(5000)),
    snap=>{
      orders=snap.docs.map(d=>({...d.data(),_id:d.id}));
      renderAll();
    }
  );
});

// ── Helpers ──
const calcCost=o=>(o.costItems||[]).reduce((s,c)=>s+(parseFloat(c.total)||0),0);
const calcPaid=o=>parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0;
const calcSale=o=>(parseFloat(o.salePrice)||0)+(parseFloat(o.customerShipFee)||0);
const calcRem=o=>{if(o.paymentStatus==='returned'||o.shipStage==='returned')return 0;return Math.max(0,calcSale(o)-(parseFloat(o.discount)||0)-calcPaid(o));};
const calcProfit=o=>calcPaid(o)-calcCost(o);
const calcMargin=o=>{const s=calcSale(o);return s>0?Math.round(calcProfit(o)/s*100):0;};
const hasReturn=o=>o.shipStage==='returned'||(o.returnReason&&o.returnReason.length>0);

// ── Render All ──
function renderAll(){
  updateDashboard();
  renderAnalytics();
  fillFilters();
  renderList();
}

// ── Dashboard Stats ──
function updateDashboard(){
  const n=orders.length;
  const rev=orders.reduce((s,o)=>s+calcSale(o),0);
  const cost=orders.reduce((s,o)=>s+calcCost(o),0);
  const profit=orders.reduce((s,o)=>s+calcProfit(o),0);
  const margin=rev>0?Math.round(profit/rev*100):0;
  const avg=n>0?Math.round(rev/n):0;
  const retCount=orders.filter(hasReturn).length;
  const retRate=n>0?Math.round(retCount/n*100):0;
  setText('s-total',n.toLocaleString('ar-EG'));
  setText('s-rev',fn(rev)+' ج');
  setText('s-profit',fn(profit)+' ج');
  const profEl=document.getElementById('s-profit');
  if(profEl)profEl.style.color=profit>=0?'var(--g)':'var(--r)';
  setText('s-margin',margin+'%');
  setText('s-avg',fn(avg)+' ج');
  setText('s-ret',retRate+'%');
  setText('sub',n+' طلب مكتمل');
}

// ── Analytics ──
function renderAnalytics(){
  // Top clients by revenue
  const clientMap={};
  orders.forEach(o=>{
    const k=o.clientId||o.clientPhone||o.clientName||'—';
    if(!clientMap[k])clientMap[k]={name:o.clientName||'—',phone:o.clientPhone||'',total:0,count:0};
    clientMap[k].total+=calcSale(o);
    clientMap[k].count++;
  });
  const topClients=Object.values(clientMap).sort((a,b)=>b.total-a.total).slice(0,5);
  const maxRev=topClients[0]?.total||1;
  const ranks=['🥇','🥈','🥉','4️⃣','5️⃣'];
  const tcEl=document.getElementById('top-clients');
  if(tcEl){
    tcEl.innerHTML=topClients.length?topClients.map((c,i)=>`
      <div class="anal-row">
        <div class="anal-rank">${ranks[i]||i+1}</div>
        <div style="flex:1">
          <div style="font-size:var(--fs-base);font-weight:700">${c.name}</div>
          <div style="font-size:var(--fs-xs);color:var(--dim2)">${c.count} طلب · ${c.phone}</div>
          <div class="anal-bar"><div class="anal-bar-inner" style="width:${Math.round(c.total/maxRev*100)}%"></div></div>
        </div>
        <div style="font-size:var(--fs-base);font-weight:800;color:var(--g)">${fn(c.total)} ج</div>
      </div>`).join('')
      :'<div style="text-align:center;color:var(--dim2);font-size:var(--fs-sm);padding:12px">لا توجد بيانات</div>';
  }

  // Top products by count
  const prodMap={};
  orders.forEach(o=>{
    const prods=o.products?.length?o.products:[{name:o.product||'—',qty:o.qty||0}];
    prods.forEach(p=>{
      const k=p.name||'—';
      if(!prodMap[k])prodMap[k]={name:k,count:0,qty:0,rev:0};
      prodMap[k].count++;
      prodMap[k].qty+=parseFloat(p.qty)||0;
      prodMap[k].rev+=(parseFloat(p.totalPrice)||0);
    });
  });
  const topProds=Object.values(prodMap).sort((a,b)=>b.count-a.count).slice(0,5);
  const maxCnt=topProds[0]?.count||1;
  const tpEl=document.getElementById('top-products');
  if(tpEl){
    tpEl.innerHTML=topProds.length?topProds.map((p,i)=>`
      <div class="anal-row">
        <div class="anal-rank">${ranks[i]||i+1}</div>
        <div style="flex:1">
          <div style="font-size:var(--fs-base);font-weight:700">${p.name}</div>
          <div style="font-size:var(--fs-xs);color:var(--dim2)">${p.count} طلب · إجمالي ${fn(p.qty)} قطعة</div>
          <div class="anal-bar"><div class="anal-bar-inner" style="width:${Math.round(p.count/maxCnt*100)}%;background:linear-gradient(90deg,var(--y),var(--r))"></div></div>
        </div>
        <div style="font-size:var(--fs-base);font-weight:800;color:var(--b)">${p.count}×</div>
      </div>`).join('')
      :'<div style="text-align:center;color:var(--dim2);font-size:var(--fs-sm);padding:12px">لا توجد بيانات</div>';
  }
}

// ── Filters ──
function fillFilters(){
  const months=new Set();
  const prods=new Set();
  orders.forEach(o=>{
    const m=(o.deliveredDate||o.createdDate||'').slice(0,7);
    if(m)months.add(m);
    (o.products?.length?o.products:[{name:o.product}]).forEach(p=>{if(p.name)prods.add(p.name);});
  });
  const ms=document.getElementById('f-month');
  if(ms){const cv=ms.value;ms.innerHTML='<option value="">كل الأشهر</option>'+[...months].sort().reverse().map(m=>`<option value="${m}"${m===cv?' selected':''}>${m}</option>`).join('');}
  const fp=document.getElementById('f-product');
  if(fp){const cv=fp.value;fp.innerHTML='<option value="">كل المنتجات</option>'+[...prods].sort().map(p=>`<option value="${p}"${p===cv?' selected':''}>${p}</option>`).join('');}
}

// ── List ──
window.renderList=function(){
  const q=(gv('q')||'').toLowerCase().trim();
  const fm=gv('f-month');
  const fp=gv('f-product');
  const data=orders.filter(o=>{
    if(q){
      const name=(o.clientName||'').toLowerCase();
      const phone=(o.clientPhone||'');
      const oid=(o.orderId||'').toLowerCase();
      const prod=(o.products?.map(p=>p.name).join(' ')||o.product||'').toLowerCase();
      const date=(o.createdDate||o.deliveredDate||'');
      if(!name.includes(q)&&!phone.includes(q)&&!oid.includes(q)&&!prod.includes(q)&&!date.includes(q))return false;
    }
    if(fm&&!(o.deliveredDate||o.createdDate||'').startsWith(fm))return false;
    if(fp){const pNames=(o.products?.map(p=>p.name)||[o.product||'']);if(!pNames.some(n=>n===fp))return false;}

  });

        <div class="oc-id">${o.orderId||o._id.slice(-6)} · ${o.deliveredDate||o.createdDate||'—'}${ret?' · <span style="color:var(--r)">↩️ مرتجع</span>':''}</div>

        <div style="display:flex;gap:8px;font-size:var(--fs-sm);margin-bottom:6px">

// ── Restore from archive ──
window.restoreOrder=async function(){
  if(!activeId)return;
  if(!['admin','operation_manager'].includes(currentRole))return;
  const o=orders.find(x=>x._id===activeId);if(!o)return;
  const stage=document.getElementById('restore-stage-sel')?.value||'design';
  const stageAr={design:'تصميم',printing:'طباعة',production:'تنفيذ',shipping:'شحن'}[stage]||stage;
  if(!confirm(`استعادة أوردر "${o.clientName}" إلى مرحلة ${stageAr}؟`))return;
  try{
    const now=new Date().toISOString();
    await updateDoc(doc(db,'orders',activeId),{
      stage,
      archivedStage:undefined,
      [`stageEnteredAt.${stage}`]:now,
      restoredAt:serverTimestamp(),
      restoredBy:currentUser?.uid||'',
      restoredByName:userName||'admin',
      timeline:[...(o.timeline||[]),{date:now,action:`🔄 استُعيد من الأرشيف إلى ${stageAr}`,by:userName||'admin'}],
      updatedAt:serverTimestamp()
    });
    // audit trail لاستعادة من الأرشيف (admin override صريح)
    addDoc(collection(db,'audit_logs'),{
      action:'order.restore_from_archive',
      details:{orderId:activeId,clientName:o.clientName||'',toStage:stage},
      userId:currentUser?.uid||'',userName:userName||'',
      userRole:currentRole||'',
      timestamp:serverTimestamp(),
      url:location.pathname,
    }).catch(e=>console.warn('[audit] failed:',e?.code||e?.message));
    closePanel();
    toast('✅ تم استعادة الأوردر إلى '+stageAr,'ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

window.__recalcReorder=function(){
  let total=0;
  __reorderProds.forEach((p,i)=>{
    const qty=parseFloat(document.getElementById('ro-qty-'+i)?.value)||0;
    const price=parseFloat(document.getElementById('ro-price-'+i)?.value)||0;
    total+=qty*price;
  });
  const saleEl=document.getElementById('ro-sale');
  if(saleEl)saleEl.value=total;
  setText('ro-total',fn(total)+' ج');
};

window.closeReorder=()=>{document.getElementById('ov-reorder').classList.remove('open');};

window.saveReorder=async function(){
  const o=orders.find(x=>x._id===activeId);if(!o)return;
  const btn=document.getElementById('btn-save-reorder');btn.disabled=true;btn.textContent='...';
  const newProds=__reorderProds.map((p,i)=>{
    const qty=parseFloat(document.getElementById('ro-qty-'+i)?.value)||parseFloat(p.qty)||1;
    const unitPrice=parseFloat(document.getElementById('ro-price-'+i)?.value)||parseFloat(p.unitPrice)||0;
    return{...p,qty,unitPrice,totalPrice:qty*unitPrice};
  });
  if(!newProds.length)return toast('⚠️ لا توجد منتجات في الطلب','err');
  const salePrice=parseFloat(gv('ro-sale'))||newProds.reduce((s,p)=>s+p.totalPrice,0);
  const deadline=gv('ro-deadline');
  const notes=gv('ro-notes');
  const orderId='ORD-'+Date.now().toString().slice(-8);
  const now=nowStr();
  const productName=newProds.map(p=>p.name).join(' + ');
  const totalQty=newProds.reduce((s,p)=>s+(parseFloat(p.qty)||0),0);
  const orderData={
    orderId,stage:'design',designStage:'pending',
    clientId:o.clientId||'',clientName:o.clientName||'',clientPhone:o.clientPhone||'',
    products:newProds,product:productName,qty:totalQty,
    salePrice,deposit:0,totalPaid:0,remaining:salePrice,
    paymentStatus:'pending',
    designerId:o.designerId||'',designerName:o.designerName||'',
    deadline:deadline||'',notes,
    designFileUrl:o.designFileUrl||'',
    designFiles:o.designFiles||[],
    reorderedFrom:activeId,
    costItems:[],printAddons:[],
    createdDate:new Date().toLocaleDateString('ar-EG'),
    createdBy:currentUser.uid,createdByName:userName,
    timeline:[{date:now,action:`🔁 إعادة طلب — ${productName} (من الأوردر ${o.orderId||activeId.slice(-6)})`,by:userName}],
    createdAt:serverTimestamp(),updatedAt:serverTimestamp()
  };
  try{
    await addDoc(collection(db,'orders'),orderData);
    toast('✅ تم إنشاء الطلب الجديد — '+orderId,'ok');
    closeReorder();
    setTimeout(()=>window.location.href='design.html',800);
  }catch(e){toast('❌ '+e.message,'err');}
  finally{btn.disabled=false;btn.textContent='✓ إنشاء الطلب';}
};

// ── Export ──
window.exportCSV=function(){
  const rows=[['رقم الطلب','العميل','الهاتف','المنتج','الكمية','سعر البيع','التحصيل','التكلفة','الربح','هامش%','التسليم','المصمم','المورد','شركة الشحن','مرتجع؟','تقييم']];
  orders.forEach(o=>{
    const sale=calcSale(o),paid=calcPaid(o),cost=calcCost(o),profit=calcProfit(o),margin=calcMargin(o);
    const prods=(o.products?.length?o.products:[{name:o.product||'',qty:o.qty||''}]).map(p=>p.name+'×'+(p.qty||'')).join(' | ');
    const totalQty=(o.products?.length?o.products:[{qty:o.qty||0}]).reduce((s,p)=>s+(parseFloat(p.qty)||0),0);
    rows.push([o.orderId||o._id.slice(-6),o.clientName||'',_maskPh(o.clientPhone),prods,totalQty,sale,paid,cost,profit,margin+'%',o.deliveredDate||'',o.designerName||'',o.supplierName||'',o.shipCompanyName||'',hasReturn(o)?'نعم':'لا',o.clientRating||'']);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);a.download=`أرشيف_${new Date().toLocaleDateString('ar-EG')}.csv`;a.click();
  toast('✅ تم التصدير','ok');
};
</script>
