<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff3d6e">
<title>B2C — داشبورد التنفيذ</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;border-top:3px solid var(--kc)}
.kpi-val{font-size:24px;font-weight:900;color:var(--kc);margin-bottom:2px}
.kpi-lbl{font-size:10px;color:var(--dim2);font-weight:700}
.ocard{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;margin-bottom:8px;cursor:pointer;transition:var(--trans);border-right:3px solid var(--r)}
.ocard:hover{border-color:var(--r);transform:translateX(-2px)}
.att-box{border-radius:var(--rad2);padding:14px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--bg2);border:1px solid var(--line)}
@media(max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">ERP</div></div></div>
  <div class="nav-scroll">
    <a class="nav-link active" href="production-dashboard.html"><span class="nav-ico">⬡</span> لوحتي</a>
    <a class="nav-link" href="production.html"><span class="nav-ico">🏭</span> التنفيذ</a>
  </div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">A</div><div><div class="nav-user-name" id="nav-name">User</div><div class="nav-user-role">تسجيل خروج</div></div></div></div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><button class="mob-menu-btn" onclick="toggleNav()">☰</button><div><h1>🏭 <span id="greeting">أهلاً</span></h1><p id="sub">جاري التحميل...</p></div></div>
    <div class="topbar-right"><button class="btn btn-r btn-sm" onclick="location.href='production.html'">📋 صفحة التنفيذ</button></div>
  </div>
  <div class="content">
    <div class="att-box" id="att-box">
      <div><div style="font-size:12px;font-weight:800;color:var(--dim2);margin-bottom:4px">⏰ الحضور اليوم</div><div style="font-size:16px;font-weight:800" id="att-status">لم يُسجَّل</div><div style="font-size:11px;color:var(--dim2)" id="att-detail"></div></div>
      <button class="btn btn-g btn-sm" id="att-btn" onclick="doAtt()">✅ تسجيل حضور</button>
    </div>
    <div class="kpi-row">
      <div class="kpi" style="--kc:var(--b)"><div class="kpi-val" id="k-assigned">—</div><div class="kpi-lbl">كُلّفت الشهر</div></div>
      <div class="kpi" style="--kc:var(--g)"><div class="kpi-val" id="k-done">—</div><div class="kpi-lbl">مكتمل ✅</div></div>
      <div class="kpi" style="--kc:var(--y)"><div class="kpi-val" id="k-wip">—</div><div class="kpi-lbl">جاري 🏭</div></div>
      <div class="kpi" style="--kc:var(--p)"><div class="kpi-val" id="k-rate">—</div><div class="kpi-lbl">نسبة الإنجاز</div></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="btn btn-r btn-sm on-tab" id="tab-active" onclick="switchTab('active')">🏭 جاري</button>
      <button class="btn btn-ghost btn-sm" id="tab-done" onclick="switchTab('done')">✅ مكتمل الشهر</button>
    </div>
    <div id="orders-list"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</div>
</div>
<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div class="toasts" id="toasts"></div>
<script type="module">

// ── Global Error Handler ──
window.addEventListener('unhandledrejection',e=>{
  const msg=e.reason?.message||'';
  if(msg.includes('permission-denied')||msg.includes('Missing or insufficient')){
    console.warn('🔒 Permission denied — run setup-permissions.html');
  } else if(msg&&!msg.includes('AbortError')){
    console.error('Error:',msg);
  }
  e.preventDefault();
});


// ══ Sidebar Manager ══
const SIDEBAR_PAGES=[
  {file:'index.html',label:'لوحة التحكم',ico:'⬡',group:'main',adminOnly:true},
  {file:'clients.html',label:'العملاء',ico:'👤',group:'orders',perm:'clients'},
  {file:'design.html',label:'التصميم',ico:'✏️',group:'orders',perm:'design'},
  {file:'print.html',label:'الطباعة',ico:'🖨️',group:'orders',perm:'print'},
  {file:'production.html',label:'التنفيذ',ico:'🏭',group:'orders',perm:'production'},
  {file:'shipping.html',label:'الشحن',ico:'🚚',group:'orders',perm:'shipping'},
  {file:'shipping-accounts.html',label:'حسابات الشحن',ico:'📦',group:'orders',perm:'shipping-accounts'},
  {file:'archive.html',label:'الأرشيف',ico:'📁',group:'orders',perm:'archive'},
  {file:'accounts.html',label:'الحسابات',ico:'💰',group:'admin',perm:'accounts'},
  {file:'suppliers.html',label:'الموردين',ico:'▣',group:'admin',perm:'suppliers'},
  {file:'products.html',label:'المنتجات',ico:'◈',group:'admin',perm:'products'},
  {file:'reports.html',label:'التقارير',ico:'📊',group:'admin',perm:'reports'},
  {file:'employees.html',label:'الموظفين',ico:'👥',group:'admin',adminOnly:true},
  {file:'settings.html',label:'الإعدادات',ico:'⚙️',group:'admin',adminOnly:true},
];
const ROLE_HOME_MAP={admin:'index.html',operation_manager:'index.html',customer_service:'cs-dashboard.html',graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'};
const DASH_LABELS_MAP={admin:'لوحة التحكم',operation_manager:'لوحة التحكم',customer_service:'داشبوردي',graphic_designer:'داشبوردي',design_operator:'داشبوردي',production_agent:'داشبوردي',shipping_officer:'داشبوردي',wallet_manager:'داشبوردي'};
const GROUP_LABELS_SB={main:'الرئيسية',orders:'الأوردرات',admin:'الإدارة'};

function buildSidebar(userData,currentPage){
  if(!userData)return;
  const role=userData.role||'customer_service';
  const perms=userData.permissions||{};
  const pages=perms.pages||[];
  const isAdm=['admin','operation_manager'].includes(role);
  const cur=(currentPage||window.location.pathname.split('/').pop()||'').replace(/\?.*/,'');
  const navEl=document.getElementById('nav-links');
  if(!navEl)return;
  const dashHome=ROLE_HOME_MAP[role]||'index.html';
  let html='',lastGrp='';
  html+=`<a class="nav-link${cur===dashHome?' active':''}" href="${dashHome}"><span class="nav-ico">⬡</span> ${DASH_LABELS_MAP[role]||'داشبوردي'}</a>`;
  for(const cfg of SIDEBAR_PAGES){
    if(cfg.file==='index.html')continue;
    const ok=isAdm||(cfg.adminOnly?false:(pages.includes('*')||pages.includes(cfg.perm||'')));
    if(!ok)continue;
    if(cfg.group!==lastGrp){html+=`<div class="nav-group">${GROUP_LABELS_SB[cfg.group]||cfg.group}</div>`;lastGrp=cfg.group;}
    html+=`<a class="nav-link${cur===cfg.file?' active':''}" href="${cfg.file}"><span class="nav-ico">${cfg.ico}</span> ${cfg.label}</a>`;
  }
  navEl.innerHTML=html;
}

function guardPage(userData,currentPage){
  if(!userData)return true;
  const role=userData.role||'customer_service';
  const isAdm=['admin','operation_manager'].includes(role);
  if(isAdm)return true;
  const perms=userData.permissions||{};
  const pages=perms.pages||[];
  const cur=(currentPage||window.location.pathname.split('/').pop()||'').replace(/\?.*/,'');
  const cfg=SIDEBAR_PAGES.find(p=>p.file===cur);
  if(!cfg)return true;
  if(cfg.adminOnly){window.location.href=ROLE_HOME_MAP[role]||'login.html';return false;}
  const perm=cfg.perm||cur.replace('.html','');
  if(!pages.includes('*')&&!pages.includes(perm)){window.location.href=ROLE_HOME_MAP[role]||'login.html';return false;}
  return true;
}

function initSidebar(userData,currentPage){
  if(!guardPage(userData,currentPage))return false;
  buildSidebar(userData,currentPage);
  return true;
}
// ══════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, getDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"});
const auth=getAuth(app),db=getFirestore(app);
let myOrders=[],todayAtt=null,currentUser=null,userName='',activeTab='active';
const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const setText=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
const now=new Date();
const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
function isThisMonth(ts){if(!ts?.toDate)return false;const d=ts.toDate();return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}
function toast(msg,t=''){const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}
window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  currentUser=u;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(!snap.exists()){window.location.href='login.html';return;}
  const d=snap.data();
  if(!['production_agent','admin','operation_manager'].includes(d.role)){window.location.href='login.html';return;}
  userName=d.name||u.email;
  setText('nav-name',userName);setText('greeting','أهلاً '+userName.split(' ')[0]);
  document.getElementById('nav-av').textContent=userName[0].toUpperCase();
  setText('sub',MONTHS[now.getMonth()]+' '+now.getFullYear());
  // الأوردرات
  onSnapshot(collection(db,'orders'),snap=>{
    const all=snap.docs.map(d=>({...d.data(),_id:d.id}));
    const isAdmin=['admin','operation_manager'].includes(d.role);
    myOrders=isAdmin?all.filter(o=>o.stage==='production'):all.filter(o=>o.stage==='production'&&(o.productionAgent===u.uid||!o.productionAgent));
    updateKPIs();renderOrders();
    setText('sub',myOrders.length+' أوردر تنفيذ');
  });
  // الحضور
  onSnapshot(query(collection(db,'attendance'),where('employeeUid','==',u.uid)),snap=>{
    const today=new Date().toISOString().slice(0,10);
    const atts=snap.docs.map(d=>({...d.data(),_id:d.id}));
    todayAtt=atts.find(a=>a.date===today);
    renderAttBox();
  });
});
function updateKPIs(){
  const monthly=myOrders.filter(o=>isThisMonth(o.createdAt));
  const done=monthly.filter(o=>['shipping','archived'].includes(o.stage)).length;
  const wip=monthly.filter(o=>o.stage==='production').length;
  const rate=monthly.length>0?Math.round(done/monthly.length*100):0;
  setText('k-assigned',monthly.length);setText('k-done',done);setText('k-wip',wip);setText('k-rate',rate+'%');
}
function renderAttBox(){
  const btn=document.getElementById('att-btn');
  const statusEl=document.getElementById('att-status');
  const detailEl=document.getElementById('att-detail');
  if(!todayAtt){
    statusEl.textContent='لم يُسجَّل بعد';statusEl.style.color='var(--dim2)';
    btn.textContent='✅ تسجيل حضور';btn.className='btn btn-g btn-sm';btn.disabled=false;
  } else if(!todayAtt.checkOut){
    statusEl.textContent='حاضر منذ '+todayAtt.checkInStr;statusEl.style.color='var(--g)';
    btn.textContent='🔚 تسجيل انصراف';btn.className='btn btn-b btn-sm';btn.disabled=false;
  } else {
    statusEl.textContent=todayAtt.checkInStr+' → '+todayAtt.checkOutStr;statusEl.style.color='var(--b)';
    detailEl.textContent='✅ '+todayAtt.hoursWorked+' ساعة';
    btn.textContent='✓ تم';btn.className='btn btn-ghost btn-sm';btn.disabled=true;
  }
}
window.doAtt=async function(){
  const today=new Date().toISOString().slice(0,10);
  const timeStr=new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
  try{
    if(!todayAtt){
      await addDoc(collection(db,'attendance'),{employeeUid:currentUser.uid,employeeName:userName,date:today,checkIn:serverTimestamp(),checkInStr:timeStr,checkOut:null,hoursWorked:0,createdAt:serverTimestamp()});
      toast('✅ تم تسجيل الحضور — '+timeStr,'ok');
    } else if(!todayAtt.checkOut){
      const hours=todayAtt.checkIn?.toDate?((new Date()-todayAtt.checkIn.toDate())/(1000*60*60)).toFixed(1):0;
      await updateDoc(doc(db,'attendance',todayAtt._id),{checkOut:serverTimestamp(),checkOutStr:timeStr,hoursWorked:parseFloat(hours)});
      toast('✅ تم الانصراف — '+hours+' ساعة','ok');
    }
  }catch(e){toast('❌ '+e.message,'err');}
};
window.switchTab=function(tab){
  activeTab=tab;
  document.getElementById('tab-active').className=tab==='active'?'btn btn-r btn-sm on-tab':'btn btn-ghost btn-sm';
  document.getElementById('tab-done').className=tab==='done'?'btn btn-g btn-sm on-tab':'btn btn-ghost btn-sm';
  renderOrders();
};
function renderOrders(){
  const el=document.getElementById('orders-list');if(!el)return;
  const data=activeTab==='active'?myOrders.filter(o=>o.stage==='production'):myOrders.filter(o=>['shipping','archived'].includes(o.stage)&&isThisMonth(o.createdAt));
  if(!data.length){el.innerHTML='<div class="empty"><div class="empty-icon">🏭</div><div class="empty-text">لا توجد أوردرات</div></div>';return;}
  el.innerHTML=data.map(o=>{
    const prods=(o.products||[]).map(p=>p.name+'×'+p.qty).join(' + ')||o.product||'—';
    return`<div class="ocard" onclick="location.href='production.html'">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <div><div style="font-size:10px;color:var(--dim2)">${o.orderId||o._id.slice(-6)}</div><div style="font-size:15px;font-weight:800">${o.clientName||'—'}</div></div>
        <span style="font-size:11px;color:var(--r);font-weight:700">${o.stage==='production'?'🏭 جاري':'✅ منتهي'}</span>
      </div>
      <div style="font-size:12px;color:var(--dim2)">${prods}</div>
      ${o.deadline?`<div style="font-size:10px;color:var(--dim2);margin-top:6px">📅 ${o.deadline}</div>`:''}
    </div>`;
  }).join('');
}
</script>
</body>
</html>
