async function buildDynamicSidebar(uid, currentPage) {
  const nav = document.getElementById('nav-scroll-dynamic') || document.querySelector('.nav-scroll');
  if (!nav) return;
  
  try {
    const usnap = await getDoc(doc(db,'users',uid));
    const ud = usnap.exists() ? usnap.data() : {};
    const role = ud.role || 'admin';
    const perms = ud.permissions || {};
    const userPages = perms.pages || [];
    const isAdm = ['admin','operation_manager'].includes(role);
    
    const ROLE_DASH = {
      admin:'accounts.html', operation_manager:'ops-dashboard.html',
      customer_service:'cs-dashboard.html',
      graphic_designer:'designer-dashboard.html',
      design_operator:'designer-dashboard.html',
      production_agent:'production-dashboard.html',
      shipping_officer:'shipping-dashboard.html',
      wallet_manager:'accounts.html',
    };
    
    const ALL = [
      {f:'clients.html',         l:'العملاء',       i:'👤', p:'clients'},
      {f:'design.html',          l:'التصميم',       i:'✏️', p:'design'},
      {f:'print.html',           l:'الطباعة',       i:'🖨️', p:'print'},
      {f:'production.html',      l:'التنفيذ',       i:'🏭', p:'production'},
      {f:'shipping.html',        l:'الشحن',         i:'🚚', p:'shipping'},
      {f:'shipping-accounts.html',l:'حسابات الشحن',i:'📦', p:'shipping-accounts'},
      {f:'accounts.html',        l:'الحسابات',      i:'💰', p:'accounts'},
      {f:'approvals.html',       l:'الاعتمادات',    i:'🔐', p:'approvals'},
      {f:'accounts.html',        l:'الحسابات',      i:'💰', p:'accounts'},
      {f:'suppliers.html',       l:'الموردين',      i:'▣',  p:'suppliers'},
      {f:'products.html',        l:'المنتجات',      i:'◈',  p:'products'},
      {f:'employees.html',       l:'الموظفين',      i:'👥', p:'employees', adminOnly:true},
      {f:'reports.html',         l:'التقارير',      i:'📊', p:'reports'},
      {f:'design-workspace.html', l:'مساحة التصميم', i:'🖥️', p:'design'},
      {f:'gallery.html', l:'المعرض', i:'🖼️', public:true},
      {f:'settings.html',        l:'الإعدادات',     i:'⚙️', p:'settings', adminOnly:true},
    ];
    
    const dash = ROLE_DASH[role] || 'accounts.html';
    const dashLabel = isAdm ? 'الحسابات' : 'داشبوردي';
    
    let html = `<a class="nav-link${currentPage===dash?' active':''}" href="${dash}">
      <span class="nav-ico">⬡</span> ${dashLabel}
    </a>`;
    
    for (const pg of ALL) {
      if (pg.adminOnly && !isAdm) continue;
      const ok = pg.public || isAdm || userPages.includes('*') || userPages.includes(pg.p);
      if (!ok) continue;
      html += `<a class="nav-link${currentPage===pg.f?' active':''}" href="${pg.f}">
        <span class="nav-ico">${pg.i}</span> ${pg.l}
      </a>`;
    }
    
    nav.innerHTML = html;
  } catch(e) {
    // fallback - show basic links
    nav.innerHTML = `
      <a class="nav-link" href="accounts.html"><span class="nav-ico">⬡</span> الرئيسية</a>
      <a class="nav-link" href="clients.html"><span class="nav-ico">👤</span> العملاء</a>
      <a class="nav-link" href="design.html"><span class="nav-ico">✏️</span> التصميم</a>
    `;
    console.warn('sidebar fallback:', e.message);
  }
}

function toast(msg,t=''){const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}
const escAttr=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function nowStr(){return new Date().toLocaleDateString('ar-EG')+' '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});}
function isThisMonth(ts){if(!ts?.toDate)return false;const d=ts.toDate();return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}
function todayStr(){return now.toISOString().slice(0,10);}
function monthKey(){return now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');}
function profPrevMonthKey(){const d=new Date(now.getFullYear(),now.getMonth()-1,1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function profWeekStart(){const d=new Date(now);d.setDate(d.getDate()-6);return d.toISOString().slice(0,10);}
function getProfPeriodLabel(){
  if(profilePeriod==='today')return 'اليوم';
  if(profilePeriod==='week')return 'الأسبوع';
  if(profilePeriod==='month_prev'){const d=new Date(now.getFullYear(),now.getMonth()-1,1);return MONTHS[d.getMonth()];}
  if(profilePeriod==='all')return 'كل الوقت';
  return MONTHS[now.getMonth()];
}
function ordersForProfPeriod(){
  return allOrders.filter(o=>{
    if(!o.createdAt?.toDate)return false;
    const d=o.createdAt.toDate();
    if(profilePeriod==='all')return true;
    const iso=d.toISOString().slice(0,10);
    if(profilePeriod==='today')return iso===todayStr();
    if(profilePeriod==='week')return iso>=profWeekStart();
    if(profilePeriod==='month_cur')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(profilePeriod==='month_prev'){const pm=new Date(now.getFullYear(),now.getMonth()-1,1);return d.getMonth()===pm.getMonth()&&d.getFullYear()===pm.getFullYear();}
    return false;
  });
}

  if(!TAB_KEYS.includes(t))return;

  const u=new URL(location.href);u.searchParams.set('tab',t);u.hash='';
  history.replaceState(null,'',u.toString());
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.querySelectorAll('.tab-pane').forEach(p=>p.style.display=p.id==='tab-'+t?'':'none');
  // re-run section renderers — DOM containers were destroyed/recreated
  if(t==='overview'){renderPasswordCard();renderScore();renderGoals();renderSkillsAndProducts();renderBehavior();renderInsights();}
  else if(t==='attendance'){renderSchedule();renderLeaves();renderAttendancePermissions();renderAttendance();}
  else if(t==='salaries'){renderSalaries();}
  else if(t==='tasks'){renderTasks();}
  else if(t==='admin'){renderClients();renderEvaluations();renderPermissions();renderIncidents();}
  document.getElementById('main-content')?.scrollIntoView({behavior:'smooth',block:'start'});
};

onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  currentUser=u;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(snap.exists()){
    const d=snap.data();
    /* sidebar: central mount */
    adminRole=d.role||'';
    adminName=d.name||u.email;
    // Guard — admin + ops فقط
    if(!['admin','operation_manager'].includes(adminRole)){
      window.location.href='accounts.html';return;
    }
    setText('nav-name',adminName);
    {const _av=document.getElementById('nav-av'); if(_av)_av.textContent=((adminName||'؟')[0]||'؟').toUpperCase();}
    {const _rb=document.getElementById('role-badge'); if(_rb)_rb.textContent=adminRole==='admin'?'Admin':'Ops';}
  }
  if(!empId)return;

  // جيب بيانات الموظف
  const empSnap=await getDoc(doc(db,'employees',empId));
  if(!empSnap.exists()){
    document.getElementById('main-content').innerHTML='<div class="empty"><div class="empty-icon">👤</div><div class="empty-text">لم يُعثر على الموظف</div></div>';
    return;
  }
  emp={...empSnap.data(),_id:empId};
  const r=ROLES[emp.role]||{label:emp.role,col:'var(--dim2)',ico:'👤'};
  setText('page-title',r.ico+' '+emp.name);
  setText('sub',r.label+' · '+(emp.status==='active'?'✅ نشط':'⏸️ غير نشط'));

  // Topbar actions — زرّين أساسيّين فقط (الباقي في Quick Actions)
  document.getElementById('topbar-actions').innerHTML=`
    <button type="button" class="btn btn-ghost btn-sm" data-act="back-employees">← رجوع</button>
    <button type="button" class="btn btn-g btn-sm" data-act="open-salary" title="صرف مرتب (s)">💰 صرف</button>`;

  // Listeners
  // Watch the matching users doc so we can surface displayPassword in the UI.
  if(emp.authUid){
    onSnapshot(doc(db,'users',emp.authUid),snap=>{
      empUserDoc=snap.exists()?snap.data():null;
      renderPasswordCard();
    });
  }
  // RULE G3: bound orders to the most recent 5000 (covers ~2 years of
  // activity for the largest employees). Profile aggregations are weighted
  // toward current performance — deep history lives in reports.html.
  onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc'),limit(5000)),snap=>{
    allOrders=snap.docs.map(d=>({...d.data(),_id:d.id}));
    renderAll();
  });
  onSnapshot(query(collection(db,'tasks'),where('assignedTo','==',emp.authUid||empId),limit(500)),snap=>{
    empTasks=snap.docs.map(d=>({...d.data(),_id:d.id}))
      .sort((a,b)=>{const p={urgent:0,normal:1,low:2};return(p[a.priority]||1)-(p[b.priority]||1);});
    renderTasks();
  });
  // ── ATTENDANCE — match by EITHER employeeId OR employeeUid ──
  // Dashboards (designer, ops, production, shipping) save only `employeeUid`.
  // Profile previously queried `employeeId` only → 0 records, broken stats.
  // Fix: subscribe to both queries and merge by doc id.
  let __attById=new Map(),__attByUid=new Map();
  const __mergeAtt=()=>{
    const m=new Map([...__attById,...__attByUid]);
    attendanceRecords=[...m.values()];
    empAttendance=attendanceRecords;
    // Hero stats (الحضور X/Y, دخل …) are computed inside renderAll on each
    // pass — re-run it so they reflect the latest attendance, not just the
    // calendar/score (which refresh independently).
    if(allOrders.length||emp){renderAll();}
  };
  onSnapshot(query(collection(db,'attendance'),where('employeeId','==',empId),limit(1000)),snap=>{
    __attById=new Map(snap.docs.map(d=>[d.id,{...d.data(),_id:d.id}]));
    __mergeAtt();
  });
  if(emp?.authUid){
    onSnapshot(query(collection(db,'attendance'),where('employeeUid','==',emp.authUid),limit(1000)),snap=>{
      __attByUid=new Map(snap.docs.map(d=>[d.id,{...d.data(),_id:d.id}]));
      __mergeAtt();
    });
  }
  onSnapshot(query(collection(db,'employee_payments'),where('employeeId','==',empId),limit(500)),snap=>{
    empSalaries=snap.docs.map(d=>({...d.data(),_id:d.id})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    renderSalaries();renderInsights();
  });
  onSnapshot(query(collection(db,'employee_leaves'),where('employeeId','==',empId),limit(200)),snap=>{
    empLeaves=snap.docs.map(d=>({...d.data(),_id:d.id})).sort((a,b)=>b.startDate?.localeCompare(a.startDate||'')||0);
    renderLeaves();renderAttendance();
  });
  onSnapshot(query(collection(db,'attendance_permissions'),where('employeeId','==',empId),limit(200)),snap=>{
    empPermissions=snap.docs.map(d=>({...d.data(),_id:d.id}));
    renderAttendancePermissions();renderSalaries();
  });
  // أهداف الموظف
  onSnapshot(query(collection(db,'employee_goals'),where('employeeId','==',empId),limit(60)),snap=>{
    empGoals=snap.docs.map(d=>({...d.data(),_id:d.id}));
    renderGoals();
  });
  // تقييمات الموظف
  onSnapshot(query(collection(db,'employee_evaluations'),where('employeeId','==',empId),limit(60)),snap=>{
    empEvaluations=snap.docs.map(d=>({...d.data(),_id:d.id})).sort((a,b)=>(b.month||'').localeCompare(a.month||''));
    renderEvaluations();
  });
  // إخفاقات الموظف
  onSnapshot(query(collection(db,'employee_incidents'),where('employeeId','==',empId),limit(200)),snap=>{
    empIncidents=snap.docs.map(d=>({...d.data(),_id:d.id})).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    renderIncidents();renderScore();
  });
  const autoPayNow=new URLSearchParams(location.search).get('pay')==='1';
  let autoPayFired=false;
  onSnapshot(query(collection(db,'wallets'),limit(100)),snap=>{
    wallets=snap.docs.map(d=>({...d.data(),_id:d.id}));
    const sel=document.getElementById('sal-wallet');
    if(sel)sel.innerHTML='<option value="">— اختر —</option>'+wallets.map(w=>`<option value="${w._id}">${w.name} (${fn(w.balance||0)} ج)</option>`).join('');
    if(autoPayNow&&!autoPayFired&&emp){autoPayFired=true;openSalary();}
  });
});

  });

// ══ SCORE ══
// Score for ANY month (current or past). Applies proration so that early-month
// scoring isn't unfairly penalised when only a few days have elapsed.
// Adapter — يجمع الـ closure state ويُمرّر pure inputs لـ computeScore.
// المنطق نفسه في core/employee-scoring.js — هنا فقط wiring.
function calcScoreFor(mKey){
  if(!emp||!mKey)return{score:0,grade:'—',col:'var(--dim2)',breakdown:{},meta:{}};
  const[ys,ms]=mKey.split('-').map(Number);
  const monthOrders=getEmpOrders(allOrders.filter(o=>{
    const d=o.createdAt?.toDate?.();
    return d&&d.getMonth()===(ms-1)&&d.getFullYear()===ys;
  }));
  return computeScore({
    mKey, now,
    employee:emp,
    attendance:empAttendance,
    leaves:empLeaves,
    monthOrders,
    goals:empGoals,
    incidents:typeof empIncidents!=='undefined'?empIncidents:[],
  });
}

// Backward compat: calcScore() returns current month
function calcScore(){return calcScoreFor(monthKey());}

function renderScore(){
  const el=document.getElementById('score-container');if(!el)return;
  const cur=calcScore();
  const prevKey=(()=>{const d=new Date(now.getFullYear(),now.getMonth()-1,1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');})();
  const prev=calcScoreFor(prevKey);
  el.innerHTML=buildScoreHTML({
    current: cur,
    previous: prev,
    prevMonthLabel: MONTHS[(now.getMonth()-1+12)%12],
  });
}

// ── incident image upload (preview محلي + رفع وقت الحفظ) ──
let _incImgUrl=null; // object URL للمعاينة
function _incImgReset(){
  const input=document.getElementById('inc-img');if(input)input.value='';
  if(_incImgUrl){URL.revokeObjectURL(_incImgUrl);_incImgUrl=null;}
  const pv=document.getElementById('inc-img-preview');const em=document.getElementById('inc-img-empty');
  const th=document.getElementById('inc-img-thumb');
  if(pv)pv.hidden=true;if(em)em.hidden=false;if(th)th.removeAttribute('src');
}
function _wireIncImg(){
  const input=document.getElementById('inc-img');if(!input||input.dataset.wired)return;
  input.dataset.wired='1';
  input.addEventListener('change',()=>{
    const file=input.files&&input.files[0];
    if(!file)return _incImgReset();
    if(!(file.type||'').startsWith('image/')){toast('⚠️ الملف يجب أن يكون صورة','err');return _incImgReset();}
    if(file.size>10*1024*1024){toast('⚠️ حجم الصورة أكبر من 10MB','err');return _incImgReset();}
    if(_incImgUrl)URL.revokeObjectURL(_incImgUrl);
    _incImgUrl=URL.createObjectURL(file);
    document.getElementById('inc-img-thumb').src=_incImgUrl;
    document.getElementById('inc-img-preview').hidden=false;
    document.getElementById('inc-img-empty').hidden=true;
  });
  const clr=document.getElementById('inc-img-clear');
  if(clr)clr.addEventListener('click',(e)=>{e.preventDefault();e.stopPropagation();_incImgReset();});
}

window.saveIncident=async function(){
  const title=gv('inc-title').trim();
  const description=gv('inc-desc').trim();
  const type=gv('inc-type');
  const severity=gv('inc-severity');
  const date=gv('inc-date')||todayStr();
  const orderId=gv('inc-order');
  const orderSel=document.getElementById('inc-order');
  const clientName=orderSel?.selectedOptions?.[0]?.dataset?.client||'';
  if(!title&&type==='other'){toast('⚠️ أدخل عنواناً','err');return;}
  // ارفع صورة المخالفة أولاً (إن وُجدت) عبر الـ storage helper المركزي
  const imgFile=(document.getElementById('inc-img')||{}).files?.[0]||null;
  let imageUrl='',imagePath='';
  if(imgFile){
    try{
      const up=await uploadEmployeeFile({employeeId:empId,file:imgFile,kind:EMPLOYEE_FILE_KINDS.INCIDENTS});
      imageUrl=up.url;imagePath=up.path;
    }catch(e){return toast('❌ فشل رفع الصورة: '+(e.message||'خطأ'),'err');}
  }
  const r=await employeeActions.addIncident({
    db,
    employeeId:empId,employeeName:emp?.name||'',authUid:emp?.authUid||'',
    date,type,severity,
    title:title||(INCIDENT_TYPES[type]?.lbl||'إخفاق'),
    description,
    orderId:orderId||null,clientName:clientName||null,
    imageUrl,imagePath,
    userId:currentUser.uid,userName:adminName,
  });
  if(!r.ok)return toast('❌ '+(r.errors||[]).join(' · '),'err');
  document.getElementById('ov-incident').classList.remove('open');
  _incImgReset();
  toast('✅ تم تسجيل الإخفاق','ok');
};

const isMainSalaryTx=t=>t.employeeId&&!t.isDeduction&&(t.salaryType==='salary'||(!t.salaryType&&(t.category==='salary'||t.category==='designer_fee')));
function isLastMonth(ts){if(!ts?.toDate)return false;const d=ts.toDate();const pm=new Date(now.getFullYear(),now.getMonth()-1,1);return d.getMonth()===pm.getMonth()&&d.getFullYear()===pm.getFullYear();}
function getEmpOrders(orders=allOrders){
  const uid=emp.authUid||empId;
  const name=emp.name||'';
  if(emp.role==='customer_service'||emp.role==='operation_manager'||emp.role==='admin'){
    return orders.filter(o=>
      o.createdBy===uid || o.createdBy===empId ||
      (name && o.createdByName===name)
    );
  }
  if(emp.role==='graphic_designer'||emp.role==='design_operator'){
    return orders.filter(o=>
      o.designerId===uid || o.designerId===empId ||
      (name && o.designerName===name)
    );
  }
  if(emp.role==='production_agent'){
    return orders.filter(o=>
      o.productionAgent===uid || o.productionAgent===empId ||
      (name && ['production','shipping','archived'].includes(o.stage) && (
        o.productionAgentName===name ||
        o.costItems?.some(c=>c.addedBy===name) ||
        o.timeline?.some(t=>t.by===name && ((t.action||'').includes('تنفيذ')||(t.action||'').includes('💰')||(t.action||'').includes('بند')||(t.action||'').includes('منتهي')))
      ))
    );
  }
  if(emp.role==='shipping_officer'){
    return orders.filter(o=>
      o.shippingOfficerId===uid || o.shippingOfficerId===empId ||
      o.shippingOfficer===uid || o.shippingOfficer===empId ||
      (name && (o.shippingOfficerName===name || o.collectedByName===name))
    );
  }
  return [];
}

// ══ SMART INSIGHTS ══
function renderInsights(){
  const el=document.getElementById('insights-wrap');if(!el||!emp)return;
  const mKey=monthKey();
  const thisM=allOrders.filter(o=>isThisMonth(o.createdAt));
  const lastM=allOrders.filter(o=>isLastMonth(o.createdAt));
  el.innerHTML=buildInsightsHTML({
    employee:emp,
    thisMonthOrders:getEmpOrders(thisM).length,
    lastMonthOrders:getEmpOrders(lastM).length,
    presentDays:empAttendance.filter(a=>a.date?.startsWith(mKey)).length,
    elapsed:Math.max(1,now.getDate()),
    salaryPaid:empSalaries.some(t=>isMainSalaryTx(t)&&t.month===mKey),
    empOrders:getEmpOrders(),
    format:fn,
  });

  // ── أداء الموظف على المراحل — ربط التقييم بمدد المراحل والالتزام بالـ SLA ──
  // مشتق من المرجع الواحد getStageResponsibilities (RULE 1).
  try {
    const perf = buildEmployeeStagePerformance(getEmpOrders(allOrders), o => getStageResponsibilities(o));
    const ids = new Set([empId, emp.authUid].filter(Boolean));
    const nm = (emp.name || '').trim();
    const mine = perf
      .filter(e => ids.has(e.employeeId) || (nm && (e.employeeName || '').trim() === nm))
      .sort((a, b) => b.totalCount - a.totalCount)[0];
    if (mine && mine.totalCount > 0) el.innerHTML += buildStagePerfCard(mine);
  } catch (e) { console.warn('stage-perf:', e?.message); }
}

/** بطاقة أداء الموظف على المراحل (متوسط المدة + نسبة الالتزام بالموعد). */
function buildStagePerfCard(e){
  const STG={design:'التصميم',printing:'الطباعة',production:'التنفيذ',shipping:'الشحن'};
  const colOf=p=>p>=80?'var(--g)':p>=50?'var(--y)':'var(--r)';
  const rows=Object.entries(e.stages).map(([k,s])=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--line)">
      <span>${STG[k]||k} <span style="color:var(--dim2);font-size:11px">(${s.count})</span></span>
      <span style="display:flex;gap:12px;align-items:center">
        <span style="color:var(--dim2);font-size:12px">⌀ ${formatDurationAr(s.avgMs)}</span>
        <span style="color:${colOf(s.onTimePct)};font-weight:700">${s.onTimePct}%</span>
      </span>
    </div>`).join('');
  return `<div class="card" style="margin-top:12px">
    <div style="font-weight:800;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
      <span>⏱️ الأداء على المراحل</span>
      <span style="font-size:13px">الالتزام بالموعد: <b style="color:${colOf(e.onTimePct)}">${e.onTimePct}%</b> <span style="color:var(--dim2);font-size:11px">(${e.totalCount} مرحلة)</span></span>
    </div>${rows}</div>`;
}

// Reset password — direct via Cloud Function (adminResetEmployeePassword).
// Generates a fresh 6-digit code in Firebase Auth on the server side, flags
// mustChangePassword=true so the standard change-password flow takes over on
// next login. The temp code is displayed once in a modal — admin shares it
// with the employee out of band.
// ══════════════ PASSWORD CARD ══════════════
// نعرض بطاقة كلمة السر في tab "نظرة عامة" لكل الموظفين عندهم حساب دخول.
// - إذا users doc يحتوي على `displayPassword` (لم يغيّرها الموظف بعد) → نعرضها
//   مع زر نسخ + زر تعديل.
// - إذا لا يحتوي (الموظف غيّر كلمته بنفسه) → نعرض شارة "سر شخصي" + زر تعيين
//   كلمة سر جديدة.
// عند الضغط على "تعيين":
//   1) نحفظ الكلمة في users.displayPassword (للأدمن يقرأها)
//   2) نحاول تطبيقها على Firebase Auth عبر Cloud Function
//   3) إذا فشل، يفتح modal Firebase Console (الموجود)
function renderPasswordCard(){

// Apply a new password to Firebase Auth directly via a secondary app (no Cloud
// Function needed). We try a list of candidate "current" passwords until one
// works: the optional admin-provided one, the previously displayed pw, then
// the system defaults. This is robust against the chronic case where Cloud
// Function deployments fail silently and Firestore displayPassword drifts
// out of sync with Firebase Auth.
async function applyAuthPasswordViaSecondaryApp(email, newPw, candidateOldPasswords){
  let lastErr='';
  for(const oldPw of candidateOldPasswords){
    if(!oldPw) continue;
    const secApp=initializeApp(FB_CONFIG,'secondary_pw_'+Date.now()+'_'+Math.random().toString(36).slice(2,7));
    const secAuth=getAuth(secApp);
    try{
      const cred=await signInWithEmailAndPassword(secAuth,email,oldPw);
      await updatePassword(cred.user,newPw);
      try{ await signOut(secAuth); }catch(_){}
      try{ await deleteApp(secApp); }catch(_){}
      return {ok:true, usedOldPw:oldPw};
    }catch(e){
      lastErr=e?.code||e?.message||'';
      try{ await signOut(secAuth); }catch(_){}
      try{ await deleteApp(secApp); }catch(_){}
      // continue to next candidate
    }
  }
  return {ok:false, error:lastErr};
}

window.saveEmployeePassword=async function(btn){
  const pw=document.getElementById('new-emp-pw')?.value?.trim();
  const adminProvidedOldPw=document.getElementById('current-emp-pw')?.value?.trim()||'';
  const msg=document.getElementById('sp-msg');
  if(!pw||pw.length<6){if(msg)msg.innerHTML='<span class="text-r">⚠️ 6 أحرف على الأقل</span>';return;}
  if(!emp?.authUid){if(msg)msg.innerHTML='<span class="text-r">⚠️ لا يوجد حساب</span>';return;}
  const email=emp.email||((emp.phone||'')+'@b2c.local');
  btn.disabled=true;const orig=btn.textContent;btn.textContent='جاري التطبيق…';
  if(msg)msg.innerHTML='<span class="text-muted">⏳ جاري تطبيق كلمة السر على Firebase Auth…</span>';

  // 1) Try direct Auth update via secondary app — most reliable, no Cloud Function dependency.
  const candidates=[
    adminProvidedOldPw,
    empUserDoc?.displayPassword,
    pw,            // إذا الكلمة الجديدة هي نفسها المخزّنة في Auth (تكرار آمن)
    '123456',
    'b2c@123',
  ].filter((v,i,a)=>v && a.indexOf(v)===i); // dedupe + drop empties

  let applied=false, applyErr='', method='';
  const direct=await applyAuthPasswordViaSecondaryApp(email,pw,candidates);
  if(direct.ok){applied=true;method='direct';}
  else applyErr=direct.error;

  // 2) Fallback: Cloud Function (if deployed)
  if(!applied){
    try{
      const { getFunctions, httpsCallable }=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-functions.js');
      const fns=getFunctions(app,'us-central1');
      const call=httpsCallable(fns,'adminSetEmployeePassword');
      await call({uid:emp.authUid,password:pw});
      applied=true;method='cloud-function';
    }catch(e){
      applyErr=(applyErr?applyErr+' / ':'')+(e?.code||e?.message||'');
    }
  }

  if(!applied){
    btn.disabled=false;btn.textContent=orig;
    if(msg)msg.innerHTML=`<span class="text-r">❌ تعذّر تطبيق كلمة السر تلقائياً</span><br><span class="txt-meta-xs">السبب: ${applyErr||'unknown'}<br>الحل: اطلب من الموظف الكلمة الحالية واكتبها في خانة "كلمة السر الحالية"، أو استخدم Firebase Console يدوياً.</span>`;
    return;
  }

  // 3) Auth is now actually updated — sync Firestore so admin sees the right value
  const sr=await employeeActions.recordPasswordChange({db,authUid:emp.authUid,newPassword:pw,userId:currentUser.uid,userName:adminName||'',mustChangeOnNextLogin:true});
  if(!sr.ok){
    console.warn('Firestore displayPassword sync failed (Auth was updated):',sr.errors);
  }

  btn.disabled=false;btn.textContent=orig;
  if(msg)msg.innerHTML=`<span class="text-g">✅ تم — كلمة السر طُبّقت على النظام (${method==='direct'?'مباشر':'Cloud Function'}).</span><br><span class="txt-meta-xs">أبلغ الموظف بـ <strong class="ep-mono-snow">${pw}</strong> ليدخل بها.</span>`;
  setTimeout(()=>btn.closest('.overlay')?.remove(),2500);
};

window.doRebuildEmployeeAuth=async function(btn){
  const pw=document.getElementById('rb-pw')?.value?.trim();
  const msg=document.getElementById('rb-msg');
  const setMsg=(html)=>{ if(msg) msg.innerHTML=html; };
  if(!pw||pw.length<6){setMsg('<span class="text-r">⚠️ 6 أحرف على الأقل</span>');return;}
  if(!emp?.phone){setMsg('<span class="text-r">⚠️ الموظف بدون رقم موبايل</span>');return;}

  const email=emp.email||(emp.phone+'@b2c.local');
  const oldAuthUid=emp.authUid||null;

  btn.disabled=true;const orig=btn.textContent;btn.textContent='جاري الإنشاء…';
  setMsg('<span class="text-muted">⏳ جاري إنشاء حساب Firebase Auth جديد…</span>');

  let newAuthUid='';
  let secApp=null,secAuth=null;
  try{
    secApp=initializeApp(FB_CONFIG,'rebuild_'+Date.now());
    secAuth=getAuth(secApp);
    const cred=await createUserWithEmailAndPassword(secAuth,email,pw);
    newAuthUid=cred.user.uid;
    try{ await signOut(secAuth); }catch(_){}
    try{ await deleteApp(secApp); }catch(_){}
  }catch(e){
    try{ if(secAuth) await signOut(secAuth); }catch(_){}
    try{ if(secApp)  await deleteApp(secApp); }catch(_){}
    if(e?.code==='auth/email-already-in-use'){
      // الحساب القديم لسه موجود في Firebase Auth. لازم الأدمن يحذفه يدوياً.
      const searchUrl=`https://console.firebase.google.com/project/business2card-c041b/authentication/users?search=${encodeURIComponent(email)}`;
      btn.disabled=false;btn.textContent=orig;
      setMsg(`
        <div class="ep-msg-warn">
          ⚠️ الحساب القديم لـ <strong class="ep-mono">${email}</strong> موجود في Firebase Auth.<br>
          <strong>خطوة وحيدة:</strong> احذفه من Firebase Console ثم اضغط "إعادة الإنشاء" مرة أخرى:
          <ol class="ep-msg-steps">
            <li>افتح <a href="${searchUrl}" target="_blank" rel="noopener" class="ep-link-u">Firebase Console</a></li>
            <li>اضغط على ⋮ بجانب البريد ثم "Delete account"</li>
            <li>ارجع هنا واضغط "إعادة الإنشاء"</li>
          </ol>
        </div>`);
      window.open(searchUrl,'_blank');
      return;
    }
    btn.disabled=false;btn.textContent=orig;
    setMsg('<span class="text-r">❌ '+(e?.code||e?.message||'فشل الإنشاء')+'</span>');
    return;
  }

  // الحساب الجديد اتعمل. دلوقتي نحدّث Firestore عبر employeeActions.linkRebuiltAuth:
  //   - employees.authUid = newAuthUid (+ email للتأكيد)
  //   - users/{newAuthUid} جديد بنفس الصلاحيات
  //   - users/{oldAuthUid} يتأرشف (بدل ما نحذفه — بنحافظ على audit trail)
  setMsg('<span class="text-muted">⏳ ربط الحساب الجديد بالبيانات الموجودة…</span>');
  const lr=await employeeActions.linkRebuiltAuth({
    db,
    employeeDocId:emp._id,newAuthUid,oldAuthUid,email,
    employeeData:{name:emp.name||'',role:emp.role||'customer_service',phone:emp.phone},
    newPassword:pw,userPermissions:empUserDoc?.permissions||{},
    userId:currentUser?.uid||'',userName:adminName||'',
  });
  if(!lr.ok){
    btn.disabled=false;btn.textContent=orig;
    setMsg(`<span class="text-y">⚠️ تم إنشاء الحساب لكن فشل ربطه: ${(lr.errors||[]).join(' · ')}</span><br><span class="txt-meta-xs">الحساب الجديد شغّال لكن قد يحتاج لمس يدوي.</span>`);
    return;
  }

  setMsg(`<div class="ep-msg-ok">
    ✅ تم بنجاح! الموظف يقدر يدخل الآن بـ:<br>
    📱 <strong class="ep-mono-snow">${emp.phone}</strong><br>
    🔑 <strong class="ep-mono-snow-lg">${pw}</strong>
  </div>`);
  btn.disabled=false;btn.textContent=orig;
  setTimeout(()=>btn.closest('.overlay')?.remove(),3500);
};

window.resetEmployeePassword=async function(){
  if(!emp)return;
  if(!emp.authUid){toast('⚠️ الموظف ليس لديه حساب دخول مفعّل','err');return;}
  if(!confirm(`إنشاء كلمة سر مؤقتة لـ "${emp.name}"؟\nستظهر مرة واحدة فقط — احفظها فوراً.`))return;
  toast('جاري إعادة التعيين...','');
  try{
    const { getFunctions, httpsCallable }=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-functions.js');
    const fns=getFunctions(app,'us-central1');
    const call=httpsCallable(fns,'adminResetEmployeePassword');
    const { data }=await call({uid:emp.authUid});
    if(!data?.tempPassword)throw new Error('لم يتم استلام كلمة السر من الخادم');
    showTempPasswordModal(emp.name||'الموظف', data.tempPassword);
  }catch(e){
    // "internal" / "not-found" / "unavailable" → Cloud Function not deployed
    // (the GitHub Actions deploy step is wrapped in continue-on-error so a
    // failed Functions deploy doesn't surface). Fall back to a manual flow
    // that opens Firebase Console for the admin to reset directly.
    const code=e?.code||'';
    const looksUndeployed=code.includes('internal')||code.includes('not-found')||code.includes('unavailable')||(e?.message||'').toLowerCase().includes('internal');
    if(looksUndeployed){
      showManualResetModal(emp);
    } else {
      toast('❌ '+(e.message||'تعذرت إعادة التعيين'),'err');
    }
  }
};

window.copyToClipboard=async function(text,btn){
  try{
    await navigator.clipboard.writeText(text);
    if(btn){const o=btn.textContent;btn.textContent='✅ تم النسخ';setTimeout(()=>btn.textContent=o,1500);}
  }catch(_){toast('انسخ يدوياً: '+text,'');}
};

function isWorkDay(dateStr){
  const ws=emp?.workSchedule;
  if(!ws?.days?.length)return new Date(dateStr).getDay()!==5&&new Date(dateStr).getDay()!==6;
  return ws.days.includes(new Date(dateStr).getDay());
}
function isLeaveDay(dateStr){
  return empLeaves.some(lv=>dateStr>=(lv.startDate||'')&&dateStr<=(lv.endDate||lv.startDate||''));

window.calcLeaveDays=function(){
  const s=document.getElementById('lv-start').value;
  const e=document.getElementById('lv-end').value||s;
  if(!s){document.getElementById('lv-days-preview').textContent='';return;}
  const d1=new Date(s),d2=new Date(e||s);
  let days=0;
  const cur=new Date(d1);
  while(cur<=d2){
    if(isWorkDay(cur.toISOString().slice(0,10)))days++;
    cur.setDate(cur.getDate()+1);
  }
  document.getElementById('lv-days-preview').textContent=days+' يوم عمل';
};
window.saveLeave=async function(){
  const type=document.getElementById('lv-type').value;
  const startDate=document.getElementById('lv-start').value;
  const endDate=document.getElementById('lv-end').value||startDate;
  const reason=document.getElementById('lv-reason').value.trim();
  if(!startDate)return toast('⚠️ حدد تاريخ البداية','err');
  if(endDate<startDate)return toast('⚠️ تاريخ النهاية قبل البداية','err');
  let days=0;
  const cur=new Date(startDate);
  while(cur<=new Date(endDate)){if(isWorkDay(cur.toISOString().slice(0,10)))days++;cur.setDate(cur.getDate()+1);}
  const r=await employeeActions.addEmployeeLeave({db,employeeId:empId,employeeName:emp.name||'',type,startDate,endDate,days,reason,userId:currentUser.uid,userName:adminName});

window.updateSalaryCalc=function(){
  if(!emp)return;
  const sel=document.getElementById('sal-month-sel');
  const mKey=sel?sel.value:monthKey();
  const salType=document.getElementById('sal-type')?.value||'salary';

  // الحساب pure في core/employee-salary-calc.js
  const calc=computeSalarySuggestion({
    mKey, employee:emp, employeeId:empId,
    attendance:attendanceRecords, leaves:empLeaves, permissions:empPermissions, allOrders,
    payOvertime:isFeatureEnabled('attendance.overtimePay'),
  });
  const {base,commission,suggested,absenceDeduction,tardinessDeduction,attendanceBonus,
         daysPresent,daysAbsent,workDays,tardinessDays,lateRecords,
         workedHours,overtimeHours,overtimePay}=calc;
  salaryData={base,commission,suggested,month:mKey,absenceDeduction,tardinessDeduction,
              attendanceBonus,daysPresent,daysAbsent,workDays,tardinessDays,lateRecords};

  // الكالك بوكس: يظهر فقط لنوع مرتب
  const calcBox=document.getElementById('sal-calc-box');
  if(calcBox)calcBox.style.display=salType==='salary'?'block':'none';
  setText('sal-base',fn(base)+' ج');
  setText('sal-commission',commission>0?fn(Math.round(commission))+' ج':'—');
  setText('sal-total',fn(suggested)+' ج');

  // ملخص ما دُفع هذا الشهر
  const monthPays=empSalaries.filter(s=>s.month===mKey);
  const paidThisMonth=monthPays.reduce((s,t)=>s+(t.isDeduction?-(parseFloat(t.amount)||0):(parseFloat(t.amount)||0)),0);
  const remaining=suggested-paidThisMonth;
  const summEl=document.getElementById('sal-paid-summary');
  if(summEl){
    if(paidThisMonth>0){
      summEl.style.display='block';
      summEl.innerHTML=`<div class="row-between ep-mb-4"><span class="text-muted">مدفوع بالفعل هذا الشهر (${monthPays.length} دفعة)</span><strong class="text-b">${fn(paidThisMonth)} ج</strong></div>
      <div class="row-between"><span class="text-muted">المتبقي</span><strong style="color:${remaining>0?'var(--y)':remaining<0?'var(--r)':'var(--g)'}">${remaining>0?fn(remaining)+' ج':remaining<0?'زيادة '+fn(-remaining)+' ج':'✅ مكتمل'}</strong></div>`;
    } else {
      summEl.style.display='none';
    }
  }

  // حضور تفصيل
  const attEl=document.getElementById('sal-attendance-detail');
  if(attEl){
    const showBlock=salType==='salary'&&(daysAbsent>0||attendanceBonus>0||tardinessDays>0||workedHours>0||overtimeHours>0);
    if(showBlock){
      attEl.style.display='block';
      attEl.innerHTML=`<div class="ep-att-box">
        <div class="row-between ep-mb-4"><span class="text-muted">أيام الحضور</span><span class="ep-att-g">${daysPresent} / ${workDays} يوم</span></div>
        ${daysAbsent>0?`<div class="row-between ep-mb-4"><span class="text-muted">خصم غياب</span><span class="ep-att-r">- ${fn(absenceDeduction)} ج</span></div>`:''}
        ${tardinessDays>0?`<div class="row-between ep-mb-4"><span class="text-muted">خصم تأخير (${lateRecords} مرة · ≈${tardinessDays} يوم)</span><span class="ep-att-y">- ${fn(tardinessDeduction)} ج</span></div>`:''}
        ${attendanceBonus>0?`<div class="row-between ep-mb-4"><span class="text-muted">بدل حضور كامل</span><span class="ep-att-g">+ ${fn(attendanceBonus)} ج</span></div>`:''}
        ${workedHours>0?`<div class="row-between ep-mb-4"><span class="text-muted">ساعات العمل</span><span class="ep-att-g">${workedHours} س</span></div>`:''}
        ${overtimeHours>0?`<div class="row-between"><span class="text-muted">وقت إضافي (${overtimeHours} س)</span><span class="${overtimePay>0?'ep-att-g':'text-muted'}">${overtimePay>0?'+ '+fn(overtimePay)+' ج':'— غير مفعّل'}</span></div>`:''}
      </div>`;
    } else { attEl.style.display='none'; }
  }

  // اقتراح المبلغ
  const amtEl=document.getElementById('sal-amount');
  if(amtEl&&!amtEl.dataset.edited){
    amtEl.value=salType==='salary'?Math.max(0,remaining>0?remaining:suggested):'';
  }
  updateAmountHint();

  // ملاحظة
  const TYPE_LABELS={salary:'مرتب',advance:'سلفة',bonus:'مكافأة',deduction:'خصم',other:''};
  const notesEl=document.getElementById('sal-notes');
  if(notesEl&&!notesEl.dataset.edited){
    sv('sal-notes',`${TYPE_LABELS[salType]||''} ${MONTHS[mMon]} ${mYear} — ${emp.name}`.trim());
  }

  const warnEl=document.getElementById('sal-paid-warn');
  if(warnEl)warnEl.style.display='none';
};

window.updateAmountHint=function(){
  if(!salaryData)return;
  const amt=parseFloat(document.getElementById('sal-amount')?.value)||0;
  const hintEl=document.getElementById('sal-amount-hint');if(!hintEl)return;
  const mKey=salaryData.month;
  const paidThisMonth=empSalaries.filter(s=>s.month===mKey).reduce((s,t)=>s+(t.isDeduction?-(parseFloat(t.amount)||0):(parseFloat(t.amount)||0)),0);
  const totalAfter=paidThisMonth+amt;
  const suggested=salaryData.suggested;
  if(amt<=0){hintEl.textContent='';return;}
  if(totalAfter===suggested){hintEl.innerHTML=`<span class="text-g">✅ يغطي المستحق كاملاً (${fn(suggested)} ج)</span>`;}
  else if(totalAfter<suggested){hintEl.innerHTML=`<span class="text-y">دفعة جزئية · متبقي ${fn(suggested-totalAfter)} ج</span>`;}
  else{hintEl.innerHTML=`<span class="text-p">يتجاوز المستحق بـ ${fn(totalAfter-suggested)} ج (مكافأة؟)</span>`;}
};

window.confirmSalary=async function(){
  const amount=parseFloat(document.getElementById('sal-amount')?.value)||0;
  if(!amount)return toast('⚠️ أدخل المبلغ','err');
  const wId=gv('sal-wallet');
  if(!wId)return toast('⚠️ اختر المحفظة','err');
  const w=wallets.find(x=>x._id===wId);
  if(!w)return toast('❌ محفظة غير موجودة','err');
  const salType=document.getElementById('sal-type')?.value||'salary';
  const isDeduction=salType==='deduction';
  if(!isDeduction&&(parseFloat(w.balance)||0)<amount){
    if(!confirm(`⚠️ رصيد ${w.name} (${fn(w.balance)} ج) أقل من المبلغ (${fn(amount)} ج). تكمل؟`))return;
  }
  const btn=document.querySelector('#ov-salary .btn-g');
  btn.disabled=true;btn.textContent='جاري...';
  const note=gv('sal-notes');
  console.log('[profile] 🖱️ button clicked: confirmSalary', { salType, amount, empId });
  const r=await employeeActions.recordSalaryPayment({
    db,
    employeeId:empId,employeeName:emp.name||'',
    amount,salaryType:salType,isDeduction,
    walletId:wId,walletName:w.name||'',
    note,month:salaryData.month,
    baseSalary:salaryData.base,commission:salaryData.commission,
    absenceDeduction:salaryData.absenceDeduction||0,
    tardinessDeduction:salaryData.tardinessDeduction||0,
    attendanceBonus:salaryData.attendanceBonus||0,
    daysPresent:salaryData.daysPresent??null,
    daysAbsent:salaryData.daysAbsent??null,
    tardinessDays:salaryData.tardinessDays??0,
    lateRecords:salaryData.lateRecords??0,
    date:todayStr(),userId:currentUser.uid,userName:adminName,
  });
  btn.disabled=false;btn.textContent='✓ تسجيل الدفع';
  if(!r.ok)return toast('❌ '+(r.errors||[]).join(' · '),'err');
  if(r.idempotent&&!r.pending){
    closeSalModal();
    return toast(`ℹ️ الدفعة مسجَّلة مسبقاً (${fn(amount)} ج)`,'ok');
  }
  closeSalModal();
  toast(`✅ تم تسجيل ${fn(amount)} ج${isDeduction?' (خصم)':''} — ${emp.name}`,'ok');
};

// ══ ATTENDANCE RECORDING ══
// lateMinutes is computed centrally inside recordAttendanceCheckIn from the
// employee's schedule (expectedStart) with a 15-min grace — single source.
window.recordAttendanceToday=async function(){
  if(!emp)return;
  const dateStr=todayStr();
  const mKey=monthKey();
  const existing=empAttendance.find(a=>a.date===dateStr);
  if(existing){toast('⚠️ تم تسجيل حضور '+emp.name+' اليوم مسبقاً','err');return;}
  const r=await employeeActions.recordAttendanceCheckIn({db,employeeId:empId,employeeUid:emp.authUid||empId,employeeName:emp.name||'',date:dateStr,monthKey:mKey,expectedStart:emp?.workSchedule?.startTime||'',graceMinutes:15,source:'central',recordedBy:currentUser.uid,recordedByName:adminName});
  if(!r.ok)return toast('❌ '+(r.errors||[]).join(' · '),'err');
  if(r.lateMinutes>0)toast(`⚠️ حضور متأخر ${r.lateMinutes}د — ${emp.name}`,'err');
  else toast('✅ تم تسجيل حضور '+emp.name+' اليوم','ok');
};

window.recordCheckOutToday=async function(){
  if(!emp)return;
  const dateStr=todayStr();
  const existing=empAttendance.find(a=>a.date===dateStr);
  if(!existing){toast('⚠️ لم يُسجَّل حضور '+emp.name+' اليوم بعد','err');return;}
  if(existing.checkOut){toast('⚠️ تم تسجيل انصراف '+emp.name+' اليوم مسبقاً','err');return;}
  const r=await employeeActions.recordAttendanceCheckOut({db,attendanceId:existing._id});
  if(!r.ok)return toast('❌ '+(r.errors||[]).join(' · '),'err');
  toast('✅ تم تسجيل انصراف '+emp.name,'ok');
};
