<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<style>
.profile-hero{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--line);border-radius:var(--rad2);padding:20px;margin-bottom:16px;display:flex;gap:16px;align-items:center}
.profile-av{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;flex-shrink:0}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:12px;border-top:3px solid var(--kc,var(--b))}
.kpi-val{font-size:22px;font-weight:900;color:var(--kc,var(--b))}
.kpi-lbl{font-size:10px;color:var(--dim2);font-weight:700;margin-top:2px}
.income-box{background:linear-gradient(135deg,rgba(0,217,126,.08),rgba(167,139,250,.06));border:1px solid rgba(0,217,126,.2);border-radius:var(--rad2);padding:16px;text-align:center;margin-bottom:16px}
.att-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.att-day{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:default}
.att-day.present{background:rgba(0,217,126,.2);color:var(--g)}
.att-day.absent{background:rgba(255,61,110,.12);color:var(--r)}
.att-day.off{background:var(--bg3);color:var(--dim)}
.att-day.today{box-shadow:0 0 0 2px var(--b)}
.task-item{background:var(--bg3);border:1px solid var(--line);border-radius:var(--rad);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.task-item.done-task{opacity:.45}
.task-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--trans)}
.task-check.checked{background:var(--g);border-color:var(--g);color:#fff}
.pri-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0}
.pri-urgent{background:rgba(255,61,110,.15);color:var(--r)}
.pri-normal{background:rgba(59,158,255,.15);color:var(--b)}
.pri-low{background:rgba(74,82,112,.2);color:var(--dim2)}
.salary-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg3);border-radius:var(--rad);margin-bottom:6px}
.month-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px}
.paid-badge{background:rgba(0,217,126,.15);color:var(--g)}
.unpaid-badge{background:rgba(255,170,0,.15);color:var(--y)}
@media(max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr)}.profile-hero{flex-direction:column;text-align:center}}
</style>
</head>

<script type="module">


// ══ SIDEBAR - Final Solution ══
async function buildDynamicSidebar(uid, currentPage) {
  const nav = document.getElementById('nav-scroll-dynamic') || document.querySelector('.nav-scroll');
  if (!nav) return;
  
  try {
    const usnap = await getDoc(doc(db,'users',uid));
    const ud = usnap.exists() ? usnap.data() : {};
    const role = ud.role || 'admin';
    const perms = ud.permissions || {};
    const userPages = perms.pages || [];
    const isAdm = ['admin','operation_manager'].includes(role);
    
    const ROLE_DASH = {
      admin:'index.html', operation_manager:'index.html',
      customer_service:'cs-dashboard.html',
      graphic_designer:'designer-dashboard.html',
      design_operator:'designer-dashboard.html',
      production_agent:'production-dashboard.html',
      shipping_officer:'shipping-dashboard.html',
      wallet_manager:'accounts.html',
    };
    
    const ALL = [
      {f:'clients.html',         l:'العملاء',       i:'👤', p:'clients'},
      {f:'design.html',          l:'التصميم',       i:'✏️', p:'design'},
      {f:'print.html',           l:'الطباعة',       i:'🖨️', p:'print'},
      {f:'production.html',      l:'التنفيذ',       i:'🏭', p:'production'},
      {f:'shipping.html',        l:'الشحن',         i:'🚚', p:'shipping'},
      {f:'shipping-accounts.html',l:'حسابات الشحن',i:'📦', p:'shipping-accounts'},
      {f:'archive.html',         l:'الأرشيف',       i:'📁', p:'archive'},
      {f:'accounts.html',        l:'الحسابات',      i:'💰', p:'accounts'},
      {f:'suppliers.html',       l:'الموردين',      i:'▣',  p:'suppliers'},
      {f:'products.html',        l:'المنتجات',      i:'◈',  p:'products'},
      {f:'employees.html',       l:'الموظفين',      i:'👥', p:'employees', adminOnly:true},
      {f:'reports.html',         l:'التقارير',      i:'📊', p:'reports'},
      {f:'settings.html',        l:'الإعدادات',     i:'⚙️', p:'settings', adminOnly:true},
    ];
    
    const dash = ROLE_DASH[role] || 'index.html';
    const dashLabel = isAdm ? 'لوحة التحكم' : 'داشبوردي';
    
    let html = `<a class="nav-link${currentPage===dash?' active':''}" href="${dash}">
      <span class="nav-ico">⬡</span> ${dashLabel}
    </a>`;
    
    for (const pg of ALL) {
      if (pg.adminOnly && !isAdm) continue;
      const ok = isAdm || userPages.includes('*') || userPages.includes(pg.p);
      if (!ok) continue;
      html += `<a class="nav-link${currentPage===pg.f?' active':''}" href="${pg.f}">
        <span class="nav-ico">${pg.i}</span> ${pg.l}
      </a>`;
    }
    
    nav.innerHTML = html;
  } catch(e) {
    // fallback - show basic links
    nav.innerHTML = `
      <a class="nav-link" href="index.html"><span class="nav-ico">⬡</span> الرئيسية</a>
      <a class="nav-link" href="clients.html"><span class="nav-ico">👤</span> العملاء</a>
      <a class="nav-link" href="design.html"><span class="nav-ico">✏️</span> التصميم</a>
    `;
    console.warn('sidebar fallback:', e.message);
  }
}

// ══ Sidebar Manager ══
const SIDEBAR_PAGES=[
  {file:'index.html',label:'لوحة التحكم',ico:'⬡',group:'main',adminOnly:true},
  {file:'clients.html',label:'العملاء',ico:'👤',group:'orders',perm:'clients'},
  {file:'design.html',label:'التصميم',ico:'✏️',group:'orders',perm:'design'},
  {file:'print.html',label:'الطباعة',ico:'🖨️',group:'orders',perm:'print'},
  {file:'production.html',label:'التنفيذ',ico:'🏭',group:'orders',perm:'production'},
  {file:'shipping.html',label:'الشحن',ico:'🚚',group:'orders',perm:'shipping'},
  {file:'shipping-accounts.html',label:'حسابات الشحن',ico:'📦',group:'orders',perm:'shipping-accounts'},
  {file:'archive.html',label:'الأرشيف',ico:'📁',group:'orders',perm:'archive'},
  {file:'accounts.html',label:'الحسابات',ico:'💰',group:'admin',perm:'accounts'},
  {file:'suppliers.html',label:'الموردين',ico:'▣',group:'admin',perm:'suppliers'},
  {file:'products.html',label:'المنتجات',ico:'◈',group:'admin',perm:'products'},
  {file:'reports.html',label:'التقارير',ico:'📊',group:'admin',perm:'reports'},
  {file:'employees.html',label:'الموظفين',ico:'👥',group:'admin',adminOnly:true},
  {file:'settings.html',label:'الإعدادات',ico:'⚙️',group:'admin',adminOnly:true},
];
const ROLE_HOME_MAP={admin:'index.html',operation_manager:'index.html',customer_service:'cs-dashboard.html',graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'};
const DASH_LABELS_MAP={admin:'لوحة التحكم',operation_manager:'لوحة التحكم',customer_service:'داشبوردي',graphic_designer:'داشبوردي',design_operator:'داشبوردي',production_agent:'داشبوردي',shipping_officer:'داشبوردي',wallet_manager:'داشبوردي'};
const GROUP_LABELS_SB={main:'الرئيسية',orders:'الأوردرات',admin:'الإدارة'};

function buildSidebar(userData,currentPage){
  if(!userData)return;
  const role=userData.role||'customer_service';
  const perms=userData.permissions||{};
  const pages=perms.pages||[];
  const isAdm=['admin','operation_manager'].includes(role);
  const cur=(currentPage||window.location.pathname.split('/').pop()||'').replace(/\?.*/,'');
  const navEl=document.getElementById('nav-links');
  if(!navEl)return;
  const dashHome=ROLE_HOME_MAP[role]||'index.html';
  let html='',lastGrp='';
  html+=`<a class="nav-link${cur===dashHome?' active':''}" href="${dashHome}"><span class="nav-ico">⬡</span> ${DASH_LABELS_MAP[role]||'داشبوردي'}</a>`;
  for(const cfg of SIDEBAR_PAGES){
    if(cfg.file==='index.html')continue;
    const ok=isAdm||(cfg.adminOnly?false:(pages.includes('*')||pages.includes(cfg.perm||'')));
    if(!ok)continue;
    if(cfg.group!==lastGrp){html+=`<div class="nav-group">${GROUP_LABELS_SB[cfg.group]||cfg.group}</div>`;lastGrp=cfg.group;}
    html+=`<a class="nav-link${cur===cfg.file?' active':''}" href="${cfg.file}"><span class="nav-ico">${cfg.ico}</span> ${cfg.label}</a>`;
  }
  navEl.innerHTML=html;
}

function guardPage(userData,currentPage){
  if(!userData)return true;
  const role=userData.role||'customer_service';
  const isAdm=['admin','operation_manager'].includes(role);
  if(isAdm)return true;
  const perms=userData.permissions||{};
  const pages=perms.pages||[];
  const cur=(currentPage||window.location.pathname.split('/').pop()||'').replace(/\?.*/,'');
  const cfg=SIDEBAR_PAGES.find(p=>p.file===cur);
  if(!cfg)return true;
  if(cfg.adminOnly){window.location.href=ROLE_HOME_MAP[role]||'login.html';return false;}
  const perm=cfg.perm||cur.replace('.html','');
  if(!pages.includes('*')&&!pages.includes(perm)){window.location.href=ROLE_HOME_MAP[role]||'login.html';return false;}
  return true;
}

function initSidebar(userData,currentPage){
  if(!guardPage(userData,currentPage))return false;
  buildSidebar(userData,currentPage);
  return true;
}
// ══════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, getDoc, getDocs, query, where, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"});
const auth=getAuth(app), db=getFirestore(app);

// ══ STATE ══
let emp=null, allOrders=[], empTasks=[], empAttendance=[], empSalaries=[], wallets=[];
let currentUser=null, adminRole='', adminName='';
const empId=new URLSearchParams(location.search).get('id');

const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const gv=id=>document.getElementById(id)?.value||'';
const sv=(id,v)=>{const e=document.getElementById(id);if(e)e.value=v||'';};
const setText=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
const now=new Date();
const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const DAYS=['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];

const ROLES={
  admin:{label:'Admin',col:'var(--p)',ico:'👑'},
  operation_manager:{label:'مدير عمليات',col:'var(--b)',ico:'📋'},
  customer_service:{label:'خدمة عملاء',col:'var(--c)',ico:'💬'},
  graphic_designer:{label:'مصمم',col:'var(--p)',ico:'🎨'},
  production_agent:{label:'تنفيذ',col:'var(--r)',ico:'🏭'},
  shipping_officer:{label:'شحن',col:'var(--c)',ico:'🚚'},
  wallet_manager:{label:'محاسب',col:'var(--g)',ico:'💰'},
};

function toast(msg,t=''){const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}
window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};
function nowStr(){return new Date().toLocaleDateString('ar-EG')+' '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});}
function isThisMonth(ts){if(!ts?.toDate)return false;const d=ts.toDate();return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}
function todayStr(){return now.toISOString().slice(0,10);}
function monthKey(){return now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');}

if(!empId){document.getElementById('main-content').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">لم يُحدد موظف</div><a href="employees.html" data-page="employees" class="btn btn-b btn-sm" style="margin-top:12px">← العودة</a></div>';}

onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  currentUser=u;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(snap.exists()){
    const d=snap.data();
    buildDynamicSidebar(u.uid, 'employee-profile.html');
    adminRole=d.role||'';
    adminName=d.name||u.email;
    // Guard — admin + ops فقط
    if(!['admin','operation_manager'].includes(adminRole)){
      window.location.href='index.html';return;
    }
    setText('nav-name',adminName);
    document.getElementById('nav-av').textContent=adminName[0].toUpperCase();
    document.getElementById('role-badge').textContent=adminRole==='admin'?'Admin':'Ops';
  }
  if(!empId)return;

  // جيب بيانات الموظف
  const empSnap=await getDoc(doc(db,'employees',empId));
  if(!empSnap.exists()){
    document.getElementById('main-content').innerHTML='<div class="empty"><div class="empty-icon">👤</div><div class="empty-text">لم يُعثر على الموظف</div></div>';
    return;
  }
  emp={...empSnap.data(),_id:empId};
  const r=ROLES[emp.role]||{label:emp.role,col:'var(--dim2)',ico:'👤'};
  setText('page-title',r.ico+' '+emp.name);
  setText('sub',r.label+' · '+(emp.status==='active'?'✅ نشط':'⏸️ غير نشط'));

  // Topbar actions
  document.getElementById('topbar-actions').innerHTML=`
    <button class="btn btn-ghost btn-sm" onclick="location.href='employees.html'">← الموظفين</button>
    <button class="btn btn-b btn-sm" onclick="openAddTask()">＋ مهمة</button>
    <button class="btn btn-g btn-sm" onclick="openSalary()">💰 صرف مرتب</button>`;

  // Listeners
  onSnapshot(collection(db,'orders'),snap=>{
    allOrders=snap.docs.map(d=>({...d.data(),_id:d.id}));
    renderAll();
  });
  onSnapshot(query(collection(db,'tasks'),where('assignedTo','==',emp.authUid||empId)),snap=>{
    empTasks=snap.docs.map(d=>({...d.data(),_id:d.id}))
      .sort((a,b)=>{const p={urgent:0,normal:1,low:2};return(p[a.priority]||1)-(p[b.priority]||1);});
    renderTasks();
  });
  onSnapshot(query(collection(db,'attendance'),where('employeeUid','==',emp.authUid||empId)),snap=>{
    empAttendance=snap.docs.map(d=>({...d.data(),_id:d.id}));
    renderAttendance();
  });
  onSnapshot(query(collection(db,'transactions_v2'),where('category','==','salary'),where('employeeId','==',empId)),snap=>{
    empSalaries=snap.docs.map(d=>({...d.data(),_id:d.id})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    renderSalaries();
  });
  onSnapshot(collection(db,'wallets'),snap=>{
    wallets=snap.docs.map(d=>({...d.data(),_id:d.id}));

async function renderPermissions(){
  const el=document.getElementById('permissions-container');if(!el||!emp)return;
  if(['admin','operation_manager'].includes(emp.role)){
    el.innerHTML='<div style="font-size:12px;color:var(--g);text-align:center;padding:12px">✅ Admin — صلاحيات كاملة</div>';
    return;
  }
  const defaults=ROLE_DEFAULTS_PROFILE[emp.role]||{pages:[],canSeePrices:false,canSeeAllOrders:false,canAddOrders:false,canAddClients:false,canAssignDesigner:false,canAssignTasks:false};
  let current={...defaults};
  try{
    // ابحث عن الـ user document
    let userDoc=null;
    if(emp.authUid){
      const snap=await getDoc(doc(db,'users',emp.authUid));
      if(snap.exists()) userDoc=snap.data();
    }
    if(!userDoc){
      // ابحث بالـ email
      const email=emp.email||(emp.phone||'')+'@b2c.local';
      if(email){
        const q=await getDocs(query(collection(db,'users'),where('email','==',email)));
        if(!q.empty){
          const d=q.docs[0];
          emp.authUid=d.id; // احفظه
          userDoc=d.data();
        }
      }
    }
    if(userDoc?.permissions){
      current={...defaults,...userDoc.permissions};
    }
  }catch(e){
    console.log('permissions fetch:',e.message);
  }
  renderPermsUI(current);
}

window.savePermissions=async function(){
  if(!emp?.authUid){
    // ابحث بالـ email
    const email=emp.email||(emp.phone||'')+'@b2c.local';
    try{
      const q=await getDocs(query(collection(db,'users'),where('email','==',email)));
      if(!q.empty){emp.authUid=q.docs[0].id;}
      else{toast('⚠️ الموظف مش عنده حساب Firebase بعد — أضفه من صفحة الموظفين','err');return;}
    }catch(e){toast('❌ '+e.message,'err');return;}
  }
  const pages=[...document.querySelectorAll('.perm-page:checked')].map(cb=>cb.value);
  const perms={pages};
  document.querySelectorAll('.perm-data').forEach(cb=>{perms[cb.value]=cb.checked;});
  try{
    await updateDoc(doc(db,'users',emp.authUid),{permissions:perms});
    toast('✅ تم حفظ الصلاحيات','ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

function renderTasks(){
  const el=document.getElementById('tasks-container');if(!el)return;
  const open=empTasks.filter(t=>t.status==='pending');
  const done=empTasks.filter(t=>t.status==='done').slice(0,3);
  setText('tasks-count',open.length);
  const PRI={urgent:{lbl:'⚡ عاجل',cls:'pri-urgent'},normal:{lbl:'📌 عادي',cls:'pri-normal'},low:{lbl:'📎 منخفض',cls:'pri-low'}};
  const today=todayStr();
  el.innerHTML=[...open,...done].map(t=>{
    const p=PRI[t.priority]||PRI.normal;
    const isDone=t.status==='done';
    const isLate=t.dueDate&&t.dueDate<today&&!isDone;
    return`<div class="task-item${isDone?' done-task':''}">
      <div class="task-check${isDone?' checked':''}" onclick="toggleTask('${t._id}','${t.status}')">${isDone?'✓':''}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;${isDone?'text-decoration:line-through':''}">${t.title}</div>
        ${t.description?`<div style="font-size:11px;color:var(--dim2);margin-top:2px">${t.description}</div>`:''}
        ${t.dueDate?`<div style="font-size:10px;color:${isLate?'var(--r)':'var(--dim2)'};margin-top:2px">📅 ${t.dueDate}${isLate?' ⚠️ متأخرة':''}</div>`:''}
      </div>
      <span class="pri-badge ${p.cls}">${p.lbl}</span>
      ${!isDone?`<button onclick="deleteTask('${t._id}')" style="background:none;border:none;color:var(--dim2);cursor:pointer;font-size:14px;padding:2px">🗑</button>`:''}
    </div>`;
  }).join('')||'<div style="font-size:12px;color:var(--g);text-align:center;padding:12px">✅ لا توجد مهام مفتوحة</div>';
}

// ══ ATTENDANCE ══
function renderAttendance(){
  const cal=document.getElementById('att-cal');if(!cal)return;
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const firstDay=new Date(now.getFullYear(),now.getMonth(),1).getDay();
  const presentDays=empAttendance.filter(a=>a.date?.startsWith(monthKey())).length;
  const workDays=Array.from({length:daysInMonth},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth(),i+1);
    return d.getDay()!==5&&d.getDay()!==6; // الجمعة والسبت عطلة
  }).filter(Boolean).length;
  setText('att-summary',`${presentDays} من ${workDays} يوم عمل`);
  let html='';
  for(let i=0;i<firstDay;i++)html+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=monthKey()+'-'+String(d).padStart(2,'0');
    const att=empAttendance.find(a=>a.date===dateStr);
    const dayOfWeek=new Date(now.getFullYear(),now.getMonth(),d).getDay();
    const isWeekend=dayOfWeek===5||dayOfWeek===6;
    const isTodayDay=d===now.getDate();
    const isFuture=d>now.getDate();
    let cls='att-day ';
    if(att)cls+='present';
    else if(isWeekend||isFuture)cls+='off';
    else cls+='absent';
    html+=`<div class="${cls}${isTodayDay?' today':''}" title="${dateStr}${att?'\n'+att.checkInStr+' → '+(att.checkOutStr||'لم ينصرف'):''}">${d}</div>`;
  }
  cal.innerHTML=html;
}

        <span class="month-badge paid-badge">✅ مصروف</span>
      </div>
    </div>`).join(''):'<div style="font-size:12px;color:var(--dim2);text-align:center;padding:12px">لا توجد سجلات مرتبات</div>');
}

// ══ SALARY ══
let salaryData={};
window.openSalary=function(){
  if(!emp)return;
  // حساب العمولة هذا الشهر
  const commission=emp.role==='graphic_designer'?
    allOrders.filter(o=>isThisMonth(o.createdAt)&&
      (o.designerId===emp.authUid||o.designerId===empId)&&
      ['printing','production','shipping','archived'].includes(o.stage))
    .reduce((s,o)=>s+((parseFloat(o.salePrice)||0)*(parseFloat(emp.commissionPct)||0)/100),0):0;
  const base=parseFloat(emp.baseSalary)||0;
  const total=base+commission;
  salaryData={base,commission,total,month:monthKey()};
  setText('sal-month-label',MONTHS[now.getMonth()]+' '+now.getFullYear());
  setText('sal-base',fn(base)+' ج');
  setText('sal-commission',commission>0?fn(commission)+' ج':'—');
  setText('sal-total',fn(total)+' ج');
  sv('sal-notes',`مرتب ${MONTHS[now.getMonth()]} ${now.getFullYear()} — ${emp.name}`);
  // تحقق لو مصروف
  const alreadyPaid=empSalaries.find(s=>s.month===monthKey());
  if(alreadyPaid){
    if(!confirm(`⚠️ تم صرف مرتب ${MONTHS[now.getMonth()]} مسبقاً (${fn(alreadyPaid.amount)} ج)\nتكرار الصرف؟`))return;
  }
  document.getElementById('ov-salary').classList.add('open');
};

window.confirmSalary=async function(){
  const wId=gv('sal-wallet');
  if(!wId){toast('⚠️ اختر المحفظة','err');return;}
  const w=wallets.find(x=>x._id===wId);
  if(!w){toast('❌ محفظة غير موجودة','err');return;}
  if((w.balance||0)<salaryData.total){
    if(!confirm(`⚠️ رصيد المحفظة (${fn(w.balance)} ج) أقل من المرتب (${fn(salaryData.total)} ج)\nتكمل؟`))return;
  }
  const btn=document.querySelector('#ov-salary .btn-g');
  btn.disabled=true;btn.textContent='جاري...';
  try{
    const bb=parseFloat(w.balance)||0;
    await updateDoc(doc(db,'wallets',wId),{balance:bb-salaryData.total});
    await addDoc(collection(db,'transactions_v2'),{
      walletId:wId,walletName:w.name||'',
      type:'out',amount:salaryData.total,
      description:gv('sal-notes'),
      category:'salary',
      employeeId:empId,employeeName:emp.name||'',
      baseSalary:salaryData.base,commission:salaryData.commission,
      month:salaryData.month,
      balanceBefore:bb,balanceAfter:bb-salaryData.total,
      date:nowStr(),createdBy:currentUser.uid,createdByName:adminName,
      createdAt:serverTimestamp()
    });
    document.getElementById('ov-salary').classList.remove('open');
    toast(`✅ تم صرف ${fn(salaryData.total)} ج لـ ${emp.name}`,'ok');
  }catch(e){toast('❌ '+e.message,'err');}
  btn.disabled=false;btn.textContent='✓ تأكيد الصرف';
};
</script>
