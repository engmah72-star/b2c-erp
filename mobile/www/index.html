<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07080f">
  <title>Business2Card ERP</title>
  <style>
    html,body{margin:0;padding:0;height:100%;background:#07080f;color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Cairo","Tajawal",sans-serif;
      display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;}
    .logo{width:96px;height:96px;border-radius:24px;background:var(--r);
      display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:800;
      box-shadow:0 12px 32px rgba(255,61,110,.35);margin-bottom:24px;}
    h1{font-size:18px;margin:0 0 8px;font-weight:600;}
    p{font-size:14px;color:#9aa0aa;margin:0 0 24px;}
    .spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.15);
      border-top-color:var(--r);border-radius:50%;animation:spin .9s linear infinite;}
    .retry{margin-top:20px;background:var(--r);color:#fff;border:0;border-radius:12px;
      padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;display:none;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <div class="logo">B2C</div>
  <h1>Business2Card ERP</h1>
  <p id="status">جارٍ الاتصال بالخادم...</p>
  <div class="spinner" id="spinner"></div>
  <button class="retry" id="retry">إعادة المحاولة</button>

  <script type="module">
    // This shell is only shown when Capacitor cannot reach the configured
    // `server.url` (offline first launch, DNS issue, etc.). On a healthy
    // connection the WebView loads the production site directly.
    const SITE = 'https://business2card-c041b.web.app/login.html';
    const statusEl = document.getElementById('status');
    const spinner  = document.getElementById('spinner');
    const retry    = document.getElementById('retry');

    async function probe() {
      statusEl.textContent = 'جارٍ الاتصال بالخادم...';
      spinner.style.display = 'block';
      retry.style.display   = 'none';
      try {
        // HEAD request to confirm we have connectivity
        await fetch(SITE, { method: 'HEAD', mode: 'no-cors', cache: 'no-store' });
        location.replace(SITE);
      } catch (e) {
        spinner.style.display = 'none';
        statusEl.textContent  = 'لا يوجد اتصال بالإنترنت. تأكد من الشبكة وأعد المحاولة.';
        retry.style.display   = 'inline-block';
      }
    }

    retry.addEventListener('click', probe);
    probe();
  </script>
</body>
</html>
