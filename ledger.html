<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3b9eff">
<title>السجل المالي — Business2Card</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script type="module" src="inbox-badge.js"></script>
<script type="module" src="suggestions-fab.js"></script>
<style>
.lf-bar{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;margin-bottom:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
.lf-fg{display:flex;flex-direction:column;gap:4px}
.lf-fg label{font-size:10px;font-weight:800;color:var(--dim2);text-transform:uppercase;letter-spacing:.5px}
.lf-fg input,.lf-fg select{padding:9px 11px;background:var(--bg3);border:1px solid var(--line);border-radius:8px;color:var(--snow);font-family:inherit;font-size:13px;font-weight:600}
.lf-fg input:focus,.lf-fg select:focus{outline:none;border-color:var(--b)}
.lf-actions{grid-column:1/-1;display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-top:4px}
.lf-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.lf-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad);padding:12px;text-align:center;border-top:3px solid var(--c)}
.lf-card-val{font-size:18px;font-weight:900;line-height:1.1}
.lf-card-lbl{font-size:10px;color:var(--dim2);font-weight:700;margin-top:4px}
.lf-table-wrap{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);overflow:hidden}
.lf-table{width:100%;border-collapse:collapse}
.lf-table th{font-size:10px;font-weight:800;color:var(--dim2);text-transform:uppercase;letter-spacing:.4px;padding:10px 8px;text-align:right;background:var(--bg3);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:1}
.lf-table th.al{text-align:left}
.lf-table td{font-size:12px;padding:9px 8px;border-bottom:1px solid var(--line);color:var(--snow);vertical-align:top}
.lf-table td.al{text-align:left}
.lf-table tr:hover td{background:rgba(59,158,255,.04)}
.lf-table .lt-amt{font-weight:900;white-space:nowrap}
.lf-table .lt-amt.in{color:var(--g)}
.lf-table .lt-amt.out{color:var(--r)}
.lf-table .lt-cat-pill{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(59,158,255,.12);color:var(--b);border:1px solid rgba(59,158,255,.2)}
.lt-link{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:5px;background:rgba(59,158,255,.1);color:var(--b);font-size:10px;font-weight:700;text-decoration:none;border:1px solid rgba(59,158,255,.25)}
.lt-link:hover{background:rgba(59,158,255,.2)}
.lt-empty{padding:60px 20px;text-align:center;color:var(--dim2)}
.lt-loadmore{padding:12px;background:var(--bg3);text-align:center;cursor:pointer;color:var(--b);font-weight:700;font-size:12px;border-top:1px solid var(--line)}
.lt-loadmore:hover{background:rgba(59,158,255,.06)}
@media(max-width:768px){
  .lf-bar{padding:12px}
  .lf-table{font-size:11px}
  .lf-table th,.lf-table td{padding:8px 6px}
  .lt-hide-mob{display:none}
}
</style>
<script src="smart-sidebar.js?v=1" defer></script>
<script src="viewas.js?v=1" defer></script>
<script src="pwa-install.js?v=1" defer></script>
<script type="module" src="ai-launcher.js?v=1" defer></script>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">ERP</div></div></div>
  <div class="nav-scroll" id="nav-scroll-dynamic"></div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">A</div><div><div class="nav-user-name" id="nav-name">User</div><div class="nav-user-role">تسجيل خروج</div></div></div></div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><button class="mob-menu-btn" onclick="toggleNav()">☰</button><div><h1>📊 السجل المالي</h1><p id="sub" style="font-size:11px;color:var(--dim2)">جاري التحميل...</p></div></div>
    <div class="topbar-right"></div>
  </div>
  <div class="content">

    <!-- Filters -->
    <div class="lf-bar">
      <div class="lf-fg"><label>📅 من تاريخ</label><input type="date" id="f-from"></div>
      <div class="lf-fg"><label>📅 إلى تاريخ</label><input type="date" id="f-to"></div>
      <div class="lf-fg"><label>🔄 النوع</label>
        <select id="f-type">
          <option value="">الكل</option>
          <option value="in">📥 وارد</option>
          <option value="out">📤 صادر</option>
        </select>
      </div>
      <div class="lf-fg"><label>🏷️ الفئة</label>
        <select id="f-cat"><option value="">الكل</option></select>
      </div>
      <div class="lf-fg"><label>💼 المحفظة</label>
        <select id="f-wallet"><option value="">الكل</option></select>
      </div>
      <div class="lf-fg"><label>🔍 بحث</label><input type="text" id="f-search" placeholder="عميل، مورد، وصف، رقم أوردر..."></div>
      <div class="lf-actions">
        <button class="btn btn-ghost btn-sm" onclick="resetFilters()">↺ إعادة</button>
        <button class="btn btn-ghost btn-sm" onclick="exportCSV()">📥 تنزيل CSV</button>
        <button class="btn btn-b btn-sm" onclick="applyFilters()">🔍 تطبيق</button>
      </div>
    </div>

    <!-- Summary cards -->
    <div class="lf-summary">
      <div class="lf-card" style="border-top-color:var(--g)"><div class="lf-card-val" id="s-in" style="color:var(--g)">—</div><div class="lf-card-lbl">📥 إجمالي الوارد</div></div>
      <div class="lf-card" style="border-top-color:var(--r)"><div class="lf-card-val" id="s-out" style="color:var(--r)">—</div><div class="lf-card-lbl">📤 إجمالي الصادر</div></div>
      <div class="lf-card" style="border-top-color:var(--b)"><div class="lf-card-val" id="s-net" style="color:var(--b)">—</div><div class="lf-card-lbl">💹 الصافي</div></div>
      <div class="lf-card" style="border-top-color:var(--p)"><div class="lf-card-val" id="s-cnt" style="color:var(--p)">—</div><div class="lf-card-lbl">📋 عدد السجلات</div></div>
    </div>

    <!-- Table -->
    <div class="lf-table-wrap">
      <div style="overflow-x:auto;max-height:65vh;overflow-y:auto">
        <table class="lf-table" id="lf-table">
          <thead>
            <tr>
              <th>التاريخ</th>
              <th>النوع</th>
              <th>الفئة</th>
              <th>الوصف</th>
              <th class="lt-hide-mob">المحفظة</th>
              <th class="lt-hide-mob">الكيان</th>
              <th class="al">المبلغ</th>
              <th>المصدر</th>
            </tr>
          </thead>
          <tbody id="lf-tbody"><tr><td colspan="8" class="lt-empty">جاري التحميل...</td></tr></tbody>
        </table>
        <div id="lt-loadmore" class="lt-loadmore" style="display:none" onclick="loadMore()">⬇️ تحميل المزيد</div>
      </div>
    </div>

  </div>
</div>
</div>

<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div class="toasts" id="toasts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, getDocs, query, where, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB={apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"};
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);

// ── State ──
let allTx=[],wallets=[],filtered=[],displayLimit=200,currentUser=null,userName='',userRole='';
const PAGE_SIZE=200;

// ── Helpers ──
const $ = id => document.getElementById(id);
const setText = (id,v) => {const e=$(id);if(e)e.textContent=v;};
const fn = n => (parseFloat(n)||0).toLocaleString('ar-EG');
const escHtml = s => String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg,t=''){const c=$('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3500);}

window.toggleNav=()=>{document.querySelector('.sidenav')?.classList.toggle('mob-open');$('nav-ov')?.classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav')?.classList.remove('mob-open');$('nav-ov')?.classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);location.href='login.html';};

// ── Category labels (mirrors accounts.html CAT) ──
const CAT_LABELS={
  collection:'💰 تحصيل',
  collection_adjustment:'✏️ تعديل تحصيل',
  collection_reversal:'↩️ عكس تحصيل',
  advance:'💵 مقدم',
  deposit:'🪙 عربون',
  deposit_reversal:'↩️ عكس عربون',
  supplier:'🏭 مورد',
  printer_payment:'🖨️ دفعة طابع',
  shipper_payment:'🚚 دفعة شحن',
  salary:'👤 مرتب',
  designer_fee:'🎨 أتعاب مصمم',
  bonus:'🎁 مكافأة',
  deduction:'➖ خصم',
  shipping_cost:'🚚 تكلفة شحن',
  shipping_settlement:'📦 تسوية شحن',
  shipping_settlement_reversal:'↩️ عكس تسوية',
  return_cost:'↩️ تكلفة مرتجع',
  execution_cost:'🏭 تكلفة تنفيذ',
  marketing:'📣 تسويق',
  rent:'🏢 إيجار',
  delivery:'🚚 شحن',
  other:'📦 أخرى',
  adjustment:'🔄 تسوية',
  opening_balance:'📅 رصيد افتتاحي',
  transfer:'🔄 تحويل',
  refund:'↩️ استرداد',
};
function catLabel(c){return CAT_LABELS[c]||c||'—';}

// ── Sidebar ──
const SBPAGES=[
  {f:'index.html',l:'لوحة التحكم',i:'⬡',admin:true},
  {f:'clients.html',l:'العملاء',i:'👤',p:'clients'},{f:'import-data.html',l:'استيراد البيانات',i:'📥',p:'clients'},
  {f:'design.html',l:'التصميم',i:'✏️',p:'design'},
  {f:'print.html',l:'الطباعة',i:'🖨️',p:'print'},
  {f:'production.html',l:'التنفيذ',i:'🏭',p:'production'},
  {f:'shipping.html',l:'الشحن',i:'🚚',p:'shipping'},
  {f:'shipping-followup.html',l:'متابعة الشحن',i:'📋',p:'shipping'},
  {f:'shipping-accounts.html',l:'حسابات الشحن',i:'📦',p:'shipping-accounts'},
  {f:'archive.html',l:'الأرشيف',i:'📁',p:'archive'},
  {f:'accounts.html',l:'الحسابات',i:'💰',p:'accounts'},{f:'approvals.html',l:'الاعتمادات',i:'🔐',p:'approvals'},
  {f:'ledger.html',l:'السجل المالي',i:'📊',p:'accounts'},
  {f:'suppliers.html',l:'الموردين',i:'▣',p:'suppliers'},
  {f:'reports.html',l:'التقارير',i:'📊',p:'reports'},
  {f:'employees.html',l:'الموظفين',i:'👥',admin:true},
  {f:'settings.html',l:'الإعدادات',i:'⚙️',admin:true},
];
function buildSidebar(ud){
  const role=ud?.role||'';
  const pages=(ud?.permissions?.pages)||[];
  const isAdm=['admin','operation_manager'].includes(role);
  const nav=$('nav-scroll-dynamic');
  if(!nav)return;
  const cur='ledger.html';
  let h='';
  for(const p of SBPAGES){
    const ok=isAdm||(p.admin?false:pages.includes('*')||pages.includes(p.p||''));
    if(!ok)continue;
    h+=`<a class="nav-link${p.f===cur?' active':''}" href="${p.f}"><span class="nav-ico">${p.i}</span> ${p.l}</a>`;
  }
  nav.innerHTML=h;
}

// ── Auth ──
let _started=false;
onAuthStateChanged(auth,async u=>{
  if(!u){location.href='login.html';return;}
  if(_started)return;_started=true;
  currentUser=u;
  try{
    const userSnap=await getDoc(doc(db,'users',u.uid));
    if(!userSnap.exists()){location.href='login.html';return;}
    const ud=userSnap.data();
    userRole=ud.role||'';
    userName=ud.name||u.email;
    setText('nav-name',userName);
    $('nav-av').textContent=(userName[0]||'A').toUpperCase();
    setText('role-badge',userRole==='admin'?'Admin':userRole);
    buildSidebar(ud);
    // Permission gate: must have accounts page or be admin/ops
    const perms=ud.permissions||{};
    const pages=perms.pages||[];
    const isAdm=['admin','operation_manager'].includes(userRole);
    if(!isAdm && !pages.includes('*') && !pages.includes('accounts')){
      $('lf-tbody').innerHTML='<tr><td colspan="8" class="lt-empty">⛔ ليس لديك صلاحية على السجل المالي</td></tr>';
      return;
    }
    initFromUrl();
    startListeners();
  }catch(e){
    console.error(e);
    toast('❌ '+(e.message||e),'err');
  }
});

// ── Read URL params and pre-fill filters ──
function initFromUrl(){
  const p=new URLSearchParams(location.search);
  const today=new Date();
  const firstOfMonth=new Date(today.getFullYear(),today.getMonth(),1);
  // defaults: this month
  $('f-from').value=p.get('from')||firstOfMonth.toISOString().slice(0,10);
  $('f-to').value=p.get('to')||today.toISOString().slice(0,10);
  $('f-type').value=p.get('type')||'';
  // category and wallet are filled after wallets/categories load — store target values
  window.__pendingCat=p.get('category')||'';
  window.__pendingWallet=p.get('wallet')||'';
  $('f-search').value=p.get('q')||'';
}

// ── Listeners ──
function startListeners(){
  onSnapshot(collection(db,'wallets'),snap=>{
    wallets=snap.docs.map(d=>({...d.data(),_id:d.id}));
    fillWalletSelect();
  });
  // C7: bounded — أحدث 5000 tx. للسجلات الأقدم يستخدم المستخدم date filter
  // أو reports.html (التي لها بنية pagination منفصلة).
  onSnapshot(query(collection(db,'transactions_v2'),orderBy('createdAt','desc'),limit(5000)),snap=>{
    allTx=snap.docs.map(d=>({...d.data(),_id:d.id}));
    fillCatSelect();
    applyFilters();
  },err=>{
    console.error(err);
    $('lf-tbody').innerHTML='<tr><td colspan="8" class="lt-empty">⛔ '+(err.message||err)+'</td></tr>';
  });
}

function fillWalletSelect(){
  const cur=$('f-wallet').value||window.__pendingWallet||'';
  $('f-wallet').innerHTML='<option value="">الكل</option>'+
    wallets.map(w=>`<option value="${w._id}">${escHtml(w.name||'محفظة')}</option>`).join('');
  if(cur)$('f-wallet').value=cur;
}

function fillCatSelect(){
  const cats=[...new Set(allTx.map(t=>t.category||'other'))].sort();
  const cur=$('f-cat').value||window.__pendingCat||'';
  $('f-cat').innerHTML='<option value="">الكل</option>'+
    cats.map(c=>`<option value="${c}">${escHtml(catLabel(c))}</option>`).join('');
  if(cur)$('f-cat').value=cur;
}

// ── Filtering ──
function getTxDate(t){
  if(t.createdAt?.toDate)return t.createdAt.toDate();
  if(typeof t.createdAt==='string')return new Date(t.createdAt);
  if(t.date){
    // Try parsing Arabic date string
    try{return new Date(t.date);}catch(_){}
  }
  return null;
}

window.applyFilters=function(){
  const fromVal=$('f-from').value;
  const toVal=$('f-to').value;
  const typeVal=$('f-type').value;
  const catVal=$('f-cat').value;
  const walletVal=$('f-wallet').value;
  const q=($('f-search').value||'').toLowerCase().trim();

  const fromTs=fromVal?new Date(fromVal+'T00:00:00').getTime():0;
  const toTs=toVal?new Date(toVal+'T23:59:59').getTime():Infinity;

  filtered=allTx.filter(t=>{
    if(typeVal && t.type!==typeVal)return false;
    if(catVal && (t.category||'other')!==catVal)return false;
    if(walletVal && t.walletId!==walletVal)return false;
    if(fromTs||toTs!==Infinity){
      const d=getTxDate(t);
      if(!d)return fromVal||toVal?false:true;
      const ts=d.getTime();
      if(ts<fromTs||ts>toTs)return false;
    }
    if(q){
      const hay=[t.description,t.clientName,t.supplierName,t.employeeName,t.note,t.orderRef,t.orderId,t.companyName,catLabel(t.category)]
        .filter(Boolean).join(' ').toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  }).sort((a,b)=>{
    const da=getTxDate(a);const dbb=getTxDate(b);
    return (dbb?.getTime()||0)-(da?.getTime()||0);
  });

  displayLimit=PAGE_SIZE;
  render();
  updateUrl();
};

window.resetFilters=function(){
  const today=new Date();
  const firstOfMonth=new Date(today.getFullYear(),today.getMonth(),1);
  $('f-from').value=firstOfMonth.toISOString().slice(0,10);
  $('f-to').value=today.toISOString().slice(0,10);
  $('f-type').value='';
  $('f-cat').value='';
  $('f-wallet').value='';
  $('f-search').value='';
  applyFilters();
};

window.loadMore=()=>{displayLimit+=PAGE_SIZE;render();};

// ── Render ──
function render(){
  // Summary
  const inSum=filtered.filter(t=>t.type==='in').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const outSum=filtered.filter(t=>t.type==='out').reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  setText('s-in',fn(inSum)+' ج');
  setText('s-out',fn(outSum)+' ج');
  setText('s-net',fn(inSum-outSum)+' ج');
  setText('s-cnt',filtered.length);
  $('s-net').style.color=(inSum-outSum)>=0?'var(--g)':'var(--r)';
  setText('sub',filtered.length+' حركة · '+fn(inSum-outSum)+' ج صافي');

  // Table
  const tbody=$('lf-tbody');
  if(!filtered.length){
    tbody.innerHTML='<tr><td colspan="8" class="lt-empty">لا توجد حركات بهذه الفلاتر</td></tr>';
    $('lt-loadmore').style.display='none';
    return;
  }
  const slice=filtered.slice(0,displayLimit);
  tbody.innerHTML=slice.map(t=>{
    const w=wallets.find(x=>x._id===t.walletId);
    const wName=w?.name||t.walletName||'—';
    const isIn=t.type==='in';
    const ent=t.clientName||t.supplierName||t.employeeName||t.companyName||'—';
    const dateStr=(()=>{
      const d=getTxDate(t);
      return d?d.toLocaleDateString('ar-EG'):(t.date||'—');
    })();
    const link=sourceLinkFor(t);
    const desc=t.description||t.note||'—';
    return `<tr>
      <td style="white-space:nowrap">${escHtml(dateStr)}</td>
      <td><span style="color:${isIn?'var(--g)':'var(--r)'};font-weight:800">${isIn?'📥':'📤'}</span></td>
      <td><span class="lt-cat-pill">${escHtml(catLabel(t.category))}</span></td>
      <td style="max-width:240px"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(desc)}</div>${t.editReason?`<div style="font-size:9px;color:var(--y)">📝 ${escHtml(t.editReason.slice(0,60))}</div>`:''}</td>
      <td class="lt-hide-mob">${escHtml(wName)}</td>
      <td class="lt-hide-mob">${escHtml(ent)}</td>
      <td class="al"><span class="lt-amt ${isIn?'in':'out'}">${fn(t.amount)} ج</span></td>
      <td>${link?`<a class="lt-link" href="${link.href}" target="_blank">${link.icon} ${link.label}</a>`:'<span style="color:var(--dim)">—</span>'}</td>
    </tr>`;
  }).join('');
  $('lt-loadmore').style.display=filtered.length>displayLimit?'block':'none';
  if(filtered.length>displayLimit){
    $('lt-loadmore').textContent=`⬇️ تحميل المزيد (متبقي ${filtered.length-displayLimit})`;
  }
}

function sourceLinkFor(t){
  if(t.orderId){
    return {href:`order-tracking.html?id=${encodeURIComponent(t.orderId)}`,icon:'📦',label:'الأوردر'};
  }
  if(t.supplierId){
    return {href:`suppliers.html?id=${encodeURIComponent(t.supplierId)}`,icon:'🏭',label:'المورد'};
  }
  if(t.employeeId){
    return {href:`employee-profile.html?id=${encodeURIComponent(t.employeeId)}`,icon:'👤',label:'الموظف'};
  }
  if(t.walletId){
    return {href:`accounts.html?wallet=${encodeURIComponent(t.walletId)}`,icon:'💼',label:'المحفظة'};
  }
  return null;
}

// ── URL state sync (for shareable filter links) ──
function updateUrl(){
  const p=new URLSearchParams();
  const set=(k,v)=>{if(v)p.set(k,v);};
  set('from',$('f-from').value);
  set('to',$('f-to').value);
  set('type',$('f-type').value);
  set('category',$('f-cat').value);
  set('wallet',$('f-wallet').value);
  set('q',$('f-search').value);
  const newUrl=location.pathname+(p.toString()?'?'+p.toString():'');
  history.replaceState(null,'',newUrl);
}

// ── CSV export ──
window.exportCSV=function(){
  if(!filtered.length){toast('لا توجد بيانات للتصدير','');return;}
  const headers=['التاريخ','النوع','الفئة','الوصف','المحفظة','الكيان','المبلغ','رقم الأوردر','الموظف','السبب'];
  const escapeCsv=v=>{
    const s=String(v==null?'':v).replace(/"/g,'""');
    return /[",\n]/.test(s)?`"${s}"`:s;
  };
  const rows=filtered.map(t=>{
    const w=wallets.find(x=>x._id===t.walletId);
    const d=getTxDate(t);
    const dateStr=d?d.toISOString().slice(0,10):(t.date||'');
    return [
      dateStr,
      t.type==='in'?'وارد':'صادر',
      catLabel(t.category),
      t.description||t.note||'',
      w?.name||t.walletName||'',
      t.clientName||t.supplierName||t.employeeName||t.companyName||'',
      t.amount||0,
      t.orderId||t.orderRef||'',
      t.createdByName||'',
      t.editReason||'',
    ].map(escapeCsv).join(',');
  });
  const csv='﻿'+headers.map(escapeCsv).join(',')+'\n'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`ledger-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast(`✅ تم تصدير ${filtered.length} حركة`,'ok');
};

// Bind enter on search
['f-search','f-from','f-to'].forEach(id=>{
  const el=$(id);if(!el)return;
  el.addEventListener('keydown',e=>{if(e.key==='Enter')applyFilters();});
});
['f-type','f-cat','f-wallet'].forEach(id=>{
  const el=$(id);if(!el)return;
  el.addEventListener('change',applyFilters);
});
