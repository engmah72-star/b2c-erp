<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f1c">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Business2Card — مدير التشغيل</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css?v=4">
<link rel="stylesheet" href="design-system/components.css?v=1">
<script src="sidebar-config.js"></script>
<script src="sidebar.js"></script>
<script src="sync-monitor.js"></script>
<script type="module" src="inbox-badge.js"></script>
<style>
.hero{background:linear-gradient(135deg,#0d0f1c,#13162a);border:1px solid var(--line);border-radius:20px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;left:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(59,158,255,.12),transparent 70%);pointer-events:none}
.att-card{border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.att-card.not-in{background:rgba(0,217,126,.07);border:1px solid rgba(0,217,126,.2)}
.att-card.checked-in{background:rgba(59,158,255,.07);border:1px solid rgba(59,158,255,.2)}
.att-card.done{background:var(--bg3);border:1px solid var(--line)}
.att-cta{padding:10px 18px;border:none;border-radius:10px;font-family:inherit;font-size:var(--fs-md);font-weight:800;cursor:pointer;white-space:nowrap}
.att-cta.in{background:linear-gradient(135deg,var(--g),#3bd68c);color:#fff}
.att-cta.out{background:linear-gradient(135deg,#3b9eff,#6bb5ff);color:#fff}
.att-cta.done-btn{background:var(--bg4);color:var(--dim2);cursor:default}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.kpi-box{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center;border-top:3px solid var(--kc)}
.kpi-val{font-size:24px;font-weight:900;color:var(--kc)}
.kpi-lbl{font-size:var(--fs-xs);color:var(--dim2);font-weight:700;margin-top:3px}
.pipe-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.pipe-box{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center;cursor:pointer;transition:all .2s;border-top:3px solid var(--pc)}
.pipe-box:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.pipe-num{font-size:var(--fs-4xl);font-weight:900;color:var(--pc)}
.pipe-lbl{font-size:var(--fs-xs);color:var(--dim2);font-weight:700;margin-top:4px}
.pipe-late{font-size:var(--fs-xs);color:var(--r);font-weight:700;margin-top:2px}
.alert-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.ocard{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all .2s;border-right:3px solid var(--b)}
.ocard:hover{transform:translateX(-2px)}
.tab-bar{display:flex;gap:6px;margin-bottom:14px;background:var(--bg2);border-radius:12px;padding:4px;border:1px solid var(--line)}
.tab-item{flex:1;padding:8px;border:none;border-radius:10px;font-family:inherit;font-size:var(--fs-base);font-weight:700;cursor:pointer;transition:all .2s;color:var(--dim2);background:transparent;text-align:center}
.tab-item.active{background:var(--bg3);color:var(--snow);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.att-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.att-day{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:var(--fs-xs);font-weight:700}
.att-day.present{background:rgba(0,217,126,.2);color:var(--g)}
.att-day.absent{background:rgba(255,61,110,.12);color:var(--r)}
.att-day.off{background:var(--bg3);color:var(--dim)}
.att-day.today-day{box-shadow:0 0 0 2px var(--b)}
@media(min-width:768px){.desktop-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}}
@media(max-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.pipe-grid{grid-template-columns:repeat(2,1fr)}}
</style>
<script src="smart-sidebar.js?v=1" defer></script>
<script src="viewas.js?v=1" defer></script>
<script src="pwa-install.js?v=1" defer></script>
<script type="module" src="ai-launcher.js?v=1" defer></script>
<script src="theme.js?v=4"></script>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand">
    <div class="nav-logo">🎨</div>
    <div>
      <div class="nav-brand-name">Business2Card</div>
      <div class="nav-brand-role" id="role-badge">Ops Mgr</div>
    </div>
  </div>
  <div class="nav-scroll" id="nav-scroll-dynamic">
    <div style="padding:20px;text-align:center;color:var(--dim2);font-size:var(--fs-base)">⏳</div>
  </div>
  <div class="nav-foot">
    <div class="nav-user" onclick="doLogout()">
      <div class="nav-avatar" id="nav-av">A</div>
      <div>
        <div class="nav-user-name" id="nav-name">User</div>
        <div class="nav-user-role">تسجيل خروج</div>
      </div>
    </div>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div><h1>🏢 داشبورد التشغيل</h1><p id="sub" style="font-size:var(--fs-base);color:var(--dim2)">جاري التحميل...</p></div>
    </div>
    <div class="topbar-right">
      <a href="accounts.html" class="btn btn-ghost btn-sm">💰 الحسابات</a>
    </div>
  </div>
  <div class="content" style="padding-top:12px" id="main-content">
    <div class="loader"><div class="spinner"></div></div>
  </div>
</div>
</div>
<nav class="mob-nav"><div class="mob-nav-items" id="mob-nav-items"></div></nav>
<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div class="toasts" id="toasts"></div>
<script type="module">
import { app, auth, db } from "./core/firebase-init.js";
import { setText } from "./core/dom-utils.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, doc, onSnapshot, getDoc, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { dedupEmployees } from "./orders.js";
import { employeeActions } from "./employee-actions.js";
import { calcRem } from "./core/order-math.js";
let allOrders=[],myTasks=[],myAttendance=[],todayAtt=null;
let allEmployees=[],todaysAttendance=[],empPaymentsAll=[],myGoalOps=null,myLastEvalOps=null,myEmpIdOps='';
let currentUser=null,userName='',uid='',activeTab='late';

const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const now=new Date();
const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const DAYS=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
function greet(){const h=new Date().getHours();return h<12?'صباح الخير':h<17?'مساء الخير':'مساء النور';}
function isThisMonth(ts){if(!ts?.toDate)return false;const d=ts.toDate();return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}
function todayStr(){return now.toISOString().slice(0,10);}
function monthKey(){return now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');}
function delay(dl){if(!dl)return 0;const d=new Date(dl);return d<now?Math.floor((now-d)/864e5):0;}
function toast(msg,t=''){const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}
window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};
window.toggleNav=()=>{document.querySelector('.sidenav')?.classList.toggle('mob-open');document.getElementById('nav-ov')?.classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav')?.classList.remove('mob-open');document.getElementById('nav-ov')?.classList.remove('show');};

// ── Sidebar — موحَّد عبر sidebar.js (يقبل userData) ──
function buildSidebar(ud){
  B2CSidebar.build(ud || { role: 'operation_manager' }, 'ops-dashboard.html');
}
function buildMobNav(){
  const el=document.getElementById('mob-nav-items');if(!el)return;
  el.innerHTML=[
    {h:'ops-dashboard.html',i:'⬡',l:'داشبوردي'},
    {h:'clients.html',i:'👤',l:'عملاء'},
    {h:'production.html',i:'🏭',l:'تنفيذ'},
    {h:'shipping.html',i:'🚚',l:'شحن'},
    {h:'employees.html',i:'👥',l:'فريق'},
  ].map(n=>`<a class="mob-nav-item${n.h==='ops-dashboard.html'?' active':''}" href="${n.h}"><div class="mob-nav-ico">${n.i}</div><div class="mob-nav-lbl">${n.l}</div></a>`).join('');
}

// ── Auth ──
let __started=false;
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  if(__started)return;__started=true;
  currentUser=u;uid=u.uid;
  try{
    const snap=await getDoc(doc(db,'users',u.uid));
    if(!snap.exists()){window.location.href='login.html';return;}
    const d=snap.data();
    if(!['admin','operation_manager'].includes(d.role)){window.location.href='login.html';return;}
    userName=d.name||u.email;
    setText('nav-name',userName);
    document.getElementById('nav-av').textContent=userName[0].toUpperCase();
    buildSidebar(d);
    buildMobNav();
    startListeners();
  }catch(e){console.error(e);window.location.href='login.html';}
});

// Coalesce burst updates from 7 listeners into one frame.
let _renderTimer=null;
function scheduleRender(){
  if(_renderTimer)return;
  _renderTimer=requestAnimationFrame(()=>{_renderTimer=null;render();});
}

function startListeners(){
  setText('sub','جاري التحميل...');
  // Limit to recent 2000 orders — covers months of activity for live dashboard.
  // For full history, use reports.html or archive.html (unbounded).
  onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc'),limit(2000)),snap=>{
    allOrders=snap.docs.map(d=>({...d.data(),_id:d.id}));
    scheduleRender();
    setText('sub',allOrders.filter(o=>o.stage!=='archived').length+' أوردر نشط');
  });
  onSnapshot(query(collection(db,'tasks'),where('assignedTo','==',uid),limit(100)),snap=>{
    myTasks=snap.docs.map(d=>({...d.data(),_id:d.id})).filter(t=>t.status==='pending')
      .sort((a,b)=>({urgent:0,normal:1,low:2}[a.priority]||1)-({urgent:0,normal:1,low:2}[b.priority]||1));
    scheduleRender();
  });
  onSnapshot(query(collection(db,'attendance'),where('employeeUid','==',uid),limit(365)),snap=>{
    const atts=snap.docs.map(d=>({...d.data(),_id:d.id}));
    todayAtt=atts.find(a=>a.date===todayStr());
    myAttendance=atts;
    scheduleRender();
  });
  let __empSubAdded=false;
  onSnapshot(query(collection(db,'employees'),limit(200)),snap=>{
    const raw=snap.docs.map(d=>({...d.data(),_id:d.id}));
    allEmployees=dedupEmployees(raw);
    if(!__empSubAdded){
      const me=allEmployees.find(e=>e.authUid===uid||e.email===currentUser?.email);
      if(me?._id){
        __empSubAdded=true;myEmpIdOps=me._id;
        onSnapshot(query(collection(db,'employee_goals'),where('employeeId','==',myEmpIdOps),where('month','==',monthKey()),limit(5)),gs=>{
          myGoalOps=gs.docs.length?gs.docs[0].data():null;scheduleRender();
        });
        onSnapshot(query(collection(db,'employee_evaluations'),where('employeeId','==',myEmpIdOps),limit(60)),es=>{
          const sv=es.docs.map(d=>({...d.data(),_id:d.id})).sort((a,b)=>(b.month||'').localeCompare(a.month||''));
          myLastEvalOps=sv[0]||null;scheduleRender();
        });
      }
    }
    scheduleRender();
  });
  onSnapshot(query(collection(db,'attendance'),where('date','==',todayStr()),limit(500)),snap=>{
    todaysAttendance=snap.docs.map(d=>({...d.data(),_id:d.id}));scheduleRender();
  });
  onSnapshot(query(collection(db,'employee_payments'),limit(1000)),snap=>{
    empPaymentsAll=snap.docs.map(d=>({...d.data(),_id:d.id}));scheduleRender();
  });
}

function render(){
  const el=document.getElementById('main-content');if(!el)return;
  const active=allOrders.filter(o=>o.stage!=='archived');
  const monthly=allOrders.filter(o=>isThisMonth(o.createdAt));
  const lateOrds=active.filter(o=>o.deadline&&delay(o.deadline)>0).sort((a,b)=>delay(b.deadline)-delay(a.deadline));
  const remOrds=active.filter(o=>calcRem(o)>0).sort((a,b)=>calcRem(b)-calcRem(a));
  const rev=monthly.reduce((s,o)=>s+(parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0),0);
  const totRem=allOrders.reduce((s,o)=>s+calcRem(o),0);

  // Pipeline
  const pipe={design:0,printing:0,production:0,shipping:0};
  const pLate={design:0,printing:0,production:0,shipping:0};
  active.forEach(o=>{
    if(pipe[o.stage]!==undefined){pipe[o.stage]++;if(o.deadline&&delay(o.deadline)>0)pLate[o.stage]++;}
  });

  // Attendance
  const presentDays=myAttendance.filter(a=>a.date?.startsWith(monthKey())).length;
  const workDays=Math.round(new Date(now.getFullYear(),now.getMonth()+1,0).getDate()*5/7);
  let attState='none',attText='',attDetail='',attBtnText='',attBtnClass='in';
  if(!todayAtt){attState='none';attText='لم تسجّل حضورك بعد';attDetail='سجّل الحضور لتبدأ يومك';attBtnText='✅ تسجيل الحضور';attBtnClass='in';}
  else if(!todayAtt.checkOut){attState='in';attText='حاضر منذ '+todayAtt.checkInStr;attDetail='اضغط عند الانتهاء';attBtnText='🔚 تسجيل الانصراف';attBtnClass='out';}
  else{attState='done';attText=todayAtt.checkInStr+' → '+todayAtt.checkOutStr;attDetail='✅ '+todayAtt.hoursWorked+' ساعة';attBtnText='تم التسجيل';attBtnClass='done-btn';}

  // Calendar
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const firstDay=new Date(now.getFullYear(),now.getMonth(),1).getDay();
  let calHtml='';
  for(let i=0;i<firstDay;i++)calHtml+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=monthKey()+'-'+String(d).padStart(2,'0');
    const att=myAttendance.find(a=>a.date===ds);
    const dw=new Date(now.getFullYear(),now.getMonth(),d).getDay();
    const isW=dw===5||dw===6,isF=d>now.getDate(),isT=d===now.getDate();
    let cls='att-day ';
    if(att)cls+='present';else if(isW||isF)cls+='off';else cls+='absent';
    calHtml+=`<div class="${cls}${isT?' today-day':''}">${d}</div>`;
  }

  // Tabs data
  const tabData=activeTab==='late'?lateOrds:activeTab==='rem'?remOrds:active.slice(0,20).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  // Team pulse
  const presentUids=new Set(todaysAttendance.filter(a=>a.checkIn).map(a=>a.employeeUid));
  const activeEmps=allEmployees.filter(e=>!['inactive','terminated'].includes(e.status));
  const presentCount=activeEmps.filter(e=>e.authUid&&presentUids.has(e.authUid)).length;
  const paidEmpIdsThisMonth=new Set(empPaymentsAll.filter(p=>isThisMonth(p.createdAt)&&!p.isDeduction).map(p=>p.employeeId));
  const unpaidEmps=activeEmps.filter(e=>!paidEmpIdsThisMonth.has(e._id));
  const attPctOps=workDays>0?Math.round(presentDays/workDays*100):0;

  el.innerHTML=`
  <div class="desktop-grid">
    <!-- COL 1 -->
    <div class="col">
      <div class="hero">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
          <div>
            <div style="font-size:var(--fs-3xl);font-weight:900;margin-bottom:4px">${greet()}، ${userName.split(' ')[0]} 👋</div>
            <div style="font-size:var(--fs-base);color:var(--dim2)">${DAYS[now.getDay()]} · ${now.getDate()} ${MONTHS[now.getMonth()]}</div>
          </div>
          <div style="text-align:left">
            <div style="font-size:var(--fs-sm);color:var(--dim2)">${MONTHS[now.getMonth()]}</div>
            <div style="font-size:24px;font-weight:900;color:var(--b)">${active.length}</div>
            <div style="font-size:var(--fs-xs);color:var(--dim2)">أوردر نشط</div>
          </div>
        </div>
        <div class="att-card ${attState==='none'?'not-in':attState==='in'?'checked-in':'done'}">
          <div>
            <div style="font-size:var(--fs-xs);font-weight:700;color:var(--dim2);margin-bottom:4px">⏰ الحضور</div>
            <div style="font-size:var(--fs-xl);font-weight:800;color:${attState==='in'?'var(--g)':attState==='done'?'var(--b)':'var(--snow)'}">${attText}</div>
            <div style="font-size:var(--fs-sm);color:var(--dim2);margin-top:2px">${attDetail}</div>
          </div>
          <button class="att-cta ${attBtnClass}" onclick="doAtt()" ${attState==='done'?'disabled':''}>${attBtnText}</button>
        </div>
      </div>

      ${myGoalOps?`<div style="background:linear-gradient(135deg,rgba(59,158,255,.08),rgba(59,158,255,.03));border:1px solid rgba(59,158,255,.25);border-radius:16px;padding:16px;margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="font-size:var(--fs-base);font-weight:800">🎯 هدفي — ${MONTHS[now.getMonth()]}</div>
          ${myLastEvalOps?`<span style="font-size:var(--fs-sm);padding:3px 10px;border-radius:20px;background:rgba(0,217,126,.1);color:var(--g);font-weight:700">آخر تقييم: ${myLastEvalOps.totalScore||0}/100</span>`:''}
        </div>
        ${myGoalOps.targetAttendancePct?`<div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:var(--fs-sm);color:var(--dim2)">📅 الحضور</span><span style="font-size:var(--fs-sm);font-weight:700">${attPctOps}% / ${myGoalOps.targetAttendancePct}%</span></div>
          <div style="height:5px;background:var(--bg4);border-radius:3px"><div style="height:5px;border-radius:3px;transition:width .5s;background:${attPctOps>=(myGoalOps.targetAttendancePct||80)?'var(--g)':'var(--b)'};width:${Math.min(100,myGoalOps.targetAttendancePct>0?Math.round(attPctOps/myGoalOps.targetAttendancePct*100):0)}%"></div></div>
        </div>`:''}
        ${myGoalOps.notes?`<div style="font-size:var(--fs-sm);color:var(--dim2);margin-top:6px;padding:8px;background:var(--bg3);border-radius:8px">📝 ${myGoalOps.notes}</div>`:''}
      </div>`:''}

      <!-- KPIs -->
      <div class="kpi-grid">
        <div class="kpi-box" style="--kc:var(--b)"><div class="kpi-val">${active.length}</div><div class="kpi-lbl">نشط</div></div>
        <div class="kpi-box" style="--kc:var(--r)"><div class="kpi-val">${lateOrds.length}</div><div class="kpi-lbl">⏰ متأخر</div></div>
        <div class="kpi-box" style="--kc:var(--g)"><div class="kpi-val">${fn(rev)}</div><div class="kpi-lbl">إيرادات ج</div></div>
        <div class="kpi-box" style="--kc:var(--y)"><div class="kpi-val">${fn(totRem)}</div><div class="kpi-lbl">باقي تحصيل ج</div></div>
      </div>

      <!-- Pipeline -->
      <div style="font-size:var(--fs-base);font-weight:800;margin-bottom:8px">🔄 البايبلاين</div>
      <div class="pipe-grid">
        <div class="pipe-box" style="--pc:var(--p)" onclick="location.href='design.html'">
          <div class="pipe-num">${pipe.design}</div>
          <div class="pipe-lbl">✏️ تصميم</div>
          ${pLate.design?`<div class="pipe-late">⚠️ ${pLate.design} متأخر</div>`:''}
        </div>
        <div class="pipe-box" style="--pc:var(--b)" onclick="location.href='print.html'">
          <div class="pipe-num">${pipe.printing}</div>
          <div class="pipe-lbl">🖨️ طباعة</div>
          ${pLate.printing?`<div class="pipe-late">⚠️ ${pLate.printing} متأخر</div>`:''}
        </div>
        <div class="pipe-box" style="--pc:var(--r)" onclick="location.href='production.html'">
          <div class="pipe-num">${pipe.production}</div>
          <div class="pipe-lbl">🏭 تنفيذ</div>
          ${pLate.production?`<div class="pipe-late">⚠️ ${pLate.production} متأخر</div>`:''}
        </div>
        <div class="pipe-box" style="--pc:var(--c)" onclick="location.href='shipping.html'">
          <div class="pipe-num">${pipe.shipping}</div>
          <div class="pipe-lbl">🚚 شحن</div>
          ${pLate.shipping?`<div class="pipe-late">⚠️ ${pLate.shipping} متأخر</div>`:''}
        </div>
      </div>

      <!-- حضور الشهر -->
      <div style="background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <div style="font-size:var(--fs-base);font-weight:800">📅 حضور ${MONTHS[now.getMonth()]}</div>
          <div style="font-size:var(--fs-sm);color:var(--dim2)">${presentDays} من ${workDays} يوم</div>
        </div>
        <div class="att-cal">${calHtml}</div>
        <div style="display:flex;gap:12px;margin-top:8px;font-size:var(--fs-xs)">
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:rgba(0,217,126,.2);margin-left:4px"></span>حضر</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:rgba(255,61,110,.12);margin-left:4px"></span>غياب</span>
        </div>
      </div>
    </div>

    <!-- COL 2 -->
    <div class="col">
      <!-- Team Pulse -->
      <div style="background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="font-size:var(--fs-base);font-weight:800">👥 نبض الفريق — اليوم</div>
          <div style="font-size:var(--fs-2xl);font-weight:900;color:${activeEmps.length>0&&presentCount===activeEmps.length?'var(--g)':presentCount===0&&activeEmps.length>0?'var(--r)':'var(--y)'}">${presentCount}/${activeEmps.length} <span style="font-size:var(--fs-sm);font-weight:700;color:var(--dim2)">حاضر</span></div>
        </div>
        ${activeEmps.length===0?`<div style="text-align:center;padding:12px;color:var(--dim2);font-size:var(--fs-sm)">لا يوجد موظفون مسجلون</div>`:`<div style="display:flex;flex-wrap:wrap;gap:6px">${activeEmps.map(e=>{const ip=!!(e.authUid&&presentUids.has(e.authUid));return`<div style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:${ip?'rgba(0,217,126,.1)':'rgba(255,61,110,.07)'};border:1px solid ${ip?'rgba(0,217,126,.25)':'rgba(255,61,110,.15)'}"><div style="width:6px;height:6px;border-radius:50%;background:${ip?'var(--g)':'var(--r)'}"></div><span style="font-size:var(--fs-sm);font-weight:700;color:${ip?'var(--g)':'var(--r)'}">${e.name||'—'}</span></div>`;}).join('')}</div>`}
      </div>

      ${unpaidEmps.length?`<div style="background:rgba(255,200,50,.05);border:1px solid rgba(255,200,50,.25);border-radius:16px;padding:16px;margin-bottom:14px">
        <div style="font-size:var(--fs-base);font-weight:800;color:var(--y);margin-bottom:10px">⚠️ لم يستلموا الراتب — ${MONTHS[now.getMonth()]} (${unpaidEmps.length})</div>
        ${unpaidEmps.slice(0,5).map(e=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,200,50,.1)"><span style="font-size:var(--fs-base);font-weight:700">${e.name||'—'}</span><span style="font-size:var(--fs-sm);color:var(--dim2)">${fn(e.baseSalary||0)} ج</span></div>`).join('')}
        ${unpaidEmps.length>5?`<div style="font-size:var(--fs-xs);color:var(--dim2);margin-top:6px;text-align:center">+ ${unpaidEmps.length-5} آخرين</div>`:''}
        <a href="employees.html" style="display:block;margin-top:10px;text-align:center;font-size:var(--fs-sm);color:var(--b);font-weight:700;text-decoration:none">📋 صرف الرواتب ←</a>
      </div>`:''}

      ${myTasks.length?`<div style="background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px">
        <div style="font-size:var(--fs-base);font-weight:800;margin-bottom:10px">✅ مهامي (${myTasks.length})</div>
        ${myTasks.map(t=>{const p={urgent:'var(--r)',normal:'var(--b)',low:'var(--dim2)'}[t.priority]||'var(--b)';return`<div style="display:flex;gap:10px;padding:10px;background:var(--bg3);border-radius:10px;margin-bottom:6px;cursor:pointer" onclick="doneTask('${t._id}')">
          <div style="width:8px;height:8px;border-radius:50%;background:${p};margin-top:4px;flex-shrink:0"></div>
          <div style="flex:1"><div style="font-size:var(--fs-md);font-weight:700">${t.title}</div>${t.dueDate?`<div style="font-size:var(--fs-xs);color:var(--dim2);margin-top:2px">📅 ${t.dueDate}</div>`:''}</div>
          <span style="font-size:var(--fs-xl);opacity:.4">✓</span>
        </div>`;}).join('')}
      </div>`:''}

      <!-- أوردرات -->
      <div>
        <div class="tab-bar">
          <button class="tab-item ${activeTab==='late'?'active':''}" onclick="switchTab('late')">⏰ متأخر (${lateOrds.length})</button>
          <button class="tab-item ${activeTab==='rem'?'active':''}" onclick="switchTab('rem')">💰 باقي (${remOrds.length})</button>
          <button class="tab-item ${activeTab==='all'?'active':''}" onclick="switchTab('all')">الكل (${active.length})</button>
        </div>
        <div id="orders-list">${renderOrds(tabData)}</div>
      </div>
    </div>
  </div>`;
}

function renderOrds(data){
  if(!data.length)return'<div style="text-align:center;padding:24px;color:var(--dim2)">لا توجد أوردرات</div>';
  const SA={design:'✏️',printing:'🖨️',production:'🏭',shipping:'🚚',archived:'✅'};
  const SC={design:'var(--p)',printing:'var(--b)',production:'var(--r)',shipping:'var(--c)',archived:'var(--g)'};
  const SH={design:'design',printing:'print',production:'production',shipping:'shipping',archived:'archive'};
  return data.slice(0,15).map(o=>{
    const rem=calcRem(o),sc=SC[o.stage]||'var(--dim2)',d=delay(o.deadline||'');
    return`<div class="ocard" onclick="location.href='${SH[o.stage]||'index'}.html'" style="border-right-color:${sc}">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <div>
          <div style="font-size:var(--fs-xs);color:var(--dim2)">${o.orderId||o._id.slice(-6)}</div>
          <div style="font-size:15px;font-weight:800">${o.clientName||'—'}</div>
        </div>
        <div style="text-align:left;display:flex;flex-direction:column;gap:4px;align-items:flex-end">
          <span style="font-size:var(--fs-xs);font-weight:700;padding:2px 8px;border-radius:20px;background:${sc}15;color:${sc}">${SA[o.stage]||o.stage}</span>
          ${d>0?`<span style="font-size:var(--fs-xs);color:var(--r);font-weight:700">⚠️ ${d} يوم</span>`:''}
        </div>
      </div>
      <div style="font-size:var(--fs-sm);color:var(--dim2);display:flex;justify-content:space-between">
        <span>${(o.products||[]).map(p=>p.name).join(' + ')||o.product||'—'}</span>
        ${rem>0?`<span style="color:var(--r);font-weight:700">باقي ${fn(rem)} ج</span>`:''}
      </div>
    </div>`;
  }).join('');
}

window.switchTab=function(t){
  activeTab=t;
  const active=allOrders.filter(o=>o.stage!=='archived');
  const lateOrds=active.filter(o=>o.deadline&&delay(o.deadline)>0);
  const remOrds=active.filter(o=>calcRem(o)>0);
  const data=t==='late'?lateOrds:t==='rem'?remOrds:active.slice(0,20);
  const el=document.getElementById('orders-list');
  if(el)el.innerHTML=renderOrds(data);
  document.querySelectorAll('.tab-item').forEach((btn,i)=>{btn.classList.toggle('active',['late','rem','all'][i]===t);});
};

window.doAtt=async function(){
  if(!currentUser)return;
  const today=todayStr();
  const timeStr=new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
  if(!todayAtt){
    const r=await employeeActions.recordAttendanceCheckIn({db,employeeId:uid,employeeUid:uid,employeeName:userName,date:today,lateMinutes:0,recordedBy:uid,recordedByName:userName});
    if(!r.ok)return toast('❌ '+(r.errors||[]).join(' · '),'err');
    toast('✅ تم تسجيل الحضور — '+timeStr,'ok');
  } else if(!todayAtt.checkOut){
    const r=await employeeActions.recordAttendanceCheckOut({db,attendanceId:todayAtt._id});
    if(!r.ok)return toast('❌ '+(r.errors||[]).join(' · '),'err');
    const inTime=todayAtt.checkIn?.toDate?.();
    const hours=inTime?((new Date()-inTime)/(1000*60*60)).toFixed(1):0;
    toast('✅ تم الانصراف — '+hours+' ساعة','ok');
  }
};

window.doneTask=async function(id){
  const r=await employeeActions.setTaskStatus({db,taskId:id,status:'done'});
  if(!r.ok)return toast('❌ '+(r.errors||[]).join(' · '),'err');
  toast('✅ تم إنجاز المهمة','ok');
};
</script>
<script src="sw-register.js"></script>
</body>
</html>
