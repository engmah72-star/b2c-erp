<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Fix Admin</title>
<style>
body{font-family:Arial;background:#0d0f1c;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.box{background:#1a1d2e;padding:30px;border-radius:16px;width:360px;text-align:center}
input{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #333;background:#0d0f1c;color:#fff;font-size:16px;box-sizing:border-box}
button{width:100%;padding:14px;background:#00d97e;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin-top:10px}
#msg{margin-top:16px;padding:12px;border-radius:8px;display:none}
.ok{background:rgba(0,217,126,.15);color:#00d97e}
.err{background:rgba(255,61,110,.15);color:#ff3d6e}
</style>
</head>
<body>
<div class="box">
  <h2>🔧 إصلاح حساب الأدمن</h2>
  <p style="color:#888;font-size:13px">أدخل بيانات الأدمن لإصلاح الصلاحيات</p>
  <input id="email" type="email" placeholder="engmah72@gmail.com">
  <input id="pass" type="password" placeholder="كلمة السر">
  <button onclick="fix()">🚀 إصلاح وتسجيل الدخول</button>
  <div id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",
  authDomain:"business2card-c041b.firebaseapp.com",
  projectId:"business2card-c041b",
  storageBucket:"business2card-c041b.firebasestorage.app",
  messagingSenderId:"235622448899",
  appId:"1:235622448899:web:d8652ff71082f7d003f336"
});

const auth = getAuth(app);
const db = getFirestore(app);

const msg = id => document.getElementById(id);

window.fix = async function(){
  const email = msg('email').value.trim();
  const pass = msg('pass').value;
  const m = msg('msg');
  
  if(!email||!pass){
    m.style.display='block';m.className='err';
    m.textContent='⚠️ أدخل الإيميل وكلمة السر';return;
  }
  
  m.style.display='block';m.className='ok';
  m.textContent='جاري تسجيل الدخول...';
  
  try{
    // 1. تسجيل الدخول
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    const uid = cred.user.uid;
    m.textContent='✅ تم تسجيل الدخول — جاري إصلاح الصلاحيات...';
    
    // 2. كتابة users document كامل
    await setDoc(doc(db,'users',uid), {
      name: 'محمود حسين',
      role: 'admin',
      email: email,
      isActive: true,
      permissions: {
        pages: ['*'],
        canSeePrices: true,
        canSeeAllOrders: true,
        canAddOrders: true,
        canAddClients: true,
        canAssignDesigner: true,
        canAssignTasks: true,
        canAccessAccounts: true,
        canAccessEmployees: true
      }
    }, {merge: true});
    
    m.textContent='✅ تم الإصلاح! جاري الانتقال...';
    
    // 3. انتقل للداشبورد
    setTimeout(()=>{ window.location.href='index.html'; }, 1500);
    
  } catch(e){
    m.style.display='block';m.className='err';
    if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'){
      m.textContent='❌ كلمة السر غلط';
    } else if(e.code==='auth/user-not-found'){
      m.textContent='❌ الإيميل مش موجود في Authentication';
    } else {
      m.textContent='❌ '+e.message;
    }
  }
};

// اضغط Enter
document.addEventListener('keypress', e=>{
  if(e.key==='Enter') window.fix();
});
</script>
</body>
</html>
