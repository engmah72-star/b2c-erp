<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Business2Card — التقارير</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css?v=4">
<link rel="stylesheet" href="design-system/components.css?v=1">
<script src="sidebar-config.js"></script>
<script src="sidebar.js"></script>
<script src="sync-monitor.js"></script>
<script type="module" src="inbox-badge.js"></script>
<style>
/* ══ Tabs ══ */
.rep-tabs{display:flex;gap:0;border-bottom:2px solid var(--line);margin-bottom:20px;overflow-x:auto;scrollbar-width:none}
.rep-tabs::-webkit-scrollbar{display:none}
.rep-tab{padding:10px 18px;border:none;background:none;color:var(--dim2);font-size:var(--fs-md);font-weight:700;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;font-family:inherit;white-space:nowrap;transition:var(--trans)}
.rep-tab.active{color:var(--r);border-bottom-color:var(--r)}

/* ══ فلتر التاريخ ══ */
.date-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.d-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--line);background:var(--bg2);font-size:var(--fs-base);font-weight:700;color:var(--dim2);cursor:pointer;font-family:inherit;transition:var(--trans)}
.d-btn.active{background:rgba(255,61,110,.12);color:var(--r);border-color:rgba(255,61,110,.3)}

/* ══ KPI Cards ══ */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
@media(min-width:640px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi-box{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:16px}
.kpi-val{font-size:20px;font-weight:900;margin-bottom:2px}
.kpi-lbl{font-size:var(--fs-sm);color:var(--dim2);font-weight:700}
.kpi-diff{font-size:var(--fs-sm);font-weight:800;margin-top:4px}
.kpi-diff.up{color:var(--g)}.kpi-diff.down{color:var(--r)}.kpi-diff.same{color:var(--dim2)}

/* ══ Chart ══ */
.chart-wrap{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px}
.chart-title{font-size:var(--fs-base);font-weight:800;color:var(--dim2);margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:var(--fs-base);font-weight:700;min-width:70px;text-align:right;color:var(--snow)}
.bar-track{flex:1;height:28px;background:var(--bg3);border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;transition:width .4s ease;display:flex;align-items:center;padding-right:8px;justify-content:flex-end}
.bar-val{font-size:var(--fs-sm);font-weight:800;color:#fff;white-space:nowrap}

/* ══ Cards ══ */
.rep-card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:10px}
.rep-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.rep-name{font-size:15px;font-weight:800}
.rep-sub{font-size:var(--fs-sm);color:var(--dim2);margin-top:2px}
.rep-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.rep-stat{background:var(--bg3);border-radius:8px;padding:8px;text-align:center}
.rep-stat-val{font-size:15px;font-weight:900;margin-bottom:1px}
.rep-stat-lbl{font-size:var(--fs-xs);color:var(--dim2);font-weight:700}
.stars{color:var(--y);font-size:var(--fs-lg);letter-spacing:1px}

/* ══ Alert ══ */
.alert-box{background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.25);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:var(--fs-base);font-weight:700;color:var(--y)}

/* ══ Progress ══ */
.progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}

/* ══ Compare ══ */
.compare-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:var(--fs-md)}
.compare-row:last-child{border-bottom:none}

/* ══ Tab badges ══ */
.rep-tab{position:relative}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--r);color:#fff;font-size:var(--fs-xs);font-weight:900;margin-right:5px;line-height:1}
.tab-badge.warn{background:var(--y);color:#000}
.tab-badge.dim{background:var(--bg3);color:var(--dim2)}

/* ══ Sticky filters ══ */
.sticky-filters{position:sticky;top:56px;z-index:50;background:var(--bg1);padding:10px 0;margin:-10px 0 12px;border-bottom:1px solid var(--line)}
@media(max-width:639px){.sticky-filters{top:52px}}

/* ══ KPI animations ══ */
.kpi-val{transition:color .25s ease;will-change:contents}
.kpi-box{transition:transform .15s ease,border-color .15s ease}
.kpi-box.clickable{cursor:pointer}
.kpi-box.clickable:hover{transform:translateY(-1px);border-color:var(--line2)}

/* ══ Search input ══ */
.search-wrap{position:relative;flex:1;min-width:200px}
.search-input{width:100%;padding:8px 36px 8px 12px;border-radius:10px;border:1.5px solid var(--line);background:var(--bg2);color:var(--snow);font-size:var(--fs-md);font-family:inherit;transition:var(--trans)}
.search-input:focus{outline:none;border-color:var(--r);background:var(--bg1)}
.search-input::placeholder{color:var(--dim2)}
.search-clear{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:var(--bg3);border:none;color:var(--dim2);cursor:pointer;font-size:var(--fs-lg);display:none;align-items:center;justify-content:center;font-family:inherit}
.search-clear.show{display:flex}

/* ══ Sort headers ══ */
.col-head-cell{cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px;justify-content:center;transition:color .15s}
.col-head-cell:hover{color:var(--snow)}
.col-head-cell.active{color:var(--r)}
.col-head-cell .sort-arrow{font-size:var(--fs-xs);opacity:.6}
.col-head-cell.active .sort-arrow{opacity:1}

/* ══ Empty state ══ */
.empty-pretty{padding:40px 20px;text-align:center;background:var(--bg2);border:1px dashed var(--line);border-radius:14px}
.empty-pretty .ico{font-size:42px;margin-bottom:8px;opacity:.6}
.empty-pretty .ttl{font-size:var(--fs-lg);font-weight:800;margin-bottom:4px}
.empty-pretty .sub{font-size:var(--fs-sm);color:var(--dim2)}

/* ══ Sparkline ══ */
.sparkline{display:inline-flex;gap:2px;align-items:flex-end;height:18px;margin-top:4px}
.sparkline span{display:block;width:4px;background:var(--r);border-radius:1px;opacity:.7;transition:height .3s ease}

/* ══ Heatmap ══ */
.hm-grid{display:grid;grid-template-columns:repeat(30,1fr);gap:3px}
@media(max-width:639px){.hm-grid{grid-template-columns:repeat(15,1fr)}}
.hm-cell{aspect-ratio:1;border-radius:3px;transition:transform .12s;min-height:8px}
.hm-cell:hover{transform:scale(1.4);z-index:1;position:relative}

/* ══ Daily close table ══ */
.dc-table{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
.dc-table th,.dc-table td{padding:6px 8px;text-align:center;border-bottom:1px solid var(--line);white-space:nowrap}
.dc-table th{color:var(--dim2);font-weight:800;background:var(--bg3);position:sticky;top:0}
.dc-table tr:hover td{background:var(--row-hover)}

/* ══ Risk strip ══ */
.risk-strip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.risk-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;border:1.5px solid rgba(255,61,110,.3);background:rgba(255,61,110,.08);color:var(--r);font-family:inherit;font-size:var(--fs-sm);font-weight:700;cursor:pointer;transition:transform .12s}
.risk-chip:hover{transform:translateY(-1px)}
.risk-chip .ic{font-size:var(--fs-lg)}
.risk-chip b{font-size:var(--fs-md);font-weight:900}
.risk-chip.warn{border-color:rgba(255,170,0,.35);background:rgba(255,170,0,.08);color:var(--y)}
.risk-chip.danger{border-color:rgba(255,61,110,.5);background:rgba(255,61,110,.12)}

/* ══ Pipeline strip ══ */
.pipe-strip{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.pipe-strip-hdr{font-size:var(--fs-base);font-weight:800;color:var(--dim2);margin-bottom:10px}
.pipe-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
@media(max-width:639px){.pipe-row{grid-template-columns:repeat(2,1fr)}}
.pipe-cell{background:var(--bg3);border-radius:10px;padding:10px;text-align:center;transition:transform .12s}
.pipe-cell:hover{transform:translateY(-1px)}
.pipe-stage-lbl{font-size:var(--fs-sm);color:var(--dim2);font-weight:700}
.pipe-stage-num{font-size:20px;font-weight:900;color:var(--snow);margin:4px 0}
.pipe-stage-bar{height:3px;background:var(--bg1);border-radius:2px;overflow:hidden}
.pipe-stage-bar > div{height:100%;border-radius:2px;transition:width .4s}

/* ══ Details (collapsible) ══ */
.more-details{margin-top:14px;background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.more-details > summary{padding:12px 16px;cursor:pointer;font-size:var(--fs-md);font-weight:800;color:var(--dim2);list-style:none;user-select:none;display:flex;align-items:center;justify-content:space-between;transition:background .12s}
.more-details > summary::-webkit-details-marker{display:none}
.more-details > summary::after{content:'⌄';font-size:var(--fs-xl);transition:transform .2s}
.more-details[open] > summary{border-bottom:1px solid var(--line);background:var(--bg3);color:var(--snow)}
.more-details[open] > summary::after{transform:rotate(180deg)}
.more-details > .chart-wrap{margin:12px;border:none;background:transparent}
.more-details > details + .chart-wrap{margin-top:0}

/* ══ Insights panel ══ */
.insights-card{background:linear-gradient(135deg,rgba(167,139,250,.08),rgba(59,158,255,.06));border:1px solid rgba(167,139,250,.25);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.insights-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.insights-hdr h3{margin:0;font-size:var(--fs-lg);font-weight:900;color:var(--snow)}
.insights-hdr .meta{font-size:var(--fs-xs);color:var(--dim2);font-weight:700}
.insights-list{display:flex;flex-direction:column;gap:8px}
.insight-row{display:flex;gap:10px;align-items:flex-start;padding:8px 10px;background:var(--bg2);border-radius:10px;border-right:3px solid var(--dim2);font-size:var(--fs-base);line-height:1.55}
.insight-row.good{border-right-color:var(--g)}
.insight-row.warn{border-right-color:var(--y)}
.insight-row.bad{border-right-color:var(--r)}
.insight-row .ico{font-size:var(--fs-xl);flex-shrink:0}
.insight-row .txt{flex:1;color:var(--snow)}
.insight-row .txt b{font-weight:900}
.insight-row .act{font-size:var(--fs-xs);color:var(--b);font-weight:800;cursor:pointer;background:none;border:none;font-family:inherit;padding:2px 6px;border-radius:6px;background:rgba(59,158,255,.08)}
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.mini-stat{background:var(--bg2);border-radius:10px;padding:8px 10px;text-align:center}
.mini-stat .v{font-size:var(--fs-lg);font-weight:900}
.mini-stat .l{font-size:var(--fs-xs);color:var(--dim2);font-weight:700;margin-top:2px}

/* ══ Geo distribution ══ */
.geo-list{display:flex;flex-direction:column;gap:4px}
.geo-row{display:grid;grid-template-columns:90px 1fr 60px;gap:8px;align-items:center;font-size:var(--fs-base)}
.geo-row .name{font-weight:700;color:var(--snow)}
.geo-row .track{height:18px;background:var(--bg3);border-radius:4px;overflow:hidden;position:relative}
.geo-row .fill{height:100%;background:linear-gradient(90deg,var(--b),var(--p));border-radius:4px;transition:width .4s}
.geo-row .num{text-align:left;color:var(--dim2);font-weight:800;font-size:var(--fs-sm)}

/* ══ Top performer ══ */
.tp-crown{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,170,0,.15));border:1px solid rgba(255,215,0,.4);color:#ffd700;font-size:var(--fs-xs);font-weight:900;margin-right:6px;vertical-align:middle}

/* ══ Collection tab UX ══ */
.col-section{margin-bottom:18px}
.col-section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0 4px}
.col-section-hdr h3{margin:0;font-size:var(--fs-sm);font-weight:900;color:var(--dim2);letter-spacing:.6px}
.col-section-hdr .sub{font-size:var(--fs-sm);color:var(--dim2);font-weight:700}

/* Hero summary row */
.col-hero{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:18px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;position:relative}
.col-hero::before{content:'';position:absolute;left:33.33%;right:33.33%;top:18px;bottom:18px;border-right:1px solid var(--line);border-left:1px solid var(--line)}
@media(max-width:639px){.col-hero{grid-template-columns:1fr;gap:12px;padding:14px}.col-hero::before{display:none}.col-hero > .col-hero-cell:not(:last-child){border-bottom:1px solid var(--line);padding-bottom:10px}}
.col-hero-cell{text-align:center;padding:4px}
.col-hero-cell .v{font-size:var(--fs-3xl);font-weight:900;line-height:1.15}
.col-hero-cell .l{font-size:var(--fs-sm);color:var(--dim2);font-weight:700;margin-top:6px}

/* Critical banner */
.col-critical{margin-top:10px;background:linear-gradient(135deg,rgba(255,61,110,.12),rgba(255,61,110,.04));border:1px solid rgba(255,61,110,.35);border-radius:14px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;cursor:pointer;transition:transform .15s,box-shadow .15s}
.col-critical:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,61,110,.15)}
.col-critical-l{display:flex;gap:12px;align-items:center;min-width:0}
.col-critical-l .ico{font-size:24px;flex-shrink:0}
.col-critical-l .txt{font-size:var(--fs-sm);color:var(--dim2);font-weight:700}
.col-critical-l .v{font-size:var(--fs-2xl);font-weight:900;color:var(--r);margin-top:2px}
.col-critical-r{display:flex;align-items:center;gap:6px;color:var(--r);font-size:var(--fs-base);font-weight:800;white-space:nowrap}

/* Tiles grid (smaller secondary stats) */
.col-tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
@media(max-width:639px){.col-tiles{grid-template-columns:repeat(2,1fr)}}
.col-tile{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center;transition:transform .12s}
.col-tile:hover{transform:translateY(-1px)}
.col-tile .v{font-size:var(--fs-xl);font-weight:900;line-height:1.2}
.col-tile .l{font-size:var(--fs-xs);color:var(--dim2);font-weight:700;margin-top:4px}

/* Aging strip refresh */
.aging-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:639px){.aging-grid{grid-template-columns:repeat(2,1fr)}}
.aging-cell{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center;position:relative;overflow:hidden}
.aging-cell::before{content:'';position:absolute;inset:auto 0 0 0;height:3px;background:var(--lvl)}
.aging-cell .lbl{font-size:var(--fs-xs);color:var(--dim2);font-weight:800}
.aging-cell .rng{font-size:var(--fs-xs);font-weight:700;color:var(--dim2);margin-top:1px}
.aging-cell .amt{font-size:var(--fs-xl);font-weight:900;margin-top:6px;color:var(--lvl)}
.aging-cell .cnt{font-size:var(--fs-xs);color:var(--dim2);font-weight:700;margin-top:2px}

/* Consolidated toolbar */
.col-toolbar{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:8px}
.col-toolbar-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:6px}
.col-toolbar-row + .col-toolbar-row{border-top:1px solid var(--line)}
.col-toolbar-row .label{font-size:var(--fs-xs);color:var(--dim2);font-weight:900;letter-spacing:.5px;padding:0 4px;flex-shrink:0;min-width:50px}
.col-toolbar-row .sep{width:1px;height:20px;background:var(--line);margin:0 6px;flex-shrink:0}
.col-toolbar-row .d-btn{padding:5px 11px;font-size:var(--fs-sm)}

/* Count chip */
.col-count{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;background:var(--bg3);font-size:var(--fs-sm);font-weight:800;color:var(--dim2)}
.col-count b{color:var(--snow);font-weight:900;font-size:var(--fs-md)}

/* Better no-match */
#col-no-match{padding:40px 16px;text-align:center;color:var(--dim2);font-size:var(--fs-md)}
#col-no-match .big{font-size:32px;margin-bottom:6px}

/* Table wrap */
.col-table-wrap{background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden}

/* ══ Overview 10-second view ══ */
.ov10-hero{background:linear-gradient(135deg,rgba(0,217,126,.08),rgba(59,158,255,.04));border:1px solid var(--line);border-radius:16px;padding:24px 20px;text-align:center;margin-bottom:18px}
.ov10-hero .lbl{font-size:var(--fs-base);color:var(--dim2);font-weight:800;margin-bottom:6px}
.ov10-hero .big{font-size:48px;font-weight:900;color:var(--g);line-height:1;letter-spacing:-1px}
.ov10-hero .big.zero{color:var(--dim2)}
.ov10-hero .cmp{font-size:var(--fs-sm);color:var(--dim2);font-weight:700;margin-top:10px;display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap}
.ov10-hero .cmp .pct.up{color:var(--g)}
.ov10-hero .cmp .pct.down{color:var(--r)}
.ov10-hero .spark{margin:10px auto 0;max-width:240px}

/* Priorities */
.ov10-prio-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 4px}
.ov10-prio-hdr h3{margin:0;font-size:var(--fs-lg);font-weight:900;color:var(--snow)}
.ov10-prio-hdr .cnt{font-size:var(--fs-sm);color:var(--dim2);font-weight:700}
.ov10-empty{background:var(--bg2);border:1px dashed var(--line);border-radius:14px;padding:30px 16px;text-align:center}
.ov10-empty .ic{font-size:36px;margin-bottom:6px}
.ov10-empty .ttl{font-size:var(--fs-lg);font-weight:800;color:var(--g);margin-bottom:4px}
.ov10-empty .sub{font-size:var(--fs-sm);color:var(--dim2)}
.ov10-prio-list{display:flex;flex-direction:column;gap:8px}
.ov10-prio-row{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;transition:border-color .15s,transform .12s;border-right-width:3px;border-right-style:solid;border-right-color:var(--prio,var(--dim2))}
.ov10-prio-row:hover{transform:translateY(-1px)}
.ov10-prio-row .ico{font-size:var(--fs-3xl);flex-shrink:0}
.ov10-prio-row .body{flex:1;min-width:0}
.ov10-prio-row .ttl{font-size:var(--fs-lg);font-weight:800;display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.ov10-prio-row .ttl .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ov10-prio-row .ttl .amt{color:var(--prio);font-size:var(--fs-lg);font-weight:900;white-space:nowrap}
.ov10-prio-row .sub{font-size:var(--fs-sm);color:var(--dim2);font-weight:700;margin-top:3px}
.ov10-prio-row .acts{display:flex;gap:6px;flex-shrink:0}
.ov10-prio-row .acts a,.ov10-prio-row .acts button{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:var(--bg3);color:var(--snow);text-decoration:none;font-size:var(--fs-lg);font-family:inherit;cursor:pointer;transition:transform .12s,background .15s}
.ov10-prio-row .acts a:hover,.ov10-prio-row .acts button:hover{transform:scale(1.1);background:var(--line2)}
.ov10-prio-row .acts a.wa{background:rgba(37,211,102,.12);border-color:rgba(37,211,102,.3);color:#25d366}
.ov10-prio-row .acts a.tel{background:rgba(59,158,255,.1);border-color:rgba(59,158,255,.3);color:var(--b)}

/* Bottom split nav */

function readUrlState(){
  try{
    const h=new URLSearchParams(location.hash.slice(1));
    if(h.get('tab'))currentTab=h.get('tab');
    if(h.get('range'))filterMode=h.get('range');
    if(h.get('q'))__search=h.get('q');
    if(h.get('pay'))__payFilter=h.get('pay');
    if(h.get('stage'))__stageFilter=h.get('stage');
    if(h.get('flag'))__flagFilter=h.get('flag');
    if(h.get('view'))__viewMode=h.get('view');
    if(h.get('sort'))__sortKey=h.get('sort');
    if(h.get('dir'))__sortDir=h.get('dir');
  }catch(e){}
}
function writeUrlState(){
  const p=new URLSearchParams();
  if(currentTab&&currentTab!=='overview')p.set('tab',currentTab);
  if(filterMode&&filterMode!=='month')p.set('range',filterMode);
  if(__search)p.set('q',__search);
  if(__payFilter&&__payFilter!=='all')p.set('pay',__payFilter);
  if(__stageFilter&&__stageFilter!=='all')p.set('stage',__stageFilter);
  if(__flagFilter&&__flagFilter!=='all')p.set('flag',__flagFilter);
  if(__viewMode&&__viewMode!=='orders')p.set('view',__viewMode);
  if(__sortKey&&__sortKey!=='date')p.set('sort',__sortKey);
  if(__sortDir&&__sortDir!=='desc')p.set('dir',__sortDir);
  const s=p.toString();
  history.replaceState(null,'',s?'#'+s:location.pathname+location.search);
}

// ══ Counter animation ══
function animateCounter(el,target,suffix=''){
  if(!el)return;
  const reduce=window.matchMedia&&matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(reduce){el.textContent=fn(target)+suffix;return;}
  const start=parseFloat((el.dataset.val||'0'))||0;
  const dur=420;const t0=performance.now();
  el.classList.add('counting');
  const step=t=>{
    const p=Math.min(1,(t-t0)/dur);
    const eased=1-Math.pow(1-p,3);
    const val=start+(target-start)*eased;
    el.textContent=fn(Math.round(val))+suffix;
    if(p<1)requestAnimationFrame(step);
    else{el.dataset.val=target;el.classList.remove('counting');}
  };
  requestAnimationFrame(step);
}
function applyCounters(root){
  (root||document).querySelectorAll('[data-counter]').forEach(el=>{
    const target=parseFloat(el.dataset.counter)||0;
    const suffix=el.dataset.suffix||'';
    animateCounter(el,target,suffix);
  });
}

function cleanPhone(p){
  if(!p)return'';
  let s=String(p).replace(/[^0-9]/g,'');
  if(s.startsWith('00'))s=s.slice(2);
  if(s.startsWith('20'))return s;
  if(s.startsWith('0'))return '20'+s.slice(1);
  if(s.length===10&&s.startsWith('1'))return '20'+s;
  return s.length>=10?s:'';
}

function updateTabBadges(){
  if(!__loaded.orders)return;
  const range=getRange(filterMode);
  const filtered=orders.filter(o=>inRange(o,range));
  const set=(tab,n,visible=true)=>{
    const el=document.querySelector(`[data-badge="${tab}"]`);
    if(!el)return;
    if(visible&&n>0){el.textContent=n>99?'99+':String(n);el.style.display='';}
    else el.style.display='none';
  };
  // collection: critical post-design count
  const critical=filtered.filter(o=>parseFloat(o.salePrice)>0&&['printing','production','shipping'].includes(o.stage)&&calcRem(o)>0).length;
  set('collection',critical);
  // shipping: returned count
  const returned=filtered.filter(o=>o.shipStage==='returned').length;
  set('shipping',returned);
  // overview: late count (global, not date-filtered)
  const late=orders.filter(o=>o.deadline&&new Date(o.deadline)<new Date()&&!['archived','shipping'].includes(o.stage)).length;
  set('overview',late);
  // returns: SLA breaches (global — للتنبيه على الـ tickets العالقة)
  const slaCnt = returns.filter(t=>t.slaBreached===true && !['cancelled','closed'].includes(t.status)).length;
  set('returns', slaCnt);
}

const __TABS=['overview','designers','shipping','clients','sales','collection'];
window.addEventListener('keydown',e=>{
  // تجاهل لو المستخدم بيكتب في input/textarea
  const tag=(e.target?.tagName||'').toLowerCase();
  const inField=tag==='input'||tag==='textarea'||tag==='select'||e.target?.isContentEditable;
  // ESC: اقفل drawers/modals
  if(e.key==='Escape'){
    const ov0=document.getElementById('exp-drawer-ov');if(ov0?.style.display==='block'){closeExpenseDrawer();return;}
    const ov1=document.getElementById('rev-drawer-ov');if(ov1?.style.display==='block'){closeRevDrawer();return;}
    const ov2=document.getElementById('ord-drawer-ov');if(ov2?.style.display==='block'){closeOrdDrawer();return;}
    const ov3=document.getElementById('ov-edit-order');if(ov3?.classList.contains('open')){ov3.classList.remove('open');return;}
    const ov5=document.getElementById('ov-del-order');if(ov5?.style.display==='flex'){ov5.style.display='none';return;}
    if(inField&&e.target.id==='col-search'){colSearchClear();e.target.blur();return;}
  }
  if(inField)return;
  // 1-6: switch tab
  if(/^[1-6]$/.test(e.key)){
    const tab=__TABS[parseInt(e.key,10)-1];
    if(tab){switchTab(tab);e.preventDefault();}
    return;
  }
  // / : focus search (لو موجود)
  if(e.key==='/'){
    const inp=document.getElementById('col-search');
    if(inp){inp.focus();inp.select();e.preventDefault();}
    else if(currentTab!=='collection'){switchTab('collection');setTimeout(()=>{const i=document.getElementById('col-search');if(i)i.focus();},120);e.preventDefault();}
  }
});

// ══════════════════════════════════════════════════════════
// 📊 Executive Summary — لوحة واحدة بكل الأرقام المهمة
// ══════════════════════════════════════════════════════════
function renderExec(f, prev, range){
  const PER = filterMode === 'today' ? 'اليوم' : filterMode === 'week' ? 'الأسبوع' : filterMode === 'lastmonth' ? 'الشهر الماضي' : filterMode === 'year' ? 'السنة' : 'الشهر';

  // ── 1) KPIs — pure aggregators في core/reports-financial-kpis.js ──
  const prevRange = getPrevRange(filterMode);
  const {periodIn, periodOut, profit} = calcPeriodFlow(transactions, range);
  const {periodIn:prevIn, periodOut:prevOut, profit:prevProfit} = calcPeriodFlow(transactions, prevRange);

  // ── 2) أوردرات ──
  const orderStats = calcOrderStats(orders, calcRem);
  const totalOrders = f.length;
  const {activeOrders, totalRem, lateOrders} = orderStats;

  // ── 3) عملاء جدد ──
  const newClients = clients.filter(c => c.createdAt?.seconds && new Date(c.createdAt.seconds * 1000) >= range.from && new Date(c.createdAt.seconds * 1000) <= range.to);

  // ── 4) مستحق الموردين ──
  const supDue = calcSupplierDue(suppliers, orders, payments);

  // KPI card builder
  const kpiBox = (ico, val, lbl, col, prev, hint) => {
    const trend = prev !== undefined ? diff(val, prev) : '';
    return `<div style="background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${col}"></div>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div style="font-size:24px;line-height:1">${ico}</div>
        ${trend ? `<span style="font-size:var(--fs-xs);font-weight:800;color:${col};opacity:.85">${trend}</span>` : ''}
      </div>
      <div style="font-size:var(--fs-3xl);font-weight:900;color:${col};margin-top:8px;line-height:1">${fn(val)}<span style="font-size:var(--fs-sm);margin-right:4px;color:var(--dim2)">ج</span></div>
      <div style="font-size:var(--fs-sm);color:var(--dim2);font-weight:700;margin-top:4px">${lbl}</div>
      ${hint ? `<div style="font-size:var(--fs-xs);color:var(--dim2);margin-top:2px;opacity:.8">${hint}</div>` : ''}
    </div>`;
  };

  const kpiGrid = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px">
      ${kpiBox('💰', periodIn,  `إيرادات ${PER}`,  'var(--g)', prevIn)}
      ${kpiBox('📤', periodOut, `مصروفات ${PER}`,  'var(--r)', prevOut)}
      ${kpiBox('💹', profit,    `صافي ${PER}`,     profit>=0?'var(--g)':'var(--r)', prevProfit)}
      ${kpiBox('📦', totalOrders,`أوردرات ${PER}`, 'var(--b)', undefined, `${activeOrders.length} نشط حالياً`)}
      ${kpiBox('⏳', totalRem,  'باقي التحصيل',    'var(--y)', undefined, `${activeOrders.filter(o=>calcRem(o)>0).length} أوردر`)}
      ${kpiBox('🏭', supDue,    'مستحق الموردين', 'var(--p)')}
    </div>`;

  // ── 5) Pipeline توزيع الأوردرات ──
  const stages = [
    { key:'design',     label:'تصميم',  ico:'✏️', col:'#a78bfa' },
    { key:'printing',   label:'طباعة',  ico:'🖨️', col:'#fbbf24' },
    { key:'production', label:'تنفيذ',  ico:'🏭', col:'#ff4d8d' },
    { key:'shipping',   label:'شحن',    ico:'🚚', col:'#22d3ee' },
    { key:'archived',   label:'مكتمل',  ico:'✅', col:'#00d97e' },
  ];
  const totActive = activeOrders.length + orders.filter(o => o.stage === 'archived').length || 1;
  const pipeline = `
    <div style="background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:16px">
      <div style="font-size:var(--fs-base);font-weight:800;color:var(--dim2);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">
        <span>🧭 توزيع المراحل</span>
        <span style="font-size:var(--fs-sm);color:var(--snow);font-weight:700">${orders.length} أوردر إجمالاً</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px">
        ${stages.map(s => {
          const c = orders.filter(o => o.stage === s.key).length;
          const pct = totActive ? Math.round(c/orders.length*100) : 0;
          return `<div style="background:${s.col}14;border:1px solid ${s.col}44;border-radius:10px;padding:10px 6px;text-align:center">
            <div style="font-size:var(--fs-xl);margin-bottom:2px">${s.ico}</div>
            <div style="font-size:var(--fs-2xl);font-weight:900;color:${s.col};line-height:1">${c}</div>
            <div style="font-size:var(--fs-tiny);color:var(--dim2);margin-top:2px;font-weight:700">${s.label} · ${pct}%</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  // ── 6) Top performers — pure aggregators ──
  const top5Clients   = calcTopClientsByRevenue(f, 5);
  const top5ProductsObj = calcTopProductsByRevenue(f, 5);
  const top5Products  = top5ProductsObj.map(p => [p.name, {qty:p.qty, revenue:p.revenue}]);
  const top5Designers = calcTopDesignersByCount(orders, 5);

  const topCard = (title, ico, rows) => `
    <div style="background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;flex:1;min-width:0">
      <div style="font-size:var(--fs-base);font-weight:800;color:var(--snow);margin-bottom:10px;display:flex;align-items:center;gap:6px">
        <span>${ico}</span><span>${title}</span>
      </div>
      ${rows.length ? rows.map((r,i) => `
        <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);font-size:var(--fs-base)">
          <span style="width:18px;height:18px;border-radius:50%;background:${i===0?'var(--y)':'var(--bg3)'};color:${i===0?'#000':'var(--dim2)'};font-weight:900;display:flex;align-items:center;justify-content:center;font-size:var(--fs-xs);flex-shrink:0">${i+1}</span>
          <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--snow);font-weight:600">${r.label}</span>
          <span style="color:var(--g);font-weight:800;font-size:var(--fs-sm);white-space:nowrap">${r.value}</span>
        </div>`).join('') : '<div style="text-align:center;color:var(--dim2);padding:14px;font-size:var(--fs-sm)">لا توجد بيانات</div>'}
    </div>`;

  const topPerformers = `
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
      ${topCard('🏆 أعلى عملاء', '👥', top5Clients.map(c => ({ label: c.name, value: `${fn(c.revenue)} ج · ${c.count}` })))}
      ${topCard('📦 أعلى منتجات', '🔥', top5Products.map(([name, d]) => ({ label: name, value: `${fn(d.revenue)} ج · ${d.qty}` })))}
      ${topCard('🎨 أفضل مصممين', '✏️', top5Designers.map(d => ({ label: d.name, value: `${d.count} أوردر` })))}
    </div>`;

  // ── 7) Alerts ──
  const stale = f.filter(o => parseFloat(o.salePrice) > 0 && calcRem(o) > 0 && isStaleOrder(o));
  const noCost = f.filter(isMissingCost);
  const alerts = [
    { ico:'⏰', col:'var(--r)', count: lateOrders.length, label: 'أوردر متأخر',     hint: 'بعد deadline' },
    { ico:'💸', col:'var(--y)', count: stale.length,      label: 'باقي تحصيل قديم', hint: 'بدون حركة' },
    { ico:'❓', col:'var(--o)', count: noCost.length,     label: 'بدون تكلفة',      hint: 'يحتاج تسجيل' },
    { ico:'🏭', col:'var(--p)', count: Math.round(supDue),label: 'ج مستحق للموردين', hint: '' },
  ].filter(a => a.count > 0);

  const alertsHtml = alerts.length ? `
    <div style="background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:16px">
      <div style="font-size:var(--fs-base);font-weight:800;color:var(--snow);margin-bottom:10px">🚨 تحتاج اهتمام</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px">
        ${alerts.map(a => `
          <div style="background:${a.col}14;border:1px solid ${a.col}44;border-radius:10px;padding:10px;text-align:center">
            <div style="font-size:var(--fs-2xl);margin-bottom:2px">${a.ico}</div>
            <div style="font-size:var(--fs-2xl);font-weight:900;color:${a.col};line-height:1">${fn(a.count)}</div>
            <div style="font-size:var(--fs-xs);color:var(--dim2);margin-top:3px;font-weight:700">${a.label}</div>
            ${a.hint ? `<div style="font-size:var(--fs-tiny);color:var(--dim2);margin-top:1px;opacity:.7">${a.hint}</div>` : ''}
          </div>`).join('')}
      </div>
    </div>` : '';

  // ── 8) آخر 7 أيام (Daily revenue trend) ──
  const days7 = dailySeries(7, t => (t.type === 'in' || ['collection','advance','deposit'].includes(t.category)), t => parseFloat(t.amount) || 0);
  const maxD = Math.max(1, ...days7);
  const dayLabels = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    dayLabels.push(d.toLocaleDateString('ar-EG', { weekday: 'short' }));
  }
  const trend = `
    <div style="background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span style="font-size:var(--fs-base);font-weight:800;color:var(--snow)">📈 إيرادات آخر 7 أيام</span>
        <span style="font-size:var(--fs-sm);color:var(--g);font-weight:800">${fn(days7.reduce((s,v) => s+v, 0))} ج</span>
      </div>
      <div style="display:flex;align-items:flex-end;gap:6px;height:100px">
        ${days7.map((v,i) => {
          const h = Math.max(4, (v/maxD)*90);
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
            <div style="font-size:var(--fs-tiny);color:var(--g);font-weight:700;opacity:${v>0?1:.3}">${v>0?fn(Math.round(v)):''}</div>
            <div style="width:100%;height:${h}px;background:linear-gradient(180deg,var(--g),rgba(0,217,126,.3));border-radius:4px 4px 0 0;transition:height .4s"></div>
            <div style="font-size:var(--fs-tiny);color:var(--dim2)">${dayLabels[i]}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  // ── النتيجة ──
  return kpiGrid + pipeline + topPerformers + alertsHtml + trend;
}

// ══ Helpers ══
const diff=diffHTML;  // pure logic مُمَركَزة في core/reports-financial-kpis.js
function kpi(val,lbl,color,prevVal,counterTarget,counterSuffix){
  // لو fed counterTarget رقمي → نعرض 0 ابتدائياً ونحرك بـ data-counter
  const inner=counterTarget!=null
    ?`<span data-counter="${counterTarget}"${counterSuffix?` data-suffix="${counterSuffix}"`:''}>${val}</span>`
    :val;
  return`<div class="kpi-box"><div class="kpi-val" style="color:${color}">${inner}</div><div class="kpi-lbl">${lbl}</div>${prevVal!==undefined?diff(parseFloat(String(val).replace(/[^0-9.\-]/g,'')),prevVal):''}</div>`;
}
function bar(label,val,max,color='var(--r)',suffix=''){
  const pct=max>0?Math.round(val/max*100):0;
  return`<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"><span class="bar-val">${fn(val)}${suffix}</span></div></div></div>`;
}
function monthlyChart(){
  // pure aggregator في core/reports-financial-kpis.js
  const {keys, data, max} = calcMonthlyRevenueChart(transactions, 6);
  if(!keys.length)return`<div class="chart-wrap"><div class="chart-title">📈 الإيرادات - آخر 6 شهور</div><div style="text-align:center;padding:14px;color:var(--dim2);font-size:var(--fs-base)">لا توجد بيانات تحصيل</div></div>`;
  return`<div class="chart-wrap"><div class="chart-title">📈 الإيرادات الفعلية - آخر 6 شهور</div>${keys.map(k=>bar(k.slice(5)+'/'+k.slice(0,4),data[k].rev,max,'linear-gradient(90deg,var(--r),var(--p))',' ج')).join('')}</div>`;
}

// ══ Tab 1: Overview — 10-second view ══
function renderOverview(f,prev){
  // ── 1) كم بتجمع النهاردة؟
  const t0=new Date();t0.setHours(0,0,0,0);
  const startToday=t0.getTime();
  const isIn=t=>(t.type==='in'||['collection','advance','deposit'].includes(t.category));
  const todayCol=transactions.filter(t=>{
    if(!isIn(t))return false;
    const s=t.createdAt?.seconds||0;return s*1000>=startToday;
  }).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  // متوسط 7 أيام (مش بيشمل النهاردة لو عاوزه استقلالي — هنشمله للتبسيط)
  const last7=dailySeries(7,isIn,t=>parseFloat(t.amount)||0);
  const avg7=last7.reduce((a,b)=>a+b,0)/7;
  const pct=avg7>0?Math.round((todayCol-avg7)/avg7*100):null;
  const trendArrow=pct===null?'':pct>0?'↑':pct<0?'↓':'→';
  const trendCls=pct===null?'':pct>0?'up':pct<0?'down':'';

  // ── 2) أهم 5-8 أولويات
  const allPrio=buildPriorityItems();
  const prio=allPrio.slice(0,5);
  const extraPrio=allPrio.length-prio.length;

  // ── 3) النتيجة
  return`
    <!-- Hero — رقم واحد بس -->
    <div class="ov10-hero">
      <div class="lbl">كم جمعنا النهاردة؟</div>
      <div class="big ${todayCol===0?'zero':''}">${fn(todayCol)} ج</div>
      ${avg7>0?`<div class="cmp">
        <span>متوسط 7 أيام: <b style="color:var(--snow)">${fn(Math.round(avg7))} ج</b></span>
        ${pct!==null?`<span class="pct ${trendCls}">${trendArrow} ${Math.abs(pct)}%</span>`:''}
      </div>`:''}
      <div class="spark">${sparkline(last7,'var(--g)')}</div>
    </div>

    <!-- Priorities -->
    <div class="ov10-prio-hdr">
      <h3>🔥 محتاج تتصرّف في</h3>
      ${prio.length?`<span class="cnt">${prio.length}${extraPrio>0?` من ${allPrio.length}`:''}</span>`:''}
    </div>
    ${prio.length?`<div class="ov10-prio-list">
      ${prio.map(p=>{
        const acts=[];
        if(p.actions.includes('phone')&&p.phone)acts.push(`<a class="tel" href="${telLink(p.phone)}" title="اتصل" onclick="event.stopPropagation()">📞</a>`);
        if(p.actions.includes('wa')&&waLink(p.phone))acts.push(`<a class="wa" href="${waLink(p.phone)}" target="_blank" title="واتساب" onclick="event.stopPropagation()">💬</a>`);
        if(p.actions.includes('open')&&p.orderId)acts.push(`<button title="افتح الأوردر" onclick="openOrdDrawer('${p.orderId}')">↗</button>`);
        const clickable=p.orderId?`onclick="openOrdDrawer('${p.orderId}')" style="cursor:pointer"`:'';
        return`<div class="ov10-prio-row" style="--prio:${p.color}" ${clickable}>
          <div class="ico">${p.icon}</div>
          <div class="body">
            <div class="ttl"><span class="name">${p.title}</span><span class="amt">${fn(Math.round(p.amount))} ج</span></div>
            <div class="sub">${p.subtitle}</div>
          </div>
          ${acts.length?`<div class="acts">${acts.join('')}</div>`:''}
        </div>`;
      }).join('')}
      ${extraPrio>0?`<div style="text-align:center;padding:6px;font-size:var(--fs-sm);color:var(--dim2);font-weight:700">+ ${extraPrio} أولوية إضافية في جرد التحصيل</div>`:''}
    </div>`:`<div class="ov10-empty">
      <div class="ic">✅</div>
      <div class="ttl">مفيش حاجة عاجلة دلوقتي</div>
      <div class="sub">كل الأوردرات في مسارها الطبيعي</div>
    </div>`}

    <!-- Bottom split nav -->
    <div class="ov10-nav">
      <button onclick="switchTab('collection')"><span class="ic">📋</span> كل الأوردرات</button>
      <button onclick="document.getElementById('ov10-details').open=true;document.getElementById('ov10-details').scrollIntoView({behavior:'smooth'})"><span class="ic">📊</span> الإحصائيات الكاملة</button>
    </div>

    <!-- Full detailed view (collapsed) -->
    <details class="more-details" id="ov10-details" style="margin-top:14px">
      <summary>📊 الإحصائيات والمخططات الكاملة</summary>
      <div style="padding:12px">
        ${renderOverviewDetailed(f,prev)}
      </div>
    </details>`;
}

function renderOverviewDetailed(f,prev){
  // ══ الإيرادات = الكاش الفعلي من transactions_v2 ══
  const range=getRange(filterMode);
  const prev2=getPrevRange(filterMode);
  
  // المحصّل فعلاً في الفترة (من transactions_v2)
  const inTx=transactions.filter(p=>{
    if(p.type!=='in'&&p.category!=='collection'&&p.category!=='advance'&&p.category!=='deposit')return false;
    if(!p.createdAt?.seconds)return false;
    const d=new Date(p.createdAt.seconds*1000);
    return d>=range.from&&d<=range.to;
  });
  const tot=inTx.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);

  // المحصّل في الفترة السابقة
  const prevInTx=transactions.filter(p=>{
    if(p.type!=='in'&&p.category!=='collection'&&p.category!=='advance'&&p.category!=='deposit')return false;
    if(!p.createdAt?.seconds)return false;
    const d=new Date(p.createdAt.seconds*1000);
    return d>=prev2.from&&d<=prev2.to;
  });
  const pTot=prevInTx.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);

  // قيمة الأوردرات (مش الإيرادات — للمرجع بس)
  const ordersTotal=f.reduce((s,o)=>s+(parseFloat(o.salePrice)||0),0);
  
  // الباقي على العملاء
  const rem=f.reduce((s,o)=>s+calcRem(o),0);
  // الباقي الحرج: العميل وافق على التصميم ودخل طباعة/تنفيذ/شحن (المنتج اتصرف عليه فلوس)
  const remCritical=f.filter(o=>['printing','production','shipping'].includes(o.stage)).reduce((s,o)=>s+calcRem(o),0);
  
  // المصروفات الفعلية = كل transactions type='out' في الفترة (موردين + شحن + مرتجعات + غيرها)
  const inRange2=(t,r)=>t.createdAt?.seconds&&new Date(t.createdAt.seconds*1000)>=r.from&&new Date(t.createdAt.seconds*1000)<=r.to;
  const costs=transactions.filter(t=>t.type==='out'&&inRange2(t,range)).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const supDue=suppliers.reduce((s,sup)=>{const p=payments.filter(x=>x.supplierId===sup._id).reduce((ps,x)=>ps+(parseFloat(x.amount)||0),0);const pur=orders.reduce((os,o)=>os+(o.costItems||[]).filter(c2=>c2.supplierId===sup._id).reduce((cs,c2)=>cs+(parseFloat(c2.total)||0),0),0);return s+Math.max(0,pur-p);},0);

  // الربح = الكاش الفعلي - المصروفات الفعلية
  const profit=tot-costs;
  const pCol=pTot;
  const pCosts=transactions.filter(t=>t.type==='out'&&inRange2(t,prev2)).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const pProfit=pTot-pCosts;

  const late=orders.filter(o=>o.deadline&&new Date(o.deadline)<new Date()&&!['archived','shipping'].includes(o.stage));
  // الأوردرات اللي عليها باقي وقاعدة بدون حركة فترة طويلة
  const staleWithRem=f.filter(o=>parseFloat(o.salePrice)>0&&calcRem(o)>0&&isStaleOrder(o));
  // الأوردرات اللي وصلت لمراحل متقدّمة من غير ما حد سجّل تكلفة
  const noCostOrders=f.filter(isMissingCost);

  // Sparkline series — آخر 30 يوم
  const inFilter=t=>(t.type==='in'||['collection','advance','deposit'].includes(t.category));
  const outFilter=t=>(t.type==='out');
  const totSpark=dailySeries(30,inFilter,t=>parseFloat(t.amount)||0);
  const costSpark=dailySeries(30,outFilter,t=>parseFloat(t.amount)||0);
  const profitSpark=totSpark.map((v,i)=>Math.max(0,v-(costSpark[i]||0)));

  // Daily close — آخر 7 أيام × المحافظ
  const wallSorted=[...wallets].sort((a,b)=>(a.order||0)-(b.order||0)||(a.name||'').localeCompare(b.name||''));
  const dailyByWallet={};
  wallSorted.forEach(w=>dailyByWallet[w._id]={inSum:0,outSum:0,inDays:new Array(7).fill(0),outDays:new Array(7).fill(0)});
  const daily7End=new Date();daily7End.setHours(23,59,59,999);
  const daily7End_ms=daily7End.getTime();
  transactions.forEach(t=>{
    const sec=t.createdAt?.seconds||0;if(!sec)return;
    const ageDays=Math.floor((daily7End_ms-sec*1000)/86400000);
    if(ageDays<0||ageDays>=7)return;
    const wid=t.walletId;if(!wid||!dailyByWallet[wid])return;
    const amt=parseFloat(t.amount)||0;
    const idx=6-ageDays;
    if(t.type==='in'){dailyByWallet[wid].inSum+=amt;dailyByWallet[wid].inDays[idx]+=amt;}
    else if(t.type==='out'){dailyByWallet[wid].outSum+=amt;dailyByWallet[wid].outDays[idx]+=amt;}
  });

  // Heatmap — آخر 60 يوم: kt = orders count per day
  const hmDays=60;
  const hm=new Array(hmDays).fill(0);
  const hmEnd=new Date();hmEnd.setHours(23,59,59,999);
  const hmEndMs=hmEnd.getTime();
  orders.forEach(o=>{
    const s=o.createdAt?.seconds||0;if(!s)return;
    const age=Math.floor((hmEndMs-s*1000)/86400000);
    if(age<0||age>=hmDays)return;
    hm[hmDays-1-age]++;
  });
  const hmMax=Math.max(...hm,1);

  // قائمة المحافظ الأكثر استخداماً للـ sparkline (لو في > 0)
  const presets=loadPresets();

  // ── Executive summary helpers ──
  // 1) رصيد المحافظ الإجمالي = الكاش في الصندوق دلوقتي
  const cashOnHand=wallets.reduce((s,w)=>s+(parseFloat(w.balance)||0),0);
  // 2) أكتر 5 عملاء عليهم باقي
  const debtMap={};
  f.forEach(o=>{
    const r=calcRem(o);if(r<=0)return;
    const k=o.clientId||o.clientName;if(!k)return;
    if(!debtMap[k])debtMap[k]={name:o.clientName||'—',phone:o.clientPhone||'',rem:0,count:0};
    debtMap[k].rem+=r;debtMap[k].count++;
  });
  const topDebtors=Object.values(debtMap).sort((a,b)=>b.rem-a.rem).slice(0,5);
  // 3) Pipeline counts
  const pipeline={design:0,printing:0,production:0,shipping:0,archived:0};
  f.forEach(o=>{if(pipeline[o.stage]!=null)pipeline[o.stage]++;});
  const pipelineMax=Math.max(...Object.values(pipeline),1);
  const stageLabel={design:'✏️ تصميم',printing:'🖨️ طباعة',production:'🏭 تنفيذ',shipping:'🚚 شحن',archived:'📁 أرشيف'};
  // 4) Risk consolidated count
  const totalRisks=late.length+staleWithRem.length+noCostOrders.length+(supDue>0?1:0);

  // 5) Avg order value + highest sales day
  const ordersWithPrice=f.filter(o=>parseFloat(o.salePrice)>0);
  const avgOrder=ordersWithPrice.length?ordersWithPrice.reduce((s,o)=>s+(parseFloat(o.salePrice)||0),0)/ordersWithPrice.length:0;
  // اجمع التحصيل بكل يوم في الفترة → خد الأعلى
  const dayMap={};
  transactions.forEach(t=>{
    if(t.type!=='in'&&!['collection','advance','deposit'].includes(t.category))return;
    if(!inRange2(t,range))return;
    const d=new Date(t.createdAt.seconds*1000);
    const k=d.toLocaleDateString('ar-EG');
    dayMap[k]=(dayMap[k]||0)+(parseFloat(t.amount)||0);
  });
  const peakDayEntry=Object.entries(dayMap).sort((a,b)=>b[1]-a[1])[0];
  const peakDay=peakDayEntry?{date:peakDayEntry[0],amount:peakDayEntry[1]}:null;
  // 6) Forecast — projection للفترة الحالية بناءً على معدّل الأيام اللي عدّت
  const periodStart=range.from.getTime(),periodEnd=range.to.getTime(),nowMs=Math.min(Date.now(),periodEnd);
  const periodDays=Math.max(1,Math.ceil((periodEnd-periodStart)/86400000));
  const elapsedDays=Math.max(1,Math.min(periodDays,Math.ceil((nowMs-periodStart)/86400000)));
  const remainingDays=Math.max(0,periodDays-elapsedDays);
  const dailyRate=tot/elapsedDays;
  const forecastEnd=tot+(dailyRate*remainingDays);
  const forecastGrowth=pTot>0?Math.round((forecastEnd-pTot)/pTot*100):0;
  // 7) Delivery success rate (across shipping orders ever)
  const shipOrds=orders.filter(o=>['shipping','archived'].includes(o.stage)||o.shipCompanyName);
  const delivered=shipOrds.filter(isDelivered).length;
  const deliveryRate=shipOrds.length?Math.round(delivered/shipOrds.length*100):0;
  // 8) Geographic distribution — top 8 governorates
  const geoMap={};
  f.forEach(o=>{const g=(o.shipGov||'').trim();if(!g)return;geoMap[g]=(geoMap[g]||0)+1;});
  const geoTop=Object.entries(geoMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const geoMax=geoTop.length?geoTop[0][1]:1;
  // 9) Bottlenecks — avg dwell per stage (using updatedAt - createdAt for orders currently in that stage)
  const stageDwell={design:[],printing:[],production:[],shipping:[]};
  orders.forEach(o=>{
    if(!stageDwell[o.stage])return;
    const ts=o.updatedAt?.seconds||o.createdAt?.seconds||0;if(!ts)return;
    const days=Math.floor((Date.now()-ts*1000)/86400000);
    if(days>=0)stageDwell[o.stage].push(days);
  });
  const stageAvg={};Object.entries(stageDwell).forEach(([k,arr])=>{stageAvg[k]=arr.length?arr.reduce((s,v)=>s+v,0)/arr.length:0;});
  const bottleneck=Object.entries(stageAvg).sort((a,b)=>b[1]-a[1])[0];

  // 10) Smart insights — رولز بسيطة بترجم الأرقام لقرارات
  const insights=[];
  // مقارنة التحصيل
  if(pTot>0){
    const dPct=Math.round((tot-pTot)/pTot*100);
    if(dPct<=-20)insights.push({lvl:'bad',ic:'📉',txt:`التحصيل في الفترة دي انخفض <b>${Math.abs(dPct)}%</b> عن السابقة (${fn(pTot)} ج → ${fn(tot)} ج). محتاج تتابع ليه`,act:{label:'افحص المتأخرين',fn:`goCollectionFlag('stale')`}});
    else if(dPct>=20)insights.push({lvl:'good',ic:'📈',txt:`التحصيل ارتفع <b>${dPct}%</b> عن الفترة السابقة. استمر على نفس الإيقاع`});
  }
  // Forecast
  if(remainingDays>0&&tot>0){
    insights.push({lvl:forecastGrowth>=0?'good':'warn',ic:'🔮',txt:`بناءً على معدّل الأيام اللي عدت، <b>متوقع تخلّص الفترة بـ ${fn(Math.round(forecastEnd))} ج</b>${pTot>0?` (${forecastGrowth>=0?'+':''}${forecastGrowth}% vs السابقة)`:''}`});
  }
  // Critical post-design
  if(remCritical>0){
    insights.push({lvl:'bad',ic:'⚠️',txt:`<b>${fn(remCritical)} ج</b> فلوس عملاء وافقوا على التصميم ودخلوا تنفيذ بدون تحصيل — ده الأكثر إلحاحاً`,act:{label:'اعرضهم',fn:`goCollectionPostDesign()`}});
  }
  // Cash position
  if(cashOnHand<costs&&costs>0){
    insights.push({lvl:'bad',ic:'💰',txt:`الكاش في الخزينة (<b>${fn(cashOnHand)} ج</b>) أقل من إجمالي المصروفات في الفترة (${fn(costs)} ج). راجع التدفق النقدي`});
  }
  // Bottleneck
  if(bottleneck&&bottleneck[1]>3&&pipeline[bottleneck[0]]>0){
    insights.push({lvl:'warn',ic:'🚦',txt:`<b>${stageLabel[bottleneck[0]]||bottleneck[0]}</b> هي المرحلة الأبطأ — متوسط ${Math.round(bottleneck[1])} يوم لكل أوردر فيها (${pipeline[bottleneck[0]]} أوردر حالياً)`});
  }
  // Stale
  if(staleWithRem.length>=3){
    insights.push({lvl:'warn',ic:'⏰',txt:`<b>${staleWithRem.length} أوردر</b> ما اتحرّكش > 14 يوم وعليهم باقي. الجدول الزمني محتاج متابعة`,act:{label:'افتحهم',fn:`goCollectionFlag('stale')`}});
  }
  // No-cost
  if(noCostOrders.length>=2){
    insights.push({lvl:'bad',ic:'🚫',txt:`<b>${noCostOrders.length} أوردر</b> في تنفيذ/شحن/أرشيف بدون تكلفة مسجّلة — ربحك في الورق وهمي`,act:{label:'صحّحهم',fn:`goCollectionFlag('no-cost')`}});
  }
  // Top performer hint
  if(peakDay&&peakDay.amount>avgOrder*5){
    insights.push({lvl:'good',ic:'🔥',txt:`أعلى يوم تحصيل: <b>${peakDay.date}</b> بـ ${fn(Math.round(peakDay.amount))} ج`});
  }
  // Delivery rate
  if(shipOrds.length>=10&&deliveryRate<80){
    insights.push({lvl:'warn',ic:'🚚',txt:`نسبة تسليم الشحن <b>${deliveryRate}%</b> — أقل من المستهدف. راجع شركات الشحن`});
  }
  if(!insights.length){
    insights.push({lvl:'good',ic:'✅',txt:'كل المؤشرات الأساسية ضمن المعدل الطبيعي للفترة دي'});
  }

  return`
    <!-- 🧠 Insights — برِيفينج تنفيذي مبني على heuristics -->
    <div class="insights-card">
      <div class="insights-hdr">
        <h3>🧠 ملخّص ذكي للإدارة</h3>
        <span class="meta">${elapsedDays} يوم مرّ · ${remainingDays} متبقي</span>
      </div>
      <div class="insights-list">
        ${insights.map(i=>`<div class="insight-row ${i.lvl}">
          <span class="ico">${i.ic}</span>
          <div class="txt">${i.txt}</div>
          ${i.act?`<button class="act" onclick="${i.act.fn}">${i.act.label} ←</button>`:''}
        </div>`).join('')}
      </div>
      <div class="mini-stats">
        <div class="mini-stat"><div class="v" style="color:var(--b)">${ordersWithPrice.length?fn(Math.round(avgOrder))+' ج':'—'}</div><div class="l">متوسط الأوردر</div></div>
        <div class="mini-stat"><div class="v" style="color:var(--g)">${peakDay?fn(Math.round(peakDay.amount))+' ج':'—'}</div><div class="l">أعلى يوم تحصيل${peakDay?' · '+peakDay.date:''}</div></div>
        <div class="mini-stat"><div class="v" style="color:${deliveryRate>=80?'var(--g)':deliveryRate>=60?'var(--y)':'var(--r)'}">${shipOrds.length?deliveryRate+'%':'—'}</div><div class="l">نسبة تسليم الشحن</div></div>
      </div>
    </div>

    <!-- Risk strip — سطر واحد لكل التنبيهات -->
    ${totalRisks?`<div class="risk-strip">
      ${late.length?`<button class="risk-chip" onclick="goCollectionPostDesign()" title="${late.length} أوردر متأخر عن موعد التسليم"><span class="ic">🚨</span><b>${late.length}</b><span>متأخر</span></button>`:''}
      ${staleWithRem.length?`<button class="risk-chip warn" onclick="goCollectionFlag('stale')" title="بدون حركة > 14 يوم وعليه باقي · ${fn(staleWithRem.reduce((s,o)=>s+calcRem(o),0))} ج"><span class="ic">⏰</span><b>${staleWithRem.length}</b><span>راكد</span></button>`:''}
      ${noCostOrders.length?`<button class="risk-chip danger" onclick="goCollectionFlag('no-cost')" title="مرحلة متقدمة بدون تكلفة مسجّلة"><span class="ic">🚫</span><b>${noCostOrders.length}</b><span>بدون تكلفة</span></button>`:''}
      ${supDue>0?`<button class="risk-chip warn" title="مستحق للموردين"><span class="ic">🏭</span><b>${fn(supDue)}</b><span>للموردين</span></button>`:''}
    </div>`:''}

    <!-- Hero KPIs — 4 أرقام أساسية للمدير -->
    <div class="kpi-grid">
      <div class="kpi-box" title="إجمالي رصيد المحافظ الآن">
        <div class="kpi-val" style="color:var(--p)"><span data-counter="${cashOnHand}" data-suffix=" ج">${fn(cashOnHand)} ج</span></div>
        <div class="kpi-lbl">💼 الكاش في الخزينة</div>
        <div style="font-size:var(--fs-xs);color:var(--dim2);margin-top:2px;font-weight:700">${wallets.length} محفظة</div>
      </div>
      <div onclick="openRevDrawer()" class="clickable" style="cursor:pointer" title="تفاصيل الإيرادات">
        <div class="kpi-box clickable">
          <div class="kpi-val" style="color:var(--g)"><span data-counter="${tot}" data-suffix=" ج">${fn(tot)} ج</span></div>
          <div class="kpi-lbl">↗ محصّل في الفترة</div>
          ${diff(tot,pTot)}
          ${sparkline(totSpark,'var(--g)')}
        </div>
      </div>
      <div onclick="goCollectionPostDesign()" class="clickable" style="cursor:pointer" title="اضغط لعرض الأوردرات اللي وافقت على التصميم ولم تُحصَّل">
        <div class="kpi-box clickable">
          <div class="kpi-val" style="color:var(--y)"><span data-counter="${rem}" data-suffix=" ج">${fn(rem)} ج</span></div>
          <div class="kpi-lbl">⏳ باقي التحصيل</div>
          ${remCritical>0?`<div style="margin-top:6px;padding-top:6px;border-top:1px dashed var(--line);display:flex;justify-content:space-between;align-items:center;font-size:var(--fs-xs);font-weight:800"><span style="color:var(--r)">⚠️ <span data-counter="${remCritical}" data-suffix=" ج">${fn(remCritical)} ج</span></span><span style="color:var(--dim2)">بعد التصميم</span></div>`:''}
        </div>
      </div>
      <div onclick="openExpenseDrawer()" class="clickable" style="cursor:pointer" title="تفاصيل المصروفات">
        <div class="kpi-box clickable">
          <div class="kpi-val" style="color:${profit>=0?'var(--g)':'var(--r)'}"><span data-counter="${Math.abs(profit)}" data-suffix=" ج">${profit>=0?'ربح ':'خسارة '}${fn(Math.abs(profit))} ج</span></div>
          <div class="kpi-lbl">${profit>=0?'💹 الربح الصافي':'📉 الخسارة الصافية'}</div>
          ${diff(profit,pProfit)}
          ${sparkline(costSpark,'var(--r)')}
        </div>
      </div>
    </div>

    <!-- Pipeline strip — مرحلة واحدة لكل تبويب -->
    <div class="pipe-strip">
      <div class="pipe-strip-hdr">🏗️ Pipeline — ${f.length} أوردر في الفترة</div>
      <div class="pipe-row">
        ${Object.entries(pipeline).map(([s,n])=>{
          const pct=Math.round(n/Math.max(f.length,1)*100);
          return`<div class="pipe-cell" style="cursor:pointer" onclick="switchTab('collection');setTimeout(()=>filterByStage('${s}'),60)" title="${pct}% من إجمالي الفترة">
            <div class="pipe-stage-lbl">${stageLabel[s]}</div>
            <div class="pipe-stage-num">${n}</div>
            <div class="pipe-stage-bar"><div style="width:${n/pipelineMax*100}%;background:var(--b)"></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- Top 5 debtors — قرار يومي للمدير -->
    ${topDebtors.length?`<div class="chart-wrap">
      <div class="chart-title" style="display:flex;justify-content:space-between;align-items:center"><span>🔝 أكبر 5 عملاء عليهم باقي</span><button class="d-btn" style="font-size:var(--fs-sm);padding:4px 10px" onclick="switchTab('collection')">عرض الكل ←</button></div>
      ${topDebtors.map(c=>{
        const safe=(c.name||'').replace(/'/g,"\\'");
        return`<div onclick="focusClient('${safe}');setTimeout(()=>switchTab('collection'),60)" style="display:flex;justify-content:space-between;align-items:center;padding:8px 6px;border-bottom:1px solid var(--line);cursor:pointer" title="اضغط لعرض أوردراته">
          <div>
            <div style="font-size:var(--fs-md);font-weight:800">${c.name}</div>
            <div style="font-size:var(--fs-xs);color:var(--dim2)">${c.phone||'—'} · ${c.count} أوردر</div>
          </div>
          <div style="font-size:15px;font-weight:900;color:var(--r);white-space:nowrap">${fn(c.rem)} ج</div>
        </div>`;
      }).join('')}
    </div>`:''}

    <!-- Details (مطوي افتراضياً) -->
    <details class="more-details">
      <summary>📊 المزيد من التفاصيل والمخططات</summary>

      <!-- 📍 توزيع جغرافي -->
      ${geoTop.length?`<div class="chart-wrap">
        <div class="chart-title">📍 توزيع الأوردرات بالمحافظات (Top ${geoTop.length})</div>
        <div class="geo-list">
          ${geoTop.map(([g,n])=>`<div class="geo-row">
            <div class="name">${g}</div>
            <div class="track"><div class="fill" style="width:${n/geoMax*100}%"></div></div>
            <div class="num">${n} أوردر</div>
          </div>`).join('')}
        </div>
      </div>`:''}

      <!-- 🚦 اختناقات الإنتاج — متوسط المكوث في كل مرحلة -->
      <div class="chart-wrap">
        <div class="chart-title">🚦 اختناقات الإنتاج — متوسط المكوث في كل مرحلة</div>
        ${Object.entries(stageDwell).filter(([,arr])=>arr.length).map(([s,arr])=>{
          const avg=stageAvg[s]||0;const cnt=arr.length;
          const isWorst=bottleneck&&bottleneck[0]===s;
          const cl=avg>=5?'var(--r)':avg>=3?'var(--y)':'var(--g)';
          return`<div class="compare-row">
            <span>${stageLabel[s]||s}${isWorst?' 🚦':''} <span style="color:var(--dim2);font-size:var(--fs-sm)">(${cnt} أوردر)</span></span>
            <span style="color:${cl};font-weight:900">${avg.toFixed(1)} يوم</span>
          </div>`;
        }).join('')||'<div style="text-align:center;padding:14px;color:var(--dim2);font-size:var(--fs-base)">مفيش بيانات كفاية</div>'}
      </div>

      <!-- رسم بياني شهري -->
      ${monthlyChart()}

      <!-- مقارنة تفصيلية -->
      <div class="chart-wrap">
        <div class="chart-title">📊 مقارنة بالفترة السابقة</div>
        <div class="compare-row"><span>محصّل فعلاً</span><div style="display:flex;gap:12px"><span style="color:var(--g);font-weight:800">${fn(tot)} ج</span><span style="color:var(--dim2)">${fn(pTot)} ج</span></div></div>
        <div class="compare-row"><span>قيمة الأوردرات</span><div style="display:flex;gap:12px"><span style="color:var(--b);font-weight:800">${fn(ordersTotal)} ج</span><span style="color:var(--dim2)">—</span></div></div>
        <div class="compare-row"><span>المصروفات الفعلية</span><div style="display:flex;gap:12px"><span style="color:var(--r);font-weight:800">${fn(costs)} ج</span><span style="color:var(--dim2)">${fn(pCosts)} ج</span></div></div>
        <div class="compare-row"><span>${profit>=0?'الربح':'الخسارة'}</span><div style="display:flex;gap:12px"><span style="color:${profit>=0?'var(--g)':'var(--r)'};font-weight:800">${profit>=0?'ربح ':'خسارة '}${fn(Math.abs(profit))} ج</span><span style="color:var(--dim2)">${pProfit>=0?'ربح ':'خسارة '}${fn(Math.abs(pProfit))} ج</span></div></div>
      </div>

      <!-- Heatmap: نشاط الأوردرات آخر 60 يوم -->
      <div class="chart-wrap">
        <div class="chart-title" style="display:flex;justify-content:space-between;align-items:center"><span>🗓️ نشاط الأوردرات — آخر 60 يوم</span><span style="font-size:var(--fs-xs);color:var(--dim2);font-weight:700">من الأقدم → الأحدث</span></div>
        <div class="hm-grid">
          ${hm.map((v,i)=>{
            const d=new Date();d.setDate(d.getDate()-(hmDays-1-i));
            const lvl=v===0?0:v/hmMax;
            const color=lvl===0?'var(--bg3)':lvl<.25?'rgba(0,217,126,.25)':lvl<.5?'rgba(0,217,126,.5)':lvl<.75?'rgba(0,217,126,.75)':'var(--g)';
            return `<div class="hm-cell" style="background:${color}" title="${d.toLocaleDateString('ar-EG')}: ${v} أوردر"></div>`;
          }).join('')}
        </div>
      </div>

      <!-- Daily close — حركة المحافظ آخر 7 أيام -->
      ${wallSorted.length?`
      <div class="chart-wrap">
        <div class="chart-title">💼 الإقفال اليومي — آخر 7 أيام</div>
        <div style="overflow-x:auto">
        <table class="dc-table">
          <thead><tr>
            <th style="text-align:right">المحفظة</th>
            ${[...Array(7).keys()].map(i=>{const d=new Date();d.setDate(d.getDate()-(6-i));return `<th>${d.toLocaleDateString('ar-EG',{day:'2-digit',month:'2-digit'})}</th>`;}).join('')}
            <th>داخل</th><th>خارج</th><th>صافي</th>
          </tr></thead>
          <tbody>
          ${wallSorted.map(w=>{
            const d=dailyByWallet[w._id];if(!d||(d.inSum===0&&d.outSum===0))return'';
            const net=d.inSum-d.outSum;
            return`<tr>
              <td style="text-align:right;font-weight:800">${w.name}</td>
              ${d.inDays.map((v,i)=>{const o=d.outDays[i];const n=v-o;const cl=n>0?'var(--g)':n<0?'var(--r)':'var(--dim2)';return `<td style="color:${cl}">${n===0?'·':fn(n)}</td>`;}).join('')}
              <td style="color:var(--g);font-weight:800">${fn(d.inSum)}</td>
              <td style="color:var(--r);font-weight:800">${fn(d.outSum)}</td>
              <td style="color:${net>=0?'var(--g)':'var(--r)'};font-weight:900">${fn(net)}</td>
            </tr>`;
          }).join('')||`<tr><td colspan="11" style="text-align:center;color:var(--dim2);padding:14px">لا توجد حركة في آخر 7 أيام</td></tr>`}
          </tbody>
        </table>
        </div>
      </div>`:''}

      <!-- Filter presets -->
      <div class="chart-wrap" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span style="font-size:var(--fs-sm);color:var(--dim2);font-weight:800">⭐ اختصاراتي:</span>
        ${presets.length?presets.map((p,i)=>`<div style="display:inline-flex;align-items:center;gap:4px"><button class="d-btn" onclick="applyPreset(${i})">${p.name}</button><button onclick="deletePreset(${i})" style="border:none;background:none;color:var(--dim2);cursor:pointer;font-size:var(--fs-lg);padding:0 2px" title="حذف">✕</button></div>`).join(''):'<span style="font-size:var(--fs-sm);color:var(--dim2)">مفيش اختصارات محفوظة بعد</span>'}
        <button class="d-btn" onclick="savePresetPrompt()" style="border-color:rgba(0,217,126,.4);color:var(--g);background:rgba(0,217,126,.06)">💾 احفظ الحالة الحالية</button>
      </div>
    </details>`;
}

// ══ Tab 2: Designers ══
function renderDesigners(f){
  // pure aggregator في core/reports-tab-stats.js
  const {stats, topId} = buildDesignerStats(f, employees, resolveDesigner);
  if(!stats.length)return`<div class="empty-pretty"><div class="ico">🎨</div><div class="ttl">لا توجد بيانات مصممين</div><div class="sub">جرّب توسيع الفترة الزمنية أو تأكد إن المصممين معيّنين على الأوردرات وموجودين في صفحة الموظفين</div></div>`;

  return stats.map(s=>{
    const isTop=topId&&(s.emp._id===topId||s.emp.authUid===topId)&&s.done>0;
    return`<div class="rep-card" ${isTop?'style="border-color:rgba(255,215,0,.35);background:linear-gradient(135deg,rgba(255,215,0,.04),var(--bg2))"':''}>
      <div class="rep-card-head">
        <div><div class="rep-name">${isTop?'<span class="tp-crown">🏆 الأفضل</span>':''}🎨 ${s.name}</div><div class="rep-sub">${s.emp.role||'مصمم'}</div></div>
        <div style="text-align:left"><div style="font-size:20px;font-weight:900;color:var(--b)">${s.orders.length}</div><div style="font-size:var(--fs-xs);color:var(--dim2)">أوردر</div></div>
      </div>
      <div class="rep-stats">
        <div class="rep-stat"><div class="rep-stat-val" style="color:var(--g)">${s.done}</div><div class="rep-stat-lbl">أنجز</div></div>
        <div class="rep-stat"><div class="rep-stat-val" style="color:var(--y)">${s.pending}</div><div class="rep-stat-lbl">جاري</div></div>
        <div class="rep-stat"><div class="rep-stat-val" style="color:var(--b)">${s.avgDays>0?s.avgDays.toFixed(1)+'يوم':'—'}</div><div class="rep-stat-lbl">متوسط</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${s.pct}%;background:linear-gradient(90deg,var(--b),var(--p))"></div></div>
      <div style="font-size:var(--fs-sm);color:var(--dim2);margin-top:4px;text-align:left">${s.pct}% إنجاز</div>
    </div>`;
  }).join('');
}

// ══ Tab 3: Shipping ══
function renderShipping(f,prev){
  // pure aggregator في core/reports-tab-stats.js
  const s = buildShippingStats(f, prev, shippers, isDelivered);
  if(!s.companies.length)return`<div class="empty-pretty"><div class="ico">🚚</div><div class="ttl">لا توجد بيانات شحن</div><div class="sub">الأوردرات اللي وصلت مرحلة الشحن أو بعدها هتظهر هنا</div></div>`;
  return`
    <div class="kpi-grid">

function renderExpenseList(){
  const matchCat=t=>{

    if(__expFilter==='shipper')return c==='shipper_payment'||c==='shipping_settlement'||c==='shipping_expense';

window.filterRevOrders=function(filter,btn){
  __revFilter=filter;
  document.querySelectorAll('[id^="rf-"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderRevOrders();
};

function renderRevOrders(){
  // الفلتر على transactions — الكل دايماً دفعات فعلية
  let data=__revOrders;
  // فلتر بسيط على الـ category
  if(__revFilter==='paid') data=__revOrders.filter(p=>p.category==='collection'||(!p.category&&p.type==='in'));
  else if(__revFilter==='partial') data=__revOrders.filter(p=>p.category==='advance'||p.category==='deposit');
  else if(__revFilter==='pending') data=[];

  const el=document.getElementById('rev-orders-list');
  if(!data.length){el.innerHTML='<div style="text-align:center;padding:30px;color:var(--dim2)">لا توجد أوردرات</div>';return;}

  el.innerHTML=data.map(p=>{
    const amt=parseFloat(p.amount)||0;
    const dateStr=p.date||p.createdDate||'—';
    const cat={collection:'تحصيل',advance:'عربون',deposit:'عربون',in:'دفعة واردة'}[p.category||p.type]||'دفعة';
    return`<div style="background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:var(--fs-md);font-weight:800">${p.clientName||p.description||'—'}</div>
        <div style="font-size:var(--fs-xs);color:var(--dim2);margin-top:2px">${cat} · ${dateStr}</div>
        ${p.orderId?`<div style="font-size:var(--fs-xs);color:var(--b);margin-top:1px">${p.orderId}</div>`:''}
      </div>
      <div style="font-size:var(--fs-xl);font-weight:900;color:var(--g)">${fn(amt)} ج</div>
    </div>`;
  }).join('');
}

function renderCollectionByClient(orders){
  // pure aggregator في core/reports-collection-stats.js
  const list = buildCollectionByClient({orders, calcRem, isStaleOrder, isMissingCost});
  if(!list.length)return`<div class="empty-pretty"><div class="ico">👤</div><div class="ttl">لا يوجد عملاء</div></div>`;
  const totRem=list.reduce((s,c)=>s+c.rem,0);
  return`
    <div style="background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden">
      <div style="padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--line);font-size:var(--fs-sm);font-weight:800;color:var(--dim2);display:flex;justify-content:space-between">
        <span>${list.length} عميل · إجمالي الباقي ${fn(totRem)} ج</span>
        <span style="color:var(--dim2)">مرتّب حسب الباقي</span>
      </div>
      ${list.map(c=>{
        const pct=c.sale>0?Math.round(c.paid/c.sale*100):0;
        const status=c.rem<=0?{c:'var(--g)',t:'✅'}:c.paid>0?{c:'var(--y)',t:'⚡'}:{c:'var(--r)',t:'⏳'};
        const lastDays=c.lastTs?Math.floor((Date.now()-c.lastTs*1000)/86400000):0;
        const safeName=(c.name||'').replace(/'/g,"\\'");

function applyCollectionFilters(){
  const q=(__search||'').toLowerCase().trim();
  let visible=0;
  document.querySelectorAll('.col-row').forEach(r=>{
    const rem=parseFloat(r.dataset.rem)||0;
    const stage=r.dataset.stage||'';
    const hay=(r.dataset.search||'').toLowerCase();
    const stale=r.dataset.stale==='1';
    const noCost=r.dataset.nocost==='1';
    const payOk=__payFilter==='all'||(__payFilter==='rem'&&rem>0)||(__payFilter==='paid'&&rem<=0);
    const stageOk=__stageFilter==='all'
      ||(__stageFilter==='post-design'&&['printing','production','shipping'].includes(stage)&&rem>0)
      ||stage===__stageFilter;
    const flagOk=__flagFilter==='all'
      ||(__flagFilter==='stale'&&stale)
      ||(__flagFilter==='no-cost'&&noCost);
    const searchOk=!q||hay.includes(q);
    const show=payOk&&stageOk&&flagOk&&searchOk;
    r.style.display=show?'':'none';
    if(show)visible++;
  });
  const noMatch=document.getElementById('col-no-match');
  if(noMatch)noMatch.style.display=visible===0?'':'none';
  const cnt=document.getElementById('col-visible-count');
  if(cnt)cnt.textContent=visible;
  writeUrlState();
}

window.openEditOrder=async function(orderId){
  await loadWallets();

  document.getElementById('eo-client-phone').value=o.clientPhone||'';
  document.getElementById('eo-product').value=(o.products||[]).map(p=>p.name+'×'+p.qty).join(' + ')||o.product||'';
  document.getElementById('eo-deadline').value=o.deadline||'';
  document.getElementById('eo-stage').value=o.stage||'design';
  document.getElementById('eo-sale').value=o.salePrice||0;
  document.getElementById('eo-discount').value=o.discount||0;
  document.getElementById('eo-paid').value=o.totalPaid||o.paid||o.deposit||0;
  document.getElementById('eo-notes').value=o.notes||'';

  // المحافظ
  const walSel=document.getElementById('eo-wallet');
  walSel.innerHTML='<option value="">— اختر —</option>'+__wallets.map(w=>`<option value="${w._id}">${w.name}</option>`).join('');

  calcEoRemaining();
  document.getElementById('ov-edit-order').classList.add('open');
};

window.calcEoRemaining=function(){
  const sale=parseFloat(document.getElementById('eo-sale')?.value)||0;
  const disc=parseFloat(document.getElementById('eo-discount')?.value)||0;
  const paid=parseFloat(document.getElementById('eo-paid')?.value)||0;
  const rem=Math.max(0,sale-disc-paid);
  const el=document.getElementById('eo-rem-val');
  if(el)el.textContent=fn(rem)+' ج';
};

window.saveEditOrder=async function(){
  const orderId=document.getElementById('edit-order-id').value;
  if(!orderId||!__editOrderData)return;

  const newSale=parseFloat(document.getElementById('eo-sale').value)||0;
  const newDisc=parseFloat(document.getElementById('eo-discount').value)||0;
  const newPaid=parseFloat(document.getElementById('eo-paid').value)||0;
  const newWalletId=document.getElementById('eo-wallet').value;

  // H1.1 fix: المرّر عبر orderActions.editOrderPayment (atomic batch + idempotent + audit)
  const r=await orderActions.editOrderPayment({
    orderId,
    changes:{
      salePrice:newSale, discount:newDisc, totalPaid:newPaid,
      clientName:document.getElementById('eo-client-name').value,
      clientPhone:document.getElementById('eo-client-phone').value,
      product:document.getElementById('eo-product').value,
      deadline:document.getElementById('eo-deadline').value,
      stage:document.getElementById('eo-stage').value,
      notes:document.getElementById('eo-notes').value,
      depositWalletId:newWalletId, walletId:newWalletId,
    },
    walletId:newWalletId,
    walletName:__wallets.find(w=>w._id===newWalletId)?.name||'',
    changesLabel:'تعديل أوردر من التقارير',
    userId:auth.currentUser?.uid||'', userName:userName||'admin',
  });
  if(!r.ok)return toast('❌ '+(r.errors||[]).join(' · '),'err');
  if(r.idempotent&&!r.pending){
    document.getElementById('ov-edit-order').classList.remove('open');
    return toast('ℹ️ التعديل تم مسبقاً','ok');
  }
  document.getElementById('ov-edit-order').classList.remove('open');
  toast('✅ تم حفظ التعديلات في كل السيستم','ok');
};

  const o=orders.find(x=>x._id===__dOrderId);if(!o)return;
  const c=(o.costItems||[])[idx];if(!c)return;
  if(__isDrawerCostLinked(c))return toast('⚠️ هذا البند مرتبط بدفعة محفظة. عدّله من صفحة الحسابات','err');
  __dCostEditIdx=idx;
  document.getElementById('drawer-form-lbl').textContent='✏️ تعديل البند';
  document.getElementById('drawer-type').value=c.type||'';
  document.getElementById('drawer-cost-amt').value=c.total||'';
  document.getElementById('drawer-cost-note').value=c.note||'';
  const sb=document.getElementById('drawer-cost-save');
  sb.textContent='💾 حفظ التعديل';
  document.getElementById('drawer-cost-form').style.display='block';
};

window.rmDrawerCost=async function(idx){
  const o=orders.find(x=>x._id===__dOrderId);if(!o)return;
  const c=(o.costItems||[])[idx];
  if(__isDrawerCostLinked(c))return toast('⚠️ هذا البند مرتبط بدفعة محفظة. احذفه من صفحة الحسابات','err');
  if(!confirm('حذف هذا البند؟'))return;
  const items=[...(o.costItems||[])];
  items.splice(idx,1);
  // H1.1 fix: المرّر عبر orderActions.updateOrderField (modular SDK + audit trail)
  const r=await orderActions.updateOrderField({
    orderId:__dOrderId, changes:{costItems:items},
    timelineAction:'🗑️ [تقارير] حذف بند تكلفة',
    userId:auth.currentUser?.uid||'', userName:userName||'admin',
  });
  if(!r.ok)return toast('❌ '+(r.errors||[]).join(' · '),'err');
  o.costItems=items;
  __renderDrawerCostList(o);
  toast('✅ تم الحذف','ok');
};

window.saveDrawerCost=async function(){
  const type=document.getElementById('drawer-type').value.trim();
  const total=parseFloat(document.getElementById('drawer-cost-amt').value)||0;
  const note=document.getElementById('drawer-cost-note').value.trim();
  if(!type){toast('اختر نوع البند','err');return;}
  if(!total){toast('أدخل التكلفة','err');return;}
  const o=orders.find(x=>x._id===__dOrderId);if(!o)return;
  const items=[...(o.costItems||[])];
  if(__dCostEditIdx>=0&&__dCostEditIdx<items.length){
    if(__isDrawerCostLinked(items[__dCostEditIdx]))return toast('⚠️ هذا البند مرتبط بدفعة محفظة. عدّله من صفحة الحسابات','err');
  }
  const btn=document.getElementById('drawer-cost-save');
  btn.disabled=true;btn.textContent='...';
  const now=new Date().toLocaleString('ar-EG');
  const who=userName||auth.currentUser?.displayName||auth.currentUser?.email||'';
  if(__dCostEditIdx>=0&&__dCostEditIdx<items.length){
    items[__dCostEditIdx]={...items[__dCostEditIdx],type,total,note,addedBy:who,addedAt:now};
  }else{
    items.push({type,total,note,addedBy:who,addedAt:now});
  }
  // H1.1 fix: المرّر عبر orderActions.updateOrderField
  const r=await orderActions.updateOrderField({
    orderId:__dOrderId, changes:{costItems:items},
    timelineAction:__dCostEditIdx>=0?'✏️ [تقارير] تعديل بند تكلفة':'＋ [تقارير] إضافة بند تكلفة',
    userId:auth.currentUser?.uid||'', userName:userName||'admin',
  });
  btn.disabled=false;btn.textContent=__dCostEditIdx>=0?'💾 حفظ التعديل':'＋ إضافة';
  if(!r.ok)return toast('❌ '+(r.errors||[]).join(' · '),'err');
  o.costItems=items;
  __renderDrawerCostList(o);
  __drawerHideCostForm();
  toast('✅ تم الحفظ','ok');
};

window.exportExcel=function(){
  const range=getRange(filterMode);
  const f=orders.filter(o=>inRange(o,range));
  const rows=[['الأوردر','العميل','التليفون','المرحلة','السعر','المدفوع','الباقي','التاريخ'],...f.map(o=>[o.orderId||o._id.slice(-6),o.clientName||'—',o.clientPhone||'—',o.stage||'—',o.salePrice||0,o.totalPaid||o.paid||0,o.remaining||0,o.createdDate||'—'])];
  const escCell=v=>{const s=String(v===null||v===undefined?'':v);return/[,"\n\r]/.test(s)?`"${s.replace(/"/g,'""')}"`:`${s}`;};
  const csv=rows.map(r=>r.map(escCell).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`تقرير_${new Date().toLocaleDateString('ar-EG')}.csv`;a.click();
  toast('✅ تم التصدير','ok');
};
</script>
