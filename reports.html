<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Business2Card — التقارير</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="sync-monitor.js"></script>
<style>
/* ══ Tabs ══ */
.rep-tabs{display:flex;gap:0;border-bottom:2px solid var(--line);margin-bottom:20px;overflow-x:auto;scrollbar-width:none}
.rep-tabs::-webkit-scrollbar{display:none}
.rep-tab{padding:10px 18px;border:none;background:none;color:var(--dim2);font-size:13px;font-weight:700;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;font-family:inherit;white-space:nowrap;transition:var(--trans)}
.rep-tab.active{color:var(--r);border-bottom-color:var(--r)}

/* ══ فلتر التاريخ ══ */
.date-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.d-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--line);background:var(--bg2);font-size:12px;font-weight:700;color:var(--dim2);cursor:pointer;font-family:inherit;transition:var(--trans)}
.d-btn.active{background:rgba(255,61,110,.12);color:var(--r);border-color:rgba(255,61,110,.3)}

/* ══ KPI Cards ══ */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
@media(min-width:640px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi-box{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:16px}
.kpi-val{font-size:20px;font-weight:900;margin-bottom:2px}
.kpi-lbl{font-size:11px;color:var(--dim2);font-weight:700}
.kpi-diff{font-size:11px;font-weight:800;margin-top:4px}
.kpi-diff.up{color:var(--g)}.kpi-diff.down{color:var(--r)}.kpi-diff.same{color:var(--dim2)}

/* ══ Chart ══ */
.chart-wrap{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px}
.chart-title{font-size:12px;font-weight:800;color:var(--dim2);margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:12px;font-weight:700;min-width:70px;text-align:right;color:var(--snow)}
.bar-track{flex:1;height:28px;background:var(--bg3);border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;transition:width .4s ease;display:flex;align-items:center;padding-right:8px;justify-content:flex-end}
.bar-val{font-size:11px;font-weight:800;color:#fff;white-space:nowrap}

/* ══ Cards ══ */
.rep-card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:10px}
.rep-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.rep-name{font-size:15px;font-weight:800}
.rep-sub{font-size:11px;color:var(--dim2);margin-top:2px}
.rep-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.rep-stat{background:var(--bg3);border-radius:8px;padding:8px;text-align:center}
.rep-stat-val{font-size:15px;font-weight:900;margin-bottom:1px}
.rep-stat-lbl{font-size:10px;color:var(--dim2);font-weight:700}
.stars{color:var(--y);font-size:14px;letter-spacing:1px}

/* ══ Alert ══ */
.alert-box{background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.25);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:12px;font-weight:700;color:var(--y)}

/* ══ Progress ══ */
.progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}

/* ══ Compare ══ */
.compare-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.compare-row:last-child{border-bottom:none}

/* ══ Tab badges ══ */
.rep-tab{position:relative}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--r);color:#fff;font-size:10px;font-weight:900;margin-right:5px;line-height:1}
.tab-badge.warn{background:var(--y);color:#000}
.tab-badge.dim{background:var(--bg3);color:var(--dim2)}

/* ══ Sticky filters ══ */
.sticky-filters{position:sticky;top:56px;z-index:50;background:var(--bg1);padding:10px 0;margin:-10px 0 12px;border-bottom:1px solid var(--line)}
@media(max-width:639px){.sticky-filters{top:52px}}

/* ══ KPI animations ══ */
.kpi-val{transition:color .25s ease;will-change:contents}
.kpi-box{transition:transform .15s ease,border-color .15s ease}
.kpi-box.clickable{cursor:pointer}
.kpi-box.clickable:hover{transform:translateY(-1px);border-color:var(--line2)}

/* ══ Search input ══ */
.search-wrap{position:relative;flex:1;min-width:200px}
.search-input{width:100%;padding:8px 36px 8px 12px;border-radius:10px;border:1.5px solid var(--line);background:var(--bg2);color:var(--snow);font-size:13px;font-family:inherit;transition:var(--trans)}
.search-input:focus{outline:none;border-color:var(--r);background:var(--bg1)}
.search-input::placeholder{color:var(--dim2)}
.search-clear{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:var(--bg3);border:none;color:var(--dim2);cursor:pointer;font-size:14px;display:none;align-items:center;justify-content:center;font-family:inherit}
.search-clear.show{display:flex}

/* ══ Sort headers ══ */
.col-head-cell{cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px;justify-content:center;transition:color .15s}
.col-head-cell:hover{color:var(--snow)}
.col-head-cell.active{color:var(--r)}
.col-head-cell .sort-arrow{font-size:10px;opacity:.6}
.col-head-cell.active .sort-arrow{opacity:1}

/* ══ Empty state ══ */
.empty-pretty{padding:40px 20px;text-align:center;background:var(--bg2);border:1px dashed var(--line);border-radius:14px}
.empty-pretty .ico{font-size:42px;margin-bottom:8px;opacity:.6}
.empty-pretty .ttl{font-size:14px;font-weight:800;margin-bottom:4px}
.empty-pretty .sub{font-size:11px;color:var(--dim2)}

/* ══ Sparkline ══ */
.sparkline{display:inline-flex;gap:2px;align-items:flex-end;height:18px;margin-top:4px}
.sparkline span{display:block;width:4px;background:var(--r);border-radius:1px;opacity:.7;transition:height .3s ease}

/* ══ Collection: mobile cards ══ */
.col-grid-head,.col-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 60px 44px;gap:6px;padding:10px 14px;align-items:center}
.col-row{border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
.col-row:hover{background:rgba(255,255,255,.02)}
.col-cell-mobile-label{display:none}
@media(max-width:720px){
  .col-grid-head{display:none}
  .col-row{grid-template-columns:1fr;gap:8px;padding:14px}
  .col-row > div{text-align:right!important}
  .col-row .col-cell{display:flex;justify-content:space-between;align-items:center;font-size:12px}
  .col-row .col-cell .col-cell-mobile-label{display:inline;color:var(--dim2);font-size:11px;font-weight:700}
  .col-row .col-actions{display:flex;gap:6px;justify-content:flex-end;flex-direction:row}
  .col-row .col-actions button{margin-top:0!important;flex:0 0 auto}
}

/* ══ Keyboard hint ══ */
.kbd{display:inline-block;padding:1px 5px;border-radius:4px;background:var(--bg3);border:1px solid var(--line);font-size:10px;font-family:monospace;color:var(--dim2)}

/* ══ Counter animation ══ */
@keyframes countPop{0%{transform:scale(.95);opacity:.5}50%{transform:scale(1.02)}100%{transform:scale(1);opacity:1}}
.kpi-val.counting{animation:countPop .35s ease}

/* ══ Reduce motion ══ */
@media (prefers-reduced-motion:reduce){
  .kpi-val.counting{animation:none}
  .col-row,.kpi-box,.search-input{transition:none}
}
</style>
<script src="financial-guard.js"></script>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">ERP</div></div></div>
  <div class="nav-scroll" id="nav-scroll-dynamic"><div style="padding:20px;text-align:center;color:var(--dim2)">⏳</div></div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">A</div><div><div class="nav-user-name" id="nav-name">User</div><div class="nav-user-role">تسجيل خروج</div></div></div></div>
</aside>
<div class="nav-ov" id="nav-ov" onclick="closeNav()"></div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div><h1>📊 التقارير والأداء</h1><p id="rep-sub" style="font-size:12px;color:var(--dim2)">جاري التحميل...</p></div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost btn-sm" onclick="exportExcel()">📥 تصدير</button>
    </div>
  </div>

  <div class="content">
    <div class="sticky-filters">
      <!-- فلتر التاريخ -->
      <div class="date-bar">
        <button class="d-btn" onclick="setFilter('today',this)">اليوم</button>
        <button class="d-btn" onclick="setFilter('week',this)">هذا الأسبوع</button>
        <button class="d-btn active" id="btn-month" onclick="setFilter('month',this)">هذا الشهر</button>
        <button class="d-btn" onclick="setFilter('last3',this)">3 شهور</button>
        <button class="d-btn" onclick="setFilter('year',this)">هذا العام</button>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <input type="date" id="date-from" class="inp" style="padding:6px 10px;font-size:12px;width:130px">
          <span style="color:var(--dim2);font-size:12px">إلى</span>
          <input type="date" id="date-to" class="inp" style="padding:6px 10px;font-size:12px;width:130px">
          <button class="d-btn" onclick="setFilter('custom',this)">تطبيق</button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="rep-tabs" style="margin-bottom:0">
        <button class="rep-tab active" data-tab="overview" onclick="switchTab('overview',this)">📊 نظرة عامة <span class="tab-badge dim" data-badge="overview" style="display:none"></span></button>
        <button class="rep-tab" data-tab="designers" onclick="switchTab('designers',this)">🎨 المصممين <span class="tab-badge dim" data-badge="designers" style="display:none"></span></button>
        <button class="rep-tab" data-tab="shipping" onclick="switchTab('shipping',this)">🚚 الشحن <span class="tab-badge warn" data-badge="shipping" style="display:none"></span></button>
        <button class="rep-tab" data-tab="clients" onclick="switchTab('clients',this)">👥 العملاء <span class="tab-badge dim" data-badge="clients" style="display:none"></span></button>
        <button class="rep-tab" data-tab="sales" onclick="switchTab('sales',this)">💰 المبيعات <span class="tab-badge dim" data-badge="sales" style="display:none"></span></button>
        <button class="rep-tab" data-tab="collection" onclick="switchTab('collection',this)">📋 جرد التحصيل <span class="tab-badge" data-badge="collection" style="display:none"></span></button>
      </div>
    </div>

    <!-- Content -->
    <div id="rep-content"></div>
  </div>
</div>

<!-- Drawer: تفاصيل الإيرادات -->
<div id="rev-drawer-ov" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)" onclick="if(event.target===this)closeRevDrawer()">
  <div id="rev-drawer" style="position:absolute;left:0;top:0;bottom:0;width:420px;max-width:100%;background:var(--bg1);overflow-y:auto;border-left:1px solid var(--line)">
    <div style="padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg1);z-index:10">
      <div>
        <div style="font-size:17px;font-weight:800">💰 تفاصيل الإيرادات</div>
        <div id="rev-drawer-sub" style="font-size:12px;color:var(--dim2);margin-top:2px"></div>
      </div>
      <button onclick="closeRevDrawer()" style="width:36px;height:36px;border-radius:50%;background:var(--bg3);border:none;color:var(--snow);font-size:18px;cursor:pointer">✕</button>
    </div>
    <!-- ملخص سريع -->
    <div id="rev-summary" style="padding:16px 20px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr);gap:8px"></div>
    <!-- فلتر -->
    <div style="padding:10px 20px;border-bottom:1px solid var(--line);display:flex;gap:8px">
      <button class="d-btn active" id="rf-all" onclick="filterRevOrders('all',this)">الكل</button>
      <button class="d-btn" id="rf-paid" onclick="filterRevOrders('paid',this)">💰 تحصيل</button>
      <button class="d-btn" id="rf-partial" onclick="filterRevOrders('partial',this)">💳 عربون</button>
    </div>
    <div id="rev-orders-list" style="padding:12px 20px"></div>
  </div>
</div>

<!-- Drawer: تفاصيل الأوردر -->
<div id="ord-drawer-ov" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)" onclick="if(event.target===this)closeOrdDrawer()">
  <div id="ord-drawer" style="position:absolute;right:0;top:0;bottom:0;width:460px;max-width:100%;background:var(--bg1);overflow-y:auto;border-left:1px solid var(--line)">
    <div style="padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg1);z-index:10">
      <div id="ord-drawer-hdr"></div>
      <button onclick="closeOrdDrawer()" style="width:36px;height:36px;border-radius:50%;background:var(--bg3);border:none;color:var(--snow);font-size:18px;cursor:pointer;flex-shrink:0">✕</button>
    </div>
    <div id="ord-drawer-body" style="padding:16px 20px"></div>
  </div>
</div>

<!-- Modal: تعديل الأوردر الكامل -->
<div class="overlay" id="ov-edit-order">
  <div class="modal" style="max-width:520px">
    <div class="modal-head">
      <span class="modal-title">✏️ تعديل الأوردر</span>
      <button class="modal-x" onclick="document.getElementById('ov-edit-order').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-order-id">
      
      <!-- بيانات العميل -->
      <div style="font-size:11px;font-weight:800;color:var(--dim2);margin-bottom:8px">👤 بيانات العميل</div>
      <div class="g2">
        <div class="fg"><label>اسم العميل</label><input class="inp" id="eo-client-name" placeholder="اسم العميل"></div>
        <div class="fg"><label>التليفون</label><input class="inp" id="eo-client-phone" type="tel" placeholder="01xxxxxxxxx"></div>
      </div>

      <!-- بيانات الأوردر -->
      <div style="font-size:11px;font-weight:800;color:var(--dim2);margin:12px 0 8px">📦 بيانات الأوردر</div>
      <div class="fg"><label>المنتجات</label><input class="inp" id="eo-product" placeholder="كارت شخصي × 1000"></div>
      <div class="g2">
        <div class="fg"><label>موعد التسليم</label><input class="inp" id="eo-deadline" type="date"></div>
        <div class="fg"><label>المرحلة</label>
          <select class="inp" id="eo-stage">
            <option value="design">✏️ تصميم</option>
            <option value="printing">🖨️ طباعة</option>
            <option value="production">🏭 تنفيذ</option>
            <option value="shipping">🚚 شحن</option>
            <option value="archived">📁 أرشيف</option>
          </select>
        </div>
      </div>

      <!-- المالية -->
      <div style="font-size:11px;font-weight:800;color:var(--dim2);margin:12px 0 8px">💰 المالية</div>
      <div class="g2">
        <div class="fg"><label>السعر الكلي (ج)</label><input class="inp" id="eo-sale" type="number" placeholder="0" oninput="calcEoRemaining()"></div>
        <div class="fg"><label>الخصم (ج)</label><input class="inp" id="eo-discount" type="number" placeholder="0" oninput="calcEoRemaining()"></div>
      </div>
      <div class="g2">
        <div class="fg"><label>المحصّل (ج)</label><input class="inp" id="eo-paid" type="number" placeholder="0" oninput="calcEoRemaining()"></div>
        <div class="fg"><label>المحفظة</label>
          <select class="inp" id="eo-wallet">
            <option value="">— اختر —</option>
          </select>
        </div>
      </div>
      <div id="eo-remaining-preview" style="background:var(--bg3);border-radius:8px;padding:10px;font-size:12px;margin-top:4px;display:flex;justify-content:space-between">
        <span style="color:var(--dim2)">الباقي</span>
        <span id="eo-rem-val" style="font-weight:900;color:var(--r)">0 ج</span>
      </div>

      <!-- ملاحظات -->
      <div class="fg" style="margin-top:12px">
        <label>ملاحظات</label>
        <textarea class="inp" id="eo-notes" rows="2" placeholder="ملاحظات..."></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="document.getElementById('ov-edit-order').classList.remove('open')">إلغاء</button>
      <button class="btn btn-b" onclick="saveEditOrder()">✓ حفظ التعديلات</button>
    </div>
  </div>
</div>

<div id="toasts" class="toasts"></div>

<script type="module">
// ══ Sidebar ══
const SBPAGES=[{file:'index.html',label:'لوحة التحكم',ico:'⬡',adminOnly:true},{file:'clients.html',label:'العملاء',ico:'👤',perm:'clients'},{file:'design.html',label:'التصميم',ico:'✏️',perm:'design'},{file:'print.html',label:'الطباعة',ico:'🖨️',perm:'print'},{file:'production.html',label:'التنفيذ',ico:'🏭',perm:'production'},{file:'shipping.html',label:'الشحن',ico:'🚚',perm:'shipping'},{file:'shipping-accounts.html',label:'حسابات الشحن',ico:'📦',perm:'shipping-accounts'},{file:'archive.html',label:'الأرشيف',ico:'📁',perm:'archive'},{file:'accounts.html',label:'الحسابات',ico:'💰',perm:'accounts'},{file:'suppliers.html',label:'الموردين',ico:'▣',perm:'suppliers'},{file:'products.html',label:'المنتجات',ico:'◈',perm:'products'},{file:'employees.html',label:'الموظفين',ico:'👥',adminOnly:true},{file:'reports.html',label:'التقارير',ico:'📊',perm:'reports'},{file:'design-workspace.html',label:'مساحة التصميم',ico:'🖥️',group:'orders',perm:'design'},{file:'client-login.html',label:'بوابة العميل',ico:'🔗',group:'main',public:true},{file:'gallery.html',label:'المعرض',ico:'🖼️',group:'main',public:true},{file:'settings.html',label:'الإعدادات',ico:'⚙️',adminOnly:true}];
const RMAP={admin:'index.html',operation_manager:'ops-dashboard.html',customer_service:'cs-dashboard.html',graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'};
function buildSidebar(ud,cur){const role=ud?.role||'customer_service';const pages=(ud?.permissions?.pages)||[];const isAdm=['admin','operation_manager'].includes(role);const nav=document.getElementById('nav-scroll-dynamic');if(!nav)return;let html=`<a class="nav-link${cur===RMAP[role]?' active':''}" href="${RMAP[role]||'index.html'}"><span class="nav-ico">⬡</span> ${isAdm?'لوحة التحكم':'داشبوردي'}</a>`;for(const p of SBPAGES){if(p.file==='index.html')continue;const ok=isAdm||(p.adminOnly?false:pages.includes('*')||pages.includes(p.perm||''));if(!ok)continue;html+=`<a class="nav-link${cur===p.file?' active':''}" href="${p.file}"><span class="nav-ico">${p.ico}</span> ${p.label}</a>`;}nav.innerHTML=html;}

import {initializeApp} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getAuth,onAuthStateChanged,signOut} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {getFirestore,collection,doc,onSnapshot,getDoc,getDocs,deleteDoc,updateDoc,addDoc,query,where,serverTimestamp,increment,writeBatch} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { addLedgerToBatch, FE } from "./financial-sync-engine.js";

const app=initializeApp({apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"});
const auth=getAuth(app),db=getFirestore(app);

let orders=[],clients=[],employees=[],suppliers=[],shippers=[],payments=[],transactions=[],wallets=[];
let currentTab='overview',dateFrom=null,dateTo=null,filterMode='month';
let userName='';
let __renderTimer=null;
const __loaded={orders:false,clients:false,employees:false,suppliers:false,shippers:false,payments:false,transactions:false};
function scheduleRender(){if(__renderTimer)clearTimeout(__renderTimer);__renderTimer=setTimeout(render,80);}
const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');

// ══ Collection state (search/sort/filters) ══
let __search='',__sortKey='date',__sortDir='desc',__payFilter='all',__stageFilter='all';
const __debouncers={};
function debounce(key,fn,ms){if(__debouncers[key])clearTimeout(__debouncers[key]);__debouncers[key]=setTimeout(fn,ms);}

// ══ URL state (tab + filters) ══
function readUrlState(){
  try{
    const h=new URLSearchParams(location.hash.slice(1));
    if(h.get('tab'))currentTab=h.get('tab');
    if(h.get('range'))filterMode=h.get('range');
    if(h.get('q'))__search=h.get('q');
    if(h.get('pay'))__payFilter=h.get('pay');
    if(h.get('stage'))__stageFilter=h.get('stage');
    if(h.get('sort'))__sortKey=h.get('sort');
    if(h.get('dir'))__sortDir=h.get('dir');
  }catch(e){}
}
function writeUrlState(){
  const p=new URLSearchParams();
  if(currentTab&&currentTab!=='overview')p.set('tab',currentTab);
  if(filterMode&&filterMode!=='month')p.set('range',filterMode);
  if(__search)p.set('q',__search);
  if(__payFilter&&__payFilter!=='all')p.set('pay',__payFilter);
  if(__stageFilter&&__stageFilter!=='all')p.set('stage',__stageFilter);
  if(__sortKey&&__sortKey!=='date')p.set('sort',__sortKey);
  if(__sortDir&&__sortDir!=='desc')p.set('dir',__sortDir);
  const s=p.toString();
  history.replaceState(null,'',s?'#'+s:location.pathname+location.search);
}

// ══ Counter animation ══
function animateCounter(el,target,suffix=''){
  if(!el)return;
  const reduce=window.matchMedia&&matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(reduce){el.textContent=fn(target)+suffix;return;}
  const start=parseFloat((el.dataset.val||'0'))||0;
  const dur=420;const t0=performance.now();
  el.classList.add('counting');
  const step=t=>{
    const p=Math.min(1,(t-t0)/dur);
    const eased=1-Math.pow(1-p,3);
    const val=start+(target-start)*eased;
    el.textContent=fn(Math.round(val))+suffix;
    if(p<1)requestAnimationFrame(step);
    else{el.dataset.val=target;el.classList.remove('counting');}
  };
  requestAnimationFrame(step);
}
function applyCounters(root){
  (root||document).querySelectorAll('[data-counter]').forEach(el=>{
    const target=parseFloat(el.dataset.counter)||0;
    const suffix=el.dataset.suffix||'';
    animateCounter(el,target,suffix);
  });
}

// ══ Sparkline ══
function sparkline(values,color='var(--r)'){
  if(!values||!values.length)return'';
  const max=Math.max(...values,1);
  return`<div class="sparkline">${values.map(v=>`<span style="height:${Math.max(2,(v/max)*100)}%;background:${color}"></span>`).join('')}</div>`;
}
const calcRem=o=>{if(o.paymentStatus==='returned'||o.shipStage==='returned')return 0;const f=parseFloat(o.customerShipFee)||0;return Math.max(0,(parseFloat(o.salePrice)||0)+f-(parseFloat(o.discount)||0)-(parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0));};
const setText=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};

function toast(msg,t=''){const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}
window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};

// ══ Date Filter ══
function getRange(mode){
  const now=new Date();const y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
  if(mode==='today') return{from:new Date(y,m,d),to:new Date(y,m,d,23,59,59)};
  if(mode==='week'){const dow=now.getDay();const mon=new Date(y,m,d-((dow+6)%7));return{from:mon,to:new Date(mon.getTime()+6*86400000+86399999)};}
  if(mode==='month') return{from:new Date(y,m,1),to:new Date(y,m+1,0,23,59,59)};
  if(mode==='last3') return{from:new Date(y,m-3,1),to:new Date(y,m+1,0,23,59,59)};
  if(mode==='year') return{from:new Date(y,0,1),to:new Date(y,11,31,23,59,59)};
  if(mode==='custom'&&dateFrom&&dateTo) return{from:new Date(dateFrom),to:new Date(dateTo+'T23:59:59')};
  return{from:new Date(y,m,1),to:new Date(y,m+1,0,23,59,59)};
}
function getPrevRange(mode){
  const now=new Date();const y=now.getFullYear(),m=now.getMonth();
  if(mode==='month') return{from:new Date(y,m-1,1),to:new Date(y,m,0,23,59,59)};
  if(mode==='year') return{from:new Date(y-1,0,1),to:new Date(y-1,11,31,23,59,59)};
  const r=getRange(mode);const diff=r.to-r.from;return{from:new Date(r.from-diff),to:new Date(r.from-1)};
}
function inRange(o,range){
  const sec=o.createdAt?.seconds||0;if(!sec)return false;
  const d=new Date(sec*1000);return d>=range.from&&d<=range.to;
}

window.setFilter=function(mode,btn){
  if(mode==='custom'){dateFrom=document.getElementById('date-from').value;dateTo=document.getElementById('date-to').value;if(!dateFrom||!dateTo)return toast('⚠️ اختر التواريخ','err');}
  filterMode=mode;
  document.querySelectorAll('.date-bar .d-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  else{const t=Array.from(document.querySelectorAll('.date-bar .d-btn')).find(b=>(b.getAttribute('onclick')||'').includes(`'${mode}'`));if(t)t.classList.add('active');}
  writeUrlState();
  render();
};

// ══ Tabs ══
window.switchTab=function(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.rep-tab').forEach(b=>b.classList.remove('active'));
  const target=btn||document.querySelector(`.rep-tab[data-tab="${tab}"]`);
  if(target)target.classList.add('active');
  writeUrlState();
  render();
};

// ══ Tab badges ══
function updateTabBadges(){
  if(!__loaded.orders)return;
  const range=getRange(filterMode);
  const filtered=orders.filter(o=>inRange(o,range));
  const set=(tab,n,visible=true)=>{
    const el=document.querySelector(`[data-badge="${tab}"]`);
    if(!el)return;
    if(visible&&n>0){el.textContent=n>99?'99+':String(n);el.style.display='';}
    else el.style.display='none';
  };
  // collection: critical post-design count
  const critical=filtered.filter(o=>parseFloat(o.salePrice)>0&&['printing','production','shipping'].includes(o.stage)&&calcRem(o)>0).length;
  set('collection',critical);
  // shipping: returned count
  const returned=filtered.filter(o=>['returned_refused','returned'].includes(o.shippingStatus)).length;
  set('shipping',returned);
  // overview: late count (global, not date-filtered)
  const late=orders.filter(o=>o.deadline&&new Date(o.deadline)<new Date()&&!['archived','shipping'].includes(o.stage)).length;
  set('overview',late);
}

  onSnapshot(collection(db,'employees'),s=>{employees=s.docs.map(d=>({...d.data(),_id:d.id}));__loaded.employees=true;scheduleRender();});
  onSnapshot(collection(db,'suppliers_v2'),s=>{suppliers=s.docs.map(d=>({...d.data(),_id:d.id}));__loaded.suppliers=true;scheduleRender();});
  onSnapshot(collection(db,'shippers_v2'),s=>{shippers=s.docs.map(d=>({...d.data(),_id:d.id}));__loaded.shippers=true;scheduleRender();});
  onSnapshot(collection(db,'supplier_payments'),s=>{payments=s.docs.map(d=>({...d.data(),_id:d.id}));__loaded.payments=true;scheduleRender();});
  onSnapshot(collection(db,'wallets'),s=>{wallets=s.docs.map(d=>({...d.data(),_id:d.id}));});
  onSnapshot(collection(db,'transactions_v2'),s=>{transactions=s.docs.map(d=>({...d.data(),_id:d.id}));__loaded.transactions=true;scheduleRender();});
  // ابدأ بقراءة الـ URL state بعد ما الـ auth ينجح
  readUrlState();
  // طبّق active class على الـ tab/date button المختارين من URL
  document.querySelectorAll('.rep-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===currentTab));
  document.querySelectorAll('.date-bar .d-btn').forEach(b=>{
    const m=(b.getAttribute('onclick')||'').match(/setFilter\('(\w+)'/);
    b.classList.toggle('active',m&&m[1]===filterMode);
  });
});

// ══ Keyboard shortcuts ══
const __TABS=['overview','designers','shipping','clients','sales','collection'];
window.addEventListener('keydown',e=>{
  // تجاهل لو المستخدم بيكتب في input/textarea
  const tag=(e.target?.tagName||'').toLowerCase();
  const inField=tag==='input'||tag==='textarea'||tag==='select'||e.target?.isContentEditable;
  // ESC: اقفل drawers/modals
  if(e.key==='Escape'){
    const ov1=document.getElementById('rev-drawer-ov');if(ov1?.style.display==='block'){closeRevDrawer();return;}
    const ov2=document.getElementById('ord-drawer-ov');if(ov2?.style.display==='block'){closeOrdDrawer();return;}
    const ov3=document.getElementById('ov-edit-order');if(ov3?.classList.contains('open')){ov3.classList.remove('open');return;}
    const ov5=document.getElementById('ov-del-order');if(ov5?.style.display==='flex'){ov5.style.display='none';return;}
    if(inField&&e.target.id==='col-search'){colSearchClear();e.target.blur();return;}
  }
  if(inField)return;
  // 1-6: switch tab
  if(/^[1-6]$/.test(e.key)){
    const tab=__TABS[parseInt(e.key,10)-1];
    if(tab){switchTab(tab);e.preventDefault();}
    return;
  }
  // / : focus search (لو موجود)
  if(e.key==='/'){
    const inp=document.getElementById('col-search');
    if(inp){inp.focus();inp.select();e.preventDefault();}
    else if(currentTab!=='collection'){switchTab('collection');setTimeout(()=>{const i=document.getElementById('col-search');if(i)i.focus();},120);e.preventDefault();}
  }
});

// ══ Render ══
function renderSkeleton(){
  return `
    <div class="kpi-grid">
      ${[1,2,3,4].map(()=>`<div class="kpi-box" style="opacity:.5"><div class="kpi-val" style="background:var(--bg3);height:24px;border-radius:6px;margin-bottom:6px"></div><div class="kpi-lbl" style="background:var(--bg3);height:11px;border-radius:4px;width:60%"></div></div>`).join('')}
    </div>
    <div class="chart-wrap" style="opacity:.5">
      <div class="chart-title" style="background:var(--bg3);height:12px;border-radius:4px;width:140px"></div>
      ${[1,2,3,4,5,6].map(()=>`<div class="bar-row"><div style="height:14px;width:60px;background:var(--bg3);border-radius:4px"></div><div class="bar-track"></div></div>`).join('')}
    </div>`;
}

function render(){
  const el=document.getElementById('rep-content');if(!el)return;
  if(!__loaded.orders||!__loaded.transactions){el.innerHTML=renderSkeleton();setText('rep-sub','جاري التحميل...');return;}
  const range=getRange(filterMode);
  const prev=getPrevRange(filterMode);
  const filtered=orders.filter(o=>inRange(o,range));
  const prevFiltered=orders.filter(o=>inRange(o,prev));
  setText('rep-sub',`${filtered.length} أوردر في الفترة المحددة`);
  if(currentTab==='overview') el.innerHTML=renderOverview(filtered,prevFiltered,range);
  else if(currentTab==='designers') el.innerHTML=renderDesigners(filtered);
  else if(currentTab==='shipping') el.innerHTML=renderShipping(filtered,prevFiltered);
  else if(currentTab==='clients') el.innerHTML=renderClients(filtered);
  else if(currentTab==='sales') el.innerHTML=renderSales(filtered,prevFiltered);
  else if(currentTab==='collection'){
    el.innerHTML=renderCollection(filtered);
    // أعد تطبيق الفلاتر بعد render (للحفاظ على state بعد sort)
    requestAnimationFrame(()=>applyCollectionFilters());
  }
  updateTabBadges();
  // animate counters في كل KPI فيه data-counter
  requestAnimationFrame(()=>applyCounters(el));
}

// ══ Helpers ══
function diff(cur,prev){
  if(!prev)return'';
  const pct=Math.round((cur-prev)/Math.max(prev,1)*100);
  const cls=pct>0?'up':pct<0?'down':'same';
  const arrow=pct>0?'↑':pct<0?'↓':'→';
  return`<div class="kpi-diff ${cls}">${arrow} ${Math.abs(pct)}% مقارنة بالسابق</div>`;
}
function kpi(val,lbl,color,prevVal,counterTarget,counterSuffix){
  // لو fed counterTarget رقمي → نعرض 0 ابتدائياً ونحرك بـ data-counter
  const inner=counterTarget!=null
    ?`<span data-counter="${counterTarget}"${counterSuffix?` data-suffix="${counterSuffix}"`:''}>${val}</span>`
    :val;
  return`<div class="kpi-box"><div class="kpi-val" style="color:${color}">${inner}</div><div class="kpi-lbl">${lbl}</div>${prevVal!==undefined?diff(parseFloat(String(val).replace(/[^0-9.\-]/g,'')),prevVal):''}</div>`;
}
function bar(label,val,max,color='var(--r)',suffix=''){
  const pct=max>0?Math.round(val/max*100):0;
  return`<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"><span class="bar-val">${fn(val)}${suffix}</span></div></div></div>`;
}
function monthlyChart(){
  // الإيرادات = الكاش الفعلي من transactions_v2 (نفس مصدر KPI الرئيسي)
  const months={};
  transactions.forEach(t=>{
    if(t.type!=='in'&&!['collection','advance','deposit'].includes(t.category))return;
    if(!t.createdAt?.seconds)return;
    const d=new Date(t.createdAt.seconds*1000);
    const k=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');
    if(!months[k])months[k]={rev:0,count:0};
    months[k].rev+=(parseFloat(t.amount)||0);
    months[k].count++;
  });
  const keys=Object.keys(months).sort().slice(-6);
  if(!keys.length)return`<div class="chart-wrap"><div class="chart-title">📈 الإيرادات - آخر 6 شهور</div><div style="text-align:center;padding:14px;color:var(--dim2);font-size:12px">لا توجد بيانات تحصيل</div></div>`;
  const maxRev=Math.max(...keys.map(k=>months[k].rev),1);
  return`<div class="chart-wrap"><div class="chart-title">📈 الإيرادات الفعلية - آخر 6 شهور</div>${keys.map(k=>bar(k.slice(5)+'/'+k.slice(0,4),months[k].rev,maxRev,'linear-gradient(90deg,var(--r),var(--p))',' ج')).join('')}</div>`;
}

// ══ Tab 1: Overview ══
function renderOverview(f,prev){
  // ══ الإيرادات = الكاش الفعلي من transactions_v2 ══
  const range=getRange(filterMode);
  const prev2=getPrevRange(filterMode);
  
  // المحصّل فعلاً في الفترة (من transactions_v2)
  const inTx=transactions.filter(p=>{
    if(p.type!=='in'&&p.category!=='collection'&&p.category!=='advance'&&p.category!=='deposit')return false;
    if(!p.createdAt?.seconds)return false;
    const d=new Date(p.createdAt.seconds*1000);
    return d>=range.from&&d<=range.to;
  });
  const tot=inTx.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);

  // المحصّل في الفترة السابقة
  const prevInTx=transactions.filter(p=>{
    if(p.type!=='in'&&p.category!=='collection'&&p.category!=='advance'&&p.category!=='deposit')return false;
    if(!p.createdAt?.seconds)return false;
    const d=new Date(p.createdAt.seconds*1000);
    return d>=prev2.from&&d<=prev2.to;
  });
  const pTot=prevInTx.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);

  // قيمة الأوردرات (مش الإيرادات — للمرجع بس)
  const ordersTotal=f.reduce((s,o)=>s+(parseFloat(o.salePrice)||0),0);
  
  // الباقي على العملاء
  const rem=f.reduce((s,o)=>s+calcRem(o),0);
  // الباقي الحرج: العميل وافق على التصميم ودخل طباعة/تنفيذ/شحن (المنتج اتصرف عليه فلوس)
  const remCritical=f.filter(o=>['printing','production','shipping'].includes(o.stage)).reduce((s,o)=>s+calcRem(o),0);
  
  // المصروفات الفعلية = كل transactions type='out' في الفترة (موردين + شحن + مرتجعات + غيرها)
  const inRange2=(t,r)=>t.createdAt?.seconds&&new Date(t.createdAt.seconds*1000)>=r.from&&new Date(t.createdAt.seconds*1000)<=r.to;
  const costs=transactions.filter(t=>t.type==='out'&&inRange2(t,range)).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const supDue=suppliers.reduce((s,sup)=>{const p=payments.filter(x=>x.supplierId===sup._id).reduce((ps,x)=>ps+(parseFloat(x.amount)||0),0);const pur=orders.reduce((os,o)=>os+(o.costItems||[]).filter(c2=>c2.supplierId===sup._id).reduce((cs,c2)=>cs+(parseFloat(c2.total)||0),0),0);return s+Math.max(0,pur-p);},0);

  // الربح = الكاش الفعلي - المصروفات الفعلية
  const profit=tot-costs;
  const pCol=pTot;
  const pCosts=transactions.filter(t=>t.type==='out'&&inRange2(t,prev2)).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const pProfit=pTot-pCosts;

  const late=orders.filter(o=>o.deadline&&new Date(o.deadline)<new Date()&&!['archived','shipping'].includes(o.stage));

  return`
    <!-- تنبيهات -->
    ${late.length?`<div class="alert-box">⚠️ ${late.length} أوردرات متأخرة عن موعد التسليم</div>`:''}
    ${supDue>0?`<div class="alert-box">⚠️ مستحق للموردين: ${fn(supDue)} ج</div>`:''}

    <!-- KPIs -->
    <div class="kpi-grid">
      <div onclick="openRevDrawer()" style="cursor:pointer;transform:scale(1);transition:transform .15s" onmouseover="this.style.transform='scale(1.02)'" onmouseleave="this.style.transform='scale(1)'">
        ${kpi(fn(tot)+' ج','محصّل فعلاً ↗','var(--g)',pTot,tot,' ج')}
      </div>
      ${kpi(fn(ordersTotal)+' ج','قيمة الأوردرات','var(--b)',undefined,ordersTotal,' ج')}
      <div onclick="goCollectionPostDesign()" class="clickable" style="cursor:pointer" title="اضغط لعرض الأوردرات اللي وافقت على التصميم ولم تُحصَّل">
        <div class="kpi-box clickable">
          <div class="kpi-val" style="color:var(--y)"><span data-counter="${rem}" data-suffix=" ج">${fn(rem)} ج</span></div>
          <div class="kpi-lbl">باقي التحصيل</div>
          ${remCritical>0?`<div style="margin-top:6px;padding-top:6px;border-top:1px dashed var(--line);display:flex;justify-content:space-between;align-items:center;font-size:10px;font-weight:800"><span style="color:var(--r)">⚠️ <span data-counter="${remCritical}" data-suffix=" ج">${fn(remCritical)} ج</span></span><span style="color:var(--dim2)">بعد التصميم</span></div>`:''}
        </div>
      </div>
      ${kpi((profit>=0?'ربح ':'خسارة ')+fn(Math.abs(profit))+' ج',profit>=0?'الربح الصافي':'الخسارة الصافية',profit>=0?'var(--g)':'var(--r)',pProfit,Math.abs(profit),' ج')}
    </div>

    <!-- رسم بياني -->
    ${monthlyChart()}

    <!-- مقارنة تفصيلية -->
    <div class="chart-wrap">
      <div class="chart-title">📊 مقارنة بالفترة السابقة</div>
      <div class="compare-row"><span>محصّل فعلاً</span><div style="display:flex;gap:12px"><span style="color:var(--g);font-weight:800">${fn(tot)} ج</span><span style="color:var(--dim2)">${fn(pTot)} ج</span></div></div>
      <div class="compare-row"><span>قيمة الأوردرات</span><div style="display:flex;gap:12px"><span style="color:var(--b);font-weight:800">${fn(ordersTotal)} ج</span><span style="color:var(--dim2)">—</span></div></div>
      <div class="compare-row"><span>المصروفات الفعلية (موردين+شحن+غيره)</span><div style="display:flex;gap:12px"><span style="color:var(--r);font-weight:800">${fn(costs)} ج</span><span style="color:var(--dim2)">${fn(pCosts)} ج</span></div></div>

function renderDesigners(f){
  const dOrds=f.filter(o=>o.designStage||o.stage==='design'||o.designerId);

  const empMap={};employees.forEach(e=>{if(e.authUid)empMap[e.authUid]=e;empMap[e.name]=e;});

  return designers.map(dName=>{
    const dOrd=dOrds.filter(o=>(o.designerName||o.designerId)===dName);

// ══ Tab 3: Shipping ══
function renderShipping(f,prev){
  const shipOrds=f.filter(o=>['shipping','archived'].includes(o.stage)||o.shipCompanyName);
  const companies=[...new Set(shipOrds.map(o=>o.shipCompanyName||o.shippingCompany).filter(Boolean)),...shippers.map(s=>s.name)].filter((v,i,a)=>v&&a.indexOf(v)===i);

  if(!companies.length)return`<div class="empty-pretty"><div class="ico">🚚</div><div class="ttl">لا توجد بيانات شحن</div><div class="sub">الأوردرات اللي وصلت مرحلة الشحن أو بعدها هتظهر هنا</div></div>`;

  const totShip=shipOrds.length;
  const delivered=shipOrds.filter(o=>o.shippingStatus==='delivered').length;
  const returned=shipOrds.filter(o=>['returned_refused','returned'].includes(o.shippingStatus)).length;
  const pTot=prev.filter(o=>['shipping','archived'].includes(o.stage)||o.shipCompanyName).length;

  return`
    <div class="kpi-grid">
      ${kpi(totShip,'إجمالي الشحن','var(--b)',pTot)}
      ${kpi(totShip?Math.round(delivered/totShip*100)+'%':'—','نسبة التسليم','var(--g)')}
      ${kpi(returned,'مرتجعات','var(--r)')}
      ${kpi(fn(shipOrds.reduce((s,o)=>s+(parseFloat(o.shippingCost)||0),0))+' ج','تكلفة الشحن','var(--y)')}
    </div>
    ${companies.map(co=>{
      const coOrds=shipOrds.filter(o=>(o.shipCompanyName||o.shippingCompany)===co);
      const del=coOrds.filter(o=>o.shippingStatus==='delivered').length;
      const ret=coOrds.filter(o=>['returned_refused','returned'].includes(o.shippingStatus)).length;
      const rate=coOrds.length?Math.round(del/coOrds.length*100):0;
      const shipper=shippers.find(s=>s.name===co)||{};
      return`<div class="rep-card">
        <div class="rep-card-head">
          <div><div class="rep-name">🚚 ${co}</div><div class="rep-sub">${shipper.phone||''}</div></div>
          <div style="font-size:11px;padding:4px 10px;border-radius:20px;background:${rate>=80?'rgba(0,217,126,.12)':'rgba(255,170,0,.12)'};color:${rate>=80?'var(--g)':'var(--y)'};font-weight:800">${rate}% تسليم</div>
        </div>

          <div class="rep-stat"><div class="rep-stat-val" style="color:var(--b)">${coOrds.length}</div><div class="rep-stat-lbl">أوردر</div></div>
          <div class="rep-stat"><div class="rep-stat-val" style="color:var(--g)">${del}</div><div class="rep-stat-lbl">تسليم</div></div>
          <div class="rep-stat"><div class="rep-stat-val" style="color:var(--r)">${ret}</div><div class="rep-stat-lbl">مرتجع</div></div>
        </div>
      </div>`;
    }).join('')}`;
}

// ══ Tab 5: Sales ══
function renderSales(f,prev){
  const withPrice=f.filter(o=>parseFloat(o.salePrice)>0||parseFloat(o.totalPaid)>0);
  const tot=withPrice.reduce((s,o)=>s+(parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0),0);
  const contractTot=withPrice.reduce((s,o)=>s+(parseFloat(o.salePrice)||0),0);
  const costs=withPrice.reduce((s,o)=>s+(o.costItems||[]).reduce((cs,c)=>cs+(parseFloat(c.total)||0),0),0);
  const profit=tot-costs;
  const margin=tot>0?Math.round(profit/tot*100):0;

  const pWithPrice=prev.filter(o=>parseFloat(o.salePrice)>0||parseFloat(o.totalPaid)>0);
  const pTot=pWithPrice.reduce((s,o)=>s+(parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0),0);
  const pCosts=pWithPrice.reduce((s,o)=>s+(o.costItems||[]).reduce((cs,c)=>cs+(parseFloat(c.total)||0),0),0);

  // المنتجات
  const prodMap={};
  f.forEach(o=>(o.products||[]).forEach(p=>{if(!prodMap[p.name])prodMap[p.name]={count:0,qty:0,rev:0};prodMap[p.name].count++;prodMap[p.name].qty+=(parseFloat(p.qty)||0);prodMap[p.name].rev+=(parseFloat(p.salePrice)||parseFloat(o.salePrice)/Math.max((o.products||[]).length,1)||0);}));
  const sortedProds=Object.entries(prodMap).sort((a,b)=>b[1].count-a[1].count);
  const maxProd=Math.max(...sortedProds.map(([,v])=>v.count),1);

  return`
    <div class="kpi-grid">
      ${kpi(fn(tot)+' ج','الإيرادات','var(--b)',pTot)}
      ${kpi(fn(costs)+' ج','التكاليف','var(--r)',pCosts)}
      ${kpi((profit>=0?'ربح ':'خسارة ')+fn(Math.abs(profit))+' ج',profit>=0?'الربح':'الخسارة',profit>=0?'var(--g)':'var(--r)',pTot-pCosts)}
      ${kpi(margin+'%','هامش الربح',margin>=30?'var(--g)':'var(--y)')}
    </div>
    <div class="chart-wrap">
      <div class="chart-title">📦 أكثر المنتجات مبيعاً</div>
      ${sortedProds.slice(0,10).map(([name,v])=>bar(name,v.count,maxProd,'linear-gradient(90deg,var(--r),var(--p))',' أوردر')).join('')}
    </div>
    <div class="chart-wrap">
      <div class="chart-title">💰 مقارنة الإيرادات والتكاليف</div>
      ${bar('إيرادات',tot,Math.max(tot,costs),'var(--b)',' ج')}
      ${bar('تكاليف',costs,Math.max(tot,costs),'var(--r)',' ج')}
      ${bar('ربح',Math.max(profit,0),Math.max(tot,costs),'var(--g)',' ج')}
    </div>`;
}

window.filterRevOrders=function(filter,btn){
  __revFilter=filter;
  document.querySelectorAll('[id^="rf-"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderRevOrders();
};

function renderRevOrders(){
  // الفلتر على transactions — الكل دايماً دفعات فعلية
  let data=__revOrders;
  // فلتر بسيط على الـ category
  if(__revFilter==='paid') data=__revOrders.filter(p=>p.category==='collection'||(!p.category&&p.type==='in'));
  else if(__revFilter==='partial') data=__revOrders.filter(p=>p.category==='advance'||p.category==='deposit');
  else if(__revFilter==='pending') data=[];

  const el=document.getElementById('rev-orders-list');
  if(!data.length){el.innerHTML='<div style="text-align:center;padding:30px;color:var(--dim2)">لا توجد أوردرات</div>';return;}

  el.innerHTML=data.map(p=>{
    const amt=parseFloat(p.amount)||0;
    const dateStr=p.date||p.createdDate||'—';
    const cat={collection:'تحصيل',advance:'عربون',deposit:'عربون',in:'دفعة واردة'}[p.category||p.type]||'دفعة';
    return`<div style="background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:13px;font-weight:800">${p.clientName||p.description||'—'}</div>
        <div style="font-size:10px;color:var(--dim2);margin-top:2px">${cat} · ${dateStr}</div>
        ${p.orderId?`<div style="font-size:10px;color:var(--b);margin-top:1px">${p.orderId}</div>`:''}
      </div>
      <div style="font-size:16px;font-weight:900;color:var(--g)">${fn(amt)} ج</div>
    </div>`;
  }).join('');
}

// ══ Tab 6: جرد التحصيل ══
function renderCollection(f){
  // كل الأوردرات اللي عندها salePrice > 0
  let withSale=f.filter(o=>parseFloat(o.salePrice)>0);
  // ترتيب حسب __sortKey/__sortDir
  const dir=__sortDir==='asc'?1:-1;
  const getPaid=o=>parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0;
  const sortFns={
    date:(a,b)=>((a.createdAt?.seconds||0)-(b.createdAt?.seconds||0))*dir,
    client:(a,b)=>((a.clientName||'').localeCompare(b.clientName||'','ar'))*dir,
    sale:(a,b)=>((parseFloat(a.salePrice)||0)-(parseFloat(b.salePrice)||0))*dir,
    paid:(a,b)=>(getPaid(a)-getPaid(b))*dir,
    rem:(a,b)=>(calcRem(a)-calcRem(b))*dir,
  };
  withSale.sort(sortFns[__sortKey]||sortFns.date);

  if(!withSale.length) return`<div class="empty-pretty"><div class="ico">📋</div><div class="ttl">لا توجد أوردرات</div><div class="sub">جرّب تغيير فلتر التاريخ أو الفترة الزمنية</div></div>`;

  const totSale=withSale.reduce((s,o)=>s+(parseFloat(o.salePrice)||0),0);
  const totPaid=withSale.reduce((s,o)=>s+(parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0),0);
  const totRem=withSale.reduce((s,o)=>s+calcRem(o),0);
  const totCost=withSale.reduce((s,o)=>s+(o.costItems||[]).reduce((cs,c)=>cs+(parseFloat(c.total)||0),0),0);
  const totProfit=totPaid-totCost;
  const fullPaid=withSale.filter(o=>calcRem(o)<=0).length;
  const partial=withSale.filter(o=>{const p=parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0;return p>0&&calcRem(o)>0;}).length;
  const noPay=withSale.filter(o=>(parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0)<=0).length;

  // تصنيف بالمراحل (للفلتر)
  const stageCounts={
    design:withSale.filter(o=>o.stage==='design').length,
    printing:withSale.filter(o=>o.stage==='printing').length,
    production:withSale.filter(o=>o.stage==='production').length,
    shipping:withSale.filter(o=>o.stage==='shipping').length,
    archived:withSale.filter(o=>o.stage==='archived').length,
  };
  // الأوردرات الحرجة: العميل وافق على التصميم وداخل طباعة/تنفيذ/شحن وفيه باقي
  const postDesignWithRem=withSale.filter(o=>['printing','production','shipping'].includes(o.stage)&&calcRem(o)>0);
  const postDesignAmount=postDesignWithRem.reduce((s,o)=>s+calcRem(o),0);

  return`
    <!-- ملخص -->
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px">
      <div class="kpi-box" style="grid-column:span 2">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
          <div style="text-align:center"><div class="kpi-val" style="color:var(--b)">${fn(totSale)} ج</div><div class="kpi-lbl">إجمالي الأوردرات</div></div>
          <div style="text-align:center"><div class="kpi-val" style="color:var(--g)">${fn(totPaid)} ج</div><div class="kpi-lbl">إجمالي المحصّل</div></div>
          <div style="text-align:center"><div class="kpi-val" style="color:var(--r)">${fn(totRem)} ج</div><div class="kpi-lbl">إجمالي المتبقي</div></div>
        </div>
      </div>
      <div class="kpi-box"><div class="kpi-val" style="color:var(--r)">${fn(totCost)} ج</div><div class="kpi-lbl">🏭 إجمالي التكاليف</div></div>
      <div class="kpi-box"><div class="kpi-val" style="color:${totProfit>=0?'var(--g)':'var(--r)'}">${totProfit>=0?'ربح ':'خسارة '}${fn(Math.abs(totProfit))} ج</div><div class="kpi-lbl">💹 ${totProfit>=0?'صافي الربح':'صافي الخسارة'}</div></div>
      <div class="kpi-box"><div class="kpi-val" style="color:var(--g)">${fullPaid}</div><div class="kpi-lbl">✅ مدفوع بالكامل</div></div>
      <div class="kpi-box"><div class="kpi-val" style="color:var(--y)">${partial}</div><div class="kpi-lbl">⚡ دفع جزئي</div></div>
      <div class="kpi-box" style="grid-column:span 2;background:rgba(255,61,110,.06);border-color:rgba(255,61,110,.25);cursor:pointer" onclick="filterByStage('post-design')" title="اضغط لفلترة الجدول">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
          <div>
            <div class="kpi-val" style="color:var(--r)">${fn(postDesignAmount)} ج</div>
            <div class="kpi-lbl">⚠️ باقي بعد التصميم — حرج</div>
          </div>
          <div style="text-align:left">
            <div style="font-size:24px;font-weight:900;color:var(--r)">${postDesignWithRem.length}</div>
            <div style="font-size:10px;color:var(--dim2);font-weight:700">أوردر</div>
          </div>
        </div>
      </div>
    </div>

    <!-- فلتر بالمراحل -->
    <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center">
      <span style="font-size:11px;color:var(--dim2);font-weight:800;padding:4px 4px">المرحلة:</span>
      <button class="d-btn st-btn active" data-stage="all" onclick="filterByStage('all',this)">الكل (${withSale.length})</button>
      <button class="d-btn st-btn" data-stage="post-design" onclick="filterByStage('post-design',this)" style="border-color:rgba(255,61,110,.4);color:var(--r);background:rgba(255,61,110,.06)">⚠️ بعد التصميم (${postDesignWithRem.length})</button>
      <button class="d-btn st-btn" data-stage="design" onclick="filterByStage('design',this)">✏️ تصميم (${stageCounts.design})</button>
      <button class="d-btn st-btn" data-stage="printing" onclick="filterByStage('printing',this)">🖨️ طباعة (${stageCounts.printing})</button>
      <button class="d-btn st-btn" data-stage="production" onclick="filterByStage('production',this)">🏭 تنفيذ (${stageCounts.production})</button>
      <button class="d-btn st-btn" data-stage="shipping" onclick="filterByStage('shipping',this)">🚚 شحن (${stageCounts.shipping})</button>
      <button class="d-btn st-btn" data-stage="archived" onclick="filterByStage('archived',this)">📁 أرشيف (${stageCounts.archived})</button>
    </div>

    <!-- فلتر بحالة الدفع + بحث -->
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
      <span style="font-size:11px;color:var(--dim2);font-weight:800;padding:4px 4px">الدفع:</span>
      <button class="d-btn pf-btn ${__payFilter==='all'?'active':''}" data-pay="all" onclick="filterCollection('all',this)">الكل</button>
      <button class="d-btn pf-btn ${__payFilter==='rem'?'active':''}" data-pay="rem" onclick="filterCollection('rem',this)">⏳ متبقي (${partial+noPay})</button>
      <button class="d-btn pf-btn ${__payFilter==='paid'?'active':''}" data-pay="paid" onclick="filterCollection('paid',this)">✅ مكتمل (${fullPaid})</button>
      <div class="search-wrap">
        <input id="col-search" class="search-input" type="search" placeholder="🔍 بحث (اسم / موبايل / كود) — اضغط /" value="${(__search||'').replace(/"/g,'&quot;')}" oninput="colSearch(this.value)">
        <button id="col-search-clear" class="search-clear ${__search?'show':''}" onclick="colSearchClear()" title="مسح">✕</button>
      </div>
    </div>

    <!-- الجدول -->
    <div style="background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden">
      <!-- Header -->
      <div class="col-grid-head" style="background:var(--bg3);border-bottom:1px solid var(--line);font-size:11px;font-weight:800;color:var(--dim2)">
        <div class="col-head-cell ${__sortKey==='client'?'active':''}" onclick="colSort('client')" style="justify-content:flex-start"><span>العميل / الأوردر</span><span class="sort-arrow">${__sortKey==='client'?(__sortDir==='asc'?'↑':'↓'):'⇅'}</span></div>
        <div class="col-head-cell ${__sortKey==='sale'?'active':''}" onclick="colSort('sale')"><span>الإجمالي</span><span class="sort-arrow">${__sortKey==='sale'?(__sortDir==='asc'?'↑':'↓'):'⇅'}</span></div>
        <div class="col-head-cell ${__sortKey==='paid'?'active':''}" onclick="colSort('paid')"><span>المحصّل</span><span class="sort-arrow">${__sortKey==='paid'?(__sortDir==='asc'?'↑':'↓'):'⇅'}</span></div>
        <div class="col-head-cell ${__sortKey==='rem'?'active':''}" onclick="colSort('rem')"><span>المتبقي</span><span class="sort-arrow">${__sortKey==='rem'?(__sortDir==='asc'?'↑':'↓'):'⇅'}</span></div>
        <div class="col-head-cell ${__sortKey==='date'?'active':''}" onclick="colSort('date')"><span>الحالة</span><span class="sort-arrow">${__sortKey==='date'?(__sortDir==='asc'?'↑':'↓'):'⇅'}</span></div>
        <div></div>
      </div>
      <!-- Rows -->
      <div id="collection-rows">
        ${renderCollectionRows(withSale)}
      </div>
      <div id="col-no-match" style="display:none;padding:30px 16px;text-align:center;color:var(--dim2);font-size:12px">
        🔍 لا توجد نتائج تطابق البحث/الفلاتر
      </div>
    </div>
  `;
}

function renderCollectionRows(data){
  return data.map(o=>{
    const sale=parseFloat(o.salePrice)||0;
    const paid=parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0;
    const rem=calcRem(o);
    const cost=(o.costItems||[]).reduce((s,c)=>s+(parseFloat(c.total)||0),0);
    const profit=paid-cost;
    const pct=sale>0?Math.round(paid/sale*100):0;
    const isReturned=o.paymentStatus==='returned'||o.shipStage==='returned';
    const status=isReturned?{c:'var(--dim2)',t:'↩️',bg:'rgba(255,255,255,.02)'}:rem<=0?{c:'var(--g)',t:'✅',bg:'rgba(0,217,126,.08)'}:paid>0?{c:'var(--y)',t:'⚡',bg:'rgba(255,170,0,.05)'}:{c:'var(--r)',t:'⏳',bg:'rgba(255,61,110,.05)'};
    const stage={design:'✏️',printing:'🖨️',production:'🏭',shipping:'🚚',archived:'📁'}[o.stage]||'';
    const searchHay=`${o.clientName||''} ${o.clientPhone||''} ${o.orderId||''} ${o._id.slice(-6)}`.toLowerCase();
    const orderRef=(o.orderId||o._id.slice(-6));
    return`<div class="col-row" style="background:${status.bg}" data-rem="${rem}" data-paid="${paid}" data-stage="${o.stage||''}" data-search="${searchHay.replace(/"/g,'&quot;')}" onclick="openOrdDrawer('${o._id}')" title="اضغط لعرض التفاصيل">
      <div class="col-cell" style="display:block">
        <div style="font-size:13px;font-weight:800">${o.clientName||'—'}</div>
        <div style="font-size:10px;color:var(--dim2);margin-top:2px">
          ${stage} ${orderRef} · ${o.clientPhone||'—'}
        </div>
        <div style="height:3px;background:var(--bg3);border-radius:2px;margin-top:5px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${status.c};border-radius:2px"></div>
        </div>
        <div style="display:flex;gap:10px;margin-top:5px;font-size:10px;font-weight:700">
          ${cost>0?`<span style="color:var(--r)">🏭 ${fn(cost)} ج</span>`:`<span style="color:var(--dim2)">⚠️ بدون تكلفة</span>`}
          ${cost>0?`<span style="color:${profit>=0?'var(--g)':'var(--r)'}">💹 ${profit>=0?'ربح ':'خسارة '}${fn(Math.abs(profit))} ج</span>`:''}
        </div>
      </div>
      <div class="col-cell" style="text-align:center;font-size:13px;font-weight:800;color:var(--b)"><span class="col-cell-mobile-label">الإجمالي:</span><span>${fn(sale)} ج</span></div>
      <div class="col-cell" style="text-align:center;font-size:13px;font-weight:800;color:var(--g)"><span class="col-cell-mobile-label">المحصّل:</span><span>${fn(paid)} ج</span></div>
      <div class="col-cell" style="text-align:center;font-size:13px;font-weight:900;color:${rem>0?'var(--r)':'var(--dim2)'}">
        <span class="col-cell-mobile-label">المتبقي:</span><span>${rem>0?fn(rem)+' ج':'—'}</span>
      </div>
      <div class="col-cell" style="text-align:center">
        <span class="col-cell-mobile-label">الحالة:</span>
        <span><span style="font-size:16px">${status.t}</span> <span style="font-size:11px;color:${status.c};font-weight:800">${pct}%</span></span>
      </div>
      <div class="col-actions" style="text-align:center" onclick="event.stopPropagation()">
        <button onclick="openEditOrder('${o._id}')" title="تعديل"
          style="padding:6px 10px;border-radius:8px;border:1px solid rgba(59,158,255,.3);background:rgba(59,158,255,.08);color:var(--b);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">✏️</button>
        <button onclick="openOrdDrawer('${o._id}')" title="تفاصيل وتكاليف"
          style="padding:6px 10px;border-radius:8px;border:1px solid ${cost>0?'rgba(255,170,0,.3)':'rgba(255,61,110,.5)'};background:${cost>0?'rgba(255,170,0,.08)':'rgba(255,61,110,.12)'};color:${cost>0?'var(--y)':'var(--r)'};font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px">💰</button>
        <button onclick="deleteOrderFromReport('${o._id}')" title="حذف"
          style="padding:6px 10px;border-radius:8px;border:1px solid rgba(255,61,110,.3);background:rgba(255,61,110,.08);color:var(--r);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function applyCollectionFilters(){
  const q=(__search||'').toLowerCase().trim();
  let visible=0;
  document.querySelectorAll('.col-row').forEach(r=>{
    const rem=parseFloat(r.dataset.rem)||0;
    const stage=r.dataset.stage||'';
    const hay=(r.dataset.search||'').toLowerCase();
    const payOk=__payFilter==='all'||(__payFilter==='rem'&&rem>0)||(__payFilter==='paid'&&rem<=0);
    const stageOk=__stageFilter==='all'
      ||(__stageFilter==='post-design'&&['printing','production','shipping'].includes(stage)&&rem>0)
      ||stage===__stageFilter;
    const searchOk=!q||hay.includes(q);
    const show=payOk&&stageOk&&searchOk;
    r.style.display=show?'':'none';
    if(show)visible++;
  });
  // عرض/إخفاء empty state داخلي
  const noMatch=document.getElementById('col-no-match');
  if(noMatch)noMatch.style.display=visible===0?'':'none';
  writeUrlState();
}

window.filterCollection=function(filter,btn){
  __payFilter=filter;
  document.querySelectorAll('.pf-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  else{const t=document.querySelector(`.pf-btn[data-pay="${filter}"]`);if(t)t.classList.add('active');}
  applyCollectionFilters();
};

window.filterByStage=function(stage,btn){
  __stageFilter=stage;
  document.querySelectorAll('.st-btn').forEach(b=>b.classList.remove('active'));
  const target=btn||document.querySelector(`.st-btn[data-stage="${stage}"]`);
  if(target)target.classList.add('active');
  applyCollectionFilters();
};

window.colSearch=function(val){
  __search=val||'';
  const clr=document.getElementById('col-search-clear');
  if(clr)clr.classList.toggle('show',!!__search);
  debounce('search',applyCollectionFilters,150);
};

window.colSearchClear=function(){
  const inp=document.getElementById('col-search');
  if(inp){inp.value='';inp.focus();}
  __search='';
  const clr=document.getElementById('col-search-clear');
  if(clr)clr.classList.remove('show');
  applyCollectionFilters();

let __delOrdId='',__delOrdClient='',__delOrdPaid=0,__delOrdWallet='';
window.deleteOrderFromReport=function(orderId){
  const o=orders.find(x=>x._id===orderId);
  if(!o)return toast('⚠️ الأوردر غير موجود','err');
  __delOrdId=orderId;
  __delOrdClient=o.clientName||'';
  __delOrdPaid=parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0;
  __delOrdWallet=o.depositWalletId||o.walletId||'';
  document.getElementById('del-ord-reason').value='';
  document.getElementById('del-ord-note').value='';
  document.getElementById('ov-del-order').style.display='flex';
};
window.confirmDeleteOrder=async function(){
  const reason=document.getElementById('del-ord-reason').value;
  if(!reason)return toast('⚠️ اختر سبب الحذف أولاً','err');
  const note=document.getElementById('del-ord-note').value.trim();
  const btn=document.getElementById('del-ord-confirm-btn');
  btn.disabled=true;btn.textContent='جاري...';
  try{
    // 1) لو الأوردر مرتبط بتسويات شحن، نوقف ونوجّه المستخدم لإلغائها أولاً.
    //    تسويات الشحن ليها flow عكسي خاص في صفحة حسابات الشحن، ومش من حق
    //    صفحة التقارير تتجاوزه (RULE 4 — No module owns money).
    const stSnap=await getDocs(query(collection(db,'shipping_settlements'),where('orderId','==',__delOrdId)));
    if(!stSnap.empty){
      throw new Error('الأوردر مرتبط بتسوية شحن — أَلغِ التسوية أولاً من صفحة حسابات الشحن');
    }
    // 2) اجمع كل المعاملات المرتبطة بالأوردر (دفعات عملاء + مصروفات + دفعات موردين)
    const txSnap=await getDocs(query(collection(db,'transactions_v2'),where('orderId','==',__delOrdId)));
    const batch=writeBatch(db);
    const ledgerBase={
      orderId:__delOrdId,clientName:__delOrdClient,
      notes:`حذف أوردر [${reason}]${note?' — '+note:''}`,
      userId:auth.currentUser?.uid||'',userName:userName||'',
    };
    let refunded=0,vendorReversed=0,generalReversed=0;
    const walletNameOf=wid=>wallets.find(w=>w._id===wid)?.name||'';
    for(const txDoc of txSnap.docs){
      const tx=txDoc.data();
      const amt=parseFloat(tx.amount)||0;
      const wid=tx.walletId||'';
      if(amt>0&&wid){
        if(tx.type==='in'){
          // دفعة عميل → ارجعها للمحفظة الأصلية مهما كانت
          batch.update(doc(db,'wallets',wid),{balance:increment(-amt)});
          addLedgerToBatch(batch,db,FE.CUSTOMER_REFUND,{...ledgerBase,amount:amt,walletId:wid,walletName:walletNameOf(wid)||tx.walletName||''});
          refunded++;
        } else if(tx.type==='out'){
          // مصروف/دفعة مورد → ارجع المبلغ للمحفظة
          batch.update(doc(db,'wallets',wid),{balance:increment(amt)});
          if(tx.spId){
            // مرتبط بـ supplier_payment → احذف الـ payment record + ledger reversal
            batch.delete(doc(db,'supplier_payments',tx.spId));
            addLedgerToBatch(batch,db,FE.VENDOR_PAYMENT_REVERSAL,{...ledgerBase,amount:amt,walletId:wid,walletName:walletNameOf(wid)||tx.walletName||'',vendorId:tx.supplierId||'',vendorName:tx.supplierName||''});
            vendorReversed++;
          } else {
            // مصروف عام بدون مورد
            addLedgerToBatch(batch,db,FE.GENERAL_EXPENSE_REVERSAL,{...ledgerBase,amount:amt,walletId:wid,walletName:walletNameOf(wid)||tx.walletName||''});
            generalReversed++;
          }
        }
      }
      batch.delete(txDoc.ref);
    }
    // 3) احذف الأوردر نفسه
    batch.delete(doc(db,'orders',__delOrdId));
    await batch.commit();
    document.getElementById('ov-del-order').style.display='none';
    let msg='✅ تم الحذف';
    if(refunded)msg+=` · ${refunded} دفعة عميل مستردة`;
    if(vendorReversed)msg+=` · ${vendorReversed} دفعة مورد ملغاة`;
    if(generalReversed)msg+=` · ${generalReversed} مصروف ملغى`;
    toast(msg,'ok');
  }catch(e){toast('❌ '+e.message,'err');}
  btn.disabled=false;btn.textContent='🗑 حذف نهائي';
};

// ══ تعديل الأوردر الكامل ══
let __editOrderData=null;
let __wallets=[];

// جيب المحافظ
async function loadWallets(){
  if(__wallets.length)return;
  const snap=await getDocs(collection(db,'wallets'));
  __wallets=snap.docs.map(d=>({...d.data(),_id:d.id}));
}

window.openEditOrder=async function(orderId){
  await loadWallets();
  const snap=await getDoc(doc(db,'orders',orderId));
  if(!snap.exists())return toast('❌ الأوردر مش موجود','err');
  const o={...snap.data(),_id:orderId};
  __editOrderData=o;

  // ملء الـ modal
  document.getElementById('edit-order-id').value=orderId;
  document.getElementById('eo-client-name').value=o.clientName||'';
  document.getElementById('eo-client-phone').value=o.clientPhone||'';
  document.getElementById('eo-product').value=(o.products||[]).map(p=>p.name+'×'+p.qty).join(' + ')||o.product||'';
  document.getElementById('eo-deadline').value=o.deadline||'';
  document.getElementById('eo-stage').value=o.stage||'design';
  document.getElementById('eo-sale').value=o.salePrice||0;
  document.getElementById('eo-discount').value=o.discount||0;
  document.getElementById('eo-paid').value=o.totalPaid||o.paid||o.deposit||0;
  document.getElementById('eo-notes').value=o.notes||'';

  // المحافظ
  const walSel=document.getElementById('eo-wallet');
  walSel.innerHTML='<option value="">— اختر —</option>'+__wallets.map(w=>`<option value="${w._id}">${w.name}</option>`).join('');
  walSel.value=o.depositWalletId||o.walletId||'';

  calcEoRemaining();
  document.getElementById('ov-edit-order').classList.add('open');
};

window.calcEoRemaining=function(){
  const sale=parseFloat(document.getElementById('eo-sale')?.value)||0;
  const disc=parseFloat(document.getElementById('eo-discount')?.value)||0;
  const paid=parseFloat(document.getElementById('eo-paid')?.value)||0;
  const rem=Math.max(0,sale-disc-paid);
  const el=document.getElementById('eo-rem-val');
  if(el)el.textContent=fn(rem)+' ج';
};

window.saveEditOrder=async function(){
  const orderId=document.getElementById('edit-order-id').value;
  if(!orderId||!__editOrderData)return;
  
  const newSale=parseFloat(document.getElementById('eo-sale').value)||0;
  const newDisc=parseFloat(document.getElementById('eo-discount').value)||0;
  const newPaid=parseFloat(document.getElementById('eo-paid').value)||0;
  const newRem=Math.max(0,newSale-newDisc-newPaid);
  const newWalletId=document.getElementById('eo-wallet').value;
  const o=__editOrderData;

  // فرق المدفوع
  const oldPaid=parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0;
  const paidDiff=newPaid-oldPaid;

  try{
    const batch=writeBatch(db);

    // 1. تحديث المحفظة + ledger لو في فرق في المدفوع
    if(Math.abs(paidDiff)>0.01&&newWalletId){
      batch.update(doc(db,'wallets',newWalletId),{balance:increment(paidDiff)});
      addLedgerToBatch(batch,db,paidDiff>0?FE.CUSTOMER_PAYMENT:FE.CUSTOMER_REFUND,{
        orderId,clientName:document.getElementById('eo-client-name').value,
        amount:Math.abs(paidDiff),walletId:newWalletId,
        walletName:__wallets.find(w=>w._id===newWalletId)?.name||'',
        notes:'تعديل دفعة من التقارير',
        createdBy:auth.currentUser?.uid||'',createdByName:userName||'admin'
      });
    }

    // 2. تحديث transactions لو في فرق
    if(Math.abs(paidDiff)>0.01){
      const txSnap=await getDocs(query(collection(db,'transactions_v2'),where('orderId','==',orderId)));
      if(!txSnap.empty){
        const lastTx=txSnap.docs[txSnap.docs.length-1];
        const oldAmount=parseFloat(lastTx.data().amount)||0;
        batch.update(lastTx.ref,{amount:Math.max(0,oldAmount+paidDiff)});
      } else if(paidDiff>0&&newWalletId){
        const txRef=doc(collection(db,'transactions_v2'));
        batch.set(txRef,{
          walletId:newWalletId,type:'in',amount:paidDiff,
          description:'تعديل دفعة — '+document.getElementById('eo-client-name').value,
          category:'collection',orderId,
          clientName:document.getElementById('eo-client-name').value,
          date:new Date().toLocaleDateString('ar-EG'),
          createdAt:serverTimestamp()
        });
      }
    }

    // 3. تحديث الأوردر
    const prodText=document.getElementById('eo-product').value;
    batch.update(doc(db,'orders',orderId),{
      clientName:document.getElementById('eo-client-name').value,
      clientPhone:document.getElementById('eo-client-phone').value,
      product:prodText,
      deadline:document.getElementById('eo-deadline').value,
      stage:document.getElementById('eo-stage').value,
      salePrice:newSale,discount:newDisc,
      totalPaid:newPaid,
      remaining:newRem,
      depositWalletId:newWalletId,walletId:newWalletId,
      paymentStatus:newRem<=0?'paid':newPaid>0?'partial':'pending',
      notes:document.getElementById('eo-notes').value,
      updatedAt:serverTimestamp()
    });

    await batch.commit();
    document.getElementById('ov-edit-order').classList.remove('open');
    toast('✅ تم حفظ التعديلات في كل السيستم','ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

// ══ Drawer Cost Editing ══
function __renderDrawerCostList(o){
  const el=document.getElementById('drawer-cost-list');
  if(!el)return;
  const items=o.costItems||[];
  const total=items.reduce((s,c)=>s+(parseFloat(c.total)||0),0);
  const sc=document.getElementById('drawer-summary-cost');
  if(sc)sc.textContent=fn(total)+' ج';
  if(!items.length){
    el.innerHTML='<div style="text-align:center;padding:12px;color:var(--dim2);font-size:11px">لا توجد بنود تكلفة</div>';
    return;
  }
  el.innerHTML=items.map((c,i)=>{
    // البند مرتبط بدفعة محفظة فعلية (مدفوع من المحفظة) → ممنوع تعديله/حذفه من هنا
    const linked=!!(c.walletId||c.txId||c.spId);
    const linkedHint=linked?`<div style="font-size:9px;color:var(--y);margin-top:2px">💳 مدفوع من محفظة — التعديل/الحذف من صفحة الحسابات</div>`:'';
    return`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border:1px solid ${linked?'rgba(255,170,0,.25)':'var(--line)'};border-radius:8px;margin-bottom:6px">
      <div style="flex:1">
        <div style="font-size:11px;font-weight:700">${linked?'💳 ':''}${c.type||'—'} <span style="color:var(--r);font-weight:900">${fn(c.total)} ج</span>${c.supplierName?` <span style="color:var(--dim2);font-weight:600">· ${c.supplierName}</span>`:''}</div>
        ${c.note?`<div style="font-size:10px;color:var(--dim2)">${c.note}</div>`:''}
        <div style="font-size:9px;color:var(--dim2)">${c.addedBy||''} ${c.addedAt?'· '+c.addedAt:''}</div>
        ${linkedHint}
      </div>
      <button type="button" ${linked?'disabled':''} onclick="${linked?'':`editDrawerCost(${i})`}" title="${linked?'البند مرتبط بدفعة — لا يُعدَّل من هنا':'تعديل'}" style="padding:3px 8px;border-radius:6px;border:1px solid var(--line2);background:var(--bg3);color:${linked?'var(--dim2)':'var(--c)'};font-size:11px;cursor:${linked?'not-allowed':'pointer'};opacity:${linked?'.5':'1'};font-family:inherit">✏️</button>
      <button type="button" ${linked?'disabled':''} onclick="${linked?'':`rmDrawerCost(${i})`}" title="${linked?'البند مرتبط بدفعة — لا يُحذَف من هنا':'حذف'}" style="padding:3px 8px;border-radius:6px;border:1px solid rgba(255,61,110,.3);background:rgba(255,61,110,.08);color:${linked?'var(--dim2)':'var(--r)'};font-size:11px;cursor:${linked?'not-allowed':'pointer'};opacity:${linked?'.5':'1'};font-family:inherit">✕</button>
    </div>`;
  }).join('');
}

window.__drawerShowCostForm=function(){

  document.getElementById('drawer-form-lbl').textContent='＋ إضافة بند جديد';

window.__drawerHideCostForm=function(){

};

// Guard: لا نسمح بالتعديل/الحذف لبنود مرتبطة بدفعات محفظة فعلية،
// لأن العكس المالي الصحيح لها يجب أن يتم عبر صفحة الحسابات (vendor reversal).
function __isDrawerCostLinked(c){return !!(c&&(c.walletId||c.txId||c.spId));}

window.editDrawerCost=function(idx){
  const o=orders.find(x=>x._id===__dOrderId);if(!o)return;
  const c=(o.costItems||[])[idx];if(!c)return;
  if(__isDrawerCostLinked(c))return toast('⚠️ هذا البند مرتبط بدفعة محفظة. عدّله من صفحة الحسابات','err');
  __dCostEditIdx=idx;
  document.getElementById('drawer-form-lbl').textContent='✏️ تعديل البند';
  document.getElementById('drawer-type').value=c.type||'';
  document.getElementById('drawer-cost-amt').value=c.total||'';
  document.getElementById('drawer-cost-note').value=c.note||'';
  const sb=document.getElementById('drawer-cost-save');
  sb.textContent='💾 حفظ التعديل';
  document.getElementById('drawer-cost-form').style.display='block';
};

window.rmDrawerCost=async function(idx){
  const o=orders.find(x=>x._id===__dOrderId);if(!o)return;
  const c=(o.costItems||[])[idx];
  if(__isDrawerCostLinked(c))return toast('⚠️ هذا البند مرتبط بدفعة محفظة. احذفه من صفحة الحسابات','err');
  if(!confirm('حذف هذا البند؟'))return;
  const items=[...(o.costItems||[])];
  items.splice(idx,1);
  try{
    const batch=writeBatch(db);
    batch.update(doc(db,'orders',__dOrderId),{costItems:items,updatedAt:serverTimestamp()});
    await batch.commit();
    o.costItems=items;
    __renderDrawerCostList(o);
    toast('✅ تم الحذف','ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

window.saveDrawerCost=async function(){
  const type=document.getElementById('drawer-type').value.trim();
  const total=parseFloat(document.getElementById('drawer-cost-amt').value)||0;
  const note=document.getElementById('drawer-cost-note').value.trim();
  if(!type){toast('اختر نوع البند','err');return;}
  if(!total){toast('أدخل التكلفة','err');return;}
  const o=orders.find(x=>x._id===__dOrderId);if(!o)return;
  const items=[...(o.costItems||[])];
  if(__dCostEditIdx>=0&&__dCostEditIdx<items.length){
    if(__isDrawerCostLinked(items[__dCostEditIdx]))return toast('⚠️ هذا البند مرتبط بدفعة محفظة. عدّله من صفحة الحسابات','err');
  }
  const btn=document.getElementById('drawer-cost-save');
  btn.disabled=true;btn.textContent='...';
  const now=new Date().toLocaleString('ar-EG');
  const who=userName||auth.currentUser?.displayName||auth.currentUser?.email||'';
  if(__dCostEditIdx>=0&&__dCostEditIdx<items.length){
    items[__dCostEditIdx]={...items[__dCostEditIdx],type,total,note,addedBy:who,addedAt:now};
  }else{
    items.push({type,total,note,addedBy:who,addedAt:now});
  }
  try{
    const batch=writeBatch(db);
    batch.update(doc(db,'orders',__dOrderId),{costItems:items,updatedAt:serverTimestamp()});
    await batch.commit();
    o.costItems=items;
    __renderDrawerCostList(o);
    __drawerHideCostForm();
    toast('✅ تم الحفظ','ok');
  }catch(e){toast('❌ '+e.message,'err');}
  finally{btn.disabled=false;btn.textContent=__dCostEditIdx>=0?'💾 حفظ التعديل':'＋ إضافة';}
};

window.exportExcel=function(){
  const range=getRange(filterMode);
  const f=orders.filter(o=>inRange(o,range));
  const rows=[['الأوردر','العميل','التليفون','المرحلة','السعر','المدفوع','الباقي','التاريخ'],...f.map(o=>[o.orderId||o._id.slice(-6),o.clientName||'—',o.clientPhone||'—',o.stage||'—',o.salePrice||0,o.totalPaid||o.paid||0,o.remaining||0,o.createdDate||'—'])];
  const escCell=v=>{const s=String(v===null||v===undefined?'':v);return/[,"\n\r]/.test(s)?`"${s.replace(/"/g,'""')}"`:`${s}`;};
  const csv=rows.map(r=>r.map(escCell).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`تقرير_${new Date().toLocaleDateString('ar-EG')}.csv`;a.click();
  toast('✅ تم التصدير','ok');
};
