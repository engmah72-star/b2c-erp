<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Business2Card — الموردين</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="sync-monitor.js"></script>
<style>
.tabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid var(--line);padding-bottom:0}
.tab-btn{padding:10px 20px;border:none;background:none;color:var(--dim2);font-size:13px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;transition:var(--trans)}
.tab-btn.active{color:var(--r);border-bottom-color:var(--r)}
.sup-card{background:var(--bg2);border:1.5px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px;cursor:pointer;transition:var(--trans)}
.sup-card:hover{border-color:var(--r);background:rgba(255,61,110,.04)}
.sup-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.sup-name{font-size:16px;font-weight:800}
.sup-type{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(59,158,255,.12);color:var(--b);font-weight:700}
.sup-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.sup-stat{background:var(--bg3);border-radius:10px;padding:10px;text-align:center}
.sup-stat-val{font-size:16px;font-weight:900;margin-bottom:2px}
.sup-stat-lbl{font-size:10px;color:var(--dim2);font-weight:700}
.sup-actions{display:flex;gap:6px;margin-top:12px}
.panel-ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:flex-start;justify-content:flex-end}
.panel-ov.open{display:flex}
.panel{background:var(--bg1);width:420px;max-width:100%;height:100%;overflow-y:auto;border-right:1px solid var(--line)}
.panel-hdr{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg1);z-index:10}
.panel-hdr-name{font-size:18px;font-weight:800}
.panel-close{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:none;color:var(--snow);font-size:18px;cursor:pointer}
.psec{padding:16px 20px;border-bottom:1px solid var(--line)}
.psec-title{font-size:11px;font-weight:800;color:var(--dim2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.balance-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:10px;margin-bottom:6px}
.tx-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:12px}
.tx-row:last-child{border-bottom:none}
.badge{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:800}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.kpi-box{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
.kpi-val{font-size:22px;font-weight:900;margin-bottom:4px}
.kpi-lbl{font-size:11px;color:var(--dim2);font-weight:700}
.type-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:800;background:rgba(255,170,0,.12);color:var(--y)}
.ftab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--line);background:var(--bg2);font-size:11px;font-weight:700;color:var(--dim2);cursor:pointer;font-family:inherit;transition:var(--trans)}
.ftab.active{background:rgba(255,61,110,.12);color:var(--r);border-color:rgba(255,61,110,.3)}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">ERP</div></div></div>
  <div class="nav-scroll" id="nav-scroll-dynamic"><div style="padding:20px;text-align:center;color:var(--dim2)">⏳</div></div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">A</div><div><div class="nav-user-name" id="nav-name">User</div><div class="nav-user-role">تسجيل خروج</div></div></div></div>
</aside>
<div class="nav-ov" id="nav-ov" onclick="closeNav()"></div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div><h1>▣ الموردين</h1><p id="sub" style="font-size:12px;color:var(--dim2)">جاري التحميل...</p></div>
    </div>
    <div class="topbar-right" id="topbar-actions">
      <button class="btn btn-r" onclick="openAdd()">＋ إضافة</button>
    </div>
  </div>
  <div class="content">
    <!-- KPIs -->
    <div class="kpi-grid" id="kpis">
      <div class="kpi-box"><div class="kpi-val" id="k-total">—</div><div class="kpi-lbl">إجمالي الموردين</div></div>
      <div class="kpi-box"><div class="kpi-val" id="k-due" style="color:var(--r)">—</div><div class="kpi-lbl">مستحق للموردين</div></div>
      <div class="kpi-box"><div class="kpi-val" id="k-paid" style="color:var(--g)">—</div><div class="kpi-lbl">إجمالي المدفوع</div></div>
      <div class="kpi-box"><div class="kpi-val" id="k-orders" style="color:var(--b)">—</div><div class="kpi-lbl">أوردرات مرتبطة</div></div>
    </div>
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('printers',this)">🏭 مطابع</button>
      <button class="tab-btn" onclick="switchTab('shippers',this)">🚚 شحن</button>
    </div>
    <!-- فلتر الترتيب -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span style="font-size:12px;color:var(--dim2);font-weight:700">الترتيب حسب:</span>
      <div style="display:flex;gap:6px">
        <button class="ftab active" id="sort-due" onclick="setSort('due',this)">💰 المستحق</button>
        <button class="ftab" id="sort-purchases" onclick="setSort('purchases',this)">📦 المشتريات</button>
        <button class="ftab" id="sort-name" onclick="setSort('name',this)">🔤 الاسم</button>
      </div>
    </div>
    <div id="list"></div>
  </div>
</div>

<!-- Panel -->
<div class="panel-ov" id="panel-ov" onclick="if(event.target===this)closePanel()">
  <div class="panel">
    <div class="panel-hdr">
      <div><div class="panel-hdr-name" id="pn-name">—</div><div style="font-size:12px;color:var(--dim2);margin-top:2px" id="pn-sub">—</div></div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <!-- بيانات -->
    <div class="psec"><div class="psec-title">📋 البيانات</div><div id="pn-info"></div></div>
    <!-- الحساب الجاري -->
    <div class="psec">
      <div class="psec-title">💰 الحساب الجاري</div>
      <div id="pn-balance"></div>
      <button class="btn btn-g btn-sm" style="margin-top:10px;width:100%" onclick="openPay()">💳 تسجيل دفعة</button>
    </div>
    <!-- الأوردرات المرتبطة -->
    <div class="psec"><div class="psec-title">📦 الأوردرات المرتبطة</div><div id="pn-orders"></div></div>
    <!-- سجل المدفوعات -->
    <div class="psec" style="border-bottom:none"><div class="psec-title">📋 سجل المدفوعات</div><div id="pn-payments"></div></div>
    <!-- أزرار إدارة -->
    <div class="psec" style="border-bottom:none;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" onclick="openEdit()">✏️ تعديل</button>
      <button class="btn btn-ghost btn-sm" style="color:var(--r)" onclick="delSup()">🗑 حذف</button>
    </div>
  </div>
</div>

<!-- Modal: إضافة/تعديل -->
<div class="overlay" id="ov-add">
  <div class="modal" style="max-width:480px">
    <div class="modal-head"><span class="modal-title" id="add-title">＋ إضافة مورد</span><button class="modal-x" onclick="cM('add')">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <input type="hidden" id="add-type" value="printer">
      <div id="type-tabs" style="display:flex;gap:8px;margin-bottom:16px">
        <button class="btn btn-r btn-sm" id="tt-printer" onclick="setAddType('printer')">🏭 مطبعة</button>
        <button class="btn btn-ghost btn-sm" id="tt-shipper" onclick="setAddType('shipper')">🚚 شحن</button>
      </div>
      <!-- مشترك -->
      <div class="fg"><label>الاسم *</label><input class="inp" id="f-name" placeholder="اسم المورد"></div>
      <div class="g2">
        <div class="fg"><label>تليفون</label><input class="inp" id="f-phone" type="tel" placeholder="01xxxxxxxxx"></div>
        <div class="fg"><label>واتساب</label><input class="inp" id="f-whatsapp" type="tel" placeholder="01xxxxxxxxx"></div>
      </div>
      <div class="fg"><label>العنوان</label><input class="inp" id="f-address" placeholder="العنوان"></div>
      <!-- خاص بالمطبعة -->
      <div id="printer-fields">
        <div class="fg"><label>نوع الطباعة</label>
          <select class="inp" id="f-printtype">
            <option value="">— اختر —</option>
            <option>أوفست</option><option>ديجيتال</option><option>لارج فورمات</option><option>أوفست + ديجيتال</option>
          </select>
        </div>
        <div class="g2">
          <div class="fg"><label>شروط الدفع</label>
            <select class="inp" id="f-payterms">
              <option value="cash">كاش</option>
              <option value="15days">آجل 15 يوم</option>
              <option value="30days">آجل 30 يوم</option>
              <option value="60days">آجل 60 يوم</option>
            </select>
          </div>
          <div class="fg"><label>حد الائتمان (ج)</label><input class="inp" id="f-creditlimit" type="number" placeholder="0"></div>
        </div>
      </div>
      <!-- خاص بالشحن -->
      <div id="shipper-fields" style="display:none">
        <div class="g2">
          <div class="fg"><label>سعر التوصيل (ج)</label><input class="inp" id="f-shipfee" type="number" placeholder="35"></div>
          <div class="fg"><label>مناطق التغطية</label><input class="inp" id="f-areas" placeholder="القاهرة، الجيزة..."></div>
        </div>
      </div>
      <div class="fg"><label>ملاحظات</label><textarea class="inp" id="f-note" style="min-height:60px" placeholder="أي ملاحظات..."></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="cM('add')">إلغاء</button>
      <button class="btn btn-r" onclick="saveSup()">✓ حفظ</button>
    </div>
  </div>
</div>

<!-- Modal: تسجيل دفعة -->
<div class="overlay" id="ov-pay">
  <div class="modal" style="max-width:400px">
    <div class="modal-head"><span class="modal-title" id="pay-title">💳 تسجيل دفعة</span><button class="modal-x" onclick="cM('pay')">✕</button></div>
    <div class="modal-body">
      <div id="pay-balance-info" style="background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px"></div>
      <div class="fg"><label>المبلغ (ج) *</label><input class="inp" id="pay-amount" type="number" placeholder="0"></div>
      <div class="fg"><label>المحفظة</label><select class="inp" id="pay-wallet"><option value="">— اختر —</option></select></div>
      <div class="fg"><label>ملاحظة</label><input class="inp" id="pay-note" placeholder="اختياري"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="cM('pay')">إلغاء</button>
      <button class="btn btn-g" onclick="savePay()">✓ تسجيل الدفعة</button>
    </div>
  </div>
</div>

<div id="toasts" class="toasts"></div>

<script type="module">
// ══ Sidebar ══
const SBPAGES=[{file:'index.html',label:'لوحة التحكم',ico:'⬡',adminOnly:true},{file:'clients.html',label:'العملاء',ico:'👤',perm:'clients'},{file:'design.html',label:'التصميم',ico:'✏️',perm:'design'},{file:'print.html',label:'الطباعة',ico:'🖨️',perm:'print'},{file:'production.html',label:'التنفيذ',ico:'🏭',perm:'production'},{file:'shipping.html',label:'الشحن',ico:'🚚',perm:'shipping'},{file:'shipping-accounts.html',label:'حسابات الشحن',ico:'📦',perm:'shipping-accounts'},{file:'archive.html',label:'الأرشيف',ico:'📁',perm:'archive'},{file:'accounts.html',label:'الحسابات',ico:'💰',perm:'accounts'},{file:'suppliers.html',label:'الموردين',ico:'▣',perm:'suppliers'},{file:'products.html',label:'المنتجات',ico:'◈',perm:'products'},{file:'employees.html',label:'الموظفين',ico:'👥',adminOnly:true},{file:'reports.html',label:'التقارير',ico:'📊',perm:'reports'},{file:'settings.html',label:'الإعدادات',ico:'⚙️',adminOnly:true}];
const RMAP={admin:'index.html',operation_manager:'index.html',customer_service:'cs-dashboard.html',graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'};
function buildSidebar(ud,cur){const role=ud?.role||'customer_service';const pages=(ud?.permissions?.pages)||[];const isAdm=['admin','operation_manager'].includes(role);const nav=document.getElementById('nav-scroll-dynamic');if(!nav)return;let html=`<a class="nav-link${cur===RMAP[role]?' active':''}" href="${RMAP[role]||'index.html'}"><span class="nav-ico">⬡</span> ${isAdm?'لوحة التحكم':'داشبوردي'}</a>`;for(const p of SBPAGES){if(p.file==='index.html')continue;const ok=isAdm||(p.adminOnly?false:pages.includes('*')||pages.includes(p.perm||''));if(!ok)continue;html+=`<a class="nav-link${cur===p.file?' active':''}" href="${p.file}"><span class="nav-ico">${p.ico}</span> ${p.label}</a>`;}nav.innerHTML=html;}

import {initializeApp} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getAuth,onAuthStateChanged,signOut} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {getFirestore,collection,doc,onSnapshot,addDoc,updateDoc,deleteDoc,getDoc,getDocs,query,where,serverTimestamp} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"});
const auth=getAuth(app),db=getFirestore(app);

let suppliers=[],shippers=[],payments=[],orders=[],wallets=[];
let currentTab='printers',activeId=null,activeSup=null,userName='',role='';
const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const gv=id=>document.getElementById(id)?.value||'';
const sv=(id,v)=>{const e=document.getElementById(id);if(e)e.value=v??'';};
const setText=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
const oM=id=>document.getElementById('ov-'+id)?.classList.add('open');
const cM=id=>document.getElementById('ov-'+id)?.classList.remove('open');
window.cM=cM;window.oM=oM;
const nowStr=()=>new Date().toLocaleDateString('ar-EG')+' '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
const PAYTERMS={cash:'كاش',['15days']:'آجل 15 يوم',['30days']:'آجل 30 يوم',['60days']:'آجل 60 يوم'};

function toast(msg,t=''){const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}
window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};

let __started=false;
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  if(__started)return; __started=true;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(snap.exists()){const d=snap.data();role=d.role||'';userName=d.name||u.email;setText('nav-name',userName);document.getElementById('nav-av').textContent=userName[0]?.toUpperCase();buildSidebar(d,'suppliers.html');}
  // Listeners
  onSnapshot(collection(db,'suppliers_v2'),s=>{window.markSynced&&window.markSynced();suppliers=s.docs.map(d=>({...d.data(),_id:d.id,supType:'printer'}));renderAll();});
  onSnapshot(collection(db,'shippers_v2'),s=>{shippers=s.docs.map(d=>({...d.data(),_id:d.id,supType:'shipper'}));renderAll();});
  onSnapshot(collection(db,'supplier_payments'),s=>{payments=s.docs.map(d=>({...d.data(),_id:d.id}));renderAll();});
  onSnapshot(query(collection(db,'orders'),where('stage','in',['production','printing','shipping','archived'])),s=>{orders=s.docs.map(d=>({...d.data(),_id:d.id}));renderAll();});
  onSnapshot(collection(db,'wallets'),s=>{wallets=s.docs.map(d=>({...d.data(),_id:d.id}));fillWallets();});
});

function fillWallets(){
  const s=document.getElementById('pay-wallet');if(!s)return;
  s.innerHTML='<option value="">— اختر المحفظة —</option>'+wallets.map(w=>`<option value="${w._id}">${w.type==='cash'?'💵':w.type==='bank'?'🏦':'💳'} ${w.name}</option>`).join('');
}

// ══ حساب المورد ══
function getSupBalance(supId){
  // المشتريات من التنفيذ
  const purchases=orders.reduce((sum,o)=>{
    const ci=o.costItems||[];
    return sum+ci.filter(c=>c.supplierId===supId).reduce((s,c)=>s+(parseFloat(c.total)||0),0);
  },0);
  // المدفوع
  const paid=payments.filter(p=>p.supplierId===supId).reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  return {purchases,paid,due:Math.max(0,purchases-paid)};
}

function getShipperStats(shipperId){
  const shipOrders=orders.filter(o=>o.shipCompanyId===shipperId||o.shipperId===shipperId);
  const delivered=shipOrders.filter(o=>o.shippingStatus==='delivered').length;
  const returned=shipOrders.filter(o=>['returned_refused','returned'].includes(o.shippingStatus)).length;
  const total=shipOrders.length;
  // تسويات معلقة
  const pending=payments.filter(p=>p.shipperId===shipperId&&p.type==='settlement'&&!p.received).reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  return {total,delivered,returned,rate:total?Math.round(delivered/total*100):0,pendingSettlement:pending};
}

// ══ KPIs ══
function updateKPIs(){
  const allSups=[...suppliers,...shippers];
  setText('k-total',allSups.length);
  const totalDue=suppliers.reduce((s,sup)=>s+getSupBalance(sup._id).due,0);
  const totalPaid=suppliers.reduce((s,sup)=>s+getSupBalance(sup._id).paid,0);
  setText('k-due',fn(totalDue)+' ج');
  setText('k-paid',fn(totalPaid)+' ج');
  const linkedOrders=new Set(orders.filter(o=>(o.costItems||[]).some(c=>c.supplierId)).map(o=>o._id));
  setText('k-orders',linkedOrders.size);
  setText('sub',`${suppliers.length} مطبعة · ${shippers.length} شحن`);
}

// ══ Tabs ══
window.switchTab=function(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
};

let currentSort='due';
window.setSort=function(sort,btn){
  currentSort=sort;
  document.querySelectorAll('.ftab[id^="sort-"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
};

function sortSuppliers(data){
  if(currentSort==='due') return [...data].sort((a,b)=>getSupBalance(b._id).due-getSupBalance(a._id).due);
  if(currentSort==='purchases') return [...data].sort((a,b)=>getSupBalance(b._id).purchases-getSupBalance(a._id).purchases);
  if(currentSort==='name') return [...data].sort((a,b)=>(a.name||'').localeCompare(b.name||'','ar'));
  return data;
}

function sortShippers(data){
  if(currentSort==='due') return [...data].sort((a,b)=>getShipperStats(b._id).pendingSettlement-getShipperStats(a._id).pendingSettlement);
  if(currentSort==='purchases') return [...data].sort((a,b)=>getShipperStats(b._id).total-getShipperStats(a._id).total);
  if(currentSort==='name') return [...data].sort((a,b)=>(a.name||'').localeCompare(b.name||'','ar'));
  return data;
}

function renderAll(){updateKPIs();renderList();}

function renderList(){
  const el=document.getElementById('list');if(!el)return;
  if(currentTab==='printers') renderPrinters(el);
  else renderShippers(el);
}

function renderPrinters(el){
  if(!suppliers.length){el.innerHTML='<div class="empty"><div class="empty-icon">🏭</div><div class="empty-text">لا توجد مطابع</div></div>';return;}
  el.innerHTML=sortSuppliers(suppliers).map(s=>{
    const {purchases,paid,due}=getSupBalance(s._id);
    const creditLimit=parseFloat(s.creditLimit)||0;
    const overCredit=creditLimit>0&&due>creditLimit;
    return`<div class="sup-card" onclick="openSup('${s._id}','printer')">
      <div class="sup-card-head">
        <div>
          <div class="sup-name">${s.name}</div>
          <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">
            ${s.printType?`<span class="type-badge">🖨️ ${s.printType}</span>`:''}
            ${s.payTerms?`<span class="type-badge" style="background:rgba(0,217,126,.1);color:var(--g)">${PAYTERMS[s.payTerms]||s.payTerms}</span>`:''}
            ${overCredit?`<span class="badge" style="background:rgba(255,61,110,.15);color:var(--r)">⚠️ تجاوز الحد</span>`:''}
          </div>
        </div>
        <div style="text-align:left">
          ${s.phone?`<a href="tel:${s.phone}" onclick="event.stopPropagation()" style="color:var(--b);font-size:12px;font-weight:700">📞 ${s.phone}</a>`:''}
          ${s.whatsapp?`<br><a href="https://wa.me/2${s.whatsapp.replace(/^0/,'')}" target="_blank" onclick="event.stopPropagation()" style="color:var(--g);font-size:11px">📱 واتساب</a>`:''}
        </div>
      </div>
      <div class="sup-stats">
        <div class="sup-stat"><div class="sup-stat-val" style="color:var(--b)">${fn(purchases)} ج</div><div class="sup-stat-lbl">مشتريات</div></div>
        <div class="sup-stat"><div class="sup-stat-val" style="color:var(--g)">${fn(paid)} ج</div><div class="sup-stat-lbl">مدفوع</div></div>
        <div class="sup-stat"><div class="sup-stat-val" style="color:${due>0?'var(--r)':'var(--g)'};">${fn(due)} ج</div><div class="sup-stat-lbl">مستحق</div></div>
      </div>
    </div>`;
  }).join('');
}

function renderShippers(el){
  if(!shippers.length){el.innerHTML='<div class="empty"><div class="empty-icon">🚚</div><div class="empty-text">لا توجد شركات شحن</div></div>';return;}
  el.innerHTML=sortShippers(shippers).map(s=>{
    const {total,delivered,returned,rate,pendingSettlement}=getShipperStats(s._id);
    return`<div class="sup-card" onclick="openSup('${s._id}','shipper')">
      <div class="sup-card-head">
        <div>
          <div class="sup-name">${s.name}</div>
          <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">
            ${s.shipFee?`<span class="type-badge">💰 ${s.shipFee} ج/طلب</span>`:''}
            ${s.areas?`<span class="type-badge" style="background:rgba(167,139,250,.1);color:var(--p)">📍 ${s.areas}</span>`:''}
          </div>
        </div>
        <div style="text-align:left">
          ${s.phone?`<a href="tel:${s.phone}" onclick="event.stopPropagation()" style="color:var(--b);font-size:12px;font-weight:700">📞 ${s.phone}</a>`:''}
        </div>
      </div>
      <div class="sup-stats">
        <div class="sup-stat"><div class="sup-stat-val" style="color:var(--b)">${total}</div><div class="sup-stat-lbl">أوردر</div></div>
        <div class="sup-stat"><div class="sup-stat-val" style="color:${rate>=80?'var(--g)':'var(--y)'};">${rate}%</div><div class="sup-stat-lbl">نسبة تسليم</div></div>
        <div class="sup-stat"><div class="sup-stat-val" style="color:${pendingSettlement>0?'var(--r)':'var(--g)'};">${fn(pendingSettlement)} ج</div><div class="sup-stat-lbl">معلق</div></div>
      </div>
    </div>`;
  }).join('');
}

// ══ Panel ══
window.openSup=function(id,type){
  activeId=id;
  const sup=type==='printer'?suppliers.find(s=>s._id===id):shippers.find(s=>s._id===id);
  if(!sup)return; activeSup={...sup,supType:type};
  setText('pn-name',sup.name);
  setText('pn-sub',type==='printer'?'🏭 مطبعة':'🚚 شحن');
  document.getElementById('panel-ov').style.display='flex';
  renderPanelContent(activeSup);
};

window.closePanel=function(){
  document.getElementById('panel-ov').style.display='none';
  activeId=null;activeSup=null;
};

function renderPanelContent(sup){
  // البيانات
  const infoEl=document.getElementById('pn-info');
  const infoRows=[
    sup.phone?`<div class="tx-row"><span style="color:var(--dim2)">📞 تليفون</span><a href="tel:${sup.phone}" style="color:var(--b);font-weight:700">${sup.phone}</a></div>`:'',
    sup.whatsapp?`<div class="tx-row"><span style="color:var(--dim2)">📱 واتساب</span><a href="https://wa.me/2${sup.whatsapp.replace(/^0/,'')}" target="_blank" style="color:var(--g);font-weight:700">${sup.whatsapp}</a></div>`:'',
    sup.address?`<div class="tx-row"><span style="color:var(--dim2)">📍 العنوان</span><span>${sup.address}</span></div>`:'',
    sup.printType?`<div class="tx-row"><span style="color:var(--dim2)">🖨️ نوع الطباعة</span><span>${sup.printType}</span></div>`:'',
    sup.payTerms?`<div class="tx-row"><span style="color:var(--dim2)">📅 شروط الدفع</span><span>${PAYTERMS[sup.payTerms]||sup.payTerms}</span></div>`:'',
    sup.creditLimit?`<div class="tx-row"><span style="color:var(--dim2)">💳 حد الائتمان</span><span>${fn(sup.creditLimit)} ج</span></div>`:'',
    sup.shipFee?`<div class="tx-row"><span style="color:var(--dim2)">💰 سعر التوصيل</span><span>${sup.shipFee} ج</span></div>`:'',
    sup.areas?`<div class="tx-row"><span style="color:var(--dim2)">📍 المناطق</span><span>${sup.areas}</span></div>`:'',
    sup.note?`<div style="margin-top:8px;padding:8px;background:var(--bg3);border-radius:8px;font-size:12px;color:var(--dim2)">${sup.note}</div>`:'',
  ].filter(Boolean).join('');
  infoEl.innerHTML=infoRows||'<div style="color:var(--dim2);font-size:12px">لا توجد بيانات إضافية</div>';

  // الحساب الجاري
  const balEl=document.getElementById('pn-balance');
  if(sup.supType==='printer'){
    const {purchases,paid,due}=getSupBalance(sup._id);
    balEl.innerHTML=`
      <div class="balance-row" style="background:rgba(59,158,255,.08)"><span style="color:var(--dim2);font-size:12px">المشتريات</span><span style="font-weight:800;color:var(--b)">${fn(purchases)} ج</span></div>
      <div class="balance-row" style="background:rgba(0,217,126,.08)"><span style="color:var(--dim2);font-size:12px">المدفوع</span><span style="font-weight:800;color:var(--g)">${fn(paid)} ج</span></div>
      <div class="balance-row" style="background:rgba(255,61,110,.08)"><span style="color:var(--dim2);font-size:12px">المستحق</span><span style="font-weight:900;font-size:18px;color:var(--r)">${fn(due)} ج</span></div>`;
  } else {
    const {total,delivered,returned,rate,pendingSettlement}=getShipperStats(sup._id);
    balEl.innerHTML=`
      <div class="balance-row" style="background:rgba(59,158,255,.08)"><span style="color:var(--dim2);font-size:12px">إجمالي الأوردرات</span><span style="font-weight:800;color:var(--b)">${total}</span></div>
      <div class="balance-row" style="background:rgba(0,217,126,.08)"><span style="color:var(--dim2);font-size:12px">تم التسليم</span><span style="font-weight:800;color:var(--g)">${delivered} (${rate}%)</span></div>
      <div class="balance-row" style="background:rgba(255,170,0,.08)"><span style="color:var(--dim2);font-size:12px">مرتجع</span><span style="font-weight:800;color:var(--y)">${returned}</span></div>
      <div class="balance-row" style="background:rgba(255,61,110,.08)"><span style="color:var(--dim2);font-size:12px">تسويات معلقة</span><span style="font-weight:900;color:var(--r)">${fn(pendingSettlement)} ج</span></div>`;
  }

  // الأوردرات المرتبطة
  const ordEl=document.getElementById('pn-orders');
  const relOrders=orders.filter(o=>(o.costItems||[]).some(c=>c.supplierId===sup._id)||o.shipCompanyId===sup._id||o.shipperId===sup._id);
  ordEl.innerHTML=relOrders.slice(0,10).map(o=>{
    const ci=(o.costItems||[]).filter(c=>c.supplierId===sup._id);
    const total=ci.reduce((s,c)=>s+(parseFloat(c.total)||0),0);
    return`<div class="tx-row">
      <div><div style="font-weight:700;font-size:12px">${o.clientName||'—'}</div><div style="color:var(--dim2);font-size:10px">${o.orderId||o._id.slice(-6)}</div></div>
      <span style="font-weight:800;color:var(--r)">${fn(total)} ج</span>
    </div>`;
  }).join('')||'<div style="color:var(--dim2);font-size:12px">لا توجد أوردرات</div>';

  // سجل المدفوعات
  const payEl=document.getElementById('pn-payments');
  const supPays=payments.filter(p=>p.supplierId===sup._id).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  payEl.innerHTML=supPays.slice(0,10).map(p=>`
    <div class="tx-row">
      <div><div style="font-weight:700;font-size:12px">${p.date||'—'}</div><div style="color:var(--dim2);font-size:10px">${p.note||'دفعة'}</div></div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-weight:800;color:var(--g)">${fn(p.amount)} ج</span>
        <button onclick="delPay('${p._id}',${p.amount},'${p.walletId||''}')" style="width:24px;height:24px;border-radius:6px;border:1px solid rgba(255,61,110,.3);background:rgba(255,61,110,.08);color:var(--r);cursor:pointer;font-size:12px">✕</button>
      </div>
    </div>`).join('')||'<div style="color:var(--dim2);font-size:12px">لا توجد مدفوعات</div>';
}

// ══ إضافة/تعديل ══
window.openAdd=function(){
  document.getElementById('edit-id').value='';
  document.getElementById('add-title').textContent='＋ إضافة مورد';
  setAddType('printer');
  ['name','phone','whatsapp','address','printtype','creditlimit','shipfee','areas','note'].forEach(f=>{sv('f-'+f,'');});
  sv('f-payterms','cash');
  oM('add');
};

window.setAddType=function(type){
  document.getElementById('add-type').value=type;
  document.getElementById('printer-fields').style.display=type==='printer'?'block':'none';
  document.getElementById('shipper-fields').style.display=type==='shipper'?'block':'none';
  document.getElementById('tt-printer').className=type==='printer'?'btn btn-r btn-sm':'btn btn-ghost btn-sm';
  document.getElementById('tt-shipper').className=type==='shipper'?'btn btn-r btn-sm':'btn btn-ghost btn-sm';
};

window.openEdit=function(){
  if(!activeSup)return;
  document.getElementById('edit-id').value=activeSup._id;
  document.getElementById('add-title').textContent='✏️ تعديل';
  setAddType(activeSup.supType);
  sv('f-name',activeSup.name);sv('f-phone',activeSup.phone);sv('f-whatsapp',activeSup.whatsapp);
  sv('f-address',activeSup.address);sv('f-note',activeSup.note);
  sv('f-printtype',activeSup.printType);sv('f-payterms',activeSup.payTerms||'cash');sv('f-creditlimit',activeSup.creditLimit);
  sv('f-shipfee',activeSup.shipFee);sv('f-areas',activeSup.areas);
  oM('add');
};

window.saveSup=async function(){
  const name=gv('f-name').trim();if(!name)return toast('⚠️ أدخل الاسم','err');
  const type=gv('add-type');
  const editId=gv('edit-id');
  const col=type==='printer'?'suppliers_v2':'shippers_v2';
  const data={
    name,phone:gv('f-phone'),whatsapp:gv('f-whatsapp'),address:gv('f-address'),note:gv('f-note'),
    ...(type==='printer'?{printType:gv('f-printtype'),payTerms:gv('f-payterms'),creditLimit:parseFloat(gv('f-creditlimit'))||0}:{}),
    ...(type==='shipper'?{shipFee:parseFloat(gv('f-shipfee'))||0,areas:gv('f-areas')}:{}),
    updatedAt:serverTimestamp()
  };
  try{
    if(editId)await updateDoc(doc(db,col,editId),data);
    else await addDoc(collection(db,col),{...data,createdAt:serverTimestamp()});
    cM('add');toast('✅ تم الحفظ','ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

window.delSup=async function(){
  if(!activeSup)return;
  if(!confirm(`حذف "${activeSup.name}"؟`))return;
  const col=activeSup.supType==='printer'?'suppliers_v2':'shippers_v2';
  try{await deleteDoc(doc(db,col,activeId));closePanel();toast('✅ تم الحذف','ok');}
  catch(e){toast('❌ '+e.message,'err');}
};

// ══ تسجيل دفعة ══
window.openPay=function(){
  if(!activeSup||activeSup.supType!=='printer')return;
  const {purchases,paid,due}=getSupBalance(activeId);
  document.getElementById('pay-balance-info').innerHTML=`
    <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--dim2)">مشتريات</span><span style="font-weight:800;color:var(--b)">${fn(purchases)} ج</span></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--dim2)">مدفوع</span><span style="font-weight:800;color:var(--g)">${fn(paid)} ج</span></div>
    <div style="display:flex;justify-content:space-between"><span style="color:var(--dim2)">مستحق</span><span style="font-weight:900;color:var(--r)">${fn(due)} ج</span></div>`;
  document.getElementById('pay-title').textContent='💳 دفعة لـ '+activeSup.name;
  sv('pay-amount','');sv('pay-note','');
  oM('pay');
};

window.savePay=async function(){
  const amount=parseFloat(gv('pay-amount'))||0;
  if(!amount)return toast('⚠️ أدخل المبلغ','err');
  const walletId=gv('pay-wallet');
  try{
    // خصم من المحفظة
    if(walletId){
      const w=wallets.find(x=>x._id===walletId);
      if(w){const newBal=(parseFloat(w.balance)||0)-amount;if(newBal<0)return toast('⚠️ رصيد غير كافٍ','err');await updateDoc(doc(db,'wallets',walletId),{balance:newBal});}
    }
    await addDoc(collection(db,'supplier_payments'),{supplierId:activeId,supplierName:activeSup.name,amount,walletId,date:nowStr(),note:gv('pay-note'),createdAt:serverTimestamp()});
    cM('pay');toast('✅ تم تسجيل الدفعة','ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

window.delPay=async function(payId,amount,walletId){
  if(!confirm('حذف هذه الدفعة؟'))return;
  try{
    if(walletId){const w=wallets.find(x=>x._id===walletId);if(w)await updateDoc(doc(db,'wallets',walletId),{balance:(parseFloat(w.balance)||0)+amount});}
    await deleteDoc(doc(db,'supplier_payments',payId));
    toast('✅ تم حذف الدفعة','ok');
    if(activeSup)renderPanelContent(activeSup);
  }catch(e){toast('❌ '+e.message,'err');}
};
</script>
</body>
</html>
