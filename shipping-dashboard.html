<script type="module">

import { app, auth, db } from "./core/firebase-init.js";
import { setText } from "./core/dom-utils.js";
import { canDo } from "./core/permissions-matrix.js";
import { calcRem } from "./core/order-math.js";
// ══ SIDEBAR - Final Solution ══
async function buildDynamicSidebar(uid, currentPage) {
  const nav = document.getElementById('nav-scroll-dynamic') || document.querySelector('.nav-scroll');
  if (!nav) return;
  
  try {
    const usnap = await getDoc(doc(db,'users',uid));
    const ud = usnap.exists() ? usnap.data() : {};
    const role = ud.role || 'admin';
    _sdRole = role;
    const perms = ud.permissions || {};
    const userPages = perms.pages || [];
    // Step 6.3 — capability-based per RULE P1.3. view_all_shipments
    // matches the admin + operation_manager set (supervisor tier).
    const isAdm = canDo('view_all_shipments', role, perms);
    
    const ROLE_DASH = {
      admin:'accounts.html', operation_manager:'ops-dashboard.html',
      customer_service:'cs-dashboard.html',
      graphic_designer:'designer-dashboard.html',
      design_operator:'designer-dashboard.html',
      production_agent:'production-dashboard.html',
      shipping_officer:'shipping-dashboard.html',
      wallet_manager:'accounts.html',
    };
    
    const ALL = [
      {f:'clients.html',         l:'العملاء',       i:'👤', p:'clients'},
      {f:'design.html',          l:'التصميم',       i:'✏️', p:'design'},
      {f:'print.html',           l:'الطباعة',       i:'🖨️', p:'print'},
      {f:'production.html',      l:'التنفيذ',       i:'🏭', p:'production'},
      {f:'shipping.html',        l:'الشحن',         i:'🚚', p:'shipping'},
      {f:'shipping-accounts.html',l:'حسابات الشحن',i:'📦', p:'shipping-accounts'},
      {f:'archive.html',         l:'الأرشيف',       i:'📁', p:'archive'},
      {f:'accounts.html',        l:'الحسابات',      i:'💰', p:'accounts'},
      {f:'approvals.html',       l:'الاعتمادات',    i:'🔐', p:'approvals'},
      {f:'my-requests.html',     l:'طلباتي',        i:'📋', public:true},
      {f:'suppliers.html',       l:'الموردين',      i:'▣',  p:'suppliers'},
      {f:'products.html',        l:'المنتجات',      i:'◈',  p:'products'},
      {f:'employees.html',       l:'الموظفين',      i:'👥', p:'employees', adminOnly:true},
      {f:'reports.html',         l:'التقارير',      i:'📊', p:'reports'},
      {f:'design-workspace.html', l:'مساحة التصميم', i:'🖥️', p:'design'},
      {f:'gallery.html', l:'المعرض', i:'🖼️', public:true},
      {f:'settings.html',        l:'الإعدادات',     i:'⚙️', p:'settings', adminOnly:true},
    ];
    
    const dash = ROLE_DASH[role] || 'accounts.html';
    const dashLabel = isAdm ? 'الحسابات' : 'داشبوردي';
    
    let html = `<a class="nav-link${currentPage===dash?' active':''}" href="${dash}">
      <span class="nav-ico">⬡</span> ${dashLabel}
    </a>
    <a class="nav-link${currentPage==='my-profile.html'?' active':''}" href="my-profile.html">
      <span class="nav-ico">👤</span> ملفي
    </a>`;

    for (const pg of ALL) {
      if (pg.adminOnly && !isAdm) continue;
      const ok = pg.public || isAdm || userPages.includes('*') || userPages.includes(pg.p);
      if (!ok) continue;
      html += `<a class="nav-link${currentPage===pg.f?' active':''}" href="${pg.f}">
        <span class="nav-ico">${pg.i}</span> ${pg.l}
      </a>`;
    }
    
    nav.innerHTML = html;
  } catch(e) {
    // fallback - show basic links
    nav.innerHTML = `
      <a class="nav-link" href="accounts.html"><span class="nav-ico">⬡</span> الرئيسية</a>
      <a class="nav-link" href="clients.html"><span class="nav-ico">👤</span> العملاء</a>
      <a class="nav-link" href="design.html"><span class="nav-ico">✏️</span> التصميم</a>
    `;
    console.warn('sidebar fallback:', e.message);
  }
}
// ═══════════════════════════════

// ── Global Error Handler ──
window.addEventListener('unhandledrejection',e=>{
  const msg=e.reason?.message||'';
  if(msg.includes('permission-denied')||msg.includes('Missing or insufficient')){
    console.warn('🔒 Permission denied — راجع الأدمن');
  } else if(msg&&!msg.includes('AbortError')){
    console.error('Error:',msg);
  }
  e.preventDefault();
});

// ══ Sidebar — موحَّد عبر sidebar.js ══
// inbox.html الآن public في sidebar-config.js → الـ append المخصص للـ shipping أصبح unnecessary
const SIDEBAR_PAGES = window.SIDEBAR_PAGES;
const ROLE_HOME_MAP = window.ROLE_HOME;
// buildSidebar / guardPage / initSidebar توفّرها sidebar.js كـ window globals
// ══════════════════════
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { dataCache, cachedQuery } from "./core/data-cache.js";
import { staggerSubs } from "./core/lazy-subs.js";
import { VirtualList } from "./core/virtual-scroll.js";
import { employeeActions } from "./employee-actions.js";
import { warmupForRole } from "./core/offline-warmup.js";
import { warmImages, extractOrderImageUrls } from "./core/image-cache.js";
import { mountAttendanceSelf } from "./core/attendance-self-widget.js";
let allOrders=[],todayAtt=null,currentUser=null,userName='',uid='',activeTab='ready',myGoal=null,myLastEvalShip=null,myEmpIdShip='';
let _sdRole='';
const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
function maskPh(p){if(!p)return '';if(['admin','operation_manager','customer_service','shipping_officer'].includes(_sdRole))return p;const s=String(p).replace(/\D/g,'');return s.length>=6?s.slice(0,3)+'****'+s.slice(-3):'****';}
const now=new Date();
const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
function isThisMonth(ts){if(!ts?.toDate)return false;const d=ts.toDate();return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}
function toast(msg,t=''){const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}
window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  currentUser=u; uid=u.uid;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(!snap.exists()){window.location.href='login.html';return;}
  /* sidebar: central mount */
  const d=snap.data();
  if(!['shipping_officer','admin','operation_manager'].includes(d.role)){window.location.href='login.html';return;}
  warmupForRole(d.role);
  userName=d.name||u.email;
  setText('nav-name',userName);setText('greeting','أهلاً '+userName.split(' ')[0]);
  {const _av=document.getElementById('nav-av'); if(_av)_av.textContent=((userName||'؟')[0]||'؟').toUpperCase();}
  setText('sub',MONTHS[now.getMonth()]+' '+now.getFullYear());
  // Step 6.3 — capability-based per RULE P1.3
  const isAdminShip=canDo('view_all_shipments', d.role, d.permissions||{});
  staggerSubs([
    { priority:0, fn:()=>dataCache.subscribe(cachedQuery('orders').where('stage','in',['shipping','archived','production']).limit(3000).build(),(docs)=>{
      allOrders=isAdminShip?docs:docs.filter(o=>o.shippingOfficer===uid||o.shippingOfficerId===uid||o.shippingOfficer===userName||!o.shippingOfficer);
      warmImages(extractOrderImageUrls(allOrders));
      updateKPIs();renderAlerts();renderOrders();
    })},
    { priority:1, fn:()=>{
      let __empSubAdded=false;
      dataCache.subscribe(cachedQuery('employees').limit(200).build(),(docs)=>{
        const emp=docs.find(e=>e.authUid===uid||e.email===u.email);
        myEmpIdShip=emp?._id||'';
        if(myEmpIdShip&&!__empSubAdded){
          __empSubAdded=true;
          const mk=new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0');
          dataCache.subscribe(cachedQuery('employee_goals').where('employeeId','==',myEmpIdShip).where('month','==',mk).limit(5).build(),(gDocs)=>{
            myGoal=gDocs.length?gDocs[0]:null;
            renderShipGoalCard();
          });
          dataCache.subscribe(cachedQuery('employee_evaluations').where('employeeId','==',myEmpIdShip).limit(60).build(),(eDocs)=>{
            const evs=eDocs.sort((a,b)=>(b.month||'').localeCompare(a.month||''));
            myLastEvalShip=evs[0]||null;
            renderShipGoalCard();
          });
        }
      });
    }},
  ]);
  // نقطة الحضور/الانصراف/الإجازات المركزية — widget موحّد، مركّب مرة واحدة
  try{ mountAttendanceSelf({ container:document.getElementById('att-self-host'), db, user:u }); }catch(_){}
});
function renderShipGoalCard(){
  const el=document.getElementById('ship-goal-card');if(!el)return;
  if(!myGoal&&!myLastEvalShip){el.style.display='none';return;}
  el.style.display='block';
  let html='<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">';
  if(myGoal?.targetOrdersMonthly>0){
    const myShipped=allOrders.filter(o=>o.stage==='archived'&&isThisMonth(o.createdAt)).length;
    const pct=Math.min(100,Math.round(myShipped/myGoal.targetOrdersMonthly*100));
    const col=pct>=100?'var(--g)':pct>=70?'var(--c)':'var(--y)';
    html+=`<div style="flex:1;min-width:140px"><div style="font-size:var(--fs-xs);color:var(--dim2);font-weight:var(--fw-bold);margin-bottom:4px">🎯 هدف الشحن الشهري</div>
      <div style="font-size:var(--fs-lg);font-weight:var(--fw-heavy);color:${col}">${myShipped} / ${myGoal.targetOrdersMonthly} <span style="font-size:var(--fs-xs);font-weight:var(--fw-medium)">شحنة</span></div>
      <div style="height:4px;background:var(--bg3);border-radius:99px;margin-top:4px"><div style="height:4px;border-radius:99px;width:${pct}%;background:${col}"></div></div>
    </div>`;
  }
  if(myLastEvalShip){
    const s=myLastEvalShip.totalScore||0;
    const c=s>=85?'var(--g)':s>=70?'var(--c)':s>=50?'var(--y)':'var(--r)';
    html+=`<div style="text-align:center;padding:8px 14px;background:var(--bg3);border-radius:var(--rad)">
      <div style="font-size:20px;font-weight:var(--fw-heavy);color:${c}">${s}</div>
      <div style="font-size:var(--fs-tiny);color:var(--dim2);font-weight:var(--fw-bold)">آخر تقييم</div>
    </div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}
function updateKPIs(){
  const ready=allOrders.filter(o=>o.stage==='production'||(!o.shipStage||o.shipStage==='ready')&&o.stage==='shipping');
  const shipped=allOrders.filter(o=>o.shipStage==='wait_delivery'&&o.stage==='shipping');
  const monthly=allOrders.filter(o=>isThisMonth(o.createdAt));
  const collected=monthly.reduce((s,o)=>s+(parseFloat(o.totalPaid)||parseFloat(o.paid)||0),0);
  const remaining=allOrders.filter(o=>o.stage!=='archived').reduce((s,o)=>s+calcRem(o),0);
  setText('k-ready',ready.length);setText('k-shipped',shipped.length);
  setText('k-collected',fn(collected));setText('k-remaining',fn(remaining));
}
function renderAlerts(){
  const withRem=allOrders.filter(o=>calcRem(o)>0&&o.stage!=='archived');
  const box=document.getElementById('alerts-box');
  const list=document.getElementById('alerts-list');
  if(!withRem.length||!box||!list){if(box)box.style.display='none';return;}
  box.style.display='block';
  list.innerHTML=withRem.slice(0,5).map(o=>`
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:var(--fs-base)">
      <span style="font-weight:var(--fw-bold)">${o.clientName||'—'} <span class="text-muted">·</span> ${maskPh(o.clientPhone)}</span>
      <span style="color:var(--r);font-weight:var(--fw-bold)">${fn(calcRem(o))} ج</span>
    </div>`).join('');
}
// renderAttBox() + doAtt() — removed: check-in/out now lives in the central
// #att-self-host widget (one source of attendance UI).
window.switchTab=function(tab){
  activeTab=tab;
  ['ready','shipped','done'].forEach(t=>{
    const btn=document.getElementById('tab-'+t);
    if(btn)btn.className=t===tab?`btn btn-c btn-sm`:'btn btn-ghost btn-sm';
  });
  renderOrders();
};
const shipVL=new VirtualList({
  container:document.getElementById('orders-list'),
  rowHeight:110,
  emptyHtml:'<div class="empty"><div class="empty-icon">🚚</div><div class="empty-text">لا توجد أوردرات</div></div>',
  renderRow:(o)=>{
    const rem=calcRem(o);
    const prods=(o.products||[]).map(p=>p.name+'×'+p.qty).join(' + ')||o.product||'—';
    return`<div class="ocard" onclick="navigatePage('shipping.html')">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <div><div class="txt-meta-xs">${o.orderId||o._id.slice(-6)}</div><div style="font-size:15px;font-weight:var(--fw-extra)">${o.clientName||'—'}</div><div style="font-size:var(--fs-sm);color:var(--b)">${maskPh(o.clientPhone)}</div></div>
        <div class="text-left">${rem>0?`<div style="font-size:var(--fs-md);font-weight:var(--fw-extra);color:var(--r)">💰 ${fn(rem)} ج</div>`:''}<div class="txt-meta-xs">${o.shipCompanyName||'استلام'}</div></div>
      </div>
      <div class="txt-meta-base">${prods}</div>
      ${o.shipGov?`<div style="font-size:var(--fs-sm);color:var(--dim2);margin-top:6px">📍 ${o.shipGov}${o.shipAddress?' — '+o.shipAddress:''}</div>`:''}
    </div>`;
  }
});
function renderOrders(){
  let data=[];
  if(activeTab==='ready')data=allOrders.filter(o=>o.stage==='production'||(o.stage==='shipping'&&(!o.shipStage||o.shipStage==='ready')));
  else if(activeTab==='shipped')data=allOrders.filter(o=>o.stage==='shipping'&&o.shipStage==='wait_delivery');
  else data=allOrders.filter(o=>o.stage==='archived'&&isThisMonth(o.createdAt));
  shipVL.update(data);
}
</script>
