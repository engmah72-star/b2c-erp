<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="var(--c-bright)">
<title>B2C — داشبورد الشحن</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css?v=13">
<link rel="stylesheet" href="design-system/components.css?v=1">
<script src="sidebar-config.js"></script>
<script src="sidebar.js"></script>
<script src="sync-monitor.js"></script>
<script type="module" src="inbox-badge.js"></script>
<style>
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;border-top:3px solid var(--kc)}
.kpi-val{font-size:24px;font-weight:var(--fw-heavy);color:var(--kc);margin-bottom:2px}
.kpi-lbl{font-size:var(--fs-xs);color:var(--dim2);font-weight:var(--fw-bold)}
.ocard{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;margin-bottom:8px;cursor:pointer;transition:var(--trans);border-right:3px solid var(--c)}
.ocard:hover{border-color:var(--c);transform:translateX(-2px)}
.att-box{border-radius:var(--rad2);padding:14px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:var(--space-md);background:var(--bg2);border:1px solid var(--line)}
@media(max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
<script src="smart-sidebar.js?v=1" defer></script>
<script src="viewas.js?v=1" defer></script>
<script src="pwa-install.js?v=1" defer></script>
<script type="module" src="ai-launcher.js?v=1" defer></script>
<script src="theme.js?v=4"></script>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand">
    <div class="nav-logo">🎨</div>
    <div>
      <div class="nav-brand-name">Business2Card</div>
      <div class="nav-brand-role" id="role-badge">ERP</div>
    </div>
  </div>
  <div class="nav-scroll">
    <a class="nav-link" href="clients.html"><span class="nav-ico">👤</span> العملاء</a>
    <a class="nav-link" href="design.html"><span class="nav-ico">✏️</span> التصميم</a>
    <a class="nav-link" href="print.html"><span class="nav-ico">🖨️</span> الطباعة</a>
    <a class="nav-link" href="production.html"><span class="nav-ico">🏭</span> التنفيذ</a>
    <a class="nav-link" href="shipping.html" class="nav-link active"><span class="nav-ico">🚚</span> الشحن</a>
    <a class="nav-link" href="shipping-accounts.html"><span class="nav-ico">📦</span> حسابات الشحن</a>
    <a class="nav-link" href="archive.html"><span class="nav-ico">📁</span> الأرشيف</a>
    <a class="nav-link" href="accounts.html"><span class="nav-ico">💰</span> الحسابات</a>
    <a class="nav-link" href="suppliers.html"><span class="nav-ico">▣</span> الموردين</a>
    <a class="nav-link" href="products.html"><span class="nav-ico">◈</span> المنتجات</a>
    <a class="nav-link" href="employees.html"><span class="nav-ico">👥</span> الموظفين</a>
    <a class="nav-link" href="reports.html"><span class="nav-ico">📊</span> التقارير</a>
    <a class="nav-link" href="settings.html"><span class="nav-ico">⚙️</span> الإعدادات</a>
  </div>
  <div class="nav-foot">
    <div class="nav-user" onclick="doLogout()">
      <div class="nav-avatar" id="nav-av">A</div>
      <div>
        <div class="nav-user-name" id="nav-name">User</div>
        <div class="nav-user-role">تسجيل خروج</div>
      </div>
    </div>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><button type="button" class="mob-menu-btn" onclick="toggleNav()">☰</button><div><h1>🚚 <span id="greeting">أهلاً</span></h1><p id="sub">جاري التحميل...</p></div></div>
    <div class="topbar-right"><button type="button" class="btn btn-c btn-sm" onclick="location.href='shipping.html'">🚛 مركز الشحن الجديد</button></div>
  </div>
  <div class="content">
    <!-- حضور -->
    <div class="att-box" id="att-box">
      <div><div style="font-size:var(--fs-base);font-weight:var(--fw-extra);color:var(--dim2);margin-bottom:4px">⏰ الحضور اليوم</div><div style="font-size:var(--fs-xl);font-weight:var(--fw-extra)" id="att-status">لم يُسجَّل</div><div class="txt-meta-sm" id="att-detail"></div></div>
      <button type="button" class="btn btn-g btn-sm" id="att-btn" onclick="doAtt()">✅ تسجيل حضور</button>
    </div>
    <!-- Goal Card -->
    <div id="ship-goal-card" style="display:none;background:var(--bg2);border:1px solid rgba(34,211,238,.2);border-radius:var(--rad2);padding:12px 16px;margin-bottom:14px"></div>
    <!-- KPIs -->
    <div class="kpi-row">
      <div class="kpi" style="--kc:var(--c)"><div class="kpi-val" id="k-ready">—</div><div class="kpi-lbl">جاهز للشحن</div></div>
      <div class="kpi" style="--kc:var(--b)"><div class="kpi-val" id="k-shipped">—</div><div class="kpi-lbl">في الطريق</div></div>
      <div class="kpi" style="--kc:var(--g)"><div class="kpi-val" id="k-collected">—</div><div class="kpi-lbl">محصّل ج</div></div>
      <div class="kpi" style="--kc:var(--r)"><div class="kpi-val" id="k-remaining">—</div><div class="kpi-lbl">باقي تحصيل ج</div></div>
    </div>
    <!-- تنبيه باقي تحصيل -->
    <div id="alerts-box" style="display:none;background:rgba(255,61,110,.05);border:1px solid rgba(255,61,110,.2);border-radius:var(--rad2);padding:14px;margin-bottom:16px">
      <div style="font-size:var(--fs-base);font-weight:var(--fw-extra);color:var(--r);margin-bottom:8px">💰 باقي تحصيل</div>
      <div id="alerts-list"></div>
    </div>
    <!-- Tabs -->
    <div style="display:flex;gap:var(--space-sm);margin-bottom:14px">
      <button type="button" class="btn btn-c btn-sm" id="tab-ready" onclick="switchTab('ready')">📦 جاهز للشحن</button>
      <button type="button" class="btn btn-ghost btn-sm" id="tab-shipped" onclick="switchTab('shipped')">🚚 في الطريق</button>
      <button type="button" class="btn btn-ghost btn-sm" id="tab-done" onclick="switchTab('done')">✅ مكتمل الشهر</button>
    </div>
    <div id="orders-list"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</div>
</div>
<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div class="toasts" id="toasts"></div>
<script type="module">

import { app, auth, db } from "./core/firebase-init.js";
import { setText } from "./core/dom-utils.js";
import { canDo } from "./core/permissions-matrix.js";
import { calcRem } from "./core/order-math.js";
// ══ SIDEBAR - Final Solution ══
async function buildDynamicSidebar(uid, currentPage) {
  const nav = document.getElementById('nav-scroll-dynamic') || document.querySelector('.nav-scroll');
  if (!nav) return;
  
  try {
    const usnap = await getDoc(doc(db,'users',uid));
    const ud = usnap.exists() ? usnap.data() : {};
    const role = ud.role || 'admin';
    const perms = ud.permissions || {};
    const userPages = perms.pages || [];
    // Step 6.3 — capability-based per RULE P1.3. view_all_shipments
    // matches the admin + operation_manager set (supervisor tier).
    const isAdm = canDo('view_all_shipments', role, perms);
    
    const ROLE_DASH = {
      admin:'accounts.html', operation_manager:'ops-dashboard.html',
      customer_service:'cs-dashboard.html',
      graphic_designer:'designer-dashboard.html',
      design_operator:'designer-dashboard.html',
      production_agent:'production-dashboard.html',
      shipping_officer:'shipping-dashboard.html',
      wallet_manager:'accounts.html',
    };
    
    const ALL = [
      {f:'clients.html',         l:'العملاء',       i:'👤', p:'clients'},
      {f:'design.html',          l:'التصميم',       i:'✏️', p:'design'},
      {f:'print.html',           l:'الطباعة',       i:'🖨️', p:'print'},
      {f:'production.html',      l:'التنفيذ',       i:'🏭', p:'production'},
      {f:'shipping.html',        l:'الشحن',         i:'🚚', p:'shipping'},
      {f:'shipping-accounts.html',l:'حسابات الشحن',i:'📦', p:'shipping-accounts'},
      {f:'archive.html',         l:'الأرشيف',       i:'📁', p:'archive'},
      {f:'accounts.html',        l:'الحسابات',      i:'💰', p:'accounts'},
      {f:'approvals.html',       l:'الاعتمادات',    i:'🔐', p:'approvals'},
      {f:'my-requests.html',     l:'طلباتي',        i:'📋', public:true},
      {f:'suppliers.html',       l:'الموردين',      i:'▣',  p:'suppliers'},
      {f:'products.html',        l:'المنتجات',      i:'◈',  p:'products'},
      {f:'employees.html',       l:'الموظفين',      i:'👥', p:'employees', adminOnly:true},
      {f:'reports.html',         l:'التقارير',      i:'📊', p:'reports'},
      {f:'design-workspace.html', l:'مساحة التصميم', i:'🖥️', p:'design'},
      {f:'gallery.html', l:'المعرض', i:'🖼️', public:true},
      {f:'settings.html',        l:'الإعدادات',     i:'⚙️', p:'settings', adminOnly:true},
    ];
    
    const dash = ROLE_DASH[role] || 'accounts.html';
    const dashLabel = isAdm ? 'الحسابات' : 'داشبوردي';
    
    let html = `<a class="nav-link${currentPage===dash?' active':''}" href="${dash}">
      <span class="nav-ico">⬡</span> ${dashLabel}
    </a>
    <a class="nav-link${currentPage==='my-profile.html'?' active':''}" href="my-profile.html">
      <span class="nav-ico">👤</span> ملفي
    </a>`;

    for (const pg of ALL) {
      if (pg.adminOnly && !isAdm) continue;
      const ok = pg.public || isAdm || userPages.includes('*') || userPages.includes(pg.p);
      if (!ok) continue;
      html += `<a class="nav-link${currentPage===pg.f?' active':''}" href="${pg.f}">
        <span class="nav-ico">${pg.i}</span> ${pg.l}
      </a>`;
    }
    
    nav.innerHTML = html;
  } catch(e) {
    // fallback - show basic links
    nav.innerHTML = `
      <a class="nav-link" href="accounts.html"><span class="nav-ico">⬡</span> الرئيسية</a>
      <a class="nav-link" href="clients.html"><span class="nav-ico">👤</span> العملاء</a>
      <a class="nav-link" href="design.html"><span class="nav-ico">✏️</span> التصميم</a>
    `;
    console.warn('sidebar fallback:', e.message);
  }
}
// ═══════════════════════════════

// ── Global Error Handler ──
window.addEventListener('unhandledrejection',e=>{
  const msg=e.reason?.message||'';
  if(msg.includes('permission-denied')||msg.includes('Missing or insufficient')){
    console.warn('🔒 Permission denied — راجع الأدمن');
  } else if(msg&&!msg.includes('AbortError')){
    console.error('Error:',msg);
  }
  e.preventDefault();
});

// ══ Sidebar — موحَّد عبر sidebar.js ══
// inbox.html الآن public في sidebar-config.js → الـ append المخصص للـ shipping أصبح unnecessary
const SIDEBAR_PAGES = window.SIDEBAR_PAGES;
const ROLE_HOME_MAP = window.ROLE_HOME;
// buildSidebar / guardPage / initSidebar توفّرها sidebar.js كـ window globals
// ══════════════════════
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, doc, onSnapshot, getDoc, query, where, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { employeeActions } from "./employee-actions.js";
let allOrders=[],todayAtt=null,currentUser=null,userName='',uid='',activeTab='ready',myGoal=null,myLastEvalShip=null,myEmpIdShip='';
const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const now=new Date();
const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
function isThisMonth(ts){if(!ts?.toDate)return false;const d=ts.toDate();return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}
function toast(msg,t=''){const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);}
window.toggleNav=()=>{document.querySelector('.sidenav').classList.toggle('mob-open');document.getElementById('nav-ov').classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav').classList.remove('mob-open');document.getElementById('nav-ov').classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  currentUser=u; uid=u.uid;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(!snap.exists()){window.location.href='login.html';return;}
  buildDynamicSidebar(u.uid, 'shipping-dashboard.html');
  const d=snap.data();
  if(!['shipping_officer','admin','operation_manager'].includes(d.role)){window.location.href='login.html';return;}
  userName=d.name||u.email;
  setText('nav-name',userName);setText('greeting','أهلاً '+userName.split(' ')[0]);
  document.getElementById('nav-av').textContent=userName[0].toUpperCase();
  setText('sub',MONTHS[now.getMonth()]+' '+now.getFullYear());
  // Step 6.3 — capability-based per RULE P1.3
  const isAdminShip=canDo('view_all_shipments', d.role, d.permissions||{});
  onSnapshot(query(collection(db,'orders'),where('stage','in',['shipping','archived','production']),limit(3000)),snap=>{
    const all=snap.docs.map(x=>({...x.data(),_id:x.id}));
    // KPIs تُحسب للشخص الحالي فقط (ما لم يكن أدمن)
    allOrders=isAdminShip?all:all.filter(o=>o.shippingOfficer===uid||o.shippingOfficerId===uid||o.shippingOfficer===userName||!o.shippingOfficer);
    updateKPIs();renderAlerts();renderOrders();
  },err=>{console.error('shipping-dashboard orders:',err);});
  // الأهداف
  onSnapshot(query(collection(db,'employees'),limit(200)),sn=>{
    const emp=sn.docs.map(d=>({...d.data(),_id:d.id})).find(e=>e.authUid===uid||e.email===u.email);
    myEmpIdShip=emp?._id||'';
    if(myEmpIdShip){
      const mk=new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0');
      onSnapshot(query(collection(db,'employee_goals'),where('employeeId','==',myEmpIdShip),where('month','==',mk),limit(5)),gsn=>{
        myGoal=gsn.docs.length?gsn.docs[0].data():null;
        renderShipGoalCard();
      });
      onSnapshot(query(collection(db,'employee_evaluations'),where('employeeId','==',myEmpIdShip),limit(60)),esn=>{
        const evs=esn.docs.map(d=>d.data()).sort((a,b)=>(b.month||'').localeCompare(a.month||''));
        myLastEvalShip=evs[0]||null;
        renderShipGoalCard();
      });
    }
  });
  onSnapshot(query(collection(db,'attendance'),where('employeeUid','==',u.uid),limit(365)),snap=>{
    const today=new Date().toISOString().slice(0,10);
    todayAtt=snap.docs.map(d=>({...d.data(),_id:d.id})).find(a=>a.date===today);
    renderAttBox();
  });
});
function renderShipGoalCard(){
  const el=document.getElementById('ship-goal-card');if(!el)return;
  if(!myGoal&&!myLastEvalShip){el.style.display='none';return;}
  el.style.display='block';
  let html='<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">';
  if(myGoal?.targetOrdersMonthly>0){
    const myShipped=allOrders.filter(o=>o.stage==='archived'&&isThisMonth(o.createdAt)).length;
    const pct=Math.min(100,Math.round(myShipped/myGoal.targetOrdersMonthly*100));
    const col=pct>=100?'var(--g)':pct>=70?'var(--c)':'var(--y)';
    html+=`<div style="flex:1;min-width:140px"><div style="font-size:var(--fs-xs);color:var(--dim2);font-weight:var(--fw-bold);margin-bottom:4px">🎯 هدف الشحن الشهري</div>
      <div style="font-size:var(--fs-lg);font-weight:var(--fw-heavy);color:${col}">${myShipped} / ${myGoal.targetOrdersMonthly} <span style="font-size:var(--fs-xs);font-weight:var(--fw-medium)">شحنة</span></div>
      <div style="height:4px;background:var(--bg3);border-radius:99px;margin-top:4px"><div style="height:4px;border-radius:99px;width:${pct}%;background:${col}"></div></div>
    </div>`;
  }
  if(myLastEvalShip){
    const s=myLastEvalShip.totalScore||0;
    const c=s>=85?'var(--g)':s>=70?'var(--c)':s>=50?'var(--y)':'var(--r)';
    html+=`<div style="text-align:center;padding:8px 14px;background:var(--bg3);border-radius:var(--rad)">
      <div style="font-size:20px;font-weight:var(--fw-heavy);color:${c}">${s}</div>
      <div style="font-size:var(--fs-tiny);color:var(--dim2);font-weight:var(--fw-bold)">آخر تقييم</div>
    </div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}
function updateKPIs(){
  const ready=allOrders.filter(o=>o.stage==='production'||(!o.shipStage||o.shipStage==='ready')&&o.stage==='shipping');
  const shipped=allOrders.filter(o=>o.shipStage==='wait_delivery'&&o.stage==='shipping');
  const monthly=allOrders.filter(o=>isThisMonth(o.createdAt));
  const collected=monthly.reduce((s,o)=>s+(parseFloat(o.totalPaid)||parseFloat(o.paid)||0),0);
  const remaining=allOrders.filter(o=>o.stage!=='archived').reduce((s,o)=>s+calcRem(o),0);
  setText('k-ready',ready.length);setText('k-shipped',shipped.length);
  setText('k-collected',fn(collected));setText('k-remaining',fn(remaining));
}
function renderAlerts(){
  const withRem=allOrders.filter(o=>calcRem(o)>0&&o.stage!=='archived');
  const box=document.getElementById('alerts-box');
  const list=document.getElementById('alerts-list');
  if(!withRem.length||!box||!list){if(box)box.style.display='none';return;}
  box.style.display='block';
  list.innerHTML=withRem.slice(0,5).map(o=>`
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:var(--fs-base)">
      <span style="font-weight:var(--fw-bold)">${o.clientName||'—'} <span style="color:var(--dim2)">·</span> <a href="tel:${o.clientPhone}" style="color:var(--b)">${o.clientPhone||''}</a></span>
      <span style="color:var(--r);font-weight:var(--fw-bold)">${fn(calcRem(o))} ج</span>
    </div>`).join('');
}
function renderAttBox(){
  const btn=document.getElementById('att-btn');
  const statusEl=document.getElementById('att-status');
  const detailEl=document.getElementById('att-detail');
  if(!todayAtt){
    statusEl.textContent='لم يُسجَّل بعد';statusEl.style.color='var(--dim2)';
    btn.textContent='✅ تسجيل حضور';btn.className='btn btn-g btn-sm';btn.disabled=false;
  } else if(!todayAtt.checkOut){
    statusEl.textContent='حاضر منذ '+todayAtt.checkInStr;statusEl.style.color='var(--g)';
    btn.textContent='🔚 تسجيل انصراف';btn.className='btn btn-b btn-sm';btn.disabled=false;
  } else {
    statusEl.textContent=todayAtt.checkInStr+' → '+todayAtt.checkOutStr;statusEl.style.color='var(--b)';
    if(detailEl)detailEl.textContent='✅ '+todayAtt.hoursWorked+' ساعة';
    btn.textContent='✓ تم';btn.className='btn btn-ghost btn-sm';btn.disabled=true;
  }
}
window.doAtt=async function(){
  const today=new Date().toISOString().slice(0,10);
  const timeStr=new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
  const uid=currentUser.uid;
  if(!todayAtt){
    const r=await employeeActions.recordAttendanceCheckIn({db,employeeId:uid,employeeUid:uid,employeeName:userName,date:today,lateMinutes:0,recordedBy:uid,recordedByName:userName});
    if(!r.ok)return toast('❌ '+(r.errors||[]).join(' · '),'err');
    toast('✅ تم تسجيل الحضور — '+timeStr,'ok');
  } else if(!todayAtt.checkOut){
    const r=await employeeActions.recordAttendanceCheckOut({db,attendanceId:todayAtt._id});
    if(!r.ok)return toast('❌ '+(r.errors||[]).join(' · '),'err');
    const hours=todayAtt.checkIn?.toDate?((new Date()-todayAtt.checkIn.toDate())/(1000*60*60)).toFixed(1):0;
    toast('✅ تم الانصراف — '+hours+' ساعة','ok');
  }
};
window.switchTab=function(tab){
  activeTab=tab;
  ['ready','shipped','done'].forEach(t=>{
    const btn=document.getElementById('tab-'+t);
    if(btn)btn.className=t===tab?`btn btn-c btn-sm`:'btn btn-ghost btn-sm';
  });
  renderOrders();
};
function renderOrders(){
  const el=document.getElementById('orders-list');if(!el)return;
  let data=[];
  if(activeTab==='ready')data=allOrders.filter(o=>o.stage==='production'||(o.stage==='shipping'&&(!o.shipStage||o.shipStage==='ready')));
  else if(activeTab==='shipped')data=allOrders.filter(o=>o.stage==='shipping'&&o.shipStage==='wait_delivery');
  else data=allOrders.filter(o=>o.stage==='archived'&&isThisMonth(o.createdAt));
  if(!data.length){el.innerHTML='<div class="empty"><div class="empty-icon">🚚</div><div class="empty-text">لا توجد أوردرات</div></div>';return;}
  el.innerHTML=data.map(o=>{
    const rem=calcRem(o);
    const prods=(o.products||[]).map(p=>p.name+'×'+p.qty).join(' + ')||o.product||'—';
    return`<div class="ocard" onclick="location.href='shipping.html'">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <div><div class="txt-meta-xs">${o.orderId||o._id.slice(-6)}</div><div style="font-size:15px;font-weight:var(--fw-extra)">${o.clientName||'—'}</div><div style="font-size:var(--fs-sm);color:var(--b)">${o.clientPhone||''}</div></div>
        <div style="text-align:left">${rem>0?`<div style="font-size:var(--fs-md);font-weight:var(--fw-extra);color:var(--r)">💰 ${fn(rem)} ج</div>`:''}<div class="txt-meta-xs">${o.shipCompanyName||'استلام'}</div></div>
      </div>
      <div class="txt-meta-base">${prods}</div>
      ${o.shipGov?`<div style="font-size:var(--fs-sm);color:var(--dim2);margin-top:6px">📍 ${o.shipGov}${o.shipAddress?' — '+o.shipAddress:''}</div>`:''}
    </div>`;
  }).join('');
}
</script>
</body>
</html>
