<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>بوليصة شحن — Business2Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://www.gstatic.com">
<link rel="dns-prefetch" href="https://firestore.googleapis.com">
<link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="waybill.css?v=1">
</head>
<body>

<div class="toolbar no-print">
  <button type="button" class="btn" onclick="goBack()">← رجوع</button>
  <div class="toolbar-actions">
    <div class="layout-sel-wrap hide" id="layout-sel-wrap">
      <label>📐 العدد في الصفحة:</label>
      <select id="layout-sel" onchange="changeLayout()">
        <option value="1">1 (الكامل)</option>
        <option value="2">2 (نصفين)</option>
        <option value="4">4 (2×2)</option>
        <option value="6">6 (2×3)</option>
        <option value="12">12 (3×4)</option>
      </select>
    </div>
    <button type="button" class="btn btn-yellow hide" id="btn-edit" onclick="openEdit()">✏️ تعديل البوليصة</button>
    <button type="button" class="btn btn-screenshot hide" id="btn-screenshot" onclick="captureWaybillScreenshot()">📸 تصوير</button>
    <button type="button" class="btn btn-primary hide" id="btn-print" onclick="printNow()">🖨️ طباعة</button>
  </div>
</div>

<div class="center-msg" id="loading-box">
  <div class="center-msg-ico">⏳</div>
  <div class="center-msg-text">جاري التحميل...</div>
</div>

<div class="center-msg hide" id="err-box">
  <div class="center-msg-ico">⚠️</div>
  <div class="center-msg-text" id="err-msg">—</div>
  <button type="button" class="btn btn-primary no-print" style="margin-top:14px" onclick="goBack()">← رجوع</button>
</div>

<div id="bulk-counter" class="bulk-counter no-print hide"></div>
<div id="waybills-container"></div>

<!-- Edit Modal -->
<div class="ov" id="ov-edit">
  <div class="modal">
    <h2>✏️ تعديل البوليصة</h2>
    <div class="alert-box">⚠️ <b>تنبيه أمان:</b> أي تعديل يُسجَّل بسبب وموظف وتاريخ، ويُرسل تنبيه فوري للأدمن للمراجعة.</div>
    <div class="fg"><label>اسم المُستلم</label><input id="ed-name"></div>
    <div class="fg"><label>رقم التليفون</label><input id="ed-phone"></div>
    <div class="fg"><label>المحافظة</label><input id="ed-gov"></div>
    <div class="fg"><label>العنوان التفصيلي</label><textarea id="ed-address" rows="2"></textarea></div>
    <div class="fg"><label>المحتويات</label><input id="ed-cargo" placeholder="مثلاً: 300 كارت شخصي"></div>
    <div class="fg"><label>ملاحظات للمندوب (اختياري)</label><textarea id="ed-notes" rows="2" placeholder="مثلاً: اتصل قبل الوصول"></textarea></div>
    <div class="fg">
      <label style="color:#c92846">📝 سبب التعديل (إجباري — 10 أحرف على الأقل) *</label>
      <textarea id="ed-reason" rows="2" placeholder="مثلاً: العميل غيّر العنوان" oninput="document.getElementById('ed-reason-counter').textContent=this.value.length+' / 10'"></textarea>
      <div id="ed-reason-counter" style="font-size:var(--fs-xs);color:#666;text-align:left;margin-top:2px">0 / 10</div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn" onclick="closeEdit()">إلغاء</button>
      <button type="button" class="btn btn-yellow" id="btn-save-edit" onclick="saveEdit()">💾 تأكيد التعديل</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
let _h2cLoaded=false,_h2cPromise=null;
function _loadH2C(){
  if(_h2cLoaded) return Promise.resolve();
  if(_h2cPromise) return _h2cPromise;
  _h2cPromise=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    s.onload=()=>{_h2cLoaded=true;res();};
    s.onerror=()=>{_h2cPromise=null;rej(new Error('فشل تحميل مكتبة التصوير'));};
    document.head.appendChild(s);
  });
  return _h2cPromise;
}
_loadH2C().catch(()=>{});
// captureWaybillScreenshot is defined in the module script below
</script>
<script type="module">
import { app, auth, db } from "./core/firebase-init.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { getDeliveryAddress } from "./core/shipping-utils.js";
import { shippingActions } from "./shipping-actions.js";
import { toast } from './shared.js';
let orders=[],currentUser=null,userName='',userRole='',userPerms={};
const _qp=new URLSearchParams(location.search);
const orderIdsParam=(_qp.get('ids')||_qp.get('id')||'').split(',').map(s=>s.trim()).filter(Boolean);
const isBulk=orderIdsParam.length>1;

const $ = id => document.getElementById(id);
const setText = (id,v) => {const e=$(id);if(e)e.textContent=v;};
const fn = n => (parseFloat(n)||0).toLocaleString('ar-EG');
const sv = (id,v) => {const e=$(id);if(e)e.value=v||'';};
const gv = id => $(id)?.value||'';
function nowStr(){return new Date().toLocaleDateString('ar-EG')+' '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});}
function escHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

window.goBack=()=>{if(history.length>1)history.back();else if(typeof window.navigatePage==='function')window.navigatePage('accounts.html');else location.href='accounts.html';};

window.printNow=()=>{
  setTimeout(()=>window.print(),100);
  // stamp printed metadata on every order in this batch (silently)
  if(currentUser&&orders.length){
    orders.forEach(o=>{
      shippingActions.markWaybillPrinted({
        db, orderId: o._id, printedAt: nowStr(),
        userName, currentPrintCount: (o.waybill?.printCount)||0,
      }).catch(()=>{/* silent */});
    });
  }
};

// ══ Auth + Load ══
onAuthStateChanged(auth,async u=>{
  if(!u){location.href='login.html';return;}
  currentUser=u;
  if(!orderIdsParam.length){showError('لم يُحدَّد رقم الأوردر');return;}
  try{
    const userSnap=await getDoc(doc(db,'users',u.uid));
    if(userSnap.exists()){
      const ud=userSnap.data();
      userName=ud.name||u.email;
      userRole=ud.role||'';
      userPerms=ud.permissions||{};
    }
    // Load all orders in parallel
    const snaps=await Promise.all(orderIdsParam.map(id=>getDoc(doc(db,'orders',id))));
    const loaded=[],missing=[];
    snaps.forEach((s,i)=>{
      if(s.exists()) loaded.push({...s.data(),_id:orderIdsParam[i]});
      else missing.push(orderIdsParam[i]);
    });
    if(!loaded.length){showError('لم يُعثر على أي أوردر');return;}
    // Sort orders by shipping company so consecutive waybills go to same company
    // (يساعد لما الموظف يطبع عشرات البوليصات وعايز يفصلها لكل شركة على حدة)
    loaded.sort((a,b)=>{
      const an=(a.shipCompanyName||'zzz').toLowerCase();
      const bn=(b.shipCompanyName||'zzz').toLowerCase();
      if(an<bn)return -1;
      if(an>bn)return 1;
      // Within same company: sort by client name
      return (a.clientName||'').localeCompare(b.clientName||'','ar');
    });
    orders=loaded;
    if(missing.length) toast(`⚠️ ${missing.length} أوردر مش موجود`,'err');
    render();
  }catch(e){
    if((e.code||'').includes('permission')) showError('ليس لديك صلاحية عرض الأوردر');
    else showError('خطأ: '+(e.message||e));
  }
});

function showError(msg){
  $('loading-box').style.display='none';
  $('err-box').style.display='block';
  setText('err-msg',msg);
}

// ── compute waybill view-model ──
function getWaybillView(o){
  const wb=o.waybill||{};
  const cargoFromProducts=(o.products||[]).map(p=>`${p.qty||1} × ${p.name}`).join(' + ')||o.product||'—';
  // العنوان المعتمد: deliveryAddress {gov,city,street} المُدخَل في الطباعة عبر
  // prepareForShipping، مع fallback للحقول القديمة (shipGov/shipAddress) — RULE 6.
  const da=getDeliveryAddress(o);
  return {
    name: wb.recipientName || o.clientName || '—',
    // تليفون التسليم المُدخَل في الطباعة (customerPhoneShip) أولاً ثم تليفون العميل.
    phone: wb.recipientPhone || o.customerPhoneShip || o.clientPhone || '—',
    gov: wb.recipientGov || da.gov || '—',
    address: wb.recipientAddress || da.addr || '—',
    cargo: wb.cargoDescription || cargoFromProducts,
    amount: parseFloat(o.remaining)||0,    // Source of truth: order's live remaining
    notes: wb.notes || '',
    company: o.shipCompanyName || '—',
    tracking: wb.trackingNumber || ('WB-' + (o.orderId || (o._id||'').slice(-8).toUpperCase())),
  };
}

function buildWaybillHtml(o,idx){
  const v=getWaybillView(o);
  const orderRef=escHtml(o.orderId||(o._id||'').slice(-6));
  const amountZero=v.amount<=0;
  return `<div class="waybill" data-id="${escHtml(o._id)}">
    <div class="wb-head">
      <div class="wb-logo-block">
        <div class="wb-logo-icon">🎨</div>
        <div>
          <div class="wb-logo-name">Business2Card</div>
          <div class="wb-logo-tag">بوليصة شحن — SHIPPING WAYBILL</div>
        </div>
      </div>
      <div class="wb-tracking">${escHtml(v.tracking)}</div>
    </div>
    <div class="wb-section">
      <div class="wb-label">المُرسَل إليه — RECIPIENT</div>
      <div class="wb-value">${escHtml(v.name)}</div>
      <div class="wb-sub">📞 ${escHtml(v.phone)}</div>
      <div class="wb-sub" style="margin-top:6px">📍 ${escHtml((v.gov!=='—'?v.gov+' — ':'')+v.address)}</div>
    </div>
    <div class="wb-section-row">
      <div>
        <div class="wb-label">المحتويات — CONTENTS</div>
        <div class="wb-cargo">${escHtml(v.cargo)}</div>
      </div>
      <div class="wb-amount"${amountZero?' style="border-color:#22c55e;background:linear-gradient(135deg,#f0fdf4,#dcfce7)"':''}>
        <div class="wb-amount-lbl"${amountZero?' style="color:#166534"':''}>${amountZero?'حالة التحصيل — STATUS':'المطلوب تحصيله — TO COLLECT'}</div>
        <div class="wb-amount-val"${amountZero?' style="color:#16a34a;font-size:28px"':''}>${amountZero?'✅ مكتمل':`${fn(v.amount)} <span style="font-size:var(--fs-lg)">ج</span>`}</div>
        ${amountZero?'':'<div class="wb-amount-tag">شامل رسوم الشحن — Includes shipping</div>'}
      </div>
    </div>
    ${v.notes?`<div class="wb-notes-box">
      <div style="font-size:var(--fs-tiny);font-weight:var(--fw-extra);color:#92400e;margin-bottom:4px;letter-spacing:.3px">ملاحظات للمندوب — COURIER NOTES</div>
      <div>${escHtml(v.notes)}</div>
    </div>`:''}
    <div class="wb-foot">
      <div>📦 رقم الأوردر: <strong>${orderRef}</strong></div>
      <div>🚚 ${escHtml(v.company)}</div>
      <div>📅 <strong>${new Date().toLocaleDateString('ar-EG')}</strong></div>
    </div>
  </div>`;
}

// ── Layout selection ──
const LAYOUT_OPTS=[1,2,4,6,12];
function getStoredLayout(){
  const v=parseInt(localStorage.getItem('b2c_waybill_layout')||'1');
  return LAYOUT_OPTS.includes(v)?v:1;
}
function applyLayout(n){
  document.body.classList.remove('layout-1','layout-2','layout-4','layout-6','layout-12');
  document.body.classList.add('layout-'+n);
}
window.changeLayout=function(){
  const v=parseInt($('layout-sel').value)||1;
  localStorage.setItem('b2c_waybill_layout',v);
  applyLayout(v);
  render();
};

function render(){
  $('loading-box').style.display='none';
  $('btn-print').style.display='inline-block';
  $('btn-screenshot').style.display='inline-block';
  if(!isBulk && canEdit()) $('btn-edit').style.display='inline-block';
  // Layout selector available always (works for single-order too)
  const perPage=getStoredLayout();
  $('layout-sel').value=perPage;
  $('layout-sel-wrap').style.display='inline-flex';
  applyLayout(perPage);
  // Counter for bulk mode
  if(isBulk){
    $('bulk-counter').style.display='block';
    const totalPages=Math.ceil(orders.length/perPage);
    setText('bulk-counter', `🧾 ${orders.length} بوليصة · ${perPage} في الصفحة · ${totalPages} ${totalPages===1?'صفحة':'صفحات'} A4`);
  } else {
    $('bulk-counter').style.display='none';
  }
  // Group orders into pages of perPage and render
  const groups=[];
  for(let i=0;i<orders.length;i+=perPage)groups.push(orders.slice(i,i+perPage));
  const html=groups.map(g=>`<div class="page-wrap"><div class="waybills-grid">${g.map(o=>buildWaybillHtml(o)).join('')}</div></div>`).join('');
  $('waybills-container').innerHTML=html;
  document.title=isBulk
    ? `بوليصات (${orders.length})`
    : 'بوليصة — '+getWaybillView(orders[0]).name;
}

function canEdit(){
  if(['admin','operation_manager'].includes(userRole)) return true;
  const pages=userPerms.pages||[];
  if(pages.includes('*')) return true;
  if(pages.includes('shipping')) return true;
  if(pages.includes('clients') || userPerms.canAddClients || userPerms.canAddOrders) return true;
  return false;
}

// ══ Edit (single-order mode only) ══
window.openEdit=()=>{
  if(isBulk||!orders.length) return;
  const o=orders[0];
  const v=getWaybillView(o);
  sv('ed-name', v.name==='—'?'':v.name);
  sv('ed-phone', v.phone==='—'?'':v.phone);
  sv('ed-gov', v.gov==='—'?'':v.gov);
  sv('ed-address', v.address==='—'?'':v.address);
  sv('ed-cargo', v.cargo==='—'?'':v.cargo);
  sv('ed-notes', v.notes||'');
  sv('ed-reason', '');
  setText('ed-reason-counter', '0 / 10');
  $('ov-edit').classList.add('open');
};

window.closeEdit=()=>$('ov-edit').classList.remove('open');

window.saveEdit=async()=>{
  if(isBulk||!orders.length) return;
  const o=orders[0];
  const reason=gv('ed-reason').trim();
  const newName=gv('ed-name').trim();
  const newPhone=gv('ed-phone').trim();
  const newGov=gv('ed-gov').trim();
  const newAddress=gv('ed-address').trim();
  const newCargo=gv('ed-cargo').trim();
  const newNotes=gv('ed-notes').trim();
  // Build changes set vs current view
  const cur=getWaybillView(o);
  const changes=[];
  const track=(field,label,before,after)=>{if(String(before||'')!==String(after||''))changes.push({field,label,before:String(before||'—'),after:String(after||'—')});};
  track('recipientName','اسم المُستلم',cur.name==='—'?'':cur.name,newName);
  track('recipientPhone','رقم التليفون',cur.phone==='—'?'':cur.phone,newPhone);
  track('recipientGov','المحافظة',cur.gov==='—'?'':cur.gov,newGov);
  track('recipientAddress','العنوان',cur.address==='—'?'':cur.address,newAddress);
  track('cargoDescription','المحتويات',cur.cargo==='—'?'':cur.cargo,newCargo);
  track('notes','ملاحظات',cur.notes||'',newNotes);
  if(!changes.length) return toast('لا توجد تغييرات','');
  const btn=$('btn-save-edit');btn.disabled=true;btn.textContent='...';
  try{
    const result=await shippingActions.updateWaybillFields({
      db, orderId: o._id, order: o,
      newName, newPhone, newGov, newAddress, newCargo, newNotes,
      reason, changes,
      userId: currentUser.uid, userName,
    });
    if(!result.ok){
      toast('❌ '+(result.errors[0]||'فشل التعديل'),'err');
      return;
    }
    // Update local state
    orders[0]={...o, ...result.updates,
      waybill:{...(o.waybill||{}),recipientName:newName,recipientPhone:newPhone,recipientGov:newGov,recipientAddress:newAddress,cargoDescription:newCargo,notes:newNotes,lastEditedAt:result.ts,lastEditedBy:userName},
    };
    closeEdit();
    toast('✅ تم التعديل · تنبيه أُرسل للأدمن','ok');
    render();
  }catch(e){
    toast('❌ '+(e.message||e),'err');
  }finally{
    btn.disabled=false;btn.textContent='💾 تأكيد التعديل';
  }
};

// Allow closing modal by clicking outside
$('ov-edit').addEventListener('click',e=>{if(e.target.id==='ov-edit')closeEdit();});

// ── Screenshot: capture-optimized waybill share card ─────────────────
function _buildWaybillShareCard(o){
  const v=getWaybillView(o);
  const orderRef=o.orderId||(o._id||'').slice(-6);
  const az=v.amount<=0;
  const addrText=(v.gov!=='—'?v.gov+' — ':'')+v.address;
  return `<div style="width:420px;font-family:Tajawal,sans-serif;direction:rtl;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e2e8f0">
    <div style="background:#1e293b;padding:10px 16px;color:#fff;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:13px;font-weight:900;color:#fff">Business2Card · بوليصة شحن</div>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:10px;color:rgba(255,255,255,0.5);font-weight:700">${escHtml(orderRef)}</span>
        ${v.tracking&&v.tracking!=='—'?`<span style="font-family:Courier New,monospace;font-size:10px;padding:3px 8px;background:rgba(255,255,255,0.15);color:#fff;border-radius:5px;font-weight:700">${escHtml(v.tracking)}</span>`:''}
      </div>
    </div>
    <div style="padding:14px 16px;border-bottom:1px solid #e2e8f0">
      <div style="font-size:22px;font-weight:900;color:#0f172a;margin-bottom:6px">${escHtml(v.name)}</div>
      <div style="font-size:15px;color:#334155;font-weight:700;margin-bottom:4px">📞 ${escHtml(v.phone)}</div>
      ${addrText?`<div style="font-size:14px;color:#334155;font-weight:600;line-height:1.6">📍 ${escHtml(addrText)}</div>`:''}
    </div>
    <div style="padding:12px 16px;border-bottom:1px solid #e2e8f0">
      <div style="font-size:10px;font-weight:800;color:#94a3b8;margin-bottom:6px">المحتويات</div>
      <div style="font-size:15px;font-weight:700;color:#1e293b;line-height:1.6">${escHtml(v.cargo)}</div>
    </div>
    ${v.amount>0||az?`<div style="padding:16px;background:${az?'#f0fdf4':'#fffbeb'};text-align:center;border-bottom:1px solid #e2e8f0">
      <div style="font-size:10px;font-weight:800;color:${az?'#166534':'#92400e'};margin-bottom:6px">${az?'حالة التحصيل':'المطلوب تحصيله'}</div>
      <div style="font-size:${az?'24':'36'}px;font-weight:900;color:${az?'#16a34a':'#b45309'}">${az?'✅ مكتمل':fn(v.amount)+' ج'}</div>
      ${!az?`<div style="font-size:11px;color:#92400e;font-weight:600;margin-top:3px">شامل رسوم الشحن</div>`:''}
    </div>`:''}
    ${v.notes?`<div style="padding:10px 16px;border-bottom:1px solid #e2e8f0"><div style="background:#fffbeb;border:1px solid #fcd34d;border-right:3px solid #f59e0b;border-radius:8px;padding:10px 12px;font-size:13px;color:#92400e;font-weight:600;line-height:1.6">📝 ${escHtml(v.notes)}</div></div>`:''}
    <div style="padding:8px 16px;background:#f1f5f9;border-top:1px solid #e2e8f0;font-size:10px;color:#94a3b8;font-weight:700;display:flex;justify-content:space-between">
      <span>🚚 ${escHtml(v.company)}</span><span>${new Date().toLocaleDateString('ar-EG')}</span>
    </div>
  </div>`;
}

window.captureWaybillScreenshot=async function(){
  const btn=$('btn-screenshot');
  const origText=btn.textContent;
  btn.disabled=true;btn.textContent='⏳ جاري التصوير...';
  try{
    await _loadH2C();
    if(!orders.length)throw new Error('لا توجد بيانات');
    const cardHtml=orders.map(o=>_buildWaybillShareCard(o)).join('<div style="height:16px"></div>');
    const container=document.createElement('div');
    container.style.cssText='position:absolute;top:-9999px;left:-9999px;width:460px;z-index:-1;background:#fff;';
    container.innerHTML=`<div style="background:#fff;padding:12px">${cardHtml}</div>`;
    document.body.appendChild(container);
    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
    const card=container.firstElementChild;
    const canvas=await html2canvas(card,{scale:2,useCORS:true,allowTaint:false,backgroundColor:'#ffffff',scrollX:0,scrollY:0,windowWidth:460});
    document.body.removeChild(container);
    const blob=await new Promise(r=>canvas.toBlob(r,'image/jpeg',0.88));
    const fileName='waybill-'+(document.title.replace(/[^a-zA-Z0-9؀-ۿ]/g,'-'))+'.jpg';
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=fileName;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('تم حفظ الصورة ✅','ok');
  }catch(e){
    console.error('Screenshot error:',e);
    toast('فشل التصوير — حاول مرة أخرى','err');
  }finally{btn.disabled=false;btn.textContent=origText;}
};
</script>
</body>
</html>
