<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوليصة شحن — Business2Card</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'IBM Plex Sans Arabic',sans-serif}
body{background:#f0f0f0;padding:16px;color:var(--on-bright);min-height:100vh}

@page{size:A4;margin:10mm}
@media print{
  body{background:#fff !important;padding:0 !important}
  .no-print{display:none !important}
  .err-box,.toolbar,.bulk-counter{display:none !important}
  .page-wrap{margin:0 !important;padding:0 !important;background:transparent !important;box-shadow:none !important;border-radius:0 !important;page-break-after:always}
  .page-wrap:last-child{page-break-after:auto}
  .waybill{box-shadow:none !important;border:1.2px solid #000 !important;border-radius:0 !important}
}

/* ── Toolbar ── */
.toolbar{max-width:780px;margin:0 auto 14px;display:flex;gap:8px;justify-content:space-between;align-items:center;flex-wrap:wrap}
.toolbar-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.layout-sel-wrap{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #d0d0d0;border-radius:8px;padding:4px 8px}
.layout-sel-wrap label{font-size:var(--fs-sm);font-weight:700;color:#666}
.layout-sel-wrap select{border:none;outline:none;font-family:inherit;font-size:var(--fs-md);font-weight:700;color:#333;background:transparent;cursor:pointer}
.btn{padding:9px 16px;border-radius:8px;border:1px solid #d0d0d0;background:#fff;font-family:inherit;font-size:var(--fs-md);font-weight:700;cursor:pointer;color:#333;transition:.15s}
.btn:hover{background:#f5f5f5}
.btn-primary{background:#3b9eff;color:#fff;border-color:#3b9eff}
.btn-primary:hover{background:#2780e0}
.btn-yellow{background:var(--y);color:var(--on-bright);border-color:var(--y)}
.btn-yellow:hover{background:#e69500}

/* ── Page wrapper (one A4 sheet) ── */
.page-wrap{max-width:780px;margin:0 auto 22px;background:#fff;border-radius:8px;padding:14px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.bulk-counter{max-width:780px;margin:0 auto 14px;background:#fff;border-radius:8px;padding:10px 14px;font-size:var(--fs-base);color:#666;text-align:center;font-weight:700}

/* ── Grid layouts ── */
.waybills-grid{display:grid;gap:6mm}
body.layout-1 .waybills-grid{grid-template-columns:1fr}
body.layout-2 .waybills-grid{grid-template-columns:1fr;gap:4mm}
body.layout-4 .waybills-grid{grid-template-columns:1fr 1fr;gap:4mm}
body.layout-6 .waybills-grid{grid-template-columns:1fr 1fr;gap:3mm}
body.layout-12 .waybills-grid{grid-template-columns:1fr 1fr 1fr;gap:2mm}

/* ── Waybill base (1-up — full A4) ── */
.waybill{background:#fff;border:2px solid #000;border-radius:8px;padding:22px;page-break-inside:avoid}
.wb-head{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:14px;border-bottom:2.5px solid #000;margin-bottom:18px}
.wb-logo-block{display:flex;align-items:center;gap:12px}
.wb-logo-icon{width:54px;height:54px;border:2.5px solid #000;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;flex-shrink:0}
.wb-logo-name{font-size:24px;font-weight:900;line-height:1.1}
.wb-logo-tag{font-size:var(--fs-sm);color:#666;font-weight:700;margin-top:3px}
.wb-tracking{font-family:monospace;font-size:var(--fs-md);padding:6px 12px;background:#000;color:#fff;border-radius:5px;font-weight:700;letter-spacing:.4px}
.wb-section{margin-bottom:14px}
.wb-section-row{display:grid;grid-template-columns:1fr 1.1fr;gap:14px;margin-bottom:14px}
.wb-label{font-size:var(--fs-xs);font-weight:800;color:#666;margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px}
.wb-value{font-size:var(--fs-3xl);font-weight:800;line-height:1.3}
.wb-sub{font-size:15px;color:#333;margin-top:3px;font-weight:600}
.wb-cargo{background:#f5f5f5;border-radius:8px;padding:12px 14px;font-size:15px;font-weight:700;border-right:5px solid #3b9eff;line-height:1.5}
.wb-amount{background:#fff3cd;border:2.5px solid var(--y);border-radius:10px;padding:14px;text-align:center}
.wb-amount-lbl{font-size:var(--fs-xs);font-weight:800;color:#666;margin-bottom:5px}
.wb-amount-val{font-size:38px;font-weight:900;color:#d97700;line-height:1}
.wb-amount-tag{font-size:var(--fs-xs);color:#666;margin-top:5px;font-weight:600}
.wb-notes-box{background:#fff8e1;border-right:5px solid var(--y);padding:10px 14px;margin-top:12px;border-radius:6px;font-size:var(--fs-lg);font-weight:600;line-height:1.5}
.wb-foot{margin-top:18px;padding-top:10px;border-top:1.5px dashed #999;display:flex;justify-content:space-between;align-items:center;font-size:var(--fs-sm);color:#666;font-weight:600;flex-wrap:wrap;gap:6px}
.wb-foot strong{color:#000;font-weight:800}

/* ── 2-up: 1 col × 2 rows = ~135mm tall each ── */
body.layout-2 .waybill{padding:16px}
body.layout-2 .wb-amount-val{font-size:32px}

/* ── 4-up: 2×2 = ~95×135mm each ── */
body.layout-4 .waybill{padding:10px;border-width:1.5px}
body.layout-4 .wb-head{padding-bottom:8px;margin-bottom:10px;border-bottom-width:1.5px}
body.layout-4 .wb-logo-icon{width:36px;height:36px;font-size:var(--fs-2xl);border-width:1.5px}
body.layout-4 .wb-logo-name{font-size:var(--fs-xl)}
body.layout-4 .wb-logo-tag{display:none}
body.layout-4 .wb-tracking{font-size:var(--fs-tiny);padding:3px 7px}
body.layout-4 .wb-section{margin-bottom:8px}
body.layout-4 .wb-section-row{gap:8px;margin-bottom:8px}
body.layout-4 .wb-label{font-size:8px;margin-bottom:2px}
body.layout-4 .wb-value{font-size:var(--fs-lg)}
body.layout-4 .wb-sub{font-size:var(--fs-sm);margin-top:1px}
body.layout-4 .wb-cargo{padding:6px 8px;font-size:var(--fs-sm);border-right-width:3px}
body.layout-4 .wb-amount{padding:8px;border-width:1.5px}
body.layout-4 .wb-amount-lbl{font-size:8px;margin-bottom:2px}
body.layout-4 .wb-amount-val{font-size:var(--fs-3xl)}
body.layout-4 .wb-amount-tag{display:none}
body.layout-4 .wb-notes-box{font-size:var(--fs-xs);padding:6px 9px;margin-top:6px;border-right-width:3px}
body.layout-4 .wb-foot{font-size:var(--fs-tiny);margin-top:8px;padding-top:5px}

/* ── 6-up: 2×3 = ~95×90mm each ── */
body.layout-6 .waybill{padding:7px;border-width:1.2px}
body.layout-6 .wb-head{padding-bottom:5px;margin-bottom:6px;border-bottom-width:1.5px}
body.layout-6 .wb-logo-icon{width:28px;height:28px;font-size:var(--fs-lg);border-width:1.2px;border-radius:6px}
body.layout-6 .wb-logo-name{font-size:var(--fs-md)}
body.layout-6 .wb-logo-tag{display:none}
body.layout-6 .wb-tracking{font-size:8px;padding:2px 5px}
body.layout-6 .wb-section{margin-bottom:5px}
body.layout-6 .wb-section-row{gap:6px;margin-bottom:5px;grid-template-columns:1fr 1fr}
body.layout-6 .wb-label{font-size:7px;margin-bottom:1px;letter-spacing:.3px}
body.layout-6 .wb-value{font-size:var(--fs-base)}
body.layout-6 .wb-sub{font-size:var(--fs-xs);margin-top:0}
body.layout-6 .wb-cargo{padding:4px 6px;font-size:var(--fs-xs);border-right-width:2.5px;border-radius:5px}
body.layout-6 .wb-amount{padding:5px;border-width:1.5px;border-radius:6px}
body.layout-6 .wb-amount-lbl{font-size:7px;margin-bottom:1px}
body.layout-6 .wb-amount-val{font-size:var(--fs-2xl)}
body.layout-6 .wb-amount-tag{display:none}
body.layout-6 .wb-notes-box{font-size:var(--fs-tiny);padding:4px 7px;margin-top:4px;border-right-width:2.5px}
body.layout-6 .wb-foot{font-size:8px;margin-top:5px;padding-top:3px;gap:4px}

/* ── 12-up: 3×4 = ~63×70mm each ── */
body.layout-12 .waybill{padding:5px;border-width:1px}
body.layout-12 .wb-head{padding-bottom:3px;margin-bottom:4px;border-bottom-width:1px}
body.layout-12 .wb-logo-icon{width:20px;height:20px;font-size:var(--fs-sm);border-width:1px;border-radius:4px}
body.layout-12 .wb-logo-name{font-size:var(--fs-xs)}
body.layout-12 .wb-logo-tag{display:none}
body.layout-12 .wb-tracking{font-size:7px;padding:1px 4px;letter-spacing:0}
body.layout-12 .wb-section{margin-bottom:3px}
body.layout-12 .wb-section-row{gap:4px;margin-bottom:3px;grid-template-columns:1fr 1fr}
body.layout-12 .wb-label{font-size:6px;margin-bottom:1px;letter-spacing:0;display:none}
body.layout-12 .wb-value{font-size:var(--fs-xs)}
body.layout-12 .wb-sub{font-size:8px;margin-top:0}
body.layout-12 .wb-cargo{padding:3px 5px;font-size:8px;border-right-width:2px;border-radius:4px}
body.layout-12 .wb-amount{padding:3px;border-width:1px;border-radius:4px}
body.layout-12 .wb-amount-lbl{font-size:6px;margin-bottom:0}
body.layout-12 .wb-amount-val{font-size:var(--fs-lg)}
body.layout-12 .wb-amount-tag{display:none}
body.layout-12 .wb-notes-box{display:none}
body.layout-12 .wb-foot{font-size:7px;margin-top:3px;padding-top:2px;gap:2px;border-top-style:solid}

/* ── Loader / Error ── */
.center-msg{max-width:640px;margin:80px auto;padding:50px 20px;background:#fff;border-radius:12px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.center-msg-ico{font-size:54px;margin-bottom:14px}
.center-msg-text{font-size:var(--fs-2xl);font-weight:700;color:#333}

/* ── Edit Modal ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;z-index:100}
.ov.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:22px;max-width:480px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.25);margin-top:20px}
.modal h2{font-size:17px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.alert-box{background:#fff8e1;border:1px solid var(--y);padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:var(--fs-sm);color:#a06600;line-height:1.6;font-weight:600}
.fg{margin-bottom:10px}
.fg label{font-size:var(--fs-sm);font-weight:800;color:#444;display:block;margin-bottom:4px}
.fg input,.fg textarea{width:100%;padding:9px 11px;border:1px solid #ccc;border-radius:6px;font-family:inherit;font-size:var(--fs-md);font-weight:600;color:#222}
.fg textarea{resize:vertical;min-height:38px}
.fg input:focus,.fg textarea:focus{border-color:#3b9eff;outline:none}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

/* ── Toast ── */
.toasts{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;background:#222;color:#fff;border-radius:8px;font-size:var(--fs-md);font-weight:700;box-shadow:0 4px 12px rgba(0,0,0,.2);max-width:340px}
.toast.ok{background:#0a8c4a}
.toast.err{background:#c92846}

@media(max-width:600px){
  .wb-section-row{grid-template-columns:1fr;gap:12px}
  .wb-amount-val{font-size:32px}
  .wb-value{font-size:20px}
  .waybill{padding:20px}
}
</style>
</head>
<body>

<div class="toolbar no-print">
  <button class="btn" onclick="goBack()">← رجوع</button>
  <div class="toolbar-actions">
    <div class="layout-sel-wrap hide" id="layout-sel-wrap">
      <label>📐 العدد في الصفحة:</label>
      <select id="layout-sel" onchange="changeLayout()">
        <option value="1">1 (الكامل)</option>
        <option value="2">2 (نصفين)</option>
        <option value="4">4 (2×2)</option>
        <option value="6">6 (2×3)</option>
        <option value="12">12 (3×4)</option>
      </select>
    </div>
    <button class="btn btn-yellow hide" id="btn-edit" onclick="openEdit()">✏️ تعديل البوليصة</button>
    <button class="btn btn-primary hide" id="btn-print" onclick="printNow()">🖨️ طباعة</button>
  </div>
</div>

<div class="center-msg" id="loading-box">
  <div class="center-msg-ico">⏳</div>
  <div class="center-msg-text">جاري التحميل...</div>
</div>

<div class="center-msg hide" id="err-box">
  <div class="center-msg-ico">⚠️</div>
  <div class="center-msg-text" id="err-msg">—</div>
  <button class="btn btn-primary no-print" style="margin-top:14px" onclick="goBack()">← رجوع</button>
</div>

<div id="bulk-counter" class="bulk-counter no-print hide"></div>
<div id="waybills-container"></div>

<!-- Edit Modal -->
<div class="ov" id="ov-edit">
  <div class="modal">
    <h2>✏️ تعديل البوليصة</h2>
    <div class="alert-box">⚠️ <b>تنبيه أمان:</b> أي تعديل يُسجَّل بسبب وموظف وتاريخ، ويُرسل تنبيه فوري للأدمن للمراجعة.</div>
    <div class="fg"><label>اسم المُستلم</label><input id="ed-name"></div>
    <div class="fg"><label>رقم التليفون</label><input id="ed-phone"></div>
    <div class="fg"><label>المحافظة</label><input id="ed-gov"></div>
    <div class="fg"><label>العنوان التفصيلي</label><textarea id="ed-address" rows="2"></textarea></div>
    <div class="fg"><label>المحتويات</label><input id="ed-cargo" placeholder="مثلاً: 300 كارت شخصي"></div>
    <div class="fg"><label>ملاحظات للمندوب (اختياري)</label><textarea id="ed-notes" rows="2" placeholder="مثلاً: اتصل قبل الوصول"></textarea></div>
    <div class="fg">
      <label style="color:#c92846">📝 سبب التعديل (إجباري — 10 أحرف على الأقل) *</label>
      <textarea id="ed-reason" rows="2" placeholder="مثلاً: العميل غيّر العنوان" oninput="document.getElementById('ed-reason-counter').textContent=this.value.length+' / 10'"></textarea>
      <div id="ed-reason-counter" style="font-size:var(--fs-xs);color:#666;text-align:left;margin-top:2px">0 / 10</div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeEdit()">إلغاء</button>
      <button class="btn btn-yellow" id="btn-save-edit" onclick="saveEdit()">💾 تأكيد التعديل</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script type="module">
import { app, auth, db } from "./core/firebase-init.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
let orders=[],currentUser=null,userName='',userRole='',userPerms={};
const _qp=new URLSearchParams(location.search);
const orderIdsParam=(_qp.get('ids')||_qp.get('id')||'').split(',').map(s=>s.trim()).filter(Boolean);
const isBulk=orderIdsParam.length>1;

const $ = id => document.getElementById(id);
const setText = (id,v) => {const e=$(id);if(e)e.textContent=v;};
const fn = n => (parseFloat(n)||0).toLocaleString('ar-EG');
const sv = (id,v) => {const e=$(id);if(e)e.value=v||'';};
const gv = id => $(id)?.value||'';
function nowStr(){return new Date().toLocaleDateString('ar-EG')+' '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});}
function toast(msg,t=''){const c=$('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3500);}
function escHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

window.goBack=()=>{if(history.length>1)history.back();else location.href='accounts.html';};

window.printNow=()=>{
  setTimeout(()=>window.print(),100);
  // stamp printed metadata on every order in this batch (silently)
  if(currentUser&&orders.length){
    orders.forEach(o=>{
      updateDoc(doc(db,'orders',o._id),{
        'waybill.printedAt':nowStr(),
        'waybill.printedBy':userName,
        'waybill.printCount':((o.waybill?.printCount)||0)+1,
      }).catch(()=>{/* silent */});
    });
  }
};

// ══ Auth + Load ══
onAuthStateChanged(auth,async u=>{
  if(!u){location.href='login.html';return;}
  currentUser=u;
  if(!orderIdsParam.length){showError('لم يُحدَّد رقم الأوردر');return;}
  try{
    const userSnap=await getDoc(doc(db,'users',u.uid));
    if(userSnap.exists()){
      const ud=userSnap.data();
      userName=ud.name||u.email;
      userRole=ud.role||'';
      userPerms=ud.permissions||{};
    }
    // Load all orders in parallel
    const snaps=await Promise.all(orderIdsParam.map(id=>getDoc(doc(db,'orders',id))));
    const loaded=[],missing=[];
    snaps.forEach((s,i)=>{
      if(s.exists()) loaded.push({...s.data(),_id:orderIdsParam[i]});
      else missing.push(orderIdsParam[i]);
    });
    if(!loaded.length){showError('لم يُعثر على أي أوردر');return;}
    // Sort orders by shipping company so consecutive waybills go to same company
    // (يساعد لما الموظف يطبع عشرات البوليصات وعايز يفصلها لكل شركة على حدة)
    loaded.sort((a,b)=>{
      const an=(a.shipCompanyName||'zzz').toLowerCase();
      const bn=(b.shipCompanyName||'zzz').toLowerCase();
      if(an<bn)return -1;
      if(an>bn)return 1;
      // Within same company: sort by client name
      return (a.clientName||'').localeCompare(b.clientName||'','ar');
    });
    orders=loaded;
    if(missing.length) toast(`⚠️ ${missing.length} أوردر مش موجود`,'err');
    render();
  }catch(e){
    if((e.code||'').includes('permission')) showError('ليس لديك صلاحية عرض الأوردر');
    else showError('خطأ: '+(e.message||e));
  }
});

function showError(msg){
  $('loading-box').style.display='none';
  $('err-box').style.display='block';
  setText('err-msg',msg);
}

// ── compute waybill view-model ──
function getWaybillView(o){
  const wb=o.waybill||{};
  const cargoFromProducts=(o.products||[]).map(p=>`${p.qty||1} × ${p.name}`).join(' + ')||o.product||'—';
  return {
    name: wb.recipientName || o.clientName || '—',
    phone: wb.recipientPhone || o.clientPhone || '—',
    gov: wb.recipientGov || o.shipGov || '—',
    address: wb.recipientAddress || o.shipAddress || '—',
    cargo: wb.cargoDescription || cargoFromProducts,
    amount: parseFloat(o.remaining)||0,    // Source of truth: order's live remaining
    notes: wb.notes || '',
    company: o.shipCompanyName || '—',
    tracking: wb.trackingNumber || ('WB-' + (o.orderId || (o._id||'').slice(-8).toUpperCase())),
  };
}

function buildWaybillHtml(o,idx){
  const v=getWaybillView(o);
  const orderRef=escHtml(o.orderId||(o._id||'').slice(-6));
  return `<div class="waybill" data-id="${escHtml(o._id)}">
    <div class="wb-head">
      <div class="wb-logo-block">
        <div class="wb-logo-icon">🎨</div>
        <div>
          <div class="wb-logo-name">Business2Card</div>
          <div class="wb-logo-tag">بوليصة شحن — SHIPPING WAYBILL</div>
        </div>
      </div>
      <div class="wb-tracking">${escHtml(v.tracking)}</div>
    </div>
    <div class="wb-section">
      <div class="wb-label">المُرسَل إليه — RECIPIENT</div>
      <div class="wb-value">${escHtml(v.name)}</div>
      <div class="wb-sub">📞 ${escHtml(v.phone)}</div>
      <div class="wb-sub" style="margin-top:6px">📍 ${escHtml((v.gov!=='—'?v.gov+' — ':'')+v.address)}</div>
    </div>
    <div class="wb-section-row">
      <div>
        <div class="wb-label">المحتويات — CONTENTS</div>
        <div class="wb-cargo">${escHtml(v.cargo)}</div>
      </div>
      <div class="wb-amount">
        <div class="wb-amount-lbl">المطلوب تحصيله — TO COLLECT</div>
        <div class="wb-amount-val">${fn(v.amount)} <span style="font-size:var(--fs-lg)">ج</span></div>
        <div class="wb-amount-tag">شامل رسوم الشحن — Includes shipping</div>
      </div>
    </div>
    ${v.notes?`<div class="wb-notes-box">
      <div style="font-size:var(--fs-tiny);font-weight:800;color:#a06600;margin-bottom:3px">ملاحظات للمندوب — COURIER NOTES</div>
      <div>${escHtml(v.notes)}</div>
    </div>`:''}
    <div class="wb-foot">
      <div>📦 رقم الأوردر: <strong>${orderRef}</strong></div>
      <div>🚚 ${escHtml(v.company)}</div>
      <div>📅 <strong>${new Date().toLocaleDateString('ar-EG')}</strong></div>
    </div>
  </div>`;
}

// ── Layout selection ──
const LAYOUT_OPTS=[1,2,4,6,12];
function getStoredLayout(){
  const v=parseInt(localStorage.getItem('b2c_waybill_layout')||'1');
  return LAYOUT_OPTS.includes(v)?v:1;
}
function applyLayout(n){
  document.body.classList.remove('layout-1','layout-2','layout-4','layout-6','layout-12');
  document.body.classList.add('layout-'+n);
}
window.changeLayout=function(){
  const v=parseInt($('layout-sel').value)||1;
  localStorage.setItem('b2c_waybill_layout',v);
  applyLayout(v);
  render();
};

function render(){
  $('loading-box').style.display='none';
  $('btn-print').style.display='inline-block';
  // Edit only available for single-order mode (1-up; doesn't make sense in compact layouts to edit a tiny preview)
  if(!isBulk && canEdit()) $('btn-edit').style.display='inline-block';
  // Layout selector available always (works for single-order too)
  const perPage=getStoredLayout();
  $('layout-sel').value=perPage;
  $('layout-sel-wrap').style.display='inline-flex';
  applyLayout(perPage);
  // Counter for bulk mode
  if(isBulk){
    $('bulk-counter').style.display='block';
    const totalPages=Math.ceil(orders.length/perPage);
    setText('bulk-counter', `🧾 ${orders.length} بوليصة · ${perPage} في الصفحة · ${totalPages} ${totalPages===1?'صفحة':'صفحات'} A4`);
  } else {
    $('bulk-counter').style.display='none';
  }
  // Group orders into pages of perPage and render
  const groups=[];
  for(let i=0;i<orders.length;i+=perPage)groups.push(orders.slice(i,i+perPage));
  const html=groups.map(g=>`<div class="page-wrap"><div class="waybills-grid">${g.map(o=>buildWaybillHtml(o)).join('')}</div></div>`).join('');
  $('waybills-container').innerHTML=html;
  document.title=isBulk
    ? `بوليصات (${orders.length})`
    : 'بوليصة — '+getWaybillView(orders[0]).name;
}

function canEdit(){
  if(['admin','operation_manager'].includes(userRole)) return true;
  const pages=userPerms.pages||[];
  if(pages.includes('*')) return true;
  if(pages.includes('shipping')) return true;
  if(pages.includes('clients') || userPerms.canAddClients || userPerms.canAddOrders) return true;
  return false;
}

// ══ Edit (single-order mode only) ══
window.openEdit=()=>{
  if(isBulk||!orders.length) return;
  const o=orders[0];
  const v=getWaybillView(o);
  sv('ed-name', v.name==='—'?'':v.name);
  sv('ed-phone', v.phone==='—'?'':v.phone);
  sv('ed-gov', v.gov==='—'?'':v.gov);
  sv('ed-address', v.address==='—'?'':v.address);
  sv('ed-cargo', v.cargo==='—'?'':v.cargo);
  sv('ed-notes', v.notes||'');
  sv('ed-reason', '');
  setText('ed-reason-counter', '0 / 10');
  $('ov-edit').classList.add('open');
};

window.closeEdit=()=>$('ov-edit').classList.remove('open');

window.saveEdit=async()=>{
  if(isBulk||!orders.length) return;
  const o=orders[0];
  if(o.stage==='archived') return toast('⛔ الأوردر مؤرشف','err');
  if(o.shipStage==='returned') return toast('⛔ الأوردر مرتجع','err');
  const reason=gv('ed-reason').trim();
  if(reason.length<10) return toast('⚠️ سبب التعديل لا بد ≥ 10 أحرف','err');
  const newName=gv('ed-name').trim();
  const newPhone=gv('ed-phone').trim();
  const newGov=gv('ed-gov').trim();
  const newAddress=gv('ed-address').trim();
  const newCargo=gv('ed-cargo').trim();
  const newNotes=gv('ed-notes').trim();
  // Build changes set vs current view
  const cur=getWaybillView(o);
  const changes=[];
  const track=(field,label,before,after)=>{if(String(before||'')!==String(after||''))changes.push({field,label,before:String(before||'—'),after:String(after||'—')});};
  track('recipientName','اسم المُستلم',cur.name==='—'?'':cur.name,newName);
  track('recipientPhone','رقم التليفون',cur.phone==='—'?'':cur.phone,newPhone);
  track('recipientGov','المحافظة',cur.gov==='—'?'':cur.gov,newGov);
  track('recipientAddress','العنوان',cur.address==='—'?'':cur.address,newAddress);
  track('cargoDescription','المحتويات',cur.cargo==='—'?'':cur.cargo,newCargo);
  track('notes','ملاحظات',cur.notes||'',newNotes);
  if(!changes.length) return toast('لا توجد تغييرات','');
  const btn=$('btn-save-edit');btn.disabled=true;btn.textContent='...';
  try{
    const auditEntry={
      type:'waybill_edit',
      changedBy:userName, changedById:currentUser.uid,
      date:nowStr(), reason, changes,
      requiresReview:true,
    };
    const updates={
      'waybill.recipientName': newName,
      'waybill.recipientPhone': newPhone,
      'waybill.recipientGov': newGov,
      'waybill.recipientAddress': newAddress,
      'waybill.cargoDescription': newCargo,
      'waybill.notes': newNotes,
      'waybill.lastEditedAt': nowStr(),
      'waybill.lastEditedBy': userName,
      // Sync with top-level shipping fields so openShipSetup pre-fills correctly
      shipGov: newGov,
      shipAddress: newAddress,
      auditLog: [...(o.auditLog||[]), auditEntry],
      hasUnreviewedAudit: true,
      timeline: [...(o.timeline||[]), {date:nowStr(),action:`✏️ تعديل البوليصة — ${changes.map(c=>c.label).join(', ')} · ${reason}`,by:userName}],
      updatedAt: serverTimestamp(),
    };
    await updateDoc(doc(db,'orders',o._id), updates);
    // Update local state
    orders[0]={...o, ...updates,
      waybill:{...(o.waybill||{}),recipientName:newName,recipientPhone:newPhone,recipientGov:newGov,recipientAddress:newAddress,cargoDescription:newCargo,notes:newNotes,lastEditedAt:nowStr(),lastEditedBy:userName},
    };
    closeEdit();
    toast('✅ تم التعديل · تنبيه أُرسل للأدمن','ok');
    render();
  }catch(e){
    toast('❌ '+(e.message||e),'err');
  }finally{
    btn.disabled=false;btn.textContent='💾 تأكيد التعديل';
  }
};

// Allow closing modal by clicking outside
$('ov-edit').addEventListener('click',e=>{if(e.target.id==='ov-edit')closeEdit();});
</script>
</body>
</html>
