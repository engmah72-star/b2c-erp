<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🧠 AI Insights</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--bg4:#252d3e;
  --line:#2a3348;--snow:#e8eaf0;--dim:#8892a4;--dim2:#5c6878;
  --accent:#4f8ef7;--g:#34d399;--r:#f87171;--y:#fbbf24;--pu:#a78bfa;
  --ai:#10b981;--ai2:#059669;
}
body{background:var(--bg);color:var(--snow);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding-bottom:40px}
a{color:inherit;text-decoration:none}

/* ── Nav ── */
.topbar{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--line);padding:0 16px;height:52px;display:flex;align-items:center;gap:12px}
.topbar-back{width:34px;height:34px;border-radius:10px;background:var(--bg3);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--dim)}
.topbar-title{font-size:15px;font-weight:700;flex:1}
.topbar-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-weight:700}

/* ── Layout ── */
.wrap{max-width:600px;margin:0 auto;padding:16px}

/* ── API Key Setup ── */
.key-card{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px}
.key-card.ok{border-color:var(--ai);background:rgba(16,185,129,.06)}
.key-label{font-size:11px;font-weight:700;color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.key-row{display:flex;gap:8px}
.key-input{flex:1;background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--snow);outline:none;direction:ltr}
.key-input:focus{border-color:var(--accent)}
.key-btn{padding:10px 14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.key-hint{font-size:11px;color:var(--dim2);margin-top:8px}
.key-hint a{color:var(--accent)}
.key-ok{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ai);font-weight:600}

/* ── Analyse Button ── */
.analyse-btn{width:100%;padding:14px;background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.3px;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;transition:.2s}
.analyse-btn:disabled{opacity:.5;cursor:not-allowed}
.analyse-btn:hover:not(:disabled){filter:brightness(1.1)}
.spin{animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Result Cards ── */
.result-grid{display:grid;gap:12px;margin-bottom:16px}
.rcard{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:16px;opacity:0;transform:translateY(8px);transition:.4s}
.rcard.show{opacity:1;transform:translateY(0)}
.rcard-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.rcard-ico{font-size:20px}
.rcard-title{font-size:13px;font-weight:700;color:var(--snow)}
.rcard-body{font-size:13px;color:var(--dim);line-height:1.7;white-space:pre-wrap}
.rcard-body strong{color:var(--snow);font-weight:700}
.rcard-body .tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;margin:2px 2px;background:var(--bg3);color:var(--accent)}
.rcard-body .tag.red{background:rgba(248,113,113,.12);color:var(--r)}
.rcard-body .tag.green{background:rgba(52,211,153,.12);color:var(--g)}
.rcard-body .tag.yellow{background:rgba(251,191,36,.12);color:var(--y)}

/* ── Chat ── */
.chat-card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:16px}
.chat-head{padding:14px 16px;border-bottom:1px solid var(--line);font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.chat-messages{padding:12px 16px;display:flex;flex-direction:column;gap:10px;min-height:80px;max-height:320px;overflow-y:auto}
.msg{max-width:88%;padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.6;white-space:pre-wrap}
.msg.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.ai{background:var(--bg3);color:var(--snow);align-self:flex-start;border-bottom-left-radius:4px}
.msg.ai strong{color:var(--g)}
.msg-typing{background:var(--bg3);padding:10px 13px;border-radius:12px;align-self:flex-start;font-size:13px;color:var(--dim2);border-bottom-left-radius:4px}
.chat-input-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--line);background:var(--bg2)}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--snow);outline:none;resize:none;font-family:inherit}
.chat-input:focus{border-color:var(--ai)}
.chat-send{width:38px;height:38px;background:var(--ai);border:none;border-radius:10px;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-send:disabled{opacity:.4;cursor:not-allowed}

/* ── Stats bar ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-box{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
.stat-val{font-size:17px;font-weight:800;color:var(--snow)}
.stat-lbl{font-size:10px;color:var(--dim2);margin-top:2px}

/* ── Skeleton ── */
.skel{background:var(--bg3);border-radius:6px;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.mdbtn{padding:5px 10px;background:var(--bg3);border:1px solid var(--line);border-radius:8px;color:var(--dim);font-size:12px;cursor:pointer;transition:.15s}
.mdbtn:hover{border-color:var(--accent);color:var(--snow)}
.mdbtn.active{border-color:var(--ai);color:var(--ai);background:rgba(16,185,129,.08);font-weight:700}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="topbar-back">←</a>
  <span class="topbar-title">🧠 AI Insights</span>
  <span class="topbar-badge">Gemini</span>
</div>

<div class="wrap">

  <!-- API Key Setup -->
  <div class="key-card" id="key-card">
    <div class="key-label">🔑 Gemini API Key</div>
    <div id="key-setup">
      <div class="key-row">
        <input id="key-inp" class="key-input" type="password" placeholder="AIza..." autocomplete="off">
        <button class="key-btn" onclick="saveKey()">حفظ</button>
      </div>
      <div class="key-hint">احصل على مفتاح مجاني من <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio ←</a></div>
    </div>
    <div id="key-ok" style="display:none" class="key-ok">
      ✅ API Key محفوظ &nbsp;·&nbsp; <span style="cursor:pointer;color:var(--dim);font-size:11px" onclick="clearKey()">تغيير</span>
    </div>
    <div style="margin-top:12px;border-top:1px solid var(--line);padding-top:12px">
      <div class="key-label" style="margin-bottom:6px">🤖 الموديل</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap" id="model-btns">
        <button onclick="setModel('gemini-1.5-flash')" class="mdbtn" data-m="gemini-1.5-flash">1.5 Flash <span style="font-size:9px;color:var(--g)">مجاني</span></button>
        <button onclick="setModel('gemini-2.0-flash')" class="mdbtn" data-m="gemini-2.0-flash">2.0 Flash</button>
        <button onclick="setModel('gemini-1.5-pro')"  class="mdbtn" data-m="gemini-1.5-pro">1.5 Pro</button>
      </div>
    </div>
  </div>

  <!-- Quick Stats -->
  <div class="stats-row" id="stats-row">
    <div class="stat-box"><div class="stat-val" id="st-orders">—</div><div class="stat-lbl">أوردر (آخر 90 يوم)</div></div>
    <div class="stat-box"><div class="stat-val" id="st-rev">—</div><div class="stat-lbl">إجمالي الإيرادات</div></div>
    <div class="stat-box"><div class="stat-val" id="st-late">—</div><div class="stat-lbl">أوردرات متأخرة</div></div>
  </div>

  <!-- Analyse Button -->
  <button class="analyse-btn" id="analyse-btn" onclick="runAnalysis()">
    <span id="analyse-ico">🧠</span>
    <span id="analyse-txt">تحليل الأوردرات بالذكاء الاصطناعي</span>
  </button>

  <!-- Results -->
  <div class="result-grid" id="results"></div>

  <!-- Chat -->
  <div class="chat-card">
    <div class="chat-head">💬 <span>اسأل عن بيانات شركتك</span></div>
    <div class="chat-messages" id="chat-msgs">
      <div class="msg ai">أهلاً! اسألني أي سؤال عن أوردراتك، عملاءك، أو أداء شركتك. سأحلل البيانات الحقيقية وأجاوبك.</div>
    </div>
    <div class="chat-input-row">
      <textarea id="chat-inp" class="chat-input" rows="1" placeholder="مثال: إيه أكثر منتج مطلوب هذا الشهر؟" onkeydown="chatKeydown(event)"></textarea>
      <button id="chat-btn" class="chat-send" onclick="sendChat()">↑</button>
    </div>
  </div>

</div>

<script type="module">
import {initializeApp} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getAuth,onAuthStateChanged} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {getFirestore,collection,getDocs,query,where,orderBy,limit} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB={apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"};
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);

const fn=n=>Math.round(n).toLocaleString('ar-EG');
const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};

let allOrders=[],allClients=[];
let analysisContext='';

// ── Auth ──
onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='login.html';return;}
  await loadData();
  checkKey();
});

// ── Load Data ──
async function loadData(){
  const cutoff=new Date();
  cutoff.setDate(cutoff.getDate()-90);
  const snap=await getDocs(collection(db,'orders'));
  allOrders=snap.docs.map(d=>({...d.data(),_id:d.id}));
  const cSnap=await getDocs(collection(db,'clients'));
  allClients=cSnap.docs.map(d=>({...d.data(),_id:d.id}));
  renderStats();
}

function renderStats(){
  const cutoff=Date.now()-90*864e5;
  const recent=allOrders.filter(o=>{
    const t=o.createdAt?.toDate?.()?.getTime()||((o.createdAt?.seconds||0)*1000);
    return t>=cutoff;
  });
  const rev=recent.reduce((s,o)=>s+(parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0),0);
  const now=Date.now();
  const late=allOrders.filter(o=>{
    if(o.stage==='delivered'||o.stage==='archived')return false;
    const dd=o.deliveryDate?.toDate?.()?.getTime()||((o.deliveryDate?.seconds||0)*1000);
    return dd&&dd<now;
  });
  set('st-orders',recent.length);
  set('st-rev',fn(rev)+' ج');
  set('st-late',late.length);
}

// ── Key Management ──
window.saveKey=function(){
  const k=document.getElementById('key-inp').value.trim();
  if(!k.startsWith('AIza')){alert('المفتاح غير صحيح — يجب أن يبدأ بـ AIza');return;}
  localStorage.setItem('gemini_key',k);
  checkKey();
};
window.clearKey=function(){
  localStorage.removeItem('gemini_key');
  document.getElementById('key-inp').value='';
  checkKey();
};
window.setModel=function(m){
  localStorage.setItem('gemini_model',m);
  document.querySelectorAll('.mdbtn').forEach(b=>{
    b.classList.toggle('active',b.dataset.m===m);
  });
};
function checkKey(){
  const k=localStorage.getItem('gemini_key');
  document.getElementById('key-setup').style.display=k?'none':'block';
  document.getElementById('key-ok').style.display=k?'flex':'none';
  const card=document.getElementById('key-card');
  if(k)card.classList.add('ok'); else card.classList.remove('ok');
  const saved=localStorage.getItem('gemini_model')||'gemini-1.5-flash';
  document.querySelectorAll('.mdbtn').forEach(b=>{
    b.classList.toggle('active',b.dataset.m===saved);
  });
}

// ── Build Context ──
function buildContext(){
  const cutoff=Date.now()-90*864e5;
  const recent=allOrders.filter(o=>{
    const t=o.createdAt?.toDate?.()?.getTime()||((o.createdAt?.seconds||0)*1000);
    return t>=cutoff;
  });
  const stageCnt={};
  recent.forEach(o=>{stageCnt[o.stage]=(stageCnt[o.stage]||0)+1;});

  const prodCnt={};
  recent.forEach(o=>{
    const p=o.productName||o.product||'غير محدد';
    prodCnt[p]=(prodCnt[p]||0)+1;
  });
  const topProd=Object.entries(prodCnt).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const clientCnt={};
  recent.forEach(o=>{
    const c=o.clientName||o.client||'غير محدد';
    clientCnt[c]=(clientCnt[c]||0)+1;
  });
  const topClients=Object.entries(clientCnt).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const rev=recent.reduce((s,o)=>s+(parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0),0);
  const rem=allOrders.reduce((s,o)=>{
    const total=parseFloat(o.totalPrice)||parseFloat(o.price)||0;
    const paid=parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0;
    return s+Math.max(0,total-paid);
  },0);

  const now=Date.now();
  const late=allOrders.filter(o=>{
    if(o.stage==='delivered'||o.stage==='archived')return false;
    const dd=o.deliveryDate?.toDate?.()?.getTime()||((o.deliveryDate?.seconds||0)*1000);
    return dd&&dd<now;
  });

  const costTotal=recent.reduce((s,o)=>{
    return s+(o.costItems||[]).reduce((cs,c)=>cs+(parseFloat(c.total)||0),0);
  },0);

  const ctx=`
أنت مساعد ذكاء اصطناعي متخصص في تحليل بيانات شركة طباعة مصرية (B2C ERP).
البيانات التالية حقيقية من النظام (آخر 90 يوم):

📊 ملخص عام:
- إجمالي الأوردرات (90 يوم): ${recent.length}
- إجمالي الإيرادات المحصّلة: ${fn(rev)} جنيه
- إجمالي المتبقي (ديون العملاء): ${fn(rem)} جنيه
- إجمالي تكاليف الإنتاج: ${fn(costTotal)} جنيه
- هامش الربح التقديري: ${rev>0?Math.round(((rev-costTotal)/rev)*100):0}%
- متوسط قيمة الأوردر: ${recent.length?fn(rev/recent.length):0} جنيه
- عدد الأوردرات المتأخرة: ${late.length}

📋 توزيع الأوردرات على المراحل:
${Object.entries(stageCnt).map(([s,n])=>`- ${s}: ${n} أوردر`).join('\n')}

🏆 أكثر المنتجات طلباً:
${topProd.map(([p,n],i)=>`${i+1}. ${p}: ${n} طلب`).join('\n')}

👤 أكثر العملاء تعاملاً:
${topClients.map(([c,n],i)=>`${i+1}. ${c}: ${n} أوردر`).join('\n')}

إجمالي العملاء: ${allClients.length}
`.trim();

  analysisContext=ctx;
  return ctx;
}

// ── Run Analysis ──
window.runAnalysis=async function(){
  const key=localStorage.getItem('gemini_key');
  if(!key){alert('أدخل Gemini API Key أولاً');return;}

  const btn=document.getElementById('analyse-btn');
  document.getElementById('analyse-ico').textContent='⏳';
  document.getElementById('analyse-txt').textContent='جاري التحليل...';
  btn.disabled=true;

  const ctx=buildContext();
  const prompt=`${ctx}

بناءً على هذه البيانات الحقيقية، قدّم تحليلاً شاملاً ومفيداً يشمل:

1. **ملخص الأداء** — كيف أداء الشركة هذا الشهر مقارنة بالمعتاد؟ ما أبرز الأرقام؟

2. **أبرز الفرص** — ما المنتجات أو العملاء أو القطاعات التي تستحق تركيزاً أكبر؟

3. **التحديات والمخاطر** — ما المشكلات الظاهرة في البيانات؟ (تأخيرات، ديون، انخفاض هامش)

4. **توصيات عملية** — 3 إجراءات محددة يجب تنفيذها الأسبوع القادم

5. **توقع الشهر القادم** — بناءً على الاتجاه الحالي، ما المتوقع؟

أجب بالعربية بأسلوب مباشر وعملي. استخدم أرقام من البيانات. لا تستخدم مقدمات طويلة.`;

  const cards=[
    {id:'r-summary',ico:'📊',title:'ملخص الأداء'},
    {id:'r-opps',ico:'🚀',title:'أبرز الفرص'},
    {id:'r-risks',ico:'⚠️',title:'التحديات والمخاطر'},
    {id:'r-actions',ico:'✅',title:'توصيات عملية'},
    {id:'r-forecast',ico:'📈',title:'توقع الشهر القادم'},
  ];

  const container=document.getElementById('results');
  container.innerHTML=cards.map(c=>`
    <div class="rcard" id="${c.id}">
      <div class="rcard-head"><span class="rcard-ico">${c.ico}</span><span class="rcard-title">${c.title}</span></div>
      <div class="rcard-body"><span class="skel" style="height:12px;display:block;width:80%;margin-bottom:8px"></span><span class="skel" style="height:12px;display:block;width:60%"></span></div>
    </div>`).join('');

  try{
    const res=await callGemini(key,prompt);
    const parts=parseAnalysis(res);
    cards.forEach((c,i)=>{
      const el=document.getElementById(c.id);
      if(!el)return;
      el.querySelector('.rcard-body').innerHTML=formatText(parts[i]||'');
      setTimeout(()=>el.classList.add('show'),i*120);
    });
  }catch(e){
    container.innerHTML=`<div class="rcard show" style="border-color:var(--r)"><div class="rcard-body" style="color:var(--r)">خطأ: ${e.message}</div></div>`;
  }

  document.getElementById('analyse-ico').textContent='🔄';
  document.getElementById('analyse-txt').textContent='إعادة التحليل';
  btn.disabled=false;
};

function parseAnalysis(text){
  const sections=[];
  const parts=text.split(/\n(?=\d+\.|#{1,3} )/);
  parts.forEach(p=>{
    const clean=p.replace(/^[\d]+\.\s*\*\*[^*]+\*\*\s*—?\s*/,'').replace(/^#{1,3}\s*/,'').trim();
    if(clean)sections.push(clean);
  });
  if(sections.length<3){
    const lines=text.split('\n\n');
    return lines.filter(l=>l.trim().length>20);
  }
  return sections;
}

function formatText(t){
  return t
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/^[-•]\s+(.+)$/gm,'<span class="tag">$1</span>')
    .replace(/\n/g,'<br>');
}

// ── Gemini Call — with auto-fallback ──
const FALLBACK_MODEL='gemini-1.5-flash';

async function callGemini(key,prompt){
  const model=localStorage.getItem('gemini_model')||FALLBACK_MODEL;
  try{
    return await callModel(key,model,prompt);
  }catch(e){
    if(model!==FALLBACK_MODEL&&(e.httpStatus===429||e.httpStatus===403||e.httpStatus===503)){
      showModelNote(`⚠️ ${model} غير متاح — تم التبديل تلقائياً إلى ${FALLBACK_MODEL}`);
      return await callModel(key,FALLBACK_MODEL,prompt);
    }
    throw e;
  }
}

async function callModel(key,model,prompt){
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
  const r=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[{text:prompt}]}],
      generationConfig:{temperature:.7,maxOutputTokens:2048}
    })
  });
  if(!r.ok){
    const errData=await r.json().catch(()=>({}));
    const apiMsg=errData?.error?.message||r.statusText;
    const err=new Error(friendlyError(r.status,apiMsg,model));
    err.httpStatus=r.status;
    err.apiMsg=apiMsg;
    throw err;
  }
  const data=await r.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text||'لا توجد نتيجة';
}

function friendlyError(status,apiMsg,model){
  const raw=`\n\n<span style="font-size:11px;color:var(--dim2);direction:ltr;display:block">[HTTP ${status}] ${apiMsg}</span>`;
  if(status===400&&(apiMsg.includes('API_KEY')||apiMsg.includes('invalid')))
    return`🔑 API Key غير صحيح — تأكد من نسخه كاملاً من AI Studio${raw}`;
  if(status===403)
    return`🚫 الوصول مرفوض — تأكد من تفعيل "Generative Language API" في Google Cloud Console لمشروعك${raw}`;
  if(status===429)
    return`⏱️ تجاوزت الحد المسموح للموديل (${model}) — انتظر دقيقة أو اختر موديل مختلف${raw}`;
  if(status===503||status===500)
    return`🔧 خطأ مؤقت في خادم Google — حاول مرة أخرى بعد 30 ثانية${raw}`;
  return`خطأ غير متوقع${raw}`;
}

function showModelNote(msg){
  let n=document.getElementById('model-note');
  if(!n){n=document.createElement('div');n.id='model-note';n.style.cssText='font-size:12px;color:var(--y);padding:6px 12px;background:rgba(251,191,36,.08);border-radius:8px;margin-bottom:10px';document.getElementById('results').before(n);}
  n.textContent=msg;
}

// ── Chat ──
window.chatKeydown=function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}
};

window.sendChat=async function(){
  const key=localStorage.getItem('gemini_key');
  if(!key){alert('أدخل Gemini API Key أولاً');return;}
  const inp=document.getElementById('chat-inp');
  const q=inp.value.trim();
  if(!q)return;
  inp.value='';

  const msgs=document.getElementById('chat-msgs');
  msgs.innerHTML+=`<div class="msg user">${q}</div>`;
  const typing=document.createElement('div');
  typing.className='msg-typing';typing.id='typing';typing.textContent='✦ جاري التفكير...';
  msgs.appendChild(typing);
  msgs.scrollTop=msgs.scrollHeight;
  document.getElementById('chat-btn').disabled=true;

  if(!analysisContext)buildContext();

  const prompt=`${analysisContext}

سؤال المستخدم: ${q}

أجب بالعربية بشكل مباشر ومختصر (جملة إلى فقرة واحدة). استند إلى الأرقام الحقيقية من البيانات أعلاه.`;

  try{
    const ans=await callGemini(key,prompt);
    document.getElementById('typing')?.remove();
    msgs.innerHTML+=`<div class="msg ai">${formatText(ans)}</div>`;
  }catch(e){
    document.getElementById('typing')?.remove();
    msgs.innerHTML+=`<div class="msg ai" style="color:var(--r)">${e.message}</div>`;
  }
  msgs.scrollTop=msgs.scrollHeight;
  document.getElementById('chat-btn').disabled=false;
};

</script>
