<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>إعادة تعيين Service Worker</title>
<style>
  body{font-family:system-ui,-apple-system,sans-serif;background:#0b0f17;color:#e6edf3;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;margin:0;}
  .card{max-width:480px;background:#161b22;border:1px solid #30363d;border-radius:14px;
    padding:28px;text-align:center;}
  h1{margin:0 0 12px;font-size:20px;color:var(--p);}
  p{font-size:var(--fs-lg);line-height:1.7;color:#9ca3af;margin:8px 0;}
  .step{padding:10px 14px;background:#0d1117;border-radius:8px;margin:8px 0;
    font-size:var(--fs-md);text-align:right;border-right:3px solid #30363d;}
  .step.done{border-right-color:#22c55e;color:#86efac;}
  .step.err{border-right-color:#ef4444;color:#fca5a5;}
  .btn{display:inline-block;padding:10px 22px;background:var(--p);color:#fff;
    border:none;border-radius:8px;font-size:var(--fs-lg);font-weight:700;cursor:pointer;
    margin-top:14px;text-decoration:none;}
  .btn:disabled{opacity:.5;cursor:wait;}
</style>
</head>
<body>
<div class="card">
  <h1>🛠️ إعادة تعيين Service Worker</h1>
  <p>الصفحة دي بتفك أي Service Worker عالق وبتفرّغ الـ cache بالكامل. استخدمها لو فيه صفحة مش بتحمل أو لسه شايف نسخة قديمة بعد deploy.</p>
  <div id="log"></div>
  <button class="btn" id="go-btn" onclick="goLogin()" disabled>↻ ارجع لصفحة الدخول</button>
</div>
<script>
const log = document.getElementById('log');
function add(msg, cls){
  const d = document.createElement('div');
  d.className = 'step ' + (cls || '');
  d.textContent = msg;
  log.appendChild(d);
}
async function reset(){
  // 1) Unregister all SWs
  if ('serviceWorker' in navigator) {
    try {
      const regs = await navigator.serviceWorker.getRegistrations();
      add(`وجد ${regs.length} Service Worker`, 'done');
      for (const r of regs) {
        await r.unregister();
        add(`✓ أُلغي تسجيل: ${r.scope}`, 'done');
      }
    } catch (e) {
      add(`✗ خطأ في فك SW: ${e.message}`, 'err');
    }
  } else {
    add('المتصفح ما يدعمش Service Worker', 'done');
  }
  // 2) Clear all caches
  if ('caches' in window) {
    try {
      const keys = await caches.keys();
      add(`وجد ${keys.length} cache`, 'done');
      for (const k of keys) {
        await caches.delete(k);
        add(`✓ مسحت cache: ${k}`, 'done');
      }
    } catch (e) {
      add(`✗ خطأ في مسح cache: ${e.message}`, 'err');
    }
  }
  // 3) Clear localStorage / sessionStorage (لا تمسح Firebase auth)
  // ملاحظة: لو مسحنا الـ localStorage، الـ Firebase auth session ينتهي.
  // عشان نحافظ على تسجيل الدخول، نسيب localStorage في حاله.
  add('✓ تم التنظيف بنجاح — اضغط الزر للدخول', 'done');
  document.getElementById('go-btn').disabled = false;
}
function goLogin(){
  // Use replace() so the user can't "back" into the broken state.
  window.location.replace('login.html');
}
reset();
</script>
</body>
</html>
