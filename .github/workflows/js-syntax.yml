name: 🧩 JS Syntax Gate

# Parses every JS module in the repo — standalone .js/.mjs AND every inline
# <script type="module"> in .html — with `node --check`. Catches syntax errors
# that runtime/pure tests never reach (e.g. a duplicate top-level function
# declaration in a page's module scope). See tools/check-syntax.mjs.

on:
  pull_request:
    paths:
      - '**/*.js'
      - '**/*.mjs'
      - '**/*.html'
      - 'tools/check-syntax.mjs'
      - '.github/workflows/js-syntax.yml'

jobs:
  syntax:
    name: 🧩 JS syntax (modules + inline HTML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check syntax
        run: node tools/check-syntax.mjs
