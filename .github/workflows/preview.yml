name: Hosting Preview

# معاينة قبل النشر: ينشر فرع الـ PR على Firebase Hosting Preview Channel
# (رابط مؤقت معزول عن الموقع الحيّ `live`). يعلّق الرابط على الـ PR.
# لا يلمس production — الإنتاج ينشر فقط من deploy.yml على push إلى main.
#
# Auth: action-hosting-deploy@v0 يولّد FIREBASE_TOKEN داخليًا من service account
# عبر firebase-admin — هذا الأسلوب الوحيد الذي يعمل مع firebase-tools@15+/Node24.
#
# continue-on-error على خطوة الـ deploy: خطأ 400 "already active version"
# يعني المحتوى منشور بالفعل (Firebase يرفض re-release لنفس الـ version).
# ده false-error — الـ preview URL يعمل. نكمل ونعلّق الرابط دائمًا.

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    # تخطّى الـ PRs القادمة من forks (لا تملك secrets)
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting preview channel
        id: deploy
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: business2card-c041b
          channelId: pr${{ github.event.pull_request.number }}
          expires: 7d

      - name: Comment preview URL on PR
        if: always()
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.details_url }}
        with:
          script: |
            const pr     = context.payload.pull_request.number;
            const base   = process.env.DEPLOY_URL || `https://business2card-c041b--pr${pr}.web.app`;
            const marker = '<!-- fb-preview-bot -->';

            const body = [
              marker,
              `🔥 **Firebase Preview — PR #${pr}**`,
              '',
              `🔗 ${base}`,
              '',
              `📋 [order-register.html](${base}/order-register.html)`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: pr,
              owner: context.repo.owner,
              repo:  context.repo.repo,
            });
            const prev = comments.find(c => c.body.includes(marker));
            if (prev) {
              await github.rest.issues.updateComment({
                comment_id: prev.id,
                owner: context.repo.owner,
                repo:  context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: pr,
                owner: context.repo.owner,
                repo:  context.repo.repo,
                body,
              });
            }
