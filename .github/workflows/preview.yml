name: Hosting Preview

# معاينة قبل النشر: ينشر فرع الـ PR على Firebase Hosting Preview Channel
# (رابط مؤقت معزول عن الموقع الحيّ `live`). يعلّق الرابط على الـ PR.
# لا يلمس production — الإنتاج ينشر فقط من deploy.yml على push إلى main.
#
# Auth: firebase-tools يقرأ FIREBASE_TOKEN (Bearer) لا GOOGLE_APPLICATION_CREDENTIALS.
# نولّد التوكن بأنفسنا من service account JSON عبر Node.js built-ins (بدون npm).

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    # تخطّى الـ PRs القادمة من forks (لا تملك secrets)
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Generate Firebase auth token from service account
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node - <<'NODEOF'
          const https  = require('https');
          const crypto = require('crypto');
          const fs     = require('fs');

          const sa  = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          const now = Math.floor(Date.now() / 1000);

          const header = Buffer.from(JSON.stringify({ alg: 'RS256', typ: 'JWT' })).toString('base64url');
          const claim  = Buffer.from(JSON.stringify({
            iss:   sa.client_email,
            scope: 'https://www.googleapis.com/auth/cloud-platform https://www.googleapis.com/auth/firebase',
            aud:   'https://oauth2.googleapis.com/token',
            exp:   now + 3600,
            iat:   now,
          })).toString('base64url');

          const toSign = `${header}.${claim}`;
          const sig    = crypto.createSign('RSA-SHA256').update(toSign).sign(sa.private_key, 'base64url');
          const jwt    = `${toSign}.${sig}`;

          const body = `grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`;
          const req  = https.request(
            { hostname: 'oauth2.googleapis.com', path: '/token', method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' } },
            res => {
              let d = '';
              res.on('data', c => d += c);
              res.on('end', () => {
                const parsed = JSON.parse(d);
                if (!parsed.access_token) {
                  console.error('Token exchange failed:', d);
                  process.exit(1);
                }
                fs.appendFileSync(process.env.GITHUB_ENV, `FIREBASE_TOKEN=${parsed.access_token}\n`);
                console.log('✓ FIREBASE_TOKEN written to env');
              });
            }
          );
          req.on('error', e => { console.error(e); process.exit(1); });
          req.write(body);
          req.end();
          NODEOF

      - name: Deploy to Firebase Hosting preview channel
        id: deploy
        run: |
          CHANNEL_ID="pr${{ github.event.pull_request.number }}"
          echo "Channel: $CHANNEL_ID"

          # حذف القناة القديمة لتجنب 409 (|| true لو مش موجودة)
          npx firebase-tools@13 hosting:channel:delete "$CHANNEL_ID" \
            --project business2card-c041b --force 2>&1 || true

          npx firebase-tools@13 hosting:channel:deploy "$CHANNEL_ID" \
            --project business2card-c041b \
            --expires 7d \
            --non-interactive \
            2>&1 | tee /tmp/deploy-log.txt
          EXIT_CODE=${PIPESTATUS[0]}

          # "already active version" (400) = المحتوى منشور بالفعل، treat as success
          if [ "$EXIT_CODE" -ne 0 ] && grep -q "current active version" /tmp/deploy-log.txt; then
            echo "ℹ️ Version already active — preview is live ✓"
            EXIT_CODE=0
          fi

          echo "preview_channel=$CHANNEL_ID" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Comment preview URL on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const pr     = context.payload.pull_request.number;
            const site   = 'business2card-c041b';
            const chan   = `pr${pr}`;
            const base   = `https://${site}--${chan}.web.app`;
            const marker = '<!-- fb-preview-bot -->';

            const body = [
              marker,
              `🔥 **Firebase Preview — PR #${pr}**`,
              '',
              `🔗 ${base}`,
              '',
              `📋 [order-register.html](${base}/order-register.html)`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: pr,
              owner: context.repo.owner,
              repo:  context.repo.repo,
            });
            const prev = comments.find(c => c.body.includes(marker));
            if (prev) {
              await github.rest.issues.updateComment({
                comment_id: prev.id,
                owner: context.repo.owner,
                repo:  context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: pr,
                owner: context.repo.owner,
                repo:  context.repo.repo,
                body,
              });
            }
