name: Hosting Preview

# معاينة قبل النشر: ينشر فرع الـ PR على Firebase Hosting Preview Channel
# (رابط مؤقت معزول عن الموقع الحيّ `live`). الـ action يعلّق الرابط على الـ PR.
# لا يلمس production — الإنتاج ينشر فقط من deploy.yml على push إلى main.

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    # تخطّى الـ PRs القادمة من forks (لا تملك secrets)
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: business2card-c041b
          expires: 7d
          # channelId مُهمَل عمداً → الـ action ينشئ قناة preview تلقائية لكل PR
