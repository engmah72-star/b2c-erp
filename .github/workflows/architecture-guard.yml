name: 🏛️ Architecture Guard

# PR-7 G4 — fails the build if forbidden mutation patterns appear in UI files.
# All financial/state writes must go through orderActions.* or core/.

on:
  pull_request:
    paths:
      - '**/*.html'
      - '**/*.js'

jobs:
  forbidden-writes:
    name: 🚫 Forbidden Firestore writes in UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Identify changed UI files
        id: changed
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          # كل .html / .js عدا الملفات المُسموح لها بالكتابة (action layer + repos + FSE + feature services + self-heal)
          git diff --name-only "$BASE_SHA" HEAD -- '*.html' '*.js' \
            | grep -vE '^(order-actions\.js|client-actions\.js|shipping-actions\.js|shipping-service\.js|inbox-actions\.js|employee-actions\.js|wallet-actions\.js|approval-actions\.js|master-lists-actions\.js|product-actions\.js|production-actions\.js|supplier-actions\.js|financial-sync-engine\.js|orders\.js|core/|features/[^/]+/services/|features/[^/]+/repository\.js|repositories/|functions/|tests/|sw\.js|scripts/)' \
            > changed-ui.txt || true
          echo "files=$(cat changed-ui.txt | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          echo "── changed UI files ──"
          cat changed-ui.txt || echo "(none)"

      - name: Scan for newly-introduced forbidden writes (diff additions only)
        run: |
          set +e
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          FILES=$(cat changed-ui.txt 2>/dev/null)
          if [ -z "$FILES" ]; then
            echo "✅ no UI files changed — skipping"
            exit 0
          fi
          # FIX (post-failure run #1): scan ONLY added lines in the diff —
          # not the whole file. Legacy UI files contain pre-existing forbidden
          # patterns from before the guard was introduced; the guard's job is
          # to block NEW additions, not to fail every PR that touches a legacy
          # file with one filter-line change.
          #
          # P1.0 (post-merge audit, 2026-05-22): added Firebase Compat SDK
          # patterns. clients.html (4851 lines) uses pure compat — previously
          # 100% invisible to this guard. The compat SDK is a governance
          # bypass layer, not just legacy syntax. We close that hole here.
          #
          # Patterns detected (in ADDED diff lines only):
          # ── Modular SDK ──────────────────────────────────────────
          #   updateDoc(, setDoc(, writeBatch(, addDoc(, deleteDoc(,
          #   runTransaction(, dispatchFinancialEvent(, addLedgerToBatch(
          # ── Compat SDK (new in P1.0) ─────────────────────────────
          #   .collection('x').add(
          #   .collection('x').doc('y').set/update/delete(   (chained)
          #   .doc('y').set/update/delete(                    (direct)
          #   batch.set/update/delete(                        (compat OR modular batch)
          # ── Reads NOT flagged ────────────────────────────────────
          #   .collection().get/where/orderBy/onSnapshot — these are reads
          #   .doc().get() — read
          #   batch.commit() — terminator, not a mutation
          # ── Excluded ─────────────────────────────────────────────
          #   Comments (// or *) on the same line
          #   Files in allowlist (action layer, FSE, orders.js, core/, etc.)
          PATTERNS='\b(updateDoc|setDoc|writeBatch|addDoc|deleteDoc|runTransaction|dispatchFinancialEvent|addLedgerToBatch)\s*\(|\.collection\([^)]+\)\.add\s*\(|\.doc\([^)]*\)\.(set|update|delete)\s*\(|\bbatch\.(set|update|delete)\s*\('
          VIOLATIONS=0
          for f in $FILES; do
            [ -f "$f" ] || continue
            # Extract only ADDED lines (starting with '+', not '+++') from the diff
            added=$(git diff "$BASE_SHA" HEAD -- "$f" \
              | grep -E '^\+' \
              | grep -vE '^\+\+\+' \
              | sed 's/^+//')
            [ -z "$added" ] && continue
            # Match forbidden patterns in added lines, excluding comments
            hits=$(echo "$added" \
              | grep -nE "$PATTERNS" \
              | grep -vE '^\s*[0-9]+:\s*(//|\*)')
            if [ -n "$hits" ]; then
              VIOLATIONS=$((VIOLATIONS+1))
              echo ""
              echo "❌ $f — newly-introduced forbidden writes:"
              echo "$hits" | sed 's/^/    /'
            fi
          done
          if [ $VIOLATIONS -gt 0 ]; then
            echo ""
            echo "──────────────────────────────────────────────────────"
            echo "🚫 Architecture Guard — $VIOLATIONS file(s) with forbidden writes"
            echo "──────────────────────────────────────────────────────"
            echo "All Firestore mutations from UI must go through:"
            echo "  - shippingActions.*  (shipping-actions.js)"
            echo "  - orderActions.*     (order-actions.js)"
            echo "  - clientActions.*    (planned — clientActions.js, P1.1)"
            echo "  - financial-sync-engine.js  (FSE handlers)"
            echo "  - core/idempotency.js  (op-wrapped flows)"
            echo ""
            echo "Both Modular SDK and Compat SDK patterns are now detected."
            echo "If this is a legitimate self-heal or system write,"
            echo "move it to a helper in orders.js or core/."
            exit 1
          fi
          echo "✅ no forbidden writes in changed UI files"

  god-page-warning:
    name: 📏 God page line-count warning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check line counts of changed files
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          BUDGET=1500
          OFFENDERS=""
          for f in $(git diff --name-only "$BASE_SHA" HEAD -- '*.html' '*.js'); do
            [ -f "$f" ] || continue
            lines=$(wc -l < "$f")
            if [ "$lines" -gt "$BUDGET" ]; then
              OFFENDERS="$OFFENDERS\n  - $f ($lines lines)"
            fi
          done
          if [ -n "$OFFENDERS" ]; then
            echo "⚠️  God-page warning — files above $BUDGET-line budget (RULE G5):"
            echo -e "$OFFENDERS"
            echo ""
            echo "These files should be decomposed before adding new features."
            echo "This is a WARNING, not a failure (legacy god-pages are tracked separately)."
          else
            echo "✅ all changed files within $BUDGET-line budget"
          fi

  order-centric:
    name: 🧭 Order = SSoT — no business logic from messages
    # يقفل نتيجة docs/ARCHITECTURE_CENTRALITY_AUDIT.md: الأوردر هو المصدر الوحيد
    # للحقيقة، والمحادثات طبقة تواصل بلا منطق أعمال. يفحص الأسطر المُضافة فقط.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan added lines for message-as-truth violations
        run: |
          set +e
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          VIOLATIONS=0
          added() { git diff "$BASE_SHA" HEAD -- "$1" | grep -E '^\+' | grep -vE '^\+\+\+' | sed 's/^+//'; }

          # ── (1) لا Cloud Function trigger على conversations/messages ──────────
          # المحادثات يجب ألا تُشغّل منطق أعمال على الأوردر/المالية.
          for f in $(git diff --name-only "$BASE_SHA" HEAD -- 'functions/*.js'); do
            [ -f "$f" ] || continue
            hits=$(added "$f" \
              | grep -nE "(onDocument[A-Za-z]*|\.document)\s*\(\s*['\"]conversations" \
              | grep -vE '^\s*[0-9]+:\s*(//|\*)')
            if [ -n "$hits" ]; then
              VIOLATIONS=$((VIOLATIONS+1))
              echo ""
              echo "❌ $f — new Cloud Function trigger on conversations/messages:"
              echo "$hits" | sed 's/^/    /'
            fi
          done

          # ── (2) لا قراءة لحقول مالية/مشتقّة من orderRef/order_share snapshot ──
          # snapshot الرسالة للعرض فقط؛ الحقيقة المالية من order + order-math.
          FINFIELDS='orderRef\.(salePrice|remaining|totalPaid|paymentStatus|discount|deposit|paid|grossTotal|dueByCo|net)'
          for f in $(git diff --name-only "$BASE_SHA" HEAD -- '*.js' '*.html'); do
            [ -f "$f" ] || continue
            hits=$(added "$f" \
              | grep -nE "$FINFIELDS" \
              | grep -vE '^\s*[0-9]+:\s*(//|\*)')
            if [ -n "$hits" ]; then
              VIOLATIONS=$((VIOLATIONS+1))
              echo ""
              echo "❌ $f — reads financial truth from a message snapshot (orderRef.*):"
              echo "$hits" | sed 's/^/    /'
            fi
          done

          # ── (3) لا كتابة للأوردر/المالية داخل ملفات المراسلة ─────────────────
          # ملفات الرسائل تكتب conversations/messages فقط — لا orders/مالية.
          MSG_FILES='^(inbox-actions\.js|features/inbox/|features/customer-portal/services/chat\.service\.js)'
          # ملفات الرسائل تكتب conversations/messages فقط. أي ذكر لمحرك/مجموعات
          # مالية فيها = منطق أعمال في غير محلّه (يُراجَع يدوياً إن كان مشروعاً).
          BIZWRITE='dispatchFinancialEvent\s*\(|addLedgerToBatch\s*\(|transactions_v2|financial_ledger|\bwallets\b'
          for f in $(git diff --name-only "$BASE_SHA" HEAD -- '*.js' | grep -E "$MSG_FILES"); do
            [ -f "$f" ] || continue
            hits=$(added "$f" \
              | grep -nE "$BIZWRITE" \
              | grep -vE '^\s*[0-9]+:\s*(//|\*)')
            if [ -n "$hits" ]; then
              VIOLATIONS=$((VIOLATIONS+1))
              echo ""
              echo "❌ $f — messaging file writes to order/financial collections:"
              echo "$hits" | sed 's/^/    /'
            fi
          done

          if [ $VIOLATIONS -gt 0 ]; then
            echo ""
            echo "──────────────────────────────────────────────────────"
            echo "🚫 Order-Centric Guard — $VIOLATIONS violation(s)"
            echo "──────────────────────────────────────────────────────"
            echo "Order (orders/{id}) + FSE collections are the SINGLE source of truth."
            echo "Conversations are communication only — no business logic."
            echo "  • financial/derived truth → order + core/order-math.js (never orderRef.*)"
            echo "  • order/payment state → orderActions.* / FSE (never messaging files)"
            echo "  • no Cloud Function triggers on conversations/messages"
            echo "See docs/ARCHITECTURE_CENTRALITY_AUDIT.md."
            exit 1
          fi
          echo "✅ no message-as-truth violations in added lines"
