name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firestore Rules via REST API
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          pip install google-auth requests -q
          python3 << 'PYEOF'
          import os, json, requests
          from google.oauth2 import service_account
          from google.auth.transport.requests import Request

          PROJECT = "business2card-c041b"
          sa = json.loads(os.environ["FIREBASE_SA"])
          creds = service_account.Credentials.from_service_account_info(
              sa, scopes=["https://www.googleapis.com/auth/cloud-platform"]
          )
          creds.refresh(Request())
          token = creds.token

          with open("firestore.rules") as f:
              rules = f.read()

          hdrs = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          base = f"https://firebaserules.googleapis.com/v1/projects/{PROJECT}"

          # Create ruleset
          r = requests.post(f"{base}/rulesets",
              headers=hdrs,
              json={"source": {"files": [{"name": "firestore.rules", "content": rules}]}}
          )
          r.raise_for_status()
          ruleset_name = r.json()["name"]
          print("Ruleset created:", ruleset_name)

          # Update or create the Firestore release
          release_name = f"projects/{PROJECT}/releases/cloud.firestore"
          r2 = requests.get(f"{base}/releases/cloud.firestore", headers=hdrs)
          if r2.status_code == 200:
              r3 = requests.patch(f"{base}/releases/cloud.firestore",
                  headers=hdrs,
                  json={"release": {"name": release_name, "rulesetName": ruleset_name}}
              )
          else:
              r3 = requests.post(f"{base}/releases",
                  headers=hdrs,
                  json={"name": release_name, "rulesetName": ruleset_name}
              )
          r3.raise_for_status()
          print("Rules deployed successfully!")
          PYEOF

      - name: Bump Service Worker cache version
        # يستبدل CACHE في sw.js بالـ commit SHA — يضمن إيصال التحديثات
        # للمستخدمين فوراً بدون الحاجة لـ bump يدوي في كل PR.
        run: |
          SHA_SHORT="${GITHUB_SHA::8}"
          sed -i "s/const CACHE = '[^']*';/const CACHE = 'b2c-${SHA_SHORT}';/" sw.js
          echo "==> sw.js cache bumped to b2c-${SHA_SHORT}"
          head -2 sw.js

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: business2card-c041b

      # ─────────── WhatsApp Cloud Functions ───────────
      # ينشر functions/ تلقائياً. يحتاج Firebase Blaze plan مفعّل.
      # لو الباقة لسه مش متفعّلة، الخطوة هتفشل بدون ما توقف باقي الـ deploy.
      - name: Setup Node for functions
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install functions dependencies
        working-directory: functions
        run: npm install --no-audit --no-fund
        continue-on-error: true

      - name: Deploy Cloud Functions
        # continue-on-error معناه فشل الـ deploy ما يوقفش hosting/rules. لكنه
        # كان بيخفي أي خطأ. سيبناه لكن نخلي output الـ step واضح في الـ logs.
        continue-on-error: true
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SA" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          npm install -g firebase-tools
          echo "==> Firebase deploy --only functions starting"
          firebase deploy --only functions --project business2card-c041b --non-interactive --debug 2>&1 | tee /tmp/firebase-deploy.log || {
            echo "==================================================="
            echo "FUNCTIONS DEPLOY FAILED — check log above"
            echo "Common causes:"
            echo "  1) Blaze plan not enabled on the project"
            echo "  2) Cloud Functions API not enabled"
            echo "  3) Cloud Build API not enabled"
            echo "==================================================="
            exit 1
          }
          echo "==> Firebase deploy --only functions succeeded"
          rm -f /tmp/sa.json
