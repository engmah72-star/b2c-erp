<style>
/* ── Accessibility ────────────────────────────────────────── */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* ── KPIs ─────────────────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-3);margin-bottom:var(--space-4)}
@media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:400px){.kpi-grid{grid-template-columns:1fr}}
.kpi-box{background:var(--card);border:1px solid var(--divider);border-radius:var(--r-2);padding:var(--space-4);transition:border-color .2s,box-shadow .2s}
.kpi-box:hover{border-color:rgba(74,142,245,.3);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.kpi-val{font-size:var(--fs-2xl);font-weight:var(--fw-black);color:var(--heading);line-height:1;font-feature-settings:"tnum";transition:color .3s}
.kpi-lbl{font-size:var(--fs-xs);color:var(--dim2);margin-top:var(--space-1)}
.kpi-trend{display:inline-flex;align-items:center;gap:2px;font-size:var(--fs-xs);font-weight:var(--fw-bold);margin-top:var(--space-1);padding:1px 6px;border-radius:var(--r-1);border:1px solid}
.kpi-trend.up{color:var(--g,#22c55e);background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.25)}
.kpi-trend.down{color:var(--r,#ef4444);background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25)}

/* ── Filter bar ───────────────────────────────────────────── */
.filter-row{display:flex;gap:var(--space-2);flex-wrap:wrap;margin-bottom:var(--space-3);align-items:center}
.filter-row .search-wrap{flex:2;min-width:200px;position:relative}
.filter-row .search-wrap .search-spinner{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;border:2px solid var(--divider);border-top-color:var(--b,#4a8ef5);border-radius:50%;animation:spin .7s linear infinite;display:none}
.filter-row .search-wrap.is-searching .search-spinner{display:block}
@keyframes spin{to{transform:translateY(-50%) rotate(360deg)}}
.filter-count{font-size:var(--fs-xs);color:var(--dim2);font-weight:var(--fw-bold);white-space:nowrap;padding:var(--space-1) var(--space-2);background:var(--bg2);border:1px solid var(--divider);border-radius:var(--r-1)}
@media(max-width:640px){
  .filter-row{flex-direction:column}
  .filter-row .search-wrap{width:100%;min-width:0}
  .filter-row .sel{width:100%}
}

/* ── Table ────────────────────────────────────────────────── */
.lib-table-wrap{overflow-x:auto;border-radius:var(--r-2);border:1px solid var(--divider);background:var(--card)}
.lib-table{width:100%;border-collapse:collapse}
.lib-table th,.lib-table td{padding:10px 12px;border-bottom:1px solid var(--divider);text-align:start}
.lib-table thead{position:sticky;top:0;z-index:2}
.lib-table th{font-size:var(--fs-xs);color:var(--dim2);background:var(--bg2);font-weight:var(--fw-bold);white-space:nowrap;user-select:none}
.lib-table th.sortable{cursor:pointer;transition:color .15s}
.lib-table th.sortable:hover{color:var(--heading)}
.lib-table th .sort-ico{display:inline-block;margin-inline-start:4px;font-size:10px;opacity:.4;transition:opacity .15s}
.lib-table th.sorted .sort-ico{opacity:1;color:var(--b,#4a8ef5)}
.lib-table tbody tr{transition:background .15s}
.lib-table tbody tr:hover{background:var(--hover)}
.lib-table tbody tr:focus-within{outline:2px solid var(--b,#4a8ef5);outline-offset:-2px}
.lib-row-name{font-weight:var(--fw-medium);color:var(--heading)}
.lib-row-sub{font-size:var(--fs-xs);color:var(--dim2);margin-top:2px}
.lib-badge-type{display:inline-block;padding:2px 8px;border-radius:99px;font-size:var(--fs-xs);background:var(--info-bg,rgba(74,142,245,.12));color:var(--b);border:1px solid rgba(74,142,245,.3)}
.lib-sup-name{color:var(--dim1);font-size:var(--fs-sm)}
.lib-price-main{font-weight:var(--fw-bold);color:var(--heading);direction:ltr;font-feature-settings:"tnum"}
.lib-price-pinned{font-weight:var(--fw-bold);color:var(--success-text,#16a34a);direction:ltr;font-feature-settings:"tnum";background:var(--success-bg,rgba(22,163,74,.08));padding:2px 6px;border-radius:4px;font-size:var(--fs-sm)}
.lib-price-range{font-size:var(--fs-xs);color:var(--dim2);direction:ltr;font-feature-settings:"tnum"}
.lib-usage{font-size:var(--fs-sm);color:var(--dim1);text-align:center}
.lib-actions{display:flex;gap:4px;justify-content:flex-end}
.lib-btn{padding:4px 10px;border:1px solid var(--divider);border-radius:6px;background:var(--card);color:var(--dim1);font-size:var(--fs-xs);cursor:pointer;font-family:inherit;transition:all .15s}
.lib-btn:hover{background:var(--hover);color:var(--heading)}
.lib-btn:focus-visible{outline:2px solid var(--b,#4a8ef5);outline-offset:2px}
.lib-btn-del{color:var(--danger-text,#ef4444)}
.lib-btn-del:hover{border-color:var(--danger-text,#ef4444);background:rgba(239,68,68,.08)}

/* ── Skeleton rows ────────────────────────────────────────── */
.skel-row td{padding:12px}
.skel-block{height:14px;border-radius:var(--r-1);background:linear-gradient(90deg,var(--bg2) 0%,var(--hover) 50%,var(--bg2) 100%);background-size:200% 100%;animation:skel-pulse 1.4s ease-in-out infinite}
.skel-block.w-60{width:60%}
.skel-block.w-40{width:40%}
.skel-block.w-30{width:30%}
.skel-block.w-20{width:20%}
@keyframes skel-pulse{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media(prefers-reduced-motion:reduce){.skel-block{animation:none}}

/* ── Empty / Error states ─────────────────────────────────── */
.lib-state{text-align:center;padding:var(--space-8);color:var(--dim2)}
.lib-state-ico{font-size:3rem;margin-bottom:var(--space-3);opacity:.7}
.lib-state-title{font-size:var(--fs-lg);font-weight:var(--fw-bold);color:var(--heading);margin-bottom:var(--space-1)}
.lib-state-sub{font-size:var(--fs-sm);color:var(--dim2);max-width:360px;margin:0 auto;line-height:1.6}
.lib-state-action{margin-top:var(--space-3)}

/* ── History drawer ───────────────────────────────────────── */
.hist-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s ease;backdrop-filter:blur(2px)}
.hist-backdrop.is-open{opacity:1;pointer-events:auto}
.hist-panel{position:fixed;inset-block:0;inset-inline-end:0;width:min(520px,100vw);overflow-y:auto;background:var(--card);border-inline-start:1px solid var(--divider);padding:var(--space-5);box-shadow:-16px 0 40px rgba(0,0,0,.15);transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.7,.3,1);z-index:201}
[dir="ltr"] .hist-panel{transform:translateX(-100%)}
.hist-backdrop.is-open .hist-panel{transform:translateX(0)}
.hist-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4)}
.hist-close{font-size:1.1rem;background:none;border:none;color:var(--dim2);cursor:pointer;padding:4px 8px;border-radius:6px;font-family:inherit;transition:all .15s}
.hist-close:hover{background:var(--hover);color:var(--heading)}
.hist-close:focus-visible{outline:2px solid var(--b,#4a8ef5);outline-offset:2px}
.hist-stat-row{display:flex;gap:var(--space-3);flex-wrap:wrap;margin:var(--space-3) 0}
.hist-stat{background:var(--bg2);border:1px solid var(--divider);border-radius:8px;padding:var(--space-3);flex:1;min-width:90px}
.hist-stat-v{font-size:var(--fs-lg);font-weight:var(--fw-bold);color:var(--heading);direction:ltr;font-feature-settings:"tnum"}
.hist-stat-k{font-size:var(--fs-xs);color:var(--dim2);margin-top:2px}
.hist-table{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
.hist-table th,.hist-table td{padding:8px 6px;border-bottom:1px solid var(--divider);text-align:start}
.hist-table th{font-size:var(--fs-xs);color:var(--dim2);font-weight:var(--fw-bold)}
.hist-table td{font-feature-settings:"tnum"}

/* ── Supplier comparison ──────────────────────────────────── */
.sup-cmp-section{margin-top:var(--space-4)}
.sup-cmp-title{font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--dim1);margin-bottom:8px}
.sup-cmp-row{display:flex;align-items:center;gap:var(--space-2);padding:8px 10px;border:1px solid var(--divider);border-radius:8px;margin-bottom:6px;transition:border-color .15s}
.sup-cmp-row:hover{border-color:rgba(74,142,245,.3)}
.sup-cmp-rank{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:var(--fs-xs);font-weight:var(--fw-bold);flex-shrink:0}
.sup-cmp-rank.gold{background:rgba(234,179,8,.18);color:#ca8a04}
.sup-cmp-rank.silver{background:rgba(107,114,128,.18);color:#6b7280}
.sup-cmp-rank.bronze{background:rgba(180,120,60,.18);color:#b47c3c}
.sup-cmp-name{flex:1;font-size:var(--fs-sm);color:var(--heading)}
.sup-cmp-price{font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--g,#22c55e);direction:ltr;font-feature-settings:"tnum"}
.sup-cmp-count{font-size:var(--fs-xs);color:var(--dim2)}

/* ── Mobile: card layout ──────────────────────────────────── */
@media(max-width:768px){
  .lib-table thead{display:none}
  .lib-table tbody tr{display:grid;grid-template-columns:1fr auto;gap:var(--space-1);padding:var(--space-3);border-bottom:1px solid var(--divider)}
  .lib-table tbody tr:hover{background:var(--hover)}
  .lib-table td{padding:2px 0;border:none}
  .lib-table td:nth-child(1){grid-column:1/-1;font-size:var(--fs-md)}
  .lib-table td:nth-child(2){grid-column:1/-1}
  .lib-table td:nth-child(3){grid-row:3;grid-column:1}
  .lib-table td:nth-child(4){grid-row:3;grid-column:2;text-align:end}
  .lib-table td:nth-child(5){grid-row:4;grid-column:1}
  .lib-table td:nth-child(6){grid-row:4;grid-column:2;text-align:end}
  .lib-table td:nth-child(7){display:none}
  .lib-table td:nth-child(8){grid-column:1/-1;margin-top:var(--space-1)}
  .lib-table td:nth-child(8) .lib-actions{justify-content:flex-start}
}

/* ── Pagination ───────────────────────────────────────────── */
.pagination{display:flex;align-items:center;justify-content:center;gap:var(--space-2);padding:var(--space-3) 0}
.pagination-info{font-size:var(--fs-xs);color:var(--dim2)}
.page-btn{padding:4px 10px;border:1px solid var(--divider);border-radius:6px;background:var(--card);color:var(--dim1);font-size:var(--fs-xs);cursor:pointer;font-family:inherit;transition:all .15s}
.page-btn:hover:not(:disabled){background:var(--hover);color:var(--heading)}
.page-btn:disabled{opacity:.4;cursor:default}
.page-btn.active{background:var(--b,#4a8ef5);color:#fff;border-color:var(--b,#4a8ef5)}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">ERP</div></div></div>
  <div class="nav-scroll" id="nav-scroll-dynamic"><div style="padding:var(--space-xl);text-align:center;color:var(--dim2)">⏳</div></div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">A</div><div><div class="nav-user-name" id="nav-name">User</div><div class="nav-user-role">تسجيل خروج</div></div></div></div>
</aside>
<app-sidebar active current="cost-items-library.html"></app-sidebar>
<div class="nav-ov" id="nav-ov" onclick="closeNav()"></div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button type="button" class="mob-menu-btn" onclick="toggleNav()" aria-label="القائمة الجانبية">☰</button>
      <div>
        <h1>📚 مكتبة بنود التكلفة</h1>
        <p id="sub" class="txt-meta-base" role="status" aria-live="polite">جارٍ التحميل...</p>
      </div>
    </div>
    <div class="topbar-right">
      <button type="button" class="btn btn-ghost" onclick="loadItems()" aria-label="تحديث البيانات">↺ تحديث</button>
    </div>
  </div>
  <div class="content">

    <!-- KPIs -->
    <div class="kpi-grid" id="kpis" role="region" aria-label="مؤشرات الأداء">
      <div class="kpi-box">
        <div class="kpi-val" id="k-total">—</div>
        <div class="kpi-lbl">إجمالي البنود</div>
      </div>
      <div class="kpi-box">
        <div class="kpi-val" id="k-types">—</div>
        <div class="kpi-lbl">أنواع مختلفة</div>
      </div>
      <div class="kpi-box">
        <div class="kpi-val" id="k-suppliers">—</div>
        <div class="kpi-lbl">موردين مختلفين</div>
      </div>
      <div class="kpi-box">
        <div class="kpi-val text-g" id="k-top">—</div>
        <div class="kpi-lbl">الأكثر استخداماً</div>
        <div class="kpi-trend" id="k-top-usage" hidden></div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-row" role="search" aria-label="تصفية البنود">
      <div class="search-wrap" style="flex:2;min-width:200px">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input class="search-inp" id="search-inp" type="search"
               placeholder="ابحث بالنوع أو اسم المنتج أو المورد..."
               aria-label="بحث في بنود التكلفة"
               autocomplete="off">
        <span class="search-spinner" aria-hidden="true"></span>
      </div>
      <select id="type-filter" class="sel sel-sm" aria-label="تصفية حسب النوع" style="min-width:140px">
        <option value="">كل الأنواع</option>
      </select>
      <select id="sup-filter" class="sel sel-sm" aria-label="تصفية حسب المورد" style="min-width:140px">
        <option value="">كل الموردين</option>
      </select>
      <select id="sort-by" class="sel sel-sm" aria-label="ترتيب حسب" style="min-width:130px">
        <option value="usage">الأكثر استخداماً</option>
        <option value="cheap">الأرخص سعراً</option>
        <option value="recent">الأحدث</option>
        <option value="name">الاسم</option>
      </select>
      <span class="filter-count" id="filter-count" aria-live="polite" hidden></span>
    </div>

    <!-- Table -->
    <div class="lib-table-wrap" role="region" aria-label="جدول بنود التكلفة" tabindex="0">
      <table class="lib-table" id="lib-table" aria-describedby="sub">
        <thead>
          <tr>
            <th class="sortable" data-sort="name" aria-sort="none">النوع / المنتج <span class="sort-ico" aria-hidden="true">↕</span></th>
            <th>المورد</th>
            <th class="sortable" data-sort="cheap" aria-sort="none">متوسط السعر <span class="sort-ico" aria-hidden="true">↕</span></th>
            <th>نطاق السعر</th>
            <th>آخر مبلغ</th>
            <th class="sortable" data-sort="usage" aria-sort="descending" style="text-align:center">الاستخدام <span class="sort-ico" aria-hidden="true">↓</span></th>
            <th class="sortable" data-sort="recent" aria-sort="none">آخر تحديث <span class="sort-ico" aria-hidden="true">↕</span></th>
            <th><span class="sr-only">إجراءات</span></th>
          </tr>
        </thead>
        <tbody id="lib-body" aria-busy="true">
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination" hidden aria-label="التنقل بين الصفحات"></div>

  </div>
</div>
</div>

<!-- History / Detail Drawer -->
<div class="hist-backdrop" id="hist-backdrop" role="presentation">
  <div class="hist-panel" id="hist-panel" role="dialog" aria-modal="true" aria-label="تفاصيل البند">
    <div class="hist-head">
      <h3 id="hist-title">تفاصيل البند</h3>
      <button type="button" class="hist-close" id="hist-close-btn" aria-label="إغلاق">✕</button>
    </div>
    <div id="hist-body">
      <div style="color:var(--dim2)">⏳ جارٍ التحميل...</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toasts" id="toasts" role="status" aria-live="assertive"></div>

<script type="module">
import { db, auth, onAuthStateChanged } from './core/firebase-init.js';
import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';
import { hasPage, canDo } from './core/permissions-matrix.js';
import {
  getCostLibraryItems,
  deleteCostLibraryItem,
  getSupplierComparisons,
  pinLibraryPrice,
  unpinLibraryPrice,
} from './core/cost-library-actions.js';
import { normalizeCostType } from './core/cost-type-normalize.js';

// ── State ────────────────────────────────────────────────────
let _items = [];
let _filteredItems = [];
let _currentRole = '';
let _userPerms = null;
const PAGE_SIZE = 50;
let _currentPage = 1;

// ── Utils ────────────────────────────────────────────────────
function getCostIco(t) {
  const l = (t || '').toLowerCase();
  if (['طباع', 'فلكس', 'حريرية', 'uv', 'ريزو', 'أوفست', 'ديجيتال', 'لارج'].some(k => l.includes(k))) return '🖨️';
  if (['ورق', 'كرتون'].some(k => l.includes(k))) return '📄';
  if (['زنكات', 'ألواح'].some(k => l.includes(k))) return '🔵';
  if (['سلفنة', 'تشطيب', 'تذهيب', 'نقر', 'كريز', 'تجليد'].some(k => l.includes(k))) return '✨';
  if (l.includes('قص')) return '✂️';
  if (l.includes('تجميع')) return '📦';
  if (['تصميم', 'تصوير', 'موشن'].some(k => l.includes(k))) return '✏️';
  if (l.includes('شحن')) return '🚚';
  return '📌';
}
function nf(n) { return (parseFloat(n) || 0).toLocaleString('ar-EG', { maximumFractionDigits: 3 }); }
function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

function debounce(fn, ms) {
  let t;
  return function(...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), ms); };
}

function showToast(msg, t = '') {
  const c = document.getElementById('toasts');
  if (!c) return;
  const el = document.createElement('div');
  el.className = 'toast ' + t;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function formatDate(ts) {
  if (!ts?.seconds) return '—';
  return new Date(ts.seconds * 1000).toLocaleDateString('ar-EG', {
    year: 'numeric', month: 'short', day: 'numeric',
  });
}

// ── Skeleton rendering ───────────────────────────────────────
function _renderSkeleton() {
  const tbody = document.getElementById('lib-body');
  tbody.setAttribute('aria-busy', 'true');
  const rows = Array.from({ length: 8 }, () => `
    <tr class="skel-row">
      <td><div class="skel-block w-60" style="height:16px;margin-bottom:6px"></div><div class="skel-block w-40" style="height:12px"></div></td>
      <td><div class="skel-block w-40" style="height:14px"></div></td>
      <td><div class="skel-block w-30" style="height:14px"></div></td>
      <td><div class="skel-block w-40" style="height:14px"></div></td>
      <td><div class="skel-block w-30" style="height:14px"></div></td>
      <td><div class="skel-block w-20" style="height:14px;margin:0 auto"></div></td>
      <td><div class="skel-block w-40" style="height:14px"></div></td>
      <td><div class="skel-block w-20" style="height:14px;margin-inline-start:auto"></div></td>
    </tr>
  `).join('');
  tbody.innerHTML = rows;
}

// ── URL Params sync ──────────────────────────────────────────
function _readUrlParams() {
  const params = new URLSearchParams(location.search);
  const q = params.get('q');
  const type = params.get('type');
  const sup = params.get('sup');
  const sort = params.get('sort');
  if (q) document.getElementById('search-inp').value = q;
  if (type) document.getElementById('type-filter').value = type;
  if (sup) document.getElementById('sup-filter').value = sup;
  if (sort) document.getElementById('sort-by').value = sort;
}

function _syncUrlParams() {
  const text = document.getElementById('search-inp').value.trim();
  const type = document.getElementById('type-filter').value;
  const sup = document.getElementById('sup-filter').value;
  const sort = document.getElementById('sort-by').value;
  const params = new URLSearchParams();
  if (text) params.set('q', text);
  if (type) params.set('type', type);
  if (sup) params.set('sup', sup);
  if (sort && sort !== 'usage') params.set('sort', sort);
  const qs = params.toString();
  const url = qs ? `${location.pathname}?${qs}` : location.pathname;
  history.replaceState(null, '', url);
}

// ── Auth guard ───────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) { location.href = 'login.html'; return; }

  const snap = await getDoc(doc(db, 'users', user.uid));
  const d = snap.exists() ? snap.data() : {};
  _currentRole = d.role || '';
  _userPerms = d.permissions || null;

  if (!hasPage('cost-items-library', _currentRole, _userPerms)) {
    location.href = 'login.html'; return;
  }

  document.getElementById('nav-name').textContent = d.name || user.email || '';
  document.getElementById('nav-av').textContent = (d.name || 'U')[0].toUpperCase();
  document.getElementById('role-badge').textContent = _currentRole;

  _readUrlParams();
  loadItems();
});

// ── Load ─────────────────────────────────────────────────────
window.loadItems = async function() {
  document.getElementById('sub').textContent = 'جارٍ التحميل...';
  _renderSkeleton();

  try {
    _items = await getCostLibraryItems({ db, limitN: 500 });
    _buildFilters();
    _readUrlParams();
    applyFilter();
    _updateKPIs();
    document.getElementById('sub').textContent = `${_items.filter(x => x.isActive !== false).length} بند في المكتبة`;
  } catch (e) {
    document.getElementById('sub').textContent = 'فشل التحميل';
    document.getElementById('lib-body').setAttribute('aria-busy', 'false');
    document.getElementById('lib-body').innerHTML = `
      <tr><td colspan="8">
        <div class="lib-state">
          <div class="lib-state-ico">⚠️</div>
          <div class="lib-state-title">فشل تحميل البيانات</div>
          <div class="lib-state-sub">${esc(e?.message || 'خطأ غير متوقع')}</div>
          <div class="lib-state-action">
            <button type="button" class="btn btn-ghost" onclick="loadItems()">↺ إعادة المحاولة</button>
          </div>
        </div>
      </td></tr>`;
    showToast('فشل تحميل المكتبة: ' + (e?.message || ''), 'err');
  }
};

// ── Build filter dropdowns ───────────────────────────────────
function _buildFilters() {
  const active = _items.filter(x => x.isActive !== false);
  const typeMap = {};
  active.forEach(x => { if (x.type) { const n = normalizeCostType(x.type); if (!typeMap[n]) typeMap[n] = x.type; } });
  const types = Object.values(typeMap).sort((a, b) => a.localeCompare(b, 'ar'));
  const sups = [...new Set(active.map(x => x.supplierName).filter(Boolean))].sort();

  const tf = document.getElementById('type-filter');
  const prevType = tf.value;
  tf.innerHTML = '<option value="">كل الأنواع (' + types.length + ')</option>'
    + types.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
  if (prevType) tf.value = prevType;

  const sf = document.getElementById('sup-filter');
  const prevSup = sf.value;
  sf.innerHTML = '<option value="">كل الموردين (' + sups.length + ')</option>'
    + sups.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('');
  if (prevSup) sf.value = prevSup;
}

// ── Apply filter & render ────────────────────────────────────
window.applyFilter = function() {
  const text = (document.getElementById('search-inp').value || '').toLowerCase().trim();
  const type = document.getElementById('type-filter').value;
  const sup = document.getElementById('sup-filter').value;
  const sort = document.getElementById('sort-by').value;

  _filteredItems = _items
    .filter(x => x.isActive !== false)
    .filter(x => {
      if (type && normalizeCostType(x.type) !== normalizeCostType(type)) return false;
      if (sup && x.supplierName !== sup) return false;
      if (text) {
        return (x.type || '').toLowerCase().includes(text)
          || (x.productName || '').toLowerCase().includes(text)
          || (x.supplierName || '').toLowerCase().includes(text);
      }
      return true;
    });

  if (sort === 'usage') _filteredItems.sort((a, b) => (b.usageCount || 0) - (a.usageCount || 0));
  else if (sort === 'cheap') _filteredItems.sort((a, b) => (a.avgUnitCost || 0) - (b.avgUnitCost || 0));
  else if (sort === 'recent') _filteredItems.sort((a, b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0));
  else if (sort === 'name') _filteredItems.sort((a, b) => (a.type || '').localeCompare(b.type || '', 'ar'));

  _updateSortHeaders(sort);
  _currentPage = 1;
  _renderTable();
  _renderPagination();
  _updateFilterCount();
  _syncUrlParams();
};

const _debouncedFilter = debounce(applyFilter, 250);

// ── Sort headers ─────────────────────────────────────────────
function _updateSortHeaders(activeSort) {
  const sortMap = { usage: 'descending', cheap: 'ascending', recent: 'descending', name: 'ascending' };
  const sortIcoMap = { usage: '↓', cheap: '↑', recent: '↓', name: '↑' };
  document.querySelectorAll('.lib-table th.sortable').forEach(th => {
    const key = th.dataset.sort;
    const isActive = key === activeSort;
    th.classList.toggle('sorted', isActive);
    th.setAttribute('aria-sort', isActive ? (sortMap[key] || 'none') : 'none');
    const ico = th.querySelector('.sort-ico');
    if (ico) ico.textContent = isActive ? (sortIcoMap[key] || '↕') : '↕';
  });
}

// ── Filter count badge ───────────────────────────────────────
function _updateFilterCount() {
  const el = document.getElementById('filter-count');
  const total = _items.filter(x => x.isActive !== false).length;
  const showing = _filteredItems.length;
  if (showing < total) {
    el.textContent = `${showing} من ${total}`;
    el.hidden = false;
  } else {
    el.hidden = true;
  }
}

// ── Render table ─────────────────────────────────────────────
function _renderTable() {
  const tbody = document.getElementById('lib-body');
  tbody.setAttribute('aria-busy', 'false');

  if (!_filteredItems.length) {
    const hasFilters = document.getElementById('search-inp').value.trim()
      || document.getElementById('type-filter').value
      || document.getElementById('sup-filter').value;
    tbody.innerHTML = `<tr><td colspan="8">
      <div class="lib-state">
        <div class="lib-state-ico">${hasFilters ? '🔍' : '📭'}</div>
        <div class="lib-state-title">${hasFilters ? 'لا توجد نتائج مطابقة' : 'لا توجد بنود في المكتبة'}</div>
        <div class="lib-state-sub">${hasFilters
          ? 'جرّب تغيير كلمات البحث أو إزالة بعض التصفيات'
          : 'ستظهر البنود هنا تلقائياً بعد تسجيل أول بند تكلفة في أي أوردر'}</div>
        ${hasFilters ? `<div class="lib-state-action">
          <button type="button" class="btn btn-ghost" onclick="clearFilters()">مسح التصفيات</button>
        </div>` : ''}
      </div>
    </td></tr>`;
    document.getElementById('pagination').hidden = true;
    return;
  }

  const isAdmin = canDo('system_settings', _currentRole, _userPerms);
  const start = (_currentPage - 1) * PAGE_SIZE;
  const pageItems = _filteredItems.slice(start, start + PAGE_SIZE);

  tbody.innerHTML = pageItems.map(item => {
    const minP = item.minUnitCost > 0 ? nf(item.minUnitCost) : '—';
    const maxP = item.maxUnitCost > 0 ? nf(item.maxUnitCost) : '—';
    const updDate = formatDate(item.updatedAt);
    const avgDisplay = item.avgUnitCost > 0 ? nf(item.avgUnitCost) + ' ج' : '—';
    const lastDisplay = item.lastTotal > 0 ? nf(item.lastTotal) + ' ج' : '—';
    const hasPinned = item.pinnedPrice > 0;
    const pinnedDisplay = hasPinned ? nf(item.pinnedPrice) + ' ج' : '';
    return `<tr tabindex="0" data-id="${esc(item._id)}">
      <td>
        <div class="lib-row-name">${getCostIco(item.type)} ${esc(item.type || '—')}</div>
        ${item.productName ? `<div class="lib-row-sub">📦 ${esc(item.productName)}</div>` : ''}
      </td>
      <td><span class="lib-sup-name">${esc(item.supplierName || '—')}</span></td>
      <td>
        ${hasPinned
          ? `<span class="lib-price-pinned" title="سعر مُثبّت بواسطة ${esc(item.pinnedBy || '')}">📌 ${pinnedDisplay}</span>`
          : `<span class="lib-price-main">${avgDisplay}</span>`}
      </td>
      <td><span class="lib-price-range">${minP} – ${maxP} ج</span></td>
      <td><span class="lib-price-main">${lastDisplay}</span></td>
      <td class="lib-usage">${item.usageCount || 0} مرة</td>
      <td style="font-size:var(--fs-xs);color:var(--dim2)">${updDate}</td>
      <td>
        <div class="lib-actions">
          <button class="lib-btn" type="button" data-action="open-hist" data-id="${esc(item._id)}" aria-label="عرض سجل ${esc(item.type || 'البند')}">📊 السجل</button>
          ${isAdmin ? `<button class="lib-btn" type="button" data-action="${hasPinned ? 'unpin' : 'pin'}" data-id="${esc(item._id)}" data-type="${esc(item.type)}" data-avg="${item.avgUnitCost || 0}" aria-label="${hasPinned ? 'إزالة التثبيت' : 'تثبيت سعر'}">${hasPinned ? '📌✕' : '📌'}</button>` : ''}
          ${isAdmin ? `<button class="lib-btn lib-btn-del" type="button" data-action="delete" data-id="${esc(item._id)}" data-type="${esc(item.type)}" aria-label="حذف ${esc(item.type || 'البند')}">✕</button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ── Pagination ───────────────────────────────────────────────
function _renderPagination() {
  const el = document.getElementById('pagination');
  const totalPages = Math.ceil(_filteredItems.length / PAGE_SIZE);
  if (totalPages <= 1) { el.hidden = true; return; }
  el.hidden = false;

  let html = `<button type="button" class="page-btn" data-page="${_currentPage - 1}" ${_currentPage <= 1 ? 'disabled' : ''} aria-label="الصفحة السابقة">→</button>`;
  html += `<span class="pagination-info">${_currentPage} / ${totalPages} (${_filteredItems.length} بند)</span>`;
  html += `<button type="button" class="page-btn" data-page="${_currentPage + 1}" ${_currentPage >= totalPages ? 'disabled' : ''} aria-label="الصفحة التالية">←</button>`;
  el.innerHTML = html;
}

// ── Clear filters ────────────────────────────────────────────
window.clearFilters = function() {
  document.getElementById('search-inp').value = '';
  document.getElementById('type-filter').value = '';
  document.getElementById('sup-filter').value = '';
  document.getElementById('sort-by').value = 'usage';
  applyFilter();
};

// ── KPIs ─────────────────────────────────────────────────────
function _updateKPIs() {
  const active = _items.filter(x => x.isActive !== false);
  const totalCount = active.length;
  const typesCount = new Set(active.map(x => normalizeCostType(x.type)).filter(Boolean)).size;
  const suppliersCount = new Set(active.map(x => x.supplierId).filter(Boolean)).size;

  _animateValue('k-total', totalCount);
  _animateValue('k-types', typesCount);
  _animateValue('k-suppliers', suppliersCount);

  const sorted = [...active].sort((a, b) => (b.usageCount || 0) - (a.usageCount || 0));
  const top = sorted[0];
  document.getElementById('k-top').textContent = top ? (top.type || '—') : '—';

  const usageEl = document.getElementById('k-top-usage');
  if (top && top.usageCount > 0) {
    usageEl.textContent = `${top.usageCount} مرة`;
    usageEl.className = 'kpi-trend up';
    usageEl.hidden = false;
  } else {
    usageEl.hidden = true;
  }
}

function _animateValue(id, target) {
  const el = document.getElementById(id);
  if (!el) return;
  const current = parseInt(el.textContent) || 0;
  if (current === target) { el.textContent = target; return; }

  const duration = 400;
  const start = performance.now();
  const step = (now) => {
    const progress = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(current + (target - current) * eased);
    if (progress < 1) requestAnimationFrame(step);
  };
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    el.textContent = target;
  } else {
    requestAnimationFrame(step);
  }
}

// ── History panel ────────────────────────────────────────────
function _openHist(id) {
  const item = _items.find(x => x._id === id);
  if (!item) return;
  const backdrop = document.getElementById('hist-backdrop');
  const panel = document.getElementById('hist-panel');

  document.getElementById('hist-title').textContent = `${getCostIco(item.type)} ${item.type || '—'}`;
  document.getElementById('hist-body').innerHTML = '<div style="color:var(--dim2);text-align:center;padding:var(--space-5)">⏳ جارٍ التحميل...</div>';

  backdrop.classList.add('is-open');
  _histOpen = true;

  // Focus management
  setTimeout(() => document.getElementById('hist-close-btn')?.focus(), 100);

  _renderHistContent(item);
}

let _histOpen = false;

async function _renderHistContent(item) {
  const history = (item.priceHistory || []).slice().reverse();
  const avgC = item.avgUnitCost > 0 ? nf(item.avgUnitCost) + ' ج' : '—';
  const minC = item.minUnitCost > 0 ? nf(item.minUnitCost) + ' ج' : '—';
  const maxC = item.maxUnitCost > 0 ? nf(item.maxUnitCost) + ' ج' : '—';

  let cmpHtml = '';
  try {
    const cmps = await getSupplierComparisons({ db, type: item.type, productName: item.productName });
    if (cmps.length > 1) {
      const rankClasses = ['gold', 'silver', 'bronze'];
      cmpHtml = `
        <div class="sup-cmp-section">
          <div class="sup-cmp-title">مقارنة الموردين — ${esc(item.type)}</div>
          ${cmps.slice(0, 5).map((c, i) => `
            <div class="sup-cmp-row">
              <div class="sup-cmp-rank ${rankClasses[i] || ''}">${i + 1}</div>
              <div class="sup-cmp-name">${esc(c.supplierName || '—')}</div>
              <div class="sup-cmp-price">${c.avgUnitCost > 0 ? nf(c.avgUnitCost) + ' ج/قطعة' : '—'}</div>
              <div class="sup-cmp-count">${c.usageCount || 0} مرة</div>
            </div>
          `).join('')}
        </div>`;
    }
  } catch (e) { /* non-critical */ }

  const historyHtml = history.length ? `
    <table class="hist-table">
      <thead><tr><th>التاريخ</th><th>الكمية</th><th>الإجمالي</th><th>تكلفة الوحدة</th></tr></thead>
      <tbody>
        ${history.map(h => `<tr>
          <td>${esc(h.date || '—')}</td>
          <td>${nf(h.qty || 0)}</td>
          <td>${nf(h.total || 0)} ج</td>
          <td style="direction:ltr">${h.unitCost > 0 ? nf(h.unitCost) + ' ج' : '—'}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : '<div style="color:var(--dim2);padding:var(--space-4);text-align:center;border:1px dashed var(--divider);border-radius:8px;margin-top:var(--space-2)">لا سجلات أسعار متاحة</div>';

  document.getElementById('hist-body').innerHTML = `
    <div class="hist-stat-row">
      <div class="hist-stat"><div class="hist-stat-v">${avgC}</div><div class="hist-stat-k">متوسط الوحدة</div></div>
      <div class="hist-stat"><div class="hist-stat-v">${minC}</div><div class="hist-stat-k">الأقل</div></div>
      <div class="hist-stat"><div class="hist-stat-v">${maxC}</div><div class="hist-stat-k">الأعلى</div></div>
      <div class="hist-stat"><div class="hist-stat-v">${item.usageCount || 0}</div><div class="hist-stat-k">مرات الاستخدام</div></div>
    </div>
    <div style="font-size:var(--fs-sm);color:var(--dim1);margin-bottom:8px;font-weight:var(--fw-bold)">
      🏭 ${esc(item.supplierName || '—')}
      ${item.productName ? ` · 📦 ${esc(item.productName)}` : ''}
    </div>
    ${historyHtml}
    ${cmpHtml}
  `;
}

function _closeHist() {
  if (!_histOpen) return;
  _histOpen = false;
  document.getElementById('hist-backdrop').classList.remove('is-open');
  const activeRow = document.querySelector('.lib-table tbody tr[data-id]:focus');
  if (!activeRow) {
    const lastOpened = document.querySelector('.lib-table tbody tr[data-id]');
    lastOpened?.focus();
  }
}

// ── Delete ───────────────────────────────────────────────────
async function _deleteItem(id, typeName) {
  if (!confirm(`حذف البند "${typeName}" من المكتبة؟\n(حذف ناعم — يمكن الاسترجاع)`)) return;
  const res = await deleteCostLibraryItem({ db, itemId: id });
  if (res.ok) {
    showToast('تم الحذف من المكتبة', 'ok');
    _items = _items.filter(x => x._id !== id);
    applyFilter();
    _updateKPIs();
  } else {
    showToast((res.errors?.[0] || 'فشل الحذف'), 'err');
  }
}

async function _pinPrice(id, typeName, avgStr) {
  const avg = parseFloat(avgStr) || 0;
  const defaultVal = avg > 0 ? avg.toFixed(2) : '';
  const input = prompt(`تثبيت سعر مرجعي لـ "${typeName}":\n(سعر الوحدة بالجنيه)`, defaultVal);
  if (input === null) return;
  const price = parseFloat(input);
  if (!(price > 0)) { showToast('أدخل سعر صحيح', 'err'); return; }
  const userName = auth.currentUser?.displayName || auth.currentUser?.email || '';
  const res = await pinLibraryPrice({ db, itemId: id, price, userName });
  if (res.ok) {
    showToast('تم تثبيت السعر المرجعي', 'ok');
    const item = _items.find(x => x._id === id);
    if (item) { item.pinnedPrice = price; item.pinnedBy = userName; }
    _renderTable();
  } else {
    showToast((res.errors?.[0] || 'فشل التثبيت'), 'err');
  }
}

async function _unpinPrice(id, typeName) {
  if (!confirm(`إزالة السعر المُثبّت لـ "${typeName}"؟`)) return;
  const res = await unpinLibraryPrice({ db, itemId: id });
  if (res.ok) {
    showToast('تم إزالة السعر المُثبّت', 'ok');
    const item = _items.find(x => x._id === id);
    if (item) { item.pinnedPrice = null; item.pinnedBy = null; }
    _renderTable();
  } else {
    showToast((res.errors?.[0] || 'فشل إزالة التثبيت'), 'err');
  }
}

// ── Event Delegation ─────────────────────────────────────────
// Table actions (delegated)
document.getElementById('lib-table').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  if (action === 'open-hist') _openHist(btn.dataset.id);
  else if (action === 'delete') _deleteItem(btn.dataset.id, btn.dataset.type);
  else if (action === 'pin') _pinPrice(btn.dataset.id, btn.dataset.type, btn.dataset.avg);
  else if (action === 'unpin') _unpinPrice(btn.dataset.id, btn.dataset.type);
});

// Table row keyboard navigation
document.getElementById('lib-table').addEventListener('keydown', e => {
  if (e.target.tagName !== 'TR') return;
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    const id = e.target.dataset.id;
    if (id) _openHist(id);
  }
});

// Sort headers
document.querySelectorAll('.lib-table th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    const sortKey = th.dataset.sort;
    if (sortKey) {
      document.getElementById('sort-by').value = sortKey;
      applyFilter();
    }
  });
});

// Filter inputs
document.getElementById('search-inp').addEventListener('input', () => {
  document.querySelector('.search-wrap').classList.add('is-searching');
  _debouncedFilter();
  setTimeout(() => document.querySelector('.search-wrap')?.classList.remove('is-searching'), 300);
});
document.getElementById('type-filter').addEventListener('change', applyFilter);
document.getElementById('sup-filter').addEventListener('change', applyFilter);
document.getElementById('sort-by').addEventListener('change', applyFilter);

// Pagination delegation
document.getElementById('pagination').addEventListener('click', e => {
  const btn = e.target.closest('[data-page]');
  if (!btn || btn.disabled) return;
  _currentPage = parseInt(btn.dataset.page, 10);
  _renderTable();
  _renderPagination();
  document.querySelector('.lib-table-wrap')?.scrollTo({ top: 0, behavior: 'smooth' });
});

// History panel
document.getElementById('hist-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('hist-backdrop')) _closeHist();
});
document.getElementById('hist-close-btn').addEventListener('click', _closeHist);

// Focus trap in history panel
document.getElementById('hist-panel').addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    const panel = document.getElementById('hist-panel');
    const focusable = panel.querySelectorAll('button, [tabindex]:not([tabindex="-1"]), a[href]');
    if (!focusable.length) return;
    const first = focusable[0];
    const last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault();
      last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault();
      first.focus();
    }
  }
});

// Global keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && _histOpen) { _closeHist(); return; }
  if (e.key === '/' && !_histOpen && document.activeElement?.tagName !== 'INPUT' && document.activeElement?.tagName !== 'SELECT') {
    e.preventDefault();
    document.getElementById('search-inp')?.focus();
  }
});

// ── Nav helpers ──────────────────────────────────────────────
window.doLogout = async function() {
  const { signOut } = await import('https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js');
  await signOut(auth);
  location.href = 'login.html';
};
window.toggleNav = () => {
  document.querySelector('.sidenav')?.classList.toggle('open');
  document.getElementById('nav-ov')?.classList.toggle('open');
};
window.closeNav = () => {
  document.querySelector('.sidenav')?.classList.remove('open');
  document.getElementById('nav-ov')?.classList.remove('open');
};
