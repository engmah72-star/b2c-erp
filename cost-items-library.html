<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="dns-prefetch" href="https://firestore.googleapis.com">

<style>
/* ── KPIs ───────────────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-3);margin-bottom:var(--space-4)}
@media(max-width:640px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-box{background:var(--card);border:1px solid var(--divider);border-radius:var(--r-2);padding:var(--space-4)}
.kpi-val{font-size:var(--fs-2xl);font-weight:var(--fw-black);color:var(--heading);line-height:1}
.kpi-lbl{font-size:var(--fs-xs);color:var(--dim2);margin-top:var(--space-1)}

/* ── Filter bar ─────────────────────────────────────────── */
.filter-row{display:flex;gap:var(--space-2);flex-wrap:wrap;margin-bottom:var(--space-3)}
.filter-row .search-wrap{flex:1;min-width:200px}

/* ── Table ──────────────────────────────────────────────── */
.lib-table{width:100%;border-collapse:collapse}
.lib-table th,.lib-table td{padding:10px 12px;border-bottom:1px solid var(--divider);text-align:start}
.lib-table th{font-size:var(--fs-xs);color:var(--dim2);background:var(--bg2);font-weight:var(--fw-bold);white-space:nowrap}
.lib-table tr:hover td{background:var(--hover)}
.lib-row-name{font-weight:var(--fw-medium);color:var(--heading)}
.lib-row-sub{font-size:var(--fs-xs);color:var(--dim2);margin-top:2px}
.lib-badge-type{display:inline-block;padding:2px 8px;border-radius:99px;font-size:var(--fs-xs);background:var(--info-bg,rgba(74,142,245,.12));color:var(--b);border:1px solid rgba(74,142,245,.3)}
.lib-sup-name{color:var(--dim1);font-size:var(--fs-sm)}
.lib-price-main{font-weight:var(--fw-bold);color:var(--heading);direction:ltr}
.lib-price-range{font-size:var(--fs-xs);color:var(--dim2);direction:ltr}
.lib-usage{font-size:var(--fs-sm);color:var(--dim1);text-align:center}
.lib-actions{display:flex;gap:4px;justify-content:flex-end}
.lib-btn{padding:4px 10px;border:1px solid var(--divider);border-radius:6px;background:var(--card);color:var(--dim1);font-size:var(--fs-xs);cursor:pointer}
.lib-btn:hover{background:var(--hover);color:var(--heading)}
.lib-btn-del{color:var(--danger-text,#ef4444)}
.lib-btn-del:hover{border-color:var(--danger-text,#ef4444);background:rgba(239,68,68,.08)}

/* ── History drawer ─────────────────────────────────────── */
.hist-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200}
.hist-backdrop.is-open{display:flex;align-items:flex-start;justify-content:flex-end}
.hist-panel{width:min(480px,100vw);height:100dvh;overflow-y:auto;background:var(--card);border-right:1px solid var(--divider);padding:var(--space-5)}
.hist-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4)}
.hist-close{font-size:1.1rem;background:none;border:none;color:var(--dim2);cursor:pointer;padding:4px 8px;border-radius:6px}
.hist-close:hover{background:var(--hover);color:var(--heading)}
.hist-table{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
.hist-table th,.hist-table td{padding:8px 6px;border-bottom:1px solid var(--divider);text-align:start}
.hist-table th{font-size:var(--fs-xs);color:var(--dim2);font-weight:var(--fw-bold)}
.hist-stat-row{display:flex;gap:var(--space-3);flex-wrap:wrap;margin:var(--space-3) 0}
.hist-stat{background:var(--bg2);border:1px solid var(--divider);border-radius:8px;padding:var(--space-3);flex:1;min-width:90px}
.hist-stat-v{font-size:var(--fs-lg);font-weight:var(--fw-bold);color:var(--heading);direction:ltr}
.hist-stat-k{font-size:var(--fs-xs);color:var(--dim2);margin-top:2px}

/* ── Supplier comparison ────────────────────────────────── */
.sup-cmp-section{margin-top:var(--space-4)}
.sup-cmp-row{display:flex;align-items:center;gap:var(--space-2);padding:8px 10px;border:1px solid var(--divider);border-radius:8px;margin-bottom:6px}
.sup-cmp-rank{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:var(--fs-xs);font-weight:var(--fw-bold)}
.sup-cmp-rank.gold{background:rgba(234,179,8,.18);color:#ca8a04}
.sup-cmp-rank.silver{background:rgba(107,114,128,.18);color:#6b7280}
.sup-cmp-rank.bronze{background:rgba(180,120,60,.18);color:#b47c3c}
.sup-cmp-name{flex:1;font-size:var(--fs-sm);color:var(--heading)}
.sup-cmp-price{font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--success-text,#22c55e);direction:ltr}
.sup-cmp-count{font-size:var(--fs-xs);color:var(--dim2)}

/* ── Empty state ────────────────────────────────────────── */
.lib-empty{text-align:center;padding:var(--space-8);color:var(--dim2)}
.lib-empty-ico{font-size:3rem;margin-bottom:var(--space-3)}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">ERP</div></div></div>
  <div class="nav-scroll" id="nav-scroll-dynamic"><div style="padding:var(--space-xl);text-align:center;color:var(--dim2)">⏳</div></div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">A</div><div><div class="nav-user-name" id="nav-name">User</div><div class="nav-user-role">تسجيل خروج</div></div></div></div>
</aside>
<app-sidebar active current="cost-items-library.html"></app-sidebar>
<div class="nav-ov" id="nav-ov" onclick="closeNav()"></div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button type="button" class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div><h1>📚 مكتبة بنود التكلفة</h1><p id="sub" class="txt-meta-base">جاري التحميل...</p></div>
    </div>
    <div class="topbar-right">
      <button type="button" class="btn btn-ghost" onclick="loadItems()">↺ تحديث</button>
    </div>
  </div>
  <div class="content">

    <!-- KPIs -->
    <div class="kpi-grid" id="kpis">
      <div class="kpi-box"><div class="kpi-val" id="k-total">—</div><div class="kpi-lbl">إجمالي البنود</div></div>
      <div class="kpi-box"><div class="kpi-val" id="k-types">—</div><div class="kpi-lbl">أنواع مختلفة</div></div>
      <div class="kpi-box"><div class="kpi-val" id="k-suppliers">—</div><div class="kpi-lbl">موردين مختلفين</div></div>
      <div class="kpi-box"><div class="kpi-val text-g" id="k-top">—</div><div class="kpi-lbl">الأكثر استخداماً</div></div>
    </div>

    <!-- Filters -->
    <div class="filter-row">
      <div class="search-wrap" style="flex:2;min-width:200px">
        <span class="search-icon">🔍</span>
        <input class="search-inp" id="search-inp" oninput="applyFilter()" placeholder="ابحث بالنوع أو اسم المنتج أو المورد...">
      </div>
      <select id="type-filter" class="sel sel-sm" onchange="applyFilter()" style="min-width:140px">
        <option value="">كل الأنواع</option>
      </select>
      <select id="sup-filter" class="sel sel-sm" onchange="applyFilter()" style="min-width:140px">
        <option value="">كل الموردين</option>
      </select>
      <select id="sort-by" class="sel sel-sm" onchange="applyFilter()" style="min-width:130px">
        <option value="usage">الأكثر استخداماً</option>
        <option value="cheap">الأرخص سعراً</option>
        <option value="recent">الأحدث</option>
        <option value="name">الاسم</option>
      </select>
    </div>

    <!-- Table -->
    <div class="card" style="overflow-x:auto">
      <table class="lib-table" id="lib-table">
        <thead>
          <tr>
            <th>النوع / المنتج</th>
            <th>المورد</th>
            <th>متوسط السعر</th>
            <th>نطاق السعر</th>
            <th>آخر مبلغ</th>
            <th style="text-align:center">الاستخدام</th>
            <th>آخر تحديث</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="lib-body">
          <tr><td colspan="8" class="lib-empty"><div class="lib-empty-ico">⏳</div><div>جارٍ التحميل...</div></td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
</div>

<!-- History / Detail Drawer -->
<div class="hist-backdrop" id="hist-backdrop" onclick="closeHist(event)">
  <div class="hist-panel" id="hist-panel" onclick="event.stopPropagation()">
    <div class="hist-head">
      <h3 id="hist-title">تفاصيل البند</h3>
      <button type="button" class="hist-close" onclick="closeHistPanel()">✕</button>
    </div>
    <div id="hist-body">
      <div style="color:var(--dim2)">⏳ جارٍ التحميل...</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toasts" id="toasts"></div>

<script type="module">
import { db, auth, onAuthStateChanged } from './core/firebase-init.js';
import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';
import { hasPage, canDo } from './core/permissions-matrix.js';
import {
  getCostLibraryItems,
  deleteCostLibraryItem,
  getSupplierComparisons,
} from './core/cost-library-actions.js';

let _items = [];
let _filteredItems = [];
let _currentRole = '';
let _userPerms = null;

// ── Auth guard ────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if(!user){ location.href = 'login.html'; return; }

  const snap = await getDoc(doc(db, 'users', user.uid));
  const d = snap.exists() ? snap.data() : {};
  _currentRole = d.role || '';
  _userPerms   = d.permissions || null;

  if(!hasPage('cost-items-library', _currentRole, _userPerms)){
    location.href = 'login.html'; return;
  }

  document.getElementById('nav-name').textContent = d.name || user.email || '';
  document.getElementById('nav-av').textContent   = (d.name || 'U')[0].toUpperCase();
  document.getElementById('role-badge').textContent = _currentRole;

  loadItems();
});

// ── Load ──────────────────────────────────────────────────
window.loadItems = async function(){
  document.getElementById('sub').textContent = 'جارٍ التحميل...';
  document.getElementById('lib-body').innerHTML =
    '<tr><td colspan="8" class="lib-empty"><div class="lib-empty-ico">⏳</div><div>جارٍ التحميل...</div></td></tr>';

  try {
    _items = await getCostLibraryItems({ db, limitN: 500 });
    _buildFilters();
    applyFilter();
    _updateKPIs();
    document.getElementById('sub').textContent = `${_items.length} بند في المكتبة`;
  } catch(e) {
    document.getElementById('sub').textContent = 'فشل التحميل';
    showToast('❌ فشل تحميل المكتبة: ' + (e?.message||''), 'err');
  }
};

// ── Build filter dropdowns ────────────────────────────────
function _buildFilters(){
  const types = [...new Set(_items.map(x => x.type).filter(Boolean))].sort();
  const sups  = [...new Set(_items.map(x => x.supplierName).filter(Boolean))].sort();

  const tf = document.getElementById('type-filter');
  tf.innerHTML = '<option value="">كل الأنواع</option>'
    + types.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');

  const sf = document.getElementById('sup-filter');
  sf.innerHTML = '<option value="">كل الموردين</option>'
    + sups.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('');
}

// ── Apply filter & render ─────────────────────────────────
window.applyFilter = function(){
  const text = (document.getElementById('search-inp').value||'').toLowerCase().trim();
  const type = document.getElementById('type-filter').value;
  const sup  = document.getElementById('sup-filter').value;
  const sort = document.getElementById('sort-by').value;

  _filteredItems = _items
    .filter(x => x.isActive !== false)
    .filter(x => {
      if(type && x.type !== type) return false;
      if(sup  && x.supplierName !== sup) return false;
      if(text){
        return (x.type||'').toLowerCase().includes(text)
          || (x.productName||'').toLowerCase().includes(text)
          || (x.supplierName||'').toLowerCase().includes(text);
      }
      return true;
    });

  if(sort === 'usage') _filteredItems.sort((a,b) => (b.usageCount||0) - (a.usageCount||0));
  else if(sort === 'cheap') _filteredItems.sort((a,b) => (a.avgUnitCost||0) - (b.avgUnitCost||0));
  else if(sort === 'recent') _filteredItems.sort((a,b) => {
    const ta = b.updatedAt?.seconds||0, tb = a.updatedAt?.seconds||0;
    return ta - tb;
  });
  else if(sort === 'name') _filteredItems.sort((a,b) => (a.type||'').localeCompare(b.type||'', 'ar'));

  _renderTable();
};

// ── Render table ──────────────────────────────────────────
function _renderTable(){
  const tbody = document.getElementById('lib-body');
  if(!_filteredItems.length){
    tbody.innerHTML = `<tr><td colspan="8" class="lib-empty">
      <div class="lib-empty-ico">📭</div>
      <div>لا توجد نتائج مطابقة</div>
    </td></tr>`;
    return;
  }

  const isAdmin = canDo('system_settings', _currentRole, _userPerms);
  tbody.innerHTML = _filteredItems.map(item => {
    const minP = item.minUnitCost > 0 ? nf(item.minUnitCost) : '—';
    const maxP = item.maxUnitCost > 0 ? nf(item.maxUnitCost) : '—';
    const updDate = item.updatedAt?.seconds
      ? new Date(item.updatedAt.seconds * 1000).toLocaleDateString('ar-EG')
      : '—';
    return `<tr>
      <td>
        <div class="lib-row-name">${getCostIco(item.type)} ${esc(item.type||'—')}</div>
        ${item.productName ? `<div class="lib-row-sub">📦 ${esc(item.productName)}</div>` : ''}
      </td>
      <td><span class="lib-sup-name">${esc(item.supplierName||'—')}</span></td>
      <td><span class="lib-price-main">${item.avgUnitCost > 0 ? nf(item.avgUnitCost)+' ج' : '—'}</span></td>
      <td><span class="lib-price-range">${minP} – ${maxP} ج</span></td>
      <td><span class="lib-price-main">${item.lastTotal > 0 ? nf(item.lastTotal)+' ج' : '—'}</span></td>
      <td class="lib-usage">${item.usageCount||0} مرة</td>
      <td style="font-size:var(--fs-xs);color:var(--dim2)">${updDate}</td>
      <td>
        <div class="lib-actions">
          <button class="lib-btn" onclick="openHist('${esc(item._id)}')">📊 السجل</button>
          ${isAdmin ? `<button class="lib-btn lib-btn-del" onclick="deleteItem('${esc(item._id)}','${esc(item.type)}')">✕</button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ── KPIs ──────────────────────────────────────────────────
function _updateKPIs(){
  const active = _items.filter(x => x.isActive !== false);
  document.getElementById('k-total').textContent = active.length;
  document.getElementById('k-types').textContent = new Set(active.map(x => x.type)).size;
  document.getElementById('k-suppliers').textContent = new Set(active.map(x => x.supplierId).filter(Boolean)).size;
  const top = active.sort((a,b) => (b.usageCount||0) - (a.usageCount||0))[0];
  document.getElementById('k-top').textContent = top ? (top.type||'—') : '—';
}

// ── History panel ─────────────────────────────────────────
window.openHist = async function(id){
  const item = _items.find(x => x._id === id);
  if(!item) return;
  document.getElementById('hist-title').textContent = `${getCostIco(item.type)} ${item.type||'—'}`;
  document.getElementById('hist-backdrop').classList.add('is-open');

  const history = (item.priceHistory||[]).slice().reverse();
  const avgC = item.avgUnitCost > 0 ? nf(item.avgUnitCost) + ' ج' : '—';
  const minC = item.minUnitCost > 0 ? nf(item.minUnitCost) + ' ج' : '—';
  const maxC = item.maxUnitCost > 0 ? nf(item.maxUnitCost) + ' ج' : '—';

  // Load supplier comparison
  let cmpHtml = '';
  try {
    const cmps = await getSupplierComparisons({ db, type: item.type, productName: item.productName });
    if(cmps.length > 1){
      const rankIcons = ['gold','silver','bronze'];
      cmpHtml = `
        <div class="sup-cmp-section">
          <div style="font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--dim1);margin-bottom:8px">مقارنة الموردين — ${esc(item.type)}</div>
          ${cmps.slice(0,5).map((c,i) => `
            <div class="sup-cmp-row">
              <div class="sup-cmp-rank ${rankIcons[i]||''}">${i+1}</div>
              <div class="sup-cmp-name">${esc(c.supplierName||'—')}</div>
              <div class="sup-cmp-price">${c.avgUnitCost > 0 ? nf(c.avgUnitCost)+' ج/قطعة' : '—'}</div>
              <div class="sup-cmp-count">× ${c.usageCount||0}</div>
            </div>
          `).join('')}
        </div>`;
    }
  } catch(e){ /* non-critical */ }

  document.getElementById('hist-body').innerHTML = `
    <div class="hist-stat-row">
      <div class="hist-stat"><div class="hist-stat-v">${avgC}</div><div class="hist-stat-k">متوسط الوحدة</div></div>
      <div class="hist-stat"><div class="hist-stat-v">${minC}</div><div class="hist-stat-k">الأقل</div></div>
      <div class="hist-stat"><div class="hist-stat-v">${maxC}</div><div class="hist-stat-k">الأعلى</div></div>
      <div class="hist-stat"><div class="hist-stat-v">${item.usageCount||0}</div><div class="hist-stat-k">مرات الاستخدام</div></div>
    </div>
    <div style="font-size:var(--fs-sm);color:var(--dim1);margin-bottom:8px;font-weight:var(--fw-bold)">
      🏭 ${esc(item.supplierName||'—')}
      ${item.productName ? ` · 📦 ${esc(item.productName)}` : ''}
    </div>
    ${history.length ? `
      <table class="hist-table">
        <thead><tr><th>التاريخ</th><th>الكمية</th><th>الإجمالي</th><th>تكلفة الوحدة</th></tr></thead>
        <tbody>
          ${history.map(h => `<tr>
            <td>${esc(h.date||'—')}</td>
            <td>${nf(h.qty||0)}</td>
            <td>${nf(h.total||0)} ج</td>
            <td style="direction:ltr">${h.unitCost > 0 ? nf(h.unitCost) + ' ج' : '—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>` : '<div style="color:var(--dim2);padding:var(--space-4)">لا سجلات أسعار</div>'
    }
    ${cmpHtml}
  `;
};

window.closeHist = function(e){
  if(!e || e.target === document.getElementById('hist-backdrop')) closeHistPanel();
};
window.closeHistPanel = function(){
  document.getElementById('hist-backdrop').classList.remove('is-open');
};

// ── Delete ────────────────────────────────────────────────
window.deleteItem = async function(id, typeName){
  if(!confirm(`حذف البند "${typeName}" من المكتبة؟\n(حذف ناعم — يمكن الاسترجاع)`)) return;
  const res = await deleteCostLibraryItem({ db, itemId: id });
  if(res.ok){
    showToast('✅ تم الحذف من المكتبة', 'ok');
    _items = _items.filter(x => x._id !== id);
    applyFilter();
    _updateKPIs();
  } else {
    showToast('❌ ' + (res.errors?.[0]||'فشل الحذف'), 'err');
  }
};

// ── Utils ─────────────────────────────────────────────────
function getCostIco(t){
  const l = (t||'').toLowerCase();
  if(['طباع','فلكس','حريرية','uv','ريزو','أوفست','ديجيتال','لارج'].some(k=>l.includes(k))) return '🖨️';
  if(['ورق','كرتون'].some(k=>l.includes(k))) return '📄';
  if(['زنكات','ألواح'].some(k=>l.includes(k))) return '🔵';
  if(['سلفنة','تشطيب','تذهيب','نقر','كريز','تجليد'].some(k=>l.includes(k))) return '✨';
  if(l.includes('قص')) return '✂️';
  if(l.includes('تجميع')) return '📦';
  if(['تصميم','تصوير','موشن'].some(k=>l.includes(k))) return '✏️';
  if(l.includes('شحن')) return '🚚';
  return '📌';
}
function nf(n){ return (parseFloat(n)||0).toLocaleString('ar-EG',{maximumFractionDigits:3}); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg, t=''){
  const c = document.getElementById('toasts');
  if(!c) return;
  const el = document.createElement('div');
  el.className = 'toast ' + t;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

window.doLogout = async function(){
