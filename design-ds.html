<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a0f1e">
<title>التصميم — Business2Card (تصميم جديد · تشغيلي)</title>
<link rel="stylesheet" href="design-system/preview-kit/kit.css">
<style>
  /* mobile: KPIs 2-up */
  @media(max-width:680px){ .stats{grid-template-columns:1fr 1fr !important;gap:var(--space-3) !important} .ds-kpi{padding:var(--space-4)} .ds-kpi-value{font-size:var(--fs-2xl)} }
  .dsx-filters{display:flex;gap:var(--space-2);flex-wrap:wrap;margin-bottom:var(--space-4)}
  .dsx-board{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:var(--space-3)}
  .order-card{cursor:pointer;position:relative}
  .oc-note{font-size:12px;color:var(--ink-3);margin-bottom:var(--space-3)}
  .dsx-empty{padding:var(--space-7);text-align:center;color:var(--ink-3)}
  .dsx-loading{padding:var(--space-7);text-align:center;color:var(--ink-3)}
  /* drawer */
  .dsx-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:90;display:none}
  .dsx-ov.open{display:block}
  .dsx-drawer{position:fixed;top:0;inset-inline-start:0;height:100%;width:min(460px,100%);background:var(--surface);border-inline-end:1px solid var(--border);z-index:91;transform:translateX(-104%);transition:transform .25s var(--ease,ease);display:flex;flex-direction:column;overflow:hidden}
  html[dir=rtl] .dsx-drawer{inset-inline-start:auto;inset-inline-end:0;border-inline-end:none;border-inline-start:1px solid var(--border);transform:translateX(104%)}
  .dsx-drawer.open{transform:translateX(0)}
  .dsx-dh{padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-3)}
  .dsx-dh h2{font-size:var(--fs-lg);font-weight:800}
  .dsx-dh .sub{font-size:var(--fs-xs);color:var(--ink-3);margin-top:2px}
  .dsx-db{padding:var(--space-5);overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:var(--space-4)}
  .dsx-row{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);font-size:var(--fs-sm)}
  .dsx-row .k{color:var(--ink-3)}
  .dsx-row .v{font-weight:700;text-align:start}
  .dsx-sec{border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--space-4);background:var(--surface-2)}
  .dsx-sec h4{font-size:var(--fs-xs);color:var(--ink-3);margin-bottom:var(--space-3);font-weight:700;display:flex;align-items:center;gap:6px}
  .dsx-actions{display:flex;flex-direction:column;gap:var(--space-2)}
  .dsx-actions .ds-btn{justify-content:center}
  .dsx-file{display:flex;align-items:center;gap:8px;font-size:var(--fs-sm);padding:6px 0}
  .dsx-file a{color:var(--accent);text-decoration:none}
  .money{font-family:var(--font-mono);font-feature-settings:"tnum";direction:ltr;display:inline-block}
  .dsx-note-box{font-size:var(--fs-sm);color:var(--ink-2);white-space:pre-wrap;line-height:1.6}
  .dsx-tl{display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto}
  .dsx-tl-e{font-size:var(--fs-xs);color:var(--ink-3);border-inline-start:2px solid var(--border);padding-inline-start:8px}
  .dsx-tl-e b{color:var(--ink-2);font-weight:600}
  select.ds-input{width:100%}
</style>
</head>
<body data-theme="dark">
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-logo"><span class="lic" style="font-size:20px;color:var(--accent-fg)"><i data-lucide="contact"></i></span></div>
      <div class="sidebar-brand-text"><b>Business2Card</b><small id="side-role">—</small></div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-group">
        <div class="sidebar-group-label">التشغيل</div>
        <a class="nav-item" href="clients.html"><span class="nav-ic"><span class="lic"><i data-lucide="users"></i></span></span><span>العملاء</span></a>
        <a class="nav-item is-active" href="design-ds.html"><span class="nav-ic"><span class="lic"><i data-lucide="pen-tool"></i></span></span><span>التصميم</span></a>
        <a class="nav-item" href="design.html"><span class="nav-ic"><span class="lic"><i data-lucide="file-text"></i></span></span><span>التصميم (الحالية)</span></a>
        <a class="nav-item" href="production.html"><span class="nav-ic"><span class="lic"><i data-lucide="factory"></i></span></span><span>الإنتاج</span></a>
        <a class="nav-item" href="shipping.html"><span class="nav-ic"><span class="lic"><i data-lucide="truck"></i></span></span><span>الشحن</span></a>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-label">المالية والإدارة</div>
        <a class="nav-item" href="accounts.html"><span class="nav-ic"><span class="lic"><i data-lucide="wallet"></i></span></span><span>الحسابات</span></a>
        <a class="nav-item" href="reports-ds.html"><span class="nav-ic"><span class="lic"><i data-lucide="bar-chart-3"></i></span></span><span>التقارير</span></a>
      </div>
    </nav>
    <div class="sidebar-foot">
      <div class="sidebar-user">
        <div class="avatar" id="side-av">U</div>
        <div style="line-height:1.3"><div style="font-size:13px;font-weight:700" id="side-name">—</div><div style="font-size:11px;color:var(--ink-3)" id="side-role2">—</div></div>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="ds-topbar">
      <div>
        <h1 class="ds-topbar-title">مركز التصميم</h1>
        <div class="ds-topbar-sub" id="dsx-sub">جارٍ التحميل…</div>
      </div>
      <div class="topbar-spacer"></div>
      <a class="ds-btn ds-btn-ghost ds-btn-sm" href="design.html"><span class="lic"><i data-lucide="external-link"></i></span> النسخة الحالية</a>
    </header>

    <div class="content">
      <section class="stats" id="dsx-kpis"></section>
      <div class="ds-tabs dsx-filters" id="dsx-filters"></div>
      <div id="dsx-board"><div class="dsx-loading"><span class="lic"><i data-lucide="loader"></i></span> جارٍ تحميل الطلبات…</div></div>
      <div style="margin-top:var(--space-5);text-align:center;font-size:var(--fs-xs);color:var(--ink-mute)">— بيانات حقيقية · الأفعال عبر orderActions المركزية · نسخة تجريبية للتصميم الجديد · النسخة الرسمية لسه <a href="design.html" style="color:var(--accent)">design.html</a> —</div>
    </div>
  </div>
</div>

<!-- order drawer -->
<div class="dsx-ov" id="dsx-ov" onclick="if(event.target===this)window.__dsxClose&&window.__dsxClose()"></div>
<aside class="dsx-drawer" id="dsx-drawer" aria-hidden="true"></aside>

<div id="toasts" style="position:fixed;bottom:20px;inset-inline-start:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center"></div>

<script type="module">
import { auth, db } from "./core/firebase-init.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { collection, doc, onSnapshot, getDoc, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { orderActions } from "./order-actions.js";
import { dedupEmployees, resolveDesigner, ORDER_DESIGN_STAGES } from "./orders.js";
import { calcRem } from "./core/order-math.js";
import { ROLE_CAN_SEE_PHONE, ROLE_CAN_SEE_DESIGN, maskPhone, canDo } from "./core/permissions-matrix.js";

const RMAP={admin:'accounts.html',operation_manager:'ops-dashboard.html',customer_service:'cs-dashboard.html',graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'};
const ROLE_LABEL={admin:'مدير النظام',operation_manager:'مدير العمليات',customer_service:'خدمة العملاء',graphic_designer:'مصمم جرافيك',design_operator:'مشغّل تصميم',production_agent:'مسؤول إنتاج',shipping_officer:'مسؤول شحن',wallet_manager:'أمين الخزنة'};

// design substatus → {label, cls, icon}
const DSTAGE={
  pending:{label:'في الانتظار',cls:'status-info',icon:'inbox'},
  wip:{label:'جاري التصميم',cls:'status-warning',icon:'pen-tool'},
  awaiting_payment:{label:'انتظار التحويل',cls:'status-warning',icon:'hand-coins'},
  rejected:{label:'مرفوض',cls:'status-danger',icon:'x-circle'},
  approved:{label:'معتمد',cls:'status-success',icon:'check-circle-2'},
  paused:{label:'موقوف',cls:'status-neutral',icon:'pause'},
};
const FILTERS=[
  {k:'all',label:'الكل'},
  {k:'pending',label:'في الانتظار'},
  {k:'wip',label:'جاري التصميم'},
  {k:'awaiting_payment',label:'انتظار التحويل'},
  {k:'rejected',label:'مرفوض'},
  {k:'approved',label:'معتمد'},
];

const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG',{maximumFractionDigits:0});
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const drawIcons=()=>{try{window.lucide&&lucide.createIcons();}catch(_){}};
function toast(msg,type='ok'){const c=document.getElementById('toasts');const el=document.createElement('div');const col=type==='err'?'var(--danger)':type==='warn'?'var(--warning)':'var(--success)';el.style.cssText=`background:var(--surface-2);border:1px solid ${col};color:var(--ink);padding:10px 16px;border-radius:var(--r-pill);font-size:var(--fs-sm);box-shadow:var(--shadow-md);max-width:90vw`;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3800);}

let me={uid:'',name:'',role:'',perms:null};
let orders=[], employees=[];
let loaded={orders:false};
let filterK='all';
let openId=null;
let __started=false;

const code=o=>o.orderCode||o.code||o.orderNumber||('#'+String(o._id||'').slice(-5));
const prods=o=>(o.products||[]).map(p=>p.name).filter(Boolean).join('، ')||o.notes||'—';
const dlInfo=o=>{ if(!o.deadline) return {txt:'—',late:false}; const d=new Date(o.deadline); const late=d<new Date(); return {txt:d.toLocaleDateString('ar-EG',{day:'numeric',month:'short'}),late}; };
const canSeePhone=()=>ROLE_CAN_SEE_PHONE.has(me.role);
const canSeeDesign=()=>ROLE_CAN_SEE_DESIGN.has(me.role);
const canAssign=()=>['admin','operation_manager','customer_service'].includes(me.role);
const canApprove=()=>canDo('approve_designs',me.role,me.perms);

// ── auth gate (mirrors design.html) ──
onAuthStateChanged(auth, async u=>{
  if(!u){location.href='login.html';return;}
  if(__started)return; __started=true;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(snap.exists()){
    const d=snap.data();
    const role=d.role||'customer_service';
    const pages=(d.permissions?.pages)||[];
    const isAdm=['admin','operation_manager'].includes(role);
    const designRoles=['graphic_designer','design_operator','customer_service','production_agent'];
    if(!isAdm && !pages.includes('*') && !pages.includes('design') && !designRoles.includes(role)){location.href=RMAP[role]||'login.html';return;}
    me={uid:u.uid,name:d.name||u.email||'مستخدم',role,perms:d.permissions||null};
    document.getElementById('side-name').textContent=me.name;
    document.getElementById('side-av').textContent=(me.name[0]||'U').toUpperCase();
    const rl=ROLE_LABEL[role]||role;
    document.getElementById('side-role').textContent=rl;
    document.getElementById('side-role2').textContent=rl;
  }
  // read-only listeners (RULE G3 bounded). designers see only their orders.
  const scopeMine=['graphic_designer','design_operator'].includes(me.role);
  const oq = scopeMine
    ? query(collection(db,'orders'), where('stage','==','design'), where('designerId','==',me.uid), limit(200))
    : query(collection(db,'orders'), where('stage','==','design'), orderBy('createdAt','desc'), limit(200));
  onSnapshot(oq, s=>{ orders=s.docs.map(x=>({...x.data(),_id:x.id})); loaded.orders=true; render(); if(openId) renderDrawer(openId); },
    e=>{console.warn('[design-ds] orders:',e.message); loaded.orders=true; render();});
  onSnapshot(query(collection(db,'employees'),limit(500)), s=>{ employees=dedupEmployees(s.docs.map(x=>({...x.data(),_id:x.id}))); if(openId) renderDrawer(openId); },
    e=>console.warn('[design-ds] employees:',e.message));
});

// ── filters ──
function buildFilters(){
  const wrap=document.getElementById('dsx-filters');
  wrap.innerHTML=FILTERS.map(f=>{
    const n = f.k==='all'?orders.length:orders.filter(o=>(o.designStage||'pending')===f.k).length;
    return `<button class="ds-tab ${filterK===f.k?'is-active':''}" data-k="${f.k}">${f.label} <span style="opacity:.6">${n}</span></button>`;
  }).join('');
}
document.getElementById('dsx-filters').addEventListener('click',e=>{const b=e.target.closest('.ds-tab');if(!b)return;filterK=b.dataset.k;render();});

// ── KPIs ──
function renderKPIs(){
  const total=orders.length;
  const wip=orders.filter(o=>o.designStage==='wip').length;
  const awaiting=orders.filter(o=>o.designStage==='awaiting_payment').length;
  const rejected=orders.filter(o=>o.designStage==='rejected').length;
  const late=orders.filter(o=>o.deadline&&new Date(o.deadline)<new Date()).length;
  const kpi=(icon,accent,label,val,hint)=>`<div class="ds-kpi" style="--kpi-accent:${accent}"><div class="ds-kpi-label"><span class="lic"><i data-lucide="${icon}"></i></span> ${label}</div><div class="ds-kpi-value ds-kpi-value-sm">${val}</div>${hint?`<div class="ds-kpi-delta flat">${hint}</div>`:''}</div>`;
  document.getElementById('dsx-kpis').innerHTML=
    kpi('layers','var(--accent)','في التصميم',fn(total))+
    kpi('pen-tool','var(--warning)','جاري التصميم',fn(wip))+
    kpi('hand-coins','var(--info)','انتظار التحويل',fn(awaiting))+
    kpi('x-circle','var(--danger)','مرفوض',fn(rejected))+
    kpi('alarm-clock','var(--danger)','متأخر',fn(late),late?'تجاوز الموعد':'');
}

// ── board ──
function render(){
  if(!loaded.orders) return;
  document.getElementById('dsx-sub').textContent=`${fn(orders.length)} طلب في مرحلة التصميم`;
  renderKPIs();
  buildFilters();
  const list = filterK==='all'?orders:orders.filter(o=>(o.designStage||'pending')===filterK);
  const board=document.getElementById('dsx-board');
  if(!list.length){ board.innerHTML=`<div class="dsx-empty"><span class="lic"><i data-lucide="inbox"></i></span><div style="margin-top:8px">لا توجد طلبات في هذا التصنيف</div></div>`; drawIcons(); return; }
  const sorted=list.slice().sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  board.innerHTML=`<div class="dsx-board">`+sorted.map(o=>{
    const st=DSTAGE[o.designStage||'pending']||DSTAGE.pending;
    const dl=dlInfo(o);
    const designer=o.designerName||resolveDesigner(employees,o.designerId,o.designerName)?.name||'غير معيّن';
    const rem=calcRem(o);
    return `<div class="order-card" data-id="${esc(o._id)}">
      ${dl.late?`<span class="oc-late status status-danger"><span class="lic"><i data-lucide="alarm-clock"></i></span> متأخر</span>`:''}
      <div class="oc-id">${esc(code(o))}</div>
      <div class="oc-client">${esc(o.clientName||'—')}</div>
      <div class="oc-note">${esc(prods(o)).slice(0,80)}</div>
      <div class="oc-meta">
        <span class="oc-m"><span class="lic"><i data-lucide="user"></i></span> ${esc(designer)}</span>
        <span class="oc-m"><span class="lic"><i data-lucide="calendar"></i></span> ${dl.txt}</span>
      </div>
      <div class="oc-footer">
        <span class="status ${st.cls}"><span class="lic"><i data-lucide="${st.icon}"></i></span> ${st.label}</span>
        <span class="oc-money" style="color:${rem>0?'var(--warning)':'var(--success)'}"><span class="money">${fn(o.salePrice)}</span> ج</span>
      </div>
    </div>`;
  }).join('')+`</div>`;
  drawIcons();
}
document.getElementById('dsx-board').addEventListener('click',e=>{const c=e.target.closest('.order-card');if(!c)return;openDrawer(c.dataset.id);});

// ── drawer ──
function openDrawer(id){ openId=id; document.getElementById('dsx-ov').classList.add('open'); document.getElementById('dsx-drawer').classList.add('open'); renderDrawer(id); }
window.__dsxClose=function(){ openId=null; document.getElementById('dsx-ov').classList.remove('open'); document.getElementById('dsx-drawer').classList.remove('open'); };
document.addEventListener('keydown',e=>{if(e.key==='Escape')window.__dsxClose();});

function timelineHTML(o){
  const tl=(o.timeline||[]).slice(-8).reverse();
  if(!tl.length) return '<div style="color:var(--ink-mute);font-size:var(--fs-xs)">لا يوجد سجل</div>';
  return `<div class="dsx-tl">`+tl.map(e=>`<div class="dsx-tl-e"><b>${esc(e.action||'')}</b><br>${esc(e.by||'')} · ${esc(e.date||'')}</div>`).join('')+`</div>`;
}
function designerOptions(o){
  const ds=employees.filter(e=>['graphic_designer','design_operator'].includes(e.role));
  const cur=o.designerId||'';
  return `<option value="">— غير معيّن —</option>`+ds.map(e=>{const id=e.authUid||e.uid||e._id;return `<option value="${esc(id)}" ${id===cur?'selected':''}>${esc(e.name||id)}</option>`;}).join('');
}

function renderDrawer(id){
  const o=orders.find(x=>x._id===id);
  const dr=document.getElementById('dsx-drawer');
  if(!o){ dr.innerHTML=`<div class="dsx-dh"><div><h2>غير موجود</h2></div><button class="icon-btn" onclick="window.__dsxClose()"><span class="lic"><i data-lucide="x"></i></span></button></div>`; drawIcons(); return; }
  const st=DSTAGE[o.designStage||'pending']||DSTAGE.pending;
  const dl=dlInfo(o);
  const designer=o.designerName||resolveDesigner(employees,o.designerId,o.designerName)?.name||'غير معيّن';
  const phone=o.clientPhone||o.phone1||'';
  const rem=calcRem(o);
  const mineUnaccepted = o.designerId===me.uid && !o.designerAcceptedAt;
  const mineAccepted = o.designerId===me.uid && o.designerAcceptedAt;

  // design files (RULE 8 gated)
  let filesHTML='';
  if(canSeeDesign()){
    const files=[];
    if(o.designFileUrl) files.push({u:o.designFileUrl,n:'الملف الحالي'});
    (o.designFiles||[]).forEach((f,i)=>{const u=typeof f==='string'?f:(f.url||f.fileUrl);if(u)files.push({u,n:(f.note||('نسخة '+(i+1)))});});
    filesHTML=`<div class="dsx-sec"><h4><span class="lic"><i data-lucide="image"></i></span> ملفات التصميم</h4>`+
      (files.length?files.map(f=>`<div class="dsx-file"><span class="lic"><i data-lucide="file"></i></span><a href="${esc(f.u)}" target="_blank" rel="noopener">${esc(f.n)}</a></div>`).join(''):'<div style="color:var(--ink-mute);font-size:var(--fs-xs)">لا توجد ملفات بعد</div>')+
      (o.designFileNote?`<div class="dsx-note-box" style="margin-top:8px">📝 ${esc(o.designFileNote)}</div>`:'')+`</div>`;
  }

  // actions
  const A=[];
  if(canAssign()){
    A.push(`<div class="dsx-sec"><h4><span class="lic"><i data-lucide="user-plus"></i></span> تعيين المصمم</h4>
      <select class="ds-input" id="dsx-assign">${designerOptions(o)}</select>
      <button class="ds-btn ds-btn-secondary ds-btn-sm" style="margin-top:8px;width:100%" data-act="assign">حفظ التعيين</button></div>`);
  }
  const btns=[];
  if(mineUnaccepted) btns.push(`<button class="ds-btn ds-btn-primary" data-act="accept"><span class="lic"><i data-lucide="check"></i></span> تأكيد الاستلام</button>`);
  if((mineAccepted||canAssign()) && o.designStage!=='wip') btns.push(`<button class="ds-btn ds-btn-secondary" data-act="start"><span class="lic"><i data-lucide="play"></i></span> بدء العمل (جاري التصميم)</button>`);
  if(o.designStage!=='awaiting_payment') btns.push(`<button class="ds-btn ds-btn-secondary" data-act="awaiting"><span class="lic"><i data-lucide="hand-coins"></i></span> انتظار التحويل</button>`);
  if(canApprove() && o.designStage!=='approved') btns.push(`<button class="ds-btn ds-btn-secondary" data-act="approve"><span class="lic"><i data-lucide="check-circle-2"></i></span> اعتماد التصميم</button>`);
  btns.push(`<button class="ds-btn ds-btn-ghost" data-act="reject"><span class="lic"><i data-lucide="x-circle"></i></span> رفض / إعادة</button>`);
  btns.push(`<button class="ds-btn ds-btn-primary" data-act="toPrint"><span class="lic"><i data-lucide="printer"></i></span> إرسال للطباعة</button>`);
  A.push(`<div class="dsx-sec"><h4><span class="lic"><i data-lucide="zap"></i></span> الإجراءات</h4><div class="dsx-actions">${btns.join('')}</div></div>`);

  dr.innerHTML=`
    <div class="dsx-dh">
      <div><h2>${esc(o.clientName||'—')}</h2><div class="sub">${esc(code(o))} · <span class="status ${st.cls}" style="vertical-align:middle"><span class="lic"><i data-lucide="${st.icon}"></i></span> ${st.label}</span></div></div>
      <button class="icon-btn" onclick="window.__dsxClose()"><span class="lic"><i data-lucide="x"></i></span></button>
    </div>
    <div class="dsx-db">
      <div class="dsx-sec">
        <div class="dsx-row"><span class="k">المصمم</span><span class="v">${esc(designer)}</span></div>
        <div class="dsx-row" style="margin-top:8px"><span class="k">الموعد</span><span class="v" style="color:${dl.late?'var(--danger)':'var(--ink)'}">${dl.txt}${dl.late?' · متأخر':''}</span></div>
        <div class="dsx-row" style="margin-top:8px"><span class="k">المتبقّي</span><span class="v" style="color:${rem>0?'var(--warning)':'var(--success)'}"><span class="money">${fn(rem)}</span> ج</span></div>
        ${phone?`<div class="dsx-row" style="margin-top:8px"><span class="k">التليفون</span><span class="v"><span class="money">${esc(maskPhone(phone,canSeePhone()))}</span></span></div>`:''}
      </div>
      <div class="dsx-sec"><h4><span class="lic"><i data-lucide="package"></i></span> المنتجات</h4><div class="dsx-note-box">${esc(prods(o))}</div></div>
      ${filesHTML}
      ${A.join('')}
      <div class="dsx-sec"><h4><span class="lic"><i data-lucide="history"></i></span> السجل</h4>${timelineHTML(o)}</div>
    </div>`;
  drawIcons();
}

// ── action handler (all writes via orderActions) ──
document.getElementById('dsx-drawer').addEventListener('click',async e=>{
  const b=e.target.closest('[data-act]'); if(!b||!openId) return;
  const act=b.dataset.act; const orderId=openId;
  const base={orderId,userId:me.uid,userName:me.name};
  b.disabled=true;
  try{
    let r;
    if(act==='assign'){
      const sel=document.getElementById('dsx-assign'); const id=sel.value; const name=id?(sel.options[sel.selectedIndex].text):'';
      r=await orderActions.assignDesigner({...base,designerId:id,designerName:name});
    } else if(act==='accept'){ r=await orderActions.acceptDesignAssignment(base); }
    else if(act==='start'){ r=await orderActions.startDesignWork(base); }
    else if(act==='awaiting'){ r=await orderActions.setDesignStage({...base,stage:ORDER_DESIGN_STAGES.AWAITING_PAYMENT}); }
    else if(act==='approve'){ r=await orderActions.setDesignStage({...base,stage:ORDER_DESIGN_STAGES.APPROVED}); }
    else if(act==='reject'){
      const reason=prompt('سبب الرفض / الإعادة:'); if(reason===null){b.disabled=false;return;}
      r=await orderActions.setDesignStage({...base,stage:ORDER_DESIGN_STAGES.REJECTED,rejectReason:reason});
    } else if(act==='toPrint'){
      r=await orderActions.submitToPrinting({...base,role:me.role});
      if(r && !r.ok && (r.warnings||[]).length && !(r.errors||[]).length){
        if(confirm('تنبيهات:\n- '+r.warnings.join('\n- ')+'\n\nإرسال للطباعة رغم التنبيهات؟')){
          r=await orderActions.submitToPrinting({...base,role:me.role,bypassWarnings:true});
        } else { b.disabled=false; return; }
      }
    }
    if(r&&r.ok){
      const msg=(r.warnings&&r.warnings.length)?('تم ✓ ('+r.warnings.join(' · ')+')'):'تم بنجاح ✓';
      toast(msg,'ok');
      if(act==='toPrint')window.__dsxClose();
    } else { toast((r&&(r.errors||[])[0])||'تعذّر تنفيذ العملية','err'); }
  }catch(err){ console.warn('[design-ds] action',act,err); toast(err.message||'خطأ غير متوقع','err'); }
  b.disabled=false;
});
</script>
