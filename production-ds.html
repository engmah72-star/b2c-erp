<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a0f1e">
<link rel="icon" href="icon-192.png" type="image/png">
<title>التنفيذ — Business2Card</title>
<link rel="stylesheet" href="design-system/preview-kit/kit.css">
<style>
  @media(max-width:680px){
    .stats{grid-template-columns:1fr 1fr !important;gap:var(--space-3) !important}
    .ds-kpi{padding:var(--space-4)}
    .ds-kpi-value{font-size:var(--fs-2xl)}
    .dsx-board{grid-template-columns:1fr !important}
    .dsx-controls{flex-direction:column;align-items:stretch}
  }

  /* ── board ── */
  .dsx-board{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:var(--space-3)}
  .order-card{cursor:pointer;position:relative;transition:box-shadow .15s}
  .order-card:hover{box-shadow:0 0 0 2px var(--accent)}
  .oc-note{font-size:12px;color:var(--ink-3);margin-bottom:var(--space-3)}
  .oc-flag{font-size:11px;padding:2px 7px;border-radius:var(--r-pill);background:rgba(255,193,7,.12);color:var(--warning);border:1px solid rgba(255,193,7,.3);margin-bottom:6px;display:inline-flex;align-items:center;gap:4px}
  .oc-flag.danger{background:rgba(255,61,110,.1);color:var(--danger);border-color:rgba(255,61,110,.3)}
  .oc-mine{font-size:10px;background:rgba(99,179,237,.15);color:#63b3ed;border:1px solid rgba(99,179,237,.3);padding:1px 6px;border-radius:var(--r-pill)}

  /* ── controls ── */
  .dsx-controls{display:flex;gap:var(--space-3);flex-wrap:wrap;margin-bottom:var(--space-3);align-items:center}
  .dsx-search{flex:1;min-width:180px;max-width:280px}
  .dsx-mine-toggle{display:flex;border-radius:var(--r-pill);border:1px solid var(--border);overflow:hidden;flex-shrink:0}
  .dsx-mine-btn{padding:6px 14px;font-size:var(--fs-sm);font-weight:600;border:none;background:transparent;color:var(--ink-3);cursor:pointer;transition:background .15s,color .15s}
  .dsx-mine-btn.active{background:var(--accent);color:#fff}
  .dsx-filters{display:flex;gap:var(--space-2);flex-wrap:wrap;margin-bottom:var(--space-3)}
  .dsx-sup-bar{display:flex;gap:var(--space-2);flex-wrap:wrap;margin-bottom:var(--space-4);padding-bottom:var(--space-3);border-bottom:1px solid var(--border)}

  /* ── health banner ── */
  .dsx-health{border-radius:var(--r-lg);padding:10px 14px;margin-bottom:var(--space-4);background:rgba(255,61,110,.06);border:1px solid rgba(255,61,110,.3);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .dsx-health-text{flex:1;min-width:140px}
  .dsx-health-title{font-size:var(--fs-sm);font-weight:800;color:var(--danger);margin-bottom:2px}
  .dsx-health-detail{font-size:var(--fs-xs);color:var(--ink-3)}
  .dsx-health-actions{display:flex;gap:6px;flex-wrap:wrap}

  /* ── empty / loading ── */
  .dsx-empty,.dsx-loading{padding:var(--space-7);text-align:center;color:var(--ink-3)}

  /* ── overlay + drawer ── */
  .dsx-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:90;display:none}
  .dsx-ov.open{display:block}
  .dsx-drawer{position:fixed;top:0;inset-inline-end:0;height:100%;width:min(480px,100%);background:var(--surface);border-inline-start:1px solid var(--border);z-index:91;transform:translateX(104%);transition:transform .25s ease;display:flex;flex-direction:column;overflow:hidden}
  .dsx-drawer.open{transform:translateX(0)}
  .dsx-dh{padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-3)}
  .dsx-dh h2{font-size:var(--fs-lg);font-weight:800}
  .dsx-dh .sub{font-size:var(--fs-xs);color:var(--ink-3);margin-top:2px}
  .dsx-db{padding:var(--space-5);overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:var(--space-4)}
  .dsx-row{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);font-size:var(--fs-sm)}
  .dsx-row .k{color:var(--ink-3)} .dsx-row .v{font-weight:700;text-align:start}
  .dsx-sec{border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--space-4);background:var(--surface-2)}
  .dsx-sec h4{font-size:var(--fs-xs);color:var(--ink-3);margin-bottom:var(--space-3);font-weight:700;display:flex;align-items:center;gap:6px}
  .dsx-form{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
  .dsx-form label{font-size:var(--fs-xs);color:var(--ink-3)}
  .ds-input,select.ds-input{width:100%}

  /* ── products ── */
  .prd{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-soft);flex-wrap:wrap}
  .prd:last-child{border-bottom:none}
  .prd-left{flex:1;min-width:0}
  .prd-n{font-size:var(--fs-sm);font-weight:600;margin-bottom:4px}
  .prd-sup{font-size:var(--fs-xs);color:var(--ink-3)}
  .prd-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .ex-btns{display:flex;gap:4px}
  .ex-b{font-size:11px;padding:3px 7px;border-radius:var(--r-pill);border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--ink-3)}
  .ex-b.on{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .sup-sel{font-size:var(--fs-xs);padding:3px 6px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface);color:var(--ink);max-width:160px}

  /* ── costs ── */
  .cost-item{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:var(--fs-sm);padding:6px 0;border-bottom:1px solid var(--border-soft)}
  .cost-item:last-child{border-bottom:none}

  /* ── design preview ── */
  .design-thumb{width:100%;border-radius:var(--r-lg);max-height:220px;object-fit:contain;background:var(--surface-3)}

  /* ── timeline ── */
  .dsx-tl{display:flex;flex-direction:column;gap:8px;max-height:170px;overflow-y:auto}
  .dsx-tl-e{font-size:var(--fs-xs);color:var(--ink-3);border-inline-start:2px solid var(--border);padding-inline-start:8px}

  /* ── misc ── */
  .money{font-family:var(--font-mono);font-feature-settings:"tnum";direction:ltr;display:inline-block}
  .w-full{width:100%}
</style>
</head>
<body data-theme="dark">
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-logo"><span class="lic" style="font-size:20px;color:var(--accent-fg)"><i data-lucide="contact"></i></span></div>
      <div class="sidebar-brand-text"><b>Business2Card</b><small id="side-role">—</small></div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-group">
        <div class="sidebar-group-label">التشغيل</div>
        <a class="nav-item" href="clients.html"><span class="nav-ic"><span class="lic"><i data-lucide="users"></i></span></span><span>العملاء</span></a>
        <a class="nav-item" href="design-ds.html"><span class="nav-ic"><span class="lic"><i data-lucide="pen-tool"></i></span></span><span>التصميم</span></a>
        <a class="nav-item is-active" href="production-ds.html"><span class="nav-ic"><span class="lic"><i data-lucide="factory"></i></span></span><span>التنفيذ</span></a>
        <a class="nav-item" href="exec-cost-entry.html"><span class="nav-ic"><span class="lic"><i data-lucide="receipt"></i></span></span><span>بنود التكلفة</span></a>
        <a class="nav-item" href="supplier-requests.html"><span class="nav-ic"><span class="lic"><i data-lucide="building-2"></i></span></span><span>طلبات الموردين</span></a>
        <a class="nav-item" href="shipping-ds.html"><span class="nav-ic"><span class="lic"><i data-lucide="truck"></i></span></span><span>الشحن</span></a>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-label">المالية والإدارة</div>
        <a class="nav-item" href="accounts.html"><span class="nav-ic"><span class="lic"><i data-lucide="wallet"></i></span></span><span>الحسابات</span></a>
        <a class="nav-item" href="reports-ds.html"><span class="nav-ic"><span class="lic"><i data-lucide="bar-chart-3"></i></span></span><span>التقارير</span></a>
      </div>
    </nav>
    <div class="sidebar-foot">
      <div class="sidebar-user">
        <div class="avatar" id="side-av">U</div>
        <div style="line-height:1.3">
          <div style="font-size:13px;font-weight:700" id="side-name">—</div>
          <div style="font-size:11px;color:var(--ink-3)" id="side-role2">—</div>
        </div>
        <button class="icon-btn" style="margin-inline-start:auto" onclick="doLogout()" title="تسجيل خروج"><span class="lic"><i data-lucide="log-out"></i></span></button>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="ds-topbar">
      <div>
        <h1 class="ds-topbar-title">مركز التنفيذ</h1>
        <div class="ds-topbar-sub" id="dsx-sub">جارٍ التحميل…</div>
      </div>
      <div class="topbar-spacer"></div>
      <a class="ds-btn ds-btn-ghost ds-btn-sm" href="production.html"><span class="lic"><i data-lucide="external-link"></i></span> النسخة الكلاسيكية</a>
    </header>

    <div class="content">
      <!-- KPIs -->
      <section class="stats" id="dsx-kpis"></section>

      <!-- Health Banner -->
      <div id="dsx-health" style="display:none"></div>

      <!-- Controls: Search + Mine/All -->
      <div class="dsx-controls">
        <input type="search" class="ds-input dsx-search" id="dsx-search" placeholder="🔍 بحث بالاسم أو رقم الأوردر…" oninput="onSearch(this.value)">
        <div class="dsx-mine-toggle">
          <button class="dsx-mine-btn active" id="btn-mine" onclick="setMine(true)">👤 موكلة لي</button>
          <button class="dsx-mine-btn" id="btn-all" onclick="setMine(false)">📋 الكل</button>
        </div>
      </div>

      <!-- Status filter tabs -->
      <div class="ds-tabs dsx-filters" id="dsx-filters"></div>

      <!-- Supplier filter bar -->
      <div class="dsx-sup-bar" id="dsx-sup-bar" style="display:none"></div>

      <!-- Orders board -->
      <div id="dsx-board"><div class="dsx-loading"><span class="lic"><i data-lucide="loader"></i></span> جارٍ تحميل الطلبات…</div></div>

      <div style="margin-top:var(--space-5);text-align:center;font-size:var(--fs-xs);color:var(--ink-mute)">— الأفعال عبر orderActions المركزية · الدفع للمورد من <a href="exec-cost-entry.html" style="color:var(--accent)">بنود التكلفة</a> أو <a href="accounts.html" style="color:var(--accent)">الحسابات</a> —</div>
    </div>
  </div>
</div>

<!-- Overlay + Drawer -->
<div class="dsx-ov" id="dsx-ov" onclick="if(event.target===this)window.__dsxClose&&window.__dsxClose()"></div>
<aside class="dsx-drawer" id="dsx-drawer" aria-hidden="true"></aside>

<!-- Toasts -->
<div id="toasts" style="position:fixed;bottom:20px;inset-inline-start:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center"></div>

<script type="module">
import { auth, db } from "./core/firebase-init.js";
import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { collection, doc, onSnapshot, getDoc, query, where, limit } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { orderActions } from "./order-actions.js";
import { canSeeField } from "./core/permissions-matrix.js";

const RMAP={admin:'accounts.html',operation_manager:'ops-dashboard.html',customer_service:'cs-dashboard.html',graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'};
const ROLE_LABEL={admin:'مدير النظام',operation_manager:'مدير العمليات',customer_service:'خدمة العملاء',graphic_designer:'مصمم جرافيك',design_operator:'مشغّل تصميم',production_agent:'مسؤول إنتاج',shipping_officer:'مسؤول شحن',wallet_manager:'أمين الخزنة'};
const EXEC=[['pending','⏳','انتظار'],['wip','🔄','جاري'],['done','✅','تم'],['problem','⚠️','مشكلة']];
const PSTAT={pending:{label:'في الانتظار',cls:'status-info',icon:'inbox'},wip:{label:'جاري التنفيذ',cls:'status-warning',icon:'loader'},done:{label:'مكتمل',cls:'status-success',icon:'check-circle-2'},problem:{label:'مشكلة',cls:'status-danger',icon:'alert-triangle'}};
const STATUS_FILTERS=[['all','الكل'],['pending','في الانتظار'],['wip','جاري'],['done','مكتمل'],['problem','مشكلة'],['nosup','بدون مورد'],['nocost','بدون تكلفة']];

const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG',{maximumFractionDigits:0});
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const drawIcons=()=>{try{window.lucide&&lucide.createIcons();}catch(_){}};
function toast(msg,type='ok'){
  const c=document.getElementById('toasts');
  const el=document.createElement('div');
  const col=type==='err'?'var(--danger)':type==='warn'?'var(--warning)':'var(--success)';
  el.style.cssText=`background:var(--surface-2);border:1px solid ${col};color:var(--ink);padding:10px 16px;border-radius:var(--r-pill);font-size:var(--fs-sm);box-shadow:var(--shadow-md);max-width:90vw`;
  el.textContent=msg;
  c.appendChild(el);
  setTimeout(()=>el.remove(),4000);
}

const deriveProdStatus=ps=>{
  if(!ps||!ps.length)return 'pending';
  if(ps.every(p=>p.execStatus==='done'))return 'done';
  if(ps.some(p=>p.execStatus==='problem'))return 'problem';
  return ps.some(p=>(p.execStatus||'pending')!=='pending')?'wip':'pending';
};
const orderCost=o=>(o.costItems||[]).reduce((s,c)=>s+(parseFloat(c.total)||0),0);
const hasNoSupplier=o=>(o.products||[]).some(p=>!p.supplierId);
const hasNoCost=o=>!(o.costItems||[]).length;
const orderCode=o=>o.orderNumber||o.orderCode||o.code||('#'+String(o._id||'').slice(-5));

let me={uid:'',name:'',role:'',perms:null};
let orders=[], suppliers=[], prodAgents=[];
let loaded={orders:false};
let filterK='all', mineOnly=false, searchQ='', supFilter='';
let openId=null;
let __started=false;

const canSeeCost=()=>canSeeField('supplier_cost',me.role,me.perms);

window.doLogout=async()=>{await signOut(auth);location.href='login.html';};

onAuthStateChanged(auth, async u=>{
  if(!u){location.href='login.html';return;}
  if(__started)return; __started=true;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(snap.exists()){
    const d=snap.data();
    const role=d.role||'customer_service';
    const pages=(d.permissions?.pages)||[];
    const isAdm=['admin','operation_manager'].includes(role);
    if(!isAdm && !pages.includes('*') && !pages.includes('production') && role!=='production_agent'){
      location.href=RMAP[role]||'login.html'; return;
    }
    me={uid:u.uid,name:d.name||u.email||'مستخدم',role,perms:d.permissions||null};
    document.getElementById('side-name').textContent=me.name;
    document.getElementById('side-av').textContent=(me.name[0]||'U').toUpperCase();
    const rl=ROLE_LABEL[role]||role;
    document.getElementById('side-role').textContent=rl;
    document.getElementById('side-role2').textContent=rl;
    // production_agent: افتح على "موكلة لي" بشكل افتراضي
    if(role==='production_agent'){mineOnly=true;syncMineButtons();}
  }

  // ── Orders ──
  onSnapshot(
    query(collection(db,'orders'),where('stage','==','production'),limit(1000)),
    s=>{orders=s.docs.map(x=>({...x.data(),_id:x.id}));loaded.orders=true;render();if(openId)renderDrawer(openId);},
    e=>{console.warn('[production-ds] orders:',e.message);loaded.orders=true;render();}
  );

  // ── Suppliers ──
  onSnapshot(
    query(collection(db,'suppliers_v2'),limit(500)),
    s=>{suppliers=s.docs.map(x=>({...x.data(),_id:x.id}));buildSupFilter();if(openId)renderDrawer(openId);},
    e=>console.warn('[production-ds] suppliers:',e.message)
  );

  // ── Production agents ──
  onSnapshot(
    query(collection(db,'employees'),where('role','==','production_agent'),limit(100)),
    s=>{prodAgents=s.docs.map(x=>({...x.data(),_id:x.id}));if(openId)renderDrawer(openId);},
    e=>console.warn('[production-ds] agents:',e.message)
  );
});

// ── Filter handlers (exposed globally for inline handlers) ──
window.onSearch=function(v){searchQ=v.toLowerCase().trim();render();};
window.setMine=function(val){mineOnly=val;syncMineButtons();render();};
window.setSupFilterVal=function(val){supFilter=val;buildSupFilter();render();};

function syncMineButtons(){
  document.getElementById('btn-mine').classList.toggle('active',mineOnly);
  document.getElementById('btn-all').classList.toggle('active',!mineOnly);
}

// ── Derived list ──
function filteredOrders(){
  let list=orders;
  if(mineOnly) list=list.filter(o=>o.productionAgent===me.uid);
  if(filterK==='nosup') list=list.filter(hasNoSupplier);
  else if(filterK==='nocost') list=list.filter(hasNoCost);
  else if(filterK!=='all') list=list.filter(o=>deriveProdStatus(o.products)===filterK);
  if(supFilter) list=list.filter(o=>(o.products||[]).some(p=>p.supplierId===supFilter));
  if(searchQ) list=list.filter(o=>{
    const q=searchQ;
    return (o.clientName||'').toLowerCase().includes(q)||
           (o.orderNumber||o.orderCode||o.code||'').toLowerCase().includes(q)||
           (o._id||'').toLowerCase().includes(q);
  });
  return list.slice().sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
}

// ── KPIs ──
function renderKPIs(){
  const total=orders.length;
  const done=orders.filter(o=>deriveProdStatus(o.products)==='done').length;
  const problem=orders.filter(o=>deriveProdStatus(o.products)==='problem').length;
  const noCost=orders.filter(hasNoCost).length;
  const noSup=orders.filter(hasNoSupplier).length;
  const late=orders.filter(o=>o.deadline&&new Date(o.deadline)<new Date()).length;
  const kpi=(icon,accent,label,val,hint)=>
    `<div class="ds-kpi" style="--kpi-accent:${accent}"><div class="ds-kpi-label"><span class="lic"><i data-lucide="${icon}"></i></span> ${label}</div><div class="ds-kpi-value ds-kpi-value-sm">${val}</div>${hint?`<div class="ds-kpi-delta flat">${hint}</div>`:''}</div>`;
  document.getElementById('dsx-kpis').innerHTML=
    kpi('factory','var(--accent)','في التنفيذ',fn(total))+
    kpi('check-circle-2','var(--success)','مكتمل',fn(done))+
    kpi('alert-triangle','var(--danger)','مشكلة',fn(problem))+
    kpi('building-2','var(--warning)','بدون مورد',fn(noSup))+
    kpi('receipt','var(--warning)','بدون تكلفة',fn(noCost))+
    kpi('alarm-clock','var(--danger)','متأخر',fn(late));
}

// ── Health Banner ──
function renderHealthBanner(){
  const noSup=orders.filter(hasNoSupplier);
  const noCst=orders.filter(hasNoCost);
  const el=document.getElementById('dsx-health');
  if(!noSup.length&&!noCst.length){el.style.display='none';return;}
  el.style.display='';
  const parts=[];
  if(noSup.length) parts.push(`${noSup.length} أوردر بدون مورد`);
  if(noCst.length) parts.push(`${noCst.length} أوردر بدون تكلفة`);
  el.innerHTML=`<div class="dsx-health">
    <span class="lic" style="color:var(--danger)"><i data-lucide="alert-triangle"></i></span>
    <div class="dsx-health-text">
      <div class="dsx-health-title">انتباه — أوردرات تحتاج معالجة</div>
      <div class="dsx-health-detail">${parts.join(' · ')}</div>
    </div>
    <div class="dsx-health-actions">
      ${noSup.length?`<button class="ds-btn ds-btn-ghost ds-btn-sm" onclick="filterK='nosup';render()"><span class="lic"><i data-lucide="building-2"></i></span> بدون مورد (${noSup.length})</button>`:''}
      ${noCst.length?`<button class="ds-btn ds-btn-ghost ds-btn-sm" onclick="filterK='nocost';render()"><span class="lic"><i data-lucide="receipt"></i></span> بدون تكلفة (${noCst.length})</button>`:''}
    </div>
  </div>`;
}

// ── Status filter tabs ──
function buildFilters(){
  document.getElementById('dsx-filters').innerHTML=STATUS_FILTERS.map(([k,label])=>{
    let n;
    if(k==='all') n=orders.length;
    else if(k==='nosup') n=orders.filter(hasNoSupplier).length;
    else if(k==='nocost') n=orders.filter(hasNoCost).length;
    else n=orders.filter(o=>deriveProdStatus(o.products)===k).length;
    return `<button class="ds-tab ${filterK===k?'is-active':''}" data-k="${k}">${label} <span style="opacity:.6">${n}</span></button>`;
  }).join('');
}
document.getElementById('dsx-filters').addEventListener('click',e=>{
  const b=e.target.closest('.ds-tab');if(!b)return;
  filterK=b.dataset.k;render();
});

// ── Supplier filter bar ──
function buildSupFilter(){
  const bar=document.getElementById('dsx-sup-bar');
  const usedIds=new Set(orders.flatMap(o=>(o.products||[]).map(p=>p.supplierId).filter(Boolean)));
  const used=suppliers.filter(s=>usedIds.has(s._id));
  if(!used.length){bar.style.display='none';return;}
  bar.style.display='';
  bar.innerHTML=
    `<button class="ds-tab ${!supFilter?'is-active':''}" onclick="window.setSupFilterVal('')">🏭 كل المطابع</button>`+
    used.map(s=>`<button class="ds-tab ${supFilter===s._id?'is-active':''}" onclick="window.setSupFilterVal('${esc(s._id)}')">${esc(s.name||s._id)}</button>`).join('');
}

// ── Main render ──
function render(){
  if(!loaded.orders)return;
  const list=filteredOrders();
  document.getElementById('dsx-sub').textContent=`${fn(orders.length)} طلب في مرحلة التنفيذ`;
  renderKPIs();
  renderHealthBanner();
  buildFilters();
  buildSupFilter();
  const board=document.getElementById('dsx-board');
  if(!list.length){
    board.innerHTML=`<div class="dsx-empty"><span class="lic"><i data-lucide="inbox"></i></span><div style="margin-top:8px">لا توجد طلبات في هذا التصنيف</div></div>`;
    drawIcons();return;
  }
  board.innerHTML=`<div class="dsx-board">`+list.map(o=>{
    const pst=PSTAT[deriveProdStatus(o.products)]||PSTAT.pending;
    const late=o.deadline&&new Date(o.deadline)<new Date();
    const np=(o.products||[]).length;
    const nd=(o.products||[]).filter(p=>p.execStatus==='done').length;
    const ismine=o.productionAgent===me.uid;
    const noSup=hasNoSupplier(o);
    const noCst=hasNoCost(o);
    return `<div class="order-card" data-id="${esc(o._id)}">
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">
        ${ismine&&!mineOnly?`<span class="oc-mine">👤 موكلة لي</span>`:''}
        ${late?`<span class="oc-flag danger"><span class="lic"><i data-lucide="alarm-clock"></i></span> متأخر</span>`:''}
        ${noSup?`<span class="oc-flag"><span class="lic"><i data-lucide="building-2"></i></span> بدون مورد</span>`:''}
        ${noCst?`<span class="oc-flag"><span class="lic"><i data-lucide="receipt"></i></span> بدون تكلفة</span>`:''}
      </div>
      <div class="oc-id">${esc(orderCode(o))}</div>
      <div class="oc-client">${esc(o.clientName||'—')}</div>
      <div class="oc-note">${nd}/${np} منتج${o.productionAgentName?' · 👷 '+esc(o.productionAgentName):''}</div>
      <div class="oc-footer">
        <span class="status ${pst.cls}"><span class="lic"><i data-lucide="${pst.icon}"></i></span> ${pst.label}</span>
        ${canSeeCost()?`<span class="oc-money"><span class="money">${fn(orderCost(o))}</span> ج</span>`:''}
      </div>
    </div>`;
  }).join('')+`</div>`;
  drawIcons();
}

// ── Drawer ──
document.getElementById('dsx-board').addEventListener('click',e=>{
  const c=e.target.closest('.order-card');if(!c)return;openDrawer(c.dataset.id);
});

function openDrawer(id){
  openId=id;
  document.getElementById('dsx-ov').classList.add('open');
  const dr=document.getElementById('dsx-drawer');
  dr.classList.add('open');
  dr.setAttribute('aria-hidden','false');
  renderDrawer(id);
}

window.__dsxClose=function(){
  openId=null;
  document.getElementById('dsx-ov').classList.remove('open');
  const dr=document.getElementById('dsx-drawer');
  dr.classList.remove('open');
  dr.setAttribute('aria-hidden','true');
};
document.addEventListener('keydown',e=>{if(e.key==='Escape')window.__dsxClose?.();});

const supplierOpts=(selId='')=>
  `<option value="">— بدون مورد —</option>`+
  suppliers.map(s=>`<option value="${esc(s._id)}" data-name="${esc(s.name||'')}" ${s._id===selId?'selected':''}>${esc(s.name||s._id)}</option>`).join('');

const agentOpts=(selId='')=>
  `<option value="">— اختر مندوب —</option>`+
  prodAgents.map(a=>`<option value="${esc(a._id)}" data-name="${esc(a.name||'')}" ${a._id===selId?'selected':''}>${esc(a.name||a._id)}</option>`).join('');

function timelineHTML(o){
  const tl=(o.timeline||[]).slice(-8).reverse();
  if(!tl.length)return '<div style="color:var(--ink-mute);font-size:var(--fs-xs)">لا يوجد سجل</div>';
  return `<div class="dsx-tl">`+tl.map(e=>`<div class="dsx-tl-e"><b>${esc(e.action||'')}</b><br>${esc(e.by||'')} · ${esc(e.date||'')}</div>`).join('')+`</div>`;
}

function renderDrawer(id){
  const o=orders.find(x=>x._id===id);
  const dr=document.getElementById('dsx-drawer');
  if(!o){
    dr.innerHTML=`<div class="dsx-dh"><div><h2>غير موجود</h2></div><button class="icon-btn" onclick="window.__dsxClose()"><span class="lic"><i data-lucide="x"></i></span></button></div>`;
    drawIcons();return;
  }
  const pst=PSTAT[deriveProdStatus(o.products)]||PSTAT.pending;
  const products=o.products||[];
  const costs=o.costItems||[];

  // ── Design preview ──
  const designUrl=(()=>{if(o.printFinalUrl)return o.printFinalUrl;for(const p of(o.products||[])){const a=Array.isArray(p.designImages)?p.designImages.filter(Boolean):[];if(a.length)return a[a.length-1];if(p.designImageUrl)return p.designImageUrl;}return o.designImageUrl||o.designFileUrl||(o.designFiles||[])[0]?.url;})();
  const designHTML=designUrl
    ?`<img class="design-thumb" src="${esc(designUrl)}" alt="تصميم" loading="lazy" onerror="this.style.display='none'">`
    :`<div style="color:var(--ink-mute);font-size:var(--fs-xs)">لا توجد صورة تصميم</div>`;

  // ── Products + exec status + supplier per product ──
  const prodHTML=products.length?products.map((p,i)=>{
    const cur=p.execStatus||'pending';
    return `<div class="prd">
      <div class="prd-left">
        <div class="prd-n">${esc(p.name||('منتج '+(i+1)))}</div>
        <div class="prd-sup">${p.supplierName?('🏭 '+esc(p.supplierName)):'<span style="color:var(--warning)">⚠️ بدون مورد</span>'}</div>
        <select class="sup-sel ds-input" data-pidx="${i}" data-act="setsup" style="margin-top:4px">${supplierOpts(p.supplierId||'')}</select>
      </div>
      <div class="prd-right">
        <span class="ex-btns" data-pidx="${i}">${EXEC.map(([k,ic,l])=>`<button class="ex-b ${cur===k?'on':''}" data-ex="${k}" title="${l}">${ic}</button>`).join('')}</span>
      </div>
    </div>`;
  }).join(''):'<div style="color:var(--ink-mute);font-size:var(--fs-xs)">لا توجد منتجات</div>';

  // ── Cost items ──
  let costHTML='';
  if(canSeeCost()){
    const rows=costs.length?costs.map((c,i)=>`<div class="cost-item">
      <span>${esc(c.type||'—')}${c.supplierName?' · '+esc(c.supplierName):''} ${c.paid?'<span class="status status-success" style="font-size:10px">مدفوع</span>':''}</span>
      <span style="display:flex;gap:8px;align-items:center">
        <span class="money">${fn(c.total)}</span> ج
        ${!c.paid?`<button class="icon-btn" style="width:24px;height:24px" data-act="delcost" data-idx="${i}" title="حذف"><span class="lic"><i data-lucide="trash-2"></i></span></button>`:''}
      </span></div>`).join('')
      :'<div style="color:var(--ink-mute);font-size:var(--fs-xs)">لا توجد تكاليف</div>';
    costHTML=`<div class="dsx-sec">
      <h4><span class="lic"><i data-lucide="receipt"></i></span> التكاليف (${fn(orderCost(o))} ج إجمالي)</h4>
      ${rows}
      <div class="dsx-form" style="margin-top:10px">
        <label>نوع التكلفة</label><input class="ds-input" id="c-type" placeholder="مثال: طباعة / ورق / قص">
        <label>المبلغ (ج)</label><input class="ds-input" id="c-total" type="number" min="0" value="0">
        <label>المورد (اختياري)</label><select class="ds-input" id="c-supplier">${supplierOpts()}</select>
        <label>ملاحظة</label><input class="ds-input" id="c-note" placeholder="اختياري">
      </div>
      <button class="ds-btn ds-btn-secondary ds-btn-sm w-full" data-act="addcost"><span class="lic"><i data-lucide="plus"></i></span> تسجيل تكلفة</button>
      <div style="text-align:center;margin-top:8px"><a href="exec-cost-entry.html?orderId=${esc(o._id)}" class="ds-btn ds-btn-ghost ds-btn-xs" style="font-size:var(--fs-xs)"><span class="lic"><i data-lucide="external-link"></i></span> فتح في مركز التكاليف</a></div>
    </div>`;
  }

  // ── Agent section ──
  const agentHTML=`<div class="dsx-sec">
    <h4><span class="lic"><i data-lucide="hard-hat"></i></span> مندوب التنفيذ</h4>
    ${o.productionAgentName?`<div class="dsx-row"><span class="k">المندوب الحالي</span><span class="v">👷 ${esc(o.productionAgentName)}</span></div>`:'<div style="color:var(--ink-3);font-size:var(--fs-xs)">لم يُعيَّن مندوب بعد</div>'}
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
      <select class="ds-input" id="agent-sel" style="flex:1">${agentOpts(o.productionAgent||'')}</select>
      <button class="ds-btn ds-btn-secondary ds-btn-sm" data-act="assignagent" style="flex-shrink:0"><span class="lic"><i data-lucide="user-check"></i></span> تعيين</button>
    </div>
    ${(!o.productionAgent&&me.role==='production_agent')?`<button class="ds-btn ds-btn-ghost ds-btn-sm w-full" style="margin-top:8px" data-act="pickup"><span class="lic"><i data-lucide="hand"></i></span> التقط الأوردر</button>`:''}
  </div>`;

  // ── Note ──
  const noteHTML=`<div class="dsx-sec">
    <h4><span class="lic"><i data-lucide="file-text"></i></span> ملاحظة الإنتاج</h4>
    <textarea class="ds-input" id="prod-note-ta" rows="3" placeholder="ملاحظة اختيارية…">${esc(o.prodNote||'')}</textarea>
    <button class="ds-btn ds-btn-ghost ds-btn-sm w-full" style="margin-top:8px" data-act="savenote"><span class="lic"><i data-lucide="save"></i></span> حفظ الملاحظة</button>
  </div>`;

  dr.innerHTML=`
    <div class="dsx-dh">
      <div>
        <h2>${esc(o.clientName||'—')}</h2>
        <div class="sub">${esc(orderCode(o))} · <span class="status ${pst.cls}"><span class="lic"><i data-lucide="${pst.icon}"></i></span> ${pst.label}</span></div>
      </div>
      <button class="icon-btn" onclick="window.__dsxClose()"><span class="lic"><i data-lucide="x"></i></span></button>
    </div>
    <div class="dsx-db">
      <div class="dsx-sec"><h4><span class="lic"><i data-lucide="image"></i></span> التصميم</h4>${designHTML}</div>
      <div class="dsx-sec"><h4><span class="lic"><i data-lucide="package"></i></span> المنتجات وحالة التنفيذ</h4>${prodHTML}</div>
      ${agentHTML}
      ${costHTML}
      ${noteHTML}
      <div class="dsx-sec">
        <h4><span class="lic"><i data-lucide="zap"></i></span> الإجراء</h4>
        <button class="ds-btn ds-btn-primary w-full" style="justify-content:center" data-act="toShip"><span class="lic"><i data-lucide="truck"></i></span> إرسال للشحن</button>
      </div>
      <div class="dsx-sec"><h4><span class="lic"><i data-lucide="history"></i></span> السجل</h4>${timelineHTML(o)}</div>
    </div>`;
  drawIcons();
}

// ── Action handler (all writes via central orderActions) ──
document.getElementById('dsx-drawer').addEventListener('click',async e=>{
  // exec status buttons
  const ex=e.target.closest('.ex-b');
  if(ex&&openId){
    const grp=ex.closest('[data-pidx]'); const prodIdx=parseInt(grp.dataset.pidx,10); const status=ex.dataset.ex;
    const o=orders.find(x=>x._id===openId); if(!o)return;
    const np=(o.products||[]).map((p,i)=>i===prodIdx?{...p,execStatus:status}:p);
    const lbl=(EXEC.find(([k])=>k===status)||[])[2]||status;
    ex.closest('.ex-btns').querySelectorAll('.ex-b').forEach(b=>b.classList.toggle('on',b===ex));
    const r=await orderActions.setProductExecStatus({db,orderId:openId,prodIdx,execStatus:status,derivedProdStatus:deriveProdStatus(np),statusLabel:lbl,userId:me.uid,userName:me.name});
    if(!(r&&r.ok))toast((r&&(r.errors||[])[0])||'تعذّر تحديث الحالة','err');
    return;
  }

  const btn=e.target.closest('[data-act]'); if(!btn||!openId)return;
  const act=btn.dataset.act; const orderId=openId;
  const base={db,orderId,role:me.role,userId:me.uid,userName:me.name};
  const $=id=>document.getElementById(id);

  // supplier per-product (select change is handled below, click needed for "assign" btn)
  if(act==='setsup') return; // handled in change listener

  btn.disabled=true;
  try{
    let r;
    if(act==='addcost'){
      const type=$('c-type').value.trim(); const total=parseFloat($('c-total').value)||0;
      if(!type||total<=0){toast('اكتب نوع التكلفة والمبلغ','warn');btn.disabled=false;return;}
      const sup=$('c-supplier');
      r=await orderActions.recordCostItem({...base,prodIdx:-1,payload:{type,total,supplierId:sup.value,supplierName:sup.value?(sup.options[sup.selectedIndex].dataset.name||''):'',note:$('c-note').value.trim()},wallets:[]});
    } else if(act==='delcost'){
      if(!confirm('حذف هذه التكلفة؟')){btn.disabled=false;return;}
      r=await orderActions.removeUnpaidCostItem({db,orderId,itemIndex:parseInt(btn.dataset.idx,10),userId:me.uid,userName:me.name});
    } else if(act==='toShip'){
      r=await orderActions.submitToShipping(base);
      if(r&&!r.ok&&(r.warnings||[]).length&&!(r.errors||[]).length){
        if(confirm('تنبيهات:\n- '+r.warnings.join('\n- ')+'\n\nإرسال للشحن رغم التنبيهات؟')){
          r=await orderActions.submitToShipping({...base,bypassWarnings:true});
        } else{btn.disabled=false;return;}
      }
    } else if(act==='assignagent'){
      const sel=$('agent-sel'); if(!sel||!sel.value){toast('اختر مندوباً أولاً','warn');btn.disabled=false;return;}
      const agentId=sel.value; const agentName=sel.options[sel.selectedIndex].dataset.name||agentId;
      r=await orderActions.assignProductionAgent({db,orderId,agentId,agentName,userId:me.uid,userName:me.name});
    } else if(act==='pickup'){
      r=await orderActions.assignProductionAgent({db,orderId,agentId:me.uid,agentName:me.name,userId:me.uid,userName:me.name,pickup:true});
    } else if(act==='savenote'){
      const note=($('prod-note-ta').value||'').trim();
      r=await orderActions.updateProductionNote({db,orderId,note});
    }
    if(r&&r.ok){
      const msg=(r.warnings&&r.warnings.length)?('تم ✓ ('+r.warnings.join(' · ')+')'):'تم بنجاح ✓';
      toast(msg,'ok');
      if(act==='toShip')window.__dsxClose();
    } else { toast((r&&(r.errors||[])[0])||'تعذّر تنفيذ العملية','err'); }
  }catch(err){ console.warn('[production-ds] action',act,err); toast(err.message||'خطأ غير متوقع','err'); }
  btn.disabled=false;
});

// ── Supplier-per-product (select change) ──
document.getElementById('dsx-drawer').addEventListener('change',async e=>{
  const sel=e.target.closest('select[data-act="setsup"]'); if(!sel||!openId)return;
  const prodIdx=parseInt(sel.dataset.pidx,10);
  const supplierId=sel.value;
  const supplierName=sel.value?(sel.options[sel.selectedIndex].dataset.name||''):'';
  const r=await orderActions.setProductSupplier({db,orderId:openId,prodIdx,supplierId,supplierName,userId:me.uid,userName:me.name});
  if(r&&r.ok){toast('تم تحديث المورد ✓','ok');}
  else toast((r&&(r.errors||[])[0])||'تعذّر تحديث المورد','err');
});
</script>
