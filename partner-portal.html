<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<title>Partner Portal — Business2Card Marketplace</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;background:#0a0c14;color:#e6e9f0;min-height:100vh}
  .topbar{background:rgba(30,33,54,.85);backdrop-filter:blur(10px);padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:14px;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px}
  .brand-name{font-size:14px;font-weight:900}
  .brand-sub{font-size:11px;color:#8b95b1}
  .logout-btn{padding:6px 12px;border-radius:6px;border:1px solid rgba(255,61,110,.3);background:transparent;color:#ff3d6e;font-size:11px;cursor:pointer;font-family:inherit}

  .tabs{display:flex;gap:6px;padding:0 16px;margin-top:12px;border-bottom:1px solid rgba(255,255,255,.08);overflow-x:auto}
  .tab{padding:10px 16px;background:none;border:none;border-bottom:3px solid transparent;color:#8b95b1;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
  .tab:hover{color:#fff}
  .tab.active{color:#a78bfa;border-bottom-color:#a78bfa}

  .container{max-width:1100px;margin:0 auto;padding:18px}
  .card{background:rgba(30,33,54,.6);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin-bottom:14px}
  .ttl{font-size:14px;font-weight:800;margin-bottom:8px}
  .sub{font-size:11px;color:#8b95b1}

  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px}
  .kpi{background:rgba(30,33,54,.6);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px}
  .kpi-l{font-size:10px;color:#8b95b1;font-weight:700;margin-bottom:6px}
  .kpi-v{font-size:20px;font-weight:900}
  .kpi-v.in{color:#00d97e}
  .kpi-v.pend{color:#ffaa00}
  .kpi-v.dis{color:#ff3d6e}

  .item{background:rgba(30,33,54,.4);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px;margin-bottom:8px;font-size:13px}
  .item-h{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .item-t{font-weight:800}
  .item-m{font-size:11px;color:#8b95b1;margin-top:2px}
  .item-a{font-size:16px;font-weight:900;white-space:nowrap}
  .item-a.pos{color:#00d97e}
  .item-a.neg{color:#ff3d6e}

  .pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:800}
  .pl-pending{background:rgba(255,170,0,.15);color:#ffaa00}
  .pl-active{background:rgba(0,217,126,.15);color:#00d97e}
  .pl-paid{background:rgba(0,217,126,.15);color:#00d97e}
  .pl-suspended{background:rgba(255,61,110,.15);color:#ff3d6e}
  .pl-requested{background:rgba(167,139,250,.15);color:#a78bfa}
  .pl-reversed{background:rgba(136,136,136,.15);color:#aaa}

  .empty{text-align:center;padding:30px;color:#8b95b1;font-size:13px}
  .err{color:#ff3d6e;background:rgba(255,61,110,.08);padding:12px;border-radius:8px;font-size:13px;text-align:center}

  .login-card{max-width:380px;margin:60px auto;background:rgba(30,33,54,.7);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:24px}
  .login-card h2{font-size:18px;margin-bottom:6px;text-align:center}
  .login-card p{font-size:12px;color:#8b95b1;text-align:center;margin-bottom:18px}
  .inp{width:100%;padding:11px 14px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-family:inherit;font-size:13px;margin-bottom:10px}
  .btn-p{width:100%;padding:12px;background:linear-gradient(135deg,#a78bfa,#3b9eff);border:none;border-radius:8px;color:#fff;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer}
  .btn-p:disabled{opacity:.5;cursor:wait}
</style>
</head>
<body>

<div id="login-screen" style="display:none">
  <div class="login-card">
    <h2>🏛️ Partner Portal</h2>
    <p>دخول الشركاء الخارجيين (مرشنتس / مصممين / شركات شحن)</p>
    <input class="inp" id="pl-id" placeholder="🆔 معرّف المرشنت (مثال: merchant_042)">
    <input class="inp" id="pl-secret" type="password" placeholder="🔑 كود الوصول">
    <button class="btn-p" id="pl-btn" onclick="doLogin()">دخول</button>
    <p id="pl-err" style="color:#ff3d6e;margin-top:10px;display:none"></p>
    <div style="font-size:10px;color:#8b95b1;text-align:center;margin-top:14px;line-height:1.6">
      ℹ️ الـ partner portal اختياري — Phase 2.<br>
      الـ access token يُعطَى يدوياً من الـ admin عبر marketplace.html
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <header class="topbar">
    <div class="brand">
      <div style="width:32px;height:32px;background:linear-gradient(135deg,#a78bfa,#3b9eff);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px">🏛️</div>
      <div>
        <div class="brand-name" id="brand-tenant">— Partner —</div>
        <div class="brand-sub">Business2Card Partner Portal</div>
      </div>
    </div>
    <button class="logout-btn" onclick="doLogout()">خروج</button>
  </header>

  <div class="tabs">
    <button class="tab active" id="tab-overview" onclick="switchTab('overview')">📊 نظرة عامة</button>
    <button class="tab" id="tab-orders" onclick="switchTab('orders')">📦 الطلبات</button>
    <button class="tab" id="tab-commissions" onclick="switchTab('commissions')">💰 العمولات</button>
    <button class="tab" id="tab-payouts" onclick="switchTab('payouts')">💸 المدفوعات</button>
  </div>

  <div class="container" id="content"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDoc, onSnapshot, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithCustomToken, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-functions.js";

const app = initializeApp({apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"});
const db = getFirestore(app);
const auth = getAuth(app);
const functions = getFunctions(app, 'us-central1');
const partnerSignInFn = httpsCallable(functions, 'partnerSignIn');

const SESSION_TTL = 7 * 24 * 60 * 60 * 1000;
let session = null;
let tenant = null;
let orders = [], commissions = [], payouts = [], wallet = null;
let currentTab = 'overview';

const $ = id => document.getElementById(id);
const fn = n => Math.round((parseFloat(n)||0)*100)/100;
const fmt = n => fn(n).toLocaleString('ar-EG');
function escHtml(s){return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
const fmtTime = t => t?.seconds ? new Date(t.seconds*1000).toLocaleDateString('ar-EG') : '—';

// Boot
const stored = JSON.parse(localStorage.getItem('partnerSession') || 'null');
if(stored?.tenantId && stored.savedAt && (Date.now() - stored.savedAt < SESSION_TTL)){
  session = stored;
  startApp();
} else {
  $('login-screen').style.display = 'block';
}

window.doLogin = async function(){
  const tid = $('pl-id').value.trim();
  const secret = $('pl-secret').value.trim();
  if(!tid || !secret){ showErr('⚠️ أدخل المعرّف وكود الوصول'); return; }
  const btn = $('pl-btn');
  btn.disabled = true;
  try{
    // اطلب custom token من Cloud Function — الـ function تتحقق من
    // tenant.portalSecret عبر Admin SDK (آمن — secret لا يُكشف للعميل).
    const result = await partnerSignInFn({ tenantId: tid, secret });
    const { token, tenantId, displayName } = result.data || {};
    if(!token) throw new Error('لم يصل custom token');

    // وقّع الـ user عبر custom token
    await signInWithCustomToken(auth, token);

    session = { tenantId, displayName, savedAt: Date.now() };
    localStorage.setItem('partnerSession', JSON.stringify(session));
    startApp();
  }catch(e){
    const msg = e?.message || String(e);
    // Firebase Functions errors عادةً تجي بصيغة "FirebaseError: ..."
    const cleanMsg = msg.replace(/^FirebaseError:?\s*/, '');
    showErr('❌ ' + cleanMsg);
    btn.disabled = false;
  }
};

window.doLogout = async function(){
  try{ await signOut(auth); }catch(_){}
  localStorage.removeItem('partnerSession');
  location.reload();
};

function showErr(msg){
  const el = $('pl-err');
  el.textContent = msg;
  el.style.display = 'block';
}

async function startApp(){
  $('login-screen').style.display = 'none';
  $('app').style.display = 'block';
  $('brand-tenant').textContent = '🏢 ' + (session.displayName || session.tenantId);

  // اقرأ بيانات الـ tenant
  try{
    onSnapshot(doc(db,'tenants',session.tenantId), snap=>{
      tenant = snap.exists() ? { ...snap.data(), _id: snap.id } : null;
      // re-verify الـ secret من snapshot live (لو الـ admin غيّره)
      if(tenant && tenant.portalSecret !== JSON.parse(localStorage.getItem('partnerSession')||'{}').savedSecret){
        // OK — secret might be different, we keep the session as-is
      }
      render();
    });

    // Wallet — لو tenant.walletId موجود
    if(tenant?.walletId){
      onSnapshot(doc(db,'wallets',tenant.walletId), snap=>{
        wallet = snap.exists() ? snap.data() : null;
        render();
      }, err=>console.warn('[portal] wallet:', err.message));
    }

    // Marketplace orders
    onSnapshot(query(collection(db,'marketplace_orders'), where('tenantId','==',session.tenantId), orderBy('createdAt','desc'), limit(200)),
      snap=>{
        orders = snap.docs.map(d=>({...d.data(),_id:d.id}));
        render();
      },
      err=>console.warn('[portal] orders:', err.message)
    );

    // Commissions
    onSnapshot(query(collection(db,'commissions'), where('tenantId','==',session.tenantId), limit(200)),
      snap=>{
        commissions = snap.docs.map(d=>({...d.data(),_id:d.id}));
        render();
      },
      err=>console.warn('[portal] commissions:', err.message)
    );

    // Payouts
    onSnapshot(query(collection(db,'payouts'), where('tenantId','==',session.tenantId), limit(200)),
      snap=>{
        payouts = snap.docs.map(d=>({...d.data(),_id:d.id}));
        render();
      },
      err=>console.warn('[portal] payouts:', err.message)
    );
  }catch(e){
    $('content').innerHTML = `<div class="err">⛔ ${escHtml(e.message)}</div>`;
  }
}

window.switchTab = function(t){
  currentTab = t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  $('tab-'+t)?.classList.add('active');
  render();
};

function render(){
  const c = $('content');
  if(!tenant){ c.innerHTML = '<div class="empty">⏳ جاري التحميل...</div>'; return; }
  if(currentTab === 'overview') c.innerHTML = renderOverview();
  else if(currentTab === 'orders') c.innerHTML = renderOrders();
  else if(currentTab === 'commissions') c.innerHTML = renderCommissions();
  else if(currentTab === 'payouts') c.innerHTML = renderPayouts();
}

function renderOverview(){
  const totalOrders = orders.length;
  const fulfilled = orders.filter(o=>['fulfilled','captured'].includes(o.status)).length;
  const balance = wallet?.balance || 0;
  const pendingPayout = payouts.filter(p=>p.state === 'requested').reduce((s,p)=>s+(parseFloat(p.amount)||0), 0);
  const totalEarned = orders.reduce((s,o)=>s + (parseFloat(o.netToMerchant)||0), 0);

  return `
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-l">💰 الرصيد الحالي</div><div class="kpi-v in">${fmt(balance)} ج</div></div>
      <div class="kpi"><div class="kpi-l">📦 إجمالي الطلبات</div><div class="kpi-v">${totalOrders}</div></div>
      <div class="kpi"><div class="kpi-l">✅ منفّذة</div><div class="kpi-v in">${fulfilled}</div></div>
      <div class="kpi"><div class="kpi-l">💸 بانتظار الدفع</div><div class="kpi-v pend">${fmt(pendingPayout)} ج</div></div>
    </div>

    <div class="card">
      <div class="ttl">🏢 معلومات الحساب</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;font-size:12px;margin-top:8px">
        <div><b style="color:#8b95b1;font-size:10px;display:block">الاسم</b><span>${escHtml(tenant.displayName||tenant.legalName||'—')}</span></div>
        <div><b style="color:#8b95b1;font-size:10px;display:block">المعرّف</b><span style="font-family:monospace">${escHtml(tenant._id)}</span></div>
        <div><b style="color:#8b95b1;font-size:10px;display:block">KYC</b><span class="pill pl-${tenant.kycStatus||'pending'}">${tenant.kycStatus||'pending'}</span></div>
        <div><b style="color:#8b95b1;font-size:10px;display:block">العمولة</b><span>${((tenant.commissionRate||0.10)*100).toFixed(1)}%</span></div>
        <div><b style="color:#8b95b1;font-size:10px;display:block">المدينة</b><span>${escHtml(tenant.city||'—')}</span></div>
        <div><b style="color:#8b95b1;font-size:10px;display:block">إجمالي الإيراد</b><span>${fmt(totalEarned)} ج</span></div>
      </div>
    </div>

    <div class="card">
      <div class="ttl">📊 آخر 5 طلبات</div>
      ${orders.slice(0,5).length ? orders.slice(0,5).map(o=>`
        <div class="item">
          <div class="item-h">
            <div style="flex:1;min-width:0">
              <div class="item-t">📦 ${escHtml((o._id||'').slice(-8))}</div>
              <div class="item-m">${fmtTime(o.createdAt)} · <span class="pill pl-${o.status||'pending'}">${o.status||'—'}</span></div>
            </div>
            <div class="item-a pos">${fmt(o.netToMerchant||0)} ج</div>
          </div>
        </div>
      `).join('') : '<div class="empty">لا توجد طلبات بعد</div>'}
    </div>
  `;
}

function renderOrders(){
  if(!orders.length) return '<div class="empty">📭 لا توجد طلبات على المنصة بعد</div>';
  return `<div class="card"><div class="ttl">📦 كل الطلبات (${orders.length})</div>
    ${orders.map(o=>`
      <div class="item">
        <div class="item-h">
          <div style="flex:1;min-width:0">
            <div class="item-t">📦 ${escHtml((o._id||'').slice(-8))}</div>
            <div class="item-m">
              ${fmtTime(o.createdAt)} ·
              <span class="pill pl-${o.status||'pending'}">${escHtml(o.status||'—')}</span>
              · ${escHtml(o.customerName||'—')}
            </div>
          </div>
          <div class="item-a pos">${fmt(o.netToMerchant||0)} ج</div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:6px;font-size:11px;color:#8b95b1;margin-top:6px">
          <div>إجمالي: <b style="color:#fff">${fmt(o.grossAmount||0)} ج</b></div>
          <div>عمولة: <b style="color:#ffaa00">${fmt(o.commissionAmount||0)} ج</b></div>
          <div>شحن: <b style="color:#fff">${fmt(o.shippingFee||0)} ج</b></div>
        </div>
      </div>
    `).join('')}
  </div>`;
}

function renderCommissions(){
  if(!commissions.length) return '<div class="empty">📭 لا توجد commissions بعد</div>';
  return `<div class="card"><div class="ttl">💰 العمولات (${commissions.length})</div>
    ${commissions.map(c=>`
      <div class="item">
        <div class="item-h">
          <div style="flex:1">
            <div class="item-t">📋 ${escHtml((c.orderId||'').slice(-8))}</div>
            <div class="item-m">
              ${fmtTime(c.accruedAt || c.settledAt)} ·
              <span class="pill pl-${c.state}">${c.state}</span>
              · نسبة ${((c.rate||0)*100).toFixed(1)}%
            </div>
          </div>
          <div class="item-a ${c.amount<0?'neg':'pos'}">${fmt(c.amount)} ج</div>
        </div>
      </div>
    `).join('')}
  </div>`;
}

function renderPayouts(){
  if(!payouts.length) return '<div class="empty">📭 لا توجد دفعات بعد</div>';
  return `<div class="card"><div class="ttl">💸 المدفوعات (${payouts.length})</div>
    ${payouts.map(p=>`
      <div class="item">
        <div class="item-h">
          <div style="flex:1">
            <div class="item-t">💸 ${escHtml((p._id||'').slice(-8))}</div>
            <div class="item-m">
              ${fmtTime(p.requestedAt)} ·
              <span class="pill pl-${p.state}">${p.state}</span>
              ${p.bankRef ? `· bank: <b style="color:#fff">${escHtml(p.bankRef)}</b>` : ''}
            </div>
          </div>
          <div class="item-a neg">${fmt(p.amount)} ج</div>
        </div>
      </div>
    `).join('')}
  </div>`;
}
</script>
</body>
</html>
