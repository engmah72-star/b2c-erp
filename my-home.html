<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="B2C ERP">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Business2Card — صفحتي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css?v=44">
<link rel="stylesheet" href="features/my-home/my-home.css?v=4">
<script src="sidebar-config.js"></script>
<script src="sidebar.js"></script>
<script src="smart-sidebar.js?v=1" defer></script>
<script src="theme.js?v=4"></script>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand">
    <div class="nav-logo">🏠</div>
    <div>
      <div class="nav-brand-name">Business2Card</div>
      <div class="nav-brand-role" id="role-badge">ERP</div>
    </div>
  </div>
  <div class="nav-scroll" id="nav-links"></div>
  <div class="nav-foot">
    <div class="nav-user" id="nav-user-logout">
      <div class="nav-avatar" id="nav-av">A</div>
      <div>
        <div class="nav-user-name" id="nav-name">User</div>
        <div class="nav-user-role">تسجيل خروج</div>
      </div>
    </div>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button type="button" class="mob-menu-btn" id="mob-menu-btn">☰</button>
      <div><h1>🏠 صفحتي</h1><p id="sub">كل ما يخصّك في مكان واحد</p></div>
    </div>
  </div>
  <div class="content">
    <div id="mh-root"><div class="mh-notice">جاري التحميل…</div></div>
  </div>
</div>
</div>

<script type="module">
  import { auth } from './core/firebase-init.js';
  import { signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { initMyHome } from './features/my-home/controller.js';
  const doLogout = async () => { try { await signOut(auth); } catch (_) {} window.location.href = 'login.html'; };
  document.getElementById('nav-user-logout')?.addEventListener('click', doLogout);
  // toggleNav is provided globally by sidebar.js; guard in case it loads later.
  document.getElementById('mob-menu-btn')?.addEventListener('click', () => window.toggleNav && window.toggleNav());
  initMyHome();
</script>
</body>
</html>
