<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Business2Card — كارت رقمي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="stylesheet" href="shared.css?v=45">
<link rel="stylesheet" href="client-theme.css?v=1">
<style>
/* RULE U1 — التوكنز من shared.css. تنسيق خاص بصفحة الكارت العامة فقط. */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-ar);background:var(--bg);color:var(--snow);min-height:100vh;
  display:flex;justify-content:center;}
.card{width:100%;max-width:520px;background:var(--bg2);min-height:100vh;}
.cover{height:170px;background:linear-gradient(135deg,var(--p),var(--b));background-size:cover;background-position:center;position:relative;}
.logo{position:absolute;bottom:-44px;right:24px;width:92px;height:92px;border-radius:22px;
  background:var(--bg3);border:4px solid var(--bg2);overflow:hidden;display:flex;align-items:center;
  justify-content:center;font-size:36px;font-weight:var(--fw-heavy);color:var(--snow);}
.logo img{width:100%;height:100%;object-fit:cover;}
.body{padding:58px 24px 40px;}
h1{font-size:var(--fs-3xl);font-weight:var(--fw-heavy);margin-bottom:6px;}
.bio{font-size:var(--fs-md);color:var(--dim2);line-height:1.8;margin-bottom:20px;}
.actions{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
.act{flex:1;min-width:120px;padding:13px;border-radius:var(--rad);text-decoration:none;text-align:center;
  font-weight:var(--fw-extra);font-size:var(--fs-md);display:flex;align-items:center;justify-content:center;gap:8px;}
.act-call{background:linear-gradient(135deg,var(--p),var(--b));color:#fff;}
.act-wa{background:var(--cp-wa);color:var(--cp-wa-ink);}
.act-web{background:var(--bg3);color:var(--snow);border:1px solid var(--line);}
.sec{font-size:var(--fs-lg);font-weight:var(--fw-heavy);margin:24px 0 12px;display:flex;align-items:center;gap:8px;}
.sec::before{content:"";width:4px;height:18px;border-radius:3px;background:linear-gradient(var(--p),var(--b));}
.svc{display:flex;flex-wrap:wrap;gap:8px;}
.svc span{background:var(--bg3);border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:var(--fs-md);}
.social{display:flex;gap:12px;flex-wrap:wrap;}
.social a{width:46px;height:46px;border-radius:13px;background:var(--bg3);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:20px;text-decoration:none;}
.works{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.works .w{border-radius:12px;overflow:hidden;background:var(--bg3);}
.works img,.works video{width:100%;height:140px;object-fit:cover;display:block;}
.works a.pdf{display:flex;align-items:center;justify-content:center;height:140px;font-size:40px;text-decoration:none;}
.share{margin:26px 0 8px;text-align:center;}
.share img{width:150px;height:150px;background:#fff;padding:8px;border-radius:14px;}
.share .btn{display:inline-block;margin-top:12px;padding:12px 22px;border-radius:var(--rad);border:none;
  background:linear-gradient(135deg,var(--p),var(--b));color:#fff;font-family:inherit;font-weight:var(--fw-extra);
  font-size:var(--fs-md);cursor:pointer;}
.foot{text-align:center;color:var(--dim2);font-size:var(--fs-xs);padding:20px;}
.foot a{color:var(--p);text-decoration:none;}
#state{padding:80px 24px;text-align:center;color:var(--dim2);font-size:var(--fs-lg);line-height:1.8;}
</style>
</head>
<body>
<div class="card">
  <div id="state">⟳ جاري تحميل الكارت…</div>
  <div id="content" style="display:none">
    <div class="cover" id="cover"><div class="logo" id="logo">★</div></div>
    <div class="body">
      <h1 id="bizName"></h1>
      <div class="bio" id="bio"></div>
      <div class="actions" id="actions"></div>
      <div id="svc-sec" style="display:none"><div class="sec">الخدمات</div><div class="svc" id="services"></div></div>
      <div id="social-sec" style="display:none"><div class="sec">تابعنا</div><div class="social" id="social"></div></div>
      <div id="works-sec" style="display:none"><div class="sec">من أعمالنا</div><div class="works" id="works"></div></div>
      <div class="share">
        <div class="sec" style="justify-content:center">شارك الكارت</div>
        <img id="qr" alt="QR">
        <br><button class="btn" id="shareBtn">📤 مشاركة الكارت</button>
        <button class="btn" id="dlBtn">⬇️ تنزيل QR</button>
      </div>
    </div>
    <div class="foot">صُنع عبر <a href="client-login.html">Business2Card</a></div>
  </div>
</div>

<script type="module">
import { db } from "./core/firebase-init.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const $ = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s).replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
const id = new URLSearchParams(location.search).get('id');

function normWa(n){ let s=(n||'').replace(/[^\d+]/g,''); if(s.startsWith('00'))s=s.slice(2); if(s.startsWith('0'))s='2'+s; return s; }

(async function load() {
  if (!id) { $('state').textContent = '⚠️ رابط غير صالح — لا يوجد معرّف كارت.'; return; }
  let c;
  try {
    const snap = await getDoc(doc(db, 'public_cards', id));
    if (!snap.exists()) { $('state').innerHTML = '🔍 الكارت غير موجود أو لم يُنشر بعد.'; return; }
    c = snap.data();
  } catch (e) {
    $('state').textContent = '❌ تعذّر تحميل الكارت: ' + (e.message || '');
    return;
  }

  document.title = (c.bizName || 'كارت رقمي') + ' — Business2Card';
  if (c.coverUrl) $('cover').style.backgroundImage = `url("${c.coverUrl}")`;
  if (c.logoUrl) $('logo').innerHTML = `<img src="${esc(c.logoUrl)}" alt="">`;
  else $('logo').textContent = (c.bizName || '★').trim()[0] || '★';
  $('bizName').textContent = c.bizName || '';
  $('bio').textContent = c.bio || '';

  // أزرار التواصل
  let acts = '';
  if (c.phone) acts += `<a class="act act-call" href="tel:${esc(c.phone)}">📞 اتصال</a>`;
  if (c.whatsapp) acts += `<a class="act act-wa" href="https://wa.me/${esc(normWa(c.whatsapp))}" target="_blank">💬 واتساب</a>`;
  if (c.website) acts += `<a class="act act-web" href="${esc(c.website)}" target="_blank">🌐 الموقع</a>`;
  $('actions').innerHTML = acts;

  // الخدمات
  const svcs = (c.services || []).filter(Boolean);
  if (svcs.length) { $('svc-sec').style.display = 'block'; $('services').innerHTML = svcs.map(s => `<span>${esc(s)}</span>`).join(''); }

  // سوشيال
  const so = c.social || {};
  const icons = { facebook: '📘', instagram: '📸', tiktok: '🎵', linkedin: '💼' };
  let social = '';
  for (const k of Object.keys(icons)) {
    if (so[k]) {
      let href = so[k];
      if (!/^https?:\/\//.test(href)) {
        const u = href.replace(/^@/, '');
        href = k === 'facebook' ? 'https://facebook.com/' + u
             : k === 'instagram' ? 'https://instagram.com/' + u
             : k === 'tiktok' ? 'https://tiktok.com/@' + u
             : 'https://' + href;
      }
      social += `<a href="${esc(href)}" target="_blank" title="${k}">${icons[k]}</a>`;
    }
  }
  if (social) { $('social-sec').style.display = 'block'; $('social').innerHTML = social; }

  // معرض الأعمال
  const works = (c.works || []).filter(w => w && w.url);
  if (works.length) {
    $('works-sec').style.display = 'block';
    $('works').innerHTML = works.map(w => {
      if (w.type === 'video') return `<div class="w"><video src="${esc(w.url)}" controls></video></div>`;
      if (w.type === 'pdf') return `<div class="w"><a class="pdf" href="${esc(w.url)}" target="_blank">📄</a></div>`;
      return `<div class="w"><img src="${esc(w.url)}" alt=""></div>`;
    }).join('');
  }

  // QR + مشاركة
  $('qr').src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=0&data=' + encodeURIComponent(location.href);
  $('shareBtn').addEventListener('click', async () => {
    if (navigator.share) { try { await navigator.share({ title: c.bizName || 'كارت رقمي', url: location.href }); } catch (_) {} }
    else { try { await navigator.clipboard.writeText(location.href); alert('✅ تم نسخ الرابط'); } catch (_) { prompt('انسخ الرابط:', location.href); } }
  });
  $('dlBtn').addEventListener('click', async () => {
    const big = 'https://api.qrserver.com/v1/create-qr-code/?size=600x600&margin=0&data=' + encodeURIComponent(location.href);
    try { const r = await fetch(big, { mode: 'cors' }); const b = await r.blob(); const a = document.createElement('a');
      a.href = URL.createObjectURL(b); a.download = (c.bizName || 'business2card') + '-qr.png';
      document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(a.href), 1500);
    } catch (_) { window.open(big, '_blank', 'noopener'); }
  });

  $('state').style.display = 'none';
  $('content').style.display = 'block';
})();
</script>
</body>
</html>
