<style>
.off-shell{display:grid;grid-template-columns:300px 1fr;height:100vh;overflow:hidden}
@media(max-width:768px){
  .off-shell{display:block;height:100vh;overflow:hidden}
  .off-list{height:100vh;transition:opacity .2s}
  .off-shell.mob-ws .off-list{display:none}
  .off-main{height:100vh}
  .off-shell:not(.mob-ws) .off-main{display:none}
}
.off-list{display:flex;flex-direction:column;border-left:1px solid var(--line);background:var(--bg1);overflow:hidden}
.off-list-hdr{padding:10px 12px;border-bottom:1px solid var(--line);flex-shrink:0;background:var(--bg2)}
.off-list-body{flex:1;overflow-y:auto;padding:8px}
.off-ocard{padding:10px 12px;border-radius:10px;background:var(--bg2);border:1px solid var(--line);margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.off-ocard:hover{border-color:rgba(255,170,0,.5)}
.off-ocard.active{border-color:var(--y);background:rgba(255,170,0,.06)}
.off-main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg1)}
.off-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--dim2)}
.off-order{display:flex;flex-direction:column;flex:1;overflow:hidden}
.off-order-hdr{padding:12px 16px;border-bottom:1px solid var(--line);background:var(--bg2);flex-shrink:0}
.off-tabs{display:flex;border-bottom:1px solid var(--line);background:var(--bg2);flex-shrink:0;overflow-x:auto}
.off-tab{padding:10px 18px;font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--dim2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;white-space:nowrap;transition:color .15s,border-color .15s}
.off-tab.on{color:var(--y);border-bottom-color:var(--y)}
.off-pane{display:none;flex:1;overflow-y:auto;padding:16px}
.off-pane.on{display:block}
.off-inp{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--line);border-radius:8px;color:var(--snow);font-size:var(--fs-sm);font-family:inherit;box-sizing:border-box}
.off-label{font-size:10px;color:var(--dim2);font-weight:var(--fw-bold);margin-bottom:3px;display:block}
.off-field{margin-bottom:10px}
.off-g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.off-btn{padding:8px 14px;border-radius:9px;border:1px solid var(--line);background:var(--bg3);color:var(--snow);font-size:var(--fs-sm);font-weight:var(--fw-bold);cursor:pointer;font-family:inherit;transition:all .15s}
.off-btn-y{background:rgba(255,170,0,.13);border-color:var(--y);color:var(--y)}
.off-btn-g{background:rgba(0,217,126,.1);border-color:var(--g);color:var(--g)}
.off-btn-r{background:rgba(255,80,80,.1);border-color:var(--r);color:var(--r)}
.off-btn-wa{background:#25d366;border-color:#25d366;color:#fff}
.off-btn:disabled{opacity:.45;cursor:not-allowed}
.off-card{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px}
.off-sec-hd{font-size:var(--fs-xs);font-weight:var(--fw-bold);color:var(--dim2);margin-bottom:10px}
.off-fltr{padding:3px 10px;border-radius:12px;border:1px solid var(--line);background:var(--bg3);color:var(--dim2);font-size:11px;font-weight:var(--fw-bold);cursor:pointer;font-family:inherit}
.off-fltr.on{background:rgba(255,170,0,.15);border-color:var(--y);color:var(--y)}
.off-prod-btn{padding:4px 12px;border-radius:10px;border:1px solid var(--line);background:var(--bg2);color:var(--dim2);font-size:var(--fs-xs);font-weight:var(--fw-bold);cursor:pointer;font-family:inherit;transition:all .15s}
.off-prod-btn.on{background:rgba(255,170,0,.13);border-color:var(--y);color:var(--y)}
</style>
</head>
<body class="body-sidebar">
<app-sidebar page="print.html"></app-sidebar>

<div class="off-shell">
  <!-- قائمة الأوردرات -->
  <div class="off-list">
    <div class="off-list-hdr">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <span style="font-size:16px;font-weight:var(--fw-heavy);color:var(--y)">🖨️ طباعة الأوفست</span>
        <span id="off-count" style="font-size:10px;color:var(--dim2);background:var(--bg3);border-radius:8px;padding:1px 7px"></span>
      </div>
      <input class="off-inp" type="search" placeholder="بحث بالاسم أو الأوردر..." oninput="offSearch(this.value)" style="margin-bottom:8px">
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        <button class="off-fltr on" onclick="offFilter('all',this)">الكل</button>
        <button class="off-fltr"    onclick="offFilter('ready',this)">جاهز</button>
        <button class="off-fltr"    onclick="offFilter('at-press',this)">بالمطبعة</button>
        <button class="off-fltr"    onclick="offFilter('no-cost',this)">بدون تكلفة</button>
      </div>
    </div>
    <div class="off-list-body" id="off-list-body">
      <div style="text-align:center;padding:40px;color:var(--dim2)">جاري التحميل…</div>
    </div>
  </div>

  <!-- مساحة العمل -->
  <div class="off-main">
    <div class="off-empty" id="off-empty">
      <div style="font-size:56px;opacity:.25">🖨️</div>
      <div style="font-size:var(--fs-sm)">اختار أوردر من القائمة</div>
    </div>
    <div class="off-order" id="off-order" style="display:none">
      <div id="off-order-hdr" class="off-order-hdr">
        <button onclick="offBack()" class="off-btn" style="display:none;margin-bottom:8px;padding:5px 12px;font-size:var(--fs-xs)" id="off-back-btn">→ رجوع للقائمة</button>
      </div>
      <div class="off-tabs">
        <button class="off-tab on" onclick="offTab('calc',this)">📐 الحاسبة<span id="off-tbadge-calc"></span></button>
        <button class="off-tab"    onclick="offTab('cost',this)">💰 التكلفة<span id="off-tbadge-cost"></span></button>
        <button class="off-tab"    onclick="offTab('press',this)">🏭 المطبعة<span id="off-tbadge-press"></span></button>
      </div>
      <div class="off-pane on" id="off-pane-calc"></div>
      <div class="off-pane"    id="off-pane-cost"></div>
      <div class="off-pane"    id="off-pane-press"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="off-toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 18px;font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--snow);z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center"></div>

<script type="module">
import { auth, db } from "./core/firebase-init.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, doc, getDoc, onSnapshot, query, where, limit, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { orderActions } from "./order-actions.js";
import { productionActions } from "./production-actions.js";
import { productStatusBadge } from "./orders.js";

// ── حالة ──
let orders=[], activeId='', activeOrder=null, activeProdIdx=0;
let suppliers=[], appSettings={}, briefTemplates=[];
let currentRole='', userName='', currentUid='';
let _listFilter='all', _listSearch='';
let _calcState=null; // الحالة المشتركة بين التابات — تُحسب مرة واحدة وتُعرض في الثلاثة

// ── مقاسات الماكينات (ستاندر + جاير لكل تير) ──
const MACHINE_TIERS=[
  {id:'tumn', label:'تمن',       sizes:[{w:25,h:35},{w:22,h:33}]},
  {id:'rub3', label:'ربع',       sizes:[{w:35,h:50},{w:33,h:44}]},
  {id:'nus',  label:'نصف',       sizes:[{w:50,h:70},{w:44,h:66}]},
  {id:'kaml', label:'كامل',      sizes:[{w:70,h:100},{w:66,h:88}]},
];
function getTierLabel(id){return MACHINE_TIERS.find(t=>t.id===id)?.label||id;}
function pmMatchesTier(pm,tierId){
  const eng=window.offsetCostEngine;
  const tier=MACHINE_TIERS.find(t=>t.id===tierId);
  if(!tier||!eng)return false;
  const sz=eng.parseSizePair(pm.originalSize||'');
  if(!sz)return false;
  const tol=0.6;
  // الورق يناسب التير إذا كانت أبعاده ≤ أقصى مقاس لإحدى ماكيناته
  return tier.sizes.some(ms=>{
    const fitsN=sz.w<=ms.w+tol&&sz.h<=ms.h+tol;
    const fitsR=sz.h<=ms.w+tol&&sz.w<=ms.h+tol;
    return fitsN||fitsR;
  });
}
function getActiveTier(allRankings,preferredTier){
  const tierOrder=['tumn','rub3','nus','kaml'];
  const pi=tierOrder.indexOf(preferredTier);
  for(let i=pi;i<tierOrder.length;i++){
    const t=tierOrder[i];
    // تُعرض فقط الأوراق التي تعطي قطعاً فعلية لمقاس الطباعة المحدد
    const papers=allRankings.filter(pm=>pmMatchesTier(pm,t)&&pm.pcs>0);
    if(papers.length)return{tierId:t,papers,upgraded:i>pi};
  }
  return{tierId:preferredTier,papers:[],upgraded:false};
}

// ── مساعدات ──
const $  = id => document.getElementById(id);
const escH = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const escAttr = s => escH(s).replace(/"/g,'&quot;');
const fmt = n => (parseFloat(n)||0).toLocaleString('ar-EG');
const nowStr = () => new Date().toLocaleDateString('ar-EG')+' '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});

let _toastTm;
function toast(msg,type='ok'){
  const el=$('off-toast');if(!el)return;
  el.textContent=msg;
  el.style.borderColor=type==='err'?'var(--r)':type==='warn'?'var(--y)':'var(--g)';
  el.style.color=type==='err'?'var(--r)':type==='warn'?'var(--y)':'var(--snow)';
  el.style.opacity='1';clearTimeout(_toastTm);_toastTm=setTimeout(()=>{el.style.opacity='0';},3200);
}

function getPaperMeta(name){
  return (Array.isArray(appSettings.paperTypesData)?appSettings.paperTypesData:[]).find(p=>p.name===name)||null;
}
function getPresses(){
  return suppliers.filter(s=>['مطبعة أوفست','أوفست + ديجيتال'].includes(s.category||s.type||''));
}
function computeOffsetReadiness(p){
  const crit=[
    {ok:(parseFloat(p.qty)||0)>0,         label:'الكمية محددة'},
    {ok:!!(p.printSize||p.size),           label:'مقاس الطباعة محدد'},
    {ok:!!p.paper,                         label:'نوع الورق محدد'},
    {ok:!!p.lamination,                    label:'السلوفان محدد'},
    {ok:!!p.zinkType,                      label:'نوع الزنكات محدد'},
    {ok:(parseFloat(p.paperSheets)||0)>0,  label:'عدد الفروخ محدد'},
    {ok:!!p.cutSize,                       label:'مقاس القص محدد'},
    {ok:!!p.pressId,                       label:'مورد الطباعة محدد', tab:'press'},
  ];
  const cDone=crit.filter(c=>c.ok).length;
  return{crit,cDone,cTotal:crit.length,pct:Math.round(cDone/crit.length*100),ready:cDone===crit.length};
}
function getOffsetStatus(o){
  const prods=o.products||[];
  const hasCost=(o.costItems||[]).length>0;
  const allPrinted=prods.length&&prods.every(p=>['printed','done'].includes(p.productStatus||''));
  if(allPrinted)return'printed';
  if(prods.some(p=>!!p.briefSentAt))return'at-press';
  if(!hasCost)return'no-cost';
  const r=computeOffsetReadiness((prods.find(p=>(p.printType||'').includes('offset'))||prods[0]||{}));
  return r.pct>=80?'ready':'other';
}

// ── Auth ──
let _authDone=false;
onAuthStateChanged(auth,async u=>{
  if(!u){location.href='login.html';return;}
  if(_authDone)return;_authDone=true;
  currentUid=u.uid;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(snap.exists()){
    const d=snap.data();
    currentRole=d.role||'';
    const pages=(d.permissions?.pages)||[];
    const isAdm=['admin','operation_manager'].includes(currentRole);
    if(!isAdm&&!pages.includes('*')&&!pages.includes('print')){location.href='login.html';return;}
    userName=d.name||u.email||'';
    const av=$('nav-av');if(av)av.textContent=(userName[0]||'A').toUpperCase();
    const rb=$('role-badge');if(rb)rb.textContent=currentRole;
    if(typeof B2CSidebar!=='undefined')B2CSidebar.build(d,'print.html');
  }
  startListeners();
});

// ── Listeners ──
function startListeners(){
  onSnapshot(query(collection(db,'orders'),where('stage','==','printing'),orderBy('createdAt','desc'),limit(150)),snap=>{
    orders=snap.docs
      .map(d=>({...d.data(),_id:d.id}))
      .filter(o=>(o.products||[]).some(p=>(p.printType||'').includes('offset')));
    if($('off-count'))$('off-count').textContent=orders.length+' أوردر';
    renderList();
    if(activeId){const o=orders.find(x=>x._id===activeId);if(o){activeOrder=o;renderWorkspace(o);}}
  });
  onSnapshot(doc(db,'settings','main'),snap=>{
    if(snap.exists())appSettings=snap.data();
  });
  onSnapshot(query(collection(db,'suppliers'),where('active','!=',false),limit(100)),snap=>{
    suppliers=snap.docs.map(d=>({...d.data(),_id:d.id}));
  });
  onSnapshot(doc(db,'master_lists','print_brief_templates'),snap=>{
    briefTemplates=snap.exists()?(snap.data()?.items||[]):[];
  });
}

// ── قائمة ──
window.offFilter=function(f,btn){
  _listFilter=f;
  document.querySelectorAll('.off-fltr').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  renderList();
};
window.offSearch=function(q){_listSearch=q;renderList();};

function renderList(){
  const el=$('off-list-body');if(!el)return;
  let list=orders;
  if(_listSearch){const q=_listSearch.trim().toLowerCase();list=list.filter(o=>(o.clientName||'').toLowerCase().includes(q)||(o.orderId||'').toLowerCase().includes(q));}
  if(_listFilter!=='all')list=list.filter(o=>getOffsetStatus(o)===_listFilter);
  if(!list.length){el.innerHTML=`<div style="text-align:center;padding:40px;color:var(--dim2)">لا توجد أوردرات</div>`;return;}
  el.innerHTML=list.map(o=>{
    const st=getOffsetStatus(o);
    const stCol=st==='printed'?'var(--g)':st==='at-press'?'#3b9eff':st==='ready'?'var(--y)':st==='no-cost'?'var(--r)':'var(--dim2)';
    const stLbl=st==='printed'?'✓ مطبوع':st==='at-press'?'🏭 بالمطبعة':st==='ready'?'⚡ جاهز':st==='no-cost'?'⚠️ بدون تكلفة':'⏳ قيد التجهيز';
    const offProds=(o.products||[]).filter(p=>(p.printType||'').includes('offset'));
    const totalCost=(o.costItems||[]).reduce((s,ci)=>s+(parseFloat(ci.total)||0),0);
    const sale=parseFloat(o.salePrice)||0;
    const margin=sale>0&&totalCost>0?Math.round((sale-totalCost)/sale*100):null;
    // أول منتج أوفست للمواصفات السريعة
    const p0=offProds[0]||{};
    const r0=computeOffsetReadiness(p0);
    const barCol=r0.ready?'var(--g)':r0.pct>=60?'var(--y)':'var(--r)';
    const zinkStr=p0.zinkType||(p0.frontColors!=null?(p0.frontColors+'+'+(p0.backColors||0)):null);
    const deadline=p0.pressDeadline?new Date(p0.pressDeadline):null;
    const deadlineTxt=deadline?deadline.toLocaleDateString('ar-EG',{month:'short',day:'numeric'}):null;
    const isOverdue=deadline&&deadline<new Date()&&!['printed','done'].includes(p0.productStatus||'');
    return`<div class="off-ocard${o._id===activeId?' active':''}" onclick="offSelect('${o._id}')">
      <!-- الرأس -->
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px">
        <div style="font-size:var(--fs-sm);font-weight:var(--fw-heavy);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(o.clientName||'—')}</div>
        <span style="font-size:9px;padding:1px 7px;border-radius:8px;border:1px solid;color:${stCol};border-color:${stCol};white-space:nowrap;flex-shrink:0">${stLbl}</span>
      </div>
      <!-- شريط الجاهزية -->
      <div style="display:flex;align-items:center;gap:5px;margin-bottom:5px">
        <div style="flex:1;height:3px;border-radius:2px;background:var(--bg3);overflow:hidden">
          <div style="width:${r0.pct}%;height:100%;background:${barCol};border-radius:2px"></div>
        </div>
        <span style="font-size:9px;color:${barCol};font-weight:var(--fw-bold);flex-shrink:0">${r0.pct}%</span>
      </div>
      <!-- المواصفات السريعة -->
      <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px">
        ${p0.paper?`<span style="font-size:9px;background:var(--bg3);border-radius:5px;padding:1px 6px;color:var(--dim2)">📄 ${escH(p0.paper)}</span>`:''}
        ${zinkStr?`<span style="font-size:9px;background:rgba(255,200,0,.1);border-radius:5px;padding:1px 6px;color:var(--y)">🟨 ${escH(zinkStr)}</span>`:''}
        ${p0.pressName?`<span style="font-size:9px;background:rgba(59,158,255,.08);border-radius:5px;padding:1px 6px;color:#3b9eff">🏭 ${escH(p0.pressName)}</span>`:''}
        ${deadlineTxt?`<span style="font-size:9px;background:${isOverdue?'rgba(255,80,80,.12)':'var(--bg3)'};border-radius:5px;padding:1px 6px;color:${isOverdue?'var(--r)':'var(--dim2)'}">📅 ${deadlineTxt}${isOverdue?' ⚠️':''}</span>`:''}
      </div>
      <!-- التكلفة والهامش -->
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:9px;color:var(--dim2)">${escH(o.orderId||o._id.slice(-6))} · ${offProds.length} منتج</span>
        <div style="display:flex;gap:6px;align-items:center">
          ${totalCost>0?`<span style="font-size:9px;color:var(--y);font-weight:var(--fw-bold)">💰 ${fmt(totalCost)} ج</span>`:''}
          ${margin!=null?`<span style="font-size:9px;color:${margin>=0?'var(--g)':'var(--r)'};font-weight:var(--fw-bold)">${margin>=0?'+':''}${margin}%</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

window.offSelect=function(id){
  activeId=id;activeOrder=orders.find(o=>o._id===id)||null;activeProdIdx=0;
  if(!activeOrder)return;
  $('off-empty').style.display='none';
  $('off-order').style.display='flex';
  // موبايل: افتح الـ workspace أولاً قبل أي render
  const isMob=window.innerWidth<=768;
  const shell=document.querySelector('.off-shell');
  if(isMob&&shell)shell.classList.add('mob-ws');
  const backBtn=$('off-back-btn');
  if(backBtn)backBtn.style.display=isMob?'block':'none';
  renderList();
  try{renderWorkspace(activeOrder);}catch(e){
    console.error('renderWorkspace error',e);
    const ep=$('off-pane-calc');
    if(ep)ep.innerHTML=`<div style="padding:20px;color:var(--r);font-size:11px;word-break:break-all">⛔ ${e.message||e}</div>`;
  }
};
window.offBack=function(){
  document.querySelector('.off-shell')?.classList.remove('mob-ws');
  $('off-back-btn').style.display='none';
};

// ── مساحة العمل ──
window.offTab=function(name,btn){
  document.querySelectorAll('.off-tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.off-pane').forEach(p=>p.classList.remove('on'));
  if(btn)btn.classList.add('on');
  else{const t=[...document.querySelectorAll('.off-tab')].find(b=>(b.getAttribute('onclick')||'').includes(`'${name}'`));if(t)t.classList.add('on');}
  $('off-pane-'+name)?.classList.add('on');
  if(activeOrder){
    if(name==='calc')renderCalcTab(activeOrder);
    else if(name==='cost'){renderCostTab(activeOrder);propagateCalcState(activeOrder);}
    else if(name==='press'){renderPressTab(activeOrder);propagateCalcState(activeOrder);}
  }
};
window.switchTab=name=>window.offTab(name,null);

function renderWorkspace(o){
  renderHeader(o);
  const active=document.querySelector('.off-pane.on')?.id?.replace('off-pane-','')||'calc';
  if(active==='calc')renderCalcTab(o);
  else if(active==='cost')renderCostTab(o);
  else if(active==='press')renderPressTab(o);
}

function renderHeader(o){
  const el=$('off-order-hdr');if(!el)return;
  const totalCost=(o.costItems||[]).reduce((s,ci)=>s+(parseFloat(ci.total)||0),0);
  const sale=parseFloat(o.salePrice)||0;
  const margin=sale-totalCost;
  el.innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
      <div>
        <div style="font-size:16px;font-weight:var(--fw-heavy)">${escH(o.clientName||'—')}</div>
        <div style="font-size:var(--fs-xs);color:var(--dim2);margin-top:2px">${escH(o.orderId||o._id.slice(-6))} · ${(o.products||[]).filter(p=>(p.printType||'').includes('offset')).length} منتج أوفست</div>
      </div>
      <div style="text-align:left;flex-shrink:0">
        ${sale>0?`<div style="font-size:10px;color:var(--dim2)">الهامش</div>
        <div style="font-size:20px;font-weight:var(--fw-heavy);color:${margin>=0?'var(--g)':'var(--r)'}">${margin>=0?'+':''}${fmt(margin)} ج</div>`:''}
      </div>
    </div>`;
}

// ── حساب نتائج الحاسبة (منفصلة عن الـ inputs) ──
function buildCalcResults(o, idx){
  const p=(o.products||[])[idx];if(!p)return'';
  const eng=window.offsetCostEngine;
  const paperMeta=getPaperMeta(p.paper||'');
  const allPapersData=Array.isArray(appSettings.paperTypesData)?appSettings.paperTypesData.filter(Boolean):[];
  const printSize=p.printSize||p.size||'';
  const qty=parseInt(p.qty)||0;
  const frontC=parseInt(p.frontColors)||0, backC=parseInt(p.backColors)||0;
  const prefTier=p.machineSize||'rub3';
  // readiness
  const r=computeOffsetReadiness(p);
  const barCol=r.ready?'var(--g)':r.pct>=60?'var(--y)':'var(--r)';
  const readinessHtml=`
    <div id="off-readiness-${o._id}-${idx}" style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="flex:1;height:5px;border-radius:3px;background:var(--bg3);overflow:hidden">
        <div style="width:${r.pct}%;height:100%;background:${barCol};border-radius:3px;transition:width .3s"></div>
      </div>
      <span style="font-size:10px;color:${barCol};font-weight:var(--fw-bold)">${r.pct}%</span>
    </div>
    ${r.crit.filter(c=>!c.ok).length?`<div style="font-size:10px;color:var(--r);margin-bottom:8px">${r.crit.filter(c=>!c.ok).map(c=>c.tab?`<span onclick="switchTab('${c.tab}')" style="cursor:pointer;text-decoration:underline dotted">❌ ${c.label} ↗</span>`:`❌ ${c.label}`).join(' · ')}</div>`:''}`;

  let rankCards='', costSummary='', analysisCard='', marketCutBadge='';
  if(eng&&printSize&&qty>0){
    const allRankings=eng.rankAllSizes(printSize,qty,allPapersData);
    const {tierId,papers:tierPapers,upgraded}=getActiveTier(allRankings,prefTier);
    // القصة السوقية المصرية — تُحسب بعد معرفة التير الحالي
    if(eng.lookupMarketCut){
      const cut=eng.lookupMarketCut(printSize);
      if(cut){
        const mismatch=cut.marketCount!==cut.calcCount;
        // التير المناسب: يُستخدم مباشرةً من بيانات القصة السوقية إن وُجد
        const cutTierId=cut.tier||'kaml';
        const isCurrentTier=cutTierId===tierId;
        marketCutBadge=`<div class="off-card" style="border-color:rgba(59,158,255,.3)">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(59,158,255,.15);color:#3b9eff;font-weight:var(--fw-bold)">🏷️ ${escH(cut.name)}</span>
            <span style="font-size:10px;color:var(--dim2)">ماكينة ${getTierLabel(cutTierId)}</span>
            ${mismatch
              ? `<span style="font-size:9px;padding:2px 6px;border-radius:5px;background:rgba(255,170,0,.12);color:var(--y)">سوق: ${cut.marketCount} · حساب: ${cut.calcCount}</span>`
              : `<span style="font-size:9px;color:var(--g)">✓ ${cut.calcCount} قطعة</span>`
            }
          </div>
          ${mismatch&&cut.note?`<div style="font-size:9px;color:var(--dim2);margin-top:5px;line-height:1.5">${escH(cut.note)}</div>`:''}
          ${!isCurrentTier?`<div style="font-size:9px;color:var(--y);margin-top:6px;padding-top:6px;border-top:1px solid var(--line)">
            ⚠️ هذه القصة السوقية على ماكينة <strong>${getTierLabel(cutTierId)}</strong> — أنت حالياً على <strong>${getTierLabel(tierId)}</strong>.
            <button onclick="offSelMachine('${o._id}',${idx},'${cutTierId}')" class="off-btn" style="font-size:9px;padding:2px 8px;margin-right:4px;margin-top:4px;display:inline-block">جرّب ماكينة ${getTierLabel(cutTierId)}</button>
          </div>`:''}
        </div>`;
      }
    }
    const selRank=tierPapers.find(pm=>pm.name===p.paper)||tierPapers[0]||null;
    const selSheets=selRank?.sheetsTotal||parseInt(p.paperSheets)||0;
    const machine=selRank?.machine||paperMeta?.machine||'';
    const machRates=appSettings.offsetMachineRates||{};
    const machRate=parseFloat(machRates[machine])||0;
    const zincCPP=parseFloat(appSettings.zincCostPerPlate)||0;
    const zinkCnt=eng.calcZincCount(frontC,backC);
    const totalPasses=selSheets*(frontC+backC);
    const trajs=totalPasses>0?Math.ceil(totalPasses/1000):0;
    const selMeta=selRank?.hasPrice?selRank:paperMeta;
    const paperCost=selMeta&&selSheets>0?eng.calcPaperCost(selSheets,selMeta.costPerSheet):0;
    const mc=trajs*machRate;
    const zc=eng.calcZincCost(frontC,backC,zincCPP);
    const totalCalc=paperCost+mc+zc;
    // ── حفظ الحالة المشتركة (تُقرأ من propagateCalcState لتحديث التابات الأخرى) ──
    _calcState={ready:true,orderId:o._id,idx,printSize,qty,prefTier,tierId,upgraded,frontC,backC,selRank,selSheets,machine,machRate,zincCPP,zinkCnt,totalPasses,trajs,selMeta,paperCost,mc,zc,totalCalc,readiness:r};
    const upgradeWarn=upgraded?`<div style="font-size:9px;padding:5px 8px;background:rgba(255,170,0,.1);border-radius:6px;border-right:2px solid var(--y);margin-bottom:8px">
      ⚠️ المقاس أكبر من ماكينة ${getTierLabel(prefTier)} — تم التصعيد تلقائياً لماكينة <strong style="color:var(--y)">${getTierLabel(tierId)}</strong>
    </div>`:'';
    rankCards=`<div class="off-card">
      <div class="off-sec-hd">📄 مقارنة الورق — ${getTierLabel(tierId)}</div>
      ${upgradeWarn}
      ${tierPapers.length?tierPapers.map((pm,ri)=>{
        const isSel=pm.name===p.paper||(ri===0&&!p.paper);
        const isRec=ri===0&&!isSel;
        const layout=eng.fitLayout(printSize,pm.originalSize||'');
        const eff=layout?.efficiency||0;
        const effCol=eff>=80?'var(--g)':eff>=60?'var(--y)':'var(--r)';
        const pc=pm.hasPrice&&pm.costPerSheet?eng.calcPaperCost(pm.sheetsTotal,pm.costPerSheet):0;
        const border=isSel?'var(--y)':isRec?'#3b9eff':'var(--line)';
        const bg=isSel?'rgba(255,170,0,.07)':isRec?'rgba(59,158,255,.05)':'var(--bg3)';
        const family=pm.family||'';
        const cutsStr=layout?.cuts>0?` · ${layout.cuts} مراحل قص`:'';
        const layoutStr=layout?`${layout.cols} عمود × ${layout.rows} صف${layout.rotated?' (مقلوب)':''}${cutsStr}`:'' ;
        const effArea=layout?`طباعة فعلية ${layout.effectiveW}×${layout.effectiveH} سم`:'';
        return`<div onclick="offSelPaper('${o._id}',${idx},'${escAttr(pm.name)}',${pm.sheetsTotal},'${escAttr(pm.originalSize||'')}',${pm.pcs||0})"
          style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;border:2px solid ${border};background:${bg};cursor:pointer;margin-bottom:5px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
              <span style="font-size:var(--fs-xs);font-weight:var(--fw-bold);color:${isSel?'var(--y)':isRec?'#3b9eff':'var(--snow)'}">${escH(pm.name)}</span>
              ${isRec?`<span style="font-size:9px;padding:0 5px;border-radius:5px;background:rgba(59,158,255,.15);color:#3b9eff">🎯 موصى به</span>`:''}
              <span style="font-size:9px;color:var(--dim2)">${escH(pm.originalSize||'')} سم</span>
            </div>
            ${layoutStr?`<div style="font-size:9px;color:var(--dim2)">${layoutStr}${effArea?' · '+effArea:''}</div>`:''}
            ${family?`<div style="font-size:9px;color:var(--dim2)">عائلة ${escH(family)}${pm.machine?' · '+escH(pm.machine):''}</div>`:''}
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
            <div style="text-align:center"><div style="font-size:15px;font-weight:var(--fw-heavy);color:var(--b)">${pm.pcs}</div><div style="font-size:9px;color:var(--dim2)">ق/فرخة</div></div>
            <div style="text-align:center"><div style="font-size:15px;font-weight:var(--fw-heavy);color:var(--g)">${pm.sheetsTotal}</div><div style="font-size:9px;color:var(--dim2)">فرخة</div></div>
            ${pc>0?`<div style="text-align:center"><div style="font-size:13px;font-weight:var(--fw-heavy);color:var(--y)">${fmt(pc)}</div><div style="font-size:9px;color:var(--dim2)">ج</div></div>`:''}
            <div style="text-align:center;background:${effCol}18;border-radius:5px;padding:2px 5px"><div style="font-size:12px;font-weight:var(--fw-bold);color:${effCol}">${eff}%</div><div style="font-size:9px;color:var(--dim2)">كفاءة</div></div>
          </div>
          ${isSel?`<span style="color:var(--y);font-size:16px;flex-shrink:0">✓</span>`:''}
        </div>`;
      }).join(''):`<div style="padding:12px;text-align:center;color:var(--dim2);font-size:var(--fs-xs)">لا توجد مقاسات مناسبة لهذه الماكينة</div>`}
    </div>`;
    if(tierPapers.length){
      const stdPaper=tierPapers.find(pm=>(pm.family||'').includes('ستاندر'));
      const jayPaper=tierPapers.find(pm=>(pm.family||'').includes('جاير'));
      const stdLayout=stdPaper?eng.fitLayout(printSize,stdPaper.originalSize||''):null;
      const jayLayout=jayPaper?eng.fitLayout(printSize,jayPaper.originalSize||''):null;
      const stdEff=stdLayout?.efficiency||0, jayEff=jayLayout?.efficiency||0;
      const stdPcs=stdPaper?.pcs||0, jayPcs=jayPaper?.pcs||0;
      const stdCost=stdPaper?.hasPrice?eng.calcPaperCost(stdPaper.sheetsTotal,stdPaper.costPerSheet):0;
      const jayCost=jayPaper?.hasPrice?eng.calcPaperCost(jayPaper.sheetsTotal,jayPaper.costPerSheet):0;
      const tierOrder=['tumn','rub3','nus','kaml'];
      const ti=tierOrder.indexOf(tierId);
      const smallerTid=ti>0?tierOrder[ti-1]:null;
      const smallerFits=smallerTid?allRankings.some(pm=>pmMatchesTier(pm,smallerTid)):false;
      const stdWins=stdEff>=jayEff||(stdEff===jayEff&&stdPcs>=jayPcs);
      const winnerName=stdWins?(stdPaper?.name||'ستاندر'):(jayPaper?.name||'جاير');
      const winnerEff=stdWins?stdEff:jayEff, loserEff=stdWins?jayEff:stdEff;
      const effDiff=winnerEff-loserEff;
      const rows=[];
      if(stdPaper&&jayPaper){
        rows.push(`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:7px 10px;background:rgba(0,217,126,.06);border-radius:8px;border:1px solid rgba(0,217,126,.2)">
          <div style="flex:1;font-size:var(--fs-xs)">
            <strong style="color:var(--g)">✅ الأوفر: ${escH(winnerName)}</strong> (${escH(stdPaper?.originalSize||'')} vs ${escH(jayPaper?.originalSize||'')} سم)
            <div style="font-size:9px;color:var(--dim2);margin-top:2px">استغلال ${winnerEff}% مقابل ${loserEff}% ${effDiff>0?`(أفضل بـ ${effDiff}%)`:''} · ${stdPcs>=jayPcs?stdPcs:jayPcs} ق/فرخة</div>
            ${stdCost>0&&jayCost>0?`<div style="font-size:9px;color:var(--dim2)">تكلفة ورق: ${stdWins?fmt(stdCost):fmt(jayCost)} ج مقابل ${stdWins?fmt(jayCost):fmt(stdCost)} ج</div>`:''}
          </div>
        </div>`);
      }
      if(smallerFits&&smallerTid){
        rows.push(`<div style="font-size:9px;padding:6px 10px;background:rgba(59,158,255,.07);border-radius:8px;border:1px solid rgba(59,158,255,.2)">
          💡 <strong style="color:#3b9eff">اقتراح:</strong> المنتج يتناسب أيضاً مع ماكينة <strong>${getTierLabel(smallerTid)}</strong> — قد تكون أرخص في التشغيل لو المطبعة تقدّر.
          <button onclick="offSelMachine('${o._id}',${idx},'${smallerTid}')" class="off-btn" style="font-size:9px;padding:2px 8px;margin-right:6px;margin-top:3px">تجربة ${getTierLabel(smallerTid)}</button>
        </div>`);
      }
      if(upgraded){
        rows.push(`<div style="font-size:9px;padding:6px 10px;background:rgba(255,170,0,.08);border-radius:8px;border:1px solid rgba(255,170,0,.2)">
          ⚠️ <strong style="color:var(--y)">تصعيد تلقائي:</strong> المنتج (${escH(printSize)} سم) أكبر من ماكينة ${getTierLabel(prefTier)} — تم الانتقال لماكينة ${getTierLabel(tierId)}.
        </div>`);
      }
      if(rows.length){
        analysisCard=`<div class="off-card" style="border-color:rgba(0,217,126,.2)">
          <div class="off-sec-hd">💡 تحليل التشغيل</div>
          ${rows.join('')}
        </div>`;
      }
    }
    const selPaperName=selRank?.name||p.paper||'';
    const selSz=selRank?.originalSize||paperMeta?.originalSize||'';
    if(totalCalc>0||paperCost>0){
      costSummary=`<div class="off-card" style="border-color:rgba(255,170,0,.35)">
        <div class="off-sec-hd">💰 ملخص التكلفة التقديرية</div>
        <div style="display:flex;flex-direction:column;gap:7px">
          ${paperCost>0?`<div style="display:flex;justify-content:space-between;font-size:var(--fs-xs)">
            <span style="color:var(--dim2)">📄 ورق · ${escH(selPaperName)} · ${selSheets} فرخة${selSz?' ('+selSz+' سم)':''}</span>
            <span style="font-weight:var(--fw-bold)">${fmt(paperCost)} ج</span></div>`:''}
          ${mc>0?`<div style="display:flex;justify-content:space-between;font-size:var(--fs-xs)">
            <span style="color:var(--dim2)">⚙️ طباعة · ${escH(machine||getTierLabel(tierId))} · ${trajs} تراج × ${machRate} ج</span>
            <span style="font-weight:var(--fw-bold)">${fmt(mc)} ج</span></div>`:''}
          ${zc>0?`<div style="display:flex;justify-content:space-between;font-size:var(--fs-xs)">
            <span style="color:var(--dim2)">🟨 زنكات · ${zinkCnt} لوح (${frontC}+${backC}) × ${zincCPP} ج</span>
            <span style="font-weight:var(--fw-bold)">${fmt(zc)} ج</span></div>`:''}
          <div style="border-top:1px solid var(--line);padding-top:7px;display:flex;justify-content:space-between">
            <span style="font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--y)">الإجمالي التقديري</span>
            <span style="font-size:18px;font-weight:var(--fw-heavy);color:var(--y)">${fmt(totalCalc)} ج</span>
          </div>
          ${totalPasses>0?`<div style="font-size:10px;color:var(--dim2);text-align:center">⚡ ${totalPasses.toLocaleString('ar-EG')} ضربة = ${trajs} تراج</div>`:''}
        </div>
        <button type="button" onclick="offApplyCost('${o._id}',${idx})" class="off-btn off-btn-y" style="width:100%;margin-top:12px;padding:11px">
          💾 تسجيل بنود التكلفة في الأوردر
        </button>
      </div>`;
    }
  }
  return readinessHtml+marketCutBadge+rankCards+analysisCard+costSummary;
}

// يُحدِّث فقط قسم النتائج دون المساس بالـ inputs (يحافظ على focus)
function refreshCalcResults(o){
  if(!o)return;
  const el=document.getElementById(`off-res-${o._id}-${activeProdIdx}`);
  if(!el)return;
  el.innerHTML=buildCalcResults(o,activeProdIdx);
  propagateCalcState(o); // نشر الحالة لباقي التابات
}

// ── الترابط الديناميكي: نشر نتيجة الحاسبة للتابات الأخرى ──────────────────
function propagateCalcState(o){
  if(!_calcState)return;
  const cs=_calcState;
  // 1) شارات التابات
  const bc=document.getElementById('off-tbadge-calc');
  if(bc){const pct=cs.readiness?.pct||0;const col=pct===100?'var(--g)':pct>=60?'var(--y)':'var(--dim2)';bc.textContent=pct+'%';bc.style.cssText=`font-size:8px;margin-right:4px;color:${col};font-weight:700;opacity:.9`;}
  const bk=document.getElementById('off-tbadge-cost');
  if(bk&&cs.totalCalc>0){const k=cs.totalCalc>=1000?(Math.round(cs.totalCalc/100)/10)+'k':Math.round(cs.totalCalc)+'';bk.textContent=k+'ج';bk.style.cssText='font-size:8px;margin-right:4px;color:var(--y);font-weight:700;opacity:.9';}
  const bp=document.getElementById('off-tbadge-press');
  if(bp){const prod=(o.products||[])[cs.idx];bp.textContent=prod?.pressId?'✓':'';bp.style.cssText='font-size:9px;margin-right:4px;color:var(--g);font-weight:700';}
  // 2) بطاقة البريف في تاب المطبعة
  const pe=document.getElementById(`off-press-brief-${cs.idx}`);
  if(pe)pe.innerHTML=_buildCalcBriefBlock();
  // 3) بطاقة "من الحاسبة" في تاب التكلفة
  const ce=document.getElementById('off-cost-from-calc');
  if(ce)ce.innerHTML=_buildCostFromCalcBlock(o);
}

function _buildCalcBriefBlock(){
  const cs=_calcState;
  if(!cs?.ready)return'';
  const eng=window.offsetCostEngine;
  const layout=cs.selRank&&eng?eng.fitLayout(cs.printSize,cs.selRank.originalSize||''):null;
  const layoutStr=layout?`${layout.cols}×${layout.rows}${layout.rotated?' م':''}${layout.cuts>0?' · '+layout.cuts+' قص':''}`:'' ;
  return`<div style="padding:8px 10px;background:rgba(59,158,255,.07);border-radius:8px;border:1px solid rgba(59,158,255,.2);margin-bottom:10px">
    <div style="font-size:10px;font-weight:var(--fw-bold);color:#3b9eff;margin-bottom:5px">📋 مواصفات من الحاسبة</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:9px;color:var(--dim2)">
      <span>📏 ${escH(cs.printSize)} سم</span>
      <span>⚙️ ${getTierLabel(cs.tierId)}</span>
      ${cs.selRank?`<span>📄 ${escH(cs.selRank.name||'')} · ${cs.selSheets} فرخة</span>`:''}
      ${layoutStr?`<span>🔲 ${layoutStr}</span>`:''}
      <span>🖌️ ${cs.frontC+cs.backC} زنكة</span>
      ${cs.totalCalc>0?`<span style="color:var(--y);font-weight:700">💰 ${fmt(cs.totalCalc)} ج</span>`:''}
    </div>
  </div>`;
}

function _buildCostFromCalcBlock(o){
  const cs=_calcState;
  if(!cs?.ready||cs.totalCalc<=0)return'';
  const alreadySaved=(o.costItems||[]).some(ci=>ci.prodIdx===cs.idx&&ci.type==='ورق');
  return`<div style="padding:10px 12px;background:rgba(0,217,126,.06);border-radius:10px;border:1px solid rgba(0,217,126,.2);margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
      <span style="font-size:var(--fs-xs);font-weight:var(--fw-bold);color:var(--g)">📊 نتيجة الحاسبة</span>
      <span style="font-size:18px;font-weight:var(--fw-heavy);color:var(--y)">${fmt(cs.totalCalc)} ج</span>
    </div>
    <div style="display:flex;gap:10px;font-size:9px;color:var(--dim2);flex-wrap:wrap;margin-bottom:8px">
      ${cs.paperCost>0?`<span>📄 ورق ${fmt(cs.paperCost)}</span>`:''}
      ${cs.mc>0?`<span>⚙️ طباعة ${fmt(cs.mc)}</span>`:''}
      ${cs.zc>0?`<span>🟨 زنك ${fmt(cs.zc)}</span>`:''}
    </div>
    ${!alreadySaved
      ?`<button onclick="offApplyCost('${o._id}',${cs.idx})" class="off-btn off-btn-g" style="width:100%;padding:8px">💾 تسجيل في بنود التكلفة</button>`
      :`<div style="font-size:10px;color:var(--g);text-align:center">✓ تم التسجيل سابقاً</div>`}
  </div>`;
}

// ── Tab 1: الحاسبة ──
function renderCalcTab(o){
  const el=$('off-pane-calc');if(!el)return;
  const offProds=(o.products||[]).map((p,i)=>({...p,_i:i})).filter(p=>(p.printType||'').includes('offset'));
  if(!offProds.length){el.innerHTML=`<div style="text-align:center;padding:40px;color:var(--dim2)">لا توجد منتجات أوفست</div>`;return;}
  if(activeProdIdx>=(o.products||[]).length)activeProdIdx=offProds[0]._i;

  const navHtml=offProds.length>1?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">

// ── Tab 2: التكلفة ──
function renderCostTab(o){
  const el=$('off-pane-cost');if(!el)return;
  const costItems=o.costItems||[];
  const sale=parseFloat(o.salePrice)||0;
  const totalCost=costItems.reduce((s,ci)=>s+(parseFloat(ci.total)||0),0);
  const margin=sale-totalCost;
  const canReqPay=['admin','operation_manager','production_agent'].includes(currentRole);

  // تجميع حسب المنتج
  const byProd={};
  costItems.forEach((ci,ciIdx)=>{
    const k=ci.prodIdx!=null?String(ci.prodIdx):'order';
    if(!byProd[k])byProd[k]=[];
    byProd[k].push({...ci,_ciIdx:ciIdx});
  });

  const groupsHtml=Object.keys(byProd).length?Object.entries(byProd).map(([k,items])=>{
    const p=k!=='order'&&(o.products||[])[parseInt(k)]?(o.products||[])[parseInt(k)]:null;
    const label=p?`${p.name||('منتج '+(parseInt(k)+1))} ×${p.qty||1}`:'بنود الأوردر';
    const grpTotal=items.reduce((s,ci)=>s+(parseFloat(ci.total)||0),0);
    return`<div class="off-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="off-sec-hd" style="margin-bottom:0">${escH(label)}</div>
        <div style="font-size:var(--fs-xs);font-weight:var(--fw-heavy);color:var(--y)">${fmt(grpTotal)} ج</div>
      </div>
      ${items.map(ci=>{
        const isPaid=!!ci.paid;
        const isPending=!isPaid&&!!ci.pendingPaymentRequestId;
        const badge=isPaid
          ?`<span style="font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(0,217,126,.15);color:var(--g);border:1px solid rgba(0,217,126,.3)">✓ مدفوع</span>`
          :isPending
          ?`<span style="font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(255,170,0,.12);color:var(--y);border:1px solid rgba(255,170,0,.3)">⏳ انتظار اعتماد</span>`
          :`<span style="font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(255,80,80,.1);color:var(--r);border:1px solid rgba(255,80,80,.25)">غير مدفوع</span>`;
        const payBtn=!isPaid&&!isPending&&canReqPay&&ci.supplierId
          ?`<button onclick="offReqPay('${o._id}',${ci._ciIdx})" class="off-btn off-btn-g" style="font-size:9px;padding:2px 8px">💸 طلب دفع</button>`:'';
        return`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg3);border:1px solid var(--line);border-radius:8px;margin-bottom:4px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
              <span style="font-size:var(--fs-xs);font-weight:var(--fw-bold)">${escH(ci.type||'—')}</span>${badge}
            </div>
            ${ci.note?`<div style="font-size:9px;color:var(--dim2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(ci.note)}</div>`:''}
            ${ci.supplierName?`<div style="font-size:9px;color:var(--dim2)">🏭 ${escH(ci.supplierName)}</div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
            <div style="font-size:var(--fs-sm);font-weight:var(--fw-heavy)">${fmt(ci.total)} ج</div>
            ${payBtn}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join(''):`<div style="text-align:center;padding:40px;color:var(--dim2)">⚠️ لا توجد بنود تكلفة — استخدم تبويب الحاسبة لتسجيلها</div>`;

  el.innerHTML=`
    <div id="off-cost-from-calc"></div>
    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:repeat(${sale>0?3:1},1fr);gap:8px;margin-bottom:14px">
      <div style="background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.3);border-radius:10px;padding:10px 12px;text-align:center">
        <div style="font-size:10px;color:var(--dim2)">إجمالي التكلفة</div>
        <div style="font-size:22px;font-weight:var(--fw-heavy);color:var(--y)">${fmt(totalCost)}</div>
        <div style="font-size:10px;color:var(--dim2)">جنيه</div>
      </div>
      ${sale>0?`
      <div style="background:rgba(59,158,255,.08);border:1px solid rgba(59,158,255,.3);border-radius:10px;padding:10px 12px;text-align:center">
        <div style="font-size:10px;color:var(--dim2)">سعر البيع</div>
        <div style="font-size:22px;font-weight:var(--fw-heavy);color:var(--b)">${fmt(sale)}</div>
        <div style="font-size:10px;color:var(--dim2)">جنيه</div>
      </div>
      <div style="background:${margin>=0?'rgba(0,217,126,.08)':'rgba(255,80,80,.08)'};border:1px solid ${margin>=0?'rgba(0,217,126,.3)':'rgba(255,80,80,.3)'};border-radius:10px;padding:10px 12px;text-align:center">
        <div style="font-size:10px;color:var(--dim2)">الهامش</div>
        <div style="font-size:22px;font-weight:var(--fw-heavy);color:${margin>=0?'var(--g)':'var(--r)'}">${margin>=0?'+':''}${fmt(margin)}</div>
        <div style="font-size:10px;color:var(--dim2)">${sale>0?Math.round(margin/sale*100)+'%':''}</div>
      </div>`:''}
    </div>
    ${groupsHtml}
  `;
}

function renderPressTab(o){
  const el=$('off-pane-press');if(!el)return;
  const offProds=(o.products||[]).map((p,i)=>({...p,_i:i})).filter(p=>(p.printType||'').includes('offset'));
  if(!offProds.length){el.innerHTML=`<div style="text-align:center;padding:40px;color:var(--dim2)">لا توجد منتجات أوفست</div>`;return;}
  const buildPressOpts=selId=>'<option value="">— اختر المطبعة —</option>'+getPresses().map(s=>`<option value="${s._id}" data-name="${escAttr(s.name||'')}" data-phone="${escAttr(s.phone||s.whatsapp||'')}"${s._id===selId?' selected':''}>${escAttr(s.name)}${s.category?' · '+escAttr(s.category):''}</option>`).join('');

  el.innerHTML=offProds.map(p=>{
    const idx=p._i;
    const r=computeOffsetReadiness(p);

    const dtVal=p.pressDeadline?(()=>{try{const d=new Date(p.pressDeadline);const off=d.getTimezoneOffset();return new Date(d.getTime()-off*60000).toISOString().slice(0,16);}catch{return'';}})():'';
    return`<div class="off-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="off-sec-hd" style="margin-bottom:0">${escH(p.name||('منتج '+(idx+1)))} <span style="color:var(--y)">×${p.qty||1}</span></div>
        <div style="display:flex;align-items:center;gap:8px">
          ${p.productStatus?productStatusBadge(p.productStatus):''}
          <span style="font-size:10px;color:${barCol};font-weight:var(--fw-bold)">${r.pct}%</span>
        </div>
      </div>
      <!-- Progress -->
      <div style="height:4px;border-radius:2px;background:var(--bg3);overflow:hidden;margin-bottom:10px">
        <div style="width:${r.pct}%;height:100%;background:${barCol};border-radius:2px"></div>
      </div>
      <div id="off-press-brief-${idx}"></div>
      <div class="off-field"><label class="off-label">🏭 المطبعة</label>
        <select class="off-inp" onchange="offUpdPress('${o._id}',${idx},this)">${buildPressOpts(p.pressId||'')}</select>
      </div>
      <div class="off-field"><label class="off-label">📅 ميعاد التسليم من المطبعة</label>
        <input class="off-inp" type="datetime-local" value="${escAttr(dtVal)}" onchange="offUpd('${o._id}',${idx},'pressDeadline',this.value?new Date(this.value).toISOString():'')">
      </div>
      <div class="off-field"><label class="off-label">📝 ملاحظات الشغل</label>
        <textarea class="off-inp" rows="2" oninput="offUpd('${o._id}',${idx},'briefNotes',this.value)" placeholder="ملاحظات خاصة للمطبعة…" style="resize:none">${escH(p.briefNotes||'')}</textarea>
      </div>
      ${p.briefSentAt?`<div style="font-size:10px;color:var(--g);padding:6px 10px;background:rgba(0,217,126,.07);border-radius:8px;margin-bottom:8px">✅ أُرسل ${escH(p.briefSentAt)}${p.briefSentByName?' · '+escH(p.briefSentByName):''}</div>`:''}
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button type="button" onclick="offSendBrief('${o._id}',${idx})" ${r.ready?'':'disabled'} class="off-btn off-btn-wa" style="flex:1;padding:10px">
          💬 ${p.briefSentAt?'إعادة إرسال البريف':'إرسال البريف واتساب'}
        </button>
        ${!['printed','done'].includes(p.productStatus||'')?`<button type="button" onclick="offSetStatus('${o._id}',${idx},'printed')" class="off-btn off-btn-g" style="padding:10px">🖨️ مطبوع</button>`:''}

  }).join('');

// ── الإجراءات ──
const _debTimers=new Map();
function debSave(key,fn,ms=700){clearTimeout(_debTimers.get(key));_debTimers.set(key,setTimeout(fn,ms));}

// الحقول التي تؤثر على الحسابات وتستوجب تحديث النتائج فوراً
const CALC_FIELDS=new Set(['qty','frontColors','backColors','paper','paperSheets']);

window.offUpd=function(orderId,idx,field,value){
  if(activeOrder&&activeOrder._id===orderId){const p=(activeOrder.products||[])[idx];if(p)p[field]=value;}
  debSave(`${orderId}|${idx}|${field}`,async()=>{
    const r=await orderActions.applyProductBriefPatch({db,orderId,prodIdx:idx,patch:{[field]:value},userId:currentUid,userName});
    if(r&&!r.ok)toast('❌ '+(r.errors||[]).join(' · '),'err');
  });
  if(CALC_FIELDS.has(field)){
    debSave(`${orderId}|${idx}|${field}-ui`,()=>{
      if(activeOrder&&activeOrder._id===orderId)refreshCalcResults(activeOrder);
    },300);
  }
};

window.offUpdSz=function(orderId,idx,dim,val){
  const p=(activeOrder?.products||[])[idx];if(!p)return;
  const parts=(p.printSize||p.size||'').split('×');
  const newSize=`${dim==='w'?val:(parts[0]||'')}×${dim==='h'?val:(parts[1]||'')}`;
  p.printSize=newSize;
  // تحديث عدد التقطيع مباشرة في الـ DOM (بدون إعادة رندر كاملة)
  const eng=window.offsetCostEngine;
  if(eng&&p.cutSize){
    const pcs=eng.fitPiecesPerSheet(newSize,p.cutSize)||0;
    if(pcs>0){p.paperCuts=pcs;const pcEl=document.getElementById(`off-pc-${orderId}-${idx}`);if(pcEl)pcEl.value=pcs;}
  }
  debSave(`${orderId}|${idx}|size`,async()=>{
    await orderActions.applyProductBriefPatch({db,orderId,prodIdx:idx,patch:{printSize:newSize},userId:currentUid,userName});
  });
  // debounce النتائج فقط — الـ inputs تبقى ثابتة، المستخدم لا يفقد focus
  debSave(`${orderId}|${idx}|size-ui`,()=>{
    if(activeOrder&&activeOrder._id===orderId)refreshCalcResults(activeOrder);
  },350);
};

window.offUpdZink=function(orderId,idx,f,b){
  if(activeOrder){const p=(activeOrder.products||[])[idx];if(p){p.frontColors=f;p.backColors=b;}}
  debSave(`${orderId}|${idx}|zink`,async()=>{
    await orderActions.applyProductBriefPatch({db,orderId,prodIdx:idx,patch:{frontColors:f,backColors:b},userId:currentUid,userName});
  });
  if(activeOrder&&activeOrder._id===orderId)refreshCalcResults(activeOrder);
};

window.offUpdPress=function(orderId,idx,sel){
  const opt=sel?.options?.[sel.selectedIndex];
  const pressId=opt?.value||'', pressName=opt?.dataset?.name||'';
  if(activeOrder){const p=(activeOrder.products||[])[idx];if(p){p.pressId=pressId;p.pressName=pressName;}}
  debSave(`${orderId}|${idx}|press`,async()=>{
    await orderActions.applyProductBriefPatch({db,orderId,prodIdx:idx,patch:{pressId,pressName},userId:currentUid,userName});
  });
};

window.offSelPaper=function(orderId,idx,name,sheets,origSize,pcs){
  const patch={paper:name,paperSheets:sheets};
  if(activeOrder){
    const p=(activeOrder.products||[])[idx];
    if(p){
      p.paper=name;p.paperSheets=sheets;
      // تزامن مقاس القص وعدد التقطيع مع الورقة المختارة
      if(origSize){p.cutSize=origSize;patch.cutSize=origSize;}
      const actualPcs=pcs||0;
      if(actualPcs>0){p.paperCuts=actualPcs;patch.paperCuts=actualPcs;}
    }
  }
  orderActions.applyProductBriefPatch({db,orderId,prodIdx:idx,patch,userId:currentUid,userName})
    .then(r=>{if(r&&!r.ok)toast('❌ '+(r.errors||[]).join(' · '),'err');});
  if(activeOrder&&activeOrder._id===orderId)renderCalcTab(activeOrder);
};

// اختيار مقاس القص من أزرار الاختصار (يُحدّث عدد التقطيع تلقائياً)
window.offSelCutSize=function(orderId,idx,size){
  const eng=window.offsetCostEngine;
  const o=activeOrder;if(!o||o._id!==orderId)return;
  const p=(o.products||[])[idx];if(!p)return;
  const printSize=p.printSize||p.size||'';
  const pcs=eng?.fitPiecesPerSheet(printSize,size)||0;
  p.cutSize=size;if(pcs>0)p.paperCuts=pcs;
  const patch={cutSize:size};if(pcs>0)patch.paperCuts=pcs;
  orderActions.applyProductBriefPatch({db,orderId,prodIdx:idx,patch,userId:currentUid,userName});
  renderCalcTab(o);
};

// كتابة مقاس القص يدوياً — يُحدّث عدد التقطيع دون فقد الـ focus
window.offUpdCutSize=function(orderId,idx,value){
  const eng=window.offsetCostEngine;
  const p=(activeOrder?.products||[])[idx];if(!p)return;
  p.cutSize=value;
  const printSize=p.printSize||p.size||'';
  const pcs=eng?.fitPiecesPerSheet(printSize,value)||0;
  if(pcs>0){
    p.paperCuts=pcs;
    const pcEl=document.getElementById(`off-pc-${orderId}-${idx}`);
    if(pcEl)pcEl.value=pcs;
  }
  debSave(`${orderId}|${idx}|cutSize`,async()=>{
    const patch={cutSize:value};if(pcs>0)patch.paperCuts=pcs;
    await orderActions.applyProductBriefPatch({db,orderId,prodIdx:idx,patch,userId:currentUid,userName});
  });
};

window.offSelMachine=function(orderId,idx,tierId){
  const o=activeOrder;if(!o)return;
  const p=(o.products||[])[idx];if(!p)return;
  const eng=window.offsetCostEngine;
  const tier=MACHINE_TIERS.find(t=>t.id===tierId)||MACHINE_TIERS[1];
  const printSize=p.printSize||p.size||'';
  // تحقق إن المنتج بيتناسب مع الماكينة قبل الحفظ
  if(eng&&printSize){
    const fits=tier.sizes.some(s=>eng.fitPiecesPerSheet(printSize,`${s.w}×${s.h}`)>0);
    if(!fits){
      toast(`❌ المنتج (${printSize} سم) أكبر من ماكينة ${getTierLabel(tierId)} (${tier.sizes[0].w}×${tier.sizes[0].h} سم)`,'err');
      return;
    }
  }
  const CUTS={tumn:8,rub3:4,nus:2,kaml:1};
  const paperCuts=CUTS[tierId]||4;
  const stdSize=`${tier.sizes[0].w}×${tier.sizes[0].h}`;
  p.machineSize=tierId;p.cutSize=stdSize;p.paperCuts=paperCuts;
  orderActions.applyProductBriefPatch({db,orderId,prodIdx:idx,patch:{machineSize:tierId,cutSize:stdSize,paperCuts},userId:currentUid,userName});
  if(o._id===orderId)renderCalcTab(o);
};

window.offApplyCost=async function(orderId,idx){
  const o=orders.find(x=>x._id===orderId)||activeOrder;if(!o)return;
  const p=(o.products||[])[idx];if(!p)return;
  const eng=window.offsetCostEngine;if(!eng)return toast('⚠️ محرك الحساب لم يُحمَّل','warn');
  const printSize=p.printSize||p.size||'';const qty=parseInt(p.qty)||0;
  const allPapersData=Array.isArray(appSettings?.paperTypesData)?appSettings.paperTypesData.filter(Boolean):[];
  const allRankings=eng.rankAllSizes(printSize,qty,allPapersData);
  const {tierId,papers:tierPapers}=getActiveTier(allRankings,p.machineSize||'rub3');
  const selRank=tierPapers.find(pm=>pm.name===(p.paper||''))||tierPapers[0]||null;
  const paperMeta=getPaperMeta(selRank?.name||p.paper||'');
  const selSheets=selRank?.sheetsTotal||parseInt(p.paperSheets)||0;
  const machine=selRank?.machine||paperMeta?.machine||'';
  const machRate=parseFloat(appSettings?.offsetMachineRates?.[machine])||0;
  const frontC=parseInt(p.frontColors)||0,backC=parseInt(p.backColors)||0;
  const trajs=selSheets*(frontC+backC)>0?Math.ceil(selSheets*(frontC+backC)/1000):0;
  const mc=trajs*machRate;
  const zincCPP=parseFloat(appSettings?.zincCostPerPlate)||0;
  const zinkCnt=eng.calcZincCount(frontC,backC);
  const lines=[];
  if(paperMeta&&selSheets>0){const pc=eng.calcPaperCost(selSheets,paperMeta.costPerSheet);if(pc>0)lines.push({type:'ورق',total:pc,supplierId:paperMeta.supplierId||'',supplierName:paperMeta.supplierName||'',note:`${paperMeta.name} ${paperMeta.originalSize||''} — ${selSheets} فرخة`.trim()});}
  if(machine&&mc>0)lines.push({type:'طباعة',total:mc,supplierId:p.pressId||'',supplierName:p.pressName||'',note:`${machine} — ${trajs} تراج × ${machRate} ج`});
  if(zinkCnt>0&&zincCPP>0)lines.push({type:'زنكات',total:eng.calcZincCost(frontC,backC,zincCPP),supplierId:p.pressId||'',supplierName:p.pressName||'',note:`${zinkCnt} لوح (${frontC} وجه + ${backC} ظهر) × ${zincCPP} ج`});
  if(!lines.length)return toast('⚠️ لا توجد بنود محسوبة — تأكد من الورق والزنكات','warn');
  let ok=true,msgs=[];
  for(const line of lines){
    const r=await orderActions.recordCostItem({db,orderId,prodIdx:idx,payload:line,role:currentRole,userId:currentUid,userName,wallets:[]});
    if(!r.ok){ok=false;msgs.push(...(r.errors||[]));}
  }
  if(ok)toast(`✅ تم تسجيل ${lines.length} بند تكلفة`,'ok');
  else toast('❌ '+msgs.join(' · '),'err');
};

window.offReqPay=async function(orderId,ciIdx){
  const o=orders.find(x=>x._id===orderId)||activeOrder;if(!o)return;
  const ci=(o.costItems||[])[ciIdx];
  if(!ci||!ci.supplierId)return toast('⚠️ البند بدون مورد — حدّد المورد أولاً','warn');
  const r=await productionActions.requestSupplierPayment({db,orderId,costItemIdx:ciIdx,order:o,role:currentRole,userId:currentUid,userName});
  if(!r.ok)return toast('❌ '+(r.errors||[]).join(' · '),'err');
  toast(`✅ طلب دفع: ${ci.type} — ${fmt(ci.total)} ج`,'ok');
};

window.offSetStatus=async function(orderId,idx,status){
  const r=await orderActions.setProductCatalogStatus({db,orderId,prodIdx:idx,status,userId:currentUid,userName});
  if(!r||!r.ok)return toast('❌ '+(r?.errors||[]).join(' · '),'err');
  toast('✅ تم تحديث الحالة','ok');
};

window.offSendBrief=function(orderId,idx){
  const o=orders.find(x=>x._id===orderId)||activeOrder;if(!o)return;
  const p=(o.products||[])[idx];if(!p)return;
  const press=getPresses().find(s=>s._id===p.pressId);
  const phone=(press?.phone||press?.whatsapp||'').replace(/\D/g,'');
  if(!phone)return toast('⚠️ رقم المطبعة غير موجود — أضفه في سجل الموردين','warn');
  const lines=[
    `*بريف طباعة أوفست — ${o.clientName||''}*`,
    `رقم الأوردر: ${o.orderId||o._id.slice(-6)}`,
    `المنتج: ${p.name||''} × ${p.qty||1}`,
    `مقاس الطباعة: ${p.printSize||p.size||'—'}`,
    `الورق: ${p.paper||'—'}${p.weight?' '+p.weight+'جم':''}`,
    `الزنكات: ${p.zinkType||((parseInt(p.frontColors)||0)+'+'+(parseInt(p.backColors)||0))} (${parseInt(p.frontColors)||0} وجه + ${parseInt(p.backColors)||0} ظهر)`,
    `عدد الفروخ: ${p.paperSheets||'—'}`,
    `مقاس القص: ${p.cutSize||'—'}`,
    `السلوفان: ${p.lamination||'بلا'}`,
    p.briefNotes?`ملاحظات: ${p.briefNotes}`:'',
    p.pressDeadline?`الميعاد: ${new Date(p.pressDeadline).toLocaleString('ar-EG')}`:'',
  ].filter(Boolean);
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(lines.join('\n'))}`,'_blank','noopener');
  orderActions.applyProductBriefPatch({db,orderId,prodIdx:idx,patch:{briefSentAt:nowStr(),briefSentByName:userName},userId:currentUid,userName});
};

window.toggleNav=()=>{document.querySelector('.sidenav')?.classList.toggle('mob-open');document.getElementById('nav-ov')?.classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav')?.classList.remove('mob-open');document.getElementById('nav-ov')?.classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);location.href='login.html';};
</script>
