<style>
.off-shell{display:grid;grid-template-columns:300px 1fr;height:100vh;overflow:hidden}
@media(max-width:768px){
  .off-shell{grid-template-columns:1fr;height:100vh}
  .off-list{height:100vh}
  .off-main{height:100vh;position:fixed;inset:0;z-index:50;transform:translateX(-100%);transition:transform .25s ease}
  .off-main.mob-open{transform:translateX(0)}
}
.off-list{display:flex;flex-direction:column;border-left:1px solid var(--line);background:var(--bg1);overflow:hidden}
.off-list-hdr{padding:10px 12px;border-bottom:1px solid var(--line);flex-shrink:0;background:var(--bg2)}
.off-list-body{flex:1;overflow-y:auto;padding:8px}
.off-ocard{padding:10px 12px;border-radius:10px;background:var(--bg2);border:1px solid var(--line);margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.off-ocard:hover{border-color:rgba(255,170,0,.5)}
.off-ocard.active{border-color:var(--y);background:rgba(255,170,0,.06)}
.off-main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg1)}
.off-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--dim2)}
.off-order{display:flex;flex-direction:column;flex:1;overflow:hidden}
.off-order-hdr{padding:12px 16px;border-bottom:1px solid var(--line);background:var(--bg2);flex-shrink:0}
.off-tabs{display:flex;border-bottom:1px solid var(--line);background:var(--bg2);flex-shrink:0;overflow-x:auto}
.off-tab{padding:10px 18px;font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--dim2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;white-space:nowrap;transition:color .15s,border-color .15s}
.off-tab.on{color:var(--y);border-bottom-color:var(--y)}
.off-pane{display:none;flex:1;overflow-y:auto;padding:16px}
.off-pane.on{display:block}
.off-inp{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--line);border-radius:8px;color:var(--snow);font-size:var(--fs-sm);font-family:inherit;box-sizing:border-box}
.off-label{font-size:10px;color:var(--dim2);font-weight:var(--fw-bold);margin-bottom:3px;display:block}
.off-field{margin-bottom:10px}
.off-g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.off-btn{padding:8px 14px;border-radius:9px;border:1px solid var(--line);background:var(--bg3);color:var(--snow);font-size:var(--fs-sm);font-weight:var(--fw-bold);cursor:pointer;font-family:inherit;transition:all .15s}
.off-btn-y{background:rgba(255,170,0,.13);border-color:var(--y);color:var(--y)}
.off-btn-g{background:rgba(0,217,126,.1);border-color:var(--g);color:var(--g)}
.off-btn-r{background:rgba(255,80,80,.1);border-color:var(--r);color:var(--r)}
.off-btn-wa{background:#25d366;border-color:#25d366;color:#fff}
.off-btn:disabled{opacity:.45;cursor:not-allowed}
.off-card{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px}
.off-sec-hd{font-size:var(--fs-xs);font-weight:var(--fw-bold);color:var(--dim2);margin-bottom:10px}
.off-fltr{padding:3px 10px;border-radius:12px;border:1px solid var(--line);background:var(--bg3);color:var(--dim2);font-size:11px;font-weight:var(--fw-bold);cursor:pointer;font-family:inherit}
.off-fltr.on{background:rgba(255,170,0,.15);border-color:var(--y);color:var(--y)}
.off-prod-btn{padding:4px 12px;border-radius:10px;border:1px solid var(--line);background:var(--bg2);color:var(--dim2);font-size:var(--fs-xs);font-weight:var(--fw-bold);cursor:pointer;font-family:inherit;transition:all .15s}
.off-prod-btn.on{background:rgba(255,170,0,.13);border-color:var(--y);color:var(--y)}
</style>
</head>
<body class="body-sidebar">
<app-sidebar page="print.html"></app-sidebar>

<div class="off-shell">
  <!-- قائمة الأوردرات -->
  <div class="off-list">
    <div class="off-list-hdr">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <span style="font-size:16px;font-weight:var(--fw-heavy);color:var(--y)">🖨️ طباعة الأوفست</span>
        <span id="off-count" style="font-size:10px;color:var(--dim2);background:var(--bg3);border-radius:8px;padding:1px 7px"></span>
      </div>
      <input class="off-inp" type="search" placeholder="بحث بالاسم أو الأوردر..." oninput="offSearch(this.value)" style="margin-bottom:8px">
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        <button class="off-fltr on" onclick="offFilter('all',this)">الكل</button>
        <button class="off-fltr"    onclick="offFilter('ready',this)">جاهز</button>
        <button class="off-fltr"    onclick="offFilter('at-press',this)">بالمطبعة</button>
        <button class="off-fltr"    onclick="offFilter('no-cost',this)">بدون تكلفة</button>
      </div>
    </div>
    <div class="off-list-body" id="off-list-body">
      <div style="text-align:center;padding:40px;color:var(--dim2)">جاري التحميل…</div>
    </div>
  </div>

  <!-- مساحة العمل -->
  <div class="off-main">
    <div class="off-empty" id="off-empty">
      <div style="font-size:56px;opacity:.25">🖨️</div>
      <div style="font-size:var(--fs-sm)">اختار أوردر من القائمة</div>
    </div>
    <div class="off-order" id="off-order" style="display:none">
      <div id="off-order-hdr" class="off-order-hdr">
        <button onclick="offBack()" class="off-btn" style="display:none;margin-bottom:8px;padding:5px 12px;font-size:var(--fs-xs)" id="off-back-btn">→ رجوع للقائمة</button>
      </div>
      <div class="off-tabs">
        <button class="off-tab on" onclick="offTab('calc',this)">📐 الحاسبة</button>
        <button class="off-tab"    onclick="offTab('cost',this)">💰 التكلفة</button>
        <button class="off-tab"    onclick="offTab('press',this)">🏭 المطبعة</button>
      </div>
      <div class="off-pane on" id="off-pane-calc"></div>
      <div class="off-pane"    id="off-pane-cost"></div>
      <div class="off-pane"    id="off-pane-press"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="off-toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 18px;font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--snow);z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center"></div>

<script type="module">
import { auth, db } from "./core/firebase-init.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, doc, getDoc, onSnapshot, query, where, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { orderActions } from "./order-actions.js";
import { productionActions } from "./production-actions.js";
import { productStatusBadge } from "./orders.js";

// ── حالة ──
let orders=[], activeId='', activeOrder=null, activeProdIdx=0;
let suppliers=[], appSettings={}, wallets=[], briefTemplates=[];
let currentRole='', userName='', currentUid='';
let _listFilter='all', _listSearch='';

// ── مساعدات ──
const $  = id => document.getElementById(id);
const escH = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const escAttr = s => escH(s).replace(/"/g,'&quot;');
const fmt = n => (parseFloat(n)||0).toLocaleString('ar-EG');
const nowStr = () => new Date().toLocaleDateString('ar-EG')+' '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});

let _toastTm;
function toast(msg,type='ok'){
  const el=$('off-toast');if(!el)return;
  el.textContent=msg;
  el.style.borderColor=type==='err'?'var(--r)':type==='warn'?'var(--y)':'var(--g)';
  el.style.color=type==='err'?'var(--r)':type==='warn'?'var(--y)':'var(--snow)';
  el.style.opacity='1';clearTimeout(_toastTm);_toastTm=setTimeout(()=>{el.style.opacity='0';},3200);
}

function getPaperMeta(name){
  return (Array.isArray(appSettings.paperTypesData)?appSettings.paperTypesData:[]).find(p=>p.name===name)||null;
}
function getPresses(){
  return suppliers.filter(s=>['مطبعة أوفست','أوفست + ديجيتال'].includes(s.category||s.type||''));
}
function computeOffsetReadiness(p){
  const crit=[
    {ok:(parseFloat(p.qty)||0)>0,         label:'الكمية محددة'},
    {ok:!!(p.printSize||p.size),           label:'مقاس الطباعة محدد'},
    {ok:!!p.paper,                         label:'نوع الورق محدد'},
    {ok:!!p.lamination,                    label:'السلوفان محدد'},
    {ok:!!p.zinkType,                      label:'نوع الزنكات محدد'},
    {ok:(parseFloat(p.paperSheets)||0)>0,  label:'عدد الفروخ محدد'},
    {ok:!!p.cutSize,                       label:'مقاس القص محدد'},
    {ok:!!p.pressId,                       label:'المطبعة مختارة'},
  ];
  const cDone=crit.filter(c=>c.ok).length;
  return{crit,cDone,cTotal:crit.length,pct:Math.round(cDone/crit.length*100),ready:cDone===crit.length};
}
function getOffsetStatus(o){
  const prods=o.products||[];
  const hasCost=(o.costItems||[]).length>0;
  const allPrinted=prods.length&&prods.every(p=>['printed','done'].includes(p.productStatus||''));
  if(allPrinted)return'printed';
  if(prods.some(p=>!!p.briefSentAt))return'at-press';
  if(!hasCost)return'no-cost';
  const r=computeOffsetReadiness((prods.find(p=>(p.printType||'').includes('offset'))||prods[0]||{}));
  return r.pct>=80?'ready':'other';
}

// ── Auth ──
let _authDone=false;
onAuthStateChanged(auth,async u=>{
  if(!u){location.href='login.html';return;}
  if(_authDone)return;_authDone=true;
  currentUid=u.uid;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(snap.exists()){
    const d=snap.data();
    currentRole=d.role||'';
    const pages=(d.permissions?.pages)||[];
    const isAdm=['admin','operation_manager'].includes(currentRole);
    if(!isAdm&&!pages.includes('*')&&!pages.includes('print')){location.href='login.html';return;}
    userName=d.name||u.email||'';
    const av=$('nav-av');if(av)av.textContent=(userName[0]||'A').toUpperCase();
    const rb=$('role-badge');if(rb)rb.textContent=currentRole;
    if(typeof B2CSidebar!=='undefined')B2CSidebar.build(d,'print.html');
  }
  startListeners();
});

// ── Listeners ──
function startListeners(){
  onSnapshot(query(collection(db,'orders'),where('stage','==','printing'),limit(500)),snap=>{
    const raw=snap.docs.map(d=>({...d.data(),_id:d.id}));
    orders=raw
      .filter(o=>(o.products||[]).some(p=>(p.printType||'').includes('offset')))
      .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    if($('off-count'))$('off-count').textContent=orders.length+' أوردر';
    renderList();
    if(activeId){const o=orders.find(x=>x._id===activeId);if(o){activeOrder=o;renderWorkspace(o);}}
  });
  onSnapshot(doc(db,'settings','main'),snap=>{
    if(snap.exists())appSettings=snap.data();
    if(activeOrder)renderWorkspace(activeOrder);
  });
  onSnapshot(query(collection(db,'suppliers'),limit(200)),snap=>{
    suppliers=snap.docs.map(d=>({...d.data(),_id:d.id})).filter(s=>s.active!==false);
  });
  onSnapshot(query(collection(db,'wallets'),limit(100)),snap=>{
    wallets=snap.docs.map(d=>({...d.data(),_id:d.id}));
  });
  onSnapshot(doc(db,'master_lists','print_brief_templates'),snap=>{
    briefTemplates=snap.exists()?(snap.data()?.items||[]):[];
  });
}

// ── قائمة ──
window.offFilter=function(f,btn){
  _listFilter=f;
  document.querySelectorAll('.off-fltr').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  renderList();
};
window.offSearch=function(q){_listSearch=q;renderList();};

function renderList(){
  const el=$('off-list-body');if(!el)return;
  let list=orders;
  if(_listSearch){const q=_listSearch.trim().toLowerCase();list=list.filter(o=>(o.clientName||'').toLowerCase().includes(q)||(o.orderId||'').toLowerCase().includes(q));}
  if(_listFilter!=='all')list=list.filter(o=>getOffsetStatus(o)===_listFilter);
  if(!list.length){el.innerHTML=`<div style="text-align:center;padding:40px;color:var(--dim2)">لا توجد أوردرات</div>`;return;}
  el.innerHTML=list.map(o=>{
    const st=getOffsetStatus(o);
    const stCol=st==='printed'?'var(--g)':st==='at-press'?'var(--b)':st==='ready'?'var(--y)':st==='no-cost'?'var(--r)':'var(--dim2)';
    const stLbl=st==='printed'?'✓ مطبوع':st==='at-press'?'بالمطبعة':st==='ready'?'جاهز':st==='no-cost'?'بدون تكلفة':'قيد التجهيز';
    const offProds=(o.products||[]).filter(p=>(p.printType||'').includes('offset'));
    const totalCost=(o.costItems||[]).reduce((s,ci)=>s+(parseFloat(ci.total)||0),0);
    return`<div class="off-ocard${o._id===activeId?' active':''}" onclick="offSelect('${o._id}')">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
        <div style="font-size:var(--fs-sm);font-weight:var(--fw-heavy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(o.clientName||'—')}</div>
        <span style="font-size:9px;padding:1px 7px;border-radius:8px;border:1px solid;color:${stCol};border-color:${stCol};white-space:nowrap;flex-shrink:0">${stLbl}</span>
      </div>
      <div style="font-size:10px;color:var(--dim2);margin-top:2px">${escH(o.orderId||o._id.slice(-6))} · ${offProds.length} منتج أوفست</div>
      ${totalCost>0?`<div style="font-size:10px;color:var(--y);margin-top:3px">💰 ${fmt(totalCost)} ج تكلفة</div>`:''}
    </div>`;
  }).join('');
}

window.offSelect=function(id){
  activeId=id;activeOrder=orders.find(o=>o._id===id)||null;activeProdIdx=0;
  if(!activeOrder)return;
  $('off-empty').style.display='none';
  $('off-order').style.display='flex';
  renderList();
  renderWorkspace(activeOrder);
  // موبايل: افتح مساحة العمل
  const isMob=window.innerWidth<=768;
  const main=$('off-main');
  const backBtn=$('off-back-btn');
  if(main){main.classList.toggle('mob-open',isMob);}
  if(backBtn){backBtn.style.display=isMob?'block':'none';}
};
window.offBack=function(){
  $('off-main')?.classList.remove('mob-open');
  $('off-back-btn').style.display='none';
};

// ── مساحة العمل ──
window.offTab=function(name,btn){
  document.querySelectorAll('.off-tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.off-pane').forEach(p=>p.classList.remove('on'));
  if(btn)btn.classList.add('on');
  $('off-pane-'+name)?.classList.add('on');
  if(activeOrder){
    if(name==='calc')renderCalcTab(activeOrder);
    else if(name==='cost')renderCostTab(activeOrder);
    else if(name==='press')renderPressTab(activeOrder);
  }
};

function renderWorkspace(o){
  renderHeader(o);
  const active=document.querySelector('.off-pane.on')?.id?.replace('off-pane-','')||'calc';
  if(active==='calc')renderCalcTab(o);
  else if(active==='cost')renderCostTab(o);
  else if(active==='press')renderPressTab(o);
}

function renderHeader(o){
  const el=$('off-order-hdr');if(!el)return;
  const totalCost=(o.costItems||[]).reduce((s,ci)=>s+(parseFloat(ci.total)||0),0);
  const sale=parseFloat(o.salePrice)||0;
  const margin=sale-totalCost;
  el.innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
      <div>
        <div style="font-size:16px;font-weight:var(--fw-heavy)">${escH(o.clientName||'—')}</div>
        <div style="font-size:var(--fs-xs);color:var(--dim2);margin-top:2px">${escH(o.orderId||o._id.slice(-6))} · ${(o.products||[]).filter(p=>(p.printType||'').includes('offset')).length} منتج أوفست</div>
      </div>
      <div style="text-align:left;flex-shrink:0">
        ${sale>0?`<div style="font-size:10px;color:var(--dim2)">الهامش</div>
        <div style="font-size:20px;font-weight:var(--fw-heavy);color:${margin>=0?'var(--g)':'var(--r)'}">${margin>=0?'+':''}${fmt(margin)} ج</div>`:''}
      </div>
    </div>`;
}

// ── Tab 1: الحاسبة ──
function renderCalcTab(o){
  const el=$('off-pane-calc');if(!el)return;
  const offProds=(o.products||[]).map((p,i)=>({...p,_i:i})).filter(p=>(p.printType||'').includes('offset'));
  if(!offProds.length){el.innerHTML=`<div style="text-align:center;padding:40px;color:var(--dim2)">لا توجد منتجات أوفست</div>`;return;}

  // تصحيح activeProdIdx لو خرج من النطاق
  if(activeProdIdx>=(o.products||[]).length)activeProdIdx=offProds[0]._i;

  const navHtml=offProds.length>1?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">
    ${offProds.map(p=>`<button class="off-prod-btn${p._i===activeProdIdx?' on':''}" onclick="offSelProd(${p._i})">${escH(p.name||('منتج '+(p._i+1)))}</button>`).join('')}
  </div>`:'';

  const p=(o.products||[])[activeProdIdx]||offProds[0];
  const idx=activeProdIdx;
  const eng=window.offsetCostEngine;
  const paperMeta=getPaperMeta(p.paper||'');
  const allPapersData=Array.isArray(appSettings.paperTypesData)?appSettings.paperTypesData.filter(Boolean):[];
  const printSize=p.printSize||p.size||'';
  const qty=parseInt(p.qty)||0;
  const frontC=parseInt(p.frontColors)||0, backC=parseInt(p.backColors)||0;
  const r=computeOffsetReadiness(p);
  const barCol=r.ready?'var(--g)':r.pct>=60?'var(--y)':'var(--r)';

  // حساب الفروخ والتكلفة
  let rankCards='', costSummary='';
  if(eng&&printSize&&qty>0){
    const rankings=eng.rankAllSizes(printSize,qty,allPapersData);
    const selRank=rankings.find(pm=>pm.name===p.paper);
    const selSheets=selRank?.sheetsTotal||parseInt(p.paperSheets)||0;
    const machine=selRank?.machine||paperMeta?.machine||'';
    const machRates=appSettings.offsetMachineRates||{};
    const machRate=parseFloat(machRates[machine])||0;
    const zincCPP=parseFloat(appSettings.zincCostPerPlate)||0;
    const zinkCnt=eng.calcZincCount(frontC,backC);
    const totalPasses=selSheets*(frontC+backC);
    const trajs=totalPasses>0?Math.ceil(totalPasses/1000):0;
    const paperCost=paperMeta&&selSheets>0?eng.calcPaperCost(selSheets,paperMeta.costPerSheet):0;
    const mc=trajs*machRate;
    const zc=eng.calcZincCost(frontC,backC,zincCPP);
    const totalCalc=paperCost+mc+zc;

    // بطاقات الورق (أفضل 3)
    rankCards=`<div class="off-card"><div class="off-sec-hd">📄 اختيار مقاس الورق — أفضل توافق</div>${
      rankings.slice(0,3).map((pm,ri)=>{
        const isSel=pm.name===p.paper;
        const layout=eng.fitLayout(printSize,pm.originalSize||'');
        const eff=layout?.efficiency||0;
        const effCol=eff>=80?'var(--g)':eff>=60?'var(--y)':'var(--r)';
        const pc=pm.hasPrice&&pm.costPerSheet?eng.calcPaperCost(pm.sheetsTotal,pm.costPerSheet):0;
        return`<div onclick="offSelPaper('${o._id}',${idx},'${escAttr(pm.name)}',${pm.sheetsTotal})"
          style="display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;border:2px solid ${isSel?'var(--y)':'var(--line)'};background:${isSel?'rgba(255,170,0,.07)':'var(--bg3)'};cursor:pointer;margin-bottom:6px">
          <div style="flex:1;min-width:0">
            <div style="font-size:var(--fs-xs);font-weight:var(--fw-bold);color:${isSel?'var(--y)':'var(--snow)'}">${escH(pm.name)}</div>
            ${pm.machine?`<div style="font-size:9px;color:var(--dim2)">${escH(pm.machine)} · ${escH(pm.originalSize||'')} سم</div>`:''}
          </div>
          <div style="display:flex;gap:12px;align-items:center;flex-shrink:0">

function renderCostTab(o){
  const el=$('off-pane-cost');if(!el)return;
  const costItems=o.costItems||[];
  const sale=parseFloat(o.salePrice)||0;
  const totalCost=costItems.reduce((s,ci)=>s+(parseFloat(ci.total)||0),0);
  const margin=sale-totalCost;
  const canReqPay=['admin','operation_manager','production_agent'].includes(currentRole);

  // تجميع حسب المنتج
  const byProd={};
  costItems.forEach((ci,ciIdx)=>{
    const k=ci.prodIdx!=null?String(ci.prodIdx):'order';
    if(!byProd[k])byProd[k]=[];
    byProd[k].push({...ci,_ciIdx:ciIdx});
  });

  const groupsHtml=Object.keys(byProd).length?Object.entries(byProd).map(([k,items])=>{
    const p=k!=='order'&&(o.products||[])[parseInt(k)]?(o.products||[])[parseInt(k)]:null;
    const label=p?`${p.name||('منتج '+(parseInt(k)+1))} ×${p.qty||1}`:'بنود الأوردر';
    const grpTotal=items.reduce((s,ci)=>s+(parseFloat(ci.total)||0),0);
    return`<div class="off-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="off-sec-hd" style="margin-bottom:0">${escH(label)}</div>
        <div style="font-size:var(--fs-xs);font-weight:var(--fw-heavy);color:var(--y)">${fmt(grpTotal)} ج</div>
      </div>
      ${items.map(ci=>{
        const isPaid=!!ci.paid;
        const isPending=!isPaid&&!!ci.pendingPaymentRequestId;
        const badge=isPaid
          ?`<span style="font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(0,217,126,.15);color:var(--g);border:1px solid rgba(0,217,126,.3)">✓ مدفوع</span>`
          :isPending
          ?`<span style="font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(255,170,0,.12);color:var(--y);border:1px solid rgba(255,170,0,.3)">⏳ انتظار اعتماد</span>`
          :`<span style="font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(255,80,80,.1);color:var(--r);border:1px solid rgba(255,80,80,.25)">غير مدفوع</span>`;
        const payBtn=!isPaid&&!isPending&&canReqPay&&ci.supplierId
          ?`<button onclick="offReqPay('${o._id}',${ci._ciIdx})" class="off-btn off-btn-g" style="font-size:9px;padding:2px 8px">💸 طلب دفع</button>`:'';
        return`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg3);border:1px solid var(--line);border-radius:8px;margin-bottom:4px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
              <span style="font-size:var(--fs-xs);font-weight:var(--fw-bold)">${escH(ci.type||'—')}</span>${badge}
            </div>
            ${ci.note?`<div style="font-size:9px;color:var(--dim2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(ci.note)}</div>`:''}
            ${ci.supplierName?`<div style="font-size:9px;color:var(--dim2)">🏭 ${escH(ci.supplierName)}</div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
            <div style="font-size:var(--fs-sm);font-weight:var(--fw-heavy)">${fmt(ci.total)} ج</div>
            ${payBtn}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join(''):`<div style="text-align:center;padding:40px;color:var(--dim2)">⚠️ لا توجد بنود تكلفة — استخدم تبويب الحاسبة لتسجيلها</div>`;

  el.innerHTML=`
    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:repeat(${sale>0?3:1},1fr);gap:8px;margin-bottom:14px">
      <div style="background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.3);border-radius:10px;padding:10px 12px;text-align:center">
        <div style="font-size:10px;color:var(--dim2)">إجمالي التكلفة</div>
        <div style="font-size:22px;font-weight:var(--fw-heavy);color:var(--y)">${fmt(totalCost)}</div>
        <div style="font-size:10px;color:var(--dim2)">جنيه</div>
      </div>
      ${sale>0?`
      <div style="background:rgba(59,158,255,.08);border:1px solid rgba(59,158,255,.3);border-radius:10px;padding:10px 12px;text-align:center">
        <div style="font-size:10px;color:var(--dim2)">سعر البيع</div>
        <div style="font-size:22px;font-weight:var(--fw-heavy);color:var(--b)">${fmt(sale)}</div>
        <div style="font-size:10px;color:var(--dim2)">جنيه</div>
      </div>
      <div style="background:${margin>=0?'rgba(0,217,126,.08)':'rgba(255,80,80,.08)'};border:1px solid ${margin>=0?'rgba(0,217,126,.3)':'rgba(255,80,80,.3)'};border-radius:10px;padding:10px 12px;text-align:center">
        <div style="font-size:10px;color:var(--dim2)">الهامش</div>
        <div style="font-size:22px;font-weight:var(--fw-heavy);color:${margin>=0?'var(--g)':'var(--r)'}">${margin>=0?'+':''}${fmt(margin)}</div>
        <div style="font-size:10px;color:var(--dim2)">${sale>0?Math.round(margin/sale*100)+'%':''}</div>
      </div>`:''}
    </div>
    ${groupsHtml}
  `;
}

function renderPressTab(o){
  const el=$('off-pane-press');if(!el)return;
  const offProds=(o.products||[]).map((p,i)=>({...p,_i:i})).filter(p=>(p.printType||'').includes('offset'));
  if(!offProds.length){el.innerHTML=`<div style="text-align:center;padding:40px;color:var(--dim2)">لا توجد منتجات أوفست</div>`;return;}
  const buildPressOpts=selId=>'<option value="">— اختر المطبعة —</option>'+getPresses().map(s=>`<option value="${s._id}" data-name="${escAttr(s.name||'')}" data-phone="${escAttr(s.phone||s.whatsapp||'')}"${s._id===selId?' selected':''}>${escAttr(s.name)}${s.category?' · '+escAttr(s.category):''}</option>`).join('');

  el.innerHTML=offProds.map(p=>{

    const dtVal=p.pressDeadline?(()=>{try{const d=new Date(p.pressDeadline);const off=d.getTimezoneOffset();return new Date(d.getTime()-off*60000).toISOString().slice(0,16);}catch{return'';}})():'';
    return`<div class="off-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="off-sec-hd" style="margin-bottom:0">${escH(p.name||('منتج '+(idx+1)))} <span style="color:var(--y)">×${p.qty||1}</span></div>
        <div style="display:flex;align-items:center;gap:8px">
          ${p.productStatus?productStatusBadge(p.productStatus):''}
          <span style="font-size:10px;color:${barCol};font-weight:var(--fw-bold)">${r.pct}%</span>
        </div>
      </div>
      <!-- Progress -->
      <div style="height:4px;border-radius:2px;background:var(--bg3);overflow:hidden;margin-bottom:10px">
        <div style="width:${r.pct}%;height:100%;background:${barCol};border-radius:2px"></div>
      </div>
      <div class="off-field"><label class="off-label">🏭 المطبعة</label>
        <select class="off-inp" onchange="offUpdPress('${o._id}',${idx},this)">${buildPressOpts(p.pressId||'')}</select>
      </div>
      <div class="off-field"><label class="off-label">📅 ميعاد التسليم من المطبعة</label>
        <input class="off-inp" type="datetime-local" value="${escAttr(dtVal)}" onchange="offUpd('${o._id}',${idx},'pressDeadline',this.value?new Date(this.value).toISOString():'')">
      </div>
      <div class="off-field"><label class="off-label">📝 ملاحظات الشغل</label>
        <textarea class="off-inp" rows="2" oninput="offUpd('${o._id}',${idx},'briefNotes',this.value)" placeholder="ملاحظات خاصة للمطبعة…" style="resize:none">${escH(p.briefNotes||'')}</textarea>
      </div>
      ${p.briefSentAt?`<div style="font-size:10px;color:var(--g);padding:6px 10px;background:rgba(0,217,126,.07);border-radius:8px;margin-bottom:8px">✅ أُرسل ${escH(p.briefSentAt)}${p.briefSentByName?' · '+escH(p.briefSentByName):''}</div>`:''}
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button type="button" onclick="offSendBrief('${o._id}',${idx})" ${r.ready?'':'disabled'} class="off-btn off-btn-wa" style="flex:1;padding:10px">
          💬 ${p.briefSentAt?'إعادة إرسال البريف':'إرسال البريف واتساب'}
        </button>
        ${!['printed','done'].includes(p.productStatus||'')?`<button type="button" onclick="offSetStatus('${o._id}',${idx},'printed')" class="off-btn off-btn-g" style="padding:10px">🖨️ مطبوع</button>`:''}

      ${!r.ready?`<div style="font-size:10px;color:var(--dim2);text-align:center;margin-top:5px">ناقص: ${r.crit.filter(c=>!c.ok).map(c=>c.label).join(' · ')}</div>`:''}

// ── الإجراءات ──
const _debTimers=new Map();
function debSave(key,fn,ms=700){clearTimeout(_debTimers.get(key));_debTimers.set(key,setTimeout(fn,ms));}

window.offUpd=function(orderId,idx,field,value){
  if(activeOrder&&activeOrder._id===orderId){const p=(activeOrder.products||[])[idx];if(p)p[field]=value;}
  debSave(`${orderId}|${idx}|${field}`,async()=>{
    const r=await orderActions.applyProductBriefPatch({db,orderId,prodIdx:idx,patch:{[field]:value},userId:currentUid,userName});
    if(r&&!r.ok)toast('❌ '+(r.errors||[]).join(' · '),'err');
  });
};

window.offUpdSz=function(orderId,idx,dim,val){
  const p=(activeOrder?.products||[])[idx];if(!p)return;
  const parts=(p.printSize||p.size||'').split('×');
  const newSize=`${dim==='w'?val:(parts[0]||'')}×${dim==='h'?val:(parts[1]||'')}`;
  p.printSize=newSize;
  debSave(`${orderId}|${idx}|size`,async()=>{
    await orderActions.applyProductBriefPatch({db,orderId,prodIdx:idx,patch:{printSize:newSize},userId:currentUid,userName});
  });
  if(activeOrder&&activeOrder._id===orderId)renderCalcTab(activeOrder);
};

window.offUpdZink=function(orderId,idx,f,b){
  if(activeOrder){const p=(activeOrder.products||[])[idx];if(p){p.frontColors=f;p.backColors=b;}}
  debSave(`${orderId}|${idx}|zink`,async()=>{
    await orderActions.applyProductBriefPatch({db,orderId,prodIdx:idx,patch:{frontColors:f,backColors:b},userId:currentUid,userName});
  });
  if(activeOrder&&activeOrder._id===orderId)renderCalcTab(activeOrder);
};

window.offUpdPress=function(orderId,idx,sel){
  const opt=sel?.options?.[sel.selectedIndex];
  const pressId=opt?.value||'', pressName=opt?.dataset?.name||'';
  if(activeOrder){const p=(activeOrder.products||[])[idx];if(p){p.pressId=pressId;p.pressName=pressName;}}
  debSave(`${orderId}|${idx}|press`,async()=>{
    await orderActions.applyProductBriefPatch({db,orderId,prodIdx:idx,patch:{pressId,pressName},userId:currentUid,userName});
  });
};

window.offSelPaper=function(orderId,idx,name,sheets){
  if(activeOrder){const p=(activeOrder.products||[])[idx];if(p){p.paper=name;p.paperSheets=sheets;}}
  orderActions.applyProductBriefPatch({db,orderId,prodIdx:idx,patch:{paper:name,paperSheets:sheets},userId:currentUid,userName})
    .then(r=>{if(r&&!r.ok)toast('❌ '+(r.errors||[]).join(' · '),'err');});
  if(activeOrder&&activeOrder._id===orderId)renderCalcTab(activeOrder);
};

window.offApplyCost=async function(orderId,idx){
  const o=orders.find(x=>x._id===orderId)||activeOrder;if(!o)return;
  const p=(o.products||[])[idx];if(!p)return;
  const eng=window.offsetCostEngine;if(!eng)return toast('⚠️ محرك الحساب لم يُحمَّل','warn');
  const paperMeta=getPaperMeta(p.paper||'');
  const printSize=p.printSize||p.size||'';const qty=parseInt(p.qty)||0;
  const allPapersData=Array.isArray(appSettings?.paperTypesData)?appSettings.paperTypesData.filter(Boolean):[];
  const selRank=eng.rankAllSizes(printSize,qty,allPapersData).find(pm=>pm.name===(p.paper||''));
  const selSheets=selRank?.sheetsTotal||parseInt(p.paperSheets)||0;
  const machine=selRank?.machine||paperMeta?.machine||'';
  const machRate=parseFloat(appSettings?.offsetMachineRates?.[machine])||0;
  const frontC=parseInt(p.frontColors)||0,backC=parseInt(p.backColors)||0;
  const trajs=selSheets*(frontC+backC)>0?Math.ceil(selSheets*(frontC+backC)/1000):0;
  const mc=trajs*machRate;
  const zincCPP=parseFloat(appSettings?.zincCostPerPlate)||0;
  const zinkCnt=eng.calcZincCount(frontC,backC);
  const lines=[];
  if(paperMeta&&selSheets>0){const pc=eng.calcPaperCost(selSheets,paperMeta.costPerSheet);if(pc>0)lines.push({type:'ورق',total:pc,supplierId:paperMeta.supplierId||'',supplierName:paperMeta.supplierName||'',note:`${paperMeta.name} ${paperMeta.originalSize||''} — ${selSheets} فرخة`.trim()});}
  if(machine&&mc>0)lines.push({type:'طباعة',total:mc,supplierId:p.pressId||'',supplierName:p.pressName||'',note:`${machine} — ${trajs} تراج × ${machRate} ج`});
  if(zinkCnt>0&&zincCPP>0)lines.push({type:'زنكات',total:eng.calcZincCost(frontC,backC,zincCPP),supplierId:p.pressId||'',supplierName:p.pressName||'',note:`${zinkCnt} لوح (${frontC} وجه + ${backC} ظهر) × ${zincCPP} ج`});
  if(!lines.length)return toast('⚠️ لا توجد بنود محسوبة — تأكد من الورق والزنكات','warn');
  let ok=true,msgs=[];
  for(const line of lines){
    const r=await orderActions.recordCostItem({db,orderId,prodIdx:idx,payload:line,role:currentRole,userId:currentUid,userName,wallets:[]});
    if(!r.ok){ok=false;msgs.push(...(r.errors||[]));}
  }
  if(ok)toast(`✅ تم تسجيل ${lines.length} بند تكلفة`,'ok');
  else toast('❌ '+msgs.join(' · '),'err');
};

window.offReqPay=async function(orderId,ciIdx){
  const o=orders.find(x=>x._id===orderId)||activeOrder;if(!o)return;
  const ci=(o.costItems||[])[ciIdx];
  if(!ci||!ci.supplierId)return toast('⚠️ البند بدون مورد — حدّد المورد أولاً','warn');
  const r=await productionActions.requestSupplierPayment({db,orderId,costItemIdx:ciIdx,order:o,role:currentRole,userId:currentUid,userName});
  if(!r.ok)return toast('❌ '+(r.errors||[]).join(' · '),'err');
  toast(`✅ طلب دفع: ${ci.type} — ${fmt(ci.total)} ج`,'ok');
};

window.offSetStatus=async function(orderId,idx,status){
  const r=await orderActions.setProductCatalogStatus({db,orderId,prodIdx:idx,status,userId:currentUid,userName});
  if(!r||!r.ok)return toast('❌ '+(r?.errors||[]).join(' · '),'err');
  toast('✅ تم تحديث الحالة','ok');
};

window.offSendBrief=function(orderId,idx){
  const o=orders.find(x=>x._id===orderId)||activeOrder;if(!o)return;
  const p=(o.products||[])[idx];if(!p)return;
  const press=getPresses().find(s=>s._id===p.pressId);
  const phone=(press?.phone||press?.whatsapp||'').replace(/\D/g,'');
  if(!phone)return toast('⚠️ رقم المطبعة غير موجود — أضفه في سجل الموردين','warn');
  const lines=[
    `*بريف طباعة أوفست — ${o.clientName||''}*`,
    `رقم الأوردر: ${o.orderId||o._id.slice(-6)}`,
    `المنتج: ${p.name||''} × ${p.qty||1}`,
    `مقاس الطباعة: ${p.printSize||p.size||'—'}`,
    `الورق: ${p.paper||'—'}${p.weight?' '+p.weight+'جم':''}`,
    `الزنكات: ${p.zinkType||((parseInt(p.frontColors)||0)+'+'+(parseInt(p.backColors)||0))} (${parseInt(p.frontColors)||0} وجه + ${parseInt(p.backColors)||0} ظهر)`,
    `عدد الفروخ: ${p.paperSheets||'—'}`,
    `مقاس القص: ${p.cutSize||'—'}`,
    `السلوفان: ${p.lamination||'بلا'}`,
    p.briefNotes?`ملاحظات: ${p.briefNotes}`:'',
    p.pressDeadline?`الميعاد: ${new Date(p.pressDeadline).toLocaleString('ar-EG')}`:'',
  ].filter(Boolean);
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(lines.join('\n'))}`,'_blank','noopener');
  orderActions.applyProductBriefPatch({db,orderId,prodIdx:idx,patch:{briefSentAt:nowStr(),briefSentByName:userName},userId:currentUid,userName});
};

window.toggleNav=()=>{document.querySelector('.sidenav')?.classList.toggle('mob-open');document.getElementById('nav-ov')?.classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav')?.classList.remove('mob-open');document.getElementById('nav-ov')?.classList.remove('show');};
window.doLogout=async()=>{await signOut(auth);location.href='login.html';};
</script>
