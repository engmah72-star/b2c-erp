<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Business2Card — حسابات الشحن</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="sync-monitor.js"></script>
<script src="finance-core.js"></script>
<style>
/* ══ Company Cards ══ */
.co-card{background:var(--bg2);border:1px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden}
.co-head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.co-name{font-size:16px;font-weight:900}
.co-body{padding:14px 16px}
.co-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.co-kpi{background:var(--bg3);border-radius:10px;padding:10px;text-align:center}
.co-kpi-val{font-size:17px;font-weight:900;line-height:1.1}
.co-kpi-lbl{font-size:10px;color:var(--dim2);font-weight:700;margin-top:3px}
/* ══ Orders in company ══ */
.settle-row{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;margin-bottom:6px}
.settle-row label{display:flex;align-items:center;gap:8px;flex:1;cursor:pointer}
/* ══ Settlements list ══ */
.settle-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg3);border-radius:8px;margin-bottom:5px}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav">
  <div class="nav-brand"><div class="nav-logo">🎨</div><div><div class="nav-brand-name">Business2Card</div><div class="nav-brand-role" id="role-badge">ERP</div></div></div>
  <div class="nav-scroll" id="nav-scroll-dynamic"></div>
  <div class="nav-foot"><div class="nav-user" onclick="doLogout()"><div class="nav-avatar" id="nav-av">A</div><div><div class="nav-user-name" id="nav-name">—</div><div class="nav-user-role">تسجيل خروج</div></div></div></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div><h1>📦 حسابات الشحن</h1><p id="sub" style="font-size:12px;color:var(--dim2)">جاري التحميل...</p></div>
    </div>
  </div>

  <div class="content">

    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px">
      <div style="background:linear-gradient(135deg,rgba(255,61,110,.15),rgba(255,61,110,.05));border:1.5px solid rgba(255,61,110,.3);border-radius:14px;padding:14px;text-align:center">
        <div style="font-size:10px;color:var(--dim2);font-weight:800;margin-bottom:4px">📦 مستحق من الشركات</div>
        <div style="font-size:22px;font-weight:900;color:var(--r)" id="s-due">—</div>
      </div>
      <div style="background:rgba(255,61,110,.06);border:1px solid rgba(255,61,110,.15);border-radius:14px;padding:14px;text-align:center">
        <div style="font-size:10px;color:var(--dim2);font-weight:800;margin-bottom:4px">⏳ باقي للتحصيل</div>
        <div style="font-size:22px;font-weight:900;color:var(--r)" id="s-remaining">—</div>
      </div>
      <div style="background:rgba(0,217,126,.08);border:1px solid rgba(0,217,126,.2);border-radius:14px;padding:14px;text-align:center">
        <div style="font-size:10px;color:var(--dim2);font-weight:800;margin-bottom:4px">✅ تم استلامه</div>
        <div style="font-size:22px;font-weight:900;color:var(--g)" id="s-collected">—</div>
      </div>
      <div style="background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.2);border-radius:14px;padding:14px;text-align:center">
        <div style="font-size:10px;color:var(--dim2);font-weight:800;margin-bottom:4px">↩️ مرتجعات</div>
        <div style="font-size:22px;font-weight:900;color:var(--y)" id="s-returns">—</div>
      </div>
    </div>

    <!-- فلاتر -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
      <select class="inp" id="f-month" onchange="render()" style="max-width:150px;font-size:12px;padding:8px 10px">
        <option value="">كل الأشهر</option>
      </select>
      <select class="inp" id="f-company" onchange="render()" style="max-width:160px;font-size:12px;padding:8px 10px">
        <option value="">كل الشركات</option>
      </select>
    </div>

    <!-- القائمة -->
    <div id="companies-list"></div>

  </div>
</div>

<!-- Modal: تسجيل دفعة -->
<div class="overlay" id="ov-settle">
  <div class="modal" style="max-width:480px">
    <div class="modal-head">
      <span class="modal-title">💰 تسجيل دفعة من شركة شحن</span>
      <button class="modal-x" onclick="closeSettle()">✕</button>
    </div>
    <div class="modal-body">
      <div style="background:var(--bg3);border-radius:10px;padding:10px 14px;margin-bottom:14px">
        <div style="font-size:13px;font-weight:800" id="settle-co-name">—</div>
        <div style="font-size:12px;color:var(--dim2);margin-top:2px">مستحق: <span id="settle-due" style="color:var(--r);font-weight:800">—</span></div>
      </div>
      <!-- الأوردرات -->
      <div style="font-size:11px;font-weight:800;color:var(--dim2);margin-bottom:8px">اختر الأوردرات المُسوّاة:</div>
      <div id="settle-orders" style="max-height:220px;overflow-y:auto;margin-bottom:12px"></div>
      <!-- المبلغ -->
      <div class="fg">
        <label>المبلغ الوارد من الشركة (ج)</label>
        <input class="inp" id="settle-amount" type="number" placeholder="0" oninput="calcSettleDiff()">
        <div id="settle-diff" style="font-size:12px;margin-top:6px;padding:6px 10px;border-radius:8px;display:none"></div>
      </div>
      <!-- المحفظة -->
      <div class="fg">
        <label>اضف للمحفظة</label>
        <select class="inp" id="settle-wallet"><option value="">— اختر —</option></select>
      </div>
      <div class="fg">
        <label>ملاحظة</label>
        <input class="inp" id="settle-ref" placeholder="رقم مرجعي أو ملاحظة">
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeSettle()">إلغاء</button>
      <button class="btn btn-g" onclick="saveSettle()">✓ تأكيد الدفعة</button>
    </div>
  </div>
</div>

<!-- Panel: تفاصيل الأوردر والتكاليف -->
<div class="panel-ov" id="acc-panel-ov" onclick="closeAccPanel()">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-head" id="acc-pn-hdr">
      <div style="flex:1"><div style="font-size:17px;font-weight:900">—</div></div>
      <button type="button" class="modal-x" onclick="closeAccPanel()">✕</button>
    </div>
    <div class="panel-body" id="acc-pn-body"></div>
  </div>
</div>

<!-- Modal: تسجيل مرتجع -->
<div class="overlay" id="ov-return">
  <div class="modal" style="max-width:420px">
    <div class="modal-head">
      <span class="modal-title">↩️ تسجيل مرتجع</span>
      <button class="modal-x" onclick="document.getElementById('ov-return').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body">
      <div style="font-size:13px;font-weight:800;margin-bottom:12px" id="return-co-name">—</div>
      <div id="return-orders" style="max-height:200px;overflow-y:auto;margin-bottom:12px"></div>
      <div class="fg"><label>تكلفة المرتجع (ج)</label><input class="inp" id="return-cost" type="number" placeholder="0"></div>
      <div class="fg"><label>ملاحظة</label><input class="inp" id="return-note" placeholder="سبب المرتجع"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="document.getElementById('ov-return').classList.remove('open')">إلغاء</button>
      <button class="btn btn-r" onclick="saveReturn()">↩️ تأكيد المرتجع</button>
    </div>
  </div>
</div>

<nav class="mob-nav"><div class="mob-nav-items" id="mob-nav-items"></div></nav>
<div class="nav-overlay" id="nav-ov" onclick="closeNav()"></div>
<div id="toasts" class="toasts"></div>

<script>
const SBPAGES=[{file:'index.html',label:'لوحة التحكم',ico:'⬡',adminOnly:true},{file:'clients.html',label:'العملاء',ico:'👤',perm:'clients'},{file:'design.html',label:'التصميم',ico:'✏️',perm:'design'},{file:'print.html',label:'الطباعة',ico:'🖨️',perm:'print'},{file:'production.html',label:'التنفيذ',ico:'🏭',perm:'production'},{file:'shipping.html',label:'الشحن',ico:'🚚',perm:'shipping'},{file:'shipping-accounts.html',label:'حسابات الشحن',ico:'📦',perm:'shipping-accounts'},{file:'archive.html',label:'الأرشيف',ico:'📁',perm:'archive'},{file:'accounts.html',label:'الحسابات',ico:'💰',perm:'accounts'},{file:'suppliers.html',label:'الموردين',ico:'▣',perm:'suppliers'},{file:'products.html',label:'المنتجات',ico:'◈',perm:'products'},{file:'employees.html',label:'الموظفين',ico:'👥',adminOnly:true},{file:'reports.html',label:'التقارير',ico:'📊',perm:'reports'},{file:'settings.html',label:'الإعدادات',ico:'⚙️',adminOnly:true}];
const MOB_NAV_CFG={shipping_officer:[{h:'shipping-dashboard.html',i:'⬡',l:'داشبوردي'},{h:'shipping.html',i:'🚚',l:'الشحن'},{h:'shipping-accounts.html',i:'📦',l:'حسابات'}],production_agent:[{h:'production-dashboard.html',i:'⬡',l:'داشبوردي'},{h:'production.html',i:'🏭',l:'تنفيذ'}],customer_service:[{h:'cs-dashboard.html',i:'⬡',l:'داشبوردي'},{h:'clients.html',i:'👤',l:'العملاء'},{h:'design.html',i:'✏️',l:'تصميم'}],graphic_designer:[{h:'designer-dashboard.html',i:'⬡',l:'داشبوردي'},{h:'design.html',i:'✏️',l:'تصميم'}],design_operator:[{h:'designer-dashboard.html',i:'⬡',l:'داشبوردي'},{h:'design.html',i:'✏️',l:'تصميم'}],wallet_manager:[{h:'accounts.html',i:'💰',l:'حسابات'}],admin:[{h:'index.html',i:'⬡',l:'التحكم'},{h:'clients.html',i:'👤',l:'عملاء'},{h:'shipping.html',i:'🚚',l:'شحن'},{h:'shipping-accounts.html',i:'📦',l:'حسابات شحن'},{h:'accounts.html',i:'💰',l:'مالية'}],operation_manager:[{h:'ops-dashboard.html',i:'⬡',l:'داشبوردي'},{h:'clients.html',i:'👤',l:'عملاء'},{h:'shipping.html',i:'🚚',l:'شحن'},{h:'shipping-accounts.html',i:'📦',l:'حسابات شحن'},{h:'accounts.html',i:'💰',l:'مالية'}]};
function buildMobNav(role,cur){const el=document.getElementById('mob-nav-items');if(!el)return;const items=MOB_NAV_CFG[role]||MOB_NAV_CFG.admin;el.innerHTML=items.map(n=>`<a class="mob-nav-item${n.h===cur?' active':''}" href="${n.h}"><div class="mob-nav-ico">${n.i}</div><div class="mob-nav-lbl">${n.l}</div></a>`).join('');}
function buildSidebar(ud,cur){const role=ud?.role||'customer_service';const pages=(ud?.permissions?.pages)||[];const isAdm=['admin','operation_manager'].includes(role);const nav=document.getElementById('nav-scroll-dynamic');if(!nav)return;let html='';for(const p of SBPAGES){const ok=isAdm||(p.adminOnly?false:pages.includes('*')||pages.includes(p.perm||''));if(!ok)continue;html+=`<a class="nav-link${cur===p.file?' active':''}" href="${p.file}"><span class="nav-ico">${p.ico}</span> ${p.label}</a>`;}nav.innerHTML=html;}
window.toggleNav=()=>{document.querySelector('.sidenav')?.classList.toggle('mob-open');document.getElementById('nav-ov')?.classList.toggle('show');};
window.closeNav=()=>{document.querySelector('.sidenav')?.classList.remove('mob-open');document.getElementById('nav-ov')?.classList.remove('show');};
window.doLogout=async()=>{const {getAuth,signOut}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");await signOut(getAuth());window.location.href='login.html';};
</script>

<script type="module">
import {initializeApp} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getAuth,onAuthStateChanged,signOut} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {getFirestore,collection,doc,onSnapshot,addDoc,updateDoc,getDoc,getDocs,deleteDoc,query,where,serverTimestamp,increment,writeBatch} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"});
const auth=getAuth(app),db=getFirestore(app);

// ══ State ══
let allOrders=[],settlements=[],returns=[],wallets=[],currentUser=null,userName='';
let settleCompanyName='',returnCompanyName='';

// ══ Helpers ══
const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');
const gv=id=>document.getElementById(id)?.value||'';
const sv=(id,v)=>{const e=document.getElementById(id);if(e)e.value=v;};
const setText=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
const nowStr=()=>new Date().toLocaleDateString('ar-EG')+' '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
const toast=(msg,t='')=>{const c=document.getElementById('toasts');if(!c)return;const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);};

// ══ Finance Core (fallback لو مش محمّل) ══
const FC=window.FC||{
  getPaid:o=>parseFloat(o?.totalPaid)||parseFloat(o?.paid)||parseFloat(o?.deposit)||0,
  getNet:o=>Math.max(0,(parseFloat(o?.salePrice)||0)-(parseFloat(o?.discount)||0)),
  getDueByCo:o=>Math.max(0,(parseFloat(o?.salePrice)||0)-(parseFloat(o?.discount)||0)-(parseFloat(o?.totalPaid)||parseFloat(o?.paid)||parseFloat(o?.deposit)||0)),
};

// ══ Auth ══
let __started=false;
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  if(__started)return;__started=true;
  currentUser=u;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(snap.exists()){
    const d=snap.data();userName=d.name||u.email;
    setText('nav-name',userName);
    document.getElementById('nav-av').textContent=(userName[0]||'A').toUpperCase();
    buildSidebar(d,'shipping-accounts.html');
    buildMobNav(d.role||'admin','shipping-accounts.html');
  }
  startListeners();
});

window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};

function startListeners(){
  onSnapshot(collection(db,'orders'),snap=>{
    allOrders=snap.docs.map(d=>({...d.data(),_id:d.id}));
    fillFilters();render();
  });
  onSnapshot(collection(db,'shipping_settlements'),snap=>{
    settlements=snap.docs.map(d=>({...d.data(),_id:d.id}));render();
  });
  onSnapshot(collection(db,'shipping_returns'),snap=>{
    returns=snap.docs.map(d=>({...d.data(),_id:d.id}));render();
  });
  onSnapshot(collection(db,'wallets'),snap=>{
    wallets=snap.docs.map(d=>({...d.data(),_id:d.id}));
    // تحديث الـ select في الـ modal
    const sel=document.getElementById('settle-wallet');
    if(sel){const cur=sel.value;sel.innerHTML='<option value="">— اختر المحفظة —</option>'+wallets.map(w=>`<option value="${w._id}">${w.name} (${fn(w.balance||0)} ج)</option>`).join('');sel.value=cur;}
  });
}

// ══ ملء الفلاتر ══
function fillFilters(){
  const months=new Set();const companies=new Set();
  allOrders.filter(o=>o.shipCompanyName&&['shipping','archived'].includes(o.stage)).forEach(o=>{
    companies.add(o.shipCompanyName);
    const d=o.createdAt?.toDate?.();
    if(d)months.add(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
  });
  const mSel=document.getElementById('f-month');const curM=mSel?.value;
  if(mSel)mSel.innerHTML='<option value="">كل الأشهر</option>'+[...months].sort().reverse().map(m=>`<option value="${m}" ${m===curM?'selected':''}>${m}</option>`).join('');
  const cSel=document.getElementById('f-company');const curC=cSel?.value;
  if(cSel)cSel.innerHTML='<option value="">كل الشركات</option>'+[...companies].sort().map(co=>`<option value="${co}" ${co===curC?'selected':''}>${co}</option>`).join('');
}

// ══ Render ══
window.render=function(){
  const fMonth=gv('f-month');
  const fCo=gv('f-company');

  // أوردرات شركات الشحن (بدون pickup)
  let shipped=allOrders.filter(o=>
    o.shipCompanyName&&
    ['shipping','archived'].includes(o.stage)&&
    o.shipMethod!=='pickup'
  );
  if(fCo)shipped=shipped.filter(o=>o.shipCompanyName===fCo);
  if(fMonth)shipped=shipped.filter(o=>{
    const d=o.createdAt?.toDate?.();if(!d)return false;
    return(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'))===fMonth;
  });

  // ══ بناء بيانات الشركات ══
  const coMap={};
  shipped.forEach(o=>{
    const co=o.shipCompanyName;
    if(!coMap[co])coMap[co]={name:co,allOrders:[],pendingOrds:[],settledOrds:[],returnsCount:0,totalDue:0};
    const due=FC.getDueByCo(o);
    const isReturn=returns.some(r=>r.orderId===o._id&&r.status!=='cancelled');
    const isSettled=o.shipSettled===true;
    coMap[co].allOrders.push({...o,due,isReturn,isSettled});
    if(isReturn){coMap[co].returnsCount++;}
    else{
      coMap[co].totalDue+=due;
      if(isSettled)coMap[co].settledOrds.push(o);
      else coMap[co].pendingOrds.push(o);
    }
  });

  // إجماليات التسويات من settlements collection
  Object.values(coMap).forEach(co=>{
    co.totalCollected=settlements.filter(s=>s.companyName===co.name).reduce((s,x)=>s+(parseFloat(x.amount)||0),0);
    co.totalRemaining=Math.max(0,co.totalDue-co.totalCollected);
  });

  const cos=Object.values(coMap).sort((a,b)=>b.totalRemaining-a.totalRemaining);

  // KPIs
  const totDue=cos.reduce((s,co)=>s+co.totalDue,0);
  const totCollected=cos.reduce((s,co)=>s+co.totalCollected,0);
  const totRemaining=cos.reduce((s,co)=>s+co.totalRemaining,0);
  const totReturns=cos.reduce((s,co)=>s+co.returnsCount,0);
  setText('s-due',fn(totDue)+' ج');
  setText('s-collected',fn(totCollected)+' ج');
  setText('s-remaining',fn(totRemaining)+' ج');
  setText('s-returns',totReturns+' شحنة');
  setText('sub',cos.length+' شركة شحن');

  // ══ عرض الشركات ══
  const el=document.getElementById('companies-list');if(!el)return;
  if(!cos.length){el.innerHTML='<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">لا توجد شحنات بشركات خارجية</div></div>';return;}

  el.innerHTML=cos.map(co=>{
    const coSettles=settlements.filter(s=>s.companyName===co.name).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    const coReturns=returns.filter(r=>r.companyName===co.name&&r.status!=='cancelled').sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    const totalReturnCost=coReturns.reduce((s,r)=>s+(parseFloat(r.cost)||0),0);
    return`<div class="co-card">
      <div class="co-head">
        <div>
          <div class="co-name">📦 ${co.name}</div>
          <div style="font-size:11px;color:var(--dim2);margin-top:2px">${co.allOrders.length} شحنة · ${co.pendingOrds.length} بانتظار تسوية${coReturns.length?` · <span style="color:var(--y)">${coReturns.length} مرتجع</span>`:''}</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${co.pendingOrds.length?`<button class="btn btn-r btn-sm" onclick="openReturn('${co.name}')">↩️ مرتجع</button>`:''}
          ${co.totalRemaining>0?`<button class="btn btn-g btn-sm" onclick="openSettle('${co.name}')">💰 تسوية</button>`:'<span style="font-size:11px;color:var(--g);font-weight:700;padding:4px 8px">✅ مسوّى</span>'}
        </div>
      </div>
      <div class="co-body">
        <!-- KPIs الشركة -->
        <div class="co-kpis">
          <div class="co-kpi">
            <div class="co-kpi-val" style="color:var(--b)">${fn(co.totalDue)} ج</div>
            <div class="co-kpi-lbl">إجمالي مستحق</div>
          </div>
          <div class="co-kpi">
            <div class="co-kpi-val" style="color:var(--g)">${fn(co.totalCollected)} ج</div>
            <div class="co-kpi-lbl">تم استلامه</div>
          </div>
          <div class="co-kpi" style="${co.totalRemaining>0?'background:rgba(255,61,110,.1);border:1px solid rgba(255,61,110,.2)':''}">
            <div class="co-kpi-val" style="color:${co.totalRemaining>0?'var(--r)':'var(--g)'}">

// ══ calcSettleDiff ══
window.calcSettleDiff=function(){
  const incoming=parseFloat(gv('settle-amount'))||0;
  const selected=Array.from(document.querySelectorAll('.settle-order-cb:checked')).reduce((s,cb)=>s+(parseFloat(cb.dataset.amount)||0),0);
  const diff=incoming-selected;
  const el=document.getElementById('settle-diff');
  if(!el)return;
  if(incoming>0){
    el.style.display='block';
    if(Math.abs(diff)<0.01){el.style.background='rgba(0,217,126,.1)';el.style.color='var(--g)';el.textContent='✅ المبلغ مطابق للأوردرات المحددة';}
    else if(diff>0){el.style.background='rgba(255,170,0,.1)';el.style.color='var(--y)';el.textContent=`⚠️ زيادة ${fn(diff)} ج عن الأوردرات — سيُحفظ كرصيد إضافي`;}
    else{el.style.background='rgba(255,61,110,.1)';el.style.color='var(--r)';el.textContent=`⚠️ ناقص ${fn(Math.abs(diff))} ج عن الأوردرات المحددة`;}
  } else {el.style.display='none';}
};

// ══ saveSettle ══
window.saveSettle=async function(){
  const amount=parseFloat(gv('settle-amount'));
  if(!amount||amount<=0)return toast('⚠️ أدخل المبلغ','err');
  const wId=gv('settle-wallet');
  if(!wId)return toast('⚠️ اختر المحفظة','err');
  const selectedCbs=Array.from(document.querySelectorAll('.settle-order-cb:checked'));
  if(!selectedCbs.length)return toast('⚠️ اختر أوردر واحد على الأقل','err');
  const selectedIds=selectedCbs.map(cb=>cb.value);
  const selectedAmt=selectedCbs.reduce((s,cb)=>s+(parseFloat(cb.dataset.amount)||0),0);

  try{
    const now=nowStr();
    const w=wallets.find(x=>x._id===wId);
    const bb=parseFloat(w?.balance)||0;

    // 1. أضف للمحفظة — atomic increment
    await updateDoc(doc(db,'wallets',wId),{balance:increment(amount)});

    // 2. سجّل transaction
    await addDoc(collection(db,'transactions_v2'),{
      walletId:wId,type:'in',amount,fees:0,
      description:`تسوية شحن — ${settleCompanyName}`,
      category:'shipping_settlement',
      companyName:settleCompanyName,
      orderIds:selectedIds,
      balanceBefore:bb,balanceAfter:bb+amount,
      note:gv('settle-ref'),
      date:now,createdBy:currentUser.uid,createdByName:userName,
      createdAt:serverTimestamp()
    });

    // 3. سجّل في shipping_settlements
    const settleRef=await addDoc(collection(db,'shipping_settlements'),{
      companyName:settleCompanyName,amount,
      orderIds:selectedIds,expectedAmount:selectedAmt,
      walletId:wId,walletName:w?.name||'',
      note:gv('settle-ref'),date:now,
      createdBy:currentUser.uid,createdByName:userName,
      createdAt:serverTimestamp()
    });

    // 4. حدّث كل أوردر: shipSettled + totalPaid
    for(const oid of selectedIds){
      const o=allOrders.find(x=>x._id===oid);if(!o)continue;
      const due=FC.getDueByCo(o);
      const oldPaid=FC.getPaid(o);
      const newPaid=oldPaid+due;
      const newRem=Math.max(0,FC.getNet(o)-newPaid);
      await updateDoc(doc(db,'orders',oid),{
        shipSettled:true,
        shipSettledAmount:due,
        totalPaid:newPaid,
        remaining:newRem,
        paymentStatus:newRem<=0?'paid':newPaid>0?'partial':'pending',
        timeline:[...(o.timeline||[]),{date:now,action:`✅ تسوية شحن — ${settleCompanyName} — ${fn(due)} ج`,by:userName}],
        updatedAt:serverTimestamp()
      });
    }

    closeSettle();
    toast(`✅ تم تسجيل ${fn(amount)} ج من ${settleCompanyName}`,'ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

// ══ saveReturn ══
window.saveReturn=async function(){
  const ordId=document.querySelector('input[name="return-order"]:checked')?.value;
  if(!ordId)return toast('⚠️ اختر أوردر','err');
  const cost=parseFloat(gv('return-cost'))||0;
  const note=gv('return-note');
  const o=allOrders.find(x=>x._id===ordId);if(!o)return;
  try{
    const now=nowStr();
    await addDoc(collection(db,'shipping_returns'),{
      orderId:ordId,companyName:returnCompanyName,
      clientName:o.clientName||'',cost,note,status:'returned',
      date:now,createdBy:currentUser.uid,createdByName:userName,
      createdAt:serverTimestamp()
    });
    const orderUpdates={
      shippingStatus:'returned',shipStage:'returned',
      totalPaid:0,deposit:0,remaining:0,paymentStatus:'returned',
      timeline:[...(o.timeline||[]),{date:now,action:`↩️ مرتجع من ${returnCompanyName}${note?' — '+note:''}`,by:userName}],
      updatedAt:serverTimestamp()
    };
    // عكس التسوية لو كانت مسوّاة
    const settledAmt=parseFloat(o.shipSettledAmount)||0;
    if(o.shipSettled&&settledAmt>0){
      Object.assign(orderUpdates,{shipSettled:false,shipSettledAmount:0});
      await addDoc(collection(db,'transactions_v2'),{
        type:'out',amount:settledAmt,
        description:`عكس تسوية مرتجع — ${o.clientName||''} — ${o.orderId||''}`,
        category:'settlement_reversal',orderId:ordId,
        clientName:o.clientName,shipCompanyName:returnCompanyName,
        date:now,createdBy:currentUser.uid,createdByName:userName,
        createdAt:serverTimestamp()
      });
    }
    // عكس العربون لو اتدفع
    const depAmt=parseFloat(o.deposit)||0;
    if(depAmt>0){
      const depSnap=await getDocs(query(collection(db,'transactions_v2'),where('orderId','==',ordId),where('category','==','deposit')));
      const depTx=depSnap.docs[0]?.data();
      const depWalletId=depTx?.walletId||'';
      await addDoc(collection(db,'transactions_v2'),{
        type:'out',amount:depAmt,
        description:`عكس عربون مرتجع — ${o.clientName||''} — ${o.orderId||''}`,
        category:'deposit_reversal',orderId:ordId,
        clientName:o.clientName,walletId:depWalletId,
        date:now,createdBy:currentUser.uid,createdByName:userName,
        createdAt:serverTimestamp()
      });
      if(depWalletId){
        await updateDoc(doc(db,'wallets',depWalletId),{balance:increment(-depAmt)});
      }
    }
    if(cost>0){
      await addDoc(collection(db,'transactions_v2'),{
        type:'out',amount:cost,
        description:`تكلفة مرتجع — ${o.clientName||''} — ${returnCompanyName}`,
        category:'return_cost',orderId:ordId,clientName:o.clientName,
        date:now,createdBy:currentUser.uid,createdByName:userName,
        createdAt:serverTimestamp()
      });
    }
    await updateDoc(doc(db,'orders',ordId),orderUpdates);
    document.getElementById('ov-return').classList.remove('open');
    toast('✅ تم تسجيل المرتجع','ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

// ══ deleteSettle ══
window.deleteSettle=async function(settleId,amount,walletId,coName){
  if(!confirm(`حذف تسوية ${fn(amount)} ج من ${coName}؟ سيتم عكس كل العمليات.`))return;
  try{
    // 1. خصم من المحفظة + تسجيل عملية عكسية
    const w=wallets.find(x=>x._id===walletId);
    const bb=parseFloat(w?.balance)||0;
    const revBatch=writeBatch(db);
    if(w)revBatch.update(doc(db,'wallets',walletId),{balance:increment(-amount)});
    const revTxRef=doc(collection(db,'transactions_v2'));
    revBatch.set(revTxRef,{
      walletId,walletName:w?.name||'',type:'out',amount,
      description:`↩️ إلغاء تسوية شحن — ${coName}`,
      category:'shipping_settlement_reversal',
      companyName:coName,settleId,
      balanceBefore:bb,balanceAfter:bb-amount,
      date:nowStr(),createdBy:currentUser?.uid||'',createdByName:userName,
      createdAt:serverTimestamp()
    });
    await revBatch.commit();

    // 2. جيب بيانات التسوية وارجع الأوردرات
    const settleSnap=await getDoc(doc(db,'shipping_settlements',settleId));
    const settleData=settleSnap.exists()?settleSnap.data():{};
    const orderIds=settleData.orderIds||[];
    const now=nowStr();
    for(const oid of orderIds){
      const o=allOrders.find(x=>x._id===oid);if(!o)continue;
      const settled=parseFloat(o.shipSettledAmount)||0;
      const oldPaid=FC.getPaid(o);
      const newPaid=Math.max(0,oldPaid-settled);
      const newRem=Math.max(0,FC.getNet(o)-newPaid);
      await updateDoc(doc(db,'orders',oid),{
        shipSettled:false,shipSettledAmount:0,
        totalPaid:newPaid,remaining:newRem,
        paymentStatus:newRem<=0?'paid':newPaid>0?'partial':'pending',
        timeline:[...(o.timeline||[]),{date:now,action:`↩️ إلغاء تسوية شحن — ${coName}`,by:userName}],
        updatedAt:serverTimestamp()
      });
    }

    // 3. احذف التسوية
    await deleteDoc(doc(db,'shipping_settlements',settleId));
    toast('✅ تم إلغاء التسوية','ok');
  }catch(e){toast('❌ '+e.message,'err');}
};

      <div style="font-size:10px;color:var(--c);font-weight:700;margin-bottom:2px">${stageAr}</div>
      <div style="font-size:17px;font-weight:900;line-height:1.2">${o.clientName||'—'}</div>
      <div style="font-size:11px;color:var(--dim2);margin-top:2px">${o.orderId||o._id.slice(-6)} · ${prods}</div>
    </div>
    <button type="button" class="modal-x" onclick="closeAccPanel()">✕</button>`;

  document.getElementById('acc-pn-body').innerHTML=`
    <!-- ملخص مالي -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
      <div style="background:rgba(59,158,255,.08);border:1px solid rgba(59,158,255,.2);border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:15px;font-weight:900;color:var(--b)">${fn(sale)}</div>
        <div style="font-size:10px;color:var(--dim2);margin-top:2px">الإجمالي</div>
      </div>
      <div style="background:rgba(0,217,126,.08);border:1px solid rgba(0,217,126,.2);border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:15px;font-weight:900;color:var(--g)">${fn(paid)}</div>
        <div style="font-size:10px;color:var(--dim2);margin-top:2px">محصّل</div>
      </div>
      <div style="background:${due>0?'rgba(255,61,110,.1)':'rgba(0,217,126,.08)'};border:1px solid ${due>0?'rgba(255,61,110,.3)':'rgba(0,217,126,.2)'};border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:15px;font-weight:900;color:${due>0?'var(--r)':'var(--g)'}">${due>0?fn(due):'✅'}</div>
        <div style="font-size:10px;color:var(--dim2);margin-top:2px">باقي</div>
      </div>
    </div>

    <!-- التكاليف -->
    <div style="background:var(--bg3);border-radius:12px;padding:14px;border:1px solid var(--line);margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:13px;font-weight:800">💰 التكاليف</div>
        <button type="button" onclick="__accShowForm()" style="padding:5px 14px;border-radius:20px;border:1px solid var(--line2);background:var(--bg2);color:var(--c);font-size:11px;font-weight:800;cursor:pointer;font-family:inherit">＋ بند جديد</button>
      </div>
      <div id="acc-cost-list"></div>
      <div id="acc-cost-form" style="display:none;margin-top:12px;background:var(--bg2);border-radius:10px;padding:12px;border:1px solid var(--line)">
        <div style="font-size:11px;font-weight:800;color:var(--dim2);margin-bottom:10px" id="acc-form-lbl">＋ إضافة بند جديد</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
          <div class="fg" style="margin:0"><label>نوع البند</label>
            <select class="inp" id="acc-type"><option value="">— اختر —</option><option>طباعة</option><option>ورق</option><option>قص</option><option>سلفنة</option><option>زنكات</option><option>تجميع</option><option>شحن</option><option>تصميم</option><option>أخرى</option></select>
          </div>
          <div class="fg" style="margin:0"><label>التكلفة (ج)</label><input class="inp" id="acc-total" type="number" placeholder="0" min="0"></div>
        </div>
        <div class="fg" style="margin:0 0 10px"><label>ملاحظة (اختياري)</label><input class="inp" id="acc-note" type="text" placeholder="اختياري..."></div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button type="button" onclick="__accHideForm()" class="btn btn-ghost btn-sm">إلغاء</button>
          <button type="button" id="acc-save-btn" onclick="saveAccCost()" class="btn btn-r btn-sm">＋ إضافة</button>
        </div>
      </div>
    </div>

    <!-- السجل -->
    <div style="background:var(--bg3);border-radius:12px;padding:14px;border:1px solid var(--line)">
      <div style="font-size:12px;font-weight:800;color:var(--dim2);margin-bottom:8px">📋 السجل</div>
      ${(o.timeline||[]).slice().reverse().slice(0,15).map(t=>`
        <div style="font-size:11px;color:var(--dim2);padding:5px 0;border-bottom:1px solid var(--line)">${t.date} — ${t.action}${t.by?' · <span style="color:var(--b)">${t.by}</span>':''}</div>`).join('')||'<div style="font-size:12px;color:var(--dim2)">لا يوجد سجل</div>'}
    </div>`;
}

window.openCostAcc=function(orderId){
  __accOrderId=orderId;__accEditIdx=-1;
  const o=allOrders.find(x=>x._id===orderId);
  if(!o){toast('⚠️ لم يُعثر على الأوردر','err');return;}
  __buildAccPanel(o);
  __renderAccCostList(o);
  document.getElementById('acc-panel-ov').classList.add('open');
};

window.closeAccPanel=function(){
  document.getElementById('acc-panel-ov').classList.remove('open');
  __accOrderId='';__accEditIdx=-1;
};

window.__accShowForm=function(){
  document.getElementById('acc-cost-form').style.display='block';
};

window.__accHideForm=function(){
  document.getElementById('acc-cost-form').style.display='none';
  __accEditIdx=-1;
  document.getElementById('acc-type').value='';
  document.getElementById('acc-total').value='';
  document.getElementById('acc-note').value='';
  document.getElementById('acc-form-lbl').textContent='＋ إضافة بند جديد';
  document.getElementById('acc-save-btn').textContent='＋ إضافة';
};

window.editAccCost=function(idx){
  const o=allOrders.find(x=>x._id===__accOrderId);if(!o)return;
  const item=(o.costItems||[])[idx];if(!item)return;
  __accEditIdx=idx;
  document.getElementById('acc-type').value=item.type||'';
  document.getElementById('acc-total').value=item.total||'';
  document.getElementById('acc-note').value=item.note||'';
  document.getElementById('acc-form-lbl').textContent='✏️ تعديل البند';
  document.getElementById('acc-save-btn').textContent='💾 حفظ';
  document.getElementById('acc-cost-form').style.display='block';
  document.getElementById('acc-cost-form').scrollIntoView({behavior:'smooth',block:'nearest'});
};

window.rmAccCost=async function(idx){
  if(!confirm('حذف البند؟'))return;
  const o=allOrders.find(x=>x._id===__accOrderId);if(!o)return;
  const ci=[...(o.costItems||[])];ci.splice(idx,1);
  try{
    await updateDoc(doc(db,'orders',__accOrderId),{costItems:ci,updatedAt:serverTimestamp()});
    toast('✅ حُذف','ok');
    const i=allOrders.findIndex(x=>x._id===__accOrderId);
    if(i>=0){allOrders[i]={...allOrders[i],costItems:ci};__renderAccCostList(allOrders[i]);}
  }catch(e){toast('❌ '+e.message,'err');}
};

window.saveAccCost=async function(){
  const type=document.getElementById('acc-type')?.value||'';
  const total=parseFloat(document.getElementById('acc-total')?.value)||0;
  if(!type)return toast('⚠️ اختر نوع البند','err');
  if(!total)return toast('⚠️ أدخل التكلفة','err');
  const note=document.getElementById('acc-note')?.value||'';
  const o=allOrders.find(x=>x._id===__accOrderId);if(!o){toast('⚠️ لم يُعثر على الأوردر','err');return;}
  const uName=userName||auth.currentUser?.displayName||auth.currentUser?.email||'';
  const now=nowStr();
  const item={type,total,note,addedAt:now,addedBy:uName,supplierId:'',supplierName:'',prodIdx:null};
  const ci=[...(o.costItems||[])];
  let action;
  if(__accEditIdx>=0&&__accEditIdx<ci.length){
    ci[__accEditIdx]={...ci[__accEditIdx],...item,editedAt:now};
    action=`✏️ تعديل ${type}: ${fn(total)} ج`;
  } else {
    ci.push(item);
    action=`💰 ${type}: ${fn(total)} ج`;
  }
  const saveBtn=document.getElementById('acc-save-btn');
  if(saveBtn){saveBtn.disabled=true;saveBtn.textContent='جاري...';}
  try{
    await updateDoc(doc(db,'orders',__accOrderId),{
      costItems:ci,
      timeline:[...(o.timeline||[]),{date:now,action,by:uName}],
      updatedAt:serverTimestamp()
    });
    toast('✅ تم','ok');
    const i=allOrders.findIndex(x=>x._id===__accOrderId);
    if(i>=0)allOrders[i]={...allOrders[i],costItems:ci};
    __accHideForm();
    __renderAccCostList(allOrders[allOrders.findIndex(x=>x._id===__accOrderId)]);
  }catch(e){toast('❌ '+e.message,'err');}
  finally{if(saveBtn){saveBtn.disabled=false;saveBtn.textContent=__accEditIdx>=0?'💾 حفظ':'＋ إضافة';}}
};
</script>
</body>
</html>
