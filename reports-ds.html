<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0d1117">
<title>التقارير — Business2Card (تصميم جديد · بيانات حقيقية)</title>
<link rel="stylesheet" href="design-system/preview-kit/kit.css">
<style>
  /* page-specific layout (slate tokens only — no hardcoded palette) */
  .rep-grid2{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);margin-bottom:var(--space-5)}
  @media(max-width:860px){.rep-grid2{grid-template-columns:1fr}}
  /* mobile: KPIs 2-up so they fit without long scroll (addresses mobile feedback) */
  @media(max-width:680px){
    .stats{grid-template-columns:1fr 1fr !important;gap:var(--space-3) !important}
    .ds-kpi{padding:var(--space-4)}
    .ds-kpi-value{font-size:var(--fs-2xl)}
  }
  .rep-card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4)}
  .rep-card-h h3{font-size:var(--fs-md);font-weight:700;display:flex;align-items:center;gap:8px}
  .rep-card-h .lic{font-size:16px;color:var(--ink-3)}
  .bars{display:flex;align-items:flex-end;gap:var(--space-3);height:150px;padding-top:var(--space-2)}
  .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
  .bar i{width:100%;border-radius:var(--r-sm) var(--r-sm) 0 0;background:var(--accent);min-height:4px;transition:var(--tx-default)}
  .bar.cur i{background:var(--success)}
  .bar:hover i{filter:brightness(1.12)}
  .bar small{font-size:var(--fs-2xs);color:var(--ink-3)}
  .bar b{font-size:var(--fs-2xs);color:var(--ink-2);font-weight:700;font-feature-settings:"tnum"}
  .rank{display:flex;flex-direction:column;gap:var(--space-3)}
  .rank-row{display:grid;grid-template-columns:1fr auto;gap:var(--space-3);align-items:center}
  .rank-row .rn{font-size:var(--fs-sm);color:var(--ink-2)}
  .rank-row .rv{font-size:var(--fs-sm);font-weight:700;font-feature-settings:"tnum"}
  .rank-bar{grid-column:1/-1;height:6px;border-radius:var(--r-pill);background:var(--surface-3);overflow:hidden}
  .rank-bar i{display:block;height:100%;border-radius:var(--r-pill);background:var(--accent)}
  .money{font-family:var(--font-mono);font-feature-settings:"tnum";direction:ltr;display:inline-block}
  .rep-empty{padding:var(--space-6);text-align:center;color:var(--ink-3);font-size:var(--fs-sm)}
  .rep-loading{padding:var(--space-7);text-align:center;color:var(--ink-3)}
</style>
</head>
<body data-theme="dark">
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-logo"><span class="lic" style="font-size:20px;color:var(--accent-fg)"><i data-lucide="contact"></i></span></div>
      <div class="sidebar-brand-text"><b>Business2Card</b><small id="side-role">—</small></div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-group">
        <div class="sidebar-group-label">التشغيل</div>
        <a class="nav-item" href="clients.html"><span class="nav-ic"><span class="lic"><i data-lucide="users"></i></span></span><span>العملاء</span></a>
        <a class="nav-item" href="design.html"><span class="nav-ic"><span class="lic"><i data-lucide="pen-tool"></i></span></span><span>التصميم</span></a>
        <a class="nav-item" href="production.html"><span class="nav-ic"><span class="lic"><i data-lucide="factory"></i></span></span><span>الإنتاج</span></a>
        <a class="nav-item" href="shipping.html"><span class="nav-ic"><span class="lic"><i data-lucide="truck"></i></span></span><span>الشحن</span></a>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-label">المالية والإدارة</div>
        <a class="nav-item" href="accounts.html"><span class="nav-ic"><span class="lic"><i data-lucide="wallet"></i></span></span><span>الحسابات</span></a>
        <a class="nav-item is-active" href="reports-ds.html"><span class="nav-ic"><span class="lic"><i data-lucide="bar-chart-3"></i></span></span><span>التقارير</span></a>
        <a class="nav-item" href="reports.html"><span class="nav-ic"><span class="lic"><i data-lucide="file-text"></i></span></span><span>التقارير (الحالية)</span></a>
        <a class="nav-item" href="settings.html"><span class="nav-ic"><span class="lic"><i data-lucide="settings"></i></span></span><span>الإدارة</span></a>
      </div>
    </nav>
    <div class="sidebar-foot">
      <div class="sidebar-user">
        <div class="avatar" id="side-av">U</div>
        <div style="line-height:1.3"><div style="font-size:13px;font-weight:700" id="side-name">—</div><div style="font-size:11px;color:var(--ink-3)" id="side-role2">—</div></div>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="ds-topbar">
      <div>
        <h1 class="ds-topbar-title">التقارير</h1>
        <div class="ds-topbar-sub" id="rep-sub">جارٍ التحميل…</div>
      </div>
      <div class="topbar-spacer"></div>
      <a class="ds-btn ds-btn-ghost ds-btn-sm" href="reports.html"><span class="lic"><i data-lucide="external-link"></i></span> النسخة الحالية</a>
    </header>

    <div class="content">
      <div class="ds-tabs" id="period-tabs" style="margin-bottom:var(--space-5)">
        <button class="ds-tab" data-mode="today">اليوم</button>
        <button class="ds-tab" data-mode="week">الأسبوع</button>
        <button class="ds-tab is-active" data-mode="month">الشهر</button>
        <button class="ds-tab" data-mode="last3">الربع</button>
        <button class="ds-tab" data-mode="year">السنة</button>
      </div>

      <div id="rep-body">
        <div class="rep-loading"><span class="lic"><i data-lucide="loader"></i></span> جارٍ تحميل البيانات…</div>
      </div>

      <div style="margin-top:var(--space-5);text-align:center;font-size:var(--fs-xs);color:var(--ink-mute)">— بيانات حقيقية من النظام · نسخة تجريبية للتصميم الجديد (slate) · النسخة الرسمية لسه <a href="reports.html" style="color:var(--accent)">reports.html</a> —</div>
    </div>
  </div>
</div>

<script type="module">
import { auth, db } from "./core/firebase-init.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, doc, onSnapshot, getDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { calcRem } from "./core/order-math.js";
import { getRange, getPrevRange, inRange } from "./core/reports-date-filters.js";
import { calcPeriodFlow, calcOrderStats, calcMonthlyRevenueChart, calcTopDesignersByCount } from "./core/reports-financial-kpis.js";
import { buildCollectionByClient } from "./core/reports-collection-stats.js";

const RMAP={admin:'accounts.html',operation_manager:'ops-dashboard.html',customer_service:'cs-dashboard.html',graphic_designer:'designer-dashboard.html',design_operator:'designer-dashboard.html',production_agent:'production-dashboard.html',shipping_officer:'shipping-dashboard.html',wallet_manager:'accounts.html'};
const ROLE_LABEL={admin:'مدير النظام',operation_manager:'مدير العمليات',customer_service:'خدمة العملاء',graphic_designer:'مصمم جرافيك',design_operator:'مشغّل تصميم',production_agent:'مسؤول إنتاج',shipping_officer:'مسؤول شحن',wallet_manager:'أمين الخزنة'};
const AR_MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG',{maximumFractionDigits:0});
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const drawIcons=()=>{try{window.lucide&&lucide.createIcons();}catch(_){}};

let orders=[], transactions=[];
let loaded={orders:false,tx:false};
let filterMode='month';
let __started=false;

// ── auth gate (mirrors reports.html exactly) ──
onAuthStateChanged(auth, async u=>{
  if(!u){window.location.href='login.html';return;}
  if(__started)return; __started=true;
  const snap=await getDoc(doc(db,'users',u.uid));
  if(snap.exists()){
    const d=snap.data();
    const role=d.role||'customer_service';
    const pages=(d.permissions?.pages)||[];
    const isAdm=['admin','operation_manager'].includes(role);
    if(!isAdm && !pages.includes('*') && !pages.includes('reports')){window.location.href=RMAP[role]||'login.html';return;}
    const name=d.name||u.email||'مستخدم';
    document.getElementById('side-name').textContent=name;
    document.getElementById('side-av').textContent=(name[0]||'U').toUpperCase();
    const rl=ROLE_LABEL[role]||role;
    document.getElementById('side-role').textContent=rl;
    document.getElementById('side-role2').textContent=rl;
  }
  // bounded, read-only listeners (RULE G3) — same caps as reports.html
  onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc'),limit(10000)),
    s=>{orders=s.docs.map(x=>({...x.data(),_id:x.id}));loaded.orders=true;render();},
    e=>{console.warn('[reports-ds] orders listener:',e.message);});
  onSnapshot(query(collection(db,'transactions_v2'),orderBy('createdAt','desc'),limit(10000)),
    s=>{transactions=s.docs.map(x=>({...x.data(),_id:x.id}));loaded.tx=true;render();},
    e=>{console.warn('[reports-ds] tx listener:',e.message);});
});

// ── period tabs ──
document.getElementById('period-tabs').addEventListener('click',e=>{
  const btn=e.target.closest('.ds-tab'); if(!btn)return;
  filterMode=btn.dataset.mode;
  document.querySelectorAll('#period-tabs .ds-tab').forEach(b=>b.classList.toggle('is-active',b===btn));
  render();
});

// ── delta chip ──
function deltaChip(cur, prev, invert=false){
  if(!prev) return '';
  const pct=Math.round((cur-prev)/Math.max(Math.abs(prev),1)*100);
  let cls = pct>0?'up':pct<0?'down':'flat';
  if(invert && pct!==0) cls = pct>0?'down':'up'; // for expenses: an increase is "bad"
  const ar = pct>0?'▲':pct<0?'▼':'—';
  return `<div class="ds-kpi-delta ${cls}">${ar} ${Math.abs(pct)}% عن السابق</div>`;
}

function kpi(icon, accent, label, valueHTML, delta, hint){
  return `<div class="ds-kpi" style="--kpi-accent:${accent}">
    <div class="ds-kpi-label"><span class="lic"><i data-lucide="${icon}"></i></span> ${label}</div>
    <div class="ds-kpi-value ds-kpi-value-sm">${valueHTML}</div>
    ${delta||(hint?`<div class="ds-kpi-delta flat">${hint}</div>`:'')}
  </div>`;
}

function render(){
  const body=document.getElementById('rep-body');
  if(!loaded.orders||!loaded.tx){return;}
  const range=getRange(filterMode);
  const prevRange=getPrevRange(filterMode);
  const f=orders.filter(o=>inRange(o,range));

  document.getElementById('rep-sub').textContent=`${fn(f.length)} أوردر في الفترة المحددة`;

  // KPIs (same aggregators as reports.html)
  const {periodIn,periodOut,profit}=calcPeriodFlow(transactions,range);
  const {periodIn:pIn,periodOut:pOut,profit:pProfit}=calcPeriodFlow(transactions,prevRange);
  const oStats=calcOrderStats(f,calcRem);

  const kpis=`<section class="stats">
    ${kpi('trending-up','var(--accent)','إيرادات الفترة',`<span class="money">${fn(periodIn)}</span> ج`, deltaChip(periodIn,pIn))}
    ${kpi('wallet','var(--success)','صافي الفترة',`<span class="money">${profit>=0?'+':''}${fn(profit)}</span> ج`, deltaChip(profit,pProfit))}
    ${kpi('arrow-down-circle','var(--danger)','مصروفات الفترة',`<span class="money">${fn(periodOut)}</span> ج`, deltaChip(periodOut,pOut,true))}
    ${kpi('package','var(--info)','أوردرات الفترة',`${fn(f.length)}`, null, `${fn(oStats.activeCount)} نشط حالياً`)}
    ${kpi('clock','var(--warning)','باقي التحصيل',`<span class="money">${fn(oStats.totalRem)}</span> ج`, null, `${fn(oStats.activeWithRem)} أوردر`)}
  </section>`;

  // 6-month revenue chart
  const {keys,data,max}=calcMonthlyRevenueChart(transactions,6);
  const bars = keys.length ? keys.map((k,i)=>{
    const rev=data[k].rev||0;
    const h=Math.max(4,Math.round(rev/max*100));
    const mi=parseInt(k.split('-')[1],10)-1;
    const cur = i===keys.length-1;
    const kfmt = rev>=1000 ? Math.round(rev/1000)+'k' : fn(rev);
    return `<div class="bar ${cur?'cur':''}"><b>${kfmt}</b><i style="height:${h}%"></i><small>${AR_MONTHS[mi]||k}</small></div>`;
  }).join('') : `<div class="rep-empty">لا توجد إيرادات مسجّلة بعد</div>`;

  // top designers (archived orders, all-time — matches reports.html)
  const designers=calcTopDesignersByCount(orders,5);
  const dmax=Math.max(...designers.map(d=>d.count),1);
  const rankHTML = designers.length ? designers.map(d=>
    `<div class="rank-row"><span class="rn">${esc(d.name)}</span><span class="rv">${fn(d.count)} تصميم</span><span class="rank-bar"><i style="width:${Math.round(d.count/dmax*100)}%"></i></span></div>`
  ).join('') : `<div class="rep-empty">لا يوجد مصممون بعد</div>`;

  // top customers by collection (per-client rollup, reuses core aggregator)
  const byClient=buildCollectionByClient({orders:f,calcRem}).filter(c=>c.sale>0)
    .sort((a,b)=>b.paid-a.paid).slice(0,8);
  const rows = byClient.length ? byClient.map(c=>{
    const status = c.rem<=0
      ? `<span class="status status-success"><span class="lic"><i data-lucide="check-circle-2"></i></span> مكتمل</span>`
      : c.paid>0
        ? `<span class="status status-warning"><span class="lic"><i data-lucide="clock"></i></span> جزئي</span>`
        : `<span class="status status-danger"><span class="lic"><i data-lucide="alert-triangle"></i></span> غير مدفوع</span>`;
    return `<tr><td>${esc(c.name)}</td><td>${fn(c.count)}</td><td><span class="money">${fn(c.sale)}</span> ج</td><td><span class="money">${fn(c.paid)}</span> ج</td><td><span class="money">${fn(c.rem)}</span> ج</td><td>${status}</td></tr>`;
  }).join('') : `<tr><td colspan="6"><div class="rep-empty">لا توجد بيانات عملاء في الفترة</div></td></tr>`;

  body.innerHTML = `
    ${kpis}
    <div class="rep-grid2">
      <div class="ds-card">
        <div class="rep-card-h"><h3><span class="lic"><i data-lucide="bar-chart-3"></i></span> الإيرادات آخر 6 شهور</h3></div>
        <div class="bars">${bars}</div>
      </div>
      <div class="ds-card">
        <div class="rep-card-h"><h3><span class="lic"><i data-lucide="award"></i></span> أعلى المصممين (إجمالي المنجز)</h3></div>
        <div class="rank">${rankHTML}</div>
      </div>
    </div>
    <div class="ds-card">
      <div class="rep-card-h"><h3><span class="lic"><i data-lucide="list"></i></span> أعلى العملاء تحصيلاً (الفترة)</h3></div>
      <table class="ds-table">
        <thead><tr><th>العميل</th><th>الطلبات</th><th>إجمالي المبيعات</th><th>المُحصَّل</th><th>المتبقّي</th><th>الحالة</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  drawIcons();
}
</script>

<!-- Lucide pinned (not @latest) for reproducibility. TODO: self-host/vendor before this replaces reports.html in production (offline-safe). -->
<script src="https://unpkg.com/lucide@0.479.0/dist/umd/lucide.min.js"></script>
<script>window.lucide && lucide.createIcons();</script>
</body>
</html>
