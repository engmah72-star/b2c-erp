<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Business2Card — سجل الأوردرات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://www.gstatic.com">
<link rel="dns-prefetch" href="https://firestore.googleapis.com">
<link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="sidebar.js"></script>

<script src="viewas.js?v=1" defer></script>

<style>
/* ══ سجل الأوردرات ══════════════════════════════════════ */

/* Filter row */
.reg-filter-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.reg-stage-select {
  min-width: 160px;
  width: auto;
}
.reg-count {
  font-size: var(--fs-sm);
  font-weight: 700;
  color: var(--dim2);
  white-space: nowrap;
  margin-inline-start: auto;
}

/* Home button */
.reg-home-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: var(--rad);
  color: var(--snow);
  font-size: var(--fs-sm);
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: var(--trans);
  white-space: nowrap;
}
.reg-home-btn:hover { background: var(--bg4); border-color: var(--line2); }

/* Order Card */
.reg-card {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--rad2);
  padding: 14px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: var(--trans);
  position: relative;
}
.reg-card:hover {
  border-color: var(--line2);
  transform: translateY(-1px);
  box-shadow: var(--shadow-pop);
}

/* Card header */
.rc-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 7px;
}
.rc-name-block { flex: 1; min-width: 0; }
.rc-client {
  font-size: var(--fs-xl);
  font-weight: 800;
  line-height: 1.2;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.rc-id {
  font-size: var(--fs-xs);
  font-weight: 700;
  color: var(--dim2);
  margin-top: 2px;
  direction: ltr;
  text-align: right;
}
.rc-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 99px;
  font-size: var(--fs-xs);
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
}

/* Product row */
.rc-product {
  font-size: var(--fs-base);
  color: var(--snow);
  margin-bottom: 12px;
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Pipeline */
.rc-pipeline {
  display: flex;
  align-items: flex-start;
  margin-bottom: 10px;
}
.rcp-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.rcp-circle {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  flex-shrink: 0;
}
.rcp-circle.done {
  background: rgba(0,217,126,.13);
  border: 2px solid var(--g);
  color: var(--g);
  font-size: 17px;
}
.rcp-circle.active {
  background: rgba(74,142,245,.13);
  border: 2px solid var(--b);
  color: var(--b);
}
.rcp-circle.pending {
  background: var(--bg3);
  border: 2px solid var(--line);
  color: var(--dim2);
}
.rcp-name {
  font-size: 10px;
  color: var(--dim2);
  font-weight: 600;
  text-align: center;
}
.rcp-connector {
  flex: 1;
  height: 2px;
  background: var(--line);
  margin-top: 17px;
  min-width: 10px;
}
.rcp-connector.done { background: var(--g); opacity: .5; }

/* Meta row */
.rc-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: var(--fs-xs);
  color: var(--dim2);
  margin-bottom: 9px;
  flex-wrap: wrap;
}
.rc-person {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 99px;
  background: var(--bg3);
}
.rc-person-cs { color: var(--b); }
.rc-person-assignee { color: var(--snow); }
.rc-person-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--r);
  flex-shrink: 0;
}
.rc-date {
  font-size: 10px;
  color: var(--dim);
  font-weight: 600;
  margin-inline-start: auto;
}

/* Progress bar */
.rc-progress {
  height: 3px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}
.rc-progress-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--b), var(--g));
  transition: width .3s ease;
}

/* Skeleton */
.skel-card {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--rad2);
  padding: 14px;
  margin-bottom: 10px;
}
.skel {
  background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 6px;
  margin-bottom: 8px;
}
@keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }
.skel-line { height: 12px; }
.skel-line.w-40 { width: 40%; }
.skel-line.w-60 { width: 60%; }
.skel-line.w-80 { width: 80%; }
.skel-pipe {
  height: 36px;
  border-radius: 99px;
  margin-bottom: 0;
}

/* Empty state */
.reg-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--dim2);
}
.reg-empty-ico { font-size: 48px; margin-bottom: 12px; }
.reg-empty-title { font-size: var(--fs-lg); font-weight: 800; margin-bottom: 6px; color: var(--snow); }
.reg-empty-sub { font-size: var(--fs-sm); }

/* Mobile adjustments */
@media (max-width: 600px) {
  .rc-client { font-size: var(--fs-lg); }
  .rcp-circle { width: 30px; height: 30px; font-size: 13px; }
  .rcp-circle.done { font-size: 15px; }
  .rcp-connector { margin-top: 14px; }
  .rcp-name { font-size: 9px; }
}
</style>
</head>
<body>
<div class="app-shell">

<!-- Legacy sidenav (replaced by app-sidebar) -->
<aside class="sidenav">
  <div class="nav-brand">
    <div class="nav-logo">📋</div>
    <div>
      <div class="nav-brand-name">Business2Card</div>
      <div class="nav-brand-role" id="role-badge">ERP</div>
    </div>
  </div>
  <div class="nav-scroll" id="nav-links"></div>
  <div class="nav-foot">
    <div class="nav-user" onclick="doLogout()">
      <div class="nav-avatar" id="nav-av">A</div>
      <div>
        <div class="nav-user-name" id="nav-name">User</div>
        <div class="nav-user-role">تسجيل خروج</div>
      </div>
    </div>
  </div>
</aside>

<app-sidebar active current="order-register.html"></app-sidebar>

<div class="main">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <button type="button" class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div>
        <h1>🚂 سجل الأوردرات</h1>
        <p id="sub">جاري التحميل...</p>
      </div>
    </div>
    <div class="topbar-right">
      <a href="my-home.html" class="reg-home-btn">🏠 الرئيسية</a>
    </div>
  </div>

  <div class="content">

    <!-- Search -->
    <div class="sw" style="margin-bottom:10px">
      <span class="sw-ico">🔍</span>
      <input class="inp" id="q"
        placeholder="بحث: اسم العميل · تليفون · رقم الأوردر · المنتج"
        oninput="scheduleRender()">
    </div>

    <!-- Filter row -->
    <div class="reg-filter-row">
      <select class="inp reg-stage-select" id="stage-filter" onchange="applyFilter()">
        <option value="active">المراحل النشطة</option>
        <option value="">الكل</option>
        <option value="design">✏️ تصميم</option>
        <option value="printing">🖨️ طباعة</option>
        <option value="production">🏭 تنفيذ</option>
        <option value="shipping">🚚 شد</option>
        <option value="archived">📁 أرشيف</option>
        <option value="cancelled">✕ ملغي</option>
      </select>
      <span class="reg-count" id="filter-count">—</span>
    </div>

    <!-- Orders list -->
    <div id="orders-list"></div>

  </div><!-- /content -->
</div><!-- /main -->
</div><!-- /app-shell -->

<div class="nav-overlay" id="nav-ov"
  onclick="document.querySelector('.sidenav')?.classList.remove('mob-open');this.classList.remove('show')"></div>

<script type="module">
import { auth, db } from './core/firebase-init.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
import {
  doc, getDoc, onSnapshot, collection, query, orderBy, limit
} from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';
import { STAGES } from './orders.js';
import { esc } from './core/dom-utils.js';

/* ── Constants ─────────────────────────────────────────── */
const ACTIVE_STAGES = ['design', 'printing', 'production', 'shipping'];

const STAGE_PROGRESS = {
  design: 20, printing: 40, production: 60,
  shipping: 80, archived: 100, cancelled: 100,
};

const PIPELINE = [
  { key: 'entry',      label: 'إدخال', ico: '✓'  },
  { key: 'design',     label: 'تصميم', ico: '✏️' },
  { key: 'printing',   label: 'طباعة', ico: '🖨️' },
  { key: 'production', label: 'تنفيذ', ico: '🏭' },
  { key: 'shipping',   label: 'شد',    ico: '🚚'  },
];

const STAGE_ORDER = ['design', 'printing', 'production', 'shipping'];

const ASSIGNEE_FIELD = {
  design:     'designerName',
  printing:   'printerName',
  production: 'productionAgentName',
  shipping:   'shippingOfficerName',
};

/* ── Date formatter ─────────────────────────────────────── */
const _dtFmt = new Intl.DateTimeFormat('ar-EG', {
  year: 'numeric', month: '2-digit', day: '2-digit',
  hour: '2-digit', minute: '2-digit',
});
function fmtTs(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000);
  return _dtFmt.format(d);
}

/* ── State ──────────────────────────────────────────────── */
const $ = id => document.getElementById(id);
let allOrders = [];
let renderTimer = null;

/* ── Skeleton on load ───────────────────────────────────── */
$('orders-list').innerHTML = [1,2,3,4,5].map(() => `
  <div class="skel-card">
    <div class="skel skel-line w-60" style="height:16px;margin-bottom:6px"></div>
    <div class="skel skel-line w-80" style="margin-bottom:10px"></div>
    <div class="skel skel-pipe" style="margin-bottom:10px"></div>
    <div class="skel skel-line w-40"></div>
  </div>`).join('');

/* ── Auth & data ────────────────────────────────────────── */
onAuthStateChanged(auth, async u => {
  if (!u) { location.href = 'login.html'; return; }

  try {
    const us = await getDoc(doc(db, 'users', u.uid));
    if (us.exists()) {
      const d = us.data();
      const nm = $('nav-name'); if (nm) nm.textContent = d.name || u.email;
      const av = $('nav-av');   if (av) av.textContent = (d.name || 'A')[0].toUpperCase();
    }
  } catch (_) {}

  /* G3 — bounded listener, newest-updated first */
  onSnapshot(
    query(collection(db, 'orders'), orderBy('updatedAt', 'desc'), limit(500)),
    snap => {
      allOrders = snap.docs.map(d => ({ ...d.data(), _id: d.id }));
      $('sub').textContent = `${allOrders.length} أوردر`;
      renderList();
    },
    err => {
      console.warn('[order-register]', err);
      $('orders-list').innerHTML = '<div class="reg-empty"><div class="reg-empty-ico">⚠️</div><div class="reg-empty-title">تعذّر تحميل البيانات</div></div>';
    }
  );
});

/* ── Pipeline HTML ──────────────────────────────────────── */
function buildPipeline(stage) {
  const isArchived = ['archived', 'cancelled'].includes(stage);
  const curIdx     = STAGE_ORDER.indexOf(stage);

  return PIPELINE.map((step, i) => {
    let status;
    if (step.key === 'entry') {
      status = 'done';
    } else {
      const si = STAGE_ORDER.indexOf(step.key);
      if (isArchived)    status = 'done';
      else if (si < curIdx) status = 'done';
      else if (si === curIdx) status = 'active';
      else               status = 'pending';
    }

    const ico    = status === 'done' ? '✓' : esc(step.ico);
    const lineOk = status === 'done' ? ' done' : '';
    const line   = i < PIPELINE.length - 1
      ? `<div class="rcp-connector${lineOk}"></div>`
      : '';

    return `<div class="rcp-step">
      <div class="rcp-circle ${status}">${ico}</div>
      <div class="rcp-name">${step.label}</div>
    </div>${line}`;
  }).join('');
}

/* ── Order card HTML ────────────────────────────────────── */
function buildCard(o) {
  const stage    = o.stage || 'design';
  const stageDef = STAGES[stage] || { ico: '📋', col: 'var(--dim2)', label: stage };
  const progress = STAGE_PROGRESS[stage] || 20;

  /* Stage badge color — use inline style with CSS var for token compliance */
  const col      = stageDef.col;

  /* Order ID */
  const orderId  = o.orderId ? String(o.orderId) : (o._id || '').slice(-8).toUpperCase();

  /* Product description */
  const products = Array.isArray(o.products) ? o.products : [];
  let productDesc = products
    .map(p => {
      const name = p.name || p.item || p.productName || '';
      const qty  = p.quantity ? ` ${p.quantity}×` : '';
      return (name + qty).trim();
    })
    .filter(Boolean)
    .join(' · ');
  if (!productDesc) productDesc = o.item || o.productDescription || o.notes || '—';

  /* Persons */
  const csName       = o.createdByName || o.csName || '';
  const assigneeName = o[ASSIGNEE_FIELD[stage]] || '';

  /* Date */
  const dateStr = fmtTs(o.updatedAt || o.createdAt);

  return `
<div class="reg-card" onclick="openOrder('${esc(o._id)}')">
  <!-- Header -->
  <div class="rc-header">
    <div class="rc-name-block">
      <div class="rc-client">${esc(o.clientName || '—')}</div>
      <div class="rc-id">${esc(orderId)}</div>
    </div>
    <span class="rc-badge" style="background:${col}1f;color:${col}">
      ${esc(stageDef.ico)} ${esc(stageDef.label)}
    </span>
  </div>

  <!-- Product -->
  <div class="rc-product">📦 ${esc(productDesc)}</div>

  <!-- Pipeline -->
  <div class="rc-pipeline">${buildPipeline(stage)}</div>

  <!-- Meta -->
  <div class="rc-meta">
    ${csName ? `<span class="rc-person rc-person-cs">👤 ${esc(csName)}</span>` : ''}
    ${assigneeName ? `<span class="rc-person rc-person-assignee">
      <span class="rc-person-dot"></span>${esc(assigneeName)}
    </span>` : ''}
    ${dateStr ? `<span class="rc-date">${esc(dateStr)}</span>` : ''}
  </div>

  <!-- Progress -->
  <div class="rc-progress">
    <div class="rc-progress-fill" style="width:${progress}%"></div>
  </div>
</div>`;
}

/* ── Render list ────────────────────────────────────────── */
function renderList() {
  const stageFilter = $('stage-filter')?.value ?? 'active';
  const q           = ($('q')?.value || '').trim().toLowerCase();

  let filtered = allOrders;

  /* Stage filter */
  if (stageFilter === 'active') {
    filtered = filtered.filter(o => ACTIVE_STAGES.includes(o.stage || 'design'));
  } else if (stageFilter) {
    filtered = filtered.filter(o => (o.stage || 'design') === stageFilter);
  }

  /* Text search */
  if (q) {
    filtered = filtered.filter(o => {
      const products = Array.isArray(o.products) ? o.products : [];
      const prodText = products.map(p => p.name || p.item || p.productName || '').join(' ');
      return (
        (o.clientName || '').toLowerCase().includes(q) ||
        (o.clientPhone || '').includes(q) ||
        String(o.orderId || '').toLowerCase().includes(q) ||
        (o.item || '').toLowerCase().includes(q) ||
        prodText.toLowerCase().includes(q)
      );
    });
  }

  /* Count */
  $('filter-count').textContent = `${filtered.length} أوردر`;

  if (!filtered.length) {
    $('orders-list').innerHTML = `
      <div class="reg-empty">
        <div class="reg-empty-ico">📭</div>
        <div class="reg-empty-title">لا توجد أوردرات</div>
        <div class="reg-empty-sub">جرّب بحثاً أو فلتراً مختلفاً</div>
      </div>`;
    return;
  }

  $('orders-list').innerHTML = filtered.map(buildCard).join('');
}

/* ── Debounced render ───────────────────────────────────── */
window.scheduleRender = () => {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(renderList, 200);
};

window.applyFilter = () => renderList();

/* ── Navigation ─────────────────────────────────────────── */
window.openOrder = id => {
  if (typeof navigatePage === 'function') navigatePage('order.html?id=' + id);
  else location.href = 'order.html?id=' + id;
};

window.doLogout = async () => {
  try {
    const { signOut } = await import('https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js');
    await signOut(auth);
  } catch (_) {}
  location.href = 'login.html';
};
</script>
</body>
</html>
