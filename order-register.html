<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Business2Card — سجل الأوردرات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">

<script src="sidebar.js"></script>

<script src="viewas.js?v=1" defer></script>
<script src="pwa-install.js?v=1" defer></script>

<script type="module" src="app-sidebar.js?v=3"></script>

<style>
/* ══ سجل الأوردرات ══════════════════════════════════════ */

/* Filter row */
.reg-filter-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.reg-stage-select {
  min-width: 160px;
  width: auto;
}
.reg-count {
  font-size: var(--fs-sm);
  font-weight: 700;
  color: var(--dim2);
  white-space: nowrap;
  margin-inline-start: auto;
}

/* Home button */
.reg-home-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: var(--rad);
  color: var(--snow);
  font-size: var(--fs-sm);
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: var(--trans);
  white-space: nowrap;
}
.reg-home-btn:hover { background: var(--bg4); border-color: var(--line2); }

/* Order Card */
.reg-card {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--rad2);
  padding: 14px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: var(--trans);
  position: relative;
}
.reg-card:hover {
  border-color: var(--line2);
  transform: translateY(-1px);
  box-shadow: var(--shadow-pop);
}

/* Card header */
.rc-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 7px;
}
.rc-name-block { flex: 1; min-width: 0; }
.rc-client {
  font-size: var(--fs-xl);
  font-weight: 800;
  line-height: 1.2;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.rc-id {
  font-size: var(--fs-xs);
  font-weight: 700;
  color: var(--dim2);
  margin-top: 2px;
  direction: ltr;
  text-align: right;
}
.rc-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 99px;
  font-size: var(--fs-xs);
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
}

/* Product row */
.rc-product {
  font-size: var(--fs-base);
  color: var(--snow);
  margin-bottom: 12px;
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Pipeline */
.rc-pipeline {
  display: flex;
  align-items: flex-start;
  margin-bottom: 10px;
}
.rcp-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.rcp-circle {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  flex-shrink: 0;
}
.rcp-circle.done {
  background: rgba(0,217,126,.13);
  border: 2px solid var(--g);
  color: var(--g);
  font-size: 17px;
}
.rcp-circle.active {
  background: rgba(74,142,245,.13);
  border: 2px solid var(--b);
  color: var(--b);
}
.rcp-circle.pending {
  background: var(--bg3);
  border: 2px solid var(--line);
  color: var(--dim2);
}
.rcp-name {
  font-size: 10px;
  color: var(--dim2);
  font-weight: 600;
  text-align: center;
}
.rcp-connector {
  flex: 1;
  height: 2px;
  background: var(--line);
  margin-top: 17px;
  min-width: 10px;
}
.rcp-connector.done { background: var(--g); opacity: .5; }

/* Meta row */
.rc-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: var(--fs-xs);
  color: var(--dim2);
  margin-bottom: 9px;
  flex-wrap: wrap;
}
.rc-person {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 99px;
  background: var(--bg3);
}
.rc-person-cs { color: var(--b); }
.rc-person-assignee { color: var(--snow); }
.rc-person-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--r);
  flex-shrink: 0;
}
.rc-date {
  font-size: 10px;
  color: var(--dim);
  font-weight: 600;
  margin-inline-start: auto;
}

/* Progress bar */
.rc-progress {
  height: 3px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}
.rc-progress-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--b), var(--g));
  transition: width .3s ease;
}

/* Skeleton */
.skel-card {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--rad2);
  padding: 14px;
  margin-bottom: 10px;
}
.skel {
  background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 6px;
  margin-bottom: 8px;
}
@keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }
.skel-line { height: 12px; }
.skel-line.w-40 { width: 40%; }
.skel-line.w-60 { width: 60%; }
.skel-line.w-80 { width: 80%; }
.skel-pipe {
  height: 36px;
  border-radius: 99px;
  margin-bottom: 0;
}

/* Empty state */
.reg-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--dim2);
}
.reg-empty-ico { font-size: 48px; margin-bottom: 12px; }
.reg-empty-title { font-size: var(--fs-lg); font-weight: 800; margin-bottom: 6px; color: var(--snow); }
.reg-empty-sub { font-size: var(--fs-sm); }

/* Mobile adjustments */
@media (max-width: 600px) {
  .rc-client { font-size: var(--fs-lg); }
  .rcp-circle { width: 30px; height: 30px; font-size: 13px; }
  .rcp-circle.done { font-size: 15px; }
  .rcp-connector { margin-top: 14px; }
  .rcp-name { font-size: 9px; }
}

/* ══ Drawer ════════════════════════════════════════════════ */
.dr-ov {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 900;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s ease;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}
.dr-ov.show { opacity: 1; pointer-events: auto; }

.dr-panel {
  position: fixed;
  z-index: 901;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  /* Mobile: bottom sheet */
  bottom: 0;
  left: 0;
  right: 0;
  max-height: 93dvh;
  max-height: 93vh;
  border-radius: 20px 20px 0 0;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.dr-panel.show { transform: translateY(0); }

@media (min-width: 900px) {
  .dr-panel {
    top: 0;
    bottom: 0;
    right: 0;
    left: auto;
    width: 430px;
    max-height: 100dvh;
    max-height: 100vh;
    border-radius: 0;
    transform: translateX(200%);
    border-right: none;
    border-left: 1px solid var(--line);
    box-shadow: -8px 0 40px rgba(0,0,0,.4);
  }
  .dr-panel.show { transform: translateX(0); }
}

.dr-handle {
  width: 44px;
  height: 4px;
  background: var(--line2);
  border-radius: 2px;
  margin: 10px auto 2px;
  flex-shrink: 0;
}
@media (min-width: 900px) { .dr-handle { display: none; } }

.dr-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 10px 16px 12px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
  gap: 10px;
}
.dr-head-info { flex: 1; min-width: 0; }
.dr-title {
  font-size: var(--fs-lg);
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dr-sub {
  font-size: var(--fs-xs);
  color: var(--dim2);
  font-weight: 600;
}
.dr-head-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.dr-close {
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: 50%;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--snow);
  font-size: 14px;
  flex-shrink: 0;
  transition: var(--trans);
}
.dr-close:hover { background: var(--bg4); border-color: var(--r); color: var(--r); }
.dr-open-link {
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: var(--rad);
  padding: 0 10px;
  height: 32px;
  display: flex;
  align-items: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--dim2);
  cursor: pointer;
  text-decoration: none;
  white-space: nowrap;
  transition: var(--trans);
}
.dr-open-link:hover { border-color: var(--line2); color: var(--snow); }

.dr-tabs {
  display: flex;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
  background: var(--bg2);
}
.dr-tab {
  flex: 1;
  padding: 11px 0;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--dim2);
  font-size: var(--fs-sm);
  font-weight: 700;
  cursor: pointer;
  transition: var(--trans);
  font-family: inherit;
}
.dr-tab.active {
  color: var(--b);
  border-bottom-color: var(--b);
  background: rgba(74,142,245,.06);
}

.dr-body {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px env(safe-area-inset-bottom, 16px);
  overscroll-behavior: contain;
}

.dr-loading {
  text-align: center;
  padding: 50px 20px;
  color: var(--dim2);
  font-size: var(--fs-sm);
  font-weight: 600;
}

/* Details tab */
.dr-section {
  margin-bottom: 18px;
}
.dr-section-title {
  font-size: 11px;
  font-weight: 800;
  color: var(--dim2);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--line);
}

.dr-fin-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  font-size: var(--fs-sm);
  border-bottom: 1px solid var(--line);
}
.dr-fin-row:last-child { border-bottom: none; }
.dr-fin-label { color: var(--dim2); font-weight: 600; }
.dr-fin-val { font-weight: 800; }
.dr-fin-rem { color: var(--r); }
.dr-fin-paid { color: var(--g); }

.dr-prod-item {
  display: flex;
  align-items: center;
  padding: 6px 0;
  font-size: var(--fs-sm);
  border-bottom: 1px solid var(--line);
  gap: 6px;
}
.dr-prod-item:last-child { border-bottom: none; }
.dr-prod-name { font-weight: 600; color: var(--snow); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dr-prod-qty { color: var(--dim2); font-size: var(--fs-xs); font-weight: 700; white-space: nowrap; }
.dr-prod-price { font-weight: 800; color: var(--b); font-size: var(--fs-xs); white-space: nowrap; }

.dr-tl-item {
  display: flex;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid var(--line);
}
.dr-tl-item:last-child { border-bottom: none; }
.dr-tl-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--b);
  flex-shrink: 0;
  margin-top: 5px;
}
.dr-tl-text { flex: 1; color: var(--snow); font-size: 12px; line-height: 1.5; }
.dr-tl-meta { color: var(--dim); font-size: 10px; margin-top: 2px; }

/* Actions tab */
.dr-act-section {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--rad2);
  padding: 12px 14px;
  margin-bottom: 12px;
}
.dr-act-title {
  font-size: var(--fs-sm);
  font-weight: 800;
  margin-bottom: 10px;
}
.dr-act-row {
  display: flex;
  gap: 8px;
  align-items: stretch;
}
.dr-act-row .inp { flex: 1; min-width: 0; }

.dr-inp-group { margin-bottom: 8px; }
.dr-inp-group:last-child { margin-bottom: 0; }

.dr-inp-label {
  display: block;
  font-size: var(--fs-xs);
  color: var(--dim2);
  font-weight: 700;
  margin-bottom: 4px;
}

/* Warning box */
.dr-warn-box {
  background: rgba(250,173,20,.1);
  border: 1px solid var(--y);
  border-radius: var(--rad);
  padding: 10px 12px;
  margin-bottom: 10px;
}
.dr-warn-title {
  font-size: var(--fs-xs);
  font-weight: 800;
  color: var(--y);
  margin-bottom: 5px;
}
.dr-warn-item {
  font-size: 12px;
  color: var(--snow);
  padding: 2px 0;
  line-height: 1.5;
}

/* Buttons */
.dr-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 9px 16px;
  border-radius: var(--rad);
  font-size: var(--fs-sm);
  font-weight: 700;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: var(--trans);
  white-space: nowrap;
}
.dr-btn:disabled { opacity: .45; cursor: not-allowed; }
.dr-btn-primary { background: var(--b); color: #fff; }
.dr-btn-primary:hover:not(:disabled) { filter: brightness(1.1); }
.dr-btn-success { background: var(--g); color: #fff; }
.dr-btn-success:hover:not(:disabled) { filter: brightness(1.1); }
.dr-btn-warn { background: var(--y); color: #111; }
.dr-btn-warn:hover:not(:disabled) { filter: brightness(1.05); }
.dr-btn-sm { padding: 7px 12px; font-size: var(--fs-xs); }
.dr-btn-full { width: 100%; }

/* Upload preview */
.dr-file-preview {
  font-size: 11px;
  color: var(--g);
  font-weight: 700;
  margin-top: 4px;
  padding: 4px 8px;
  background: rgba(0,217,126,.08);
  border-radius: var(--rad);
  display: none;
}
.dr-file-preview.show { display: block; }

/* Upload progress */
.dr-upload-prog {
  font-size: var(--fs-xs);
  color: var(--dim2);
  margin-bottom: 8px;
  padding: 6px 10px;
  background: var(--bg3);
  border-radius: var(--rad);
  display: none;
  font-weight: 600;
}
.dr-upload-prog.show { display: block; }

/* Current assignee chip */
.dr-assignee-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  background: var(--bg3);
  border-radius: 99px;
  font-size: var(--fs-xs);
  font-weight: 700;
  margin-bottom: 10px;
  color: var(--snow);
}

/* Toast */
.dr-toast {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%) translateY(-10px);
  background: var(--bg3);
  border: 1px solid var(--line2);
  color: var(--snow);
  padding: 10px 20px;
  border-radius: 99px;
  font-size: var(--fs-sm);
  font-weight: 700;
  z-index: 1100;
  opacity: 0;
  transition: all .25s ease;
  white-space: nowrap;
  max-width: 90vw;
  text-align: center;
  pointer-events: none;
  box-shadow: var(--shadow-pop);
}
.dr-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.dr-toast.ok  { background: rgba(0,217,126,.2); border-color: var(--g); color: var(--g); }
.dr-toast.err { background: rgba(239,68,68,.2);  border-color: var(--r); color: var(--r); }
.dr-toast.warn{ background: rgba(250,173,20,.2); border-color: var(--y); color: var(--y); }
</style>
</head>
<body>
<div class="app-shell">

<!-- Legacy sidenav (replaced by app-sidebar) -->
<aside class="sidenav">
  <div class="nav-brand">
    <div class="nav-logo">📋</div>
    <div>
      <div class="nav-brand-name">Business2Card</div>
      <div class="nav-brand-role" id="role-badge">ERP</div>
    </div>
  </div>
  <div class="nav-scroll" id="nav-links"></div>
  <div class="nav-foot">
    <div class="nav-user" onclick="doLogout()">
      <div class="nav-avatar" id="nav-av">A</div>
      <div>
        <div class="nav-user-name" id="nav-name">User</div>
        <div class="nav-user-role">تسجيل خروج</div>
      </div>
    </div>
  </div>
</aside>

<app-sidebar active current="order-register.html"></app-sidebar>

<div class="main">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <button type="button" class="mob-menu-btn" onclick="toggleNav()">☰</button>
      <div>
        <h1>🚂 سجل الأوردرات</h1>
        <p id="sub">جاري التحميل...</p>
      </div>
    </div>
    <div class="topbar-right">
      <a href="my-home.html" class="reg-home-btn">🏠 الرئيسية</a>
    </div>
  </div>

  <div class="content">

    <!-- Search -->
    <div class="sw" style="margin-bottom:10px">
      <span class="sw-ico">🔍</span>
      <input class="inp" id="q"
        placeholder="بحث: اسم العميل · تليفون · رقم الأوردر · المنتج"
        oninput="scheduleRender()">
    </div>

    <!-- Filter row -->
    <div class="reg-filter-row">
      <select class="inp reg-stage-select" id="stage-filter" onchange="applyFilter()">
        <option value="active">المراحل النشطة</option>
        <option value="">الكل</option>
        <option value="design">✏️ تصميم</option>
        <option value="printing">🖨️ طباعة</option>
        <option value="production">🏭 تنفيذ</option>
        <option value="shipping">🚚 شد</option>
        <option value="archived">📁 أرشيف</option>
        <option value="cancelled">✕ ملغي</option>
      </select>
      <span class="reg-count" id="filter-count">—</span>
    </div>

    <!-- Orders list -->
    <div id="orders-list"></div>

  </div><!-- /content -->
</div><!-- /main -->
</div><!-- /app-shell -->

<div class="nav-overlay" id="nav-ov"
  onclick="document.querySelector('.sidenav')?.classList.remove('mob-open');this.classList.remove('show')"></div>

<!-- ══ Drawer ═══════════════════════════════════════════════ -->
<div class="dr-ov" id="dr-ov" onclick="closeDrawer()"></div>
<div class="dr-panel" id="dr-panel" role="dialog" aria-modal="true" aria-label="تفاصيل الأوردر">
  <div class="dr-handle"></div>
  <div class="dr-head">
    <div class="dr-head-info">
      <div class="dr-title" id="dr-title">الأوردر</div>
      <div class="dr-sub" id="dr-sub">—</div>
    </div>
    <div class="dr-head-actions">
      <a id="dr-open-link" href="#" class="dr-open-link" target="_blank">↗ فتح كامل</a>
      <button class="dr-close" onclick="closeDrawer()" aria-label="إغلاق">✕</button>
    </div>
  </div>
  <div class="dr-tabs">
    <button class="dr-tab active" id="tab-details" onclick="switchTab('details')">📋 تفاصيل</button>
    <button class="dr-tab" id="tab-actions" onclick="switchTab('actions')">⚡ إجراءات</button>
  </div>
  <div class="dr-body" id="dr-body">
    <div class="dr-loading">⏳ جاري التحميل...</div>
  </div>
</div>

<!-- Toast element (singleton) -->
<div class="dr-toast" id="dr-toast"></div>

<script type="module">
import { auth, db, storage } from './core/firebase-init.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
import {
  doc, getDoc, getDocs, onSnapshot,
  collection, query, where, orderBy, limit,
} from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';
import {
  ref as stRef, uploadBytes, getDownloadURL,
} from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js';
import { STAGES } from './orders.js';
import { orderActions } from './order-actions.js';
import { esc } from './core/dom-utils.js';

/* ── Constants ─────────────────────────────────────────── */
const ACTIVE_STAGES = ['design', 'printing', 'production', 'shipping'];

const STAGE_PROGRESS = {
  design: 20, printing: 40, production: 60,
  shipping: 80, archived: 100, cancelled: 100,
};

const PIPELINE = [
  { key: 'entry',      label: 'إدخال', ico: '✓'  },
  { key: 'design',     label: 'تصميم', ico: '✏️' },
  { key: 'printing',   label: 'طباعة', ico: '🖨️' },
  { key: 'production', label: 'تنفيذ', ico: '🏭' },
  { key: 'shipping',   label: 'شد',    ico: '🚚'  },
];

const STAGE_ORDER = ['design', 'printing', 'production', 'shipping'];

const ASSIGNEE_FIELD = {
  design:     'designerName',
  printing:   'printerName',
  production: 'productionAgentName',
  shipping:   'shippingOfficerName',
};

const STAGE_ROLES = {
  design:     ['graphic_designer', 'design_operator'],
  printing:   ['production_agent'],
  production: ['production_agent'],
  shipping:   ['shipping_officer'],
};

const ADVANCE_MAP = {
  design:     'submitToPrinting',
  printing:   'submitToProduction',
  production: 'submitToShipping',
};

const NEXT_STAGE_LABEL = {
  design:     '🖨️ الطباعة',
  printing:   '🏭 التنفيذ',
  production: '🚚 الشد',
};

/* ── Date formatter ─────────────────────────────────────── */
const _dtFmt = new Intl.DateTimeFormat('ar-EG', {
  year: 'numeric', month: '2-digit', day: '2-digit',
  hour: '2-digit', minute: '2-digit',
});
function fmtTs(ts) {
  if (!ts) return '';
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts.seconds ? ts.seconds * 1000 : ts);
    return _dtFmt.format(d);
  } catch { return ''; }
}

/* ── DOM helper ─────────────────────────────────────────── */
const $ = id => document.getElementById(id);

/* ── List state ─────────────────────────────────────────── */
let allOrders = [];
let renderTimer = null;

/* ── User state ─────────────────────────────────────────── */
let currentUserId   = '';
let currentUserName = '';
let currentUserRole = '';

/* ── Drawer state ───────────────────────────────────────── */
let drawerOrderId         = null;
let drawerOrder           = null;
let drawerUnsub           = null;
let activeTab             = 'details';
let wallets               = [];
let stageEmployees        = [];
let pendingAdvanceWarnings = null;
let walletsLoaded         = false;

/* ── Skeleton on load ───────────────────────────────────── */
$('orders-list').innerHTML = [1,2,3,4,5].map(() => `
  <div class="skel-card">
    <div class="skel skel-line w-60" style="height:16px;margin-bottom:6px"></div>
    <div class="skel skel-line w-80" style="margin-bottom:10px"></div>
    <div class="skel skel-pipe" style="margin-bottom:10px"></div>
    <div class="skel skel-line w-40"></div>
  </div>`).join('');

/* ── Auth & data ────────────────────────────────────────── */
onAuthStateChanged(auth, async u => {
  if (!u) { location.href = 'login.html'; return; }
  currentUserId = u.uid;

  try {
    const us = await getDoc(doc(db, 'users', u.uid));
    if (us.exists()) {
      const d = us.data();
      currentUserName = d.name || u.email || '';
      currentUserRole = d.role || '';
      const nm = $('nav-name'); if (nm) nm.textContent = currentUserName;
      const av = $('nav-av');   if (av) av.textContent = (d.name || 'A')[0].toUpperCase();
    }
  } catch (_) {}

  /* G3 — bounded listener, newest-updated first */
  onSnapshot(
    query(collection(db, 'orders'), orderBy('updatedAt', 'desc'), limit(500)),
    snap => {
      allOrders = snap.docs.map(d => ({ ...d.data(), _id: d.id }));
      $('sub').textContent = `${allOrders.length} أوردر`;
      renderList();
    },
    err => {
      console.warn('[order-register]', err);
      $('orders-list').innerHTML = '<div class="reg-empty"><div class="reg-empty-ico">⚠️</div><div class="reg-empty-title">تعذّر تحميل البيانات</div></div>';
    }
  );
});

/* ── Pipeline HTML ──────────────────────────────────────── */
function buildPipeline(stage) {
  const isArchived = ['archived', 'cancelled'].includes(stage);
  const curIdx     = STAGE_ORDER.indexOf(stage);

  return PIPELINE.map((step, i) => {
    let status;
    if (step.key === 'entry') {
      status = 'done';
    } else {
      const si = STAGE_ORDER.indexOf(step.key);
      if (isArchived)      status = 'done';
      else if (si < curIdx)  status = 'done';
      else if (si === curIdx) status = 'active';
      else                   status = 'pending';
    }

    const ico    = status === 'done' ? '✓' : esc(step.ico);
    const lineOk = status === 'done' ? ' done' : '';
    const line   = i < PIPELINE.length - 1
      ? `<div class="rcp-connector${lineOk}"></div>`
      : '';

    return `<div class="rcp-step">
      <div class="rcp-circle ${status}">${ico}</div>
      <div class="rcp-name">${esc(step.label)}</div>
    </div>${line}`;
  }).join('');
}

/* ── Order card HTML ────────────────────────────────────── */
function buildCard(o) {
  const stage    = o.stage || 'design';
  const stageDef = STAGES[stage] || { ico: '📋', col: 'var(--dim2)', label: stage };
  const progress = STAGE_PROGRESS[stage] || 20;
  const col      = stageDef.col;
  const orderId  = o.orderId ? String(o.orderId) : (o._id || '').slice(-8).toUpperCase();

  const products = Array.isArray(o.products) ? o.products : [];
  let productDesc = products
    .map(p => {
      const name = p.name || p.item || p.productName || '';
      const qty  = p.quantity ? ` ${p.quantity}×` : '';
      return (name + qty).trim();
    })
    .filter(Boolean).join(' · ');
  if (!productDesc) productDesc = o.item || o.productDescription || o.notes || '—';

  const csName       = o.createdByName || o.csName || '';
  const assigneeName = o[ASSIGNEE_FIELD[stage]] || '';
  const dateStr      = fmtTs(o.updatedAt || o.createdAt);

  return `
<div class="reg-card" onclick="openDrawer('${esc(o._id)}')">
  <div class="rc-header">
    <div class="rc-name-block">
      <div class="rc-client">${esc(o.clientName || '—')}</div>
      <div class="rc-id">${esc(orderId)}</div>
    </div>
    <span class="rc-badge" style="background:${col}1f;color:${col}">
      ${esc(stageDef.ico)} ${esc(stageDef.label)}
    </span>
  </div>
  <div class="rc-product">📦 ${esc(productDesc)}</div>
  <div class="rc-pipeline">${buildPipeline(stage)}</div>
  <div class="rc-meta">
    ${csName       ? `<span class="rc-person rc-person-cs">👤 ${esc(csName)}</span>` : ''}
    ${assigneeName ? `<span class="rc-person rc-person-assignee"><span class="rc-person-dot"></span>${esc(assigneeName)}</span>` : ''}
    ${dateStr      ? `<span class="rc-date">${esc(dateStr)}</span>` : ''}
  </div>
  <div class="rc-progress">
    <div class="rc-progress-fill" style="width:${progress}%"></div>
  </div>
</div>`;
}

/* ── Render list ────────────────────────────────────────── */
function renderList() {
  const stageFilter = $('stage-filter')?.value ?? 'active';
  const q           = ($('q')?.value || '').trim().toLowerCase();

  let filtered = allOrders;

  if (stageFilter === 'active') {
    filtered = filtered.filter(o => ACTIVE_STAGES.includes(o.stage || 'design'));
  } else if (stageFilter) {
    filtered = filtered.filter(o => (o.stage || 'design') === stageFilter);
  }

  if (q) {
    filtered = filtered.filter(o => {
      const products = Array.isArray(o.products) ? o.products : [];
      const prodText = products.map(p => p.name || p.item || p.productName || '').join(' ');
      return (
        (o.clientName  || '').toLowerCase().includes(q) ||
        (o.clientPhone || '').includes(q) ||
        String(o.orderId || '').toLowerCase().includes(q) ||
        (o.item        || '').toLowerCase().includes(q) ||
        prodText.toLowerCase().includes(q)
      );
    });
  }

  $('filter-count').textContent = `${filtered.length} أوردر`;

  if (!filtered.length) {
    $('orders-list').innerHTML = `
      <div class="reg-empty">
        <div class="reg-empty-ico">📭</div>
        <div class="reg-empty-title">لا توجد أوردرات</div>
        <div class="reg-empty-sub">جرّب بحثاً أو فلتراً مختلفاً</div>
      </div>`;
    return;
  }

  $('orders-list').innerHTML = filtered.map(buildCard).join('');
}

/* ── Debounced render ───────────────────────────────────── */
window.scheduleRender = () => {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(renderList, 200);
};
window.applyFilter = () => renderList();

/* ── Open drawer ────────────────────────────────────────── */
window.openDrawer = async function openDrawer(orderId) {
  drawerOrderId          = orderId;
  activeTab              = 'details';
  pendingAdvanceWarnings = null;

  $('dr-ov').classList.add('show');
  $('dr-panel').classList.add('show');
  $('dr-title').textContent = '⏳';
  $('dr-sub').textContent   = 'جاري التحميل...';
  $('dr-body').innerHTML    = '<div class="dr-loading">⏳ جاري التحميل...</div>';
  $('dr-open-link').href    = `order.html?id=${encodeURIComponent(orderId)}`;
  $('tab-details').classList.add('active');
  $('tab-actions').classList.remove('active');

  if (drawerUnsub) { drawerUnsub(); drawerUnsub = null; }

  drawerUnsub = onSnapshot(doc(db, 'orders', orderId), snap => {
    if (!snap.exists()) {
      $('dr-body').innerHTML = '<div class="dr-loading">⚠️ الأوردر غير موجود</div>';
      return;
    }
    drawerOrder = { ...snap.data(), _id: snap.id };

    const displayId = drawerOrder.orderId
      ? String(drawerOrder.orderId)
      : snap.id.slice(-8).toUpperCase();
    const stageDef  = STAGES[drawerOrder.stage] || { label: drawerOrder.stage };

    $('dr-title').textContent = drawerOrder.clientName || '—';
    $('dr-sub').textContent   = `#${displayId} · ${stageDef.label || drawerOrder.stage}`;

    renderDrawerTab();
  });

  /* Parallel: load wallets (once) and employees for stage */
  if (!walletsLoaded) loadWallets();
  if (drawerOrder) loadStageEmployees(drawerOrder.stage);
};

/* ── Close drawer ───────────────────────────────────────── */
window.closeDrawer = function closeDrawer() {
  $('dr-ov').classList.remove('show');
  $('dr-panel').classList.remove('show');
  if (drawerUnsub) { drawerUnsub(); drawerUnsub = null; }
  drawerOrderId          = null;
  drawerOrder            = null;
  pendingAdvanceWarnings = null;
};

/* ── Switch tab ─────────────────────────────────────────── */
window.switchTab = function switchTab(tab) {
  activeTab = tab;
  $('tab-details').classList.toggle('active', tab === 'details');
  $('tab-actions').classList.toggle('active', tab === 'actions');

  if (tab === 'actions' && drawerOrder) {
    loadStageEmployees(drawerOrder.stage).then(() => renderDrawerTab());
  } else {
    renderDrawerTab();
  }
};

function renderDrawerTab() {
  if (!drawerOrder) return;
  if (activeTab === 'details') renderDetailsTab(drawerOrder);
  else                          renderActionsTab(drawerOrder);
}

/* ── Load support data ──────────────────────────────────── */
async function loadWallets() {
  try {
    const snap = await getDocs(query(collection(db, 'wallets'), limit(20)));
    wallets      = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    walletsLoaded = true;
  } catch (e) {
    console.warn('[drawer] wallets', e);
  }
}

async function loadStageEmployees(stage) {
  const roles = STAGE_ROLES[stage];
  if (!roles) { stageEmployees = []; return; }
  try {
    const snap     = await getDocs(
      query(collection(db, 'employees'), where('role', 'in', roles), limit(100))
    );
    stageEmployees = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) {
    console.warn('[drawer] employees', e);
    stageEmployees = [];
  }
}

/* ── Details tab ────────────────────────────────────────── */
function renderDetailsTab(o) {
  const stage    = o.stage || 'design';
  const products = Array.isArray(o.products) ? o.products : [];

  const salePrice = Number(o.salePrice || 0);
  const custShip  = Number(o.customerShipFee || o.customerShippingFee || 0);
  const disc      = Number(o.discount || 0);
  const paid      = Number(o.totalPaid || 0);
  const gross     = Math.max(0, salePrice + custShip - disc);
  const remaining = Math.max(0, gross - paid);

  const timeline  = Array.isArray(o.timeline) ? [...o.timeline].reverse().slice(0, 5) : [];

  const productsHtml = products.length ? `
  <div class="dr-section">
    <div class="dr-section-title">المنتجات (${products.length})</div>
    ${products.map(p => {
      const name  = esc(p.name || p.item || p.productName || '—');
      const qty   = p.quantity != null ? `<span class="dr-prod-qty">${esc(String(p.quantity))}×</span>` : '';
      const price = (p.salePrice || p.price)
        ? `<span class="dr-prod-price">${Number(p.salePrice || p.price).toLocaleString('ar-EG')} ج.م</span>`
        : '';
      return `<div class="dr-prod-item"><span class="dr-prod-name">${name}</span>${qty}${price}</div>`;
    }).join('')}
  </div>` : '';

  const timelineHtml = timeline.length ? `
  <div class="dr-section">
    <div class="dr-section-title">آخر السجلات</div>
    ${timeline.map(t => {
      const txt     = esc(t.action || t.note || t.text || '—');
      const who     = t.by || t.userName || '';
      const timeStr = fmtTs(t.at || t.createdAt);
      return `<div class="dr-tl-item">
        <div class="dr-tl-dot"></div>
        <div>
          <div class="dr-tl-text">${txt}</div>
          ${(who || timeStr) ? `<div class="dr-tl-meta">${esc(who)}${who && timeStr ? ' · ' : ''}${esc(timeStr)}</div>` : ''}
        </div>
      </div>`;
    }).join('')}
  </div>` : '';

  $('dr-body').innerHTML = `
  <div class="dr-section">
    <div class="dr-section-title">مراحل الأوردر</div>
    <div class="rc-pipeline" style="margin-bottom:0">${buildPipeline(stage)}</div>
  </div>
  ${productsHtml}
  <div class="dr-section">
    <div class="dr-section-title">المالية</div>
    <div class="dr-fin-row">
      <span class="dr-fin-label">إجمالي الأوردر</span>
      <span class="dr-fin-val">${gross.toLocaleString('ar-EG')} ج.م</span>
    </div>
    <div class="dr-fin-row">
      <span class="dr-fin-label">المدفوع</span>
      <span class="dr-fin-val dr-fin-paid">${paid.toLocaleString('ar-EG')} ج.م</span>
    </div>
    <div class="dr-fin-row">
      <span class="dr-fin-label">المتبقي على العميل</span>
      <span class="dr-fin-val ${remaining > 0 ? 'dr-fin-rem' : 'dr-fin-paid'}">${remaining.toLocaleString('ar-EG')} ج.م</span>
    </div>
    ${disc > 0 ? `<div class="dr-fin-row">
      <span class="dr-fin-label">خصم</span>
      <span class="dr-fin-val" style="color:var(--y)">−${disc.toLocaleString('ar-EG')} ج.م</span>
    </div>` : ''}
    ${custShip > 0 ? `<div class="dr-fin-row">
      <span class="dr-fin-label">رسوم شحن عميل</span>
      <span class="dr-fin-val">${custShip.toLocaleString('ar-EG')} ج.م</span>
    </div>` : ''}
  </div>
  ${timelineHtml}`;
}

/* ── Actions tab ────────────────────────────────────────── */
function renderActionsTab(o) {
  const stage    = o.stage || 'design';
  const isActive = ACTIVE_STAGES.includes(stage);

  if (!isActive) {
    const stageDef = STAGES[stage] || { label: stage };
    $('dr-body').innerHTML = `
      <div class="dr-loading">
        📁 الأوردر في مرحلة «${esc(stageDef.label)}» — لا إجراءات متاحة
      </div>`;
    return;
  }

  const canAdvance   = !!ADVANCE_MAP[stage];
  const nextLabel    = NEXT_STAGE_LABEL[stage] || '';
  const curAssignee  = o[ASSIGNEE_FIELD[stage]] || '';

  /* Employees select */
  const empOpts = stageEmployees.length
    ? stageEmployees.map(e =>
        `<option value="${esc(e.id)}" data-name="${esc(e.name || e.displayName || e.id)}">${esc(e.name || e.displayName || '—')}</option>`
      ).join('')
    : '<option value="" disabled>جاري التحميل أو لا يوجد موظفون...</option>';

  /* Wallets select */
  const wallOpts = wallets.length
    ? wallets.map(w =>
        `<option value="${esc(w.id)}" data-name="${esc(w.name || w.id)}">${esc(w.name || w.id)}</option>`
      ).join('')
    : '<option value="" disabled>جاري التحميل...</option>';

  /* Warning box (advance) */
  const warnHtml = pendingAdvanceWarnings ? `
    <div class="dr-warn-box">
      <div class="dr-warn-title">⚠️ تحذيرات قبل التقديم</div>
      ${pendingAdvanceWarnings.map(w => `<div class="dr-warn-item">• ${esc(String(w))}</div>`).join('')}
    </div>
    <button class="dr-btn dr-btn-warn dr-btn-full" id="dr-adv-confirm" onclick="doAdvance(true)">
      ✔️ تأكيد التقديم رغم التحذيرات
    </button>` : `
    <button class="dr-btn dr-btn-primary dr-btn-full" id="dr-adv-btn" onclick="doAdvance(false)">
      ⚡ تقديم إلى ${esc(nextLabel)} ←
    </button>`;

  $('dr-body').innerHTML = `
  <!-- Assign section -->
  <div class="dr-act-section">
    <div class="dr-act-title">👤 تعيين مسؤول المرحلة</div>
    ${curAssignee ? `<div class="dr-assignee-chip">✅ المسؤول الحالي: ${esc(curAssignee)}</div>` : ''}
    <div class="dr-act-row">
      <select class="inp" id="dr-assignee-sel">
        <option value="">— اختر مسؤولاً —</option>
        ${empOpts}
      </select>
      <button class="dr-btn dr-btn-primary dr-btn-sm" id="dr-assign-btn" onclick="doAssign()">تعيين</button>
    </div>
  </div>

  <!-- Payment section -->
  <div class="dr-act-section">
    <div class="dr-act-title">💰 إضافة دفعة من العميل</div>
    <div class="dr-inp-group">
      <label class="dr-inp-label">المبلغ (ج.م)</label>
      <input class="inp" id="dr-pay-amount" type="number" placeholder="0.00" min="1" step="0.01">
    </div>
    <div class="dr-inp-group">
      <label class="dr-inp-label">المحفظة</label>
      <select class="inp" id="dr-pay-wallet">
        <option value="">— اختر المحفظة —</option>
        ${wallOpts}
      </select>
    </div>
    <div class="dr-inp-group">
      <label class="dr-inp-label">ملاحظة (اختياري)</label>
      <input class="inp" id="dr-pay-note" type="text" placeholder="ملاحظة...">
    </div>
    <div class="dr-inp-group">
      <label class="dr-inp-label">📎 إيصال الدفع — صورة أو PDF (إلزامي)</label>
      <input type="file" class="inp" id="dr-pay-receipt" accept="image/*,.pdf" style="padding:6px" onchange="onReceiptChange(this)">
      <div class="dr-file-preview" id="dr-file-preview"></div>
    </div>
    <div class="dr-upload-prog" id="dr-upload-prog">⏳ جاري الرفع...</div>
    <button class="dr-btn dr-btn-success dr-btn-full" id="dr-pay-btn" onclick="doPayment()">💾 حفظ الدفعة</button>
  </div>

  <!-- Advance section -->
  ${canAdvance ? `
  <div class="dr-act-section">
    <div class="dr-act-title">⚡ تقديم للمرحلة الجاية</div>
    <div style="font-size:var(--fs-xs);color:var(--dim2);margin-bottom:10px">
      المرحلة القادمة: <strong style="color:var(--snow)">${esc(nextLabel)}</strong>
    </div>
    ${warnHtml}
  </div>` : `
  <div class="dr-act-section" style="text-align:center;padding:18px;opacity:.6">
    <div style="font-size:22px;margin-bottom:6px">🚢</div>
    <div style="font-size:var(--fs-xs);color:var(--dim2)">الأوردر في مرحلة الشد — التقدم يتم عبر صفحة الشحن</div>
  </div>`}
  `;
}

/* ── File input preview ─────────────────────────────────── */
window.onReceiptChange = function onReceiptChange(input) {
  const prev = $('dr-file-preview');
  if (!prev) return;
  const file = input.files?.[0];
  if (file) {
    prev.textContent = `✅ ${esc(file.name)} (${(file.size / 1024).toFixed(0)} KB)`;
    prev.classList.add('show');
  } else {
    prev.classList.remove('show');
  }
};

/* ── Actions ────────────────────────────────────────────── */

/* Assign */
window.doAssign = async function doAssign() {
  if (!drawerOrder || !drawerOrderId) return;
  const sel    = $('dr-assignee-sel');
  const empId  = sel?.value;
  if (!empId) { showToast('اختر مسؤولاً أولاً', 'warn'); return; }

  const emp     = stageEmployees.find(e => e.id === empId);
  const empName = emp?.name || emp?.displayName || empId;
  const stage   = drawerOrder.stage;
  const base    = { db, userId: currentUserId, userName: currentUserName };
  const btn     = $('dr-assign-btn');
  if (btn) btn.disabled = true;

  try {
    let result;
    if (stage === 'design') {
      result = await orderActions.startDesign({
        ...base, orderId: drawerOrderId, designerId: empId, designerName: empName,
      });
    } else if (stage === 'printing') {
      result = await orderActions.assignPrinter({
        ...base, orderId: drawerOrderId, printerId: empId, printerName: empName,
      });
    } else if (stage === 'production') {
      result = await orderActions.assignProductionAgent({
        ...base, orderId: drawerOrderId, agentId: empId, agentName: empName,
      });
    } else if (stage === 'shipping') {
      result = await orderActions.updateOrderField({
        ...base,
        orderId:        drawerOrderId,
        changes:        { shippingOfficerId: empId, shippingOfficerName: empName },
        timelineAction: `👤 تعيين مسؤول الشحن: ${empName}`,
      });
    }

    if (result?.ok) {
      showToast(`✅ تم التعيين: ${empName}`, 'ok');
      if (sel) sel.value = '';
    } else {
      showToast(result?.errors?.join(' · ') || 'حدث خطأ', 'err');
    }
  } catch (e) {
    showToast(e.message || 'حدث خطأ', 'err');
  } finally {
    if (btn) btn.disabled = false;
  }
};

/* Payment */
window.doPayment = async function doPayment() {
  if (!drawerOrder || !drawerOrderId) return;

  const amount    = Number($('dr-pay-amount')?.value);
  const walletSel = $('dr-pay-wallet');
  const walletId  = walletSel?.value;
  const walletName = walletSel?.selectedOptions?.[0]?.dataset?.name || walletId;
  const note      = $('dr-pay-note')?.value?.trim() || '';
  const fileInput = $('dr-pay-receipt');
  const file      = fileInput?.files?.[0];

  if (!amount || amount <= 0)  { showToast('أدخل مبلغاً صحيحاً', 'warn'); return; }
  if (!walletId)               { showToast('اختر محفظة', 'warn');          return; }
  if (!file)                   { showToast('الإيصال إلزامي — ارفع صورة أو PDF', 'warn'); return; }

  const btn  = $('dr-pay-btn');
  const prog = $('dr-upload-prog');
  if (btn)  btn.disabled = true;
  if (prog) { prog.textContent = '⏳ جاري رفع الإيصال...'; prog.classList.add('show'); }

  try {
    /* Upload receipt to legacy path (S1: receipts path) */
    const safeName  = file.name.replace(/[^\w.\-]/g, '_');
    const path      = `receipts/merchant_001/${currentUserId}/${Date.now()}_${safeName}`;
    const fileRef   = stRef(storage, path);
    await uploadBytes(fileRef, file, { contentType: file.type || 'application/octet-stream' });
    const receiptUrl = await getDownloadURL(fileRef);

    if (prog) prog.textContent = '✅ تم الرفع · جاري الحفظ...';

    const result = await orderActions.recordPayment({
      db,
      orderId:    drawerOrderId,
      amount,
      walletId,
      walletName,
      role:       currentUserRole,
      userId:     currentUserId,
      userName:   currentUserName,
      note,
      receiptUrl,
      source:     'customer',
    });

    if (result?.ok) {
      showToast(`✅ تم تسجيل دفعة ${amount.toLocaleString('ar-EG')} ج.م`, 'ok');
      /* Reset form fields */
      if ($('dr-pay-amount'))  $('dr-pay-amount').value  = '';
      if ($('dr-pay-wallet'))  $('dr-pay-wallet').value  = '';
      if ($('dr-pay-note'))    $('dr-pay-note').value    = '';
      if (fileInput)           fileInput.value = '';
      const prev = $('dr-file-preview');
      if (prev) prev.classList.remove('show');
    } else {
      showToast(result?.errors?.join(' · ') || 'حدث خطأ في الحفظ', 'err');
    }
  } catch (e) {
    showToast(e.message || 'حدث خطأ أثناء الرفع', 'err');
  } finally {
    if (btn)  btn.disabled = false;
    if (prog) { prog.classList.remove('show'); prog.textContent = '⏳ جاري الرفع...'; }
  }
};

/* Advance stage */
window.doAdvance = async function doAdvance(bypass = false) {
  if (!drawerOrder || !drawerOrderId) return;
  const stage      = drawerOrder.stage;
  const actionName = ADVANCE_MAP[stage];
  if (!actionName) return;

  const btnId = bypass ? 'dr-adv-confirm' : 'dr-adv-btn';
  const btn   = $(btnId);
  if (btn) btn.disabled = true;

  try {
    const result = await orderActions[actionName]({
      db,
      orderId:       drawerOrderId,
      role:          currentUserRole,
      userId:        currentUserId,
      userName:      currentUserName,
      bypassWarnings: bypass,
    });

    if (result?.needsConfirmation) {
      pendingAdvanceWarnings = result.warnings?.length
        ? result.warnings
        : ['يوجد تحذيرات — راجع بيانات الأوردر قبل المتابعة'];
      renderActionsTab(drawerOrder);
      return;
    }

    if (result?.ok) {
      pendingAdvanceWarnings = null;
      showToast(`✅ تم التقديم إلى ${NEXT_STAGE_LABEL[stage] || 'المرحلة الجاية'}`, 'ok');
    } else {
      showToast(result?.errors?.join(' · ') || 'حدث خطأ', 'err');
      if (btn) btn.disabled = false;
    }
  } catch (e) {
    showToast(e.message || 'حدث خطأ', 'err');
    if (btn) btn.disabled = false;
  }
};

/* ── Toast ──────────────────────────────────────────────── */
let _toastTimer = null;
function showToast(msg, type = '') {
  const el = $('dr-toast');
  if (!el) return;
  el.textContent = msg;
  el.className   = `dr-toast ${type} show`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

/* ── Keyboard close ─────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && drawerOrderId) closeDrawer();
});

/* ── Legacy navigation (for external callers) ───────────── */
window.openOrder = id => {
  if (typeof navigatePage === 'function') navigatePage('order.html?id=' + id);
  else location.href = 'order.html?id=' + id;
};

window.doLogout = async () => {
  try {
    const { signOut } = await import('https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js');
    await signOut(auth);
  } catch (_) {}
  location.href = 'login.html';
};
</script>
