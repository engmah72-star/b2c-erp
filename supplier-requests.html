<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<title>طلبات الموردين — Business2Card</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css?v=41">
<link rel="stylesheet" href="design-system/components.css?v=1">
<script src="sidebar-config.js"></script>
<script src="sidebar.js"></script>
<link rel="stylesheet" href="supplier-requests.css?v=1">
<script src="financial-guard.js"></script>
<script type="module" src="inbox-badge.js"></script>
<script src="smart-sidebar.js?v=1" defer></script>
<script src="viewas.js?v=1" defer></script>
<script src="pwa-install.js?v=1" defer></script>
<script type="module" src="ai-launcher.js?v=1" defer></script>
<script src="theme.js?v=4"></script>
</head>
<body>
<div class="app-shell">
<aside class="sidenav" id="sidebar">
  <div class="nav-brand">
    <div class="nav-logo">🎨</div>
    <div>
      <div class="nav-brand-name">Business2Card</div>
      <div class="nav-brand-role" id="nav-role">—</div>
    </div>
  </div>
  <div class="nav-scroll" id="nav-links"></div>
</aside>
<header class="topbar">
  <button class="menu-btn" id="menu-btn">☰</button>
  <div>
    <div class="page-title">🏭 طلبات الموردين</div>
    <div class="page-sub">أرصدة الموردين وطلبات الدفع لتنفيذ الأوردرات</div>
  </div>
  <div style="margin-right:auto;display:flex;align-items:center;gap:10px">
    <button type="button" onclick="openNewRequest()" style="padding:8px 14px;border-radius:8px;border:1px solid rgba(0,217,126,.4);background:rgba(0,217,126,.15);color:var(--g);cursor:pointer;font-family:inherit;font-size:var(--fs-base);font-weight:var(--fw-extra)">➕ طلب دفع مورد</button>
    <span id="nav-name" style="font-size:var(--fs-md);color:var(--dim2)"></span>
    <button type="button" onclick="logoutBtn()" style="padding:7px 12px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);color:var(--snow);cursor:pointer;font-family:inherit;font-size:var(--fs-base)">خروج</button>
  </div>
</header>

<main class="main">
  <div class="container">
    <div class="tabs-bar">
      <button type="button" class="tab on" id="tab-suppliers_due" onclick="setTab('suppliers_due')">🏭 أرصدة الموردين <span class="badge" id="cnt-suppliers_due" style="background:var(--y)">0</span></button>
      <button type="button" class="tab" id="tab-active" onclick="setTab('active')">🔥 طلباتي النشطة <span class="badge" id="cnt-active">0</span></button>
      <!-- ملاحظة: مدير التشغيل هو من يرفع الإيصال — المندوب يتابع فقط -->
      <button type="button" class="tab hide" id="tab-awaiting_receipt" onclick="setTab('awaiting_receipt')">📥 بانتظار الإيصال <span class="badge" id="cnt-awaiting_receipt">0</span></button>
      <button type="button" class="tab" id="tab-approved" onclick="setTab('approved')">✅ معتمدة <span class="badge" id="cnt-approved">0</span></button>
      <button type="button" class="tab" id="tab-rejected" onclick="setTab('rejected')">❌ مرفوضة <span class="badge" id="cnt-rejected">0</span></button>
    </div>

    <div id="list-content"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</main>
</div><!-- /.app-shell -->

<!-- Modal: طلب جديد لمورد -->
<div class="overlay" id="ov-new-req">
  <div class="modal" style="max-width:520px">
    <div class="modal-head"><span class="modal-title">🏭 طلب دفع لمورد</span><button type="button" class="modal-x" onclick="cM('new-req')">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label>المورد *</label><select class="inp" id="rq-supplier"><option value="">— اختر المورد —</option></select></div>

      <!-- بنود مستحقة لهذا المورد -->
      <div id="fg-supplier-items" class="fg hide">
        <label>📋 بنود مستحقة <span style="font-size:var(--fs-xs);color:var(--dim2);font-weight:var(--fw-medium)">— اختر بند أو أكثر</span></label>
        <div id="rq-supplier-items-list" style="max-height:280px;overflow-y:auto;border:1px solid var(--line);border-radius:8px;background:var(--bg3)"></div>
        <div id="rq-supplier-items-foot" style="display:none;margin-top:8px;padding:8px 10px;background:rgba(0,217,126,.08);border:1px solid rgba(0,217,126,.25);border-radius:8px;font-size:var(--fs-base);display:flex;justify-content:space-between;align-items:center">
          <span><span id="rq-si-count">0</span> بند محدد</span>
          <span style="font-weight:var(--fw-heavy);color:var(--g)">المجموع: <span id="rq-si-total">0</span> ج</span>
        </div>
      </div>

      <div class="fg"><label>المبلغ المطلوب (ج) *</label><input class="inp" id="rq-amount" type="number" placeholder="0"></div>

      <div class="fg"><label>السبب / الملاحظة *</label><textarea class="inp" id="rq-reason" style="min-height:60px" placeholder="مثال: دفعة مقدم لطباعة 200 كارت"></textarea></div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-ghost" onclick="cM('new-req')">إلغاء</button>
      <button type="button" class="btn btn-g" onclick="saveRequest()">💾 إرسال الطلب</button>
    </div>
  </div>
</div>

<!-- Modal: رفع إيصال -->
<div class="overlay" id="ov-receipt">
  <div class="modal" style="max-width:440px">
    <div class="modal-head"><span class="modal-title">📥 تأكيد الاستلام</span><button type="button" class="modal-x" onclick="cM('receipt')">✕</button></div>
    <div class="modal-body">
      <div style="font-size:var(--fs-base);color:var(--dim);margin-bottom:10px">ارفع صورة الإيصال لتأكيد استلام التحويل من المحاسب:</div>
      <input type="file" id="receipt-file" accept="image/*" style="width:100%;padding:10px;background:var(--bg3);border:2px dashed var(--line);border-radius:8px;color:var(--snow);font-family:inherit">
      <div id="receipt-preview" style="margin-top:10px;text-align:center"></div>
      <div id="receipt-progress" style="display:none;margin-top:10px;font-size:var(--fs-sm);color:var(--dim2)"></div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-ghost" onclick="cM('receipt')">إلغاء</button>
      <button type="button" class="btn btn-g" onclick="uploadReceipt()" id="receipt-save-btn">📤 رفع وتأكيد</button>
    </div>
  </div>
</div>

<div id="toast" style="position:fixed;bottom:30px;right:50%;transform:translateX(50%);padding:12px 22px;border-radius:var(--rad);background:var(--bg2);border:1px solid var(--line);color:var(--snow);font-size:var(--fs-md);font-weight:var(--fw-bold);z-index:9999;display:none;font-family:inherit"></div>

<script type="module">
import { app, auth, db, storage } from "./core/firebase-init.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, doc, getDoc, onSnapshot, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { approvalActions } from "./approval-actions.js";
import { ref as sRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
import { STAGE_AR, ROLE_LABELS } from "./core/shared-constants.js";
let currentUid='', currentUserName='', currentRole='', currentPerms={};
let requests = [];
let activeTab = 'suppliers_due';
let suppliers = [];
let ordersMap = new Map();
let receivingReq = null;
let __receiptFile = null;
let __supItemsSelected = [];

const fn = n => (parseFloat(n)||0).toLocaleString('ar-EG');
const escapeHtml = s => String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const STATUS_LBL = {
  requested:'💸 قيد التنفيذ',
  awaiting_receipt:'📥 بانتظار رفعك للإيصال',
  pending:'⏳ بانتظار تأكيد المدير',
  confirmed:'🔵 بانتظار اعتماد الأدمن',
  approved:'✅ معتمد ومُسجَّل',
  rejected:'❌ مرفوض',
};
function buildSidebar(){
  B2CSidebar.build({ role: currentRole, permissions: currentPerms || {} }, 'supplier-requests.html');
  document.getElementById('nav-role').textContent = ROLE_LABELS[currentRole] || currentRole;
  document.getElementById('nav-name').textContent = currentUserName;
}

document.getElementById('menu-btn')?.addEventListener('click', ()=>{
  document.getElementById('sidebar')?.classList.toggle('open');
});

window.logoutBtn = async function(){
  try{ await signOut(auth); }catch(e){}
  window.location.href = 'login.html';
};

window.cM = function(id){ document.getElementById('ov-'+id)?.classList.remove('open'); };
window.oM = function(id){ document.getElementById('ov-'+id)?.classList.add('open'); };

function showToast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = type === 'err' ? 'rgba(255,61,110,.4)' : type === 'ok' ? 'rgba(0,217,126,.4)' : 'var(--line)';
  t.style.display = 'block';
  setTimeout(()=>{ t.style.display = 'none'; }, 3500);
}

onAuthStateChanged(auth, async u=>{
  if(!u){ window.location.href='login.html'; return; }
  currentUid = u.uid;
  try{
    const userSnap = await getDoc(doc(db,'users',u.uid));
    if(!userSnap.exists()){
      document.body.innerHTML = '<div style="padding:40px;text-align:center;color:var(--r)">⛔ بيانات المستخدم غير موجودة</div>';
      return;
    }
    const ud = userSnap.data();
    currentRole = ud.role || '';
    currentUserName = ud.name || u.email || '';
    currentPerms = ud.permissions || {};
    buildSidebar();
    startListeners();
  }catch(e){
    document.body.innerHTML = `<div style="padding:40px;text-align:center;color:var(--r)">⛔ ${e.message}</div>`;
  }
});

function startListeners(){
  // كل الطلبات في طلبات الموردين تبع المستخدم (production_agent بيشوف بس طلباته)
  // admin/ops يقدروا يشوفوا الكل عبر approvals.html — هذي الصفحة مخصصة للمندوب
  onSnapshot(query(collection(db,'payment_requests'),
    where('requestedBy','==',currentUid),
    where('type','==','supplier_payment'),
    limit(500)),
    snap=>{
      requests = snap.docs.map(d=>({...d.data(),_id:d.id}));
      requests.sort((a,b)=>(b.requestedAt?.toMillis?.()||0) - (a.requestedAt?.toMillis?.()||0));
      render();
    },
    err=>{
      console.error('[supplier-requests] requests:', err);
      document.getElementById('list-content').innerHTML = `<div class="empty-pl">⚠️ فشل تحميل الطلبات: ${escapeHtml(err.message)}</div>`;
    }
  );

  onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc'),limit(3000)),
    snap=>{ ordersMap.clear(); snap.docs.forEach(d=>ordersMap.set(d.id, {...d.data(), _id:d.id})); render(); },
    err=>console.error('[supplier-requests] orders:', err)
  );
  onSnapshot(query(collection(db,'suppliers_v2'),limit(500)),
    snap=>{ suppliers = snap.docs.map(d=>({...d.data(),_id:d.id})); render(); },
    err=>console.error('[supplier-requests] suppliers:', err)
  );
}

window.setTab = function(tab){
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b.id === 'tab-'+tab));
  render();
};

function render(){
  // counts
  const counts = { active:0, awaiting_receipt:0, approved:0, rejected:0 };
  for(const r of requests){
    if(['requested','awaiting_receipt','pending','confirmed'].includes(r.status)) counts.active++;
    if(r.status === 'awaiting_receipt') counts.awaiting_receipt++;
    if(r.status === 'approved') counts.approved++;
    if(r.status === 'rejected') counts.rejected++;
  }
  Object.keys(counts).forEach(k => {
    const el = document.getElementById('cnt-'+k);
    if(el) el.textContent = counts[k];
  });

  const el = document.getElementById('list-content');
  if(activeTab === 'suppliers_due'){
    el.innerHTML = renderSuppliersDue();
    return;
  }

  let list;
  if(activeTab === 'active'){
    list = requests.filter(r => ['requested','awaiting_receipt','pending','confirmed'].includes(r.status));
  } else {
    list = requests.filter(r => r.status === activeTab);
  }
  if(!list.length){
    const msg = activeTab === 'awaiting_receipt' ? '✨ لا توجد طلبات بانتظار رفع إيصال'
              : activeTab === 'approved' ? '📁 لا توجد طلبات معتمدة بعد'
              : activeTab === 'rejected' ? '✨ لا توجد طلبات مرفوضة'
              : '📭 لا توجد طلبات في هذا القسم';
    el.innerHTML = `<div class="empty-pl">${msg}</div>`;
    return;
  }
  el.innerHTML = list.map(r => renderCard(r)).join('');
}

// ═══════════════════ Suppliers Due ═══════════════════
function computeSupplierDues(){
  const map = new Map();
  for(const o of ordersMap.values()){
    if(['archived','cancelled'].includes(o.stage)) continue;
    (o.costItems||[]).forEach((c, idx)=>{
      if(c.paid || !c.supplierId) return;
      const amt = parseFloat(c.total)||0;
      if(amt <= 0) return;
      if(!map.has(c.supplierId)){
        map.set(c.supplierId, { id: c.supplierId, name: c.supplierName || '—', type: c.supplierType || '', totalUnpaid: 0, totalPending: 0, items: [] });
      }
      const row = map.get(c.supplierId);
      if(c.pendingPaymentRequestId) row.totalPending += amt; else row.totalUnpaid += amt;
      row.items.push({
        orderId: o._id, orderRefId: o.orderId || o._id.slice(-6),
        clientName: o.clientName || '—', clientId: o.clientId || '',
        costItemIndex: idx, type: c.type || '', amount: amt, note: c.note || '',
        pendingReqId: c.pendingPaymentRequestId || null,
        pendingRequestedBy: c.pendingRequestedBy || '',
        stage: o.stage || '',
      });
    });
  }
  return [...map.values()].sort((a,b)=>(b.totalUnpaid+b.totalPending) - (a.totalUnpaid+a.totalPending));
}

function renderSuppliersDue(){
  const rows = computeSupplierDues();
  document.getElementById('cnt-suppliers_due').textContent = rows.filter(r=>r.totalUnpaid>0).length;
  if(!rows.length){
    return `<div class="empty-pl">✨ لا توجد مديونيات للموردين — كل البنود مدفوعة</div>`;
  }
  const grandUnpaid = rows.reduce((s,r)=>s+r.totalUnpaid, 0);
  const grandPending = rows.reduce((s,r)=>s+r.totalPending, 0);
  const head = `
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <div style="flex:1;min-width:140px;background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.3);border-radius:var(--rad);padding:10px 14px">
        <div style="font-size:var(--fs-xs);color:var(--dim2);font-weight:var(--fw-bold)">💰 إجمالي المستحق (غير مطلوب)</div>
        <div style="font-size:20px;font-weight:var(--fw-heavy);color:var(--y)">${fn(grandUnpaid)} ج</div>
      </div>
      <div style="flex:1;min-width:140px;background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.3);border-radius:var(--rad);padding:10px 14px">
        <div style="font-size:var(--fs-xs);color:var(--dim2);font-weight:var(--fw-bold)">⏳ تحت طلب قائم</div>
        <div style="font-size:20px;font-weight:var(--fw-heavy);color:var(--p)">${fn(grandPending)} ج</div>
      </div>
    </div>`;
  const body = rows.map(r=>{
    const unpaid = r.items.filter(i=>!i.pendingReqId);
    const pending = r.items.filter(i=>i.pendingReqId);
    const canReq = unpaid.length > 0;
    return `
      <div class="approval-card" style="padding:12px 14px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap">
          <div style="flex:1;min-width:160px">
            <div style="font-weight:var(--fw-heavy);font-size:var(--fs-lg);color:var(--snow)">🏭 ${escapeHtml(r.name)}</div>
            <div style="font-size:var(--fs-xs);color:var(--dim2);margin-top:2px">${r.items.length} بند — ${unpaid.length} غير مطلوب · ${pending.length} تحت طلب</div>
          </div>
          <div style="text-align:left">
            <div class="txt-meta-sm">المستحق</div>
            <div style="font-size:var(--fs-2xl);font-weight:var(--fw-heavy);color:var(--y)">${fn(r.totalUnpaid)} ج</div>
            ${r.totalPending > 0 ? `<div style="font-size:var(--fs-xs);color:var(--p)">+ ${fn(r.totalPending)} ج تحت طلب</div>` : ''}
          </div>
          ${canReq ? `<button type="button" onclick="requestForSupplier('${r.id}')" style="padding:8px 14px;border-radius:8px;border:1px solid rgba(0,217,126,.4);background:rgba(0,217,126,.12);color:var(--g);cursor:pointer;font-family:inherit;font-size:var(--fs-base);font-weight:var(--fw-extra)">💸 طلب دفع</button>` : ''}
        </div>
        <details style="margin-top:10px">
          <summary style="cursor:pointer;font-size:var(--fs-sm);color:var(--dim2);font-weight:var(--fw-bold)">تفاصيل البنود (${r.items.length})</summary>
          <div style="margin-top:8px;font-size:var(--fs-sm);line-height:var(--lh-relaxed)">
            ${r.items.map(i=>`
              <div style="display:flex;justify-content:space-between;gap:var(--space-sm);padding:6px 8px;border-bottom:1px dashed var(--line)">
                <div style="flex:1;min-width:0">
                  <b style="color:var(--snow)">${escapeHtml(i.type||'بند')}</b>
                  <span class="txt-meta-xs">— ${escapeHtml(i.orderRefId)} — ${escapeHtml(i.clientName)}</span>
                  ${i.note ? `<div class="txt-meta-xs">${escapeHtml(i.note)}</div>` : ''}
                </div>
                <div style="text-align:left">
                  <span style="font-weight:var(--fw-extra);color:${i.pendingReqId?'var(--p)':'var(--y)'}">${fn(i.amount)} ج</span>
                  ${i.pendingReqId ? `<div style="font-size:var(--fs-tiny);color:var(--p)">⏳ تحت طلب</div>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        </details>
      </div>`;
  }).join('');
  return head + body;
}

function renderCard(r){
  const reqDate = r.requestedAt?.toDate?.()?.toLocaleString('ar-EG') || '—';
  const statusKey = r.status || 'requested';

  const tl = [];
  tl.push(`<div class="tl-step">💸 طلبت — <b>${escapeHtml(reqDate)}</b></div>`);
  if(r.executedAt){
    const d = r.executedAt?.toDate?.()?.toLocaleString('ar-EG') || '';
    tl.push(`<div class="tl-step">✅ نُفِّذ بواسطة <b>${escapeHtml(r.executedByName||'—')}</b> — ${escapeHtml(d)}</div>`);
  }
  if(r.receivedAt){
    const d = r.receivedAt?.toDate?.()?.toLocaleString('ar-EG') || '';
    tl.push(`<div class="tl-step">📥 استلمت ورفعت إيصال — ${escapeHtml(d)}</div>`);
  }
  if(r.confirmedAt){
    const d = r.confirmedAt?.toDate?.()?.toLocaleString('ar-EG') || '';
    tl.push(`<div class="tl-step">🔵 أكّد <b>${escapeHtml(r.confirmedByName||'مدير التشغيل')}</b> — ${escapeHtml(d)}</div>`);
  }
  if(r.approvedAt){
    const d = r.approvedAt?.toDate?.()?.toLocaleString('ar-EG') || '';
    tl.push(`<div class="tl-step">✅ اعتمد <b>${escapeHtml(r.approvedByName||'الأدمن')}</b> — ${escapeHtml(d)}</div>`);
  }
  if(r.rejectedAt){
    const d = r.rejectedAt?.toDate?.()?.toLocaleString('ar-EG') || '';
    tl.push(`<div class="tl-step" style="color:var(--r)">❌ رُفِض بواسطة <b>${escapeHtml(r.rejectedByName||'—')}</b> — ${escapeHtml(d)}<br><span style="font-size:var(--fs-xs)">السبب: ${escapeHtml(r.rejectReason||'—')}</span></div>`);
  }

  const actions = [];
  if(r.status === 'requested') actions.push(`<button type="button" class="btn-cancel" onclick="cancelMyRequest('${r._id}')">❌ إلغاء الطلب</button>`);
  // الإيصال يرفعه مدير التشغيل (وليس المندوب) في تدفّق الموردين الجديد

  let receiptHtml = '';
  if(r.receiptImageUrl){
    receiptHtml = `<div style="margin-top:10px"><img class="receipt-img" src="${r.receiptImageUrl}" onclick="window.open('${r.receiptImageUrl}','_blank')" alt="إيصال" loading="lazy"></div>`;
  }

  const multiItem = r.costItemRefs && r.costItemRefs.length > 1;
  const itemsInfo = multiItem
    ? `<div class="rc-body"><div class="rc-field" style="grid-column:1/-1">📋 طلب مُجمَّع<b>${r.costItemRefs.length} بند من ${new Set(r.costItemRefs.map(x=>x.orderId)).size} أوردر</b><div style="margin-top:6px;font-size:var(--fs-xs);color:var(--dim2);line-height:var(--lh-relaxed)">${r.costItemRefs.map(x=>`• ${escapeHtml(x.type||'بند')} — ${escapeHtml(x.orderRefId||'')} — ${escapeHtml(x.clientName||'')} — ${fn(x.amount)} ج`).join('<br>')}</div></div></div>`
    : (r.orderId ? `<div class="rc-body"><div class="rc-field">📦 الأوردر<b>${escapeHtml(r.orderRefId||r.orderId.slice(-6))} — ${escapeHtml(r.clientName||'—')}</b></div>${r.orderStage ? `<div class="rc-field">المرحلة<b>${escapeHtml(STAGE_AR[r.orderStage]||r.orderStage)}</b></div>` : ''}${r.costItemIndex !== undefined ? `<div class="rc-field">بند<b>#${r.costItemIndex+1}</b></div>` : ''}</div>` : '');

  return `<div class="req-card">
    <div class="rc-head">
      <div style="flex:1;min-width:0">
        <div class="rc-title">🏭 ${escapeHtml(r.supplierName||'مورد')}</div>
        <div class="rc-meta">${escapeHtml(r.reason||'—')}</div>
        <span class="rc-status st-${statusKey}">${STATUS_LBL[statusKey]||statusKey}</span>
      </div>
      <div class="rc-amount">${fn(r.amount)} ج</div>
    </div>
    ${itemsInfo}
    <div class="rc-timeline">${tl.join('')}</div>
    ${receiptHtml}
    ${actions.length ? `<div class="rc-actions">${actions.join('')}</div>` : ''}
  </div>`;
}

// ══════════════ Modal: طلب جديد ══════════════
window.openNewRequest = function(){
  const supSel = document.getElementById('rq-supplier');
  supSel.innerHTML = '<option value="">— اختر المورد —</option>' + suppliers.map(s=>`<option value="${s._id}" data-name="${escapeHtml(s.name||'')}" data-type="${s.supType||'printer'}">${escapeHtml(s.name||'')}</option>`).join('');
  document.getElementById('rq-amount').value = '';
  document.getElementById('rq-reason').value = '';
  __supItemsSelected = [];
  refreshSupplierItemsList();
  oM('new-req');
};

window.requestForSupplier = function(supId){
  openNewRequest();
  const supSel = document.getElementById('rq-supplier');
  if(supSel) supSel.value = supId;
  refreshSupplierItemsList();
};

document.getElementById('rq-supplier')?.addEventListener('change', ()=>{
  refreshSupplierItemsList();
});

window.refreshSupplierItemsList = function(){
  const supId = document.getElementById('rq-supplier').value;
  const fg = document.getElementById('fg-supplier-items');
  const listEl = document.getElementById('rq-supplier-items-list');
  const foot = document.getElementById('rq-supplier-items-foot');
  __supItemsSelected = [];
  updateSupItemsSum();
  if(!supId){ fg.style.display = 'none'; return; }
  const supName = document.getElementById('rq-supplier').selectedOptions[0]?.dataset?.name || '';
  const items = [];
  for(const o of ordersMap.values()){
    if(['archived','cancelled'].includes(o.stage)) continue;
    (o.costItems||[]).forEach((c, idx)=>{
      if(c.paid || c.pendingPaymentRequestId) return;
      if(c.supplierId !== supId) return;
      const amt = parseFloat(c.total)||0;
      if(amt <= 0) return;
      items.push({
        orderId: o._id, orderRefId: o.orderId || o._id.slice(-6),
        clientId: o.clientId || '', clientName: o.clientName || '—',
        costItemIndex: idx, type: c.type || '', amount: amt, note: c.note || '',
        supplierName: c.supplierName || supName, stage: o.stage || '',
      });
    });
  }
  fg.style.display = '';
  if(!items.length){
    listEl.innerHTML = `<div style="padding:14px;text-align:center;color:var(--dim2);font-size:var(--fs-base)">✨ لا توجد بنود مستحقة لهذا المورد — تقدر تطلب يدوياً بإدخال المبلغ مباشرة</div>`;
    foot.style.display = 'none';
    return;
  }
  listEl.innerHTML = items.map((i, k)=>`
    <label style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--line);cursor:pointer">
      <input type="checkbox" data-k="${k}" onchange="toggleSupItem(${k})" style="width:16px;height:16px;cursor:pointer">
      <div style="flex:1;min-width:0;font-size:var(--fs-sm)">
        <div><b style="color:var(--snow)">${escapeHtml(i.type||'بند')}</b> <span style="color:var(--dim2)">— ${escapeHtml(i.orderRefId)} — ${escapeHtml(i.clientName)}</span></div>
        ${i.note ? `<div style="color:var(--dim2);font-size:var(--fs-xs);margin-top:2px">${escapeHtml(i.note)}</div>` : ''}
      </div>
      <span style="font-weight:var(--fw-extra);color:var(--y);font-size:var(--fs-base)">${fn(i.amount)} ج</span>
    </label>
  `).join('');
  listEl.__items = items;
  foot.style.display = 'none';
};

window.toggleSupItem = function(k){
  const listEl = document.getElementById('rq-supplier-items-list');
  const items = listEl.__items || [];
  const cb = listEl.querySelector(`input[data-k="${k}"]`);
  if(!cb) return;
  const item = items[k];
  if(cb.checked){
    if(!__supItemsSelected.find(x=>x.orderId===item.orderId && x.costItemIndex===item.costItemIndex)){
      __supItemsSelected.push(item);
    }
  } else {
    __supItemsSelected = __supItemsSelected.filter(x=>!(x.orderId===item.orderId && x.costItemIndex===item.costItemIndex));
  }
  updateSupItemsSum();
};

function updateSupItemsSum(){
  const sum = __supItemsSelected.reduce((s,x)=>s+x.amount, 0);
  const foot = document.getElementById('rq-supplier-items-foot');
  if(foot){
    foot.style.display = __supItemsSelected.length ? 'flex' : 'none';
    const cEl = document.getElementById('rq-si-count'); if(cEl) cEl.textContent = __supItemsSelected.length;
    const tEl = document.getElementById('rq-si-total'); if(tEl) tEl.textContent = fn(sum);
  }
  if(__supItemsSelected.length){
    const amtEl = document.getElementById('rq-amount');
    if(amtEl) amtEl.value = sum;
  }
}

window.saveRequest = async function(){
  const supId = document.getElementById('rq-supplier').value;
  const supOpt = document.getElementById('rq-supplier').selectedOptions[0];
  const amount = parseFloat(document.getElementById('rq-amount').value) || 0;
  const reason = document.getElementById('rq-reason').value.trim();
  if(!supId) return showToast('⚠️ اختر المورد','err');
  if(!(amount > 0)) return showToast('⚠️ أدخل المبلغ','err');
  if(!reason) return showToast('⚠️ أدخل السبب','err');

  const reqData = {
    type: 'supplier_payment',
    status: 'requested',
    amount, reason,
    supplierId: supId,
    supplierName: supOpt?.dataset?.name || '',
    supplierType: supOpt?.dataset?.type || 'printer',
    requestedBy: currentUid,
    requestedByName: currentUserName,
    requesterRole: currentRole,
    requestedAt: serverTimestamp(),
    source: 'supplier_requests_page',
  };

  // multi-item: لو فيه بنود مختارة من القائمة
  if(__supItemsSelected.length > 0){
    const refs = __supItemsSelected.map(x=>({
      orderId: x.orderId, orderRefId: x.orderRefId,
      costItemIndex: x.costItemIndex, amount: x.amount,
      type: x.type, supplierName: x.supplierName,
      clientId: x.clientId, clientName: x.clientName, stage: x.stage,
    }));
    const sumRefs = refs.reduce((s,r)=>s+r.amount, 0);
    if(Math.abs(sumRefs - amount) > 0.01){
      return showToast(`⚠️ المبلغ (${fn(amount)}) لا يطابق مجموع البنود (${fn(sumRefs)})`,'err');
    }
    reqData.costItemRefs = refs;
    const first = refs[0];
    reqData.orderId = first.orderId;
    reqData.orderRefId = first.orderRefId;
    reqData.costItemIndex = first.costItemIndex;
    reqData.clientId = first.clientId || '';
    reqData.clientName = first.clientName || '';
    reqData.orderStage = first.stage || '';
  }

  const r = await approvalActions.createPaymentRequest({db,requestData:reqData,userId:currentUid,userName:currentUserName});
  if(!r.ok){
    const handled = window.financialGuard?.({message:(r.errors||[])[0]||'فشل'},{operation:'إنشاء طلب', amount});
    if(!handled) showToast('❌ '+((r.errors||[]).join(' · ')||'فشل'),'err');
    return;
  }
  showToast('✅ تم إرسال الطلب — بانتظار التنفيذ من المحاسب','ok');
  __supItemsSelected = [];
  cM('new-req');
  setTab('active');
};

// ══════════════ إلغاء طلب ══════════════
window.cancelMyRequest = async function(reqId){
  const r = requests.find(x=>x._id===reqId);
  if(!r) return;
  if(r.status !== 'requested'){
    showToast('⛔ لا يمكن إلغاء طلب بدأ تنفيذه — تواصل مع الإدارة','err');
    return;
  }
  const reason = prompt('سبب الإلغاء (إجباري):');
  if(!reason || !reason.trim()) return;
  const result = await approvalActions.rejectPaymentRequest({db,request:r,reason:'إلغاء من الطالب: '+reason.trim(),userId:currentUid,userName:currentUserName});
  if(!result.ok){
    const handled = window.financialGuard?.({message:(result.errors||[])[0]||'فشل'},{operation:'إلغاء طلب'});
    if(!handled) showToast('❌ '+((result.errors||[]).join(' · ')||'فشل'),'err');
    return;
  }
  showToast('✅ تم إلغاء الطلب','ok');
};

// ══════════════ Modal: رفع إيصال ══════════════
window.openReceiptModal = function(reqId){
  receivingReq = requests.find(r=>r._id===reqId);
  if(!receivingReq) return;
  __receiptFile = null;
  document.getElementById('receipt-file').value = '';
  document.getElementById('receipt-preview').innerHTML = '';
  document.getElementById('receipt-progress').style.display = 'none';
  oM('receipt');
};

document.getElementById('receipt-file')?.addEventListener('change', e=>{
  const f = e.target.files[0];
  if(!f) return;
  __receiptFile = f;
  const url = URL.createObjectURL(f);
  document.getElementById('receipt-preview').innerHTML = `<img src="${url}" style="max-width:100%;max-height:200px;border-radius:8px;border:1px solid var(--line)" alt="" loading="lazy">`;
});

window.uploadReceipt = async function(){
  if(!receivingReq) return;
  if(!__receiptFile) return showToast('⚠️ اختر صورة الإيصال','err');
  const btn = document.getElementById('receipt-save-btn');
  btn.disabled = true;
  btn.textContent = 'جاري الرفع...';
  const prog = document.getElementById('receipt-progress');
  prog.style.display = 'block';
  prog.textContent = 'جاري الرفع... 0%';
  try{
    const path = `receipts/${receivingReq._id}_${Date.now()}_${__receiptFile.name}`;
    const ref = sRef(storage, path);
    const task = uploadBytesResumable(ref, __receiptFile);
    await new Promise((res, rej)=>{
      task.on('state_changed',
        s=>{ const p = Math.round(s.bytesTransferred/s.totalBytes*100); prog.textContent = `جاري الرفع... ${p}%`; },
        rej,
        async ()=>{
          try{
            const url = await getDownloadURL(task.snapshot.ref);
            const result = await approvalActions.attachReceiptToRequest({db,requestId:receivingReq._id,txId:receivingReq.txId||'',receiptUrl:url,receiptPath:path,userId:currentUid,userName:currentUserName});
            if(!result.ok) throw new Error((result.errors||[])[0]||'فشل الإرفاق');
            res();
          }catch(err){ rej(err); }
        }
      );
    });
    showToast('✅ تم رفع الإيصال — بانتظار التأكيد','ok');
    cM('receipt');
    receivingReq = null;
    __receiptFile = null;
  }catch(e){
    const handled = window.financialGuard?.(e,{operation:'رفع إيصال'});
    if(!handled) showToast('❌ '+e.message,'err');
  }finally{
    btn.disabled = false;
    btn.textContent = '📤 رفع وتأكيد';
  }
};
</script>
