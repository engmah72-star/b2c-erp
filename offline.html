<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0d1a">
<title>غير متصل — Business2Card ERP</title>
<link rel="stylesheet" href="shared.css?v=31">
<link rel="stylesheet" href="design-system/components.css?v=1">
<style>
  html,body{height:100%}
  body{
    margin:0;display:flex;align-items:center;justify-content:center;
    background:var(--bg);color:var(--ink);padding:var(--space-2xl);
    font-family:'Cairo','Segoe UI',system-ui,sans-serif;
  }
  .off-card{
    max-width:420px;width:100%;text-align:center;
    background:var(--bg2);border:1px solid var(--line);border-radius:18px;
    padding:32px 24px;box-shadow:0 12px 40px rgba(0,0,0,.35);
  }
  .off-ico{font-size:56px;margin-bottom:12px;line-height:1}
  .off-title{font-size:20px;font-weight:var(--fw-heavy);margin:0 0 8px}
  .off-msg{color:var(--dim2);font-size:var(--fs-md);line-height:var(--lh-relaxed);margin:0 0 20px}
  .off-btn{
    display:inline-flex;align-items:center;gap:var(--space-sm);
    background:var(--p);color:#fff;border:none;border-radius:12px;
    padding:12px 22px;font-weight:var(--fw-extra);font-size:var(--fs-lg);cursor:pointer;
    text-decoration:none;min-height:44px;
  }
  .off-btn:hover{filter:brightness(1.1)}
  .off-hint{font-size:var(--fs-sm);color:var(--dim);margin-top:14px}
</style>
<script src="theme.js?v=4"></script>
</head>
<body>
  <div class="off-card">
    <div class="off-ico">📡</div>
    <h1 class="off-title">لا يوجد اتصال بالإنترنت</h1>
    <p class="off-msg">
      نحتاج إلى اتصال نشط لتحميل هذه الصفحة لأول مرة.
      الصفحات التي زرتها من قبل ستظل تعمل دون اتصال.
    </p>
    <button type="button" class="off-btn" onclick="location.reload()">🔄 إعادة المحاولة</button>
    <div class="off-hint">سيتم إعادة الاتصال تلقائيًا عند عودة الشبكة</div>
  </div>
  <script>
    // Auto-retry the navigation as soon as the device reports it's back online.
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
