<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<style>
  /* Order page-specific styles */
  .order-hero{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow-card);}
  .order-hero h1{font-size:22px;font-weight:900;margin-bottom:4px;}
  .order-hero .order-id{font-size:13px;color:var(--dim2);direction:ltr;text-align:right;font-family:'Courier New',monospace;}
  .order-hero .order-meta{margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;}
  .order-stage-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:99px;font-size:12px;font-weight:800;}
  .order-stage-badge.design{background:rgba(139,92,246,.12);color:var(--p);border:1px solid rgba(139,92,246,.3);}
  .order-stage-badge.printing{background:rgba(6,182,212,.12);color:var(--c);border:1px solid rgba(6,182,212,.3);}
  .order-stage-badge.production{background:rgba(244,112,72,.12);color:var(--o);border:1px solid rgba(244,112,72,.3);}
  .order-stage-badge.shipping{background:rgba(74,142,245,.12);color:var(--b);border:1px solid rgba(74,142,245,.3);}
  .order-stage-badge.archived{background:rgba(100,114,152,.12);color:var(--dim2);border:1px solid rgba(100,114,152,.3);}
  .order-stage-badge.cancelled{background:rgba(255,61,110,.12);color:var(--r);border:1px solid rgba(255,61,110,.3);}
  .order-cancelled-banner,.order-rejected-banner{border-radius:var(--rad2);padding:14px 18px;margin-bottom:16px;display:flex;flex-direction:column;gap:6px;}
  .order-cancelled-banner{background:rgba(255,61,110,.08);border:1px solid rgba(255,61,110,.25);}
  .order-rejected-banner{background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.25);}
  .order-cancelled-banner .cb-title{font-size:14px;font-weight:800;color:var(--r);display:flex;align-items:center;gap:6px;}
  .order-rejected-banner .cb-title{font-size:14px;font-weight:800;color:var(--y);display:flex;align-items:center;gap:6px;}
  .order-cancelled-banner .cb-reason,.order-rejected-banner .cb-reason{font-size:13px;color:var(--snow);font-weight:600;}
  .order-cancelled-banner .cb-meta,.order-rejected-banner .cb-meta{font-size:11px;color:var(--dim2);}
  .order-stage-badge.design-rejected{background:rgba(255,61,110,.12);color:var(--r);border:1px solid rgba(255,61,110,.3);}
  .order-actions-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .order-actions-row .btn{flex:1;min-width:130px;padding:11px 14px;border-radius:var(--rad);border:1px solid var(--line);background:var(--bg2);color:var(--snow);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;text-align:center;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:var(--trans);touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
  .order-actions-row .btn:hover{background:var(--bg3);border-color:var(--line2);}
  .order-actions-row .btn-primary{background:var(--b);color:#fff;border-color:var(--b);}
  .order-actions-row .btn-y{background:rgba(255,170,0,.12);color:var(--y);border-color:rgba(255,170,0,.3);}
  .order-actions-row .btn-g{background:rgba(0,217,126,.12);color:var(--g);border-color:rgba(0,217,126,.3);}
  .order-section{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow-card);}
  .order-section-head{padding:14px 18px;border-bottom:1px solid var(--line);font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .order-section-body{padding:14px 18px;}
  .order-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--row-line);font-size:13px;gap:8px;}
  .order-row:last-child{border-bottom:none;}
  .order-row span:first-child{color:var(--dim2);}
  .order-row b{font-weight:700;color:var(--snow);}
  .order-row b.g{color:var(--g);}
  .order-row b.r{color:var(--r);}
  .order-row b.y{color:var(--y);}
  /* Products */
  .order-product{padding:12px;background:var(--bg3);border:1px solid var(--line);border-radius:var(--rad);margin-bottom:10px;}
  .order-product:last-child{margin-bottom:0;}
  .order-product-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
  .order-product-name{font-size:14px;font-weight:700;color:var(--snow);}
  .order-product-meta{font-size:12px;color:var(--dim2);margin-top:2px;}
  .order-product-status{font-size:11px;font-weight:800;padding:3px 8px;border-radius:99px;flex-shrink:0;}
  .order-product-status.pending{background:rgba(255,170,0,.12);color:var(--y);}
  .order-product-status.wip{background:rgba(74,142,245,.12);color:var(--b);}
  .order-product-status.done{background:rgba(0,217,126,.12);color:var(--g);}
  .order-product-status.problem{background:rgba(255,61,110,.12);color:var(--r);}
  /* Design images */
  .order-design-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
  .order-design-img{width:100%;aspect-ratio:1;background:var(--bg3);border:1px solid var(--line);border-radius:var(--rad);overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .order-design-img img{width:100%;height:100%;object-fit:cover;}
  .order-design-img a{color:var(--b);text-decoration:none;font-size:13px;font-weight:700;padding:8px;}
  /* Product cards (image-first per-product layout) */
  .prod-card{background:var(--bg3);border:1px solid var(--line);border-radius:var(--rad2);overflow:hidden;margin-bottom:14px;}
  .prod-card:last-child{margin-bottom:0;}
  .prod-card-img{width:100%;background:var(--bg1);position:relative;display:flex;align-items:center;justify-content:center;min-height:120px;max-height:260px;overflow:hidden;}
  .prod-card-img img{width:100%;max-height:260px;object-fit:contain;display:block;cursor:zoom-in;}
  .prod-card-img-empty{padding:34px 14px;color:var(--dim2);font-size:13px;}
  .prod-card-img-multi{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:4px;width:100%;}
  .prod-card-img-multi img{aspect-ratio:1;width:100%;height:100%;object-fit:cover;cursor:zoom-in;}
  .prod-card-body{padding:12px 14px;}
  .prod-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
  .prod-card-name{font-size:15px;font-weight:800;color:var(--snow);}
  .prod-card-meta{font-size:12px;color:var(--dim2);margin-top:3px;}
  .prod-card-status{font-size:11px;font-weight:800;padding:3px 8px;border-radius:99px;flex-shrink:0;}
  .prod-card-status.pending{background:rgba(255,170,0,.12);color:var(--y);}
  .prod-card-status.in_progress{background:rgba(74,142,245,.12);color:var(--b);}
  .prod-card-status.ready{background:rgba(0,217,126,.12);color:var(--g);}
  .prod-card-status.printed{background:rgba(139,92,246,.12);color:var(--p);}
  .prod-card-status.done{background:rgba(0,217,126,.12);color:var(--g);}
  .prod-card-status.received{background:rgba(74,142,245,.12);color:var(--b);}
  .prod-card-status.wip{background:rgba(74,142,245,.12);color:var(--b);}
  .prod-card-status.problem{background:rgba(255,61,110,.12);color:var(--r);}
  .prod-card-status.on_hold{background:rgba(255,170,0,.12);color:var(--y);}
  /* Cost section inside product card */
  .prod-costs{border-top:1px dashed var(--line);margin-top:10px;padding-top:10px;}
  .prod-costs-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12px;font-weight:800;color:var(--snow);}
  .prod-costs-head .total{color:var(--r);font-weight:900;}
  .prod-cost-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 10px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad);margin-bottom:5px;font-size:12px;}
  .prod-cost-item:last-child{margin-bottom:0;}
  .prod-cost-item .ci-left{flex:1;min-width:0;}
  .prod-cost-item .ci-type{font-weight:700;color:var(--snow);}
  .prod-cost-item .ci-meta{font-size:11px;color:var(--dim2);margin-top:2px;}
  .prod-cost-item .ci-total{font-weight:800;color:var(--r);white-space:nowrap;}
  .prod-cost-empty{padding:10px;text-align:center;color:var(--dim2);font-size:12px;background:var(--bg2);border:1px dashed var(--line);border-radius:var(--rad);margin-bottom:8px;}
  .prod-add-cost-btn{width:100%;padding:10px 12px;border-radius:var(--rad);border:1px dashed rgba(0,217,126,.4);background:rgba(0,217,126,.06);color:var(--g);font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:var(--trans);}
  .prod-add-cost-btn:hover{background:rgba(0,217,126,.12);}
  /* Cost modal */
  .cm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:none;align-items:center;justify-content:center;padding:14px;}
  .cm-overlay.open{display:flex;}
  .cm-card{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--rad2);max-width:480px;width:100%;max-height:92vh;overflow-y:auto;padding:0;}
  .cm-head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg2);z-index:5;}
  .cm-head h3{font-size:15px;font-weight:800;margin:0;}
  .cm-head .cm-sub{font-size:12px;color:var(--dim2);margin-top:2px;font-weight:600;}
  .cm-close{background:none;border:0;color:var(--snow);font-size:22px;cursor:pointer;padding:4px 8px;font-family:inherit;}
  .cm-body{padding:14px 16px;}
  .cm-field{margin-bottom:12px;}
  .cm-field label{display:block;font-size:12px;font-weight:700;color:var(--dim2);margin-bottom:5px;}
  .cm-field input,.cm-field select,.cm-field textarea{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--line);border-radius:var(--rad);color:var(--snow);font-size:14px;font-family:inherit;}
  .cm-field input:focus,.cm-field select:focus,.cm-field textarea:focus{outline:0;border-color:var(--b);}
  .cm-field textarea{resize:vertical;min-height:60px;}
  .cm-chips{display:flex;flex-wrap:wrap;gap:6px;}
  .cm-chip{padding:7px 12px;border-radius:99px;border:1px solid var(--line);background:var(--bg3);color:var(--snow);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;touch-action:manipulation;}
  .cm-chip.active{background:var(--b);color:#fff;border-color:var(--b);}
  .cm-foot{padding:12px 16px;border-top:1px solid var(--line);display:flex;gap:8px;position:sticky;bottom:0;background:var(--bg2);}
  .cm-foot button{flex:1;padding:11px 14px;border-radius:var(--rad);border:1px solid var(--line);font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;touch-action:manipulation;}
  .cm-foot .cm-save{background:var(--g);color:#fff;border-color:var(--g);}
  .cm-foot .cm-save:disabled{opacity:.5;cursor:not-allowed;}
  .cm-foot .cm-cancel{background:var(--bg3);color:var(--snow);}
  /* Historical cost suggestions */
  .cm-hist-item:hover{background:var(--hover)!important;border-color:var(--line2)!important;}
  .cm-hist-item:active{transform:scale(.98);}
  /* Timeline */
  .order-timeline{display:flex;flex-direction:column;gap:8px;}
  .order-timeline-item{padding:8px 12px;background:var(--bg3);border-right:3px solid var(--p);border-radius:var(--rad);}
  .order-timeline-action{font-size:13px;color:var(--snow);font-weight:600;margin-bottom:2px;}
  .order-timeline-meta{font-size:11px;color:var(--dim2);}
  /* Stage durations + owner + rating (derived) */
  .stage-durations{display:flex;flex-direction:column;gap:6px;}
  .stage-duration-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border-radius:var(--rad);flex-wrap:wrap;}
  .sd-main{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .sd-label{font-size:13px;color:var(--snow);font-weight:600;}
  .sd-owner{font-size:11px;color:var(--dim2);font-weight:600;}
  .sd-side{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
  .sd-val{font-size:13px;color:var(--snow);font-weight:700;white-space:nowrap;}
  .sd-sla{font-size:10px;color:var(--dim2);font-weight:700;}
  .sd-chip{display:inline-block;font-size:10px;font-weight:800;padding:1px 7px;border-radius:8px;}
  .sd-chip.ongoing{background:var(--tint-y-soft);color:var(--y);border:1px solid var(--tint-y-line);}
  .sd-chip.good{background:var(--tint-g-soft);color:var(--g);border:1px solid var(--tint-g-line);}
  .sd-chip.late{background:var(--tint-r-soft);color:var(--r);border:1px solid var(--tint-r-line);}
  /* Tap-to-select+copy (مبدأ الذكاء — اضغط الرقم/الاسم يتعلّم ويُنسخ) */
  .tap-select{cursor:pointer;position:relative;}
  .tap-select:hover{text-decoration:underline dotted;text-underline-offset:3px;}
  .tap-select.tap-copied::after{content:'✓ تم النسخ';position:absolute;top:-16px;right:0;font-size:10px;font-weight:800;color:var(--g);background:var(--bg2);border:1px solid var(--g);border-radius:6px;padding:1px 6px;white-space:nowrap;}
  /* Quick status buttons */
  .qs-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
  .qs-actions button{flex:1;min-width:90px;padding:9px 10px;border-radius:var(--rad);border:1px solid var(--line);background:var(--bg2);color:var(--snow);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:4px;transition:var(--trans);touch-action:manipulation;-webkit-tap-highlight-color:transparent;position:relative;}
  .qs-actions button:hover{background:var(--bg3);}
  /* Active state — visual feedback أقوى مع checkmark indicator */
  .qs-actions button.act{color:#fff;font-weight:900;box-shadow:0 0 0 2px var(--bg1), 0 0 0 4px currentColor;transform:scale(1.02);}
  .qs-actions button.act::after{content:'●';position:absolute;top:3px;inset-inline-end:6px;font-size:8px;color:#fff;opacity:.9;}
  .qs-actions button.act.received{background:var(--b);border-color:var(--b);}
  .qs-actions button.act.wip{background:var(--y);border-color:var(--y);color:#1a1a1a;}
  .qs-actions button.act.wip::after{color:#1a1a1a;}
  .qs-actions button.act.done{background:var(--g);border-color:var(--g);}
  .qs-actions button.act.problem{background:var(--r);border-color:var(--r);}
  /* Empty / loading / error states */
  .order-empty{padding:40px 20px;text-align:center;color:var(--dim2);font-size:13px;}
  .order-loading{padding:40px 20px;text-align:center;color:var(--dim2);}
  .order-loading::after{content:' …';}
  .order-error{padding:20px;text-align:center;color:var(--r);font-size:13px;font-weight:700;}
  /* Back button in topbar */
  .order-back-btn{width:36px;height:36px;border-radius:var(--rad);border:1px solid var(--line);background:var(--bg3);color:var(--snow);font-size:18px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--trans);font-family:inherit;}
  .order-back-btn:hover{background:var(--hover);border-color:var(--line2);}
  @media(max-width:768px){
    .order-back-btn{width:44px;height:44px;font-size:22px;}
    .order-hero{padding:14px;}
    .order-hero h1{font-size:18px;}
    .order-section-head{padding:12px 14px;font-size:12px;}
    .order-section-body{padding:12px 14px;}
  }

  /* ── Sticky Action Toolbar (top of content) ── */
  .order-toolbar{
    position:sticky;top:0;z-index:20;
    background:var(--bg2);
    border-bottom:1px solid var(--line);
    padding:10px 12px;
    display:flex;align-items:center;gap:6px;
    /* FIX: كان overflow-x:auto يقصّ قائمة «المزيد» المنسدلة (قيد CSS: قصّ المحور الآخر).
       flex-wrap يسمح للأزرار بالالتفاف بدل التمرير، فتظهر القائمة كاملة. */
    flex-wrap:wrap;
    margin:-20px -20px 16px;  /* extend to content edges */
  }
  .order-toolbar::-webkit-scrollbar{display:none;}
  .order-tb-btn{
    flex-shrink:0;
    display:inline-flex;align-items:center;gap:6px;
    padding:9px 14px;
    border-radius:var(--rad);
    border:1px solid var(--line);
    background:var(--bg3);
    color:var(--snow);
    font-size:13px;font-weight:700;
    cursor:pointer;text-decoration:none;
    font-family:inherit;
    transition:var(--trans);
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
    white-space:nowrap;
  }
  .order-tb-btn:hover{background:var(--hover);border-color:var(--line2);}
  .order-tb-btn.primary{background:var(--b);color:#fff;border-color:var(--b);}
  .order-tb-btn.primary:hover{background:var(--b);filter:brightness(.92);}
  .order-tb-btn.danger{color:var(--r);border-color:rgba(255,61,110,.3);background:rgba(255,61,110,.06);}
  .order-tb-btn.danger:hover{background:rgba(255,61,110,.12);}
  .order-tb-more{position:relative;}
  .order-tb-menu{
    position:absolute;
    top:calc(100% + 6px);
    inset-inline-end:0;
    min-width:200px;
    background:var(--bg2);
    border:1px solid var(--line2);
    border-radius:var(--rad);
    box-shadow:var(--shadow-pop);
    padding:6px;
    z-index:30;
    display:none;
    flex-direction:column;
    gap:2px;
  }
  .order-tb-menu.open{display:flex;}
  .order-tb-menu-item{
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;
    border-radius:var(--rad);
    background:transparent;
    border:0;
    color:var(--snow);
    font-size:13px;font-weight:600;
    cursor:pointer;
    font-family:inherit;
    text-align:right;
    text-decoration:none;
    transition:var(--trans);
    width:100%;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }
  .order-tb-menu-item:hover{background:var(--hover);}
  .order-tb-menu-item.danger{color:var(--r);}
  .order-tb-menu-item.danger:hover{background:rgba(255,61,110,.08);}
  .order-tb-menu-divider{height:1px;background:var(--line);margin:4px 0;}
  @media(max-width:768px){
    .order-toolbar{padding:8px 10px;margin:-10px -10px 12px;}
    .order-tb-btn{padding:9px 12px;font-size:12px;}
    .order-tb-btn .lbl{display:none;}  /* icon-only on mobile */
    .order-tb-btn.show-lbl .lbl{display:inline;}  /* "المزيد" keeps label */
  }
</style>
<!-- Unified sidebar (active على هذه الصفحة) — رجوع فوري بـ ?feat.sidebarV2=0 -->

      <div class="nav-brand-name">Business2Card</div>

<script type="module">
import { app, auth, db } from "./core/firebase-init.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { doc, onSnapshot, getDoc, getDocs, collection, query, limit, where } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { orderActions } from "./order-actions.js";
import { inboxActions } from "./inbox-actions.js";
import { canSeeField, maskPhone as _centralMaskPhone, ROLE_CAN_SEE_COST } from "./core/permissions-matrix.js";
import { PRODUCT_STATUS, STAGES, STAGE_PERMISSIONS, ORDER_DESIGN_STAGES, getStageDurations, getStageResponsibilities, getOrderDates, getOrderAlerts } from "./orders.js";
import { makeSearchable } from "./core/searchable-select.js";
import { getSettings } from './core/static-store.js';
import { dataCache, cachedQuery } from './core/data-cache.js';
import { toast } from './shared.js';

// ── State ──
const orderId = new URLSearchParams(location.search).get('id');
let currentUser = null;
let userName = '';
let currentRole = 'admin';
let currentUserPerms = null;
let currentOrder = null;
let designers = [];
let unsubscribe = null;
// SLA override من الإعدادات (settings/main.stageSla) — للموعد المستهدف وتقييم المراحل.
let stageSlaTable = null;
getSettings(data => {
  stageSlaTable = data?.stageSla || null;
  if (currentOrder) renderOrder(currentOrder);
});
// Cost-entry deps (loaded once after auth)
let suppliers = [];
let costCategoriesList = [];
let historicalCostItems = []; // recent cost items from last N orders (for suggestions)
let activeProdIdxForCost = -1;
let shipOfficers = []; // shipping_officer employees for the ship-to-shipping picker
// Searchable-select instances (refresh after repopulating options)
let __ssType = null;
let __ssSupplier = null;

// ── Utils ──
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtMoney = (n) => (Number(n)||0).toLocaleString('ar-EG') + ' ج';
const fmtDate = (ts) => {
  if (!ts) return '—';
  try {
    const d = ts.toDate ? ts.toDate() : (ts.seconds ? new Date(ts.seconds*1000) : new Date(ts));
    return d.toLocaleDateString('ar-EG', { year: 'numeric', month: 'short', day: 'numeric' });
  } catch (_) { return '—'; }
};
const stageInfo = (s) => ({
  design:     { label:'🎨 تصميم',  cls:'design' },
  printing:   { label:'🖨️ طباعة',  cls:'printing' },
  production: { label:'🏭 تنفيذ',  cls:'production' },
  shipping:   { label:'🚚 شحن',   cls:'shipping' },
  archived:   { label:'📁 أرشيف', cls:'archived' },
  cancelled:  { label:'✖ ملغي',   cls:'cancelled' },
}[s] || { label:s||'—', cls:'' });

// RULE 8.1 / C2 — central source for phone masking (respects user-level overrides)
function maskPhone(phone) {
  if (!phone) return '';
  const canSee = canSeeField('client_phone', currentRole, currentUserPerms);
  return _centralMaskPhone(phone, canSee);
}

// ── Render ──
function renderError(msg) {
  $('order-detail').className = 'order-error';
  $('order-detail').textContent = '⚠ ' + msg;
}

function renderToolbar(o) {
  const id = encodeURIComponent(o._id);
  const oidParam = encodeURIComponent(o.orderId || o._id);
  let html = '<div class="order-toolbar">';
  // 🚚 Primary workflow action — تحويل للشحن (production → shipping).
  // كان مفقوداً بعد migration الإنتاج لـ order.html → الـ workflow كان مكسوراً
  // (مفيش أي زر يشحن من الواجهة). الـ action المركزي يتحقق من الشروط (done +
  // بنود تكلفة) ويتعامل مع التحذيرات و admin override.
  const canShip = (STAGE_PERMISSIONS.production || []).includes(currentRole);
  if (o.stage === 'production' && canShip) {
    html += '<button type="button" class="order-tb-btn primary" onclick="openShipPicker()" title="تحويل للشحن">🚚 <span class="lbl">تحويل للشحن</span></button>';
  }
  html += '<a class="order-tb-btn" href="waybill.html?id=' + id + '" target="_blank" rel="noopener" title="البوليصة">🧾 <span class="lbl">البوليصة</span></a>';
  html += '<a class="order-tb-btn" href="order-tracking.html?id=' + oidParam + '" target="_blank" rel="noopener" title="تتبع كامل">📋 <span class="lbl">تتبع</span></a>';
  html += '<a class="order-tb-btn" href="exec-cost-entry.html?id=' + id + '" title="بنود التكلفة">💰 <span class="lbl">التكلفة</span></a>';
  html += '<a class="order-tb-btn" href="production.html?orderId=' + id + '" title="تعديل البيانات (في صفحة التنفيذ)">✏️ <span class="lbl">تعديل</span></a>';
  // More menu (mobile + extras)
  html += '<div class="order-tb-more">';
  html += '<button type="button" class="order-tb-btn show-lbl" onclick="event.stopPropagation();toggleMore()" aria-label="المزيد">⋯ <span class="lbl">المزيد</span></button>';
  html += '<div class="order-tb-menu" id="order-tb-menu">';
  // الإجراءات الفريدة فقط — الباقي (بوليصة/تتبع/تكلفة/تعديل) موجود في الشريط الرئيسي بلا تكرار
  if (o.clientId) {
    // RULE N1.3 — use ?openClient= (consumed by clients.html:476) instead of #client= (no consumer)
    html += '<a class="order-tb-menu-item" href="clients.html?openClient=' + encodeURIComponent(o.clientId) + '">👤 ملف العميل</a>';
    // بدء تصميم فعّال: تعيين مصمم + فتح مجموعة (مصمم + عميل + خدمة عملاء).
    html += '<button type="button" class="order-tb-menu-item" onclick="startDesignFlow()">🎨 بدء التصميم (تعيين مصمم + مجموعة)</button>';
    // جسر تواصل العميل: فتح محادثة الأوردر معه + تقديم التصميم له (طبقة المراسلة).
    html += '<button type="button" class="order-tb-menu-item" onclick="openClientOrderChat()">💬 محادثة العميل</button>';
    html += '<button type="button" class="order-tb-menu-item" onclick="sendDesignToClient()">📨 إرسال التصميم للعميل</button>';
  }
  // ↩️ إرجاع مرحلة — رجوع الأوردر للمرحلة السابقة (stage revert) مع سبب إلزامي.
  // الصلاحية الفعلية تُفرض مركزياً في buildStageRevert؛ هنا gate للعرض فقط
  // (admin/ops دائماً، أو من له دور في المرحلة الهدف فيستلم العمل من جديد).
  const _prevStage = STAGES[o.stage]?.prev;
  const _canRevert = _prevStage && (
    currentRole === 'admin' || currentRole === 'operation_manager' ||
    (STAGE_PERMISSIONS[_prevStage] || []).includes(currentRole)
  );
  if (_canRevert) {
    if (o.clientId) html += '<div class="order-tb-menu-divider"></div>';
    html += '<button type="button" class="order-tb-menu-item" onclick="revertStage()">↩️ إرجاع لمرحلة ' + esc(STAGES[_prevStage].label) + '</button>';
  }
  if (o.stage !== 'archived' && o.stage !== 'cancelled') {
    if (o.clientId && !_canRevert) html += '<div class="order-tb-menu-divider"></div>';
    html += '<button type="button" class="order-tb-menu-item danger" onclick="archiveOrder()">📁 أرشفة الأوردر</button>';
    html += '<button type="button" class="order-tb-menu-item danger" onclick="cancelOrder()">❌ إلغاء الأوردر</button>';
  }
  // [توحيد] الحذف النهائي الشامل اتمركز في التقارير → «🎛️ التحكم الكامل»
  // (أدمن فقط، نقطة واحدة). للرجوع: غيّر العَلَم لـ false. (E1 — reversible)
  const DELETE_CONSOLIDATED = true;
  if (!DELETE_CONSOLIDATED && currentRole === 'admin') {
    html += '<div class="order-tb-menu-divider"></div>';
    html += '<button type="button" class="order-tb-menu-item danger" onclick="purgeOrder()">🗑 حذف نهائي من السجل</button>';
  }
  html += '</div>';  // .order-tb-menu
  html += '</div>';  // .order-tb-more
  html += '</div>';  // .order-toolbar
  $('order-toolbar').innerHTML = html;
}

function renderOrder(o) {
  currentOrder = o;
  renderToolbar(o);
  const stage = stageInfo(o.stage);
  const products = Array.isArray(o.products) ? o.products : [];
  const total = Number(o.salePrice || o.total || o.totalAmount || 0);
  const paid = Number(o.paidAmount || o.paid || 0);
  const remaining = Number(o.remaining != null ? o.remaining : (total - paid));
  const phone = maskPhone(o.clientPhone || o.phone1 || '');

  $('topbar-title').textContent = o.clientName || '—';
  $('topbar-sub').textContent = (o.orderId || (o._id||'').slice(-6)) + (phone ? ' · ' + phone : '');
  document.title = (o.orderId || 'الأوردر') + ' — Business2Card';

  // ── Design images (match production.html field naming) ──
  const designFiles = [];
  // per-product images (designImages[] or designImageUrl)
  for (let pi = 0; pi < products.length; pi++) {
    const p = products[pi];
    const arr = Array.isArray(p?.designImages) ? p.designImages.filter(Boolean) : [];
    if (arr.length) {
      arr.forEach((url, j) => designFiles.push({ url, name: (p.productName||p.name||'منتج') + (j>0 ? ' ('+(j+1)+')' : '') }));
    } else if (p?.designImageUrl) {
      designFiles.push({ url: p.designImageUrl, name: p.productName||p.name||'منتج' });
    }
  }
  // order-level fallbacks
  if (o.designImageUrl && !designFiles.length) designFiles.push({ url: o.designImageUrl, name: 'التصميم' });
  if (o.printFinalUrl && !designFiles.length) designFiles.push({ url: o.printFinalUrl, name: 'الملف النهائي' });
  // also keep legacy fields just in case
  if (o.designFileUrl && !designFiles.find(f=>f.url===o.designFileUrl)) designFiles.push({ url:o.designFileUrl, name:'تصميم رئيسي' });
  if (Array.isArray(o.designFiles)) for (const f of o.designFiles) if (f && (f.url||f.fileUrl) && !designFiles.find(d=>d.url===(f.url||f.fileUrl))) designFiles.push({url:f.url||f.fileUrl, name:f.name||f.fileName||'ملف'});

  const timeline = Array.isArray(o.timeline) ? o.timeline : [];
  // prodStatus هو الحقل الذي يكتبه setProductionStatus action.
  // productionStatus يبقى كـ fallback للأوردرات القديمة (RULE 6).
  const psStatus = o.prodStatus || o.productionStatus || 'pending';

  let html = '';

  // ── Hero ──
  html += '<div class="order-hero">';
  html += '<h1 class="tap-select" title="اضغط للنسخ">' + esc(o.clientName||'—') + '</h1>';
  html += '<div class="order-id tap-select" title="اضغط للنسخ">' + esc(o.orderId || o._id || '—') + '</div>';
  if (phone) html += '<div class="order-id tap-select" style="direction:ltr" title="اضغط للنسخ">' + esc(phone) + '</div>';
  html += '<div class="order-meta"><span class="order-stage-badge ' + stage.cls + '">' + esc(stage.label) + '</span>';
  // designStage sub-status badge (rejected / awaiting_payment / wip)
  const _ds = o.designStage;
  if (_ds === ORDER_DESIGN_STAGES.REJECTED) {
    html += ' <span class="order-stage-badge design-rejected">✕ التصميم مرفوض</span>';
  } else if (_ds === ORDER_DESIGN_STAGES.AWAITING_PAYMENT) {
    html += ' <span class="order-stage-badge" style="background:rgba(255,170,0,.12);color:var(--y);border:1px solid rgba(255,170,0,.3)">⏳ انتظار التحويل</span>';
  }
  // تنبيه التأخير — مشتق من المرجع الواحد (getOrderAlerts)
  const _alerts = getOrderAlerts(o, stageSlaTable);
  if (_alerts.count > 0) {
    const _txt = _alerts.currentOverdue ? ('متأخر: ' + esc(_alerts.worst)) : ('تأخّر سابق (' + _alerts.count + ')');
    html += ' <span class="order-stage-badge" style="background:rgba(255,61,110,.15);color:var(--r,#ff3d6e)">⚠️ ' + _txt + '</span>';
  }
  html += '</div>';
  html += '</div>';

  // ── Cancelled banner ──
  if (o.stage === 'cancelled') {
    html += '<div class="order-cancelled-banner">';
    html += '<div class="cb-title">❌ هذا الأوردر ملغي</div>';
    if (o.cancelReason) html += '<div class="cb-reason">السبب: ' + esc(o.cancelReason) + '</div>';
    if (o.cancelNote) html += '<div class="cb-meta">ملاحظة: ' + esc(o.cancelNote) + '</div>';
    const cancelMeta = [];
    if (o.cancelledByName) cancelMeta.push('بواسطة: ' + o.cancelledByName);
    if (o.cancelledAt) cancelMeta.push(fmtDate(o.cancelledAt));
    if (o.previousStage) cancelMeta.push('كان في: ' + (STAGES[o.previousStage]?.label || o.previousStage));
    if (cancelMeta.length) html += '<div class="cb-meta">' + esc(cancelMeta.join(' · ')) + '</div>';
    html += '</div>';
  }

  // ── Design rejected banner ──
  if (o.designStage === ORDER_DESIGN_STAGES.REJECTED && o.stage !== 'cancelled') {
    html += '<div class="order-rejected-banner">';
    html += '<div class="cb-title">✕ التصميم مرفوض</div>';
    if (o.printRejectNote) html += '<div class="cb-reason">السبب: ' + esc(o.printRejectNote) + '</div>';
    html += '<div class="cb-meta">الأوردر يحتاج مراجعة ومعالجة من خدمة العملاء</div>';
    html += '</div>';
  }

  // (Quick actions moved to sticky toolbar — see renderToolbar)

  // ── Status quick buttons (production) ──
  if (o.stage === 'production' || o.stage === 'printing') {
    html += '<div class="order-section">';
    html += '<div class="order-section-head">🚦 حالة التنفيذ <span style="font-size:11px;color:var(--dim2);font-weight:600">اضغط للتغيير</span></div>';
    html += '<div class="order-section-body">';
    html += '<div class="qs-actions">';
    const stat = (k, label, ico) => '<button type="button" data-status="'+k+'" class="' + (psStatus===k?'act '+k:'') + '" onclick="setStatus(\''+k+'\')">' + ico + ' ' + label + '</button>';
    html += stat('received', 'استلمت', '📥');
    html += stat('wip',      'جاري',   '🔄');
    html += stat('done',     'خلصت',   '✅');
    html += stat('problem',  'مشكلة',  '⚠️');
    html += '</div>';
    html += '</div>';
    html += '</div>';
  }

  // ── Order info ──
  html += '<div class="order-section">';
  html += '<div class="order-section-head">📋 بيانات الأوردر</div>';
  html += '<div class="order-section-body">';
  html += '<div class="order-row"><span>التاريخ</span><b>' + esc(fmtDate(o.createdAt)) + '</b></div>';
  html += '<div class="order-row"><span>الإجمالي</span><b>' + fmtMoney(total) + '</b></div>';
  if (paid > 0) html += '<div class="order-row"><span>مدفوع</span><b class="g">' + fmtMoney(paid) + '</b></div>';
  if (remaining > 0) html += '<div class="order-row"><span>متبقي</span><b class="r">' + fmtMoney(remaining) + '</b></div>';
  else if (remaining < 0) html += '<div class="order-row"><span>زيادة</span><b class="y">' + fmtMoney(Math.abs(remaining)) + '</b></div>';
  if (o.shipMethod) html += '<div class="order-row"><span>الشحن</span><b>' + esc(o.shipMethod) + '</b></div>';
  if (o.assignedToName || o.assignedTo) html += '<div class="order-row"><span>المسؤول</span><b>' + esc(o.assignedToName||o.assignedTo) + '</b></div>';
  if (o.printNotes) html += '<div class="order-row"><span>ملاحظة طباعة</span><b>' + esc(o.printNotes) + '</b></div>';
  html += '</div>';
  html += '</div>';

  // ── Products (image-first cards: image → details → cost items) ──
  // RULE C2 — استخدم PRODUCT_STATUS المركزي (pending/in_progress/ready/printed/done/on_hold)
  // exec-level (received/wip/done/problem) كـ fallback للأوردرات القديمة.
  const EXEC_LABELS = { received:{ico:'📥',label:'استلمت'}, wip:{ico:'🔄',label:'جاري'}, problem:{ico:'⚠️',label:'مشكلة'} };
  const labelFor = (k) => {
    const ps = PRODUCT_STATUS[k];
    if (ps) return ps.ico + ' ' + ps.label;
    const ex = EXEC_LABELS[k];
    if (ex) return ex.ico + ' ' + ex.label;
    return k;
  };
  const canSeeCostNow = ROLE_CAN_SEE_COST.has(currentRole);
  const canRecordCostNow = ['admin','operation_manager','production_agent'].includes(currentRole);
  // helper: get product images (array)
  const _prodImgs = (p) => {
    const a = Array.isArray(p?.designImages) ? p.designImages.filter(Boolean) : [];
    if (a.length) return a;
    return p?.designImageUrl ? [p.designImageUrl] : [];
  };
  // order-level fallback images (for legacy orders where images live on order not product)
  const orderLevelImgs = [];
  if (o.designImageUrl) orderLevelImgs.push(o.designImageUrl);
  if (o.printFinalUrl) orderLevelImgs.push(o.printFinalUrl);
  if (o.designFileUrl) orderLevelImgs.push(o.designFileUrl);
  if (Array.isArray(o.designFiles)) {
    for (const f of o.designFiles) { const u = f?.url || f?.fileUrl; if (u && !orderLevelImgs.includes(u)) orderLevelImgs.push(u); }
  }

  const ci = Array.isArray(o.costItems) ? o.costItems : [];

  html += '<div class="order-section">';
  html += '<div class="order-section-head">📦 المنتجات <span style="font-size:12px;color:var(--dim2);font-weight:700">(' + products.length + ')</span></div>';
  html += '<div class="order-section-body">';
  if (products.length === 0) {
    html += '<div class="order-empty">لا توجد منتجات</div>';
  } else {
    for (let pi = 0; pi < products.length; pi++) {
      const p = products[pi];
      const name = p.productName || p.name || p.title || 'منتج';
      const qty = p.quantity || p.qty || 0;
      const price = Number(p.totalPrice || p.salePrice || p.price || 0);
      const pst = p.productStatus || 'pending';
      const pstLabel = labelFor(pst);
      // images: per-product first, fallback to order-level if first product and product has none
      let imgs = _prodImgs(p);
      if (!imgs.length && pi === 0 && orderLevelImgs.length) imgs = orderLevelImgs;
      // cost items for this product: prodIdx matches OR (legacy: prodIdx missing AND this is the only product)
      const prodCosts = ci.filter((c, i) => {
        if (c.prodIdx === pi) return true;
        if ((c.prodIdx == null || c.prodIdx === '') && products.length === 1) return true;
        return false;
      });
      const prodCostTotal = prodCosts.reduce((s, c) => s + (parseFloat(c.total) || 0), 0);

      html += '<div class="prod-card">';
      // image area
      html += '<div class="prod-card-img">';
      if (imgs.length === 0) {
        html += '<div class="prod-card-img-empty">🖼️ لا توجد صورة لهذا المنتج</div>';
      } else if (imgs.length === 1) {
        html += '<img src="' + esc(imgs[0]) + '" loading="lazy" alt="' + esc(name) + '" onclick="window.open(this.src,\'_blank\')">';
      } else {
        html += '<div class="prod-card-img-multi">';
        for (const url of imgs) {
          html += '<img src="' + esc(url) + '" loading="lazy" alt="' + esc(name) + '" onclick="window.open(this.src,\'_blank\')">';
        }
        html += '</div>';
      }
      html += '</div>';
      // body: name + meta + status
      html += '<div class="prod-card-body">';
      html += '<div class="prod-card-head">';
      html += '<div><div class="prod-card-name">' + esc(name) + '</div>';
      html += '<div class="prod-card-meta">';
      if (qty) html += '× ' + esc(qty);
      if (price && canSeeField('price_sale', currentRole, currentUserPerms)) {
        html += (qty ? ' · ' : '') + fmtMoney(price);
      }
      html += '</div></div>';
      html += '<span class="prod-card-status ' + pst + '">' + esc(pstLabel) + '</span>';
      html += '</div>';
      // cost section (only for roles that can see cost)
      if (canSeeCostNow) {
        html += '<div class="prod-costs">';
        html += '<div class="prod-costs-head"><span>💰 بنود التكلفة <span style="color:var(--dim2);font-weight:600">(' + prodCosts.length + ')</span></span>';
        if (prodCostTotal > 0) html += '<span class="total">' + fmtMoney(prodCostTotal) + '</span>';
        html += '</div>';
        if (prodCosts.length === 0) {
          html += '<div class="prod-cost-empty">لم تُسجَّل بنود تكلفة لهذا المنتج بعد</div>';
        } else {
          for (const c of prodCosts) {
            html += '<div class="prod-cost-item">';
            html += '<div class="ci-left">';
            html += '<div class="ci-type">' + esc(c.type || 'بند') + (c.supplierName ? ' · <span style="color:var(--dim2);font-weight:600">🏭 ' + esc(c.supplierName) + '</span>' : '') + '</div>';
            if (c.note || c.date) {
              html += '<div class="ci-meta">' + (c.note ? esc(c.note) : '') + (c.note && c.date ? ' · ' : '') + (c.date ? esc(c.date) : '') + '</div>';
            }
            html += '</div>';
            html += '<div class="ci-total">' + fmtMoney(parseFloat(c.total)||0) + '</div>';
            html += '</div>';
          }
        }
        if (canRecordCostNow && o.stage !== 'cancelled' && o.stage !== 'archived') {
          html += '<button type="button" class="prod-add-cost-btn" onclick="openCostModal(' + pi + ')">＋ سجّل بند تكلفة لهذا المنتج</button>';
        }
        html += '</div>';
      }
      html += '</div>'; // prod-card-body
      html += '</div>'; // prod-card
    }
  }
  html += '</div>';
  html += '</div>';

  // ── Additional design files (order-level, not tied to any product) ──
  // Show only files NOT already shown inside a product card.
  const shownInProducts = new Set();
  for (let pi = 0; pi < products.length; pi++) {
    for (const u of _prodImgs(products[pi])) shownInProducts.add(u);
    if (pi === 0 && !_prodImgs(products[pi]).length) {
      for (const u of orderLevelImgs) shownInProducts.add(u);
    }
  }
  const extraFiles = designFiles.filter(f => {
    const u = f.url || f.fileUrl || '';
    return u && !shownInProducts.has(u);
  });
  if (extraFiles.length > 0) {
    html += '<div class="order-section">';
    html += '<div class="order-section-head">🎨 ملفات إضافية <span style="font-size:12px;color:var(--dim2);font-weight:700">(' + extraFiles.length + ')</span></div>';
    html += '<div class="order-section-body">';
    html += '<div class="order-design-grid">';
    for (const f of extraFiles) {
      const url = f.url || f.fileUrl || '';
      const fname = f.name || f.fileName || 'ملف';
      const ftype = f.type || f.contentType || '';
      // Detect image: prefer MIME type, fallback to file name extension, fallback to URL
      // Firebase Storage URLs sometimes hide the extension behind tokens; checking
      // the file NAME is more reliable than the URL.
      const IMG_EXT_RE = /\.(jpe?g|jfif|png|webp|gif|svg|bmp|heic|heif|avif)(\?|#|$)/i;
      const isImg = (ftype && ftype.startsWith('image/'))
                 || IMG_EXT_RE.test(fname)
                 || IMG_EXT_RE.test(url);
      const isPdf = (ftype === 'application/pdf') || /\.pdf(\?|#|$)/i.test(fname) || /\.pdf(\?|#|$)/i.test(url);
      html += '<div class="order-design-img">';
      if (isImg) {
        html += '<a href="' + esc(url) + '" target="_blank" rel="noopener"><img src="' + esc(url) + '" alt="' + esc(fname) + '" loading="lazy"></a>';
      } else if (isPdf) {
        html += '<a href="' + esc(url) + '" target="_blank" rel="noopener" style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px"><div style="font-size:28px">📄</div><div style="font-size:11px;word-break:break-word;text-align:center">' + esc(fname) + '</div></a>';
      } else {
        html += '<a href="' + esc(url) + '" target="_blank" rel="noopener">📎 ' + esc(fname) + '</a>';
      }
      html += '</div>';
    }
    html += '</div>';
    html += '</div>';
    html += '</div>';
  }

  // ── مراحل الأوردر: المسؤول + تواريخ الدخول/الإنجاز/الموعد + المدة + التقييم ──
  // (derived من stageEnteredAt/stageCompletedAt/stageDeadline/الملكية — W1)
  {
    const rows = getStageResponsibilities(o, stageSlaTable);
    const dur = getStageDurations(o);
    const shown = rows.filter(s => s.status !== 'pending');
    if (shown.length > 0) {
      html += '<div class="order-section">';
      html += '<div class="order-section-head">⏱️ المراحل: المسؤول والتواريخ <span style="font-size:12px;color:var(--dim2);font-weight:700">(الإجمالي ' + esc(dur.totalText) + ')</span></div>';
      html += '<div class="order-section-body">';
      html += '<div class="stage-durations">';
      for (const s of shown) {
        const isIntake = s.kind === 'intake';
        let chip;
        if (isIntake) chip = '<span class="sd-chip">📝 تم الإدخال</span>';
        else if (s.rating === 'late') chip = '<span class="sd-chip late">⚠️ متأخر</span>';
        else if (s.rating === 'ongoing') chip = '<span class="sd-chip ongoing">🔄 جارٍ</span>';
        else chip = '<span class="sd-chip good">✅ ضمن المدة</span>';
        const slaTxt = (!isIntake && s.slaHours) ? ('SLA ' + s.slaHours + 'س') : '';
        html += '<div class="stage-duration-row">';
        html += '<div class="sd-main"><span class="sd-label">' + esc(s.label) + (s.isCurrent ? ' <span class="sd-chip ongoing" style="font-size:9px">الحالية</span>' : '') + '</span>';
        html += '<span class="sd-owner">' + (s.responsibleName ? '👤 ' + esc(s.responsibleName) : 'غير محدد') + '</span></div>';
        html += '<div class="sd-side">' + (isIntake ? '' : '<span class="sd-val">' + esc(s.durationText) + '</span> ') + chip;
        if (slaTxt) html += '<span class="sd-sla">' + esc(slaTxt) + '</span>';
        html += '</div>';
        // سطر التواريخ: دخل · خرج · الموعد المستهدف
        const dates = [];
        if (s.enteredAt)   dates.push('دخل: ' + esc(s.enteredAt));
        if (s.completedAt && s.status === 'done') dates.push('خرج: ' + esc(s.completedAt));
        if (s.deadline)    dates.push((s.overdue ? '⚠️ ' : '🎯 ') + 'الموعد: ' + esc(s.deadline));
        if (dates.length) html += '<div class="sd-dates" style="grid-column:1/-1;font-size:11px;color:var(--dim2);margin-top:2px">' + dates.join(' · ') + '</div>';
        html += '</div>';
      }
      html += '</div>';
      html += '</div>';
      html += '</div>';
    }
  }

  // ── المسار الزمني (تواريخ الأوردر — المرجع الواحد getOrderDates) ──
  {
    const od = getOrderDates(o);
    const ms = (od && od.milestones) || [];
    if (ms.length > 0) {
      html += '<div class="order-section">';
      html += '<div class="order-section-head">🗓️ المسار الزمني <span style="font-size:12px;color:var(--dim2);font-weight:700">(' + ms.length + ')</span></div>';
      html += '<div class="order-section-body">';
      html += '<div class="order-timeline">';
      for (const m of ms) {
        html += '<div class="order-timeline-item">';
        html += '<div class="order-timeline-action">' + esc(m.label) + '</div>';
        html += '<div class="order-timeline-meta">' + esc(m.text) + '</div>';
        html += '</div>';
      }
      // الموعد المستهدف للتصميم (هدف لا حدث)
      if (od.designDeadline) html += '<div class="order-timeline-item"><div class="order-timeline-action">🎯 موعد تسليم التصميم</div><div class="order-timeline-meta">' + esc(od.designDeadline.text) + '</div></div>';
      html += '</div>';
      html += '</div>';
      html += '</div>';
    }
  }

  // ── Timeline ──
  if (timeline.length > 0) {
    html += '<div class="order-section">';
    html += '<div class="order-section-head">📜 التاريخ <span style="font-size:12px;color:var(--dim2);font-weight:700">(' + timeline.length + ')</span></div>';
    html += '<div class="order-section-body">';
    html += '<div class="order-timeline">';
    const recent = timeline.slice(-15).reverse();
    for (const e of recent) {
      const action = e.action || '—';
      const by = e.by || '';
      const dt = e.date || (e.createdAt ? fmtDate(e.createdAt) : '');
      html += '<div class="order-timeline-item">';
      html += '<div class="order-timeline-action">' + esc(action) + '</div>';
      if (by || dt) html += '<div class="order-timeline-meta">' + esc(by) + (by && dt ? ' · ' : '') + esc(dt) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '</div>';
    html += '</div>';
  }

  $('order-detail').className = '';
  $('order-detail').innerHTML = html;
}

// ── Tap-to-select + copy (مبدأ الذكاء): اضغط الرقم/الاسم يتعلّم النص ويُنسخ ──
function _tapSelectAndCopy(el) {
  try {
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  } catch (_) { /* selection best-effort */ }
  const text = (el.textContent || '').trim();
  const flash = () => { el.classList.add('tap-copied'); setTimeout(() => el.classList.remove('tap-copied'), 1100); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(flash).catch(() => { try { document.execCommand('copy'); } catch (_) {} flash(); });
  } else {
    try { document.execCommand('copy'); } catch (_) {}
    flash();
  }
}
document.addEventListener('click', (e) => {
  const t = e.target.closest('.tap-select');
  if (t) _tapSelectAndCopy(t);
});

function _orderProofUrl(o) {
  return o.printFinalUrl || o.designFileUrl || o.mockupUrl
    || (Array.isArray(o.designFiles) && o.designFiles[0] && (o.designFiles[0].url || o.designFiles[0])) || '';
}
async function loadDesigners() {
  try {
    const snap = await getDocs(query(collection(db, 'users'), where('role', 'in', ['graphic_designer', 'design_operator']), limit(50)));
    designers = snap.docs.map(d => ({ ...d.data(), _id: d.id })).filter(u => u.isActive !== false && !u.deleted);
  } catch (_) { /* اختياري */ }
}

// منتقي مصمم بسيط (overlay) — يُرجع {id,name} أو null.
function pickDesigner(currentId) {
  return new Promise(resolve => {
    if (!designers.length) { toast('لا توجد قائمة مصممين متاحة', 'err'); return resolve(null); }
    const ov = document.createElement('div');
    ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
    const opts = designers.map(d => `<option value="${d._id}" ${d._id===currentId?'selected':''}>${(d.name||d.email||d._id)}</option>`).join('');
    ov.innerHTML = `<div style="background:var(--ws-bg-elev,#16203a);border:1px solid var(--ws-border,#27314d);border-radius:14px;padding:18px;max-width:360px;width:100%;font-family:inherit;color:var(--ws-text,#e7ecf6)">
      <div style="font-weight:800;font-size:16px;margin-bottom:12px">🎨 بدء التصميم — اختر المصمم</div>
      <select id="pd-sel" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--ws-border,#27314d);background:var(--ws-bg,#0f1830);color:inherit;font-family:inherit;font-size:14px;margin-bottom:14px">${opts}</select>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button type="button" id="pd-cancel" style="padding:8px 14px;border-radius:10px;border:1px solid var(--ws-border,#27314d);background:transparent;color:inherit;font-family:inherit;cursor:pointer">إلغاء</button>
        <button type="button" id="pd-ok" style="padding:8px 16px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--p,#7c5cff),var(--b,#4f8cff));color:#fff;font-family:inherit;font-weight:700;cursor:pointer">بدء التصميم</button>
      </div></div>`;
    document.body.appendChild(ov);
    const close = v => { ov.remove(); resolve(v); };
    ov.querySelector('#pd-cancel').onclick = () => close(null);
    ov.addEventListener('click', e => { if (e.target === ov) close(null); });
    ov.querySelector('#pd-ok').onclick = () => {
      const id = ov.querySelector('#pd-sel').value;
      const d = designers.find(x => x._id === id);
      close(id ? { id, name: d ? (d.name || d.email || id) : '' } : null);
    };
  });
}

window.startDesignFlow = async function() {
  if (!currentOrder) return;
  if (!currentOrder.clientId) { toast('الأوردر غير مرتبط بعميل مسجّل', 'err'); return; }
  const pick = await pickDesigner(currentOrder.designerId);
  if (!pick) return;
  const r = await orderActions.startDesign({
    db, orderId: currentOrder._id, designerId: pick.id, designerName: pick.name,
    userId: currentUser?.uid || '', userName,
  });

  if ((r.warnings || []).length) toast('⚠️ ' + r.warnings.join(' · '), 'warn');

};

// ── Archive action ──
window.archiveOrder = async function() {
  if (!currentOrder) return;
  if (!confirm('تأكيد أرشفة الأوردر ' + (currentOrder.orderId||currentOrder._id) + '؟')) return;
  $('order-tb-menu')?.classList.remove('open');
  try {
    const r = await orderActions.archiveOrder({
      db, orderId: currentOrder._id, role: currentRole,
      userId: currentUser?.uid || '', userName, source: 'order-page',
    });
    if (!r.ok) {
      // إذا في warnings قابلة للتجاوز، اسأل
      if (r.warnings && r.warnings.length && (!r.errors || !r.errors.length)) {
        if (confirm(r.warnings.join('\n') + '\n\nمتابعة؟')) {
          const r2 = await orderActions.archiveOrder({
            db, orderId: currentOrder._id, role: currentRole,
            userId: currentUser?.uid || '', userName, source: 'order-page', bypassWarnings: true,
          });
          if (!r2.ok) return toast('❌ ' + (r2.errors||[]).join(' · '), 'err');
          return toast('📁 تم الأرشفة', 'ok');
        }
        return;
      }
      return toast('❌ ' + (r.errors||[]).join(' · '), 'err');
    }
    toast('📁 تم الأرشفة', 'ok');
  } catch (e) {
    console.error(e);
    toast('❌ خطأ: ' + e.message, 'err');
  }
};

// ── Cancel order action ──
window.cancelOrder = async function() {
  if (!currentOrder) return;
  if (currentOrder.stage === 'cancelled') return toast('الأوردر ملغي بالفعل', 'err');
  if (currentOrder.stage === 'archived') return toast('لا يمكن إلغاء أوردر مؤرشف', 'err');
  $('order-tb-menu')?.classList.remove('open');
  const label = currentOrder.orderId || currentOrder._id;
  const reason = prompt('سبب إلغاء الأوردر "' + (currentOrder.clientName || label) + '" (مطلوب):', '');
  if (reason === null) return;
  if (!reason.trim()) return toast('⚠️ سبب الإلغاء مطلوب', 'err');
  const note = prompt('ملاحظة إضافية (اختياري):', '') || '';
  if (!confirm('⚠️ تأكيد إلغاء الأوردر "' + (currentOrder.clientName || label) + '"؟\nالسبب: ' + reason.trim())) return;
  try {
    const r = await orderActions.cancelOrder({
      db, orderId: currentOrder._id,
      reason: reason.trim(), note: note.trim(),
      userId: currentUser?.uid || '', userName, role: currentRole,
    });
    if (!r.ok) return toast('❌ ' + (r.errors||[]).join(' · '), 'err');
    toast('❌ تم إلغاء الأوردر', 'ok');
  } catch (e) {
    console.error(e);
    toast('❌ خطأ: ' + e.message, 'err');
  }
};

// ── Revert stage action (إرجاع الأوردر للمرحلة السابقة) ──
window.revertStage = async function() {
  if (!currentOrder) return;
  const prev = STAGES[currentOrder.stage]?.prev;
  if (!prev) return toast('⚠️ لا توجد مرحلة سابقة', 'err');
  $('order-tb-menu')?.classList.remove('open');
  const prevLabel = STAGES[prev]?.label || prev;
  const curLabel = STAGES[currentOrder.stage]?.label || currentOrder.stage;
  const reason = prompt('سبب إرجاع الأوردر من «' + curLabel + '» إلى «' + prevLabel + '» (مطلوب):', '');
  if (reason === null) return;
  if (!reason.trim()) return toast('⚠️ السبب مطلوب', 'err');
  try {
    const r = await orderActions.revertStage({
      db, orderId: currentOrder._id, role: currentRole,
      userId: currentUser?.uid || '', userName,
      targetStage: prev, reason: reason.trim(),
    });
    if (!r.ok) return toast('❌ ' + (r.errors||[]).join(' · '), 'err');
    toast('↩️ تم الإرجاع إلى ' + prevLabel, 'ok');
  } catch (e) {
    console.error(e);
    toast('❌ خطأ: ' + e.message, 'err');
  }
};

// ── Purge action (حذف نهائي من السجل) — admin فقط، لا رجعة فيه ──
window.purgeOrder = async function() {
  if (!currentOrder) return;
  if (currentRole !== 'admin') return toast('⛔ هذه العملية للأدمن فقط', 'err');
  $('order-tb-menu')?.classList.remove('open');
  const label = currentOrder.orderId || currentOrder._id;
  if (!confirm('⚠️ حذف نهائي للأوردر "' + (currentOrder.clientName || label) + '"؟\n\nسيُمحى من كل السجلات (الأوردر + معاملاته + قيود الـ ledger + المرتجعات) وتُعكس أرصدة المحافظ. لا يمكن التراجع.')) return;
  const reason = prompt('سبب الحذف النهائي (مطلوب):', '');
  if (reason === null) return;
  if (!reason.trim()) return toast('⚠️ السبب مطلوب', 'err');
  if (!confirm('تأكيد أخير — حذف نهائي لا رجعة فيه؟')) return;
  try {
    const r = await orderActions.purgeOrder({
      db, orderId: currentOrder._id, reason: reason.trim(),
      role: currentRole, userId: currentUser?.uid || '', userName,
    });
    if (!r.ok) return toast('❌ ' + (r.errors||[]).join(' · '), 'err');
    if (r.idempotent && !r.pending) return toast('ℹ️ الأوردر محذوف مسبقاً', 'ok');
    let msg = '🗑 تم الحذف النهائي';
    if (r.txDeleted) msg += ` · ${r.txDeleted} معاملة`;
    if (r.ledgerDeleted) msg += ` · ${r.ledgerDeleted} قيد`;
    toast(msg, 'ok');
    setTimeout(() => {
      if (history.length > 1) history.back();
      else if (typeof window.navigatePage === 'function') window.navigatePage('production.html');
      else location.href = 'production.html';
    }, 900);
  } catch (e) {
    console.error(e);
    toast('❌ خطأ: ' + e.message, 'err');
  }
};

window.confirmShip = async function() {
  if (!currentOrder) return;
  const sel = $('ship-officer-sel');
  const shipId = sel?.value || '';
  const shipName = shipId ? (sel.options[sel.selectedIndex]?.text || '') : '';
  const btn = $('ship-confirm-btn');
  if (btn) btn.disabled = true;
  const base = { db, orderId: currentOrder._id, shipId, shipName, role: currentRole, userId: currentUser?.uid || '', userName };
  try {
    let r = await orderActions.submitProductionToShipping(base);
    // warnings (قابلة للتجاوز) → تأكيد + إعادة بـ bypass
    if (!r.ok && (r.needsConfirmation || (r.warnings?.length && !r.errors?.length))) {
      if (!confirm('⚠️ ملاحظات قبل التحويل:\n• ' + (r.warnings || []).join('\n• ') + '\n\nمتابعة؟')) { if (btn) btn.disabled = false; return; }
      r = await orderActions.submitProductionToShipping({ ...base, bypassWarnings: true });
    }
    // errors → admin override فقط (مع سبب إلزامي)
    if (!r.ok) {
      const isAdmin = currentRole === 'admin' || currentRole === 'operation_manager';
      if (!isAdmin || !r.errors?.length) { if (btn) btn.disabled = false; return toast('⛔ ' + (r.errors || []).join(' · '), 'err'); }
      if (!confirm('⛔ مشاكل تمنع التحويل:\n• ' + r.errors.join('\n• ') + '\n\nتحويل رغم ذلك؟ (admin override)')) { if (btn) btn.disabled = false; return; }
      const reason = prompt('سبب الـ override (إلزامي للسجل):', '');
      if (!reason || !reason.trim()) { if (btn) btn.disabled = false; return toast('❌ سبب الـ override مطلوب', 'err'); }
      const or = await orderActions.adminOverrideToShipping({
        db, orderId: currentOrder._id, role: currentRole,
        userId: currentUser?.uid || '', userName,
        nextAssigneeId: shipId, nextAssigneeName: shipName,
        overrideReason: reason.trim(),
      });
      if (!or.ok) { if (btn) btn.disabled = false; return toast('⛔ ' + (or.errors || []).join(' · '), 'err'); }
    }
    closeShipPicker();
    toast('🚚 تم التحويل للشحن', 'ok');
    setTimeout(() => goBack(), 700);
  } catch (e) {
    console.error('[confirmShip]', e);
    toast('❌ خطأ: ' + e.message, 'err');
  } finally {
    if (btn) btn.disabled = false;
  }
};

onAuthStateChanged(auth, async u => {
  if (!u) { location.href = 'login.html'; return; }
  currentUser = u;
  userName = u.displayName || u.email || 'مستخدم';

  // Load user role + permissions for sidebar
  try {
    const userDoc = await getDoc(doc(db, 'users', u.uid));
    const ud = userDoc.exists() ? userDoc.data() : {};
    currentRole = ud.role || 'customer_service';
    currentUserPerms = ud.permissions || null;
    userName = ud.name || userName;
    $('nav-name').textContent = userName;
    $('nav-av').textContent = (userName[0]||'?').toUpperCase();
    $('role-badge').textContent = currentRole;
    window.B2CSidebar?.init({...ud, role: currentRole}, 'order.html');
  } catch (e) {
    console.warn('user load error', e);
  }

  loadDesigners();

  // Validate orderId
  if (!orderId) {
    renderError('لا يوجد معرف أوردر في الـ URL');
    return;
  }

  // Load shipping officers for the ship picker — only for roles that can advance
  // production → shipping (RULE C2: central STAGE_PERMISSIONS, no hardcoded list).
  if ((STAGE_PERMISSIONS.production || []).includes(currentRole)) {
    try {
      dataCache.subscribe(cachedQuery('employees').where('role','==','shipping_officer').limit(100).build(),(docs)=>{
        const seen = new Set();
        shipOfficers = docs.filter(e => { if (seen.has(e._id)) return false; seen.add(e._id); return true; });
      });
    } catch (e) { console.warn('ship officers load error', e?.message); }
  }

  // Load deps for inline cost entry — only for roles that can record cost (RULE 8 / P1.2)
  // production_agent + admin + operation_manager.
  const canRecordCost = ['admin','operation_manager','production_agent'].includes(currentRole);
  if (canRecordCost) {
    try {
      dataCache.subscribe(cachedQuery('suppliers_v2').limit(500).build(),(docs)=>{
        suppliers = docs;
        repopulateCostModalLists();
      });
      getDoc(doc(db,'master_lists','supplier_categories')).then(s => {
        if (s.exists()) {
          const items = (s.data().items || []).filter(c => c.isActive !== false && c.isCostItem !== false);
          costCategoriesList = items.map(c => c.name || c.label || '').filter(Boolean);
        }
      }).catch(e => console.warn('[order] master_lists load failed:', e?.message));
      // Historical cost items من آخر 100 أوردر (RULE G3 — bounded query)
      // لاقتراح بنود مشابهة عند تسجيل بند جديد.
      try {
        const { orderBy, getDocs } = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js");
        const recentSnap = await getDocs(query(
          collection(db,'orders'),
          orderBy('updatedAt','desc'),
          limit(100)
        ));
        const items = [];
        recentSnap.forEach(d => {
          const data = d.data() || {};
          const ci = Array.isArray(data.costItems) ? data.costItems : [];
          for (const c of ci) {
            if (!c || !c.type || !(parseFloat(c.total) > 0)) continue;
            items.push({
              type: c.type || '',
              total: parseFloat(c.total) || 0,
              supplierId: c.supplierId || '',
              supplierName: c.supplierName || '',
              note: c.note || '',
              date: c.date || '',
            });
          }
        });
        historicalCostItems = items;
      } catch (e) { console.warn('historical cost load skipped', e?.message); }
    } catch (e) {
      console.warn('cost-deps load error', e);
    }
  }

  // Subscribe to order
  try {
    unsubscribe = onSnapshot(doc(db, 'orders', orderId), snap => {
      if (snap.exists()) renderOrder({ ...snap.data(), _id: snap.id });
      else renderError('الأوردر غير موجود');
    }, err => {
      console.warn('onSnapshot error', err);
      renderError('فشل تحميل الأوردر');
    });
  } catch (e) {
    renderError('خطأ: ' + e.message);
  }
});

window.addEventListener('beforeunload', () => {
  if (unsubscribe) { try { unsubscribe(); } catch(_) {} }
});

// ══════════════════════════════════════════
// COST MODAL — inline cost-item entry per product (Phase 0.5)
// ══════════════════════════════════════════
// Strategy:
//   - One modal at end of page, repurposed per product via activeProdIdxForCost
//   - On save → routes through orderActions.recordCostItem (RULE A1 central action)
//   - Suppliers/wallets/categories loaded once after auth (when canRecordCost)

// النوع master = single source of truth من master_lists/supplier_categories.
// Suppliers يتفلتروا حسب specialties[].includes(selectedType).
// (RULE M1 — Materials & Finishings Principle + RULE C2 — Central Constants)

function repopulateCostModalLists() {
  // Type select — مصدر واحد من master_lists (لا free-text، لا defaults)
  const tSel = $('cm-type');
  const tEmpty = $('cm-type-empty');
  if (tSel) {
    const cur = tSel.value;
    if (!costCategoriesList.length) {
      tSel.innerHTML = '<option value="">— لا توجد بنود مُعرَّفة —</option>';
      if (tEmpty) tEmpty.style.display = 'block';
    } else {
      tSel.innerHTML = '<option value="">— اختر نوع البند —</option>' +
        costCategoriesList.map(t => '<option value="'+esc(t)+'">'+esc(t)+'</option>').join('');
      if (tEmpty) tEmpty.style.display = 'none';
      // restore previous selection if still valid
      if (cur && costCategoriesList.includes(cur)) tSel.value = cur;
    }
    if (__ssType) __ssType.refresh();
  }
  // Supplier — يتفلتر حسب النوع المختار
  refilterSuppliersByType();
}

// إعادة تعبئة الـ supplier select حسب نوع البند المختار (specialties match)
function refilterSuppliersByType() {
  const tSel = $('cm-type');
  const supSel = $('cm-supplier');
  const supEmpty = $('cm-sup-empty');
  if (!supSel) return;
  const t = tSel?.value || '';
  const cur = supSel.value;
  let filtered;
  if (!t) {
    // ما اختار نوع لسه → اظهر كل الموردين (الأقل تقييداً)
    filtered = suppliers;
  } else {
    filtered = suppliers.filter(s => {
      const specs = Array.isArray(s.services) ? s.services : (Array.isArray(s.specialties) ? s.specialties : (s.printType ? [s.printType] : []));
      return specs.includes(t);
    });
  }
  supSel.innerHTML = '<option value="">— بدون مورد —</option>' +
    filtered.map(s => {
      const specs = Array.isArray(s.services) ? s.services : (Array.isArray(s.specialties) ? s.specialties : (s.printType ? [s.printType] : []));
      const sec = specs.length ? '🏷️ ' + specs.slice(0,3).join(' · ') : '';
      return '<option value="'+esc(s._id)+'" data-name="'+esc(s.name||'')+'" data-secondary="'+esc(sec)+'">'+esc(s.name||'مورد')+'</option>';
    }).join('');
  // restore selection if the previously chosen supplier is still in the filtered list
  if (cur && filtered.some(s => s._id === cur)) supSel.value = cur;
  // empty hint
  if (supEmpty) supEmpty.style.display = (t && filtered.length === 0) ? 'block' : 'none';
  if (__ssSupplier) __ssSupplier.refresh();
}

// اقتراح بنود سابقة مشابهة (filter by type/supplier — top 5 most recent)
function renderHistoricalSuggestions(typeQuery, supplierIdQuery) {
  const wrap = $('cm-history-wrap');
  const list = $('cm-history-list');
  if (!wrap || !list) return;
  const t = (typeQuery || '').trim();
  const sid = supplierIdQuery || '';
  // Filter: match type (substring) OR match supplier
  let items = historicalCostItems;
  if (t) {
    items = items.filter(c => c.type && c.type.toLowerCase().includes(t.toLowerCase()));
  } else if (sid) {
    items = items.filter(c => c.supplierId === sid);
  } else {
    // no query → hide
    wrap.style.display = 'none';
    return;
  }
  // dedup by (type|supplierId|total|note) signature, then take top 5
  const seen = new Set();
  const uniq = [];
  for (const c of items) {
    const sig = (c.type||'') + '|' + (c.supplierId||'') + '|' + c.total + '|' + (c.note||'');
    if (seen.has(sig)) continue;
    seen.add(sig);
    uniq.push(c);
    if (uniq.length >= 5) break;
  }
  if (!uniq.length) { wrap.style.display = 'none'; return; }
  list.innerHTML = uniq.map((c, i) =>
    '<button type="button" class="cm-hist-item" onclick="applyHistoricalSuggestion(' + i + ')" '
    + 'style="text-align:right;background:var(--bg3);border:1px solid var(--line);border-radius:var(--rad);padding:8px 10px;cursor:pointer;font-family:inherit;color:var(--snow);font-size:12px;font-weight:600;display:flex;justify-content:space-between;gap:8px;align-items:center">'
    + '<div class="flex-1 min-w-0"><div class="text-snow">' + esc(c.type) + (c.supplierName ? ' · <span style="color:var(--dim2);font-weight:600">🏭 ' + esc(c.supplierName) + '</span>' : '') + '</div>'
    + (c.note ? '<div style="color:var(--dim2);font-size:11px;margin-top:2px;font-weight:500">' + esc(c.note) + '</div>' : '')
    + '</div>'
    + '<span style="color:var(--g);font-weight:800;white-space:nowrap">' + (c.total||0).toLocaleString('ar-EG') + ' ج</span>'
    + '</button>'
  ).join('');
  // stash for click handler
  window.__cmHistFiltered = uniq;
  wrap.style.display = 'block';
}

window.applyHistoricalSuggestion = function(idx) {
  const items = window.__cmHistFiltered || [];
  const c = items[idx];
  if (!c) return;
  // النوع: select فقط — لو موجود في القائمة. لو غير موجود (deprecated category)، نتجاهل
  const tSel = $('cm-type');
  if (tSel && c.type && [...tSel.options].some(o => o.value === c.type)) {
    tSel.value = c.type;
    tSel.dispatchEvent(new Event('change', { bubbles: true })); // يحدث الـ searchable + يفلتر الموردين
  }
  $('cm-total').value = c.total || '';
  if (c.note) $('cm-note').value = c.note;
  if (c.supplierId) {
    const supSel = $('cm-supplier');
    // ensure option exists (case: supplier no longer matches the type filter)
    if (![...supSel.options].some(o => o.value === c.supplierId)) {
      const opt = document.createElement('option');
      opt.value = c.supplierId;
      opt.textContent = c.supplierName || 'مورد';
      opt.dataset.name = c.supplierName || '';
      supSel.appendChild(opt);
      if (__ssSupplier) __ssSupplier.refresh();
    }
    supSel.value = c.supplierId;
    supSel.dispatchEvent(new Event('change', { bubbles: true })); // يحدث الـ searchable trigger
  }
  // re-filter suggestions based on new selections
  renderHistoricalSuggestions(c.type, c.supplierId);
};

function renderCostTypeChips() {
  const wrap = $('cm-type-chips');
  if (!wrap) return;
  // المصدر الوحيد للأنواع = master_lists/supplier_categories (لا defaults، لا free-text).
  const all = costCategoriesList.slice(0, 8);
  wrap.innerHTML = all.map(t =>
    '<button type="button" class="cm-chip" onclick="selectCostTypeChip(this,\''+esc(t).replace(/\\/g,'\\\\').replace(/\'/g,"\\'")+'\')">'+esc(t)+'</button>'
  ).join('');
}

window.selectCostTypeChip = function(btn, type) {
  document.querySelectorAll('#cm-type-chips .cm-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const tSel = $('cm-type');
  if (tSel) {
    // إذا النوع موجود في القائمة — اختاره. إذا غير موجود (الأدمن لسه ما أضافه) — تجاهل.
    if ([...tSel.options].some(o => o.value === type)) {
      tSel.value = type;
      // dispatch change → يحدث الـ searchable trigger + يطلق bindCostModalListeners (filter + history)
      tSel.dispatchEvent(new Event('change', { bubbles: true }));

};

window.openCostModal = function(prodIdx) {
  if (!currentOrder) return;
  if (!['admin','operation_manager','production_agent'].includes(currentRole)) {
    return toast('ليس لديك صلاحية تسجيل بنود تكلفة', 'err');
  }
  activeProdIdxForCost = prodIdx;
  const products = currentOrder.products || [];
  const p = products[prodIdx] || {};
  const pname = p.productName || p.name || p.title || 'منتج';
  $('cm-prod-name').textContent = (currentOrder.orderId || currentOrder._id.slice(-6)) + ' · ' + pname + ' × ' + (p.quantity||p.qty||0);
  // reset form (لازم نعمل reset قبل repopulate عشان الـ select يبدأ نظيف)
  $('cm-total').value = '';
  $('cm-note').value = '';
  document.querySelectorAll('#cm-type-chips .cm-chip').forEach(b => b.classList.remove('active'));
  repopulateCostModalLists();
  renderCostTypeChips();
  // بعد التعبئة، تأكد إن الـ selects على القيمة الافتراضية
  $('cm-type').value = '';
  $('cm-supplier').value = '';
  refilterSuppliersByType();
  // فعّل searchable selects (idempotent — يرجّع نفس الـ instance إذا اتعمل قبل كده)
  if (!__ssType) {
    __ssType = makeSearchable($('cm-type'), {
      placeholder: 'ابحث عن نوع البند...',
      emptyText: 'لا توجد بنود مطابقة',
      recentKey: 'cost-type',          // 🕒 آخر 5 أنواع
      maxRecent: 5,
    });
  } else __ssType.refresh();
  if (!__ssSupplier) {
    __ssSupplier = makeSearchable($('cm-supplier'), {
      placeholder: 'ابحث عن مورد...',
      emptyText: 'لا يوجد موردون مطابقون',
      recentKey: 'cost-supplier',      // 🕒 آخر 5 موردين
      maxRecent: 5,
    });
  } else __ssSupplier.refresh();
  // اقتراحات أولية: لو المنتج له بنود سابقة بنفس النوع، أعرضها
  // (نستخدم product name كـ hint مبدئي — لكن في الغالب الـ list هتفضل مخفية حتى المستخدم يكتب)
  renderHistoricalSuggestions('', '');
  // إعادة ربط الـ events (idempotent)
  bindCostModalListeners();
  $('cm-overlay').classList.add('open');
  setTimeout(() => $('cm-total')?.focus(), 100);
};

// ربط event listeners على select النوع + select المورد لتحديث الاقتراحات والـ filter
let __cmListenersBound = false;
function bindCostModalListeners() {
  if (__cmListenersBound) return;
  __cmListenersBound = true;
  const tSel = $('cm-type');
  if (tSel) tSel.addEventListener('change', () => {
    // sync chips: highlight اللي matches الـ select
    document.querySelectorAll('#cm-type-chips .cm-chip').forEach(b => {
      b.classList.toggle('active', b.textContent === tSel.value);
    });
    // فلتر الموردين حسب النوع
    refilterSuppliersByType();
    // اقتراحات بنود سابقة لنفس النوع
    renderHistoricalSuggestions(tSel.value, $('cm-supplier')?.value || '');
  });
  const supSel = $('cm-supplier');
  if (supSel) supSel.addEventListener('change', () => {
    renderHistoricalSuggestions($('cm-type')?.value || '', supSel.value);
  });
}

window.closeCostModal = function() {
  $('cm-overlay').classList.remove('open');
  activeProdIdxForCost = -1;
};

window.saveCostItem = async function() {
  if (!currentOrder || activeProdIdxForCost < 0) return;
  const btn = $('cm-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ جاري الحفظ...'; }
  try {
    const type = ($('cm-type').value || '').trim();
    const total = parseFloat($('cm-total').value);
    const supId = $('cm-supplier').value || '';
    const supOpt = $('cm-supplier').options[$('cm-supplier').selectedIndex];
    const supName = (supOpt?.dataset?.name) || '';
    const note = ($('cm-note').value || '').trim();

    if (!type) { toast('اختر/اكتب نوع البند', 'err'); return; }
    if (!(total > 0)) { toast('أدخل مبلغ صحيح', 'err'); return; }

    // ملاحظة: تم إلغاء حقل المحفظة. البند يُسجَّل بدون خصم فوري؛
    // الدفع للمورد يتم لاحقاً عبر شاشة طلبات الدفع (payment_requests).
    const r = await orderActions.recordCostItem({
      db, orderId: currentOrder._id,
      prodIdx: activeProdIdxForCost,
      payload: { type, total, supplierId: supId, supplierName: supName, note, isExternal: !!supId },
      role: currentRole, userId: currentUser?.uid || '', userName,
      wallets: [],
      allowedTypes: costCategoriesList,
    });
    if (!r.ok) {
      toast('❌ ' + (r.errors || ['فشل الحفظ']).join(' · '), 'err');
      return;
    }
    if (r.warnings && r.warnings.length) {
      toast('⚠️ ' + r.warnings.join(' · '), 'warn');
    }
    toast('✓ تم تسجيل البند', 'ok');
    closeCostModal();
  } catch (e) {
    console.error(e);
    toast('❌ خطأ: ' + (e.message || e), 'err');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '💾 حفظ البند'; }
  }
};
</script>
</body>
</html>
