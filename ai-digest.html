<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<title>📋 الموجز اليومي — AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--bg4:#252d3e;
  --line:#2a3348;--snow:#e8eaf0;--dim:#8892a4;--dim2:#5c6878;
  --accent:#4f8ef7;--g:#34d399;--r:#f87171;--y:#fbbf24;--pu:#a78bfa;
  --ai:#10b981;--ai2:#059669;
}
body{background:var(--bg);color:var(--snow);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding-bottom:40px}
a{color:inherit;text-decoration:none}

.topbar{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--line);padding:0 16px;height:52px;display:flex;align-items:center;gap:12px}
.topbar-back{width:34px;height:34px;border-radius:10px;background:var(--bg3);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--dim)}
.topbar-title{font-size:15px;font-weight:700;flex:1}
.topbar-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-weight:700}
.topbar-date{font-size:11px;color:var(--dim2)}

.wrap{max-width:760px;margin:0 auto;padding:16px}

/* Header card */
.head-card{background:linear-gradient(135deg,rgba(16,185,129,.12),rgba(79,142,247,.06));border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}
.head-title{font-size:18px;font-weight:800;margin-bottom:4px}
.head-sub{font-size:13px;color:var(--dim);line-height:1.6}
.head-actions{display:flex;gap:8px;margin-top:12px}
.btn{padding:8px 14px;background:var(--bg3);border:1px solid var(--line);color:var(--snow);border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:linear-gradient(135deg,#10b981,#059669);border:none;color:#fff;font-weight:700}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.kpi{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
.kpi-val{font-size:18px;font-weight:800;color:var(--snow)}
.kpi-lbl{font-size:10px;color:var(--dim2);margin-top:2px}
.kpi-delta{font-size:10px;margin-top:2px}
.kpi-delta.up{color:var(--g)}
.kpi-delta.down{color:var(--r)}

/* Section header */
.sec-h{font-size:13px;font-weight:700;color:var(--snow);margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.sec-h .count{font-size:11px;color:var(--dim);font-weight:600;background:var(--bg3);padding:2px 8px;border-radius:20px}

/* Anomaly cards */
.anom{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;border-right:3px solid var(--dim2)}
.anom.high{border-right-color:var(--r);background:rgba(248,113,113,.04)}
.anom.medium{border-right-color:var(--y);background:rgba(251,191,36,.04)}
.anom.low{border-right-color:var(--g);background:rgba(52,211,153,.04)}
.anom.info{border-right-color:var(--accent);background:rgba(79,142,247,.04)}
.anom-ico{font-size:20px;flex-shrink:0;margin-top:2px}
.anom-body{flex:1;min-width:0}
.anom-title{font-size:13px;font-weight:700;color:var(--snow);margin-bottom:4px}
.anom-detail{font-size:12px;color:var(--dim);line-height:1.6;margin-bottom:6px}
.anom-suggest{font-size:11px;color:var(--ai);background:rgba(16,185,129,.08);padding:4px 8px;border-radius:6px;display:inline-block}

/* AI narrative */
.narrative{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;font-size:13px;line-height:1.8;color:var(--snow);white-space:pre-wrap}
.narrative strong{color:var(--ai)}
.narrative .skel{background:var(--bg3);border-radius:6px;animation:pulse 1.2s ease-in-out infinite;display:block;margin-bottom:8px}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}

.empty{text-align:center;padding:28px;color:var(--dim);font-size:13px;border:1px dashed var(--line);border-radius:12px}
.err{color:var(--r);background:rgba(248,113,113,.06);border:1px solid var(--r);border-radius:10px;padding:12px;font-size:12px;margin-bottom:12px}
</style>
<script type="module" src="inbox-badge.js"></script>
<script type="module" src="suggestions-fab.js"></script>
<script src="smart-sidebar.js?v=1" defer></script>
<script src="pwa-install.js?v=1" defer></script>
<script type="module" src="ai-launcher.js?v=1" defer></script>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="topbar-back">←</a>
  <span class="topbar-title">📋 الموجز اليومي</span>
  <span class="topbar-date" id="topbar-date"></span>
  <span class="topbar-badge">AI Brief</span>
</div>

<div class="wrap">

  <div class="head-card">
    <div class="head-title">صباح الخير 👋</div>
    <div class="head-sub" id="head-sub">جاري تجهيز ملخص اليوم...</div>
    <div class="head-actions">
      <button class="btn primary" id="refresh-btn" onclick="refresh()">
        <span id="refresh-ico">🔄</span> تحديث
      </button>
      <a href="ai-insights.html" class="btn">📊 تحليل أعمق</a>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="sec-h">⚠️ ما يحتاج اهتمامك <span class="count" id="anom-count">0</span></div>
  <div id="anomalies"></div>

  <div class="sec-h">✨ ملخّص ذكي</div>
  <div class="narrative" id="narrative">
    <span class="skel" style="height:14px;width:90%"></span>
    <span class="skel" style="height:14px;width:75%"></span>
    <span class="skel" style="height:14px;width:85%"></span>
  </div>

</div>

<script type="module">
import { auth, db, AppState, ROLES, initAuth, startListeners } from './shared.js';
import { askAI, hasKey } from './ai-engine.js';
import { detectAnomalies, SEVERITY } from './ai-anomalies.js';

const fn = n => Math.round(parseFloat(n)||0).toLocaleString('ar-EG');
const tsMs = ts => ts?.toDate?.()?.getTime() || ((ts?.seconds||0)*1000) || 0;
const set = (id,v) => { const e=document.getElementById(id); if(e) e.textContent=v; };

// ── Date in topbar ──
set('topbar-date', new Date().toLocaleDateString('ar-EG', { weekday: 'long', day: 'numeric', month: 'long' }));

let dataReady = false;

initAuth(state => {
  set('head-sub', `أهلاً ${state.userName} — هذا ملخص الأرقام والأمور اللي تحتاج اهتمامك اليوم.`);
  startListeners({
    onOrders:  () => { dataReady = true; render(); },
    onClients: () => render(),
    onWallets: () => render(),
  });
}, () => { window.location.href = 'login.html'; });

let lastNarrative = '';

async function render() {
  if (!dataReady) return;
  const orders  = AppState.orders  || [];
  const clients = AppState.clients || [];
  const wallets = AppState.wallets || [];

  renderKPIs(orders);
  renderAnomalies({ orders, clients, wallets });
  renderNarrative({ orders, clients, wallets });
}

function renderKPIs(orders) {
  const now = Date.now();
  const today0 = new Date(); today0.setHours(0,0,0,0);
  const todayMs = today0.getTime();
  const ystr0 = todayMs - 864e5;

  const today = orders.filter(o => tsMs(o.createdAt) >= todayMs);
  const ystr  = orders.filter(o => { const t = tsMs(o.createdAt); return t >= ystr0 && t < todayMs; });

  const paid = o => parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0;
  const todayRev = today.reduce((s,o) => s + paid(o), 0);
  const ystrRev  = ystr.reduce((s,o) => s + paid(o), 0);
  const delta = ystrRev > 0 ? Math.round(((todayRev - ystrRev)/ystrRev)*100) : 0;

  const inProd = orders.filter(o => ['production','printing'].includes(o.stage)).length;
  const ready  = orders.filter(o => o.stage === 'ready').length;
  const late   = orders.filter(o => !['delivered','archived','cancelled'].includes(o.stage) && tsMs(o.deliveryDate) && tsMs(o.deliveryDate) < now).length;

  const kpis = [
    { val: today.length, lbl: 'أوردر اليوم' },
    { val: fn(todayRev) + ' ج', lbl: 'إيراد اليوم', delta: delta !== 0 ? `${delta > 0 ? '↑' : '↓'} ${Math.abs(delta)}% عن أمس` : '', dir: delta > 0 ? 'up' : 'down' },
    { val: inProd, lbl: 'قيد الإنتاج' },
    { val: ready, lbl: 'جاهز للشحن' },
    { val: late, lbl: 'متأخر', dir: late > 0 ? 'down' : '' },
  ];

  document.getElementById('kpis').innerHTML = kpis.map(k => `
    <div class="kpi">
      <div class="kpi-val">${k.val}</div>
      <div class="kpi-lbl">${k.lbl}</div>
      ${k.delta ? `<div class="kpi-delta ${k.dir}">${k.delta}</div>` : ''}
    </div>`).join('');
}

function renderAnomalies(data) {
  const list = detectAnomalies(data);
  set('anom-count', list.length);
  const wrap = document.getElementById('anomalies');
  if (list.length === 0) {
    wrap.innerHTML = `<div class="empty">✅ كل شيء يبدو على ما يرام — لا توجد تنبيهات.</div>`;
    return;
  }
  wrap.innerHTML = list.map(a => {
    const sev = SEVERITY[a.severity] || SEVERITY.info;
    return `
      <div class="anom ${a.severity}">
        <div class="anom-ico">${sev.ico}</div>
        <div class="anom-body">
          <div class="anom-title">${a.title}</div>
          <div class="anom-detail">${a.detail}</div>
          ${a.suggestion ? `<div class="anom-suggest">💡 ${a.suggestion}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

async function renderNarrative(data) {
  const nar = document.getElementById('narrative');
  if (!hasKey()) {
    nar.innerHTML = `<div style="color:var(--dim);font-size:13px">أضف مفتاح Gemini من <a href="ai-insights.html" style="color:var(--accent)">صفحة AI Insights</a> أو من الزر العائم 🧠 لتفعيل الملخص الذكي.</div>`;
    return;
  }

  const anomalies = detectAnomalies(data);
  const orders = data.orders;
  const cutoff7 = Date.now() - 7*864e5;
  const recent = orders.filter(o => tsMs(o.createdAt) >= cutoff7);
  const paid = o => parseFloat(o.totalPaid)||parseFloat(o.paid)||parseFloat(o.deposit)||0;
  const rev7 = recent.reduce((s,o) => s + paid(o), 0);

  const summary = `
بيانات حقيقية لشركة طباعة (B2C ERP) ليوم ${new Date().toLocaleDateString('ar-EG')}:
- أوردرات آخر 7 أيام: ${recent.length}
- إيراد آخر 7 أيام: ${fn(rev7)} ج
- إجمالي العملاء: ${data.clients.length}
- محافظ نشطة: ${(data.wallets||[]).filter(w => !w.isDeleted).length}

التنبيهات المُكتشفة آلياً:
${anomalies.length ? anomalies.map(a => `- [${a.severity.toUpperCase()}] ${a.title} — ${a.detail}`).join('\n') : '- لا توجد تنبيهات'}
`.trim();

  const prompt = `${summary}

اكتب موجز يومي قصير (3-5 جمل) للإدارة بالعربية. ركّز على:
1. أبرز رقم/إنجاز اليوم
2. أهم تنبيه يحتاج اهتمام (إن وُجد)
3. أولوية واحدة محددة لباقي اليوم

استخدم نبرة عملية مباشرة، بدون مقدمات. ضع **النقاط المهمة** بين نجمتين.`;

  try {
    const text = await askAI(prompt, { maxTokens: 600, temperature: 0.5 });
    if (text === lastNarrative) return; // avoid replacing same content
    lastNarrative = text;
    nar.innerHTML = text
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  } catch (e) {
    nar.innerHTML = `<div class="err">⚠️ تعذّر توليد الملخص: ${e.message}</div>`;
  }
}

window.refresh = function() {
  set('refresh-ico','⏳');
  document.getElementById('refresh-btn').disabled = true;
  lastNarrative = '';
  document.getElementById('narrative').innerHTML = `
    <span class="skel" style="height:14px;width:90%"></span>
    <span class="skel" style="height:14px;width:75%"></span>
    <span class="skel" style="height:14px;width:85%"></span>`;
  setTimeout(() => {
    render();
    set('refresh-ico','🔄');
    document.getElementById('refresh-btn').disabled = false;
  }, 200);
};
</script>
</body>
</html>
