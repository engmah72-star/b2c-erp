<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">
<title>طلباتي المالية — Business2Card</title>
<link rel="stylesheet" href="shared.css?v=21">
<link rel="stylesheet" href="design-system/components.css?v=1">
<script src="sidebar-config.js"></script>
<script src="sidebar.js"></script>
<style>
  .tabs-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:var(--space-sm)}
  .tab{padding:8px 14px;border-radius:var(--rad);border:1px solid transparent;background:transparent;color:var(--dim2);cursor:pointer;font-weight:var(--fw-bold);font-size:var(--fs-base);font-family:inherit;display:flex;align-items:center;gap:6px;white-space:nowrap}
  .tab.on{background:var(--bg3);color:var(--snow);border-color:var(--line)}
  .tab .badge{background:var(--p);color:#fff;border-radius:var(--rad);padding:1px 7px;font-size:var(--fs-xs);font-weight:var(--fw-extra);min-width:18px;text-align:center}

  .req-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;margin-bottom:10px;transition:all .15s}
  .req-card:hover{border-color:var(--line2)}
  .rc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:var(--space-md);flex-wrap:wrap}
  .rc-title{font-weight:var(--fw-heavy);font-size:var(--fs-lg);color:var(--snow);margin-bottom:4px}
  .rc-meta{font-size:var(--fs-sm);color:var(--dim2)}
  .rc-amount{font-size:var(--fs-3xl);font-weight:var(--fw-heavy);color:var(--y);text-align:left}
  .rc-body{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:var(--space-sm);margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
  .rc-field{font-size:var(--fs-sm);color:var(--dim2)}
  .rc-field b{color:var(--snow);display:block;margin-top:2px;font-size:var(--fs-base)}
  .rc-status{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:14px;font-size:var(--fs-xs);font-weight:var(--fw-extra);margin-top:4px}
  .st-requested{background:rgba(167,139,250,.15);color:var(--p)}
  .st-awaiting_receipt{background:rgba(59,158,255,.15);color:var(--b-bright)}
  .st-pending{background:rgba(255,170,0,.15);color:var(--y)}
  .st-confirmed{background:rgba(59,158,255,.15);color:var(--b-bright)}
  .st-approved{background:rgba(0,217,126,.15);color:var(--g)}
  .st-rejected{background:rgba(255,61,110,.15);color:var(--r)}
  .rc-timeline{margin-top:10px;padding:10px 12px;background:var(--bg3);border-radius:8px;font-size:var(--fs-sm);line-height:1.9}
  .rc-timeline .tl-step{display:flex;align-items:center;gap:var(--space-sm);color:var(--dim2)}
  .rc-timeline .tl-step b{color:var(--snow);font-weight:var(--fw-bold)}
  .rc-timeline .tl-step.done{color:var(--snow)}
  .rc-actions{display:flex;gap:var(--space-sm);margin-top:12px;flex-wrap:wrap}
  .rc-actions button{flex:1;min-width:120px;padding:9px 14px;border-radius:8px;border:1px solid;font-weight:var(--fw-extra);font-size:var(--fs-base);cursor:pointer;font-family:inherit}
  .btn-receive{background:rgba(59,158,255,.15);color:var(--b-bright);border-color:rgba(59,158,255,.4)}
  .btn-cancel{background:rgba(255,61,110,.1);color:var(--r);border-color:rgba(255,61,110,.3)}
  .empty-pl{text-align:center;padding:40px 20px;color:var(--dim2);font-size:var(--fs-md)}

  .req-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-sm);margin-bottom:14px}
  .req-type-btn{padding:14px 8px;border-radius:var(--rad);border:2px solid var(--line);background:var(--bg3);color:var(--snow);cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:var(--space-xs);transition:all .15s}
  .req-type-btn:hover{border-color:var(--p)}
  .req-type-btn.on{border-color:var(--p);background:rgba(167,139,250,.12)}
  .req-type-ico{font-size:24px}
  .req-type-lbl{font-size:var(--fs-sm);font-weight:var(--fw-extra)}

  .receipt-img{max-width:240px;max-height:200px;border-radius:8px;border:1px solid var(--line);cursor:zoom-in}
  .receipt-img:hover{border-color:var(--p)}
</style>
<script src="financial-guard.js"></script>
<script type="module" src="inbox-badge.js"></script>
<script src="smart-sidebar.js?v=1" defer></script>
<script src="viewas.js?v=1" defer></script>
<script src="pwa-install.js?v=1" defer></script>
<script type="module" src="ai-launcher.js?v=1" defer></script>
<script src="theme.js?v=4"></script>
</head>
<body>
<aside class="sidenav" id="sidebar">
  <div class="nav-brand">
    <div class="nav-logo">🎨</div>
    <div>
      <div class="nav-brand-name">Business2Card</div>
      <div class="nav-brand-role" id="nav-role">—</div>
    </div>
  </div>
  <div class="nav-scroll" id="nav-links"></div>
</aside>
<header class="topbar">
  <button class="menu-btn" id="menu-btn">☰</button>
  <div>
    <div class="page-title">📋 طلباتي المالية</div>
    <div class="page-sub">تابع حالة طلباتك واطلب جديد</div>
  </div>
  <div style="margin-right:auto;display:flex;align-items:center;gap:10px">
    <button type="button" onclick="openNewRequest()" style="padding:8px 14px;border-radius:8px;border:1px solid rgba(167,139,250,.4);background:rgba(167,139,250,.15);color:var(--p);cursor:pointer;font-family:inherit;font-size:var(--fs-base);font-weight:var(--fw-extra)">➕ طلب جديد</button>
    <span id="nav-name" style="font-size:var(--fs-md);color:var(--dim2)"></span>
    <button type="button" onclick="logoutBtn()" style="padding:7px 12px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);color:var(--snow);cursor:pointer;font-family:inherit;font-size:var(--fs-base)">خروج</button>
  </div>
</header>

<main class="main">
  <div class="container">
    <div class="tabs-bar">
      <button type="button" class="tab on" id="tab-active" onclick="setTab('active')">🔥 نشطة <span class="badge" id="cnt-active">0</span></button>
      <button type="button" class="tab" id="tab-requested" onclick="setTab('requested')">💸 قيد التنفيذ <span class="badge" id="cnt-requested">0</span></button>
      <button type="button" class="tab" id="tab-awaiting_receipt" onclick="setTab('awaiting_receipt')">📥 ارفع إيصال <span class="badge" id="cnt-awaiting_receipt">0</span></button>
      <button type="button" class="tab" id="tab-pending" onclick="setTab('pending')">⏳ بانتظار التأكيد <span class="badge" id="cnt-pending">0</span></button>
      <button type="button" class="tab" id="tab-confirmed" onclick="setTab('confirmed')">🔵 بانتظار الاعتماد <span class="badge" id="cnt-confirmed">0</span></button>
      <button type="button" class="tab" id="tab-approved" onclick="setTab('approved')">✅ معتمدة <span class="badge" id="cnt-approved">0</span></button>
      <button type="button" class="tab" id="tab-rejected" onclick="setTab('rejected')">❌ مرفوضة <span class="badge" id="cnt-rejected">0</span></button>
    </div>

    <div id="role-banner" style="background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.2);border-radius:var(--rad);padding:10px 14px;margin-bottom:14px;font-size:var(--fs-base);color:var(--dim);line-height:var(--lh-relaxed)"></div>

    <div id="list-content"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</main>

<!-- Modal: طلب جديد -->
<div class="overlay" id="ov-new-req">
  <div class="modal" style="max-width:500px">
    <div class="modal-head"><span class="modal-title">➕ طلب جديد</span><button type="button" class="modal-x" onclick="cM('new-req')">✕</button></div>
    <div class="modal-body">
      <div style="font-size:var(--fs-sm);color:var(--dim2);margin-bottom:10px">اختر نوع الطلب:</div>
      <div class="req-type-grid" id="rq-type-grid"></div>

      <div class="fg"><label>المبلغ المطلوب (ج) *</label><input class="inp" id="rq-amount" type="number" placeholder="0"></div>

      <div id="fg-supplier" class="fg"><label>المورد *</label><select class="inp" id="rq-supplier"><option value="">— اختر —</option></select></div>

      <div id="fg-employee" class="fg hide"><label>الموظف *</label><select class="inp" id="rq-employee"><option value="">— اختر —</option></select></div>
      <div id="fg-salary-type" class="fg hide"><label>النوع *</label><select class="inp" id="rq-salary-type"><option value="salary">مرتب شهري</option><option value="advance">سلفة</option><option value="bonus">مكافأة</option></select></div>
      <div id="fg-month" class="fg hide"><label>الشهر</label><input class="inp" id="rq-month" type="month"></div>

      <div id="fg-client" class="fg hide"><label>العميل *</label><select class="inp" id="rq-client"><option value="">— اختر —</option></select></div>

      <div id="fg-order" class="fg"><label>الأوردر المرتبط <span class="txt-meta-xs">(اختياري)</span></label>
        <select class="inp" id="rq-order"><option value="">— بدون ربط —</option></select>
      </div>
      <div id="rq-order-info" style="display:none;font-size:var(--fs-sm);color:var(--dim2);background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.2);border-radius:8px;padding:8px 10px;margin-bottom:10px"></div>

      <div id="fg-cost-item" class="fg hide">
        <label>📋 بند التكلفة <span style="font-size:var(--fs-xs);color:var(--g);font-weight:var(--fw-medium)">— اختر للملء التلقائي</span></label>
        <select class="inp" id="rq-cost-item"><option value="">— اختر أو املأ يدوياً —</option></select>
      </div>

      <!-- بنود مستحقة للمورد عبر كل الأوردرات — يظهر عند اختيار المورد بدون اختيار أوردر -->
      <div id="fg-supplier-items" class="fg hide">
        <label>📋 بنود مستحقة لـ<span id="rq-si-supname" style="color:var(--g)">المورد</span>
          <span style="font-size:var(--fs-xs);color:var(--dim2);font-weight:var(--fw-medium)">— اختر بند أو أكثر لربطها</span>
        </label>
        <div id="rq-supplier-items-list" style="max-height:260px;overflow-y:auto;border:1px solid var(--line);border-radius:8px;background:var(--bg3)"></div>
        <div id="rq-supplier-items-foot" style="display:none;margin-top:8px;padding:8px 10px;background:rgba(0,217,126,.08);border:1px solid rgba(0,217,126,.25);border-radius:8px;font-size:var(--fs-base);display:flex;justify-content:space-between;align-items:center">
          <span><span id="rq-si-count">0</span> بند محدد</span>
          <span style="font-weight:var(--fw-heavy);color:var(--g)">المجموع: <span id="rq-si-total">0</span> ج</span>
        </div>
      </div>

      <div class="fg"><label>السبب / الملاحظة *</label><textarea class="inp" id="rq-reason" style="min-height:60px" placeholder="مثال: دفعة مقدم لطباعة 200 كارت"></textarea></div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-ghost" onclick="cM('new-req')">إلغاء</button>
      <button type="button" class="btn btn-g" onclick="saveRequest()">💾 إرسال الطلب</button>
    </div>
  </div>
</div>

<!-- Modal: استلام (رفع إيصال) -->
<div class="overlay" id="ov-receipt">
  <div class="modal" style="max-width:440px">
    <div class="modal-head"><span class="modal-title">📥 تأكيد الاستلام</span><button type="button" class="modal-x" onclick="cM('receipt')">✕</button></div>
    <div class="modal-body">
      <div style="font-size:var(--fs-base);color:var(--dim);margin-bottom:10px">ارفع صورة الإيصال لتأكيد استلام التحويل من المحاسب:</div>
      <input type="file" id="receipt-file" accept="image/*" style="width:100%;padding:10px;background:var(--bg3);border:2px dashed var(--line);border-radius:8px;color:var(--snow);font-family:inherit">
      <div id="receipt-preview" style="margin-top:10px;text-align:center"></div>
      <div id="receipt-progress" style="display:none;margin-top:10px;font-size:var(--fs-sm);color:var(--dim2)"></div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-ghost" onclick="cM('receipt')">إلغاء</button>
      <button type="button" class="btn btn-g" onclick="uploadReceipt()" id="receipt-save-btn">📤 رفع وتأكيد</button>
    </div>
  </div>
</div>

<div id="toast" style="position:fixed;bottom:30px;right:50%;transform:translateX(50%);padding:12px 22px;border-radius:var(--rad);background:var(--bg2);border:1px solid var(--line);color:var(--snow);font-size:var(--fs-md);font-weight:var(--fw-bold);z-index:9999;display:none;font-family:inherit"></div>

<script type="module">
import { app, auth, db, storage } from "./core/firebase-init.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, doc, getDoc, onSnapshot, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { approvalActions } from "./approval-actions.js";
import { ref as sRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
import { STAGE_AR, ROLE_LABELS } from "./core/shared-constants.js";
let currentUid='', currentUserName='', currentRole='', currentPerms={};
let requests = [];
let activeTab = 'active';
let suppliers = [];
let employees = [];
let ordersMap = new Map();
let activeReqType = 'supplier_payment';
let receivingReq = null;
let __receiptFile = null;

const fn = n => (parseFloat(n)||0).toLocaleString('ar-EG');
const escapeHtml = s => String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const REQ_TYPE_LBL = { supplier_payment:'🏭 دفعة مورد', salary:'👤 مرتب/سلفة', client_refund:'↩️ استرداد عميل', general:'💸 مصروف عام' };
const REQ_TYPE_CARDS = {
  supplier_payment: { ico:'🏭', lbl:'دفعة مورد' },
  client_refund:    { ico:'↩️', lbl:'استرداد عميل' },
  salary:           { ico:'👤', lbl:'مرتب / سلفة' },
  general:          { ico:'💸', lbl:'مصروف عام' },
};
const STATUS_LBL = {
  requested:'💸 قيد التنفيذ',
  awaiting_receipt:'📥 بانتظار رفعك للإيصال',
  pending:'⏳ بانتظار تأكيد المدير',
  confirmed:'🔵 بانتظار اعتماد الأدمن',
  approved:'✅ معتمد ومُسجَّل',
  rejected:'❌ مرفوض',
};
function buildSidebar(){
  const userData = { role: currentRole, permissions: currentPerms || {} };
  B2CSidebar.build(userData, 'my-requests.html');
  document.getElementById('nav-role').textContent = ROLE_LABELS[currentRole] || currentRole;
  document.getElementById('nav-name').textContent = currentUserName;
}

document.getElementById('menu-btn')?.addEventListener('click', ()=>{
  document.getElementById('sidebar')?.classList.toggle('open');
});

window.logoutBtn = async function(){
  try{ await signOut(auth); }catch(e){}
  window.location.href = 'login.html';
};

window.cM = function(id){ document.getElementById('ov-'+id)?.classList.remove('open'); };
window.oM = function(id){ document.getElementById('ov-'+id)?.classList.add('open'); };

function showToast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = type === 'err' ? 'rgba(255,61,110,.4)' : type === 'ok' ? 'rgba(0,217,126,.4)' : 'var(--line)';
  t.style.display = 'block';
  setTimeout(()=>{ t.style.display = 'none'; }, 3500);
}

function allowedRequestTypes(){
  const role = currentRole;
  if(['admin','operation_manager'].includes(role)) return ['supplier_payment','client_refund','salary','general'];
  if(role === 'production_agent') return ['supplier_payment','salary'];
  if(role === 'customer_service') return ['client_refund','salary'];
  return ['salary'];
}

function canRequestForOthers(){
  return ['admin','operation_manager'].includes(currentRole);
}

function updateRoleBanner(){
  const allowed = allowedRequestTypes();
  const lbls = allowed.map(t=>REQ_TYPE_LBL[t]||t).join(' · ');
  document.getElementById('role-banner').innerHTML = `<b>${ROLE_LABELS[currentRole]||currentRole}:</b> تقدر تطلب: ${lbls}`;
}

onAuthStateChanged(auth, async u=>{
  if(!u){ window.location.href='login.html'; return; }
  currentUid = u.uid;
  try{
    const userSnap = await getDoc(doc(db,'users',u.uid));
    if(!userSnap.exists()){
      document.body.innerHTML = '<div style="padding:40px;text-align:center;color:var(--r)">⛔ بيانات المستخدم غير موجودة</div>';
      return;
    }
    const ud = userSnap.data();
    currentRole = ud.role || '';
    currentUserName = ud.name || u.email || '';
    currentPerms = ud.permissions || {};
    buildSidebar();
    updateRoleBanner();
    startListeners();
  }catch(e){
    document.body.innerHTML = `<div style="padding:40px;text-align:center;color:var(--r)">⛔ ${e.message}</div>`;
  }
});

function startListeners(){
  // طلباتي فقط (RULE G3: bounded per user — 500 historical requests max).
  onSnapshot(query(collection(db,'payment_requests'), where('requestedBy','==',currentUid), limit(500)),
    snap=>{
      requests = snap.docs.map(d=>({...d.data(),_id:d.id}));
      requests.sort((a,b)=>{
        const ta = a.requestedAt?.toMillis?.()||0;
        const tb = b.requestedAt?.toMillis?.()||0;
        return tb - ta;
      });
      render();
    },
    err=>{
      console.error('[my-requests] requests:', err);
      document.getElementById('list-content').innerHTML = `<div class="empty-pl">⚠️ فشل تحميل الطلبات: ${escapeHtml(err.message)}</div>`;
    }
  );

  // orders are only used as a lookup map for displayed request rows. Recent 3000.
  onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc'),limit(3000)),
    snap=>{ ordersMap.clear(); snap.docs.forEach(d=>ordersMap.set(d.id, {...d.data(), _id:d.id})); },
    err=>console.error('[my-requests] orders:', err)
  );
  onSnapshot(query(collection(db,'suppliers_v2'),limit(500)),
    snap=>{ suppliers = snap.docs.map(d=>({...d.data(),_id:d.id})); },
    err=>console.error('[my-requests] suppliers:', err)
  );
  onSnapshot(query(collection(db,'employees_v2'),limit(200)),
    snap=>{ employees = snap.docs.map(d=>({...d.data(),_id:d.id})); },
    err=>console.error('[my-requests] employees:', err)
  );
}

window.setTab = function(tab){
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b.id === 'tab-'+tab));
  render();
};

function filterByTab(){
  if(activeTab === 'active'){
    return requests.filter(r => ['requested','awaiting_receipt','pending','confirmed'].includes(r.status));
  }
  return requests.filter(r => r.status === activeTab);
}

function render(){
  // counts
  const counts = { active:0, requested:0, awaiting_receipt:0, pending:0, confirmed:0, approved:0, rejected:0 };
  for(const r of requests){
    if(['requested','awaiting_receipt','pending','confirmed'].includes(r.status)) counts.active++;
    if(counts[r.status] !== undefined) counts[r.status]++;
  }
  Object.keys(counts).forEach(k => {
    const el = document.getElementById('cnt-'+k);
    if(el) el.textContent = counts[k];
  });

  const list = filterByTab();
  const el = document.getElementById('list-content');
  if(!list.length){
    el.innerHTML = `<div class="empty-pl">📭 لا توجد طلبات في هذا القسم</div>`;
    return;
  }
  el.innerHTML = list.map(r => renderCard(r)).join('');
}

function renderCard(r){
  const who = r.supplierName || r.employeeName || r.clientName || '—';
  const typeLbl = REQ_TYPE_LBL[r.type] || r.type;
  const reqDate = r.requestedAt?.toDate?.()?.toLocaleString('ar-EG') || '—';
  const statusKey = r.status || 'requested';
  const orderInfo = r.orderId ? `${escapeHtml(r.orderRefId||r.orderId.slice(-6))} — ${escapeHtml(r.clientName||'—')}` : '';

  // Timeline
  const tl = [];
  tl.push(`<div class="tl-step done">💸 طلبت — <b>${escapeHtml(reqDate)}</b></div>`);
  if(r.executedAt){
    const d = r.executedAt?.toDate?.()?.toLocaleString('ar-EG') || '';
    tl.push(`<div class="tl-step done">✅ نُفِّذ بواسطة <b>${escapeHtml(r.executedByName||'—')}</b> — ${escapeHtml(d)}</div>`);
  }
  if(r.receivedAt){
    const d = r.receivedAt?.toDate?.()?.toLocaleString('ar-EG') || '';
    tl.push(`<div class="tl-step done">📥 استلمت ورفعت إيصال — ${escapeHtml(d)}</div>`);
  }
  if(r.confirmedAt){
    const d = r.confirmedAt?.toDate?.()?.toLocaleString('ar-EG') || '';
    tl.push(`<div class="tl-step done">🔵 أكّد <b>${escapeHtml(r.confirmedByName||'مدير التشغيل')}</b> — ${escapeHtml(d)}</div>`);
  }
  if(r.approvedAt){
    const d = r.approvedAt?.toDate?.()?.toLocaleString('ar-EG') || '';
    tl.push(`<div class="tl-step done">✅ اعتمد <b>${escapeHtml(r.approvedByName||'الأدمن')}</b> — ${escapeHtml(d)}</div>`);
  }
  if(r.rejectedAt){
    const d = r.rejectedAt?.toDate?.()?.toLocaleString('ar-EG') || '';
    tl.push(`<div class="tl-step done" style="color:var(--r)">❌ رُفِض بواسطة <b>${escapeHtml(r.rejectedByName||'—')}</b> — ${escapeHtml(d)}<br><span style="font-size:var(--fs-xs)">السبب: ${escapeHtml(r.rejectReason||'—')}</span></div>`);
  }

  // Actions
  const actions = [];
  if(r.status === 'requested'){
    actions.push(`<button type="button" class="btn-cancel" onclick="cancelMyRequest('${r._id}')">❌ إلغاء الطلب</button>`);
  }
  if(r.status === 'awaiting_receipt'){
    // طلبات الموردين: مدير التشغيل يرفع الإيصال (لا زر للطالب)
    // باقي الأنواع (مرتب/مكافأة/استرداد عميل): الطالب يرفع الإيصال كما كان
    if(r.type !== 'supplier_payment'){
      actions.push(`<button type="button" class="btn-receive" onclick="openReceiptModal('${r._id}')">📥 رفع الإيصال</button>`);
    } else {
      actions.push(`<div style="font-size:var(--fs-sm);color:var(--dim2);padding:var(--space-sm);flex:1;text-align:center">⏳ بانتظار رفع الإيصال من مدير التشغيل</div>`);
    }
  }

  // Receipt image
  let receiptHtml = '';
  if(r.receiptImageUrl){
    receiptHtml = `<div style="margin-top:10px"><img class="receipt-img" src="${r.receiptImageUrl}" onclick="window.open('${r.receiptImageUrl}','_blank')" alt="إيصال" loading="lazy"></div>`;
  }

  return `<div class="req-card">
    <div class="rc-head">
      <div style="flex:1;min-width:0">
        <div class="rc-title">${typeLbl} — ${escapeHtml(who)}</div>
        <div class="rc-meta">${escapeHtml(r.reason||'—')}</div>
        <span class="rc-status st-${statusKey}">${STATUS_LBL[statusKey]||statusKey}</span>
      </div>
      <div class="rc-amount">${fn(r.amount)} ج</div>
    </div>
    ${r.costItemRefs && r.costItemRefs.length > 1 ? `<div class="rc-body"><div class="rc-field" style="grid-column:1/-1">📋 طلب مُجمَّع<b>${r.costItemRefs.length} بند من ${new Set(r.costItemRefs.map(x=>x.orderId)).size} أوردر</b><div style="margin-top:6px;font-size:var(--fs-xs);color:var(--dim2);line-height:var(--lh-relaxed)">${r.costItemRefs.map(x=>`• ${escapeHtml(x.type||'بند')} — ${escapeHtml(x.orderRefId||'')} — ${escapeHtml(x.clientName||'')} — ${fn(x.amount)} ج`).join('<br>')}</div></div></div>` : (orderInfo ? `<div class="rc-body"><div class="rc-field">📦 الأوردر<b>${orderInfo}</b></div>${r.orderStage ? `<div class="rc-field">المرحلة<b>${escapeHtml(STAGE_AR[r.orderStage]||r.orderStage)}</b></div>` : ''}${r.costItemIndex !== undefined ? `<div class="rc-field">بند<b>#${r.costItemIndex+1}</b></div>` : ''}</div>` : '')}
    <div class="rc-timeline">${tl.join('')}</div>
    ${receiptHtml}
    ${actions.length ? `<div class="rc-actions">${actions.join('')}</div>` : ''}
  </div>`;
}

window.cancelMyRequest = async function(reqId){
  const r = requests.find(x=>x._id===reqId);
  if(!r) return;
  if(r.status !== 'requested'){
    showToast('⛔ لا يمكن إلغاء طلب بدأ تنفيذه — تواصل مع الإدارة','err');
    return;
  }
  const reason = prompt('سبب الإلغاء (إجباري):');
  if(!reason || !reason.trim()) return;
  // approvalActions.rejectPaymentRequest يعالج release البنود الـ pending
  const result = await approvalActions.rejectPaymentRequest({db,request:r,reason:'إلغاء من الطالب: '+reason.trim(),userId:currentUid,userName:currentUserName});
  if(!result.ok){
    const handled = window.financialGuard?.({message:(result.errors||[])[0]||'فشل'},{operation:'إلغاء طلب'});
    if(!handled) showToast('❌ '+((result.errors||[]).join(' · ')||'فشل الإلغاء'),'err');
    return;
  }
  showToast('✅ تم إلغاء الطلب','ok');
};

// ══════════════ Modal: طلب جديد ══════════════
window.openNewRequest = function(){
  const allowed = allowedRequestTypes();
  if(!allowed.length){ showToast('⚠️ ليس لديك صلاحية إنشاء طلبات','err'); return; }

  const grid = document.getElementById('rq-type-grid');
  grid.innerHTML = allowed.map((t,i) => {
    const c = REQ_TYPE_CARDS[t] || {ico:'📝',lbl:t};
    return `<button class="req-type-btn${i===0?' on':''}" data-type="${t}" onclick="setReqType('${t}')">
      <div class="req-type-ico">${c.ico}</div><div class="req-type-lbl">${c.lbl}</div>
    </button>`;
  }).join('');

  const supSel = document.getElementById('rq-supplier');
  supSel.innerHTML = '<option value="">— اختر المورد —</option>' + suppliers.map(s=>`<option value="${s._id}" data-name="${escapeHtml(s.name||'')}" data-type="${s.supType||'printer'}">${escapeHtml(s.name||'')}</option>`).join('');

  const empSel = document.getElementById('rq-employee');
  if(canRequestForOthers()){
    empSel.innerHTML = '<option value="">— اختر الموظف —</option>' + employees.map(e=>`<option value="${e._id}" data-name="${escapeHtml(e.name||e.displayName||'')}">${escapeHtml(e.name||e.displayName||'—')}</option>`).join('');
    empSel.disabled = false;
  } else {
    const selfEmp = employees.find(e => e.authUid === currentUid || e._id === currentUid);
    if(selfEmp){
      empSel.innerHTML = `<option value="${selfEmp._id}" data-name="${escapeHtml(selfEmp.name||selfEmp.displayName||'')}" selected>${escapeHtml(selfEmp.name||selfEmp.displayName||currentUserName)} (أنت)</option>`;
    } else {
      empSel.innerHTML = `<option value="${currentUid}" data-name="${escapeHtml(currentUserName)}" selected>${escapeHtml(currentUserName)} (أنت)</option>`;
    }
    empSel.disabled = true;
  }

  const cliSel = document.getElementById('rq-client');
  if(cliSel){
    const cliMap = new Map();
    ordersMap.forEach(o => { if(o.clientId && !cliMap.has(o.clientId)) cliMap.set(o.clientId, o.clientName||''); });
    cliSel.innerHTML = '<option value="">— اختر العميل —</option>' + [...cliMap.entries()].map(([id,name])=>`<option value="${id}" data-name="${escapeHtml(name)}">${escapeHtml(name||'—')}</option>`).join('');
  }

  const ordSel = document.getElementById('rq-order');
  const activeOrders = [...ordersMap.values()].filter(o=>!['archived','cancelled'].includes(o.stage));
  ordSel.innerHTML = '<option value="">— بدون ربط —</option>' + activeOrders.slice(0,200).map(o=>`<option value="${o._id}">${escapeHtml(o.orderId||o._id.slice(-6))} — ${escapeHtml(o.clientName||'—')} — ${escapeHtml(STAGE_AR[o.stage]||o.stage)}</option>`).join('');

  document.getElementById('rq-amount').value = '';
  document.getElementById('rq-reason').value = '';
  document.getElementById('rq-month').value = new Date().toISOString().slice(0,7);
  setReqType(allowed[0]);
  oM('new-req');
};

window.setReqType = function(type){
  activeReqType = type;
  document.querySelectorAll('.req-type-btn').forEach(b=>b.classList.toggle('on', b.dataset.type === type));
  const showSup    = type === 'supplier_payment';
  const showEmp    = type === 'salary';
  const showClient = type === 'client_refund';
  const showOrder  = ['supplier_payment','general','client_refund'].includes(type);
  document.getElementById('fg-supplier').style.display    = showSup    ? '' : 'none';
  document.getElementById('fg-employee').style.display    = showEmp    ? '' : 'none';
  document.getElementById('fg-salary-type').style.display = showEmp    ? '' : 'none';
  document.getElementById('fg-month').style.display       = showEmp    ? '' : 'none';
  const fgClient = document.getElementById('fg-client');
  if(fgClient) fgClient.style.display = showClient ? '' : 'none';
  document.getElementById('fg-order').style.display       = showOrder  ? '' : 'none';
  refreshSupplierItemsList();
};

// ═══════════════════ Supplier Items List (داخل modal الطلب) ═══════════════════
let __supItemsSelected = [];

window.refreshSupplierItemsList = function(){
  const supSel = document.getElementById('rq-supplier');
  const supId = supSel?.value;
  const ordId = document.getElementById('rq-order')?.value;
  const fg = document.getElementById('fg-supplier-items');
  const listEl = document.getElementById('rq-supplier-items-list');
  const foot = document.getElementById('rq-supplier-items-foot');
  __supItemsSelected = [];
  updateSupItemsSum();
  if(!fg || !listEl) return;
  if(activeReqType !== 'supplier_payment' || !supId || ordId){
    fg.style.display = 'none';
    return;
  }
  const supName = supSel.selectedOptions[0]?.dataset?.name || '';
  document.getElementById('rq-si-supname').textContent = supName || 'المورد';
  const items = [];
  for(const o of ordersMap.values()){
    if(['archived','cancelled'].includes(o.stage)) continue;
    (o.costItems||[]).forEach((c, idx)=>{
      if(c.paid || c.pendingPaymentRequestId) return;
      if(c.supplierId !== supId) return;
      const amt = parseFloat(c.total)||0;
      if(amt <= 0) return;
      items.push({
        orderId: o._id, orderRefId: o.orderId || o._id.slice(-6),
        clientId: o.clientId || '', clientName: o.clientName || '—',
        costItemIndex: idx, type: c.type || '', amount: amt, note: c.note || '',
        supplierName: c.supplierName || supName, stage: o.stage || '',
      });
    });
  }
  if(!items.length){
    fg.style.display = '';
    listEl.innerHTML = `<div style="padding:14px;text-align:center;color:var(--dim2);font-size:var(--fs-base)">✨ لا توجد بنود مستحقة لهذا المورد</div>`;
    foot.style.display = 'none';
    return;
  }
  fg.style.display = '';
  listEl.innerHTML = items.map((i, k)=>`
    <label style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--line);cursor:pointer">
      <input type="checkbox" data-k="${k}" onchange="toggleSupItem(${k})" style="width:16px;height:16px;cursor:pointer">
      <div style="flex:1;min-width:0;font-size:var(--fs-sm)">
        <div><b style="color:var(--snow)">${escapeHtml(i.type||'بند')}</b> <span style="color:var(--dim2)">— ${escapeHtml(i.orderRefId)} — ${escapeHtml(i.clientName)}</span></div>
        ${i.note ? `<div style="color:var(--dim2);font-size:var(--fs-xs);margin-top:2px">${escapeHtml(i.note)}</div>` : ''}
      </div>
      <span style="font-weight:var(--fw-extra);color:var(--y);font-size:var(--fs-base)">${fn(i.amount)} ج</span>
    </label>
  `).join('');
  listEl.__items = items;
  foot.style.display = 'none';
};

window.toggleSupItem = function(k){
  const listEl = document.getElementById('rq-supplier-items-list');
  const items = listEl.__items || [];
  const cb = listEl.querySelector(`input[data-k="${k}"]`);
  if(!cb) return;
  const item = items[k];
  if(cb.checked){
    if(!__supItemsSelected.find(x=>x.orderId===item.orderId && x.costItemIndex===item.costItemIndex)){
      __supItemsSelected.push(item);
    }
  } else {
    __supItemsSelected = __supItemsSelected.filter(x=>!(x.orderId===item.orderId && x.costItemIndex===item.costItemIndex));
  }
  updateSupItemsSum();
};

function updateSupItemsSum(){
  const sum = __supItemsSelected.reduce((s,x)=>s+x.amount, 0);
  const foot = document.getElementById('rq-supplier-items-foot');
  if(foot){
    foot.style.display = __supItemsSelected.length ? 'flex' : 'none';
    const cEl = document.getElementById('rq-si-count'); if(cEl) cEl.textContent = __supItemsSelected.length;
    const tEl = document.getElementById('rq-si-total'); if(tEl) tEl.textContent = fn(sum);
  }
  if(__supItemsSelected.length){
    const amtEl = document.getElementById('rq-amount');
    if(amtEl) amtEl.value = sum;
  }
}

document.getElementById('rq-supplier')?.addEventListener('change', ()=>{
  refreshSupplierItemsList();
});

document.getElementById('rq-order')?.addEventListener('change', e=>{
  const oid = e.target.value;
  const info = document.getElementById('rq-order-info');
  const fgCost = document.getElementById('fg-cost-item');
  const ciSel = document.getElementById('rq-cost-item');
  refreshSupplierItemsList();
  if(!oid){
    info.style.display='none';
    if(fgCost) fgCost.style.display='none';
    return;
  }
  const o = ordersMap.get(oid);
  if(!o) return;
  const totalCost = (o.costItems||[]).reduce((s,c)=>s+(parseFloat(c.total)||0), 0);
  info.style.display = '';
  info.innerHTML = `📦 <b>${escapeHtml(o.orderId||o._id.slice(-6))}</b> — ${escapeHtml(o.clientName||'')} — مرحلة: <b>${STAGE_AR[o.stage]||o.stage}</b><br>💰 تكلفة الأوردر: <b style="color:var(--y)">${fn(totalCost)} ج</b> (${(o.costItems||[]).length} بند)`;

  if(activeReqType === 'supplier_payment' && fgCost && ciSel){
    const unpaid = (o.costItems||[]).map((c,i)=>({...c,_idx:i})).filter(c => !c.paid && !c.pendingPaymentRequestId && c.supplierId);
    if(unpaid.length){
      fgCost.style.display = '';
      ciSel.innerHTML = '<option value="">— اختر أو املأ يدوياً —</option>' + unpaid.map(c=>`<option value="${c._idx}" data-amount="${c.total||0}" data-sup-id="${c.supplierId||''}" data-sup-name="${escapeHtml(c.supplierName||'')}">#${c._idx+1} ${escapeHtml(c.type||'')} — ${escapeHtml(c.supplierName||'')} — ${fn(c.total||0)} ج</option>`).join('');
    } else {
      fgCost.style.display = 'none';
    }
  } else if(fgCost){
    fgCost.style.display = 'none';
  }
});

document.getElementById('rq-cost-item')?.addEventListener('change', e=>{
  const opt = e.target.selectedOptions[0];
  if(!opt || !opt.value) return;
  document.getElementById('rq-amount').value = opt.dataset.amount || '';
  const supSel = document.getElementById('rq-supplier');
  if(supSel && opt.dataset.supId){
    supSel.value = opt.dataset.supId;
  }
});

window.saveRequest = async function(){
  const amount = parseFloat(document.getElementById('rq-amount').value) || 0;
  const reason = document.getElementById('rq-reason').value.trim();
  if(!(amount > 0)) return showToast('⚠️ أدخل المبلغ','err');
  if(!reason) return showToast('⚠️ أدخل السبب','err');

  if(!allowedRequestTypes().includes(activeReqType)){
    return showToast('⛔ ليس لديك صلاحية إنشاء هذا النوع من الطلبات','err');
  }

  const reqData = {
    type: activeReqType,
    status: 'requested',
    amount, reason,
    requestedBy: currentUid,
    requestedByName: currentUserName,
    requesterRole: currentRole,
    requestedAt: serverTimestamp(),
    source: 'my_requests_page',
  };

  if(activeReqType === 'supplier_payment'){
    const supId = document.getElementById('rq-supplier').value;
    const supOpt = document.getElementById('rq-supplier').selectedOptions[0];
    if(!supId) return showToast('⚠️ اختر المورد','err');
    reqData.supplierId = supId;
    reqData.supplierName = supOpt?.dataset?.name || '';
    reqData.supplierType = supOpt?.dataset?.type || 'printer';
  } else if(activeReqType === 'salary'){
    const empId = document.getElementById('rq-employee').value;
    const empOpt = document.getElementById('rq-employee').selectedOptions[0];
    if(!empId) return showToast('⚠️ اختر الموظف','err');
    if(!canRequestForOthers()){
      const selfEmp = employees.find(e => e.authUid === currentUid || e._id === currentUid);
      const allowedEmpId = selfEmp?._id || currentUid;
      if(empId !== allowedEmpId){
        return showToast('⛔ يمكنك طلب مرتب/سلفة لنفسك فقط','err');
      }
    }
    reqData.employeeId = empId;
    reqData.employeeName = empOpt?.dataset?.name || '';
    reqData.salaryType = document.getElementById('rq-salary-type').value;
    reqData.salaryMonth = document.getElementById('rq-month').value || '';
  } else if(activeReqType === 'client_refund'){
    const cliId = document.getElementById('rq-client').value;
    const cliOpt = document.getElementById('rq-client').selectedOptions[0];
    if(!cliId) return showToast('⚠️ اختر العميل','err');
    reqData.clientId = cliId;
    reqData.clientName = cliOpt?.dataset?.name || '';
  }

  const orderId = document.getElementById('rq-order').value;
  if(orderId && ['supplier_payment','general','client_refund'].includes(activeReqType)){
    const o = ordersMap.get(orderId);
    if(o){
      reqData.orderId = orderId;
      reqData.orderRefId = o.orderId || '';
      if(!reqData.clientId) reqData.clientId = o.clientId || '';
      if(!reqData.clientName) reqData.clientName = o.clientName || '';
      reqData.orderStage = o.stage || '';
      reqData.orderProducts = (o.products||[]).map(p=>({name:p.name||'',qty:p.qty||1}));
      reqData.orderCostItems = (o.costItems||[]).map(c=>({type:c.type||'',total:parseFloat(c.total)||0,supplierName:c.supplierName||''}));
      reqData.orderTotalCost = reqData.orderCostItems.reduce((s,c)=>s+c.total, 0);
    }
  }

  const costItemIdx = document.getElementById('rq-cost-item')?.value;
  if(activeReqType === 'supplier_payment' && costItemIdx !== '' && costItemIdx != null && reqData.orderId){
    reqData.costItemIndex = parseInt(costItemIdx);
  }

  // multi-item: من قائمة "بنود مستحقة للمورد"
  if(activeReqType === 'supplier_payment' && __supItemsSelected.length > 0 && !reqData.orderId){
    const refs = __supItemsSelected.map(x=>({
      orderId: x.orderId, orderRefId: x.orderRefId,
      costItemIndex: x.costItemIndex, amount: x.amount,
      type: x.type, supplierName: x.supplierName,
      clientId: x.clientId, clientName: x.clientName, stage: x.stage,
    }));
    reqData.costItemRefs = refs;
    const sumRefs = refs.reduce((s,r)=>s+r.amount, 0);
    if(Math.abs(sumRefs - amount) > 0.01){
      return showToast(`⚠️ المبلغ (${fn(amount)}) لا يطابق مجموع البنود (${fn(sumRefs)})`,'err');
    }
    const first = refs[0];
    reqData.orderId = first.orderId;
    reqData.orderRefId = first.orderRefId;
    reqData.costItemIndex = first.costItemIndex;
    if(!reqData.clientId) reqData.clientId = first.clientId || '';
    if(!reqData.clientName) reqData.clientName = first.clientName || '';
    reqData.orderStage = first.stage || '';
  }

  const r = await approvalActions.createPaymentRequest({db,requestData:reqData,userId:currentUid,userName:currentUserName});
  if(!r.ok){
    const handled = window.financialGuard?.({message:(r.errors||[])[0]||'فشل'},{operation:'إنشاء طلب', amount});
    if(!handled) showToast('❌ '+((r.errors||[]).join(' · ')||'فشل'),'err');
    return;
  }
  showToast('✅ تم إرسال الطلب','ok');
  __supItemsSelected = [];
  cM('new-req');
};

// ══════════════ Modal: استلام (رفع إيصال) ══════════════
window.openReceiptModal = function(reqId){
  receivingReq = requests.find(r=>r._id===reqId);
  if(!receivingReq) return;
  __receiptFile = null;
  document.getElementById('receipt-file').value = '';
  document.getElementById('receipt-preview').innerHTML = '';
  document.getElementById('receipt-progress').style.display = 'none';
  oM('receipt');
};

document.getElementById('receipt-file')?.addEventListener('change', e=>{
  const f = e.target.files[0];
  if(!f) return;
  __receiptFile = f;
  const url = URL.createObjectURL(f);
  document.getElementById('receipt-preview').innerHTML = `<img src="${url}" style="max-width:100%;max-height:200px;border-radius:8px;border:1px solid var(--line)" alt="" loading="lazy">`;
});

window.uploadReceipt = async function(){
  if(!receivingReq) return;
  if(!__receiptFile) return showToast('⚠️ اختر صورة الإيصال','err');
  const btn = document.getElementById('receipt-save-btn');
  btn.disabled = true;
  btn.textContent = 'جاري الرفع...';
  const prog = document.getElementById('receipt-progress');
  prog.style.display = 'block';
  prog.textContent = 'جاري الرفع... 0%';
  try{
    const path = `receipts/${receivingReq._id}_${Date.now()}_${__receiptFile.name}`;
    const ref = sRef(storage, path);
    const task = uploadBytesResumable(ref, __receiptFile);
    await new Promise((res, rej)=>{
      task.on('state_changed',
        s=>{ const p = Math.round(s.bytesTransferred/s.totalBytes*100); prog.textContent = `جاري الرفع... ${p}%`; },
        rej,
        async ()=>{
          try{
            const url = await getDownloadURL(task.snapshot.ref);
            const result = await approvalActions.attachReceiptToRequest({db,requestId:receivingReq._id,txId:receivingReq.txId||'',receiptUrl:url,receiptPath:path,userId:currentUid,userName:currentUserName});
            if(!result.ok) throw new Error((result.errors||[])[0]||'فشل الإرفاق');
            res();
          }catch(err){ rej(err); }
        }
      );
    });
    showToast('✅ تم رفع الإيصال — بانتظار التأكيد','ok');
    cM('receipt');
    receivingReq = null;
    __receiptFile = null;
  }catch(e){
    const handled = window.financialGuard?.(e,{operation:'رفع إيصال'});
    if(!handled) showToast('❌ '+e.message,'err');
  }finally{
    btn.disabled = false;
    btn.textContent = '📤 رفع وتأكيد';
  }
};
</script>
