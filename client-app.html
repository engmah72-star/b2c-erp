<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Business2Card — بوابة العميل</title>
<!-- وُحِّدت بوابة العميل في portal.html (نسخة طازجة + معرض أعمال + كارت عام).
     نحوّل مع الحفاظ على باراميترات الرابط (مثل ?demo=1) ونلغي أي SW قديم. -->
<script>
(function(){
  try {
    if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister();});}).catch(function(){});
    if (window.caches && caches.keys) caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k);});}).catch(function(){});
  } catch(e){}
  location.replace('portal.html' + location.search + location.hash);
})();
</script>
</head>
<body style="background:#0b1020;color:#9aa">
<p style="text-align:center;padding:60px;font-family:system-ui">جارٍ التحويل لبوابة العميل…
<br><a href="portal.html" style="color:#a78bfa">اضغط هنا لو لم يتم التحويل</a></p>
</body>
</html>
