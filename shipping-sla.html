<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffaa00">
<title>B2C — تتبع SLA + التقييمات</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="sidebar-config.js"></script>
<script src="sync-monitor.js"></script>
<script src="smart-sidebar.js?v=1" defer></script>
<style>
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;border-top:3px solid var(--kc)}
.kpi-val{font-size:24px;font-weight:900;color:var(--kc)}
.kpi-lbl{font-size:10px;color:var(--dim2);font-weight:700}
.partner-perf{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rad2);padding:14px;margin-bottom:8px}
.metric-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:4px}
.metric-fill{height:100%;background:var(--c);transition:.3s}
.breach-card{background:var(--bg2);border:1px solid rgba(255,61,110,.3);border-radius:var(--rad2);padding:12px;margin-bottom:6px;border-right:3px solid var(--r)}
.tab-bar{display:flex;gap:6px;margin-bottom:14px}
@media(max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app-shell">
<aside class="sidenav"></aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><button class="mob-menu-btn" onclick="toggleNav()">☰</button><div><h1>⚖️ تتبع SLA + التقييمات</h1><p>أداء الشركاء، خرق الاتفاقيات، تقييمات العملاء</p></div></div>
  </div>
  <div class="content">
    <!-- KPIs -->
    <div class="kpi-row">
      <div class="kpi" style="--kc:var(--g)"><div class="kpi-val" id="k-ontime">—</div><div class="kpi-lbl">% تسليم في الموعد</div></div>
      <div class="kpi" style="--kc:var(--r)"><div class="kpi-val" id="k-breaches">—</div><div class="kpi-lbl">خرق SLA (آخر 30 يوم)</div></div>
      <div class="kpi" style="--kc:var(--y)"><div class="kpi-val" id="k-penalties">—</div><div class="kpi-lbl">غرامات مفروضة (ج)</div></div>
      <div class="kpi" style="--kc:var(--b)"><div class="kpi-val" id="k-rating">—</div><div class="kpi-lbl">متوسط التقييم العام</div></div>
    </div>

    <div class="tab-bar">
      <button class="btn btn-c btn-sm" id="tab-perf" onclick="switchTab('perf')">📊 أداء الشركاء</button>
      <button class="btn btn-ghost btn-sm" id="tab-breaches" onclick="switchTab('breaches')">⚠️ خرق SLA</button>
      <button class="btn btn-ghost btn-sm" id="tab-ratings" onclick="switchTab('ratings')">⭐ التقييمات</button>
    </div>

    <div id="content-area"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</div>
</div>

<script type="module">
import { auth, db, AppState, initAuth, toast } from './shared.js?v=1';
import {
  collection, doc, onSnapshot, query, orderBy, where, limit, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { dispatchShippingNetworkEvent, SN_COLLECTIONS } from './shipping-network-engine.js?v=1';

window.toggleNav = ()=> document.querySelector('.sidenav')?.classList.toggle('mob-open');

let allPartners = [], allBreaches = [], allRatings = [];
let activeTab = 'perf';

initAuth(async (state) => {
  if (!['admin','operation_manager','shipping_dispatcher'].includes(state.currentRole)) {
    document.body.innerHTML = '<div style="padding:40px;text-align:center"><h2>⛔ غير مصرح</h2><a href="index.html" class="btn">عودة</a></div>';
    return;
  }

  onSnapshot(query(collection(db, SN_COLLECTIONS.PARTNERS), orderBy('ratingAvg','desc')), snap => {
    allPartners = snap.docs.map(d => ({...d.data(), _id:d.id}));
    renderKpis(); render();
  });

  onSnapshot(query(collection(db, SN_COLLECTIONS.SLA_BREACHES), orderBy('createdAt','desc'), limit(100)), snap => {
    allBreaches = snap.docs.map(d => ({...d.data(), _id:d.id}));
    renderKpis(); if (activeTab==='breaches') render();
  });

  onSnapshot(query(collection(db, SN_COLLECTIONS.PARTNER_RATINGS), orderBy('createdAt','desc'), limit(100)), snap => {
    allRatings = snap.docs.map(d => ({...d.data(), _id:d.id}));
    if (activeTab==='ratings') render();
  });
}, () => location.href='login.html');

function renderKpis() {
  const totalShipments = allPartners.reduce((s,p) => s + (p.totalShipments||0), 0);
  const onTimeWeighted = allPartners.reduce((s,p) => s + ((p.onTimePct||0) * (p.totalShipments||0)), 0);
  const avgOnTime = totalShipments ? Math.round(onTimeWeighted/totalShipments) : 0;

  const last30 = allBreaches.filter(b => {
    const d = b.createdAt?.toDate?.() || new Date(b.createdAt || 0);
    return (Date.now() - d.getTime()) < 30*24*60*60*1000;
  });
  const penalties = allBreaches.filter(b => b.status === 'penalty_applied')
    .reduce((s,b) => s + (b.penaltyAmount || 0), 0);

  const rated = allPartners.filter(p => (p.ratingCount||0) > 0);
  const avgRating = rated.length ? (rated.reduce((s,p)=>s+(p.ratingAvg||0),0)/rated.length).toFixed(1) : '—';

  document.getElementById('k-ontime').textContent = avgOnTime + '%';
  document.getElementById('k-breaches').textContent = last30.length;
  document.getElementById('k-penalties').textContent = penalties.toFixed(0);
  document.getElementById('k-rating').textContent = avgRating;
}

window.switchTab = (tab) => {
  activeTab = tab;
  ['perf','breaches','ratings'].forEach(t => {
    const b = document.getElementById('tab-'+t);
    b.classList.remove('btn-c'); b.classList.add('btn-ghost');
  });
  const b = document.getElementById('tab-'+tab);
  b.classList.remove('btn-ghost'); b.classList.add('btn-c');
  render();
};

function render() {
  const area = document.getElementById('content-area');
  if (activeTab === 'perf')      area.innerHTML = renderPerformance();
  else if (activeTab === 'breaches') area.innerHTML = renderBreaches();
  else                                area.innerHTML = renderRatings();
}

function renderPerformance() {
  if (!allPartners.length) return '<div style="text-align:center;padding:40px;color:var(--dim2)">لا شركاء حتى الآن</div>';
  return allPartners.map(p => {
    const success = p.totalShipments ? Math.round(((p.successfulDeliveries||0)/p.totalShipments)*100) : 0;
    const target  = p.slaTargets?.minOnTimePct || 90;
    const onTimePct = p.onTimePct || 0;
    const meetsSLA  = onTimePct >= target;
    const fillCol = meetsSLA ? '#00d97e' : onTimePct >= target*0.8 ? '#ffaa00' : '#ff3d6e';
    return `
      <div class="partner-perf">
        <div style="display:flex;justify-content:space-between;align-items:start;gap:10px;margin-bottom:10px">
          <div>
            <div style="font-weight:800;font-size:14px">${p.name}</div>
            <div style="font-size:11px;color:var(--dim2)">${p.partnerType||''} • ${p.totalShipments||0} شحنة</div>
          </div>
          <div style="text-align:left">
            <div style="font-size:18px;font-weight:900;color:#ffaa00">${(p.ratingAvg||0).toFixed(1)}★</div>
            <div style="font-size:10px;color:var(--dim2)">${p.ratingCount||0} تقييم</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;font-size:12px">
          <div>
            <div style="color:var(--dim2);font-size:11px">نجاح التسليم</div>
            <div style="font-weight:900;color:var(--g)">${success}%</div>
          </div>
          <div>
            <div style="color:var(--dim2);font-size:11px">في الموعد (هدف: ${target}%)</div>
            <div style="font-weight:900;color:${fillCol}">${onTimePct}%</div>
            <div class="metric-bar"><div class="metric-fill" style="width:${Math.min(100,onTimePct)}%;background:${fillCol}"></div></div>
          </div>
          <div>
            <div style="color:var(--dim2);font-size:11px">معدل الإلغاء</div>
            <div style="font-weight:900;color:${p.cancellationRate>5?'var(--r)':'var(--g)'}">${(p.cancellationRate||0).toFixed(1)}%</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function renderBreaches() {
  const pending = allBreaches.filter(b => b.status === 'pending_review');
  const resolved = allBreaches.filter(b => b.status !== 'pending_review');
  return `
    <h4 style="margin:0 0 8px;font-size:13px;color:var(--r)">⚠️ خرق ينتظر المراجعة (${pending.length})</h4>
    ${pending.length === 0 ? '<div style="color:var(--dim2);padding:14px;text-align:center;font-size:12px">لا خرق ينتظر</div>' :
      pending.map(b => `
        <div class="breach-card">
          <div style="display:flex;justify-content:space-between;align-items:start;gap:8px">
            <div>
              <div style="font-weight:800;font-size:13px">${b.partnerName}</div>
              <div style="font-size:11px;color:var(--dim2)">
                Shipment: ${b.shipmentId?.slice(0,8)} •
                تأخير: ${b.breachMinutes||0} دقيقة •
                وقت فعلي: ${b.actualHours||0}س
              </div>
            </div>
            <div style="display:flex;gap:4px">
              <button class="btn btn-r" style="padding:4px 10px;font-size:11px" onclick="applyPenalty('${b._id}','${b.partnerId}','${b.partnerName.replace(/'/g,"\\'")}')">⚖️ طبق غرامة</button>
              <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px" onclick="waiveBreach('${b._id}')">عفو</button>
            </div>
          </div>
        </div>
      `).join('')
    }
    <h4 style="margin:18px 0 8px;font-size:13px;color:var(--dim2)">📋 سجل الخرق المعالج (${resolved.length})</h4>
    ${resolved.slice(0,20).map(b => `
      <div class="breach-card" style="border-color:var(--line);border-right-color:${b.status==='penalty_applied'?'var(--y)':'var(--g)'}">
        <div style="display:flex;justify-content:space-between;font-size:12px">
          <div><b>${b.partnerName}</b> • ${b.breachMinutes||0} دقيقة</div>
          <div>${b.status==='penalty_applied'?'⚖️ غرامة '+b.penaltyAmount+'ج':'✓ عفو'}</div>
        </div>
      </div>
    `).join('')}
  `;
}

function renderRatings() {
  return `
    <h4 style="margin:0 0 8px;font-size:13px">⭐ آخر تقييمات العملاء</h4>
    ${allRatings.length === 0 ? '<div style="color:var(--dim2);padding:40px;text-align:center">لا تقييمات بعد</div>' :
      allRatings.map(r => `
        <div class="partner-perf">
          <div style="display:flex;justify-content:space-between;gap:8px">
            <div>
              <div style="font-weight:800;font-size:13px">${r.partnerName}</div>
              <div style="font-size:11px;color:var(--dim2)">من: ${r.submittedByName||'—'}</div>
              ${r.comment ? `<div style="font-size:12px;margin-top:6px;color:var(--ink);background:var(--bg);padding:6px;border-radius:6px">"${r.comment}"</div>` : ''}
            </div>
            <div style="color:#ffaa00;font-size:16px;white-space:nowrap">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div>
          </div>
        </div>
      `).join('')
    }
  `;
}

window.applyPenalty = async function(breachId, partnerId, partnerName) {
  const breach = allBreaches.find(b => b._id === breachId);
  const amount = parseFloat(prompt(`مبلغ الغرامة لـ ${partnerName} (ج):\nاقتراحات: ${(breach?.breachMinutes||0) > 60 ? '50' : '20'}`));
  if (!amount || amount <= 0) return;
  const reason = prompt('السبب:') || 'تأخير تسليم';
  try {
    // Find admin platform wallet (use first wallet that has name "محفظة المنصة" or similar)
    // For simplicity, ask user to pick or use a config setting
    await dispatchShippingNetworkEvent(db, 'SLA_PENALTY', {
      partnerId,
      partnerName,
      amount,
      breachId,
      shipmentId: breach?.shipmentId,
      reason,
      userId: auth.currentUser.uid, userName: AppState.userName,
    });
    toast('⚖️ تم تطبيق الغرامة', 'ok');
  } catch (e) { toast('❌ '+e.message, 'err'); }
};

window.waiveBreach = async function(breachId) {
  if (!confirm('عفو عن هذا الخرق؟')) return;
  try {
    const { updateDoc, doc, serverTimestamp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    await updateDoc(doc(db, SN_COLLECTIONS.SLA_BREACHES, breachId), {
      status: 'waived',
      resolvedAt: serverTimestamp(),
      resolvedBy: auth.currentUser.uid,
    });
    toast('✓ تم العفو', 'ok');
  } catch (e) { toast('❌ '+e.message, 'err'); }
};
</script>
</body>
</html>
