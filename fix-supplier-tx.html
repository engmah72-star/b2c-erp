<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<title>ترحيل مدفوعات الموردين</title>
<style>
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0d0f1c;color:#fff;padding:20px;direction:rtl}
.card{background:#1a1d2e;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #2a2d3e}
button{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-family:Arial;margin:4px;font-weight:700}
.btn-b{background:rgba(59,158,255,.2);color:#3b9eff;border:1px solid rgba(59,158,255,.4)}
.btn-g{background:rgba(0,217,126,.2);color:#00d97e;border:1px solid rgba(0,217,126,.4)}
.btn-r{background:rgba(255,61,110,.2);color:#ff3d6e;border:1px solid rgba(255,61,110,.4)}
#log{background:#0a0c1a;border-radius:8px;padding:12px;font-size:12px;color:#888;max-height:400px;overflow-y:auto;margin-top:16px;font-family:monospace}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px 10px;border-bottom:1px solid #2a2d3e;text-align:right}
th{background:#0a0c1a;font-weight:800;color:#888}
.new{color:#00d97e}.exists{color:#888}.stat{display:inline-block;padding:8px 16px;border-radius:8px;margin:4px;font-weight:700;font-size:14px}
.ok{background:rgba(0,217,126,.15);color:#00d97e}
.warn{background:rgba(255,170,0,.15);color:#ffaa00}
</style>
<script src="financial-guard.js"></script>
</head>
<body>
<h2>🔧 ترحيل مدفوعات الموردين → transactions_v2</h2>

<div class="card">
  <div style="margin-bottom:12px;font-size:13px;color:#888">
    هذه الأداة تفحص كل مدفوعات الموردين في <code>supplier_payments</code>
    وتنشئ لها سجلات في <code>transactions_v2</code> إذا لم تكن موجودة،
    حتى تظهر ضمن المصروفات الفعلية في التقارير والربح.
  </div>
  <button class="btn-b" onclick="scan()">🔍 فحص البيانات</button>
  <button class="btn-g" id="fix-btn" onclick="migrate()" style="display:none">✅ ترحيل المفقود</button>
  <div id="stats" style="margin-top:12px"></div>
</div>

<div id="preview-wrap" style="display:none" class="card">
  <div style="font-weight:800;margin-bottom:10px">📋 نتيجة الفحص:</div>
  <div id="preview-table"></div>
</div>

<div id="log"></div>

<script type="module">
import {initializeApp} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getAuth,onAuthStateChanged} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {getFirestore,collection,getDocs,addDoc,serverTimestamp} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"});
const auth=getAuth(app),db=getFirestore(app);
const fn=n=>(parseFloat(n)||0).toLocaleString('ar-EG');

function log(msg,cls=''){
  const el=document.getElementById('log');
  el.innerHTML+=`<div style="padding:2px 0;${cls==='ok'?'color:#00d97e':cls==='err'?'color:#ff3d6e':cls==='warn'?'color:#ffaa00':''}">${msg}</div>`;
  el.scrollTop=el.scrollHeight;
}

let currentUser=null;
let toMigrate=[];

onAuthStateChanged(auth,u=>{
  if(!u){document.body.innerHTML='<div style="padding:40px;text-align:center"><p style="color:#ff3d6e">سجل دخول أولاً من <a href="login.html" style="color:#3b9eff">هنا</a></p></div>';return;}
  currentUser=u;
  log('✅ مسجل دخول: '+u.email,'ok');
});

window.scan=async function(){
  document.getElementById('stats').innerHTML='<div style="color:#ffaa00">⏳ جاري الفحص...</div>';
  document.getElementById('preview-wrap').style.display='none';
  document.getElementById('fix-btn').style.display='none';
  toMigrate=[];

  try{
    // جلب كل supplier_payments
    const spSnap=await getDocs(collection(db,'supplier_payments'));
    const supPays=spSnap.docs.map(d=>({...d.data(),_id:d.id}));

    // جلب كل transactions_v2 ذات category='supplier'
    const txSnap=await getDocs(collection(db,'transactions_v2'));
    const allTx=txSnap.docs.map(d=>({...d.data(),_id:d.id}));
    const supplierTx=allTx.filter(t=>t.category==='supplier');

    // بناء index للتشابك: walletId|amount|date(10chars)
    const txIndex=new Set();
    supplierTx.forEach(t=>{
      const key=`${t.walletId||''}|${parseFloat(t.amount)||0}|${(t.date||'').slice(0,10)}`;
      txIndex.add(key);
    });

    log(`📦 وُجد ${supPays.length} دفعة في supplier_payments`,'');
    log(`💳 وُجد ${supplierTx.length} حركة supplier في transactions_v2`,'');

    let newCount=0, existCount=0;
    supPays.forEach(sp=>{
      const key=`${sp.walletId||''}|${parseFloat(sp.amount)||0}|${(sp.date||'').slice(0,10)}`;
      if(txIndex.has(key)){
        existCount++;
      }else{
        newCount++;
        toMigrate.push(sp);
      }
    });

    document.getElementById('stats').innerHTML=`
      <span class="stat ok">✅ موجودة أصلاً: ${existCount}</span>
      <span class="stat warn">⚠️ مفقودة من transactions: ${newCount}</span>
    `;

    if(newCount>0){
      let rows=toMigrate.map(sp=>`
        <tr class="new">
          <td>${sp.supplierName||'—'}</td>
          <td>${fn(sp.amount)} ج</td>
          <td>${sp.date||'—'}</td>
          <td>${sp.walletId?'محدد':'بدون محفظة'}</td>
          <td>${sp.note||'—'}</td>
        </tr>`).join('');
      document.getElementById('preview-table').innerHTML=`
        <table>
          <thead><tr><th>المورد</th><th>المبلغ</th><th>التاريخ</th><th>المحفظة</th><th>ملاحظة</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      document.getElementById('preview-wrap').style.display='block';
      document.getElementById('fix-btn').style.display='inline-block';
    }else{
      document.getElementById('preview-table').innerHTML='<div style="color:#00d97e;padding:12px">✅ كل مدفوعات الموردين موجودة في transactions_v2</div>';
      document.getElementById('preview-wrap').style.display='block';
    }

  }catch(e){log('❌ خطأ: '+e.message,'err');}
};

window.migrate=async function(){
  if(!toMigrate.length)return;
  document.getElementById('fix-btn').disabled=true;
  log(`\n▶ بدء ترحيل ${toMigrate.length} دفعة...`,'warn');
  let done=0,failed=0;
  for(const sp of toMigrate){
    try{
      await addDoc(collection(db,'transactions_v2'),{
        walletId:sp.walletId||'',
        type:'out',
        amount:parseFloat(sp.amount)||0,
        fees:0,
        description:'دفع لمورد: '+(sp.supplierName||''),
        category:'supplier',
        supplierId:sp.supplierId||'',
        supplierName:sp.supplierName||'',
        balanceBefore:0,
        balanceAfter:0,
        date:sp.date||'',
        note:sp.note||'',
        createdBy:sp.createdBy||currentUser.uid,
        createdByName:'migration',
        migratedFrom:'supplier_payments',
        migratedSourceId:sp._id,
        createdAt:serverTimestamp()
      });
      done++;
      log(`✅ ${sp.supplierName||'مورد'} — ${fn(sp.amount)} ج — ${sp.date||''}`, 'ok');
    }catch(e){
      failed++;
      log(`❌ فشل: ${sp.supplierName||''} — ${e.message}`, 'err');
    }
  }
  log(`\n✅ اكتمل: ${done} تم ترحيلهم${failed?` · ${failed} فشل`:''}`, done>0?'ok':'err');
  document.getElementById('stats').innerHTML=`<span class="stat ok">✅ تم ترحيل ${done} دفعة بنجاح</span>`;
  document.getElementById('fix-btn').style.display='none';
};
</script>
</body>
</html>
