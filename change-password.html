<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff3d6e">
<title>Business2Card — تغيير كلمة السر</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#07080f;--bg2:#0d0f1c;--bg3:#131627;--line:rgba(255,255,255,.06);--snow:#e4eaf6;--dim2:#7280a0;--r:#ff3d6e;--g:#00d97e;--y:#ffaa00;--rad:11px;--rad2:17px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--snow);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:24px;padding:32px 28px;width:100%;max-width:420px}
.ico{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--y),var(--r));display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 20px}
h1{font-size:20px;text-align:center;margin-bottom:8px}
.sub{font-size:12px;color:var(--dim2);text-align:center;margin-bottom:24px}
.fg{margin-bottom:14px}
label{display:block;font-size:10px;font-weight:700;color:var(--dim2);text-transform:uppercase;margin-bottom:6px}
.inp{width:100%;background:var(--bg3);border:1px solid var(--line);border-radius:var(--rad);padding:12px 14px;color:var(--snow);font-family:inherit;font-size:13px;outline:none}
.inp:focus{border-color:var(--y)}
.btn{width:100%;padding:13px;border:none;border-radius:var(--rad);background:linear-gradient(135deg,var(--g),#3bd68c);color:#fff;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;margin-top:8px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.note{background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.2);border-radius:var(--rad);padding:10px 14px;font-size:12px;color:var(--y);margin-bottom:16px}
.err{background:rgba(255,61,110,.1);border:1px solid rgba(255,61,110,.2);border-radius:var(--rad);padding:10px 14px;font-size:12px;color:var(--r);margin-bottom:12px;display:none}
.err.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="ico">🔐</div>
  <h1>تغيير كلمة السر</h1>
  <div class="sub">هذه أول مرة تدخل للنظام — لازم تغيّر كلمة السر</div>

  <div class="note">💡 اختر كلمة سر قوية (8 حروف على الأقل)</div>
  <div class="err" id="err"></div>

  <div class="fg">
    <label>كلمة السر الحالية</label>
    <input class="inp" id="old-pw" type="password" value="b2c@123" placeholder="b2c@123">
  </div>
  <div class="fg">
    <label>كلمة السر الجديدة</label>
    <input class="inp" id="new-pw" type="password" placeholder="8 حروف على الأقل">
  </div>
  <div class="fg">
    <label>تأكيد كلمة السر الجديدة</label>
    <input class="inp" id="confirm-pw" type="password" placeholder="أعد كتابتها">
  </div>

  <button class="btn" id="btn" onclick="doChange()">✓ تغيير كلمة السر</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, EmailAuthProvider, reauthenticateWithCredential, updatePassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyDEK3I06IMrJPiYX09ULF7OIcbsMOsasUk",authDomain:"business2card-c041b.firebaseapp.com",projectId:"business2card-c041b",storageBucket:"business2card-c041b.firebasestorage.app",messagingSenderId:"235622448899",appId:"1:235622448899:web:d8652ff71082f7d003f336"});
const auth=getAuth(app); const db=getFirestore(app);

let user=null;

onAuthStateChanged(auth,u=>{
  if(!u){window.location.href='login.html';return;}
  user=u;
});

const ROLE_PAGES = {
  admin:'index.html', operation_manager:'index.html',
  customer_service:'cs-dashboard.html',
  graphic_designer:'designer-dashboard.html',
  design_operator:'designer-dashboard.html',
  production_agent:'production-dashboard.html',
  shipping_officer:'shipping-dashboard.html',
  wallet_manager:'accounts.html',
};

function showErr(msg){
  const el=document.getElementById('err');
  el.textContent=msg;
  el.classList.add('show');
}

window.doChange=async function(){
  const oldPw=document.getElementById('old-pw').value;
  const newPw=document.getElementById('new-pw').value;
  const confirmPw=document.getElementById('confirm-pw').value;
  
  document.getElementById('err').classList.remove('show');
  
  if(newPw.length<8) return showErr('كلمة السر يجب أن تكون 8 حروف على الأقل');
  if(newPw!==confirmPw) return showErr('كلمتا السر غير متطابقتين');
  if(newPw===oldPw) return showErr('يجب أن تكون كلمة السر الجديدة مختلفة');
  
  const btn=document.getElementById('btn');
  btn.disabled=true;
  btn.textContent='جاري التغيير...';
  
  try{
    const cred=EmailAuthProvider.credential(user.email,oldPw);
    await reauthenticateWithCredential(user,cred);
    await updatePassword(user,newPw);
    await updateDoc(doc(db,'users',user.uid),{mustChangePassword:false});
    
    // التوجيه حسب الدور
    const snap=await getDoc(doc(db,'users',user.uid));
    const role=snap.exists()?snap.data().role:'customer_service';
    window.location.href=ROLE_PAGES[role]||'index.html';
  }catch(e){
    btn.disabled=false;
    btn.textContent='✓ تغيير كلمة السر';
    if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')
      showErr('كلمة السر الحالية غير صحيحة');
    else
      showErr('خطأ: '+e.message);
  }
};

document.addEventListener('keydown',e=>{if(e.key==='Enter')window.doChange();});
</script>
</body>
</html>
