<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff3d6e">
<title>Business2Card — تغيير كلمة السر</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#07080f;--bg2:#0d0f1c;--bg3:#131627;--line:rgba(255,255,255,.06);--snow:#e4eaf6;--dim:#4e5672;--dim2:#7280a0;--r:var(--r);--g:var(--g);--y:var(--y);--rad:11px;--rad2:17px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--snow);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:var(--space-xl)}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:24px;padding:32px 28px;width:100%;max-width:420px}
.ico{width:60px;height:60px;border-radius:var(--rad2);background:linear-gradient(135deg,var(--y),var(--r));display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 20px}
h1{font-size:20px;text-align:center;margin-bottom:8px}
.sub{font-size:var(--fs-base);color:var(--dim2);text-align:center;margin-bottom:24px}
.fg{margin-bottom:14px}
label{display:block;font-size:var(--fs-xs);font-weight:var(--fw-bold);color:var(--dim2);text-transform:uppercase;margin-bottom:6px}
.inp-wrap{position:relative}
.inp{width:100%;background:var(--bg3);border:1px solid var(--line);border-radius:var(--rad);padding:12px 14px 12px 44px;color:var(--snow);font-family:inherit;font-size:var(--fs-md);outline:none;transition:border-color .18s;direction:ltr;text-align:right}
.inp::placeholder{direction:rtl;text-align:right;color:var(--dim)}
.inp:focus{border-color:var(--y)}
.inp.ok{border-color:rgba(0,217,126,.45)}
.inp.bad{border-color:rgba(255,61,110,.45)}
.eye{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dim2);font-size:15px;cursor:pointer;user-select:none;padding:var(--space-xs)}
.eye:hover{color:var(--snow)}
.btn{width:100%;padding:13px;border:none;border-radius:var(--rad);background:linear-gradient(135deg,var(--g),#3bd68c);color:#fff;font-family:inherit;font-size:var(--fs-lg);font-weight:var(--fw-extra);cursor:pointer;margin-top:8px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.note{background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.2);border-radius:var(--rad);padding:10px 14px;font-size:var(--fs-base);color:var(--y);margin-bottom:16px;line-height:1.6}
.err{background:rgba(255,61,110,.1);border:1px solid rgba(255,61,110,.2);border-radius:var(--rad);padding:10px 14px;font-size:var(--fs-base);color:var(--r);margin-bottom:12px;display:none}
.err.show{display:block}
.checks{display:flex;flex-direction:column;gap:var(--space-xs);margin-top:6px;font-size:var(--fs-sm);color:var(--dim2)}
.check{display:flex;align-items:center;gap:6px;transition:color .18s}
.check.pass{color:var(--g)}
.check .dot{width:6px;height:6px;border-radius:50%;background:var(--dim);transition:background .18s}
.check.pass .dot{background:var(--g)}
.strength{height:4px;border-radius:2px;background:var(--bg3);overflow:hidden;margin-top:6px}
.strength-bar{height:100%;width:0;transition:width .25s,background .25s;background:var(--r)}
</style>
<script src="sidebar-config.js"></script>
<script src="smart-sidebar.js?v=1" defer></script>
<script src="viewas.js?v=1" defer></script>
<script src="pwa-install.js?v=1" defer></script>
</head>
<body>
<div class="card">
  <div class="ico">🔐</div>
  <h1>تغيير كلمة السر</h1>
  <div class="sub">هذه أول مرة تدخل للنظام — لازم تغيّر كلمة السر</div>

  <div class="note">💡 اختر كلمة سر تتذكّرها — 6 حروف على الأقل. (يفضل أرقام فقط)</div>
  <div class="err" id="err"></div>

  <!-- يظهر فقط لو الموظف فتح الصفحة بدون عمل login من جديد -->
  <div class="fg hide" id="row-old">
    <label>كلمة السر الحالية</label>
    <div class="inp-wrap">
      <input class="inp" id="old-pw" type="password" dir="ltr" placeholder="كلمة السر التي دخلت بها الآن" autocomplete="current-password">
      <span class="eye" onclick="togglePw('old-pw',this)" title="إظهار / إخفاء">👁</span>
    </div>
  </div>

  <div class="fg">
    <label>كلمة السر الجديدة</label>
    <div class="inp-wrap">
      <input class="inp" id="new-pw" type="text" dir="ltr" inputmode="numeric" placeholder="مثال: 123456" autocomplete="new-password" autocapitalize="none" autocorrect="off" spellcheck="false">
      <span class="eye" onclick="togglePw('new-pw',this)" title="إظهار / إخفاء">🙈</span>
    </div>
    <div class="strength"><div class="strength-bar" id="strength-bar"></div></div>
    <div class="checks">
      <div class="check" id="chk-len"><span class="dot"></span><span>6 حروف على الأقل</span></div>
      <div class="check" id="chk-diff"><span class="dot"></span><span>مختلفة عن كلمة السر الحالية</span></div>
    </div>
  </div>

  <button class="btn" id="btn" onclick="doChange()">✓ حفظ والدخول</button>
</div>

<script type="module">
import { app, auth, db } from "./core/firebase-init.js";
import { onAuthStateChanged, EmailAuthProvider, reauthenticateWithCredential, updatePassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, updateDoc, getDoc, deleteField } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
let user=null;

onAuthStateChanged(auth,u=>{
  if(!u){window.location.href='login.html';return;}
  user=u;
  // إذا الموظف لسه داخل من login.html، حاطين كلمة السر الحالية مؤقتاً في
  // sessionStorage — لا تطلب منه إعادة كتابتها، فقط ركّز على كلمة السر الجديدة.
  try{
    const pending=sessionStorage.getItem('b2c_pending_pw');
    if(pending){
      document.getElementById('old-pw').value=pending;
      // نخفي حقل كلمة السر الحالية تماماً — الموظف ما يحتاج يعمل أي حاجة
      document.getElementById('row-old').style.display='none';
      setTimeout(()=>document.getElementById('new-pw').focus(),80);
      runChecks();
    } else {
      // ما عندناش الباسورد القديم — لازم نسأله عنه
      document.getElementById('row-old').style.display='';
      setTimeout(()=>document.getElementById('old-pw').focus(),80);
    }
  }catch(_){
    document.getElementById('row-old').style.display='';
    setTimeout(()=>document.getElementById('old-pw').focus(),80);
  }
});

const ROLE_PAGES = window.ROLE_HOME || {};

function showErr(msg){
  const el=document.getElementById('err');
  el.textContent=msg;
  el.classList.add('show');
}
function hideErr(){ document.getElementById('err').classList.remove('show'); }

window.togglePw=function(id,btn){
  const inp=document.getElementById(id);
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
  else {inp.type='password';btn.textContent='👁';}
};

/* تحقّق حي — يحدّث الشارات وشريط القوة بدون انتظار الضغط على زر */
const oldEl=()=>document.getElementById('old-pw');
const newEl=()=>document.getElementById('new-pw');

function runChecks(){
  const np=newEl().value, op=oldEl().value;
  const len=np.length>=6;
  const diff=np.length>0 && np!==op;
  toggleCheck('chk-len',len);
  toggleCheck('chk-diff',diff);
  // مؤشّر قوة بسيط — لمن يفضل كلمات قوية
  let score=0;
  if(np.length>=6) score++;
  if(np.length>=8) score++;
  if(/[0-9]/.test(np)) score++;
  if(/[a-zA-Z]/.test(np)) score++;
  if(/[^a-zA-Z0-9]/.test(np)) score++;
  const pct=Math.min(100,score*22);
  const bar=document.getElementById('strength-bar');
  bar.style.width=pct+'%';
  bar.style.background=score<=1?'var(--r)':score<=2?'var(--y)':score<=3?'#9bd96a':'var(--g)';
  if(np.length){ newEl().classList.toggle('ok',len&&diff); newEl().classList.toggle('bad',!len); }
  else { newEl().classList.remove('ok','bad'); }
}
function toggleCheck(id,pass){ const el=document.getElementById(id); if(el) el.classList.toggle('pass',pass); }

['input','keyup'].forEach(ev=>{
  oldEl().addEventListener(ev,runChecks);
  newEl().addEventListener(ev,runChecks);
});

window.doChange=async function(){
  const oldPw=oldEl().value;
  const newPw=newEl().value;

  hideErr();

  if(!oldPw)              return showErr('أدخل كلمة السر الحالية'), oldEl().focus();
  if(newPw.length<6)      return showErr('كلمة السر الجديدة يجب أن تكون 6 حروف على الأقل'), newEl().focus();
  if(newPw===oldPw)       return showErr('كلمة السر الجديدة لازم تكون مختلفة عن الحالية'), newEl().focus();

  const btn=document.getElementById('btn');
  btn.disabled=true;
  btn.textContent='جاري التغيير...';

  try{
    // حاول updatePassword مباشرة — الجلسة لسه طازة (الموظف داخل من ثانية)
    try{
      await updatePassword(user,newPw);
    }catch(e1){
      // إذا Firebase طلب reauth (auth/requires-recent-login) → نعمل reauth ثم نعيد المحاولة
      if(e1?.code==='auth/requires-recent-login'){
        const cred=EmailAuthProvider.credential(user.email,oldPw);
        await reauthenticateWithCredential(user,cred);
        await updatePassword(user,newPw);
      } else { throw e1; }
    }

    await updateDoc(doc(db,'users',user.uid),{
      mustChangePassword:false,
      displayPassword:deleteField(),
      displayPasswordSetAt:deleteField(),
      displayPasswordSetBy:deleteField(),
      displayPasswordSetByName:deleteField(),
      passwordChangedAt: new Date(),
    });

    // امسح أي كلمة سر مخزّنة مؤقتاً
    try{ sessionStorage.removeItem('b2c_pending_pw'); }catch(_){}

    btn.textContent='✅ تم — جاري التحويل';

    const snap=await getDoc(doc(db,'users',user.uid));
    const role=snap.exists()?snap.data().role:'customer_service';
    window.location.href=ROLE_PAGES[role]||'accounts.html';
  }catch(e){
    btn.disabled=false;
    btn.textContent='✓ تغيير كلمة السر';
    const code=e?.code||'';
    if(code==='auth/wrong-password'||code==='auth/invalid-credential'){
      showErr('كلمة السر الحالية غير صحيحة');
      oldEl().select();
    } else if(code==='auth/weak-password'){
      showErr('كلمة السر ضعيفة — اختر كلمة أقوى');
      newEl().focus();
    } else if(code==='auth/network-request-failed'){
      showErr('مشكلة في الاتصال بالإنترنت — حاول مرة أخرى');
    } else {
      showErr('خطأ: '+(e.message||code));
    }
  }
};

/* Enter داخل النموذج يقدّم خطوة بدلاً من إرسال فوري */
oldEl().addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();newEl().focus();}});
newEl().addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();window.doChange();}});
</script>
</body>
</html>
